{
  id: 0, name: 'Fundamentos da Ciência da Decisão', free: true,
  topics: [
    { id: 'fcd1', name: 'O que é tomada de decisão estratégica?', content: `<h4>Introdução à Decisão Estratégica</h4><p>Você está começando uma jornada fascinante no mundo da tomada de decisão estratégica. A capacidade de tomar boas decisões sob pressão e incerteza é um dos ativos mais valiosos que você pode desenvolver na vida profissional.</p><p><strong>A decisão estratégica diferencia-se da decisão operacional</strong> porque afeta o futuro da organização. Enquanto decisões operacionais são rotineiras e reversíveis, decisões estratégicas são complexas, irreversíveis e têm consequências duradouras.</p><blockquote class="tip"><strong>Dica:</strong> Segundo pesquisas da Harvard Business School, 70% das decisões estratégicas falham não por falta de análise, mas por implementação inadequada e falta de clareza de propósito.</blockquote><p>Os três pilares da decisão estratégica são: <strong>velocidade, qualidade e confiança</strong>. Você precisa aprender a equilibrá-los. Às vezes, você não pode ter tudo, e saber qual sacrificar é uma competência crucial.</p><p>A ciência da decisão estuda como os seres humanos e as organizações fazem escolhas. Ela combina psicologia, economia comportamental, estatística e lógica. Quando você entender esses princípios, conseguirá tomar decisões melhores consistentemente.</p><blockquote class="example"><strong>Exemplo:</strong> Quando Steve Jobs decidiu remover o drive de disquete dos primeiros iMacs em 1998, muitos executivos pensaram que era uma decisão errada. Mas foi uma decisão estratégica corajosa que antecipou o futuro da tecnologia.</blockquote><p>Você aprenderá neste módulo que toda decisão contém três elementos: informação, análise e intuição. Nem sempre conseguimos reunir toda a informação que gostaríamos, então você precisa ser inteligente sobre o que realmente importa.</p><p>A incerteza não é um problema a ser eliminado, é uma realidade a ser gerenciada. Você nunca terá certeza absoluta, e isso é normal. O que você pode fazer é aumentar a qualidade da sua análise e reduzir o risco desconhecido.</p>`},
    { id: 'fcd2', name: 'Tipos e contextos de decisão', content: `<h4>Classificando as Decisões</h4><p>Você precisa compreender que nem todas as decisões são iguais. Existem várias maneiras de classificar decisões, e cada classificação ajuda você a entender qual abordagem usar.</p><p><strong>Decisões estruturadas versus não estruturadas:</strong> Uma decisão estruturada segue um processo claro com informações conhecidas. Decidir o preço de um produto com base em dados de custo é estruturado. Uma decisão não estruturada, como mudar a missão da empresa, é complexa e não há procedimento claro.</p><blockquote class="tip"><strong>Notícia da indústria:</strong> Em 2023, 62% dos executivos afirmaram que suas organizações enfrentam decisões não estruturadas diariamente, o que dificulta o uso de automação e inteligência artificial.</blockquote><p>Há também decisões <strong>programadas e não programadas</strong>. Decisões programadas são repetitivas e podem ser delegadas ou automatizadas (como aprovar férias em um sistema). Decisões não programadas requerem julgamento humano e criatividade.</p><p>Outro modelo importante é <strong>certeza, risco e incerteza</strong>. Sob certeza, você conhece os resultados possíveis e suas probabilidades. Sob risco, você não conhece os resultados, mas pode estimar as probabilidades. Sob incerteza profunda, você nem consegue estimar as probabilidades.</p><p>Você também encontrará <strong>decisões individuais e grupais</strong>. Quando você decide sozinho, é mais rápido, mas menos robusto. Quando o grupo decide, é mais lento, mas tende a ser mais completo. A melhor prática é usar a abordagem certa para o contexto.</p><blockquote class="example"><strong>Exemplo prático:</strong> A decisão de entrar em um novo mercado é não estruturada, não programada e costuma exigir consenso grupal. A decisão de qual fornecedor usar para materiais já aprovados é estruturada, programada e pode ser individual.</blockquote><p>No contexto empresarial, você também enfrentará <strong>decisões estratégicas, táticas e operacionais</strong>. Estratégicas afetam 3-5 anos ou mais. Táticas afetam 1-2 anos. Operacionais afetam o dia a dia. Cada uma requer velocidade de decisão diferente.</p>`},
    { id: 'fcd3', name: 'O processo racional versus realidade', content: `<h4>Como Decidimos Realmente</h4><p>Você provavelmente aprendeu em escolas que a decisão racional segue um processo: identificar o problema, gerar alternativas, avaliar consequências, escolher a melhor opção. Se apenas fosse tão simples!</p><p><strong>O modelo racional assume que você tem informação completa, tempo ilimitado, objetivos claros e capacidade cognitiva infinita.</strong> Nenhum desses pressupostos é verdadeiro na realidade.</p><p>O prêmio Nobel de Economia em 1978 foi concedido a Herbert Simon por sua teoria da <strong>"racionalidade limitada"</strong>. Simon descobriu que as pessoas não maximizam, elas "satisfazem" — escolhem a primeira opção boa o suficiente, não a melhor.</p><blockquote class="tip"><strong>Insight importante:</strong> Você não consegue processar toda a informação disponível. Seu cérebro usa atalhos (heurísticas) que são úteis mas também causam erros sistemáticos (vieses).</blockquote><p>Na prática, você usa um processo chamado <strong>"modelo de lata de lixo"</strong> ou <strong>"garbage can model"</strong>. Você recebe informações fragmentadas, tem pressão de tempo, múltiplos objetivos conflitantes, e pessoas influenciando-o em direções diferentes.</p><p>Você também é influenciado por <strong>fatores emocionais, sociais e políticos</strong>. Seu humor afeta suas decisões. A opinião do seu chefe afeta suas decisões. A pressão do grupo afeta suas decisões. Isso não é fraqueza, é a natureza humana.</p><p>A boa notícia é que <strong>conhecer essas limitações ajuda você a compensá-las</strong>. Você pode criar processos que reduzem a dependência de racionalidade perfeita. Você pode usar checklists, modelos estruturados e ferramentas que o ajudam a pensar com mais clareza.</p><blockquote class="example"><strong>Exemplo:</strong> Os pilotos de avião não confiam em sua memória. Eles usam checklists antes de cada voo. Isso compensou as limitações da memória humana e tornou aviação uma das atividades mais seguras que existem.</blockquote><p>Ao longo deste curso, você aprenderá técnicas para aproximar-se do ideal racional enquanto aceita a realidade emocional e social. É um equilíbrio delicado, mas possível de dominar.</p>`},
    { id: 'fcd4', name: 'Vieses cognitivos na empresa', content: `<h4>Conhecendo os Seus Atalhos Mentais</h4><p>Você tem cerca de 86 bilhões de neurônios no cérebro, mas nem todos estão dedicados à tomada de decisão. Para economizar energia, seu cérebro desenvolveu atalhos chamados heurísticas. Eles são rápidos e geralmente funcionam, mas às vezes os levam a erros.</p><p>O <strong>viés de confirmação</strong> é um dos mais perigosos. Você procura evidências que confirmam o que você já acredita e ignora evidências contrárias. Se você acredita que um candidato é bom, você va notar todos os seus pontos fortes e ignorar os fracos.</p><blockquote class="tip"><strong>Dica de mitigação:</strong> Para combater o viés de confirmação, peça explicitamente a alguém que argumente CONTRA sua posição. Essa pessoa "advogada do diabo" pode salvar você de erros custosos.</blockquote><p>O <strong>viés de disponibilidade</strong> faz você superestimar a probabilidade de eventos que você se lembra facilmente. Se você viu três empresas falirem recentemente, você pode ser pessimista sobre o mercado todo, mesmo que esses sejam apenas casos extremos.</p><p>O <strong>viés de ancoragem</strong> significa que o primeiro número que você ouve afeta todas as suas estimativas subsequentes. Se alguém diz "essa empresa vale R$ 10 milhões", você provavelmente vai dar uma oferta perto desse número, mesmo que nunca tenha visto dados reais.</p><p>Existem <strong>dezenas de vieses documentados</strong>: viés de otimismo (você acha que tudo vai dar certo), viés de pessimismo (oposto), pensamento de grupo (todos concordam, então deve estar certo), viés de status quo (manter tudo como está parece seguro).</p><blockquote class="example"><strong>Exemplo real:</strong> A Kodak inventou a câmera digital em 1975, mas não investiu nela porque acreditava que o mercado de fotografia era filme. Eles foram vítimas do viés de status quo e perderam uma oportunidade de transformação.</blockquote><p>O primeiro passo para lidar com vieses é <strong>reconhecer que você tem eles</strong>. Você não é mais racional que o próximo executivo. A diferença entre bons tomadores de decisão e ruins é que os bons conhecem seus vieses e criam sistemas para compensá-los.</p><p>Você aprenderá nos próximos módulos técnicas práticas como estruturação de decisão, pensamento crítico e revisão por pares que reduzem drasticamente o impacto dos vieses. Conhecimento é o primeiro passo; ação é o segundo.</p>`}

{
  id: 1, name: 'Modelos Mentais para Negócios', free: false,
  topics: [
    { id: 'mmn1', name: 'Os grandes modelos de negócios', content: `<h4>Estruturas Mentais para Pensar</h4><p>Um modelo mental é um padrão que você carrega na sua mente para entender como algo funciona. Quando você tem bons modelos mentais, você consegue ver padrões que outros não veem e tomar decisões melhores.</p><p><strong>O modelo de cadeia de valor de Porter</strong> divide um negócio em atividades primárias e de suporte. Atividades primárias (inbound logistics, operações, outbound logistics, marketing e vendas, serviço) criam valor diretamente. Atividades de suporte (infraestrutura, recursos humanos, tecnologia, procurement) permitem que as primárias funcionem. Entender essa estrutura ajuda você a ver onde está o dinheiro real.</p><blockquote class="tip"><strong>Dica:</strong> Ao analisar um competitor ou sua própria empresa, mapeie a cadeia de valor. Frequentemente, você descobrirá que o rival tem vantagem não nos produto em si, mas em como organiza a cadeia de valor.</blockquote><p><strong>O modelo SWOT</strong> (Strengths, Weaknesses, Opportunities, Threats) ajuda você a ver a posição de uma empresa. Pontos fortes e fracos são internos; oportunidades e ameaças são externas. Muitos executivos usam SWOT superficialmente, mas quando feito bem, revela insights profundos.</p><p><strong>Os "5 Porquês"</strong> é uma técnica simples mas poderosa. Quando algo dá errado, você pergunta "por quê?" e depois pergunta "por quê?" novamente ao responder. Isso força você a ir além de sintomas para causas raízes. A Toyota usou isso para se tornar a empresa de manufatura mais confiável do mundo.</p><blockquote class="example"><strong>Exemplo:</strong> Se um projeto atrasou, o primeiro "por quê" pode ser "faltaram recursos". Mas por quê? Talvez "houve prioridades conflitantes". Por quê? Talvez "o sistema de priorização é fraco". Por quê? Talvez "falta transparência sobre estratégia".</blockquote><p><strong>O quadrante de Eisenhower</strong> ajuda você a decidir sobre prioridades. Você coloca tarefas em uma matriz 2x2: importante/não importante e urgente/não urgente. O segredo é investir tempo em coisas importantes mas não urgentes (planejamento estratégico, desenvolvimento de pessoas), que a maioria negligencia.</p><p><strong>O modelo de ciclo de vida do produto</strong> ajuda você a entender em qual estágio um produto está (introdução, crescimento, maturidade, declínio). Cada estágio requer estratégia diferente. Se você está em maturidade, inovar é crítico. Se está em introdução, penetração é crítica. Muitas empresas aplicam a mesma estratégia em todos os estágios e fracassam.</p><p>Esses modelos são ferramentas de pensamento. Sozinhos, eles não resolvem seus problemas, mas dão a você um framework para pensar sistematicamente sobre desafios complexos.</p>`},
    { id: 'mmn2', name: 'Pensamento sistêmico e causalidade', content: `<h4>Vendo o Todo, Não Apenas as Partes</h4><p>Você tende a pensar em linhas retas: A causa B, B causa C. Mas o mundo dos negócios é cheio de ciclos de realimentação, atrasos temporais e efeitos não lineares.</p><p><strong>O pensamento sistêmico</strong> ajuda você a ver como as partes interagem. Por exemplo, você contrata mais vendedores para aumentar vendas. Vendas aumentam, mas a qualidade do atendimento cai porque os treinadores estão sobrecarregados. Clientes ficam insatisfeitos. Rotatividade aumenta. O efeito inicial positivo se reverteu.</p><blockquote class="tip"><strong>Conceito importante:</strong> Um "ciclo de realimentação" ou "feedback loop" pode ser reforçador (sucesso gera mais sucesso) ou equilibrador (o sistema tende a voltar ao equilíbrio). Você precisa reconhecer ambos para prever comportamentos.</blockquote><p><strong>Os atrasos temporais são cruciais.</strong> Você toma uma ação hoje, mas a consequência aparece em 3 meses, 1 ano ou mais. Isso torna fácil errar sobre causalidade. Você pode cortar custos e ver lucro aumentar em 2 trimestres, e pensar que era a coisa certa a fazer. Mas em 2 anos, a qualidade do produto degrada e você perde o mercado. O atraso enganou você.</p><p><strong>A não linearidade</strong> significa que dobrar o esforço não dobra o resultado. Se você aumentar presença em redes sociais de 2 para 4 posts por semana, o engajamento pode aumentar 30%. Mas ir de 8 para 10 posts talvez aumente apenas 5%. Você atinge o ponto de diminuição de retorno.</p><blockquote class="example"><strong>Exemplo de sistema:</strong> Uma loja aumenta preços para aumentar margem (melhor no curto prazo). Clientes vão embora. Vendas caem (fase de latência). Mais clientes vão embora porque percebem que a loja é cara (efeito multiplicado). A loja fecha. O que parecia boa decisão (aumentar margem) causou desastre por ignorar o sistema.</blockquote><p><strong>Você também precisa identificar quem são os "players"</strong> e quais são seus incentivos. Se a comissão de um vendedor é baseada em número de vendas, não em lucro, ele venderá produtos de baixa margem. O sistema de incentivos criou um comportamento que prejudica o negócio.</p><p>O pensamento sistêmico não te dará respostas, mas te fará fazer perguntas melhores. Essas perguntas levam a decisões mais robustas.</p>`},
    { id: 'mmn3', name: 'Inversão e pensamento reverso', content: `<h4>Resolvendo Problemas de Trás para Frente</h4><p>Charlie Munger, vice-presidente de Warren Buffett, diz que o inverso de bom pensamento é bom pensamento revertido. Se você quer saber como ter sucesso em algo, estude primeiro o fracasso naquele mesmo domínio.</p><p><strong>A análise de falha retroativa</strong> funciona assim: imagine que seu projeto falhou miseravelmente. Agora, trabalhando de trás para frente, o que precisaria ter acontecido para causar esse fracasso? Uma vez identificadas as causas potenciais de fracasso, você pode mitigá-las hoje.</p><blockquote class="tip"><strong>Dica prática:</strong> Antes de lançar um produto, faça um "pós-mortem imaginário". Reúna o time e peça: "Este produto foi um fracasso total. O que o matou?" As respostas são mais criativas que "como fazemos isso dar certo?"</blockquote><p><strong>O pensamento inverso também ajuda na inovação.</strong> Se você quer saber como ter clientes mais satisfeitos, pergunte: "Como faço para alienar meus melhores clientes?" As respostas surpreendentes aparecem: "Cobrando taxas escondidas. Tendo atendimento ruim. Lançando produtos inferiores." Agora você sabe o que absolutamente não fazer.</p><p><strong>Na análise de investimento, isso é ouro.</strong> Ao invés de perguntar "por que este negócio é bom?", pergunte "por que este negócio pode falhar nos próximos 5 anos?" As startups mais perigosas são aquelas que os investidores não veem os riscos porque estão encantados com o potencial.</p><blockquote class="example"><strong>Exemplo:</strong> A Microsoft quase desapareceu quando o iPhone foi lançado. Steve Ballmer, CEO, dit que o iPhone era muito caro e não teria sucesso. Ao invés de perguntar "por que o iPhone vai fracassar?", deveria ter perguntado "como uma empresa com os melhores engenheiros pode estar tão errada sobre o futuro?"</blockquote><p>O pensamento reverso é especialmente poderoso porque combate o viés de confirmação. Seu cérebro naturalmente procura evidências de que está certo. Forçar-se a pensar sobre como está errado expande sua perspectiva.</p><p>Use essa técnica regularmente. Em decisões importantes, sempre dedique tempo para explorar os cenários de fracasso antes de comprometer recursos.</p>`},
    { id: 'mmn4', name: 'Analogias e padrões entre domínios', content: `<h4>Aprendendo de Campos Não Relacionados</h4><p>Um dos segredos de pensadores originais é que eles têm modelos mentais de muitas disciplinas diferentes e sabem quando aplicá-los a novos contextos.</p><p><strong>As analogias são ferramentas poderosas de resolução de problemas.</strong> Um famoso exemplo: quando a Procter & Gamble enfrentava um problema de contaminação em uma fábrica de xampus, procurou fora da indústria de cuidados pessoais. Descobriram que a indústria alimentícia tinha soluções para o mesmo tipo de problema. A P&G adotou técnicas da indústria alimentícia e resolveu o problema.</p><blockquote class="tip"><strong>Dica de aprendizado:</strong> Você não precisa ser especialista em tudo. Você precisa reconhecer quando um problema em seu domínio é estruturalmente similar a um problema resolvido em outro domínio.</blockquote><p><strong>A biologia oferece muitos padrões úteis.</strong> O conceito de "seleção natural" pode ser aplicado à estratégia empresarial: você cria variação (diferentes estratégias), deixa o mercado selecionar a melhor (testa com clientes), e amplifica o vencedor (investe nele). Este é o fundamento do método ágil.</p><p><strong>A física ensina sobre energia e inércia.</strong> Uma empresa grande tem inércia: é difícil mudar de direção mesmo quando a mudança é necessária. Uma startup tem pouca inércia: consegue pivotar rapidamente. Isso explica por que inovação disruptiva frequentemente vem de startups, não de líderes incumbentes.</p><p><strong>A história oferece padrões repetidos.</strong> Padrões de ascensão e queda de impérios, booms e crises econômicas, mudanças tecnológicas. Quem estuda história geralmente vê padrões que repetem em negócios antes de seus colegas.</p><blockquote class="example"><strong>Exemplo moderno:</strong> Quando Netflix viu streaming como o futuro do vídeo, era porque entendeu padrão de história: toda mídia (música, filmes, livros) estava migrando para acesso por demanda. Não precisava ser gênio para ver isso, apenas tinha que conhecer a história e reconhecer o padrão.</blockquote><p><strong>Você deveria estudar campos fora de sua especialidade.</strong> Não precisa ser profundo, mas ter exposição a diferentes maneiras de pensar. Um livro sobre evolução, outro sobre história militar, outro sobre psicologia. Ao longo do tempo, seu repertório de modelos mentais cresce, e você consegue fazer conexões criativas.</p><p>Os melhores tomadores de decisão que você conhece provavelmente têm curiosidade intelectual. Eles leem amplamente. Eles falam com pessoas diferentes. Eles viajam e absorvem novas culturas. Tudo isso é investimento em seus modelos mentais.</p>`}
  ],

{
  id: 2, name: 'Análise de Risco e Incerteza', free: false,
  topics: [
    { id: 'ari1', name: 'Diferenciando risco de incerteza genuína', content: `<h4>Nem Tudo é Calculável</h4><p>Frank Knight, economista de Chicago, fez uma distinção crucial no início do século XX: risco é quando você conhece os possíveis resultados e suas probabilidades. Incerteza genuína é quando você nem consegue definir os possíveis resultados.</p><p><strong>Sob risco, você pode calcular.</strong> Se você lança um dado, há 6 resultados possíveis e cada um tem probabilidade de 1/6. Você pode calcular valor esperado, desvio padrão, e tomar decisões baseadas em probabilidades. Seguros funcionam porque as seguradoras enfrentam risco (muitos clientes, resultados conhecidos), não incerteza genuína.</p><blockquote class="tip"><strong>Conceito crítico:</strong> A maioria das análises de risco em negócios assume que você enfrenta risco quando na verdade enfrenta incerteza. Isso o leva a falsos sentidos de precisão e decisões ruins.</blockquote><p><strong>Sob incerteza genuína, os resultados possíveis não são conhecidos.</strong> Quando você lança um novo produto, não sabe se o mercado o aceitará. Você pode estimar, mas há possibilidades que você nem considerou. Um competitor pode lançar algo melhor. Uma mudança regulatória pode acontecer. Uma crise econômica pode abater a demanda.</p><p><strong>O erro fatal é aplicar análise de risco a situações de incerteza.</strong> Um modelo financeiro que diz "há 70% de chance de sucesso" pode parecer científico, mas se você nem consegue enumerar todos os resultados possíveis, esse modelo é ilusão. É GIGO: garbage in, garbage out.</p><blockquote class="example"><strong>Exemplo histórico:</strong> Em 2007, as agências de rating deram AAA (máxima segurança) a títulos baseados em hipotecas subprime usando modelos sofisticados. O erro não era a matemática; era aplicar análise de risco a uma situação de incerteza genuína. Os modelos não capturaram o "possível resultado" de desabamento do mercado imobiliário.</blockquote><p><strong>Como você sabe se enfrenta risco ou incerteza?</strong> Se você conseguir imaginar cenários relevantes que seus analistas não mencionaram, você provavelmente enfrenta incerteza genuína. Se você está confiante de que enumerou todos os resultados materialmente possíveis, você provavelmente enfrenta risco.</p><p>Para incerteza, você não deveria focar em estimativas pontuais. Você deveria focar em robustez: qual decisão funciona bem em múltiplos cenários, não apenas no "caso base"?</p>`},
    { id: 'ari2', name: 'Cenários, análise de sensibilidade e testes de estresse', content: `<h4>Testando Suas Suposições</h4><p>Você nunca conseguirá prever o futuro com precisão. Mas você pode testar quão robusto é seu plano contra diferentes futuros possíveis.</p><p><strong>Análise de cenários</strong> significa construir alguns futuros plausíveis (melhor caso, pior caso, caso provável) e modelar como sua decisão funciona em cada um. Não é previsão; é exploração de possibilidades.</p><blockquote class="tip"><strong>Dica prática:</strong> Quando você fizer análise de cenários, peça a alguém independente que critique seus cenários. Muitas vezes, você omite cenários que não gosta de pensar (recessão, perda de cliente chave, saída de talento crítico).</blockquote><p><strong>Análise de sensibilidade</strong> testa qual variável tem maior impacto em seu resultado. Se você está planejando uma fábrica, a sensibilidade pode mostrar: "Taxa de juros tem 2x mais impacto que preço do aço". Agora você sabe em qual variável focar sua diligência.</p><p><strong>Teste de estresse</strong> é quando você testa uma variável até seu ponto de ruptura. "Se taxa de juros subir 5%? Ainda é viável? E se subir 10%? E 15%?" Você descobre o ponto de ruptura além do qual sua decisão não funciona mais.</p><blockquote class="example"><strong>Exemplo:</strong> Antes da COVID-19, muitas empresas tinham "plano de contingência para pandemia", mas testada nunca. A Slack, cujo modelo funcionava com trabalho remoto, passou no teste. Muitos varejistas não passaram porque seu modelo depende de lojas físicas.</blockquote><p><strong>Uma técnica poderosa é a "análise de ponto de ruptura".</strong> Você modelar: em qual valor dessa variável minha decisão passa de boa para ruim? Se descobrir que sua fábrica é viável enquanto preço do aço estiver abaixo de R$ 500/tonelada, mas está R$ 600 hoje, você tem um risco claro.</p><p>Esses testes não eliminam incerteza. Mas eles revelam quais incertezas importam mais, e quanto risco você realmente está assumindo.</p>`},
    { id: 'ari3', name: 'Valor esperado, decisões sob incerteza', content: `<h4>Quando Não Se Pode Saber o Resultado</h4><p>Imagine que você enfrenta duas opções: Opção A (90% chance de ganhar R$ 100, 10% chance de perder R$ 1.000) ou Opção B (50% chance de ganhar R$ 50, 50% chance de ganhar R$ 150). Qual você escolhe?</p><p><strong>Valor esperado = probabilidade × magnitude</strong>. Opção A: 0,9 × 100 + 0,1 × (-1.000) = 90 - 100 = -10. Opção B: 0,5 × 50 + 0,5 × 150 = 25 + 75 = 100. Valor esperado de B é maior.</p><blockquote class="tip"><strong>Importante:</strong> Se você puder repetir a mesma decisão muitas vezes (como um cassino), escolha a que tem maior valor esperado. Se é uma decisão única (como vender a empresa), o valor esperado é menos relevante; você deveria pensar em probabilidade de sobrevivência.</blockquote><p><strong>A "utilidade" não é a mesma coisa que valor.</strong> Para um pobre, R$ 100 vale muito mais do que para um rico. A utilidade marginal do dinheiro decresce. Isso significa que uma decisão com "maior valor esperado" pode não ser melhor se você não conseguir sobreviver ao cenário negativo.</p><p><strong>Por isso a "margem de segurança" é crítica.</strong> Você deveria escolher decisões onde mesmo no pior caso plausível, você sobrevive. Warren Buffett nunca investe em nada onde, mesmo que tudo dê muito errado, ele perde tudo. Essa margem de segurança é o antídoto para o risco desconhecido.</p><blockquote class="example"><strong>Exemplo:</strong> Investir R$ 100 mil em ação tem "maior valor esperado" que deixar no banco. Mas se esses R$ 100 mil são todos seus economias e você perderá tudo se a ação cair 50%, você não deveria investir mesmo que matematicamente seja a decisão "certa".</blockquote><p><strong>A "Kelly Criterion" é uma fórmula para determinar quanto arriscar.</strong> Em síntese: não coloque tudo em uma aposta, mesmo que tenha boas chances. Distribua entre múltiplas apostas. Isso maximiza seu crescimento long-term enquanto você sobrevive aos reveses inevitáveis.</p><p>Na prática, isso significa: diversificar, tomar apostas pequenas em muitas coisas boas, ao invés de aposta gigante em uma coisa.</p>`},
    { id: 'ari4', name: 'Identificando riscos ocultos e "incógnitas desconhecidas"', content: `<h4>O Que Você Não Sabe Que Não Sabe</h4><p>Existem quatro categorias de conhecimento: conhecidas conhecidas (você sabe que sabe), conhecidas desconhecidas (você sabe que não sabe), desconhecidas conhecidas (você sabe algo sem perceber que sabe), e desconhecidas desconhecidas (você não sabe que não sabe).</p><p>Os maiores riscos vêm da última categoria. A crise financeira de 2008 não foi porque as pessoas não sabiam que hipotecas podiam ser ruins. Era porque não sabiam que toda a economia poderia desabar se o mercado imobiliário caísse.</p><blockquote class="tip"><strong>Dica valiosa:</strong> Para descobrir desconhecidas desconhecidas, você precisa conversar com pessoas muito diferentes de você. Um consultor de fora de sua indústria pode ver riscos que você é cego. Pessoas de culturas diferentes percebem riscos diferentes.</blockquote><p><strong>O "pré-mortem" é uma técnica para trazer desconhecidas desconhecidas à superfície.</strong> Você reúne o time e diz: "Estamos em 6 meses. O projeto foi um desastre catastrófico. O que aconteceu?" Sem as restrições do pensamento positivo usual, pessoas começam a sugerir possibilidades que normalmente silenciam.</p><p><strong>Os "cisnes negros" são eventos de baixa probabilidade, alto impacto.</strong> Você não consegue prever exatamente quando acontecem, mas você pode aumentar sua resiliência para quando (não "se") acontecerem. Uma empresa resiliente consegue sobreviver surpresas; uma frágil desaparece.</p><blockquote class="example"><strong>Exemplo:</strong> A Kodak foi surpreendida pela câmera digital, mas outras empresas já tinham antecipado isso porque conversaram com observadores de tecnologia. A Kodak desperdiçou ciclos cognitivos discutindo por que o filme era superior, ao invés de preparar-se para o inevitável.</blockquote><p><strong>Você nunca vai eliminar desconhecidas desconhecidas.</strong> Mas você pode construir um sistema de "antenas" para detectá-las cedo. Isso significa: ler amplamente, conversar com outsiders regularmente, estar atento a sinais fracos que outras pessoas não noticiam.</p><p>O segredo dos executivos que navegam incerteza melhor é não que possuem bola de cristal, mas que têm processos e humildade. Eles reconhecem o que não sabem e constroem redundância e flexibilidade em seus planos.</p>`}
  ],

  summary: { title: 'Resumo do Módulo 3', points: ['Risco (resultados e probabilidades conhecidas) é diferente de incerteza genuína (resultados desconhecidos); aplicar análise de risco a incerteza cria ilusão de precisão.', 'Análise de cenários, sensibilidade e teste de estresse revelam quais incertezas importam mais e quando sua decisão quebraria.', 'Margem de segurança garante que você sobrevive aos cenários ruins; valor esperado é importante quando você pode repetir, mas não em decisões únicas.', 'Desconhecidas desconhecidas são os maiores riscos; você aumenta resiliência através de antenas (leitura ampla, conversas com outsiders, atenção a sinais fracos).'] },

var MODS = MODS.concat([
{
  id: 3, name: 'Decisões Orientadas por Dados', free: false,
  topics: [
    { id: 'dod1', name: 'Dados versus intuição: quando usar cada um', content: `<h4>A Falsa Dicotomia</h4><p>Você frequentemente ouve: "Confie em seus dados, não em intuição" ou "Grande líderes confiam em instinto". Ambas são versões simplificadas e enganosas da verdade.</p><p><strong>Dados são evidência do passado, não previsão do futuro.</strong> Se seus dados mostram que clientes antigos compraram mais em meses frios, isso não significa que essa tendência vai continuar. O mundo muda. Competidores entram. Tecnologia muda comportamento.</p><blockquote class="tip"><strong>Ponto crítico:</strong> Os piores erros frequentemente vêm de confiar em dados que perderam relevância ou de interpretar correlação como causalidade.</blockquote><p><strong>Intuição é padrão reconhecimento rápido</strong> pelo seu cérebro. Quando um experiente executivo "sente" que algo está errado, seu cérebro processou sinais sutis que você não conscientizou. Mas intuição também é viés, hábito e preferência pessoal.</p><p><strong>A combinação ideal é dados + intuição de expertise.</strong> Você usa dados para validar intuição e intuição para questionar dados. Se seus dados dizem que tudo está bem mas você sente que algo está errado, invista tempo investigando por quê.</p><blockquote class="example"><strong>Exemplo:</strong> Amazon permite que executivos façam "one-way doors" decisões se forem baseadas em dados sólidos. Mas Bezos também faz decisões contra os dados quando tem convicção forte (tipo investir em Kindle quando tablets estavam em alta). O segredo é saber quando confiar em qual.</blockquote><p><strong>Quando você definitivamente PRECISA de dados</strong>: quando intuição pode estar enviesada (exemplo: avaliar desempenho de um subordinado que você não gosta), quando a decisão é repetível (você pode testar), quando está em nova área sem expertise.</p><p><strong>Quando dados podem te enganar</strong>: quando está em mudança rápida de mercado, quando seus dados são amostra pequena, quando há incentivos para falsificar ou selecionar dados, quando dados históricos não predizem futuro.</p><p>O verdadeiro domínio é saber qual evidência é confiável em qual contexto.</p>`},
    { id: 'dod2', name: 'Pirâmide de métrica, OKRs e causa-efeito', content: `<h4>Medindo o Que Importa</h4><p>Você não pode gerenciar o que não mede. Mas você também pode morrer por medir a coisa errada.</p><p><strong>A "pirâmide de métrica"</strong> tem topo (métricas de resultado: receita, lucro, satisfação) e base (métricas de atividade: reuniões, ligações, posts). Muitas empresas otimizam a base esquecendo o topo. Um vendedor fazendo 100 chamadas por dia pode ser métrica atividade ruim se cada venda vale só R$ 10.</p><blockquote class="tip"><strong>Armadilha comum:</strong> Você mede "tempo em site" e "cliques" quando deveria medir "conversão em cliente" e "lifetime value". Otimizar métrica errada leva a resultado pior.</blockquote><p><strong>OKRs (Objectives and Key Results) é um framework</strong> onde você define objetivos qualitativos (ex: "Aumentar retenção de clientes") e key results quantitativos (ex: "Aumentar retenção de 85% para 92%"). Isso força você a conectar o que faz com o que importa.</p><p><strong>A relação entre métrica e resultado precisa ser causal, não correlação.</strong> Se aumentar "time spent on site" causa maior conversão, é causal. Se ambos aumentam porque você melhorou produto, a relação é indireta. Você precisa entender a cadeia causal.</p><blockquote class="example"><strong>Exemplo:</strong> Você nota que alta "métrica de engajamento" não prediz retenção de cliente. Investigando, descobre que clientes engajados são power users que depois encontram bugs. Você estava otimizando métrica que sinalizava problema, não solução!</blockquote><p><strong>As melhores métricas têm características:</strong> são motoras (controlável por você), são preditivas (correlacionadas com resultado), são lagging ou leading (você sabe qual medir quando).</p><p><strong>Leading metrics predizem resultado futuro</strong> (exemplo: número de qualificadas prospects para vendedor). <strong>Lagging metrics confirmam resultado passado</strong> (exemplo: vendas fechadas). Você deveria monitorar ambas.</p><p>Dedique tempo entendendo a cadeia de causalidade da sua métrica até o resultado que importa. Frequentemente encontrará que a métrica não importa tanto quanto pensava.</p>`},
    { id: 'dod3', name: 'Testes A/B e experimentos rápidos', content: `<h4>Aprendendo Rápido com Dados</h4><p>A maneira mais rápida de aprender é testar. Ao invés de debater "qual cor de botão converte mais", você testa ambas em clientes reais e vê.</p><p><strong>Teste A/B simples:</strong> você muda uma coisa, mede o resultado, compara com controle (versão original). Se conversão subir 15%, você aprendeu algo real. Se subir 1%, pode ser acaso estatístico.</p><blockquote class="tip"><strong>Cuidado:</strong> Um teste com tamanho de amostra pequeno pode te enganar. Se você testar em 10 clientes, a variação natural pode ser 50%. Você precisa de volume suficiente para detectar efeito real.</blockquote><p><strong>O poder dos testes é velocidade de aprendizado.</strong> Amazon e Google rodam milhares de testes por ano. Cada teste pequeno melhora: 0,5% de melhoria em conversão × milhões de clientes = bilhões em receita extra.</p><p><strong>Experimentos rápidos também funcionam em estratégia, não apenas produto.</strong> Você quer testar novo segmento de cliente? Ao invés de lançamento grande, teste com 5% da força de vendas. Quer testar novo canal de marketing? Teste com orçamento pequeno primeiro.</p><blockquote class="example"><strong>Exemplo:</strong> Booking.com testou remover a palavra "free" do hotel com cancelamento grátis porque parecia óbvio. Resultado: conversão subiu 5%. A palavra "free" estava cansando clientes por aparecer demais. Perderia milhões sem o teste.</blockquote><p><strong>A mentalidade de teste é poderosa porque combate viés.</strong> Você não consegue discutir com dados. Se teste mostra que sua teoria está errada, você muda. Sem teste, você pode afeiar-se à teoria por anos.</p><p><strong>Algumas questões você nunca deveria debater, deveria testar.</strong> Preço? Teste. Mensagem? Teste. Design? Teste. Isso não é adivinhação, é learning fast.</p>`},
    { id: 'dod4', name: 'Inteligência de negócios e dashboards efetivos', content: `<h4>Transformando Dados em Decisão</h4><p>Você tem bilhões de dados points. Como transforma em insight que dirija decisão?</p><p><strong>Um dashboard bom não mostra tudo, mostra o que importa.</strong> Muitos dashboards têm 50 métrica; executivos piscam e não veem nada. Um dashboard excelente tem 3-5 métricas críticas que você olha e instantaneamente sabe: está tudo bem ou algo precisa atenção?</p><blockquote class="tip"><strong>Regra de ouro:</strong> Se você não consegue explicar por que uma métrica está no dashboard em 10 segundos, ela não deveria estar.</blockquote><p><strong>O dashboard deveria ser preditivo, não apenas descritivo.</strong> Ao invés de "Receita foi R$ 1M este mês", deveria ser "Receita está 5% abaixo de previsão; fator de preocupação é pipeline fraco em Q2".</p><p><strong>Inteligência de negócios vai além de números.</strong> Você deveria contextualize: por que aquele número subiu? O que mudou? Qual é o padrão? Correlacione com eventos externos.</p><blockquote class="example"><strong>Exemplo:</strong> Você vê churn subir 2%. Sem investigação, pode levar a decisão errada. Com investigação, descobrir que 1 cliente grande saiu (operação, não padrão). Sem contexto, você muda strategy; com contexto, você executa seu plano.</blockquote><p><strong>Os melhores dashboards vêm com narrativa.</strong> Não apenas números, mas a história que contam. "Aqui está o que planejávamos, aqui está o que conseguimos, aqui está por que a diferença existe, aqui está a ação que proponho."</p><p><strong>Dados devem dirigir decisão, não justificá-la.</strong> Se você já decidiu algo e usa dados para convencer outros, você está cometendo manipulação estatística. Dados devem vir antes da decisão, não depois.</p><p>A diferença entre executivo bom e excelente é frequentemente como eles consomem dados. O excelente reconhece quando dados são confiáveis, quando questionar, quando combinar com intuição, quando testar ao invés de debater.</p>`}
  ],

{
  id: 4, name: 'Tomada de Decisão em Grupo', free: false,
  topics: [
    { id: 'tdg1', name: 'Pensamento de grupo e dinâmica de poder', content: `<h4>Quando Todos Concordam, Cuidado</h4><p>Uma das mais perigosas situações em uma organização é quando todo mundo concorda com o chefe. Isso não significa que a decisão é boa; significa que alguém com poder não está criando espaço psicológico para discordar.</p><p><strong>Pensamento de grupo é um fenômeno psicológico</strong> onde o desejo de harmonia substitui avaliação realista de alternativas. O grupo desenvolve ilusão de unanimidade, presume que dissidentes não são leais, e ignora avisos externos.</p><blockquote class="tip"><strong>Exemplos históricos:</strong> A invasão da Baía dos Porcos (Kennedy), o disaster da Challenger (NASA), a crise de 2008 (Wall Street). Nos três casos, havia pessoas no grupo que viam o problema mas silenciaram por pressão do consenso.</blockquote><p><strong>Dinâmica de poder distorce decisão de grupo.</strong> Se o CEO tem opinião forte, subordinados frequentemente alinham-se mesmo que discordem. Se uma personalidade dominante fala primeiro, molda a discussão. Se há hierarquia clara, vozes junior ficam quietas.</p><p><strong>Como combater isso?</strong> Estrutura psicológica segura é essencial. Você precisa que as pessoas sintam que é seguro discordar. Isso significa: recompensar quem apresenta más notícias (ao invés de matá-los), explicitamente chamar por opinião minoritária, ter regra que alguém deve sempre argumento contra.</p><blockquote class="example"><strong>Exemplo de boa prática:</strong> Satya Nadella, CEO da Microsoft, instituiu prática onde em reuniões importantes, alguém tem role de "advogada do diabo" - seu job é questionar a decisão proposta. Isso combate pensamento de grupo estruturalmente.</blockquote><p><strong>O silêncio nem sempre significa concordância.</strong> Pode significar medo, desengajamento ou falta de confiança de que será ouvido. Um bom líder não confunde falta de crítica com concordância.</p><p><strong>Diverse teams fazem melhores decisões</strong> porque diferenças cognitivas (não apenas demográficas) trazem perspectivas diferentes. Mas diversidade só funciona se houver segurança psicológica. Se as pessoas não se sentem seguras, diferenças causam tensão ao invés de criatividade.</p>`},
    { id: 'tdg2', name: 'Estruturas para decisão coletiva eficaz', content: `<h4>Processos Que Funcionam</h4><p>Você pode ter pessoas inteligentes e ainda fazer má decisão em grupo se o processo for ruim. O processo importa tanto quanto as pessoas.</p><p><strong>O método Delphi</strong> foi desenvolvido para aproveitar julgamento de grupo enquanto minimiza vieses. Você recolhe estimativas de especialistas anonimamente, compartilha resultados, e pede para revisarem. Iterações levam a convergência robusta. É mais lento, mas muito mais preciso que votação ou discussão aberta.</p><blockquote class="tip"><strong>Quando usar:</strong> Previsão, estimativa de cenários, priorização. Não para decisões rápidas, mas para decisões importantes onde você pode dedicar tempo.</blockquote><p><strong>O modelo de "decisor, influenciadores, afetados".</strong> Você identifica claramente: quem decide (1 pessoa, evita ambiguidade)? Quem influencia? Quem é afetado? Alguns modelos RACI formalizam isso. Claridade reduz política.</p><p><strong>Brainstorming estruturado é melhor que caótico.</strong> Brainstorming tradicional frequentemente é dominado por vozes fortes. Brainstorm silencioso (cada um escreve ideias isoladamente) gera 30-40% mais ideias. Depois você discute coletivamente.</p><blockquote class="example"><strong>Exemplo:</strong> IDEO, empresa de design famosa, usa brainstorm estruturado: silenciosa geração, depois discussão com regra "não crítica prematura" (você discute ideias, não as mata ainda). Resultado é mistura de criatividade radical e pragmatismo.</blockquote><p><strong>Pré-decisão e pós-decisão são diferentes.</strong> Pré-decisão: todos têm voz, desacordo é encorajado. Pós-decisão: todos se alinham mesmo que discordassem. Muitas equipes confundem: continuam debatendo após decisão ser tomada, criando política contínua.</p><p><strong>Separar geração de alternativas de avaliação é poderoso.</strong> Quando você gera ideias, não as avalia. Quando avalia, todas as ideias estão na mesa. Isso reduz viés de conformidade: você é criativo na fase um sem medo de julgamento imediato.</p>`},
    { id: 'tdg3', name: 'Resolução de conflito e decisão deadlock', content: `<h4>Quando o Grupo Não Consegue Concordar</h4><p>Às vezes, apesar de boa estrutura, o grupo fica preso. Diferentes perspectivas não convergem. Como você procede?</p><p><strong>Entender o tipo de conflito ajuda.</strong> Conflito de fato (discordam sobre dados) é diferente de conflito de valor (discordam sobre prioridades). Conflito de processo (como decidir) é diferente de conflito de solução (qual escolher).</p><blockquote class="tip"><strong>Estratégia:</strong> Conflito de fato: colete mais dados. Conflito de valor: reconheça tradeoffs e escolha explicitamente. Conflito de processo: mude o processo. Conflito de solução: teste rapidamente.</blockquote><p><strong>O principio "disagree and commit" é poderoso.</strong> Você permite discussão vigorosa até a decisão. Depois, todos se comprometem à implementação mesmo que discordassem. Isso evita a síndrome de "eu avisei" se falhar.</p><p><strong>Quando há deadlock, às vezes a resposta é pequeno teste.</strong> Ao invés de debater "devemos usar estratégia A ou B?", teste B com 20% de operação por 2 meses. A evidência resolve debates teóricos.</p><blockquote class="example"><strong>Exemplo:</strong> Jeff Bezos e equipe discordavam sobre Fire Phone. Bezos quis investir pesado; muitos discordavam. Ao invés de nenhum ou tudo, lançaram limita escala, observaram resultado, e descontinuaram quando ficou claro que não era o caminho.</blockquote><p><strong>Você também pode optar por "disagree but move on".</strong> Você reconhece que há legítimo desacordo sem resolução conclusiva. Designa um person responsável, ele faz julgamento final, e o grupo se alinha. Isso evita que indecisão paralise.</p><p><strong>Hierarquia pode ser útil se usada bem:</strong> não para calar dissidentes, mas para quebrar deadlock quando discussão adicional não adiciona valor. O hierarca deveria ouvir cuidadosamente, reconhecer perspectivas minoritárias, depois decidir transparentemente.</p><p>O objetivo não é consenso sempre, é boa decisão rápida com alinhamento suficiente para implementação bem-sucedida.</p>`},
    { id: 'tdg4', name: 'Implementação e accountability após decisão', content: `<h4>Do Acordo à Ação</h4><p>Muitas decisões excelentes fracassam na implementação. Você finalizou a reunião com alinhamento, mas 3 semanas depois, ninguém sabe o que foi acordado ou que tem responsabilidade.</p><p><strong>Claridade radical ajuda:</strong> escreva explicitamente: qual é a decisão? Quem é responsável por cada parte? Qual é o timeline? Como medimos sucesso? Qual é o escalation se algo der errado?</p><blockquote class="tip"><strong>Documento de decisão:</strong> Você deveria ter artefato que permaneça após reunião. Não precisa ser longo, mas deveria responder: o quê? Por quê? Quem? Quando? Como medimos? Isso elimina reinterpretação após o fato.</blockquote><p><strong>Accountability is underestimated.</strong> Você precisa de pessoa claramente responsável (não comitê) para cada decisão major. Essa pessoa não necessariamente faz o trabalho, mas garante que alguém faz e que sucede.</p><p><strong>Follow-up é crítico.</strong> Muitas organizações nunca revisitam decisão. Você deveria rever: foi implementada? Qual foi o resultado? Aprendemos algo que muda nossa próxima decisão similar? Essa reflexão virou aprendizado organizacional.</p><blockquote class="example"><strong>Exemplo:</strong> Google tem prática de "post-mortem" de grandes projetos: não para punição, mas para aprendizado. O que planejamos? O que aconteceu? Por que diferiu? O que aprendemos? Isso gira decisão individual em conhecimento coletivo.</blockquote><p><strong>Você também deveria permitir curso de correção.</strong> Não toda decisão pode ser revisada, mas decisões grandes com muito tempo antes do ponto de não retorno deveria ter checkpoints. "Estamos em dia 30 de 90. Está indo como prevemos? Se não, ajustamos ou paramos?"</p><p><strong>A cultura importa.</strong> Se falhar em implementação é castigado, as pessoas vão prometer pouco e entregar garantido. Se falha é oportunidade de aprender, as pessoas vão se comprometer com metas maiores.</p><p>Grande decisão requer grande implementação. O processo de decisão importa, mas o de implementação importa mais.</p>`}
  ],
  flashcards: [
    { q: 'O que é pensamento de grupo?', a: 'Fenômeno onde desejo de harmonia substitui avaliação realista; grupo desenvolve ilusão de unanimidade.' },

    { q: 'Como você identifica se uma equipe tem pensamento de grupo?', opts: ['Todo mundo contribui nas reuniões', 'Havia dissidentes mas silenciaram por medo', 'Decisão foi rápida', 'Havia conflito no início'], correct: 1 },

    { q: 'Por que segurança psicológica é crítica para decisão de grupo?', opts: ['Deixa discussão mais longa', 'Permite pessoas contribuir perspectivas diferentes sem medo de represálias', 'Garante consenso', 'Acelera implementação'], correct: 1 }
  ],
  summary: { title: 'Resumo do Módulo 5', points: ['Pensamento de grupo e dinâmica de poder distorcem decisão; segurança psicológica permite dissidência legítima e perspectivas minoritárias.', 'Processos estruturados (método Delphi, brainstorm silencioso, modelo RACI) geram melhores decisão que discussão aberta não estruturada.', 'Conflitos de tipo diferente (fato, valor, processo, solução) requerem estratégias diferentes; testes rápidos frequentemente resolvem deadlocks melhor que debate.', 'Implementação é mais crítica que decisão; claridade radical, accountability singular, e follow-up transformam acordo em resultado.'] },

{
  id: 5, name: 'Tomada de Decisão em Crise', free: false,
  topics: [
    { id: 'tdc1', name: 'Reconhecendo sinais de crise e decisão em alta pressão', content: `<h4>Quando Tudo Muda Rápido</h4><p>Você não quer estar em crise, mas quando estiver, sua capacidade de decidir rápido com informação incompleta é a diferença entre sobrevivência e desastre.</p><p><strong>Crises têm fases.</strong> Pré-crise: sinais fracos que algo pode acontecer. Crise aguda: o evento. Pós-crise: recoveria e aprendizado. Sua abordagem deve ser diferente em cada fase.</p><blockquote class="tip"><strong>Ponto crítico:</strong> A maioria dos executivos falha em pré-crise porque ignoram sinais fracos. Uma crise "inesperada" frequentemente teve sinais que foram ignorados.</blockquote><p><strong>Sinais fracos são pistas que algo está mudando.</strong> Aumento pequeno em reclamações. Saída de talento chave. Mudança na legislação. Compe entrador novo. Individualmente, cada sinal é ignorável. Coletivamente, predizem mudança maior.</p><p><strong>Reconhecer que você está em crise é decisão crítica.</strong> Algumas organizações demoram a reconhecer porque negam a realidade (viés de otimismo). Outras reconhecem rapidinho mas entram em pânico. Você precisa de equilíbrio: reconhecer cedo, manter calma.</p><blockquote class="example"><strong>Exemplo:</strong> A Kodak viu a câmera digital vindo mas negou por anos porque "filme é superior". Competitors viram o mesmo sinal mas reconheceram a crise de modelo de negócio. Decisão correta só vem se você primeiro reconhecer corretamente o problema.</blockquote><p><strong>Em crise aguda, a velocidade importa mais que perfeição.</strong> Você não tem tempo de analise perfeita. Você precisa de "boa o suficiente rápido". Perfeccionismo é paralisia em crise.</p><p><strong>Medo e adrenalina mudam como você pensa.</strong> Seu cérebro entra em modo "luta ou fuga". Você processa menos contexto, toma atalhos maiores, confia mais em intuição. Isso é útil (reação rápida) e perigoso (erros precipitados). Você precisa de processos que compensam.</p><p>O treinamento e simulações pré-crise são investimento no como você decide durante crise. Pilotos praticam emergências no simulator exatamente porque não podem aprender durante real.</p>`},
    { id: 'tdc2', name: 'Gerenciamento de comunicação e confiança em crise', content: `<h4>O Que Você Comunica Importa Demais</h4><p>Em crise, comunicação é arma de dois gumes. Silêncio causa rumores piores. Comunicação descuidada causa pânico. Você precisa de verdade + clareza + esperança.</p><p><strong>Verdade é não negociável.</strong> Se você mente em crise, e a verdade emerge depois (e sempre emerge), você perdeu confiança permanentemente. Melhor é ser honesto sobre quanto você não sabe.</p><blockquote class="tip"><strong>Linguagem sugerida:</strong> "Aqui está o que sabemos agora. Aqui está o que estamos investigando. Aqui está quando você terá resposta." Não é perfeita, mas é honesta.</blockquote><p><strong>Frequência de comunicação importa.</strong> Você precisa comunicar regularmente mesmo que não tenha notícia nova. Silêncio de 5 dias deixa pessoas inventando piores cenários. Comunicação diária de "ainda investigando" é melhor.</p><p><strong>Diferentes públicos precisam de mensagens diferentes.</strong> Clientes querem saber: meu serviço continua funcionando? Funcionários querem saber: meu emprego é seguro? Investidores querem saber: a empresa vai sobreviver? Você precisa de narrativa para cada.</p><blockquote class="example"><strong>Exemplo:</strong> United Airlines crises em 2017 quando removeu passageiro violentamente. CEO respondeu defensivamente ("passgajero não cooperou"). Percepção: empresa não se importa. Confiança caiu. Se tivesse dito "isso foi inaceitável, vamos mudar processo para nunca acontecer", narrativa era diferente.</blockquote><p><strong>Transparência aumenta confiança mesmo em más notícias.</strong> "Vamos despedir 10% da força de trabalho" é pior notícia, mas se você é claro sobre por quê e como, você mantém mais confiança que se esconder.</p><p><strong>Você também precisa gerenciar sua própria emoção.</strong> Sua equipe olha para você em crise. Se você está em pânico, eles entram em pânico. Se você está calmo mas engajado, eles se acalmam. Projetar confiança que você pode navegar incerteza é metade da liderança em crise.</p><p>A verdade + frequência + clareza + aceitação de incerteza = confiança mantida em crise.</p>`},
    { id: 'tdc3', name: 'Priorização sob escassez extrema', content: `<h4>Quando Você Não Consegue Fazer Tudo</h4><p>Crise frequentemente reduz seus recursos drasticamente. Você não pode fazer todas as coisas que fazia. Como você prioriza o que importa?</p><p><strong>A regra dos "vitais poucos versus triviais muitos" é mais poderosa em crise.</strong> Você tem talvez 80% de limite mental. O que é essencial para sobrevivência? Qual é o mínimo viável para manter negócio funcionando?</p><blockquote class="tip"><strong>Estrutura de priorização:</strong> Nivel 1 (faça): essencial para sobrevivência imediata. Nivel 2 (planeje): importante para recuperação, mas não agora. Nivel 3 (pospropna): tudo mais.</strongquote><p><strong>Você também precisa identificar "single points of failure".</strong> Existem atividades que se falhem, toda a organização colapsa? Essas devem ser Nível 1. Atividades que prejudicam mas não destroem? Nível 2 ou pospõem.</p><p><strong>Às vezes, você precisa decidir o que morrer.</strong> Se você está racionando recursos, algo vai sofrer. Melhor fazer essa escolha conscientemente que deixar acaso. "Vamos paralisaremos novos projetos" é decisão consciente. Deixar projetos morrerem de inanição é mau gerenciamento.</p><blockquote class="example"><strong>Exemplo:</strong> Durante COVID-19, muitos restaurantes conseguiram sobreviver porque rapidamente repriorizam: cozinha = Nível 1, ambience = pospõem. Takeout ficou modelo viável. Quem tentou manter tudo morreu.</blockquote><p><strong>Você deveria comunicar essa priorização.</strong> Isso reduz fricção: toda pessoa sabe que novos projetos não acontecem agora e é por quê. Sem clareza, todo time acha que sua coisa é exceção.</p><p><strong>Review regularmente, não assuma estático.</strong> Enquanto crise evolui, prioridades mudam. O que era Nível 1 semana 1 talvez seja Nível 2 semana 3. Você deveria revisar 2x por semana em crise aguda.</p><p>Priorização consciente sob escassez extrema evita paralisia e colapse total.</p>`},
    { id: 'tdc4', name: 'Decidir quando parar, pivotar ou perseverar', content: `<h4>O Maior Dilema em Crise</h4><p>Você coloca recursos em algo. Depois crise acontece. Você continua investindo esperando recuperação? Muda de direção? Admite que fracassou?</p><p><strong>O "custo afundado" é armadilha clássica.</strong> Você investiu R$ 10M em projeto. Crise torna projeto questionável. Você pensa: "Já investi demais, preciso continuar para recuperar." Isso é irracional. O dinheiro passado não afeta a decisão futura. A decisão correta é baseada em: esse projeto ainda vale futuro investimento?</p><blockquote class="tip"><strong>Regra de decisão:</strong> Ignore custo passado. Pergunte: se eu não tivesse investido nada, eu começaria esse projeto AGORA com meu dinheiro presente? Se resposta é não, deveria parar.</blockquote><p><strong>Pivotar é diferente de falhar.</strong> Falhar é quando você aceita derrota e move para outra coisa. Pivotar é quando você reconhece que direção original não funciona, mas o problema que estava tentando resolver ainda existe - você tenta rota diferente.</p><p><strong>Exemplos de grandes pivots durante crise:</strong> Instagram pivot de check-in para fotos. Slack pivot de ferramenta interna para produto. Zoom pivot de diferentes tecnologias de conferência até encontrar combinação que funcionava. Eles não falharam, eles aprenderam e mudaram rota.</p><blockquote class="example"><strong>Exemplo crise real:</strong> Durante COVID, muitos eventos presenciais pivotaram para online. Não falharam; reconheceram realidade e adaptaram. Alguns conseguiram sucesso maior online.</blockquote><p><strong>Como você decide entre os três?</strong> Você precisa de evidência clara. Se dados mostram que perseverar não funciona, pare ou pivote. Se dados mostram que é problema temporário mas fundamentals são sólidos, persevere. Se reconhece que problema é estrutural, pivote.</p><p><strong>Você também precisa de horizonte temporal diferente.</strong> Algumas decisões de crise são boas por 2 semanas. Depois você revisita. Você não mancomunha-se a 6 meses de decisão feita em crise.</p><p>Em crise aguda: viva por 2 semanas de cada vez. Sobreviva agora, adapte depois, recupere quando possível.</p>`}
  ],
  flashcards: [
    { q: 'Qual é a diferença entre as fases de crise: pré, aguda e pós?', a: 'Pré: sinais fracos. Aguda: o evento. Pós: recuperação e aprendizado.' },
    { q: 'O que são sinais fracos?', a: 'Pistas individuais ignoráveis que, coletivamente, predizem mudança maior.' },
    { q: 'Em crise aguda, qual é prioridade: perfeição ou velocidade?', a: 'Velocidade. "Boa o suficiente rápido" é melhor que perfeito mas atrasado.' },

    { q: 'Como frequência de comunicação afeta confiança em crise?', a: 'Silêncio de 5 dias deixa pessoas inventando piores cenários; comunicação diária de "ainda investigando" é melhor.' },
    { q: 'O que é custo afundado?', a: 'Dinheiro investido no passado; não deveria afetar decisão futura sobre continuar.' },

  summary: { title: 'Resumo do Módulo 6', points: ['Crises têm fases (pré, aguda, pós); reconhecer sinais fracos cedo e manter calma sob pressão são críticos para navegação bem-sucedida.', 'Verdade + frequência + clareza em comunicação mantém confiança em crise; diferentes públicos precisam de mensagens diferentes.', 'Sob escassez extrema, priorize conscientemente o que faz (Nível 1) versus pospõe (Nível 3); isso reduz fricção e paralisia.', 'Ignore custos afundados ao decidir perseverar, pivotar ou parar; use horizonte de 2 semanas em crise aguda; pivô é aprendizado, não fracasso.'] },

{
  id: 6, name: 'Construindo Cultura de Decisão Ótima', free: false,
  topics: [
    { id: 'cdo1', name: 'Sistema de valores e tomada de decisão distribuída', content: `<h4>Quando Nem Todos Estão em Uma Sala</h4><p>A maioria das decisões em uma organização grande não são feitas por executivos sênior. São feitas por gerentes, especialistas, e até individual contributors. Como você garante que todas essas decisões alinham com visão?</p><p><strong>Um sistema de valores claro é bússola.</strong> Se todo mundo entende os valores fundamentais (qualidade, honestidade, inovação), eles conseguem decidir bem mesmo sem sua aprovação. Valores substituem regras infinitas.</p><blockquote class="tip"><strong>Exemplo:</strong> Google tem valor "Don't be evil" que parece vago, mas dá orientação clara em decisões. Netflix tem valor "freedom and responsibility" que explica toda sua cultura. Amazon tem "Customer obsession" que governa todas as decisões.</blockquote><p><strong>Mas valores precisam de exemplos concretos.</strong> Valor abstrato "integridade" é útil até menos que não estiver claro o que significa em seu contexto. Você precisa de histórias: "Nós recusamos R$ 10M em contrato porque cliente pedia algo que contradiz nosso valor X."</p><p><strong>Transparência de decisão construir confiança.</strong> Quando as pessoas entendem por que algo foi decidido, conseguem aceitar mesmo discordando. Mistério causa ressentimento.</p><blockquote class="example"><strong>Prática:</strong> Compartilhe documento de decisão (o que, por quê, quem, quando) não apenas com envolvidos diretos, mas com toda organização. Responda perguntas publicamente.</blockquote><p><strong>Você também precisa aceitar que nem toda decisão será perfeita.</strong> Decidir distribuído significa aceitação de erros. O tradeoff é: mais erros de indivíduos, mas ganho em velocidade e engajamento. Você precisa que cultura tolere erros de boa fé.</p><p>Uma organização que distribui decisão bem consegue escalar enquanto mantém coesão. Uma que centraliza tudo fica paralizada conforme cresce.</p>`},
    { id: 'cdo2', name: 'Aprendizado contínuo de decisões passadas', content: `<h4>Tornando Decisão em Conhecimento</h4><p>Você faz mil decisões. Quantas dessas geram aprendizado que afeta próximas decisões? Provavelmente não é metade.</p><p><strong>Retrospectivas e post-mortems são ferramentas poderosas.</strong> Você reúne, revisita: o que planejávamos, o que aconteceu, por que diferiu, o que aprendemos? Mas precisa fazer bem.</p><blockquote class="tip"><strong>Erro comum:</strong> Post-mortem que busca culpa transforma em sessão de blamestorm. Post-mortem que busca aprendizado transforma em insight. Você precisa de cultura onde "erro honesto" é aprendizado, não fracasso.</blockquote><p><strong>Você também deveria documentar decisão porque foi feita e qual foi resultado.</strong> "Decidimos X porque acreditávamos que Y. Resultado foi Z. Assim aprendemos..." Isso cria biblioteca de conhecimento.</p><p><strong>O desafio é que conhecimento fica preso em cabeças.</strong> Bob sabe como resolver X problema porque viveu em 3 organizações e viu padrão. Se Bob sair, conhecimento sai. Você precisa de sistema para exteriorizar conhecimento.</p><blockquote class="example"><strong>Exemplo:</strong> A McKinsey (firma de consultoria) teve enorme vantagem porque criou sistema de capturar conhecimento de projetos em base dados. Qualquer consultor pode pesquisar "como fizemos isso em indústria X" e encontra. Isso acelerou qualidade de todas as decisões.</blockquote><p><strong>Você deveria também ter "antes e depois" de decisão.</strong> "Achávamos X antes de decisão. Agora achamos Y. Aqui está a evidência que mudou nossa mente." Isso reconhece crescimento e modifica comportamento futuro.</p><p><strong>A melhor organizações têm "decisão debt" em seu mapa mental.</strong> Assim como technical debt, você tem decisões que foram feitas com informação incompleta e agora acumulavam efeitos negativos. Você precisa regularmente limpar isso.</p><p>Aprendizado contínuo torna decisões futuras cada vez melhores.</p>`},
    { id: 'cdo3', name: 'Desenvolvendo tomadores de decisão em todos os níveis', content: `<h4>Construindo Expertise em Decisão</h4><p>Você pode ter o melhor processo, mas se suas pessoas não conseguem pensar criticamente, a qualidade não melhora. Como você desenvolve decisores?</p><p><strong>Mentoria é forma mais poderosa.</strong> Um senior executive que dedica tempo explicando seu raciocínio ("Nós consideramos A e B, mas escolhemos B porque X") cria aprendizado experiencial que nenhum course pode substituir.</p><blockquote class="tip"><strong>Prática:</strong> O melhor mentores não dizem "faça isso". Eles dizem "qual seria sua decisão?" e depois explorem o raciocínio. Fazem perguntas que forçam pensamento mais profundo.</blockquote><p><strong>Exposição a decisões de complexidade crescente é importante.</strong> Você não coloca junior em decisão de R$ 100M imediatamente. Você o coloca em decisão de R$ 1M, depois R$ 5M, depois maior. Cada um adiciona perspectiva.</p><p><strong>Você também deveria ensinar frameworks explicitamente.</strong> Seu mentee deveria sair conhecendo: como você estrutura decisão? Quais perguntas você faz? Quais ferramentas você usa? Como você combate vieses?</p><blockquote class="example"><strong>Exemplo:</strong> Satya Nadella (CEO Microsoft) dedica tempo desenvolvendo líderes. Ele não apenas decide; ele explica seu pensamento. A Microsoft tem muitos potenciais próximos líderes porque Nadella investe em desenvolvimento.</blockquote><p><strong>Você também deveria criar oportunidade de "decisão segura".</strong> Contexto onde erro não é desastre mas é aprendimento. Simulations, low-stakes decisions, post-mortems onde falha é esperado.</p><p><strong>Finalmente, você deveria valorizar explicitamente boa decisão.</strong> Se você promove pessoas por resultados sem questionar qualidade da decisão, você incentiva sorte, não sabedoria. Se promove pessoas que tomam boas decisões mesmo que resultado foi ruim (à causa externa), você incentiva pensamento crítico.</p><p>Cultura onde decisão é desenvolvida e valorizada cresce tomadores de decisão em todos os níveis.</p>`},
    { id: 'cdo4', name: 'Otimizando velocidade versus qualidade na decisão', content: `<h4>O Dilema: Rápido ou Certo?</h4><p>Você quer rápido E certo. Você raramente consegue ambos. Como navega esse tradeoff?</p><p><strong>Velocidade não importa para todas as decisões.</strong> Decisões reversíveis podem ser rápidas; você erra, aprende, muda. Decisões irreversíveis precisam de mais tempo. Você não deveria gastar 6 meses em decisão reversível.</p><blockquote class="tip"><strong>Classificação:</strong> One-way door: reversível com custo baixo. Two-way door: reversível com custo significativo. One-way door (irreversível): não deveria apressar. Amazona usa esse framework explicitamente.</blockquote><p><strong>Você também deveria reconhecer que demora não garante qualidade.</strong> Mais análise adicionará insights até um ponto. Depois retorna diminuindo porque você está reanalisando mesma coisa. O ponto ótimo é antes desse ponto de diminuição.</p><p><strong>Processos paralelos ajudam.</strong> Ao invés de "decidir e depois implementar", você pode "decidir enquanto prepara implementação". Isso economiza tempo sem sacrificar qualidade.</p><blockquote class="example"><strong>Exemplo:</strong> Uma empresa pode estar decidindo qual software implementar enquanto o team aprende software, prepara infraestrutura. Quando decisão é final, implementação pode começar imediatamente.</blockquote><p><strong>Você também deveria aceitar "good enough" com margem de segurança.</strong> Você não precisa do modelo de simulação mais preciso. Você precisa de modelo que é bom o suficiente e deixa margem para incerteza que você não capturou.</p><p><strong>Finalmente, primeira decisão não é última.</strong> Você pode decidir "tentaremos isso por 3 meses, depois revisitaremos". Isso combina velocidade (decide rápido) com qualidade (pode revisar). A decisão não é enraizada em cemento.</p><p>Maturidade é saber qual decisão requer qual velocidade e não sacrificar mais que necessário.</p>`}
  ],
  flashcards: [
    { q: 'Como um sistema de valores claro impacta decisão distribuída?', a: 'Substitui regras infinitas; pessoas conseguem decidir bem sem aprovação se entendem valores fundamentais.' },
    { q: 'Por que exemplos concretos de valores são importantes?', a: 'Porque valores abstratos são vagos; exemplos ("recusamos R$ 10M porque contradiz valor X") dão orientação clara.' },
    { q: 'O que é principal benefit de compartilhar documentos de decisão publicamente?', a: 'Quando pessoas entendem por quê, conseguem aceitar mesmo discordando; mistério causa ressentimento.' },
    { q: 'Qual é a diferença entre blamestorm e post-mortem bem-feito?', a: 'Blamestorm busca culpa; post-mortem busca aprendizado. Cultura de "erro honesto como aprendizado" é necessária.' },
    { q: 'Por que conhecimento de decisão fica preso em cabeças?', a: 'Porque não é externalizado; quando pessoa sai, aprendizado sai.' },
    { q: 'Como é "before and after" de decisão útil?', a: 'Reconhece crescimento e modifica comportamento futuro; mostra como evidência mudou opinião.' },
    { q: 'Qual é a ferramenta mais poderosa para desenvolver decisores?', a: 'Mentoria; um senior explicando raciocínio cria aprendizado experiencial que courses não conseguem.' },
    { q: 'Como você desenvolve tomadores de decisão sem sobrecarregá-los?', a: 'Exposição a decisões de complexidade crescente; R$ 1M, depois R$ 5M, depois maior.' },
    { q: 'Qual é diferença entre one-way door e two-way door de decisão?', a: 'One-way: irreversível ou custo alto. Two-way: reversível com custo baixo. Velocidade apropriada é diferente.' },
    { q: 'Por que mais análise nem sempre melhora qualidade de decisão?', a: 'Porque há ponto de diminuição de retorno; depois disso você está reanalisando mesma coisa.' },
    { q: 'Como processos paralelos economizam tempo em decisão?', a: 'Você prepara implementação enquanto decide, ao invés de sequencial, economiza tempo sem sacrificar qualidade.' },
    { q: 'Por que "primeira decisão não é última" é importante?', a: 'Combina velocidade (decide rápido) com qualidade (pode revisar); decisão não é enraizada em cemento.' }
  ],
  quizzes: [
    { q: 'Como você garante que individual contributors tomam boas decisões sem aprovação central?', opts: ['Regras detalhadas', 'Sistema de valores claro com exemplos concretos', 'Gerentes verificam cada decisão', 'Decisão centralizada'], correct: 1 },
    { q: 'Você está entre um mentor que diz "faça isso" versus um que pergunta "qual seria sua decisão?" qual aprender mais?', opts: ['Primeiro porque é rápido', 'Segundo porque força pensamento crítico', 'Ambos igualmente', 'Depende do contexto'], correct: 1 },
    { q: 'Para decisão reversível (low stakes), qual é tempo apropriado?', opts: ['Rápido, mesmo que menos análise', 'Meticuloso, mesmo que lento', 'Depende do custo', 'Nunca deveria ser reversível'], correct: 0 }
  ],
  summary: { title: 'Resumo do Módulo 7', points: ['Um sistema de valores claro com exemplos concretos substitui regras infinitas e permite decisão distribuída em todos os níveis da organização.', 'Post-mortems, documentação de decisão e "antes/depois" transformam decisões individuais em conhecimento organizacional; isso acelera qualidade de futuras decisões.', 'Mentoria ao vivo, exposição a complexidade crescente e cultura que valoriza boa decisão (mesmo com resultado negativo) desenvolvem decisores em todos os níveis.', 'Reversível vs. irreversível, análise até ponto ótimo, processos paralelos e "primeira decisão não é última" balanceiam velocidade e qualidade apropriadamente.'] },
    quizFinal: [
      {q:'O que é tomada de decisão estratégica?',opts:["Decidir no impulso", "Processo estruturado de escolha alinhado a objetivos de longo prazo", "Seguir sempre a intuição", "Copiar concorrentes diretamente"],correct:1},
