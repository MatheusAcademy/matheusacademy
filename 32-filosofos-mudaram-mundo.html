      <p>René Descartes (1596-1650) nasceu na França durante período de transição intelectual entre Renascimento e Ilustração. Recebeu educação jesuíta excelente, que enfatizava lógica e scholasticism medieval. No entanto, durante seus estudos, Descartes ficou insatisfeito: percebeu que muito do que era ensinado era baseado em autoridade de antigos filósofos, e quando diferentes autoridades discordavam, não havia método para determinar quem estava certo.</p>

      <p>Mas para Descartes, importância da matemática era epistemológica, não apenas técnica. Matemática era modelo de conhecimento certo. Em matemática, começamos com axiomas simples que são evidentes por si e derivamos conclusões através de razão pura. Descartes visualizava filosofia poderia seguir mesmo modelo: começar com verdades evidentes (como "Penso, logo existo") e construir sistema de conhecimento através de razão dedutiva.</p>

      <h3>O Filósofo da Liberdade Política</h3>

      <h4>Direitos Naturais e Estado de Natureza</h4>
      <p>Locke começou com pergunta: no "estado de natureza" — situação humana anterior a existência de governo — que direitos os humanos possuem? Ao contrário de Thomas Hobbes, que argumentava que estado de natureza era guerra de todos contra todos, Locke argumentava que humanos naturalmente possuem direitos: vida, liberdade, e propriedade.</p>

      <p>Esta tese — que povo pode revoltar-se contra governo injusto — era radical. Tradições anteriores de pensamento político havia estabelecido que autoridade dos governantes era absoluta e divina. Locke argumentava que governo é instrumento pelos quais povo alcança fim legítimo: proteção de direitos. Se governo falha neste fim, é quebrado contrato e revolução é justificada.</p>

      <h3>O Filósofo que Reformou Pensamento Sobre Linguagem</h3>
      <p>Ludwig Wittgenstein (1889-1951) foi filósofo austríaco-britânico que trabalhou em dois períodos intelectuais distintos, produzindo duas filosofias quase opostas. Nasceu em Viena em família aristocrática extremamente rica. Inicialmente estudou engenharia, mas foi atraído à filosofia após ler Bertrand Russell. Trabalhou com Russell em Cambridge na lógica, depois serviu como soldado em Primeira Guerra Mundial. Após guerra, tornou-se professor de escola primária na Áustria.</p>
      <p>Seu primeiro trabalho principal, "Tractatus Logico-Philosophicus", foi manuscrito revolucionário que ele completou durante Primeira Guerra Mundial. Oferecia análise lógica de linguagem como fundação para filosofia. Mas após reler seu próprio trabalho anos depois, Wittgenstein percebeu que era fundamentalmente equivocado. Retornou à filosofia na década de 1930 e gastou seus anos finais desenvolvendo filosofia completamente diferente.</p>
      <h4>Tractatus: Linguagem como Imagem da Realidade</h4>
      <p>No Tractatus, Wittgenstein argumentava que linguagem funciona mapeando realidade. Uma proposição é essencialmente imagem de possível estado de coisas. Quando digo "o gato está no tapete", estou oferecendo imagem de situação possível: gato em tal posição em relação a tapete. Esta imagem pode corresponder (verdade) ou não corresponder (falsidade) à realidade.</p>
      <p>Isto oferecia explicação de como linguagem representa realidade. Também determinava fronteiras da filosofia: coisas que não conseguem ser representadas por linguagem proposicional não podem ser ditas e devem ser silenciadas. Este incluía ética, estética, e misticismo — coisas Wittgenstein pessoalmente considerava mais importantes que ciência factual. "Whereof one cannot speak, thereof one must be silent" ("Sobre aquilo de que não se consegue falar, deve-se calar") é frase final famosa do Tractatus.</p>

      <h4>Virada Linguística: Significado Como Uso</h4>
      <p>Nos anos 1930s, Wittgenstein mudou de opinião radicalmente. Começou a ensinar em Cambridge que sua concepção anterior estava equivocada. Significado de palavra não é essência que a palavra representa (como Tractatus sugeria), nem é estrutura lógica profunda. Significado é como palavra é usada em contexto social vivo. Diferentes contextos produzem diferentes significados.</p>
      <p>Exemplo que oferecia era "jogo". Que essência todas os jogos compartilham? Xadrez, poker, futebol, brincadeira de criança "pega-pega" — Wittgenstein argumentava que não há essência única. São similares de forma que Wittgenstein chamava de "semelhança de família". Eles compartilham sobreposição de características, mas nenhuma característica é comum a todos. O significado de "jogo" é definido pelos usos diferentes em contextos diferentes, não por essência.</p>

      <h4>Jogos de Linguagem e Formas de Vida</h4>
      <p>Conceito central de filosofia posterior de Wittgenstein é "jogo de linguagem". Diferentes contextos — pregar, contar histórias, rezar, informar, fazer piada, insultar — são diferentes "jogos de linguagem", cada um com suas próprias regras e significados. Uma palavra pode ter significado completamente diferente em um jogo vs. outro. Para compreender significado, você deve compreender jogo de linguagem específico em que palavra está sendo usada.</p>

      <h4>Vigilância e Disciplina: O Panóptico</h4>
      <p>Uma de observações mais penetrantes de Foucault é análise de disciplina moderna através de metáfora do panóptico. O panóptico é estrutura arquitetônica de prisão (proposto por Jeremy Bentham) onde guarda central pode observar todos os prisioneiros, mas prisioneiros não conseguem saber se estão sendo observados. Resultado é que prisioneiros internalizamvigilância; comportam-se bem mesmo quando ninguém está olhando porque sabem que PODEM estar sendo observados.</p>
      <p>Foucault enxergava esta dinâmica não apenas em prisões, mas em todo aparato moderno: escolas com sua vigilância de alunos, hospitais com sua observação de pacientes, fábricas com sua supervisão de trabalhadores. Gradualmente, sociedades modernas implementaram técnicas de vigilância distribuídas que criaram "docile bodies" — corpos que se controlam a si mesmos porque internalizaram vigilância.</p>
      <blockquote class="example">
        📌 A análise de Foucault do panóptico é profundamente presciente em era de câmeras de segurança, vigilância eletrônica, e coleta de dados — não foi que Foucault predisse tecnologia específica, mas percebeu lógica de controle social através de vigilância distribuída.
      </blockquote>
      <h4>Construção Social de Identidade e Sexualidade</h4>
      <p>Trabalho de Foucault sobre sexualidade e identidade é especialmente influente. Em "A História da Sexualidade", argumentava que sexualidade moderna não é verdade natural descoberta, mas construção histórica produzida através de discurso. Categorias como "heterossexual" e "homossexual" não existiram antes do século XIX. Comportamento sexual existiu sempre, mas identidades sexuais como as conhecemos hoje são produtos de discurso científico e médico do século XIX.</p>
      <p>Isto não nega realidade de atração sexual ou desejo. Mas sugere que como entendemos e categorizamos nossa sexualidade, como a incorporamos em identidade — isto é historicamente construído. Diferentes culturas em diferentes períodos categorizaram sexualidade diferentemente. A heterossexualidade não é "natural" e tudo mais "desviante"; é categoria historicamente específica produzida em contexto particular.</p>
      <p>Esta análise teve enormes implicações. Sugeriu que identidades que pareciam naturais e imutáveis eram na verdade contingentes e históricos. Se você consegue questionar como sexualidade é construída, por que não questionar construção de outras categorias identitárias — raça, gênero, classe? Trabalho de Foucault se tornou fundador para estudos de gênero, estudos queer, e análise crítica de raça.</p>
      <blockquote class="tip">
        💡 A perspectiva de Foucault que "conhecimento" é frequentemente máscara para exercício de poder, que categorias que parecem naturais são construções históricas — isto se tornou prism através do qual pensadores contemporâneos examinam instituições sociais.
      </blockquote>
