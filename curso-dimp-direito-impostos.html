{
  id:0, name: 'Sistema Tributário Brasileiro',

  cat:'Finanças & Economia', free:true,
  topics:[
    {id:'stbi', name: 'Estrutura e Classificação de Tributos', content:'<h4>Os Fundamentos do Sistema que Sustenta o Brasil</h4><p>Bem-vindo ao curso de Direito Fiscal e Tributário! Você aprenderá como impostos, taxas e contribuições funcionam no Brasil. Compreender tributação é essencial para planejar finanças e não ser explorado.</p><p>O que é tributo? É contribuição obrigatória que você paga ao governo para financiar serviços públicos (saúde, educação, estradas). Existem três tipos principais: imposto, taxa e contribuição.</p><blockquote class="tip"><strong>Dica:</strong> Tributação é complexa, mas compreendê-la ajuda a otimizar sua renda. Você pode pagar menos impostos legalmente através de planejamento.</blockquote><p><strong>Imposto:</strong> Você paga sem receber benefício direto. Exemplo: Imposto de Renda (IR), ICMS, ISS. Você paga porque é obrigatório, não porque recebeu serviço específico.</p><p><strong>Taxa:</strong> Você paga e recebe serviço direto. Exemplo: Taxa de licença, taxa de registro, taxa de inspeção. Você paga, governo oferece serviço específico.</p><p><strong>Contribuição especial:</strong> Você paga e contribui para fundo específico. Exemplo: INSS (contribuição social para aposentadoria), contribuição sindical.</p><blockquote class="example"><strong>Exemplo:</strong> Você paga IR (imposto, sem benefício direto). Você paga taxa de licença comercial (taxa, obtém licença). Você paga INSS (contribuição, para aposentadoria futura).</blockquote><p><strong>Impostos diretos vs indiretos:</strong> Direto é cobrado diretamente de você (IR, IPTU). Indireto é embutido no preço (ICMS, IPI). Você paga indireto sem perceber.</p><blockquote class="quote"><strong>Conceito fundamental:</strong> "Tributação é sistema necessário para financiar governo. Você tem direito de conhecer como funciona para planejar finanças e pagar corretamente."</strong></blockquote><p>Qual é a autoridade? União (Receita Federal) coleta IR, IPI, contribuições. Estados colhem ICMS, IPVA. Municípios cobram ISS, IPTU. Cada nível tem autoridade própria.</p>'},
    {id:'prnc', name: 'Princípios Constitucionais de Tributação', content:'<h4>Sua Proteção Contra Abuso Fiscal</h4><p>Constituição Federal estabelece princípios que protegem você contra tributação abusiva. Esses princípios limitam poder do governo de cobrar impostos arbitrariamente.</p><p><strong>Legalidade:</strong> Governo só pode cobrar imposto se lei federal estabeleça. Decreto, portaria ou "decisão" de funcionário não são suficientes. Exige lei específica.</p><blockquote class="tip"><strong>Dica:</strong> Se governo cobra imposto sem base legal, você pode processar e recuperar valores pagos irregularmente.</blockquote><p><strong>Igualdade:</strong> Pessoas em situação igual devem pagar igualmente. Governo não pode favorecer alguns cidadãos com benefícios fiscais arbitrários.</p><p><strong>Irretroatividade:</strong> Lei tributária não pode cobrar retroativamente (sobre fatos passados). Apenas prospectivamente (sobre fatos futuros). Exceção: lei mais favorável ao contribuinte pode ser aplicada retroativamente.</p><p><strong>Não-confisco:</strong> Imposto não pode ser tão alto que confisca sua propriedade. Se imposto é abusivamente alto, viola este princípio.</p><blockquote class="example"><strong>Exemplo:</strong> Lei cria "mega imposto" de 90% sobre salário. Isso violaria princípio do não-confisco. Você poderia contestar na justiça.</blockquote><p><strong>Sigilo:</strong> Seus dados fiscais são sigilosos. Receita Federal não pode divulgar sua renda, gastos ou dívidas para terceiros. Você tem proteção de privacidade.</p><p><strong>Certeza jurídica:</strong> Lei tributária deve ser clara. Governo não pode usar interpretações vagas ou ambíguas para cobrar. Se lei é ambígua, presume-se favorável a você.</p><blockquote class="quote"><strong>Proteção constitucional:</strong> "Você é protegido contra tributação arbitrária. Lei deve ser clara, igual, prospectiva, e não-confiscatória."</strong></blockquote><p>Qual é a consequência de violação? Você pode processar governo por dano moral, recuperar valores pagos irregularmente, e exigir compensação.</p>'},
    {id:'clse', name: 'Classificação de Contribuintes', content:'<h4>Quem Paga O Quê: Pessoas Físicas, Jurídicas, Empresas</h4><p>Sistema tributário classifica você como contribuinte de forma diferente conforme sua situação. Você pode ser pessoa física, MEI, microempresa, empresa normal. Cada tem tributação própria.</p><p><strong>Pessoa Física (PF):</strong> Você como indivíduo. Paga IR sobre renda anual, IPTU sobre imóveis, IPVA sobre veículos, ISS se é autônomo/profissional. Alíquotas variam conforme renda.</p><blockquote class="tip"><strong>Dica:</strong> Pessoa Física tem deduções permitidas: gastos médicos, educação filhos, contribuição INSS. Deduções reduzem sua renda tributável.</blockquote><p><strong>MEI (Microempreendedor Individual):</strong> Você trabalha por conta própria (até R$ 81 mil/ano). Contribui ao INSS de forma simplificada (~5% de salário mínimo), recebe benefícios (aposentadoria, auxílio-doença), e é isento de alguns impostos. Regime simplificado.</p><p><strong>ME (Microempresa):</strong> Empresa com até R$ 360 mil de receita/ano. Pode usar Simples Nacional (imposto simplificado, uma alíquota para vários impostos). Mais fácil que empresa grande.</p><p><strong>EPP (Empresa de Pequeno Porte):</strong> Receita de R$ 360 mil a R$ 4,8 milhões/ano. Pode usar Simples Nacional ou regime comum (IRPJ + CSLL + PIS + COFINS).</p><blockquote class="example"><strong>Exemplo:</strong> Você é autônomo (consultor) ganhando R$ 60 mil/ano. Pode ser MEI: contribui R$ 80 ao INSS/mês (simplificado), sem pagar IR adicional se renda é baixa, acesso a benefícios previdenciários.</blockquote><p><strong>Empresa normal (LTDA, SA):</strong> Receita acima de limites. Paga IRPJ (Imposto de Renda Pessoa Jurídica), CSLL (Contribuição Social), PIS (Programa de Integração Social), COFINS.</p><blockquote class="quote"><strong>Classificação estratégica:</strong> "Sua classificação tributária define carga de impostos. MEI paga menos que empresa normal. Planejamento de estrutura é essencial para otimizar tributação."</strong></blockquote><p>Como você escolhe sua categoria? Conforme receita prevista. Se autônomo ganhando pouco, MEI é vantajoso. Se empresa com receita maior, Simples Nacional ou regime comum.</p>'},
    {id:'omis', name: 'Obrigações Principais: Declarações e Pagamentos', content:'<h4>O Que Você Deve Fazer Perante Fisco</h4><p>Como contribuinte, você tem obrigações: pagar impostos em dia, manter registros, declarar informações ao governo. Cumprir obrigações evita multas e problemas.</p><p><strong>Declaração de Imposto de Renda:</strong> Anualmente (até final abril) você declara renda do ano anterior. Receita Federal cruza informações (seu banco reportou quanto entrou) com sua declaração.</p><blockquote class="tip"><strong>Dica:</strong> Declare sempre. Mesmo que isento (renda abaixo limite), fazer declaração protege você. Omissão pode resultar em multa e problemas futuros.</blockquote><p><strong>Guia de recolhimento (DARF):</strong> Você calcula imposto, preenche guia (DARF online), paga banco. Para IR, IPVA, contribuições, você usa DARF.</p><p><strong>Escrituração fiscal:</strong> Se empresa, você deve manter registro de todas operações (vendas, compras, despesas) em livros ou sistema digital. Receita Federal pode fiscalizar.</p><p><strong>Nota Fiscal:</strong> Documento que prova transação. Você deve emitir quando vende (se obrigado) ou pedir quando compra (como comprovante). NF é rastreável ao sistema de impostos.</p><blockquote class="example"><strong>Exemplo:</strong> Você vende R$ 10 mil em produtos. Emite nota fiscal. Sistema registra venda, calcula impostos (ICMS, PIS), você recolhe. Sem NF, venda pode ser vista como sonegação.</blockquote><p><strong>SPED (Sistema Público Eletrônico de Escrituração):</strong> Receita Federal acessa, eletronicamente, livros de empresas. Sem papel: digital, em tempo real. Aumenta fiscalização.</p><blockquote class="quote"><strong>Conformidade tributária:</strong> "Cumprir obrigações (declarar, pagar, registrar) é melhor que tentar esconder. Sonegação causa multa pesada, juros, e até processo penal."</strong></blockquote><p>Qual é a penalidade por omissão? Multa de 75% do imposto devido, mais juros de mora. Se sonegação é dolosa (intencional), há processo penal com possibilidade de cadeia.</p>'}

  id:1, name: 'Imposto de Renda PF', free:false,
  topics:[
    {id:'irpf', name: 'Pessoas Físicas: Alíquotas e Cálculo de IR', content:'<h4>Como Funciona o Imposto de Renda Para Você</h4><p>Imposto de Renda é imposto progressivo: quanto mais você ganha, maior alíquota paga. Você paga em faixas. Valores abaixo da faixa não pagam; acima pagam alíquota da faixa.</p><p>Qual são as alíquotas atuais (2024)? Até R$ 2.112: isento. R$ 2.112 a R$ 2.826: 7,5%. R$ 2.826 a R$ 3.751: 15%. R$ 3.751 a R$ 4.664: 22,5%. Acima R$ 4.664: 27,5%.</p><blockquote class="tip"><strong>Dica:</strong> Você paga 27,5% apenas sobre ganhos acima de R$ 4.664. Ganhos até R$ 4.664 pagam alíquotas menores. Sistema é progressivo.</blockquote><p>Como funciona o cálculo? Base de cálculo é sua renda bruta do ano, menos deduções permitidas. Deduções reduzem renda tributável. Exemplo: despesas médicas, educação filhos, contribuição INSS.</p><p><strong>Deduções permitidas:</strong> (1) Contribuição INSS (até 8% ou 11% conforme); (2) Despesas médicas/dentárias ilimitadas; (3) Educação filhos (até R$ 3.561/ano cada); (4) Pensão alimentícia; (5) Perdas em operações financeiras.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 60 mil/ano. Contribuiu R$ 4.800 INSS. Despesas médicas R$ 5.000. Base tributável: 60.000 - 4.800 - 5.000 = R$ 50.200. Sobre R$ 50.200 calcula-se IR progressivo.</blockquote><p><strong>Desconto simplificado:</strong> Você pode escolher desconto padrão (13% da renda até limite) em vez de deduções reais. Útil se despesas reais são pequenas.</p><blockquote class="quote"><strong>Progressividade:</strong> "IR é progressivo: quanto mais ganha, maior alíquota. Mas você paga alíquota menor sobre ganhos menores. Sistema busca equidade."</strong></blockquote><p>Qual é o impacto? Pessoa ganhando R$ 20 mil paga aproximadamente R$ 1.400. Pessoa ganhando R$ 100 mil paga aproximadamente R$ 19 mil. Progressão é clara.</p>'},
    {id:'fted', name: 'Fontes de Renda e Tributação de Diferentes Receitas', content:'<h4>Cada Fonte de Renda Tem Tributação Específica</h4><p>Sua renda vem de fontes diferentes: salário (trabalho), aluguel, aplicações financeiras, ganho de capital, freelance. Cada fonte tem tributação própria.</p><p><strong>Salário/rendimento do trabalho:</strong> Seu patrão desconta IR na fonte (desconto em folha). Você recebe líquido. Ao declarar, você informa salário bruto, desconto é compensado.</p><p><strong>Aluguel/renda de imóvel:</strong> Você recebe aluguel? Deve declarar. IR é 15% sobre aluguel. Você pode deduzir despesas (IPTU, consertos) da renda de aluguel.</p><blockquote class="tip"><strong>Dica:</strong> Se você aluga imóvel, deduza despesas: IPTU, condomínio, seguro, reparos. Deduções reduzem renda tributável de aluguel.</blockquote><p><strong>Ganho de capital:</strong> Você vendeu imóvel com lucro? Ou ações com ganho? Isso é ganho de capital, tributado com alíquota específica (15% em imóvel; variável em ações).</p><p><strong>Investimentos/aplicações financeiras:</strong> Juros de poupança (isento), rentabilidade de ações (15%), rentabilidade de fundos (15% ou 17,5%). Você paga tributo na fonte ou declara.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem R$ 100 mil em poupança que rendeu R$ 1.000 em juros. Juros de poupança são isentos de IR. Você não paga nada. Se fosse renda fixa, pagaria 15%.</blockquote><p><strong>Freelance/autônomo:</strong> Você presta serviço como PF (não empresa). Receita é tributada como rendimento de trabalho (IR progressivo). Você deduz despesas profissionais.</p><blockquote class="quote"><strong>Múltiplas fontes:</strong> "Sua renda total é soma de todas fontes. Cada fonte tem tributação específica. Planejamento aproveita alíquotas menores para cada tipo."</strong></blockquote><p>Como você declara múltiplas rendas? Separadamente por fonte em sua declaração. Receita Federal soma e calcula IR progressivo sobre total.</p>'},
    {id:'ddc', name: 'Deduções e Abatimentos Permitidos', content:'<h4>Reduzindo Sua Renda Tributável de Forma Legal</h4><p>Deduções reduzem sua renda tributável. Quanto maior dedução, menor a base para calcular IR, logo menor imposto. Lei permite várias deduções.</p><p><strong>Contribuição INSS:</strong> Você contribui ao INSS? Deduza. Alíquota é 8% a 11% conforme seu salário. Dedução é automática se assalariado (desconto em folha), ou você declara se autônomo.</p><p><strong>Despesas médicas e dentárias:</strong> Sem limite! Médico, dentista, oftalmologista, cirurgias, medicamentos prescritos, plano de saúde. Todas são deducíveis sem teto.</p><blockquote class="tip"><strong>Dica:</strong> Guarde recibos e notas fiscais de gastos médicos. Você tem 5 anos para declara-los retroativamente, recuperando impostos.</blockquote><p><strong>Educação:</strong> Você paga escola/faculdade? Deduz até R$ 3.561 por dependente/ano. Você, cônjuge, filhos. Educação é incentivada fiscalmente.</p><p><strong>Pensão alimentícia:</strong> Você paga pensão? Deduza 100%. Lei reconhece que pensão é obrigação legal, não é renda sua disponível.</p><p><strong>Desconto simplificado:</strong> Alternativa a deduções. Você escolhe 13% de desconto padrão da renda (até R$ 19.903 de dedução em 2024) sem precisar comprovar despesas reais.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganhou R$ 80 mil. Gastos médicos: R$ 15 mil. INSS: R$ 8 mil. Total deduções reais: R$ 23 mil. Desconto simplificado: R$ 80 mil x 13% = R$ 10.400. Você escolhe deduções reais (melhor neste caso).</blockquote><p><strong>Diferenças entre deduções:</strong> Deduções reduzem renda antes de calcular alíquota. Descontos (simples ou específico) já são sobre alíquota. Deduções são mais vantajosas.</p><blockquote class="quote"><strong>Otimização fiscal:</strong> "Aproveite todas deduções permitidas. Quanto maior dedução, menor base tributável, menor IR a pagar. É legal e recomendado."</strong></blockquote><p>Como você comprova? Guarde documentos: recibos médicos, notas de escola, comprovantes INSS. Receita Federal pode pedir comprovação até 5 anos depois.</p>'},
    {id:'dep', name: 'Dependentes e Deduções Familiares', content:'<h4>Benefícios Fiscais Para Suas Responsabilidades Familiares</h4><p>Lei reconhece que você tem responsabilidades familiares. Você pode deduzir gastos com dependentes (filhos, cônjuge, pais idosos). Isso reduz imposto.</p><p><strong>Quem é dependente?</strong> Você pode listar como dependentes: filhos (até 24 anos se estudante, ou qualquer idade se inválido), cônjuge, pais/avós idosos ou inválidos, enteados, tutelados, curatelados.</p><blockquote class="tip"><strong>Dica:</strong> Você pode ter até 4 dependentes em caso normal. Cada dependente gera dedução. Verifique quem é elegível para deduzir.</blockquote><p><strong>Deduções por dependente:</strong> Educação até R$ 3.561/ano por dependente. Despesas médicas sem limite. Se dependente é incapaz, você deduz integralmente despesas de manutenção.</p><p>Como você declara dependentes? Na declaração de IR, você lista nome, CPF, relação (filho, cônjuge, pai). Você deve comprovar relação com documentos.</p><p>Qual é o limite? Você pode incluir múltiplos dependentes. Lei exige que você seja responsável economicamente pelo dependente (comprovável: pagar conta, colégio, médico).</p><blockquote class="example"><strong>Exemplo:</strong> Você tem 2 filhos em escola particular, pagando R$ 6.000/ano cada. Você deduz R$ 3.561 x 2 = R$ 7.122 de educação. Gastos médicos dos filhos também são deducíveis sem limite.</blockquote><p><strong>Pais idosos:</strong> Se você sustenta pais com mais de 65 anos, pode incluir como dependentes. Deduz educação, saúde, e outros gastos. Lei oferece proteção ao idoso dependente.</p><blockquote class="quote"><strong>Proteção familiar:</strong> "Lei reconhece responsabilidades familiares. Você deduz gastos com dependentes. Sistema tira peso fiscal de quem sustenta família."</strong></blockquote><p>Qual é a consequência de incluir falso dependente? Multa de 150% do imposto devido, mais juros. Receita Federal verifica com documentos.</p>'}
  ],

{
  id:2, name: 'Impostos Sobre Consumo', free:false,
  topics:[
    {id:'icms', name: 'ICMS: Imposto Sobre Circulação de Mercadorias', content:'<h4>O Imposto Embutido No Preço de Quase Tudo</h4><p>ICMS é imposto estadual sobre circulação de mercadorias. Você paga toda vez que compra algo (eletrônico, roupas, alimento, combustível). É embutido no preço, você não percebe pagando.</p><p>Como funciona? Empresa compra produto (paga ICMS), revende para varejista (repassa ICMS), varejista vende para você (cobra ICMS). ICMS é "por fora": ou seja, já está no preço que você paga.</p><blockquote class="tip"><strong>Dica:</strong> ICMS é maior imposto incidindo sobre você. Pode ser 7% a 18% conforme produto e estado. É invisível, embutido em preço.</blockquote><p>Qual são as alíquotas? Variam por estado (alguns 12%, outros 18%). Também variam por produto: livros/jornal (7%), eletrônicos (18%), alimentos básicos (reduzido). Lei oferece reduções para itens essenciais.</p><p><strong>ICMS incide sobre:</strong> Circulação de mercadorias (venda), prestação de serviço de transporte, prestação de serviço de comunicação.</p><p><strong>Crédito de ICMS:</strong> Se você vende (é empresa), você cobra ICMS do cliente, mas deduz ICMS que você pagou em compras. Assim, empresa paga apenas ICMS sobre "valor agregado" (lucro), não sobre tudo.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra camiseta por R$ 50 (tem R$ 9 de ICMS embutido). Você vende por R$ 100. Cobra R$ 18 de ICMS. Você remete ao estado R$ 18 - R$ 9 = R$ 9 (pagou ICMS apenas sobre margem de lucro).</blockquote><p><strong>ICMS interestadual:</strong> Se você compra de outro estado, ICMS é cobrado parcialmente. Lei oferece benefício: ICMS não é cobrado integralmente em operações interestaduais (redução progressiva).</p><blockquote class="quote"><strong>Impacto ao consumidor:</strong> "ICMS é maior imposto incidindo sobre você. Representa 10-18% do preço de produtos. Sem ICMS, preços cairiam significativamente."</strong></blockquote><p>Como você recupera ICMS? Se você é empresa, você credita ICMS de compras contra ICMS de vendas. Se você é pessoa física, não recupera: é consumidor final.</p>'},
    {id:'iss', name: 'ISS: Imposto Sobre Serviços', content:'<h4>O Imposto Sobre Profissões e Serviços Que Você Contrata</h4><p>ISS é imposto municipal sobre prestação de serviço. Quando você contrata electricista, advogado, consultor, você está pagando ISS (embutido no preço cobrado).</p><p>Como funciona? Prestador calcula valor do serviço, adiciona ISS (normalmente 2% a 5%, varia por município e tipo serviço), você recebe nota de serviço com ISS destacado.</p><blockquote class="tip"><strong>Dica:</strong> ISS é variável conforme município e tipo serviço. Advogado em São Paulo paga diferente que em outro município. Negocie já com ISS incluído.</blockquote><p><strong>Alíquotas por serviço:</strong> Serviços técnicos (engenharia) 5%, serviços de saúde (médico) 5%, serviços de educação 5%, limpeza/higiene 2%, publicidade 5%, consultoria 5%. Varia muito.</p><p><strong>Incidência de ISS:</strong> ISS incide sobre valor da prestação de serviço. Se você contrata serviço por R$ 1.000 e ISS é 5%, você paga R$ 50 de ISS embutido no serviço.</p><p>Como ISS é calculado? Prestador apura ISS, recolhe ao município. Ou você retém ISS e repassa. Algumas transações há retenção obrigatória na fonte (você retém e repassa).</p><blockquote class="example"><strong>Exemplo:</strong> Você contrata advogado para análise contratual. Honorários: R$ 2.000. ISS: 5% = R$ 100. Você paga R$ 2.100. Advogado repassa R$ 100 ao município.</blockquote><p><strong>ISS em transações de valor pequeno:</strong> Serviços de baixo valor (até R$ 100 em alguns municípios) podem ser isentos de ISS. Lei oferece proteção a pequenos serviços.</p><blockquote class="quote"><strong>Impacto ao consumidor:</strong> "ISS é imposto municipal. Aumenta custo de serviços. Você negocia preço? Já está embutido ISS no valor cotado pelo prestador."</strong></blockquote><p>Como você recupera ISS? Se você é empresa (contrata serviço como insumo de produção), você pode creditar em alguns casos. Se pessoa física (contrata para uso pessoal), não recupera.</p>'},
    {id:'ipi', name: 'IPI: Imposto Sobre Produtos Industrializados', content:'<h4>O Imposto Federal Que Afeta Produtos Manufaturados</h4><p>IPI é imposto federal sobre produtos industrializados. Você paga quando compra eletrônicos, cosméticos, alimentos processados, veículos. Como ICMS, é embutido no preço.</p><p>Como funciona? Indústria fabrica produto, paga IPI. Vende a varejista com IPI. Varejista vende para você (IPI já embutido no preço). Você não percebe, mas está pagando.</p><blockquote class="tip"><strong>Dica:</strong> IPI é variável: alguns produtos têm IPI 0% (alimentos básicos), outros até 35% (eletrônicos de luxo, cigarros). Governo usa IPI para incentivar/desincentivar consumo.</blockquote><p>Qual é o objetivo? IPI é instrumento de política pública. Governo reduz IPI para incentivar: indústria (oferece IPI reduzido para manufatura), eletrônicos (para competir com importados). Aumenta IPI para desincentivar: cigarros, bebidas alcoólicas.</p><p><strong>Alíquotas variam:</strong> Alimentos básicos 0%, eletrônicos 15-35%, automóveis 25%, cigarros 30%, bebidas alcoólicas 0-25%. Política é clara: essencial isento, supérfluo tributado.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra celular por R$ 4.000. Sem IPI, custaria R$ 3.200 (IPI é 25%). Você está pagando R$ 800 de IPI embutido.</blockquote><p><strong>IPI em operações interestaduais:</strong> Quando você importa, IPI é cobrado na entrada. Quando você fabrica, paga IPI na saída. Há crédito: você credita IPI de matéria-prima contra IPI de produto final.</p><blockquote class="quote"><strong>Impacto inflacionário:</strong> "IPI é incorporado no preço de produtos. Produtos com alto IPI ficam mais caros. Consumidor absorve IPI, mesmo sem saber que está pagando."</strong></blockquote><p>Como reduzir impacto? Lei oferece períodos de isenção/redução. Durante crise, governo reduz IPI de eletrônicos para estimular economia. Você acompanha notícias de redução fiscal.</p>'},
    {id:'pgto', name: 'Pagamento de Impostos Indiretos: Sua Responsabilidade', content:'<h4>Como Impostos Sobre Consumo São Recolhidos ao Estado</h4><p>Impostos sobre consumo (ICMS, ISS, IPI) são recolhidos por empresas/prestadores. Você paga incluído no preço. Empresa que recolhe. Entender como funciona ajuda a reconhecer impostos que paga.</p><p><strong>Recolhimento de ICMS:</strong> Empresa calcula ICMS de vendas, deduz ICMS de compras, remete diferença ao estado (normalmente mensalmente). Você não recolhe direto; empresa o faz.</p><blockquote class="tip"><strong>Dica:</strong> Se você é empresa, você faz recolhimento. Se pessoa física comprando, empresa recolhe por você. Você apenas paga incluso no preço.</blockquote><p><strong>Recolhimento de ISS:</strong> Prestador de serviço calcula ISS, em geral remete ao município (ou cliente retém e remete). Há deadline mensal/mensal de recolhimento. Atraso causa multa.</p><p><strong>Recolhimento de IPI:</strong> Indústria calcula IPI, recolhe à Receita Federal (via DARF). Se importa, você paga IPI na entrada de mercadoria (desembaraço aduaneiro).</p><p><strong>Nota Fiscal como comprovante:</strong> Empresa que recolhe, emite Nota Fiscal. Na NF consta: valor do imposto recolhido, alíquota, base de cálculo. Você pode verificar quanto de imposto está embutido.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra em loja. NF mostra: valor produto R$ 100, ICMS R$ 18, total R$ 118. Você vê quanto de imposto foi cobrado. Pode reclamar se alíquota está errada.</blockquote><p><strong>Recuperação de impostos:</strong> Se você é empresa, você recupera impostos pagos em compras (credita contra vendas). Se pessoa física, não recupera: você é consumidor final.</p><blockquote class="quote"><strong>Transparência fiscal:</strong> "Nota Fiscal deve detalhar impostos. Você tem direito de saber quanto de imposto está pagando. Exija NF discriminada."</strong></blockquote><p>Como você acompanha recolhimento? Existem órgãos fiscalizadores (Receita Federal, SEF estadual, Prefeitura) que auditam empresas. Você pode denunciar sonegação.</p>'}
  ],

{
  id:3, name: 'MEI e Simples Nacional', free:false,
  topics:[
    {id:'mei', name: 'Microempreendedor Individual: Regime Simplificado de Formalização', content:'<h4>Trabalhando Por Conta Própria de Forma Legal e Simples</h4><p>MEI é regime para quem trabalha por conta própria ganhando até R$ 81 mil/ano. Oferece simplificação enorme: contribuição INSS fixa (aproximadamente R$ 80-120/mês), acesso a benefícios, sem pagar IR da empresa.</p><p>Qual é a vantagem de ser MEI? Você se formaliza legalmente, tem CNPJ próprio, acesso a crédito em bancos, proteção previdenciária (aposentadoria, auxílio-doença), sem burocracia de empresa grande.</p><blockquote class="tip"><strong>Dica:</strong> Se ganhar até R$ 81 mil/ano como autônomo, MEI é perfeito. Você ganha mais em benefícios (seguro-desemprego, aposentadoria) que paga em contribuição.</blockquote><p><strong>Contribuição MEI:</strong> Você paga "DAS" (Documento de Arrecadação Simplificada): valor fixo corresponde a ~5% de salário mínimo (~R$ 80/mês em 2024). Corresponde a sua contribuição INSS completa.</p><p><strong>Benefícios MEI:</strong> Aposentadoria por tempo de contribuição, auxílio-doença (60 dias sem pedir licença), auxílio-acidente, pensão por morte familiar, salário-família (filhos pequenos).</p><p>Como você se formaliza? Acessa Portal do Empreendedor (gov.br), preenche dados, gera CNPJ. Gratuito e em minutos. Recebe CNPJ por email, já começa a faturar legalmente.</p><blockquote class="example"><strong>Exemplo:</strong> Você é consultor de marketing, ganha R$ 60 mil/ano. Você se torna MEI. Contribui R$ 80/mês (R$ 960/ano). Recebe benefícios de aposentadoria, auxílio-doença. Sem burocracia de empresa.</blockquote><p><strong>Limite de receita:</strong> Até R$ 81 mil/ano. Se passar, você é automaticamente enquadrado em microempresa (Simples Nacional). Há transição: você tem tempo para se adequar.</p><blockquote class="quote"><strong>Formalidade acessível:</strong> "MEI é caminho ideal para autônomo. Formaliza você legalmente, dá proteção, sem exigir burocracia de empresa. Recomendado para maioria dos autônomos."</strong></blockquote><p>E se ganhar mais que R$ 81 mil? Você migra para microempresa (ME) com regime Simples Nacional. Isto é previsível e planejado: lei quer que você cresça.</p>'},
    {id:'simp', name: 'Simples Nacional: Tributação Simplificada Para PME', content:'<h4>Um Imposto Único Para Microempresas e Pequenas Empresas</h4><p>Simples Nacional é regime de tributação simplificado para empresa com até R$ 4,8 milhões de receita/ano. Você paga uma alíquota única (2-22% conforme receita e setor) que inclui vários impostos.</p><p>Qual é a vantagem? Uma alíquota única em vez de múltiplos impostos (IRPJ, CSLL, PIS, COFINS, ICMS, ISS). Simplifica contabilidade e reduz carga tributária para pequeno negócio.</p><blockquote class="tip"><strong>Dica:</strong> Simples Nacional é muito melhor que regime comum para PME. Você paga menos impostos, tem menos burocracia contábil.</blockquote><p><strong>Alíquotas Simples:</strong> Variam de 4% a 22,9% conforme: receita bruta anual (faixa), setor de atividade (comércio 4%, indústria 4,5%, serviço 16%). Quanto menor receita, menor alíquota.</p><p><strong>Exemplo de alíquotas (comércio 2024):</strong> Até R$ 180 mil: 4%. R$ 180 mil a R$ 360 mil: 5,47%. R$ 360 mil a R$ 720 mil: 6,84%. Aumenta progressivamente.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem loja com receita R$ 300 mil/ano. Alíquota Simples: ~5,5%. Você paga R$ 16.500 de tributação total (inclui IRPJ, CSLL, PIS, COFINS, ICMS). Em regime comum, pagaria muito mais separando cada imposto.</blockquote><p><strong>O que está incluído:</strong> IRPJ (lucro), CSLL (superávit), PIS (integração social), COFINS (financiamento), ICMS (se comercial/industrial), ISS (se serviço).</p><p><strong>Obrigações Simples:</strong> Você mantém registro de vendas simples (RPA - Registro de Preço de Atividade), emite Nota Fiscal, paga DAS mensal. Muito mais simples que empresa comum.</p><blockquote class="quote"><strong>Simplificação radical:</strong> "Simples Nacional reduz burocracia e custos. Uma alíquota, um pagamento mensal, documentação simples. Perfeito para PME."</strong></blockquote><p>Como você entra? Se microempresa (até R$ 360 mil) você é incluído automaticamente. Se EPP (até R$ 4,8 milhões) você pode optar. Fácil mudar de regime.</p>'},
    {id:'opt', name: 'Otimização Tributária: Escolhendo Melhor Regime', content:'<h4>Planejando Sua Estrutura Para Pagar Menos Impostos Legalmente</h4><p>Você pode escolher sua estrutura tributária para otimizar (pagar menos impostos). Cálculo simples: compare MEI vs Simples vs regime comum. Escolha que menos taxa você paga.</p><p><strong>Comparação de regimes:</strong> Se ganha R$ 60 mil: MEI (paga R$ 960/ano) vs Simples (paga ~R$ 3.300/ano). MEI é melhor. Se ganha R$ 200 mil: MEI (limite excedido) vs Simples (paga ~R$ 10.000/ano). Simples é única opção.</p><blockquote class="tip"><strong>Dica:</strong> Calcule simulações antes de escolher regime. Diferença pode ser R$ 5 mil a R$ 20 mil/ano. Vale investir tempo nessa decisão.</blockquote><p><strong>Fatores que influenciam:</strong> Receita bruta (MEI até R$ 81 mil, Simples até R$ 4,8 milhões), setor (serviço tem alíquota diferente comércio), lucro esperado (regime comum pode ser vantajoso se lucro baixo).</p><p><strong>Planejamento anual:</strong> Você revisa regime ao final do ano. Se receita vai exceder limite MEI, você migra para Simples antes do problema. Previne surpresas de mudança fiscal.</p><blockquote class="example"><strong>Exemplo:</strong> Você é consultor. Ano 1 ganha R$ 50 mil (MEI ideal). Ano 2 ganha R$ 100 mil (ultrapassa MEI). Você migra para Simples em janeiro do ano 2. Evita problemas de regra.</blockquote><p><strong>Custos de regime comum:</strong> Você precisa de contador (R$ 500-2 mil/ano), emissão de DARFs mensais, contabilidade completa. Só vale para empresa com receita acima R$ 4,8 milhões.</p><blockquote class="quote"><strong>Estratégia fiscal:</strong> "Escolher regime correto é decisão estratégica. Cálculos simples reduzem impostos legalmente. Você não é obrigado a pagar mais do que lei exige."</strong></blockquote><p>Qual é a dica final? Procure contador ou consultor tributário para análise. Investimento pequeno (consulta ~R$ 500) economiza muito maior (R$ 5-20 mil/ano).</p>'},
    {id:'con', name: 'Conformidade e Obrigações do MEI/Simples', content:'<h4>O Que Você Precisa Fazer Para Manter-se Legal</h4><p>MEI e Simples têm obrigações simples, mas obrigatórias. Cumprir evita multas, problemas com fisco, e perda de benefícios. Conheça suas obrigações.</p><p><strong>MEI obrigações:</strong> Pagar DAS mensalmente (até dia 20), declarar renda anual (sempre, mesmo que isento), manter nota fiscal de vendas, não ultrapassar R$ 81 mil/ano de receita.</p><blockquote class="tip"><strong>Dica:</strong> Coloque lembrete para pagar DAS todo mês. Atraso de um mês causa multa 2% + juros. Pagar em dia é simples.</blockquote><p><strong>Simples obrigações:</strong> Pagar DAS mensal (soma de impostos), emitir Nota Fiscal de vendas, manter registro de RPA (Registro de Preço de Atividade), declarar anual (DEFIS), não ultrapassar limite de receita.</p><p><strong>Declaração anual (DEFIS):</strong> Você informa ao governo receita total, despesas, imposto pago. É simples: preenche formulário online, anexa documentação. Sem complicações.</p><p>Qual é a penalidade por atraso? Se atrasa DEFIS, multa de 20% do imposto anual. Se atrasa DAS, multa de 2% + juros por mês. Atrasos acumulam rápido.</p><blockquote class="example"><strong>Exemplo:</strong> Você não paga DAS por 3 meses. Multa: 2% x 3 meses = 6% do DAS + 3 meses de juros. Valor simples torna caro. Pagar em dia é importante.</blockquote><p><strong>Exclusão por excesso de renda:</strong> Se você ultrapassar limite de receita (MEI R$ 81 mil, Simples R$ 4,8 milhões) você é obrigado a migrar. Não é punição: é regra natural de crescimento.</p><blockquote class="quote"><strong>Regularidade fiscal:</strong> "Cumprir obrigações é simples. Pagar DAS em dia, declarar anual, emitir NF. Evita problemas futuros com fisco e perda de benefícios."</strong></blockquote><p>Como você se protege? Organize sistema de lembretes (celular, agenda), ou contrate contador pequeno que gerencia. Investimento mínimo para estar sempre em dia.</p>'}
  ],

{
  id:4, name: 'Planejamento Tributário', free:false,
  topics:[
    {id:'plan', name: 'Otimização Fiscal: Estratégias Legais Para Pagar Menos', content:'<h4>Reduzindo Impostos Sem Violar Lei</h4><p>Planejamento tributário é uso de estratégias legais para reduzir impostos. Diferença: planejamento é legal (você segue lei); sonegação é crime (você esconde renda). Você pode planejar, nunca deve sonegar.</p><p><strong>Deduções maximizadas:</strong> Aproveite todas deduções permitidas. Se você gasta R$ 20 mil em saúde/educação, deduza integralmente. Lei permite; é seu direito.</p><blockquote class="tip"><strong>Dica:</strong> Guarde todos recibos de gastos dedutíveis. Você tem 5 anos para reclamar deduções retroativas, recuperando impostos.</blockquote><p><strong>Escolha de regime:</strong> Compare MEI, Simples e regime comum. Diferença pode ser R$ 10 mil/ano. Escolha corretamente economiza muito.</p><p><strong>Dividends vs salário:</strong> Pessoa Física pode estruturar renda como "dividends" (distribuição de lucro da empresa, isento IR) em vez de salário (tributado IR progressivo). É legal se empresa tem lucro.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem empresa que lucra R$ 100 mil/ano. Você pode tirar R$ 50 mil como salário (paga IR) + R$ 50 mil como dividend (isento IR). Reduz tributação pessoal.</blockquote><p><strong>Contribuição previdenciária aumentada:</strong> Se você é autônomo/PF, aumentar contribuição ao INSS beneficia: dedução de IR hoje + aposentadoria melhor amanhã. Inverte benefício.</p><p><strong>Seguro-saúde dedutível:</strong> Você paga seguro-saúde? Deduça como despesa médica. Lei permite que seguros de saúde sejam deducidos como despesa médica.</p><blockquote class="quote"><strong>Planejamento ético:</strong> "Planejamento tributário é reconhecido judicialmente como direito. Você deve aproveitar estratégias legais para pagar menos. Sonegação é crime; planejamento é direito."</strong></blockquote><p>Qual é o limite? Não há limite de estratégia legal. Mas estratégia muito agressiva (estrutura apenas para reduzir impostos, sem propósito comercial real) pode ser questionada como "evasão" em vez de "planejamento".</p>'},
    {id:'revis', name: 'Revisão de Cálculos: Verificando Se Pagou Correto', content:'<h4>Auditando Seus Próprios Impostos</h4><p>Você paga impostos. Como saber se está correto? Você mesmo pode revisar cálculos. Se achar erro (favor a você), pode pedir restituição. Se erro (favorável governo), você paga de boa.</p><p><strong>Verificação simples:</strong> Pegue sua última declaração de IR. Confira: renda declarada vs recibos de banco, deduções reivindicadas vs comprovantes, cálculo de alíquota progressiva.</p><blockquote class="tip"><strong>Dica:</strong> Use simulador online de IR (Receita Federal oferece). Você simula sua renda + deduções, vê quanto deveria pagar. Compara com o que pagou.</blockquote><p><strong>Erros comuns:</strong> Deduções não aproveitadas (você conhecia?, sem reclamar), renda não declarada (bonus esquecido?), alíquota calculada errada (calculadora com erro?), dependentes inconsistentes (filho que já tem renda própria).</p><p><strong>Correção de erro (pra mais):</strong> Se você pagou a menos, você pode fazer declaração retificadora. Receita Federal talvez notifique; você já está pago = paga multa menor (20%).</p><p>Correção de erro (pra menos):</strong> Se você pagou a mais, você pede restituição. Receita Federal analisa, devolve diferença + juros (SELIC). Você ganha!</p><blockquote class="example"><strong>Exemplo:</strong> Você pagou R$ 15 mil de IR. Revisando descobrir que tinha direito a dedução de R$ 10 mil que não reivindicou. Imposto correto seria R$ 13 mil. Você pede restituição de R$ 2 mil + juros.</blockquote><p><strong>Prazo de revisão:</strong> Você pode revisar até 5 anos atrás. Qualquer erro em até 5 anos anteriores pode ser corrigido (pra cima ou pra baixo).</p><blockquote class="quote"><strong>Vigilância pessoal:</strong> "Você deve revisar seus cálculos de impostos. Erros acontecem. Se favor a você, reclame. Você merece justiça fiscal."</strong></blockquote><p>Como você reclama? Declaração retificadora (se erro já passou), recurso (se Receita Federal notificou), ou ação judicial (se governo discorda). Procure contador ou advogado tributário.</p>'},
    {id:'aud', name: 'Auditoria Fiscal: Quando o Fisco Bate à Sua Porta', content:'<h4>Entendendo Fiscalização e Seus Direitos Quando Auditado</h4><p>Receita Federal audita contribuintes para verificar se declaram correto. Auditoria não significa crime: é verificação normal. Você tem direitos durante auditoria.</p><p><strong>Tipos de auditoria:</strong> Mesa (Receita Federal analisa sua documentação no órgão), campo (fiscal visita sua casa/empresa), correspondência (Receita notifica por carta).</p><blockquote class="tip"><strong>Dica:</strong> Se receber notificação de auditoria, não panique. Organize documentação, considere contratar contador/advogado. Você tem direitos processuais.</blockquote><p><strong>Seus direitos em auditoria:</strong> Direito a conhecer acusação, direito a apresentar defesa, direito a vistar documentação (ver o que Receita vê), direito a recursos (apelar decisão), direito a sigilo de informações pessoais.</p><p><strong>Condutas durante auditoria:</strong> Coopere com fiscal (oferece documentação, responde perguntas), mas proteja seus direitos (não confesse culpa sem assessoria jurídica, exija recibos de tudo que entregar).</p><blockquote class="example"><strong>Exemplo:</strong> Fiscal vem sua casa pedindo documentação. Você oferece, mas pede recibo assinado do que entregou (prova de entrega). Se fiscal encontra "erro", você pode recorrer antes de pagar.</blockquote><p><strong>Notificação de débito:</strong> Se Receita encontra imposto devido, emite Notificação de Débito. Você deve pagar + multa (75% se dolosa/intencional, 30% se negligência) + juros SELIC.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Auditoria é poder estatal, mas você tem direitos processuais. Defenda-se adequadamente. Muitos "erros" do fisco são questionados em recurso/judiciário."</strong></blockquote><p>Como você se protege? Mantenha documentação organizada, guarde recibos 5 anos, declare correto (evita auditoria), e considere contador que conhece legislação tributária.</p>'},
    {id:'sneg', name: 'Sonegação: Crime Que Você Não Deve Cometer', content:'<h4>Esconder Renda é Crime: Consequências Severas</h4><p>Sonegação é crime. Você esconde renda, não paga impostos, mente ao governo. Consequências: multa pesada, juros altos, possível cadeia. Nunca vale a pena.</p><p><strong>Tipos de sonegação:</strong> Não declarar renda (omissão), declarar renda falsa (mentira), deducionar despesas inexistentes (fraude), emitir nota fiscal falsa (falsificação).</p><blockquote class="tip"><strong>Dica:</strong> Sonegação não é "inteligente": é crime. Receita Federal tem ferramentas (cruzamento de dados) para descobrir. Risco muito alto para pouco benefício.</blockquote><p><strong>Penalidades de sonegação:</strong> Multa 150% do imposto não pago (você paga 2,5x o imposto?), juros SELIC (acumula rápido), processo penal possível (pena de 2 a 5 anos de cadeia).</p><p><strong>Como descobre?</strong> Receita cruza dados: seu banco reporta entrada de dinheiro, sua declaração não reporta, mismatch = suspeita. Fornecedores/clientes são investigados, você fica exposto.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 100 mil mas declara R$ 30 mil. Banco reporta R$ 100 mil. Receita nota discrepância. Você é auditado, multado (R$ 150 mil de multa), processado penalmente.</blockquote><p><strong>Diferença: planejamento vs sonegação:</strong> Planejamento é usar estratégias legais. Sonegação é ocultar fatos. Linha é clara: se estratégia tem propósito comercial real além de reduzir impostos, é lícita.</p><blockquote class="quote"><strong>Aviso sério:</strong> "Sonegação é crime. Multa é pesada (150%), juros acumulam, e você pode ser condenado à cadeia. Não vale a pena. Declare correto."</strong></blockquote><p>Qual é a melhor estratégia? Declarar correto, aproveitar deduções legais, planejar estrutura tributária adequadamente. Você economiza de forma legal e sem risco.</p>'}
  ],

{
  id:5, name: 'Reforma Tributária e Tendências', free:false,
  topics:[
    {id:'ref', name: 'Reforma Tributária: Mudanças Recentes e Futuras', content:'<h4>Sistema Tributário Em Evolução</h4><p>Brasil está modernizando sistema tributário. Lei 14.433/2023 criou novas regras; Lei 16.257/2025 traz mudanças. Você deve conhecer tendências para planejar finanças.</p><p>O que mudou? ICMS reduziu para operações interestaduais (benefício para comércio eletrônico), IPI reduziu ou zerou em eletrônicos (incentivo), contribuições sociais mudaram bases de cálculo (impacto em empresas).</p><blockquote class="tip"><strong>Dica:</strong> Acompanhe notícias de reforma tributária. Mudanças podem beneficiar sua renda. Você quer aproveitar benefícios novos antes que acabem.</blockquote><p><strong>Imposto de Renda digital:</strong> Governo quer cobrar IR sobre operações digitais (criptomoedas, internet). Ainda em discussão, mas tendência é aumentar tributação de renda digital.</p><p><strong>Unificação de impostos:</strong> Governo discute simplificar: um imposto único (CBS - Contribuição sobre Bens e Serviços) em vez de ICMS, ISS, COFINS, PIS fragmentados. Objetivo: simplificar, reduzir confusão.</p><blockquote class="example"><strong>Exemplo:</strong> Se CBS for aprovada, você pode pagar 15% em vez de somar ICMS (18%) + ISS (5%) + outros. Simplifica, pode reduzir carga.</blockquote><p><strong>Incentivos crescentes:</strong> Governo cria benefícios para setores (energia renovável, educação, saúde). Se você trabalha nesses setores, há incentivos/deduções aumentadas.</p><blockquote class="quote"><strong>Tendência clara:</strong> "Sistema tributário está evoluindo. Direção é simplificação (menos impostos, mais claros) e incentivos seletivos (governo dirige economia via tributação)."</strong></blockquote><p>Como você se protege? Acompanhe mudanças, revise estrutura anualmente, considere contador que sabe reforma. Mudanças criam oportunidades de otimização.</p>'},
    {id:'dig', name: 'Tributação Digital: Criptomoedas, Aplicativos, Economia Compartilhada', content:'<h4>Economia Digital Requer Tributação Moderna</h4><p>Economia digital criou novos serviços/renda: criptomoedas, apps (Uber, Airbnb), freelance online, dropshipping. Lei fiscal ainda está se adaptando. Você deve saber como tributa essas rendas.</p><p><strong>Criptomoedas:</strong> Ganho em Bitcoin/Ethereum é tributado como ganho de capital (15%) quando você vende. Você deve reportar ganho na declaração de IR. Exchanges reportam Receita Federal transações.</p><blockquote class="tip"><strong>Dica:</strong> Se você comercia criptomoedas, declare ganhos. Receita Federal tem acesso a informações de exchanges. Omissão é fraude.</blockquote><p><strong>Uber/Motorista app:</strong> Você trabalha como motorista de aplicativo? Receita é rendimento de trabalho, tributado IR progressivo. Você deduz despesas (combustível, manutenção). Se ganha pouco, pode ser MEI.</p><p><strong>Airbnb/Aluguel temporário:</strong> Você aluga imóvel por temporada? Similar a aluguel comum: 15% de IR sobre receita. Você deduz despesas (IPTU, limpeza, consertos).</p><blockquote class="example"><strong>Exemplo:</strong> Você ganhou R$ 50 mil com Airbnb. Imposto: 15% = R$ 7.500. Você pode deduzir despesas (R$ 10 mil). Base tributável: R$ 40 mil. Imposto recalculado: ~R$ 6 mil.</blockquote><p><strong>Freelancer online:</strong> Você presta serviço online (design, redação, programação)? Similar a serviço presencial: IR progressivo. Se através de plataforma internacional (Upwork), ainda é tributado no Brasil.</p><blockquote class="quote"><strong>Adaptação moderna:</strong> "Economia digital criou novas formas de renda. Lei ainda está adaptando tributação. Tendência é maior fiscalização sobre ganhos digitais."</strong></blockquote><p>Como você se protege? Declare todas as rendas (digitais ou não), mantenha registros de transações, considere estruturar como MEI se ganho pequeno/médio.</p>'},
    {id:'amb', name: 'Tributação Ambiental e Incentivos Verdes', content:'<h4>Lei Usa Tributação Para Incentivar Sustentabilidade</h4><p>Governo cria incentivos/desincentivos tributários para promover sustentabilidade. Você pode aproveitar benefícios se faz atividades ambientais.</p><p><strong>Incentivos ambientais:</strong> Energia renovável (solar, eólica) tem IPI reduzido/zerado. Veículos elétricos têm IPVA reduzido. Empresas que implementam sustentabilidade têm abatimentos.</p><blockquote class="tip"><strong>Dica:</strong> Se você investe em energia solar em casa, há créditos de ICMS/IR em alguns estados. Pesquise incentivos locais.</blockquote><p><strong>Desincentivos:</strong> Combustíveis fósseis têm tributação aumentada (tendência). Plásticos têm adições de impostos. Objetivo: desencorajar consumo prejudicial.</p><p><strong>Carbono:** Discussão sobre imposto de carbono (você paga conforme emissões). Ainda não é lei, mas tendência global. Se implementado, viagens/transporte de alta emissão serão mais caras.</p><blockquote class="example"><strong>Exemplo:</strong> Você instala painel solar em casa (R$ 30 mil). Lei oferece incentivo: desconto de 50% em ICMS da instalação (economiza R$ 2.700). Investimento se paga mais rápido.</blockquote><p><strong>Fundos verdes:</strong> Alguns investimentos em fundos ambientais têm tributação reduzida ou benefícios. Se você investe em sustentabilidade, pode ter vantagens.</p><blockquote class="quote"><strong>Futuro verde:</strong> "Tributação será cada vez mais usada para incentivar sustentabilidade. Você se prepara escolhendo atividades ambientalmente amigáveis."</strong></blockquote><p>Qual é a oportunidade? Se você está considerando energia solar, veículo elétrico, ou investimento sustentável, agora é tempo com incentivos disponíveis.</p>'},
    {id:'intl', name: 'Impostos Internacionais: Quando Você Ganha Fora do Brasil', content:'<h4>Tributação de Renda Estrangeira</h4><p>Você é residente no Brasil? Você paga IR sobre renda mundial (ganhos no Brasil e fora). Lei brasileira tributa residente por renda global, não apenas brasileira.</p><p><strong>Renda estrangeira:</strong> Salário ganho exterior, investimento estrangeiro, imóvel alugado exterior. Tudo é tributado IR Brasil progressivo. Você deve declarar.</p><blockquote class="tip"><strong>Dica:</strong> Se você trabalha remotamente para empresa estrangeira (ganhos em dólar), declare em R$ convertido. Receita Federal tributa normal.</blockquote><p><strong>Tratados internacionais:</strong> Brasil tem tratados com países (EUA, Portugal, etc) que evitam "dupla tributação". Se você paga imposto exterior, pode creditar em Brasil. Evita pagar duas vezes.</p><p><strong>Exemplo:</strong> Você trabalha nos EUA, paga impostos americanos. Volta Brasil, declara renda. Você credita impostos EUA contra IR Brasil. Paga a diferença (ou recebe).</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 100 mil nos EUA, paga 25% imposto (R$ 25 mil). Em Brasil, IR seria 27,5% (R$ 27,5 mil). Você credita R$ 25 mil pagos EUA. Paga Brasil apenas R$ 2,5 mil adicional.</blockquote><p><strong>Não-residentes:</strong> Se você é estrangeiro trabalhando Brasil, você paga IR apenas sobre renda brasileira, não global. Lei oferece proteção a não-residentes.</p><blockquote class="quote"><strong>Globalização fiscal:</strong> "Você é residente Brasil? Declara renda mundial. Tratados evitam dupla tributação. Você credita impostos pagos exterior."</strong></blockquote><p>Como você se protege? Se trabalha exterior, considere assessoria internacional. Planejamento correto economiza muito em dupla tributação.</p>'}
  ],

{
  id:6, name: 'Defesa e Recursos', free:false,
  topics:[
    {id:'def', name: 'Seu Direito à Defesa: Recurso Administrativo e Judicial', content:'<h4>Contestando Decisão Fiscal Que Você Acha Errada</h4><p>Se Receita Federal notifica você de débito (diz que você deve imposto), você tem direito de contestar. Você pode argumentar antes de pagar. Lei oferece procedimento administrativo e judicial.</p><p><strong>Defesa administrativa:</strong> Você apresenta "impugnação" contra notificação. Argumenta que cálculo está errado, que Receita mal interpretou lei, que você tem direito que não reconheceu. Tribunal Administrativo Tributário (TAT) julga sua defesa.</p><blockquote class="tip"><strong>Dica:</strong> Sempre apresente defesa quando notificado. Pode economizar muito. Muitos "débitos" são questionados e reduzidos em defesa.</blockquote><p><strong>Processo administrativo:</strong> Você contesta, Receita responde, TAT julga (geralmente em 1-2 anos). Se você ganha, débito é cancelado. Se perde, você pode recorrer judicialmente.</p><p><strong>Apelação judicial:</strong> Se não concorda com TAT, você processa Receita Federal em Justiça. Juiz revisa análise de TAT. Processo é mais lento (3-5 anos) mas oferece segunda chance.</p><blockquote class="example"><strong>Exemplo:</strong> Receita notifica que você deve R$ 100 mil de imposto. Você contesta dizendo que cálculo está errado. TAT analisa, concorda com você (erro de 50%), reduz débito para R$ 50 mil. Você paga menos.</blockquote><p><strong>Liminar para não pagar enquanto disputa:</strong> Se débito é muito alto, você pode pedir liminar (ordem judicial) para não pagar enquanto disputa no tribunal. Alguns juízes concedem; depende da força da sua defesa.</p><blockquote class="quote"><strong>Direito de defesa:</strong> "Você tem direito absoluto de contestar notificação de débito. Processo existe para você exercer defesa. Muitos casos vão favor contribuinte após defesa adequada."</strong></blockquote><p>Como você monta defesa? Procure advogado tributário ou contador especializado. Eles montam argumentação baseada em lei, jurisprudência, e fatos seu caso.</p>'},
    {id:'sind', name: 'Sindicatos e Associações: Defesa Coletiva de Interesses', content:'<h4>Força Coletiva Para Defender Direitos Tributários</h4><p>Você não está sozinho. Sindicatos e associações profissionais/empresariais defendem interesses coletivos. Eles negociam com governo, acompanham legislação, representam membros.</p><p>Qual é o papel? Sindicato lobbeia governo por mudanças favoráveis (redução de impostos, prazos maiores), defende membros em disputas (quando governo age abusivamente), oferece consultoria legal/fiscal.</p><blockquote class="tip"><strong>Dica:</strong> Se sua categoria tem sindicato, filie-se. Contribuição é pequena; benefícios (defesa, consultoria, lobby) são grandes.</blockquote><p><strong>Exemplo de atuação:</strong> Sindicato de autônomos lobbeia governo por benefício de MEI aumentado. Sindicato de empresas contesta lei que acha abusiva (busca anular ou reformar). Associação de profissionais oferece consultoria tributária.</p><p><strong>Força coletiva:</strong> Sozinho você tem poder mínimo. Coletivo, você tem poder. Governo ouve sindicato com milhares de membros mais que indivíduo isolado.</p><blockquote class="example"><strong>Exemplo:</strong> Receita Federal quer cobrar imposto novo de freelancers. Sindicato de freelancers contesta, mobiliza membros, faz pressão. Governo reduz alíquota ou adia implementação. Força coletiva funciona.</blockquote><p><strong>Consultoria sindical:</strong> Maioria dos sindicatos oferece consultoria tributária/legal gratuita aos membros. Você liga, marca consulta, recebe orientação de especialista sem pagar.</p><blockquote class="quote"><strong>Poder coletivo:</strong> "Sindicatos representam interesse coletivo. Você, membro, se beneficia de negociações, consultoria, defesa que sindicato oferece."</strong></blockquote><p>Como você encontra seu sindicato? Pesquisa "sindicato [sua profissão]" + cidade/estado. Maioria tem website com informações e contato para filiação.</p>'},
    {id:'con', name: 'Contadores e Consultores Tributários: Seu Assessor Especializado', content:'<h4>Quando Você Precisa de Especialista</h4><p>Tributação é complexa. Se sua renda é alta, negócio é complicado, ou você foi auditado, procure contador/consultor tributário. Especialista economiza muito mais que cobra.</p><p><strong>O que faz contador:</strong> Organiza documentação fiscal, calcula impostos corretamente, encontra deduções/incentivos, monta estratégia tributária, acompanha mudanças legais, representa em auditoria.</p><blockquote class="tip"><strong>Dica:</strong> Se você ganha mais de R$ 50 mil/ano ou tem empresa, considere contratar contador. Economia (planejamento correto) supera custo.</blockquote><p><strong>Custo de contador:</strong> Varia: pessoa física simples R$ 300-600/ano, microempresa R$ 1-2 mil/ano, empresa maior R$ 5-20 mil/ano. Vale todo custo para empresas (economia é múltiplos do custo).</p><p><strong>Especialista tributário:</strong> Consultor mais especializado em tributação (não faz contabilidade diária). Você paga por hora/projeto. Útil para planejamento maior (estruturar empresa, estratégia de crescimento).</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 100 mil/ano, paga contador R$ 1.500/ano. Contador encontra deduções/incentivos economizando R$ 8 mil de IR. Investimento de R$ 1.500 retorna R$ 8 mil. Lucro de R$ 6.500.</blockquote><p><strong>Como escolher:</strong> Procure recomendação, verifique credenciais (registro CRC - Conselho Regional de Contabilidade), compare preços, considere experiência em sua área.</p><blockquote class="quote"><strong>Investimento em expertise:</strong> "Bom contador/consultor paga seu custo muitas vezes. Você ganha em corretude, otimização, evita multas. Vale investir em especialista."</strong></blockquote><p>Quanto você economiza com especialista? Varia muito, mas típico é 5-20% de impostos (dependendo estrutura). Se você ganha muito, especialista é essencial.</p>'},
    {id:'edu', name: 'Educação Continuada: Mantendo-se Atualizado Sobre Tributos', content:'<h4>Aprendendo Continuamente Sobre Tributação</h4><p>Tributação muda constantemente: leis novas, interpretações mudam, precedentes judiciais. Você deve aprender continuamente para não ser ultrapassado.</p><p><strong>Fontes de informação:</strong> Site da Receita Federal (receita.gov.br) publica normas, orientações, notícias. Sindicatos oferecem palestras. Universidades têm cursos. Livros e artigos de especialistas.</p><blockquote class="tip"><strong>Dica:</strong> Assine boletim de Receita Federal e de associações de sua área. Você fica informado de mudanças antes que afetem você.</blockquote><p><strong>Cursos online:</strong> Existem plataformas (Coursera, Udemy, YouTube) com cursos de tributação. Muitos gratuitos. Você aprende ao próprio ritmo, com custo baixo.</p><p><strong>Leitura especializada:</strong> Jornais fazem coluna tributária (Folha, Estado). Revistas especializadas (Consultor Jurídico). Se você ganha bem, subscribe: vale cada real.</p><blockquote class="example"><strong>Exemplo:</strong> Você lê que Lei 16.257/2025 oferece novo incentivo para sua categoria. Você ajusta estratégia tributária e economiza R$ 5 mil. Aprendizado contínuo paga.</blockquote><p><strong>Comunidades online:</strong> Grupos em redes sociais, fóruns. Você discute com outros contribuintes, compartilha dúvidas, aprende com experiências alheias.</p><blockquote class="quote"><strong>Educação permanente:</strong> "Tributação muda. Você que está informado aproveita oportunidades, evita penalidades. Educação continuada é investimento em você."</strong></blockquote><p>Qual é o compromisso? Dedique tempo (1-2 horas/mês) aprendendo sobre tributos. Você protege renda, otimiza impostos, evita erros. Tempo bem gasto.</p>'}
  ],
