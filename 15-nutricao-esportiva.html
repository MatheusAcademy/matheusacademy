      {
        id:1,
        name:'Macronutrientes e Proporções para Atletas',
        dur:'15min',
        content:`<h3>Macronutrientes e Proporções para Atletas</h3><p>Bem-vindo à jornada de transformação através da nutrição esportiva! Meu coração se alegra em poder compartilhar com você este conhecimento tão fundamental para sua performance e saúde.</p><p>Os macronutrientes são os pilares da nutrição do atleta. Proteínas, carboidratos e gorduras trabalham juntos como um sistema perfeito, criado por Deus para otimizar o funcionamento do nosso corpo. Assim como Ele criou tudo em harmonia na natureza, devemos buscar essa harmonia em nossa alimentação.</p><p>A proteína é essencial para a síntese e recuperação muscular. Um atleta precisa consumir entre 1,6 a 2,2 gramas de proteína por quilograma de peso corporal, dependendo do tipo de esporte. Essa quantidade garante que seus músculos se recuperem adequadamente após o treinamento intenso. Fontes excelentes incluem peito de frango, ovos, peixe, leguminosas e laticínios. Quando consumimos proteína de qualidade, estamos honrando nosso corpo como templo do Espírito Santo.</p><p>Os carboidratos são sua fonte primária de energia. Atletas devem consumir entre 5 a 10 gramas de carboidrato por quilograma de peso corporal, dependendo da intensidade e duração do treino. Carboidratos complexos como aveia, arroz integral, batata-doce e legumes fornecem energia sustentável e melhor controle glicêmico. Esses alimentos naturais, tão generosos da criação divina, mantêm seu corpo funcionando como uma máquina bem preparada.</p><p>As gorduras saudáveis são frequentemente negligenciadas, mas são cruciais para produção hormonal e saúde cerebral. Consuma entre 1 a 1,5 gramas por quilograma de peso corporal. Azeite extra virgem, abacate, nozes, amêndoas e peixes ricos em ômega-3 devem estar regularmente em seu prato. A qualidade supera a quantidade quando se trata de gorduras.</p><blockquote class="tip">💡 <em>Dica: Para um atleta de 80kg, uma distribuição equilibrada seria aproximadamente 130g de proteína (40%), 600g de carboidrato (40%) e 65g de gordura (20%) diariamente.</em></blockquote><p>Lembre-se, você não está apenas alimentando seu corpo, está investindo em sua saúde, seu desempenho e sua capacidade de servir com excelência. Que Deus abençoe cada refeição que você preparar com intenção e cuidado!</p>`,

      {
        id:2,
        name:'Timing Nutricional: Pré, Intra e Pós-Treino',
        dur:'15min',
        content:`<h3>Timing Nutricional: A Ciência do Momento Certo</h3><p>O timing nutricional é como um relógio divino — cada momento tem seu propósito. Assim como a Bíblia nos ensina em Eclesiastes 3:1 que "tudo tem seu tempo determinado", sua nutrição também funciona em ciclos perfeitos ao longo do dia.</p><p>Três horas antes do treino, prepare uma refeição equilibrada com carboidratos de digestão mais lenta, proteína magra e gorduras mínimas. Um exemplo prático: 150g de frango grelhado, 200g de arroz integral com brócolis. Essa refeição fornece energia sustentada e evita desconforto gastrointestinal durante o exercício.</p><p>De 30 a 60 minutos antes do treino, se necessário, consuma algo mais leve: uma banana com uma colher de amendoim, ou um iogurte grego com granola. Esse pequeno impulso energético priming ajuda a mobilizar os recursos do corpo para máxima performance. É como preparar o templo antes de um grande evento!</p><p>Durante o treino, se a sessão durar mais de 60 minutos, considere uma bebida de carboidrato e eletrólitos (6 a 8% de carboidrato). Essa estratégia é especialmente importante em treinos de resistência ou em climas quentes. Mantenha-se hidratado com água, mas para sessões prolongadas, essa solução de carboidrato é ouro puro para manter a performance.</p><p>Imediatamente após o treino (janela anabólica), consuma uma refeição com proteína e carboidrato em proporção 1:3 a 1:4. Por exemplo: 40g de whey protein com 120g de carboidrato (um suco de fruta natural ou pão integral). Seus músculos estão prontos para absorver esses nutrientes e iniciar a recuperação. Esse é o momento mais crítico para otimizar a síntese proteica.</p><p>Uma a duas horas após essa primeira refeição pós-treino, faça uma refeição completa e mais estruturada com proteína, carboidrato complexo e gordura. Sua recuperação depende dessa sequência bem executada. É um privilégio poder cuidar tão bem do seu corpo!</p><blockquote class="example">📌 <em>Exemplo prático: Treino às 17h → 14h (refeição principal) → 16:30 (banana com mel) → 17-18h (treino) → 18:15 (whey + suco) → 19:30 (frango com batata-doce e azeite).</em></blockquote><p>Estudos modernos confirmam que este timing estratégico pode aumentar em até 30% a síntese proteica muscular comparado com consumo aleatório. Que graça que Deus nos deu ao permitir que entendamos como nosso corpo funciona!</p>`,
        cards:[{q:'Qual é a proporção ideal de proteína e carboidrato na janela pós-treino?',a:'A proporção recomendada é 1:3 a 1:4, por exemplo 40g de proteína para 120-160g de carboidrato, consumido imediatamente após o exercício.'}]

      {
        id:3,
        name:'Hidratação e Eletrólitos: Fundamentos',
        dur:'15min',
        content:`<h3>Hidratação e Eletrólitos: O Líquido da Vida</h3><p>Água é vida! Essa verdade antiga permanece mais relevante do que nunca para o atleta moderno. Aproximadamente 60% do peso corporal é água, e essa proporção aumenta para 70-75% no tecido muscular. Quando você treina, perde água através do suor e da respiração. Repor essa água é não apenas importante — é essencial para manter a performance.</p><p>A recomendação geral é consumir 35 a 40 mililitros de água por quilograma de peso corporal diariamente em repouso. Um atleta de 80kg deveria beber aproximadamente 2,8 a 3,2 litros de água diariamente, aumentando significativamente em dias de treinamento. Mas não beba tudo de uma vez — distribua ao longo do dia em pequenas porções frequentes.</p><p>Durante o exercício, a estratégia muda. Para treinos menores que 60 minutos, apenas água é suficiente. Beba de 400 a 800 mililitros por hora, dependendo da intensidade, temperatura ambiente e sua taxa de suor. Um teste simples: pese-se antes e depois do treino. Uma perda de 2% do peso corporal indica desidratação — você está perdendo performance e colocando em risco sua recuperação.</p><p>Para treinos que excedem 60 minutos, adicione carboidratos e eletrólitos. Eletrólitos são sais minerais — principalmente sódio, potássio e magnésio — que mantêm o equilíbrio osmótico e a condução neural adequada. O sódio é particularmente importante porque ajuda na retenção de água no corpo. Uma bebida esportiva com 20-30 mEq de sódio por litro é ideal.</p><p>Após o exercício, continue hidratando-se, mas agora adicione sódio ao seu plano nutricional. Uma refeição pós-treino com sal natural ajuda na retenção de fluidos e acelera a recuperação. Não tenha medo do sal — atletas precisam dele!</p><blockquote class="news">📰 <em>Noticia: Estudos da Universidade de Queensland mostram que incluir sódio na bebida de recuperação aumenta em 50% a retenção de fluidos comparado à água pura.</em></blockquote><p>Alguns sinais de desidratação incluem sede excessiva, boca seca, fadiga desproporcional, redução de desempenho e até calor corporal elevado. Se experimentar esses sintomas, aumente imediatamente sua ingestão de fluidos. Deus nos deu sinais no corpo — aprendamos a ouvi-los!</p><p>A hidratação adequada não é apenas para performance — é para sua vida como um todo. Um corpo bem hidratado é um corpo saudável, com melhor energia, concentração e até humor elevado. Cuide dessa bênção que é ter agua pura e fresca disponível!</p>`,

      {
        id:4,
        name:'Nutrição Pré-Treino Otimizada',
        dur:'15min',
        content:`<h3>Nutrição Pré-Treino Otimizada: Prepare seu Motor</h3><p>A refeição pré-treino é como o combustível que você coloca em um carro de corrida. A qualidade e o timing desse combustível determinam se você vai acelerar ou engasgar. Deixe-me compartilhar com você as estratégias que transformam essa refeição em sua melhor arma de performance.</p><p>Três horas antes do treino é o tempo ideal para uma refeição completa e robusta. Nesse momento, você quer que seu corpo tenha energia máxima disponível, mas sem que essa energia ainda esteja sendo processada quando seu treino começar. Exemplos excelentes: 200g de peito de frango com 300g de batata-doce e brócolis, regado com um pouco de azeite. Ou 200g de peixe branco com 200g de arroz branco e legumes cozidos. A combinação de proteína + carboidrato complexo + um pouco de gordura saudável é praticamente perfeita.</p><p>Nesse intervalo de 3 horas, seu sistema digestivo estará convertendo esses alimentos em glicose (de carboidrato) e aminoácidos (de proteína) que entram na circulação. Quando você começar seu treino, esses nutrientes já estão no sangue, prontos para alimentar suas células musculares e cerebrais.</p><p>De 30 a 60 minutos antes do treino, uma pequena ingestão de carboidrato de digestão rápida com um pouco de proteína de fácil absorção é estratégica. Uma banana com uma colher de sopa de manteiga de amendoim, ou um iogurte grego com mel e granola, ou até uma barra de proteína com banana. Essa pequena ingestão não sobrecarrega o sistema digestivo, mas fornece um "boost" de energia que eleva os níveis de glicose sanguínea nos minutos finais antes do exercício.</p><p>Importante: evite alimentos muito gordurosos ou fibrosos nessa janela de 30-60 minutos, pois tendem a permanecer mais tempo no estômago. Você quer digestão rápida, não conforto gastrointestinal comprometido durante o treino.</p><p>A cafeína é uma aliada poderosa se bem utilizada. Consumir 200 a 400 miligramas de cafeína (um a dois cafés coados, ou uma xícara de chá verde forte) de 30 a 60 minutos antes do treino aumenta a vigilância mental, reduz a percepção de fadiga e pode melhorar a performance em até 3-5%. Alguns estudos sugerem benefícios ainda maiores em treinos anaeróbios. Mas não exagere — a cafeína em excesso causa nervosismo, taquicardia e prejuízo ao foco.</p><blockquote class="quote">💬 <em>"O corpo do atleta é templo de Deus. Alimentá-lo adequadamente é honrar essa responsabilidade." — Sabedoria de Treinadores Cristãos.</em></blockquote><p>Hidratação pré-treino também é crítica. Consumir 400-600 mililitros de água de 2 a 3 horas antes, e mais 200 mililitros de 15 a 20 minutos antes, garante que você inicie o exercício em estado de euridratação (hidratação ótima). Começar desidratado é como começar uma corrida com o carro sem óleo — o dano virá rápido.</p><p>Se você treina em jejum (treino em fasted state), essa estratégia pode funcionar para alguns, mas a maioria dos atletas se beneficia enormemente de uma pequena refeição pré-treino. Pesquisas mostram que mesmo um pequeno aporte de carboidrato antes do exercício pode aumentar a força e a resistência.</p><p>Customize conforme você aprende sobre seu próprio corpo. Alguns toleram bem refeições maiores perto do treino, outros precisam de mais tempo. O treinamento nutricional é uma forma de descobrir seu potencial máximo!</p>`,
        cards:[{q:'Qual é o intervalo ideal entre uma refeição completa pré-treino e o início do exercício?',a:'Três horas após uma refeição completa, e 30-60 minutos após um pequeno snack com carboidrato e proteína de rápida digestão.'}]
      },
      {
        id:5,
        name:'Recuperação Muscular Através da Nutrição',
        dur:'15min',
        content:`<h3>Recuperação Muscular: Onde o Crescimento Acontece</h3><p>Você sabe qual é o momento mais importante do seu treinamento? Não é durante o exercício. É depois. É durante o repouso e a recuperação que o crescimento muscular real ocorre. Seus músculos se desenvolvem não enquanto você está treinando, mas enquanto você está dormindo e recuperando. Que privilégio termos esse conhecimento para otimizar algo tão fundamental!</p><p>A recuperação muscular é um processo em três fases. Primeiro vem o dano micromuscular — quando você treina pesado, literalmente causa microscópicas rupturas nas fibras musculares. Isso parece ruim, mas é exatamente o que você quer! Essas rupturas enviam um sinal ao corpo que diz "ei, precisamos ficar maiores e mais fortes para lidar com isso!"</p><p>A segunda fase é a resposta inflamatória aguda. Seu corpo libera citocinas inflamatórias (como TNF-alfa e IL-6) que trazem mais sangue e nutrientes para a área afetada. Essa inflamação é boa, é curativa. Não a evite com doses exageradas de anti-inflamatórios — deixe seu corpo trabalhar naturalmente!</p><p>A terceira fase é a síntese e reconstrução. Esse é onde a nutrição brilha! Para que seus músculos se reconstruam maiores e mais fortes, você precisa fornecer os blocos de construção (proteína, carboidrato) e o ambiente hormonal adequado. Sem a nutrição certa, você treina mas não cresce. Com a nutrição certa, cada treino se transforma em progresso tangível.</p><p>A janela pós-treino — os primeiros 30 a 60 minutos após o exercício — é de ouro. Seu corpo está sensibilizado à insulina, sua taxa de síntese proteica está elevada, seus transportadores de aminoácidos estão esperando por proteína. Consuma uma refeição ou shake com 40 a 50 gramas de proteína de rápida absorção (whey protein, clara de ovo, peito de frango bem moído) e 80 a 160 gramas de carboidrato (suco de fruta natural, açúcar, mel, batata-doce). A proporção 1:3 a 1:4 (proteína:carboidrato) é ideal.</p><p>Nos dias seguintes ao treino pesado (24-72 horas), manter a ingestão de proteína elevada é crucial. Seu corpo continua sintetizando novos tecidos. A proteína é o material de construção — quanto mais qualidade você fornecer, melhor será a estrutura que você construir. Procure distribuir a proteína uniformemente ao longo do dia em 4-6 refeições, com aproximadamente 25-40 gramas de proteína por refeição.</p><blockquote class="tip">💡 <em>Dica: Coloque um alarme para comer proteína a cada 3-4 horas. Essa consistência na distribuição de proteína leva a uma síntese proteica mais consistent do que concentrar tudo em 1-2 refeições.</em></blockquote><p>Carboidratos também são críticos para recuperação — eles restauram o glicogênio muscular que foi depletado durante o treino. Músculos vazios de glicogênio não podem se recuperar adequadamente. Por isso recomendo 5-7 gramas de carboidrato por quilograma de peso corporal nos dias de treino intenso.</p><p>Não esqueça de micronutrientes! Magnésio, zinco, ferro e vitaminas do complexo B são essenciais para síntese proteica e recuperação. Vegetais coloridos, frutas secas, sementes e ovos fornecem uma gama espectacular desses nutrientes. Feche seus olhos e agradeça — Deus criou a natureza com toda a inteligência que precisamos para prosperar!</p><p>Sono de qualidade é tão importante quanto a nutrição — talvez ainda mais importante. Durante o sono profundo, o hormônio do crescimento (GH) é liberado, as proteínas são sintetizadas e o corpo se repara. Procure dormir 7-9 horas por noite, mantendo uma consistência de horário. Seu treino agradecerá!</p>`,
        cards:[{q:'Qual é a proporção ideal de proteína e carboidrato na refeição pós-treino para máxima recuperação?',a:'A proporção recomendada é 1:3 a 1:4 de proteína para carboidrato, com 40-50g de proteína e 80-160g de carboidrato consumidos dentro de 30-60 minutos.'}]

      {
        id:6,
        name:'Suplementação Estratégica para Atletas',
        dur:'15min',
        content:`<h3>Suplementação: Potencializando Seu Já Excelente Plano</h3><p>Vou ser honesto com você desde o início: suplementos não são mágicos. Eles não fazem milagres. O que os suplementos fazem é preencher as lacunas que existem mesmo em uma nutrição excelente, e potencializam o que você já está construindo através de treino e alimentação consistentes. Pense em suplementos como a cor final em um quadro que você já pintou com cuidado — ela melhora, mas o quadro já era bonito.</p><p>A base deve sempre ser comida real. Ovos, frango, peixe, batata-doce, arroz, feijão, brócolis — esses alimentos contêm centenas de compostos bioativos que nenhum suplemento pode replicar completamente. Se sua alimentação é fraca, nenhuma quantidade de suplementos compensa. Comece por ali.</p><p>Que suplementos realmente fazem diferença baseado em evidência científica? Deixe-me listar os que têm forte apoio de pesquisa:</p><p><strong>Whey Protein</strong> é provavelmente o suplemento mais útil. É proteína concentrada, de rápida absorção, prática, e quando misturada com carboidrato na janela pós-treino, acelera significativamente a síntese proteica. Um shake de whey com banana é exatamente o que você quer imediatamente após sair do treino.</p><p><strong>Creatina Monohidratada</strong> é um dos suplementos mais estudados na história — temos mais de 1000 estudos científicos validando sua eficácia e segurança. Aumenta a disponibilidade de ATP (energia celular), melhora força e hipertrofia, e custa muito pouco. A dose é 3-5 gramas diários, sem necessidade de ciclar. Seus rins e fígado são perfeitamente capazes de processar isso se você estiver saudável e hidratado.</p><p><strong>Beta-Alanina</strong> aumenta os níveis de carnosina muscular, que funciona como um buffer contra a acumulação de ácido láctico. Isso se traduz em melhor performance em exercícios de 1-10 minutos de alta intensidade. A dose é 3-5 gramas por dia, divididos em porções (para evitar o "flush" — aquele formigamento na pele).</p><p>Cafeína, como já mencionei, é um suplemento natural e potente. 200-400 miligramas de 30-60 minutos antes do treino melhora força, resistência e vigilância mental.</p><blockquote class="example">📌 <em>Exemplo: Um dia comum bem suplementado — Café da manhã: 3 ovos inteiros + aveia + banana. Pré-treino: café preto + banana. Pós-treino: Shake com whey protein + suco de laranja. Almoço: Peito de frango + arroz + brócolis. Lanche: Iogurte grego com granola. Jantar: Peixe + batata-doce + azeite.</em></blockquote><p><strong>Multivitamínico</strong> é uma "rede de segurança" barata. Mesmo com uma dieta boa, gaps nutricionais podem existir. Um multivitamínico diário garante que você está coberto. Não é uma solução mágica, mas é seguro e oferece uma pequena vantagem.</p><p>Suplementos sobre os quais sou mais cético: pré-treinos "mega-carregados" com muitos ingredientes (a maioria não faz nada além de cafeína), termogênicos baseados em efedra ou synephrine (eficácia questionável e riscos maiores), e qualquer coisa que promete "ganho de 10kg de músculo em um mês" (mentira, seu corpo tem limites genéticos de síntese proteica).</p><p>Qualidade importa. Compre de marcas reconhecidas que testam suas matérias-primas contra doping e contaminação. Seu corpo merece integridade!</p><p>E lembre-se: Deus nos deu corpos capazes de crescer, se fortalecer e evoluir. Suplementação é apenas uma ferramenta a mais. Seu maior suplemento é consistência, paciência e gratidão por estar saudável e capaz de treinar!</p>`,
        cards:[{q:'Qual suplemento tem mais de 1000 estudos científicos validando sua segurança e eficácia?',a:'Creatina Monohidratada é um dos suplementos mais estudados, com forte evidência científica para aumentar força, potência e hipertrofia muscular.'}]

        name:'Composição Corporal: Estratégias de Definição e Ganho Muscular',
        dur:'15min',
        content:`<h3>Composição Corporal: Esculpindo seu Corpo com Precisão Nutricional</h3><p>Composição corporal é a proporção entre gordura e massa magra (músculo, osso, órgãos) em seu corpo. Você pode pesar o mesmo mas ter composição corporal completamente diferente dependendo de quanto é gordura versus músculo. Um atleta de 80kg com 8% de gordura é muito mais musculado que alguém com 80kg e 25% de gordura. A balança mente — a composição diz a verdade.</p><p>Existem dois objetivos principais na nutrição do atleta: ganho de massa muscular (hipertrofia) e perda de gordura corporal (definição). Ironicamente, é muito difícil fazer os dois ao mesmo tempo. Seu corpo prefere estar em um estado ou outro. Isso ocorre porque hipertrofia exige um ambiente de excedente calórico (mais energia entrando que saindo) enquanto definição exige déficit calórico (menos energia entrando que saindo).</p><p><strong>Fase de Ganho Muscular (Bulking):</strong> Você precisa de superávit calórico — tipicamente 300-500 calorias acima do seu gasto diário. Esse excesso fornece energia para treinar intensamente e para síntese proteica aumentada. Mas cuidado — ganhar peso não significa ganhar qualquer coisa. Se você comer junk food em superávit, ganhará mais gordura que músculo. Sua escolha é clara: alimentos de qualidade que alimentem seu crescimento.</p><p>Durante a fase de ganho, aumentar a ingestão de proteína para 2,0-2,2g/kg e distribuir carboidratos estrategicamente (5-10g/kg dependendo do treino) garante que o máximo do ganho seja músculo. Você pode e deve ganhar um pouco de gordura — talvez 1kg de gordura para cada 1kg de músculo ganho — mas o foco deve ser claro: músculos maiores e mais fortes.</p><p><strong>Fase de Perda de Gordura (Cutting):</strong> Agora você precisa de déficit calórico — tipicamente 300-500 calorias abaixo do seu gasto. Esse déficit força seu corpo a usar as reservas de gordura como energia. MAS — e isso é crítico — você DEVE manter alta ingestão de proteína (2,0-2,2g/kg). Por quê? Porque com menos calorias disponíveis, seu corpo tem uma tendência de usar músculo como combustível se a proteína não estiver abundante. Proteína alta protege seu músculo enquanto você derrete gordura.</p><p>Durante corte (cutting), reduza principalmente carboidrato e gordura. Um exemplo: em vez de 10g/kg de carboidrato, desça para 3-5g/kg. Em vez de 1,2g/kg de gordura, vá para 0,8g/kg. Mas NUNCA sacrifique proteína. Seus músculos são sua obra-prima — proteja-os sempre.</p><blockquote class="quote">💬 <em>"Seu corpo é templo do Espírito Santo que habita em você (1 Coríntios 6:19). Cuide desse templo com excelência e intenção." — Sabedoria Cristã.</em></blockquote><p>O déficit calórico ideal para perda de gordura é moderado — 300-500 calorias. Qualquer coisa muito maior resulta em perda muscular acelerada e aumento de fadiga. Paciência é a virtude aqui. Perder 0,5-1kg de peso por semana é saudável e sustentável. Se você está perdendo mais rápido que isso, você está perdendo músculo.</p><p>Um truque para criar déficit sem se sentir desesperado? Aumente atividade e gasto de calorias. Caminhadas leves, movimentação adicional, aumento do volume de treino — esses aumentam o déficit sem ter que reduzir drasticamente comida (o que é insustentável psicologicamente).</p><p>Carboidratos cíclicos é uma estratégia avançada: dias altos em carboidrato nos dias de treino intenso, dias baixos em carboidrato nos dias de repouso. Isso maximiza performance e recuperação quando você está treinando pesado, mas mantém déficit nos dias de menor atividade. Uma estratégia inteligente!</p><p>Cicle entre fases. Talvez 12 semanas de ganho, depois 8 semanas de corte. Ou períodos ainda maiores. O importante é ter um plano claro, executar com consistência, e medir resultados não só na balança mas em como sua roupa fica, fotos, e como você se sente.</p>`,
        cards:[{q:'Qual deve ser o superávit calórico durante a fase de ganho muscular?',a:'Tipicamente 300-500 calorias acima do gasto diário, acompanhado de alta ingestão de proteína (2,0-2,2g/kg) para maximizar ganho de músculo.'}]
      },
      {
        id:8,
        name:'Periodização Nutricional e Macrociclos de Treino',
        dur:'15min',
        content:`<h3>Periodização Nutricional: Alinhando Nutrição com Seu Plano de Treino</h3><p>Periodização nutricional é a arte de alinhar sua ingestão de nutrientes com o ciclo do seu treinamento. Assim como você não treina com a mesma intensidade todos os dias (isso seria insano!), sua nutrição também deve variar em ciclos estratégicos. Seu corpo é inteligente e se adapta rapidamente — periodização mantém você à frente dessa adaptação.</p><p>Um macrociclo típico pode ser dividido em fases: preparação, hipertrofia, força, potência, e descarregamento. Cada fase tem demandas nutricionais ligeiramente diferentes.</p><p><strong>Fase de Preparação (Base Aeróbia):</strong> Você está focando em volume moderado, aeróbia, construindo uma base. A nutrição é relativamente padrão: proteína 1,6-1,8g/kg, carboidrato 5-7g/kg, gordura 1,0-1,2g/kg. Essa é uma fase mais "saudável" onde você se concentra em alimentos nutrientes-densos e cria hábitos sólidos.</p><p><strong>Fase de Hipertrofia:</strong> Agora você está fazendo séries de 8-12 repetições, volume alto, buscando ganho muscular. Você precisa de superávit calórico (300-500 calorias), proteína máxima (2,1-2,2g/kg), carboidrato elevado (7-10g/kg) para alimentar o treino pesado e recuperação aumentada. Seus músculos estão sendo estimulados a crescer — alimente-os abundantemente!</p><p><strong>Fase de Força Máxima:</strong> Aqui você está fazendo séries mais curtas (3-5 reps), menos volume total, mas com mais peso. Exigências metabólicas são diferentes — você continua precisando de proteína alta (2,0-2,2g/kg) mas pode reduzir carboidrato um pouco (5-8g/kg) já que o volume é menor. A qualidade do treino é mais importante que a quantidade.</p><p><strong>Fase de Potência:</strong> Movimentos explosivos, séries de 3-6 reps de movimentos rápidos. Carboidrato deve ser mantido moderado-alto (5-8g/kg) para sustentar o sistema nervoso central alertado. Proteína permanece alta. Essa fase é mental e neurológica — nutrientes que suportam função cognitiva ajudam (ômega-3, colina).</p><p><strong>Fase de Descarregamento:</strong> Uma semana a cada 4-6 semanas onde você reduz volume em 40-50%. É o momento de recuperação. Reduza calorias também — você não precisa de tanta energia. Use essa semana para reabastecer psicologicamente, reparar tecidos, e reconfigurar hormônios. A nutrição continua boa, mas menos agressiva.</p><blockquote class="tip">💡 <em>Dica de Profissional: Mantenha um diário simples — registre peso, calorias, ingestão de proteína, sensação de energia e performance. Depois de 4 semanas você verá padrões claros do que está funcionando para SEU corpo específico.</em></blockquote><p>Carboidratos cíclicos: em treinos de alta demanda (hipertrofia, força), dias de treino pesado devem ter carboidrato alto (8-10g/kg). Dias de repouso ou treino leve podem ter carboidrato mais baixo (3-4g/kg). Isso preserva insulina sensibilidade, mantém performance nos momentos que importam, e pode até ajudar na perda de gordura sem sacrificar músculos.</p><p>A maioria dos atletas faz melhor com periodização de 4-6 semanas: 3-4 semanas de sobrecarga progressiva seguidas de 1 semana de descarregamento. Esse padrão permite adaptação, recuperação, e crescimento contínuo sem burnout.</p><p>Teste diferentes estruturas de macrociclos. Talvez 8 semanas de hipertrofia seguidas de 4 semanas de força funcione melhor para você. Ou talvez 6+6+4 (hipertrofia+força+descarregamento). Não existe uma única verdade — existe a verdade para VOCÊ e seu corpo.</p><p>Deus criou nossos corpos com capacidade de adaptação e crescimento. Periodização respeita esses ciclos naturais, em vez de lutar contra eles. É sabedoria, não coincidência, que descanso é tão importante quanto treino!</p>`,
        cards:[{q:'Em um macrociclo periodizado, qual deve ser a ingestão de carboidrato durante a fase de hipertrofia?',a:'Durante fase de hipertrofia, recomenda-se 7-10g/kg de carboidrato para sustentar treino intenso, volume alto e recuperação aumentada.'}]
      },
      {
        id:9,
        name:'Casos de Estudo: Aplicação Prática em Atletas Reais',
        dur:'15min',
        content:`<h3>Casos de Estudo: Transformações Reais Através de Nutrição Aplicada</h3><p>Agora vamos ao que mais importa — a aplicação real. Conhecimento teórico só tem valor quando você o transforma em ação e resultados. Deixe-me compartilhar alguns casos que representam situações comuns e como nutrição estratégica mudou suas vidas.</p><p><strong>Caso 1: João, 25 anos, Iniciante em Musculação</strong></p><p>João era magro — 70kg em 1,80m de altura, muito baixo peso para sua altura. Ele queria "ficar grande" mas não sabia por onde começar. Seu primeiro problema: ele comia muito pouco e de forma desorganizada. Às vezes comia bem, às vezes comia qualquer coisa rápida, nada planejado.</p><p>Estruturamos para ele um plano de 300 calorias de superávit diário. Seu gasto era aproximadamente 2500 calorias, então alvo era 2800. Distribuímos: 140g proteína (40%), 350g carboidrato (35%), 85g gordura (25%). Isso veio de: café da manhã (ovos+aveia), almoço (frango+arroz), pós-treino (whey+banana), lanche (iogurte), jantar (peixe+batata-doce).</p><p>Em 12 semanas, João ganhou 8kg. Através de análise visual e de roupas, estimamos que aproximadamente 5kg foram músculo e 3kg foram gordura — uma proporção excelente! João agora tinha confiança para continuar, conhecendo o sistema que funciona para ele.</p><blockquote class="example">📌 <em>Exemplo da Semana de João: Segunda (peito+costas) 2900 cal / Terça (pernas) 2900 cal / Quarta (repouso) 2600 cal / Quinta (braços) 2900 cal / Sexta (repouso) 2600 cal / Sábado (cardio leve) 2700 cal / Domingo (repouso) 2600 cal = Total ~19.400 cal/semana.</em></blockquote><p><strong>Caso 2: Marina, 32 anos, Atleta de Crossfit Competitiva</strong></p><p>Marina era forte mas tinha 28% de gordura corporal. Seus objetivos: perder 5kg de gordura enquanto mantinha (idealmente) aumentava força. Ela era experiente mas nutrição estava desorganizada.</p><p>Implementamos um déficit de 400 calorias (seu gasto era 2800, alvo era 2400). Mantemos proteína em 165g/kg (2,2g × 75kg). Carboidrato em dias de treino intenso (segunda, quarta, sábado com CrossFit) eram altos: 250g. Dias de repouso/treino leve eram 100g. Assim ela tinha energia para performance quando importava, e criava déficit nos dias calmos.</p><p>Em 10 semanas, Marina perdeu 6kg. Pesada em laboratório, havia perdido 7kg de gordura mas ganho 1kg de músculo! Sua força na barra e nos levantamentos aumentou enquanto definia. A periodização de carboidratos foi a chave — ela não se sentiu exausta e manteve performance máxima nos treinos que importavam.</p><p><strong>Caso 3: Paulo, 41 anos, Atleta Veterano, Quer Recuperação Melhor</strong></p><p>Paulo era forte e lean (12% de gordura) mas sua recuperação era fraca — sentia-se cansado demais, dormia mal, ficava resfriado frequentemente. Seu problema: depois que envelheceu um pouco, não ajustou nutrição. Comia como um atleta de 25 anos quando seu corpo agora tinha outras necessidades.</p><p>Aumentamos antioxidantes (mais frutas, vegetais coloridos), magnesio (abóbora, espinafre, chocolate 85%), ômega-3 (peixe 3× semana, linhaça diária), e vitaminas do complexo B (ovos inteiros, alimentos integrais). Adicionamos um multivitamínico de qualidade. Priorizamos sono — ele ajustou horários para dormir 8 horas consistentemente.</p><p>Em 6 semanas, a energia de Paulo aumentou dramaticamente. Resfriados desapareceram. Recuperação entre treinos melhorou. Sua força até aumentou ligeiramente. A "mágica" foi simplesmente honrar as necessidades do seu corpo a essa fase da vida.</p><p><strong>Caso 4: Juliana, 27 anos, Atleta de Resistência (Meia-Maratona)</strong></p><p>Juliana era rápida mas seus treinos de alta intensidade deixavam-a exausta, e ela não conseguia fazer mais que 3 sessões por semana sem cair doente. Problema: nutrição era focada em baixo-carb (moda passageira) enquanto ela fazia treino que exigia muito carboidrato.</p><p>Restructuramos: em dias de treino aeróbio longo (fins de semana), 8g/kg de carboidrato. Em dias de velocidade durante semana, 6g/kg. Dias de repouso, 3g/kg. Proteína consistente em 1,8g/kg. Magicamente (ou não — era biologia), Juliana começou a fazer 5-6 treinos por semana sem exaustão. Tempo em meia-maratona caiu de 1h57 para 1h41 em 12 semanas. Carboidrato não é inimigo — é combustível!</p><p>Deus nos deu cada um um corpo único, com diferentes necessidades, capacidades e propósitos. Nutrição científica encontra-se com sabedoria prática quando você responde honestamente: como MEUS resultados melhoram? O que MEUS treinos exigem? Qual é a verdade do MEU corpo, não do Instagram ou de revistas?</p><p>Esses casos mostram um princípio fundamental: individualização importa. As mesmas recomendações genéricas não funcionam para todos. Você precisa testar, aprender, ajustar. Esse é seu trabalho como atleta sério — ser cientista do seu próprio corpo!</p>`,
        cards:[{q:'Qual foi a estratégia nutricional chave que permitiu Marina perder gordura enquanto ganhava músculo?',a:'Periodização de carboidrato: dias altos (250g) em treinos intensos para performance, dias baixos (100g) em repouso/treino leve para criar déficit calórico estratégico.'}]
      }
    ],
    summary:{
