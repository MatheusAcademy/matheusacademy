  cat:'Direito & Cidadania', free:true,
  topics:[
    {id:'cdcf', name: 'O que é o Código de Defesa do Consumidor?', content:'<h4>Introdução ao CDC</h4><p>Bem-vindo ao curso de Direito do Consumidor! Você aprenderá os fundamentos da Lei nº 8.078/1990, o Código de Defesa do Consumidor, que é um marco fundamental na proteção dos direitos das pessoas quando realizam compras ou contratam serviços.</p><p>O CDC estabelece direitos e deveres entre consumidores e fornecedores. <strong>Consumidor</strong> é toda pessoa física ou jurídica que adquire ou utiliza produto ou serviço como destinatário final. <strong>Fornecedor</strong> é a pessoa física ou jurídica que profissionalmente oferece produtos ou serviços no mercado.</p><blockquote class="tip"><strong>Dica:</strong> O CDC se aplica a qualquer transação comercial, seja presencial, por telefone ou online. Você tem direitos mesmo em compras simples no supermercado!</blockquote><p>Criado em 1990, o CDC foi uma revolução na proteção do consumidor brasileiro. Antes dele, as relações de consumo eram regidas pelo Código Civil, que não oferecia a mesma proteção. O CDC reconhece a vulnerabilidade do consumidor e cria mecanismos para equilibrar essa relação.</p><p>A estrutura do CDC é composta por: princípios fundamentais, direitos básicos do consumidor, práticas abusivas, proteção contratual, e órgãos de proteção. Você estudará cada um desses aspectos neste módulo.</p><blockquote class="example"><strong>Exemplo:</strong> Ao comprar um smartphone em uma loja, você é um consumidor. A loja é fornecedora. Mesmo que o smartphone estrague após um mês, o CDC garante que você pode devolver ou receber reparação durante o período de garantia.</blockquote><p>O CDC é uma lei viva, constantemente interpretada pelos tribunais. Seus princípios básicos incluem: a vulnerabilidade do consumidor, a hipossuficiência, a boa-fé nas relações, e a responsabilidade objetiva do fornecedor por danos causados.</p><blockquote class="quote"><strong>Princípio fundamental:</strong> "A proteção do consumidor é direito fundamental expresso na Constituição Federal. O Estado tem o dever de promover sua defesa."</blockquote><p>Você está começando uma jornada que o capacitará a reconhecer seus direitos, identificar práticas abusivas, e buscar reparação quando necessário. Este conhecimento é essencial para viver em sociedade com segurança.</p>'},
    {id:'cdca', name: 'Aplicação e Âmbito do Código', content:'<h4>Quando o CDC se Aplica?</h4><p>O CDC não se aplica a todas as relações comerciais. Você precisa entender quando exatamente ele entra em ação e quando outras leis regulam a situação.</p><p>Para que o CDC seja aplicável, é necessário que haja: (1) um consumidor; (2) um fornecedor; (3) uma relação de consumo (compra/serviço); (4) o fornecedor atua profissionalmente.</p><blockquote class="tip"><strong>Dica:</strong> Se você compra algo de um amigo em uma transação isolada, o CDC pode não se aplicar. Mas se compra de um comerciante, sim.</blockquote><p>Uma questão importante é a <strong>equidade contratual</strong>. O CDC protege principalmente o consumidor de relações assimétricas. Se duas empresas contratam entre si, o CDC pode não se aplicar, pois considera-se que ambas têm poder de negociação similar.</p><p>Existem exceções legais. Por exemplo, a Lei de Seguros regulamenta contratos de seguro, embora o CDC aplicável. Operações bancárias têm regulação específica do Banco Central. Planos de saúde têm a Lei nº 9.656/1998. Você deve conhecer essas exceções.</p><blockquote class="example"><strong>Exemplo:</strong> Uma construtora que vende imóvel para um consumidor final está sujeita ao CDC. Mas a venda de imóvel para investidor pode ter regras diferentes.</blockquote><p>O CDC se aplica retroativamente? Não. Ele rege fatos ocorridos após sua vigência. Porém, seus princípios inspiraram jurisprudência que protege consumidores em situações antigas.</p><blockquote class="quote"><strong>Regra importante:</strong> "O CDC se aplica a qualquer relação de consumo, independentemente de quando foi celebrada, se o dano ocorreu após sua vigência."</strong></blockquote><p>Compreender o âmbito do CDC permite que você identifique corretamente quando seus direitos estão protegidos e quando outras leis são aplicáveis.</p>'},
    {id:'cdpr', name: 'Princípios Fundamentais do CDC', content:'<h4>Os Pilares do Direito do Consumidor</h4><p>O CDC repousa sobre princípios fundamentais que orientam toda sua interpretação. Esses princípios são como as vigas mestras de um edifício: sustentam toda a estrutura.</p><p>O primeiro princípio é o da <strong>vulnerabilidade do consumidor</strong>. O CDC reconhece que o consumidor está em posição inferior na relação comercial. O fornecedor tem informação, poder econômico e acesso a recursos jurídicos que o consumidor não possui.</p><blockquote class="tip"><strong>Dica:</strong> A vulnerabilidade é presumida. Você não precisa provar que é fraco ou pobre para ser considerado vulnerável. A lei considera todo consumidor como vulnerável automaticamente.</blockquote><p>O segundo princípio é o da <strong>boa-fé</strong>. Tanto fornecedor quanto consumidor devem agir de forma honesta, transparente e com intenção genuína de cumprir suas obrigações. A boa-fé é exigida em todas as fases: contratação, execução e encerramento.</p><p>O terceiro princípio é o da <strong>responsabilidade objetiva do fornecedor</strong>. Isso significa que o fornecedor é responsável pelos danos causados ao consumidor, independentemente de culpa. Não importa se foi negligência ou imprudência: se causa dano, responde.</p><blockquote class="example"><strong>Exemplo:</strong> Se um alimento vencido causa envenenamento, o supermercado responde mesmo que o erro tenha sido do fornecedor do produto. A responsabilidade é do fornecedor final.</blockquote><p>O quarto princípio é o da <strong>informação clara e adequada</strong>. O fornecedor deve informar adequadamente sobre produtos e serviços, suas características, preço, prazos e riscos. Informação é poder, e o consumidor tem direito a ela.</p><blockquote class="quote"><strong>Princípio da transparência:</strong> "Toda informação relevante deve ser clara, precisa e em linguagem acessível ao consumidor médio."</strong></blockquote><p>Esses princípios não são apenas teóricos. Eles guiam decisões judiciais e são usados para interpretar leis quando há ambiguidade ou conflito de interesses.</p>'},
    {id:'cdor', name: 'Direitos e Deveres dos Envolvidos', content:'<h4>Obrigações Recíprocas na Relação de Consumo</h4><p>Toda relação de consumo envolve deveres para ambos os lados. Você tem direitos, mas também responsabilidades. Da mesma forma, o fornecedor tem obrigações.</p><p><strong>Direitos do consumidor:</strong> proteger-se contra produtos ou serviços perigosos; receber informações corretas e completas; ter qualidade e conformidade; exercer direito de arrependimento; requerer garantia; acessar o Judiciário; receber indenização por danos morais; dentre outros.</p><blockquote class="tip"><strong>Dica:</strong> Você tem 30 dias para se arrepender de compras realizadas fora do estabelecimento (compra telefônica, online, porta-a-porta). Isso é direito seu garantido por lei.</blockquote><p><strong>Deveres do consumidor:</strong> usar produtos conforme as instruções; pagar preços acordados; cumprir prazos; manter boa-fé nas reclamações; não fazer falsas denúncias; respeitar a privacidade do fornecedor.</p><p><strong>Direitos do fornecedor:</strong> receber pagamento conforme combinado; ser informado corretamente sobre pedidos; não sofrer calúnias; ter seus dados protegidos.</p><blockquote class="example"><strong>Exemplo:</strong> Se você compra um notebook online e se arrepende sem motivo, pode devolver nos 7 dias. Mas o notebook não pode ter sido usado intensamente ou danificado. Você deve cumprir condições razoáveis.</blockquote><p><strong>Deveres do fornecedor:</strong> informar claramente; entregar conforme contratado; responder por defeitos; honrar prazos de garantia; respeitar confidencialidade; manter qualidade constante.</p><blockquote class="quote"><strong>Dever fundamental:</strong> "O fornecedor responde pelos defeitos ou vícios do produto, mesmo que não seja culpado, desde que o produto seja colocado no mercado."</strong></blockquote><p>Compreender esses deveres e direitos permite que você tenha relacionamentos comerciais mais justos e saiba quando reclamar legitimamente.</p>'}

{
  id:1, name: 'Direitos Básicos do Consumidor', free:false,
  topics:[
    {id:'drbc', name: 'Direitos Básicos Enumerados na Lei', content:'<h4>Os 9 Direitos Fundamentais do Consumidor</h4><p>O artigo 6º do CDC enumera expressamente os direitos básicos do consumidor. Você deve conhecê-los profundamente, pois são a base para todas as outras proteções.</p><blockquote class="tip"><strong>Dica:</strong> Esses direitos são irrenunciáveis. Você não pode abrir mão deles voluntariamente por mais que o contrato diga o contrário.</blockquote><p><strong>1. Proteção contra práticas abusivas:</strong> Você tem direito de não sofrer práticas enganosas ou abusivas no mercado. Enganosa é aquela que induz ao erro sobre característica, qualidade ou preço. Abusiva é aquela que oferece perigo à saúde ou segurança.</p><p><strong>2. Informação adequada e clara:</strong> O fornecedor deve informar sobre quantidade, qualidade, composição, preço, prazos, origem, riscos e consequências. A informação deve ser em linguagem clara e acessível.</p><p><strong>3. Proteção contra cláusulas abusivas:</strong> Contratos não podem conter cláusulas que coloquem o consumidor em desvantagem exagerada, impossibilitem direitos ou concedam vantagens exageradas ao fornecedor.</p><blockquote class="example"><strong>Exemplo:</strong> Uma cláusula que diga "o consumidor abre mão de todos os direitos" é abusiva. Uma que diga "o fornecedor não responde por qualquer dano" também é abusiva.</blockquote><p><strong>4. Direito de arrependimento:</strong> Em compras distância, você tem 7 dias para se arrepender e devolverem o dinheiro. Esse direito é inafastável.</p><p><strong>5. Indenização por danos morais e patrimoniais:</strong> Se sofrer dano físico, moral ou patrimonial, pode requerer indenização. Não precisa estar gravemente ferido; ofensa à dignidade é suficiente.</p><blockquote class="quote"><strong>Direito garantido:</strong> "O consumidor tem direito à reparação por danos morais e patrimoniais, não sendo necessário comprovar prejuízo econômico concreto para o dano moral."</strong></blockquote><p><strong>6. Direito de acesso à Justiça:</strong> Você pode acessar órgãos de proteção, Procon, Ministério Público, Defensoria e Poder Judiciário para defender seus direitos. O acesso à justiça não pode ser negado.</p><p><strong>7. Direito à facilitação de defesa:</strong> Em processos judiciais, você tem direito a inversão do ônus da prova (em certos casos), acesso a informações do fornecedor, e apoio de órgãos de defesa.</p><blockquote class="tip"><strong>Dica:</strong> Se você é consumidor claramente em desvantagem e o fornecedor tem informação privilegiada, o juiz pode inverter o ônus da prova. Você não precisa provar; o fornecedor é que deve provar inocência.</blockquote><p><strong>8. Direito de participação em órgãos decisórios:</strong> Você pode participar de audiências públicas, consultas sobre políticas de defesa do consumidor, e influenciar decisões que afetam você.</p><p><strong>9. Direito à garantia:</strong> Todo produto vem com garantia legal mínima. O fornecedor responde por defeitos de fabricação e adequação ao uso esperado.</p>'},
    {id:'garn', name: 'Garantia Legal e Contratual', content:'<h4>Entendendo a Garantia do Consumidor</h4><p>A garantia é uma das proteções mais importantes do CDC. Você pode ter duas garantias: legal e contratual. Ambas protegem você de produtos defeituosos.</p><p><strong>Garantia legal:</strong> Automática e obrigatória. Todo produto duração mínima de 30 dias para produtos não duráveis e 90 dias para duráveis. Nesse período, se aparecer defeito de fabricação, você tem direito a reparo, troca ou devolução do dinheiro.</p><blockquote class="tip"><strong>Dica:</strong> A garantia legal não depende de você registrar o produto ou ter nota fiscal. Ela existe automaticamente. Mas guardar a nota fiscal é importante para prova.</blockquote><p>Qual é a diferença entre "defeito" e "vício"? No CDC, ambos os termos são usados como sinônimos. Defeito é quando o produto não atende ao esperado para seu tipo. Pode ser de fabricação (defeito oculto) ou de projeto (afeta todos os produtos dessa linha).</p><p><strong>Garantia contratual:</strong> Além da legal, fornecedor pode oferecer garantia estendida (exemplo: garantia de 2 anos para eletrônicos). Essa garantia contratual é adicional e não substitui a legal. Você pode invocar a que for melhor para você.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra smartphone com garantia legal de 90 dias e contratual de 12 meses. Se defeito aparece no 6º mês, você invoca a garantia contratual, pois ela é melhor. Se a contratual não cobrir, invoca a legal.</blockquote><p>Existe prazo para reclamar defeito? Sim. Você tem prazo para reclamar e o fornecedor tem prazo para resolver. Se não resolver em 30 dias, você tem direito a escolher entre reparo, troca ou devolução do dinheiro.</p><blockquote class="quote"><strong>Regra importante:</strong> "O fornecedor que não resolver defeito no prazo tem ônus de provar que o defeito ocorreu após a venda ou foi culpa do consumidor."</strong></blockquote><p>O que não está coberto por garantia? Uso inadequado, negligência do consumidor, desgaste natural, e danos por causa não relacionada ao defeito. Mas esses exclusões devem ser muito claras no contrato.</p>'},
    {id:'info', name: 'Direito à Informação e Transparência', content:'<h4>O Poder da Informação Clara e Completa</h4><p>A informação é o direito mais fundamental. Sem informação adequada, você não pode fazer escolhas conscientes. Por isso, o CDC exige que fornecedores informem claramente.</p><p>O que o fornecedor deve informar? <strong>Características essenciais</strong> do produto: composição, peso, tamanho, cores disponíveis, funcionalidades. <strong>Preço:</strong> valor total, parcelado, juros, taxas, descontos. <strong>Prazos:</strong> entrega, garantia, devolução. <strong>Riscos:</strong> se o produto é perigoso, deve avisar claramente.</p><blockquote class="tip"><strong>Dica:</strong> A informação deve ser em linguagem clara. Se você precisa de dicionário para entender, a linguagem não é clara e você pode ter direito à rescisão.</blockquote><p>Onde a informação deve estar? No rótulo, embalagem, propaganda, contrato. Se informação está em letra microscópica, em língua estrangeira, ou escondida, não é adequada. A Lei exige que informação seja "em destaque".</p><p>O que é propaganda enganosa? É aquela que induz consumidor ao erro sobre qualidade, quantidade, características, origem, preço ou benefício. Exemplo: dizer que roupa não desbota quando na verdade desvanece.</p><blockquote class="example"><strong>Exemplo:</strong> Publicidade de creme que promete "desaparecimento total de rugas em 7 dias" é enganosa. Nenhum creme consegue isso. O consumidor pode reclamar e pedir reparação.</blockquote><p>E se a informação está incompleta? Se o fornecedor não informar sobre aspecto relevante, você pode alegar que não tinha informação suficiente para contratar e pedir rescisão ou reparação.</p><blockquote class="quote"><strong>Transparência obrigatória:</strong> "Informação inadequada, insuficiente ou enganosa sobre produto ou serviço é prática abusiva que viola direito fundamental do consumidor."</strong></blockquote><p>Como você pode cobrar transparência? Enviando reclamação escrita ao fornecedor, registrando no Procon, ou processando judicialmente. Você pode até pedir que fornecedor publique retratação.</p>'},
    {id:'arep', name: 'Direito de Arrependimento e Devoluções', content:'<h4>Você Pode Mudar de Ideia? Direito de Arrependimento</h4><p>O direito de arrependimento é exclusivo de compras realizadas fora do estabelecimento do fornecedor. Se você comprou online, telefone, catálogo ou por vendedor porta-a-porta, tem direito de se arrepender.</p><blockquote class="tip"><strong>Dica:</strong> Não precisa dar razão para o arrependimento. Você pode se arrepender "sem justificativa". Este é um direito seu, não uma cortesia.</blockquote><p>Qual é o prazo? Você tem <strong>7 dias</strong> contados da contratação (no caso de compra online) ou da entrega (no caso de compra por correspondência). O prazo começa a contar do próximo dia útil.</p><p>O que fazer para exercer o direito? Você deve comunicar ao fornecedor por escrito sua vontade de se arrepender. Email, carta registrada, ou formulário de devolução servem. Alguns fornecedores têm link "devolver produto" no site.</p><blockquote class="example"><strong>Exemplo:</strong> Você comprou sapato online no dia 10 de abril. Tem até o dia 17 de abril para comunicar arrependimento. Se enviar email no dia 17, ainda vale. Se enviar no dia 18, perdeu o prazo.</blockquote><p>E o dinheiro de volta? Deve ser restituído em até 30 dias após comunicação de arrependimento. Se não devolver em 30 dias, você pode reclamar do fornecedor ou do Procon.</p><p>Qual é a sua obrigação? Você deve devolver o produto em estado normal de conservação. Se o produto foi usado intensamente, danificado ou desgastado, o fornecedor pode cobrar o desgaste razoável. Mas não pode cobrar desgaste por simples manuseio ou teste.</p><blockquote class="quote"><strong>Regra clara:</strong> "O consumidor tem direito a se arrepender de compra fora do estabelecimento no prazo de 7 dias, sem necessidade de justificativa, desde que devolva o produto em condições normais."</strong></blockquote><p>Existe exceção? Sim. Compras de serviços (que já foram prestados), alimentos perecíveis, medicamentos, bebidas alcoólicas (em alguns casos) não têm direito de arrependimento.</p>'}
  ],

{
  id:2, name: 'Compras Online e E-commerce', free:false,
  topics:[
    {id:'ecom', name: 'Características das Compras Eletrônicas', content:'<h4>O E-Commerce e Suas Particularidades Jurídicas</h4><p>As compras online têm características próprias que criam direitos e deveres específicos. Você compra sem ver o produto, sem poder tocar, e às vezes sem saber exatamente quem é o vendedor. O CDC foi adaptado para essa realidade.</p><p>Qual é a diferença legal entre compra online em site próprio e marketplace? No site próprio, você contrata diretamente com a empresa. No marketplace, você pode estar contratando com vendedor terceirizado, e a plataforma pode ter responsabilidade solidária.</p><blockquote class="tip"><strong>Dica:</strong> Mesmo em marketplace, a plataforma (Amazon, Mercado Livre, etc) pode ser responsabilizada junto com o vendedor por defeiços ou práticas abusivas.</blockquote><p>Qual é o momento da contratação? Em compra online, há oferta (site mostra produto), aceitação (consumidor clica "comprar"), confirmação de pedido (empresa confirma que recebeu). O contrato é formado quando a empresa confirma o pedido, não quando você clica "comprar".</p><p>O que é "compra a distância"? É aquela em que consumidor e fornecedor não estão face a face no momento da contratação. Online, telefone, catálogo, etc. Para essas compras, você tem direito de arrependimento de 7 dias.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra pelo site de uma loja de roupas no dia 10. A empresa confirma no dia 11. Você tem até dia 18 para se arrepender. Se mudar de ideia, envia email informando arrependimento e devove o produto.</blockquote><p>E a publicidade online? Banners, anúncios, vídeos no YouTube são todos publicidades. Se forem enganosos ou abusivos, você tem direito a reparação. O influenciador que faz publicidade enganosa também pode ser responsabilizado.</p><blockquote class="quote"><strong>Responsabilidade solidária:</strong> "Todos os responsáveis por publicidade enganosa (empresa, influenciador, rede social) podem ser responsabilizados solidariamente pelos danos causados."</strong></blockquote><p>Qual é o dever da plataforma? O Procon e órgãos de proteção vêm entendendo que plataformas de marketplace têm responsabilidade solidária. Se um vendedor não entrega, a plataforma pode ser responsabilizada também.</p>'},
    {id:'entr', name: 'Entrega, Prazos e Responsabilidades', content:'<h4>Você Tem Direito a Receber o Que Comprou, no Prazo Acertado</h4><p>A entrega é parte crítica da compra online. Se produto não chega, ou chega danificado, ou chegou diferente, você tem direitos. Vamos entender como funciona responsabilidade de entrega.</p><p>Quem é responsável pela entrega? Depende. Se o fornecedor usa sua própria logística, é responsável. Se usa transportadora terceirizada, pode ser responsabilidade compartilhada. Mas para você, consumidor, o fornecedor é responsável por garantir entrega.</p><blockquote class="tip"><strong>Dica:</strong> Se o produto chegar danificado, você pode recusar e exigir novo envio. Se recebeu e depois danificou, você é responsável (salvo defeito de fábrica oculto).</blockquote><p>Qual é o prazo de entrega? O que constar no contrato. Se o site diz "entrega em até 15 dias", essa é a obrigação. Se não entregar em 15 dias, é inadimplência e você pode cancelar e pedir devolução do dinheiro.</p><p>Se o prazo passou, o que você pode fazer? Primeiro, avise o fornecedor por escrito (email conta). Dê prazo de 7 dias para entrega. Se não entregar, você pode cancelar compra e pedir reembolso. Se perdeu dinheiro por atraso, pode pedir indenização por danos morais.</p><blockquote class="example"><strong>Exemplo:</strong> Você comprou smartphone "com entrega em até 10 dias". Passaram 20 dias e nada. Envia email ao fornecedor fixando 7 dias de prazo. Se não entregar, envia nova mensagem cancelando compra e exigindo reembolso imediato com juros de mora.</blockquote><p>E se o produto chegou diferente? Se chegou cor diferente, tamanho errado, ou é outro modelo, você tem direito de devolução sem custos. Você não aceitou aquele produto específico.</p><blockquote class="quote"><strong>Regra essencial:</strong> "Fornecedor responde por atraso na entrega e por entrega de produto diferente do contratado. Consumidor pode cancelar se não cumprir prazos."</strong></blockquote><p>E custos de devolução? Se product chegou errado ou defeituoso, o fornecedor deve arcar com custo de devolução. Se você se arrependeu, o fornecedor pode cobrar devolução (exceto em casos de fornecedor cobrar "taxa de devolução exagerada").</p>'},
    {id:'segs', name: 'Segurança, Dados e Privacidade', content:'<h4>Seus Dados Estão Protegidos em Compras Online</h4><p>Quando você compra online, fornece dados pessoais: nome, endereço, email, telefone. Em compras com cartão de crédito, fornece dados bancários. Esses dados devem ser protegidos por lei.</p><p>Qual é a lei de proteção de dados? A LGPD (Lei Geral de Proteção de Dados, Lei 13.709/2018). Ela exige que empresas protejam seus dados pessoais com segurança adequada, e que usem seus dados apenas para fins informados.</p><blockquote class="tip"><strong>Dica:</strong> Você tem direito de saber que dados a empresa tem sobre você, para que servem, e pode pedir apagamento se dados não forem mais necessários.</blockquote><p>O que fazer se seus dados foram vazados? Você pode reclamar à empresa, ao Procon, à Autoridade Nacional de Proteção de Dados (ANPD), e processar por danos morais. Vazar dados é violação grave que causa dano moral.</p><p>E segurança do site? O site deve usar HTTPS (você vê "cadeado" na URL), ter certificado de segurança, e proteger dados em transmissão. Se o site não tem HTTPS, é sinal de alerta: não compre.</p><blockquote class="example"><strong>Exemplo:</strong> Você comprou em site que não tinha HTTPS, seu número de cartão foi roubado, e fraudadores fizeram compras. Você pode pedir ao banco que não pague as fraudes, e processar o site por negligência em segurança.</blockquote><p>O que é fraude online? Quando alguém usa seus dados ou cartão para fazer compras não autorizadas. Se descobrir fraude, contate banco ou operadora de cartão imediatamente. Você tem proteção por lei.</p><blockquote class="quote"><strong>Proteção contra fraude:</strong> "Você não é responsável por transações não autorizadas em seu cartão, desde que comunique o banco com rapidez. O banco é responsável por verificar fraude."</strong></blockquote><p>E cookies? Sites podem coletar dados via cookies (pequenos arquivos que rastreiam você). Você tem direito de ser informado sobre cookies e consentir ou recusar. Se o site coleta cookies sem consentimento claro, está violando direitos.</p>'},
    {id:'clar', name: 'Direitos Específicos em E-Commerce', content:'<h4>Proteções Especiais para Comprador Online</h4><p>Porque compras online têm características próprias, existem proteções especiais para você. Você não pode ver o produto, não pode testar, não sabe exatamente para onde está mandando dinheiro. Por isso, lei é mais protetora.</p><p><strong>Direito de informação reforçado:</strong> Site deve informar claramente: quantidade mínima de informação sobre produto (descrição, imagens, características), preço total (incluindo frete, impostos, taxas), prazos de entrega, política de devolução, dados de contato da empresa.</p><blockquote class="tip"><strong>Dica:</strong> Se o site não tem informação clara de quem é a empresa (nome, CNPJ, endereço, telefone), é sinal de alerta. Essa é informação obrigatória.</blockquote><p><strong>Direito de arrependimento garantido:</strong> Como você compra sem ver/tocar, tem 7 dias para se arrepender. Isso é inafastável. Site não pode dizer "sem direito de arrependimento" em compra online.</p><p><strong>Responsabilidade pela entrega:</strong> A plataforma/fornecedor é responsável por garantir que produto chegue conforme contrato. Se não chega, chega errado, ou danificado, você tem direito à reparação.</p><blockquote class="example"><strong>Exemplo:</strong> Site de moda vende vestido preto "tamanho P". Você recebe tamanho M. Você se recusa a receber (pode recusar na entrega) ou devolve. Tem direito a novo envio do tamanho correto ou devolução do dinheiro sem custos.</blockquote><p><strong>Responsabilidade solidária do marketplace:</strong> Se você comprar em marketplace (tipo Amazon, Mercado Livre), você pode processar tanto o vendedor quanto a plataforma. Ambas são solidariamente responsáveis por defeitos, atrasos, informações enganosas.</p><blockquote class="quote"><strong>Solidariedade obrigatória:</strong> "Marketplace e vendedor terceirizado são solidariamente responsáveis por cumprimento de obrigações contratuais e reparação de danos ao consumidor."</strong></blockquote><p>Qual é o melhor caminho para reclamar? Primeira tente com o vendedor/plataforma via email ou chat. Se não resolver, acione Procon, que pode mediar. Se Procon não resolver, você pode processar judicialmente.</p>'}
  ],

  quizzes:[
    {q:'Se vendedor em marketplace não entrega, você pode cobrar da plataforma?', opts:['Não, responsabilidade é apenas do vendedor','Sim, plataforma é solidariamente responsável','Depende do contrato com a plataforma','Apenas se comprou com parcelamento'], correct:1},

  summary:{title:'Resumo do Módulo 2: E-Commerce', points:['Compras online têm características próprias: contrato forma-se na confirmação do pedido, não no clique; você tem direito de arrependimento de 7 dias em todas as compras eletrônicas','Fornecedor e plataforma (marketplace) são solidariamente responsáveis por entrega conforme contrato, e você pode recusar/devolver se produto chegar errado ou danificado','Seus dados pessoais são protegidos pela LGPD; você tem direitos sobre coleta de dados e pode reclamar por vazamento','Sites devem informar claramente: identificação da empresa, características do produto, preço total, prazos de entrega e política de devolução']},

{
  id:3, name: 'Serviços (Bancos, Telecom, Saúde)', free:false,
  topics:[
    {id:'serv', name: 'Características Particulares de Serviços', content:'<h4>Serviços Não São Produtos: Proteções Diferentes</h4><p>Quando você contrata um serviço (banco, telefone, internet, saúde, hotel), a relação é diferente de comprar um produto. Serviço é algo intangível, prestado ao longo do tempo. Por isso, CDC adaptou proteções para serviços.</p><p>Qual é a diferença entre serviço e produto? Produto é coisa tangível: sapato, alimento, carro. Serviço é intangível: educação, saúde, banco. Quando você contrata serviço, seu direito de arrependimento é limitado (porque o serviço já está sendo prestado).</p><blockquote class="tip"><strong>Dica:</strong> Se você contrata consultoria ou aula online, não tem direito de se arrepender após aula realizada. Mas pode rescisdir o contrato para futuro.</blockquote><p>O que é qualidade de serviço? Adequação às necessidades do consumidor, cumprimento de prazos, respeito a informações prometidas, competência profissional. Se serviço não atende essas dimensões, é deficiente.</p><p>Qual é a responsabilidade do prestador? Responsabilidade objetiva. Se seu serviço causa dano (exemplo: cirurgião erra durante operação), você pode requerer indenização sem necessidade de provar culpa.</p><blockquote class="example"><strong>Exemplo:</strong> Você contrata encanador para consertar vazamento. Ele deixa buracos na parede sem consertar direito. Você pode exigir reparação dos buracos e indenização por dano patrimonial, sem necessidade de provar negligência.</blockquote><p><strong>Informação em serviços:</strong> Prestador deve informar claramente: descrição do serviço, prazo de execução, preço total (com todas as taxas), condições de cancelamento, garantia. Se usar técnicas invasivas (cirurgia, implante), deve informar riscos.</p><blockquote class="quote"><strong>Consentimento informado:</strong> "Em serviços de saúde, você deve ser informado sobre procedimento, riscos, benefícios e alternativas. Consentimento sem informação é inválido."</strong></blockquote><p>E contratos de serviço? Devem ser claros, sem cláusulas abusivas. Condições contraditórias (exemplo: "não há garantia", quando lei exige) são nulas. Você pode questionar qualquer condição injusta.</p>'},
    {id:'banc', name: 'Serviços Bancários e Financeiros', content:'<h4>Proteção do Consumidor em Operações Bancárias</h4><p>Serviços bancários têm regulação dupla: CDC e resoluções do Banco Central. O Banco Central estabelece regras específicas para bancos, enquanto CDC fornece proteção geral ao consumidor.</p><p>Qual é o direito principal em serviço bancário? Clareza sobre taxas, prazos, e condições. Banco deve informar: juros cobrados, taxa de abertura de conta (se houver), juros de mora, multa por atraso, custos de serviços.</p><blockquote class="tip"><strong>Dica:</strong> Você tem direito de consultar seu histórico de operações, extratos, e exigir explicação sobre qualquer cobrança que não entender.</blockquote><p>O que é taxa bancária abusiva? Taxa extremamente alta em relação ao custo real do serviço, ou cobrança de serviço não solicitado. Exemplo: banco cobrar "taxa de anuidade" de conta sem oferecer benefício.</p><p>Fraude bancária é responsabilidade de quem? Se alguém usa sua conta ou cartão fraudulentamente, banco é responsável por não detectar fraude óbvia. Você não é responsável por transação não autorizada se comunicou o banco com rapidez.</p><blockquote class="example"><strong>Exemplo:</strong> Seu cartão foi clonado e fraudadores fizeram 5 compras no Rio de Janeiro enquanto você estava em São Paulo. Você contata banco informando. Banco deve devolver aquelas transações e não cobrar você.</blockquote><p>E juros em financiamento? Banco deve informar Taxa Efetiva Anual (TEA). Se a taxa for extremamente alta e o cliente for hipossuficiente (ganhar pouco), pode ser considerada abusiva. Você pode requerer revisão dos juros.</p><blockquote class="quote"><strong>Transparência obrigatória:</strong> "Banco deve informar claramente a Taxa Efetiva Anual (TEA) antes de financiamento. Ocultação da taxa é prática abusiva."</strong></blockquote><p>Qual é seu direito se banco cometeu erro? Se banco debitou valor errado, você tem direito a restituição imediata com correção monetária e juros. Se houve dano moral (exemplo: seu nome foi incluído em cadastro de inadimplentes por erro do banco), pode reclamar indenização.</p>'},
    {id:'tele', name: 'Telecomunicações e Internet', content:'<h4>Seus Direitos na Telefonia, Internet e Televisão</h4><p>Serviços de telecom têm características próprias: você contrata com fornecedor de telecomunicações que usa infraestrutura cara, regulada pela ANATEL (Agência Nacional de Telecomunicações).</p><p>Qual é o direito principal? Qualidade de serviço. Se você contrata internet de 100 Mbps, deve receber velocidade razoavelmente próxima. Se recebe 10 Mbps consistentemente, é deficiência de serviço.</p><blockquote class="tip"><strong>Dica:</strong> Você tem direito de testar velocidade de internet usando sites como Speedtest. Se velocidade é significativamente inferior, pode reclamar e pedir redução de preço ou rescisão.</blockquote><p>O que é "queda de serviço"? Quando o serviço fica indisponível (internet cai, telefone não funciona, TV não transmite). Operadora tem responsabilidade de manter serviço estável. Quedas frequentes são deficiência.</p><p>Se internet cai e você trabalha de casa? Se cair com frequência e causa prejuízo (você perde trabalho, clientes, renda), pode reclamar por danos morais e patrimoniais. Não é apenas inconveniente; é prejuízo real.</p><blockquote class="example"><strong>Exemplo:</strong> Você é freelancer e internet contratada cai 3 vezes por semana. Você perde clientes por indisponibilidade. Pode processar operadora por danos patrimoniais (renda perdida) além de morais.</blockquote><p>Qual é o direito de cancelamento? Você pode cancelar contrato de telecom a qualquer momento, desde que pague multa contratual (se houver). Multa só é válida se proporcional, não exagerada. Multa de 12 meses de assinatura é abusiva.</p><blockquote class="quote"><strong>Regra de proporcionalidade:</strong> "Multa contratual por cancelamento deve ser proporcional ao tempo restante de vigência. Multa exagerada é abusiva e pode ser reduzida judicialmente."</strong></blockquote><p>E erros na cobrança? Operadora pode cobrar errado (cobrar serviço não contratado, duplicar cobrança, etc). Se descobrir cobrança indevida, conteste imediatamente. Operadora deve comprovar legitimidade ou devolver.</p>'},
    {id:'saud', name: 'Serviços de Saúde', content:'<h4>Proteção do Consumidor em Saúde: Direitos Especiais</h4><p>Saúde é direito fundamental. Quando você usa serviço de saúde (consulta, cirurgia, internação), tem proteções especiais além do CDC: Código de Ética Médica, Lei de Planos de Saúde (nº 9.656/1998), e protocolos de qualidade.</p><p>Qual é o direito principal em saúde? Profissional competente e informado. Médico deve ter registro no CRM, especialização adequada. Você tem direito de exigir qualificação do profissional e segunda opinião.</p><blockquote class="tip"><strong>Dica:</strong> Você tem direito de solicitar currículo/histórico do médico antes de cirurgia. Se nunca fez aquele tipo de cirurgia, você pode recusar e buscar outro profissional.</blockquote><p>O que é consentimento informado em saúde? O profissional deve explicar: qual é o procedimento, por que é necessário, quais são os riscos, quais são as alternativas de tratamento. Você só concorda após entender tudo. Consentimento forçado ou sem informação é inválido.</p><p>Se houve erro médico, qual é sua responsabilidade? Profissional responde por erro que qualquer profissional competente não cometeria. Não basta dizer "cometi erro"; ele deve ser erro grosseiro, fora do padrão profissional.</p><blockquote class="example"><strong>Exemplo:</strong> Cirurgião erra durante operação (por exemplo, corta órgão adjacente). Isso é erro grosseiro. Profissional é responsável. Se operação resulta em complicação que mesmo profissional experiente enfrentaria, pode não ser erro.</blockquote><p>E planos de saúde? Planos têm lei própria (Lei nº 9.656/1998) e devem cumprir: cobertura mínima de procedimentos, não recusar internação, não discriminar por idade ou doença. Se plano nega cobertura indevida, você pode reclamar.</p><blockquote class="quote"><strong>Proteção especial:</strong> "Plano de saúde que nega cobertura de procedimento coberto pelo contrato comete prática abusiva e está sujeito a multas do Procon."</strong></blockquote><p>Como reclamar em saúde? Primeiro, com o profissional/instituição. Se não resolver, pode acionar Procon, Conselho Profissional (CRM para médicos), ou Justiça. Pode também notificar Ministério Público se houver crime.</p>'}
  ],
  flashcards:[
    {q:'Qual é a diferença entre qualidade de serviço e defeito de serviço?', a:'Qualidade refere-se ao atendimento das expectativas; defeito é o não cumprimento de promessas contratadas.'},
    {q:'Você tem direito de arrependimento em serviço já prestado?', a:'Não. Direito de arrependimento não se aplica a serviços já realizados, apenas a contratos futuros.'},

{
  id:4, name: 'Práticas Abusivas e Enganosas', free:false,
  topics:[
    {id:'absu', name: 'O que Caracteriza Prática Abusiva?', content:'<h4>Identificando Comportamentos Ilegais do Fornecedor</h4><p>O CDC proíbe "práticas abusivas": aquelas que oferecem perigo à saúde ou segurança do consumidor, violam seus direitos fundamentais, ou colocam consumidor em desvantagem exagerada. Você precisa reconhecer essas práticas para se defender.</p><p>Qual é a lista de práticas abusivas proibidas? O CDC enumera expressamente: condicionar acesso a produto à compra de outro; recusar atendimento; exigir pagamento de serviço não solicitado; aumentar preço após contratação; usar força, coação, intimidação; explorar medo ou superstição.</p><blockquote class="tip"><strong>Dica:</strong> Se você sente que está sendo tratado injustamente ou coagido a fazer algo que não quer, pode ser prática abusiva. Documentes (salve emails, mensagens, faça gravações quando legal).</blockquote><p>O que é "condicionar acesso"? Quando fornecedor diz "compra este produto opcional para receber este que quer". Exemplo: "só posso vender plano de saúde se você contrata seguro de vida também" é abusivo.</p><p>O que é "coação"? Ameaçar, intimidar, ou usar força para o consumidor aceitar condição prejudicial. Exemplo: vendedor ameaçar registrar seu nome em órgão de inadimplência se não pagar taxa ilegal é coação.</p><blockquote class="example"><strong>Exemplo:</strong> Gerente de banco informa que se você não contratar serviço de proteção de cartão, sua conta será fechada. Isso é coação e prática abusiva. Você pode reclamar e pedir indenização.</blockquote><p>O que é "aproveitamento de vulnerabilidade"? Exploração de vulnerabilidade psicológica, econômica ou educacional do consumidor para induzi-lo a decidir que prejudica. Exemplo: vender medicamento inútil para idoso isolado por telefone é abusivo.</p><blockquote class="quote"><strong>Proibição clara:</strong> "Toda prática que se aproveita de vulnerabilidade do consumidor para induzi-lo a prática prejudicial é abusiva e nula."</strong></blockquote><p>Como você prova prática abusiva? Documentação é essencial. Guarde emails, SMS, gravações (onde legal), prints de mensagens. Faça reclamação escrita ao fornecedor. Se não resolver, procure Procon com documentação.</p>'},
    {id:'enga', name: 'Publicidade Enganosa e Sua Responsabilidade', content:'<h4>Propaganda que Engana é Ilegal e Gera Indenização</h4><p>Publicidade enganosa é aquela que induz consumidor ao erro sobre qualidade, quantidade, características, origem, preço ou benefício do produto. Se você foi enganado por propaganda, tem direitos.</p><p>Qual é a diferença entre propaganda enganosa e apenas exagerada? Exagero dentro de limites (exemplo: "melhor sabonete do mercado") é publicidade puff. Mas informação falsa (exemplo: "sabonete cura dermatite") é enganosa se não é comprovada cientificamente.</p><blockquote class="tip"><strong>Dica:</strong> Se a propaganda promete benefício milagroso (emagrecimento, cura de doença), exija comprovação. Sem comprovação científica, é enganosa.</blockquote><p>Quem é responsável por propaganda enganosa? Fornecedor é responsável. Mas também é responsável o veículo que publica (jornal, internet, TV), a agência que cria, o influenciador que promove. Todos podem ser responsabilizados solidariamente.</p><p>O que fazer se propaganda enganou você? Primeiro, documentes (tire prints, copie URL, guarde embalagem). Depois, reclame ao fornecedor mostrando falsidade. Depois, acione Procon. Se tiver danos (comprou por engano), pode processar por indenização.</p><blockquote class="example"><strong>Exemplo:</strong> Você comprou creme anti-rugas que propaganda diz "remove rugas em 7 dias". Depois de uma semana, nenhuma melhora. Isso é propaganda enganosa. Você pode devolver, pedir reembolso, e processar por danos morais (frustração).</blockquote><p>E influenciadores? Se influenciador faz propaganda enganosa (exemplo: promove produto milagroso sem comprovar), é responsável solidariamente com fornecedor. Você pode processar influenciador também.</p><blockquote class="quote"><strong>Responsabilidade solidária:</strong> "Fornecedor, agência, veículo e influenciador são todos solidariamente responsáveis por propaganda enganosa. Consumidor pode processar qualquer um ou todos."</strong></blockquote><p>Qual é a indenização? Você pode receber dinheiro de volta (preço do produto), danos patrimoniais (se teve prejuízo concreto) e danos morais (frustração, constrangimento por engano).</p>'},
    {id:'clab', name: 'Cláusulas Abusivas em Contratos', content:'<h4>Protegendo-se Contra Condições Injustas nos Contratos</h4><p>Contrato pode conter cláusula que coloca consumidor em desvantagem exagerada ou que viola direitos. Essas cláusulas são nulas e não obrigam você a cumprir.</p><p>Qual é a lista de cláusulas abusivas? CDC enumera: anulação de direitos; impossibilidade de ressarcimento; indenização absurda; transferência de ônus do fornecedor ao consumidor; aumento unilateral de preço; renúncia a direitos; não-responsabilidade por defeitoso.</p><blockquote class="tip"><strong>Dica:</strong> Se contrato diz "sem direito de reclamação" ou "renuncia ao CDC", essa cláusula é nula. Você não pode renunciar direitos fundamentais por mais que assine.</blockquote><p>O que é "modificação unilateral de preço"? Quando contrato permite que fornecedor aumente preço quando quiser, sem limitação. Exemplo: "o preço será ajustado mensalmente conforme decisão da empresa" é abusiva.</p><p>E contratos com letras miúdas? Se cláusula importante está em letras microscópicas ou em documento em português difícil, pode ser considerada abusiva por falta de transparência. Lei exige que informações importantes sejam legíveis.</p><blockquote class="example"><strong>Exemplo:</strong> Contrato de financiamento tem taxa de juros na segunda página em letra 6pt. Isso é abusivo por falta de destaque. Você pode questionar a validade da cláusula.</blockquote><p>Como você invalida cláusula abusiva? Questionando em juízo, ou por reclamação ao Procon que pode determinar nulidade. Uma vez nula, cláusula abusiva não obriga ninguém.</p><blockquote class="quote"><strong>Nulidade automática:</strong> "Cláusulas abusivas são nulas de pleno direito, independentemente de contestação. Você não precisa ir a juízo para não cumprir; elas são automaticamente inválidas."</strong></blockquote><p>Exemplo de cláusulas válidas vs abusivas: "produto tem garantia de 12 meses" é válida. "Produto não tem qualquer garantia" é abusiva. "Consumidor paga frete" é válida. "Consumidor paga frete e retorno sem limitação" pode ser abusiva.</p>'},
    {id:'recl', name: 'Seu Direito de Reclamar e Ser Ouvido', content:'<h4>Mecanismos Legais para Reclamar de Práticas Abusivas</h4><p>Você tem direito de reclamar de qualquer prática abusiva. Lei oferece vários caminhos: reclamação ao fornecedor, Procon, Ministério Público, órgãos setoriais, Judiciário. Escolha o que funciona melhor para você.</p><p><strong>Reclamação ao fornecedor:</strong> Primeiro passo. Envie reclamação clara por escrito (email, carta registrada) descrevendo o problema, anexando provas, e pedindo solução. Dê prazo de 10 dias. Se não responder, passe para próximo passo.</p><blockquote class="tip"><strong>Dica:</strong> Nomeie-se em reclamação escrita. Não verbal. Fornecedor deve comprovar que recebeu e respondeu. Email com confirmação de leitura é bom.</blockquote><p><strong>Procon (Procuradoria do Consumidor):</strong> Órgão público de proteção do consumidor. Existe no estado e município. Você registra reclamação, Procon notifica fornecedor, mediam tentativa de acordo, e se não resolver, Procon multa fornecedor.</p><p><strong>Ministério Público:</strong> Se prática abusiva prejudica consumidor de forma coletiva (afeta muitos), pode processar civilmente procurando reparação geral. Você também pode notificar MP que investigará.</p><blockquote class="example"><strong>Exemplo:</strong> Operadora telefônica cobra taxa indevida de milhões de clientes. Ministério Público pode processar operadora em ação coletiva exigindo devolução de valores.</blockquote><p><strong>Judiciário:</strong> Você pode processar fornecedor buscando anulação de cláusula abusiva, devolução do dinheiro, ou indenização por danos. Pode usar Justiça Ordinária (ação comum) ou Pequenas Causas (se valor é pequeno).</p><blockquote class="quote"><strong>Direito de acesso:</strong> "Você tem direito de acessar Judiciário sem necessidade de advogado em causas de até R$ 20 mil (Pequenas Causas). Acima disso, precisa de advogado ou Defensoria Pública."</strong></blockquote><p>Qual é a melhor estratégia? Documentes tudo (screenshots, emails, fotos, gravações onde legal). Reclame por escrito ao fornecedor com prazo. Se não resolver, vá ao Procon. Se Procon não resolver em prazo razoável, processe.</p>'}
  ],

  summary:{title:'Resumo do Módulo 4: Práticas Abusivas', points:['Práticas abusivas são comportamentos que oferecem perigo à saúde/segurança, violam direitos ou colocam consumidor em desvantagem exagerada; incluem coação, condicionar acesso, cobrar indevido, aproveitamento de vulnerabilidade','Propaganda enganosa induz ao erro sobre qualidades/benefício; fornecedor, agência, veículo e influenciador são solidariamente responsáveis; você pode exigir devolução do dinheiro e indenização','Cláusulas abusivas (sem garantia, aumento unilateral, renúncia a direitos) são nulas de pleno direito; você não é obrigado a cumprir e pode questionar sua validade','Reclamar: primeiro ao fornecedor por escrito, depois Procon, depois Judiciário; documente tudo para comprovar abusividade']},

{
  id:5, name: 'Procon e Mecanismos de Defesa', free:false,
  topics:[
    {id:'proc', name: 'Procon: Órgão de Proteção do Consumidor', content:'<h4>Conhecendo a Procuradoria de Proteção ao Consumidor</h4><p>Procon é órgão público responsável pela defesa do consumidor. Existem Procuradoria no nível federal (Senacon) e estaduais/municipais. Você pode reclamar ao Procon de qualquer prática abusiva e produto defeituoso.</p><p>Qual é a estrutura do Procon? Senacon (Secretaria Nacional do Consumidor) no nível federal coordena política nacional. Cada estado tem Procon estadual. Alguns municípios têm Procon municipal. Todos trabalham juntos.</p><blockquote class="tip"><strong>Dica:</strong> Procure o Procon mais próximo: municipal primeiro (mais rápido), depois estadual. Ambos têm poder para agir.</blockquote><p>O que o Procon pode fazer? Receber reclamação, notificar fornecedor, mediar acordo, fazer inspeção, aplicar multa, determinar publicação de retratação, cancelar publicidade enganosa, e encaminhar ao Ministério Público.</p><p>Como registrar reclamação no Procon? Presencialmente (vá ao escritório), por telefone, email, ou site. Você fornece: seu nome e contato, identificação do fornecedor, descrição do problema, cópia de comprovantes (nota fiscal, contrato, fotos). Sem custos.</p><blockquote class="example"><strong>Exemplo:</strong> Você comprou TV que parou de funcionar em 45 dias (fora da garantia de 90 dias, mas defeitosa). Vai ao Procon, registra reclamação com nota fiscal e fotos. Procon notifica loja. Loja oferece reparo ou troca, e Procon registra que resolveu.</blockquote><p>Qual é o poder de multa do Procon? Procon pode multar fornecedor por violação do CDC. Valor varia conforme gravidade e capacidade econômica da empresa. Multa pode ser de centenas a milhões de reais.</p><blockquote class="quote"><strong>Autoridade legal:</strong> "Procon tem poder de polícia administrativa para exigir cumprimento do CDC, notificar, multar e suspender atividades de fornecedor."</strong></blockquote><p>E se Procon não resolve? Você pode processar fornecedor judicialmente com base na documentação do Procon. A reclamação no Procon não impede ação judicial; é caminho adicional.</p>'},
    {id:'judi', name: 'Caminhos Judiciais para Defesa', content:'<h4>Processando Fornecedor em Tribunal</h4><p>Se Procon não resolve ou demora, você pode processar o fornecedor judicialmente. Existem dois caminhos: Pequenas Causas (para valores até R$ 20 mil aproximadamente) e Justiça Ordinária (sem limite).</p><p><strong>Pequenas Causas:</strong> Processo simples, rápido, sem necessidade de advogado. Você compara reclamação no tribunal mesmo (fórum). Pode usar formulário padrão. Audiência acontece em poucas semanas, sentença em até 3 meses.</p><blockquote class="tip"><strong>Dica:</strong> Pequenas Causas é ótimo para problema com compra de produto, defeito, entrega. Se valor é pequeno (menos de R$ 20 mil), use Pequenas Causas, não vale a pena contratar advogado.</blockquote><p><strong>Justiça Ordinária:</strong> Você precisa de advogado (ou Defensoria se ganhar pouco) para processar. Processo é mais complexo, dura de 2 a 5 anos. Recomendado para valores altos ou casos complexos.</p><p>O que você precisa para processar? Provas (nota fiscal, fotos, prints, emails, cópias de contrato), cálculo de dano (quanto você quer receber), e identificação do fornecedor (endereço, CNPJ). Isso é suficiente para começar processo.</p><blockquote class="example"><strong>Exemplo:</strong> Você quer processar Amazon por atraso de 3 meses em entrega. Tem nota fiscal mostrando compra, email de confirmação, comprovante que não chegou. Você quer devolução do dinheiro + R$ 500 de danos morais. Isso é suficiente para ação em Pequenas Causas.</blockquote><p>Quanto custa processar? Pequenas Causas: taxa judicial pequena (varia por estado, normalmente R$ 50-300). Justiça Ordinária: taxa maior + honorários de advogado (normalmente 20-30% do valor ganho). Defensoria é gratuita para quem ganhar pouco.</p><blockquote class="quote"><strong>Acesso à justiça:</strong> "Você tem direito de acessar Judiciário. Se ganha pouco, pode usar Defensoria Pública gratuitamente. Se ganha mais, há Pequenas Causas (sem advogado) e Justiça Ordinária (com advogado)."</strong></blockquote><p>Qual é a taxa de sucesso? Em Pequenas Causas, se você tem documentação clara, taxa de sucesso é alta (70-80%). Em Justiça Ordinária, depende mais da complexidade e argumentação de advogado.</p>'},
    {id:'defe', name: 'Defensoria Pública e Assessoria Jurídica', content:'<h4>Ajuda Jurídica Gratuita Quando Você Não Pode Pagar</h4><p>Se você não pode pagar advogado, pode usar Defensoria Pública gratuitamente. Defensoria é órgão público que oferece assistência jurídica a quem não tem recursos.</p><p>Qual é o requisito para usar Defensoria? Ter renda até 3 salários mínimos (aproximadamente, varia por estado). Você comprova renda com contracheque, declaração ou documentos. Defensoria avalia se você se qualifica.</p><blockquote class="tip"><strong>Dica:</strong> Procure Defensoria de seu estado. Eles oferecem consultoria gratuita, e se precisar de processo, designam defensor para acompanhar.</blockquote><p>O que Defensoria pode fazer? Consulta jurídica (tirar dúvidas), elaboração de documentos, defesa em processos, negociação com fornecedor, acionar Procon. Cobertura completa de defesa jurídica.</p><p>E OAB (Ordem dos Advogados)? OAB oferece programa de assistência jurídica comunitária em alguns estados, onde advogados voluntários atendem gratuitamente. Procure OAB de seu estado.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 3 mil, foi enganado em compra e perdeu R$ 5 mil. Procura Defensoria, comprova renda, obtém defensor gratuitamente que reivindica seus direitos judicialmente.</blockquote><p>E mediação? Muitos tribunais oferecem mediação gratuita antes de processo. Mediador independente ajuda você e fornecedor a chegar a acordo. Se acordo é feito, processo termina rápido sem custos.</p><blockquote class="quote"><strong>Alternativa ao processo:</strong> "Mediação gratuita pode resolver conflito em semanas em vez de anos, com custos mínimos para ambas as partes."</strong></blockquote><p>Como encontrar advogado particular? Procure recomendação, compare preços, verifique se tem experiência em direito do consumidor. Muitos oferecem consulta inicial gratuita. Acerte o valor de honorários antes de contratar.</p>'},
    {id:'cole', name: 'Ações Coletivas e Defesa de Grupo', content:'<h4>Quando o Problema Afeta Muitos, a Defesa é Coletiva</h4><p>Se prática abusiva prejudica muitos consumidores (milhares de clientes de banco, usuários de produto com defeito de fábrica), pode haver ação coletiva onde o direito de todos é defendido em único processo.</p><p>Qual é a diferença entre ação individual e coletiva? Individual: você processa fornecedor por seu prejuízo específico. Coletiva: Ministério Público, OAB ou associação de consumidores processa fornecedor em nome de todos os prejudicados.</p><blockquote class="tip"><strong>Dica:</strong> Se sabe de ação coletiva que pode beneficiá-lo, procure informações no Ministério Público ou site de associação de consumidores de seu estado.</blockquote><p>Como você participa de ação coletiva? Normalmente, você apenas espera resultado. Uma vez sentença favorável é prolatada, você se registra para receber valor que lhe é devido. Sem custos para participar.</p><p>Qual é a vantagem? Ação coletiva pode recuperar valores para milhares de pessoas. Exemplo: banco devolveu R$ 1 bilhão a clientes em ação coletiva por cobrança indevida. Você se registra e recebe sua parte.</p><blockquote class="example"><strong>Exemplo:</strong> Operadora telefônica cobrou taxa indevida de 2 milhões de clientes durante 10 anos. Ministério Público processa operadora, ganha, e operadora é obrigada a devolver. Você se registra e recebe sua parte.</blockquote><p>Qual é o órgão que move ação coletiva? Ministério Público (Federal ou Estadual) em nome da sociedade, OAB em defesa da profissão, ou associação de consumidores legitimada. Você não precisa fazer nada além de estar ciente.</p><blockquote class="quote"><strong>Poder público:</strong> "Ministério Público tem poder legal de defender direitos difusos e coletivos (aqueles que pertencem a muitos), mesmo sem autorização individual de cada consumidor."</strong></blockquote><p>Como você fica sabendo de ação coletiva? Jornal, TV, internet, comunicação do órgão público, site de Ministério Público ou sindicatos. Procure "ação coletiva consumidor" no Google com nome do fornecedor.</p>'}
  ],

  id:6, name: 'Jurisprudência e Tendências', free:false,
  topics:[
    {id:'juri', name: 'Principais Decisões Judiciais que Protegem Você', content:'<h4>O que os Tribunais Vêm Decidindo Sobre Direitos dos Consumidores</h4><p>Jurisprudência é conjunto de decisões dos tribunais. Quando muitas decisões vão na mesma direção, forma-se entendimento que o STJ (Superior Tribunal de Justiça) consolida em Súmulas. Você deve conhecer as principais tendências.</p><p>O que é Súmula? Resumo de entendimento do tribunal sobre uma questão. Exemplo: "Súmula 381 STJ: responsabilidade civil do farmacêutico por erro de manipulação de medicamento". Súmula vincula decisões de outros tribunais.</p><blockquote class="tip"><strong>Dica:</strong> Se você precisa processar, pergunte a seu advogado se há Súmula que apoia seu caso. Se houver, suas chances aumentam muito.</blockquote><p>Qual é uma Súmula importante sobre consumidor? "Súmula 282: operadora de telefonia responde por falha no serviço". "Súmula 290: corretor de imóvel responde por informação falsa". "Súmula 286: inscrição indevida em cadastro de inadimplência gera dano moral."</p><p>O que dizem tribunais sobre cláusulas abusivas? Que são nulas de pleno direito, mesmo que assinadas. Consumidor pode questionar anos depois. Não há prazo para questionar abusividade.</p><blockquote class="example"><strong>Exemplo:</strong> Você assinou contrato com cláusula exigindo "renúncia a direitos" há 5 anos. Tribunal entende que cláusula é abusiva e nula, mesmo após 5 anos. Você ainda pode invocá-la.</blockquote><p>E sobre publicidade? Tribunais entendem que influenciador que faz publicidade é solidariamente responsável com marca. Influenciador não pode dizer "eu só recomendo, marca é que vende". Ambos respondem.</p><blockquote class="quote"><strong>Entendimento consolidado:</strong> "Influenciador que faz publicidade enganosa é solidariamente responsável com fornecedor pelos danos, podendo ser processado individualmente."</strong></blockquote><p>Qual é a tendência sobre compras online? Tribunal amplia responsabilidade de marketplace. Plataforma não pode simplesmente transferir responsabilidade ao vendedor. Plataforma e vendedor são coresponsáveis por qualidade e entrega.</p>'},
    {id:'tend', name: 'Tendências Futuras do Direito do Consumidor', content:'<h4>Para Onde o Direito do Consumidor Está Caminhando?</h4><p>Direito do consumidor evolui com a sociedade. Novos problemas criam novas proteções. Você deve estar atento ao que está mudando para se antecipar.</p><p><strong>Redes sociais e publicidade:</strong> Lei está evoluindo para responsabilizar mais plataformas de redes sociais por publicidade enganosa e conteúdo prejudicial. TikTok, Instagram, YouTube podem ser mais responsáveis.</p><p><strong>Inteligência Artificial:</strong> Com uso crescente de IA em decisões (crédito, emprego, recomendações), surge discussão sobre direito de explicação. Por que IA negou seu crédito? Você teria direito a resposta clara.</p><blockquote class="tip"><strong>Dica:</strong> Se uma IA negou benefício (crédito, emprego), comece a exigir explicação. Lei futura pode obrigar explicação clara.</blockquote><p><strong>Sustentabilidade:</strong> Crescente preocupação com publicidade enganosa sobre produtos "ecológicos". Se marca diz que produto é "sustentável" sem comprovar, pode ser enganosa. Tribunais já estão considerando.</p><p><strong>Criptomoedas e plataformas digitais:</strong> Novos mercados (Bitcoin, apps de fintech) criam novos riscos. Regulação ainda está em desenvolvimento, mas tendência é ampliar proteção do consumidor nestas plataformas.</p><blockquote class="example"><strong>Exemplo:</strong> Você perdeu Bitcoin em ataque de hacker a exchange. Responsabilidade da exchange? Ainda não há consenso, mas tendência é responsabilizar mais plataforma por segurança inadequada.</blockquote><p><strong>Direito a ser esquecido:</strong> Com LGPD, você pode exigir apagamento de dados pessoais quando não mais necessários. Tendência é ampliar esse direito em redes sociais e publicidade.</p><blockquote class="quote"><strong>Futuro próximo:</strong> "Direito do consumidor tende a evoluir para maior responsabilidade de plataformas digitais, transparência sobre IA, e proteção contra publicidade enganosa em redes sociais."</strong></blockquote><p>Como você se prepara para essas mudanças? Mantenha-se informado sobre alterações no CDC, acompanhe decisões de tribunais, participe de consultas públicas sobre regulação. Você tem voz.</p>'},
    {id:'digi', name: 'Desafios Digitais: Fake News, Scams e Proteção', content:'<h4>Novos Riscos do Mundo Digital Exigem Proteção Especial</h4><p>Internet trouxe novos riscos que CDC tradicional não previa. Você precisa estar atento a fake news (notícia falsa), scams (golpes), e fraude digital para se proteger.</p><p>O que é fake news no contexto de consumo? Notícia falsa sobre produto que prejudica marca ou influencia consumidor. Exemplo: "Brand X causa câncer" (falso). Se você se recusa a comprar por fake news, pode processar autor e plataforma.</p><blockquote class="tip"><strong>Dica:</strong> Não compartilhe fake news sobre produto. Você pode ser responsabilizado pelo dano causado à reputação da marca.</blockquote><p>O que é scam? Golpe online onde alguém fingia ser fornecedor legítimo e te engana. Exemplo: email falso dizendo "confirme seus dados para receber prêmio". Você clica, perde dados e dinheiro.</p><p>Como se proteger? Verificar URL (é site real ou parecido?), não clicar em links suspeitos, não fornecer senha/dados a ninguém, usar dupla autenticação em contas importantes, desconfiar de ofertas milagrosas.</p><blockquote class="example"><strong>Exemplo:</strong> Você recebe email "Parabéns! Você ganhou iPad!" com link. É scam. Verdadeiro site de sorteios não solicita dados por email. Você não clica, não fornece dados.</blockquote><p>Se foi vítima de scam, o que fazer? Não pague nada mais. Contate banco e denuncie fraude. Registre BO (Boletim de Ocorrência) na polícia. Denuncie à plataforma (email, rede social). Procure Procon.</p><blockquote class="quote"><strong>Responsabilidade plataforma:</strong> "Plataforma que hospeda golpista pode ser responsabilizada por falta de segurança. Você pode processar plataforma junto com golpista."</strong></blockquote><p>E quanto a dados vazados em hack? Se site sofre ataque e seus dados são vazados, site é responsável se tinha segurança inadequada. Você pode reclamar por dano moral (exposição de privacidade).</p>'},
    {id:'inov', name: 'Inovações em Proteção do Consumidor', content:'<h4>Novas Ferramentas e Mecanismos de Defesa</h4><p>Tecnologia também oferece ferramentas novas para defendê-lo. Apps de proteção, inteligência artificial para detectar fraude, plataformas de reclames online: todas ajudam você a se proteger.</p><p><strong>Apps de proteção:</strong> Existem apps que analisam contrato, identificam cláusulas abusivas, e alertam você. Exemplo: Consumidor.gov.br é plataforma oficial onde você registra reclamação online.</p><p><strong>Inteligência artificial para defesa:</strong> Startups desenvolvem IA que analisa termos de serviço, detecta práticas abusivas, e avisa você. Você pode usar essas ferramentas antes de contratar.</p><blockquote class="tip"><strong>Dica:</strong> Use Consumidor.gov.br para registrar reclamação online. Fornecedor tem prazo para responder. Se não responde, você escala a Procon.</strong></blockquote><p><strong>Blockchain para rastreabilidade:</strong> Algumas marcas usam blockchain para rastrear produto (origem, qualidade, autenticidade). Se produto é falso, você descobre imediatamente e pode devolver.</p><p><strong>Certificações de confiança:</strong> Existem selos de confiança (exemplo: Procon, ECC - Entidad de Certificación) que você pode procurar antes de comprar. Fornecedor com selo tem menor risco.</p><blockquote class="example"><strong>Exemplo:</strong> Você quer comprar eletrônico online. Procura por lojas certificadas pelo Procon ou que têm selo de confiança de associação. Diminui risco de fraude.</blockquote><p><strong>Mediação online:</strong> Muitos órgãos oferecem mediação online (videoconferência) para resolver conflitos sem precisar ir presencialmente. Rápido e eficiente.</p><blockquote class="quote"><strong>Futuro próximo:</strong> "Proteção do consumidor está se digitalizando: plataformas online, IA para detectar abuso, blockchain para rastreamento. Você tem mais ferramentas que nunca para se defender."</strong></blockquote><p>Como você acessa essas ferramentas? Pesquise: "Consumidor.gov.br", "Procon on-line", "verificador de cláusulas abusivas". Muitos órgãos públicos oferecem assistência digital gratuita.</p>'}
