      {
        id:1,
        name:'Avaliação da Cena e Protocolo de Segurança',
        dur:'15min',
        content:`<h3>Avaliação da Cena e Protocolo de Segurança</h3><p>Bem-vindo ao curso de Primeiros Socorros Essenciais! Sou o Professor Matheus, e é um honor guiá-lo nesta jornada crítica de aprendizado que pode literalmente salvar vidas. A capacidade de agir rapidamente e efetivamente em momentos de crise é um dom, uma responsabilidade e uma vocação nobil. Como diz em Lucas 10:37, o bom samaritano "teve compaixão, e, aproximando-se, enfaixou-lhe as feridas, derramando nelas azeite e vinho."</p><p>O primeiro e mais crítico passo em qualquer situação de emergência é a avaliação da cena. Sim, antes de você se aproximar da vítima, você deve avaliar se é seguro fazer assim. Isto pode parecer contra-intuitivo — seu instinto é correr para ajudar — mas se você se ferir, torna-se outra vítima que precisará de resgate. Você não consegue ajudar de forma eficaz de um leito de hospital ou cemitério.</p><p>Então, o que você procura ao avaliar a cena? Primeiro, há perigo imediato? Há fogo? Há eletricidade exposta? Há tráfico de carros? Há estrutura instável que pode desabar? Há vapores tóxicos ou químicos? Se há qualquer um destes perigos óbvios, NÃO se aproxime. Ao invés, ligue para serviços de emergência (192 no Brasil, pode variar em outros locais) e espere do local seguro. Deixe que profissionais treinados enfrentem estes perigos extraordinários.</p><blockquote class="tip">💡 <em>Dica: Se você não tem certeza se a cena é segura, presuma que não é. Sua segurança sempre vem em primeiro lugar. Chamar profissionais é sempre a ação correta.</em></blockquote><p>Se a cena parece segura, você ainda precisa tomar precauções. Use luvas se tiver à mão — não assuma que não há sangue ou fluidos corpóreos até ver. Use máscara se for dar respiração boca-a-boca (embora a maioria das organizações agora recomenda RCP sem sopro). Posicione-se de forma segura para não cair ou colidir com outros emergentes na cena.</p><p>Avaliação rápida da vítima: assim que você estabeleça que é seguro se aproximar, faça contato com a vítima. Fale alto: "Olá? Você está bem?" Se a pessoa responde, ela está consciente e sua situação é diferente daquela que não responde. Se ela não responde, você verificará responsividade batendo gentilmente nos ombros e falando. Não pense que está morta — uma pessoa pode estar em estado de choque, inconsciente mas viva.</p><p>Se a vítima está consciente, acalme-a. Diga seu nome: "Meu nome é [seu nome], sou treinado em primeiros socorros e vou ajudá-lo." Identifique-se. Isto reduz pânico. Pergunte o que aconteceu. O que ela sente? Há dor? Onde? Isto lhe dá informação para determinar próximas ações. Coloque a pessoa em posição confortável — se houver suspeita de lesão nas costas ou pescoço (como após queda ou acidente de carro), não mexa-a desnecessariamente, pois movimento pode piorar lesão espinhal.</p><blockquote class="example">📌 <em>Exemplo: João estava em supermercado quando uma mulher idosa caiu. Ele se aproximou, avaliou a cena (nenhum perigo evidente), verificou responsividade (ela era responsiva), e prontamente chamou serviços de emergência enquanto acalmava a mulher, perguntando o que a fez cair e se sentia dor.</em></blockquote><p>Se a pessoa está inconsciente, isto é emergência imediata. Verifique respiração: incline a cabeça gentilmente para trás (a menos que suspeite lesão no pescoço), coloque sua bochecha perto da boca dela. Você sente respiração? Você vê o peito subir e descer? Se há sinais de respiração, coloque a pessoa na posição de recuperação (deitada de lado, cabeça de um lado, perna dobrada para apoio). Esta posição garante que se vomitar, o vômito drena para fora da boca em lugar de entrar em pulmões. Chame imediatamente por ajuda.</p><p>Se não há respiração, isto é parada cardíaca. Você vai começar RCP imediatamente. Mas antes, se estiver sozinho, use alguns segundos para chamar emergência ou pedir a alguém próximo chamar. Se você estiver com outros, grite: "Alguém ligue para emergência!" E comece RCP.</p><p>Comunicação com emergência: quando você ligar 192, você falará com um dispatcher treinado. Eles perguntarão sua localização (seja ESPECÍFICO — não "perto da loja", mas "Rua João Silva, número 432, próximo à padaria Silva"). Eles perguntarão o que é emergência (pessoa inconsciente, não respira). Seguindo instruções deles, você pode até ser instruído a fazer RCP com orientação do telefone. Mantenha calma e siga instruções.</p><blockquote class="quote">💬 <em>"O primeiro responder verdadeiro é aquele que está lá nos primeiros minutos. Você é o primeiro responder. Seus atos nestes minutos críticos determinam se a pessoa vive ou morre." — Especialista em Medicina de Emergência.</em></blockquote><p>Documento mental: Se você testemunha um acidente, procure absorver detalhes. Que hora era? Quantas pessoas envolvidas? O que exatamente aconteceu? Quem viu? Quando autoridades chegarem, estes detalhes são valiosos para investigação e para que testemunhas depois confirmem ou preencham lacunas na história. Isto também protege você legalmente — sua descrição acurada dos eventos é válida.</p><p>Proteja a privacidade: conforme você ajuda, pessoas podem se reunir e filmar com telefones. A vítima tem direito à privacidade. Discretamente peça às pessoas para se afastarem. Não permita que fotos sejam tiradas de ferimentos ou identificação. Isto é questão de dignidade humana.</p>`,
        cards:[{q:'Qual é o primeiro passo antes de se aproximar de uma vítima em emergência?',a:'Avaliar a cena para verificar se há perigos imediatos (fogo, eletricidade, tráfico, estrutura instável) e se é seguro se aproximar.'}]

        id:2,
        name:'Sinais Vitais e Protocolo Básico SAMU',
        dur:'15min',
        content:`<h3>Sinais Vitais e Protocolo Básico SAMU</h3><p>Os sinais vitais são os indicadores mais fundamentais de que alguém está vivo e como seu corpo está respondendo à emergência. Existem quatro sinais vitais principais: pulso (frequência cardíaca), respiração (frequência respiratória), pressão arterial, e temperatura corporal. Nos primeiros socorros básicos, você focará principalmente em pulso e respiração, pois estes dois indicadores lhe dirão se a pessoa precisa de RCP.</p><p>Verificando o pulso: localize o pulso da carótida (pescoço). Coloque dois dedos (indicador e médio) na lateral do pescoço, entre o músculo do pescoço e a traquia (tubo respiratório). Procure por pulsação. Isto leva aproximadamente 10 segundos. Se você sentir pulsação, o coração está batendo. Se não sentir, o coração pode ter parado. Você também pode verificar o pulso no pulso — coloque três dedos na palma de alguém na lateral do polso do lado do polegar. Mas a carótida é mais confiável em situações de emergência, especialmente em pessoas em choque.</p><blockquote class="tip">💡 <em>Dica: Conte seus próprios batimentos cardíacos para entender melhor o que procura. Coloque dedos em sua própria carótida e conte quantas pulsações você sente em 15 segundos, depois multiplique por 4 para ter batidas por minuto.</em></blockquote><p>Frequência cardíaca normal em repouso para adultos é entre 60 e 100 batidas por minuto. Para crianças é ligeiramente mais rápido (até 120). Se está muito acelerada (taquicardia) pode indicar perda de sangue, choque, ou medo. Se está muito lenta (bradicardia) pode indicar problema cardíaco sério. Mas não perca tempo tentando contar precisamente — o importante é sentir se há pulso, não a contagem exata.</p><p>Verificando respiração: coloque sua bochecha próxima à boca e nariz da pessoa. Você sente ar quente saindo? Você ouve sons de respiração? Você vê o peito subir e descer? Se há respiração, a pessoa está viva pelo menos naquele momento. Se não há respiração, prepare-se para RCP.</p><p>Frequência respiratória normal é entre 12 e 20 respirações por minuto em repouso. Em emergência, pode ser muito mais rápida. Respiração muito rápida e superficial (ofegante) pode indicar choque ou pânico. Respiração muito lenta pode indicar problema neurológico ou intoxicação.</p><p>Quando você fala com o dispatcher do SAMU (Sistema de Atendimento Móvel de Urgência) — o número 192 no Brasil — você será guiado através do protocolo básico. O dispatcher está treinado para guiar você, não apenas coordenar ambulância. Ele pode instruir você a fazer RCP, controlar sangramento, colocar pessoa em posição de recuperação, etc. Este é seu recurso de conhecimento quando você não tem certeza.</p><blockquote class="example">📌 <em>Exemplo: Maria chamou 192 quando seu avó colapsou. Ela não sabia se ele respirava. O dispatcher, através da ligação, instruiu-a a virar sua cabeça, verificar respiração, e começar RCP com orientação da voz pelo telefone até a ambulância chegar. Maria salvou a vida de seu avó seguindo exatamente as instruções.</em></blockquote><p>Sinais de choque: além dos sinais vitais básicos, procure por sinais de choque. Pele pálida, fria e úmida? Lábios azulados? Pessoa confusa ou ansiosa desproporcionalmente? Pulso fraco ou muito rápido? Estes são sinais de que o corpo não está recebendo sangue suficiente aos órgãos vitais. O choque é condição extremamente séria que pode ser fatal se não tratada. Tratamento básico inclui deitar pessoa com pernas elevadas (a menos que suspeite lesão nas costas, caso em que não mexa-a), manter calor (coloque coberta), acalmar-a, e chamar emergência imediatamente.</p><p>Checklist rápido para protocolo básico: 1) Cena segura? 2) Pessoa responsiva? 3) Pessoa respira? 4) Pulso palpável? 5) Há sangramento visível? 6) Há suspeita de lesão nas costas/pescoço? Cada uma destas perguntas guia sua próxima ação. Com prática, este checklist torna-se automático.</p><p>Sinais de morte: em algumas situações, é claro que a pessoa está morta — rigor mortis, lividez (descoloração com sangue depositado na parte mais baixa do corpo), putrefação. Se você não tiver dúvida, não tente RCP. Mas em dúvida, SEMPRE tente RCP. É melhor fazer RCP em alguém morto do que NÃO fazer em alguém que pode ser salvo.</p><blockquote class="quote">💬 <em>"Em emergência, quando você não sabe, suponha o melhor (que pode ser salvo) e aja accordingly." — Protocolo de Primeiros Socorros.</em></blockquote><p>Documentação mental: você será perguntado pela equipe de emergência quando chegar — qual é a idade aproximada da vítima? Qual é a história de saúde conhecida? Quando foi última comida/bebida? Algum medicamento conhecido? Alergias? Tudo que você puder informar ajuda o médico a fornecer cuidado mais apropriado. Se há amigos ou família próximos, peça informação a eles.</p>`,
        cards:[{q:'Como se verifica o pulso de carótida em alguém?',a:'Colocar dois dedos (indicador e médio) na lateral do pescoço entre o músculo e a traquia, procurando por pulsação durante cerca de 10 segundos.'}]

      {
        id:3,
        name:'RCP — Reanimação Cardiopulmonar Básica',
        dur:'15min',
        content:`<h3>RCP — Reanimação Cardiopulmonar Básica</h3><p>RCP (Reanimação Cardiopulmonar) é possivelmente a habilidade mais crítica em primeiros socorros. Quando o coração de alguém para de bater (parada cardíaca), os órgãos vitais (especialmente o cérebro) começam a morrer em minutos. RCP manualmente comprime o coração entre o esterno e a coluna, movendo sangue artificialmente ao redor do corpo. Isto mantem órgãos vivos até que um desfibrilador ou tratamento médico profissional possa restaurar ritmo cardíaco normal.</p><p>Reconhecendo parada cardíaca: pessoa está inconsciente, não responde ao toque ou voz, não respira ou respira apenas gasping (como um peixe fora d'água). Não há pulso palpável. Isto é emergência absoluta. Comece RCP imediatamente.</p><p>Posicionamento: coloque a pessoa deitada de costas em superfície firme. Se está em cama, coloque-a no chão (superfície muito mole não funciona bem para RCP). Remova roupas da frente do peito para que você possa fazer compressões diretamente na pele ou apenas na camisa (desaperte). Se a pessoa tiver algum aparelho no peito (marca-passo, desfibrilador implantado), não o comprima diretamente, mas sim ao redor dele.</p><blockquote class="tip">💡 <em>Dica: A maioria de organizações recomenda agora RCP "hands-only" (sem sopro), especialmente para adultos. Isto significa apenas compressões de peito, sem precisar de respiração boca-a-boca. Isto remove a barreira de contato direto que algumas pessoas acham desconfortável.</em></blockquote><p>Técnica de compressão: localize o centro do peito, entre os dois mamilos. Se a pessoa tem mamilos/seios, é entre eles. Coloque a base de uma mão ali, coloque a outra mão em cima, entrelaçando dedos. Com braços retos, pressione para baixo com força. Isto é exercício físico intenso — você deve realmente aplicar força. O objetivo é comprimir o peito entre 5 e 6 cm de profundidade (isso é bastante profundo). Pressione na sequência cardíaca — "Another One Bites the Dust" da Queen tem o BPM perfeito para RCP!</p><p>Frequência: 100-120 compressões por minuto. Este é aproximadamente o tempo de uma música de ritmo rápido. Se você tem smartphone, procure "RCP metronome" na app store — há aplicativos que soam bips no ritmo correto para guiá-lo. Isto garante que você não se torna muito rápido (o que é ineficaz) ou muito lento (o que também é ineficaz).</p><p>Sequência contínua: comprima, comprima, comprima... sem parar a menos que: 1) A pessoa comece a respirar normalmente e responda, 2) Você esteja exausto e não conseguir continuar (passe para alguém mais forte), 3) Desfibrilador automático externo (AED) estiver disponível, ou 4) Autoridades cheguem e assumam.</p><p>Não se interrompa para "verificar" se funcionou. Isto interrompe fluxo de sangue. Continue até que profissionais cheguem. Sim, RCP causa bruising, possível fratura de costelas, dano a órgãos internos. Mas uma pessoa com costelas quebradas e viva é melhor que uma pessoa com costelas intactas e morta.</p><blockquote class="example">📌 <em>Exemplo: João estava em ginásio quando um amigo colapsou com ataque cardíaco. João, que havia feito curso de RCP dois anos antes, compreendeu o peito consistentemente por mais de 20 minutos até que paramédicos chegassem. Quando desfibrilador os restauraram ritmo cardíaco, João havia mantido o cérebro e coração vivos o suficiente. Seu amigo sobreviveu e hoje é seu amigo ainda.</em></blockquote><p>Com respiração (se você está disposto): se você for treinado e disposto a fazer respiração boca-a-boca, o protocolo é 30 compressões, 2 respirações. Incline cabeça para trás gentilmente, coloque boca sobre boca (ou com máscara de barreira se tiver), e sopre duas vezes. Volta para compressões. Este ciclo continua. Mas novamente, RCP "hands-only" é considerada tão eficaz hoje que é perfeitamente válido fazer sem respiração.</p><p>Desfibrilador Automático Externo (AED/DEA): muitos locais públicos têm DEA instalados. Se você está em local como aeroporto, shopping, prédio de escritórios, procure por DEA. Desfibriladores são robôs inteligentes — quando você o coloca, ele analisa automaticamente o ritmo cardíaco. Se for ritmo que pode ser revertido por choque, ele instrui você a pressionar botão e fornece choque. Choque não é perigoso para você — você está tocando apenas o plástico do aparelho. DEA é extremamente eficaz — se usado dentro de primeiros minutos de parada cardíaca, taxa de sobrevivência é >80%. Procure DEA e use se disponível.</p><blockquote class="quote">💬 <em>"Cada minuto sem RCP ou desfibrilação, a taxa de sobrevivência cai 10%. Minutos contam. Comece RCP imediatamente." — American Heart Association.</em></blockquote><p>Perspectiva cristã: RCP é ato de compaixão. Você está tentando salvar vida porque vida é sagrada. Em Genesis, aprendemos que somos criados à imagem de Deus. Salvar vida é honrar Aquele que criou a vida. Mesmo que a pessoa não sobreviva apesar de seus esforços, você fez tudo que pôde. Isto é tudo o que Deus pede — que façamos nosso melhor com os recursos e conhecimento que temos.</p><p>Prática: a melhor maneira de aprender RCP é treinamento prático com instrutor certificado. Muitas organizações oferem cursos (Cruz Vermelha, universidades, hospitais). Estes cursos duram 4-8 horas e cobrem RCP adulto, infantil, e neonatal. Certificação é válida por 2 anos típico. Se você nunca fez treinamento prático, recomendo fortemente que o faça. Conhecimento teórico é bom, mas músculos precisam de memória e prática.</p>`,
        cards:[{q:'Qual é a profundidade recomendada para compressões de peito em RCP?',a:'Entre 5 e 6 cm de profundidade, com frequência de 100-120 compressões por minuto.'}]
      }

      {q:'O que você deve fazer primeiro ao se aproximar de uma cena com vítima?',opts:['Correr para ajudar imediatamente','Avaliar se a cena é segura antes de se aproximar','Chamar todos os amigos para ajudar','Tirar fotos para redes sociais'],correct:1},

  {

    name:'Módulo 2 — Emergências Comuns',
    free:false,
    topics:[
      {
        id:4,
        name:'Parada Cardíaca, RCP Avançada e Engasgo',
        dur:'15min',
        content:`<h3>Parada Cardíaca, RCP Avançada e Engasgo</h3><p>Agora que você entende fundamentos de RCP, vamos aprofundar em cenários específicos que você pode encontrar. Parada cardíaca é a emergência mais crítica — quando o coração literalmente para de bater. Há dois tipos principais: V-fib (fibrilação ventricular, onde o coração tremula desorganizadamente) e asystole (linha plana, sem atividade). V-fib é potencialmente reversível com choque de desfibrilador. Asystole é muito mais difícil de reverter, mas ainda tentamos RCP porque milagres ocorrem.</p><p>RCP avançada envolve técnicas adicionais para profissionais treinados: medicamentos como epinefrina, manejo avançado de via aérea com tubo endotraqueal, monitoramento contínuo de ritmo cardíaco. Mas como primeiro socorrista leigo, seu papel é começar RCP, usar DEA se disponível, e manter compressões até que profissionais cheguem. Você está criando "ponte" entre colapso e hospital.</p><blockquote class="tip">💡 <em>Dica: Se você está fazendo RCP sozinho por muito tempo (15+ minutos), fadiga é real. Não seja heroico — se estiver exausto, vire a pessoa para posição de recuperação brevemente, descanse 10 segundos, e volte para RCP. Mas o ideal é ter alguém para revezar a cada 2 minutos.</em></blockquote><p>Quanto ao prognóstico de parada cardíaca: sobrevivência depende de quanto tempo passou, se foi recebida RCP, se foi usado DEA, e qual foi a causa (ataque cardíaco, eletrocução, afogamento, overdose, trauma). Algumas causas (afogamento em água fria, eletrocução) têm sobrevivência surpreendentemente boa porque o corpo pode ser "resfriado" e o cérebro pode tolerar períodos longos sem oxigênio. Outros têm prognóstico pior. Mas novamente, você não pode saber até tentar. RCP.</p><p>Engasgo é emergência diferente mas igualmente séria. Quando algo (comida, brinquedo, moeda) bloqueia a via aérea, a pessoa não consegue respirar. Se é bloqueio completo, morte pode ocorrer em minutos. Se é bloqueio parcial, há alguns momentos para agir enquanto a pessoa ainda consegue tossir.</p><p>Reconhecendo engasgo: a pessoa faz gesto de asfixia (mão no pescoço), incapaz de falar, incapaz de tossir efetivamente (se consegue tossir bem, deixe que tosça — isto é mecanismo natural de liberação), ou desmaio iminente. Não confunda com tosse normal — pessoa engasgada não consegue fazer som, apenas gesto desespero.</p><p>Se pessoa consegue tossir ou falar um pouco, NÃO interfira ainda. Encoraje tosse, mas se piora ou tosse pare, passe para manobra de Heimlich. Se já está em desmaio, comece RCP — ao fazer compressões, se destrói o objeto bloqueador ou ele se desloca.</p><p>Manobra de Heimlich: fique atrás da pessoa. Coloque sua mão em punho logo acima do umbigo e abaixo da caixa torácica, outra mão segurando o punho. Puxe agressivamente para dentro e para cima, em espécie de movimento de "J". Faça isto 5 vezes ou até o objeto seja expelido. Se não funcionar, alterne entre 5 tapinhas nas costas e 5 manobras de Heimlich até objeto saia.</p><blockquote class="example">📌 <em>Exemplo: Em jantar familiar, criança de 3 anos engasgou com amendoim. Pai viu a criança em pânico, não conseguindo respirar. Imediatamente posicionou-se atrás dela e fez manobra de Heimlich. No terceira manobra, o amendoim foi expelido e criança começou a respirar normalmente novamente. Se pai tivesse hesitado, a criança teria perdido consciência em segundos.</em></blockquote><p>Para crianças pequenas (menos de 1 ano), Heimlich é potencialmente perigoso (pode danificar órgãos). Ao invés, alterne 5 tapinhas nas costas (com bebê sobre seu braço de face para baixo) com 5 compressões de peito com dois dedos (na mesma forma que RCP infantil). Continue até desobstruir ou até ficar inconsciente (daí RCP).</p><p>Após engasgo resolido: mesmo se objeto foi expelido e pessoa está respirando, procure sinais de lesão. Há dor? Dificuldade ao engolir saliva? Pessoa vomitando? Estes podem indicar lesão interna da garganta ou esôfago. Procure orientação médica para ter certeza.</p><p>Prevenção de engasgo: coma devagar, mastigue bem, não fale com boca cheia, não se deite enquanto come, evite deitar e comer na cama (especialmente idosos com dificuldade de engolir), corte comida em pedaços pequenos para crianças e idosos, remova pequenas partes de brinquedos antes de dar a crianças, mastigue alimentos duros completamente.</p><p>Para pessoas com prótese dentária ou dificuldades neurológicas (pós-acidente vascular cerebral, Parkinson): ajuda ao comer pode ser necessária. Alguns alimentos são mais risco (nozes, popcorn, cenoura crua). Adapte consistência de comida se necessário.</p><blockquote class="quote">💬 <em>"Prevenção de engasgo é muito mais fácil que ressuscitação. Coma com atenção e eduque sua família." — Conselho de Segurança.</em></blockquote><p>Perspectiva espiritual: quando temos a oportunidade de salvar vida através de ações rápidas, é privilégio. Jesus nos ensinou através da parábola do bom samaritano que estar preparado para ajudar é parte de amar nosso próximo. Conhecimento de RCP, Heimlich e outros primeiros socorros é forma de estar sempre preparado.</p>`,
        cards:[{q:'Qual é a diferença entre engasgo completo e bloqueio parcial?',a:'Bloqueio completo: pessoa não consegue falar ou respirar. Bloqueio parcial: pessoa consegue tossir, mesmo que com dificuldade.'}]
      },
      {
        id:5,
        name:'Hemorragias e Controle de Sangramento',
        dur:'15min',
        content:`<h3>Hemorragias e Controle de Sangramento</h3><p>Sangramento é assustador visualmente, mas muitas hemorragias podem ser controladas com técnicas apropriadas. A chave é entender que você está tentando fazer o sangue coagular e não perder volume de sangue crítico. Corpo tem cerca de 5-6 litros de sangue. Perder 1 litro é perigoso. Perder 2 litros é potencialmente fatal sem transfusão.</p><p>Tipos de sangramento: arterial (jato brilhante vermelho, altamente pulsátil — MUITO perigoso), venoso (fluxo constante vermelho mais escuro — também sério mas menos urgente), e capilar (gotejamento lento de sangue, menos urgente). Arterial é emergência máxima — a pessoa pode perder consciência e morrer em minutos.</p><p>Controle de sangramento — passo a passo:</p><p>1. Segurança pessoal: use luvas se tiver. Sangue pode conter patógenos transmissíveis (HIV, hepatite). Proteja-se.</p><p>2. Pressão direta: pegue pano limpo (lenço, toalha, camiseta) e pressione diretamente na ferida. Não remova o pano para "checar" — isto interrompe coagulação. Se sangue vazar através do pano, coloque outro pano POR CIMA (não remova o primeiro). Às vezes leva 10-15 minutos para sangramento parar com pressão contínua.</p><p>3. Elevação: levante ferida acima do coração se possível. Isto reduz pressão de sangue na ferida. Se é perna, deite e coloque almofada sob perna. Se é braço, coloque em tipoia.</p><blockquote class="tip">💡 <em>Dica: Se está em local público e precisa de pano, qualquer pessoa ao redor pode ter lenço. Não hesite em pedir ajuda — a maioria das pessoas quer ajudar em emergência.</em></blockquote><p>4. Torniquete: se sangramento arterial não para com pressão e elevação após 10 minutos, você pode precisar de torniquete. Isto é pano, corda, ou até cinto — enrole acima da ferida (entre ferida e coração), aperte até que sangramento pare. Sim, isto pode causar dano à extremidade, mas é menos ruim que morte por perda de sangue. Use torniquete apenas se absolutamente necessário. Torniquetes modernos (militares) têm mecanismo de travamento — se você tem acesso a um, use. Se tem improviso, aperte bem e marque com caneta a hora em que foi aplicado — ajuda médicos a saber quanto tempo tecido esteve sem sangue.</p><p>5. Procure ajuda: mesmo hemorragia controlada é emergência. Ligue para SAMU. Ferida precisa de limpeza adequada, possível costura, possível antibióticos, possível verificação de estruturas mais profundas. Não confie em controle caseiro permanente.</p><p>Sangramento interno é diferente — você pode não ver sangue externo, mas pessoa está sangrando dentro. Sinais incluem: pele pálida, fria, úmida, pulso fraco/rápido (sinais de choque), abdomen inchado e dolorido, vômito com sangue, urina com sangue. Se suspeita sangramento interno, deite a pessoa com pernas elevadas e ligue para emergência imediatamente. Você não consegue "parar" sangramento interno com primeiros socorros — profissionais precisam.</p><blockquote class="example">📌 <em>Exemplo: Trabalhador ferido a mão com serra. Sangramento era copioso. Supervisor pressionar com pano, elevou braço. Após 7 minutos sangramento diminuiu para gotejamento. Após 12 minutos parou essencialmente. Pessoa foi levada ao hospital onde ferida foi adequadamente fechada. Sangramento externo que parecia catastrófico foi controlado com técnica simples.</em></blockquote><p>Certos medicamentos aumentam sangramento: aspirina, ibuprofeno, warfarina (anticoagulante). Se conhecer história médica, comunique isto ao paramédico. Isto não muda seu tratamento imediato, mas ajuda hospital a preparar-se.</p><p>Nosebleed (sangramento nasal): comum, geralmente assustador mas não é emergência típica. Instrua pessoa a: inclinar-se para frente (não para trás, para não engolir sangue), pressionar narina fechada por 10 minutos, aplicar frio (gelo envolvido em pano no nariz). Se após 20 minutos ainda sangra, procure médico — pode haver pequeno vaso rompido que precisa de cauterização.</p><p>Sangramento de gengiva: comum após limpeza dentária ou em pessoas com gengivite. Bocheche com água fria, coloque gaze e morda por 10 minutos. Se não para, faça de novo. Se persiste por horas, veja dentista. Não é emergência de vida, mas precisa de avaliação.</p><blockquote class="quote">💬 <em>"Sangramento parece pior do que realmente é. Mantenha calma, aplique pressão consistente, e a maioria vai ficar bem." — Paramédico com 20 anos experiência.</em></blockquote><p>Aspectos espirituais: sangue é símbolo profundo na Bíblia — sangue de animais cobria pecado no Antigo Testamento, sangue de Jesus redimiu a humanidade. Ao ajudar alguém sangrando, você está honrando o sangue e a vida que ele representa. Isto não é apenas ato médico, é ato de compaixão profunda.</p>`,
        cards:[{q:'Qual é o primeiro passo para controlar hemorragia?',a:'Aplicar pressão direta na ferida com pano limpo, sem remover o pano para verificar, e se sangrar através colocar outro pano por cima.'}]
      },
      {
        id:6,
        name:'Fraturas, Lesões de Coluna e Imobilização',
        dur:'15min',
        content:`<h3>Fraturas, Lesões de Coluna e Imobilização</h3><p>Fraturas são quebras em ossos. Podem ser simples (osso quebrado mas pele intacta) ou compostas (osso quebrado e pele aberta, com risco de infecção séria). Sinais de fratura incluem: dor intensa no local, inchaço, descoloração (roxo), deformidade (osso parece em ângulo errado), incapacidade de mover extremidade.</p><p>Primeiro instinto ao ver alguém com suspeita de fratura: imobilize. Não mexa extremidade. Não tente "estender" ou "consertar" osso. Você é primeiro socorrista, não cirurgião. Seu trabalho é proteger a ferida e imobilizar para que osso não se mova mais durante transporte. Movimento adicional causa sangramento interno adicional, dano ao nervo, e complicação da recuperação.</p><p>Imobilização de fratura de braço: se é pulso ou antebraço, você pode fazer tipoia simples com lenço ou cinto — apoie braço contra peito e aperte gentilmente. Se é braço superior, você pode usar atadura elástica para prender braço contra corpo. Se é dedo ou mão, apoie em almofada.</p><p>Imobilização de fratura de perna: isto é mais crítico porque perna precisa suportar peso. Você pode usar almofadas, cobertores, ou até "abraço" da outra perna (perna quebrada com atadura à perna sadia próxima). O importante é não permitir movimento. Elevação reduz inchaço. Frio (gelo envolvido em pano, não gelo direto que pode queimar) reduz inchaço também.</p><blockquote class="tip">💡 <em>Dica: Se você quer aprender imobilização apropriada, procure vídeos de "splinting" de primeiros socorros. Há técnicas específicas que você pode praticar com almofadas antes de precisar de verdade.</em></blockquote><p>Lesão de coluna: isto é MUITO diferente. Se há suspeita de lesão nas costas ou pescoço (queda, acidente de carro, mergulho em água rasa, golpe na cabeça), você NÃO mexa a pessoa. Movimento pode separar vértebras e danificar medula espinhal, causando paralisia. Se pessoa está consciente, diga-a para não mover cabeça ou pescoço. Se está inconsciente, deixe como está. Chamar emergência. Se absolutamente necessário mover pessoa (fogo, estrutura desabando), use técnica especial chamada "roll log" onde corpo inteiro é movido como unidade rígida, mantendo cabeça/pescoço alinhada com coluna.</p><p>Trauma abdominal: se há golpe ao abdomen, procure sinais de sangramento interno — dor intensa, abdomen inchado, sinais de choque. Se suspeita, não oferça comida ou bebida (vai precisar de cirurgia se há sangramento interno), deite com pernas elevadas, e ligue para emergência.</p><p>Trauma de cabeça: qualquer pancada na cabeça merece atenção. Sinais de lesão cerebral incluem: perda de consciência (mesmo breve), confusão, dor de cabeça grave, vômito, convulsões, sangramento do nariz/ouvidos, midríase (pupilas dilatadas ou desiguais). Se alguém levou pancada na cabeça e tem qualquer destes sinais, ligue para emergência. Mesmo que pareça "melhorar", podem haver complicações internas.</p><blockquote class="example">📌 <em>Exemplo: Criança caiu de bicicleta, bateu cabeça. Parecia estar bem — riu, queria continuar brincando. Pai levou ao hospital "para ter certeza". CT scan mostrou pequeno sangramento subdural (entre cérebro e crânio). Sem intervenção rápida teria piorado e causado morte. Pareceu bem mas tinha lesão séria oculta.</em></blockquote><p>Concussão: lesão cerebral leve sem perda de consciência. Sinais: dor de cabeça, tontura, confusão, dificuldade de concentração. Protocolo é repouso — evitar atividades físicas e cognitivas pesadas por dias. Se há múltiplas concussões, risco de complicações aumenta. Sempre busque avaliação médica para qualquer lesão na cabeça.</p><p>Distensão vs. fratura: nem toda dor significa fratura. Distensão de ligamento (estiramento, ruptura) causa dor e inchaço similares. Regra prática é: se há dúvida, trate como fratura (imobilize e procure médico). É melhor ser cautioso com ossos do que arriscar movimento que pioraria lesão real.</p><p>Congelamento de osso: em lesão muito fresca, gelo reduz inchaço e dor. Use por 15-20 minutos, remova por 10 minutos, repita. Não aplique gelo diretamente — coloque pano entre gelo e pele para evitar queimadura de frio.</p><blockquote class="quote">💬 <em>"Com lesão óssea, imobilização é seu melhor amigo. Deixe osso quieto e vai cicatrizar. Deixe mexer e pode virar complicação permanente." — Cirurgião Ortopédico.</em></blockquote><p>Perspectiva cristã: quando alguém está injuriado, é fácil ficar desesperado. Mas sua calma, sua ação decisiva, sua cuidado — tudo isto comunica esperança. Isto comunica que Deus está no controle. Em situações como estas, seus atos falam mais alto que palavras.</p>`,
        cards:[{q:'Qual é a regra ouro com suspeita de lesão de coluna?',a:'Não mova a pessoa. Qualquer movimento pode danificar a medula espinhal e causar paralisia. Mantenha cabeça/pescoço alinhados e chame emergência.'}]
      }

      {
        id:7,
        name:'Queimaduras, Envenenamento e Convulsões',
        dur:'15min',
        content:`<h3>Queimaduras, Envenenamento e Convulsões</h3><p>Queimaduras são lesões pelo calor. Há três graus: Primeira (pele vermelha, dolorosa, sem bolhas — como queimadura solar), Segunda (pele vermelha com bolhas — dolorosa e mais séria), Terceira (pele carbonizada ou branca — profunda, pode ser indolor pois nervos foram destruídos). Qualquer queimadura maior que sua própria mão merece cuidado médico. Queimaduras na face, genitais ou articulações também precisam de médico.</p><p>Tratamento de queimadura: ÁGUA FRIA (não gelo). Imediatamente após queimadura, coloque sob água fria corrente por 10-20 minutos. Isto remove calor e reduz profundidade. NÃO use gelo — pode danificar pele ainda mais. Remova roupas que não estejam presas à pele (se está prensa, deixe estar — tentar remover vai destruir mais pele). Cubra com gaze úmida ou pano limpo. NÃO passe manteiga, azeite ou pasta dentifrícia — isto é mito obsoleto que piora lesão. Se é queimadura de segunda grau com bolhas, NÃO estoure bolhas — protege a ferida de infecção. Se é queimadura terceiro grau, chame emergência imediatamente.</p><blockquote class="tip">💡 <em>Dica: Se roupa está em fogo, instrua pessoa a "parar, cair e rolar" para apagar fogo. Não permita corrida (movimento de ar alimenta fogo). Após fogo apagado, procure água fria para a queimadura.</em></blockquote><p>Queimadura química: se alguém derramou químico que causa queimadura, primeiro remova fonte — desvista roupa que tem químico. Então coloque sob água MUITA fria por 10-20 minutos para diluir e remover químico. Procure rótulo do químico para ver instruções específicas — alguns produtos têm recomendações diferentes. Chamar emergência se é grande ou em área sensível.</p><p>Envenenamento: substâncias tóxicas podem entrar pelo corpo através de ingestão (comida/bebida/comprimido), inalação (fumaça/gás), absorção (através de pele), ou injeção (picada/mordida). Sinais de envenenamento incluem: náusea, vômito, dor abdominal, dor de cabeça, tontura, confusão, dificuldade respiratória, ou comportamento estranho.</p><p>Se você suspeita envenenamento:</p><p>1. Identifique a substância: se é possível saber o que foi ingerido/inalado, isto ajuda muito. Procure recipiente, rótulo, qualquer resto da substância.</p><p>2. Ligue para centro de envenenamento: muitos países têm linha direta para envenenamento. No Brasil é CEATOX (Centro de Assistência Toxicológica). Tenha número memorizado ou em seu telefone. Eles podem fornecer orientação específica baseada na substância.</p><p>3. Se é ingestão: NÃO induza vômito (isto era conselho antigo, agora sabemos que piora alguns envenenamentos). Deixe dentro até instruções de profissional. Se pessoa está consciente, pode beber pequenas quantidades de água.</p><p>4. Se é inalação: remova pessoa do local para ar fresco imediatamente. Se não conseguir respirar, comece RCP se necessário.</p><blockquote class="example">📌 <em>Exemplo: Criança bebeu frasco de limpador multiuso. Mãe pegou frasco, procurou número do CEATOX no telefone. A linha disse: "Não induza vômito, traga criança ao hospital agora." Hospital foi capaz de administrar carvão ativado e monitorar criança. Porque mãe não induziu vômito (que teria danificado esôfago ainda mais), resultado foi melhor.</em></blockquote><p>Convulsões: quando o cérebro dispara sinais descontrolados, corpo inteiro convulsiona. Convulsões podem ser de vida — alguém cai ao chão e tremula incontrolavelmente — ou não-vida — pessoa fica rígida, perde consciência mas não tremula obviamente. Seja qual for o tipo, é assustador de presenciar. Mas aqui está o segredo: você não consegue parar uma convulsão através de primeiros socorros. Tudo que consegue fazer é manter pessoa segura.</p><p>Respondendo a convulsão:</p><p>1. Segurança: mova objetos perigosos (móveis pontiagudos, fogo) para longe de pessoa. Não tente prender seus limbs — você pode lesar você ou eles tentando.</p><p>2. Posição: deite de lado (posição de recuperação) se conseguir fazer com segurança. Isto mantém via aérea aberta se vomitar.</p><p>3. Proteção: coloque almofada ou casaco sob cabeça para proteger. Solte roupas ao redor do pescoço se está apertado.</p><p>4. Não intrometa boca: mito antigo era colocar colher ou gaze na boca para evitar morder língua. ISTO ESTÁ ERRADO. A pessoa não "engole sua língua" e você pode danificar dentes. Deixe boca em paz.</p><p>5. Tempo: observe duração da convulsão. A maioria dura 1-2 minutos e param sozinhas. Se duram mais de 5 minutos, chame emergência. Se há múltiplas convulsões em sequência, chame emergência.</p><blockquote class="quote">💬 <em>"Convulsão parece fatal mas geralmente não é. Pessoa provavelmente não vai morrer dessa convulsão específica. Seu trabalho é mantê-la segura." — Médico de Emergência.</em></blockquote><p>Após convulsão: pessoa pode estar desorientada, confusa, cansada. Deixe-a dormir se possível — cérebro precisa recuperar. Fale gentilmente, reoriente-a. Se é primeira convulsão, procure avaliação médica — pode indicar epilepsia ou outro problema que precisa diagnóstico. Se pessoa já é conhecida por ter epilepsia, geralmente um ou dois episódios não requerem emergência, apenas observação. Mas verifique seu medicamento — ele pôde estar faltando doses.</p><p>Convulsão febril em criança: se criança tem febre muito alta e tem convulsão, isto é convulsão febril (comum, geralmente não séria). Mesmo assim, procure médico para verificar causa da febre. Mantenha criança fresca (remova roupas extras), mas NÃO use água fria que pode causar shock. Temperatura corporal normal de criança é mantida pelo médico.</p>`,
        cards:[{q:'Qual é a ação correta imediata para uma queimadura?',a:'Colocar sob água fria corrente por 10-20 minutos. NÃO usar gelo. Remover roupas não-presas e cobrir com gaze limpa ou pano.'}]
      },

        name:'Afogamento, Choque Anafilático e Reações Alérgicas',
        dur:'15min',
        content:`<h3>Afogamento, Choque Anafilático e Reações Alérgicas</h3><p>Afogamento é quando alguém inala água nos pulmões. Isto impede oxigenação do sangue. Pessoa pode se afundar rapidamente ou linguar perto da superfície. Sinais de afogamento: pessoa não consegue gritar (está usando toda energia para respirar), cabeça inclinada para trás, braços para os lados, corpo vertical na água. Muitas vezes aparência é de "brincar" quando na verdade é desespero silencioso.</p><p>Se você vê alguém afogando:</p><p>1. Resgate seguro: se está próximo, estenda um remo, tábua, ou corda. Pessoa afogando pode puxá-lo para baixo em pânico, então NÃO entre na água a menos que seja última opção e você seja excelente nadador. Se entrar, aproxime-se de trás, não de frente (para evitar que agarre seu pescoço).</p><p>2. Remova da água: coloque em superfície plana, imediatamente cheque respiração. Se não respira, comece RCP. NÃO perca tempo tentando "drenar água" — isto é mito. Água nos pulmões impede oxigenação, mas sua posição de drenagem não vai mudar isto. Comece RCP.</p><p>3. Se respira: coloque na posição de recuperação (de lado), monitore respiração, chame emergência. Pessoa pode vomitar água.</p><p>4. Hipotermia: se afogamento aconteceu em água fria, corpo pode estar muito frio. NÃO remova roupa úmida até em local quente. Pessoa pode ter respiração tão superficial que aparece "morta" mas ainda pode ser ressuscitada. Continue RCP mesmo se frio — ditado é "pessoa não está morta até estar quente e morta" (ou seja, continue tentando até reaquecimento).</p><blockquote class="tip">💡 <em>Dica: Melhor prevenção de afogamento é supervisão ativa (olhos sempre na criança) e coletes salva-vidas. Máquinas de brincar segurança aquática não substituem supervisão.</em></blockquote><p>Choque anafilático é reação alérgica severa de vida. Causas comuns: amendoim, outros nuts, frutos do mar, leite, ovo, penicilina, picadas de vespas/abelhas, látex. Sinais ocorrem rapidamente (segundos a minutos): inchaço de lábios/boca/garganta, dificuldade respiratória, erupção na pele (urticária), náusea/vômito, queda de pressão arterial (tontura), perda de consciência.</p><p>Tratamento de anafilaxia: Se você sabe que pessoa tem alergia grave, procure seu EpiPen (injetor de epinefrina). Isto é seringa pré-carregada que pessoa (ou você, em emergência) injeta no exterior da coxa. Instruções estão no EpiPen — remova tampa, coloque no exterior da coxa (através de roupas está OK), pressione para baixo até "click", deixe por 3-10 segundos, remova. Isto injeta epinefrina que abre via aérea e estabiliza reação alérgica.</p><p>Após usar EpiPen: SEMPRE ligue para emergência depois, mesmo que pessoa pareça melhor. Anafilaxia pode "rebote" e piorar novamente. Pessoa precisa de observação hospitalar e possível segundo EpiPen. NÃO presuma que está resolvido porque pessoa está respirando novamente.</p><blockquote class="example">📌 <em>Exemplo: Menino de 7 anos comeu cookie na festa escolar, não sabia que tinha amendoim (alergia dele). Começou a inchar face, ficar com dificuldade respiratória. Educador usou EpiPen na coxa dele. Respiração melhorou rapidamente. Mas pai levou ao hospital de qualquer forma. No caminho, inchaço começou a retornar — hospital foi capaz de administrar segundo EpiPen e medicina adicional. Se tivesse ido para casa pensando que estava OK, menino poderia ter morrido.</em></blockquote><p>Reações alérgicas menores: sem anafilaxia (sem inchaço da garganta ou dificuldade respiratória), alergias podem ser: urticária (erupção vermelha itinerante), prurido, náusea leve, ou inchaço de lábios (só lábios, não garganta). Estes podem ser tratados em casa com anti-histamínico oral (Allegra, Polaramine, etc.). Mas se em qualquer ponto há dificuldade respiratória, inchaço da garganta, ou confusão, isso é anafilaxia — use EpiPen e ligue para emergência.</p><p>Epipen: se você sabe que conhece alguém com alergia grave, peça permissão para que ele lhe mostre localização de seu EpiPen. Pratique remover tampas (há tampas de prática), entender como funcionar. No moment de crise, você não quer estar descobrindo por tentativa e erro.</p><p>Stings de inseto: picada de vespa/abelha causa dor, possível inchaço local. Se em cara/garganta, pode inchar e bloquear via aérea — isto é anafilaxia mesmo sem alergia conhecida. Remova aguilhão (se abelha deixou) puxando com lateral de cartão ou unhas (não aperte — pode injetar mais veneno). Coloque gelo, tome anti-histamínico, procure médico se inchaço está aumentando.</p><blockquote class="quote">💬 <em>"Anafilaxia é corrida contra relógio. Minutos contam. Se há qualquer dúvida, use EpiPen. É impossível "overdose" de epinefrina em emergência." — Alergista.</em></blockquote><p>Perspectiva: algumas pessoas vivem com alergias graves, medo constante de exposição acidental. Sua educação sobre anafilaxia e capabilidade de responder é para eles questão de vida ou morte. Serviço extraordinário.</p>`,
        cards:[{q:'Qual é o tratamento imediato para choque anafilático?',a:'Usar EpiPen (injetor de epinefrina) na coxa exterior imediatamente, depois ligar para emergência. Sempre ligue para emergência mesmo se melhorar.'}]
      },
      {
        id:9,
        name:'Transporte de Vítima e Considerações Finais',
        dur:'15min',
        content:`<h3>Transporte de Vítima e Considerações Finais</h3><p>Você estabilizou a vítima, fez primeiros socorros iniciais, e agora emergência está a caminho. Mas como você transporta pessoa ferida se precisar? Se está na rua e emergência está lenta, você pode precisar facilitar transporte ao hospital você mesmo. Este é delicado — movimento incorreto pode piorar lesão. Mas às vezes ficar imóvel também é ruim (estrutura em colapso). Você precisa de julgamento.</p><p>Transporte seguro: se é fratura de perna e você tem carro, é melhor colocar cuidadosamente no banco traseiro do carro (reclinar assento para frente, elevar perna com almofadas) e dirigir ao hospital de velocidade controlada do que aguardar emergência por horas. Se é pequena ferida na mão com sangramento controlado, emergência é melhor (você tem medicações que você não tem, estéril de forma apropriada). Use julgamento.</p><p>Levantando alguém ferido: se você DEVE mover pessoa (fogo, estrutura desabando), há técnicas. Para levantamento de "cadeira", duas pessoas em cada lado do corpo criando "cadeira humana" com seus braços entrelaçados. Para maca de improviso, estique pessoa em pano firme e dois de vocês levantam. NUNCA levante pela extremidade lesionada.</p><blockquote class="tip">💡 <em>Dica: Sua segurança importa também. Se mover pessoa vai lesioná-lo (você tem asma grave e estrutura está em fogo — não entre no fogo), espere emergência ou pedir ajuda maior.</em></blockquote><p>Na emergência: quando paramédicos chegarem, briefing rápido: quem é a vítima (nome, idade), o que aconteceu (queda de 10 pés, sangue arterial, inconsciente), o que você fez (RCP por 5 minutos, pressão no ferimento, EpiPen usado), história médica conhecida (alérgico a penicilina, diabético), medicação (tomando beta-bloqueador). Isto leva 30 segundos e é informação crítica.</p><p>Após paramédicos: você pode ser perguntado para ser testemunha ou dar informação adicional. Coopere. Você também pode continuar acompanhando (em carro seu) se é familiar. Hospital frequentemente lhe perguntará o que exatamente aconteceu — seu relato preciso ajuda diagnóstico.</p><p>Aspectos legais: você geralmente está protegido por "lei de bom samaritano" se você fez esforços honestos em primeiros socorros. Lei assume que você agiu com intenção genuína de ajudar, não de danificar. Isto é proteção importante. Você não vai ser processado por fratura de costela de RCP se salvou vida. Mas isto varia por jurisdição — educue-se sobre lei local.</p><p>Documentação pessoal pós-crise: após sair de cena (paramédicos assumiram), procure absorver nomes de pessoas que testemunharam, horário, localização, qualquer detalhes. Se você foi injuriado enquanto ajudava, procure cuidado médico você mesmo. Se eventos levarem a investigação mais tarde, sua memória precisa de detalhes.</p><blockquote class="example">📌 <em>Exemplo: Homem sofreu ataque cardíaco em shopping. Gerente de loja treinou ajudou com RCP enquanto outro cliente trouxe DEA. Paramédicos chegaram, chocaram, e pessoa sobreviveu. Meses depois, paciente convidou os dois heróis para entrevista de gratidão no hospital. Seu conhecimento salvou vida literal.</em></blockquote><p>Suporte pós-crise: ser primeira responder em emergência é psicologicamente exaustivo. Mesmo se tudo deu certo, você pode acordar à noite reexperimentando situação, questionando se fez tudo corretamente. Isto é normal. Procure falar com alguém, profissional de saúde mental se disponível. Muitos paramédicos e primeiros respondentes oferecem programas de debriefing crítico para processar. Use estes recursos. Sua saúde mental importa.</p><p>Manutenção de habilidades: este curso lhe deu conhecimento. Mas conhecimento sem prática degrada. Cada 2 anos, considere tomar treinamento de atualização RCP. Ler sobre primeiros socorros anualmente. Você esquecerá detalhes se não os revistar. Profissionais de emergência constantemente se treina porque vidas dependem disto.</p><p>Educação comunitária: agora que você sabe primeiros socorros, ajude outros a aprender. Ensine sua família, seus amigos, seus colegas. Grupo de oração na igreja pode beneficiar-se de treinamento de primeiros socorros. Quanto mais pessoas treinadas em uma comunidade, mais vidas serão salvas. Você se torna multiplicador de conhecimento salvavidas.</p><blockquote class="quote">💬 <em>"O melhor presente que pode dar a sua comunidade é ser preparado para salvar vidas quando emergência chega." — Capitão de Bombeiros.</em></blockquote><p>Perspectiva espiritual final: como cristãos, somos chamados a amar nosso próximo. Jesus disse em João 15:13, "Ninguém tem maior amor do que aquele que dá sua vida pelos seus amigos." Enquanto primeiros socorros não é literalmente dar sua vida, é colocar seus esforços, seu tempo, seu conhecimento à disposição do bem-estar de outro. É amor em ação. Cada vez que você responde a emergência com conhecimento e compaixão, você reflete Jesus. Cada vida que salva reverencia a Aquele que criou toda vida.</p><p>Conclusão do curso: você completou Primeiros Socorros Essenciais. Você agora sabe como avaliar cenas, fazer RCP, controlar hemorragia, lidar com engasgo, fraturas, envenenamento, convulsões, anafilaxia, e transportar vítimas. Você é não apenas mais educado, você é mais capacitado. Mais importante, você é agora capaz de fazer diferença literal entre vida e morte. Isto é responsabilidade honrosa. Use este conhecimento com humildade, coragem, e compaixão. A vida que você salva pode ser de alguém que você ama, ou de completo estranho — ambas têm igual valor. Você é agora embaixador de esperança em momentos sombrios.</p>`,
        cards:[{q:'Qual informação você deve comunicar aos paramédicos quando chegarem?',a:'Nome/idade vítima, o que aconteceu, ações que você tomou, história médica, medicação e alergias conhecidas.'}]
      }
    ],
    summary:{
      title:'Resumo — Situações Específicas',
      points:['Queimaduras: colocar em água fria por 10-20 minutos imediatamente. NÃO usar gelo ou pasta. Cobrir com gaze limpa e procurar médico se grande.','Choque anafilático: usar EpiPen na coxa exterior imediatamente, depois chamar emergência. SEMPRE ir ao hospital mesmo se melhorar rapidamente.','Convulsão: deixe quieta, mude para lado se possível, não tente parar — observe duração e procure médico se dura >5 minutos ou múltiplas.','Transportar vítima só se absolutamente necessário e com técnicas seguras. Ao entregar aos paramédicos, forneça briefing claro e rápido de situação.']
