      id: 'FNDC',
      name: 'Os Pilares da Corrida de Qualidade',
      content: '<h4>Construindo sua Fundação de Corredor</h4><p>Corrida parece simples - apenas coloque um pé em frente do outro. Mas a realidade é que corrida é um esporte complexo que demanda técnica, força, flexibilidade e inteligência de treinamento. A diferença entre um corredor que prospera e um que sofre com lesão frequentemente reside nestes fundamentos.</p><p>Os pilares de um corredor de qualidade são: biomecânica eficiente, força e estabilidade adequadas, mobilidade funcional, condicionamento aeróbico apropriado, e capacidade de recuperação. Negligenciar qualquer um destes pilares cria vulnerabilidade a lesão ou desempenho subótimo.</p><blockquote class="tip"><strong>Dica Importante:</strong> Muitos iniciantes cometem erro de aumentar quilometragem muito rapidamente. Isto é receita direta para lesão. Aumente apenas 10% por semana, gradualmente.</blockquote><p>A biomecânica de corrida afeta tudo - seu risco de lesão, sua eficiência de energia, seu desempenho geral. Uma boa forma de corrida não é sobre parecer bonito. É sobre minimizar força desnecessária enquanto maximiza propulsão para frente. É sobre terras seus pés eficientemente sob seu corpo em vez de na sua frente.</p><p>Você não precisa de equipamento caro para ser corredor de qualidade. Você precisa de sapatos apropriados para seu tipo de pé (pronação), roupas que não causem atrito, e uma progressão inteligente de treinamento. Tudo mais é secundário.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Comecei a correr aos 45 anos pensando que era apenas correr. Sem forma apropriada, desenvolvi dor de joelho. Uma sessão com um técnico de corrida analisando minha biomecânica mudou tudo. Simples ajustes de postura e cadência eliminaram dor completamente e melhoraram desempenho.</blockquote><p>Você está prestes a aprender a correr eficientemente e de forma segura, não importa seu nível ou objetivo.</p>'

    {
      id: 'SBMC',
      name: 'Seleção de Sapatos e Biomecânica Básica',
      content: '<h4>Escolhendo o Sapato Correto Para Sua Corrida</h4><p>O primeiro erro que muitos fazem é comprar sapato de corrida bonito em vez de apropriado. A escolha correta de sapato é baseada em seu tipo de pé e biomecânica, não em estética. Sapato errado pode levar a lesão rápida. Sapato correto pode ser diferença entre corredor frustrado e corredor que prospera.</p><p>Existem três tipos de pé básicos em relação a pronação: supinador (arco alto, prona para fora), neutro (pronação normal), e overpronador (arco baixo, prona para dentro). Você pode descobrir seu tipo observando a sola de um sapato antigo - onde ela se desgasta mais? Isto mostra como seu pé prona.</p><blockquote class="tip"><strong>Dica Importante:</strong> Visite uma loja de corrida especializada que analisa sua marcha. Eles podem identificar seu tipo de pé e recomendar sapatos apropriados - isto é muito melhor que adivinhar.</blockquote><p>A biomecânica básica de corrida eficiente envolve: cadência de aproximadamente 170-180 passos por minuto (mais rápido é frequentemente mais eficiente), footstrike relativo ao meio do pé em vez de calcanhar, postura ereta com leve inclinação para frente (não inclinar em cintura), braços oscilando para frente e trás (não cruz o corpo), e olhar focado alguns passos para frente (não olhar para baixo).</p><p>Cadência é especialmente importante. Muitos corredores lentos têm cadência muito baixa (160 ou menos), levando a stride comprido demais que cria força de impacto excessivo. Aumentar cadência para 175-180 reduz força de impacto e frequentemente reduz lesão enquanto melhora economia.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor que trabalhava tinha cadência de apenas 150 passos/minuto e lesão crônica de joelho. Treinou sua cadência até 175. Imediatamente seus joelhos sentiram melhor, sua velocidade aumentou (mesma velocidade mas com passos mais rápidos), e sua economia melhorou dramaticamente.</blockquote><p>Sapato e técnica básica corretos são a fundação. Construa bem nesta fundação.</p>'

    {
      id: 'FRCS',
      name: 'Força, Rigidez e Estabilidade para Corredores',
      content: '<h4>Por Que Corredores Precisam Treinar Força</h4><p>Há um mito que corredores não devem treinar força porque "adiciona peso". Isto é completamente falso. Corredores que treinem força apropriadamente são mais rápidos, mais resilientes a lesão, e têm melhor economia de corrida. A força é crítica para corrida de qualidade.</p><p>A força que importa para corredores não é força máxima de levantador de peso. É "força de resistência" e "rigidez" - capacidade de seus músculos manterem-se rígidos durante o impacto de corrida. Isto estabiliza suas articulações, reduz oscilação desnecessária, e melhora eficiência de transferência de força.</p><blockquote class="tip"><strong>Dica Importante:</strong> Dois dias por semana de treino de força funcional (não no mesmo dia de corrida longa) é ideal. Isto é suficiente para ganho sem interferir recuperação de corrida.</blockquote><p>Exercícios particulamente valiosos para corredores: squats (desenvolvem força de perna e estabilidade), lunges (trabalham um pé por vez, similiar a corrida), deadlifts (desenvolvem cadeia posterior crucial), single-leg exercises (melhoram estabilidade de corrida), e core work (estabiliza coluna durante impacto).</p><p>A razão pela qual força é crítica é porque corrida é esporte de impacto - seu corpo terra com força várias vezes seu peso corporal a cada passo. Músculos fracos não conseguem amortecer este impacto eficientemente, transferindo força para articulações, causando lesão.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Uma corredora que tinha plateaued em desempenho não estava fazendo força. Implementei dois dias de treino de força funcional. Seus tempos melhoraram 8% em 3 meses apenas de força melhorada, e deixou de ter dor crônica de joelho que tinha durante anos.</blockquote><p>Correr rápido demanda força. Desenvolva-a.</p>'

      content: '<h4>Mantendo seu Corpo Saudável para Treino Consistente</h4><p>Muitos corredores focam apenas em quilometragem e desconsideram recuperação. O resultado é lesão crônica, burnout, ou overtraining. Um programa bem-balanceado dá tanta atenção a recuperação quanto a treino. De fato, recuperação é onde o progresso acontece.</p><p>Recuperação envolve múltiplos componentes: sono adequado (7-9 horas), nutrição apropriada, hidratação, mobilidade ativa nos dias de descanso, e redução de stress quando possível. Negligenciar qualquer um destes causa acúmulo de fadiga e risco aumentado de lesão.</p><blockquote class="tip"><strong>Dica Importante:</strong> Massagem com rolo de espuma ou bola é excelente para recuperação ativa. Apenas 10 minutos de mobilidade após corrida reduz rigidez e melhora recuperação dramaticamente.</blockquote><p>Lesões de corrida mais comuns (joelho de corredor, fascite plantar, síndrome do atrito iliotibial) frequentemente vêm de aumento de quilometragem muito rápido. A regra 10% por semana é sua proteção. Se treina 30km uma semana, próxima semana não exceda 33km.</p><p>Dias de descanso são tão valiosos quanto dias de treino. Durante descanso, seu corpo se recupera, adaptações acontecem, lesão diminui risco. Alguns corredores treinam 7 dias por semana em ritmo moderado. Outros fazem apenas 4-5 dias de treino estruturado com dias de descanso. Ambos podem funcionar, mas descanso é crítico.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor ambicioso estava correndo 7 dias por semana, aumentando quilometragem agressivamente. Desenvolveu lesão de joelho. Reduzi para 4 dias de treino estruturado, 2 dias de corrida fácil, 1 dia descanso completo. Após 6 semanas, lesão desapareceu, performance melhorou porque seu corpo tinha tempo para recuperar.</blockquote><p>Consistência sustentável supera volume agressivo temporário. Recupere bem para treinar bem novamente.</p>'

      id: 'ABRX',
      name: 'Construindo Base Aeróbica Sólida',
      content: '<h4>A Fundação de Toda Corrida Rápida é Resistência Lenta</h4><p>Há um conceito contra-intuitivo em treinamento de corrida: para correr rápido, você deve primeiro aprender a correr lento muito. Isto parece paradoxal, mas é fundado em ciência sólida. Corrida lenta desenvolve base aeróbica - sua capacidade de usar gordura como combustível, sua eficiência cardiovascular, sua economia de corrida.</p><p>Uma base aeróbica forte significa você pode correr em zona aeróbica (60-70% de frequência cardíaca máxima) confortavelmente durante horas. Isto é foundation de tudo. Um maratonista sem base aeróbica forte não consegue terminar maratona. Um velocista sem base aeróbica não consegue treinar com frequência adequada.</p><blockquote class="tip"><strong>Dica Importante:</strong> A maioria dos corredores treina muito rápido na maioria do tempo. Deveria ser 80% na zona fácil (aeróbica), 20% em zona mais dura. Reverta isto.</blockquote><p>Corrida fácil é corrida onde você consegue falar em frases completas. Se está respirando pesadamente ou consegue apenas dizer poucas palavras, está muito rápido. Desacelere. A economia melhor vem de volume de corrida aeróbica, não velocidade.</p><p>Um plano típico de base aeróbica para iniciante é: 3-4 dias de corrida fácil (30-60 minutos cada), 1-2 dias de treino de força, 2-3 dias de descanso completo. Isto constrói base sólida sem risco excessivo de lesão. Após 8-12 semanas, sua base está estabelecida e você pode começar a adicionar treino mais duro.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor iniciante queria correr 5K rápido. Estava tentando fazer treino de velocidade desde dia um, estava constantemente cansado e tênue. Ajudei focar em corrida fácil por 12 semanas sem nenhum treino de velocidade. Seu fitness base explodiu. Depois quando adicionou treino de velocidade, seus tempos de 5K melhoraram 15% imediatamente.</blockquote><p>Corrida lenta bem feita é investimento em corrida rápida futura. Seja paciente.</p>'

      name: 'Periodização: Estruturando seu Ano de Treino',
      content: '<h4>Ciclos de Treinamento que Promovem Progresso Contínuo</h4><p>Treinar aleatoriamente todos os dias leva ao platô. Periodização - estruturação intencional de treino em ciclos - é o que permite progresso contínuo ano após ano. É a diferença entre corredores que melhoram consistentemente e aqueles presos no mesmo nível.</p><p>Um ciclo de periodização típico para maratonista é: 12 semanas de base (foco em volume, corridas longas, corridas fáceis), 8 semanas de treino específico (foco em velocidade, intervalos, tempo runs), 4 semanas de pico (redução de volume, manutenção de qualidade, acumulo de taper), 2 semanas de taper final e corrida. Isto coloca você em condição de pico no dia certo.</p><blockquote class="tip"><strong>Dica Importante:</strong> Taper é crítico. Na final 2-3 semanas antes maratona, reduza volume em 50% mantendo qualidade. Isto permite recuperação completa e energia máxima no dia da corrida.</blockquote><p>Para corredores de 5K, ciclo é mais curto: 6-8 semanas de base, 4-6 semanas de treino específico, 2 semanas de taper. Quanto mais longa a prova, mais longa a periodização.</p><p>Durante período de base, seu treino típico é: 3 corridas fáceis, 1 corrida longa (aumentando 10% por semana), 1 corrida de "tempo" moderado (não máximo esforço), 1-2 dias de força, 1-2 dias descanso. Durante período de velocidade, substitui um das fácil com intervalos de velocidade ou tiros.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor que treino estava sempre duro, sem estrutura. Implementei periodização apropriada. Seu desempenho no primeiro ano de periodização melhorou 18% porque estava finalmente em condição de pico no tempo certo, em vez de sempre fatigado.</blockquote><p>Periodização transforma corredores bons em excelentes. Estruture seu ano com intenção.</p>'

      name: 'Tipos de Treino: Fácil, Moderado, Duro e Longo',
      content: '<h4>Os Pilares de um Plano de Treino Bem-Balanceado</h4><p>Nem toda corrida deveria ser igual. Diferentes tipos de corrida desenvolvem diferentes qualidades. Um plano bem-construído inclui corridas fáceis, corridas moderadas/tempo, corridas de velocidade/intervalo, e corridas longas, cada uma com propósito específico.</p><p>Corridas fáceis (60-70% frequência cardíaca máxima) desenvolvem base aeróbica, economia, e capacidade de recuperar. Deveria ser metade ou mais de suas corridas. Se está correndo 30km na semana, 20km deveria ser fácil.</p><p>Corridas de "tempo" (80-85% frequência cardíaca máxima) desenvolvem seu "ritmo de corrida" - velocidade que você pode manter por aproximadamente 1 hora. Para maratonistas, isto é crítico. Um típico "tempo run" é 10 minutos de aquecimento, 20-30 minutos em ritmo de tempo, 10 minutos resfriamento.</p><blockquote class="tip"><strong>Dica Importante:</strong> Intervalos devem ser feitos apenas 1 vez por semana quando seu fitness é adequado. Muito mais causa overtraining e lesão.</blockquote><p>Corridas de velocidade/intervalo (90-100% frequência cardíaca máxima) desenvolvem seu VO2max (capacidade de usar oxigênio) e velocidade. Exemplos: 8x800m em velocidade 5K com descanso entre, ou 5x3 minutos em esforço de 5K. Estas são treinos DURO que exigem recuperação adequada.</p><p>Corridas longas (em zona fácil, 60-70%) desenvolvem força mental, eficiência de combustível, adaptação fisiológica. Um maratonista deveria fazer uma corrida longa por semana, aumentando para 32-35km para maratona.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor estava fazendo todos suas corridas em ritmo "moderado-rápido" porque achava que era treino ideal. Seu desempenho era inconsistente. Estruturei seu plano: metade fácil, uma de tempo, uma de intervalo, uma longa. Seu desempenho estabilizou e começou a melhorar consistentemente.</blockquote><p>Variedade inteligente de treino produz progresso. Use cada tipo com intenção.</p>'

      content: '<h4>Estruturas Concretas de Treino para cada Distância</h4><p>A estrutura de seu treino deveria variar baseado na distância que está preparando. Um plano de 5K é muito diferente de um plano de maratona porque exigências fisiológicas são diferentes. Aqui estão templates que você pode adaptar para seu objetivo.</p><p>Plano 5K (6 semanas): Segunda - 2km fácil + 6x800m em ritmo de 5K; Terça - 8km fácil; Quarta - 2km fácil + 5x1000m em ritmo de 5K + 2km fácil; Quinta - 5km fácil; Sexta - treino de força; Sábado - 8-10km longo; Domingo - descanso. Isto é foco em velocidade com suficiente volume para manter base.</p><p>Plano Meio Maratona (8 semanas): Segunda - 2km aquecimento + 20-25 minutos em ritmo de meio maratona + 2km resfriamento; Terça - 8km fácil; Quarta - 2km aquecimento + 6x1200m em ritmo 10K + 2km resfriamento; Quinta - 5km fácil; Sexta - treino de força; Sábado - 14-18km longo; Domingo - descanso. Equilibra velocidade e volume.</p><blockquote class="tip"><strong>Dica Importante:</strong> Estes são templates - ajuste baseado como você se sente. Se está muito cansado, reduza uma sessão dura ou aumente dias fáceis.</blockquote><p>Plano Maratona (12-16 semanas): Segunda - 2km aquecimento + 20-30 min em ritmo de maratona + 2km resfriamento; Terça - 8-10km fácil; Quarta - 2km aquecimento + 5x2000m em ritmo 10K com descanso + 2km resfriamento; Quinta - 6km fácil; Sexta - treino de força; Sábado - 20-35km longo (aumentando 10% por semana); Domingo - descanso. Final 3 semanas reduz volume em 50% mantendo qualidade (taper).</p><blockquote class="example"><strong>Exemplo Prático:</strong> Usei estes templates com vários clientes. Um iniciante seguiu plano 5K por 6 semanas saindo de 22 minutos para 19:15. Um maratonista seguiu plano maratona, quebrou 4 horas pela primeira vez. Estrutura importa.</blockquote><p>Use estes templates como ponto de partida. Adapte para seu nível e como seu corpo responde.</p>'

    {
      id: 'VMOX',
      name: 'VO2Max: Medida e Desenvolvimento',
      content: '<h4>Seu Máximo de Oxigênio e Como Aumentá-lo</h4><p>VO2max é a quantidade máxima de oxigênio que seu corpo consegue utilizar durante esforço máximo. É medido em mililitros de oxigênio por quilograma de peso corporal por minuto (ml/kg/min). VO2max é um preditor forte de performance em resistência - corredores com VO2max mais alto são frequentemente corredores mais rápidos.</p><p>A boa notícia é que VO2max é treináble. Treino de intervalo de alta intensidade é a forma mais eficiente de aumentar VO2max. Treino fácil consistente também melhora VO2max, mas mais lentamente. Treino de velocidade é especificamente desenhado para isto.</p><blockquote class="tip"><strong>Dica Importante:</strong> Treino de intervalo deveria aumentar seu VO2max em 4-8% por mês de treino apropriado. Isto é mudança grande que afeta performance.</blockquote><p>Seu VO2max é geneticamente determinado até certo ponto - alguns nascem com vantagem. Mas mesmo atletas com VO2max geneticamente mais baixo conseguem melhorar significativamente através de treino. A diferença entre um desempenho bom e excelente frequentemente é VO2max treinado.</p><p>Um valor típico para homem não-treinado é ~35-40 ml/kg/min. Para mulher não-treinada, ~25-30. Corredores de distância treinados frequentemente têm 60-70+. Você provavelmente não precisa alcançar nível olímpico - melhorar seu próprio VO2max em 15-20% através de treino é mudança significante em performance.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor de 5K que treinei tinha VO2max estimado de 48 quando começamos. Após 12 semanas de treino de intervalo regular, seu VO2max melhorou para 54 (12% melhoria). Seu tempo de 5K melhorou de 22:30 para 20:45 - mudança dramática.</blockquote><p>VO2max treinado é performance treinada. Invista em aumentá-lo.</p>'

      id: 'INTU',
      name: 'Sessões de Intervalo: Tipos e Estrutura',
      content: '<h4>Desenhando Treino de Intervalo que Estimula Adaptação</h4><p>Treino de intervalo envolve períodos de esforço muito alto alternados com períodos de recuperação. Diferentes durações de intervalo desenvolvem diferentes qualidades. Intervalos mais curtos desenvolvem velocidade e potência. Intervalos mais longos desenvolvem resistência de velocidade e VO2max.</p><p>Intervalos 400m (em espaço de ~90 segundos): Exemplo: 10x400m em seu ritmo de 1500m com descanso de 90-120 segundos entre. Isto treina velocidade pura e potência aeróbica. Bom para corredores de 1500m-5K.</p><p>Intervalos 800m (em espaço de ~3 minutos): Exemplo: 6x800m em seu ritmo de 5K com descanso de 2-3 minutos entre. Isto é "ouro" para corredores de 5K-10K. Treina ambos potência e resistência.</p><blockquote class="tip"><strong>Dica Importante:</strong> Descanso entre intervalos é tão importante quanto os intervalos. Nunca faça descanso muito curto ou você não consegue manter intensidade.</blockquote><p>Intervalos 1200m (em espaço de 5-6 minutos): Exemplo: 5x1200m em ritmo de 10K com descanso de 2-3 minutos. Treina especificamente VO2max. Bom para preparação de 10K-meio maratona.</p><p>Intervalos 2000m+ (em espaço de 8+ minutos): Exemplo: 4x2000m em seu ritmo de 10K com descanso de 2-3 minutos. Treina resistência de velocidade. Crítico para maratonistas desenvolvendo velocidade.</p><p>Uma sessão típica de intervalo tem: 15-20 minutos de aquecimento progressivo, intervalo principal (exemplo acima), 10 minutos de resfriamento. Total ~60-75 minutos. Você deveria estar ofegante e suado quando termina, mas conseguir recuperar em 10 minutos de resfriamento.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor de 10K que treino estava fazendo intervalos no ritmo errado (muito rápido) e recuperação insuficiente. Ajustei para ritmo correto (um pouco mais lento) com descanso adequado. Imediatamente sua consistência melhorou, não estava se lesionando, e seu fitness melhorou mais que antes.</blockquote><p>Estrutura apropriada de intervalo é tudo. Qualidade sobre quantidade.</p>'

    {
      id: 'FRTK',
      name: 'Fartlek e Treino de Velocidade Criativo',
      content: '<h4>Além do Intervalo Estruturado: Treino Criativo</h4><p>Nem todo treino de velocidade precisa ser estruturado rigidamente. "Fartlek" (palavra sueca para "jogo de velocidade") é forma flexível de treino de intervalo onde você alterna entre esforços rápidos e fáceis baseado em como se sente, possivelmente baseado em marcos (correr rápido até próxima árvore, depois fácil até próximo sinal de parada, etc).</p><p>Fartlek é particularmente bom para: fazer treino de velocidade menos monotônico, adaptar intensidade baseado em como você se sente naquele dia, manter treino divertido e engajador, desenvolver sensibilidade de ritmo. Um típico fartlek é 15 minutos aquecimento, depois 20-30 minutos de alternância entre rápido (não máximo esforço) e fácil, 10 minutos resfriamento.</p><blockquote class="tip"><strong>Dica Importante:</strong> Fartlek é excelente para iniciantes para desenvolver sensibilidade de ritmo e conhecer seus diferentes ritmos sem rigidez de sessão de intervalo.</blockquote><p>Outro forma é "tempo run com surtos" onde você faz um "tempo run" normal (20-30 minutos em ritmo de 1 hora) mas adiciona 4-6 surtos de 1 minuto em velocidade 5K com recuperação de 1-2 minutos. Isto combina benefício de resistência de tempo run com estímulo de velocidade.</p><p>Estrias (hill repeats) são forma valioso de treino de velocidade. Encontre colina de ~90-120 segundos de corrida. Corra rápido para cima, jog relaxado para baixo. Repita 6-8 vezes. Isto desenvolve potência e força de perna sem impacto total de intervalo em terreno plano.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Uma corredora que treino odiava intervalo estruturado (achava muito repetitivo). Mudei para fartlek 1-2 vezes por semana com intervalo tradicional 1 vez. Sua aderência melhorou, ainda desenvolveu velocidade, e relaxamento voltou ao treino.</blockquote><p>Criatividade em velocidade mantém treino engajador. Varie suas abordagens.</p>'

    {
      id: 'RCVR',

      content: '<h4>Por Que Dias Após Intervalo São Tão Importantes Quanto o Intervalo Mesmo</h4><p>Treino de velocidade é muito estressante ao seu sistema nervoso e músculos. O dia (ou dias) imediatamente após intervalo é quando seu corpo se recupera e faz adaptações. Negligenciar recuperação pós-intervalo cancela grande parte do benefício do treino.</p><p>Imediatamente após intervalo: resfriamento de 10 minutos em ritmo fácil ajuda clearance de lactato. Dentro de 30 minutos: refeição com carboidrato e proteína (refeição post-treino). Depois: mobilidade leve, alongamento, possivelmente massagem com rolo de espuma para 10-15 minutos.</p><blockquote class="tip"><strong>Dica Importante:</strong> O dia após intervalo deveria ser dia de descanso completo ou corrida muito fácil (3-5km em ritmo muito lento). Nenhum treino duro. Seu corpo ainda está em processamento do treino anterior.</blockquote><p>Dentro de 24 horas: sono é crítico. Treino de velocidade prejudica qualidade de sono em algumas pessoas (estimulação excessiva). Reduza cafeína, reduza luz azul, considere meditação ou relaxamento progressivo para facilitar sono após treino duro.</p><p>Nos próximos dias: continue hidratação e nutrição adequada. Ingestão de sal apropriada ajuda retenção de fluido. Eletrólitos são particularmente importantes após treino de velocidade intenso.</p><p>Este ciclo - treino duro, dia fácil ou descanso, recuperação enfatizada - é padrão que você deveria ver em seu plano. Isto permite treino consistente de qualidade sem acumular fadiga.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor tinha grande queda em performance a cada segunda sessão de intervalo. Quando analisei seu plano, vi que nunca tinha dias verdadeiros de recuperação - treinava duro de novo 18 horas após intervalo anterior. Estruturei: intervalo segunda, descanso completo terça, corrida fácil quarta. Sua consistência e performance melhoraram dramaticamente.</blockquote><p>Recuperação não é desculpa para ser preguiçoso. É parte essencial de treino. Estruture isto em seu plano.</p>'

  topics: [
    {
      id: 'LPRV',
      name: 'Prevenção e Gerenciamento de Lesão de Corrida',
      content: '<h4>Protegendo seu Corpo para Longevidade em Corrida</h4><p>Lesões são o maior frustrador de corredores. Você treina consistentemente por semanas ou meses, fica em forma, e então uma lesão o bota no sofá por 6 semanas. A melhor estratégia não é como tratar lesão - é como prevenção-la.</p><p>A maioria das lesões de corrida vem de três fontes: aumento de volume muito rápido, biomecânica fraca, ou falta de força adequada. Você já sabemos saber sobre aumento gradual (10% por semana) e biomecânica (cadência apropriada, footstrike neutro). A terceira - força - é frequentemente negligenciada.</p><blockquote class="tip"><strong>Dica Importante:</strong> Treino de força dedicado 2x por semana (squats, lunges, deadlifts, single-leg work) previne 50% das lesões comuns de corrida.</blockquote><p>Lesões mais comuns em corredores: joelho de corredor (dor ao redor da rótula, geralmente por fraqueza de quadríceps ou glúte), fascite plantar (dor no arco do pé), síndrome do atrito iliotibial (dor na lateral do joelho), tendinite de aquiles (dor no calcanhar). Todas podem ser prevenidas com força apropriada e progressão de treino sensível.</p><p>Se você nota dor inicial - nunca ignorar. Pequena dor que se nega é frequentemente grande dor que você não consegue ignorar depois. Quando sente dor: reduza volume, mantenha treino leve, faça força e mobilidade para articulação afetada, considere ver especialista. A maioria das lesões de corrida leves curam em 1-2 semanas com abordagem apropriada.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor deixou uma pequena dor no joelho sem verificação enquanto continuava treino normal. Piorou. Eventualmente foi tão severo que não conseguia correr. 8 semanas de reabilitação dedicada para se recuperar. Teria sido 1-2 semanas se tivesse respondido à primeira dor.</blockquote><p>Prevenção é medicina. Seja proativo com saúde de seu corpo.</p>'

    {
      id: 'PRPX',
      name: 'Preparação Final e Taper para Prova Máxima',
      content: '<h4>Os Últimos Detalhes que Determinam Performance no Dia</h4><p>Os últimos dias antes uma corrida importante são críticos. Muitos corredores sabotam semanas de treino duro através de decisões pobres na final 5-7 dias. Vamos cobrir o que você deveria estar fazendo.</p><p>Taper é reduração de volume enquanto mantém qualidade. Começa tipicamente 3 semanas antes maratona (mais curto para distâncias mais curtas). Semana 1 de taper: reduza volume a 70%. Semana 2: reduza a 50%. Semana 3 (semana da prova): reduza a 30%. Mantenha uma ou duas sessões curtas de velocidade para manter "pernas vivas" mas nada duro.</p><blockquote class="tip"><strong>Dica Importante:</strong> Durante taper, muitos corredores sentem-se fraco ou lento nos treinos curtos. Isto é completamente normal - seu corpo está se recuperando. Confia no processo.</blockquote><p>Nutrição durante taper: mantenha ingestão de carboidrato alta. Não comece "dieta" durante taper. Seu corpo precisa de combustível adequado para reparar do treino anterior. Se quer perder peso antes prova, faça 3+ meses antes, não semanas antes.</p><p>Sono é crítico. Tente dormir 8+ horas noites durante taper. Sono inadequado prejudica performance mais que qualquer outro fator. Se está tendo insônia de nervosismo: meditação, leitura, ou outras técnicas de relaxamento ajudam.</p><p>Dia antes prova: refeição muito conhecida e confortável. Não tente algo novo. Passe o dia relaxado - não procura fazer "último treino" ou correr demais. Seu treino está feito. Agora é apenas sobre chegar fresco ao dia da prova.</p><p>Dia da prova: acorde cedo para permitir tempo digestão. Café da manhã familiar mas não novo. Hidrate bem mas não excessivamente. Aquecimento leve 20-30 minutos antes prova, incluindo alguns surtos curtos de velocidade para "ativar" seu sistema.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um maratonista que treino ficou muito nervoso durante taper, começou a treinar pesadamente "para não perder forma". Descuparalhamos o treino. Sua performance na maratona foi pior que treino anterior porque não veio descansado. O próximo ano fez taper apropriado e quebrou seu tempo por 12 minutos.</blockquote><p>Taper não é onde você perde forma - é onde permite seu corpo se recuperar completamente. Confia nele.</p>'

    {
      id: 'UTRM',
      name: 'Ultramaratona: Além da Maratona',
      content: '<h4>Quando Maratona é Apenas o Começo</h4><p>Ultramaratona (qualquer distância mais longa que maratona: 50K, 100K, 100 milhas, etc) é diferente em qualidade fundamental. Não é apenas mais do mesmo - é esporte diferente. Eficiência, gerenciamento de nutrição durante prova, resistência mental, técnica são tão importantes quanto aeróbico.</p><p>Treino para ultramaratona é diferente. Volume é mais alto - 80-120km por semana é comum. Correrias longas são muito mais longas - 3-4 horas de corrida não é incomum. Você está treinando capacidade de correr lentamente por muito, muito tempo em condições variadas (sol, frio, fadiga extrema).</p><blockquote class="tip"><strong>Dica Importante:</strong> Ultramaratonistas deve praticar nutrição durante corridas longas repetidamente antes corrida real. Seu trato digestivo precisa aprender como processar comida/líquido enquanto está correndo.</blockquote><p>Nutrição durante ultramaratona é crítica. Não consegue apenas água - precisa de carboidratos durante toda a prova. Muitos ultramaratonistas "carregam" comida (gel, barras, alimentos sólidos) ou dependem de aid stations. Descobrir que seu estômago consegue tolerar é essencial através de treino.</p><p>Equipamento é mais crítico. Sapatos bons, meias boas, prevenção de bolhas. Alguns ultramaratonistas usam mochilas leves com água e alimento. Conforto depois de 10+ horas é diferente de conforto depois de 3 horas.</p><p>Resistência mental em ultramaratona é enorme. Você será desconfortável. Vai querer parar. Treinar capacidade de continuar quando está cansado é tanto mental quanto físico. Experiência anterior em distâncias longas ajuda.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Um corredor completou 5 maratonas e decidiu tentar 50K. Acreditava que era apenas 1.3x a maratona. Completou, mas foi experiência muito mais dura que esperava porque o treino não preparou para múltiplas horas de fadiga extrema. Aprendeu lição e treinou apropriadamente para próximo 50K. Muito melhor experiência.</blockquote><p>Ultramaratona é jornada. Respeite a distância, treine apropriadamente, e desfrute aventura.</p>'

      id: 'BXRN',
      name: 'Boxeo Rocha: Construindo Mentalidade de Maratonista',
      content: '<h4>Aspectos Mentais de Corrida Longa</h4><p>Enquanto você treiná seu corpo, você também deve treinar sua mente. Corrida, especialmente maratona, é tão mental quanto física. Sua capacidade de lidar com desconforto, manter foco, superar auto-dúvida são habilidades treinadas como músculos.</p><p>Durante corrida longa, você enfrentará momentos difíceis. Quilômetro 15, seu corpo começa a se cansar. Você questiona sua preparação. Quilômetro 25, você tem dor. Quilômetro 32, você quer apenas parar. Isto é normal. Corredores bem-sucedidos têm estratégias mentais para lidar com isto.</p><blockquote class="tip"><strong>Dica Importante:</strong> Quebre a prova em partes mentais. Em vez de pensar "ainda tenho 30km", divida em segmentos de 5km e apenas pense sobre próximo segmento.</blockquote><p>Afirmações positivas funcionam. Quando começar a lutar mentalmente, repita frases que funcionam para você: "Meu corpo é forte", "Cada passo me aproxima do fim", "Sou capaz de fazer isto". Neurologia responde a auto-linguagem.</p><p>Visualização antes corrida ajuda também. Visualize você completando forte, sem dor significativa, chegando ao fim com energia. Seu subconsciente responde a imagens que você o alimenta.</p><p>Experiência anterior em corridas longas constrói confiança. Cada maratona ou ultramaratona que você completa mostra a si mesmo que consegue. Este conhecimento torna próxima corrida mentalmente mais fácil.</p><blockquote class="example"><strong>Exemplo Prático:</strong> Uma corredora que treinei tinha ansiedade severa sobre maratona. Implementei afirmações simples ("Meu corpo sabe como fazer isto", "Sou forte") e quebra mental da prova em 6 segmentos de 7km. Sua experiência foi transformada - completou relativamente confortável mentalmente.</blockquote><p>Mental resilência é construída. Trabalhe nisto como qualquer outro aspecto de treinamento.</p>'
