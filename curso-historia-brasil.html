    topicos:[
      {titulo:"Período Pré-Colonial (1500-1530)",texto:`O período pré-colonial brasileiro, que se estende de 1500 a 1530, é um capítulo frequentemente negligenciado da história nacional — mas de fundamental importância para entender os trinta anos que precederam a colonização efetiva. Durante esse período, Portugal demonstrou interesse econômico no Brasil, mas não o suficiente para investir na colonização permanente de um território que, comparado às riquezas do Oriente, parecia modesto e distante.

A principal atividade econômica desse período foi o comércio do pau-brasil. Essa árvore nativa — Caesalpinia echinata — produzia uma madeira avermelhada usada para tingir tecidos na Europa, onde o vermelho era símbolo de riqueza e status. Antes da colonização, os indígenas cortavam essa madeira com instrumentos de pedra. Com a chegada dos portugueses e suas ferramentas de ferro, o processo ficou muito mais eficiente, e o escambo se estabeleceu rapidamente: objetos de metal em troca de trabalho e madeira.

O sistema de arrendamento do pau-brasil foi o primeiro mecanismo formal de exploração do Brasil. A coroa portuguesa concedia a grupos de comerciantes o direito exclusivo de explorar a madeira em determinados trechos da costa, em troca de pagamentos fixos e do compromisso de defender o território contra invasores estrangeiros. O primeiro grande contrato foi concedido ao grupo de Fernão de Noronha em 1502. Esse modelo transformou o Brasil em empresa comercial antes de colônia.

As feitorias foram as primeiras instalações permanentes dos portugueses no Brasil. Eram postos de comércio e armazenamento construídos em pontos estratégicos do litoral — Cabo Frio, Pernambuco, Bahia — onde as cargas de pau-brasil eram acumuladas até a chegada dos navios. Eram estruturas simples, gerenciadas por um feitor e um pequeno número de homens. Os línguas — portugueses que aprendiam o tupi e funcionavam como intérpretes — eram elementos cruciais nesse sistema.

A ameaça estrangeira foi o principal fator que forçou Portugal a mudar de estratégia. Os franceses, que não reconheciam o Tratado de Tordesilhas, enviavam regularmente navios ao Brasil para comerciar pau-brasil diretamente com os indígenas. Os corsários franceses estabeleceram relações próximas com os Tupinambá do nordeste — aprendendo a língua, casando com mulheres indígenas e se integrando parcialmente à cultura local. Essa presença francesa era ameaça real e crescente à soberania portuguesa.

A solução encontrada por Portugal foi transformar o Brasil de área de interesse em colônia efetiva. A expedição de Martim Afonso de Sousa, enviada ao Brasil em 1530, foi o primeiro passo concreto: percorreu a costa, expulsou corsários franceses, fundou a vila de São Vicente em 1532 — o primeiro núcleo de colonização permanente — e introduziu o cultivo da cana-de-açúcar, que se tornaria o motor econômico da colônia nas décadas seguintes. A decisão de implementar as capitanias hereditárias em 1534 completou essa transformação estratégica.

O período pré-colonial deixou legados importantes para o Brasil. O sistema de escambo com os indígenas criou padrões de relação econômica que persistiram nas décadas seguintes. A dependência das ferramentas de metal criada nesse período tornaria os indígenas crescentemente vulneráveis à pressão colonial. As alianças entre grupos indígenas e europeus rivais — portugueses com Tupiniquim, franceses com Tupinambá — aprofundaram divisões que tiveram consequências políticas e militares duradouras. E a precedência dada ao lucro sobre qualquer outro objetivo estabeleceu o padrão extractivista que definiria a colonização do Brasil por séculos.`},
      {titulo:"Exploração do Pau-Brasil",texto:`O pau-brasil — Caesalpinia echinata — foi o primeiro produto que os portugueses identificaram como economicamente valioso no território brasileiro e o motor da primeira fase da relação entre Portugal e sua nova possessão. Durante mais de trinta anos, entre 1500 e o início da colonização sistemática na década de 1530, a exploração dessa madeira foi praticamente a única atividade econômica organizada pelos portugueses no Brasil — o que lhe confere uma importância histórica que vai muito além do simples comércio de uma madeira colorida.

A árvore Caesalpinia echinata é nativa da Mata Atlântica brasileira e pode atingir até 15 metros de altura em condições ideais. Seu cerne — a parte interna e mais densa do tronco — possui uma coloração vermelho-intenso que, quando extraída e reduzida a pó, produz um corante chamado brasilina. Na Europa do século XVI, antes do desenvolvimento dos corantes sintéticos que só viriam três séculos depois, esse vermelho vivo era extraordinariamente valioso para a indústria têxtil que supria toda a aristocracia e a burguesia europeia em ascensão. Os tecidos tintos de vermelho eram símbolo de riqueza, poder e status que qualquer corte europeia queria exibir.

O nome Brasil vem provavelmente do termo português brasa, referindo-se à cor vermelha como brasa ardente da madeira. Antes da chegada dos portugueses, a madeira era chamada pelos indígenas de ibirapitanga — madeira vermelha em tupi — ou ibiraboitan. O fato de que o nome do país acabou sendo derivado do nome de um produto de exportação é simbolicamente revelador da lógica colonial que prevaleceu sobre a lógica religiosa que alguns missionários prefeririam impor.

A exploração do pau-brasil era organizada através de contratos de arrendamento que a coroa portuguesa leiloava a grupos de comerciantes. O sistema funcionava assim: o grupo arrendatário pagava à coroa um valor fixo anual; em troca, obtinha o direito exclusivo de exportar pau-brasil de determinado trecho da costa pelo período do contrato. O grupo tinha também a obrigação de manter uma ou mais feitorias e de defender o trecho contra estrangeiros. Esse sistema transferia os custos e riscos operacionais para o setor privado, enquanto a coroa ficava com uma renda garantida.

O impacto ecológico da exploração do pau-brasil foi devastador a longo prazo. As árvores eram derrubadas para extrair o cerne valioso, sem nenhum cuidado com replantio ou manejo sustentável. As árvores mais acessíveis, próximas ao litoral, foram esgotadas rapidamente, forçando a exploração para áreas cada vez mais interiores. Estima-se que, em séculos de exploração comercial, a espécie foi reduzida a uma fração mínima de sua população original. Hoje o pau-brasil é espécie ameaçada de extinção, protegida por lei federal — uma espécie que deu nome a um país mas quase desapareceu por culpa da cobiça colonial.

O comércio do pau-brasil foi também um veículo de intensa disputa geopolítica entre Portugal e França. Os franceses, que não reconheciam o Tratado de Tordesilhas por não terem sido partes do acordo e por considerarem que a soberania sobre um território só se estabelece pela ocupação efetiva, enviavam regularmente navios para comerciar diretamente com os indígenas. Os Tupinambá do nordeste — historicamente rivais dos Tupiniquim aliados aos portugueses — estabeleceram relações privilegiadas com os comerciantes franceses, criando alianças que teriam consequências militares e políticas nas décadas seguintes.

O pau-brasil também teve papel cultural importante na formação do Brasil. As primeiras palavras portuguesas que os indígenas aprenderam provavelmente estavam relacionadas ao comércio da madeira. Os intérpretes que mediavam esse comércio — os línguas — foram os primeiros agentes de miscigenação cultural entre europeus e indígenas. E o sistema de escambo estabelecido em torno do pau-brasil criou as primeiras dependências e desequilíbrios nas relações entre colonizadores e colonizados que se aprofundariam nas décadas seguintes.`},
      {titulo:"Feitorias e Sistema de Escambo",texto:`Este tópico aborda em profundidade o tema "Feitorias e Sistema de Escambo", dentro do contexto do Módulo 3: Início da Colonização.

O estudo desta fase da história brasileira é fundamental para compreender como o Brasil chegou à configuração política, econômica e social que apresenta no século XXI. Cada evento histórico analisado aqui não é apenas um fato do passado — é uma chave interpretativa para entender o presente e planejar o futuro com mais clareza e consciência crítica.

Feitorias e Sistema de Escambo representa um dos momentos mais significativos do processo histórico brasileiro. Seu estudo revela as tensões sociais, os interesses econômicos, as disputas políticas e as transformações culturais que moldaram o Brasil em suas diferentes épocas. Para entendê-lo plenamente, é necessário situar os eventos em seu contexto mais amplo — tanto nacional quanto internacional — e analisar as relações de causa e efeito que conectam diferentes períodos históricos.

Os atores históricos envolvidos neste período — sejam eles figuras políticas proeminentes, grupos sociais organizados, populações marginalizadas ou potências estrangeiras — agiram motivados por interesses concretos que precisamos identificar e analisar com rigor. A história não é feita de heróis e vilões abstratos, mas de seres humanos reais, com contradições e limitações, agindo dentro das estruturas de poder e das possibilidades de seu tempo.

// ESTADO
// ================================================
const STATE = {
  xp: parseInt(localStorage.getItem('hb_xp') || '0'),
  concluidos: JSON.parse(localStorage.getItem('hb_concluidos') || '{}'),
  plano: null,  // será carregado do Firebase
};

// ================================================
// VERIFICAÇÃO DE ACESSO
// ================================================
async function checkAccess() {
  try {
    if (typeof MAStore !== 'undefined') {
      const user = await MAStore.getUser();
      if (user) {
        const hasMaster = user.plano === 'master' || user.plano === 'mensal';
        const hasSpecific = MAStore.hasCourseAccess && MAStore.hasCourseAccess(COURSE_CONFIG.courseKey);
        STATE.plano = (hasMaster || hasSpecific) ? 'pago' : 'free';
        STATE.xp = user.xp_total || STATE.xp;
      }
    }
  } catch(e) {
    console.log('Firebase não disponível, modo free');
  }
  renderCurso();
}

function moduleIsLocked(modNum) {
  if (STATE.plano === 'pago') return false;
  if (!COURSE_CONFIG.free) return true;
  return modNum > COURSE_CONFIG.freeModules;
}

// ================================================
// RENDER — SIDEBAR
// ================================================
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = MODULOS.map(m => {
    const todos = Object.keys(STATE.concluidos)
      .filter(k => k.startsWith(`hb_m${m.num}_`)).length;
    const done = todos === m.topicos.length;
    const active = window.moduloAtivo === m.num;
    return `
      <div class="sidebar-item ${active?'active':''} ${done?'done':''}"
           onclick="scrollToModulo(${m.num})">
        <span class="si-icon">${m.icone}</span>
        <div class="si-num">${done ? '✓' : m.num}</div>
        <div class="si-title">${m.titulo}</div>
      </div>
    `;
  }).join('');
}

// ================================================
// RENDER — CURSO COMPLETO
// ================================================
function renderCurso() {
  const container = document.getElementById('maContent');
  container.innerHTML = MODULOS.map(m => renderModulo(m)).join('');
  renderSidebar();
  updateProgress();
}

function renderModulo(m) {
  const locked = moduleIsLocked(m.num);
  const isFree = m.num <= COURSE_CONFIG.freeModules;
  const topConcluidos = m.topicos.filter((_,i) =>
    STATE.concluidos[`hb_m${m.num}_t${i}`]).length;
  const moduloDone = topConcluidos === m.topicos.length;

  const topicosHTML = m.topicos.map((t, i) => renderTopico(m.num, t, i, locked)).join('');
  const quizHTML = locked ? '' : renderQuiz(m.num, m.quiz);
  const flashHTML = locked ? '' : renderFlash(m.num, m.flashcards);
  const doneBanner = `<div class="modulo-done-banner ${moduloDone?'show':''}" id="done_m${m.num}">
    🏆 Módulo concluído! +${COURSE_CONFIG.xpCurso} XP bônus
  </div>`;

  return `
    <section class="modulo" id="modulo_${m.num}" data-num="${m.num}">
      <div class="modulo-header" onclick="toggleModulo(${m.num})" id="mh_${m.num}">
        <span class="modulo-icon">${m.icone}</span>
        <div class="modulo-info">
          <div class="modulo-label">Módulo ${m.num} de 27</div>
          <div class="modulo-titulo">${m.titulo}</div>
          <div class="modulo-meta">
            <span class="modulo-tag">📚 7 tópicos</span>
            <span class="modulo-tag">❓ 3 quizzes</span>
            <span class="modulo-tag">🧠 2 flashcards</span>
            ${isFree ? '<span class="modulo-tag free">✓ Gratuito</span>' : ''}
            ${locked ? '<span class="modulo-tag">🔒 Premium</span>' : ''}
          </div>
        </div>
        <div class="modulo-chevron">▼</div>
      </div>
      <div class="modulo-body" id="mb_${m.num}">
        ${locked ? renderLocked(m.num) : topicosHTML + quizHTML + flashHTML + doneBanner}
      </div>
    </section>
  `;
}

function renderTopico(modNum, t, i, locked) {
  const key = `hb_m${modNum}_t${i}`;
  const done = !!STATE.concluidos[key];
  return `
    <div class="topico ${done?'done':''}" id="top_${modNum}_${i}">
      <div class="topico-header" onclick="toggleTopico(${modNum},${i})">
        <div class="topico-check ${done?'done':''}">
          ${done ? '✓' : ''}
        </div>
        <span class="topico-num">${i+1}.</span>
        <span class="topico-titulo">${t.titulo}</span>
        <span class="topico-seta">▶</span>
      </div>
      <div class="topico-body" id="tb_${modNum}_${i}">
        <div class="topico-content">${t.texto}</div>
        <div class="topico-acoes">
          <button class="btn-concluir ${done?'done':''}"
                  id="btn_${modNum}_${i}"
                  onclick="concluirTopico(${modNum},${i})">
            ${done ? '✓ Concluído' : '✔ Marcar como concluído'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderLocked(modNum) {
  return `
    <div class="locked-overlay">
      <span class="locked-icon">🔒</span>
      <div class="locked-text">
        <strong>Conteúdo Premium</strong>
        Assine para ter acesso completo a este módulo e a todos os demais.
      </div>
      <button class="btn-desbloquear" onclick="window.open('https://pay.kiwify.com.br/uzERliL','_blank')">
        🚀 Desbloquear Acesso
      </button>
    </div>
  `;
}

function renderQuiz(modNum, quiz) {
  const qs = quiz.map((q, qi) => `
    <div class="quiz-item" id="qi_${modNum}_${qi}">
      <div class="quiz-q">${qi+1}. ${q.pergunta}</div>
      <div class="quiz-opts">
        ${q.opcoes.map((op, oi) => `
          <button class="quiz-opt"
                  onclick="responderQuiz(${modNum},${qi},${oi},${q.correta},this)"
                  data-qi="${modNum}-${qi}">
            ${String.fromCharCode(65+oi)}. ${op}
          </button>
        `).join('')}
      </div>
      <div class="quiz-exp" id="qexp_${modNum}_${qi}">${q.explicacao}</div>
    </div>
  `).join('');
  return `
    <div class="quiz-wrap">
      <div class="quiz-header">❓ Quiz do Módulo</div>
      ${qs}
    </div>
  `;
}

function renderFlash(modNum, flashcards) {
  const cards = flashcards.map((fc, fi) => `
    <div class="flash-card" onclick="flipCard(this)" id="fc_${modNum}_${fi}">
      <span class="flash-hint">Clique para ver</span>
      <div class="flash-front">
        <div class="flash-q">💡 ${fc.p}</div>
      </div>
      <div class="flash-back">
        <div class="flash-a">✅ ${fc.r}</div>
      </div>
    </div>
  `).join('');
  return `
    <div class="flash-wrap">
      <div class="flash-header">🧠 Flashcards de Memorização</div>
      <div class="flash-cards">${cards}</div>
    </div>
  `;
}

// ================================================
// INTERAÇÕES
// ================================================
window.moduloAtivo = null;

function toggleModulo(num) {
  const sec = document.getElementById(`modulo_${num}`);
  const hdr = document.getElementById(`mh_${num}`);
  const body = document.getElementById(`mb_${num}`);
  const isOpen = sec.classList.contains('open');

  // Fecha todos
  document.querySelectorAll('.modulo.open').forEach(s => {
    s.classList.remove('open');
    s.querySelector('.modulo-header').classList.remove('open');
  });

  if (!isOpen) {
    sec.classList.add('open');
    hdr.classList.add('open');
    window.moduloAtivo = num;
    renderSidebar();
  } else {
    window.moduloAtivo = null;
    renderSidebar();
  }
}

function toggleTopico(modNum, i) {
  const top = document.getElementById(`top_${modNum}_${i}`);
  const body = document.getElementById(`tb_${modNum}_${i}`);
  top.classList.toggle('open');
}

function concluirTopico(modNum, i) {
  const key = `hb_m${modNum}_t${i}`;
  if (STATE.concluidos[key]) return;

  STATE.concluidos[key] = true;
  localStorage.setItem('hb_concluidos', JSON.stringify(STATE.concluidos));

  STATE.xp += COURSE_CONFIG.xpModulo;
  localStorage.setItem('hb_xp', STATE.xp);

  // Atualiza UI tópico
  const checkEl = document.querySelector(`#top_${modNum}_${i} .topico-check`);
  const btnEl = document.getElementById(`btn_${modNum}_${i}`);
  if (checkEl) { checkEl.classList.add('done'); checkEl.textContent = '✓'; }
  if (btnEl) { btnEl.classList.add('done'); btnEl.textContent = '✓ Concluído'; }

  // Toast
  showToast(`⚡ +${COURSE_CONFIG.xpModulo} XP — Tópico concluído!`);

  // Verifica módulo completo
  const modulo = MODULOS.find(m => m.num === modNum);
  const allDone = modulo.topicos.every((_,idx) =>
    STATE.concluidos[`hb_m${modNum}_t${idx}`]);
  if (allDone) {
    STATE.xp += COURSE_CONFIG.xpCurso;
    localStorage.setItem('hb_xp', STATE.xp);
    const banner = document.getElementById(`done_m${modNum}`);
    if (banner) banner.classList.add('show');
    setTimeout(() => showToast(`🏆 +${COURSE_CONFIG.xpCurso} XP — Módulo completo!`), 1200);
  }

  updateProgress();
  renderSidebar();

  // Sync Firebase
  try {
    if (typeof MAStore !== 'undefined' && MAStore.addPoints) {
      MAStore.addPoints(COURSE_CONFIG.xpModulo, 'topico_concluido');
    }
  } catch(e) {}
}

function responderQuiz(modNum, qi, oi, correta, btn) {
  const container = document.querySelectorAll(`[data-qi="${modNum}-${qi}"]`);
  container.forEach(b => b.disabled = true);
  if (oi === correta) {
    btn.classList.add('correta');
  } else {
    btn.classList.add('errada');
    container[correta].classList.add('correta');
  }
  const exp = document.getElementById(`qexp_${modNum}_${qi}`);
  if (exp) exp.classList.add('show');
}

function flipCard(card) {
  card.classList.toggle('flipped');
}

function scrollToModulo(num) {
  const el = document.getElementById(`modulo_${num}`);
  if (el) el.scrollIntoView({behavior:'smooth'});
  if (window.moduloAtivo !== num) toggleModulo(num);
}

function showToast(msg) {
  const t = document.getElementById('xpToast');
  const m = document.getElementById('xpToastMsg');
  m.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function updateProgress() {
  const total = 27 * 7; // 189 tópicos
  const done = Object.keys(STATE.concluidos).length;
  const pct = Math.round((done / total) * 100);
  const modDone = MODULOS.filter(m =>
    m.topicos.every((_,i) => STATE.concluidos[`hb_m${m.num}_t${i}`])).length;

  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${modDone}/27`;
  document.getElementById('xpBadge').textContent = `⚡ ${STATE.xp.toLocaleString()} XP`;
}

// ================================================
// INIT
// ================================================
document.addEventListener('DOMContentLoaded', () => {
  checkAccess();
});
</script>
