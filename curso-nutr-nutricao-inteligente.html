      {
        id: 'fund',
        name: 'O que é Nutrição e por que importa',
        content: '<h4>Entendendo os Pilares da Nutrição</h4><p>Nutrição é muito mais do que simplesmente comer. Você está constantemente fornecendo ao seu corpo moléculas que serão convertidas em energia, estrutura celular e hormônios. Cada refeição que você faz é uma oportunidade de investir em sua saúde ou de negligenciá-la. Neste módulo, você compreenderá os fundamentos científicos que tornam a nutrição inteligente possível.</p><blockquote class="tip">A qualidade do seu corpo é determinada pela qualidade daquilo que você coloca nele. Não existe "comida ruim" em absoluto, mas existem escolhas ruins quando feitas repetidamente e sem conhecimento.</blockquote><p>Durante anos, você pode ter recebido mensagens contraditórias sobre alimentação: uma semana o ovo é vilão, na outra é herói. A gordura era inimiga nos anos 80, agora sabemos que a gordura de qualidade é essencial. <strong>O problema é que muita informação nutricional vem de modismos, não de ciência.</strong></p><h4>Os Três Pilares da Nutrição Inteligente</h4><p>A nutrição verdadeira repousa sobre três alicerces: macronutrientes adequados (proteína, carboidrato e gordura), micronutrientes (vitaminas e minerais) e timing (quando você come importa). Quando você compreende esses pilares, não precisa mais de dietas restritivas ou contagem obsessiva de calorias.</p><blockquote class="example">Uma xícara de arroz integral fornece carboidratos complexos, fibras e vitaminas do complexo B. A mesma quantidade de arroz branco fornece calorias similares, mas sem os micronutrientes. Você entenderá por que essa escolha importa não apenas para seu peso, mas para sua energia e cognição.</blockquote><p>Você descobrirá como seu corpo processa diferentes alimentos, por que algumas pessoas ganham peso facilmente enquanto outras não, e como sua genética e estilo de vida interagem com a nutrição. Este é o começo de uma jornada para <strong>alimentação consciente e inteligente</strong>.</p><blockquote class="quote">A nutrição é a interface entre o você que come e o você que se torna.</blockquote>'

        content: '<h4>Como Chegamos Aqui</h4><p>A nutrição como ciência é surpreendentemente jovem. Você pode pensar que as pessoas sempre souberam como se alimentar bem, mas a realidade é que a compreensão científica dos nutrientes é anterior apenas a 150 anos. Antes disso, as pessoas comiam por intuição, por necessidade e por tradição cultural.</p><blockquote class="news">Em 1752, o médico escocês James Lind descobriu que limões previniam escorbuto em marinheiros. Essa foi uma das primeiras conexões entre um alimento específico e a prevenção de uma doença, marcando o nascimento da nutrição científica.</blockquote><p>O século XX trouxe a descoberta de vitaminas, minerais e macronutrientes. Você aprendeu na escola que proteína é importante, que vitamina C previne resfriado, que cálcio fortalece ossos. Mas durante muitos anos, a nutrição foi reduzida a contagem de calorias, criando a ilusão de que <strong>100 calorias de açúcar era equivalente a 100 calorias de brócolis</strong>.</p><h4>A Revolução da Nutrição Moderna</h4><p>Nos últimos 20 anos, a tecnologia nos permitiu compreender nutrição no nível molecular. Você pode agora entender não apenas quanto você come, mas como seu corpo processa diferentes compostos alimentares. Epigenética mostrou que o que você come pode ligar ou desligar genes. Microbioma revelou que suas bactérias intestinais são tão importantes quanto suas células.</p><blockquote class="tip">Você não é apenas aquilo que você come. Você é aquilo que você consegue digerir, absorver e processar. Isso significa que sua saúde nutricional depende não apenas da qualidade dos alimentos, mas da qualidade do seu trato digestivo.</blockquote><p>Essa jornada histórica nos leva a um lugar onde você pode finalmente tomar decisões nutritivas baseadas em evidências, não em modismos.</p>'

      {

        name: 'Como seu Corpo Processa os Alimentos',
        content: '<h4>A Jornada Digestiva</h4><p>Quando você coloca alimento na boca, uma série incrível de transformações bioquímicas é iniciada. <strong>A digestão não começa no estômago, começa na boca</strong> com enzimas salivares que começam a quebrar carboidratos. Você provavelmente não pensa muito sobre isso ao comer, mas compreender esse processo o ajuda a fazer escolhas melhores.</p><blockquote class="example">Quando você masca um pedaço de pão, a amilase salivar começa a converter o amido em açúcares menores. Se você masca mais vezes, mais açúcar é liberado. Essa é uma razão pela qual mastigar devagar melhora a absorção e a saciedade.</blockquote><p>No estômago, o alimento é transformado em uma pasta chamada quimo através da ação do ácido clorídrico e da enzima pepsina. Esse processo leva de 2 a 4 horas, dependendo do que você comeu. <strong>Gordura e proteína levam mais tempo para digerir do que carboidratos simples</strong>, o que explica por que você sente mais saciedade com uma refeição rica em proteína.</p><h4>Absorção e Metabolismo</h4><p>No intestino delgado, nutrientes são absorvidos através das vilosidades intestinais. Mas aqui está o que você não sabe: não tudo que você ingere é absorvido. Se você tiver inflamação intestinal, síndrome do intestino permeável ou disbiose (desequilíbrio bacteriano), sua absorção pode ser prejudicada.</p><blockquote class="tip">Você pode estar comendo bem, mas se seu intestino não está saudável, você não está absorvendo os nutrientes. Isso explica por que algumas pessoas têm deficiências apesar de uma dieta aparentemente adequada.</blockquote><blockquote class="quote">O seu intestino é seu segundo cérebro. Saúde intestinal é saúde total.</blockquote>'

        id: 'clor',
        name: 'Calorias: Verdade e Mitos',
        content: '<h4>A Caloria não é Tudo</h4><p>Você provavelmente ouviu que "uma caloria é uma caloria", que o que importa é o total de calorias consumidas versus queimadas. Essa é uma simplificação perigosa que mantém você preso em ciclos de contagem obsessiva e frustração. A verdade é que <strong>100 calorias de azeite tem um efeito completamente diferente de 100 calorias de refrigerante no seu corpo</strong>.</p><blockquote class="tip">Uma caloria é uma unidade de medida de energia. Mas nutrição não é apenas sobre energia - é sobre sinalização hormonal, saciação, inflamação e metabolismo. Alimentos diferentes ativam diferentes respostas biológicas.</blockquote><p>A resposta térmica dos alimentos (energia necessária para digerir) varia dramaticamente. Você queima 30% das calorias da proteína apenas ao digeri-la. Carboidratos simples? Apenas 5%. Gordura? 3%. Isso significa que 300 calorias de frango tem um impacto metabólico completamente diferente de 300 calorias de biscoito.</p><h4>O Índice Glicêmico e a Saciedade</h4><p>Nem todas as calorias provocam a mesma resposta de insulina. Um alimento com índice glicêmico alto causa um pico de insulina, que sinaliza ao seu corpo para armazenar energia em forma de gordura. Um alimento com baixo índice glicêmico produz uma resposta mais moderada. <strong>Isso significa que calorias que aumentam a insulina têm maior probabilidade de ser armazenadas como gordura corporal</strong>.</p><blockquote class="example">Compare uma maçã (95 calorias) com um suco de maçã (95 calorias). A maçã tem fibra que diminui a absorção de açúcar, mantendo sua insulina estável. O suco provoca um pico rápido de insulina. Mesma caloria, resposta completamente diferente.</blockquote><p>A contagem de calorias funciona como uma ferramenta educacional, mas não como uma estratégia de longo prazo. <strong>Você deve focar em alimentos de qualidade que naturalmente controlam sua ingestão</strong> através da saciação, não em restrição artificial.</p><blockquote class="quote">Uma nutrição inteligente não é sobre restrição, é sobre satisfação e saúde simultâneas.</blockquote>'

        id: 'prot',
        name: 'Proteína: O Nutriente da Vida',
        content: '<h4>Por que Você Precisa de Proteína</h4><p>Proteína é o nutriente mais importante para seu corpo. Você é aproximadamente 16% água, 16% gordura e 16% proteína. Seus músculos, pele, cabelos, enzimas e hormônios são construídos a partir de proteína. <strong>Sem proteína adequada, você está em estado de catabolismo, queimando seus próprios músculos</strong> para energia.</p><blockquote class="tip">A maioria das pessoas não consome proteína suficiente. Você deveria consumir entre 1,6 a 2,2 gramas de proteína por quilo de peso corporal, especialmente se você treina. Um homem de 80kg precisa de 128 a 176 gramas de proteína diariamente.</blockquote><p>Proteína é composta de 20 aminoácidos, dos quais 9 são essenciais (seu corpo não pode sintetizá-los, você deve consumi-los). A qualidade da proteína depende de quantos desses aminoácidos essenciais ela contém e em que proporções.</p><h4>Fontes de Proteína</h4><p>Proteína animal (carne, peixe, ovos, laticínios) é completa, contendo todos os 9 aminoácidos essenciais. Proteína vegetal (feijão, lentilha, tofu) geralmente é incompleta, faltando um ou mais aminoácidos essenciais. <strong>Você pode combinar proteínas vegetais para completá-las, como arroz e feijão</strong>.</p><blockquote class="example">Uma xícara de feijão contém cerca de 15 gramas de proteína, mas é baixa em metionina. Uma xícara de arroz é rica em metionina mas baixa em lisina. Juntos, formam uma proteína completa que um vegano pode usar como refeição.</blockquote><p>Além do conteúdo de aminoácidos, você deve considerar o perfil nutricional completo. Carne vermelha contém ferro e B12. Peixe fornece ômega-3. Ovos são praticamente alimento perfeito. <strong>Varie suas fontes de proteína para obter espectro completo de nutrientes</strong>.</p><blockquote class="quote">Proteína não é apenas para ganhar músculo. Proteína é para manter você vivo e funcionando otimamente.</blockquote>'

      {
        id: 'bala',
        name: 'O Equilíbrio Macro e Seus Objetivos',
        content: '<h4>Encontrando Seu Ponto Ótimo</h4><p>Diferentes pessoas prosperam com diferentes proporções de macronutrientes. Não existe uma proporção única "correta". Você pode thriving com 40% carboidrato, 30% proteína e 30% gordura. Seu colega pode prosperar com 50%, 25%, 25%. <strong>Genética, metabolismo, estilo de vida e objetivos determinam sua proporção ideal</strong>.</p><blockquote class="tip">Como regra geral: comece com 1,6-2,2g de proteína por kg de peso corporal, 4-7g de carboidrato por kg (ajuste para atividade), e preencha o resto com gordura. Esse é um ponto de partida sólido que a maioria das pessoas tolera bem.</blockquote><p>Se seu objetivo é perder gordura, você pode aumentar proteína para 2,2-2,4g/kg e reduzir carboidrato ou gordura. Se seu objetivo é ganhar músculo, mantenha proteína alta e aumente carboidrato se você treina duro. <strong>Proteína permanece constante; você ajusta os outros dois baseado em seus objetivos</strong>.</p><h4>Qualidade Sempre Vem Primeiro</h4><p>Antes de contar macros, certifique-se de que seus macros vêm de alimentos inteiros. 2000 calorias de brócolis, frango e arroz integral é nutritivamente superior a 2000 calorias de alimentos processados, não importa as proporções macro.</p><blockquote class="example">Você pode atingir 100g de proteína com 400g de frango de peito (limpo, rico em micronutrientes) ou com 4 shakes de proteína processada (sem fibra, micronutrientes sintéticos). O resultado macro é similar, mas seu corpo é muito melhor com frango.</blockquote><p>Qualidade de alimentos deve ser sua primeira prioridade. Macro-balanceamento deve ser sua segunda prioridade. <strong>Controle de calorias deve ser sua terceira prioridade, e mesmo assim mais como automonitoramento do que restrição obsessiva</strong>.</p><blockquote class="quote">A melhor dieta é aquela que você consegue manter. E a melhor dieta de longo prazo é aquela construída em torno de alimentos reais que você gosta.</blockquote>'

anter. E a dieta mediterrânea é, historicamente, a que as pessoas conseguem manter por décadas.</blockquote>'

fico ou princípio nutricional.</blockquote>'

        content: '<h4>Timing e Composição da Refeição Pré-treino</h4><p>O que você come antes do treino determina sua performance, recuperação e resulta dos. <strong>Você precisa de carboidrato para energia, proteína para preservar músculo durante treino, e precisão no timing para digestão ótima</strong>.</p><blockquote class="tip">Idealmente, coma uma refeição completa 2-3 horas antes do treino, ou um lanche menor 30-60 minutos antes. Isso garante que você tem energia disponível sem estar digestão ainda (que limitaria fluxo sanguíneo para músculos).</blockquote><p>Carboidrato pré-treino fornece glicogênio muscular que você usa durante exercício. Sem glicogênio adequado, você não consegue treinar intenso por muito tempo. Proteína pré-treino sinaliza ao corpo para ser anabólico (construtor) durante treino. Gordura desacelera digestão, então minimize gordura pré-treino.</p><h4>Exemplo Prático</h4><p>2-3 horas antes: frango, arroz integral, brócolis. 30-60 minutos antes: banana com colher de mantequinha de amendoim ou pão com miel. Você obtém carboidrato de digestão rápida para energia imediata, com proteína suficiente para sinalização anabólica.</p><blockquote class="example">Se você treina na manhã, um ovo mexido com aveia é perfeito. Se você treina à noite, uma refeição completa 2-3 horas antes é ideal. Timing relativo à sua digestão é mais importante que número de macros absoluto.</blockquote><blockquote class="quote">Seu treino é tão bom quanto sua energia durante ele. Subalimentar é sabotar seu próprio progresso.</blockquote>'

        content: '<h4>Por que Planejamento Importa</h4><p><strong>A razão pela qual muitas pessoas falham com nutrição não é falta de conhecimento, é falta de planejamento</strong>. Você sabe que deveria comer bem, mas às 17h quando você está exausto, você escolhe comida fácil se não tiver plano.</p><blockquote class="tip">Planejamento de refeições não precisa ser complexo ou demorado. Uma simples lista de compras baseada em uma semana de refeições é suficiente. Cozinhe em lote no fim de semana para ter refeições prontas durante a semana.</blockquote><p>Planejamento garante que você tem ingredientes certos em casa, reduz compras impulsivas, economiza tempo e dinheiro, e remove decisão diária. <strong>Quando você remove decisão, você remove a chance de escolha ruim quando cansado ou estressado</strong>.</p><H4>Como Planejar Simples</H4><p>Escolha 3-4 proteínas (frango, peixe, ovos, carnes), 3-4 carboidratos (arroz, batata, aveia), 3-4 gorduras (azeite, abacate, oleaginosas), e muitos vegetais. Combine esses no fim de semana em refeições simples. Segunda: frango, arroz, brócolis. Terça: peixe, batata-doce, cenoura. E assim por diante.</p><blockquote class="example">Um fim de semana 2-3 horas de cozimento em lote fornece 5-6 refeições prontas que você pode porcionar em potes. Segunda a sexta você tem almoço pronto. Jantares são variações simples - mesma proteína, carboidrato diferente, vegetal diferente.</blockquote><p>Você não precisa de plano perfeito. Um plano aproximado que você segue é infinitamente melhor que plano perfeito que você abandona. <strong>Simplicidade e consistência vence perfeição e inconsistência</strong>.</p><blockquote class="quote">Planejamento converte boa intenção em ação consistente. Ação consistente converte em resultados.</blockquote>'
