var MODS = [
{
  id:0, title:'Fundamentos da CLT', free:true,
  topics:[
    {id:'clti', title:'Introdução à Consolidação das Leis do Trabalho', html:'<h4>A CLT: Sua Proteção Legal como Trabalhador</h4><p>Bem-vindo ao curso de Direito Trabalhista! Você estudará a CLT (Consolidação das Leis do Trabalho), decreto-lei de 1943 que estabelece direitos e deveres de empregados e empregadores. Essa lei mudou a vida de milhões de trabalhadores brasileiros.</p><p>O que é a CLT? É o código que regulamenta relações de trabalho entre empregado (você) e empregador (empresa). Antes da CLT, trabalhadores tinham pouca proteção legal. Após CLT, garantias mínimas são obrigatórias.</p><blockquote class="tip"><strong>Dica:</strong> A CLT protege trabalhadores por contrato indeterminado (permanentes). Você tem direito mesmo se empresa não ofereceu contrato escrito. Lei presume relação de emprego.</blockquote><p>Qual é a estrutura da CLT? Começa definindo "empregado" e "empregador". Depois regula jornada, salário, férias, 13º salário, FGTS, direitos sindicais, segurança, demissão e reclamações trabalhistas. Você estudará cada um desses aspectos.</p><p>Qual é o objetivo da CLT? Equilibrar poder entre empresa e trabalhador. Empresa tem poder econômico; trabalhador precisa trabalhar para viver. Lei protege o mais fraco: o trabalhador.</p><blockquote class="example"><strong>Exemplo:</strong> Empresa não pode pedir para você trabalhar 12 horas por dia indefinidamente. CLT limita jornada. Empresa não pode pagar quanto quer; CLT estabelece salário mínimo e dever de pagar igual por trabalho igual.</blockquote><p>A CLT se aplica a todos os trabalhadores? Maioria sim. Mas existem exceções: servidor público (tem lei própria), militar (tem código militar), autônomo (não é empregado). Se você trabalha com contrato de emprego, CLT protege você.</p><blockquote class="quote"><strong>Princípio fundamental:</strong> "CLT presume que existe relação de emprego quando há trabalho subordinado, contínuo, mediante salário. Não precisa de contrato escrito."</strong></blockquote><p>Como CLT evoluiu? Recentemente, Lei 13.467/2017 (Reforma Trabalhista) alterou muitos pontos. Estudará versão atual, mas é importante conhecer que direitos foram historicamente conquistados através de lutas sindicais.</p>'},
    {id:'empr', title:'Definições: Empregado, Empregador, Subordinação', html:'<h4>Quem É Quem na Relação de Trabalho</h4><p>Para CLT protegê-lo, precisa que você seja um "empregado" segundo a lei. Você é empregado se preenche certos requisitos. Vamos entendê-los.</p><p><strong>Empregado:</strong> Pessoa física que presta serviço não eventual com subordinação, mediante salário. Você executa trabalho diretamente sob ordens de alguém (empregador).</p><p><strong>Empregador:</strong> Pessoa física ou jurídica que contrata empregado e dirige seu trabalho, assumindo riscos econômicos.</p><blockquote class="tip"><strong>Dica:</strong> Você é empregado se: (1) é pessoa física; (2) trabalha de forma subordinada; (3) é contínuo (não eventual); (4) recebe salário. Se todas as 4 existem, você é empregado.</blockquote><p>Qual é o elemento essencial: <strong>subordinação</strong>. Significa que você segue ordens, tem horário, rotina, responde hierarquicamente. Você não é empregado se é totalmente livre (como autônomo que escolhe quando trabalhar).</p><p>Qual é a diferença entre empregado e autônomo? Empregado é subordinado, contínuo, salário fixo. Autônomo é independente, trabalha para vários clientes, cobra por serviço. Autônomo NÃO é protegido por CLT (tem proteção menor).</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha em empresa 8 horas por dia, horário fixo, segue ordens, recebe salário mensal. Você é empregado. Seu vizinho que arruma manutenção em várias casas, cobra por obra, sem horário fixo, é autônomo.</blockquote><p>E pessoa jurídica como empregado? Não. CLT define empregado como pessoa física. Se você é PJ (pessoa jurídica/empresa), não é empregado e perde muitas proteções da CLT.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Lei presume existência de relação de emprego quando há trabalho subordinado e contínuo mediante salário. Não precisa de contrato escrito ou formalidades."</strong></blockquote><p>Como você prova subordinação? Documentação: folha de ponto, recibos de salário, mensagens do chefe, fotos do local de trabalho. Tudo isso comprova que você é empregado, não autônomo.</p>'},
    {id:'cntr', title:'Contrato de Trabalho e Formalidades', html:'<h4>Documentação Legal do Seu Emprego</h4><p>Contrato de trabalho é o acordo entre você e empresa. Pode ser escrito ou verbal. Lei presume contrato mesmo que verbal. Mas documento escrito protege você.</p><p>O que deve constar em contrato? Identificação das partes (nome, CNPJ), função, salário, jornada, benefícios, data de admissão, e local de trabalho. Se algo essencial falta, você pode reclamar e exigir.</p><blockquote class="tip"><strong>Dica:</strong> Exija contrato escrito quando é admitido. Se empresa não oferece, faça por escrito (email para o gerente) solicitando confirmação dos termos acordados verbalmente.</blockquote><p>A CTPS (Carteira de Trabalho e Previdência Social) é documento obrigatório? Antes era, agora a reforma trabalhista permite registro digital. Mas sua empresa deve registrar você em alguma forma (CTPS ou registro digital).</p><p>Se você não é registrado, qual é a consequência? Você ainda é empregado (lei presume), mas sofre sem registro: sem FGTS automático, sem contribuição previdenciária automática, sem seguro-desemprego. Você é prejudicado.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha 2 anos em loja sem registro. Depois é demitido. Sem registro, não recebe FGTS acumulado, não contribuiu ao INSS regularmente, não tem direito a seguro-desemprego. Você é prejudicado.</blockquote><p>Como você denuncia falta de registro? Procurando sindicato de sua categoria ou auditoria fiscal do Ministério do Trabalho. Ministério pode multar empresa e forçá-la a registrar você.</p><blockquote class="quote"><strong>Obrigação patronal:</strong> "Empresa é obrigada a registrar empregado na CTPS ou registro digital. Falta de registro não descaracteriza emprego, apenas prejudica o trabalhador."</strong></blockquote><p>Qual é a lei de registro? CLT artigo 29 estabelece obrigação. E Lei 14.309/2022 criou registro digital (e-CTPS). Ambas formas são válidas agora.</p>'},
    {id:'drts', title:'Direitos Fundamentais do Trabalhador', html:'<h4>O Que a Lei Garante a Você Como Empregado</h4><p>CLT estabelece direitos mínimos que ninguém pode tirar de você. Mesmo que contrato diga o contrário, lei protege você. Conheça seus direitos fundamentais.</p><p><strong>Salário:</strong> Direito a receber salário no mínimo estipulado (salário mínimo nacional ou piso de categoria). Empresa não pode pagar menos sem causa legal. Salário deve ser pago em dia (até o 5º dia útil do mês seguinte).</p><p><strong>13º salário:</strong> Você recebe uma gratificação igual a 1/12 do salário para cada mês trabalhado. Mínimo uma parcela em novembro e segunda em dezembro. Isso é obrigatório mesmo em empresa pequena.</p><blockquote class="tip"><strong>Dica:</strong> Se você trabalha parcialmente no ano (exemplo: admitido em junho), recebe 13º proporcional aos meses trabalhados.</blockquote><p><strong>Férias:</strong> Direito a 30 dias de férias remuneradas por ano trabalho contínuo. Você recebe salário normal mais 1/3 do salário. Férias são direito, não favor. Empresa não pode negar férias.</p><p><strong>Jornada limitada:</strong> Máximo 8 horas diárias e 44 horas semanais. Trabalho além disso é hora extra, remunerado com no mínimo 50% acima do salário normal.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha 9 horas em um dia. 1 hora extra deve ser paga com 50% de acréscimo (você ganha 1 vez o salário hora + 0,5 vezes o salário hora por aquela hora).</blockquote><p><strong>FGTS (Fundo de Garantia):</strong> Empresa deposita 8% do seu salário bruto em conta em seu nome. Você pode sacar em caso de demissão, compra de imóvel, ou depois de 3 anos inativo. Isso é proteção financeira sua.</p><p><strong>13º salário:</strong> Adicional extra correspondente a 1/12 do salário por mês de trabalho. Pago integralmente em 12º mês.</p><blockquote class="quote"><strong>Direitos inalienáveis:</strong> "Você não pode renunciar a direitos fundamentais (salário, férias, FGTS). Cláusula contratual que nega direitos é nula."</strong></blockquote><p>E benefícios como vale-refeição? Não são obrigatórios por lei (salvo acordo coletivo), mas se empresa oferece, não pode retirar sem negociação.</p>'}

{
  id:1, title:'Contrato de Trabalho', free:false,
  topics:[
    {id:'tipo', title:'Tipos de Contrato de Trabalho', html:'<h4>As Diferentes Formas de Contratação</h4><p>Existem vários tipos de contrato de trabalho. Você deve conhecê-los para saber seus direitos em cada um. A Reforma Trabalhista permitiu novos tipos de contrato.</p><p><strong>Contrato por tempo indeterminado:</strong> Você trabalha indefinidamente para a empresa. Sem data de término. É o contrato padrão. Protege mais você porque empresa não pode despedir sem justa causa.</p><p><strong>Contrato por tempo determinado:</strong> Tem data de término pré-fixada. Exemplo: você é contratado por 2 anos. Quando termina, contrato encerra. Você tem menos proteção: demissão quando expira é automática.</p><blockquote class="tip"><strong>Dica:</strong> Se contrato é por tempo determinado, empresa não pode renovar indefinidamente sem caracterizar indeterminado. Após 2 renovações, vira indeterminado.</blockquote><p><strong>Contrato de trabalho intermitente:</strong> Você trabalha "conforme demanda". Empresa te chama quando precisa (exemplo: pizzaria chama você para trabalhar sábado). Você recebe por hora trabalhada e tem direitos reduzidos.</p><p><strong>Contrato de aprendizagem:</strong> Você é adolescente/jovem e aprende profissão enquanto trabalha. Máximo 2 anos. Você recebe por hora e tem direito a curso profissionalizante. Depois, você é desligado (não é demissão).</p><blockquote class="example"><strong>Exemplo:</strong> Você tem 16 anos e é contratado como aprendiz em padaria. Trabalha 4 horas/dia, aprende profissão, recebe por hora. Depois de 2 anos, contrato termina. É normal, não é demissão injusta.</blockquote><p><strong>Contrato de estágio:</strong> Você é estudante e estágia em empresa. Máximo 2 anos. Você não é empregado formal, tem menos direitos. Mas Lei de Estágio oferece algumas proteções (bolsa, seguro).</p><blockquote class="quote"><strong>Proteção contratual:</strong> "Tipo de contrato altera direitos. Indeterminado oferece mais proteção; intermitente menos. Lei exige clareza sobre tipo desde contratação."</strong></blockquote><p>Qual é o contrato mais comum? Indeterminado. Maioria trabalhadores brasileiros tem contrato indeterminado. É o "padrão" de proteção.</p>'},
    {id:'cond', title:'Condições de Trabalho e Obrigações', html:'<h4>O Que É Esperado de Você e de Seu Empregador</h4><p>Contrato estabelece obrigações para ambos. Você tem deveres como empregado; empresa tem deveres como empregadora. Ambas as partes devem cumprir.</p><p><strong>Seus deveres como empregado:</strong> Executar trabalho com diligência, cumprir horário, seguir instruções legítimas, manter sigilo profissional, zelar por patrimônio da empresa, respeitar colegas e chefes.</p><blockquote class="tip"><strong>Dica:</strong> Você tem dever de diligência: executar trabalho bem feito. Se executa negligentemente (com descuido), empresa pode punir ou descontar.</blockquote><p><strong>Deveres do empregador:</strong> Pagar salário em dia, respeitar jornada, manter ambiente seguro, fornecer EPI (equipamento de proteção), não discriminar, permitir férias, respeitar privacidade.</p><p>Qual é a obrigação fundamental da empresa? Fornecer trabalho seguro. Você não pode ser forçado a trabalhar em condições perigosas. Se ambiente é perigoso, empresa deve corrigir ou você pode se recusar.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha em loja sem ar-condicionado com temperatura de 40ºC. Ambiente é insalubre. Você pode se recusar a trabalhar nessas condições e reclamar ao sindicato e Ministério do Trabalho.</blockquote><p>E quanto a mudança de função? Empresa pode mudar sua função se é funciona similar. Mas se muda para função muito diferente, empresa deve renegociar salário. Se diminui função, deve manter salário anterior.</p><blockquote class="quote"><strong>Proteção salarial:</strong> "Se você é rebaixado de função, empresa deve manter salário anterior. Salário não pode diminuir por mudança de função."</strong></blockquote><p>Como você prova cumprimento de deveres ou não? Documentação: folha de ponto, recibos, emails. Se há conflito, ambas as partes devem provar.</p>'},
    {id:'muda', title:'Alteração e Extinção de Contrato', html:'<h4>Quando as Coisas Mudam: Alterações e Encerramento</h4><p>Contrato pode ser alterado durante sua vigência. Empresa não pode alterar unilateralmente para prejudicá-lo. Qualquer mudança significativa requer seu consentimento.</p><p><strong>Alteração lícita:</strong> Pequenas mudanças que não prejudicam (exemplo: mudar horário em 1 hora, mudar turno). Você deve ser informado com antecedência razoável.</p><p><strong>Alteração prejudicial:</strong> Mudança que diminui salário, piora condições, muda função drasticamente. Não é lícita sem seu consentimento. Se empresa força, você pode rescindir e reclamar.</p><blockquote class="tip"><strong>Dica:</strong> Se empresa quer mudar algo prejudicial (reduzir salário, aumentar jornada), exija negociação. Mudança unilateral prejudicial é nula.</blockquote><p>Qual é a extinção normal? Contrato por tempo determinado termina na data acordada. É extinção normal, sem indenizações extras (salvo cálculos de direitos acumulados).</p><p>Qual é a extinção anormal? Demissão sem justa causa. Empresa despede você sem motivo válido. Você tem direito a: aviso prévio (30 dias antes), multa de 40% do FGTS, saque de FGTS, seguro-desemprego.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha 5 anos, recebe aviso prévio que será demitido. Empresa deve pagar 30 dias, mais multa de 40% sobre FGTS total (8% x 60 meses = 4.800 de FGTS, multa é 1.920). Você também tem direito a seguro-desemprego.</blockquote><p><strong>Demissão por justa causa:</strong> Você cometeu falta grave (roubo, violência, embriaguez). Empresa despede sem aviso, sem multa, sem FGTS. Você perde direitos. Mas exige prova clara.</p><blockquote class="quote"><strong>Proteção contra despedida:</strong> "Demissão sem justa causa exige aviso prévio e multa. Justa causa exige prova clara e processo disciplinar justo."</strong></blockquote><p>Qual é o direito em suspensão? Se empresa suspende você, ainda recebe salário (é castigo administrativo, não demissão). Suspensão máxima é 30 dias consecutivos.</p>'},
    {id:'adts', title:'Aditivos e Negociações Contratuais', html:'<h4>Mudando o Contrato: Aditivos e Renegociações</h4><p>Se ambas as partes concordam, contrato pode ser modificado por aditivo. Aditivo é documento que altera cláusula do contrato original. Ambas devem assinar.</p><p>Qual é a consequência de aditivo? Modifica o original, prevalecendo o novo termo a partir da data. Exemplo: contrato original diz jornada 8h, aditivo muda para 6h, nova jornada é 6h a partir de assinatura.</p><blockquote class="tip"><strong>Dica:</strong> Qualquer mudança significativa (salário, jornada, função) deve ter aditivo escrito. Mudança verbal depois pode ser contestada.</blockquote><p><strong>Aditivo benéfico:</strong> Aumenta salário, reduz jornada, melhora condições. Você deve sempre aceitar (se beneficia). Empresa não pode retirar depois unilateralmente.</p><p><strong>Aditivo prejudicial:</strong> Reduz salário, aumenta jornada. Você pode recusar. Se recusa, empresa não pode forçar. Pode até querer rescindir, mas aí você tem direito a indenização.</p><blockquote class="example"><strong>Exemplo:</strong> Empresa oferece aditivo reduzindo seu salário em 20%. Você recusa. Empresa não pode forçar. Empresa então oferece rescisão. Você pode aceitá-la (com indenização) ou continuar com salário original.</blockquote><p>Como você negocia melhores condições? Diretamente com chefe/RH, ou via sindicato de sua categoria. Sindicato tem poder de negociar acordos coletivos que beneficiam todos da categoria.</p><blockquote class="quote"><strong>Negociação coletiva:</strong> "Sindicatos negociam com empresas acordos coletivos que estabelecem salários, jornadas, benefícios para todos da categoria, melhorando condições padrão."</strong></blockquote><p>Qual é a vantagem de negociar via sindicato? Poder maior. Sozinho, você tem menos poder. Sindicato representa centenas/milhares, tem poder de negociação e até greve.</p>'}

{
  id:2, title:'Salário e Benefícios', free:false,
  topics:[
    {id:'sal', title:'Direito a Salário: Cálculo, Componentes e Proteção', html:'<h4>Tudo Sobre Seu Salário e Como É Calculado</h4><p>Salário é remuneração pelo trabalho. Lei oferece proteções ao salário: você tem direito a receber, direito a receber em dia, direito a salário mínimo, direito a não ter desconto abusivo.</p><p>Qual é o salário mínimo? Valor mínimo que empresa deve pagar por mês de trabalho. Varia anualmente e é reajustado pelo governo. Em 2024, aproximadamente R$ 1.412/mês. Ninguém pode receber menos.</p><blockquote class="tip"><strong>Dica:</strong> Se ganha menos que salário mínimo, você está sendo explorado. Procure Ministério do Trabalho e denuncie a empresa.</blockquote><p>Qual é a diferença entre salário base e salário bruto? Salário base é quanto foi acordado. Salário bruto é base + adicionais (hora extra, bônus, etc). Descontos (INSS, IR) saem do bruto para virar líquido.</p><p><strong>Componentes do salário:</strong> Salário base (acordado), hora extra (50% acima da normal), adicional noturno (20% extra se trabalha noite), insalubridade (40% extra se trabalha em ambiente insalubre), periculosidade (adicional em trabalho perigoso).</p><blockquote class="example"><strong>Exemplo:</strong> Seu salário base é R$ 2.000. Você trabalha 10 horas (1 hora extra). Essa hora custa R$ 25 (R$ 2.000 / 80h de trabalho). Hora extra é R$ 25 x 1,5 = R$ 37,50. Você recebe R$ 2.037,50 naquele mês.</blockquote><p><strong>Descontos permitidos:</strong> INSS (contribuição social), IR (imposto de renda), vale-refeição (se oferecido), vale-transporte (se oferecido), empréstimos (se autorizado). Esses descontos reduzem salário.</p><p><strong>Descontos proibidos:</strong> Quebra de coisa da empresa (você quebrou vidro, você paga? Não), uniforme, ferramenta de trabalho (empresa deve fornecer), multas arbitrárias.</p><blockquote class="quote"><strong>Proteção salarial:</strong> "Empresa pode descontar apenas INSS, IR, vale-refeição, vale-transporte e empréstimos autorizados. Outros descontos são ilegais."</strong></blockquote><p>Qual é a consequência de atraso no pagamento? Você recebe "mora" (juros): 1% ao mês + INSS atualizado. Se atrasou 2 meses, você recebe salário + 2% de mora. Reivindique isso.</p>'},
    {id:'ben', title:'Benefícios: Férias, 13º, Vale-Refeição, Vale-Transporte', html:'<h4>Benefícios Que Você Recebe Além do Salário</h4><p>Além do salário, você tem direito a benefícios. Alguns são obrigatórios por lei; outros são oferecidos pela empresa (se oferece, não pode tirar sem negociação).</p><p><strong>Férias:</strong> 30 dias remunerados por ano de trabalho. Você escolhe quando tirar (empresa escolhe se não acordam). Recebe salário normal + 1/3 do salário (abono).</p><blockquote class="tip"><strong>Dica:</strong> Se não tirar férias no ano (período aquisitivo), você acumula para próximo ano. Ao sair da empresa, você recebe férias não tiradas.</blockquote><p>Como calcular férias? Salário ÷ 3 = abono de férias. Exemplo: salário R$ 3.000, abono é R$ 1.000. Você recebe R$ 3.000 + R$ 1.000 = R$ 4.000 em férias.</p><p><strong>13º salário (gratificação natalina):</strong> Você recebe uma parcela em novembro (adiantamento), segunda em dezembro (ou até janeiro). Total é 1/12 do salário por mês trabalhado.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalhou o ano todo (12 meses). 13º é 12/12 = 1 mês de salário integral. Trabalhou só 6 meses? 13º é 6/12 = meio salário.</blockquote><p><strong>Vale-refeição:</strong> Se empresa oferece, você recebe valor em vale para usar em restaurantes/mercados conveniados. Pode descontar até 20% do seu salário. Se descontar mais, é abusivo.</p><p><strong>Vale-transporte:</strong> Empresa deve custear seu deslocamento para trabalho. Você paga até 6% do salário; empresa completa. Se não usa transporte público (vai a pé, drive próprio), não precisa pagar percentual.</p><blockquote class="quote"><strong>Benefícios inafastáveis:</strong> "Se empresa oferece benefício, não pode retirar unilateralmente. Retirada unilateral é redução de salário disfarçada, requer consentimento."</strong></blockquote><p>Qual é a consequência se empresa tira benefício? Você pode reclamar que é redução de salário. Exija renegociação ou rescisão com direitos.</p>'},
    {id:'fgts', title:'FGTS: Seu Direito a Poupança Obrigatória', html:'<h4>Fundo de Garantia: Como Funciona e Quando Sacar</h4><p>FGTS (Fundo de Garantia do Tempo de Serviço) é conta em seu nome onde empresa deposita 8% do salário bruto todo mês. É direito seu de ter essa poupança.</p><p>Qual é o objetivo do FGTS? Protegê-lo em caso de demissão, morte, aposentadoria. O dinheiro é seu, não da empresa. Empresa apenas deposita.</p><blockquote class="tip"><strong>Dica:</strong> Você pode consultar FGTS no site CEF (Caixa Econômica Federal) usando CPF. Veja quanto tem acumulado.</blockquote><p>Quando você pode sacar FGTS? (1) Demissão sem justa causa (saca tudo); (2) Rescisão indireta (culpa da empresa); (3) Morte do empregado; (4) Compra de imóvel; (5) Doença terminal; (6) Inatividade de 3 anos; (7) Calamidade pública.</p><p>Quanto você saca em demissão sem justa causa? Todo o saldo da conta. Se trabalhou 5 anos e empresa depositava R$ 200/mês, saca R$ 12.000 + multa de 40% = R$ 4.800. Total a receber em FGTS.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalhou 3 anos. Saldo FGTS = 36 x R$ 300 = R$ 10.800. Demitido sem justa causa. Recebe R$ 10.800 + multa de 40% = R$ 4.320. Total R$ 15.120.</blockquote><p><strong>Saque por inatividade:</strong> Se não trabalhou em empresa por 3 anos ou mais e conta está inativa, você pode sacar. Benéfico para quem ficou desempregado.</p><blockquote class="quote"><strong>Direito ao FGTS:</strong> "FGTS é conta sua, depositada obrigatoriamente pela empresa. Você pode sacar em situações legais. Demissão sem justa causa garante saque total + multa."</strong></blockquote><p>Como sacar? Você vai a agência da Caixa com RG, CPF, cópia de cédula de trabalho ou documento de demissão. Caixa processa e transfere para conta bancária sua.</p>'},
    {id:'seg', title:'Seguro-Desemprego: Proteção Financeira Temporária', html:'<h4>Quando Perde Emprego, Seguro-Desemprego Oferece Renda Mínima</h4><p>Seguro-desemprego é benefício social que você recebe por alguns meses quando é demitido sem justa causa. Objetivo é ajudá-lo até conseguir novo emprego.</p><p>Qual é o valor do seguro-desemprego? Varia conforme salário: valor mínimo é 1 salário mínimo, máximo é aproximadamente 1,5 salário mínimo. Você recebe mensalmente pelo período.</p><blockquote class="tip"><strong>Dica:</strong> Para receber seguro, você precisa comprovar que foi demitido (cópia da rescisão) e que contribuiu ao INSS por tempo mínimo.</blockquote><p>Qual é o tempo mínimo de contribuição? Depende de quantas vezes sacou seguro antes. Primeira vez: 12 meses; segunda vez: 9 meses; terceira ou mais: 6 meses (em último ano).</p><p>Quanto tempo você recebe seguro? 4 a 5 meses, dependendo de tempo de serviço. Trabalhou 1 ano e foi demitido: recebe 4 meses. Trabalhou 3 anos: recebe 5 meses.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalhou 2 anos, recebeu R$ 2.500/mês. Demitido. Seguro será aproximadamente R$ 2.000 (máximo permitido) por 5 meses. Total R$ 10.000 para ajudá-lo.</blockquote><p>Como solicitar? Vá ao Ministério do Trabalho, CEF ou portal digital com: RG, CPF, cópia rescisão de contrato, documentação de contribuição INSS. Dentro de dias, seu seguro é liberado.</p><blockquote class="quote"><strong>Proteção social:</strong> "Seguro-desemprego é direito do demitido sem justa causa. Protege você financeiramente enquanto busca novo emprego."</strong></blockquote><p>Qual é a duração máxima? 5 meses normalmente. Se continuar desempregado, você é responsável por buscar novo trabalho. Lei oferece ajuda, não solução permanente.</p>'}
  ],

{
  id:3, title:'Jornada e Horas Extras', free:false,
  topics:[
    {id:'jorn', title:'Jornada: 8 Horas Diárias e 44 Semanais', html:'<h4>Seu Limite de Trabalho: Proteção Contra Exploração</h4><p>CLT estabelece limite de jornada para protegê-lo. Trabalho excessivo causa cansaço, problemas saúde, reduz qualidade de vida. Lei protege seu direito ao descanso.</p><p>Qual é a jornada máxima? 8 horas diárias e 44 horas semanais. Não pode trabalhar mais. Trabalho além disso é hora extra e deve ser pago com 50% de acréscimo.</p><blockquote class="tip"><strong>Dica:</strong> Se empresa força você a trabalhar 10 horas todo dia sem pagar extra, você está sendo explorado. Procure sindicato ou Ministério do Trabalho.</blockquote><p>Qual é o intervalo obrigatório? Se você trabalha 6 horas, 15 minutos de intervalo. Se trabalha 8 horas, no mínimo 1 hora de intervalo (normalmente para almoço). Intervalo é repouso, não conta como trabalho.</p><p>E trabalho noturno? Trabalho entre 22h e 5h é considerado noturno. Hora noturna dura 52,5 minutos (não 60 minutos), então você trabalha menos. Recebe 20% de adicional noturno.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha das 22h às 4h (6 horas de relógio). Mas são 7 horas "noturnas" (porque hora noturna dura menos). Você recebe 6 horas + 20% adicional noturno.</blockquote><p><strong>Jornada meia:</strong> Se trabalha menos de jornada completa (4 horas), recebe proporcionalmente menos. Mas há direitos reduzidos: férias menos dias, 13º proporcional.</p><blockquote class="quote"><strong>Proteção constitucional:</strong> "Jornada de 8 horas e 44 horas semanais é direito constitucional. Lei presume vítima de exploração quem trabalha além disso regularmente."</strong></blockquote><p>Como você prova jornada? Folha de ponto (documento que empresa deve manter). Se empresa não tem folha, presume-se que você trabalhou todo tempo que esteve na empresa.</p>'},
    {id:'extr', title:'Horas Extras: Quando e Como Receber', html:'<h4>Trabalho Acima da Jornada: Direito a Remuneração Especial</h4><p>Quando você trabalha acima de 8 horas/dia ou 44 horas/semana, essas horas além do limite são "horas extras". Lei exige pagamento especial para compensar o trabalho acima.</p><p>Qual é a remuneração de hora extra? Mínimo 50% acima do valor da hora normal. Exemplo: sua hora custa R$ 20, hora extra é R$ 30. Alguns contratos oferecem 100% (dobra), o que é melhor para você.</p><blockquote class="tip"><strong>Dica:</strong> Reclame cálculo correto de hora extra. Se empresa paga menos de 50%, está devendo. Você pode processar por diferenças.</blockquote><p>Como calcular hora extra? Salário ÷ 220 = valor da hora (brasileiro trabalha 220 horas/mês em média). Hora extra = valor hora x 1,5 (ou mais, conforme contrato).</p><p>Quantas horas extras você pode fazer? Lei não limita quantidade, mas ela não pode ser excessiva. Se você faz 20 horas extras por semana, empresa está abusando. Você pode se recusar.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 2.200/mês. Valor hora = R$ 2.200 ÷ 220 = R$ 10. Hora extra = R$ 10 x 1,5 = R$ 15. Se fez 10 horas extras no mês, recebe 10 x R$ 15 = R$ 150 extra.</blockquote><p><strong>Banco de horas:</strong> Empresa pode propor "banco de horas": você faz hora extra agora, descansa depois (folga compensada). Isso é lícito se você concorda. Sem seu consentimento, não pode.</p><blockquote class="quote"><strong>Direito inafastável:</strong> "Hora extra deve ser paga. Empresa não pode "transformar" hora extra em folga sem seu consentimento e acordo formal."</strong></blockquote><p>Qual é a consequência de não pagar hora extra? Você pode reclamar ao Ministério do Trabalho ou processar empresa por diferenças + multa. Ministério multa empresa.</p>'},
    {id:'repo', title:'Descanso Semanal e Repouso Entre Jornadas', html:'<h4>Seu Direito ao Repouso: Sábado ou Outro Dia da Semana</h4><p>Lei obriga que você tenha 1 dia de repouso por semana. Normalmente é sábado ou domingo, mas pode ser outro dia se acordado. Esse repouso não é favor; é direito.</p><p>Qual é o repouso mínimo? 24 horas consecutivas por semana. Você não pode trabalhar 7 dias seguidos. Depois de 6 dias de trabalho, você tem 1 dia inteiro de folga.</p><blockquote class="tip"><strong>Dica:</strong> Se você trabalha sábado, tem direito a outro dia de folga na semana. Não podem "resumir" semana sem folga integral.</blockquote><p>E intervalo entre jornadas? Depois de trabalhar, você deve ter mínimo 11 horas de descanso até próxima jornada. Você trabalha até 17h, próxima jornada inicia apenas às 6h (11 horas depois).</p><p>Se trabalha 2 jornadas no mesmo dia? Intervalo entre elas deve ser mínimo 1 hora de descanso. Exemplo: trabalha 8h-12h, descansa 1h, trabalha 13h-17h. Válido.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha segunda a sábado. Lei exige folga no domingo (repouso semanal). Se empresa quer você no domingo, deve remunerar com adicional e dar folga em outro dia.</blockquote><p>Qual é a remuneração de repouso em domingo/feriado? Se você trabalha nesse dia, recebe 100% de acréscimo (dobra salário daquele dia). Se descansa, recebe como trabalhado (sem desconto).</p><blockquote class="quote"><strong>Proteção ao descanso:</strong> "Repouso semanal é direito indisponível. Você não pode renunciar a descanso. Se trabalha, recebe adicional ou folga compensada."</strong></blockquote><p>Como você prova que empresa nega repouso? Folha de ponto (mostrando 7 dias sem folga), colegas testemunhando, fotos do crachá seu. Documentação é essencial.</p>'},
    {id:'tur', title:'Turnos e Trabalho Noturno', html:'<h4>Trabalho em Turnos: Proteções Especiais para Noturno e Alternado</h4><p>Se você trabalha em turnos (manhã, tarde, noite) ou especificamente noturno, tem proteções especiais. Trabalho noturno é mais cansativo e lei reconhece isso.</p><p><strong>Trabalho noturno:</strong> Entre 22h (noite) e 5h (madrugada). Hora noturna dura 52 minutos 30 segundos (não 60). Você recebe 20% de adicional noturno. Trabalhando 8 horas, recebe 9,6 horas de pagamento.</p><blockquote class="tip"><strong>Dica:</strong> Trabalho noturno prejudica saúde (ritmo circadiano alterado). Lei oferece 20% de compensação e 1 hora a menos por jornada.</blockquote><p>Qual é a jornada máxima noturna? 8 horas, mas duram menos em tempo de relógio: são 7 horas 12 minutos de relógio (equivalendo a 8 horas noturnas).</p><p><strong>Trabalho em turnos alternados:</strong> Você muda de turno (segunda-feira turno A, terça turno B). Isso é cansativo porque altera ritmo biológico. Lei não oferece proteção específica, mas você pode negociar com sindicato.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalha 22h-5h (turno noturno), 7h 12 minutos de relógio. Paga como se fossem 8 horas noturnas = 9,6 horas normais. Se ganha R$ 20/hora, turno noturno: R$ 20 x 9,6 = R$ 192 (em vez de R$ 160).</blockquote><p>Como é feito shift? Você alterna entre turnos. Alguns preferem (ganha mais em noturno), outros sofrem. Lei permite desde que respeite limites de jornada e repouso.</p><blockquote class="quote"><strong>Proteção noturna:</strong> "Trabalho noturno entre 22h-5h recebe 20% adicional e hora dura menos. Você trabalha menos tempo recebendo equivalente a hora normal."</strong></blockquote><p>Qual é a forma de compensação? Além de 20% adicional, você trabalha menos em tempo: 7h 12 min de relógio equivalem a 8h noturnas (1h de desconto automático).</p>'}
  ],

{
  id:4, title:'Demissão e Rescisão', free:false,
  topics:[
    {id:'demi', title:'Tipos de Demissão: Justa Causa vs Sem Justa Causa', html:'<h4>Quando Emprego Termina: Como Você É Protegido</h4><p>Demissão é rescisão do contrato iniciada pela empresa. Existem dois tipos: sem justa causa (empresa despede você sem motivo válido) e por justa causa (você cometeu falta grave).</p><p><strong>Demissão sem justa causa:</strong> Empresa despede você sem motivo válido ou sem motivo. Você tem direito a: aviso prévio (30 dias antes), multa de 40% sobre saldo FGTS, saque de FGTS, seguro-desemprego.</p><blockquote class="tip"><strong>Dica:</strong> Se demitido, você recebe aviso prévio ou é liberado antes. Se liberado antes, empresa paga os 30 dias como salário adicional.</blockquote><p><strong>Demissão por justa causa:</strong> Você cometeu falta grave (roubo, violência, embriaguez em serviço, reiterada negligência). Empresa despede sem aviso, sem multa, sem FGTS. Perde direitos. Mas exige prova clara.</p><p>Qual é a diferença entre "aviso prévio" e "liberação"? Aviso: você continua trabalhando 30 dias, depois sai. Liberação: empresa te libera no dia, você não volta, mas paga os 30 dias como adicional. Você escolhe qual prefere.</p><blockquote class="example"><strong>Exemplo:</strong> Você recebe aviso de demissão segunda-feira. Pode trabalhar mais 30 dias até última sexta, ou pode pedir para ser liberado imediatamente (empresa paga 30 dias extras). Ambas são válidas.</blockquote><p><strong>Rescisão indireta:</strong> Você rescinde contrato porque empresa violou obrigações (não paga salário, reduz abusivamente, ambiente perigoso). Você tem mesmos direitos que demissão sem justa causa.</p><blockquote class="quote"><strong>Proteção contra despedida:</strong> "Demissão sem justa causa garante aviso prévio, multa 40% FGTS, saque FGTS e seguro-desemprego. Justa causa exige prova clara de falta grave."</strong></blockquote><p>Como você prova que demissão foi arbitrária? Se empresa não ofereceu motivo escrito, presume-se arbitrária. Você tem direito a documentação de demissão (Termo de Rescisão) com motivo claro.</p>'},
    {id:'calc', title:'Cálculo de Rescisão e Direitos Acumulados', html:'<h4>Quanto Você Recebe na Demissão: Tudo que É Devido</h4><p>Na demissão, você recebe vários valores: saldo de salário, férias, 13º, FGTS, multa. Lei estabelece exatamente o que é devido. Empresa não pode "esquecer" de pagamentos.</p><p><strong>Componentes da rescisão (sem justa causa):</strong></p><p>1. <strong>Saldo de salário:</strong> Quanto você receberia até hoje, proporcional. Se demitido no meio do mês, recebe dias de trabalho do mês.</p><p>2. <strong>Férias proporcional:</strong> Se não tirou férias no período aquisitivo, recebe valor correspondente aos dias. Fórmula: (salário ÷ 30) x dias acumulados.</p><blockquote class="tip"><strong>Dica:</strong> Se trabalhou 8 meses no ano e não tirou férias, recebe 8/12 de 30 dias (20 dias de férias) remunerados, mais 1/3.</blockquote><p>3. <strong>13º salário:</strong> Proporcional aos meses trabalhados. Trabalhou 7 meses: recebe 7/12 de um salário.</p><p>4. <strong>Aviso prévio:</strong> 30 dias de salário. Se você foi liberado antes de completar aviso, ainda recebe os 30 dias.</p><p>5. <strong>Multa de 40% FGTS:</strong> Sobre saldo total de FGTS acumulado durante contrato.</p><blockquote class="example"><strong>Exemplo:</strong> Você trabalhou 3 anos, salário R$ 2.000/mês, sem tirar férias. Recebe: saldo dezembro (R$ 2.000), férias 30 dias + 1/3 (R$ 2.666), 13º proporcional 12 meses (R$ 2.000), aviso prévio (R$ 2.000), FGTS 36 x R$ 160 = R$ 5.760 + multa 40% = R$ 2.304. Total aproximadamente R$ 14.730.</blockquote><p><strong>Em demissão por justa causa:</strong> Você recebe apenas saldo de salário do mês + férias se houver período integral de 12 meses. Não recebe 13º, FGTS, aviso.</p><blockquote class="quote"><strong>Cálculo exato:</strong> "Rescisão sem justa causa soma: saldo, férias proporcional + 1/3, 13º proporcional, aviso prévio, multa 40% FGTS, saque total FGTS."</strong></blockquote><p>Como você verifica se está correto? Peça Termo de Rescisão (TRCT) discriminado. Se valores não batem, você pode contestar e processar por diferenças.</p>'},
    {id:'doc', title:'Documentação e Direitos Após Demissão', html:'<h4>Documentos Que Você Deve Receber Ao Sair</h4><p>Ao ser demitido, você tem direito a documentação que comprova sua relação de emprego e rescisão. Guarde esses documentos: são importantes para futuros direitos.</p><p><strong>Termo de Rescisão de Contrato de Trabalho (TRCT):</strong> Documento que lista todos os valores pagos, motivo da demissão, assinado por você e empresa. Você recebe cópia. Exija esse documento!</p><blockquote class="tip"><strong>Dica:</strong> Revise TRCT antes de assinar. Se valores estão errados, não assine até corrigir. Assinatura significa que aceitou valores.</blockquote><p><strong>Cópia da CTPS (Carteira Trabalho):</strong> Atualizada com data de saída. Importante para próximo emprego.</p><p><strong>Guia do FGTS corrigida:</strong> Comprovando saldos e período de depósito.</p><p><strong>Informação INSS (INSS digital):</strong> Confirmando contribuição para aposentadoria.</p><p>Qual é a consequência se empresa não oferece documentos? Você pode solicitar ao sindicato, Ministério do Trabalho ou Judiciário. Empresa é obrigada a fornecer.</p><blockquote class="example"><strong>Exemplo:</strong> Você saiu de empresa e não recebeu TRCT. Você procura Ministério do Trabalho. Ministério notifica empresa exigindo TRCT e cópia de pagamentos. Empresa é multada.</blockquote><p><strong>Direitos após demissão:</strong> Seguro-desemprego (até 5 meses), utilização de FGTS para compra de imóvel ou outro motivo legal, contribuição continuada ao INSS como contribuinte individual se trabalha como autônomo.</p><blockquote class="quote"><strong>Direitos pós-demissão:</strong> "Você continua tendo direitos: seguro-desemprego, possibilidade de sacar FGTS, acesso a documentação de qualificação profissional, direito a carta de referência."</strong></blockquote><p>Qual é a importância de carta de referência? Próximo empregador quer saber se você é bom funcionário. Exija carta de referência de seu antigo empregador descrevendo seu desempenho.</p>'},
    {id:'conf', title:'Conflito de Rescisão: O Que Fazer se Discordar', html:'<h4>Se Valores Estão Errados ou Discorda da Demissão</h4><p>Se você discorda dos valores recebidos, dos motivos, ou considera demissão injusta, pode reclamar. Lei oferece vários caminhos para buscar justiça.</p><p><strong>Primeira ação:</strong> Contate antigo empregador pedindo correção. Se não resolve, faça reclamação escrita (email ou carta) mostrando cálculo correto e pedindo diferenças.</p><p><strong>Segunda ação:</strong> Procure sindicato de sua categoria. Sindicato pode negociar com empresa ou ajudá-lo a processar.</p><p><strong>Terceira ação:</strong> Acione Ministério do Trabalho. Auditor vai empresa, verifica registros, e multa se houver irregularidades.</p><blockquote class="tip"><strong>Dica:</strong> Guarde todos os documentos: TRCT, recibos, cálculos seus. Documentação é essencial para comprovar erro.</blockquote><p><strong>Quarta ação:</strong> Processe empresa judicialmente. Pode usar Pequenas Causas (se diferença é pequena) ou Justiça Ordinária. Pede indenização por diferenças + multa por atraso + danos morais.</p><blockquote class="example"><strong>Exemplo:</strong> Você recebeu R$ 5.000 de rescisão, mas cálculo correto é R$ 7.500. Diferença é R$ 2.500. Você procura sindicato primeiro (tenta resolver). Se não resolve, processa empresa por R$ 2.500 + juros + multa de atraso.</blockquote><p><strong>Prazo para reclamar:</strong> Você tem até 2 anos para reclamar diferenças em valores. Depois de 2 anos, prescreve. Então, reclame rápido.</p><blockquote class="quote"><strong>Direito reparação:</strong> "Se empresa não pagou valores devidos em rescisão, você pode reclamar até 2 anos depois. Procure sindicato ou justiça para reparação."</strong></blockquote><p>Qual é a indenização por demissão arbitrária? Se juiz considera demissão arbitrária, você pode reclamar reintegração ou indenização. Indenização é aproximadamente valor dos meses desde demissão até decisão final.</p>'}
  ],

{
  id:5, title:'Assédio e Discriminação', free:false,
  topics:[
    {id:'assd', title:'Assédio Moral e Sexual no Trabalho', html:'<h4>Protegendo-se Contra Abuso no Ambiente de Trabalho</h4><p>Assédio no trabalho é comportamento abusivo que prejudica você psychologically ou fisicamente. Lei proíbe e oferece reparação. Você não deve tolerar assédio.</p><p><strong>Assédio moral:</strong> Comportamento repetido que humilha, intimida ou degrada você no trabalho. Exemplo: chefe te xinga sistematicamente, isola você do grupo, nega informações necessárias, faz tarefas impossíveis para você falhar.</p><blockquote class="tip"><strong>Dica:</strong> Assédio moral é caracterizado por repetição. Um insulto ocasional não é assédio. Mas humilhação constante, sim.</blockquote><p><strong>Assédio sexual:</strong> Comportamento sexual não desejado que constrange você. Exemplo: comentário sexual, proposta de ato sexual em troca de benefício, toque inapropriado, exibição de pornografia no trabalho.</p><p>Qual é a responsabilidade da empresa? Empresa responde por assédio no trabalho. Se empresa soube e não agiu, é responsável. Se empresa criou clima onde assédio é tolerado, é responsável.</p><blockquote class="example"><strong>Exemplo:</strong> Gerente comete assédio sexual contra você. Você comunica RH. RH não faz nada. Você pode processar tanto gerente quanto empresa. Empresa é responsável por não ter agido.</blockquote><p>Como você prova assédio? Documentação é essencial: emails humilhantes, mensagens no WhatsApp, colegas testemunhando, cópias de tarefas impossíveis. Registre tudo quando possível.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Assédio moral ou sexual é proibido. Empresa que tolera é responsável. Vítima tem direito a indenização por danos morais."</strong></blockquote><p>Qual é a indenização? Varia conforme gravidade e impacto. Pode ser de R$ 5 mil a R$ 50 mil ou mais. Juiz avalia caso concreto.</p>'},
    {id:'disc', title:'Discriminação no Trabalho: Raça, Gênero, Religião', html:'<h4>Ninguém Pode Ser Discriminado Por Quem É</h4><p>Lei proíbe discriminação no trabalho por razão de raça, cor, sexo, religião, orientação sexual, ou qualquer característica pessoal. Discriminação é crime e causa dano moral.</p><p><strong>Discriminação racial:</strong> Tratamento prejudicial porque você é negro, afrodescendente, indígena. Exemplo: não ser promovido porque é negro, receber xingos racistas, ser segregado no trabalho.</p><p><strong>Discriminação de gênero:</strong> Tratamento prejudicial por ser mulher, homem, ou não-binário. Exemplo: pagar menos às mulheres, exigir "aparência" física às mulheres, assédio sexual, perseguição por identidade de gênero.</p><blockquote class="tip"><strong>Dica:</strong> Se você é tratado diferente porque seu gênero, cor ou religião, é discriminação. Mesmo "preferência" pequena é discriminação.</blockquote><p><strong>Discriminação religiosa:</strong> Não permitir você praticar religião, zombar de sua fé, violar direitos religiosos (exemplo: impedir que você tenha folga para festividades religiosas).</p><p><strong>Discriminação por idade:</strong> Preferência por funcionários jovens, recusa de contratação por idade, comentários depreciativos sobre idade.</p><blockquote class="example"><strong>Exemplo:</strong> Você é mulher. Empresa paga homens 20% mais pelo mesmo trabalho. Isso é discriminação de gênero. Você pode processar pedindo equiparação salarial + indenização.</blockquote><p><strong>Lei de Igualdade Salarial:</strong> Homem e mulher fazendo mesmo trabalho ganham igual. Lei 14.321/2022 exige transparência salarial. Se há diferença sem justificativa, é discriminação.</p><blockquote class="quote"><strong>Direito inalienável:</strong> "Ninguém pode ser discriminado no trabalho por raça, sexo, religião, idade ou qualquer característica. Discriminação gera indenização por danos morais."</strong></blockquote><p>Como você reclama? Procure RH formalmente (por escrito), depois sindicato, depois Ministério do Trabalho, depois Judiciário. Documentação é essencial.</p>'},
    {id:'equ', title:'Equiparação Salarial e Direitos Igualitários', html:'<h4>Mesmo Trabalho, Mesmo Salário: Lei de Equiparação</h4><p>Lei exige que você receba salário igual a colega fazendo mesmo trabalho, com mesma experiência, na mesma empresa. Se há diferença, você pode requerer equiparação.</p><p><strong>Equiparação salarial:</strong> Direito de receber igual ao colega quando função é idêntica. Não precisa ter mesmo título de cargo; importa é o trabalho realizado.</p><blockquote class="tip"><strong>Dica:</strong> Se você e colega fazem mesmo trabalho e ganham diferente, você tem direito a receber igual (retroativo de 5 anos e futuro).</blockquote><p>Como você prova equiparação? Mostrando: (1) colega faz mesmo trabalho; (2) têm mesma experiência; (3) recebem diferente. Se prova isso, tem direito a equiparação.</p><p>Qual é a compensação? Você recebe diferença desde quando começou trabalho diferente, até hoje (máximo 5 anos atrás por lei). Exemplo: colega ganha R$ 3.000, você R$ 2.500. Diferença é R$ 500/mês. Se é há 2 anos: R$ 12.000 a receber.</p><blockquote class="example"><strong>Exemplo:</strong> Você é vendedor há 3 anos ganhando R$ 2.500. Colega também vendedor, mesma experiência, ganha R$ 3.000. Você pode pedir equiparação. Se juiz concorda, você recebe R$ 500 x 36 meses = R$ 18.000 de diferenças.</blockquote><p><strong>Diferenças legítimas:</strong> Empresa pode pagar diferente se: colega tem qualificação maior (diploma), desempenho significativamente melhor (documentado), comissões por vendas, premiações. Simples diferenças de gênero, raça, ou preferência não justificam.</p><blockquote class="quote"><strong>Proteção igualitária:</strong> "Você tem direito a equiparação salarial. Diferenças só são legítimas se baseadas em qualificação, desempenho documentado ou estrutura salarial transparente."</strong></blockquote><p>Como você reivindica? Comunicando empresa por escrito mostrando colega, pedindo equiparação. Se empresa recusa, processa judicialmente em Pequenas Causas ou Ordinária.</p>'},
    {id:'repr', title:'Retaliação: Proteção Contra Represálias Após Reclamação', html:'<h4>Você Não Pode Ser Punido Por Reclamar Direitos</h4><p>Lei protege você contra retaliação (represália) se você reclamou direitos. Empresa não pode demitir, rebaixar, ou prejudicar você porque você reclamou discriminação, assédio ou violação de direitos.</p><p><strong>O que é retaliação?</strong> Quando empresa o prejudica (demissão, rebaixamento, corte de salário, assédio aumentado) porque você fez reclamação de direito ou participou de denúncia.</p><blockquote class="tip"><strong>Dica:</strong> Se você reclamou assédio em segunda-feira e foi demitido em terça, presume-se retaliação. Lei protege você contra isso.</blockquote><p><strong>Exemplos de retaliação:</strong> Demissão após reclamação, rebaixamento de função, isolamento social no trabalho, aumento de tarefas impossíveis, redução salarial, transferência punitiva para filial ruim.</p><p>Qual é a presunção legal? Se você reclamou direito e foi prejudicado logo depois, lei presume que é retaliação. Empresa é que deve provar que motivo é outro.</p><blockquote class="example"><strong>Exemplo:</strong> Você se queixou de assédio do chefe sexta-feira. Segunda você é demitido "por reestruturação". Lei presume retaliação. Empresa precisa provar que demissão é realmente por reestruturação, não por sua reclamação.</blockquote><p><strong>Ônus probatório invertido:</strong> Normalmente você prova culpa. Em retaliação, empresa que prova que não foi retaliação. Isso beneficia você.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Empresa não pode retaliar contra empregado que reclamou direito. Prejuízo após reclamação presume retaliação, e empresa deve provar o contrário."</strong></blockquote><p>Como você se protege? Faça reclamação por escrito (email, carta registrada), guarde cópia. Se prejudicado depois, você tem documentação provando sequência: reclamação → represália.</p>'}
  ],

{
  id:6, title:'Justiça do Trabalho', free:false,
  topics:[
    {id:'jt', title:'Sistema Judiciário Trabalhista e Como Processar', html:'<h4>Acessando Judiciário Para Defender Seus Direitos</h4><p>Justiça do Trabalho é esfera especializada em conflitos trabalhistas. Você pode acessar para processar empresa por violação de direitos. Processo é específico, com regras próprias.</p><p>Qual é a estrutura? Existem Varas do Trabalho (primeira instância onde você entra), Tribunal Regional do Trabalho (segunda instância), e Tribunal Superior do Trabalho TST (última instância). Você começa na Vara.</p><blockquote class="tip"><strong>Dica:</strong> Procure Defensoria Pública ou Sindicato para ajudá-lo. Processo requer conhecimento legal; não recomenda-se ir sozinho.</blockquote><p><strong>Como processar:</strong> Você vai Vara do Trabalho, registra reclamação trabalhista contra empresa. Fornece: seu nome, empresa, descrição do problema, cálculo do dano, documentação (contratos, folhas ponto, emails).</p><p><strong>Custos:</strong> Se ganha pouco (até 3 salários mínimos), pode usar Defensoria (gratuito). Se ganha mais, precisa de advogado (honorários normalmente 20-30% do valor ganho). Há também reclamatórias em valores pequenos sem advogado obrigatório.</p><blockquote class="example"><strong>Exemplo:</strong> Você processa empresa por não pagar hora extra acumulado de R$ 10.000. Você contrata advogado. Se ganhar, paga ao advogado 20-30% (R$ 2-3 mil). Recebe R$ 7-8 mil.</blockquote><p><strong>Prazo para processar:</strong> Você tem 2 anos para reclamar diferenças salariais (hora extra, 13º, férias não pagas). Após 2 anos, prescreve (você perde direito).</p><blockquote class="quote"><strong>Acesso à justiça:</strong> "Você tem direito de acessar Justiça do Trabalho. Se ganha pouco, Defensoria é gratuita. Se ganha mais, há advogados especializados em trabalhista."</strong></blockquote><p>Qual é a duração do processo? Normalmente 1-3 anos. Se empresa recorre, pode demorar mais. Processos simples (valores pequenos) são mais rápidos.</p>'},
    {id:'sind', title:'Sindicato: Seu Aliado na Proteção de Direitos', html:'<h4>Poder Coletivo: Como Sindicato Ajuda Você</h4><p>Sindicato é organização que representa trabalhadores. Você é membro automaticamente (desconto em folha de aproximadamente R$ 15-50/mês). Sindicato oferece proteção que você sozinho não teria.</p><p>Qual é o papel do sindicato? Negociar acordos coletivos (melhor salário, benefícios), defender membros em conflitos, oferecer consultoria jurídica, organizar mobilizações, representar em Justiça.</p><blockquote class="tip"><strong>Dica:</strong> Procure sindicato de sua categoria. Maioria oferece consultoria jurídica gratuita para membros.</blockquote><p><strong>Acordos coletivos:</strong> Sindicato negocia com empresas (ou federações patronais) acordos que beneficiam todos da categoria. Exemplo: aumento salarial 10%, vale-refeição, benefícios adicionais. Todos ganham.</p><p><strong>Defesa legal:</strong> Se você é demitido injustamente, assediado, ou sofre violação de direitos, sindicato pode ajudá-lo. Oferece advogado, faz reclamação ao Ministério do Trabalho, acompanha processo.</p><blockquote class="example"><strong>Exemplo:</strong> Você é demitido sem justa causa. Sindicato ajuda você a processar empresa. Sindicato coloca outros casos semelhantes em pauta. Ao negociar com empresa, menciona sua demissão injusta, pressiona empresa a oferecer acordo melhor.</blockquote><p><strong>Greve:</strong> Se negociações falham, sindicato pode organizar greve. Você tem direito de parar de trabalhar para exigir direitos. Empresa não pode punir por greve legal.</p><blockquote class="quote"><strong>Poder coletivo:</strong> "Sindicato oferece poder que você sozinho não teria. Negociações, acordos, defesa legal e mobilizações beneficiam todos da categoria."</strong></blockquote><p>Como você se filia? Normalmente é automático (desconto em folha). Você pode procurar sindicato de sua categoria na sua cidade/estado e se registrar formalmente.</p>'},
    {id:'marg', title:'Acesso à Justiça: Defensoria, Assistência Jurídica', html:'<h4>Ajuda Legal Gratuita Para Quem Não Pode Pagar Advogado</h4><p>Se você ganha pouco, tem direito a assistência jurídica gratuita. Defensoria Pública oferece consultoria, documentação, e representação em processo sem custos.</p><p>Qual é o requisito? Renda até aproximadamente 3 salários mínimos (varia por estado). Você comprova com contracheque ou declaração. Defensoria avalia e aceita ou nega.</p><blockquote class="tip"><strong>Dica:</strong> Procure Defensoria de seu estado. Eles também oferecem consultoria: você vai, explica problema, recebe orientação gratuita.</blockquote><p><strong>O que Defensoria oferece:</strong> Consultoria jurídica (tirar dúvidas), preparação de documentos, representação em processos trabalhistas, negociação com empresa, encaminhamento a órgãos (Ministério do Trabalho, sindicato).</p><p><strong>OAB (Ordem dos Advogados do Brasil):</strong> Oferece programa de assistência jurídica comunitária. Advogados voluntários atendem gratuitamente. Procure OAB de seu estado para saber quais dias/horários.</p><blockquote class="example"><strong>Exemplo:</strong> Você ganha R$ 2.500/mês. Defensor acompanha você em processo contra empresa por diferenças salariais. Você não paga nada. Se ganhar, recebe total (sem desconto de advogado).</blockquote><p><strong>Custos de processo:</strong> Há custas judiciais (taxa cobrada pelo tribunal), mas Defensoria pode pedir isenção se você ganhar pouco. Normalmente é isento.</p><blockquote class="quote"><strong>Acesso igualitário:</strong> "Falta de dinheiro não pode impedir acesso à justiça. Defensoria garante que pobre também pode processar empresa e defender direitos."</strong></blockquote><p>Como funciona se você ganhar? Se ganhar ação, Defensoria não desconta nada (você recebe 100%). Isso beneficia você em relação a advogado particular (que desconta 20-30%).</p>'},
    {id:'rec', title:'Recursos: Quando Você Discorda da Sentença', html:'<h4>O Que Fazer Se Sentença Não For Favorável</h4><p>Se você perde uma ação (sentença é contra você), pode recorrer. Recurso é pedido para tribunal superior revisar decisão. Existem vários tipos de recurso com prazos e procedimentos próprios.</p><p><strong>Apelação:</strong> Recurso principal. Você vai Tribunal Regional do Trabalho pedindo que revise sentença. Tribunal analisa se sentença foi correta. Se tribunal concorda com você, reverte decisão.</p><blockquote class="tip"><strong>Dica:</strong> Se perdeu em primeira instância, sempre recorra. Às vezes tribunal superior vê algo que juiz não viu.</blockquote><p>Qual é o prazo para recurso? 8 dias após sentença ser publicada. Você deve avisar seu advogado logo para preparar recurso no prazo.</p><p><strong>Recurso de revista:</strong> Recurso para TST (Tribunal Superior). Usado quando há questão de direito importante não decidida corretamente. Tribunal superior revisa jurisprudência.</p><p>Qual é a taxa de sucesso? Depende do recurso. Apelação tem mais chance (tribunal pode mudar decisão). Recurso de revista é mais restrito (apenas questões importantes).</p><blockquote class="example"><strong>Exemplo:</strong> Juiz nega equiparação salarial sua. Você apela. Tribunal Regional analisa, vê que você provou colega faz mesmo trabalho. Tribunal reverte decisão, concede equiparação. Você ganha na apelação.</blockquote><blockquote class="quote"><strong>Direito de recorrer:</strong> "Se discorda de sentença, pode recorrer para tribunal superior. Recursos oferecem segunda oportunidade de justiça."</strong></blockquote><p>Qual é o custo de recurso? Se usa Defensoria, recurso é gratuito. Se usa advogado particular, pode haver custo adicional (negocie antes de recorrer).</p>'}
  ],
