    {id:1, name:"O Estado do Terrorismo Global em 2025-2026", dur:40, content:`
<h3>Panorama Geográfico e Ameaças Emergentes</h3>

<p>O panorama do terrorismo global em 2025-2026 está mudando significativamente. Segundo as análises de inteligência internacional, entidades terroristas e insurgentes montarão ataques em toda a Ásia, Oriente Médio, África, América Latina e também no Ocidente. Os dados revelam que aproximadamente 60 a 70% dos ataques terroristas ocorrerão em países africanos, evidenciando uma mudança importante na distribuição geográfica das ameaças.</p>

<blockquote class="tip">
  <strong>Dado Crucial:</strong> Enquanto mais de 95% dos ataques ocorrerão em zonas de conflito (Sudan, Mali, Somália, Líbia, Nigéria, Afeganistão e Paquistão), ataques isolados acontecerão na América do Norte, Europa, Austrália e Nova Zelândia, reafirmando que nenhuma região está completamente segura.
</blockquote>

<h4>Fragmentação e Evolução das Organizações Terroristas</h4>

<p>O cenário de 2025-2026 é marcado pela fragmentação das organizações terroristas tradicionais. O Estado Islâmico, embora não controle mais territórios significativos no Oriente Médio, mantém sua capacidade de ameaça global. A ideologia jihadista continua circulando globalmente, mesmo com a capacidade centralizada diminuída, deslocando o centro estratégico de militância para insurreições territoriais em regiões instáveis.</p>

<p>Al-Qaeda e ISIS representam as maiores ameaças aos interesses ocidentais em partes da África, Oriente Médio e Sul da Ásia, onde esses grupos exploram instabilidade política e territórios sem controle governamental para reconstruir suas capacidades e lideranças. A falta de resposta global coordenada enfraqueceu a cooperação internacional de inteligência, um fator preocupante para 2026.</p>

<h4>ISIS em 2025: Diversificação de Táticas</h4>

<p>O ISIS continua evoluindo sua abordagem estratégica. Ataques recentes inspirados pela ideologia jihadista incluem o atentado de Bourbon Street em Nova Orleans, em 2025, onde 15 pessoas foram mortas e 57 feridas, demonstrando a capacidade operacional dos grupos afiliados. Na Austrália, o ataque de Bondi Beach em dezembro resultou em 15 mortos e múltiplos feridos, evidenciando o alcance global da ameaça.</p>

<blockquote class="news">
  <strong>Alerta de Segurança:</strong> A ISKP (Khorasan) é identificada como o nó mais dinâmico e ambicioso da rede ISIS, com interesse explícito em alvos ocidentais. Isso representa uma ameaça aumentada para a Europa e América do Norte em 2026.
</blockquote>

<h4>Novos Padrões de Radicalização</h4>

<p>Uma mudança crucial ocorreu no padrão de radicalização online. Uma década atrás, levava mais de um ano para alguém passar de "curioso navegador" a "ator violento". Hoje, esse período reduziu-se drasticamente para meses. Grupos terroristas exploram plataformas digitais para radicalizar, treinar e angariar fundos, representando uma nova dimensão da ameaça.</p>

<p>O envolvimento de menores e jovens em terrorismo continua crescendo, sendo fortemente influenciado por vulnerabilidades psicológicas, isolamento social e dependência digital. Este é um padrão preocupante que as autoridades de segurança monitoram atentamente.</p>

<ul>
  <li>Radicalização em meses, não anos</li>
  <li>Exploração de redes sociais e plataformas digitais</li>
  <li>Aumento do envolvimento de menores</li>
  <li>Combinação de vulnerabilidades psicológicas e isolamento</li>
  <li>Acesso facilitado a conteúdo extremista</li>
</ul>

<blockquote class="example">
  <strong>Exemplo Real:</strong> Um jovem de 23 anos de origem síria, após jurar lealdade ao ISIS, atacou aleatoriamente transeuntes em Villach, Áustria, matando um menino de 14 anos e ferindo cinco outros. Este padrão de ataques individuais realizados por "lobos solitários" radicalizados online é cada vez mais comum em 2025-2026.
</blockquote>

<h4>Ameaças Específicas em 2026</h4>

<p>Para 2026, análises de inteligência indicam que ataques do Tareek-e-Taliban Pakistan (TTP), direcionados ao Paquistão, superarão os ataques da ISKP e ISPP. Na África, redes de militantes jihadistas, incluindo ISIS, afiliados Al-Qaeda, Al-Shabaab e grupos armados palestinos, continuarão ativos em múltiplos teatros de operação.</p>

<p>A Copa do Mundo FIFA 2026 na América do Norte é identificada como possível alvo de ataques, dada sua cobertura midiática significativa e atratividade para grupos violentos extremistas. Grandes eventos internacionais permanecerão no radar de ameaças.</p>

    {id:2, name:"Extremismo na Europa e Ameaças Domésticas", dur:40, content:`
<h3>Panorama de Ameaças na Europa em 2025</h3>

<p>A Europa continua enfrentando uma ameaça elevada de terrorismo em 2025, com múltiplos tipos de extremismo representando riscos concorrentes. O relatório da Europol sobre a Situação e Tendências do Terrorismo na UE (TE-SAT 2025) revela um cenário complexo e fragmentado onde ameaças islamistas, extremismo de direita e extremismo de esquerda coexistem e evoluem.</p>

<h4>Terrorismo Islamista: A Marca ISIS Permanece Perigosa</h4>

<p>O Estado Islâmico, embora tenha perdido territórios significativos, mantém sua "marca" como o vetor transnacional mais perigoso. A ideologia jihadista continua atraindo aspirantes em toda a Europa. A ISKP é particularmente preocupante, com capacidade de planejamento de operações e interesse explícito em ataques contra alvos ocidentais.</p>

<blockquote class="tip">
  <strong>Ponto de Atenção:</strong> 449 indivíduos foram presos por crimes relacionados ao terrorismo em 20 Estados-Membros da UE em 2024. Os maiores números vieram de Espanha (90), França (69), Itália (62) e Alemanha (55), revelando que o problema é sistêmico em toda a Europa.
</blockquote>

<h4>Extremismo de Direita em Ascensão</h4>

<p>A potencial ocorrência de ataques bem-sucedidos de extremistas de direita é especialmente elevada em Áustria, Alemanha, países nórdicos e Reino Unido. A razão? Já existe presença estabelecida de redes extremistas de direita nesses países, combinada com sentimentos anti-imigração em ascensão. Este é um catalisador perigoso para violência.</p>

<p>O extremismo de direita é frequentemente motivado por ideologia racial, anti-imigração, nacionalismo étnico e conspirações anti-governo. Diferentemente do jihadismo que opera em redes mais estruturadas, muitos ataques de direita são perpetrados por "lobos solitários" radicalizados online.</p>

<h4>Extremismo de Esquerda e Ativismo Climático</h4>

<p>França, Alemanha, Grécia e Itália permanecem como focos de extremismo de esquerda. Um desenvolvimento preocupante é o aumento do envolvimento de grupos de esquerda em ativismo relacionado a mudanças climáticas, combinando ideologia política com ativismo ambiental radical.</p>

<blockquote class="news">
  <strong>Tendência Emergente:</strong> Grupos de esquerda na França e Alemanha estão cada vez mais propensos a se envolver em ativismo climático radical, representando um novo tipo de ameaça que combina motivações políticas e ambientais.
</blockquote>

<h4>Terrorismo Patrocinado pelo Estado</h4>

<p>Uma ameaça muitas vezes subestimada é o terrorismo patrocinado pelo estado. Em 2025, a Europa enfrentou uma ameaça elevada dessa natureza, com atores estatais utilizando grupos irregulares e operações encobertas para atingir objetivos políticos. Esta é uma dimensão sofisticada da ameaça que requer inteligência avançada para detectar.</p>

<h4>Menores e Juventude: Uma Vulnerabilidade Crescente</h4>

<p>O envolvimento de menores em terrorismo e extremismo violento representa um desenvolvimento altamente preocupante que cresceu continuamente em 2024-2025. A radicalização de jovens é fortemente influenciada por uma combinação de vulnerabilidades psicológicas, isolamento social e dependência digital.</p>

<ul>
  <li>Adolescentes buscando identidade e pertencimento</li>
  <li>Acesso facilitado a conteúdo extremista online</li>
  <li>Falta de envolvimento social e comunitário</li>
  <li>Influência de figuras carismáticas em plataformas digitais</li>
  <li>Dificuldade em distinguir fantasia de realidade online</li>
</ul>

<blockquote class="example">
  <strong>Caso Real:</strong> Um jovem sírio de 23 anos aleatoriamente apunhalou transeuntes em Villach, Áustria, matando uma criança de 14 anos e ferindo cinco outros após jurar lealdade ao ISIS. Este é um padrão cada vez mais comum de "lobos solitários" radicalizados rapidamente via internet.
</blockquote>

<h4>Degradação da Cooperação Internacional</h4>

<p>A consequência mais preocupante para 2026 será a degradação da inteligência e compartilhamento de informações globais. A fundação geopolítica que uma vez apoiava cooperação multilateral de antiterrorismo está enfraquecendo. Agendas nacionais competitivas, desconfiança crescente e foco estratégico em mudança estão fragmentando uma resposta coordenada ao terrorismo.</p>

<p>Isso significa que ameaças que cruzam fronteiras podem não ser detectadas tão rapidamente, permitindo que operações continuem sem interferência internacional.</p>

    {id:3, name:"Terrorismo Doméstico e Estratégias de Defesa Global", dur:40, content:`
<h3>Terrorismo Doméstico: Uma Ameaça Maior que o Terrorismo Internacional</h3>

<p>Uma descoberta crucial das análises de inteligência de 2025-2026 é que o terrorismo doméstico representa uma maior ameaça para as democracias ocidentais do que as organizações terroristas internacionais tradicionais. Este é um ponto de virada importante na compreensão do cenário de ameaças globais.</p>

<h4>Padrões de Radicalização Doméstica</h4>

<p>Atores solitários e pequenos grupos motivados por agravos raciais, religiosos, anti-governo e teorias conspiracionistas continuam sendo os perpetradores mais prováveis de ataques em solo norte-americano e europeu. O que torna isso particularmente desafiador é que essas pessoas muitas vezes não têm conexões com organizações terroristas conhecidas, tornando a previsão e prevenção extremamente difíceis.</p>

<blockquote class="tip">
  <strong>Insight Crítico:</strong> A normalização da violência política é um fator preocupante. Em 2026, esperamos ver uma maior aceitação cultural de violência como forma de expressão política, especialmente em ambientes polarizados.
</blockquote>

<h4>Aumento Esperado em Ataques de Esquerda</h4>

<p>Conforme se aproximam eleições significativas, análises indicam possível aumento em ataques terroristas de esquerda dirigidos a órgãos governamentais e alvos de aplicação da lei em imigração. Grupos de esquerda podem se sentir emboldados a agir durante períodos políticos tensos, especialmente quando veem suas causas sendo negligenciadas ou atacadas politicamente.</p>

<h4>Ameaça de Atos de Direita e Supremacistas</h4>

<p>Paralelamente, grupos de direita radical e supremacistas branco podem se sentir empoderados por retórica política amplificada. O risco de ataques dirigidos a comunidades minoritárias, instituições governamentais e símbolos de "mudança cultural" permanece elevado em 2026.</p>

<ul>
  <li>Mobilização através de plataformas online descentralizadas</li>
  <li>Resistência a "woke culture" e progressismo</li>
  <li>Conspirações sobre "substituição étnica"</li>
  <li>Acesso a armamentos e explosivos</li>
  <li>Falta de filiação formal facilitando detecção</li>
</ul>

<blockquote class="news">
  <strong>Tendência Preocupante:</strong> Atores terroristas estão cada vez mais explorando infraestrutura digital, incluindo sistemas de eleição, utilidades públicas e redes de comunicação. O objetivo não é apenas causar morte, mas "corroer confiança pública e desruir serviços essenciais".
</blockquote>

<h4>Terrorismo Cibernético e Infraestrutura Crítica</h4>

<p>Um desenvolvimento significativo é a expansão do terrorismo além da violência física. Atores extremistas estão crescentemente direcionando infraestrutura digital. Ataques a sistemas eleitorais, redes elétricas, abastecimento de água e comunicações são agora prioridades táticas para grupos terroristas.</p>

<p>O objetivo é desestabilizar sociedades não simplesmente através de morte, mas através da erosão de confiança nas instituições e interrupção de serviços essenciais. Este é um tipo de terrorismo que requer defesa completamente diferente do modelo tradicional baseado em segurança física.</p>

<h4>Drone Terrorism: A Nova Fronteira</h4>

<p>2026 poderia ver uma taxa sem precedentes de adoção de drones por atores terroristas estrangeiros e domésticos. Drones representam uma ameaça escalável: inicialmente simples e baratos de operar, mas potencialmente capazes de entregar explosivos, spray biológico ou simplesmente ser usados para vigilância e coordenação de ataques multi-nível.</p>

<blockquote class="example">
  <strong>Cenário Potencial:</strong> Grupos terroristas poderiam usar enxames de drones para atacar simultaneamente múltiplas locações de infraestrutura crítica, superando as capacidades tradicionais de defesa aérea que foram projetadas para ameaças à-mano-livre convencionais.
</blockquote>

<h4>Eventos de Alto Perfil Como Alvos</h4>

<p>A Copa do Mundo FIFA 2026, realizada na América do Norte, é identificada como possível alvo. Grandes eventos esportivos e culturais continuam sendo atraentes para grupos terroristas e extremistas violentos porque recebem cobertura midiática global significativa, maximizando o impacto psicológico.</p>

<h4>Estratégias de Defesa para 2026</h4>

<p>Para combater essas ameaças crescentes, as democracias ocidentais precisam de abordagens multifacetadas:</p>

<ul>
  <li><strong>Inteligência Comunitária:</strong> Fortalecer conexões com comunidades vulneráveis a radicalização</li>
  <li><strong>Detecção Digital:</strong> Melhorar capacidades de monitorar radicalização online sem prejudicar liberdade de expressão</li>
  <li><strong>Educação:</strong> Currículos que ensinam pensamento crítico e resiliência a propaganda extremista</li>
  <li><strong>Resiliência de Infraestrutura:</strong> Endurecimento de sistemas críticos contra ataques cibernéticos</li>
  <li><strong>Cooperação Internacional:</strong> Restaurar confiança em compartilhamento de inteligência apesar de tensões geopolíticas</li>
  <li><strong>Prevenção de Radicalização de Menores:</strong> Programas especializados para desradicalizar juventude</li>
</ul>

<blockquote class="tip">
  <strong>Reflexão Final:</strong> O terrorismo em 2025-2026 não é mais apenas sobre organizações com bandeiras e hierarquias claras. É sobre ideias que se espalham através da internet, criando células autônomas de indivíduos radicalizados que não precisam de coordenação central para agir violentamente. Isso torna a resposta significativamente mais complexa e exige repensar completamente como detectamos e prevenimos o extremismo violento.
</blockquote>
    `, cards:[
