<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ranking — Matheus Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg2:#0f0f1e;--bg3:#161628;--card:#111122;--brd:#1e1e35;--brd2:#282844;--pri:#5b7fff;--acc:#f59e0b;--grn:#22c55e;--red:#ef4444;--pur:#a855f7;--txt:#e8e8f0;--txt2:#8888aa;--txt3:#44445a;--font:'Outfit',sans-serif;--serif:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;max-width:600px;margin:0 auto;overflow-x:hidden}
::-webkit-scrollbar{display:none}
@media(min-width:601px){body{border-left:1px solid var(--brd);border-right:1px solid var(--brd)}}
/* ── PAGE ── */
.page{padding:72px 14px 90px}
/* ── HERO ── */
.rank-hero{text-align:center;padding:18px 14px 14px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--brd);margin-bottom:16px}
.rank-hero h1{font-family:var(--serif);font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:4px}
.rank-hero p{font-size:.72rem;color:var(--txt2)}
/* ── TABS ── */
.rank-tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:3px;margin-bottom:16px}
.rtab{flex:1;padding:8px 4px;border-radius:8px;font-size:.62rem;font-weight:700;color:var(--txt2);cursor:pointer;text-align:center;transition:all .2s;border:none;background:transparent;font-family:var(--font)}
.rtab.active{background:var(--card);color:var(--txt);border:1px solid var(--brd)}
.rtab-pane{display:none}.rtab-pane.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* ── RANK LIST ── */
.rank-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;overflow:hidden;margin-bottom:14px}
.rank-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .15s}
.rank-item:last-child{border-bottom:none}
.rank-item:hover{background:var(--bg2)}
.rank-item.me{background:rgba(91,127,255,.06);border-left:3px solid var(--pri)}
.r-pos{width:30px;text-align:center;font-size:.85rem;font-weight:800;color:var(--txt3);flex-shrink:0}
.r-pos.p1{font-size:1.1rem;color:#f59e0b}.r-pos.p2{font-size:1rem;color:#9898b0}.r-pos.p3{font-size:1rem;color:#b45309}
.r-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;color:#fff;flex-shrink:0;position:relative;overflow:hidden;border:2px solid var(--brd2)}
.r-av img{width:100%;height:100%;object-fit:cover}
.r-info{flex:1;min-width:0}
.r-name{font-size:.8rem;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:5px}
.r-you{font-size:.46rem;background:var(--pri);color:#fff;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase}
.r-lv{font-size:.58rem;color:var(--txt2);margin-top:2px;display:flex;align-items:center;gap:4px}
.r-bar{height:3px;background:var(--brd);border-radius:2px;margin-top:4px;overflow:hidden}
.r-bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pri),var(--pur))}
.r-pts{font-size:.85rem;font-weight:900;color:var(--pri);white-space:nowrap;flex-shrink:0}
/* ── PERFIL MODAL ── */
.pf-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:20000;display:none;align-items:flex-end;justify-content:center}
.pf-modal-bg.show{display:flex}
.pf-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 18px 40px;animation:slideUp .3s cubic-bezier(.2,0,.3,1);max-height:80vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pf-handle{width:36px;height:4px;border-radius:2px;background:var(--brd2);margin:0 auto 16px}
.pf-hero{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.pf-av{width:60px;height:60px;border-radius:50%;border:2px solid var(--pri);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:var(--pri);background:var(--bg3);overflow:hidden;flex-shrink:0}
.pf-av img{width:100%;height:100%;object-fit:cover}
.pf-name{font-size:1.05rem;font-weight:800;color:#fff}
.pf-lv-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:.62rem;font-weight:700;margin-top:4px}
.pf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pf-stat{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center}
.pf-stat b{font-size:1.1rem;font-weight:900;color:var(--pri);display:block}
.pf-stat span{font-size:.52rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}
.pf-info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd);font-size:.78rem;color:var(--txt)}
.pf-info-row:last-child{border-bottom:none}
.pf-info-icon{width:24px;text-align:center;font-size:.9rem;flex-shrink:0;color:var(--txt2)}
.pf-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--txt3);font-size:1.2rem;cursor:pointer;padding:4px}
/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:rgba(8,8,15,.96);backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;z-index:200}
.bn-item{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;border:none;background:transparent;font-family:var(--font);transition:color .15s}
.bn-item span{font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.bn-item.active{color:var(--pri)}.bn-item:not(.active){color:var(--txt3)}
.bn-icon{font-size:1.2rem;line-height:1}

/* ══ MA TOPBAR GLOBAL ══ */
.ma-topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(8,8,15,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--brd,#1e1e32);display:flex;align-items:center;padding:0 14px;gap:8px;z-index:9999;font-family:var(--font,'Outfit',sans-serif)}
.ma-tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.ma-tb-logo img{width:28px;height:28px;border-radius:7px;flex-shrink:0}
.ma-tb-brand{font-size:.76rem;font-weight:800;color:#fff;white-space:nowrap;line-height:1}
.ma-tb-brand b{color:#5b7fff}
.ma-tb-sep{width:1px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0}
.ma-tb-course{font-size:.7rem;font-weight:800;color:#9898b0;white-space:nowrap;flex-shrink:0}
.ma-tb-spacer{flex:1;min-width:0}
/* Pontos ao vivo */
.ma-pts-live{display:none;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(37,99,235,.2),rgba(124,58,237,.18));border:1px solid rgba(91,127,255,.3);border-radius:20px;padding:5px 12px;cursor:pointer;text-decoration:none;flex-shrink:0;transition:all .2s}
.ma-pts-live.show{display:flex}
.ma-pts-live:hover{border-color:#5b7fff;transform:scale(1.04)}
.ma-pts-live.bump{animation:ma-cbump .4s cubic-bezier(.2,0,.3,1)}
@keyframes ma-cbump{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(.96)}100%{transform:scale(1)}}
.ma-pts-icon{font-size:.9rem;line-height:1;flex-shrink:0}
.ma-pts-col{display:flex;flex-direction:column;align-items:flex-end}
.ma-pts-num{font-size:.84rem;font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums;min-width:24px}
.ma-pts-sublv{font-size:.44rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.05em;line-height:1;margin-top:2px}
/* Botões ícone */
.ma-tb-icon-btn{width:34px;height:34px;border-radius:9px;border:none;background:transparent;color:#8888a8;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;transition:all .2s}
.ma-tb-icon-btn:hover{background:#161628;color:#e8e8f0}
.ma-tb-menu-btn{width:34px;height:34px;border-radius:9px;border:1px solid #1e1e35;background:#111122;color:#8888a8;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ma-tb-menu-btn:hover{border-color:#5b7fff;color:#5b7fff}
/* ══ DROPDOWN MENU ══ */
.ma-menu-overlay{position:fixed;inset:0;z-index:10000;display:none}
.ma-menu-overlay.open{display:block}
.ma-menu-dd{position:fixed;top:62px;right:10px;background:#0f0f1e;border:1px solid #252540;border-radius:16px;min-width:232px;z-index:10001;box-shadow:0 16px 56px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.03);overflow:hidden;opacity:0;transform:scale(.88) translateY(-12px);pointer-events:none;transition:all .22s cubic-bezier(.2,0,.3,1);transform-origin:top right}
.ma-menu-dd.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all}
/* Seção usuário */
.ma-menu-user{padding:14px 16px 0;border-bottom:1px solid #1e1e35}
.ma-mu-name{font-size:.85rem;font-weight:800;color:#fff;display:block;margin-bottom:5px}
.ma-mu-level{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;font-size:.64rem;font-weight:700}
.ma-lv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ma-lvc0{background:rgba(180,83,9,.18);color:#b45309}.ma-lvc0 .ma-lv-dot{background:#b45309}
.ma-lvc1{background:rgba(75,139,255,.18);color:#4b8bff}.ma-lvc1 .ma-lv-dot{background:#4b8bff}
.ma-lvc2{background:rgba(168,85,247,.18);color:#a855f7}.ma-lvc2 .ma-lv-dot{background:#a855f7}
.ma-lvc3{background:rgba(245,158,11,.18);color:#f59e0b}.ma-lvc3 .ma-lv-dot{background:#f59e0b}
.ma-lvc4{background:rgba(239,68,68,.18);color:#ef4444}.ma-lvc4 .ma-lv-dot{background:#ef4444}
.ma-mu-pts{font-size:.63rem;color:#8888a8;margin-top:6px;margin-bottom:10px}
.ma-mu-pts b{color:#5b7fff}
.ma-mu-next{font-size:.58rem;color:#44445a;margin-left:4px}
/* Barra XP */
.ma-mu-xp{padding:0 16px 10px}
.ma-xp-labels{display:flex;justify-content:space-between;font-size:.54rem;color:#44445a;margin-bottom:4px}
.ma-xp-bg{height:5px;background:#161628;border-radius:10px;overflow:hidden}
.ma-xp-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#5b7fff,#a855f7);transition:width .8s ease}
/* Items */
.ma-menu-sec{padding:5px 0}
.ma-menu-sec+.ma-menu-sec{border-top:1px solid #1e1e35}
.ma-mi{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:.78rem;font-weight:600;color:#8888a8;text-decoration:none;cursor:pointer;border:none;background:transparent;font-family:var(--font,'Outfit',sans-serif);width:100%;text-align:left;transition:background .15s}
.ma-mi:hover{background:#161628;color:#e8e8f0}
.ma-mi-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
.ma-mi.green{color:#22c55e}.ma-mi.gold{color:#f59e0b}.ma-mi.red{color:#ef4444}
/* Badge flutuante */
.ma-fpts{position:fixed;bottom:18px;right:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:50px;padding:7px 14px;display:none;align-items:center;gap:7px;z-index:9990;box-shadow:0 4px 18px rgba(91,127,255,.45);cursor:pointer;text-decoration:none;border:1px solid rgba(255,255,255,.1);transition:transform .2s}
.ma-fpts:hover{transform:scale(1.06)}.ma-fpts-icon{font-size:.9rem}
.ma-fpts-lv{font-size:.46rem;color:rgba(255,255,255,.65);display:block;text-transform:uppercase;letter-spacing:.05em;line-height:1}
.ma-fpts-num{font-size:.85rem;font-weight:900;color:#fff;line-height:1}
@keyframes mafb{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}.ma-fpts.bump{animation:mafb .3s ease}
</style>
</head>

];

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
var LVS=[
  {n:'Iniciante',i:'🟤',c:'lv-color-0',m:0,max:1000},
  {n:'Aprendiz',i:'🔵',c:'lv-color-1',m:1000,max:3000},
  {n:'Profissional',i:'🟣',c:'lv-color-2',m:3000,max:7000},
  {n:'Especialista',i:'🟡',c:'lv-color-3',m:7000,max:15000},
  {n:'Elite',i:'🔴',c:'lv-color-4',m:15000,max:99999}
];
function getLvObj(t){for(var i=LVS.length-1;i>=0;i--)if(t>=LVS[i].m)return LVS[i];return LVS[0];}
function gU(){try{return JSON.parse(localStorage.getItem('ma_user'));}catch(e){return null;}}
function gP(){try{return JSON.parse(localStorage.getItem('ma_points'))||{total:0,history:[]};}catch(e){return{total:0,history:[]};}}
function getSess(){try{return JSON.parse(localStorage.getItem('ma_sessions'))||{streak:0};}catch(e){return{streak:0};}}

// ═══════════════════════════════════════════════
// RENDER RANK
// ═══════════════════════════════════════════════
var _currentTab = 'geral';

function buildList(players, tab){
  var u=gU(), myPts=gP().total, myName=u?u.name:'', myId='me';
  var list = players.slice();
  if(u){ list.push({id:'me',name:u.name,city:u.city||'',pts:myPts,streak:getSess().streak||0,phone:u.phone||null,showPhone:false,date:u.date||'2026',av:null,isMe:true}); }
  // Ordenar por pts
  list.sort(function(a,b){return b.pts-a.pts;});
  var maxPts = list[0]?list[0].pts:1;
  var html='';
  list.forEach(function(r,i){
    var lv=getLvObj(r.pts);
    var posClass=i===0?'p1':i===1?'p2':i===2?'p3':'';
    var posEmoji=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    var pct=Math.round(r.pts/maxPts*100);
    var bgColor=r.av||'#5b7fff';
    var initial=r.name.charAt(0).toUpperCase();
    var avHtml=r.av?'<div class="r-av" style="background:'+bgColor+'">'+initial+'</div>':'<div class="r-av" style="background:linear-gradient(135deg,#2563eb,#7c3aed)">'+initial+'</div>';
    html+='<div class="rank-item'+(r.isMe?' me':'')+'" onclick="openPfModal(\''+r.id+'\')">'
      +'<div class="r-pos '+posClass+'">'+posEmoji+'</div>'
      +avHtml
      +'<div class="r-info">'
      +'<div class="r-name">'+r.name+(r.isMe?'<span class="r-you">VOCÊ</span>':'')+'</div>'
      +'<div class="r-lv">'+lv.i+' '+lv.n+' · '+r.city+'</div>'
      +'<div class="r-bar"><div class="r-bar-f" style="width:'+pct+'%"></div></div>'
      +'</div>'
      +'<div class="r-pts">'+r.pts.toLocaleString('pt-BR')+'</div>'
      +'</div>';
  });
  return html;
}

function getTabPlayers(tab){
  // Simular períodos diferentes (em produção viria do servidor)
  var all = FAKE_PLAYERS.slice();
  if(tab==='diario') return all.filter(function(_,i){return i<5;}).map(function(p,i){return Object.assign({},p,{pts:Math.max(3,Math.round(p.pts*0.01*(i+1)))});});
  if(tab==='semanal') return all.filter(function(_,i){return i<7;}).map(function(p){return Object.assign({},p,{pts:Math.round(p.pts*0.12)});});
  if(tab==='mensal') return all.map(function(p){return Object.assign({},p,{pts:Math.round(p.pts*0.35)});});
  return all; // geral
}

function renderRank(tab){
  var players=getTabPlayers(tab);
  var el=document.getElementById('list-'+tab);
  if(el) el.innerHTML=buildList(players,tab);
}

function switchRank(tab){
  _currentTab=tab;
  document.querySelectorAll('.rtab').forEach(function(t,i){
    var tabs=['geral','mensal','semanal','diario'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  document.querySelectorAll('.rtab-pane').forEach(function(p){
    p.classList.toggle('active',p.id==='rank-'+tab);
  });
  renderRank(tab);
}

// ═══════════════════════════════════════════════
// PERFIL MODAL
// ═══════════════════════════════════════════════
var _allPlayers=[];

function openPfModal(id){
  var u=gU(),p=gP(),sess=getSess();
  var player;
  if(id==='me'&&u){
    player={id:'me',name:u.name,city:u.city||'',pts:p.total,streak:sess.streak||0,phone:u.phone,showPhone:true,date:u.date||'2026',isMe:true};
  }else{
    player=FAKE_PLAYERS.find(function(r){return r.id===id;});
  }
  if(!player)return;
  // Preencher modal
  var lv=getLvObj(player.pts);
  var initial=player.name.charAt(0).toUpperCase();
  document.getElementById('pfAv').innerHTML=player.av?'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:'+player.av+';font-size:1.5rem;font-weight:800;color:#fff">'+initial+'</div>':initial;
  document.getElementById('pfName').textContent=player.name+(player.isMe?' (Você)':'');
  var lvBadge=document.getElementById('pfLvBadge');
  lvBadge.textContent=lv.i+' '+lv.n;lvBadge.className='pf-lv-badge '+lv.c;
  document.getElementById('pfMember').textContent='Membro desde '+player.date;
  document.getElementById('pfPts').textContent=player.pts.toLocaleString('pt-BR');
  document.getElementById('pfStreak').textContent=(player.streak||0)+'🔥';
  // Posição geral
  var allSorted=FAKE_PLAYERS.slice();if(u)allSorted.push({pts:p.total});allSorted.sort(function(a,b){return b.pts-a.pts;});
  var pos=allSorted.findIndex(function(r){return r.pts===player.pts;})+1;
  document.getElementById('pfPos').textContent='#'+pos;
  // Info rows
  var rows='';
  rows+='<div class="pf-info-row"><span class="pf-info-icon">📍</span>'+(player.city||'Cidade não informada')+'</div>';
  if(player.showPhone&&player.phone) rows+='<div class="pf-info-row"><span class="pf-info-icon">📱</span>'+player.phone+'</div>';
  if(player.isMe&&player.phone) rows+='<div class="pf-info-row"><span class="pf-info-icon">📱</span>'+player.phone+' <span style="font-size:.58rem;color:var(--grn);margin-left:4px">(visível para todos)</span></div>';
  if(!player.isMe&&(!player.showPhone||!player.phone)) rows+='<div class="pf-info-row" style="color:var(--txt3)"><span class="pf-info-icon">🔒</span>Telefone privado</div>';
  document.getElementById('pfInfoRows').innerHTML=rows;
  document.getElementById('pfModal').classList.add('show');
}

function closePfModal(){document.getElementById('pfModal').classList.remove('show');}
document.getElementById('pfModal').addEventListener('click',function(e){if(e.target===this)closePfModal();});

// ═══════════════════════════════════════════════
// MENU TOPBAR
// ═══════════════════════════════════════════════
function toggleMaMenu(){var d=document.getElementById('maMenuDd'),o=document.getElementById('maMenuOverlay');d.classList.toggle('open');o.classList.toggle('open');}
function closeMaMenu(){document.getElementById('maMenuDd').classList.remove('open');document.getElementById('maMenuOverlay').classList.remove('open');}
function maLogout(){localStorage.removeItem('ma_user');closeMaMenu();location.href='index.html';}

function updTopbar(){
  var u=gU(),p=gP(),lv=getLvObj(p.total);
  var pEl=document.getElementById('maPtsLive');
  if(u&&pEl){pEl.classList.add('show');document.getElementById('maPtsNum').textContent=p.total.toLocaleString('pt-BR');document.getElementById('maPtsLv').textContent=lv.n;}
  else if(pEl)pEl.classList.remove('show');
  var uSec=document.getElementById('maMenuUserSection'),aSec=document.getElementById('maMenuAuthSection');
  if(!uSec||!aSec)return;
  if(u){
    var pct=Math.round((p.total-lv.m)/(lv.max-lv.m)*100);pct=Math.max(0,Math.min(100,pct));
    var nextLv=LVS[LVS.indexOf(lv)+1];
    uSec.innerHTML='<div class="ma-menu-user"><span class="ma-menu-username">'+u.name.split(' ')[0]+'</span><span class="ma-menu-level '+lv.c+'">'+lv.i+' '+lv.n+'</span><div class="ma-menu-pts-row"><b>'+p.total.toLocaleString('pt-BR')+'</b> pontos'+(nextLv?' · faltam '+(nextLv.m-p.total).toLocaleString('pt-BR')+' p/ '+nextLv.n:'')+'</div></div>'
      +'<div class="ma-menu-xp"><div class="ma-xp-label"><span>'+lv.n+'</span>'+(nextLv?'<span>'+nextLv.n+'</span>':'<span>Máximo!</span>')+'</div><div class="ma-xp-bg"><div class="ma-xp-fill" style="width:'+pct+'%"></div></div></div>';
    aSec.innerHTML='<button class="ma-mi danger" onclick="maLogout()"><span class="ma-mi-icon">🚪</span>Sair da conta</button>';
  }else{
    uSec.innerHTML='<div class="ma-menu-user"><span class="ma-menu-username" style="color:var(--txt2)">Visitante</span></div>';
    aSec.innerHTML='<a class="ma-mi" href="index.html" onclick="localStorage.setItem(\'ma_open_modal\',\'login\');return true"><span class="ma-mi-icon">🔑</span>Entrar</a>'
      +'<a class="ma-mi plan" href="index.html" onclick="localStorage.setItem(\'ma_open_modal\',\'plans\');return true"><span class="ma-mi-icon">💎</span>Ver Planos</a>';
  }
}

// ═══════════════════════════════════════════════

document.addEventListener('DOMContentLoaded',function(){
  updTopbar();
  renderRank('geral');
  renderRank('mensal');
  renderRank('semanal');
  renderRank('diario');
});
</script>

<script>
/* ══ MA TOPBAR JS ══ */
function playCashSound(){try{var c=new(window.AudioContext||window.webkitAudioContext)();function t(f,s,d,v,tp){var o=c.createOscillator(),g=c.createGain();o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime+s);g.gain.linearRampToValueAtTime(v,c.currentTime+s+.01);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+s+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime+s);o.stop(c.currentTime+s+d);}t(1200,0,.04,.3,'square');t(880,.05,.08,.25);t(1100,.1,.1,.3);t(1320,.17,.12,.35);t(1760,.26,.18,.4);t(660,.3,.06,.15,'triangle');t(780,.34,.06,.12,'triangle');t(550,.38,.06,.1,'triangle');}catch(e){}}
function toggleMaMenu(){var d=document.getElementById('maMenuDd'),o=document.getElementById('maMenuOverlay');d.classList.toggle('open');o.classList.toggle('open');}
function closeMaMenu(){document.getElementById('maMenuDd').classList.remove('open');document.getElementById('maMenuOverlay').classList.remove('open');}
function maLogout(){localStorage.removeItem('ma_user');closeMaMenu();location.href='index.html';}
(function(){
  var LVS=[{n:'Iniciante',c:'ma-lvc0',m:0,max:1000},{n:'Aprendiz',c:'ma-lvc1',m:1000,max:3000},{n:'Profissional',c:'ma-lvc2',m:3000,max:7000},{n:'Especialista',c:'ma-lvc3',m:7000,max:15000},{n:'Elite',c:'ma-lvc4',m:15000,max:99999}];
  function gLv(t){for(var i=LVS.length-1;i>=0;i--)if(t>=LVS[i].m)return LVS[i];return LVS[0];}
  function gP(){try{return JSON.parse(localStorage.getItem('ma_points'))||{total:0,history:[]};}catch(e){return{total:0,history:[]};}}
  function gU(){try{return JSON.parse(localStorage.getItem('ma_user'));}catch(e){return null;}}
  window.updTopbar=function(){
    var u=gU(),p=gP(),lv=gLv(p.total);
    var pEl=document.getElementById('maPtsLive'),pN=document.getElementById('maPtsNum'),pL=document.getElementById('maPtsSubLv');
    var badge=document.getElementById('maFpts'),bN=document.getElementById('maFptsNum'),bL=document.getElementById('maFptsLv');
    if(u){if(pEl){pEl.classList.add('show');if(pN)pN.textContent=p.total.toLocaleString('pt-BR');if(pL)pL.textContent=lv.n;}if(badge){badge.style.display='flex';if(bN)bN.textContent=p.total.toLocaleString('pt-BR');if(bL)bL.textContent=lv.n;}}
    else{if(pEl)pEl.classList.remove('show');if(badge)badge.style.display='none';}
    var uS=document.getElementById('maMenuUserSec'),aS=document.getElementById('maMenuAuthSec');
    if(!uS||!aS)return;
    if(u){
      var next=LVS[LVS.indexOf(lv)+1];
      var pct=next?Math.max(0,Math.min(100,Math.round((p.total-lv.m)/(lv.max-lv.m)*100))):100;
      uS.innerHTML='<div class="ma-menu-user"><span class="ma-mu-name">'+u.name.split(' ')[0]+'</span>'
        +'<span class="ma-mu-level '+lv.c+'"><span class="ma-lv-dot"></span>'+lv.n+'</span>'
        +'<div class="ma-mu-pts"><b>'+p.total.toLocaleString('pt-BR')+'</b> pontos'+(next?'<span class="ma-mu-next">· faltam '+(next.m-p.total).toLocaleString('pt-BR')+' p/ '+next.n+'</span>':'')+'</div></div>'
        +'<div class="ma-mu-xp"><div class="ma-xp-labels"><span>'+lv.n+'</span>'+(next?'<span>'+next.n+'</span>':'<span>Máximo!</span>')+'</div><div class="ma-xp-bg"><div class="ma-xp-fill" style="width:'+pct+'%"></div></div></div>';
      aS.innerHTML='<button class="ma-mi red" onclick="maLogout()"><span class="ma-mi-icon">🚪</span>Sair da conta</button>';
    }else{
      uS.innerHTML='<div class="ma-menu-user"><span class="ma-mu-name" style="color:#8888a8">Visitante</span><span style="font-size:.6rem;color:#44445a;display:block;margin-bottom:10px">Faça login para pontuar</span></div>';
      aS.innerHTML='<a class="ma-mi" href="index.html" onclick="localStorage.setItem(\'ma_open_modal\',\'login\');return true"><span class="ma-mi-icon">🔑</span>Entrar</a>'
        +'<a class="ma-mi" href="index.html" onclick="localStorage.setItem(\'ma_open_modal\',\'register\');return true"><span class="ma-mi-icon">📝</span>Criar Conta</a>'
        +'<a class="ma-mi gold" href="index.html" onclick="localStorage.setItem(\'ma_open_modal\',\'plans\');return true"><span class="ma-mi-icon">💎</span>Ver Planos</a>';
    }
  };
  window.MA_addPoints=window.MA_addPoints||function(src,pts){
    if(!gU())return 0;var p=gP();p.total+=pts;p.history.unshift({source:src,pts:pts,question:'',date:new Date().toLocaleDateString('pt-BR')});
    localStorage.setItem('ma_points',JSON.stringify(p));_bumpPts();return pts;
  };
  function _bumpPts(){playCashSound();var el=document.getElementById('maPtsLive');if(el){el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');}var b=document.getElementById('maFpts');if(b){b.classList.remove('bump');void b.offsetWidth;b.classList.add('bump');}window.updTopbar();}
  var _lp=null;setInterval(function(){var p=gP();if(_lp!==null&&p.total>_lp)_bumpPts();_lp=p.total;},1500);
  (function(){var r=new URLSearchParams(window.location.search).get('ref');if(r){var mc=localStorage.getItem('ma_ref_code');if(!mc||mc!==r.toUpperCase())localStorage.setItem('indicadoPor',r.toUpperCase());}})();
  (function(){if(!gU())return;var today=new Date().toLocaleDateString('pt-BR');var ms;try{ms=JSON.parse(localStorage.getItem('ma_missions'))||{};}catch(e){ms={};}if(!ms.done||ms.date!==today)ms={date:today,done:{}};if(!ms.done.aula){ms.done.aula=true;localStorage.setItem('ma_missions',JSON.stringify(ms));window.MA_addPoints('Missão: Acessou a plataforma',10);}})();
  var _ss=Date.now();function _saveSess(){var dur=Math.floor((Date.now()-_ss)/60000);var s;try{s=JSON.parse(localStorage.getItem('ma_sessions'))||{};}catch(e){s={};}s.count=(s.count||0)+1;s.lastDuration=dur;var today=new Date().toLocaleDateString('pt-BR'),yest=new Date(Date.now()-86400000).toLocaleDateString('pt-BR');if(s.lastStudyDate===yest)s.streak=(s.streak||0)+1;else if(s.lastStudyDate!==today)s.streak=1;s.lastStudyDate=today;localStorage.setItem('ma_sessions',JSON.stringify(s));}
  window.addEventListener('beforeunload',_saveSess);window.addEventListener('pagehide',_saveSess);
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',window.updTopbar);else window.updTopbar();
})();
</script>
