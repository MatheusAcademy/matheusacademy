        content: `<h3>Evolução e Dificuldades do MERCOSUL em 2025</h3>
<p>O Mercado Comum do Sul (MERCOSUL), fundado em 1991 como bloco de integração comercial, enfrentou turbulências significativas em 2025-2026. Originalmente composto por Argentina, Brasil, Paraguai e Uruguai (com Bolívia e Chile como membros associados), o bloco buscava criar zona de livre comércio e promover integração econômica sul-americana.</p>

        title: 'Transição Energética e Demanda por Minerais Críticos',
        content: `<h3>Transição Energética Global como Motor de Disputa Geopolítica</h3>
<p>A transição energética global — mudança de economia baseada em combustíveis fósseis para energias renováveis e eletromobilidade — criou demanda sem precedentes por minerais críticos. Esse shift não é meramente econômico ou ambiental; é fundamentalmente geopolítico, pois reconfigura fontes de poder e dependência internacionais.</p>
<p>Historicamente, controle sobre petróleo definiu poder geopolítico. Potências que controlavam reservas de óleo (Arábia Saudita, Irã, Rússia, Venezuela) exerceram influência desproporcional. Transição energética desloca esse poder: países que controlam lítio, cobre, terras raras e cobalto ganham importância estratégica renovada. A América do Sul, particularmente, transita de "supridor de combustíveis fósseis" para "supridor de minerais críticos para economia verde".</p>
<p>A demanda por lítio deve quintuplicar até 2035 conforme indústria automotiva eletrifica globalmente. Demanda por cobre deve dobrar; por cobalto, triplicar. Esses números criam pressão imensa sobre países produtores para expandir extração rapidamente, frequentemente com consequências ambientais e sociais severas.</p>
<p>O Brasil apresenta caso único: é simultaneamente produtor potencial de minerais críticos (lítio, terras raras) e guardião de floresta tropical mais importante do planeta para regulação climática. Essa sobreposição cria dilema geopolítico agudo: desenvolvimento de recursos minerais estratégicos frequentemente requer infraestrutura (ferrovias, hidrelétricas, portos) que atravessa ou afeta biodiversidade amazônica.</p>

        content: `<h3>COP 30: Brasil no Centro da Política Climática Global</h3>
<p>O Brasil sediará a COP 30 (Conferência das Partes da Convenção sobre Mudança Climática) em Belém, Pará, em novembro de 2025 — exatamente uma década após o Acordo de Paris de 2015. Timing é simbólico: permite ao Brasil apresentar balanço de progresso (ou falta dele) em metas climáticas globais, particularmente relacionadas à proteção de florestas.</p>
<p>Lula posicionou Brasil como protagonista na agenda climática global, especialmente após eleição de Donald Trump nos EUA em 2024, que sinaliza retorno a política climática menos ambiciosa. O Brasil vê oportunidade de preencher vácuo deixado por Washington e consolidar liderança no Sul Global em temas ambientais.</p>

        title: 'Narcotráfico como Fator Geopolítico Estrutural',
        content: `<h3>Narcotráfico como Destabilizador Regional e Instrumento Geopolítico</h3>
<p>O narcotráfico na América do Sul transcendeu seu status inicial de problema de segurança para tornarse fator geopolítico estrutural. Produção de cocaína (concentrada em Colômbia, Peru, Bolívia) movimenta bilhões de dólares anuais, rivalizando em escala com economias nacionais formais de países pequenos. Redes de distribuição atravessam fronteiras, corruptelas autoridades, financiam milícias armadas e desestabilizam instituições estatais.</p>
<p>A Venezuela sob Maduro tornou-se epicentro dessa dinâmica: colapso do Estado permitiu que cartéis de narcotraficantes operassem livremente, frequentemente em aliança com elementos das Forças Armadas. Trump designou Los Soles como organização terrorista internacional em 2025, legitimando operações militares diretas contra estruturas narcotraficantes. Esse reclassificação jurídica transforma problema de segurança interna em questão de "guerra ao terror" global — justificadora de presença militar americana crescente.</p>

<p>Além da produção e tráfico de drogas, América do Sul enfrenta fenômeno de gangs urbanos que controlam territórios (favelas, bairros periféricos) através de violência. El Salvador sob presidente Nayib Bukele implementou estratégia de "guerra total" contra gangs (especialmente MS-13 e Barrio 18), resultando em prisão de dezenas de milhares e redução de homicídios — contudo com custos severos em direitos humanos.</p>
