var COURSE = { id:'mncp', title:'Mentalidade Campeã: Psicologia dos Atletas de Elite', subtitle:'Descubra como os melhores atletas do mundo treinam a mente para vencer', free: false, freeModules: 1 };
var MODS = [
  { id: 0, name: 'Fundamentos da Psicologia Esportiva', free: true, topics: [
    { id: 0, name: 'O Cérebro do Campeão', content: `<h2>O Cérebro do Campeão</h2><p>Você já percebeu que alguns atletas perdem sob pressão enquanto outros prosperam? A diferença está no cérebro. Literalmente. Campeões têm cérebros treinados de forma diferente.</p><h4>Neuroplasticidade: Você Pode Reprogramar Seu Cérebro</h4><p>Seu cérebro não é fixo. Cada repetição, cada pensamento, cada treino reescreve suas conexões neurais. Os atletas de elite sabem isso e usam para sua vantagem.</p><blockquote class="tip"><strong>Fato Científico:</strong> Atletas de topo usam 90% menos energia cerebral durante competições porque treinaram tanto que as ações ficaram automáticas. Você faz o mesmo em suas atividades?</blockquote><p>Quando você repete uma ação 10.000 vezes, seu cérebro a move da consciência para o automático. Isso libera energia mental para outras coisas — estratégia, leitura do oponente, adaptação.</p><h4>Stress vs. Alerta: A Reinterpretação</h4><p>Antes de uma competição, você sente bater coração acelerado, palmas suadas, mente acelerada. Você chama isso de "nervosismo" ou "medo". Campeões chamam de "alerta" ou "energia".</p><blockquote class="example"><strong>Experimento Científico:</strong> Dois grupos antes de prova: grupo A diz "estou nervoso", grupo B diz "estou energizado". Grupo B teve 20% mais acurácia. É só uma mudança de narrativa.</blockquote><p>O corpo produz as mesmas moléculas, mas a interpretação muda tudo. Você controla a narrativa.</p><h4>A Tríade Mental: Física, Técnica, Psicológica</h4><p>Você treina física. Você treina técnica. Mas treina psicologicamente?</p><blockquote class="news"><strong>Realidade Elite:</strong> Atletas de topo dedicam 30-50% do tempo de treinamento para trabalho psicológico. A maioria dedica 0%.</blockquote><p>Sua mente é o músculo mais importante. Treinaremos isso a fundo.</p>` },
    { id: 1, name: 'A Importância do Mindset Vencedor', content: `<h2>A Importância do Mindset Vencedor</h2><p>Carol Dweck, pesquisadora em psicologia, dividiu pessoas em dois mindsets: fixo e de crescimento. Adivinhe qual um campeão tem?</p><h4>Mindset Fixo vs. Crescimento</h4><p><strong>Fixo:</strong> "Eu sou bom nisso, ou não sou. É geneticamente definido." Você evita desafios, desiste fácil, ignora feedback.</p><p><strong>Crescimento:</strong> "Sou ruim agora, mas posso melhorar com treino." Você busca desafios, persiste,  busca feedback constantemente.</p><blockquote class="tip"><strong>A Verdade:</strong> Talento é real, mas mentalidade determina se você o usa. Você pode ter talento e falhar, ou ter menos talento e vencer se sua mentalidade for de crescimento.</blockquote><p>Campeões têm mindset de crescimento. Eles tratam fracasso como informação, não como identidade.</p><h4>Neurobiologia do Mindset</h4><p>Quando você acredita que pode melhorar, seu cérebro produz mais dopamina. Dopamina é o combustível da motivação. Quando você acredita que é fixo, seu cérebro entra em modo defensivo.</p><blockquote class="example"><strong>Prática Simples:</strong> Quando falhar, diga: "Ainda não consigo fazer isso, MAS posso aprender." O "ainda não" é poderoso. Muda tudo.</blockquote><h4>Autoconfiança Vs. Arrogância</h4><p>Tem uma diferença. Autoconfiança é: "Posso fazer isso porque treinei duro." Arrogância é: "Sou melhor porque sou especial."</p><blockquote class="news"><strong>Insight:</strong> Humildade + confiança = campeão. Humildade sem confiança = perdedor. Confiança sem humildade = fracasso iminente.</blockquote>` },
    { id: 2, name: 'Os 3 Pilares da Mentalidade Elite', content: `<h2>Os 3 Pilares da Mentalidade Elite</h2><p>Pesquisa com 500+ atletas olímpicos revelou 3 traços que TODOS compartilham. Se você quer mentalidade de campeão, você precisa desses 3.</p><h4>Pilar 1: Resiliência Psicológica</h4><p>Resiliência não é "não sofrer". É sofrer E continuar. Você cai, você levanta. Você perde 10 vezes, você volta na 11ª.</p><blockquote class="tip"><strong>Teste de Resiliência:</strong> Quando foi a última vez que você falhou e voltou no dia seguinte? Não "desistiu mas depois tentou de novo". Voltou IMEDIATAMENTE.</blockquote><p>Campeões desenvolvem resiliência expondo-se deliberadamente a situações difíceis. Eles não evitam dor — a buscam controladamente para se fortalecer.</p><h4>Pilar 2: Controle Atencional</h4><p>Em uma partida, há 1.000 coisas pedindo sua atenção. Vai chover, o árbitro vai fazer decisão ruim, a multidão vai gritar. Você pode focar no que importa.</p><blockquote class="example"><strong>Técnica Olímpica:</strong> Atletas treinam "gatilhos" — uma palavra ou imagem que redireciona atenção. "Foco. Agora. Presente." Quando mente dispersa, eles usam o gatilho.</blockquote><p>Controle atencional é treinável. Tipo um músculo. Quanto mais você treina (meditação, exercício presente), mais forte fica.</p><h4>Pilar 3: Autorregulação Emocional</h4><p>Campeões não sentem menos emoção. Sentem MAIS porque estão no limite. Mas conseguem regular. Raiva, medo, ansiedade — tudo surge, mas eles escolhem a resposta.</p><blockquote class="news"><strong>Fato:</strong> Atletas que conseguem transformar ansiedade em entusiasmo ganham 40% mais competições (estudo com tenistas profissionais).</blockquote><p>Você aprenderá técnicas para transformar emoções em combustível, não em obstáculo.</p>` },
    { id: 3, name: 'Autoconhecimento: Seu Perfil Psicológico', content: `<h2>Autoconhecimento: Seu Perfil Psicológico</h2><p>Antes de melhorar, você precisa saber em qual pilar está mais fraco. Você é resiliente mas perde foco? Você tem controle atencional mas é emocionalmente explosivo?</p><h4>As 4 Dimensões</h4><p><strong>Resiliência:</strong> Como você responde a fracasso? Escala: "desisto" até "levanto no mesmo dia".</p><p><strong>Controle Atencional:</strong> Você consegue se focar quando distrações surgem? Escala: "sou muito distraído" até "mantenho foco absoluto".</p><p><strong>Autorregulação Emocional:</strong> Você controla suas emoções ou elas o controlam? Escala: "explodo fácil" até "calmo em qualquer situação".</p><p><strong>Confiança:</strong> Você crê que pode vencer? Escala: "duvido de mim" até "tenho confiança total".</p><blockquote class="tip"><strong>Autoavaliação Honesta:</strong> Não avalie como você quer ser. Avalie como você REALMENTE é. Sem ego. Esse é o ponto de partida.</blockquote><h4>Seu Plano Personalizado</h4><p>Se você é resiliente mas baixo em controle atencional, você treina meditação e foco. Se é emocionalmente controlado mas baixo em confiança, você treina autoafirmação.</p><blockquote class="example"><strong>Cada Atleta É Diferente:</strong> Um gênio de futebol pode ser horrível em resiliência (desiste fácil). Outro é campeão de resiliência mas tem explosões emocionais. Você descobre seu perfil, depois treina especificamente.</blockquote><p>Neste curso, você vai identificar suas fraquezas e construir seu plano.</p>` }
  ], flashcards: [
    { q: 'O que é neuroplasticidade?', a: 'A capacidade do cérebro de ser reprogramado através de repetição e treino.' },
    { q: 'Qual é a diferença entre nervosismo e alerta?', a: 'É a mesma resposta fisiológica, mas a interpretação mental muda — "estou energizado" vs "estou assustado".' },
    { q: 'Qual é a diferença entre mindset fixo e de crescimento?', a: 'Fixo: "sou bom ou não sou". Crescimento: "ainda não sou, mas posso aprender".' },

    { q: 'Qual é o Pilar 2?', a: 'Controle atencional — manter foco no que importa apesar de distrações.' },
    { q: 'Qual é o Pilar 3?', a: 'Autorregulação emocional — controlar suas emoções em vez de ser controlado por elas.' },
    { q: 'Como você define um "gatilho" psicológico em esportes?', a: 'Uma palavra ou imagem que redireciona a atenção quando a mente fica dispersa.' },

    { q: 'Quanto tempo atletas de topo dedicam para trabalho psicológico?', a: '30-50% do tempo total de treinamento.' },
    { q: 'Qual é o primeiro passo para desenvolver mentalidade de campeão?', a: 'Autoconhecimento honesto — saber em qual pilar você está mais fraco.' }
  ], quizzes: [

  ], summary: { name: 'Resumo do Módulo 0', points: ['Neuroplasticidade: seu cérebro pode ser reprogramado com treino repetido','Mindset de crescimento: fracasso é informação, não identidade','3 Pilares: Resiliência, Controle Atencional, Autorregulação Emocional','Autoconfiança = crença baseada em treino; Arrogância = ego sem fundamento'] },
    quizFinal: [
      {q:'O que é mindset de crescimento?',opts:["Acreditar que habilidades são fixas e imutáveis", "Crença de que se pode desenvolver através de esforço", "Pensar apenas em ganhar dinheiro", "Evitar todos os desafios possíveis"],correct:1},

  },
  { id: 1, name: 'Psicologia do Esporte e Mentalidade', free: false, topics: [
    { id: 0, name: 'Stress e Performance: A Curva de Yerkes-Dodson', content: `<h2>Stress e Performance: A Curva de Yerkes-Dodson</h2><p>Existe um nível ótimo de stress. Muito pouco, você fica desatento. Muito, você quebra. Campeões sabem esse ponto doce.</p><h4>A Curva</h4><p>Eixo X: Nível de Stress. Eixo Y: Performance. A curva é um U invertido — sobe até um pico, depois desce.</p><blockquote class="tip"><strong>Seu Pico Pessoal:</strong> Você precisa descobrir qual nível de stress O ELEVA para performance máxima. Para alguns é 30% (calmo), para outros é 80% (quase explosão).</blockquote><p>Campeões conseguem se "ligar" e "desligar" — entrar no pico quando necessário, relaxar quando não.</p><h4>Como Encontrar Seu Pico</h4><p>Teste. Em treinos de baixo stress, você rende 60%. Em treinos com pressão simulada (público, timer, consequência), você rende 90%. Seu pico é ali.</p><blockquote class="example"><strong>Técnica:</strong> Treine sob pressão deliberadamente. Faça um treino final onde QUALQUER erro significa perda de pontos. Isso calibra seu sistema nervoso.</blockquote><h4>Periodização do Stress</h4><p>Você alterna entre fases altas e baixas de stress para evitar queimação. Semana 1-2: intenso. Semana 3: recuperação leve. Seu sistema se adapta.</p><blockquote class="news"><strong>Fato 2026:</strong> Atletas que manipulam stress deliberadamente têm 50% menos queimação e 30% mais longevidade de carreira.</strongquote>` },
    { id: 1, name: 'Visualização Mentalmentos: Neuroimagem Real', content: `<h2>Visualização Mental: Neuroimagem Real</h2><p>Você conhece Tiger Woods? Ele senta, fecha os olhos, visualiza o shot perfeito antes de dar. 10.000 shots mentais antes de 1 shot real.</p><h4>O Cérebro Não Diferencia Real de Vívido</h4><p>Quando você visualiza em detalhe (vê, sente, ouve, até sente cheiro), seu cérebro ativa os mesmos circuitos que ativaria se estivesse vivendo de verdade.</p><blockquote class="tip"><strong>Estudo Científico:</strong> Grupo A jogou basquete por 1 hora/dia por 30 dias. Grupo B não jogou, mas visualizou por 1 hora/dia. Na prova final, Grupo B perdeu só 2% vs Grupo A. Visualização = quase tão efetivo quanto treino real.</blockquote><p>Por que? Porque cada visualização reforça os mesmos caminhos neurais que o treino reforçaria.</p><h4>Técnica de Visualização em 5 Passos</h4><p>1. Relaxe completamente (respiração lenta, corpo solto)</p><p>2. Visualize em 1ª pessoa (você está lá, vendo com seus olhos)</p><p>3. Inclua TODOS os sentidos (som da multidão, cheiro da grama, sensação do equipamento)</p><p>4. Sinta a emoção da vitória (alegria, confiança, alívio)</p><p>5. Finalize com sucesso (você fez, e foi perfeito)</p><blockquote class="example"><strong>Exemplo Detalhado:</strong> Você está competindo. Vê a raia à sua frente (azul escuro). Sente o vento na face. Ouve o pistola. Seu corpo se move em perfeita sincronização. Você cruza a linha. Você venceu. Sente a alegria do corpo inteiro.</blockquote><h4>Frequência</h4><p>10 minutos de visualização intensa por dia é o mínimo. 30 minutos é ótimo. Campeões fazem 30-60 minutos ALÉM do treino físico.</p><blockquote class="news"><strong>Atletas Topo:</strong> Dedicam 2-3 horas por semana em visualização pura.</strongquote>` },
    { id: 2, name: 'Focus e Concentração Sob Pressão', content: `<h2>Focus e Concentração Sob Pressão</h2><p>A mente humana é como um holofote. Você aponta para onde quer. Quando pressão chega, a maioria aponta para o medo ("e se eu falhar?"). Campeões apontam para o objetivo.</p><h4>Tipos de Foco</h4><p><strong>Foco Externo:</strong> Você se concentra no resultado final — a linha de chegada, o alvo, a bola.</p><p><strong>Foco Interno:</strong> Você se concentra em suas sensações corporais — respiração, músculo, postura.</p><blockquote class="tip"><strong>Descoberta Importante:</strong> Para tarefas de força/velocidade, foco externo é MELHOR. Para tarefas de precisão, foco interno é melhor. Você ajusta baseado na tarefa.</blockquote><p>Exemplo: Corrida (foco externo — a linha). Arco e flecha (foco interno — sua respiração e alinhamento).</p><h4>Técnica do "Gatilho de Foco"</h4><p>Você designa uma palavra ou ação que redireciona atenção instantaneamente. Quando mente quer se dispersar, você ativa o gatilho.</p><blockquote class="example"><strong>Exemplos Reais:</strong> Michael Jordan batia a bola 3x antes de lançar. Serena Williams dizia "Come on!" alto. Esses gatilhos trazem atenção de volta.</blockquote><h4>Meditação para Foco Atlético</h4><p>Prática: Sente, observe sua respiração por 10 minutos SEM julgar. Mente vai vagar (normal). Quando notar que vagou, traga de volta SEM raiva. Isso treina a capacidade de redirecionar.</p><blockquote class="news"><strong>Resultado:</strong> 8 semanas de meditação = foco 30% melhor sob pressão.</strongquote>` },
    { id: 3, name: 'Pressão e Performance: Treinando Sob Adversidade', content: `<h2>Pressão e Performance: Treinando Sob Adversidade</h2><p>Você não pode "evitar" pressão. Você só treina para ela. Campeões deliberadamente criam situações de alta pressão durante o treino.</p><h4>Treino Simulado de Pressão</h4><p>Em um treino normal, você pratica o movimento. Em um treino de pressão, você pratica o movimento COM CONSEQUÊNCIAS.</p><blockquote class="tip"><strong>Exemplos de Treino Pressão:</strong> "Se errar esse, você repete tudo". "Seu tempo limite é 2 minutos". "Há público observando e julgando". "Seu rival está aqui vendo você treinar".</blockquote><p>Quando você treina sob pressão regularmente, a pressão real não é novidade. Você já viveu situações piores no treino.</p><h4>Progressão de Dificuldade</h4><p>Não começa em alto stress. Você escalona. Semana 1-2: treino normal. Semana 3: adiciona timer. Semana 4: adiciona público. Semana 5: simula competição real.</p><blockquote class="example"><strong>Caso Real:</strong> Tenista profissional treina tiebreaks (mais pressão) 5 dias/semana. Quando chega na competição real, tiebreak não é novidade.</blockquote><h4>Reframing da Pressão</h4><p>Antes: "Estou nervoso porque é importante." Depois: "Estou nervoso porque meu corpo está pronto. Essa energia vai me elevar."</p><blockquote class="news"><strong>Dado:</strong> Atletas que reframeiam pressão como "oportunidade" em vez de "ameaça" têm 25% mais sucesso em competições.</strongquote><p>A pressão não desaparece. Você aprende a conviver com ela e usar.</p>` }
  ], flashcards: [
    { q: 'O que é a Curva de Yerkes-Dodson?', a: 'Mostra que performance máxima ocorre em um nível ótimo de stress — muito pouco ou muito é ruim.' },
    { q: 'Como você encontra seu pico pessoal de stress?', a: 'Testando em diferentes condições de pressão e vendo em qual você rende melhor.' },
    { q: 'Como o cérebro responde à visualização detalhada?', a: 'Ativa os mesmos circuitos neurais que ativaria se estivesse vivendo de verdade.' },
    { q: 'Qual é a efetividade da visualização comparada ao treino real?', a: 'Grupo que visualizou 1 hora/dia perdeu só 2% vs grupo que treinou 1 hora/dia em 30 dias.' },

    { q: 'Qual é o efeito de reframing da pressão de "ameaça" para "oportunidade"?', a: '25% mais sucesso em competições reais.' }

  ], summary: { name: 'Resumo do Módulo 1', points: ['Curva de Yerkes-Dodson: existe nível ótimo de stress onde performance é máxima','Visualização ativa mesmos circuitos neurais que treino real — quase 100% efetivo','Foco externo para velocidade/força, foco interno para precisão','Treine sob pressão deliberadamente para dessensibilizar-se na competição real'] },

      {q:'O que é mindset de crescimento?',opts:["Acreditar que habilidades são fixas e imutáveis", "Crença de que se pode desenvolver através de esforço", "Pensar apenas em ganhar dinheiro", "Evitar todos os desafios possíveis"],correct:1},
