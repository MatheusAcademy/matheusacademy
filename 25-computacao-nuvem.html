var MODS = [
  {id:'cn_mod1',name:'Fundamentos de Cloud Computing',free:true,topics:[1,2,3],summary:{title:'Resumo do Módulo 1: Fundamentos de Cloud Computing',points:['Cloud é computação sob demanda: pague apenas o que usa','IaaS, PaaS, SaaS são modelos diferentes de responsabilidade','Escalabilidade automática ajusta recursos conforme demanda','Distribuição global reduz latência e aumenta resiliência']},quizFinal:[{q:'O que significa "pagar conforme uso" em cloud?',opts:['Comprar licenças caras','Pagar apenas pelos recursos consumidos por hora/GB','Assinatura fixa mensal sempre','Não se paga nada'],correct:1},{q:'Qual é a diferença entre IaaS, PaaS e SaaS?',opts:['Não há diferença','IaaS = infraestrutura, PaaS = plataforma, SaaS = software pronto','SaaS é mais antigo','Nenhum é importante'],correct:1},{q:'O que permite escalabilidade automática em cloud?',opts:['Servidores inteligentes','Load balancers e orquestração de containers','Internet rápida','Nada, é só marketing'],correct:1}]},
  {id:'cn_mod2',name:'Serviços e Provedores de Cloud',free:false,topics:[4,5,6],summary:{title:'Resumo do Módulo 2: Serviços e Provedores de Cloud',points:['AWS, Google Cloud, Azure dominam 80% do mercado','Bancos de dados na nuvem oferecem escalabilidade e confiabilidade','CDN e edge computing reduzem latência para usuários globais','Containerização com Docker revolucionou deployment de aplicações']},quizFinal:[{q:'Qual provedor tem maior market share em 2025-2026?',opts:['Google Cloud','AWS','Azure','Alibaba'],correct:1},{q:'O que é um container Docker?',opts:['Caixa para enviar código','Ambiente isolado com aplicação e dependências','Servidor virtual na nuvem','Nenhum desses'],correct:1},{q:'Por que CDN reduz latência?',opts:['Usa internet mais rápida','Copia conteúdo perto do usuário geograficamente','Comprime dados','Nenhuma razão real'],correct:1}]},
  {id:'cn_mod3',name:'Arquitetura, Segurança e Otimização',free:false,topics:[7,8,9],summary:{title:'Resumo do Módulo 3: Arquitetura, Segurança e Otimização',points:['Microserviços substituem monolitos para melhor escalabilidade','Serverless elimina preocupação com servidores','Backup e disaster recovery garantem continuidade','Otimização de custos é prioridade contínua em operações']},quizFinal:[{q:'O que são Microserviços?',opts:['Serviços muito pequenos e lentos','Pequenas aplicações independentes que se comunicam','Antigo padrão de arquitetura','Não existem em cloud'],correct:1},{q:'O que é Serverless Computing?',opts:['Sem internet','Execute código sem gerenciar servidores','Não tem servidores de verdade','Apenas para pequenos projetos'],correct:1},{q:'Qual é o maior benefício de usar cloud para disaster recovery?',opts:['Garante que desastre não aconteça','Replicação automática e restore rápido em outro local','Não há benefício','É mais caro']},correct:1}]}

var TOPICS = [
  {id:1,name:'O que é Cloud Computing',dur:'16 min',content:`<h3>Bem-vindo ao Futuro: Computação em Nuvem</h3><p>Olá! Estou extraordinariamente entusiasmado em começar este módulo que mudou o mundo inteiro: Computação em Nuvem! Se você ainda acha que tecnologia acontece em servidores embaixo da sua mesa, prepare-se para descobrir como 90% da internet moderna funciona.</p><p>Cloud Computing é o acesso sob demanda a recursos de computação — servidores, armazenamento, bancos de dados, software — entregues via internet. Você não compra, você aluga. Não gerencia, você paga e usa. É revolução!</p><p>Pense no Netflix. Você acha que Netflix tem servidores gigantescos em cada cidade? Não! Usa AWS (Amazon Web Services). Quando 200 milhões de pessoas estão assistindo simultaneamente, Netflix contrata mais computação da AWS. Quando pessoas dormem, reduz. Paga apenas pelo que usa. Economia: bilhões!</p><p>Antes de cloud (pré-2010), empresas compravam servidores caros. Dedicavam uma sala (data center). Contratavam pessoas para manutenção 24/7. Se demanda crescia, compravam mais servidores (meses de espera). Se demanda caía, servidores ficavam ociosos (dinheiro jogado fora). Era ineficiente!</p><p>Cloud mudou tudo com "elasticidade" — capacidade de crescer e diminuir automaticamente. Sua aplicação web recebe 1000 requisições por segundo? Cloud adiciona 10 servidores em 1 minuto. Demanda cai? Remove servidores. Você paga apenas pelos recursos usados, por hora ou até por segundo!</p><p>Modelos de cloud são três principais: IaaS (Infrastructure as a Service) — você aluga máquinas virtuais, storage, networking. Você gerencia SO, aplicações. Exemplo: EC2 da AWS. PaaS (Platform as a Service) — provedor fornece plataforma completa. Você apenas faz deploy de código. Exemplo: Heroku, Google App Engine. SaaS (Software as a Service) — software pronto na nuvem. Exemplo: Google Workspace, Microsoft 365, Salesforce.</p><p>IaaS é como alugar apartamento vazio — você traz tudo que precisa. PaaS é como alugar apartamento mobiliado — já tem o essencial, você apenas coloca suas coisas. SaaS é como hotel — tudo pronto, você usa!</p><p>Modelos de implementação: Nuvem Pública (AWS, Google Cloud, Azure — recursos compartilhados com outras empresas, mais barato), Nuvem Privada (servidores seu, apenas seu, mais caro mas seguro), Nuvem Híbrida (combina públicas e privadas).</p><p>Benefícios de cloud são imensos: Custo inicial zero (capital expenditure vira operational expenditure), escalabilidade automática, confiabilidade (múltiplas cópias em diferentes locais), performance (provedores têm infraestrutura otimizada), inovação (acesso a tecnologias de ponta sem investimento próprio), segurança (especialistas dedicados).</p><p>Em 2025-2026, a nuvem não é mais opcional — é mandatório. 90% de empresas usam pelo menos uma solução cloud. Startups nascem 100% na nuvem. O futuro de tecnologia é nuvem!</p><p>Provedores dominantes são: AWS (33% market share global, mais antigo e completo), Microsoft Azure (23%, integração com Windows/Office 360), Google Cloud (10%, força em dados e ML), e outros (Alibaba, Oracle Cloud, etc.).</p><p>Nota importante: AWS, Azure e Google Cloud cobram taxas bem pensadas. Você salva em infraestrutura, mas atenção: se não otimizar, conta pode explodir! Uma tabela com muitas operações no banco de dados pode custar milhares por mês. Por isso, engenheiros de cloud precisam ser eficientes!</p>`,cards:[{q:'Qual é a diferença fundamental entre comprar servidores e usar cloud?',a:'Cloud permite pagar apenas pelo que usa com escalabilidade automática, enquanto compra envolve custo fixo alto e rigidez de capacidade.'}]},
  {id:2,name:'Serviços, Bancos de Dados e Armazenamento',dur:'18 min',content:`<h3>A Caixa de Ferramentas da Nuvem</h3><p>Cloud não é apenas "máquinas virtuais". É muito mais! Provedores oferecem centenas de serviços especializados. Você nem precisa fazer tudo — escolhe blocos pré-feitos!</p><p>COMPUTE (Processamento): Máquinas Virtuais (EC2 em AWS, Compute Engine em GCP, Virtual Machines em Azure) rodam SO e aplicações tradicionais. Containers (Docker) empacotam aplicações com dependências. Orquestração de containers (Kubernetes) gerencia múltiplos containers. Serverless/Functions (AWS Lambda, Google Cloud Functions) executam código sem gerenciar servidores — você escreve função, upload, e pronto!</p><p>ARMAZENAMENTO: Object Storage (S3 em AWS, Cloud Storage em GCP) armazena arquivos enormes (fotos, vídeos, logs) como "objetos". Escalável infinitamente. Block Storage (EBS em AWS) funciona como disco tradicional para máquinas virtuais. File Storage (EFS em AWS) é NFS na nuvem — múltiplas máquinas acessam compartilhado.</p><p>BANCOS DE DADOS: SQL tradicional (RDS em AWS roda MySQL, PostgreSQL, Oracle). NoSQL (DynamoDB em AWS, Firestore em GCP) para dados não-estruturados, escaláveis. Datawarehouses (Redshift em AWS, BigQuery em GCP) para analytics. Caches (ElastiCache, Memorystore) para performance ultra-rápida.</p><p>O grande diferencial é MANAGED SERVICES — você não gerencia! Provedor cuida de backups, patches, redundância, performance. Você apenas usa. Exemplo: RDS — você não toca no Linux, não instala MySQL, não faz backup. Apenas cria instância e usa. AWS faz resto!</p><p>NETWORKING: VPC (Virtual Private Cloud) cria rede isolada. Load Balancers distribuem tráfego entre servidores. DNS (Route 53 em AWS) traduz domínios em IPs. VPN permite conexão segura entre seu data center e nuvem. CDN (CloudFront em AWS, Cloud CDN em GCP) replica conteúdo globalmente para baixa latência.</p><p>CDN é genial! Imagine video no YouTube. Você em São Paulo faz request. Ao invés de vir do data center em Los Angeles (300ms latência), vem de um servidor em São Paulo da CDN (5ms). Tudo é transparente! CDN replica conteúdo automaticamente para edge locations próximas de usuários.</p><p>ANÁLISE E MACHINE LEARNING: Provedores oferecem data pipelines prontas (Google Cloud Dataflow), data lakes (AWS Lake Formation), e ML as a service (AWS SageMaker, Google Vertex AI) onde você não precisa ser especialista em ML — apenas dá dados e modelo é criado automaticamente!</p><p>SEGURANÇA: Firewalls, WAF (Web Application Firewall), DDoS Protection, Encryption (dados em repouso e em trânsito), Identity & Access Management (IAM) para controle fino de quem pode fazer o quê.</p><p>MONITORING E LOGGING: CloudWatch em AWS, Cloud Logging em GCP monitoram tudo — CPU, memória, disco, requisições. Alertas automáticos se algo fica errado. Você dorme tranquilo!</p><p>O desafio é VENDOR LOCK-IN — você constrói em AWS, código/arquitetura ficam específicos da AWS. Migrar para GCP é doloroso. Solução: usar abstração (Kubernetes é agnóstico, funciona em qualquer cloud), ou arquitetura multi-cloud (distribuir entre provedores).</p><p>CUSTO é tópico importantíssimo. Cloud parece barato (pague conforme usa), mas sem disciplina, explode! Uma máquina rodando 24/7 que poderia ficar 8 horas custa 3x mais. Um banco de dados oversized custa fortune. Otimização é contínua!</p><p>Reserved Instances (RI) e Savings Plans permitem comprometimento de 1-3 anos por 30-50% desconto. Spot Instances em AWS são máquinas ociosas do provedor vendidas com 90% desconto (risco: pode ser encerrada a qualquer momento). Use para workloads tolerantes a interrupção!</p>`,cards:[{q:'O que é um Managed Service e qual seu benefício?',a:'Serviço onde o provedor cuida de manutenção, backups e performance, você apenas usa — elimina overhead operacional.'}]},
  {id:3,name:'Microserviços, Serverless e Otimização',dur:'17 min',content:`<h3>Arquitetura Moderna na Nuvem</h3><p>Conforme cloud evoluiu, padrões de arquitetura também evoluíram. Vamos explorar as estratégias que empresas modernas usam para máxima eficiência!</p><p>Historicamente, aplicações eram MONOLÍTICAS — uma aplicação gigante que faz tudo. Se parte precisava de atualização, toda aplicação era reimplementada. Problema: um bug em um pedaço derruba tudo. Um módulo precisa escalar (ex: payments)? Você escalava a aplicação inteira, desperdiçando recursos.</p><p>MICROSERVIÇOS revolucionou isso. Ao invés de uma aplicação gigante, múltiplas aplicações pequenas e independentes, cada uma responsável por uma função (Users Service, Payments Service, Orders Service). Se payments precisa escalar, escala apenas payments. Se há bug em orders, não afeta users.</p><p>Cada microserviço tem banco de dados próprio — "database per service". Evita acoplamento. Serviços se comunicam via APIs REST, gRPC ou message queues (RabbitMQ, Kafka).</p><p>Benefício: Time pequeno pode gerenciar um serviço. Escalabilidade granular. Resiliência (falha de um não derruba todos). Deployment independente — você faz deploy do Payments Service sem tocar em Order Service!</p><p>Desafio: Complexidade aumenta. Monitorar 100 microserviços é mais difícil que monitorar 1 monolito. Debugging é complicado (requisição passa por 5 serviços, onde erro?). Consistência de dados é desafio (cada um tem banco próprio).</p><p>CONTAINERS (Docker) são chave para microserviços. Docker empacota aplicação + dependências em imagem. Imagem é garantia: funciona em dev, funciona em produção, funciona em qualquer nuvem. Eliminam "funciona na minha máquina mas não no servidor"!</p><p>ORCHESTRAÇÃO de containers é gerenciamento de muitos containers. Kubernetes (k8s) é padrão de ouro. Você descreve quantas replicas de cada container quer rodar, Kubernetes garante isso. Serviço está lento? Kubernetes adiciona replicas. Servidor cai? Kubernetes move containers para outro. Tudo automático!</p><p>AWS oferece ECS (mais simples), GCP oferece GKE (Kubernetes gerenciado), Azure oferece AKS. Todas abstraem complexidade de gerenciar Kubernetes manualmente.</p><p>SERVERLESS (Functions-as-a-Service) elimina preocupação com servidores completamente. AWS Lambda: você faz upload de função Python/Node/Java/Go, define trigger (API request, evento de banco de dados, etc.), e pronto! Função executa quando precisa. Você não gerencia nada. Não precisa pensar em escalabilidade — Cloud cuida automaticamente.</p><p>Custo é baseado em execuções. Se função não é chamada, não custa nada. Perfeito para padrões event-driven, onde coisas acontecem raramente mas precisam responder rápido quando acontecem!</p><p>Limitação: "cold start" — primeira execução após período inativo pode ter latência (2-3 segundos enquanto Cloud aloca container). Para latências críticas (< 10ms), serverless não é ideal. Mas para maioria de casos, é revolucionário!</p><p>EVENT-DRIVEN architecture é padrão moderno. Ao invés de polling (verificar a cada segundo se algo mudou), coisas disparam eventos. Usuário compra produto → evento "order.created" → múltiplos serviços reagem (charge payment, update inventory, send confirmation email, etc.) — tudo automático em paralelo!</p><p>Message Queues (Kafka, RabbitMQ) são essenciais. Se serviço A envia mensagem para B mas B está fora, mensagem fica na fila até B voltar. Garante "at least once" delivery — ninguém perde trabalho!</p><p>OBSERVABILIDADE é crítico em arquitetura complexa. Three Pillars: Metrics (números — CPU, requisições por segundo), Logs (eventos — user logged in, error occurred), Traces (caminhos — requisição passou por services A → B → C). Ferramentas: Datadog, New Relic, Elastic Stack monitoram tudo.</p><p>OTIMIZAÇÃO DE CUSTOS é processo contínuo. Checklist: 1) Remove recursos não-usados (máquinas paradas custam), 2) Right-size (máquinas muito poderosas para carga atual), 3) Use spot instances (90% desconto!), 4) Auto-scaling (sobe/desce conforme demanda), 5) Use managed services (serverless é mais barato que EC2 para workloads variáveis).</p><p>Conclusão: Cloud moderno é combinação de microserviços, containers, orchestração (Kubernetes), serverless, event-driven architecture, e observabilidade. Dominar esses permite construir sistemas escaláveis, resilientes e econômicos que sustentam aplicações de bilhões de usuários!</p>`,cards:[{q:'Qual é a diferença entre arquitetura monolítica e microserviços?',a:'Monolítica é uma aplicação gigante que faz tudo; microserviços são serviços pequenos e independentes, escaláveis e mantíveis separadamente.'}]},
  {id:4,name:'Docker, Containers e Kubernetes',dur:'16 min',content:`<h3>Containerização: A Revolução de Deployment</h3><p>Antes de containers, deployment era dor. "Funciona no meu laptop" mas falha no servidor de produção — dependências diferentes, versões diferentes, bibliotecas faltando. Pesadelo!</p><p>Docker resolveu isso com containers. Container é como máquina virtual leve — sistema operacional isolado, aplicação, todas as dependências encapsuladas. Imagem Docker é blueprint, container é instância rodando.</p><p>Imagem é construída em layers (camadas). Cada instrução no Dockerfile (arquivo de receita) cria camada. Base OS (Ubuntu), instala Python, instala dependencies, copia código. Resultado: imagem que pesa 500MB, roda em qualquer lugar (laptop, servidor, nuvem).</p><p>Dockerfile exemplo: "FROM ubuntu:20.04 / RUN apt install python3 / COPY app.py / CMD python app.py". Pronto! Imagem! Docker build → Docker run em qualquer máquina com Docker instalado.</p><p>Benefícios de containers: Portabilidade (rodar em dev, staging, produção idêntico), Isolamento (container não interfere em outro), Eficiência (lighter que VMs), Escalabilidade (subir 1000 containers em minutos), Reprodutibilidade (mesmo ambiente sempre).</p><p>Container registry (Docker Hub, ECR da AWS) armazena imagens. Você faz push de imagem, qualquer um faz pull e roda. Colaboração!</p><p>KUBERNETES é orquestrador de containers — gerencia centenas de containers automaticamente. Você descreve estado desejado ("quero 10 réplicas dessa app"), Kubernetes faz acontecer. App lenta? Kubernetes adiciona mais replicas. Servidor cai? Kubernetes move containers para outro servidor.</p><p>Pods em Kubernetes são unidades menores — um ou mais containers intimamente conectados. Você não gerencia containers, gerencia pods!</p><p>Services em Kubernetes expõem pods para tráfego. Há 10 replicas de sua app, mas qual usar? Service balanceia carga automaticamente. Um cliente conecta ao service, é roteado para pod menos ocupado.</p><p>Deployments descrevem aplicação. "Quero nginx:1.24, 5 replicas, update strategy rolling (substitui uma de cada vez)". Kubernetes garante.</p><p>ConfigMaps e Secrets armazenam configuração. ConfigMap para dados não-sensíveis (variáveis de ambiente), Secrets para senhas/tokens (armazenados encriptados).</p><p>StatefulSets para aplicações com estado (banco de dados, cache). Diferente de Stateless (web apps), StatefulSet garante identidade persistente — mesmo pod tem mesmo storage.</p><p>Helm é "package manager" de Kubernetes. Você não quer escrever YAML para deployments de zero. Helm charts encapsulam: Deployment, Service, ConfigMap, etc. Um comando: helm install WordPress, tudo é deployado!</p><p>Desafio: Kubernetes tem curva de aprendizado. Conceitos: namespaces, labels, selectors, ingress, network policies. Mas dominando, você consegue orquestrar aplicações complexas com facilidade!</p>`,cards:[{q:'Por que containers resolvem o problema "funciona na minha máquina"?',a:'Container encapsula aplicação + todas as dependências em imagem que roda identicamente em qualquer máquina com Docker, eliminando variabilidade de ambiente.'}]},
  {id:5,name:'Segurança em Nuvem e Conformidade',dur:'17 min',content:`<h3>Guardando o Castelo: Segurança em Cloud</h3><p>Cloud oferece escalabilidade, mas com grande poder vem grande responsabilidade — sua segurança! Provedores cuidam de infraestrutura, você cuida de aplicação e dados.</p><p>Modelo de responsabilidade compartilhada (Shared Responsibility Model) é crítico entender. AWS cuida: infraestrutura física, rede, hipervisor. Você cuida: IAM (quem tem acesso), encriptação de dados, patches de aplicação, configuração segura.</p><p>IAM (Identity and Access Management) controla quem faz o quê. Princípio: menor privilégio! Desenvolvedor não precisa acessar dados sensíveis. Aplicação não precisa acessar secretos de outra app. Granular!</p><p>Roles em IAM definem permissões. "Developer" pode deployar código, acessar dev databases, NÃO pode acessar prod ou deletar recursos. "DevOps" pode tudo. "Auditor" apenas pode ler.</p><p>MFA (Multi-Factor Authentication) é OBRIGATÓRIO para contas cloud críticas! Se hackeado, senha roubada, conta ainda é segura com MFA. AWS root account deve ter MFA!</p><p>Encriptação em repouso (arquivos armazenados) e em trânsito (dados viajando) é essencial. Banco de dados deve usar encriptação KMS (Key Management Service). TLS/SSL para todas as conexões (HTTPS).</p><p>Key Management é desafio. Senhas de db, API keys, tokens — como guardar seguro? Soluções: AWS Secrets Manager, HashiCorp Vault, Google Secret Manager. Nunca hardcode secrets em código!</p><p>VPC (Virtual Private Cloud) isola sua infraestrutura. Você cria rede privada, subnets, security groups. Traffic só entra/sai conforme regras. Como firewall virtual!</p><p>Security Groups são firewalls em nível de instance. "Porta 443 (HTTPS) aceita de qualquer lugar, SSH apenas de meu IP, RDS port 5432 apenas de App security group". Granular!</p><p>Network ACLs (Access Control Lists) são layer adicional. "Bloqueie país inteiro para compliance". Estateful (conexão aprovada, response é permitida) ou stateless.</p><p>DDoS protection vem built-in (AWS Shield Standard), ou paga mais por DDoS mitigation avançado. Cloudflare, Akamai também oferecem.</p><p>Logging e Auditing: CloudTrail (AWS) registra TUDO — quem logou, que recursos foram acessados, que mudanças foram feitas. Essencial para compliance e debugging!</p><p>Conformidade é grande — HIPAA (healthcare), PCI-DSS (payment cards), GDPR (privacy EU), LGPD (privacy Brasil). Provedores ajudam mas você é responsável final! AWS oferece "compliance packages" documentação.</p><p>Penetration Testing: Você pode contratar profissionais para "atacar" sua nuvem. Encontram vulnerabilidades, você fixa, sistema fica mais seguro. Bem-vindo!</p>`,cards:[{q:'O que é Modelo de Responsabilidade Compartilhada em cloud?',a:'Provedor cuida de infraestrutura física e rede, você cuida de IAM, encriptação, patches de aplicação e configuração segura.'}]},
  {id:6,name:'Otimização de Custos e Monitoramento',dur:'16 min',content:`<h3>Vigiando os Gastos: Custo e Performance na Nuvem</h3><p>Cloud é "pague conforme use" — beleza? Só se souber quanto está usando! Sem monitoramento, Bills podem explodir. Netflix encontrou bug que custava 10 milhões/mês sem saber! Monitoramento importa!</p><p>CloudWatch (AWS) ou Stackdriver (GCP) monitoram tudo: CPU, memória, disk, network, requests. Dashboards visuais mostram saúde em tempo real. Alertas avisam se alguma coisa está errada.</p><p>Métricas importantes: Cost (quanto custa), Latency (quão rápido), Availability (uptime %), Error Rate (% de falhas). SLA (Service Level Agreement) define: "99.99% uptime", "< 100ms latency". Você monitora para garantir!</p><p>Estimativas de custo antes de deploy ajudam! "EC2 t3.medium custa 0.0416 USD/hour, se roda 24/7 é 300 USD/mês por instância". AWS Pricing Calculator ajuda. Calcule antes, surpresa evitada!</p><p>Otimização tática: Reserved Instances (RI) — compra 1 ou 3 anos de EC2 com desconto 40-50%. Se workload é previsível, RI economiza muito! Spot Instances — máquinas ociosas do provedor com desconto 90%, risco: encerram sem aviso (use para non-critical workloads).</p><p>Rightsizing: Rodar t3.xlarge quando t3.small funciona? Downsizeie! Rodar 24/7 quando pico é 6-22h? Use auto-scaling, downsize à noite. Ganhos: 30-50% redução de custo!</p><p>Unused resources custam! EBS volumes não-attachados? Delete. Elastic IPs não-usadas? Release. Snapshots velhos? Remove. CloudTrail logs do 2023? Archive para S3 Glacier (99% mais barato).</p><p>Multi-region é caro! Replicar em 3 regiões é 3x o custo. Apenas replique o essencial (dados críticos), redirecione traffic para região closest (latência menor, custo menor).</p><p>Networking custa! Data transfer out de nuvem é caro (tipicamente 0.09 USD/GB). Keep data local, minimize egress. CDN (CloudFront) custa menos que transferência bruta.</p><p>Custo compartilhado é desafio. Qual time pagou esse servidor? "Show-back" (bill back aos times) alinha incentivos. Time vê custo, otimiza!</p><p>Reserved Capacity em bancos de dados ajuda também. RDS Reserved Instances, DynamoDB Provisioned Capacity têm descontos grandes.</p><p>Tendência: FinOps (Financial Operations) — disciplina de gerenciar custos cloud. Roles dedicados ("FinOps Lead") monitoram, otimizam, educam. Grandes orgs economizam 30-40% com FinOps!</p><p>Dica final: Automatize cleanup! Lambda diário que deleta recursos antigas, desliga instâncias idle à noite. Economia passiva!</p>`,cards:[{q:'Qual é a melhor estratégia para reduzir custos em cloud sem comprometer performance?',a:'Combinação de: Reserved Instances (1-3 anos desconto), rightsizing (máquinas certas), Auto-scaling (sobe/desce), e eliminar recursos não-usados.'}]}
];
</script>
