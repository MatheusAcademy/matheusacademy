        <h3>Computação em Nuvem: Transformação Digital</h3>
        <p>Computação em nuvem mudou como empresas de todos tamanhos executam TI. Não precisa mais datacenters próprios, servidores físicos, eletricidade, cooling, suporte 24/7. Pay-as-you-go: pague apenas pelo que usa, escale com demanda. Três gigantes dominam: AWS (50%+ mercado), Microsoft Azure, Google Cloud Platform.</p>

        <h4>IaaS (Infrastructure as a Service)</h4>
        <p>Aluga infraestrutura em bruto: computadores (VMs), armazenamento (discos), rede. Você gerencia SO, runtime, aplicação. Provedor gerencia hardware físico, power, cooling, segurança física.</p>

        <p><strong>Exemplos:</strong> AWS EC2 (máquinas virtuais), Azure VMs, Google Compute Engine.</p>

        <p><strong>Vantagens IaaS:</strong> Flexibilidade total, paga apenas pelo que usa, escala rápida, sem CAPEX (capital expenditure, buy hardware).</p>

        <p><strong>Desvantagens:</strong> Mais responsabilidade (você gerencia updates, segurança SO, etc), mais complexo.</p>

        <blockquote class="example">
          <strong>📌 Exemplo:</strong> Startup de IA treina modelos em dados massivos. Precisa 1000 GPUs por 10 horas. Comprar: $10M investimento inicial, obsoleto em 2 anos. AWS: $5k por run. Espaço gasto zero (on-demand). Startup viável com nuvem.
        </blockquote>

        <h4>PaaS (Platform as a Service)</h4>
        <p>Plataforma de desenvolvimento completa. Você escreve código, plataforma cuida do resto: deployment, escalação, banco dados, segurança. Menos controle que IaaS, menos trabalho.</p>

        <p><strong>Exemplos:</strong> Heroku (deploy apps facilmente), Firebase (backend mobile), AWS Elastic Beanstalk, Google App Engine.</p>

        <p><strong>Caso de Uso:</strong> Startup de 3 desenvolvedores quer lançar MVP rapidamente. Heroku: git push e app está em produção. Autoscaling automático. SSL certificado. Sem ops team. IaaS equivalente requereria 2+ engenheiros devops.</p>

        <p><strong>Vantagens PaaS:</strong> Foca em código, não ops. Deploy rápido, escalação automática, managed databases, segurança.</p>

        <p><strong>Desvantagens:</strong> Menos flexibilidade (preso ao stack da plataforma), pode ser mais caro em escala.</p>

        <h4>SaaS (Software as a Service)</h4>
        <p>Aplicação completa rodando na nuvem. Você apenas usa. Nada para instalar ou manter.</p>

        <p><strong>Exemplos:</strong> Google Workspace (Gmail, Docs, Sheets), Salesforce (CRM), Slack (messaging), Notion (docs), Zoom (videoconferência).</p>

        <p><strong>Vantagem:</strong> Acesso universal (qualquer dispositivo, qualquer lugar), sempre atualizado, suporte incluído, colaboração integrada.</p>

        <p><strong>Desvantagem:</strong> Sem customização profunda, dados em servidor alheio (confiança requerida), possível vendor lock-in.</p>

        <h4>Comparação: On-Premise vs Cloud</h4>
        <p><strong>On-Premise (Tradicional):</strong> Você compra e gerencia tudo. Alto CAPEX inicial, flexibilidade total, latência potencialmente menor (dados próximos), conformidade regulatória total control.</p>

        <p><strong>Cloud:</strong> Aluga infraestrutura/plataforma/software. Baixo CAPEX, OPEX flexível (pay-as-you-go), elasticidade automática, menos ops overhead.</p>

        <p><strong>Hybrid Cloud:</strong> Mistura: dados sensíveis on-premise, workloads elásticos em cloud. Melhor dos dois mundos, mais complexo.</p>

        <h4>Providers Principais</h4>
        <p><strong>AWS (Amazon Web Services):</strong> Líder de mercado. Maior variedade de serviços (200+). EC2 (VMs), S3 (armazenamento), RDS (banco dados managed), Lambda (serverless), etc. Mais complexo, documentação excelente.</p>

        <p><strong>Microsoft Azure:</strong> Força em integração com ecosystem Microsoft (Office, SQL Server, .NET). Forte em enterprise. Melhor para clientes já no ecosistema Microsoft.</p>

        <h4>Custos em Nuvem</h4>

        <h3>Containerização: Executáveis Portáveis</h3>
        <p>Problema tradicional: "Funciona na minha máquina, mas não no servidor." Ambientes diferentes causam incompatibilidade. Solução: Docker containers empacotam aplicação + dependências + runtime em pacote executável. "Build once, run anywhere".</p>

        <h4>Docker: Containerização em Escala</h4>
        <p>Container é isolamento leve de processo. Diferente de máquina virtual (que virtualiza SO inteiro), container compartilha kernel do host, é muito mais rápido e leve.</p>

        <p><strong>Conceitos:</strong></p>
        <ul>
          <li><strong>Image:</strong> Template executável. Contém código, dependências, ambiente. Imutável.</li>
          <li><strong>Container:</strong> Instância em execução de uma image. Múltiplos containers podem rodar da mesma image.</li>
          <li><strong>Dockerfile:</strong> Receita que descreve como construir image. Especifica base image (ex: python:3.11), instala dependências, copia código.</li>
          <li><strong>Registry:</strong> Repositório de images. Docker Hub é público (milhões de images), você também pode ter privado (ECR na AWS, ACR na Azure).</li>
        </ul>

        <p><strong>Vantagens:</strong> Consistência entre dev/prod, deployment rápido (segundos), escalação horizontal trivial, isolamento de processos.</p>

        <p><strong>Exemplo Dockerfile simples:</strong></p>
        <blockquote class="example">
          FROM python:3.11<br>
          WORKDIR /app<br>
          COPY requirements.txt .<br>
          RUN pip install -r requirements.txt<br>
          COPY . .<br>
          CMD ["python", "app.py"]
        </blockquote>

        <p>Resultado: image que pode rodar em qualquer máquina com Docker, sem instalar Python manualmente.</p>

        <h4>Kubernetes: Orquestração de Containers</h4>
        <p>Docker resolve portabilidade. Kubernetes resolve orquestração: como gerenciar centenas/milhares de containers distribuídos em múltiplos nós (máquinas)? Autoscaling, load balancing, rolling updates, secret management.</p>

        <p><strong>Componentes Kubernetes:</strong></p>
        <ul>
          <li><strong>Pod:</strong> Unidade mínima, wraps 1+ container. Geralmente 1 container por pod.</li>
          <li><strong>Service:</strong> Rede estável para pod (IP pode mudar, service fornece DNS estável). Load balancer interno.</li>
          <li><strong>Deployment:</strong> Descreve replicação desejada (ex: "sempre 3 replicas desta aplicação"). Kubernetes garante isso, reestartando se crashes.</li>
          <li><strong>ConfigMap:</strong> Variáveis de ambiente, não secrets, para config não-sensível.</li>
          <li><strong>Secret:</strong> Dados sensíveis (passwords, tokens, chaves). Encriptado em repouso.</li>
          <li><strong>PersistentVolume:</strong> Storage que sobrevive a Pod crash/restart.</li>
          <li><strong>Ingress:</strong> Roteamento HTTP externo para serviços internos. Um ponto de entrada.</li>
        </ul>

        <p><strong>YAML Deployment Exemplo:</strong> Você descreve desejo em YAML (declarativo). Kubernetes observa estado atual, toma ações para atingir desejo.</p>

        <blockquote class="example">
          <strong>📌 Cenário:</strong> Seu app recebe 10x mais tráfego subitamente. Kubernetes detecta CPU/memória alta, automaticamente scale up replicas de 3 para 30. Novo tráfego distribui. Depois, demanda cai, scale down para 3. Sem intervenção manual. Em on-premise, você estaria franticamente provisionando servidores!
        </blockquote>

        <h4>Managed Kubernetes Services</h4>
        <p>Kubernetes é poderoso mas complexo. Providers oferecem versões managed: você fornece container, eles gerenciam cluster.</p>

        <p><strong>AWS EKS:</strong> Elastic Kubernetes Service. AWS gerencia control plane, você gerencia worker nodes (ou deixa auto-scale).</p>

        <p><strong>Azure AKS:</strong> Azure Kubernetes Service. Análogo ao EKS.</p>

        <p><strong>Google GKE:</strong> Google Kubernetes Engine. Mais maduro, integração melhor com GCP.</p>

        <p><strong>Alternativas:</strong> Docker Swarm (simpler, menos powerful), serverless/FaaS (ainda mais abstrato, Lambda/Cloud Functions/Cloud Run).</p>

        <h4>Serverless/FaaS (Function as a Service)</h4>
        <p>Abstração além de containers. Você fornece função (ex: Python function), plataforma escala/executa por você. Sem gerenciar infra, nem containers, nem Kubernetes.</p>

        <p><strong>Exemplos:</strong> AWS Lambda, Google Cloud Functions, Azure Functions, Heroku Dynos.</p>

        <p><strong>Caso de Uso:</strong> Microserviço simples que responde a evento (webhook, file upload, scheduled task). Lambda: pay per execution (milissegundos), escala automática instantaneamente, não precisa manter warm.</p>

        <p><strong>Limitações:</strong> Timeout (Lambda = 15 min max), sem state local persistente (não pode guardar session em disk), cold start delay (primeiro invoke após inatividade é lento).</p>

        <blockquote class="tip">
          <strong>💡 Escolha:</strong> Monolith → Containers (Docker) → Orquestração (Kubernetes) → Serverless. Complexidade aumenta, mas elasticidade e custo optimization melhora. Escolha baseado em escala e complexidade.
        </blockquote>

        <p>Neste tópico, você dominou containerização moderna. Próximo: deployment patterns e ci/cd!</p>

        <h3>AWS: O Gigante de Cloud Computing</h3>
        <p>AWS é líder absoluto com >50% market share. Oferece 200+ serviços. Impossível cobrir tudo, mas serviços "core" que 80% apps usam são poucos.</p>

        <h4>Compute: EC2</h4>
        <p><strong>EC2 (Elastic Compute Cloud):</strong> Máquinas virtuais on-demand. Você escolhe: tamanho (t2.micro = 512MB RAM até x2iedn = 4TB RAM), SO (Amazon Linux, Ubuntu, Windows), regiões.</p>

        <p><strong>Instância Pricing:</strong> On-Demand (paga por hora, flexível), Reserved (comprometimento 1/3 anos = 50% desconto), Spot (oferta, até 90% desconto, pode ser interrompido).</p>

        <p><strong>Auto Scaling Group:</strong> Escala automaticamente baseado em métrica (CPU > 70%, scale up; CPU < 30%, scale down). Define min/max instances.</p>

        <h4>Storage: S3</h4>
        <p><strong>S3 (Simple Storage Service):</strong> Armazenamento de objetos (blobs). Extremamente durável (99.999999999% = 11 nines), infinitamente escalável, barato.</p>

        <p><strong>Casos de Uso:</strong> Backup, logs, static website (HTML/CSS/JS), data lake, imagens/vídeos, arquivos.</p>

        <p><strong>Conceitos:</strong> Bucket (container de objetos, namespace único globalmente), Object (arquivo + metadata), Key (caminho/nome).</p>

        <p><strong>Tiers de Storage:</strong> S3 Standard (rápido, caro), S3 Infrequent Access (buscado raro, mais barato), S3 Glacier (archive, muito barato, acesso lento), S3 Deep Archive (raro, muito barato).</p>

        <p><strong>Versionamento:</strong> Manter histórico de versões de objetos. Proteção contra delete acidental.</p>

        <p><strong>Lifecycle Policies:</strong> Automaticamente mover objetos entre tiers ou deletar após período. Exemplo: mover para Glacier após 30 dias, deletar após 1 ano.</p>

        <h4>Database: RDS, DynamoDB</h4>
        <p><strong>RDS (Relational Database Service):</strong> Databases relacionais managed. MySQL, PostgreSQL, MariaDB, Oracle, SQL Server. AWS cuida de backup, patching, replicação, failover.</p>

        <p><strong>Vantagens RDS:</strong> Managed (sem ops overhead), Multi-AZ (replicação automática para disaster recovery), automated backups, security groups, encryption.</p>

        <p><strong>DynamoDB:</strong> NoSQL key-value database. Totalmente managed, escala automaticamente, paga por throughput (read/write capacity units) ou on-demand.</p>

        <p><strong>Quando RDS vs DynamoDB:</strong> RDS para dados estruturados, relações complexas, ACID. DynamoDB para dados sem schema, alta throughput, baixa latência, escalação automática simples.</p>

        <h4>Networking: VPC, Security Groups</h4>
        <p><strong>VPC (Virtual Private Cloud):</strong> Rede privada em AWS. Você define subnets, route tables, NAT gateways. Isolamento completo de outras contas AWS.</p>

        <p><strong>Security Group:</strong> Firewall de instância. Você define inbound/outbound rules (porta, protocolo, CIDR source).</p>

        <p><strong>Network ACL:</strong> Firewall de subnet (mais granular que Security Group).</p>

        <h4>Serviços de Alto-Nível</h4>
        <p><strong>Lambda:</strong> Serverless function execution. Pague por tempo execução (milissegundos). Escala automática instantaneamente. Ideal microserviços, webhooks, processamento eventos.</p>

        <p><strong>API Gateway:</strong> Gerencia APIs REST/WebSocket. Autenticação, rate limiting, transformação, logging.</p>

        <p><strong>CloudFront:</strong> CDN (Content Delivery Network) global. Cache conteúdo em datacenters ao redor do mundo. Reduz latência para usuários distantes.</p>

        <p><strong>CloudWatch:</strong> Monitoring e logging. Coleta métricas de recursos, logs de aplicações, alertas baseado em threshold.</p>

        <p><strong>IAM (Identity and Access Management):</strong> Controla quem acessa o quê. Usuários, roles, policies (permissões granulares). Princípio de least privilege: permita apenas o mínimo necessário.</p>

        <h4>Best Practices AWS</h4>
        <ul>
          <li><strong>Multi-AZ:</strong> Sempre replique crítico em Availability Zones diferentes. Protege contra falha de datacenter.</li>
          <li><strong>Least Privilege:</strong> IAM policy mais restrictivas possível. Não use root account para dia-a-dia.</li>
          <li><strong>Infrastructure as Code:</strong> Use CloudFormation ou Terraform para descrever infra em YAML/HCL. Version control, reprodutibilidade.</li>
          <li><strong>Monitoring:</strong> CloudWatch alertas. Não descubra problemas de usuários — saiba antes.</li>
          <li><strong>Cost Optimization:</strong> Reserved instances, Spot instances, lifecycle policies, right-sizing. Audita mensalmente.</li>
          <li><strong>Security:</strong> Encriptação (at rest + in transit), VPC isolation, security groups tight, updates frequentes.</li>
        </ul>

        <blockquote class="example">
          <strong>📌 Arquitetura Típica:</strong> Usuários → CloudFront (CDN) → API Gateway → Lambda (serverless) → RDS (database) + S3 (media). CloudWatch monitora tudo, alertas se erros. Infrastructure as Code (Terraform) provê toda stack com comando único.
        </blockquote>

        <p>Neste tópico, você tem mapa de AWS. Próximo: colocando tudo em produção!</p>
