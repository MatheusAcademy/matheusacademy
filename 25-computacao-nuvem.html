    <p><strong>O que você aluga:**</strong> Hardware virtualizados (VMs, networking, storage). Tudo mais você controla.</p>

    <p><strong>Você controla:**</strong> OS, middleware, aplicação, dados, segurança no nível de aplicação.</p>

      <li>Azure VMs</li>

    </ul>

    <p><strong>Quando usar:**</strong> Você quer controle total, app não-padrão, ou já tem expertise em gerenciar infraestrutura.</p>

    <p><strong>Vantagens:**</strong> Máximo controle, customização total.</p>

    <p><strong>Desvantagens:**</strong> Você gerencia muito (OS patching, security updates, scaling), mais complexo.</p>

    <h4>PaaS: Platform as a Service**</h4>

    <p><strong>O que você aluga:</strong> Plataforma completa com runtime, banco de dados, etc. Você só escreve código.</p>

    <p><strong>Você controla:</strong> Sua aplicação, seus dados (em certo nível).</p>

    name: 'Arquitetura de Aplicações em Nuvem: De Monolítico para Distribuído',
    dur: '24 min',
    content: `
    <h3>Como Desenhar Sistemas para Escalar Globalmente</h3>
    <p>Nuvem não apenas muda infraestrutura — muda como você arquiteta aplicações. Vamos explorar modelos modernos.</p>

    <h4>Monolítico vs. Microserviços**</h4>

    <p><strong>Monolítico (Traditional):</strong></p>
    <ul>
      <li>Uma aplicação gigante: web frontend, API, database tudo acoplado</li>
      <li>Escala: Você não consegue escalar apenas uma parte (ex: API). Toda app escala.</li>
      <li>Deploy: Mudar 1 linha exige redeploy aplicação inteira</li>
      <li>Falha: Um bug em uma função derruba aplicação inteira</li>
    </ul>

    <p><strong>Microserviços (Modern):</strong></p>
    <ul>
      <li>Múltiplas pequenas aplicações que comunicam</li>
      <li>Cada microserviço: uma responsabilidade específica (user service, order service, payment service)</li>
      <li>Escala: Você escala apenas o serviço que precisa</li>
      <li>Deploy: Deploy um serviço de forma independente</li>
      <li>Falha: Se payment service falha, order service continua</li>
    </ul>

    <p><strong>Exemplo:**</strong></p>
    <ul>
      <li>Monolítico: 1 app gigante de e-commerce</li>
      <li>Microserviços: User Service, Product Service, Cart Service, Payment Service, Notification Service</li>
    </ul>

    <p><strong>Trade-off:**</strong> Microserviços é mais complex (distributed debugging é nightmare), mas escala melhor.</p>

    <h4>Containers & Kubernetes**</h4>

    <p><strong>Container (Docker):**</strong> Package app + dependências. Roda identicamente everywhere.</p>

    <p><strong>Kubernetes (K8s):**</strong> Orchestrates containers — deployment, scaling, networking, etc.</p>

    <p><strong>Por quê Kubernetes é revolucionário:**</strong></p>
    <ul>
      <li>Você descreve estado desejado ("quero 10 instâncias do meu app")</li>
      <li>Kubernetes mantém esse estado (se uma instância falha, inicia outra)</li>
      <li>Escala automática (se CPU > 80%, launch mais instâncias)</li>
      <li>Rolling updates (update app sem downtime)</li>
    </ul>

    <h4>Serverless Architecture**</h4>

    <p><strong>Novo paradigma:** Você não pensa em "servidores". Você escreve funções que rodam em resposta a eventos.</p>

    <p><strong>Exemplo Event-Driven:**</strong></p>
    <ul>
      <li>User faz upload foto → S3 trigger → Lambda function → Redimensiona imagem → Salva thumbnail</li>
      <li>New order → Event → Payment function → Charge function → Notification function</li>
    </ul>

    <p><strong>Vantagem:**</strong> Auto-scales automaticamente, você paga apenas por execução.</p>

    <p><strong>Desvantagem:**</strong> Distributed debugging é complexo, não ideal se aplicação roda 24/7.</p>

    <h4>Banco de Dados: SQL vs. NoSQL**</h4>

    <p><strong>SQL (Relational):</strong></p>
    <ul>
      <li>Dados estruturados em tabelas</li>
      <li>ACID garantias (Atomicity, Consistency, Isolation, Durability)</li>
      <li>Joins, complex queries</li>
      <li>Exemplo: MySQL, PostgreSQL</li>
    </ul>

    <p><strong>Quando usar:** Dados relacionados, transações críticas (banking, finança).</p>

    <p><strong>NoSQL (Non-Relational):</strong></p>
    <ul>
      <li>Dados flexível (documents, key-value, graphs)</li>
      <li>BASE (Basically Available, Soft state, Eventually consistent) vs ACID</li>
      <li>Escala horizontal facilmente</li>
      <li>Exemplos: MongoDB, DynamoDB, Firebase, Cassandra</li>
    </ul>

    <p><strong>Quando usar:** Dados unstructured, escala horizontal, high throughput.</p>

    <p><strong>Em prática:</strong> Use SQL por padrão. Mude para NoSQL se SQL não conseguir scale ou flexibilidade necessária.</p>

    <h4>Caching & CDN**</h4>

    <p><strong>Caching (Redis, Memcached):**</strong></p>
    <ul>
      <li>In-memory data store, ultra-fast</li>
      <li>Resultado de database query → cache</li>
      <li>Próxima requisição → lê cache (não database)</li>
      <li>Reduz load database 100x+</li>
    </ul>

    <p><strong>CDN (Content Delivery Network):</strong></p>
    <ul>
      <li>Distribui conteúdo estático (images, CSS, JS) para múltiplos servidores globais</li>
      <li>User em Tokyo → conteúdo servido de Tokyo (não EUA), latência mínima</li>
      <li>Exemplo: CloudFront (AWS), Akamai</li>
    </ul>

    <p><strong>Impacto:</strong> Caching + CDN = aplicação 100-1000x mais rápida para usuários.</p>

    <h4>Load Balancing**</h4>

    <p><strong>O que é:** Distribuir requisições entre múltiplos servers.</p>

    <p><strong>Por quê:</strong></p>
    <ul>
      <li>1 server pode servir 1000 requisições/segundo. Sua app tem 10.000/segundo.</li>
      <li>Solução: 10 servers, load balancer distribui requisições</li>
    </ul>

    <p><strong>Algoritmos:**</strong></p>
    <ul>
      <li>Round-robin: Requisição 1 → Server A, Requisição 2 → Server B, etc.</li>
      <li>Least connections: Enviar para server com menos conexões ativas</li>
      <li>IP hash: Mesmo cliente sempre vai para mesmo server (session persistence)</li>
    </ul>

    <p><strong>Automático em nuvem:** Cloud load balancers lidam com isto (ELB em AWS, Load Balancer em Azure).</p>

    <h4>Disaster Recovery & High Availability**</h4>

    <p><strong>RTO (Recovery Time Objective):** Quanto tempo pode o sistema estar down antes de inaceitável? (30 minutos? 1 hora?)</p>

    <p><strong>RPO (Recovery Point Objective):** Quanto de dados pode perder? (nenhum? 1 hora?)</p>

    <p><strong>Padrões:**</strong></p>
    <ul>
      <li><strong>Active-Active:</strong> Múltiplas regiões rodam simultaneamente, traffic é balanceado. Falha: failover automático.</li>
      <li><strong>Active-Passive:</strong> Uma região ativa, outra backup. Falha: activate backup (minutos de downtime).</li>
      <li><strong>Multi-region replication:</strong> Dados replicados para múltiplos lugares automaticamente.</li>
    </ul>

    <p><strong>Em nuvem:** Fácil implementar — provedores oferecem managed replication, failover automático.</p>

    <blockquote class="example">
    <strong>📚 Caso Real: Netflix Architecture**</strong>
    Netflix roda em AWS multi-region:
    - Edge cache layer (CDN) distribui content globally
    - Microserviços em Kubernetes processam requests
    - NoSQL (DynamoDB) para escalabilidade
    - Multiple regions para disaster recovery
    - Auto-scaling: 100x durante peak hours

    Resultado: 200M+ users, <100ms latency global, 99.99% uptime.

    Isto é como nuvem moderno é designed.
    </blockquote>

    <p>Arquitetura em nuvem não é somente IaaS vs PaaS — é padrão design inteiro. Microserviços, containers, serverless, caching — tudo trabalha junto.</p>
    `,

      {

      }

    dur: '22 min',
    content: `
    <h3>Protegendo Dados e Aplicações em Ambiente Compartilhado</h3>
    <p>Nuvem é compartilhada — múltiplos clientes no mesmo data center. Segurança é colaboração entre você e provedor.</p>

    <h4>Shared Responsibility Model**</h4>

    <p><strong>Princípio:** Provedor e você têm responsabilidades diferentes.</p>

    <p><strong>Provedor responsável por:**</strong></p>
    <ul>
      <li>Segurança física data center (guardas, câmeras, etc.)</li>
      <li>Hardware segurança (não pode acessar seu hardware)</li>
      <li>Hypervisor segurança (VMs isoladas)</li>
      <li>Rede infrastructure</li>
    </ul>

    <p><strong>Você responsável por:**</strong></p>
    <ul>
      <li>Credenciais (passwords, keys) — não compartilhe!</li>
      <li>Data encryption (dados em repouso e em trânsito)</li>
      <li>Access control (quem pode acessar o quê)</li>
      <li>Vulnerability scanning (seu código, suas dependências)</li>
      <li>Patch OS, aplicações (para IaaS)</li>
      <li>Compliance (LGPD, GDPR — você assina)</li>
    </ul>

    <p><strong>Diferença por modelo:**</strong></p>
    <ul>
      <li><strong>IaaS:</strong> Você é responsável mais (gerencia OS, app). Provedor: infraestrutura.</li>
      <li><strong>PaaS:</strong> Compartilhado (provedor gerencia mais). Você: app, dados.</li>
      <li><strong>SaaS:</strong> Provedor responsável quase tudo. Você: dados, acesso.</li>
    </ul>

    <h4>Identity & Access Management (IAM)**</h4>

    <p><strong>Princípio: Least Privilege:**</strong> Cada pessoa/service tem apenas permissões absolutamente necessárias.</p>

    <p><strong>Exemplo AWS IAM:**</strong></p>
    <ul>
      <li>DevOps engineer: Pode gerenciar EC2, RDS, mas NOT ver dados sensíveis</li>
      <li>Data scientist: Pode ler S3 e BigQuery, mas NOT deletar</li>
      <li>Admin: Pode tudo (raramente dado)</li>
    </ul>

    <p><strong>Multi-Factor Authentication (MFA):**</strong> Mesmo se password vazou, sem MFA, hacker não consegue entrar.</p>

    <p><strong>Service Accounts:</strong> Aplicações não devem usar credenciais humanas. Use service accounts com permissões específicas.</p>

    <h4>Data Encryption**</h4>

    <p><strong>Encryption at Rest (dados armazenados):</strong></p>
    <ul>
      <li>Dados em database/storage são criptografados</li>
      <li>Se hacker consegue acessar drive, dados são gibberish</li>
      <li>AWS KMS, Azure Key Vault gerenciam chaves</li>
    </ul>

    <p><strong>Encryption in Transit (dados viajando):</strong></p>
    <ul>
      <li>Dados sendo enviados são criptografados (HTTPS, TLS)</li>
      <li>Mesmo em WiFi público, dados são seguros</li>
    </ul>

    <p><strong>Key Management:**</strong> Crítico. Chaves de criptografia devem ser seguras. Rodas chaves periodicamente.</p>

    <h4>Network Security**</h4>

    <p><strong>VPC (Virtual Private Cloud):**</strong> Sua própria rede isolada na nuvem.</p>

    <ul>
      <li>Subnets: Dividir VPC em partes (públicas para web servers, privadas para databases)</li>
      <li>Security Groups: Firewall rules (porta 22 SSH only from admin IP)</li>
      <li>VPN: Conectar on-premise para nuvem seguramente</li>
    </ul>

    <p><strong>DDoS Protection:</strong> Cloud provedores protegem contra DDoS automaticamente (AWS Shield, etc.).</p>

    <h4>Secrets Management**</h4>

    <p><strong>Problema:** Senhas, API keys, database credentials precisam ser armazenados em algum lugar.</p>

    <p><strong>Errado:**</strong> Hardcoded no código, git repository, config files.</p>

    <p><strong>Certo:</strong> Secrets manager (AWS Secrets Manager, Azure Key Vault, Google Secret Manager)</p>
    <ul>
      <li>Secrets armazenados criptografados</li>
      <li>Aplicação requisita secret at runtime</li>
      <li>Audit logs (quem acessou quando)</li>
      <li>Rotation automática</li>
    </ul>

    <h4>Compliance & Auditing**</h4>

    <p><strong>LGPD (Brasil):**</strong> Lei Geral Proteção Dados</p>
    <ul>
      <li>Consentimento antes coletar dados</li>
      <li>Direito a acesso, deletar dados pessoais</li>
      <li>Notificar se breach (72 horas)</li>
      <li>Multas: até 2% revenue ou R$50M</li>
    </ul>

    <p><strong>GDPR (Europa):</strong> Similar, mesmo rigorosa.</p>

    <p><strong>Compliance em Nuvem:**</strong> Provedores oferecem compliance certifications (SOC2, ISO27001, PCI-DSS). Verifique se provedor atende requisitos.</p>

    <p><strong>Auditing:</strong> Log tudo (CloudTrail em AWS). Quem acessou o quê quando.</p>

    <blockquote class="example">
    <strong>📚 Caso Real: Security Incident**</strong>
    Empresa armazenou database password em config file, commiteou para GitHub publicamente.

    Hacker encontrou, acessou database, extraiu dados clientes.

    LGPD breach: Obrigado notificar 100k clientes, multa potencial R$50M+.

    Lição: Use secrets manager, não hardcode credentials.
    </blockquote>

    <h4>Security Best Practices**</h4>

    <p><strong>1. Principle of Least Privilege**</strong></p>
    <p>Cada usuário/service: apenas permissões necessárias.</p>

    <p><strong>2. Enable MFA**</strong></p>
    <p>Tudo importante: email, cloud provider account, etc.</p>

    <p><strong>3. Encrypt Everything**</strong></p>
    <p>At rest e in transit. Padrão agora, não extra.</p>

    <p><strong>4. Regular Backups**</strong></p>
    <p>Offline ou geographically separate, protegido de ransomware.</p>

    <p><strong>5. Vulnerability Scanning**</strong></p>
    <p>Scan dependências regularmente (OWASP, snyk, etc.)</p>

    <p><strong>6. Logging & Monitoring**</strong></p>
    <p>Anomalias detectadas rapidamente.</p>

    <p><strong>7. Zero Trust**</strong></p>
    <p>Não assuma nada. Verificar tudo. Mesmo interno.</p>

    <h4>Shared Responsibility em Prática**</h4>

    <p><strong>Cenário: EC2 (IaaS) com database:**</strong></p>
    <ul>
      <li><strong>AWS Responsibility:</strong> Hardware secure, hypervisor secure, network infrastructure, data center physical security</li>
      <li><strong>Você Responsibility:</strong> EC2 instance patching, OS hardening, application security, database credentials, data encryption, access control, compliance</li>
    </ul>

    <p>Se database é hackeado porque seu app tem SQL injection: É sua culpa, não AWS.</p>

    <p><strong>Cenário: RDS (PaaS) database:**</strong></p>
    <ul>
      <li><strong>AWS Responsibility:</strong> Tudo acima MAIS database patching, backups, upgrades</li>
      <li><strong>Você Responsibility:</strong> Data encryption (você fornece chaves), access control, credentials management, compliance</li>
    </ul>

    <p>AWS gerencia mais, você gerencia menos. Trade-off: menos controle, menos responsabilidade.</p>

    <p>Compreender shared responsibility é crítico — você não consegue esconder atrás "provedor responsável".</p>
    `,

    content: `
    <h3>Evitando Surpresas de Billing: Como Gerenciar Custos em Nuvem</h3>
    <p>Nuvem é pay-as-you-go. Sem disciplina, billing pode crescer 10x ao longo de mês. Gerenciamento de custos é crítico.</p>

      <li><strong>Forgotten Resources:</strong> EC2 instance launched para teste, nunca terminado</li>
      <li><strong>Inefficient Queries:</strong> Database query que escaneia terabytes</li>

      <li><strong>Over-provisioning:</strong> VM maior que necessário</li>
      <li><strong>No Monitoring:</strong> Ninguém está olhando o billing</li>
    </ul>

    <h4>FinOps: Gestão Financeira de Cloud**</h4>

    <p><strong>O que é:</strong> Disciplina de gestão de custos em nuvem — entender gastos, otimizar, compartilhar responsabilidade com time técnico.</p>

    <p><strong>Princípios:**</strong></p>
    <ul>
      <li>Visibilidade (entender onde dinheiro vai)</li>
      <li>Accountability (cada team sabe seu custo)</li>
      <li>Optimization (reduzir custos desnecessários)</li>
      <li>Governance (policies prevenir overspend)</li>
    </ul>

    <p><strong>Roles:**</strong></p>
    <ul>
      <li>Finance: Budgeting, forecasting, vendor negotiations</li>
      <li>Engineering: Otimização, design para custo</li>
      <li>Product: Trade-offs funcionalidade vs. custo</li>
    </ul>

    <h4>Estratégias de Otimização**</h4>

    <p><strong>1. Right-Sizing**</strong></p>
    <p>Usar VM do tamanho correto. Não provisioner demais.</p>
    <ul>
      <li>Monitorar CPU/Memory/Disk usage</li>
      <li>Se t3.large roda em 10% CPU, reduzir para t3.small</li>
      <li>Economia: 3-5x em alguns casos</li>
    </ul>

    <p><strong>2. Reserved Instances**</strong></p>
    <p>Se você sabe que precisa de VM 24/7, reserve por 1-3 anos. Desconto: 40-70%.</p>
    <ul>
      <li>Trade-off: Menos flexibilidade, savings enormes</li>
      <li>Ideal para baseline consistent demand</li>
    </ul>

    <p><strong>3. Spot Instances**</strong></p>
    <p>Máquinas de "sobra" que ninguém está usando. AWS vende barato (70-80% desconto).</p>
    <ul>
      <li>Trade-off: Pode ser interrompida sem aviso</li>
      <li>Ideal para workloads flexíveis (batch processing, test environments)</li>
    </ul>

    <p><strong>4. Serverless vs. Compute**</strong></p>
    <ul>
      <li>Se aplicação roda 1 hora/dia: Lambda é 10x mais barato que EC2 sempre ligado</li>
      <li>Se aplicação roda 24/7: EC2 é mais barato</li>
      <li>Calcular break-even point</li>
    </ul>

    <p><strong>5. Data Transfer Optimization**</strong></p>
    <ul>
      <li>Dentro mesma região: free</li>
      <li>Entre regiões: R$0.10/GB (caro!)</li>
      <li>Solução: Coloque recursos na mesma região, use CDN para dados estáticos</li>
    </ul>

    <p><strong>6. Database Optimization**</strong></p>
    <ul>
      <li>Query optimization (índices, avoid full table scans)</li>
      <li>Autoscaling databases (RDS Aurora Auto Scaling)</li>
      <li>Read replicas para distribuir load</li>
    </ul>

    <p><strong>7. Storage Lifecycle**</strong></p>
    <ul>
      <li>Hot storage (S3 Standard): Imediato access</li>
      <li>Warm storage (S3 Infrequent Access): Dados raramente acessados, mais barato</li>
      <li>Cold storage (Glacier): Archival, backup, muito barato</li>
      <li>Automation: Dados > 30 dias → Infrequent, > 90 dias → Glacier</li>
    </ul>

    <h4>Monitoramento & Alertas**</h4>

    <p><strong>Ferramentas Nativas:**</strong></p>
    <ul>
      <li>AWS: Cost Explorer, Budgets, Trusted Advisor</li>
      <li>Azure: Cost Management, Budget Alerts</li>
      <li>GCP: Cost Management, Billing Reports</li>
    </ul>

    <p><strong>Ferramentas Third-Party:**</strong></p>
    <ul>
      <li>Cloudability, Nutanix Beam, CloudHealth (análise mais profunda)</li>
      <li>Fornecem insights sobre uso, otimizações recomendadas</li>
    </ul>

    <p><strong>Alertas Recomendados:**</strong></p>
    <ul>
      <li>Daily spend alert (se >2x média histórica)</li>
      <li>Resource alerts (orphaned volumes, unattached elastic IPs)</li>
      <li>Budget alerts (quando atingir threshold mensal)</li>
    </ul>

    <h4>Organizational Governance**</h4>

    <p><strong>Cost Allocation Tags:**</strong> Tag cada recurso com projeto/departamento/centro de custo.</p>
    <ul>
      <li>Resultado: Bill mostra custo por projeto</li>
      <li>Accountability: Cada team vê seu custo</li>
    </ul>

    <p><strong>Resource Quotas:**</strong> Limitar gastos por team.</p>
    <ul>
      <li>"Marketing team pode gastar máximo R$10k/mês"</li>
      <li>Evita runaway spending</li>
    </ul>

    <p><strong>Chargeback Models:**</strong></p>
    <ul>
      <li>Show-back: Mostrar custo, não cobrar (awareness)</li>
      <li>Chargeback: Cobrar departamento por seu uso (accountability)</li>
    </ul>

    <h4>Negociação com Provedores**</h4>

    <p><strong>Enterprise Discounts:**</strong> Volume negociação resulta em 20-40% discounts.</p>

    <p><strong>Requisitos:</strong></p>
    <ul>
      <li>Committed spend (mínimo R$100k/ano tipicamente)</li>
      <li>3-year terms</li>
    </ul>

    <p><strong>Quando negociar:**</strong> Quando seu spend é significante (>R$50k/mês).</p>

    <h4>Custo vs. Valor**</h4>

    <p><strong>Lembrete importante:** Custo baixo não é objetivo. Valor é.</p>

    <p>Se gastando R$100k/mês em nuvem mas gerando R$10M receita, é bargain.</p>

    <p>Se gastando R$1k/mês mas aplicação é lenta (customers deixam), é caro.</p>

    <p><strong>Balance:</strong> Otimize custos mas não sacrifique performance ou feature velocity.</p>

    <blockquote class="example">
    <strong>📚 Caso Real: FinOps Success**</strong>
    Empresa SaaS: Billing era R$500k/mês, sem controle.

    Implementou FinOps:
    1. Right-sizing: Reduceu excess VMs → -R$100k/mês
    2. Reserved instances: Committed para baseline → -R$50k/mês
    3. Database optimization: Queries otimizadas → -R$80k/mês
    4. Data transfer: Consolidou regiões → -R$20k/mês

    Resultado: R$250k/mês (-50%), sem impacto performance.

    Lição: Disciplina em FinOps tem ROI enorme.
    </blockquote>

    <p>Custo em nuvem não é "pague e forget". É disciplina contínua, mas payoff é imenso.</p>
    `,

    dur: '24 min',
    content: `
    <h3>Movendo On-Premise para Nuvem: Como Fazer Corretamente</h3>
    <p>Se você tem aplicações em on-premise (servidores próprios), eventualmente vai migrar para nuvem. É processo complexo mas crítico para modernizar.</p>

    <h4>Por Que Migrar**</h4>

    <p><strong>Drivers econômicos:**</strong></p>
    <ul>
      <li>Reduzir custo operacional (não pagar data center, TI staff grandes)</li>
      <li>Capital expenditure → operational expenditure (CapEx → OpEx)</li>
    </ul>

    <p><strong>Drivers técnicos:**</strong></p>
    <ul>
      <li>Escalar facilmente (novo app cresce, escala em minutos)</li>
      <li>Disaster recovery (replicação automática)</li>
      <li>Modernizar stack (usar novos serviços, languages)</li>
      <li>Agility (deploy mais rápido)</li>
    </ul>

    <p><strong>Timeline típica:**</strong> 1-3 anos para migração empresa inteira.</p>

    <h4>As 6 Rs da Migração**</h4>

    <p><strong>1. Rehost (Lift & Shift)**</strong></p>
    <p>Mover aplicação como está de on-premise para EC2.</p>
    <ul>
      <li>Mais rápido, menos risco</li>
      <li>Aproveita benefício cloud poucos (escalabilidade sim, modernização não)</li>
      <li>Típico para legacy apps que não pode reescrever</li>
    </ul>

    <p><strong>2. Replatform (Lift, Tinker & Shift)**</strong></p>
    <p>Mover app mas fazer pequenas otimizações.</p>
    <ul>
      <li>Exemplo: MySQL on-premise → RDS (managed)</li>
      <li>Aproveita alguns benefícios cloud</li>
      <li>Menos risco que rewriting, mais value que pure rehost</li>
    </ul>

    <p><strong>3. Refactor/Re-architect (Modernize)**</strong></p>
    <p>Reescrever app para cloud-native (microserviços, serverless, etc.).</p>
    <ul>
      <li>Máximo value, máxima effort</li>
      <li>Apropriado para app core que é gargalo</li>
    </ul>

    <p><strong>4. Repurchase (Replace)**</strong></p>
    <p>Ao invés de migrar app antiga, comprar SaaS.</p>
    <ul>
      <li>Exemplo: Sistema CRM on-premise → Salesforce</li>
      <li>Elimina custo manutenção, pega updated features</li>
      <li>Trade-off: Menos customizável</li>
    </ul>

    <p><strong>5. Retire**</strong></p>
    <p>Desligar app se não é mais necessário.</p>
    <ul>
      <li>30-40% das aplicações company não são core</li>
      <li>Eliminar economiza custo manutenção</li>
    </ul>

    <p><strong>6. Retain (Stay On-Premise)**</strong></p>
    <p>Deixar em on-premise se não faz sentido migrar.</p>
    <ul>
      <li>App com latency requisites de milissegundo</li>
      <li>App com compliance requirements específicas</li>
    </ul>

    <p><strong>Estratégia típica:</strong> Retire 10-15%, Repurchase 5-10%, Rehost 70% (rápido), Refactor 10-15% (core apps).</p>

    <h4>Fases da Migração**</h4>

    <p><strong>1. Assess (2-4 semanas)**</strong></p>
    <ul>
      <li>Inventário: Que aplicações você tem?</li>
      <li>Dependencies: Como elas se comunicam?</li>
      <li>Criticality: Qual é importante?</li>
      <li>Right-sizing: VM em on-premise → que tamanho EC2?</li>
      <li>Resultado: Migration wave plan (qual aplicação em qual ordem)</li>
    </ul>

    <p><strong>2. Plan (2-4 semanas)**</strong></p>
    <ul>
      <li>Infra design: VPC layout, security groups, databases</li>
      <li>Migration approach: Rehost/Replatform/Refactor?</li>
      <li>Timeline: Quando cada wave?</li>
      <li>Testing plan: Como validar depois migração?</li>
      <li>Rollback plan: Como voltar se falha?</li>
    </ul>

    <p><strong>3. Design (2-8 semanas)**</strong></p>
    <ul>
      <li>Target infra: Desenhar cloud architecture</li>
      <li>Security: IAM, network, encryption</li>
      <li>Disaster recovery: Replication, failover</li>
    </ul>

    <p><strong>4. Migrate (Variável)**</strong></p>
    <ul>
      <li>Típico: 2-4 semanas por application wave</li>
      <li>Tools: AWS DMS (Database Migration Service), DataSync, CloudEndure</li>
      <li>Approach: Paralelo (on-premise + nuvem rodando simultaneamente) vs. cutover (turn off on-premise, ativar nuvem)</li>
    </ul>

    <p><strong>5. Validate (1-4 semanas)**</strong></p>
    <ul>
      <li>Testing: Functional, performance, security</li>
      <li>Cutover: Mover users para nuvem</li>
      <li>Monitoring: Observar performance, issues</li>
    </ul>

    <p><strong>6. Optimize (Ongoing)**</strong></p>
    <ul>
      <li>Right-sizing: Ajustar VM sizes após ter dados reais</li>
      <li>Reserved instances: Comprometer para economizar</li>
      <li>Architectre: Refactor se necessário</li>
    </ul>

    <h4>Armadilhas Comuns**</h4>

    <p><strong>1. Underestimating Complexity**</strong></p>
    <p>Migração sempre mais complexo que esperado. Adicione buffer no timeline.</p>

    <p><strong>2. Ignorar Dependencies**</strong></p>
    <p>App A depende de App B. Se migrar A sem B, falha. Mapa dependencies antes.</p>

    <p><strong>3. Inadequate Testing**</strong></p>
    <p>Bugs que não foram detectados em on-premise aparecem em nuvem. Teste rigorosamente.</p>

    <p><strong>4. Poor Migration Tools**</strong></p>
    <p>Usar tools inapropriado (copy files manualmente em vez de CloudEndure). Use native cloud tools.</p>

    <p><strong>5. Neglecting Change Management**</strong></p>
    <p>Teams podem não estar preparadas para novo environment. Treinamento é crítico.</p>

    <h4>Tools & Partners**</h4>

    <p><strong>AWS Native Tools:**</strong></p>
    <ul>
      <li>DMS: Database migrations</li>
      <li>DataSync: Large data transfers</li>
      <li>Application Migration Service</li>
      <li>AWS MGN (recentemente)</li>
    </ul>

    <p><strong>Third-Party Tools:**</strong></p>
    <ul>
      <li>Zerto: Replication</li>
      <li>Carbonite: Disaster recovery</li>
      <li>Veeam: Backup & recovery</li>
    </ul>

    <p><strong>Migration Partners:**</strong> Firmas como Accenture, McKinsey, AWS Partners oferecem serviços migração (pagam comissão se você migra).</p>

    <blockquote class="example">
    <strong>📚 Caso Real: Bank Migration**</strong>
    Banco brasileiro migrou sistema de 2000+ servidores para AWS.

    Timeline: 2 anos
    Approach: Rehost (aplicações mainframe) + Refactor (sistemas core)

    Waves:
    - Wave 1 (meses 1-3): Non-critical apps (rehost)
    - Wave 2 (meses 4-10): Customer-facing (refactor for microservices)
    - Wave 3 (meses 11-24): Core systems (modernize with new architecture)

    Result:
    - Costs: -30% vs on-premise
    - Speed: Deploy 5x faster
    - Agility: Inovate 3x faster

    Crítico: Graduado, não overnight. Permitiu validar cada step.
    </blockquote>

    <p>Migração é não é uma vez e doneé — é jornada contínua de otimização. Comece com rehost (rápido), progresso para refactor (valor maior) conforme ganhar experiência.</p>
    `,

      <li>Tempo: 40-60 horas</li>
    </ul>

    <p><strong>Mês 6: Capstone & Portfolio**</strong></p>
    <ul>
      <li>Build real project (não toy project)</li>
      <li>GitHub repository com código, documentation</li>
      <li>Blog post ou video explaning architecture</li>
      <li>Objetivo: Portfolio que impressiona employers</li>
      <li>Tempo: 40-60 horas</li>
    </ul>

    <p><strong>Total: 300-400 horas (~50-65 horas/semana por 6 semanas ou 10-15 horas/semana por 6 meses)</strong></p>

    <h4>Certifications: Worth It?**</h4>

    <p><strong>Positivos:**</strong></p>
    <ul>
      <li>Resume boost (mostra competência)</li>
      <li>Learning structure (força aprender)</li>
      <li>Salário premium (certificados ganham 10-20% mais)</li>
    </ul>

    <p><strong>Negativos:**</strong></p>
    <ul>
      <li>Custo (R$200+ por exam)</li>
      <li>Expire (precisa renovar a cada 3 anos)</li>
      <li>Não substitui experiência prática</li>
    </ul>

    <p><strong>Meu recomendação:** Certificação é valor mas não é tudo. Portfolio é mais importante.</p>

    <h4>Project Ideas: Build Real Stuff**</h4>

    <p><strong>Beginner:**</strong></p>
    <ul>
      <li>Personal website/blog (S3 + CloudFront + Route53)</li>
      <li>Simple CRUD app (EC2 + RDS + security groups)</li>
    </ul>

    <p><strong>Intermediate:**</strong></p>
    <ul>
      <li>Scalable API (Lambda + API Gateway + DynamoDB)</li>
      <li>Image processing pipeline (S3 trigger + Lambda)</li>
      <li>Microservices app (ECS + Load Balancer)</li>
    </ul>

    <p><strong>Advanced:**</strong></p>
    <ul>
      <li>Multi-region failover architecture</li>
      <li>Infrastructure as Code (Terraform para infraestrutura complexa)</li>
      <li>Kubernetes cluster (EKS) with auto-scaling</li>
      <li>Data pipeline (EC2/Lambda → S3 → analytics)</li>
    </ul>

    <p><strong>Publish:** GitHub + demo/documentation. Employers veem código, não apenas certifications.</p>

    <h4>Getting First Job**</h4>

    <p><strong>Titles to Seek:**</strong></p>
    <ul>
      <li>Cloud Engineer</li>
      <li>DevOps Engineer</li>
      <li>Cloud Infrastructure Engineer</li>
      <li>Site Reliability Engineer (SRE)</li>
    </ul>

    <p><strong>Entry-Level Salário:</strong> R$100k-150k</p>

    <p><strong>Where to Find:**</strong></p>
    <ul>
      <li>LinkedIn Jobs (filter "Cloud Engineer")</li>
      <li>We Work Remotely (remote cloud jobs)</li>
      <li>Referrals (most effective)</li>
    </ul>

    <p><strong>What They Want:**</strong></p>
    <ul>
      <li>Certification (SAA minimum)</li>
      <li>Portfolio projects</li>
      <li>Hands-on experience (home labs contam!)</li>
      <li>Communication (não apenas tech skills)</li>
    </ul>

    <h4>Specializations: Pick a Direction**</h4>

    <p><strong>Cloud Architecture:**</strong> Design enterprise systems (highest paid, R$300k+).</p>

    <p><strong>DevOps/SRE:**</strong> Automation, CI/CD, infrastructure (R$200k-300k).</p>

    <p><strong>Security:**</strong> Cloud security, compliance (high demand, R$250k+).</p>

    <p><strong>Data/Analytics:**</strong> Data pipelines, BigQuery, Redshift (R$200k-350k).</p>

    <p><strong>Migration Specialist:**</strong> Help companies move on-prem → cloud (consultancy, R$300k-500k+).</p>

    <p>Cada especialização tem demanda diferente. Escolhe que alinha com seus interesses.</p>

    <h4>Continuous Learning**</h4>

    <p><strong>Cloud muda rápido. Você deve acompanhar:**</strong></p>
    <ul>
      <li>AWS This Week (AWS blog)</li>
      <li>Cert renewal (a cada 3 anos)</li>
      <li>New services (AWS lança ~1 novo serviço/dia)</li>
      <li>Industry trends (read tech news)</li>
    </ul>

    <p><strong>Timeline Carreira:**</strong></p>
    <ul>
      <li>Ano 1: Junior Cloud Engineer (R$100-150k)</li>
      <li>Ano 2-3: Mid-Level (R$150-250k)</li>
      <li>Ano 4+: Senior/Specialist (R$250-500k+)</li>
    </ul>

    <p>Crescimento é não-linear — salto maior quando muda companies ou ganha expertise especializada.</p>

    <h4>The Mindset**</h4>

    <p><strong>Cloud é não "memorize AWS services." É "entender principles" (scales, resilience, etc.) e apply to qualquer provider.**</p>

    <p><strong>Real expertise:</strong> Alguém que pode desenhar system que escala, seguro, cost-effective — não importa provedor.</p>

    <p><strong>Oportunidade imensa:** Cloud é melhor carreira path em tech em 2026. Demanda > oferta, salários altos, oportunidades globais.</p>

    <blockquote class="quote">
    <strong>Verdade Simples:</strong> "Alguém que aprender cloud bem pode conseguir job em qualquer empresa, qualquer país. Isto é poder."
    </blockquote>

    <p>Comece hoje. 6 meses de dedicação pode mudar sua carreira por próxima década.</p>
