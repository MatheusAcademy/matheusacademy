      {id:'ge_m7_t1',name:'Tendências Geopolíticas Emergentes',dur:30,free:false,content:`<h3>Tendências Geopolíticas Emergentes</h3><p>As tendências geopolíticas emergentes refletem as mudanças na distribuição de poder global e o surgimento de novos fatores influentes nas relações internacionais. Com a globalização e a interconectividade crescente, atores não estatais como corporações multinacionais e organizações não governamentais (ONGs) estão desempenhando papéis cada vez mais importantes.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Segundo o Pew Research Center, 71% das populações em economias avançadas acreditam que a influência de grandes corporações deve ser melhor regulada para evitar desigualdades.</div><p>O aumento da digitalização e a revolução tecnológica também estão transformando a dinâmica geopolítica. Questões de "cibersegurança" e soberania digital estão no topo da agenda internacional.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A geopolítica do século XXI será definida pela tecnologia."</strong><br><span style="font-size:0.85em;color:#888">— Henry Kissinger</span></blockquote><p>Além disso, as economias emergentes, especialmente na Ásia, estão ganhando maior protagonismo no cenário internacional. A China, por exemplo, está expandindo sua influência através da Iniciativa do Cinturão e Rota, desafiando a ordem mundial liderada pelo Ocidente.</p><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> A recente assinatura de acordos comerciais entre países asiáticos fortalece a posição da Ásia como um novo centro de poder econômico.</div><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A crescente influência das economias asiáticas, especialmente da China, está redefinindo a ordem econômica global.</div><p>Outro ponto crítico é a crescente importância das questões ambientais na geopolítica. A segurança energética, a escassez de recursos e as políticas climáticas são cada vez mais influentes nas decisões geopolíticas.</p><div style="background:rgba(91,127,255,.04);border:1px solid rgba(91,127,255,.1);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📌 Exemplo:</strong> A disputa pelo Ártico, rica em recursos naturais, destaca-se como um ponto de tensão entre as potências globais.</div><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A geopolítica moderna não pode ser dissociada das questões tecnológicas e ambientais.</blockquote><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Mantenha-se atualizado sobre as relações entre países emergentes e desenvolvidos para entender melhor as mudanças geopolíticas.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Atores não estatais e corporações têm influência crescente.<br>• A tecnologia está redefinindo a geopolítica.<br>• Economias asiáticas estão ganhando destaque no cenário global.</p></div>`,quiz:[{q:'Qual destas é uma tendência geopolítica emergente?',opts:['Aumento do poder dos pequenos estados','Crescente influência das corporações multinacionais','Redução das tensões comerciais','Descentralização tecnológica'],correct:1}],cards:[{q:'Qual é uma tendência geopolítica emergente importante?',a:'A crescente influência das corporações multinacionais.'},{q:'Como a tecnologia está afetando a geopolítica?',a:'Está redefinindo a dinâmica de poder global através da cibersegurança e soberania digital.'}]},
      {id:'ge_m7_t2',name:'Sustentabilidade e Geopolítica',dur:30,free:false,content:`<h3>Sustentabilidade e Geopolítica</h3><p>A sustentabilidade tornou-se uma questão central na geopolítica moderna, influenciando decisões políticas, econômicas e sociais em todo o mundo. A busca por fontes de energia renovável e a necessidade de mitigar os efeitos das mudanças climáticas estão moldando novas alianças e rivalidades entre nações.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A sustentabilidade está no cerne das novas dinâmicas geopolíticas, influenciando políticas energéticas e climáticas.</div><p>A transição para uma economia de baixo carbono está acelerando mudanças estruturais em setores como energia e transporte. Países que lideram essa transição, como Alemanha e China, estão posicionando-se como líderes em tecnologia limpa.</p><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">A sustentabilidade é uma prioridade apenas para países desenvolvidos.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">A sustentabilidade é uma preocupação global, afetando tanto países desenvolvidos quanto em desenvolvimento.</p></div></div><p>Além disso, a competição por recursos naturais escassos, como água e minerais essenciais para tecnologias verdes, pode intensificar conflitos geopolíticos.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A luta por recursos sustentáveis será a nova face dos conflitos geopolíticos."</strong><br><span style="font-size:0.85em;color:#888">— Jane Doe</span></blockquote><p>A cooperação internacional é crucial para enfrentar os desafios ambientais globais. Acordos como o Acordo de Paris são exemplos de esforços conjuntos para limitar o aquecimento global e promover práticas sustentáveis.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A falta de compromisso de algumas nações com acordos climáticos pode prejudicar a eficácia das iniciativas sustentáveis.</div><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A sustentabilidade é uma prioridade global que molda a política internacional.</blockquote><p>Portanto, a sustentabilidade não só influencia a política interna dos países, mas também suas relações externas, definindo novas agendas de cooperação e conflito.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Sustentabilidade é central na geopolítica atual.<br>• Transição para economia de baixo carbono é crucial.<br>• Cooperação internacional é essencial para enfrentar desafios ambientais.</p></div>`,quiz:[{q:'O que é essencial na geopolítica da sustentabilidade?',opts:['Competição por recursos fósseis','Acordos internacionais de cooperação climática','Expansão de indústrias poluentes','Isolamento econômico dos países'],correct:1}],cards:[{q:'Por que a sustentabilidade é importante na geopolítica?',a:'Influencia políticas energéticas e define novas alianças internacionais.'},{q:'Qual é o papel da cooperação internacional na sustentabilidade?',a:'Criar acordos para enfrentar desafios ambientais e limitar o aquecimento global.'}]},
      {id:'ge_m7_t3',name:'O Impacto das Mudanças Climáticas nas Relações Internacionais',dur:30,free:false,content:`<h3>O Impacto das Mudanças Climáticas nas Relações Internacionais</h3><p>As mudanças climáticas representam uma das maiores ameaças para a estabilidade global, influenciando diretamente as relações internacionais. O aumento das temperaturas, a elevação do nível do mar e eventos climáticos extremos estão causando migrações em massa e acirrando disputas por recursos.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Ignorar os impactos das mudanças climáticas nas políticas internacionais pode levar a crises humanitárias e conflitos.</div><p>O conceito de "segurança climática" está emergindo como um aspecto crítico nas agendas de segurança nacional e internacional. Países vulneráveis a desastres climáticos estão buscando mais assistência e cooperação internacional para lidar com esses desafios.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> De acordo com a ONU, cerca de 25 milhões de pessoas podem se tornar "refugiados climáticos" até 2050, devido a eventos extremos.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A mudança climática é um multiplicador de ameaças."</strong><br><span style="font-size:0.85em;color:#888">— Ban Ki-moon</span></blockquote><p>Além disso, as mudanças climáticas estão forçando países a reavaliarem suas estratégias militares e de defesa. A proteção de infraestruturas críticas, como usinas de energia e rotas de navegação, contra desastres naturais é cada vez mais prioritária.</p><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Recentemente, vários países do Pacífico têm buscado assistência internacional para lidar com a subida do nível do mar que ameaça sua existência.</div><p>A diplomacia climática está se tornando um campo de negociação vital, onde países discutem responsabilidades compartilhadas e financiamento para ações climáticas. Este tipo de diplomacia pode tanto unir quanto dividir nações, dependendo de suas abordagens e interesses.</p><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">Mudanças climáticas não afetam a segurança nacional dos países.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">Mudanças climáticas são um fator crítico na segurança nacional e internacional.</p></div></div><p>Portanto, as mudanças climáticas são um fator determinante nas relações internacionais, com impactos significativos na segurança, economia e política global.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Mudanças climáticas impactam diretamente a estabilidade global.<br>• "Segurança climática" é uma nova prioridade em agendas internacionais.<br>• Diplomacia climática é essencial para a cooperação global.</p></div>`,quiz:[{q:'Como as mudanças climáticas afetam as relações internacionais?',opts:['Promovendo o isolamento dos países','Aumentando a cooperação internacional','Reduzindo a necessidade de acordos globais','Facilitando disputas territoriais'],correct:1}],cards:[{q:'O que é segurança climática?',a:'Uma abordagem que integra as mudanças climáticas nas agendas de segurança nacional e internacional.'},{q:'Qual é a importância da diplomacia climática?',a:'Facilitar negociações e cooperação entre países para lidar com os desafios climáticos globais.'}]}
    ],quizFinal:[{q:'Qual é uma característica das tendências geopolíticas emergentes?',opts:['Diminuição do papel das tecnologias','Redução da influência das corporações multinacionais','Crescente importância das economias asiáticas','Menor atenção à cibersegurança'],correct:2},{q:'Por que a sustentabilidade é importante na geopolítica?',opts:['Apenas afeta países desenvolvidos','Não influencia políticas internacionais','Define novas alianças globais','É irrelevante para a economia de baixo carbono'],correct:2},{q:'Como as mudanças climáticas impactam a segurança nacional?',opts:['Não afetam a segurança','São um multiplicador de ameaças','Facilitam a resolução de conflitos','Reduzem a necessidade de cooperação'],correct:1}]}
