<script>
var COURSE={id:'geopol',name:'Geopolítica - Tudo que Voce Precisa Saber',shortName:'Geopolítica Completa',cat:'Geopolítica',desc:'Explore a dinâmica complexa das relações internacionais com o curso \'Geopolítica - Tudo que Voce Precisa Saber\', que oferece uma jornada do básico ao avançado, cobrindo conceitos centrais, regiões estratégicas e conflitos globais. Descubra como a geopolítica influencia decisões políticas, econômicas e sociais ao redor do mundo.',salt:'GEOPOL_HENRY_2026_MASTER',ak:'geopol_auth',courseKey:'geopol',prefix:'ge_',color:'#2E8B57',glow:'0 0 30px #2E8B5740',free:'ge_m1_t1',freeModules:[0],modules:7,topics:21,hours:40,quizzes:42};

var MODS=[
  {id:'ge_m1',name:'Introdução à Geopolítica',free:true,topics:[
      {id:'ge_m1_t1',name:'Conceitos Fundamentais de Geopolítica',dur:min,free:true,content:`<h3>Conceitos Fundamentais de Geopolítica</h3><p>Geopolítica é o estudo da influência de fatores geográficos, econômicos, culturais e políticos sobre a política internacional e as relações entre nações. Este campo analisa como esses fatores moldam o poder e a estratégia dos países em nível global.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> O termo 'geopolítica' foi popularizado no início do século XX pelo geógrafo sueco Rudolf Kjellén.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"Geopolítica é a arte de compreender e prever os acontecimentos no cenário global."</strong><br><span style="font-size:0.85em;color:#888">— Professor HOC</span></blockquote><p>Os principais termos-chave da geopolítica incluem 'poder', 'estratégia', 'interesses nacionais' e 'dinâmica regional'. Esses termos são essenciais para entender como os estados interagem e competem entre si.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A geopolítica não é apenas sobre o que acontece, mas sobre por que acontece e quem são os principais atores envolvidos.</blockquote><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A geopolítica foca na interconexão entre geografia e poder.</div><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Não confunda geopolítica com política internacional. A geopolítica abrange um espectro mais amplo de fatores além da política.</div><p>Para entender a geopolítica, é crucial analisar o contexto histórico e as correntes econômicas e culturais que influenciam os países. Alguns dos métodos utilizados incluem a análise de mapas e o estudo das políticas externas.</p><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Estude as relações passadas entre países para compreender suas interações presentes e futuras.</div><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> As tensões geopolíticas entre os EUA e a China continuam a moldar a política global, influenciando mercados e alianças.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Geopolítica estuda a influência de fatores geográficos e políticos.<br>• Termos-chave incluem poder, estratégia e dinâmica regional.<br>• Compreender o contexto histórico é essencial.</p></div>`,quiz:[{q:'Qual termo foi popularizado por Rudolf Kjellén no início do século XX?',opts:['Geopolítica','Antropologia','Sociologia','Cartografia'],correct:0}],cards:[{q:'O que a geopolítica estuda?',a:'A influência de fatores geográficos, econômicos, culturais e políticos sobre a política internacional.'},{q:'Qual é um dos principais objetivos da geopolítica?',a:'Compreender e prever eventos no cenário global.'}]},
      {id:'ge_m1_t2',name:'História e Evolução da Geopolítica',dur:min,free:false,content:`<h3>História e Evolução da Geopolítica</h3><p>A geopolítica como disciplina tem suas raízes na geografia política do século XIX, mas seu desenvolvimento mais significativo ocorreu no século XX, com o aumento das tensões internacionais e a necessidade de estratégias globais.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> O termo 'geopolítica' foi usado pela primeira vez em 1899 por Rudolf Kjellén, um geógrafo sueco.</div><p>Durante a Primeira e a Segunda Guerra Mundial, a geopolítica ganhou destaque como uma ferramenta essencial para entender as estratégias militares e políticas das nações.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A geopolítica é uma lente através da qual podemos ver o mundo em termos de poder e espaço."</strong><br><span style="font-size:0.85em;color:#888">— Orlando Castro</span></blockquote><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A evolução da geopolítica está intimamente ligada aos eventos históricos mundiais.</div><p>No pós-guerra, a geopolítica se expandiu para incluir não apenas questões militares, mas também econômicas e ambientais. A Guerra Fria foi um período particularmente importante para a geopolítica, com a divisão do mundo em blocos de poder liderados pelos EUA e pela União Soviética.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Não limite a geopolítica apenas a conflitos armados; ela abrange também economias e recursos naturais.</div><p>Com o avanço da globalização, a geopolítica contemporânea lida com questões complexas como terrorismo, mudanças climáticas e interdependência econômica.</p><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> A ascensão da China como superpotência econômica está redefinindo o cenário geopolítico mundial.</div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Analise eventos históricos para prever tendências geopolíticas futuras.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A geopolítica evoluiu com as guerras mundiais e a Guerra Fria.<br>• Atualmente, abrange questões além de conflitos, como economia e meio ambiente.<br>• A globalização trouxe novos desafios geopolíticos.</p></div>`,quiz:[{q:'Qual evento histórico ampliou significativamente o uso da geopolítica?',opts:['Revolução Francesa','Primeira Guerra Mundial','Guerra do Vietnã','Queda de Constantinopla'],correct:1}],cards:[{q:'Como a geopolítica se expandiu no pós-guerra?',a:'Incluiu questões econômicas e ambientais, além de militares.'},{q:'Qual período foi crucial para a geopolítica devido à divisão mundial em blocos?',a:'A Guerra Fria.'}]},
      {id:'ge_m1_t3',name:'Metodologias de Análise Geopolítica',dur:min,free:false,content:`<h3>Metodologias de Análise Geopolítica</h3><p>A análise geopolítica envolve uma variedade de metodologias que ajudam a interpretar as relações internacionais e prever conflitos potenciais. Essas metodologias incluem análise de mapas, estudos históricos, e avaliação de recursos naturais.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A análise de mapas é uma ferramenta essencial para entender a distribuição de poder e influência geopolítica.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"Os mapas são a linguagem da geopolítica."</strong><br><span style="font-size:0.85em;color:#888">— Geopolítica Mundial</span></blockquote><p>Além disso, as metodologias geopolíticas utilizam estudos sobre política externa dos países, análises econômicas e a consideração de fatores culturais.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> Metodologias geopolíticas ajudam a antecipar mudanças no equilíbrio de poder global.</div><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Não subestime o impacto dos fatores culturais na geopolítica; eles são cruciais para a análise completa.</div><p>Os analistas geopolíticos também consideram cenários futuros, testando hipóteses sobre possíveis resultados de eventos internacionais. Essa abordagem prospectiva é essencial em um mundo em rápida mudança.</p><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> A utilização de inteligência artificial em análise geopolítica está crescendo, auxiliando na previsão de conflitos e tendências.</div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Utilize uma combinação de metodologias para uma análise geopolítica mais robusta e abrangente.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A análise geopolítica utiliza mapas, história e recursos naturais.<br>• Fatores culturais são cruciais na análise geopolítica.<br>• Cenários futuros são considerados para prever mudanças globais.</p></div>`,quiz:[{q:'Qual ferramenta é essencial para entender a distribuição de poder geopolítico?',opts:['Textos históricos','Análise de mapas','Relatórios econômicos','Estudos culturais'],correct:1}],cards:[{q:'O que a metodologia geopolítica considera para prever conflitos?',a:'Mapas, história, recursos naturais, e fatores culturais.'},{q:'Por que os cenários futuros são importantes na geopolítica?',a:'Para antecipar mudanças no equilíbrio de poder global.'}]}
    ],quizFinal:[{q:'O que a geopolítica analisa?',opts:['A posição geográfica de países','A influência de fatores geográficos sobre a política','A história da geografia','A economia global'],correct:1},{q:'Qual período foi crucial para a geopolítica devido à divisão mundial em blocos?',opts:['Idade Média','Guerra Fria','Renascimento','Revolução Industrial'],correct:1},{q:'Qual é uma ferramenta essencial para a análise geopolítica?',opts:['Estudos literários','Análises de mapas','Música clássica','Dança contemporânea'],correct:1}]},
  {id:'ge_m2',name:'Geopolítica Regional',free:false,topics:[
      {id:'ge_m2_t1',name:'Geopolítica da América do Sul',dur:30,free:false,content:`<h3>Geopolítica da América do Sul</h3><p>A América do Sul é uma região rica em recursos naturais e possui uma diversidade cultural e política que influencia sua geopolítica. Os países desta região enfrentam desafios como desigualdade social, corrupção e instabilidade política, que afetam suas relações internacionais e desenvolvimento econômico.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A integração regional, através de organizações como o Mercosul e a Unasul, é um esforço para fortalecer a cooperação econômica e política na América do Sul.</div><p>Além disso, a influência de potências globais, como os Estados Unidos e a China, tem um impacto significativo na política externa dos países sul-americanos. A região é um campo de disputas econômicas e ideológicas, onde a presença de bases militares estrangeiras, acordos comerciais e investimentos são temas centrais.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A América do Sul é uma região onde a geopolítica é marcada tanto pela cooperação quanto pela competição entre seus estados."</strong><br><span style="font-size:0.85em;color:#888">— Orlando Castro</span></blockquote><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Segundo a CEPAL, a América Latina e o Caribe viram uma queda de 7% no PIB em 2020 devido à pandemia de COVID-19.</div><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A percepção de corrupção e a instabilidade política em países como Venezuela e Brasil podem desincentivar investimentos estrangeiros.</div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Estudar as dinâmicas internas de cada país da América do Sul ajuda a entender melhor suas relações externas e políticas regionais.</div><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A riqueza de recursos naturais na América do Sul é tanto uma bênção quanto um desafio geopolítico.</blockquote><p>Um exemplo claro de tensão geopolítica na região é a disputa territorial entre Argentina e Reino Unido pelas Ilhas Malvinas, que envolve questões de soberania e controle de recursos.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A América do Sul enfrenta desafios de desigualdade e corrupção.<br>• A influência de potências globais é significativa na região.<br>• Integração regional é chave para o desenvolvimento econômico.</p></div>`,quiz:[{q:'Qual organização busca a integração econômica na América do Sul?',opts:['Mercosul','OTAN','União Europeia','ASEAN'],correct:0}],cards:[{q:'Qual é um dos principais desafios geopolíticos da América do Sul?',a:'Desigualdade social e instabilidade política.'},{q:'Que países têm influência significativa na América do Sul?',a:'Estados Unidos e China.'}]},
      {id:'ge_m2_t2',name:'Geopolítica do Oriente Médio',dur:30,free:false,content:`<h3>Geopolítica do Oriente Médio</h3><p>O Oriente Médio é uma região de grande importância geopolítica devido à sua localização estratégica e vastas reservas de petróleo. A geopolítica da região é caracterizada por conflitos históricos, rivalidades sectárias e influências externas.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> O conflito entre sunitas e xiitas é uma das principais fontes de tensão no Oriente Médio, afetando a política regional e global.</div><p>Além disso, a presença de potências globais como os Estados Unidos e a Rússia, que possuem interesses econômicos e estratégicos na região, complica ainda mais o cenário geopolítico. O conflito israelo-palestino e a guerra civil na Síria são exemplos de como as tensões locais podem ter repercussões globais.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"O Oriente Médio é uma região onde a geopolítica é moldada por uma complexa rede de alianças e rivalidades."</strong><br><span style="font-size:0.85em;color:#888">— Professor HOC</span></blockquote><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> As percepções externas sobre o Oriente Médio muitas vezes simplificam conflitos complexos, negligenciando fatores históricos e culturais.</div><p>A Primavera Árabe, que começou em 2010, foi um movimento significativo que alterou a paisagem política de muitos países do Oriente Médio, levando a mudanças de regime e intensificação de conflitos.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A estabilidade do Oriente Médio tem implicações diretas na economia global devido à dependência do petróleo.</blockquote><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Compreender as nuances religiosas e culturais ajuda a analisar melhor os conflitos e alianças no Oriente Médio.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• O Oriente Médio é crucial devido ao petróleo e localização estratégica.<br>• Conflitos sectários e influências externas complicam a geopolítica.<br>• Movimentos como a Primavera Árabe alteraram a política regional.</p></div>`,quiz:[{q:'Qual é uma das principais fontes de tensão no Oriente Médio?',opts:['Conflito sunita-xiita','Guerra Fria','Aquecimento global','Comércio eletrônico'],correct:0}],cards:[{q:'Por que a geopolítica do Oriente Médio é importante?',a:'Devido ao petróleo e localização estratégica.'},{q:'Quais potências têm interesses no Oriente Médio?',a:'Estados Unidos e Rússia.'}]},
      {id:'ge_m2_t3',name:'Geopolítica da Ásia-Pacífico',dur:30,free:false,content:`<h3>Geopolítica da Ásia-Pacífico</h3><p>A região da Ásia-Pacífico é uma das mais dinâmicas e influentes no cenário global, englobando potências econômicas como China, Japão e Coreia do Sul. Esta área é caracterizada por um rápido crescimento econômico e uma complexa rede de relações diplomáticas e comerciais.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A ascensão da China como superpotência regional está mudando o equilíbrio de poder na Ásia-Pacífico.</div><p>As disputas territoriais no Mar do Sul da China e a questão da península coreana são desafios significativos para a estabilidade regional. O papel dos Estados Unidos na Ásia-Pacífico, como um contrapeso à influência chinesa, adiciona uma camada de complexidade às relações internacionais na região.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A Ásia-Pacífico é um palco onde o futuro geopolítico do mundo está sendo moldado."</strong><br><span style="font-size:0.85em;color:#888">— Geopolítica Mundial</span></blockquote><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A Ásia-Pacífico representa cerca de 60% do PIB mundial, destacando sua importância econômica.</div><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A rivalidade entre China e EUA pode levar a tensões militares e comerciais na região.</div><p>A Iniciativa do Cinturão e Rota da China é um exemplo de como o país está expandindo sua influência através de investimentos em infraestrutura e comércio nos países da Ásia-Pacífico.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A Ásia-Pacífico é fundamental para o comércio global e a inovação tecnológica.</blockquote><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Acompanhar as políticas externas da China e dos EUA ajuda a entender as tendências geopolíticas na Ásia-Pacífico.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A Ásia-Pacífico é crucial para a economia global.<br>• A ascensão da China está mudando o equilíbrio de poder.<br>• As relações entre China e EUA são centrais para a estabilidade regional.</p></div>`,quiz:[{q:'Qual país está mudando o equilíbrio de poder na Ásia-Pacífico?',opts:['Japão','Índia','China','Austrália'],correct:2}],cards:[{q:'Por que a Ásia-Pacífico é importante globalmente?',a:'Devido ao seu peso econômico e influência política.'},{q:'Quais são os desafios geopolíticos da Ásia-Pacífico?',a:'Disputas territoriais e rivalidade China-EUA.'}]}
    ],quizFinal:[{q:'Qual é uma característica comum entre as regiões da América do Sul, Oriente Médio e Ásia-Pacífico?',opts:['Presença de potências regionais','Homogeneidade cultural','Falta de recursos naturais','Isolamento geográfico'],correct:0},{q:'O que é um fator comum de instabilidade no Oriente Médio e na Ásia-Pacífico?',opts:['Desigualdade econômica','Conflitos territoriais','Epidemias','Crise ambiental'],correct:1},{q:'Qual fator é central para a geopolítica da América do Sul?',opts:['Petroleo','Integração regional','Intervenção russa','Monarquia'],correct:1}]},
  {id:'ge_m3',name:'Poderes Globais e Relações Internacionais',free:false,topics:[
      {id:'ge_m3_t1',name:'EUA e a Nova Ordem Mundial',dur:15,free:false,content:`<h3>EUA e a Nova Ordem Mundial</h3><p>Após o fim da Guerra Fria, os Estados Unidos emergiram como a única superpotência global, moldando a chamada "Nova Ordem Mundial". Este conceito refere-se a um sistema internacional caracterizado pela predominância dos EUA em diversas esferas, incluindo econômica, militar e cultural.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Os EUA representam cerca de 24% do PIB mundial, destacando seu poderio econômico. Fonte: Fundo Monetário Internacional.</div><p>O poder militar dos EUA é um dos pilares da sua influência global. Com bases militares espalhadas por todos os continentes e um orçamento de defesa que ultrapassa o de muitos países combinados, os Estados Unidos conseguem projetar poder em qualquer região do globo.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A hegemonia dos EUA é sustentada por sua capacidade de intervenção global."</strong><br><span style="font-size:0.85em;color:#888">— Analista de Defesa</span></blockquote><p>Além disso, a cultura americana, através de sua indústria de entretenimento, tecnologia e educação, exerce um "soft power" significativo, influenciando valores e comportamentos ao redor do mundo.</p><div style="background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A estratégia dos EUA na Nova Ordem Mundial é baseada na combinação de poder militar, econômico e cultural.</div><h4>Desafios e Críticas</h4><p>Apesar de sua proeminência, os EUA enfrentam desafios significativos, tanto internos quanto externos. Internamente, questões como desigualdade econômica e tensões sociais podem afetar sua estabilidade. Externamente, a ascensão de potências como a China e a Rússia desafia a hegemonia americana.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 "A ascensão de novas potências está redefinindo o equilíbrio de poder global."</blockquote><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Subestimar a importância de alianças internacionais pode enfraquecer a posição global dos EUA.</div><p>O papel dos EUA em conflitos internacionais, como no Oriente Médio, também gera críticas e levanta questões sobre os limites do intervencionismo.</p><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Mudanças na política externa americana sob novas administrações têm gerado incertezas sobre seu papel futuro no cenário internacional.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A dominância dos EUA na Nova Ordem Mundial é multifacetada, combinando poder militar, econômico e cultural.<br>• Desafios internos e externos ameaçam a hegemonia americana.<br>• A política externa dos EUA continua a ser um ponto de debate e análise global.</p></div>`,quiz:[{q:'Qual é uma característica central da Nova Ordem Mundial liderada pelos EUA?',opts:['A predominância militar dos EUA','A neutralidade política global','O isolamento econômico','A desmilitarização global'],correct:0}],cards:[{q:'O que é a Nova Ordem Mundial?',a:'É um sistema internacional caracterizado pela predominância dos EUA após a Guerra Fria.'},{q:'Como os EUA exercem seu \'soft power\'?',a:'Através da cultura, tecnologia e educação, influenciando valores globalmente.'}]},
      {id:'ge_m3_t2',name:'A União Europeia e suas Influências',dur:15,free:false,content:`<h3>A União Europeia e suas Influências</h3><p>A União Europeia (UE) é uma das mais significativas entidades políticas e econômicas do mundo, composta por 27 países membros. Desde sua formação, a UE tem sido um exemplo de integração regional, promovendo a paz, a estabilidade e a prosperidade econômica na Europa.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A UE representa cerca de 15% do PIB mundial. Fonte: Banco Mundial.</div><p>O euro, moeda comum da maioria dos países da UE, é uma das moedas mais negociadas no mundo, simbolizando a força econômica do bloco. Além disso, a UE é um dos principais atores no comércio internacional, estabelecendo acordos comerciais com várias nações.</p><div style="background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A UE é um exemplo de integração regional que influencia globalmente na economia e na política.</div><p>No campo político, a UE promove valores como democracia, direitos humanos e estado de direito, influenciando políticas internas e externas de seus membros.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A União Europeia é um modelo de integração que inspira outras regiões."</strong><br><span style="font-size:0.85em;color:#888">— Especialista em Relações Internacionais</span></blockquote><h4>Desafios Internos e Externos</h4><p>Apesar de suas conquistas, a UE enfrenta desafios consideráveis. Internamente, questões como o Brexit e a crise migratória têm testado a coesão do bloco. Externamente, as tensões comerciais com grandes potências, como os EUA e a China, desafiam sua posição no comércio global.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A saída do Reino Unido da UE (Brexit) é um exemplo de como tensões internas podem impactar a união.</div><p>A política externa da UE também é constantemente desafiada por conflitos nas suas fronteiras, como os problemas na Ucrânia e no Oriente Médio.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 "A capacidade da UE de lidar com crises internas determina sua força externa."</blockquote><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Recentes sanções econômicas da UE contra a Rússia destacam seu papel ativo em geopolitica.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A UE é um modelo de integração regional com forte influência global.<br>• Desafios como o Brexit testam sua coesão interna.<br>• A política externa da UE é ativa, mas enfrenta tensões globais.</p></div>`,quiz:[{q:'Qual é um dos principais desafios internos enfrentados pela UE?',opts:['Adoção do euro por todos os membros','Brexit','Desenvolvimento de uma moeda digital','Expansão para a Ásia'],correct:1}],cards:[{q:'O que simboliza o euro dentro da UE?',a:'Simboliza a força econômica e a integração dos países membros.'},{q:'Como a UE influencia globalmente?',a:'Através de sua política de comércio, valores democráticos e acordos internacionais.'}]},
      {id:'ge_m3_t3',name:'Ascensão da China e o Equilíbrio Global',dur:15,free:false,content:`<h3>Ascensão da China e o Equilíbrio Global</h3><p>Nas últimas décadas, a China tem se destacado como uma potência emergente na arena global, transformando o equilíbrio de poder internacional. Este crescimento é impulsionado por sua economia robusta, avanços tecnológicos e uma estratégia geopolítica assertiva.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A China é a segunda maior economia do mundo, contribuindo com aproximadamente 16% do PIB global. Fonte: Banco Mundial.</div><p>O projeto "Belt and Road Initiative" (BRI) é uma das principais estratégias da China para expandir sua influência global, conectando a Ásia, Europa e África através de comércio e infraestrutura.</p><div style="background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A BRI é um exemplo de como a China utiliza o investimento em infraestrutura para aumentar sua influência global.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A ascensão da China está transformando o cenário global."</strong><br><span style="font-size:0.85em;color:#888">— Especialista em Geopolítica Asiática</span></blockquote><p>No entanto, o crescimento da China também traz desafios. Tensões comerciais com os EUA, disputas territoriais no Mar do Sul da China e questões relacionadas aos direitos humanos são algumas das preocupações internacionais.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A abordagem assertiva da China em disputas territoriais pode gerar conflitos regionais.</div><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Recentes sanções e tarifas entre China e EUA destacam a tensão comercial contínua.</div><p>Além disso, a China está investindo pesadamente em tecnologia, buscando liderança em áreas como inteligência artificial e energias renováveis, desafiando a liderança tecnológica ocidental.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A China é uma potência emergente com crescente influência global.<br>• O projeto BRI é central para sua estratégia de expansão.<br>• Tensões comerciais e disputas territoriais são desafios significativos.</p></div>`,quiz:[{q:'Qual é uma das estratégias da China para aumentar sua influência global?',opts:['Expansão militar','Belt and Road Initiative','Isolamento econômico','Alianças com a OTAN'],correct:1}],cards:[{q:'O que é o Belt and Road Initiative?',a:'É um projeto da China para conectar a Ásia, Europa e África através de infraestrutura e comércio.'},{q:'Quais são alguns desafios enfrentados pela China?',a:'Tensões comerciais com os EUA, disputas territoriais e questões de direitos humanos.'}]}
    ],quizFinal:[{q:'Qual é uma característica central da Nova Ordem Mundial liderada pelos EUA?',opts:['A predominância militar dos EUA','A neutralidade política global','O isolamento econômico','A desmilitarização global'],correct:0},{q:'Qual é um dos principais desafios internos enfrentados pela UE?',opts:['Adoção do euro por todos os membros','Brexit','Desenvolvimento de uma moeda digital','Expansão para a Ásia'],correct:1},{q:'Qual é uma das estratégias da China para aumentar sua influência global?',opts:['Expansão militar','Belt and Road Initiative','Isolamento econômico','Alianças com a OTAN'],correct:1}]},
  {id:'ge_m4',name:'Recursos Naturais e Conflitos',free:false,topics:[
      {id:'ge_m4_t1',name:'Energia e Geopolítica: Petróleo e Gás',dur:30,free:false,content:`<h3>1. Energia e Geopolítica: Petróleo e Gás</h3><p>O petróleo e o gás natural desempenham um papel central na geopolítica mundial. Desde a Revolução Industrial, essas fontes de energia tornaram-se fundamentais para o desenvolvimento econômico e estratégico dos países. O controle sobre essas reservas não é apenas uma questão econômica, mas também de poder geopolítico.</p><p>As nações com vastas reservas de petróleo e gás, como Arábia Saudita, Rússia e Estados Unidos, têm uma influência significativa nas relações internacionais. A Organização dos Países Exportadores de Petróleo (OPEP) é um exemplo de como esses recursos podem ser usados para influenciar o mercado global e, por extensão, a política internacional.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 O petróleo é frequentemente chamado de "ouro negro" devido ao seu valor estratégico e econômico.</blockquote><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> O controle de recursos energéticos como petróleo e gás é um fator determinante no poder geopolítico de uma nação.</div><p>Além disso, as rotas de transporte de petróleo e gás são de importância crítica. O Estreito de Ormuz, por exemplo, é uma rota marítima estratégica por onde passa cerca de 20% do petróleo comercializado globalmente.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"O petróleo é a moeda universal da diplomacia internacional."</strong><br><span style="font-size:0.85em;color:#888">— Autor Desconhecido</span></blockquote><p>Conflitos armados e tensões políticas frequentemente têm o petróleo como um dos fatores subjacentes. A Guerra do Golfo, por exemplo, foi em grande parte motivada pelo controle das vastas reservas de petróleo do Kuwait.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> É um erro comum subestimar a importância das rotas de transporte de petróleo nas estratégias geopolíticas.</div><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Segundo a Agência Internacional de Energia, em 2021, a produção global de petróleo foi de aproximadamente 88 milhões de barris por dia.</div><p>Os avanços tecnológicos, como a exploração de gás de xisto e energias renováveis, estão gradualmente mudando o cenário energético mundial, mas o petróleo e o gás ainda dominam o panorama geopolítico.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• O petróleo e o gás têm um impacto significativo na geopolítica global.<br>• A OPEP é um ator chave no controle do mercado de petróleo.<br>• Conflitos armados muitas vezes envolvem o controle de recursos energéticos.</p></div>`,quiz:[{q:'Qual é o principal fator que torna o petróleo um recurso de importância geopolítica?',opts:['Sua abundância','Seu valor econômico','Seu impacto ambiental','Sua localização'],correct:1}],cards:[{q:'Qual a importância do Estreito de Ormuz na geopolítica do petróleo?',a:'É uma rota estratégica por onde passa cerca de 20% do petróleo comercializado globalmente.'},{q:'O que é a OPEP?',a:'Organização dos Países Exportadores de Petróleo, que influencia o mercado global de petróleo.'}]},
      {id:'ge_m4_t2',name:'Água como Recurso Estratégico',dur:30,free:false,content:`<h3>2. Água como Recurso Estratégico</h3><p>A água é um recurso essencial à vida e ao desenvolvimento socioeconômico, e sua disponibilidade é uma questão estratégica que pode gerar conflitos entre nações. O controle dos recursos hídricos é vital para a agricultura, indústria e consumo humano, o que torna a água um ponto central nas discussões geopolíticas.</p><p>As regiões que enfrentam escassez de água, como o Oriente Médio e partes da África, estão particularmente suscetíveis a tensões. A gestão das bacias hidrográficas que cruzam fronteiras internacionais, como o Rio Nilo e o Rio Tigre, é complexa e pode gerar disputas entre os países que dependem desses rios.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A água é considerada o "ouro azul" devido à sua importância vital e crescente escassez.</blockquote><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A gestão e o acesso à água são questões cruciais para a estabilidade regional e global.</div><p>Os acordos internacionais sobre o uso de recursos hídricos são essenciais para prevenir conflitos. A Convenção sobre a Lei dos Usos não Navegacionais dos Cursos de Água Internacionais da ONU é um exemplo de tentativa de regular o uso e a gestão de águas transfronteiriças.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A próxima guerra no Oriente Médio será travada por causa da água."</strong><br><span style="font-size:0.85em;color:#888">— Boutros Boutros-Ghali</span></blockquote><p>O aumento da população e as mudanças climáticas estão exacerbando a escassez de água, aumentando a pressão sobre os recursos hídricos existentes. Isso requer uma gestão mais eficiente e cooperação internacional para garantir a segurança hídrica.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Ignorar a importância estratégica da água pode levar a tensões políticas e conflitos.</div><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> De acordo com a ONU, 2,2 bilhões de pessoas no mundo não têm acesso a água potável segura.</div><p>Iniciativas de dessalinização e conservação são cada vez mais importantes para aumentar a disponibilidade de água potável, especialmente em regiões áridas.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A água é um recurso estratégico vital.<br>• Conflitos por água são mais comuns em regiões com escassez.<br>• A cooperação internacional é crucial para a gestão de recursos hídricos.</p></div>`,quiz:[{q:'Qual é a principal razão para a água ser considerada um recurso estratégico?',opts:['Sua abundância','Seu valor econômico','Sua importância para a vida','Seu uso industrial'],correct:2}],cards:[{q:'Por que a água é chamada de "ouro azul"?',a:'Devido à sua importância vital e crescente escassez.'},{q:'O que é a Convenção sobre a Lei dos Usos não Navegacionais dos Cursos de Água Internacionais?',a:'Um acordo da ONU para regular o uso e a gestão de águas transfronteiriças.'}]},
      {id:'ge_m4_t3',name:'Conflitos por Recursos Minerais',dur:30,free:false,content:`<h3>3. Conflitos por Recursos Minerais</h3><p>Os recursos minerais, como ouro, diamantes, cobre e lítio, são fundamentais para a economia global e tecnologia moderna. No entanto, sua extração e controle têm sido fontes de tensão e conflito em várias partes do mundo.</p><p>Países ricos em minerais, como a República Democrática do Congo (RDC), frequentemente enfrentam conflitos internos e pressões externas devido ao interesse em seus recursos. Esses conflitos são frequentemente alimentados pela corrupção, falta de governança e intervenções estrangeiras.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 Recursos minerais podem ser um "fardo" para nações quando mal geridos, levando ao termo "maldição dos recursos".</blockquote><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A extração de recursos minerais pode provocar conflitos devido a interesses econômicos e de poder.</div><p>Os "diamantes de sangue" são um exemplo notório de como a mineração de recursos pode financiar conflitos armados. Esses diamantes são extraídos em zonas de guerra e vendidos para financiar grupos rebeldes.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A riqueza mineral pode ser tanto uma bênção quanto uma maldição."</strong><br><span style="font-size:0.85em;color:#888">— Joseph Stiglitz</span></blockquote><p>A demanda crescente por minerais, especialmente aqueles usados em tecnologias verdes, como o cobalto para baterias, está intensificando a competição por esses recursos.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A exploração insustentável de minerais pode levar a danos ambientais irreversíveis.</div><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A RDC detém mais de 60% das reservas globais de cobalto, essencial para baterias de veículos elétricos.</div><p>Para mitigar os conflitos, é crucial a implementação de práticas de mineração sustentáveis e políticas eficazes de governança dos recursos.</p><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Recursos minerais são essenciais, mas podem gerar conflitos.<br>• A "maldição dos recursos" descreve os desafios de gerenciar riquezas minerais.<br>• Mineração sustentável e boa governança são necessárias para evitar conflitos.</p></div>`,quiz:[{q:'Qual é um exemplo de recurso mineral que financia conflitos?',opts:['Ouro','Diamantes de sangue','Cobre','Petróleo'],correct:1}],cards:[{q:'O que são "diamantes de sangue"?',a:'Diamantes extraídos em zonas de guerra e vendidos para financiar conflitos armados.'},{q:'Por que o cobalto é importante?',a:'É essencial para a fabricação de baterias de veículos elétricos.'}]}
    ],quizFinal:[{q:'Qual recurso é frequentemente chamado de "ouro negro" devido ao seu valor estratégico?',opts:['Carvão','Petróleo','Gás natural','Urânio'],correct:1},{q:'Por que a água é considerada um recurso estratégico?',opts:['Por ser abundante','Por sua importância para a vida','Por seu valor econômico','Por seu uso industrial'],correct:1},{q:'O que são "diamantes de sangue"?',opts:['Diamantes usados em joias de luxo','Diamantes extraídos em zonas de guerra','Diamantes usados em tecnologia médica','Diamantes sintéticos'],correct:1}]},
  {id:'ge_m5',name:'Geopolítica e Economia Global',free:false,topics:[
      {id:'ge_m5_t1',name:'A Globalização e seus Desafios',dur:15,free:false,content:`<h3>Globalização e seus Desafios</h3><p>A globalização é um fenômeno complexo que envolve a crescente integração e interdependência entre as nações em aspectos econômicos, culturais, sociais e políticos. Esse processo tem sido impulsionado por avanços tecnológicos, especialmente nas áreas de transporte e comunicação, que facilitaram o fluxo de bens, serviços, capitais e informações ao redor do mundo.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Segundo o Banco Mundial, o comércio global cresceu de cerca de 5% do PIB mundial em 1960 para mais de 20% em 2020.</div><p>No entanto, a globalização também apresenta desafios significativos. Ela pode exacerbar desigualdades, tanto entre países quanto dentro deles, ao beneficiar desproporcionalmente economias mais desenvolvidas e indivíduos com acesso a recursos e tecnologias avançadas.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A globalização pode unir o mundo, mas também pode acentuar suas divisões.</blockquote><h4>Desafios Econômicos</h4><p>Um dos principais desafios econômicos é a competição desigual. Países em desenvolvimento muitas vezes enfrentam dificuldades para competir com nações industrializadas, que possuem tecnologias avançadas e infraestrutura robusta.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A liberalização excessiva do comércio pode levar à vulnerabilidade econômica, especialmente em economias dependentes de um número limitado de exportações.</div><p>Além disso, a globalização pode levar à exploração de mão-de-obra barata e à degradação ambiental, à medida que empresas buscam reduzir custos e maximizar lucros.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A globalização é uma faca de dois gumes, capaz de cortar tanto para o crescimento quanto para a desigualdade."</strong><br><span style="font-size:0.85em;color:#888">— Joseph Stiglitz</span></blockquote><h4>Desafios Culturais e Sociais</h4><p>A globalização também afeta culturas locais, muitas vezes levando à homogeneização cultural e à perda de identidades culturais distintas. A difusão de culturas dominantes pode resultar na redução da diversidade cultural.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A preservação das culturas locais é essencial para manter a diversidade cultural no mundo globalizado.</div><p>Socialmente, a globalização pode aumentar a migração, tanto voluntária quanto forçada, criando desafios relacionados à integração de imigrantes e à gestão de fluxos migratórios.</p><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Compreender as dinâmicas locais é crucial para lidar efetivamente com os desafios da globalização.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A globalização integra e interdependente economias e culturas.<br>• Desafios econômicos incluem competição desigual e exploração.<br>• Culturalmente, pode levar à homogeneização e perda de identidade.</p></div>`,quiz:[{q:'Qual é um dos principais desafios econômicos da globalização?',opts:['Competição desigual','Acesso universal à tecnologia','Crescimento uniforme','Estabilidade política'],correct:0}],cards:[{q:'Qual é uma consequência cultural da globalização?',a:'Homogeneização cultural e perda de identidades distintas.'},{q:'Como a globalização pode afetar economias em desenvolvimento?',a:'Pode dificultar a competição com economias industrializadas devido à desigualdade de recursos e tecnologia.'}]},
      {id:'ge_m5_t2',name:'Blocos Econômicos e suas Dinâmicas',dur:15,free:false,content:`<h3>Blocos Econômicos e suas Dinâmicas</h3><p>Blocos econômicos são associações de países que estabelecem acordos para promover o comércio e a cooperação econômica entre si. Esses blocos podem variar de simples acordos de livre comércio a uniões econômicas completas, com uma moeda única e políticas econômicas integradas.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> A União Europeia (UE) é um dos blocos econômicos mais avançados, com 27 membros e uma moeda única, o euro, utilizada por 19 destes países.</div><h4>Tipos de Blocos Econômicos</h4><p>Existem vários tipos de blocos econômicos, cada um com seu próprio nível de integração:</p><ul><li><strong>Zona de Livre Comércio:</strong> Eliminação de tarifas alfandegárias entre os países membros.</li><li><strong>União Aduaneira:</strong> Além da zona de livre comércio, estabelece tarifas externas comuns.</li><li><strong>Mercado Comum:</strong> Inclui a livre circulação de bens, serviços, capital e pessoas.</li><li><strong>União Econômica e Monetária:</strong> Integração econômica com uma moeda comum e política fiscal coordenada.</li></ul><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A integração econômica pode fortalecer as economias, mas também exige concessões de soberania.</blockquote><h4>Vantagens e Desvantagens</h4><p>Os blocos econômicos oferecem várias vantagens, como o aumento do comércio e atração de investimentos estrangeiros. No entanto, também enfrentam desafios, como a necessidade de harmonizar políticas e regulamentos entre países com diferentes níveis de desenvolvimento.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A cooperação entre membros de um bloco econômico pode levar a um crescimento econômico mais sustentável e coeso.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"Os blocos econômicos são fundamentais para a estabilidade econômica regional."</strong><br><span style="font-size:0.85em;color:#888">— Kenneth Rogoff</span></blockquote><p>Alguns críticos argumentam que blocos econômicos podem levar ao "regionalismo fechado", onde o comércio é incentivado em detrimento de países fora do bloco.</p><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">Todos os blocos econômicos têm o mesmo nível de integração.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">Blocos econômicos variam de zonas de livre comércio a uniões econômicas completas.</p></div></div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• Blocos econômicos promovem cooperação e comércio.<br>• Variam de zonas de livre comércio a uniões monetárias.<br>• Oferecem vantagens e desafios econômicos e políticos.</p></div>`,quiz:[{q:'Qual a principal característica de uma união aduaneira?',opts:['Livre circulação de pessoas','Tarifas externas comuns','Moeda única','Política fiscal coordenada'],correct:1}],cards:[{q:'O que diferencia uma zona de livre comércio de uma união aduaneira?',a:'A união aduaneira tem tarifas externas comuns além da eliminação de tarifas internas.'},{q:'Quais são as vantagens dos blocos econômicos?',a:'Aumento do comércio, atração de investimentos e estabilidade econômica regional.'}]},
      {id:'ge_m5_t3',name:'Tecnologia e Geopolítica Econômica',dur:15,free:false,content:`<h3>Tecnologia e Geopolítica Econômica</h3><p>A tecnologia desempenha um papel crucial na geopolítica econômica moderna, moldando relações de poder e influenciando decisões econômicas globais. A inovação tecnológica não apenas impulsiona o crescimento econômico, mas também redefine a capacidade de um país de exercer influência global.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A tecnologia é a nova moeda de poder na arena geopolítica.</blockquote><p>Na atualidade, a corrida por avanços tecnológicos, como inteligência artificial (IA), 5G e computação quântica, está no centro das disputas geopolíticas. Nações buscam liderar essas inovações para se posicionar estrategicamente no cenário global.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A dependência tecnológica de um único país ou região pode criar vulnerabilidades significativas.</div><h4>Impacto Econômico</h4><p>A tecnologia facilita o comércio internacional, melhora a eficiência das cadeias de suprimentos e cria novos mercados. Empresas que adotam rapidamente novas tecnologias podem obter vantagens competitivas significativas.</p><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A integração tecnológica é essencial para a competitividade econômica global.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"O domínio tecnológico é o novo campo de batalha da economia global."</strong><br><span style="font-size:0.85em;color:#888">— Klaus Schwab</span></blockquote><p>No entanto, o rápido avanço tecnológico também pode levar a disparidades econômicas, com países desenvolvidos colhendo mais benefícios do que aqueles em desenvolvimento.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> De acordo com a McKinsey, a digitalização poderia adicionar até US$ 1,5 trilhão ao PIB global até 2025.</div><h4>Considerações Geopolíticas</h4><p>A tecnologia também traz considerações geopolíticas, como a segurança cibernética e a soberania digital. A capacidade de proteger dados e infraestruturas críticas é vital para a segurança nacional.</p><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">A tecnologia não tem impacto significativo na geopolítica.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">A tecnologia é um fator crucial na geopolítica moderna.</p></div></div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A tecnologia molda a geopolítica econômica.<br>• Avanços como IA e 5G são centrais para disputas geopolíticas.<br>• Segurança cibernética e soberania digital são questões-chave.</p></div>`,quiz:[{q:'Qual é um desafio geopolítico associado ao avanço tecnológico?',opts:['Aumento da desigualdade','Redução da competitividade','Perda de dados','Segurança cibernética'],correct:3}],cards:[{q:'Por que a tecnologia é importante na geopolítica econômica?',a:'Porque define a capacidade de influência e competitividade no cenário global.'},{q:'Quais são algumas das tecnologias centrais nas disputas geopolíticas atuais?',a:'Inteligência artificial, 5G e computação quântica.'}]}
    ],quizFinal:[{q:'Qual é uma consequência cultural da globalização?',opts:['Isolamento cultural','Preservação total das culturas locais','Homogeneização cultural','Diminuição do comércio cultural'],correct:2},{q:'Qual a principal característica de uma união aduaneira?',opts:['Livre circulação de pessoas','Tarifas externas comuns','Moeda única','Política fiscal coordenada'],correct:1},{q:'Qual é um desafio geopolítico associado ao avanço tecnológico?',opts:['Aumento da desigualdade','Redução da competitividade','Perda de dados','Segurança cibernética'],correct:3}]},
  {id:'ge_m6',name:'Segurança e Defesa',free:false,topics:[
      {id:'ge_m6_t1',name:'Política de Defesa e Segurança Nacional',dur:45,free:false,content:`<h3>Política de Defesa e Segurança Nacional</h3><p>A política de defesa e segurança nacional é um componente essencial para a soberania de qualquer país. Ela envolve a formulação de estratégias para proteger a integridade territorial, garantir a segurança dos cidadãos e manter a estabilidade interna. Este tópico se conecta diretamente com a geopolítica, pois as decisões de defesa podem influenciar e ser influenciadas por relações internacionais e questões econômicas globais.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A segurança nacional vai além da proteção militar, abrangendo também aspectos econômicos e sociais.</blockquote><h4>Termos-chave e Conceitos</h4><p>Para compreender a política de defesa, é crucial familiarizar-se com alguns termos-chave:</p><ul><li><strong>Estratégia de Defesa:</strong> Plano abrangente para proteger um país de ameaças.</li><li><strong>Segurança Nacional:</strong> Medidas para manter a integridade e soberania de uma nação.</li><li><strong>Forças Armadas:</strong> Organização militar responsável pela defesa.</li></ul><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A política de defesa deve ser flexível para se adaptar a novas ameaças e mudanças no cenário internacional.</div><p>As nações desenvolvem suas políticas de defesa considerando fatores internos e externos, como recursos disponíveis e alianças internacionais. A <strong>megatendência</strong> atual é a cooperação internacional em defesa, buscando alianças estratégicas para enfrentar ameaças comuns.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Subestimar ameaças emergentes pode comprometer a segurança nacional.</div><p>A segurança nacional também está intimamente ligada à economia, pois crises econômicas podem desestabilizar um país e torná-lo vulnerável a ameaças externas. Além disso, a geopolítica é influenciada por decisões de política de defesa, como a presença militar em regiões estratégicas.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Segundo o SIPRI, em 2022, os gastos militares globais atingiram aproximadamente 2 trilhões de dólares, refletindo a crescente preocupação com segurança nacional.</div><p>Um aspecto crucial da defesa nacional é o investimento em tecnologia militar, que pode incluir desde armamentos até sistemas de defesa cibernética. A inovação tecnológica é um diferencial estratégico significativo.</p><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"A segurança de um país é tão forte quanto sua capacidade de adaptação."</strong><br><span style="font-size:0.85em;color:#888">— Analista de Defesa</span></blockquote><h4>Exemplos e Atualidades</h4><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Recentemente, a OTAN anunciou a expansão de suas forças de reação rápida na Europa Oriental, em resposta a tensões geopolíticas crescentes.</div><div style="background:rgba(91,127,255,.04);border:1px solid rgba(91,127,255,.1);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📌 Exemplo:</strong> A Austrália reforçou sua política de defesa ao adquirir submarinos nucleares, destacando a importância da dissuasão.</div><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">Ignorar a importância da defesa cibernética.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">Incluir a cibersegurança como parte fundamental da estratégia de defesa nacional.</p></div></div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Mantenha-se atualizado sobre as tendências de defesa global para entender como elas podem impactar localmente.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A política de defesa é essencial para a soberania nacional.<br>• Inclui aspectos militares, econômicos e sociais.<br>• A adaptação e inovação são cruciais para enfrentar ameaças emergentes.</p></div>`,quiz:[{q:'Qual é o principal objetivo da política de defesa nacional?',opts:['Proteger a integridade territorial','Expandir o território nacional','Reduzir os gastos militares','Aumentar a população'],correct:0}],cards:[{q:'O que é estratégia de defesa?',a:'Um plano abrangente para proteger um país de ameaças.'},{q:'Por que a segurança nacional é importante?',a:'Ela garante a soberania e estabilidade de um país.'}]},
      {id:'ge_m6_t2',name:'Terrorismo e Segurança Internacional',dur:50,free:false,content:`<h3>Terrorismo e Segurança Internacional</h3><p>O terrorismo representa uma das maiores ameaças à segurança internacional, afetando países de todas as regiões e exigindo uma resposta coordenada e abrangente. A natureza transnacional do terrorismo o torna especialmente desafiador, já que grupos terroristas podem operar além-fronteiras, utilizando a globalização e a tecnologia a seu favor.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 O terrorismo não conhece fronteiras e, por isso, a cooperação internacional é essencial.</blockquote><h4>Termos-chave e Conceitos</h4><p>Compreender o terrorismo e suas implicações demanda familiaridade com alguns termos e conceitos essenciais:</p><ul><li><strong>Terrorismo Transnacional:</strong> Ação de grupos que operam em múltiplos países.</li><li><strong>Contra-terrorismo:</strong> Medidas tomadas para prevenir e responder a atividades terroristas.</li><li><strong>Radicalização:</strong> Processo pelo qual indivíduos adotam ideologias extremistas.</li></ul><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> A colaboração entre nações é crucial para combater o terrorismo de forma eficaz.</div><p>Os governos implementam estratégias de contra-terrorismo que combinam ações militares, inteligência, diplomacia e esforços para desmantelar redes financeiras dos terroristas. Além disso, o combate ao terrorismo frequentemente envolve medidas para prevenir a radicalização, abordando causas sociais e econômicas subjacentes.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> A resposta militar isolada pode ser insuficiente e até contraproducente sem um plano abrangente.</div><p>O terrorismo também tem profundas implicações econômicas, pois os ataques podem desestabilizar mercados e afetar o turismo e o comércio. A segurança internacional, portanto, está fortemente conectada à estabilidade econômica global e requer uma abordagem multifacetada.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> De acordo com o Global Terrorism Index, o número de mortes por terrorismo caiu em 2021, mas o impacto econômico do terrorismo ainda é significativo.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"O terrorismo é uma ameaça global que exige uma resposta global."</strong><br><span style="font-size:0.85em;color:#888">— Especialista em Segurança Internacional</span></blockquote><h4>Exemplos e Atualidades</h4><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> A coalizão internacional continua seus esforços para combater o ISIS na Síria e no Iraque, com operações conjuntas e partilha de inteligência.</div><div style="background:rgba(91,127,255,.04);border:1px solid rgba(91,127,255,.1);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📌 Exemplo:</strong> Após ataques terroristas, muitos países da União Europeia implementaram controles mais rigorosos em suas fronteiras para prevenir novas ameaças.</div><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">Acreditar que o terrorismo pode ser combatido apenas com força militar.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">Integrar ações diplomáticas e sociais para abordar as raízes do terrorismo.</p></div></div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Estude casos de sucesso em contra-terrorismo para entender abordagens eficazes.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• O terrorismo é uma ameaça global que requer cooperação internacional.<br>• Estratégias eficazes combinam ações militares, diplomáticas e sociais.<br>• A segurança internacional está intimamente ligada à estabilidade econômica.</p></div>`,quiz:[{q:'O que caracteriza o terrorismo transnacional?',opts:['Opera apenas dentro de um país','É sempre motivado por razões religiosas','Atua em múltiplos países','Não utiliza tecnologia'],correct:2}],cards:[{q:'Qual é o foco do contra-terrorismo?',a:'Prevenir e responder a atividades terroristas.'},{q:'Por que a cooperação internacional é vital no combate ao terrorismo?',a:'Porque o terrorismo frequentemente opera além-fronteiras.'}]},
      {id:'ge_m6_t3',name:'Cibersegurança na Era Digital',dur:55,free:false,content:`<h3>Cibersegurança na Era Digital</h3><p>Na era digital, a cibersegurança tornou-se um pilar fundamental da defesa nacional e da segurança global. Com o aumento da dependência de tecnologias digitais, a proteção contra ameaças cibernéticas é essencial não apenas para governos, mas também para empresas e indivíduos.</p><blockquote style="border-left:3px solid #5b7fff;padding:12px 16px;margin:16px 0;background:rgba(91,127,255,.06);border-radius:0 8px 8px 0;font-style:italic;color:#ccd">💡 A cibersegurança é a primeira linha de defesa no mundo interconectado de hoje.</blockquote><h4>Termos-chave e Conceitos</h4><p>Alguns conceitos são fundamentais para entender a cibersegurança:</p><ul><li><strong>Ameaça Cibernética:</strong> Qualquer potencial violação que possa comprometer a segurança de sistemas digitais.</li><li><strong>Firewall:</strong> Sistema de segurança que monitora e controla o tráfego de rede baseado em regras de segurança predeterminadas.</li><li><strong>Phishing:</strong> Método de ataque cibernético que busca obter dados sensíveis, como senhas e informações financeiras, através de disfarces enganosos.</li></ul><div style="background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#00c853">✅ Ponto-chave:</strong> Implementar medidas proativas de cibersegurança é crucial para evitar ataques devastadores.</div><p>As ameaças cibernéticas são cada vez mais complexas e sofisticadas, exigindo que as nações desenvolvam capacidades avançadas de segurança cibernética. Isso inclui investimentos em tecnologia, treinamentos especializados e a criação de políticas de segurança robustas.</p><div style="background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.2);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ff4455">⚠️ Atenção:</strong> Ignorar atualizações de segurança pode deixar sistemas vulneráveis a ataques.</div><p>Além disso, a cibersegurança é uma área em que a colaboração internacional é crucial, pois ataques cibernéticos frequentemente têm origem em um país diferente daquele que está sendo atacado. Assim, as nações precisam trabalhar juntas para identificar, prevenir e responder a essas ameaças.</p><div style="background:rgba(91,127,255,.06);border:1px solid rgba(91,127,255,.12);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📊 Dado:</strong> Um estudo da Accenture revelou que o custo médio de um ataque cibernético para uma organização pode ultrapassar 13 milhões de dólares.</div><blockquote style="border-left:3px solid #00d4ff;padding:12px 16px;margin:16px 0;background:rgba(0,212,255,.06);border-radius:0 8px 8px 0"><strong style="color:#00d4ff">"Na era digital, a cibersegurança é a base sólida sobre a qual se constrói a confiança online."</strong><br><span style="font-size:0.85em;color:#888">— Especialista em Cibersegurança</span></blockquote><h4>Exemplos e Atualidades</h4><div style="background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#ffaa00">📰 Atualidade:</strong> Em 2023, um grande ataque de ransomware atingiu várias infraestruturas críticas ao redor do mundo, destacando a importância da cibersegurança.</div><div style="background:rgba(91,127,255,.04);border:1px solid rgba(91,127,255,.1);border-radius:10px;padding:14px 16px;margin:16px 0"><strong style="color:#5b7fff">📌 Exemplo:</strong> Após um ataque cibernético, um país europeu implementou novas regulamentações de segurança para todas as suas instituições financeiras.</div><div style="display:flex;gap:10px;margin:16px 0"><div style="flex:1;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.15);border-radius:10px;padding:12px"><strong style="color:#ff4455">❌ Errado</strong><p style="margin:6px 0 0;font-size:0.9em">Não ter práticas de segurança cibernética atualizadas.</p></div><div style="flex:1;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:10px;padding:12px"><strong style="color:#00c853">✅ Certo</strong><p style="margin:6px 0 0;font-size:0.9em">Manter sistemas e protocolos de segurança sempre atualizados.</p></div></div><div style="background:rgba(0,200,83,.06);border-left:3px solid #00c853;padding:12px 16px;margin:16px 0;border-radius:0 8px 8px 0"><strong style="color:#00c853">💡 Dica:</strong> Invista em educação contínua em segurança cibernética para estar preparado contra novas ameaças.</div><div style="background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.15);border-radius:12px;padding:16px;margin:20px 0 0"><strong style="color:#5b7fff;font-size:1.05em">📋 Resumo</strong><p style="margin:8px 0 0">• A cibersegurança é essencial na era digital.<br>• Exige colaboração nacional e internacional.<br>• Medidas proativas e atualizações constantes são cruciais.</p></div>`,quiz:[{q:'O que é um firewall?',opts:['Um tipo de vírus','Um sistema de segurança de rede','Um método de phishing','Uma atualização de software'],correct:1}],cards:[{q:'Qual é a função de um firewall?',a:'Monitorar e controlar o tráfego de rede com base em regras de segurança.'},{q:'Por que a cibersegurança é importante na era digital?',a:'Protege contra ameaças cibernéticas que podem comprometer sistemas digitais.'}]}
    ],quizFinal:[{q:'Qual é um dos principais objetivos da política de defesa nacional?',opts:['Expandir o território nacional','Proteger a integridade territorial','Reduzir o orçamento de defesa','Aumentar a população militar'],correct:1},{q:'O que caracteriza o terrorismo transnacional?',opts:['Opera apenas dentro de um país','Atua em múltiplos países','É sempre motivado por razões religiosas','Não utiliza tecnologia'],correct:1},{q:'Qual é a função de um firewall na cibersegurança?',opts:['Proteger contra malware','Monitorar e controlar o tráfego de rede','Oferecer suporte técnico','Atualizar o software automaticamente'],correct:1}]},
  {id:'ge_m7',name:'Futuro da Geopolítica',free:false,topics:[
