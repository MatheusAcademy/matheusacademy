var TOPICS = [
  {id:1,name:'Introdução à Escatologia',dur:'15 min',content:`<h3>Escatologia: A Esperança Cristã dos Últimos Dias</h3><p>Bem-vindo, querido irmão! Com alegria em meu coração, recebo você neste estudo fascinante sobre escatologia, a doutrina dos últimos dias. Que privilégio estudarmos juntos como Deus revelou o fim de todas as coisas! Este não é um estudo assustador ou pessimista, mas uma celebração da esperança cristã que nos anima diariamente!</p><p>Escatologia vem do grego "eschatos" (último) e "logia" (discurso/estudo). Portanto, significa literalmente "estudo dos últimos dias" ou "estudo dos eventos finais". Mas isto não é especulação vã ou predição de futuro baseada em presságios humanos. É o estudo da revelação divina sobre como Deus completará Sua obra redentora na história.</p><p>Por que isto importa? Porque a escatologia cristã é fundamentalmente sobre esperança! Quando você compreende que Deus tem um plano para o final de tudo, que Cristo voltará em vitória, que o mal não triunfará eternamente, que haverá justiça perfeita e restauração completa - isto muda como você vive hoje! A escatologia não é escapismo do mundo; é combustível para perseverança no mundo.</p><p>A Bíblia está saturada de escatologia. Começando desde Gênesis, vemos promessas de um Salvador vindouro. Passando pelos profetas do Antigo Testamento - Isaías, Jeremias, Daniel, Zacarias - encontramos predições detalhadas sobre os tempos do fim. No Novo Testamento, Jesus Himself falou extensivamente sobre Sua volta e o fim dos tempos. Os apóstolos escreveram sobre estes assuntos. E o livro final da Bíblia, Apocalipse, é uma visão profética dos últimos eventos.</p><p>Portanto, a escatologia não é um tópico obscuro de interesse apenas para estudiosos peculiares. É central à mensagem bíblica! É parte da esperança que cada cristão deveria abraçar e compreender.</p><p>Agora, deixe-me oferecer um princípio importante: enquanto a Bíblia é clara sobre muitos aspectos dos últimos dias, há certas áreas onde cristãos sinceros discordam sobre interpretação. Diferentes tradições cristãs (Pentecostal, Assembleia de Deus, Batista, Evangélica, etc.) podem ter diferentes perspectivas sobre a sequência exata de eventos, sobre o timing do arrebatamento, sobre a natureza do milênio, etc.</p><p>Isto é aceitável! É como uma família onde membros podem discordar sobre detalhes mas concordam sobre o essencial: que amam o Deus que os criou, que Jesus é Senhor, que Ele voltará, que haverá redenção final. A unidade cristã não requer acordo perfeito em cada interpretação escatológica, mas acordo sobre quem é Jesus e que Ele é digno de nossa devoção.</p><p>O que é claro em todas as Escrituras é isto: Cristo voltará. Haverá um dia final de julgamento. A justiça será consumada. Deus triunfará completamente. O mal não vencerá. Haverá eternidade com Deus para os redimidos. Estas verdades são inegociáveis na fé cristã.</p><p>Então, meu querido amigo, deixe seu coração se alegrar enquanto estudamos estes tópicos! Não seja ansioso pelas interpretações que ainda não compreende perfeitamente. Deixe a Palavra de Deus abrir seus olhos gradualmente. Deixe o Espírito Santo aprofundar sua compreensão. E sobretudo, deixe que a esperança dos tempos finais o motive a viver hoje com propósito, integridade e amor. Pois sabemos que nosso Senhor vem!</p>`,cards:[{q:"O que significa 'escatologia'?",a:"Significa o estudo dos últimos dias e dos eventos finais revelados por Deus nas Escrituras."}]},

  {id:2,name:'Sinais dos Tempos',dur:'15 min',content:`<h3>Os Sinais dos Tempos: Indicadores da Volta de Cristo</h3><p>Que privilégio examinar os sinais que Jesus e os apóstolos mencionaram como indicadores da proximidade de Seu retorno! Isto é um estudo que aquece o coração porque mostra que Deus não nos deixou sem orientação. Ele nos deu sinais para que estejamos vigilantes e preparados!</p><p>Jesus disse claramente em Mateus 24:32-33: "Aprendei pois a parábola da figueira: quando já o seu ramo se torna tenro e brotam as folhas, sabeis que está próximo o verão. Igualmente, quando virdes todas estas coisas, sabei que ele está próximo, às portas." Os sinais são como os brotos da primavera que indicam que o verão se aproxima.</p><p>Quais são esses sinais? Jesus mencionou vários em Mateus 24 e Lucas 21. Permitam-me enumerar os principais que encontramos nas Escrituras.</p><p>Primeiro: Guerras e rumores de guerras. Jesus disse: "Ouvireis de guerras e rumores de guerras... Haverá fomes, pestes e terremotos em vários lugares" (Mateus 24:6-7). Certamente, guerras sempre existiram na história humana. Mas a era moderna tem visto conflitos de escala sem precedentes. As duas Guerras Mundiais causaram destruição antes inimaginavelmente grande. Conflitos contínuos no Oriente Médio, na Ásia, na África. Armas nucleares. O medo de conflito global. Estes certamente se qualificam como "rumores de guerra".</p><p>Segundo: Terremotos em vários lugares. Jesus menciona especificamente isto como um sinal. E de fato, nos últimos séculos e especialmente nos últimos anos, temos registrado aumento em atividade sísmica. Grandes terremotos em vários continentes. Tsunamis devastadores. A tecnologia moderna nos permite registrar e comunicar estes eventos globalmente, mostrando-nos que são realmente "em vários lugares".</p><p>Terceiro: Fomes e pestes. Embora a tecnologia agrícola tenha melhorado, temos ainda regiões com fome extrema. A pandemia de COVID-19 foi uma peste global lembrada a todos da vulnerabilidade humana. Há preocupação constante sobre novas doenças, superbactérias resistentes a antibióticos, possíveis futuras pandemias. Os sinais não cessam.</p><p>Quarto: Aumento de conhecimento e mobilidade. Daniel 12:4 prediz que "nos últimos tempos, muitos correrão de um lado a outro, e o conhecimento será aumentado". Isto é notavelmente verdadeiro na era moderna! A explosão de informação pela internet é sem precedentes. Pessoas viajam globalmente com facilidade que teria parecido mágica apenas há uma geração. A tecnologia permite comunicação instantânea através do planeta. Este é claramente um sinal dos tempos do fim.</p><p>Quinto: Apostasia e rejeição do evangelho. Paulo escreveu em 2 Timóteo 4:3-4: "Virá tempo em que não sofrerão a sã doutrina; mas, tendo comichão nos ouvidos, amontoarão para si mestres segundo as suas próprias concupiscências, e desviarão os ouvidos da verdade, voltando-se para as fábulas." Vemos isto claramente hoje: afastamento dos valores cristãos tradicionais, rejeição da autoridade bíblica, ascensão de "espiritualidades" alternativas, ceticismo direcionado especialmente contra a fé cristã.</p><p>Sexto: Sinais nos céus. Jesus disse: "Haverá sinais no sol, na lua e nas estrelas" (Lucas 21:25). Enquanto isto pode referir-se a fenômenos celestiais futuros ainda por vir (possivelmente durante a tribulação), também podemos notar que nossa geração tem visto fenômenos espaciais notáveis. Cometas, supernovas observáveis, fenômenos solares, tudo comunicado e estudado globalmente.</p><p>Sétimo: Multiplicação de conhecimento bíblico e pregação global. Mateus 24:14 diz: "Este evangelho do reino será pregado em todo o mundo, em testemunho a todas as nações; e então virá o fim." Nunca na história humana o evangelho foi tão acessível globalmente. Missões cristãs atingem regiões remotas. A Bíblia é traduzida em centenas de idiomas. A pregação é transmitida por rádio, televisão, internet. O evangelho está realmente sendo levado a toda nação.</p><p>Oitavo: Sinais morais e sociais. 2 Timóteo 3:2-5 descreve os "últimos dias": "Porque haverá homens amantes de si mesmos, avarentos, presunçosos, soberbos, blasfemadores, desobedientes a pais e mães, ingratos, profanos, sem afeto natural, irreconciliáveis, caluniadores, intemperantes, selvagens, desapiedados, traidores, precipitados, inchados de soberba, mais amigos dos prazeres do que amigos de Deus, tendo forma de piedade, mas negando-lhe o poder." Não é este um retrato acurado de aspectos da sociedade moderna?</p><p>Nono: Restauração de Israel. Muitos estudiosos veem na reestablecimento do Estado de Israel em 1948 um cumprimento de profecia bíblica. Miquéias, Jeremias, e outros profetas predisseram que Israel seria restaurado em seus últimos dias. E de fato, após 2000 anos de dispersão, os judeus retornaram e reestableceram uma nação. Isto é um sinal maravilhoso!</p><p>Meu querido aluno, não estou aqui para alarmar você ou promover ansiedade. Mas é sábio estar ciente dos sinais que Jesus Himself nos orientou a observar. Eles não devem nos levar ao desespero, mas à vigilância, à preparação espiritual, e à esperança. Porque sabemos que por trás de todos estes sinais está o plano redentor de Deus chegando ao cumprimento!</p>`,cards:[{q:"Quais são alguns dos principais sinais dos tempos mencionados nas Escrituras?",a:"Guerras, terremotos, fomes, pestes, aumento de conhecimento, apostasia, sinais nos céus, e multiplicação do evangelho global."}]},

  {id:3,name:'A Segunda Vinda de Cristo',dur:'15 min',content:`<h3>A Segunda Vinda de Cristo: Retorno em Glória</h3><p>Oh, que assunto glorioso! A segunda vinda de Cristo é o clímax da história redentora e a esperança suprema do cristão! Não é tema de medo, mas de exultação. Aleluia!</p><p>Jesus Himself prometeu Sua volta. Em João 14:2-3, Ele diz: "Na casa de meu Pai há muitas moradas; se não fosse assim, eu vos lo teria dito. Pois vou preparar-vos lugar. E quando eu for e vos preparar lugar, virei outra vez, e vos levarei para mim mesmo, para que onde eu estiver estejais vós também." Esta é uma promessa pessoal, íntima, de Cristo voltando para buscar Seu povo!</p><p>Os apóstolos reiteradamente falaram sobre a volta de Cristo. Paulo escreveu extensivamente sobre isto. Em 1 Coríntios 15:51-52 ele descreve: "Eis aqui vos digo um mistério: nem todos dormiremos, mas todos seremos transformados, num momento, num abrir e fechar de olhos, ante a última trombeta; porque a trombeta soará, e os mortos ressuscitarão incorruptíveis, e nós seremos transformados." É uma transformação maravilhosa e instantânea!</p><p>A volta de Cristo será diferente de Sua primeira vinda. Na primeira vinda, Ele veio como Servo, como cordeiro oferecido por nossos pecados, de forma discreta em uma aldeia humilde. Mas a segunda vinda será em glória indescritível! Mateus 24:30 descreve: "Então aparecerá no céu o sinal do Filho do Homem; e todas as tribos da terra se lamentarão, e verão o Filho do Homem vindo sobre as nuvens do céu com poder e grande glória."</p><p>Será visível e literal. Não é uma segunda vinda espiritual apenas. Não é meramente simbólica. Será um evento histórico real e visível. Todos verão! Apocalipse 1:7 afirma: "Eis que vem com as nuvens, e todo olho o verá, até os mesmos que o traspassaram; e todas as tribos da terra se lamentarão sobre ele. Sim, amém." Nenhuma person na Terra poderá alegar não ter visto ou não ter compreendido que Algo extraordinário ocorreu.</p><p>A volta de Cristo será acompanhada por sinais e maravilhas. Mateus 24:29-31 descreve: "Logo depois da tribulação daqueles dias, o sol escurecerá, a lua não dará a sua luz, as estrelas cairão do céu, e os poderes dos céus serão abalados. Então aparecerá no céu o sinal do Filho do Homem... E ele enviará os seus anjos com grande voz de trombeta, e eles reunirão os seus escolhidos de um a outro cabo dos céus."</p><p>Haverá ressurreição dos mortos! Esta é uma parte crucial da segunda vinda. Paulo escreve em 1 Tessalonicenses 4:16: "O próprio Senhor descerá do céu com alarido, com voz de arcanjo, e com a trombeta de Deus; e os mortos em Cristo ressuscitarão primeiro." Portanto, os cristãos que morreram serão ressuscitados primeiro, em corpos glorificados e incorruptíveis, para encontrar o Senhor nos ares!</p><p>E então, os cristãos vivos serão transformados instantaneamente. Teremos corpos ressuscitados, glorificados, imortais, incapazes de sentir dor, doença ou morte. Seremos completamente livres do pecado, da tentação, de toda fraqueza. Que transformação gloriosa!</p><p>Após a ressurreição e transformação, os cristãos encontrarão o Senhor nos ares. 1 Tessalonicenses 4:17 diz: "Depois nós, os vivos, os que formos deixados, seremos arrebatados juntamente com eles nas nuvens, a encontrar o Senhor nos ares, e assim estaremos sempre com o Senhor." Pode imaginar isto? Estar sempre com Jesus! Estar na Sua presença! Isto é o céu!</p><p>A natureza exata da sequência - se há arrebatamento pré-tribulação, mid-tribulação, ou pós-tribulação - é onde cristãos têm diferentes interpretações. Mas o essencial é claro: Cristo volta em glória, os mortos ressuscitam, os vivos são transformados, e todos estamos para sempre com o Senhor. Isto é a esperança cristã!</p><p>Agora, uma pergunta prática: quando isto acontecerá? Jesus disse em Mateus 24:36: "Mas a respeito daquele dia e hora ninguém sabe, nem os anjos do céu, mas unicamente meu Pai." Portanto, não saberemos o dia exato. Isto não deve nos desencorajar. Significa que devemos estar sempre preparados, sempre vigilantes, sempre prontos para encontrar nosso Senhor.</p><p>Que é ser preparado? Significa estar em relacionamento vivo com Cristo. Significa ter confessado Jesus como Senhor e Salvador. Significa estar vivendo em obediência ao evangelho. Significa que se Cristo viesse hoje, você estaria pronto para estar na Sua presença. Não há preocupação em estar "pronto" se você tem fé genuína em Jesus.</p><p>Portanto, meu amado, deixe que a esperança da segunda vinda de Cristo encha seu coração! Não seja assustado pelos sinais dos tempos. Seja encorajado por eles! Pois indicam que o retorno de nosso Salvador se aproxima. E quando Ele vem, tudo será feito direito. Justiça será consumada. Sofrimento terminará. Estaremos para sempre com Aquele que nos amou e se entregou por nós. Aleluia!</p>`,cards:[{q:"Como será a segunda vinda de Cristo conforme descrita nas Escrituras?",a:"Será visível, literal, gloriosa, acompanhada por sinais, ressurreição dos mortos, transformação dos vivos, e reunião eterna com o Senhor."}]},

  {id:4,name:'O Arrebatamento da Igreja',dur:'15 min',content:`<h3>O Arrebatamento: Encontro com o Senhor nos Ares</h3><p>Que passagem maravilhosa temos em 1 Tessalonicenses 4:16-17! "O próprio Senhor descerá do céu com alarido, com voz de arcanjo, e com a trombeta de Deus; e os mortos em Cristo ressuscitarão primeiro. Depois nós, os vivos, os que formos deixados, seremos arrebatados juntamente com eles nas nuvens, a encontrar o Senhor nos ares, e assim estaremos sempre com o Senhor."</p><p>Este é o arrebatamento! A palavra grega é "harpazo" que significa "pegar rapidamente, arrancar, tomar por força". Em latim, foi traduzido como "raptura", de onde vem a palavra portuguesa "arrebatamento". É uma retirada rápida, súbita, gloriosa dos crentes para encontrar o Senhor!</p><p>Porque esta verdade é tão maravilhosa? Permita-me explicar o contexto. Os tessalonicenses estavam preocupados. Alguns de seus irmãos e irmãs tinham morrido. Eles estavam ansiosos sobre: "Se meu irmão morreu, será que o perderei para sempre? Ele estará desfavorecido quando Jesus voltar?" Paulo escreve para confortá-los com a verdade do arrebatamento.</p><p>Ele assegura que os mortos em Cristo não estarão desfavorecidos. Pelo contrário, ressuscitarão primeiro! Seus corpos, que foram enterrados no pó, serão ressuscitados glorificados. Eles encontrarão o Senhor nos ares juntamente com aqueles que ainda estão vivos. E então todos os crentes - tanto ressuscitados quanto aqueles transformados instantaneamente - estarão eternamente com o Senhor.</p><p>Que consolo isto teria sido para os tessalonicenses! E que consolo é para nós quando perdemos entes queridos cristãos. Não é adeus permanente. É apenas uma separação temporária. No dia do arrebatamento, seremos reunidos novamente, e será para sempre!</p><p>Agora, sobre o timing exato do arrebatamento - se é pré-tribulação, mid-tribulação, ou pós-tribulação - há diferentes perspectivas entre cristãos sinceros. Deixe-me explicar brevemente as posições.</p><p>Pré-tribulacionismo: Esta visão ensina que o arrebatamento da Igreja ocorre antes da Grande Tribulação (um período de sete anos de angústia profunda). Portanto, a Igreja é removida antes do sofrimento máximo. Aqueles que sustentam esta posição apontam para a promessa de Jesus em Apocalipse 3:10 de manter a Igreja "da hora da tentação" e para a ideia de que a Igreja não precisa experimentar a tribulação. Assembleia de Deus historicamente tem enfatizado esta visão.</p><p>Mid-tribulacionismo: Esta visão ensina que o arrebatamento ocorre no meio da tribulação, após 3,5 anos de angústia. Menos comum, mas mantido por alguns cristãos sinceros.</p><p>Pós-tribulacionismo: Esta visão ensina que o arrebatamento ocorre após toda a tribulação. A Igreja passa através de grande tribulação mas é protegida por Deus durante este período. Esta também é uma posição legítima mantida por muitos cristãos evangélicos sinceros.</p><p>Qual é a posição correta? Honestamente, há argumentos bíblicos em cada posição. Cristãos dedicados que amam a Bíblia profundamente chegam a conclusões diferentes. Eu não vou ser dogmático em dizer que uma é absolutamente correta e as outras erradas. O que é certo é que Cristo voltará para Seu povo, que haverá ressurreição e transformação dos crentes, e que estaremos eternamente com o Senhor.</p><p>O que é importante é isto: independentemente do timing exato do arrebatamento, você está preparado? Você tem um relacionamento pessoal com Jesus Christ? Você confiou Nele como seu Senhor e Salvador? Porque se sim, você não precisa temer o dia do arrebatamento. Você estará entre aqueles que encontram o Senhor nos ares!</p><p>Há outra verdade importante sobre o arrebatamento: ele será instantâneo. Paulo escreve em 1 Coríntios 15:52: "num abrir e fechar de olhos". Isto significa que em um momento, instantaneamente, a transformação acontecerá. Não há tempo para preparação de última hora. Não há segunda chance após o arrebatamento. Portanto, a preparação deve ser feita agora, enquanto você ainda está vivo nesta era presente!</p><p>E que é esta preparação? Simplesmente aceitar Jesus como seu Senhor e Salvador. Confessar seus pecados. Pedir-Lhe para transformar seu coração e vida. Dedicar-se a segui-Lo. Isto é suficiente. A fé em Jesus é o que importa. Se você tem isso, você estará no arrebatamento, reunido eternamente com o Senhor.</p><p>Portanto, deixe que a esperança do arrebatamento seja conforto para você! Se você é cristão, você será arrebatado! Não há medo, pois Jesus Himself descerá para nos buscar. Que dia glorioso será!</p>`,cards:[{q:"O que é o arrebatamento conforme descrito em 1 Tessalonicenses 4:16-17?",a:"É a retirada súbita e gloriosa dos crentes vivos para encontrar o Senhor nos ares, juntamente com os ressuscitados mortos em Cristo."}]},

  {id:5,name:'A Grande Tribulação e o Anticristo',dur:'15 min',content:`<h3>A Grande Tribulação: Julgamento Divino e Oportunidade de Salvação</h3><p>Este é um tópico que merece consideração cuidadosa. A Grande Tribulação é um período predito nas Escrituras, frequentemente entendido como tendo duração de sete anos, que precede a volta visível de Cristo em glória. É descrito em Daniel 12:1, Mateus 24:21, e em detalhes em Apocalipse 6-19.</p><p>Qual é a natureza da Grande Tribulação? É um período de julgamento divino sobre a Terra. As Escrituras descrevem sete selos sendo abertos, sete trombetas soando, e sete taças de ira sendo derramadas. Há terremotos catastróficos, escuridão, cometas caindo, falhas nas colheitas. A Bíblia descreve isto como um tempo como nenhum outro na história humana - mas também com a promessa de que Deus encurtaria estes dias "por causa dos escolhidos" (Mateus 24:22).</p><p>Agora, é importante notar que mesmo durante a tribulação, a Bíblia prediz que o evangelho continuará sendo pregado! Apocalipse 14:6-7 descreve um anjo pregando o evangelho eterno "a toda nação, tribo, língua e povo". Portanto, mesmo durante este período sombrio, haverá oportunidade de salvação. Pessoas virão a Cristo durante a tribulação. Será difícil - muitos sofrerão, e o livro de Apocalipse menciona mártires durante este período - mas Deus oferecerá misericórdia mesmo nesta era obscura.</p><p>Quem é o Anticristo? As Escrituras falam de uma figura chamada "Anticristo" ou "Besta" que surge durante a tribulação. 1 João 2:18 escreve: "Filhinhos, é a última hora; e, como ouvistes que vem o anticristo, também agora muitos anticristos têm surgido; pela qual conhecemos que é a última hora." Daniel 7 e 11 oferecem descrições proféticas desta figura. Apocalipse 13 também descreve a ascensão de uma "Besta" que faz guerra aos santos.</p><p>Qual será a natureza do Anticristo? As Escrituras sugerem uma figura política e religiosa de poder extraordinário. Será capaz de mobilizar nações. Terá um sistema econômico (o "número da Besta", 666, relacionado ao comércio conforme Apocalipse 13:17). Exigirá adoração. Será carismático e enganador, capaz de iludir muitos.</p><p>Mas aqui está a verdade confortadora: o Anticristo e todos os seus poderes serão completamente destruídos quando Cristo retorna em glória! Apocalipse 19:19-20 descreve: "E vi a besta, e os reis da terra, e os seus exércitos, reunidos para fazerem guerra àquele que estava montado no cavalo branco. E a besta foi presa, e com ela o falso profeta que havia feito sinais diante dela... foram ambos lançados no lago de fogo." O Anticristo não triunfará. Sua derrota é certa e iminente do ponto de vista de Deus.</p><p>Como devemos responder a estes ensinamentos? Primeiro, não com medo, mas com vigilância. Jesus nos adverte a não sermos enganados. Devemos conhecer a Palavra de Deus bem o suficiente para discernir quando alguém ou alguma coisa pretende ser Cristo quando não é. Devemos estar alertas a sinais de que o fim se aproxima.</p><p>Segundo, com urgência missionária. Se sabemos que os tempos finais se aproximam, nossa responsabilidade é evangelizar com energia e paixão! Devemos pregar o evangelho enquanto há tempo. Paulo escreve em 2 Timóteo 4:2: "Prega a palavra, insta, quer seja oportuno quer não, corrige, repreende, exorta com toda a longanimidade e doutrina."</p><p>Terceiro, com segurança se somos cristãos. Se você confiou em Jesus, você não precisa temer o Anticristo ou a tribulação. Você será arrebatado (de acordo com a interpretação pré-tribulacionista), ou protegido (de acordo com outras interpretações), ou vitorioso mesmo em meio ao sofrimento (de acordo com outras perspectivas). Em qualquer caso, Jesus promete nunca deixar nem desamparar aqueles que são Seus (Hebreus 13:5).</p><p>A tribulação, por mais sombria que pareça, não é o fim da história. É o penúltimo capítulo. O último capítulo é a vitória de Cristo, a destruição do mal, a eternidade com Deus. Portanto, mantenhamos nossa fé, nossa vigilância, e nossa esperança!</p>`,cards:[{q:"O que é a Grande Tribulação conforme descrita nas Escrituras?",a:"Um período de julgamento divino sobre a Terra, predito como durando sete anos, que precede a volta visível de Cristo."}]},

  {id:6,name:'O Milênio: Reinado de Cristo',dur:'15 min',content:`<h3>O Milênio: Mil Anos de Paz e Justiça</h3><p>Que promessa gloriosa é revelada em Apocalipse 20! Após a volta de Cristo e a derrota do Anticristo, há um período chamado "milênio", literalmente "mil anos", durante o qual Cristo reina sobre a Terra. Esta é uma esperança luminosa que aquece o coração cristão!</p><p>Apocalipse 20:1-3 descreve: "Vi a um anjo descer do céu, tendo a chave do abismo e uma grande corrente na mão. Ele prendeu o dragão, a serpente antiga, que é o Diabo, Satanás, por mil anos, e lançou-o no abismo, e fechou-o, e pôs um selo sobre ele, para que não engane mais as nações, até que se cumpram os mil anos."</p><p>Portanto, no início do milênio, Satanás é preso e removido de influência. Isto tem significância tremenda! Durante toda a história da humanidade, desde o Jardim do Éden, Satanás tem trabalhado para enganar, corromper e destruir. Mas no milênio, sua influência é removida. Que alívio isto seria para uma humanidade sofrida e cansada de luta contra o mal!</p><p>E Cristo reina durante este período. Apocalipse 20:4 diz: "Vi tronos; e sentaram-se sobre eles... e reinarão com Cristo durante mil anos." Os cristãos, aqueles que confessaram Cristo como Senhor, reinarão com Ele! Você, se for cristão, reinará com Jesus! Que privilégio extraordinário!</p><p>Como será o milênio? As Escrituras sugerem um período de paz, justiça e harmonia. Isaías 11:6-9 oferece uma visão poética: "O lobo habitará com o cordeiro, e o leopardo se deitará com o cabrito; e o bezerro, e o leão novo, e a criança pequena andarão juntos. A vaca e a ursa pastarão juntas, e seus filhos se deitarão juntos; e o leão comerá palha como o boi. A criança de peito brincará sobre a toca da áspide, e a criança desmamada meterá a mão na cova da víbora. Não se fará mal nem dano algum em todo o meu santo monte; porque a terra se encherá do conhecimento do Senhor, como as águas cobrem o mar."</p><p>Isto é claramente uma visão simbólica e poética, mas representa uma verdade importante: o milênio será um período de harmonia, paz, segurança. O instinto predador será removido. Não haverá exploração. A violência será suprimida. O conhecimento de Deus enchará a terra. Que mundo maravilhoso isto seria!</p><p>Agora, como o milênio terminará? Apocalipse 20:7-10 descreve: "Ora, quando se completarem os mil anos, Satanás será solto da sua prisão, e sairá a enganar as nações que estão nos quatro cantos da terra... e subiu sobre a largura da terra, e cercou o acampamento dos santos e a cidade bem-amada; e desceu fogo do céu, e os devorou. E o Diabo, que os enganava, foi lançado no lago de fogo e enxofre."</p><p>Portanto, no final dos mil anos, Satanás é solto brevemente para um teste final. Há uma revolta final contra Cristo. Mas é rapidamente suprimida, e Satanás é finalmente e eternamente condenado ao lago de fogo. Sua derrota é completa e permanente.</p><p>Agora, há uma questão interpretativa importante aqui. Diferentes tradições cristãs entendem o milênio diferentemente. Deixe-me apresentar as três principais posições.</p><p>Pré-milenarismo: Esta visão (mantida pela Assembleia de Deus e muitos evangélicos) ensina que Cristo retorna antes do milênio. Portanto, é literal: Ele vem em glória, derrota o Anticristo, prende Satanás, e então há um período literal de mil anos de paz com Cristo regnando na Terra. Após os mil anos, há o juízo final e a eternidade.</p><p>Amileniarismo: Esta visão nega que há um milênio literal futuro. Em vez disso, entende o "mil anos" de Apocalipse 20 simbolicamente como representando o período presente entre a ascensão de Cristo e Seu retorno final. Nesta visão, a Igreja é o "reino de Cristo" reina, e não há período futuro separado de mil anos.</p><p>Pós-milenarismo: Esta visão ensina que o evangelho gradualmente transformará o mundo em um "milênio" espiritual de paz e justiça, após o qual Cristo retorna. É menos comum entre pentecostais e assembleianos.</p><p>Qual é a interpretação correta? Novamente, cristãos sinceros e dedicados chegam a conclusões diferentes. O pré-milenarismo (que é a posição histórica da Assembleia de Deus) oferece uma visão concreta e literal dos mil anos que é consoladora. Mas não vou dizer dogmaticamente que é a única interpretação válida.</p><p>O que é importante é reconhecer: haverá um fim da história conforme a conhecemos. Haverá uma consumação do plano de Deus. Haverá justiça final. Haverá paz completa. Haverá harmonia restaurada. E como crentes, reinaremos com Cristo! Que esperança gloriosa!</p>`,cards:[{q:"O que é o milênio conforme descrito em Apocalipse 20?",a:"É um período de mil anos durante o qual Cristo reina, Satanás é aprisionado, e a paz e justiça prevalecem na Terra."}]},

  {id:7,name:'O Juízo Final',dur:'15 min',content:`<h3>O Juízo Final: Retidão Divina Revelada</h3><p>Este é um tópico que merece profunda reverência e atenção. O Juízo Final é o momento em que toda a humanidade comparece diante de Deus para responder por suas ações e para receber seu destino eterno. É ao mesmo tempo um conceito que poderia despertar medo em corações não-preparados, mas que deveria encher os corações redimidos de alegria, pois é quando a justiça de Deus é consumada.</p><p>Mateus 25:31-32 descreve vivamente o Juízo Final: "Ora, quando o Filho do Homem vier na sua glória, e todos os anjos com ele, então se assentará no trono da sua glória; e todas as nações serão reunidas diante dele, e ele separará uns dos outros, como o pastor separa as ovelhas dos bodes."</p><p>Portanto, há uma separação. As "ovelhas" são aqueles que seguiram Cristo, que creram Nele, que viveram em obediência ao evangelho. Os "bodes" são aqueles que rejeitaram Cristo, que viveram em rebelião contra Deus, que não se arrependeram. Todos comparecem, mas são separados.</p><p>Qual é a base do julgamento? A Bíblia oferece múltiplas perspectivas que são complementares. Primeiro, há julgamento baseado em fé em Cristo. João 3:18 diz: "Quem crê nele não é condenado; quem não crê já está condenado, porquanto não crê no nome do Filho unigênito de Deus." A fé em Jesus é central.</p><p>Segundo, há julgamento baseado em obras. Mateus 25:35-40 descreve como o Juiz pergunta aos justos: "Porque tive fome, e vós me destes de comer; tive sede, e vós me destes de beber... Na verdade vos digo que, sempre que o fizestes a um destes meus pequeninos irmãos, a mim o fizestes." As obras de amor e misericórdia são evidência de fé genuína.</p><p>Terceiro, há julgamento baseado em intento e conhecimento. A Bíblia enfatiza que Deus conhece os corações. Ele conhece nossas motivações. Ele conhece se nossas ações externas refletem fé genuína ou hipocria. Romanos 2:15-16 fala sobre a consciência e a lei de Deus inscrita nos nossos corações.</p><p>Portanto, o julgamento é complexo e profundo. Não é simplesmente baseado em uma lista de "ações corretas". Deus examina o coração. Ele conhece se você verdadeiramente seguiu Cristo ou se apenas pretendeu fazer isto.</p><p>O que acontece aos justificados? Mateus 25:34 diz: "Então dirá o Rei aos que estiverem à sua direita: Vinde, benditos de meu Pai, possuí o reino que vos está preparado desde a fundação do mundo." Os cristãos redimidos entram em alegria eterna na presença de Deus. Não há palavras adequadas para descrever a felicidade, a paz, a comunhão com Deus que espera aos santos eternamente.</p><p>O que acontece aos condenados? Mateus 25:41 diz: "Então dirá também aos que estiverem à sua esquerda: Apartai-vos de mim, malditos, para o fogo eterno, preparado para o Diabo e seus anjos." Há um lugar de separação de Deus, frequentemente chamado "inferno", reservado para aqueles que rejeitam Cristo. Isto é uma realidade séria.</p><p>Agora, como devemos compreender o inferno? A Bíblia o descreve em termos de escuridão, fogo, separação de Deus. Alguns entendem isto literalmente; outros entendem como simbolismo para descrever a pior realidade imaginável - estar separado de Deus, do amor, da luz, da alegria. De qualquer forma, é claro que é indesejável.</p><p>Mas aqui está a verdade confortadora: você não precisa enfrentar condenação se confiar em Jesus! Ele oferece salvação gratuitamente. Ele pagou o preço de seus pecados na cruz. Tudo que você precisa fazer é aceitar Seu presente de graça. "Quem crê no Filho tem a vida eterna" (João 3:36).</p><p>O Juízo Final não deveria nos causar desespero se somos cristãos. Deveria causar-nos urgência em levar o evangelho aos não-cristãos! Se você sabe que haverá um juízo final, que todas as pessoas comparecerão diante de Deus, não deveria você estar ansioso em compartilhar o evangelho com aqueles que você ama? Não deveria você estar intercedendo por seus amigos e familiares não-cristãos em oração?</p><p>Portanto, deixe que o Juízo Final motive você a justiça, a compaixão, a urgência missionária, e a gratidão pela salvação que você recebeu em Cristo!</p>`,cards:[{q:"O que é o Juízo Final conforme descrito na Bíblia?",a:"É o momento em que toda a humanidade comparece diante de Deus para responder por suas ações e receber seu destino eterno."}]},

  {id:8,name:'O Novo Céu e a Nova Terra',dur:'15 min',content:`<h3>O Novo Céu e a Nova Terra: Eternidade Gloriosa</h3><p>Oh, que visão radiante Deus nos oferece no final das Escrituras! Apocalipse 21:1-4 descreve: "Vi um novo céu e uma nova terra; porque o primeiro céu e a primeira terra passaram. Vi também a Cidade Santa, a nova Jerusalém, que descia do céu, da parte de Deus, e vinha como uma noiva adornada para o seu marido. Ouvi uma grande voz, que dizia: Eis aqui o tabernáculo de Deus com os homens, pois Deus habitará com eles. Eles serão povos de Deus, e Deus mesmo estará com eles. Enxugará Deus toda lágrima dos seus olhos, e não haverá mais morte, nem pranto, nem clamor, nem dor; porque as primeiras coisas já passaram."</p><p>Esta é a esperança suprema! Não apenas uma vida futura abstrata e incorpórea, mas uma realidade nova e completamente restaurada onde Deus e humanidade habitam juntos em comunhão perfeita. Céu não é um lugar vago onde flutuamos em nuvens. É uma Terra restaurada, renovada, perfeita.</p><p>Que características tem este novo cosmos? Permitam-me enumerar o que as Escrituras revelam.</p><p>Primeiro: Ausência de sofrimento. "Não haverá mais morte, nem pranto, nem clamor, nem dor." Imagine um mundo completamente livre de morte. Ninguém morre. Ninguém experiencia luto. Ninguém sente dor. Ninguém fica doente. Toda a tragédia da existência humana - a morte, a doença, o sofrimento - é completamente removida. Que alívio incomparável!</p><p>Segundo: Presença de Deus. "Deus habitará com eles... e Deus mesmo estará com eles." A separação entre Deus e humanidade, causada pelo pecado, é finalmente curada. Podemos estar na presença de Deus face a face. Podemos comunicar com Ele diretamente. Estaremos em comunhão perfeita com nosso Criador!</p><p>Terceiro: Comunhão perfeita. "Eles serão povos de Deus." Há comunidade, relacionamento, companheirismo. Estaremos com outros santos, com aqueles que amamos que também são cristãos, em unidade e harmonia perfeita. Não há conflito, não há mal-entendido, não há divisão. Apenas amor puro e comunhão.</p><p>Quarto: Beleza e glória. Apocalipse 21:10-11 descreve a Cidade Santa: "Levou-me em Espírito a um monte grande e alto, e mostrou-me a Cidade Santa, Jerusalém, que descia do céu, da parte de Deus, tendo a glória de Deus. Seu resplendor era semelhante ao de uma pedra précioíssima, como a jaspe cristalina." A beleza da eternidade será indescritível. Haverá esplendor, glória, beleza sem precedentes.</p><p>Quinto: Estrutura e significado contínuos. A nova Terra não é despovoada. Apocalipse 21:24 menciona que "as nações andarão pela sua luz [da Cidade], e os reis da terra lhe trarão a sua glória." Há nações, estrutura social, governo justo. Não é um fim da história; é um novo começo, restaurado e perfeito.</p><p>Sexto: Acesso à Árvore da Vida. Apocalipse 22:2 diz: "No meio da rua da Cidade e de um e outro lado do rio estava a Árvore da Vida, que produz doze frutos, dando cada mês o seu fruto; e as folhas da Árvore são para a saúde das nações." A Árvore da Vida, da qual Adão e Eva foram privados no Jardim, está disponível novamente. Não há mais banimento. Podemos comer livremente do fruto da vida eterna.</p><p>Sétimo: Fim da noite, fim da escuridão. Apocalipse 21:25 e 22:5 indicam que não há noite na Cidade Santa. "A Cidade não necessita de sol nem de lua para que nela brilhem; porque a glória de Deus a ilumina, e o Cordeiro é a sua lâmpada." Haverá claridade perfeita. Nenhuma escuridão, nenhuma incerteza, nenhuma ignorância. Tudo será revelado na luz de Deus.</p><p>E aqueles que herdam esta eternidade? Apocalipse 21:7 promete: "Quem vencer herdará todas as coisas; serei seu Deus, e ele será meu filho." Se você é vencedor em Cristo - isto é, se confiou Nele e permaneceu fiel - você herdará esta eternidade gloriosa!</p><p>Oh, meu amado irmão, como este pensamento deveria aquentar seu coração! Não importa quais dificuldades você enfrenta agora. Não importa quanto sofrimento há no mundo. Não importa quantas injustiças testemunhamos. Tudo será redimido. Tudo será restaurado. Estaremos eternamente com Deus em beleza, paz, e alegria indescritível.</p><p>Este é o clímax da história. Este é o propósito final de Deus. E você pode estar lá! Tudo que você precisa é confiar em Jesus Cristo como seu Senhor e Salvador. Ele preparou este lugar para você. Ele o quer na eternidade. Que privilégio incomparável!</p>`,cards:[{q:"Como será o novo céu e a nova terra segundo Apocalipse 21?",a:"Será um lugar de perfeita beleza e comunhão com Deus, livre de morte, dor, sofrimento, onde Deus habita com a humanidade para sempre."}]},

  {id:9,name:'Vivendo com Esperança Escatológica',dur:'15 min',content:`<h3>Vivendo com Esperança: Ética para os Últimos Dias</h3><p>Que privilégio encerrar este curso com reflections práticas sobre como devemos viver à luz da escatologia! Compreender os eventos finais não é apenas matéria teórica. Deve transformar como vivemos hoje. Deve mudar nossas prioridades, nossas escolhas, nossos relacionamentos!</p><p>Paulo escreve em 2 Pedro 3:11: "Visto que todas estas coisas se dissolverão, como vós deveis ser em santa conduta e piedade!" Se sabemos que o fim vem, como devemos viver? A resposta é com santidade, com integridade, com consagração a Deus.</p><p>Primeiro: Viva com urgência missionária. Se você compreende que os tempos se cumprem, que os sinais apontam para o retorno de Cristo, você deveria estar inflamado com paixão de evangelizar! Há pessoas que morrerão sem Cristo. Há nações que não ouviram ainda o evangelho claramente. Há indivíduos em sua própria comunidade, sua família, seu trabalho, que não conhecem Jesus.</p><p>Você tem a responsabilidade e o privilégio de compartilhar o evangelho! "Portanto, ide e ensinai todas as nações" é a Grande Comissão que Jesus nos deixou (Mateus 28:19-20). Não é séculos antes de sermos requeridos cumprir isto. É agora! Enquanto há tempo!</p><p>Segundo: Viva em santidade e pureza. Se você espera encontrar Jesus nos ares, você deveria estar vivendo de forma digna dessa expectativa! 1 João 3:3 diz: "E todo o que tem esta esperança em si, puifica-se a si mesmo, como também ele é puro." A esperança do retorno de Cristo não deveria encorajá-lo a viver pecaminosamente, mas a viver piamente!</p><p>Deixe de lado os pecados que o escravizam. Resista à tentação. Cultive o fruto do Espírito: amor, alegria, paz, paciência, gentileza, bondade, fidelidade, mansidão, temperança (Gálatas 5:22-23). Viva de forma que quando Jesus voltar, você possa estar-Lhe face a face sem vergonha.</p><p>Terceiro: Viva com justiça social e compaixão. O ensino de Jesus não era apenas "escapar deste mundo mau". Era transformar este mundo com justiça e amor! Devemos cuidar dos pobres, buscar justiça para os oprimidos, tratar todos com dignidade porque todos são feitos à imagem de Deus.</p><p>Mateus 25:31-46 descreve o Juízo Final baseado em obras de misericórdia. "Porque tive fome, e vós me destes de comer..." A compaixão e o cuidado pelos necessitados não é optativo; é central à fé cristã, especialmente se esperamos encontrar nosso Juiz em breve.</p><p>Quarto: Não seja ansioso, mas permita que a esperança torne-o corajoso. Há muito medo hoje sobre o futuro. Há ansiedade sobre guerra, doença, disastres naturais, colapso econômico. Mas se você compreende a escatologia, você sabe que Deus está no controle. Que ele tem um plano. Que a história está movendo-se para um clímax onde Ele triunfa completamente.</p><p>Jesus nos instrui: "Não se turbe o vosso coração... Na casa de meu Pai há muitas moradas" (João 14:1-2). Deixe que a promessa do retorno de Cristo e da eternidade com Deus conforte-o. Você não é órfão. Você tem um Pai que o ama e virá lhe buscar!</p><p>Quinto: Não seja dogmático sobre detalhes que você não compreende perfeitamente. Como observei durante este curso, há cristãos sinceros que discordam sobre o timing exato do arrebatamento, a natureza exata do milênio, etc. Isto é aceitável. Não permita que desacordos sobre interpretação o causem a julgar severamente aqueles com quem discorda.</p><p>Mantenha a unidade do Espírito mesmo em meio à diversidade de interpretação escatológica. O que importa é que você e seus irmãos concordam que Cristo retorna, que há esperança, que Deus triunfa. Lutem pelas coisas essenciais; sejam graciosos sobre interpretações secundárias.</p><p>Sexto: Mantenha vigilância espiritual. Jesus nos instrui: "Vigiai, pois, porque não sabeis a que hora vosso Senhor há de vir" (Mateus 24:42). Isto não significa hipervigilância paranoica ou obsessão com sinais. Significa estar mentalmente alerta, espiritualmente desperto, moralmente preparado. Significa não dormir espiritualmente como os não-crentes que "dormem à noite e embebedam-se à noite" (1 Tessalonicenses 5:7).</p><p>Sétimo: Mantenha esperança radiante mesmo em meio ao sofrimento. Há dificuldades agora. Há dor. Há injustiça. Mas você sabe como termina a história! Você sabe que Cristo retorna em glória. Você sabe que haverá eternidade restaurada. Você sabe que tudo será redimido.</p><p>Portanto, "regozijai-vos sempre no Senhor" como Paulo nos instrui (Filipenses 4:4). Que a esperança da eternidade com Deus seja uma fonte de alegria inquebrantável, uma âncora de sua alma em tempos de tempestade!</p><p>Em conclusão, meu querido aluno, o estudo da escatologia não deveria amedrontar-o ou desanimar-o. Deveria encher-o de esperança, urgência, e alegria! Você sabe que o fim está vindo. Você sabe que Deus vence. Você sabe que, se é cristão, tem eternidade gloriosa aguardando-o. Portanto, vivencie hoje com essa perspectiva! Seja diligente em evangelização. Seja dedicado à santidade. Seja corajoso na fé. E aguarde com alegria pelo dia em que seu Senhor retorna em glória! Maranata - "Vem, Senhor Jesus"!</p>`,cards:[{q:"Como a compreensão dos últimos dias deveria afetar como vivemos hoje?",a:"Deveria motivar-nos a evangelizar urgentemente, viver em santidade, buscar justiça social, manter esperança, e permanecer vigilantes espiritualmente."}]}
];
