<script>
var COURSE = { id:'II', name:'Inglês Intermediário', shortName:'Inglês Intermediário', cat:'Idiomas', desc:'Aprofunde seus conhecimentos com tempos verbais avançados, phrasal verbs, conversação e expressões idiomáticas.', salt:'II_HENRY_2026_MASTER', ak:'ii_auth', courseKey:'ii', prefix:'ii_', color:'#388E3C', glow:'rgba(56,142,60,.35)', free:true, freeModules:1, modules:3, topics:9, hours:4, quizzes:9 };
var MODS = [
  { id:'ii_mod1', name:'Tempos Verbais Avançados', free:true,
    topics:[
      {id:1, name:'Passado Simples e Passado Contínuo', dur:'20 min', content:`<h3>Passado Simples e Passado Contínuo</h3><p>Agora que você já domina o Presente Simples, é hora de aprender a falar sobre o passado! Existem várias formas de expressar ações no passado em inglês, e cada uma tem um uso específico. Os dois tempos mais importantes e usados são o Passado Simples (Simple Past) e o Passado Contínuo (Past Continuous).</p><h4>Passado Simples (Simple Past)</h4><p>O Passado Simples é usado para ações que começaram e terminaram em um momento específico do passado. É o tempo mais comum para contar histórias e falar sobre eventos que já aconteceram.</p><p><strong>Formação com verbos regulares:</strong></p><p>Para verbos regulares, adicione "-ed" ao final do verbo: I worked (trabalhei) / You worked (você trabalhou) / He worked (ele trabalhou) / She worked (ela trabalhou) / We worked (nós trabalhamos) / They worked (eles trabalharam)</p><p><strong>Regras para adicionar -ed:</strong></p><p>Maioria dos verbos: "walk" → "walked" / "play" → "played" / "like" → "liked" / "work" → "worked"<br>Verbos terminados em -e: "live" → "lived" / "love" → "loved" / "move" → "moved"<br>Verbos terminados em -y: "study" → "studied" / "cry" → "cried" / "try" → "tried"<br>Verbos terminados em vogal + consoante (uma sílaba): "stop" → "stopped" / "plan" → "planned" / "commit" → "committed"</p><p><strong>Verbos irregulares (os mais comuns):</strong></p><p>Alguns verbos muito usados são irregulares e não seguem a regra! Os principais são:</p><p>Go → Went (ir) / Come → Came (vir) / See → Saw (ver) / Know → Knew (saber) / Take → Took (pegar) / Give → Gave (dar) / Find → Found (encontrar) / Think → Thought (pensar) / Say → Said (dizer) / Tell → Told (contar) / Get → Got (pegar) / Make → Made (fazer) / Do → Did (fazer) / Have → Had (ter) / Be → Was/Were (ser/estar) / Buy → Bought (comprar) / Bring → Brought (trazer) / Write → Wrote (escrever) / Read → Read (ler - mas pronuncia-se diferente no passado!) / Eat → Ate (comer) / Drink → Drank (beber) / Sleep → Slept (dormir) / Speak → Spoke (falar) / Understand → Understood (entender) / Stand → Stood (ficar em pé) / Leave → Left (sair) / Meet → Met (encontrar) / Pay → Paid (pagar) / Sell → Sold (vender) / Send → Sent (enviar) / Spend → Spent (gastar) / Begin → Began (começar) / Run → Ran (correr) / Sit → Sat (sentar) / Drive → Drove (dirigir) / Cut → Cut (cortar) / Hit → Hit (bater) / Put → Put (colocar)</p><p><strong>Forma negativa:</strong></p><p>Use "did not" ou "didn't" + verbo na forma básica (sem -ed!):<br>I didn't work / You didn't work / He didn't work / She didn't work / We didn't work / They didn't work</p><p>Observe: Não é "I didn't worked"! O verbo fica na forma básica depois de "didn't"!</p><p><strong>Forma interrogativa:</strong></p><p>Use "Did" + pronome + verbo na forma básica:<br>Did I work? / Did you work? / Did he work? / Did she work? / Did we work? / Did they work?</p><p><strong>Exemplos de Passado Simples:</strong></p><p>"I went to the park yesterday." (Fui ao parque ontem.) / "She ate pizza last night." (Ela comeu pizza ontem à noite.) / "They didn't watch TV." (Eles não assistiram TV.) / "Did you finish your homework?" (Você terminou seu dever de casa?) / "He worked in that company for 5 years." (Ele trabalhou naquela empresa por 5 anos.)"</p><h4>Passado Contínuo (Past Continuous)</h4><p>O Passado Contínuo é usado para ações que estavam acontecendo em um momento específico no passado. É frequentemente usado para descrever o que estava acontecendo quando outra coisa aconteceu.</p><p><strong>Formação:</strong></p><p>Use "Was" ou "Were" + verbo + "-ing":<br>I was working / You were working / He was working / She was working / It was working / We were working / They were working</p><p><strong>Regras para adicionar -ing:</strong></p><p>Maioria: "walk" → "walking" / "play" → "playing" / "work" → "working"<br>Verbos terminados em -e: Remova o -e: "live" → "living" / "make" → "making" / "hope" → "hoping"<br>Verbos terminados em vogal + consoante: Doble a consoante: "run" → "running" / "stop" → "stopping" / "swim" → "swimming" / "plan" → "planning"</p><p><strong>Forma negativa:</strong></p><p>Was/Were not + verbo + "-ing":<br>I wasn't working / You weren't working / He wasn't working / She wasn't working / We weren't working / They weren't working</p><p><strong>Forma interrogativa:</strong></p><p>Was/Were + pronome + verbo + "-ing":<br>Was I working? / Were you working? / Was he working? / Were they working?</p><p><strong>Exemplos de Passado Contínuo:</strong></p><p>"I was sleeping when you called." (Eu estava dormindo quando você ligou.) / "She was reading a book when it started to rain." (Ela estava lendo um livro quando começou a chover.) / "They were playing football at 5 PM." (Eles estavam jogando futebol às 5 da tarde.) / "Were you studying yesterday at 10 AM?" (Você estava estudando ontem às 10?)"</p><h4>Diferença entre Passado Simples e Passado Contínuo</h4><p><strong>Use Passado Simples para:</strong> Uma ação completa no passado / Uma série de ações completas no passado / Ações que aconteceram uma após a outra</p><p>Exemplos: "I went to the store and bought milk." (Fui à loja e comprei leite.) / "She finished her work at 5 PM." (Ela terminou seu trabalho às 5 da tarde.)"</p><p><strong>Use Passado Contínuo para:</strong> Uma ação que estava em progresso em um momento específico / Uma ação interrompida por outra ação / Duas ações acontecendo ao mesmo tempo no passado</p><p>Exemplos: "I was eating when my mother called." (Eu estava comendo quando minha mãe ligou.) / "She was working when the fire alarm rang." (Ela estava trabalhando quando o alarme de incêndio soou.) / "While he was driving, she was reading." (Enquanto ele dirigia, ela lia.)"</p><p><strong>Estrutura típica:</strong> "While + Past Continuous, Simple Past" ou "Simple Past + while + Past Continuous"</p><p>"While I was sleeping, someone knocked on the door." (Enquanto eu dormia, alguém bateu na porta.) / "I found my keys while I was cleaning the house." (Encontrei minhas chaves enquanto limpava a casa.)"</p>`, cards:[{q:"Qual é o passado de 'go'?",a:"O passado de 'go' é 'went'. É um verbo irregular, então não segue a regra de adicionar -ed."},{q:"Como se forma o Passado Contínuo?",a:"Use 'Was/Were' + verbo + '-ing'. Exemplo: 'I was working' (Eu estava trabalhando)."},{q:"Qual é correto: 'I didn't worked' ou 'I didn't work'?",a:"'I didn't work' é correto. Na forma negativa com 'didn't', o verbo fica na forma básica, sem -ed."}]},
      {id:2, name:'Futuro Simples e Futuro Próximo', dur:'22 min', content:`<h3>Futuro Simples e Futuro Próximo</h3><p>Agora você aprenderá a falar sobre coisas que ainda não aconteceram! Em inglês, existem várias formas de expressar o futuro. As duas mais comuns são o Futuro Simples (Simple Future) usando "will" e o Futuro Próximo (Going to) que expressa planos e intenções.</p><h4>Futuro com "Will" (Simple Future)</h4><p>Use "will" para fazer previsões, promessas, ou decisões tomadas no momento da fala. É a forma mais simples e direta de falar sobre o futuro.</p><p><strong>Formação:</strong></p><p>Will + verbo na forma básica:<br>I will work / You will work / He will work / She will work / We will work / They will work</p><p><strong>Forma contraída (muito comum):</strong></p><p>I'll work / You'll work / He'll work / She'll work / We'll work / They'll work</p><p><strong>Forma negativa:</strong></p><p>Will not / Won't + verbo na forma básica:<br>I won't work / You won't work / He won't work / She won't work / We won't work / They won't work</p><p><strong>Forma interrogativa:</strong></p><p>Will + pronome + verbo na forma básica:<br>Will I work? / Will you work? / Will he work? / Will they work?</p><p><strong>Usos de "Will":</strong></p><p>1. Previsões sobre o futuro: "It will rain tomorrow." (Vai chover amanhã.) / "The sun will rise at 6 AM." (O sol nascerá às 6 da manhã.) / "She will be happy." (Ela será feliz.)<br>2. Promessas: "I will help you." (Vou ajudá-lo.) / "He will come back." (Ele voltará.) / "We will never forget." (Nunca esqueceremos.)<br>3. Decisões tomadas no momento: "I will take coffee." (Vou tomar café.) / "I'll go with you." (Vou com você.) / "They will stay home." (Eles ficarão em casa.)<br>4. Oferecimento de ajuda: "I will help you with that." (Vou ajudá-lo com isso.) / "Will you carry this bag?" (Você carregará esta bolsa?)</p><p><strong>Exemplos completos:</strong></p><p>"I will graduate next year." (Vou me formar no próximo ano.) / "She won't come to the party." (Ela não virá à festa.) / "Will they arrive on time?" (Eles chegarão no horário?) / "I promise I will call you." (Prometo que vou ligar para você.)"</p><h4>Futuro Próximo com "Going to" (Near Future)</h4><p>Use "going to" para falar sobre planos e intenções que você já tem decididos. Geralmente é usado quando você já tomou a decisão antes do momento da fala ou quando há evidência clara de que algo vai acontecer.</p><p><strong>Formação:</strong></p><p>Am/Is/Are + going to + verbo na forma básica:<br>I am going to work / You are going to work / He is going to work / She is going to work / We are going to work / They are going to work</p><p><strong>Forma contraída:</strong></p><p>I'm going to work / You're going to work / He's going to work / She's going to work / We're going to work / They're going to work</p><p><strong>Forma negativa:</strong></p><p>Am/Is/Are not + going to + verbo:<br>I'm not going to work / You're not going to work / He's not going to work / They're not going to work</p><p><strong>Forma interrogativa:</strong></p><p>Am/Is/Are + pronome + going to + verbo:<br>Am I going to work? / Are you going to work? / Is he going to work? / Are they going to work?</p><p><strong>Usos de "Going to":</strong></p><p>1. Planos futuros: "I am going to visit Brazil next year." (Vou visitar o Brasil no próximo ano.) / "She is going to study medicine." (Ela vai estudar medicina.) / "We are going to buy a new car." (Vamos comprar um carro novo.)<br>2. Intenções: "I am going to start exercising." (Vou começar a fazer exercício.) / "He is going to call his mother." (Ele vai ligar para sua mãe.)<br>3. Predições baseadas em evidências: "Look at the sky! It's going to rain." (Olhe para o céu! Vai chover.) / "The ball is going to fall." (A bola vai cair.)</p><p><strong>Exemplos completos:</strong></p><p>"I'm going to learn English this year." (Vou aprender inglês este ano.) / "She isn't going to attend the meeting." (Ela não vai ir à reunião.) / "Are you going to watch the game?" (Você vai assistir o jogo?) / "They're going to get married next month." (Eles vão se casar no próximo mês.)"</p><h4>Diferença entre "Will" e "Going to"</h4><p><strong>Will:</strong> Decisão no momento / Promessa / Previsão / Oferta / Ação não planejada</p><p>"I'll help you." (Vou ajudá-lo - decisão agora) / "It will be sunny tomorrow." (Será ensolarado amanhã - previsão)</p><p><strong>Going to:</strong> Plano já decidido / Intenção / Evidência clara / Ação planejada</p><p>"I'm going to visit my family next week." (Vou visitar minha família semana que vem - já planejado) / "Look at those clouds! It's going to rain." (Olhe para aquelas nuvens! Vai chover - evidência clara)"</p><p>Na prática, muitas vezes os dois podem ser usados, mas "going to" é mais comum quando você está falando sobre planos específicos!</p>`, cards:[{q:"Qual é a forma contraída de 'will not'?",a:"'Won't' é a forma contraída de 'will not'. Exemplos: 'I won't go' (Não vou ir)."},{q:"Como se forma 'going to'?",a:"Use 'Am/Is/Are + going to + verbo'. Exemplo: 'I'm going to study' (Vou estudar)."},{q:"Qual é a diferença entre 'I'll go' e 'I'm going to go'?",a:"'I'll go' é uma decisão no momento. 'I'm going to go' é um plano já decidido. 'Going to' é mais comum para planos específicos."}]},
      {id:3, name:'Presente Perfeito (Present Perfect)', dur:'23 min', content:`<h3>Presente Perfeito (Present Perfect)</h3><p>O Present Perfect é um tempo verbal que conecta o passado ao presente. É usado para ações que começaram no passado mas continuam até agora, ou para ações no passado que ainda têm relevância no presente. Este é um conceito muito importante que diferencia o inglês de muitos outros idiomas!</p><h4>Formação do Present Perfect</h4><p><strong>Have/Has + particípio passado do verbo:</strong></p><p>I have worked / You have worked / He has worked / She has worked / It has worked / We have worked / They have worked</p><p><strong>Forma contraída:</strong></p><p>I've worked / You've worked / He's worked / She's worked / We've worked / They've worked</p><p><strong>Particípio passado:</strong></p><p>Para verbos regulares, é igual ao Passado Simples - adicione "-ed": worked, played, lived, studied<br>Para verbos irregulares, é variável: been, gone, eaten, drunk, written, spoken, seen, done, made, given</p><p><strong>Verbos irregulares comuns no Present Perfect:</strong></p><p>Be → been / Go → gone / Come → come / See → seen / Find → found / Get → gotten/got / Give → given / Make → made / Take → taken / Eat → eaten / Drink → drunk / Sleep → slept / Write → written / Read → read / Speak → spoken / Understand → understood / Leave → left / Meet → met / Buy → bought / Do → done / Have → had</p><p><strong>Forma negativa:</strong></p><p>Have/Has not + particípio passado:<br>I haven't worked / You haven't worked / He hasn't worked / She hasn't worked / We haven't worked / They haven't worked</p><p><strong>Forma interrogativa:</strong></p><p>Have/Has + pronome + particípio passado:<br>Have I worked? / Have you worked? / Has he worked? / Have they worked?</p><p><strong>Respostas curtas:</strong></p><p>"Have you finished?" "Yes, I have." / "Has she arrived?" "No, she hasn't." / "Have they called?" "Yes, they have."</p><h4>Usos do Present Perfect</h4><p><strong>1. Ações que começaram no passado e continuam até agora:</strong></p><p>"I have lived here for 10 years." (Moro aqui há 10 anos.) / "She has been a teacher since 2015." (Ela é professora desde 2015.) / "We have known each other for a long time." (Nos conhecemos há muito tempo.)"</p><p>Observe: Você usa "for" para períodos de tempo (10 years, 5 months) e "since" para pontos específicos (2015, Monday, 3 o'clock)</p><p><strong>2. Ações no passado recente com resultado no presente:</strong></p><p>"I have just finished my homework." (Acabei de terminar meu dever de casa.) / "She has recently arrived from Brazil." (Ela chegou recentemente do Brasil.) / "They have just called me." (Eles acabam de me ligar.)"</p><p><strong>3. Experiências de vida (sem mencionar quando exatamente):</strong></p><p>"I have visited 15 countries." (Já visitei 15 países.) / "Have you ever eaten sushi?" (Você já comeu sushi?) / "She has met the president." (Ela já conheceu o presidente.) / "They have never been to Paris." (Eles nunca estiveram em Paris.)"</p><p><strong>4. Ações repetidas no passado até agora:</strong></p><p>"I have called you three times today." (Liguei para você três vezes hoje.) / "She has been late twice this month." (Ela chegou atrasada duas vezes este mês.)"</p><h4>Expressões Comuns com Present Perfect</h4><p><strong>Just:</strong> "I have just arrived." (Acabei de chegar.) / "She has just called." (Ela acabou de ligar.)<br><strong>Already:</strong> "I have already eaten." (Já comi.) / "They have already left." (Eles já saíram.)<br><strong>Yet:</strong> "Have you finished yet?" (Você já terminou?) / "I haven't seen him yet." (Ainda não o vi.)<br><strong>Ever:</strong> "Have you ever been to Europe?" (Você já foi à Europa?)<br><strong>Never:</strong> "I have never eaten pizza." (Nunca comi pizza.) / "She has never been late." (Ela nunca chegou atrasada.)<br><strong>For:</strong> "I have worked here for 5 years." (Trabalho aqui há 5 anos.)<br><strong>Since:</strong> "I have worked here since 2020." (Trabalho aqui desde 2020.)<br><strong>Lately/Recently:</strong> "I have been very busy lately." (Tenho estado muito ocupado ultimamente.)</p><h4>Present Perfect vs Simple Past</h4><p><strong>Use Present Perfect:</strong> Quando o resultado ou relevância continua no presente / Você não sabe ou não quer mencionar quando exatamente / Com "yet", "already", "just", "ever", "never"</p><p>"I have lost my keys." (Perdi minhas chaves - ainda estou procurando por elas)</p><p><strong>Use Simple Past:</strong> Quando a ação é completa e não tem relevância no presente / Você menciona um momento específico no passado</p><p>"I lost my keys yesterday." (Perdi minhas chaves ontem - você sabe exatamente quando)</p><p>Compare: "Have you eaten?" (Você comeu? - importa se você está com fome agora) vs "Did you eat at 5 PM?" (Você comeu às 5? - é informação histórica, não relevante agora)</p>`, cards:[{q:"Como se forma o Present Perfect?",a:"Use 'Have/Has + particípio passado'. Exemplo: 'I have worked' / 'She has eaten'."},{q:"Qual é a diferença entre 'for' e 'since'?",a:"'For' é usado com períodos de tempo ('for 5 years'). 'Since' é usado com pontos específicos ('since 2020')."},{q:"Quando usar 'I have done' em vez de 'I did'?",a:"Use 'I have done' quando o resultado é relevante agora ou você não mencionou quando. Use 'I did' quando mencionou um momento específico no passado."}]},
    ],
    summary:{title:"Resumo do Módulo 1: Tempos Verbais Avançados", points:["Passado Simples (Simple Past) é para ações completas no passado. Verbos regulares ganham -ed, e verbos irregulares têm formas únicas que devem ser memorizadas.","Passado Contínuo (Past Continuous) descreve ações que estavam em progresso em um momento específico. Use 'Was/Were + ing'.","Futuro com 'Will' é para decisões, promessas e previsões. Futuro com 'Going to' é para planos já decididos e intenções.","Present Perfect conecta o passado ao presente. Use para ações que começaram no passado e continuam agora, ou para experiências de vida. Muito importante distinguir de Simple Past!"]},
    quizFinal:[{q:"Qual é o passado de 'come'?",opts:["Comed","Came","Coming","Come"],correct:1},{q:"Complete: 'While I ___ sleeping, my phone rang.'",opts:["was","were","am","did"],correct:0},{q:"Complete: 'She ___ to the movies yesterday.'",opts:["goes","went","going","will go"],correct:1},{q:"Qual é a forma de 'not' com 'will'?",opts:["Will not (Won't)","Will doesn't","Willn't","Didn't will"],correct:0},{q:"Complete: 'They are ___ to buy a new house.'",opts:["going","go","will","be going"],correct:0},{q:"Complete: 'I ___ lived here for 10 years.'",opts:["have","has","am","do"],correct:0},{q:"'Have you ever been to Brazil?' O que significa 'ever'?",opts:["Sempre","Nunca","Alguma vez/já","Ainda"],correct:2},{q:"Qual é a resposta para 'Has she arrived yet?'",opts:["Yes, she does","Yes, she has","Yes, she arrives","Yes, she is"],correct:1},{q:"Complete: 'I ___ just finished my work.'",opts:["have","has","am","do"],correct:0}]
  },
  { id:'ii_mod2', name:'Phrasal Verbs e Expressões Idiomáticas', free:false,
    topics:[
      {id:4, name:'Phrasal Verbs Comuns e Seu Uso', dur:'22 min', content:`<h3>Phrasal Verbs Comuns e Seu Uso</h3><p>Phrasal verbs são combinações de um verbo com uma ou mais partículas (como "up", "down", "in", "out"). Eles são extremamente comuns em inglês falado e informal. Um phrasal verb frequentemente tem um significado completamente diferente do verbo base! Por exemplo, "put up" não significa "colocar para cima" - significa "tolerar" ou "hospedar".</p><h4>Phrasal Verbs Muito Comuns</h4><p><strong>Get:</strong><br>"Get up" - Acordar, levantar-se: "I get up at 7 AM." (Acordo às 7 da manhã.)<br>"Get down" - Descer, pôr para baixo: "Get down from the ladder." (Desça da escada.)<br>"Get in" - Entrar, embarcar: "Get in the car." (Entre no carro.)<br>"Get out" - Sair: "Get out of here!" (Saia daqui!)<br>"Get on" - Embarcar (ônibus, trem), dar-se bem: "Get on the bus." (Entre no ônibus.) / "They get on well." (Eles se dão bem.)<br>"Get off" - Descer (de ônibus, trem): "Get off at the next station." (Desça na próxima estação.)<br>"Get away" - Escapar, sair de férias: "Let's get away for the weekend." (Vamos sair de férias no fim de semana.)<br>"Get back" - Retornar, recuperar: "I'll get back to you." (Vou retornar para você.) / "Get my money back." (Recupere meu dinheiro.)<br>"Get over" - Superar: "I can't get over how beautiful it is." (Não consigo superar o quão bonito é.)<br>"Get along" - Dar-se bem: "Do you get along with your siblings?" (Você se dá bem com seus irmãos?)"</p><p><strong>Put:</strong><br>"Put on" - Vestir-se, ligar (luzes): "Put on your coat." (Coloque seu casaco.) / "Put on the lights." (Ligue as luzes.)<br>"Put off" - Adiar, desligar: "Don't put off your homework." (Não adie seu dever de casa.)<br>"Put away" - Guardar: "Put away your toys." (Guarde seus brinquedos.)<br>"Put up" - Tolerar, construir, hospedar: "I can't put up with this." (Não aguento mais isso.) / "Put up a tent." (Montar uma tenda.)<br>"Put down" - Colocar para baixo, criticar: "Put down your phone." (Coloque seu telefone para baixo.) / "Don't put me down." (Não me critique.)<br>"Put together" - Montar: "Put the furniture together." (Monte o móvel.)"</p><p><strong>Take:</strong><br>"Take off" - Decolar (avião), remover: "The plane takes off at 10 AM." (O avião decola às 10.) / "Take off your shoes." (Tire seus sapatos.)<br>"Take on" - Aceitar (trabalho, desafio): "She took on a new project." (Ela aceitou um novo projeto.)<br>"Take over" - Assumir: "He took over the company." (Ele assumiu a empresa.)<br>"Take away" - Levar embora: "Take away the trash." (Leve o lixo.)<br>"Take back" - Retomar, levar para casa: "I want to take back what I said." (Quero retomar o que disse.)<br>"Take out" - Tirar, sair (com alguém): "Take out the garbage." (Tire o lixo.) / "Let's take out a friend to dinner." (Vamos sair para jantar com um amigo.)"</p><p><strong>Look:</strong><br>"Look up" - Procurar (informação): "Look up the word in the dictionary." (Procure a palavra no dicionário.)<br>"Look down" - Olhar para baixo: "Don't look down from the height." (Não olhe para baixo da altura.)<br>"Look at" - Olhar para: "Look at me." (Olhe para mim.)<br>"Look after" - Cuidar de: "Can you look after my kids?" (Pode cuidar dos meus filhos?)<br>"Look for" - Procurar: "I'm looking for my keys." (Estou procurando minhas chaves.)<br>"Look forward to" - Aguardar com entusiasmo: "I look forward to seeing you." (Fico feliz em ver você.)<br>"Look like" - Parecer: "She looks like her mother." (Ela parece com sua mãe.)<br>"Look out" - Cuidado, tomar cuidado: "Look out! There's a car!" (Cuidado! Há um carro!)"</p><p><strong>Come:</strong><br>"Come in" - Entrar: "Come in, please." (Entre, por favor.)<br>"Come out" - Sair: "Come out of the bathroom." (Saia do banheiro.)<br>"Come back" - Retornar: "Come back here!" (Volte para cá!)<br>"Come down" - Descer: "Come down from the tree." (Desça da árvore.)<br>"Come up" - Subir, aparecer: "Come up with an idea." (Tenha uma ideia.)<br>"Come across" - Encontrar por acaso: "I came across an old friend." (Encontrei um velho amigo por acaso.)"</p><p><strong>Run:</strong><br>"Run away" - Fugir: "The dog ran away." (O cachorro fugiu.)<br>"Run into" - Encontrar por acaso, colidir: "I ran into my teacher at the store." (Encontrei meu professor na loja.) / "The car ran into a pole." (O carro colidiu com um poste.)<br>"Run out" - Acabar: "We ran out of milk." (Nos acabamos o leite.)<br>"Run over" - Atropelar: "The car ran over a puddle." (O carro passou por cima de uma poça.)"</p><p><strong>Break:</strong><br>"Break down" - Quebrar (máquina), ter colapso emocional: "The car broke down." (O carro quebrou.) / "She broke down in tears." (Ela desabou em lágrimas.)<br>"Break into" - Arrombar, começar repentinamente: "Someone broke into my house." (Alguém arrombou minha casa.) / "She broke into a smile." (Ela começou a sorrir.)<br>"Break out" - Escapar, irromper: "A fight broke out." (Uma briga irrompeu.) / "He broke out of prison." (Ele escapou da prisão.)<br>"Break up" - Terminar relacionamento: "They broke up last week." (Eles terminaram semana passada.)"</p><p><strong>Give:</strong><br>"Give up" - Desistir: "Don't give up!" (Não desista!)<br>"Give in" - Ceder: "She finally gave in." (Ela finalmente cedeu.)<br>"Give away" - Presentear, revelar: "Give away the present!" (Revele o presente!)<br>"Give back" - Devolver: "Give back my book." (Devolva meu livro.)"</p><h4>Phrasal Verbs com Posição de Preposição</h4><p>Alguns phrasal verbs podem ter a preposição antes ou depois do objeto, enquanto outros não:</p><p><strong>Separáveis:</strong> "Put on your coat." / "Put your coat on." (Ambas corretas)<br><strong>Inseparáveis:</strong> "Look for my keys." (Nunca "Look my keys for.")</p><p>Na prática, a maioria dos learners usa a forma mais comum, que frequentemente é com a preposição logo após o verbo!</p><h4>Prática de Phrasal Verbs</h4><p>Aqui estão 10 frases para praticar:</p><p>1. "I always get up early on weekdays." (Sempre acordo cedo em dias de semana.)<br>2. "Can you put up with the noise?" (Você aguenta o barulho?)<br>3. "Let's take out some friends for dinner." (Vamos sair para jantar com alguns amigos.)<br>4. "I'm looking forward to the weekend." (Fico feliz com o fim de semana.)<br>5. "The plane took off on time." (O avião decolou no horário.)<br>6. "She broke up with her boyfriend." (Ela terminou com seu namorado.)<br>7. "We ran out of coffee." (Ficamos sem café.)<br>8. "He came up with a great idea." (Ele teve uma ótima ideia.)<br>9. "I'll get back to you later." (Vou voltar para você depois.)<br>10. "Look out for cars!" (Cuidado com carros!)"</p>`, cards:[{q:"O que significa 'get up'?",a:"'Get up' significa acordar, levantar-se. 'I get up at 7 AM' = 'Acordo às 7 da manhã'."},{q:"Qual é a diferença entre 'put on' e 'put off'?",a:"'Put on' significa vestir ou ligar. 'Put off' significa adiar. 'Put on your coat' vs 'Don't put off your homework'."},{q:"O que significa 'look forward to'?",a:"'Look forward to' significa aguardar com entusiasmo. 'I look forward to seeing you' = 'Fico feliz em vê-lo'."}]},
      {id:5, name:'Expressões Idiomáticas Essenciais', dur:'21 min', content:`<h3>Expressões Idiomáticas Essenciais</h3><p>Expressões idiomáticas são frases que têm um significado diferente das palavras individuais. Por exemplo, "raining cats and dogs" não significa que chovem gatos e cães literalmente - significa que está chovendo muito! Essas expressões são muito comuns em inglês nativo e são essenciais para soar natural.</p><h4>Expressões Idiomáticas Comuns sobre Sentimentos e Estados</h4><p><strong>Feel:</strong><br>"Break the ice" - Começar uma conversa, descongelar a situação: "Let me break the ice with a joke." (Deixe-me começar com uma piada.)<br>"Feeling blue" - Estar triste: "I'm feeling blue today." (Estou triste hoje.)<br>"Green with envy" - Muito ciumento: "She was green with envy." (Ela estava verde de ciúmes.)<br>"In a good mood" - De bom humor: "I'm in a good mood today." (Estou de bom humor hoje.)<br>"Under the weather" - Doente, mal-estar: "I'm feeling under the weather." (Não estou me sentindo bem.)<br>"On cloud nine" - Muito feliz: "Since he got married, he's been on cloud nine." (Desde que se casou, ele está na sétima céu.)"</p><p><strong>Love/Like:</strong><br>"Head over heels" - Apaixonado: "He's head over heels in love." (Ele está apaixonado.)<br>"It's not my cup of tea" - Não é meu tipo: "That movie is not my cup of tea." (Aquele filme não é meu tipo.)<br>"Love at first sight" - Amor à primeira vista: "It was love at first sight." (Foi amor à primeira vista.)"</p><h4>Expressões Idiomáticas sobre Trabalho e Sucesso</h4><p><strong>Work:</strong><br>"Burn the midnight oil" - Trabalhar até tarde: "I'm burning the midnight oil to finish this project." (Estou trabalhando até tarde para terminar este projeto.)<br>"Put all eggs in one basket" - Arriscar tudo em uma coisa: "Don't put all your eggs in one basket." (Não arrisque tudo em uma coisa.)<br>"Jump on the bandwagon" - Seguir a tendência: "Everyone is jumping on the bandwagon." (Todo mundo está seguindo a tendência.)<br>"Go the extra mile" - Fazer esforço extra: "I'll go the extra mile for you." (Vou fazer esforço extra por você.)<br>"Call it a day" - Parar de trabalhar pelo dia: "It's 5 PM, let's call it a day." (São 5 da tarde, vamos parar por hoje.)"</p><p><strong>Success:</strong><br>"Break a leg" - Boa sorte (especialmente para apresentações): "Break a leg at your presentation!" (Boa sorte na sua apresentação!)<br>"Win-win situation" - Situação onde todos ganham: "This is a win-win situation." (Esta é uma situação onde todos ganham.)<br>"Ballpark figure" - Estimativa aproximada: "Give me a ballpark figure." (Me dê uma estimativa aproximada.)<br>"The tip of the iceberg" - Apenas uma pequena parte de algo maior: "This problem is just the tip of the iceberg." (Este problema é apenas a ponta do iceberg.)<br>"Hit the jackpot" - Ter sorte, ganhar muito: "She hit the jackpot with that job." (Ela teve sorte com aquele trabalho.)"</p><h4>Expressões Idiomáticas sobre Tempo e Eventos</h4><p><strong>Time:</strong><br>"Raining cats and dogs" - Chovendo muito: "It's raining cats and dogs outside." (Está chovendo muito lá fora.)<br>"Once in a blue moon" - Muito raramente: "I see him once in a blue moon." (Vejo-o muito raramente.)<br>"The eleventh hour" - Último minuto: "He finished at the eleventh hour." (Ele terminou no último minuto.)<br>"Better late than never" - Mais tarde é melhor do que nunca: "You're late, but better late than never." (Você está atrasado, mas mais tarde é melhor que nunca.)<br>"Time flies" - O tempo passa rápido: "Time flies when you're having fun." (O tempo passa rápido quando você se diverte.)<br>"Against the clock" - Contra o tempo: "We're working against the clock." (Estamos trabalhando contra o tempo.)"</p><h4>Expressões Idiomáticas sobre Problemas e Dificuldades</h4><p><strong>Problems:</strong><br>"A piece of cake" - Muito fácil: "That test was a piece of cake." (Aquele teste foi muito fácil.)<br>"Hit a snag" - Encontrar um problema: "We hit a snag with the project." (Encontramos um problema com o projeto.)<br>"Tough luck" - Má sorte: "Tough luck, better next time." (Má sorte, melhor da próxima vez.)<br>"Between a rock and a hard place" - Entre dois problemas difíceis: "I'm between a rock and a hard place." (Estou entre dois problemas.)<br>"In the same boat" - Na mesma situação: "We're all in the same boat." (Todos nós estamos na mesma situação.)<br>"Beat around the bush" - Falar indiretamente, não ir direto ao ponto: "Stop beating around the bush and tell me the truth." (Pare de falar indiretamente e me diga a verdade.)<br>"Throw in the towel" - Desistir: "After many years, they threw in the towel." (Depois de muitos anos, eles desistiram.)"</p><h4>Expressões Idiomáticas sobre Dinheiro</h4><p><strong>Money:</strong><br>"Break the bank" - Gastar muito dinheiro: "This vacation will break the bank." (Essas férias vão custar muito.)<br>"Make a fortune" - Ganhar muito dinheiro: "He made a fortune in tech." (Ele ganhou muito dinheiro em tecnologia.)<br>"Penny pincher" - Pessoa que não gasta dinheiro: "My father is a penny pincher." (Meu pai é pão-duro.)<br>"A dime a dozen" - Muito comum, não é especial: "Good workers are a dime a dozen these days." (Bons trabalhadores são muito comuns hoje.)<br>"Worth its weight in gold" - Muito valioso: "This information is worth its weight in gold." (Essa informação é valiosa.)"</p><h4>Expressões Idiomáticas sobre Pessoas e Características</h4><p><strong>People:</strong><br>"The apple of my eye" - Pessoa muito especial: "My daughter is the apple of my eye." (Minha filha é muito especial para mim.)<br>"A tough nut to crack" - Pessoa difícil de entender: "He's a tough nut to crack." (Ele é difícil de entender.)<br>"Two cents" - Sua opinião: "Can I give my two cents?" (Posso dar minha opinião?)<br>"Break the ice" - Descongelar uma situação social: "Let me break the ice with a joke." (Deixe-me começar com uma piada.)<br>"Have a heart of gold" - Ser uma pessoa muito boa: "She has a heart of gold." (Ela tem um coração de ouro.)"</p><p>Pratique essas expressões todos os dias! Escolha 5 e tente usá-las em conversas ou escrita.</p>`, cards:[{q:"O que significa 'raining cats and dogs'?",a:"Não significa que chovem gatos e cães literalmente! Significa que está chovendo muito, um temporal."},{q:"Qual é a diferença entre 'a piece of cake' e 'tough luck'?",a:"'A piece of cake' significa muito fácil. 'Tough luck' significa má sorte. Significados completamente opostos!"},{q:"O que significa 'break the ice'?",a:"'Break the ice' significa descongelar uma situação social, começar uma conversa para ficar à vontade."}]},
      {id:6, name:'Conversação: Diálogos Naturais e Fluência', dur:'24 min', content:`<h3>Conversação: Diálogos Naturais e Fluência</h3><p>Agora que você já conhece phrasal verbs e expressões idiomáticas, é hora de colocar tudo junto em conversas naturais! Aqui aprenderemos como manter uma conversa em inglês de forma fluida e natural, com expressões úteis para diferentes situações.</p><h4>Expressões de Transição para Conversa</h4><p><strong>Começando uma conversa:</strong></p><p>"Hi, how are you?" (Oi, como você está?) / "What's up?" (E aí, tudo bem?) / "How's it going?" (Como vai?) / "I haven't seen you in ages!" (Não te vejo há séculos!) / "Long time no see!" (Quanto tempo!)"</p><p><strong>Respondendo:</strong></p><p>"I'm doing great, thanks." (Estou ótimo, obrigado.) / "Pretty good, thanks for asking." (Muito bem, obrigado por perguntar.) / "Can't complain." (Não tenho do que reclamar.) / "Same old, same old." (O de sempre.) / "Living the dream." (Vivendo o sonho.)"</p><p><strong>Mantendo a conversa:</strong></p><p>"That sounds interesting." (Isso soa interessante.) / "Tell me more." (Me conte mais.) / "I see what you mean." (Entendo o que você quer dizer.) / "That makes sense." (Faz sentido.) / "For sure." (Com certeza.) / "No kidding!" (É mesmo!) / "You don't say!" (Não me diga!) / "Really?" (De verdade?) / "I had no idea." (Não tinha ideia.)"</p><p><strong>Expressando acordo:</strong></p><p>"I totally agree." (Concordo totalmente.) / "You're absolutely right." (Você tem total razão.) / "I couldn't agree more." (Não poderia concordar mais.) / "That's exactly what I think." (É exatamente o que penso.) / "Good point." (Bom ponto.) / "I see your point." (Entendo seu ponto.)"</p><p><strong>Expressando desacordo:</strong></p><p>"I respectfully disagree." (Respeitosamente discordo.) / "I see your point, but..." (Vejo seu ponto, mas...) / "I don't quite see it that way." (Não vejo assim.) / "I beg to differ." (Permita-me discordar.) / "That's not how I see it." (Não é assim que vejo.)"</p><p><strong>Pedindo esclarecimento:</strong></p><p>"Sorry, I didn't quite catch that." (Desculpa, não entendi direito.) / "Can you repeat that?" (Pode repetir?) / "What do you mean?" (O que você quer dizer?) / "Could you explain that further?" (Pode explicar mais?) / "I'm not sure I understand." (Não tenho certeza se entendi.)"</p><h4>Diálogo de Exemplo 1: Encontro com Amigo</h4><p><strong>Person A:</strong> "Hey! How have you been? I feel like we haven't seen each other in forever!" (Oi! Como você tem estado? Acho que não nos vemos há séculos!)<br><strong>Person B:</strong> "I know, right? I've been super busy with work. What about you?" (Pois é! Tenho estado muito ocupado com trabalho. E você?)<br><strong>Person A:</strong> "Same here, man. By the way, did you hear that John broke up with Sarah?" (Também. A propósito, você ouviu que John terminou com Sarah?)<br><strong>Person B:</strong> "No way! Really? I had no idea. What happened?" (Não é possível! Mesmo? Não tinha ideia. O que aconteceu?)<br><strong>Person A:</strong> "Well, they just grew apart, I guess. Anyway, let's not talk about that. Want to grab some coffee?" (Bem, eles apenas se afastaram, acho. De qualquer forma, não falemos sobre isso. Quer tomar um café?)<br><strong>Person B:</strong> "That sounds great! I'm in. Let's go to that new place downtown." (Isso soa ótimo! Topo. Vamos para aquele novo lugar no centro.)"</p><h4>Diálogo de Exemplo 2: Entrevista de Trabalho</h4><p><strong>Interviewer:</strong> "Thank you for coming in today. Can you tell me about your background?" (Obrigado por vir hoje. Pode me falar sobre seu histórico?)<br><strong>Candidate:</strong> "Of course. I've been working in marketing for 5 years now. I started at a small company, but recently I took on more responsibilities at a bigger firm." (Claro. Tenho trabalhado em marketing há 5 anos. Comecei em uma pequena empresa, mas recentemente assumi mais responsabilidades em uma empresa maior.)<br><strong>Interviewer:</strong> "That's impressive. What would you say is your greatest strength?" (Isso é impressionante. O que você diria ser sua maior força?)<br><strong>Candidate:</strong> "I think my ability to work well with others and come up with creative solutions. I really go the extra mile for my projects." (Acho que é minha capacidade de trabalhar bem com outros e encontrar soluções criativas. Realmente faço esforço extra pelos meus projetos.)<br><strong>Interviewer:</strong> "Great. Do you have any questions for me?" (Ótimo. Você tem alguma pergunta para mim?)<br><strong>Candidate:</strong> "Yes, actually. Can you tell me more about the team I'd be working with?" (Sim, na verdade. Pode me contar mais sobre o time com o qual eu trabalharia?)"</p><h4>Diálogo de Exemplo 3: Solução de Problema</h4><p><strong>Person A:</strong> "I need to talk to you about something. I'm not really happy with how you've been treating me lately." (Preciso falar com você sobre algo. Não estou feliz com como você tem me tratado ultimamente.)<br><strong>Person B:</strong> "Oh, I had no idea. I'm sorry to hear that. Can you tell me what's been bothering you?" (Ah, não tinha ideia. Sinto muito ouvir isso. Pode me dizer o que o está incomodando?)<br><strong>Person A:</strong> "Well, you've been canceling our plans a lot, and it makes me feel like you don't value our friendship." (Bem, você tem cancelado nossos planos muito, e isso me faz sentir que você não valoriza nossa amizade.)<br><strong>Person B:</strong> "I totally understand your point. You're right, and I apologize. I've been so caught up with work that I haven't been a good friend. Let me make it up to you." (Entendo seu ponto completamente. Você tem razão, e me desculpo. Tenho estado tão ocupado com trabalho que não tenho sido um bom amigo. Deixe-me consertar isso.)<br><strong>Person A:</strong> "Thanks for understanding. I appreciate that." (Obrigado por entender. Eu aprecio.)"</p><h4>Dicas para Conversação Natural</h4><p><strong>1. Use contrações:</strong> Em conversas informais, use "I'm", "you're", "he's", "don't", "can't" etc. É muito mais natural que formas completas.</p><p><strong>2. Use "you know", "I mean", "like":</strong> Essas expressões são muito comuns em inglês nativo e ajudam a soar natural. "You know, I think that's a good idea." / "I mean, it's not that hard." / "It was, like, so funny."</p><p><strong>3. Faça perguntas de acompanhamento:</strong> Depois que alguém terminar de falar, faça uma pergunta sobre o que disseram. "That sounds interesting! What happened next?"</p><p><strong>4. Use "actually", "literally", "basically":</strong> Essas palavras de transição são muito usadas em conversas em inglês. "I actually went to Brazil last year." / "Literally everyone was there." / "Basically, I just want to help."</p><p><strong>5. Responda com perguntas:</strong> "How about you? What do you think?" / "Did you?" / "Really?"</p><p><strong>6. Use humor e informalidade:</strong> Não seja muito formal. "That's hilarious!" / "You're killing me!" / "No way!" / "That's insane!"</p>`, cards:[{q:"Como responder 'How are you?' de forma natural?",a:"Respostas naturais incluem: 'I'm doing great, thanks!', 'Pretty good!', 'Can't complain!', 'Living the dream!'"},{q:"O que significa 'I see your point, but...'?",a:"Significa que você entende o que a pessoa está dizendo, mas você quer discordar ou adicionar algo. É uma forma polida de discordar."},{q:"Como manter uma conversa fluida?",a:"Faça perguntas de acompanhamento, use expressões como 'you know', 'I mean', 'like', responda com perguntas, e não seja muito formal."}]},

    summary:{title:"Resumo do Módulo 2: Phrasal Verbs e Conversação", points:["Phrasal verbs são combinações de verbo + partícula que frequentemente têm significados completamente diferentes do verbo original. 'Get up' não significa 'colocar para cima', mas 'acordar'.","Expressões idiomáticas como 'raining cats and dogs', 'a piece of cake', 'break the ice' são muito comuns em inglês nativo e essenciais para soar natural.","Conversação natural usa muitas contrações, palavras de transição como 'you know' e 'I mean', e perguntas de acompanhamento para manter o diálogo fluindo.","Pratique diálogos em diferentes situações: encontros sociais, entrevistas, solução de problemas. Assim você ganhar confiança em conversas reais."]},
    quizFinal:[{q:"O que significa 'put up with'?",opts:["Colocar para cima","Tolerar","Construir","Hospedar"],correct:1},{q:"Complete: 'I'm ___ forward to the weekend.'",opts:["look","looking","looks","looked"],correct:1},{q:"O que significa 'hit the jackpot'?",opts:["Bater em um poço de ouro","Ter sorte, ganhar muito","Bater em algo","Perder dinheiro"],correct:1},{q:"Como responder naturalmente 'How are you?'",opts:["I am fine, thank you","I'm doing great, thanks!","I am well","I feel good"],correct:1},{q:"O que significa 'between a rock and a hard place'?",opts:["Ficar entre duas coisas","Em um problema sem solução fácil","Próximo a duas coisas","Em uma situação segura"],correct:1},{q:"Complete: 'The plane ___ off on time.'",opts:["take","takes","took","taken"],correct:2},{q:"O que significa 'a piece of cake'?",opts:["Um pedaço de bolo","Muito fácil","Um bolo inteiro","Difícil"],correct:1},{q:"Complete: 'Stop ___ around the bush and tell me the truth.'",opts:["beat","beating","beats","beated"],correct:1},{q:"Qual é uma forma natural de começar uma conversa?",opts:["Hello, how do you do?","What's up?","Good morning, how are you doing?","Greetings, friend"],correct:1}]

  { id:'ii_mod3', name:'Leitura e Compreensão Intermediária', free:false,
    topics:[
      {id:7, name:'Textos Autênticos: Notícias e Artigos', dur:'25 min', content:`<h3>Textos Autênticos: Notícias e Artigos</h3><p>Agora você está pronto para ler textos autênticos em inglês! Ler materiais reais que falantes nativos usam é uma das melhores formas de aprender vocabulário e gramática em contexto. Vamos aprender a estratégia para ler notícias e artigos sem ficar frustrado quando encontrar palavras desconhecidas.</p><h4>Estratégia de Leitura para Textos Autênticos</h4><p><strong>1. Ler o título e prever o conteúdo:</strong> Antes de ler o texto todo, leia o título e pense sobre o que o texto provavelmente dirá. Isso prepara seu cérebro para a informação. Exemplo: Se o título é "New Technology Revolutionizes Education", você já sabe que será sobre educação e tecnologia.</p><p><strong>2. Ignorar palavras desconhecidas na primeira leitura:</strong> Não pare para procurar cada palavra desconhecida. Tente entender o contexto geral. Muitas vezes você descobrirá o significado pela posição da palavra ou pelas palavras ao redor.</p><p><strong>3. Ler para ideia principal, não para cada detalhe:</strong> No seu nível intermediário, o objetivo é entender a ideia geral, não cada palavra. "What is this text about?" é mais importante que "What does every single word mean?"</p><p><strong>4. Quando encontrar uma palavra crucial que não conhece:</strong> Use o contexto. "The government implemented new policies" - se você não sabe "implemented", pense: o governo fez algo com políticas. Provavelmente foi "criar" ou "colocar em vigor".</p><p><strong>5. Depois, volte e procure as palavras-chave:</strong> Após ler tudo, volte e procure as palavras que você realmente precisa saber. As palavras que aparecem várias vezes ou parecem cruciais para o significado.</p><h4>Exemplo de Texto Autêntico: Artigo de Notícia</h4><p><strong>Título:</strong> "Remote Work Trends Continue to Shape Business Landscape"</p><p><strong>Texto:</strong> "As companies navigate the post-pandemic era, remote work has evolved from a temporary solution to a permanent fixture in the modern workplace. According to a recent survey, 73% of employees prefer working from home at least part-time, with many citing increased productivity and better work-life balance as key benefits."</p><p><strong>Análise:</strong> Mesmo sem conhecer "navigate" (navegar) ou "fixture" (acessório/parte integrante), você pode entender: empresas estão lidando com a era pós-pandemia, trabalho remoto é agora permanente, 73% dos funcionários gostam de trabalho remoto, razões: produtividade e equilíbrio trabalho-vida.</p><p>"The shift has prompted companies to rethink their office strategies. Some have adopted a hybrid model, while others have gone fully remote. However, not everyone is thrilled about the trend. Some employers worry about employee engagement and company culture in a distributed workforce."</p><p><strong>Análise:</strong> "Rethink" é fácil de entender (re-pensar). "Hybrid" você pode saber (dois tipos - remoto e presencial). "Distributed" pode ser novo, mas pela lógica é "espalhado" ou "distante".</p><p>"Despite the challenges, experts predict that flexible work arrangements will become the norm rather than the exception. Companies that fail to adapt risk losing top talent to competitors who offer more flexibility."</p><p><strong>Análise:</strong> A conclusão é clara: flexibilidade será normal, e empresas que não se adaptem perderão funcionários bons.</p><h4>Tipos de Textos para Praticar</h4><p><strong>Notícias (News Articles):</strong> Comece com notícias sobre tópicos que você conhece. Não comece com notícias políticas complexas! Escolha tópicos como tecnologia, esportes, ou lifestyle. Exemplo de sites: BBC.com, CNN.com, The Guardian</p><p><strong>Blogs e Artigos Educacionais:</strong> Sites como Medium.com têm artigos sobre muitos tópicos. Eles são geralmente bem escritos e sobre tópicos interessantes.</p><p><strong>Histórias Curtas:</strong> Histórias curtas são ótimas porque têm narrativa clara. Você pode procurar "short stories for ESL learners" no Google.</p><p><strong>Redes Sociais:</strong> Posts no Twitter, Reddit ou LinkedIn frequentemente têm linguagem mais casual e são mais curtos. Bom para praticar.</p><p><strong>Livros Simplificados:</strong> "Graded readers" são livros simplificados para learners de idiomas. Amazon tem muitos desses com preços baixos.</p><h4>Exercício de Compreensão</h4><p>Leia este texto e responda as perguntas sem procurar no dicionário (exceto ao final):</p><p><strong>Texto:</strong> "Sarah has always been passionate about animals. After graduating from university with a degree in biology, she decided to volunteer at a local wildlife sanctuary. At first, her job was challenging - she had to wake up at dawn and work in difficult weather conditions. But after six months, she realized she had found her calling. Today, Sarah is the sanctuary's director of education, working with schools to teach children about conservation. Her dedication has inspired many young people to pursue careers in environmental science."</p><p><strong>Perguntas:</strong><br>1. What is Sarah's current job? (Qual é o trabalho atual de Sarah?)<br>2. Why was her job challenging at first? (Por que seu trabalho era desafiador no início?)<br>3. How did Sarah help young people? (Como Sarah ajudou pessoas jovens?)</p><p><strong>Respostas esperadas:</strong><br>1. She is the sanctuary's director of education.<br>2. She had to wake up early and work in difficult weather.<br>3. She inspired them to pursue careers in environmental science.</p><h4>Dicas para Leitura Contínua</h4><p><strong>1. Comece com textos sobre tópicos que interessam você:</strong> Se você gosta de futebol, leia notícias sobre futebol. Se gosta de tecnologia, leia sobre tecnologia. Isso mantém você motivado!</p><p><strong>2. Leia regularmente:</strong> 15 minutos por dia é melhor que 2 horas uma vez por mês. Consistência é chave.</p><p><strong>3. Mantenha um caderno de vocabilário:</strong> Quando encontra uma palavra nova que aparece várias vezes, escreva em um caderno. Mas não tente memorizar - apenas escrever já ajuda.</p><p><strong>4. Leia à noite e releia de manhã:</strong> Você aprende melhor quando descansa. Ler algo à noite e reler no dia seguinte ajuda a consolidar o conhecimento.</p><p><strong>5. Não desista por causa de uma palavra:</strong> Se você não conhece uma palavra e ela não é crucial, apenas continue! Você não precisa entender 100% para ganhar valor da leitura.</p>`, cards:[{q:"Qual é a melhor estratégia para ler um texto autêntico?",a:"Leia o título primeiro, tente entender a ideia geral ignorando palavras desconhecidas, procure apenas palavras-chave ao final. Não tente entender cada palavra!"},{q:"Por que é bom começar com notícias sobre tópicos que interessam você?",a:"Porque você mantém motivação e já conhece alguns vocabulários do tópico, tornando a leitura mais fácil e engajada."},{q:"O que fazer se encontrar uma palavra desconhecida importante?",a:"Tente adivinhar pelo contexto das outras palavras. Se não conseguir entender a ideia geral, apenas procure no dicionário após terminar de ler."}]},
      {id:8, name:'Compreensão Auditiva: Vídeos e Podcasts', dur:'23 min', content:`<h3>Compreensão Auditiva: Vídeos e Podcasts</h3><p>Escutar inglês autêntico é um dos maiores desafios para falantes de português! A velocidade, o sotaque, e os sons que você não aprendeu no nível básico podem ser frustrantes. Mas com as estratégias certas, você pode treinar seu ouvido rapidamente e começar a entender conversas reais.</p><h4>Estratégia de Compreensão Auditiva</h4><p><strong>1. Comece com conteúdo levemente desafiador, não muito difícil:</strong> Se você acabou de terminar o nível básico, não comece com podcasts de política internacional! Escolha vídeos sobre tópicos que você conhece ou interesse você. A dificuldade deve ser um pouco acima do seu nível.</p><p><strong>2. Escute sem legendas em português, apenas legendas em inglês:</strong> Legendas em português são uma muleta. Comece com legendas em inglês enquanto assiste. Depois, progride para sem legendas.</p><p><strong>3. Escute mais de uma vez:</strong> Primeira vez: entenda a ideia geral. Segunda vez: procure por detalhes e palavras específicas. Terceira vez: tente entender cada palavra.</p><p><strong>4. Escute partes pequenas, não vídeos inteiros:</strong> Comece com vídeos de 5-10 minutos, não 30 minutos. É menos frustrante!</p><p><strong>5. Pause frequentemente quando não entender:</strong> Não tente forçar. Se não entender um trecho, retroceda 10 segundos e escute novamente. Se ainda não entender, procure a transcrição.</p><h4>Recursos Recomendados para Compreensão Auditiva</h4><p><strong>YouTube:</strong> Canais como "TED Talks", "English Speeches", "BBC Learning English" têm vídeos com legendas. TED Talks são especialmente bons porque falam sobre tópicos interessantes de forma clara.</p><p><strong>Podcasts:</strong> Procure por "English Learning Podcast" ou "ESL Podcasts" na sua plataforma de podcast favorita. Recomendações populares: "EnglishPod101", "The English We Speak" (BBC), "All Ears English"</p><p><strong>Filmes e Séries:</strong> Escolha filmes ou séries que você já viu em português! Se você já conhece a história, é muito mais fácil entender. Comece com Disney ou filmes de comédia que são mais claros que ação ou drama.</p><p><strong>Documentários:</strong> Documentários têm uma linguagem mais clara e muitas vezes legendas. Procure por "documentary English" ou "BBC Documentary"</p><p><strong>News em Inglês:</strong> BBC, CNN, Reuters têm notícias em inglês com legendas. Comece com 5 minutos por dia.</p><h4>Exercício Prático de Compreensão Auditiva</h4><p>Imagine você está escutando este trecho (texto simulado de um vídeo):</p><p>"Hi everyone! Today I want to talk about something that's really important to me - personal finance. Many people think managing money is boring, but it's actually one of the most powerful skills you can develop. Whether you're trying to save for a vacation, buy a house, or just stop living paycheck to paycheck, understanding money is key. In this video, we'll explore five simple strategies that can change your financial situation. Let's get started!"</p><p><strong>Primeira escuta (sem pausar):</strong> Você entendeu que é sobre finanças pessoais e que o vídeo mostrará 5 estratégias.</p><p><strong>Segunda escuta (pausando em pontos desconhecidos):</strong> Você pode não saber "paycheck to paycheck" (vivendo de salário em salário), então procura. Mas você entendeu o contexto - é sobre pessoas que ganham dinheiro e gastam tudo.</p><p><strong>Terceira escuta (sem pausar novamente):</strong> Agora você entende tudo e pode responder perguntas: "What is the video about?" / "How many strategies will be shown?" / "What does 'paycheck to paycheck' mean?"</p><h4>Desafios Comuns e Como Superar</h4><p><strong>Desafio 1: "Eles falam muito rápido!"</strong><br>Solução: Use a função de velocidade! YouTube, Netflix e muitos players de vídeo têm opção de reduzir velocidade para 0.75x ou 0.5x. Comece em velocidade reduzida e aumente conforme você melhora.</p><p><strong>Desafio 2: "Não entendo sotaques diferentes!"</strong><br>Solução: Comece com falantes de sotaque americano ou britânico neutro. BBC Learning English e American English TV são bons. Depois, progride para sotaques variados.</p><p><strong>Desafio 3: "Não entendo porque falam sem pausas!"</strong><br>Solução: No inglês, as palavras se conectam muito. "What are you" soa como "whatchuya". Isso é liasion! Escuta mais e você começa a perceber os padrões. Não tente entender palavra por palavra - tente entender frases.</p><p><strong>Desafio 4: "Eles usam palavras que não aprendi!"</strong><br>Solução: Esperado! Você não vai conhecer 100% das palavras. Se a palavra não é crucial, deixe para lá. Se é importante, use legendas para descobrir.</p><h4>Rotina Diária Recomendada</h4><p><strong>Dia 1:</strong> Escolha um vídeo de 5 minutos (ex: TED Talk) / Escute uma vez sem pausar / Escute segunda vez com pausa nos pontos difíceis / Procure a transcrição para as partes que não entendeu</p><p><strong>Dia 2:</strong> Escute o mesmo vídeo novamente sem legendas / Tente responder perguntas sobre o conteúdo / Revise vocabulário novo</p><p><strong>Dia 3:</strong> Escolha um novo vídeo / Repita o processo</p><p><strong>Resultado esperado:</strong> Depois de 3-4 semanas fazendo isso diariamente, você notará melhora significativa na compreensão!</p>`, cards:[{q:"Qual é a melhor estratégia para começar com compreensão auditiva?",a:"Comece com conteúdo levemente desafiador, use legendas em inglês, escute múltiplas vezes, e escolha tópicos de interesse."},{q:"Por que é bom começar com filmes que você já viu em português?",a:"Porque você já conhece a história e os personagens, então é muito mais fácil entender mesmo com linguagem desconhecida."},{q:"O que fazer se não entender uma parte importante?",a:"Retroceda 10 segundos e escute novamente. Se ainda não entender, procure a transcrição ou legendas."}]},
      {id:9, name:'Escrita: Emails, Mensagens e Pequenos Textos', dur:'22 min', content:`<h3>Escrita: Emails, Mensagens e Pequenos Textos</h3><p>Escrever em inglês é frequentemente mais fácil que falar porque você tem tempo para pensar e corrigir. Nesta lição, você aprenderá a escrever emails profissionais, mensagens informais e pequenos textos de forma clara e natural.</p><h4>Estrutura de Email Profissional</h4><p><strong>Saudação:</strong></p><p>Formal: "Dear Mr. Johnson," / "Dear Ms. Smith," / "Dear Sir/Madam,"<br>Menos formal mas profissional: "Hello [Name]," / "Hi [Name],"<br>Muito informal (se você já conhece a pessoa bem): "Hey [Name],"</p><p><strong>Abertura (primeiro parágrafo):</strong></p><p>Estabeleça o propósito do email claramente. "I am writing to..." / "I am reaching out regarding..." / "I wanted to follow up on..."<br>Exemplo: "I am writing to inquire about the job position advertised on your website."</p><p><strong>Corpo (parágrafos do meio):</strong></p><p>Desenvolva seu ponto principal. Use parágrafos curtos e claros. Uma ideia por parágrafo.<br>Exemplo: "I have 5 years of experience in marketing and have successfully managed campaigns for companies like X and Y. I believe my skills in digital marketing and social media strategy would be valuable to your team."</p><p><strong>Fechamento (último parágrafo):</strong></p><p>Indique a próxima ação ou obrigado. "I look forward to hearing from you." / "Thank you for considering my application." / "Please let me know if you have any questions."</p><p><strong>Assinatura:</strong></p><p>Formal: "Best regards," / "Sincerely," / "Best,"<br>Menos formal: "Thanks," / "Cheers," / "Looking forward to hearing from you,"</p><p><strong>Email Profissional Completo - Exemplo:</strong></p><p>"Subject: Application for Marketing Manager Position<br><br>Dear Hiring Manager,<br><br>I am writing to express my interest in the Marketing Manager position at your company. I was impressed by your company's innovative approach to digital marketing and believe my background aligns well with your team's needs.<br><br>With 5 years of experience in digital marketing and a proven track record of increasing brand awareness and customer engagement, I am confident I can contribute significantly to your organization. In my current role at ABC Company, I led a team that increased social media followers by 150% and boosted website traffic by 40%.<br><br>I have attached my resume and cover letter for your review. I would welcome the opportunity to discuss how my skills and experience can benefit your company. Please feel free to contact me at your convenience.<br><br>Thank you for considering my application. I look forward to hearing from you.<br><br>Best regards,<br>John Smith<br>+55 11 9999-9999<br>john.smith@email.com"</p><h4>Mensagens Informais (Texto, WhatsApp, Slack)</h4><p>Mensagens informais são muito mais curtas e diretas. Use contrações, emoticons, e linguagem natural.</p><p><strong>Exemplos:</strong></p><p>"Hey! You free tonight? Wanna grab coffee?" (Oi! Você é livre hoje à noite? Quer tomar um café?)<br>"OMG, that's hilarious 😂" (Meu Deus, que hilariante)<br>"Yeah, totally! See you at 7?" (Sim, com certeza! Te vejo às 7?)<br>"Thanks so much for helping me yesterday. Really appreciate it!" (Obrigado muito por me ajudar ontem. Realmente aprecio!)<br>"Btw, did you finish that project?" (A propósito, você terminou aquele projeto?)<br>"Honestly, I have no clue lol" (Honestamente, não faço ideia haha)<br>"Can't wait for the weekend!" (Não vejo a hora do fim de semana!)"</p><p><strong>Abreviações comuns em mensagens:</strong></p><p>LOL - Laugh out loud (Muito engraçado)<br>BTW - By the way (A propósito)<br>OMG - Oh my god (Meu Deus)<br>ASAP - As soon as possible (Assim que possível)<br>FYI - For your information (Para sua informação)<br>IMO - In my opinion (Na minha opinião)<br>TTYL - Talk to you later (Falo com você depois)<br>IDK - I don't know (Não sei)</p><h4>Pequenos Textos: Descrições e Comentários</h4><p><strong>Descrição de Produto (como em um blog ou review):</strong></p><p>"I recently purchased the XYZ headphones and I'm really impressed with the quality. The sound is crystal clear and the battery lasts for days. They're also very comfortable to wear for long periods. The only downside is they're a bit pricey, but I think they're worth the investment. I would definitely recommend them to anyone looking for high-quality audio equipment. 5/5 stars!"</p><p><strong>Comentário em Rede Social:</strong></p><p>"What an amazing article! This really changed my perspective on the topic. I've been thinking about this issue for a while, and your points make so much sense. Thanks for sharing! 👏"</p><p><strong>Post de Blog sobre Sua Experiência:</strong></p><p>"Yesterday I attended my first English conversation class, and I have to say I was nervous at first. But the instructor was so welcoming and the other students were encouraging. We talked about our hobbies and goals for learning English. It was challenging but also really fun! I'm already looking forward to the next class. If you're thinking about trying conversation classes, I highly recommend it. You'll be surprised how much progress you can make in just one session!"</p><h4>Dicas para Melhorar sua Escrita</h4><p><strong>1. Revise sempre antes de enviar:</strong> Não envie uma mensagem importante sem revisar! Procure por erros óbvios de gramática e digitação.</p><p><strong>2. Use palavras que você conhece bem:</strong> Não tente ser muito sofisticado. Uma frase simples e correta é melhor que uma frase complexa com erros.</p><p><strong>3. Mantenha orações curtas:</strong> Orações longas com muitas vírgulas são difíceis de ler. "I went to the store and I bought milk." é melhor que "Having previously decided that I needed milk, I visited the local supermarket."</p><p><strong>4. Use transições para conectar ideias:</strong> "However", "Also", "In addition", "On the other hand" ajudam a conectar parágrafos.</p><p><strong>5. Seja específico:</strong> Não escreva "I had a good day". Escreva "I had a good day because I passed my English test and had coffee with my friend."</p><p><strong>6. Pratique escrevendo diariamente:</strong> Diário, journals, comentários em sites, emails para amigos. Qualquer escrita ajuda!</p>`, cards:[{q:"Qual é a saudação apropriada para um email profissional?",a:"'Dear Mr./Ms. [Name]' é formal. 'Hello [Name]' é menos formal mas profissional. Evite 'Hey' em emails profissionais."},{q:"O que significa 'BTW'?",a:"'BTW' significa 'By the way' ou 'A propósito'. É abreviação comum em mensagens informais."},{q:"Qual é a diferença na escrita entre emails profissionais e mensagens informais?",a:"Emails profissionais são longos, estruturados, com parágrafos. Mensagens informais são curtas, diretas, usam contrações e emoticons."}]},
    ],
    summary:{title:"Resumo do Módulo 3: Leitura e Compreensão", points:["Leia textos autênticos ignorando palavras desconhecidas - entenda a ideia geral, não cada palavra. Depois revise vocabulário importante.","Escute conteúdo levemente desafiador com legendas em inglês, múltiplas vezes. Escolha tópicos que interessam você para manter motivação.","Escreva emails profissionais com estrutura clara: saudação, propósito, corpo, fechamento, assinatura. Mensagens informais são muito mais curtas e naturais.","Pratique todos os dias - ler, ouvir, escrever. Consistência é mais importante que quantidade de tempo gasto."]},
    quizFinal:[{q:"Qual é a melhor estratégia para ler um texto autêntico?",opts:["Procure cada palavra no dicionário","Entenda a ideia geral, ignore palavras desconhecidas","Traduza palavra por palavra","Leia muito lentamente"],correct:1},{q:"Como começar com compreensão auditiva?",opts:["Com podcasts avançados","Com filmes que você já viu em português","Com notícias políticas complexas","Com conversas muito rápidas"],correct:1},{q:"Qual é a saudação apropriada para um email profissional?",opts:["Hey there!","Dear Mr./Ms. [Name],","What's up?","Howdy!"],correct:1},{q:"Complete o email: 'I am writing to ___'",opts:["talking to you","inquire about","tell about","write to you"],correct:1},{q:"O que significa 'BTW'?",opts:["By the way","Before today weekend","Bring the wallet","Big time wonderful"],correct:0},{q:"Qual é uma vantagem de começar com filmes em inglês que você já viu?",opts:["Você não precisa estudar","Já conhece a história","Menos trabalho","Você aprende mais rápido"],correct:1},{q:"Como você deve estruturar parágrafos em emails profissionais?",opts:["Muito longos","Uma ideia por parágrafo","Sem estrutura específica","Só uma linha por parágrafo"],correct:1},{q:"Qual é a abreviação para 'I don't know'?",opts:["IDK","INK","IDC","ICK"],correct:0},{q:"Qual é a melhor frequência para praticar compreensão auditiva?",opts:["Uma vez por semana","Diariamente","Uma vez por mês","Apenas nos fins de semana"],correct:1}]
  }
