      {
        id:1, name:'O que é IA e por que mudou tudo', dur:'15min',
        content:`<h3>O que é IA e por que mudou tudo</h3><p>Pouquíssimas pessoas entendem que <strong>o que é IA e por que mudou tudo</strong> não é conceito abstrato — é transformação concreta que está mudando carreiras, empresas e países agora. O ChatGPT atingiu 100 milhões de usuários em 2 meses — mais rápido que qualquer produto da história.</p><h4>O que os dados mostram:</h4><p>McKinsey estima que a IA pode adicionar <strong>13 trilhões de dólares à economia global até 2030</strong>. O Fórum Econômico Mundial aponta 97 milhões de novos empregos criados — mas 85 milhões de funções transformadas. Não é sobre desemprego — é sobre quem se adapta.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — IA não é magia, é matemática:</strong> Modelos de linguagem preveem a próxima palavra com base em trilhões de exemplos. Quando você entende isso, o medo vira curiosidade e a curiosidade vira competência.</li><li><strong>Fundamento 2 — Três gerações em 70 anos:</strong> IA simbólica (regras fixas) → Machine Learning (aprende com dados) → Deep Learning e LLMs. Estamos na terceira — a mais poderosa e acessível de toda a história.</li><li><strong>Fundamento 3 — A barreira caiu para zero:</strong> Antes eram necessários doutoramento e servidores caros. Hoje você digita em português e recebe resultado sofisticado. Maior nivelador de campo profissional da história.</li><li><strong>Fundamento 4 — Amplificador, não substituto:</strong> IA multiplica o que você já sabe. Profissional competente com IA se torna excepcional. O diferencial humano não some — se potencializa com a ferramenta.</li></ul><blockquote>💡 <em>Exercício imediato: Abra o ChatGPT agora. Escreva: 'Explique IA como se eu tivesse 15 anos.' Depois: 'Como um executivo de negócios.' Compare as duas respostas. Isso é adaptação — e é só o começo.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um empreendedor que usa IA para criar proposta em 10 minutos versus concorrente que leva 3 horas. Mesma qualidade de negócio, resultado completamente diferente. Não é ficção — é o mercado hoje.</p><blockquote>⚠️ <em>Cuidado com a armadilha: IA não vai substituir você amanhã. Mas alguém que usa IA melhor pode te substituir antes do que você imagina. A urgência não é de pânico — é de ação estratégica e consistente.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>o que é ia e por que mudou tudo</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,

        cards:[{q:'Por que entender IA é urgente para qualquer profissional hoje?',a:'Porque IA já está transformando mercados agora — quem não aprende perde vantagem competitiva para quem aprende. Não é questão de futuro, é questão de presente.'}]

      {
        id:2, name:'As três gerações da IA: de onde viemos', dur:'14min',
        content:`<h3>As três gerações da IA: de onde viemos</h3><p>Para usar IA bem, você precisa entender como ela evoluiu. <strong>As três gerações da IA</strong> explicam por que o ChatGPT é fundamentalmente diferente do algoritmo que aprova seu crédito — e por que isso importa para como você usa cada ferramenta.</p><h4>O que os dados mostram:</h4><p>O paper 'Attention is All You Need' do Google (2017) inaugurou a arquitetura Transformer — alicerce de todo LLM moderno. Em menos de 7 anos, passou de artigo acadêmico para tecnologia usada por centenas de milhões. Velocidade sem precedente na história da ciência.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — 1ª Geração — IA Simbólica:</strong> Baseada em regras escritas por humanos. SE temperatura maior que 38°C ENTÃO diagnostique febre. Funciona em domínios fechados, falha completamente em situações novas.</li><li><strong>Fundamento 2 — 2ª Geração — Machine Learning:</strong> Em vez de programar regras, alimentamos dados e a máquina aprende os padrões sozinha. Revolucionou filtros de spam, recomendações e detecção de fraude.</li><li><strong>Fundamento 3 — 3ª Geração — LLMs:</strong> Redes neurais com bilhões de parâmetros treinadas em praticamente toda a internet. Capazes de gerar texto, imagem e código com qualidade próxima à humana.</li><li><strong>Fundamento 4 — Todas coexistem:</strong> O score de crédito que te aprovou é ML de 2ª geração. O ChatGPT é 3ª. O termostato inteligente pode ser 1ª. Todas rodam simultaneamente no seu dia a dia.</li></ul><blockquote>💡 <em>Exercício imediato: Note 3 coisas que o Instagram recomendou hoje. Pergunte ao ChatGPT: como funciona o algoritmo de recomendação? E como você é diferente desse algoritmo? A resposta solidifica a compreensão das gerações.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um profissional de RH que entende que o sistema de triagem de currículos é ML de 2ª geração vai saber onde está o viés, como auditá-lo e quando confiar. Conhecimento histórico gera uso estratégico.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Não confunda algoritmo do Instagram com ChatGPT. São gerações diferentes com capacidades radicalmente distintas. Expectativas erradas levam a frustração ou superconfiança igualmente perigosa.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>as três gerações da ia: de onde viemos</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,

        cards:[{q:'Qual a diferença fundamental entre Machine Learning e um LLM?',a:'ML aprende padrões para classificar ou prever; LLMs geram linguagem natural a partir de trilhões de textos, com capacidade de raciocínio e geração criativa que ML clássico não tem.'}]

      {
        id:3, name:'Como os LLMs funcionam por dentro', dur:'15min',
        content:`<h3>Como os LLMs funcionam por dentro</h3><p>O ChatGPT não sabe nada da forma que você sabe. <strong>Como os LLMs funcionam por dentro</strong> revela que ele prevê a próxima palavra com precisão estatística extraordinária — sem consciência real. Entender isso muda completamente como você usa e interpreta as respostas.</p><h4>O que os dados mostram:</h4><p>Pesquisas do MIT mostram que usuários que entendem como LLMs funcionam têm <strong>40% menos incidentes com alucinações</strong> — porque sabem o que verificar e quando o modelo está extrapolando além dos dados.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Tokenização:</strong> O modelo não lê palavras — lê fragmentos chamados tokens. Isso afeta custos, limites de contexto e como o modelo processa diferentes idiomas.</li><li><strong>Fundamento 2 — Janela de contexto:</strong> O modelo só vê a conversa atual. Quanto mais contexto relevante você inclui em cada mensagem, melhor o resultado. Contexto é poder — contexto perdido é desperdício.</li><li><strong>Fundamento 3 — Temperatura e criatividade:</strong> Temperatura 0 = respostas precisas e determinísticas. Temperatura alta = criativas mas menos confiáveis. Para dados factuais, temperatura baixa; para brainstorming, alta.</li><li><strong>Fundamento 4 — Alucinação é previsível:</strong> O modelo maximiza coerência linguística, não factualidade. Pode inventar referências com total confiança. Saber isso não é razão para não usar — é razão para verificar.</li></ul><blockquote>💡 <em>Exercício imediato: Pergunte ao ChatGPT algo factual que você já sabe. Depois algo obscuro que você sabe que é raro. Note a diferença na confiança do tom e na precisão. Isso é calibragem do seu sensor de alucinação.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um advogado que não entendia alucinação pediu ao ChatGPT para citar jurisprudência. O modelo inventou casos com detalhes convincentes. Foi desmascarado em tribunal. Não foi culpa da IA — foi falta de compreensão do mecanismo.</p><blockquote>⚠️ <em>Cuidado com a armadilha: O tom confiante do modelo não indica precisão. LLMs apresentam informações incorretas com o mesmo tom das corretas. Nunca use dados críticos — números, datas, referências — sem verificar na fonte primária.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>como os llms funcionam por dentro</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"O que acontece quando um LLM alucina uma informação?",opts:["Acessa internet desatualizada","Maximiza coerência linguística em vez de factualidade — gera texto plausível mas incorreto com total aparência de confiança","Sofreu falha técnica","A temperatura estava alta"],correct:1},
        cards:[{q:'O que é alucinação em IA e como se proteger?',a:'Alucinação é quando o modelo gera informações incorretas com aparência de verdade. Proteção: nunca use dados críticos sem verificar na fonte primária — sempre.'}]

      {
        id:4, name:'IA fraca vs IA forte: o que existe hoje', dur:'13min',
        content:`<h3>IA fraca vs IA forte: o que existe hoje</h3><p>Filmes de ficção criaram uma confusão perigosa. <strong>IA fraca vs IA forte</strong>: todo sistema de IA que você usa hoje é IA Estreita — extraordinariamente boa em tarefas específicas, perdida fora delas. Isso já é suficiente para transformar sua carreira.</p><h4>O que os dados mostram:</h4><p>Sam Altman acredita que AGI pode chegar em 5–10 anos. Yann LeCun discorda — LLMs são fundamentalmente incapazes sem modelos de mundo físico. <strong>Os maiores especialistas do mundo discordam</strong> — o que significa que ninguém sabe com certeza.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — IA Estreita existe e é poderosa:</strong> O AlphaGo joga Go melhor que qualquer humano, mas não sabe jogar xadrez. ChatGPT escreve brilhantemente, mas não controla um robô físico.</li><li><strong>Fundamento 2 — AGI é hipotética:</strong> IA capaz de aprender qualquer tarefa cognitiva humana. Não existe hoje. Pode nunca existir da forma imaginada em filmes de ficção científica.</li><li><strong>Fundamento 3 — Ignore o hype, foque no real:</strong> Notícias sobre AGI iminente desviam atenção do que você pode fazer agora. O que existe hoje já é poderoso o suficiente para quem aprende a usar.</li><li><strong>Fundamento 4 — Expectativas corretas são vantagem:</strong> Saber o que a IA pode e não pode fazer evita frustração e confiança excessiva — os dois erros mais comuns de usuários iniciantes.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue uma tarefa que você faz toda semana. Tente delegá-la ao ChatGPT. Observe onde vai bem e onde trava. Essa é a fronteira real da IA estreita — mais ampla do que você imagina em algumas áreas.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um empresário que entendeu IA estreita não esperou AGI. Identificou as 3 tarefas mais repetitivas do negócio, aplicou as ferramentas disponíveis e liberou 15 horas semanais da equipe — hoje, com o que existe.</p><blockquote>⚠️ <em>Cuidado com a armadilha: IA forte (AGI) é tema filosófico especulativo. Usar esse debate como razão para não aprender IA hoje é como não aprender a dirigir porque carros voadores podem existir no futuro.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>ia fraca vs ia forte: o que existe hoje</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"O que diferencia IA Estreita de AGI?",opts:["Custo de treinamento","IA Estreita executa tarefas específicas com maestria; AGI hipotética aprenderia qualquer tarefa cognitiva humana — e ainda não existe","IA Estreita é open source","Velocidade de resposta"],correct:1},
        cards:[{q:'Por que focar em IA Estreita em vez de esperar pela AGI?',a:'Porque IA Estreita já existe e já pode transformar sua produtividade agora. Esperar por AGI hipotética é perder vantagem competitiva concreta no presente.'}]

      {
        id:5, name:'O ecossistema: modelos, ferramentas e empresas', dur:'15min',
        content:`<h3>O ecossistema: modelos, ferramentas e empresas</h3><p>O mercado de IA mudou mais nos últimos 2 anos do que nos 50 anteriores. <strong>O ecossistema atual</strong> é vasto, muda toda semana. Sem um mapa claro, é paralisante. Vamos construir esse mapa agora.</p><h4>O que os dados mostram:</h4><p>O mercado de IA recebe <strong>mais de 91 bilhões de dólares em investimento anual</strong> em 2024. Mais de 10.000 startups fundadas nos últimos 3 anos. Aprender os princípios que transferem é mais valioso do que memorizar ferramentas que mudam.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Os três gigantes dos LLMs:</strong> OpenAI (GPT-4o e o1), Anthropic (Claude) e Google (Gemini). Cada um com pontos fortes distintos — multimodalidade, contexto longo e integração com ecossistema Google.</li><li><strong>Fundamento 2 — Ferramentas especializadas:</strong> Imagem: Midjourney, DALL-E 3, Adobe Firefly. Código: GitHub Copilot, Cursor. Voz: ElevenLabs. Vídeo: Sora, Kling. Pesquisa: Perplexity. Cada uma com seu momento.</li><li><strong>Fundamento 3 — APIs e modelos open source:</strong> APIs da OpenAI, Anthropic e Google integram IA em qualquer sistema. Llama, Mistral e Qwen rodam localmente sem custo — ideais para dados sensíveis.</li><li><strong>Fundamento 4 — Princípios sobre interfaces:</strong> Ferramenta número 1 hoje pode ser superada em 6 meses. Aprenda os princípios que transferem — não apenas as interfaces que ficam obsoletas com cada atualização.</li></ul><blockquote>💡 <em>Exercício imediato: Escolha uma ferramenta nova: Perplexity (pesquisa), Claude (análise), Midjourney (imagem) ou Cursor (código). Passe 20 minutos explorando. Entenda o que ela faz de diferente das que você já conhece.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um profissional de marketing que conhece o ecossistema usa ChatGPT para copy, Midjourney para imagem e Perplexity para tendências — tudo em 30 minutos. Quem conhece só o ChatGPT leva 3 horas fazendo metade.</p><blockquote>⚠️ <em>Cuidado com a armadilha: O ecossistema muda rápido. Aprenda os princípios — não apenas as interfaces. Princípios transferem para qualquer nova ferramenta; interfaces ficam obsoletas com cada atualização do mercado.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>o ecossistema: modelos, ferramentas e empresas</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,

        cards:[{q:'Quais são os três gigantes dos LLMs e seus diferenciais?',a:'OpenAI (GPT-4o — multimodalidade), Anthropic (Claude — contexto longo e análise) e Google (Gemini — integração com ecossistema Google).'}]

      {
        id:6, name:'Ética, viés e uso responsável', dur:'14min',
        content:`<h3>Ética, viés e uso responsável</h3><p>A IA não é neutra. <strong>Ética, viés e uso responsável</strong> não são restrições — são o que separa profissionais que constroem reputação duradoura dos que criam riscos legais e reputacionais para si e para suas empresas.</p><h4>O que os dados mostram:</h4><p>Estudo do MIT mostrou que sistemas de reconhecimento facial erraram em <strong>34% dos rostos de mulheres negras</strong> contra 0,8% para homens brancos. Viés algorítmico é sistêmico, mensurável e reflexo direto dos dados de treinamento.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Viés algorítmico:</strong> Sistemas treinados em dados históricos reproduzem preconceitos. Reconhecimento facial, análise de crédito e seleção de currículos já tiveram casos documentados de discriminação algorítmica.</li><li><strong>Fundamento 2 — Deepfakes e desinformação:</strong> O custo de criar vídeo ou áudio falso convincente caiu para zero. A responsabilidade de verificar antes de compartilhar subiu para todos nós.</li><li><strong>Fundamento 3 — Privacidade de dados:</strong> Ao usar ferramentas públicas de IA, você frequentemente envia dados para servidores externos. Dados de clientes e estratégias confidenciais exigem cuidado especial e análise dos termos.</li><li><strong>Fundamento 4 — Responsabilidade é sua:</strong> A IA não tem responsabilidade legal. Se você usar para criar conteúdo enganoso ou prejudicial, a consequência jurídica e reputacional é sua — não da ferramenta.</li></ul><blockquote>💡 <em>Exercício imediato: Antes de compartilhar conteúdo gerado por IA, pause 10 segundos: 1) Isso é verdadeiro? 2) Isso é justo? 3) Respeita privacidade? Três perguntas, dez segundos, evitam problemas sérios.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Uma empresa de RH usou IA para triagem sem auditar o viés. O sistema descartava sistematicamente currículos de certas universidades — sub-representadas nos dados históricos. Processo trabalhista e dano reputacional foram o resultado.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Ética não é obstáculo ao uso de IA — é proteção. Empresas que usam sem governança criam riscos devastadores. As que constroem uso ético constroem confiança duradoura.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>ética, viés e uso responsável</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"O que é viés algorítmico e qual seu impacto prático?",opts:["Preferência por idiomas","Quando sistemas reproduzem preconceitos dos dados de treinamento, gerando resultados sistematicamente injustos para grupos específicos","Erro matemático de cálculo","Limitação de velocidade"],correct:1},
        cards:[{q:'Por que a responsabilidade pelo uso de IA é sempre do humano?',a:'Porque a IA não tem capacidade legal. Quem usa a ferramenta para criar conteúdo prejudicial ou enganoso é o responsável jurídico e reputacional pelas consequências.'}]

      {
        id:7, name:'Sua mentalidade para dominar IA', dur:'12min',
        content:`<h3>Sua mentalidade para dominar IA</h3><p>Você terminou o módulo de fundamentos. <strong>Sua mentalidade para dominar IA</strong> é o que vai determinar se esse conhecimento vira competência real ou fica apenas na memória de curto prazo.</p><h4>O que os dados mostram:</h4><p>Pesquisas sobre aprendizado de adultos mostram retenção de <strong>apenas 10% do que lemos</strong> mas <strong>75% do que praticamos</strong>. Para IA isso significa: ler sobre prompts é útil, mas usar em problemas reais é o que gera competência real.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Mentalidade de experimentação:</strong> Trate cada interação com IA como experimento, não como teste. Experimentos não falham — geram dados. Isso elimina o medo de errar e acelera enormemente o aprendizado.</li><li><strong>Fundamento 2 — Aprendizado iterativo:</strong> Não existe prompt perfeito na primeira tentativa. A habilidade de refinamento — pegar uma resposta ruim e transformar em boa — separa usuários avançados dos iniciantes.</li><li><strong>Fundamento 3 — Documentar o que funciona:</strong> Quando encontrar um prompt ou fluxo que funciona, documente. Crie sua biblioteca pessoal. Em 6 meses, esse acervo vai valer ouro em produtividade diária.</li><li><strong>Fundamento 4 — Consistência supera intensidade:</strong> 20 minutos por dia de prática com IA supera uma maratona de fim de semana. Consistência cria intuição; intensidade esporádica cria ansiedade sem consolidar habilidade.</li></ul><blockquote>💡 <em>Exercício imediato: Crie agora um documento Minha Biblioteca de IA. Pode ser Google Docs, Notion ou papel. Escreva o primeiro prompt que testar hoje e seu resultado. Esse documento é seu ativo mais valioso neste curso.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um profissional que pratica IA 20 minutos por dia durante 90 dias cria uma intuição que outro que assiste cursos sem praticar nunca vai ter. A diferença não é acesso ao conhecimento — é consistência de aplicação.</p><blockquote>⚠️ <em>Cuidado com a armadilha: O maior erro é aprender teoria sem praticar. Cada módulo deste curso tem exercícios explícitos — ao ler, abra a ferramenta e teste. Teoria sem prática é ilusão de aprendizado — confortável e inútil.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>sua mentalidade para dominar ia</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,

      {
        id:8, name:'O que é prompt e por que muda tudo', dur:'15min',
        content:`<h3>O que é prompt e por que muda tudo</h3><p>Prompt é a instrução que você dá para o modelo de IA. A diferença entre um prompt ruim e excelente é a diferença entre uma resposta genérica inútil e um output profissional que resolve seu problema.</p><h4>O que os dados mostram:</h4><p>Estudo da Anthropic mostra que prompts bem estruturados melhoram a qualidade das respostas em <strong>até 300%</strong> para tarefas complexas. A maioria usa menos de 10% do potencial — por falta de técnica.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Garbage in, garbage out:</strong> Qualidade do output é proporcional à qualidade do input. Prompt vago gera resposta vaga. Prompt rico gera resposta rica e utilizável.</li><li><strong>Fundamento 2 — Os 4 elementos essenciais:</strong> Contexto (quem você é), Instrução (o que quer), Formato (como quer o output), Restrição (o que não deve incluir). Juntos formam a base de qualquer prompt eficaz.</li><li><strong>Fundamento 3 — Role prompting:</strong> Definir papel para a IA — Aja como especialista em X — melhora dramaticamente o tom e profundidade da resposta.</li><li><strong>Fundamento 4 — Few-shot prompting:</strong> Dar exemplos antes de pedir. Escreva um título assim: [exemplo]. Agora crie 5 para [tema]. Exemplos calibram o modelo de forma muito poderosa.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue uma tarefa que deu resultado ruim com IA. Reescreva incluindo: quem você é, o que quer especificamente, em qual formato e o que NÃO quer. Compare. A melhoria será imediata.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um empreendedor pediu Escreva post sobre produto e recebeu resposta genérica. Reescreveu com contexto, instrução específica, formato e restrições. Resultado: usável imediatamente sem edição.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Nunca aceite a primeira resposta. 80% dos que dizem a IA não funciona simplesmente não iteraram. Diga melhore o ponto 2, seja mais direto. A melhoria está na conversa.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>o que é prompt e por que muda tudo</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Qual elemento do prompt define o que NAO deve aparecer no output?",opts:["Contexto","Instrução","Restrição","Exemplo"],correct:2},
        cards:[{q:'O que é few-shot prompting?',a:'Técnica de incluir exemplos no prompt antes do pedido — calibra o modelo e melhora significativamente consistência e qualidade do output.'}]
      },
      {
        id:9, name:'Framework CIRE: estrutura que funciona sempre', dur:'14min',
        content:`<h3>Framework CIRE: estrutura que funciona sempre</h3><p>Existe uma estrutura comprovada para a maioria das tarefas com IA. CIRE — Contexto, Instrução, Restrição, Exemplo — é framework flexível que você internaliza e aplica em segundos.</p><h4>O que os dados mostram:</h4><p>Profissionais que usam frameworks documentados de prompt produzem outputs <strong>consistentemente superiores</strong> em menos tempo. Consistência é o que separa uso casual de uso profissional.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — C — Contexto rico:</strong> Sou empreendedor digital que vende cursos no Instagram para público de 25 a 45 anos é contexto. Sou empresário não é. Quanto mais específico, mais relevante a resposta.</li><li><strong>Fundamento 2 — I — Instrução clara:</strong> Verbos de ação mais objeto mais qualidade esperada. Crie 10 headlines para Instagram sobre produtividade, estilo direto, máximo 10 palavras cada. Especificidade é tudo.</li><li><strong>Fundamento 3 — R — Restrições que liberam:</strong> Paradoxalmente restrições melhoram. Sem jargões, evite clichês, tom informal mas profissional — cada restrição remove resultados indesejados antes de acontecerem.</li><li><strong>Fundamento 4 — E — Exemplos calibram:</strong> Incluir 1 ou 2 exemplos do output desejado é o atalho mais poderoso. O modelo calibra conteúdo, estilo e nível de detalhe simultaneamente.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue qualquer tarefa de hoje. Escreva o prompt usando CIRE: C (quem você é + situação), I (o que quer exatamente), R (o que não quer), E (exemplo do resultado ideal). Compare sem o framework.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um gestor de RH usou CIRE para criar template de feedback. O resultado virou padrão da empresa — porque o framework gerou clareza que nenhum prompt improvisado conseguia manter consistentemente.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Prompts muito longos não são necessariamente melhores. Clareza supera quantidade. Um prompt de 50 palavras bem estruturadas supera um de 500 mal organizadas toda vez.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>framework cire: estrutura que funciona sempre</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Qual é o paradoxo das restrições em prompts?",opts:["Deixam a IA mais lenta","Melhoram a qualidade — eliminam resultados indesejados antes de acontecerem, direcionando o modelo para o que você quer","Confundem o modelo","Só funcionam em inglês"],correct:1},
        cards:[{q:'O que é o framework CIRE?',a:'Contexto + Instrução + Restrição + Exemplo — estrutura de 4 elementos para construir prompts eficazes para a maioria das tarefas com IA.'}]
      },
      {
        id:10, name:'Chain of Thought: raciocínio estruturado', dur:'15min',
        content:`<h3>Chain of Thought: raciocínio estruturado</h3><p>Para problemas complexos que exigem raciocínio, Chain of Thought transforma o modelo em parceiro de pensamento genuíno, capaz de ajudar a resolver problemas que antes exigiriam horas.</p><h4>O que os dados mostram:</h4><p>O paper Chain-of-Thought Prompting do Google Brain (2022) demonstrou melhoria de <strong>até 40% na precisão</strong> em tarefas de matemática e lógica quando o modelo é instruído a mostrar o raciocínio.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Chain of Thought (CoT):</strong> Pedir que o modelo mostre o raciocínio antes da conclusão. Pense passo a passo: [problema]. O modelo expõe o caminho — você identifica onde saiu dos trilhos.</li><li><strong>Fundamento 2 — Zero-shot CoT:</strong> Simplesmente adicionar Vamos pensar passo a passo ao prompt. Funciona sem nenhum exemplo — reduz erros em problemas lógicos consistentemente.</li><li><strong>Fundamento 3 — Pre-mortem estratégico:</strong> Imagine que daqui a 1 ano essa decisão falhou. Quais foram as razões? Identifica riscos com antecedência para agir. Ferramenta poderosa de planejamento.</li><li><strong>Fundamento 4 — Self-Consistency:</strong> Gerar múltiplas respostas independentes e escolher a mais consistente. Reduz alucinação em problemas com resposta única correta.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue um problema real que está enfrentando. Escreva: Analise passo a passo considerando: [problema]. Liste fatores, riscos ocultos e 3 recomendações priorizadas. Compare sem o passo a passo.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um empreendedor que precisava decidir entre duas estratégias usou CoT e o modelo identificou um risco na estratégia preferida completamente ignorado antes. Uma análise de 5 minutos evitou um erro de meses.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Técnicas avançadas aumentam tokens usados e custo em APIs pagas. Reserve para problemas que realmente exigem raciocínio profundo. Para tarefas simples o básico é suficiente.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>chain of thought: raciocínio estruturado</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Por que Chain of Thought melhora a precisão dos modelos?",opts:["Usa mais tokens","Forçar o modelo a mostrar o raciocínio passo a passo melhora a qualidade do pensamento em si — não apenas a explicação","Reduz temperatura","Ativa funções premium"],correct:1},
        cards:[{q:'O que é o Pre-mortem estratégico com IA?',a:'Técnica que imagina o fracasso futuro de uma decisão e trabalha de trás para frente para identificar as causas prováveis — revelando riscos antes que se tornem realidade.'}]
      },
      {
        id:11, name:'Erros fatais de prompt e como corrigir', dur:'13min',
        content:`<h3>Erros fatais de prompt e como corrigir</h3><p>Erros de prompt são sistemáticos — cometidos repetidamente pela maioria dos iniciantes. Conhecê-los economiza horas de tentativas e transforma frustração em fluxo produtivo.</p><h4>O que os dados mostram:</h4><p>Análise de sessões de uso identificou que <strong>vagueza está presente em 67% das interações</strong> que geraram resultados insatisfatórios. Especificidade é a solução mais impactante e mais negligenciada.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Erro 1 — Vagueza:</strong> Escreva algo sobre marketing versus Escreva 3 estratégias de marketing orgânico para Instagram focadas em conversão para curso online com orçamento zero. A diferença é abissal.</li><li><strong>Fundamento 2 — Erro 2 — Sem formato:</strong> Não definir como quer o output gera resposta desestruturada. Responda em lista numerada com título e descrição de 2 frases = saída utilizável imediatamente.</li><li><strong>Fundamento 3 — Erro 3 — Aceitar a primeira resposta:</strong> Iteração é obrigatória. Bom mas torne mais específico no ponto 2 e remova o jargão melhora qualquer resposta em 50% com segundos de esforço.</li><li><strong>Fundamento 4 — Erro 4 — Contradições no prompt:</strong> Escreva formal mas descontraído, longo mas conciso. Contradições explícitas travam o modelo. Escolha uma direção e seja consistente.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue um prompt que deu resultado ruim esta semana. Releia como se fosse outra pessoa. Onde está a vagueza? Qual formato não foi especificado? Há contradições? Corrija e compare.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um gestor pediu à IA para escrever um email difícil. Resultado: genérico e frio. Problema: sem contexto, sem formato, sem restrição. Com prompt correto o email ficou profissional em 2 minutos.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Quando a IA der resposta ruim, resista a culpar o modelo. Analise o prompt criticamente. Em 80% dos casos a falha está na instrução — e a correção é simples quando você sabe onde procurar.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>erros fatais de prompt e como corrigir</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Qual é o erro de prompt mais comum entre iniciantes?",opts:["Usar palavras técnicas demais","Vagueza — não especificar contexto, formato e objetivo com clareza suficiente para o modelo gerar algo útil","Prompts muito curtos","Usar muitas restrições"],correct:1},
        cards:[{q:'Por que nunca aceitar a primeira resposta como definitiva?',a:'Porque iteração é o processo — refinar com melhore o ponto X, seja mais específico, remova o jargão Y transforma respostas medianas em excelentes com segundos de esforço.'}]
      },
      {
        id:12, name:'Prompts para escrita, análise e pesquisa', dur:'14min',
        content:`<h3>Prompts para escrita, análise e pesquisa</h3><p>As três aplicações mais comuns de IA são escrever melhor, pesquisar mais rápido e analisar com mais profundidade. Técnicas específicas para cada contexto transformam o resultado.</p><h4>O que os dados mostram:</h4><p>Profissionais do conhecimento passam <strong>até 40% do tempo</strong> em escrita, análise e pesquisa. Otimizar essas três áreas com IA pode liberar 15 a 20 horas semanais sem sacrificar qualidade.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Escrita — seja coautor:</strong> Escrevi isso — melhore a clareza e o ritmo sem mudar minha voz. Muito melhor que escreva por mim. Preserve sua voz, use IA para polir e refinar.</li><li><strong>Fundamento 2 — Análise — estruture os critérios:</strong> Analise considerando: [critérios]. Identifique pontos fortes, fracos e 3 recomendações priorizadas. Estrutura explícita no prompt = análise estruturada no output.</li><li><strong>Fundamento 3 — Pesquisa — verifique as fontes:</strong> Use IA para busca interna de conhecimento, mas verifique referências em fontes primárias. Modelos inventam autores e datas com total naturalidade e confiança.</li><li><strong>Fundamento 4 — Advocatus Diaboli:</strong> Argumente contra minha posição com os melhores contraargumentos. Revela pontos cegos e fortalece seu raciocínio antes de qualquer apresentação importante.</li></ul><blockquote>💡 <em>Exercício imediato: Pegue um texto que você escreveu recentemente. Mande para a IA: Aja como editor exigente. Identifique os 3 pontos mais fracos, explique por que e sugira melhoria específica para cada. Use o resultado.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um consultor que usou Advocatus Diaboli antes de apresentar proposta identificou 2 pontos cegos críticos que teriam destruído a argumentação diante do cliente. Perspectiva adversarial é ouro.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Para pesquisa nunca cite referências geradas por IA sem verificar. Modelos inventam títulos de papers e nomes de autores com total confiança. Sempre vá às fontes primárias.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>prompts para escrita, análise e pesquisa</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Qual técnica usa IA para identificar pontos cegos no seu próprio argumento?",opts:["Few-shot prompting","Advocatus Diaboli — pedir à IA que argumente contra sua posição com os melhores contraargumentos","Chain of Thought","Role prompting"],correct:1},
        cards:[{q:'Por que verificar referências geradas por IA é obrigatório em pesquisa?',a:'Porque modelos inventam autores, títulos e datas com total confiança — para qualquer dado crítico vá sempre à fonte primária.'}]
      },
      {
        id:13, name:'Sua biblioteca de prompts pessoal', dur:'13min',
        content:`<h3>Sua biblioteca de prompts pessoal</h3><p>Os melhores usuários de IA não reinventam a roda. Eles constroem e mantêm uma biblioteca de prompts pessoal — seu ativo mais valioso que cresce e se valoriza com o tempo.</p><h4>O que os dados mostram:</h4><p>Profissionais que documentam prompts por 6 meses relatam economia de <strong>30 a 50% do tempo</strong> em tarefas recorrentes. A biblioteca vira um sistema operacional de IA personalizado.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Categorize por tarefa:</strong> Escrita, análise, brainstorming, revisão, código, imagem. Categorias claras tornam a biblioteca navegável no momento da necessidade — não depois de uma busca frustrante.</li><li><strong>Fundamento 2 — Documente contexto e resultado:</strong> Não salve só o prompt — salve quando funciona melhor e um exemplo do output. Isso acelera a adaptação para situações novas.</li><li><strong>Fundamento 3 — Versione suas melhorias:</strong> v1.0, v1.1 — adicionei restrição de tom. Entender o que melhorou é aprendizado valioso e permite voltar à versão anterior quando necessário.</li><li><strong>Fundamento 4 — Compartilhe com equipe:</strong> Uma biblioteca compartilhada multiplica o valor por N pessoas. Quando um membro encontra prompt excelente, toda equipe se beneficia imediatamente.</li></ul><blockquote>💡 <em>Exercício imediato: Crie agora um documento Biblioteca de Prompts. Google Docs, Notion ou papel. Adicione os 3 melhores prompts que você já usou. Esse é o começo do seu ativo mais valioso em IA.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Uma equipe de marketing com biblioteca compartilhada publica 3x mais conteúdo com a mesma equipe. O prompt de copywriting validado por um membro vira padrão. Qualidade consistente sem retrabalho.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Não salve prompts que não testou. Qualidade sobre quantidade. 20 prompts excelentes são infinitamente mais valiosos que 200 mediocres. Curadoria rigorosa é o que mantém a biblioteca útil.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>sua biblioteca de prompts pessoal</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"Por que versionar prompts na biblioteca pessoal?",opts:["Para impressionar outros","Para comparar versões e entender o que melhorou — aprendizado sistemático que acelera o desenvolvimento da habilidade","Para economizar espaço","Para facilitar busca"],correct:1},
        cards:[{q:'Por que compartilhar a biblioteca de prompts com a equipe multiplica seu valor?',a:'Quando um membro encontra prompt excelente, toda a equipe se beneficia imediatamente — multiplicando o valor da descoberta por N pessoas sem esforço adicional.'}]
      },
      {
        id:14, name:'Resumo: prompt engineering na prática', dur:'12min',
        content:`<h3>Resumo: prompt engineering na prática</h3><p>Você completou o módulo mais fundamental deste curso após os fundamentos. Prompt engineering é o alicerce de tudo que vem a seguir — e a habilidade mais transferível em todo o mundo de IA.</p><h4>O que os dados mostram:</h4><p>Usuários que praticam prompt engineering sistematicamente por 2 semanas <strong>dobram a qualidade dos outputs</strong> e reduzem pela metade o tempo de refinamento. O ROI é imediato e mensurável.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — CIRE como base:</strong> Contexto + Instrução + Restrição + Exemplo. Aplique nessa ordem para 90% das tarefas. Simples e eficaz — pare de improvisar cada prompt do zero.</li><li><strong>Fundamento 2 — Iterate sempre:</strong> Nunca aceite a primeira resposta. A melhoria está na conversa — 3 iterações transformam resposta mediana em excelente sem grande esforço.</li><li><strong>Fundamento 3 — Biblioteca como ativo:</strong> Documente o que funciona. Versione melhorias. Em 6 meses terá sistema operacional de IA personalizado que cresce enquanto você trabalha.</li><li><strong>Fundamento 4 — Técnicas avançadas para problemas complexos:</strong> CoT, few-shot, role prompting, self-consistency — conheça todas, aplique quando o problema exige raciocínio profundo.</li></ul><blockquote>💡 <em>Exercício imediato: Esta semana: aplique CIRE em pelo menos 5 tarefas reais. Salve os melhores prompts na biblioteca. No domingo revise o que funcionou. Esse ciclo semanal transforma conhecimento em competência.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Um profissional que dedica 15 minutos diários a praticar e refinar prompts por 30 dias cria intuição que anos de leitura não constroem. Intuição de prompter avançado vem de prática deliberada acumulada.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Prompt engineering é habilidade — se desenvolve com prática, não com leitura. Cada conversa com IA é oportunidade de aprimorar. Use essa oportunidade conscientemente.</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>resumo: prompt engineering na prática</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
        quiz:{q:"O que consolida mais a habilidade de prompt engineering?",opts:["Ler artigos sobre o assunto","Prática deliberada — usar em tarefas reais diariamente, documentar o que funciona e iterar conscientemente","Memorizar prompts de outros","Pagar pelo plano avançado"],correct:1},
        cards:[{q:'Por que prompt engineering é a habilidade mais transferível em IA?',a:'Porque funciona em qualquer modelo e qualquer ferramenta — hoje e nos próximos anos. Princípios de comunicação clara e específica não ficam obsoletos com atualizações.'}]
      }

        id:15, name:'ChatGPT na prática: guia completo', dur:'15min',
        content:`<h3>ChatGPT na prática: guia completo</h3><p>Pouquíssimas pessoas dominam de verdade <strong>chatgpt na prática: guia completo</strong> — é uma área que transforma profissionais quando aplicada de forma consistente e estratégica.</p><h4>O que os dados mostram:</h4><p>Profissionais que dominam chatgpt na prática: guia completo reportam ganhos médios de produtividade superiores a <strong>40%</strong> em suas áreas específicas — com implementação progressiva e consistente.</p><h4>Os fundamentos práticos:</h4><ul><li><strong>Fundamento 1 — Base antes da execução:</strong> Entender o fundamento antes de executar evita retrabalho e erros que consumem mais tempo do que qualquer atalho economizaria.</li><li><strong>Fundamento 2 — Aplicação imediata:</strong> Cada conceito aqui tem aplicação direta — não espere o momento perfeito para começar. Execução imperfeita hoje supera planejamento perfeito que nunca sai do papel.</li><li><strong>Fundamento 3 — Medição de resultado:</strong> Defina uma métrica antes de implementar. O que é medido melhora. O que não é medido é esquecido e nunca evolui.</li><li><strong>Fundamento 4 — Iteração contínua:</strong> A primeira versão não precisa ser perfeita — precisa existir. Melhore progressivamente com base em resultados reais, não em suposições.</li></ul><blockquote>💡 <em>Exercício imediato: Aplique o conceito central de chatgpt na prática: guia completo em uma situação real hoje. Documente o resultado — mesmo imperfeito. Resultados reais constroem competência que nenhuma teoria substitui.</em></blockquote><h4>Aplicação no mundo real:</h4><p>Profissionais que dominam chatgpt na prática: guia completo operam com vantagem invisível mas poderosa: executam com mais precisão, cometem menos erros previsíveis e constroem sistemas sustentáveis.</p><blockquote>⚠️ <em>Cuidado com a armadilha: Conhecimento sem ação é entretenimento intelectual. A pergunta mais importante após este tópico não é entendi — é o que vou fazer diferente amanhã por causa disso?</em></blockquote><h4>Conclusão:</h4><p>Dominar <strong>chatgpt na prática: guia completo</strong> é investimento com retorno imediato. Aplique hoje — competência vem da prática, não da teoria acumulada.</p>`,
