var TOPICS = [
  {id:1,name:'O que é Cibersegurança',dur:'16 min',content:`<h3>Bem-vindo ao Mundo da Proteção Digital!</h3><p>Olá! Estou extremamente feliz em ter você neste curso crítico: Cibersegurança. Em um mundo onde praticamente tudo está conectado na internet, proteção de dados se tornou a habilidade mais importante que qualquer profissional pode ter.</p><p>Cibersegurança é a prática de proteger sistemas, redes e dados contra ataques digitais. Mas vamos ser claros: não é apenas sobre instalar antivírus. É uma disciplina complexa que abrange tecnologia, processos, pessoas e mentalidade. É sobre defesa estratégica em um ambiente onde ameaças nunca dormem.</p><p>Imaginemos um cenário real de 2025: uma empresa tem dados de 10 milhões de clientes. Um atacante consegue acessá-los. Os danos não são apenas técnicos — são legais, financeiros e de reputação. Multas LGPD podem chegar a bilhões. Confiança desaparece. A empresa pode falir. Por isso, cibersegurança é sério!</p><p>A base de toda segurança é a Tríade CIA: Confidencialidade, Integridade e Disponibilidade. Vamos decompor: Confidencialidade significa que dados secretos permanecem secretos. Seu email não deveria ser lido por estranhos. Integridade significa que dados não são alterados sem permissão — se você transfere 100 reais, não pode chegar como 1000. Disponibilidade significa que sistemas funcionam quando necessários — um website derrubado é um site inseguro.</p><p>Para um banco, todos os três são críticos! Confidencialidade protege dados financeiros. Integridade garante que transações sejam corretas. Disponibilidade garante que você consegue sacar dinheiro quando necessário. Comprometer qualquer um desses é um problema.</p><p>Agora vamos aos atores: Atacantes podem ser desde script kiddies (hackers iniciantes usando ferramentas prontas) até adversários estatais com bilhões de orçamento. Estado-Nação? Sim, existem! Países desenvolvem "ciberarmas" para espionar outros governos. Corporações contratam hackers para espionar concorrentes. Criminosos vendem dados roubados na dark web.</p><p>Motivações variam: dinheiro é a mais comum (roubo de dados financeiros, ransomware), mas também há espionagem (roubar segredos comerciais), sabotagem (derrubar concorrentes) e hacktivismo (hackers políticos com uma causa).</p><p>A boa notícia? Você pode se proteger! Não precisa ser um hacker. Precisa entender princípios, seguir boas práticas e estar atento. Será que seu email usa autenticação multifator? Sua senha é única e forte? Você verifica URLs antes de clicar? Essas são as defesas que realmente importam!</p><p>Cibersegurança é também um caminho de carreira fenomenal. Especialistas em segurança ganham bem, trabalho nunca falta (demanda global é gigantesca), e você ajuda empresas e pessoas a se protegerem. É heróico, de verdade!</p><p>Uma última coisa: segurança não é "100% de segurança". Não existe isso. O objetivo é mitigar riscos a um nível aceitável. Você aceita alguns riscos menores para manter produtividade. Mas riscos grandes demais, você esmaga com defesa em profundidade.</p>`,cards:[{q:'Qual é a tríade que fundamenta toda segurança?',a:'CIA: Confidencialidade (dados secretos permanecem secretos), Integridade (dados não são alterados) e Disponibilidade (sistemas funcionam quando necessário).'}]},
  {id:2,name:'Ameaças, Vulnerabilidades e Risco',dur:'17 min',content:`<h3>O Triângulo Perigoso: Ameaças, Vulnerabilidades e Risco</h3><p>Para proteger, precisa entender. E para entender segurança, precisa dominar três conceitos-chave que muitas pessoas confundem: ameaça, vulnerabilidade e risco.</p><p>Uma AMEAÇA é qualquer coisa que possa causar dano. Um atacante querendo roubar sua senha é uma ameaça. Um malware procurando infectar computadores é uma ameaça. Uma tempestade solar emitindo radiação que afeta eletrônicos? Também é ameaça (cibersegurança inclui desastres naturais!).</p><p>Ameaças podem ser intencionais (humanas) ou não-intencionais (naturais). Um hacker é ameaça intencional. Um funcionário que acidentalmente envia dados confidenciais para o email errado é uma ameaça não-intencional. Ambas causam problemas!</p><p>Uma VULNERABILIDADE é uma fraqueza que pode ser explorada. Um software com bug é uma vulnerabilidade. Uma senha fraca é uma vulnerabilidade. Deixar uma porta destravada é uma vulnerabilidade. Vulnerabilidades por si só não causam dano — precisam de alguém para explorar.</p><p>Um atacante esperto procura por vulnerabilidades. Se seu sistema tem um bug de segurança e ninguém sabe, ainda é fraco. Se todos sabem, é ainda mais fraco! Por isso, quando empresas descobrem bugs, tentam consertar antes que fiquem públicas.</p><p>RISCO é a probabilidade de uma ameaça explorar uma vulnerabilidade e causar impacto. Risco = Ameaça × Vulnerabilidade × Impacto. Se há ameaçante querendo entrar (ameaça), você tem uma porta destrancada (vulnerabilidade), e seus joias estão visíveis (impacto), você tem alto risco. Se a porta está trancada, risco cai para zero mesmo com ameaçante presente!</p><p>Gerenciamento de risco é a arte de equilibrar segurança com produtividade. Você não pode trancar tudo a ponto de nada funcionar. Precisa tomar decisões inteligentes sobre quais riscos reduzir, quais aceitar e quais transferir (como comprando seguro).</p><p>Existe um conceito chamado "Superfície de Ataque" — é toda a área pela qual atacantes podem tentar entrar. Quanto maior a superfície, mais riscos. Um sistema com 100 portas abertas tem superfície maior que um com 10. Quanto menos "portas" (pontos de entrada), melhor!</p><p>Por isso, organizações praticam "Princípio do Menor Privilégio" — você recebe apenas as permissões necessárias para seu trabalho. Se você trabalha em vendas, não deveria acessar o código-fonte. Se é programador, não deveria acessar dados de clientes. Limita superfície de ataque!</p><p>Outro conceito crítico é "Defense in Depth" (Defesa em Profundidade) — não confie em uma única barreira. Camadas múltiplas! Um atacante pode burlar firewall, mas enfrenta autenticação multifator. Consegue passar disso, encontra criptografia. E por aí vai. Cada camada aumenta dificuldade exponencialmente.</p><p>Por último, há um conceito chamado "Risk Acceptance" — às vezes, custo de eliminar um risco é maior que o risco em si. Uma empresa pequena pode aceitar risco baixo de ataque sofisticado porque defesa seria cara demais. Decisão de negócio legítima!</p>`,cards:[{q:'Como risco, ameaça e vulnerabilidade se relacionam?',a:'Risco é quando uma ameaça (ator malicioso) encontra uma vulnerabilidade (fraqueza) para explorar, causando impacto real.'}]},
  {id:3,name:'Princípios de Segurança e Defesa',dur:'18 min',content:`<h3>Os Princípios que Salvam Vidas Digitais</h3><p>Agora que entendemos as ameaças, vamos aos princípios que as profissionais de segurança usam para construir defesas. Esses princípios têm décadas de comprovação!</p><p>Primeiro, "SEGURANÇA POR DESIGN". Não é adicionar segurança depois. Desde o início, produtos são pensados com segurança em mente. Um software novo é desenvolvido pensando em ataques. Um prédio é construído com câmeras desde a fundação. Segurança é feature, não afterthought!</p><p>Segundo, "CONFIE MAS VERIFIQUE". Isso é espelhado do paradigma Zero Trust moderno. Nunca assuma que algo é seguro só porque parece estar. Verifique URLs antes de clicar. Confirme identidades antes de transferir dinheiro. Um email de "seu banco" pedindo senha? Absolutamente verificar com o banco antes!</p><p>Terceiro, "PRINCÍPIO DO MENOR PRIVILÉGIO". Mencionei antes, mas é tão importante que repito. Cada usuário, programa, processo recebe apenas permissões mínimas para fazer seu trabalho. Admin não precisa de permissão de admin para verificar email. Programador não precisa acessar banco de dados de produção para testar código.</p><p>Quarto, "REDUNDÂNCIA E BACKUP". A regra de ouro é "3-2-1": três cópias de dados importantes, em dois formatos diferentes, com uma cópia offline. Por quê? Se há ransomware que criptografa tudo, você pode restaurar do backup offline. Se um disco falha, você tem dois outros. Se um local queima, você tem cópias em outro lugar!</p><p>Quinto, "MONITORAMENTO CONTÍNUO". Segurança não é um evento — é vigilância perpétua. Empresas usam SIEM (Security Information and Event Management) para ver millions de eventos de segurança por dia. Tentativas de login falhadas, transferências incomuns, acessos fora do horário — tudo é monitorado.</p><p>Sexto, "INCIDENTE RESPONSE". Mesmo com melhor defesa, ataques acontecem. Por isso, organizações têm planos de resposta. Descobriu uma invasão? Há um playbook: 1) Isolar o sistema, 2) Coletar evidência, 3) Restaurar backups, 4) Aprender a lição. Preparação salva vidas!</p><p>Sétimo, "CRIPTOGRAFIA". É seu melhor amigo! Criptografia transforma dados legíveis em código ilegível sem a chave. Mesmo que um atacante roube seus dados, não consegue ler. HTTPS em websites, encriptação de disco, senhas hashed — tudo usa criptografia.</p><p>Oitavo, "PATCHES E UPDATES". Software tem bugs. Quando bugs têm implicações de segurança, empresas lançam patches. Ignorar updates é pedir para ser hackeado! Um site que não atualiza WordPress em meses? Será explorado. Atualizar regularmente é defesa crítica número um.</p><p>Nono, "AUTHENTICAÇÃO FORTE". Senhas de 6 caracteres são piada. Senhas devem ser longas, aleatórias, únicas por site. Melhor ainda: usar gerenciador de senhas (como Bitwarden, 1Password) que gera senhas de 20+ caracteres. E obrigatoriamente: autenticação multifator! Mesmo que senha seja roubada, 2FA protege você.</p><p>Por fim, "EDUCAÇÃO CONTÍNUA". O elo mais fraco em segurança é sempre humano. Funcionário que clica em email de phishing é porta de entrada. Por isso, treinamento é crítico! Empresas fazem simulados de phishing, educam sobre social engineering, criam uma cultura de segurança.</p><p>A verdade é que segurança é jornada, não destino. Ameaças evoluem constantemente. Você precisa evoluir também. Mas com esses princípios, você consegue se proteger bem!</p>`,cards:[{q:'Qual é o conceito de "Defense in Depth"?',a:'Usar múltiplas camadas de defesa para que um atacante que consegue burlar uma camada enfrente muitas outras, aumentando segurança exponencialmente.'}]},
  {id:4,name:'Malware: Vírus, Trojans e Ransomware',dur:'16 min',content:`<h3>O Lado Escuro: Malware em Detalhes</h3><p>Malware é software malicioso — qualquer programa criado para causar dano. Categoria abrangente: vírus, trojans, worms, ransomware, spyware, adware. Vamos entender cada um!</p><p>VÍRUS é software que se replica infectando outros programas. Precisa de host (um programa) para existir. Quando você executa programa infectado, vírus se ativa, procura outros programas para infectar. Exemplo clássico: macro vírus em Word (infecta documento Word, se replica para outros docs). Atuais: menos comuns, substituídos por worms.</p><p>WORM é malware que se autorreplica sem precisar de host. Diferente de vírus, worm é independente. Se conecta à rede, encontra outras máquinas vulneráveis, copia a si mesmo para elas. Exemplo: Wannacry em 2017 — worm que explorou vulnerabilidade Windows, infectou 200.000 computadores em uma semana! Rapidez devastadora.</p><p>TROJAN é software que parece inofensivo (jogo, ferramenta útil) mas na verdade é malicioso. "Cavalo de Tróia" da mitologia — presente bonito que continha soldados. Computador: você baixa "liberador de RAM" que prometia melhorar performance, na verdade instala spyware. Usuário baixa porque confia em fonte (ou fonte foi comprometida).</p><p>SPYWARE é malware que espiona você. Rastreia: sites que visita, senhas que digita, dados que transfere, arquivos que acessa. Vende dados para terceiros ou usa para roubo de identidade. Keylogger (registra tudo que você digita) é tipo de spyware. Facebook advertente: spyware é invisível! Usuário não sabe que está infectado.</p><p>RANSOMWARE é o vilão moderno — criptografa seus arquivos e pede dinheiro para descriptografar. 2024-2026: indústria bilionária de extorsão! Empresas são atacadas, dados criptografados, criminosos cobram resgate (às vezes 1-50 milhões!). Pior: alguns criminosos copiam dados primeiro, então cobram pelo decryption E pelo silêncio (não publicar dados).</p><p>Como ransomware funciona: 1) Infecção (email, exploit de vulnerabilidade, RDP fraco), 2) Propagação (criptografa máquinas na rede), 3) Extorsão (mostra mensagem: "seus arquivos foram criptografados, pague X bitcoins em 48h ou dados são publicados"), 4) Impacto (empresa não consegue funcionar, perda de receita).</p><p>Defesa contra ransomware: Backups offline! Se tem backup que o ransomware não consegue acessar, você restaura sem pagar. Zero-day é problema (não há patch), mas maioria funciona com vulnerabilidades conhecidas. Updates ajudam! Monitoramento detecta comportamento suspeito (criptografia em massa = alerta!).</p><p>ADWARE é menos perigoso mas irritante — mostra publicidades indesejadas. Geralmente grátis em programas ou instala quando você baixa software questionável. Alguns adware também rastreiam (espiam), vendendo dados de comportamento.</p><p>Combinação é pior! Um trojan que instala spyware que configura ransomware. Camadas de infecção. Por isso, defesa em profundidade é crítica!</p><p>Distribuição: email (anexo malicioso), websites (drive-by download), P2P (torrent), USB (physical infection). Phishing é vetor comum — email que parece legítimo com anexo malicioso. "Seu pacote chegou! Clique aqui para rastrear" → clique → infectado!</p>`,cards:[{q:'Qual é a diferença entre vírus e worm?',a:'Vírus precisa de host (programa) para se replicar, enquanto worm é independente e se autorreplica explorando vulnerabilidades de rede.'}]},
  {id:5,name:'Autenticação Multifator e Criptografia',dur:'17 min',content:`<h3>Suas Armas Defensivas: Autenticação e Criptografia</h3><p>Se há dois conceitos que salvarão sua vida digital, são esses: Autenticação Multifator e Criptografia forte. Sério, implemente ambas hoje!</p><p>AUTENTICAÇÃO MULTIFATOR (MFA/2FA) significa: para acessar conta, precisa de mais de uma coisa. Normalmente: Algo que você sabe (senha) + Algo que você tem (phone, chave de segurança) ou Algo que você é (biometria).</p><p>Tipos: SMS (código chega por texto — menos seguro, vulnerável a SIM swap), App Authenticator (código gerado em Google Authenticator, Authy), Push notification (aprovação em seu phone), Biometria (face, fingerprint), Hardware keys (YubiKey, Google Titan Key — mais seguro!).</p><p>Por que funciona? Mesmo que senha seja roubada, atacante ainda precisa do segundo fator. Email com MFA foi hackeado? Hacker não consegue acessar sem seu phone. Extraordinário simples, extraordinário eficaz!</p><p>Pesquisa mostra: MFA reduz risco de comprometimento em 99.9%. NOVENTA E NOVE PONTO NOVE PORCENTO! Diferença entre contas MFA hackeadas é rara vs. muito comum. Vale absolutamente o inconveniente de usar código extra.</p><p>CRIPTOGRAFIA transforma dados legíveis em ilegível sem chave. Dois tipos: Simétrica (mesma chave para encriptar e decriptar) e Assimétrica (chave pública para encriptar, chave privada para decriptar).</p><p>Simétrica é rápida mas precisa compartilhar chave (desafio!). Exemplo: AES-256 (used by NSA para dados secretos). Se você tem chave de 256 bits, tempo para quebrar bruteforce? 2 elevado a 256 = número gigantesco, mais tempo do que universo existe!</p><p>Assimétrica é mais lenta mas não precisa compartilhar chave privada. Você publica chave pública, qualquer um pode encriptar com ela, mas apenas você (com chave privada) consegue decriptar. Exemplo: RSA, ECDSA. Usado em: HTTPS (encriptar conexão), emails criptografados, assinaturas digitais.</p><p>HTTPS usa híbrido: handshake assimétrico (estabelece conexão segura), depois simétrico (dados encriptados com AES rápido). Melhor dos dois mundos!</p><p>End-to-End Encryption significa: dados encriptados saem seu device, passam pela internet encriptados, chegam ao destinatário decriptados apenas lá. Servidor intermediário não consegue ler! WhatsApp, Signal usam isso. Governo odeia (não consegue ler), usuários amam (privacidade total).</p><p>Criptografia de arquivo inteiro é importante! Se você armazena em nuvem, provider também armazena a chave? Pode acessar seus dados. Zero-knowledge encryption: apenas você tem chave, nem provider consegue ler. Exemplo: Tresorit, Sync.com (diferente de Dropbox, Google Drive, OneDrive que não oferecem zero-knowledge).</p><p>Hash é "fingerprint" criptográfico de dados. SHA-256 de texto sempre produz 64 caracteres hexadecimais. Qualquer mudança mínima no texto, hash totalmente diferente. Usado para: verificar integridade (arquivo não foi alterado?), armazenar senhas (nunca armazena senha, armazena hash!).</p><p>Senhas: NUNCA, NUNCA armazene em texto plano! Use hash com salt (valor aleatório adicionado antes de hashear). User1 e User2 mesma senha = hashes diferentes (salt diferente). Defensiva contra rainbow tables (pre-computed hashes de senhas comuns)!</p>`,cards:[{q:'Como Autenticação Multifator reduz risco de comprometimento?',a:'Mesmo com senha roubada, atacante ainda precisa do segundo fator (SMS, app, biometria, chave física) para acessar, reduzindo sucesso em 99.9%.'}]},
  {id:6,name:'Segurança em Redes e Firewalls',dur:'17 min',content:`<h3>Defendendo a Fronteira: Segurança de Rede</h3><p>Sua máquina é uma fortaleza, mas está conectada em rede. Rede é a fronteira onde maior parte dos ataques acontece! Vamos defender!</p><p>FIREWALL é primeira linha de defesa. Software ou hardware que monitora tráfego de rede: quais dados entram, quais saem. Regras simples: "Bloqueie todo tráfego de fora EXCETO TCP porta 443 (HTTPS)". Computador dentro está protegido, de fora vê apenas máquina fechada!</p><p>Tipos de firewall: Stateless (cada pacote é analisado independente) vs. Stateful (mantém rastreamento de conexões — conexão aprovada, dados relacionados são permitidos). Stateful é mais inteligente! Você abre HTTPS para site, firewall rastreia, dados de volta são permitidos automaticamente.</p><p>NAT (Network Address Translation) é truque inteligente. Seu computador tem IP privado (192.168.1.100) invisível da internet. Router traduz: quando você acessa google.com, router envia requisição como se fosse dele (10.0.0.1, IP público), Google responde ao router, router envia de volta para você. Internet não vê seu IP privado! Proteção de privacidade + dificulta ataque direcionado.</p><p>VPN (Virtual Private Network) é essencial em WiFi público. Você em café WiFi livre? VPN encripta todo tráfego: café WiFi vê apenas dados encriptados, não consegue ler. Mesmo que alguém monitore rede, não vê senha ou dados. Bons VPNs: ProtonVPN, Mullvad, ExpressVPN (paga mas confiável).</p><p>DNS é serviço que traduz nomes em IPs (google.com → 142.250.185.46). Problema: DNS não é encriptado por padrão! Alguém na rede consegue ver quais sites você visita. Solução: DoH (DNS over HTTPS) ou DoT (DNS over TLS) encriptam DNS queries. Chrome, Firefox suportam DoH agora.</p><p>DDoS (Distributed Denial of Service) é ataque que tenta derrubar site. Milhares de máquinas infectadas (botnet) enviam requisições simultâneas. Servidor fica sobrecarregado, cai. Defesa: mitigation services (Cloudflare, Akamai) filtram tráfego legítimo de DDoS.</p><p>Intrusion Detection/Prevention (IDS/IPS) monitora rede para comportamento suspeito. Padrões conhecidos de ataque? Bloqueado! Pacotes grandes incomuns? Alerta! Sistemas avançados usam Machine Learning para detectar até ataques zero-day.</p><p>VLAN (Virtual LAN) segmenta rede. Dispositivos IoT (TV inteligente, câmera) em VLAN separada, sem acesso a arquivos pessoais. Se IoT é hackeado, dano é limitado!</p><p>Zero Trust Architecture é filosofia moderna. Antigo: firewall protege perímetro, dentro é confiável. Novo: NUNCA confie, sempre verifique! Mesmo usuário interno, mesmo dentro de rede, precisar de autenticação para acessar recursos. Cada requisição é validada. Se compromisso interno acontece, dano é limitado!</p><p>Segurança wireless é crítico. WiFi desprotegido é highway aberto! Use WPA3 (protocolo mais seguro), senha super forte, desative SSID broadcast (menor proteção mas esconde rede de scanners casuais).</p>`,cards:[{q:'Como funciona Firewall Stateful comparado ao Stateless?',a:'Stateful mantém rastreamento de conexões — uma conexão aprovada permite dados relacionados automaticamente, é mais inteligente.'}]}
];
