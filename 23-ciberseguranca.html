        <h3>Paisagem de Ameaças: Entender para Defender</h3>
        <p>Cibersegurança é guerra assimétrica. Atacantes precisam encontrar uma fraqueza. Defensores precisam proteger tudo. Compreender vetores de ataque é fundação para defesa efetiva. Não é suficiente conhecer tecnologia — é essencial conhecer mente do adversário.</p>

        <h4>Ataques ao Nível de Rede</h4>
        <p><strong>DDoS (Distributed Denial of Service):</strong> Inunda servidor com tráfego de múltiplas fontes, renderizando indisponível. Amplificação: usar serviços NTP, DNS, SNMP para multiplicar carga com pouco investimento. Defesa: rate limiting, WAF (Web Application Firewall), CDN (Cloudflare, Akamai detecta padrões DDoS).</p>

        <p><strong>Packet Sniffing:</strong> Interceptar tráfego não-criptografado (HTTP, FTP, SMTP plano) em rede compartilhada. Extrai senhas, tokens, dados sensíveis. Defesa: sempre HTTPS/TLS, SSH em vez de Telnet, VPN em redes públicas.</p>

        <p><strong>Man-in-the-Middle (MITM):</strong> Atacante intercepta comunicação entre A e B, fingindo ser ambos. Exemplo: ARP spoofing em LAN, BGP hijacking na internet, SSL stripping (remove HTTPS). Defesa: HTTPS com verificação de certificado, autenticação mútua, DNSSEC.</p>

        <p><strong>Port Scanning e Network Reconnaissance:</strong> Nmap, masscan identificam portas abertas, serviços rodando, SO. Primeiro passo de ataque. Defesa: firewalls bem configurados, apenas portas necessárias abertas, IDS (Intrusion Detection System).</p>

        <h4>Ataques ao Nível de Aplicação (OWASP Top 10)</h4>
        <p><strong>1. Injection Attacks:</strong> Inserir código malicioso em input esperado.</p>
        <ul>

          <li><strong>Command Injection:</strong> Executar comandos OS através de aplicação. Defesa: evitar shell interaction, usar APIs nativas, whitelist inputs.</li>
          <li><strong>NoSQL Injection:</strong> Exploração análoga em MongoDB, CouchDB. Defesa: frameworks ORM, input validation.</li>
        </ul>

        <p><strong>2. Broken Authentication:</strong> Sessões mal gerenciadas, senhas fracas, credentials reutilizadas, sem 2FA. Defesa: MFA obrigatório, salted+hashed passwords (bcrypt, argon2, não MD5!), rate limiting login, secure session management.</p>

        <p><strong>3. Sensitive Data Exposure:</strong> PII (Personally Identifiable Information) transmitida/armazenada sem proteção. Defesa: criptografia em trânsito (TLS) e em repouso (AES-256), mascaramento de dados (mostrar últimos 4 dígitos de CC), minimizar coleta.</p>

        <p><strong>4. XML External Entity (XXE):</strong> Processar XML malicioso que referencia entidades externas, causando SSRF ou DoS. Defesa: desabilitar entity processing, usar parser seguro, validar XML.</p>

        <p><strong>5. Broken Access Control:</strong> Usuário pode acessar recurso que não tem permissão (escalação de privilégio). Exemplo: /api/users/123 sem verificar se usuário atual é 123 ou admin. Defesa: verificar autorização em todo endpoint, RBAC/ABAC bem definidos, audit logs.</p>

        <p><strong>6. Security Misconfiguration:</strong> Defaults inseguros, features não utilizadas ativadas, headers de segurança faltando, error messages verbosas que revelam stack trace. Defesa: hardening, CI/CD que valida configuração, scanning automático.</p>

        <p><strong>7. Cross-Site Scripting (XSS):</strong> Injetar JavaScript em página que executa no browser de vítima, roubando cookies, tokens, redireccionando. Tipos: Stored (persistente no DB), Reflected (apenas no request), DOM-based. Defesa: sanitizar input, Content Security Policy (CSP), HttpOnly cookies.</p>

        <p><strong>8. Insecure Deserialization:</strong> Desserializar dados untrusted pode executar código. Java, Python, PHP vulneráveis. Defesa: validar fonte de dados, usar formatos simples (JSON), implementar verificação de integridade.</p>

        <p><strong>9. Using Components with Known Vulnerabilities:</strong> Dependências outdated com CVEs publicadas. Defesa: manter dependencies atualizadas, SBOM (Software Bill of Materials), scanning com snyk, dependency-check.</p>

        <p><strong>10. Insufficient Logging & Monitoring:</strong> Sem logs, não detecta ataques em progresso. Sem alertas, breaches levam meses para descobrir. Defesa: logs detalhados (quem, o quê, quando, de onde), centralized logging (ELK, Splunk), alertas em padrões suspeitos.</p>

        <blockquote class="example">
          <strong>📌 Caso Real:</strong> Capital One 2019: 100 milhões de registros de clientes vazados por misconfiguration em WAF de AWS. Falta de segmentation, over-permissioning, sem MFA. Multa: $80 milhões. Defesa simples teria prevenido.
        </blockquote>

        <h4>Ataques Sociais (Engineering)</h4>
        <p><strong>Phishing:</strong> Email fingindo legitimidade ("Clique para resetar senha") levando a site falso que captura credentials. Defesa: treinamento de usuários, DMARC/SPF/DKIM para validar senders, multi-factor authentication, email filtering.</p>

        <p><strong>Pretexting:</strong> Enganar alguém com historia falsa para extrair informação. Exemplo: ligação fingindo ser suporte técnico. Defesa: políticas de verificação de identidade rigorosas, treinamento de staff.</p>

        <p><strong>Baiting:</strong> Deixar USB infectado no estacionamento. Defesa: conscientização, disable USB ports em endpoints sensíveis, antivirus.</p>

        <h3>Criptografia: A Matemática da Privacidade</h3>
        <p>Criptografia transforma texto legível em gibberish incompreensível sem chave. Não é segurança através da obscuridade — é segurança através de matemática intratável. Mesmo quantum computers não quebram criptografia bem implementada (por séculos).</p>

        <h4>Criptografia Simétrica</h4>
        <p>Remetente e destinatário compartilham mesma chave secreta. Rápida, simples, mas distribuição de chave é difícil.</p>

        <p><strong>AES (Advanced Encryption Standard):</strong> Padrão de facto. 128, 192, ou 256 bits de chave. Criptografia de bloco: divide mensagem em blocos de 128 bits, criptografa cada um. Modos: ECB (inseguro, padrão visível), CBC (cada bloco depende do anterior, requer IV), CTR (converte em stream cipher, paralelizável), GCM (adiciona autenticação).</p>

        <p><strong>Desafios:</strong> Distribuir chave secreta é espinha dorsal. Como transmitir chave sem que atacante intercepte? Solução: criptografia assimétrica ou protocolo Diffie-Hellman.</p>

        <blockquote class="tip">
          <strong>💡 Regra:</strong> Nunca implemente criptografia custom. Use bibliotecas testadas (libsodium, NaCl, cryptography.io). Um erro diminuto quebra tudo.
        </blockquote>

        <h4>Criptografia Assimétrica</h4>
        <p>Dois pares de chaves: pública (compartilhada) e privada (secreta). Dados criptografados com chave pública só decriptam com privada. Permite comunicação segura sem compartilhar chave!</p>

        <p><strong>RSA:</strong> Baseado em dificuldade de fatorar números grandes. Chaves de 2048+ bits (4096 é seguro). Lento: usado principalmente para criptografar chaves simétricas curtas, não dados gigantescos. Vulnerável a implementações fracas (padding inseguro: PKCS#1 v1.5), use OAEP.</p>

        <p><strong>Elliptic Curve Cryptography (ECC):</strong> Chaves menores que RSA (256 bits ECC ≈ 3072 bits RSA em segurança). ECDSA para assinatura digital. Mais rápido, menos energia. Futuro de criptografia assimétrica.</p>

        <p><strong>Diffie-Hellman / ECDH:</strong> Permite dois participantes concordarem em chave secreta compartilhada mesmo que atacante veja toda comunicação. Base de TLS handshake. Magic matemático.</p>

        <h4>Hashing Criptográfico</h4>
        <p>Função unidirecional: dados → hash fixo. Impossível reverter. Qualquer mudança mínima em input muda hash completamente (avalanche effect).</p>

        <p><strong>SHA-256:</strong> Padrão recomendado. 256 bits output. Criptograficamente seguro (não há ataques conhecidos). Base de Bitcoin, TLS, assinatura digital.</p>

        <p><strong>SHA-3 (Keccak):</strong> Novo padrão NIST (2015), mais seguro, mais eficiente. Ainda não ubíquo.</p>

        <p><strong>Uso:</strong> Verificar integridade (dados não foram alterados), armazenar senhas (salted hash, não plain hash!), assinatura digital (hash é assinado, não dados inteiros).</p>

        <p><strong>Erros Comuns:</strong> MD5/SHA1 são broken (colisões encontradas), nunca usar para senhas. SHA-256(password) é rápido demais para senhas (brute-force factível), use bcrypt/argon2 (derivação de chave dura).</p>

        <h4>Assinatura Digital</h4>
        <p>Remetente criptografa hash com sua chave privada. Destinatário descriptografa com chave pública remetente. Prova que remetente assinou (autenticidade) e dados não foram alterados (integridade). Não-repúdio: remetente não pode negar.</p>

        <p>Usado em: certificados SSL/TLS, documentos legais, atualizações de software, blockchain.</p>

        <h4>TLS (Transport Layer Security)</h4>
        <p>Protocolo que securiza comunicação web. HTTPS = HTTP + TLS.</p>

        <p><strong>Handshake TLS 1.3 (simplificado):</strong></p>
        <ol>
          <li>Cliente envia supported ciphers, TLS versão.</li>
          <li>Servidor escolhe melhor, envia certificado contendo chave pública.</li>
          <li>Ambos executam ECDH para concordar chave simétrica de sessão.</li>
          <li>Todo tráfego posterior é criptografado com essa chave simétrica (rápido).</li>
          <li>Server envia finished message assinada. Client verifica assinatura usando certificado.</li>
        </ol>

        <p><strong>Certificados:</strong> Arquivo contendo chave pública + identidade. Assinados por autoridade (CA: Certificate Authority). Browser confia em CAs raiz pré-instaladas. Sem assinatura de CA confiada = warning. Validade limitada (ex: 1 ano).</p>

        <p><strong>Certificado Pinning:</strong> App fixa certificado específico esperado, não confia em qualquer CA. Reduz risk de CA comprometida.</p>

        <blockquote class="example">
          <strong>📌 Exemplo:</strong> Ao acessar seu banco (https://banco.com.br), browser verifica certificado do servidor. Certificado afirma "sou banco.com.br" e é assinado por AC Raiz Brasileira. Browser confia em AC Raiz porque está em sistema operacional. Tráfego é criptografado. Man-in-the-middle não consegue interceptar porque não tem chave privada da AC para falsificar certificado.
        </blockquote>

        <p>Neste tópico, você entende a matemática que protege internet. Próximo: implementação prática!</p>

        <h3>LGPD: Lei Geral de Proteção de Dados Pessoais</h3>
        <p>LGPD é lei brasileira (em vigor desde Aug 2020, com multas desde Aug 2021) que regulamenta processamento de dados pessoais. Análoga ao GDPR europeu. Falha em conformidade = multas severas (até 2% da receita) + danos morais + danos à reputação.</p>

        <h4>Princípios Fundamentais da LGPD</h4>
        <p><strong>Finalidade:</strong> Dados coletados apenas para fim específico informado. Não pode depois usar para outro fim sem consentimento novo.</p>

        <p><strong>Necessidade:</strong> Coletar apenas dados necessários. Se não precisa CPF, não coleta. Minimização de dados.</p>

        <p><strong>Transparência:</strong> Informar claramente como dados serão usados. Política de privacidade precisa ser legível, não legalês incompreensível.</p>

        <p><strong>Segurança:</strong> Implementar medidas técnicas e organizacionais para proteger dados. Criptografia, access control, incident response.</p>

        <p><strong>Consentimento:</strong> Baseado em consentimento livre, informado e revogável. Cookie banners não são consentimento — é consentimento prévio explícito (opt-in, não opt-out).</p>

        <p><strong>Acesso e Portabilidade:</strong> Titular pode pedir cópia de seus dados. Empresa tem 15 dias para fornecer em formato estruturado, legível.</p>

        <p><strong>Contrato com Operador:</strong> Se contratar cloud provider ou agência, contrato deve especificar responsabilidades de segurança de dados.</p>
