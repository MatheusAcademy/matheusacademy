  {id:1,name:'No Aeroporto - Check-in, Gates e Navegação',dur:'20 min',content:`<h3>Sobrevivendo ao Aeroporto em Inglês</h3><p>O aeroporto é frequentemente a primeira situação onde você precisa usar inglês quando está viajando. Pode ser stressante, mas com o vocabulário e frases corretas, você vai conseguir navegar facilmente! Neste tópico, você vai aprender tudo que precisa saber sobre check-in, encontrar seu gate, e entender anúncios do aeroporto.</p><h4>No Balcão de Check-in</h4><p>Quando você chega ao aeroporto, você precisa fazer check-in e despachar sua mala. O agente pode perguntar: "Good morning! How are you today?" (Bom dia! Como você está?). Responda: "I'm good, thank you. How are you?" (Estou bem, obrigado. E você?). O agente vai pedir documentos: "May I see your passport and booking confirmation?" (Posso ver seu passaporte e confirmação de reserva?) ou "Can I have your identification and reservation, please?" (Posso ter sua identificação e reserva?). Você responde: "Of course" ou "Sure, here you go" (claro/aqui está).</p><p>O agente vai fazer perguntas sobre sua mala: "Do you have any luggage to check?" (Tem bagagem para despachar?) Você responde: "Yes, I have one bag" (Sim, tenho uma mala) ou "No, just carry-on" (Não, apenas bagagem de mão). Se você tem muita bagagem, cuidado com taxas! O agente pode dizer: "Your luggage is overweight. There's a fee of $25" (Sua bagagem está acima do peso. Há uma taxa de $25). Você pode responder: "Can I remove something?" (Posso remover algo?), ou "How much would it be if I check both bags?" (Quanto seria se eu despachasse os dois?). Mas frequentemente, é melhor reorganizar sua mala.</p><p>O agente vai confirmar detalhes: "You're traveling to London on December 15th, returning January 5th. Is that correct?" (Você está viajando para Londres no dia 15 de dezembro, retornando em 5 de janeiro. Isso está correto?) Responda: "Yes, that's right" ou "That's correct". O agente pode perguntar: "And where will you be staying?" (E onde você vai ficar?) Responda com o hotel: "At the Hilton, downtown" (No Hilton, no centro da cidade). Se você não sabe o nome completo, você pode dizer: "I have the address" (Tenho o endereço) e mostrar seu telefone.</p><p>Perguntas sobre sua mala: "Did you pack these bags yourself?" (Você fez a mala sozinho?), "Have you left your bags unattended?" (Você deixou suas malas desatendidas?) Responda "Yes" ou "No" apropriadamente. Essas são perguntas de segurança padrão. O agente pode também perguntar: "Do you have any prohibited items?" (Tem algum item proibido?) - você deve responder "No" honestamente!</p><p>Finalmente, o agente dirá: "You're all set! Have a great flight!" (Você está pronto! Tenha um bom voo!) Responda: "Thank you! You too!" (Obrigado! Você também!) ou "Thanks so much!" (Muito obrigado!).</p><h4>Segurança - TSA ou Check Points</h4><p>Quando você vai passar por segurança, os agentes podem pedir: "Can I see your ID and boarding pass?" (Posso ver seu ID e cartão de embarque?) Estenda ambos. Eles podem dizer: "Walk straight ahead through the metal detector" (Caminhe direto pela detectora de metais). Se você tem metal (pinos, prótese metal, etc.), avise antecipadamente: "I have a hip replacement" (Tenho uma substituição de quadril) ou "I have metal pins in my leg" (Tenho pinos de metal na perna). Tirem seus sapatos e coloque em uma bandeja: "Please remove your shoes and place them in the bin" (Por favor, tire seus sapatos e coloque na bandeja). Coloque também seu cinto, relógio e telefone.</p><p>Se o alarme toca, o agente pode fazer um "pat-down" - revistar você. Eles dirão: "I'm going to do a pat-down. Is that okay?" (Vou fazer uma revista. Tudo bem?) Responda "Yes, that's fine" (Sim, tudo bem). Eles te tocam nos ombros, braços, pernas etc para procurar objetos proibidos.</p><h4>Encontrando Seu Gate</h4><p>Depois de segurança, você precisa encontrar seu gate. Procure por um painel eletrônico mostrando "Departures" (Partidas) ou "Flights" (Voos). Você pode perguntar: "Excuse me, which gate is Flight UA 156 departing from?" (Com licença, qual gate está saindo o Voo UA 156?). Alguém pode responder: "Gate 27, down that way" (Gate 27, por lá) ou "It's not posted yet. Check back in 15 minutes" (Ainda não foi divulgado. Volte em 15 minutos). Quando você encontra o painel, procure seu número de voo (UA 156) e veja "Gate" - esse é seu portão de embarque.</p><p>Você pode também perguntar: "Is this the gate for Flight UA 156?" (Este é o gate para o Voo UA 156?) e alguém que está esperando pode responder "Yes, this is it" (Sim, é este) ou "No, that's down there" (Não, é lá).</p><h4>Anúncios de Voo</h4><p>Ouça anúncios como: "Attention passengers on United Airlines Flight 156 to London. We will begin boarding at gate 27 in 10 minutes. Please have your boarding pass and ID ready" (Atenção passageiros do Voo 156 da United Airlines para Londres. Começaremos o embarque no gate 27 em 10 minutos. Por favor, tenha seu cartão de embarque e ID prontos). "We are now boarding rows 1 through 20. Please line up at the gate" (Estamos embarçando as fileiras 1 a 20. Por favor, fiquem em fila no gate).</p><p>Se há uma mudança, ouça: "Attention. We have a gate change. Flight 156 is now departing from gate 45, not gate 27. Please proceed to gate 45" (Atenção. Houve mudança de gate. O Voo 156 agora sai do gate 45, não do 27. Por favor, vá para o gate 45). Se o voo é atrasado: "Ladies and gentlemen, we apologize for the delay. We will begin boarding at 3 PM. Thank you for your patience" (Senhoras e senhores, desculpamos pelo atraso. Começaremos o embarque às 15h. Obrigado pela paciência).</p><h4>Palavras-chave do Aeroporto</h4><p>Terminal, Gate, Boarding pass (cartão de embarque), ID/Identification (identificação), Passport (passaporte), Luggage/Baggage (bagagem), Carry-on (bagagem de mão), Checked baggage (bagagem despachada), Security checkpoint (ponto de segurança), Boarding (embarque), Boarding group (grupo de embarque), Flight number (número do voo), Departure (partida), Arrival (chegada), Delay (atraso), Cancellation (cancelamento), Boarding time (horário de embarque), Gate change (mudança de gate).</p><h4>Frases Úteis Adicionais</h4><p>"Excuse me, I'm looking for gate 27" (Com licença, estou procurando o gate 27). "Is this the right line for check-in?" (Esta é a fila certa para check-in?). "I missed my flight. Can I get on the next one?" (Perdi meu voo. Consigo pegar o próximo?). "I need to change my flight" (Preciso mudar meu voo). "What time is boarding?" (Que horas é o embarque?). "Where can I find my gate?" (Onde encontro meu gate?). "Is my flight on time?" (Meu voo está no horário?).</p>`,cards:[{q:"Como você pede para fazer check-in no aeroporto?",a:"Você vai até o balcão de check-in da sua companhia aérea e diz 'I'd like to check in, please' ou apenas entrega seu passaporte e booking confirmation ao agente."}]},
  {id:2,name:'Viagens de Ônibus, Táxi e Transporte Local',dur:'20 min',content:`<h3>Se Locomovendo na Cidade</h3><p>Uma vez que você chega ao seu destino, você precisa de transporte! Ônibus, táxi, Uber, metrô - todas essas opções requerem inglês. Vamos aprender como pedir transporte, chegar aonde você quer, e lidar com situações de transporte comum.</p><h4>Pegando um Táxi ou Chamando um Uber</h4><p>Se você está em uma parada de táxi, você pode dizer: "Taxi!" e levantar a mão. O táxi para e o motorista abre a porta. Você entra e diz seu destino: "I'm going to the Hilton Hotel, please" (Vou para o Hilton Hotel, por favor) ou "Can you take me to 123 Main Street?" (Você pode me levar para 123 Main Street?). O motorista responde: "Sure" ou "No problem" ou possivelmente "That's going to take about 30 minutes. Is that okay?" (Vai levar uns 30 minutos. Tudo bem?).</p><p>Você pode perguntar: "How much will it cost?" (Quanto vai custar?) O motorista pode responder: "About $25 to $30" ou dizer que usa taxímetro: "The meter will show the exact price" (O taxímetro mostrará o preço exato). Durante a viagem, o motorista pode conversar: "First time in the city?" (Primeira vez na cidade?) Você responde: "Yes" (Sim) ou "No, I've been here before" (Não, já estive aqui antes). Ao chegar, o motorista diz: "Here we are" ou "We're here" (Chegamos). Você pode dizer: "Thank you! How much do I owe?" (Obrigado! Quanto devo?). Se usar cartão, pergunte: "Do you take cards?" (Aceita cartão?) ou "What payment methods do you accept?" (Quais formas de pagamento você aceita?).</p><p>Se você está usando Uber: abra o app, selecione seu destino, escolha o tipo de carro (UberX, UberXL, etc.), e solicite o carro. O app mostra o motorista e o carro. Quando o carro chega, o driver vai chamar você e confirmar que é você: "Hi, are you [your name]?" (Oi, você é [seu nome]?). Você responde "Yes, that's me" (Sim, sou eu). O motorista pode fazer pequena conversa, mas muitos preferem ficar quietos. Você pode perguntar: "How much longer to the hotel?" (Quanto tempo falta para o hotel?) Se há um problema, como o motorista está perdido, você pode dizer: "I think you went the wrong way" (Acho que você foi pelo caminho errado) ou "Actually, the hotel is left from here" (Na verdade, o hotel fica à esquerda daqui).</p><h4>Transporte Público - Ônibus, Metrô, Trem</h4><p>Se você quer pegar ônibus público, você primeiro precisa saber qual linha. Você pode perguntar: "Excuse me, which bus goes to the museum?" (Com licença, qual ônibus vai para o museu?) ou "Where's the bus stop for the downtown area?" (Onde é a parada de ônibus para o centro?). Alguém pode responder: "Take the number 7 bus" (Pegue o ônibus número 7) ou "The number 42 goes downtown" (O número 42 vai para o centro).</p><p>Na parada, você espera o ônibus. Quando chega, você entra. Se não conhece o preço, você pergunta ao motorista: "How much is the fare?" (Quanto custa a passagem?). Nos EUA, você pode pedir "One ticket, please" (Uma passagem, por favor). O motorista responde: "That's $2" ($2) ou pode dizer "Exact change, please" (Troco exato, por favor). Você paga e pega seu ticket ou passe. O motorista pode dizer: "Have a good day" (Tenha um bom dia) ou "Thank you!" (Obrigado!).</p><p>No metrô/trem: você vai a uma máquina de ticket ou balcão e diz seu destino: "I need a ticket to Central Station" (Preciso de uma passagem para Central Station). O agente diz: "That's $5. Do you want a single or round trip?" (São $5. Você quer ida ou ida-volta?). Você responde: "Single, please" (Só ida, por favor). Pegue seu ticket. Procure pela plataforma correta (Platform/Track number) no painel. Alguns metros têm barreiras de catraca - você coloca seu ticket na abertura, passa, e o ticket é devolvido ou descartado.</p><h4>Pedindo Direções</h4><p>Se você está perdido, você pode parar alguém e dizer: "Excuse me, I'm looking for the museum. Do you know where it is?" (Com licença, estou procurando o museu. Você sabe onde fica?) ou mais simples "Where's the museum?" (Onde fica o museu?). Alguém pode responder: "It's two blocks that way" (Fica a dois quarteirões por lá), apontando a direção. Ou pode descrever: "Go straight, then turn left at the traffic light" (Vá em frente, depois vire à esquerda no sinal). Você pode pedir: "Can you repeat that?" ou "Can you point?" (Pode apontar?) para ajudar você a entender.</p><p>Você também pode dizer: "I'm trying to get to..." (Estou tentando chegar a...) ou "How do I get to...?" (Como chego a...?). Se alguém não sabe, eles dizem: "I'm not sure" (Não tenho certeza), "Sorry, I don't know" (Desculpe, não sei), ou "You might want to ask someone else" (Você pode querer perguntar para alguém).</p><h4>Expressões Úteis para Transporte</h4><p>"Which way is the bathroom?" (Para qual lado fica o banheiro?) - útil em estações. "Where's the exit?" (Onde é a saída?). "Is this the right bus for downtown?" (Este é o ônibus certo para o centro?). "How many stops to Main Street?" (Quantas paradas faltam para Main Street?). "Where should I get off?" (Onde devo descer?). "Can you tell me when we get to...?" (Você me avisa quando chegarmos a...?). "Is this the right direction?" (Esta é a direção certa?). "I think I'm lost" (Acho que estou perdido).</p>`,cards:[{q:"Como você pergunta quanto custa um táxi?",a:"Você pode dizer 'How much will it cost?' ou 'How much to the hotel?' ou perguntar ao motorista 'What's the fare?'. O motorista deve lhe dar uma estimativa."}]},
  {id:3,name:'Encontrando Lugares e Pedindo Informações Turísticas',dur:'20 min',content:`<h3>Explorando a Cidade Como um Local</h3><p>Agora que você chegou e tem transporte, você quer explorar! Você precisa encontrar restaurantes, museus, lojas, e outros lugares. Vamos aprender como pedir informações, encontrar lugares, e fazer o máximo de sua viagem!</p><h4>Perguntando Onde as Coisas Ficam</h4><p>No hotel, você pode perguntar ao recepcionista: "Can you recommend a good restaurant?" (Você pode recomendar um bom restaurante?) ou "Where's a nearby coffee shop?" (Onde há uma cafeteria próxima?). O recepcionista pode responder: "There's a great Italian place two blocks away" (Tem um ótimo lugar de comida italiana a dois quarteirões daqui) ou "There are several restaurants within walking distance" (Há vários restaurantes a pé).</p><p>Você também pode pergunta: "Is there a museum nearby?" (Tem um museu próximo?) ou "Where's the nearest pharmacy?" (Onde é a farmácia mais próxima?). O recepcionista frequentemente tem mapas e pode desenhar sua rota: "I can show you on a map" (Posso mostrar você em um mapa). Você pode pedir: "Can you write down the address?" (Pode escrever o endereço?) ou "Can you circle it on the map?" (Pode circular no mapa?).</p><h4>Em um Visitor Center (Centro de Visitantes)</h4><p>Muitas cidades têm visitor centers com informações turísticas. Você entra e diz: "Hi! Do you have information about the city?" (Oi! Você tem informações sobre a cidade?) ou simplesmente "Can I get a map?" (Posso pegar um mapa?). O staff responde: "Of course! Here's a map and a list of attractions" (Claro! Aqui está um mapa e uma lista de atrações). Você pode perguntar: "What are the top attractions to see?" (Quais são as principais atrações para ver?) ou "What's a must-see?" (O que é imprescindível ver?).</p><p>Você pode também perguntar: "Where are good restaurants?" (Onde tem bons restaurantes?), "What time do museums close?" (Que horas os museus fecham?), "Is there public transportation?" (Tem transporte público?), "Are there any festivals or events happening?" (Tem algum festival ou evento acontecendo?). O staff geralmente é muito prestativo e quer ajudar turistas!</p><h4>Em um Museu ou Atração</h4><p>Você chega em uma atração e vê uma fila. Você pode perguntar: "How long is the wait?" (Quanto tempo é a espera?) ou "How much is the entry?" (Quanto custa a entrada?). Na bilheteria, você diz: "Two tickets, please" (Duas passagens, por favor) ou "One adult and one child" (Um adulto e uma criança). Se há um desconto, você pergunta: "Is there a student discount?" (Tem desconto para estudante?) ou "Do you offer group rates?" (Vocês oferecem preços para grupos?).</p><p>Dentro, você pode perguntar: "Where's the bathroom?" (Onde é o banheiro?), "Is there a gift shop?" (Tem uma loja de souvenirs?), "Can I take photos?" (Posso tirar fotos?). Se você tem uma pergunta sobre uma exposição, você levanta a mão e pergunta um staff member: "Excuse me, can you tell me about this?" (Com licença, você pode me contar sobre isso?). Muitos museus têm áudio guides - você pode pedir: "Do you have an audio guide?" (Vocês têm um guia de áudio?) e o staff explica como usar.</p><h4>Perguntando Informações Geográficas</h4><p>Você pode perguntar: "Is the museum walking distance?" (O museu fica a pé?), "How far is it?" (Fica longe?), "About how many blocks away?" (Aproximadamente quantos quarteirões?). Respostas comuns: "It's about a 5-minute walk" (Fica a uns 5 minutos a pé), "It's too far to walk. You should take the bus" (Fica muito longe para caminhar. Você deveria pegar o ônibus), "It's right around the corner" (Fica bem ali na esquina), "It's about 3 miles away" (Fica a uns 3 quilômetros de distância).</p><p>Para direções específicas: "Which direction should I go?" (Para qual direção devo ir?), "Should I go north or south?" (Devo ir para norte ou sul?). Alguém pode responder: "Head north on Main Street" (Vá para norte na Rua Principal), "Go this way until you see a red building" (Vá por aqui até ver um edifício vermelho), "Turn right at the corner" (Vire à direita na esquina).</p><h4>Em um Visitor Information Office</h4><p>O staff em uma visitor center/tourist office pode ajudar você com: "Can you recommend a good hotel?" (Pode recomendar um bom hotel?), "Are there any day trips from here?" (Tem algum passeio de um dia daqui?), "What's the best time to visit...?" (Qual é a melhor época para visitar...?), "Do you have coupons or discounts?" (Vocês têm cupons ou descontos?). Eles geralmente têm panfletos, mapas, e conhecimento sobre tudo na área.</p><h4>Frases Úteis para Turistas</h4><p>"Is this a safe area?" (Esta é uma área segura?). "What should I avoid?" (O que devo evitar?). "Where can I find...?" (Onde posso encontrar...?). "Is it a good idea to visit at night?" (É boa ideia visitar à noite?). "What's the dress code?" (Qual é o código de vestuário?). "Do I need reservations?" (Preciso fazer reserva?). "Can you recommend something off the beaten path?" (Pode recomendar algo menos turístico?). "What was this building used for?" (Para que era este edifício?). "Who built this?" (Quem construiu isto?). "Is there an entrance fee?" (Tem taxa de entrada?).</p>`,cards:[{q:"Como você pergunta quanto custa entrar em um museu?",a:"Você pode dizer 'How much is the entry?' ou 'What's the admission price?' ou 'Do you charge for entry?' No balcão, você dirá 'Two tickets, please' (Duas passagens, por favor)."}]},
  {id:4,name:'Check-in de Hotel, Quartos e Solicitações de Serviço',dur:'20 min',content:`<h3>Se Sentindo em Casa no Hotel</h3><p>Você chegou ao seu hotel! Agora precisa fazer check-in, entender seu quarto, e saber como pedir ajuda quando precisa. Vamos aprender como ser um hóspede fluente em inglês!</p><h4>Check-in no Hotel</h4><p>Você entra no hotel e procura a recepção (front desk). O recepcionista diz: "Good afternoon! Welcome to the Hilton. How can I help you?" (Boa tarde! Bem-vindo ao Hilton. Como posso ajudar?). Você responde: "Hi, I have a reservation for [seu nome]" (Oi, tenho uma reserva para [seu nome]). O recepcionista pede: "Can I have your last name?" (Qual é seu sobrenome?) ou já pode procurar: "Let me look that up in the system" (Deixa eu procurar no sistema).</p><p>O recepcionista pode pedir: "And what's the name on the reservation?" (E qual é o nome na reserva?) ou "Do you have an ID?" (Tem um ID?). Você entrega seu passaporte ou ID. Eles perguntam: "How many nights will you be staying?" (Quantas noites você vai ficar?) ou "Until when?" (Até quando?). Você responde: "Three nights" (Três noites) ou "Until December 20th" (Até 20 de dezembro).</p><p>O recepcionista oferece: "You'll have room 412. It's a king with a view of the city" (Você terá o quarto 412. É um quarto com cama king e vista da cidade). Você pode responder: "That sounds great!" (Parece ótimo!) ou perguntar: "Do you have any rooms with a balcony?" (Vocês têm quartos com varanda?). O recepcionista diz: "Let me check" e pode oferecer: "We do have an upgrade available for a small additional charge" (Temos uma melhoria disponível por um pequeno custo adicional).</p><p>Depois confirma o check-out: "Your checkout time is 11 AM. Is that okay?" (Seu check-out é às 11h. Tudo bem?). Você pode responder: "Yes, that's fine" ou "Can I have a late checkout?" (Posso ter um check-out atrasado?). Se você pede, o recepcionista pode dizer: "We can do 1 PM for no charge, or 3 PM for a $20 fee" (Podemos fazer 13h sem custo, ou 15h por uma taxa de $20).</p><p>O recepcionista dá a chave/cartão chave: "Here's your key card. Your room is on the 4th floor" (Aqui está seu cartão chave. Seu quarto fica no 4º andar). Você pode perguntar: "Where's the elevator?" (Onde fica o elevador?) ou "Can you point me to the stairs?" (Pode me apontar as escadas?). O recepcionista responde: "Right over there" (Bem ali) ou "Around the corner" (Na esquina).</p><h4>No Quarto</h4><p>Você entra no quarto. Se há um problema, você pode chamar a recepção: "Let me call the front desk about this" (Deixa eu ligar para a recepção sobre isso). Você pega o telefone do quarto (geralmente há um em cima da mesa de noite) e discá 0 ou "Front Desk": "Hi, this is room 412. I have a problem with the air conditioning. It's not working" (Oi, é o quarto 412. Tenho um problema com o ar condicionado. Não está funcionando). O recepcionista responde: "I'll send someone to check it right away" (Vou mandar alguém conferir agora mesmo).</p><p>Se você quer solicitar algo: "Can I get some extra towels?" (Posso pegar algumas toalhas extras?), "Can you send up an extra pillow?" (Pode enviar um travesseiro extra?), "Is there a hair dryer in the room?" (Tem um secador de cabelo no quarto?), "How do I adjust the thermostat?" (Como ajusto o termostato?). O staff responde: "Certainly! I'll have someone bring that up" (Claro! Vou mandar alguém subir com isso) ou "Yes, it's in the bathroom" (Sim, está no banheiro) ou "You can use the dial on the wall" (Você pode usar o mostrador na parede).</p><h4>Solicitações Comuns de Hotel</h4><p>"I need a wake-up call" (Preciso de um despertador) - você diz a hora: "At 7 AM, please" (Às 7h, por favor). "Where's the Wi-Fi password?" (Qual é a senha do Wi-Fi?) - o recepcionista responde com a senha. "Do you have room service?" (Vocês têm serviço de quarto?) - sim, você pode pedir comida. "What time is breakfast?" (Que horas é o café da manhã?). "Is breakfast included?" (O café da manhã está incluído?). "Where's the fitness center?" (Onde é a academia?). "Do you have a pool?" (Vocês têm uma piscina?). "What's the Wi-Fi code?" (Qual é o código de Wi-Fi?).</p><p>Se você quer reclamar sobre algo: "The room is too hot" (O quarto está muito quente), "The bed is uncomfortable" (A cama é desconfortável), "There's noise from the street" (Tem barulho da rua), "The shower isn't working properly" (O chuveiro não está funcionando direito), "I need a different room" (Preciso de um quarto diferente). O recepcionista geralmente tenta ajudar: "Let me see what I can do" (Deixa eu ver o que posso fazer).</p><h4>Amenities Comuns do Hotel</h4><p>Front desk (recepção), Bellhop (carregador de malas), Concierge (concierge - ajuda com reservas, recomendações), Room service (serviço de quarto), Housekeeping (limpeza), Fitness center/gym (academia), Pool (piscina), Business center (centro de negócios), Laundry service (serviço de lavanderia), Valet parking (estacionamento com manobrista).</p><h4>Check-out</h4><p>No dia que você sai, você pode deixar as chaves na recepção e dizer: "I'm checking out now" (Estou fazendo check-out agora) ou "I'm leaving. Can I settle my bill?" (Estou indo. Posso acertar minha conta?). O recepcionista processa: "Let me print your bill. Did you use room service or anything from the minibar?" (Deixa eu imprimir sua conta. Você usou serviço de quarto ou algo do minibar?). Se tudo foi pré-pago, eles podem apenas dizer: "You're all set! Thank you for staying with us" (Você está pronto! Obrigado por ficar conosco).</p>`,cards:[{q:"Como você pede um quarto melhor no check-in?",a:"Você pode perguntar 'Do you have any rooms with a view?' ou 'Is there a room upgrade available?' ou simplesmente dizer 'Would you have a better room available?'. O hotel pode oferecer por um custo adicional ou sem custo se estão disponíveis."}]},
  {id:5,name:'Reclamações sobre Quarto e Manutenção',dur:'20 min',content:`<h3>Lidando com Problemas no Hotel</h3><p>Nem sempre tudo é perfeito em um hotel. Às vezes há problemas com o quarto, a cama é desconfortável, ou algo está quebrado. Você precisa saber como reclamar de forma clara e educada para resolver o problema. Vamos aprender!</p><h4>Problemas Comuns com Quartos</h4><p>Ar condicionado/Aquecimento: "The air conditioning isn't working" (O ar condicionado não está funcionando), "The room is too cold" (O quarto está muito frio), "Can you adjust the heat?" (Você pode ajustar o aquecimento?), "It's freezing in here" (Está congelante aqui). Você pode tentar ajustar você mesmo: "Where's the thermostat?" (Onde fica o termostato?). Água quente: "There's no hot water" (Não tem água quente), "The water is very cold" (A água é muito fria), "The shower is broken" (O chuveiro está quebrado). Barulho: "It's very noisy" (Está muito barulhento), "There's noise from the street/construction/neighbors" (Tem barulho da rua/construção/vizinhos). Higiene: "The room isn't clean" (O quarto não está limpo), "There are dirty towels on the floor" (Tem toalhas sujas no chão), "Can you send housekeeping?" (Pode mandar a limpeza?).</p><h4>Problemas de Cama e Almofadas</h4><p>"The bed is too hard" (A cama é muito dura), "The mattress is lumpy" (O colchão tem saliências), "The bed is uncomfortable" (A cama é desconfortável), "Can I have a different bed?" (Posso ter uma cama diferente?). Você pode perguntar: "Do you have a softer mattress?" (Vocês têm um colchão mais macio?) ou "Can you exchange this mattress?" (Podem trocar este colchão?). Para almofadas: "The pillow is too thin" (O travesseiro é muito fino), "Can I get another pillow?" (Posso pegar outro travesseiro?), "Do you have different pillows?" (Vocês têm travesseiros diferentes?).</p><h4>Problemas Sérios - Quando Reclamar Fortemente</h4><p>Se há um problema que afeta sua experiência de forma séria, você pode ser mais direto: "This is unacceptable. I need a different room" (Isto é inaceitável. Preciso de um quarto diferente). "I've been trying to reach housekeeping for an hour with no response" (Tenho tentado contatar a limpeza por uma hora sem resposta). "This room is in poor condition. I need either maintenance to fix it or to be moved to another room" (Este quarto está em péssimas condições. Preciso ou que a manutenção corrija ou que eu seja movido para outro quarto).</p><p>Se o problema persiste: "I'm not satisfied with the service. I'd like to speak to the manager" (Não estou satisfeito com o serviço. Gostaria de falar com o gerente). O recepcionista responde: "I understand your concern. Let me get the manager for you" (Entendo sua preocupação. Deixa eu buscar o gerente).</p><h4>Solicitações de Manutenção</h4><p>Se algo está quebrado, você liga para a recepção e diz claramente: "There's a problem in my room. [Descrição]. Can someone come fix it?" (Tem um problema no meu quarto. [Descrição]. Alguém pode vir consertá-lo?). Exemplos: "The door lock isn't working properly" (A fechadura da porta não está funcionando direito). "The light in the bathroom is out" (A luz do banheiro está apagada - estouro). "The toilet is running constantly" (O vaso sanitário está correndo constantemente)." "The TV remote isn't working" (O controle remoto da TV não está funcionando). "There's a leak from the ceiling" (Há um vazamento do teto - PROBLEMA SÉRIO).</p><p>Se é uma emergência como vazamento de água: "This is an emergency! There's water coming from the ceiling! Send someone immediately!" (Isto é uma emergência! Tem água vindo do teto! Mande alguém imediatamente!). O hotel responde rápido para emergências.</p><h4>Tempo de Resposta e Seguite-up</h4><p>Quando você reporta um problema, o recepcionista dirá: "I'll send someone right away" (Vou mandar alguém agora) ou "Someone will be there in 10 minutes" (Alguém estará aí em 10 minutos). Se ninguém vem: "I was told someone would come 20 minutes ago. Can you check?" (Disseram que alguém viria 20 minutos atrás. Você pode verificar?). "Can I get an estimated time?" (Posso ter um tempo estimado?) ou "When can someone come?" (Quando alguém pode vir?).</p><h4>Quando Mudar de Quarto é Necessário</h4><p>Se o problema não pode ser rápidamente consertado e afeta sua stay: "I'd like to change to a different room. This one isn't suitable" (Gostaria de trocar para um quarto diferente. Este não é adequado). "Can you move me to a quiet room?" (Pode me mover para um quarto tranquilo?). "I need a room that's better." (Preciso de um quarto melhor). O recepcionista responde: "Let me see what's available" (Deixa eu ver o que está disponível) ou "I can move you to room 507" (Posso movê-lo para o quarto 507).</p><h4>Documentar Problemas para Reembolso</h4><p>Se o problema afeta significativamente sua experiência e você pagou premium, você pode: 1) Tirar fotos/vídeos do problema. 2) Reportar ao recepcionista e pedir que notem no seu registro. 3) Pedir falar com o gerente antes de check-out. 4) Perguntar: "Given the problems with my room, can you offer a refund or discount?" (Dado os problemas no meu quarto, podem oferecer reembolso ou desconto?). Alguns hotéis oferecem: "We can give you a 50% refund for the inconvenience" (Podemos dar 50% de reembolso pelas inconvenientes).</p>`,cards:[{q:"Como você relata um problema no quarto para o hotel?",a:"Você liga para a recepção usando o telefone do quarto ou vai pessoalmente e diz claramente qual é o problema: 'The air conditioning isn't working' ou 'There's no hot water'. Peça que alguém visite ou repare."}]},
  {id:6,name:'Amenidades, Políticas e Serviços do Hotel',dur:'20 min',content:`<h3>Entendendo Como o Hotel Funciona</h3><p>Cada hotel é um pouco diferente. Tem diferentes amenidades (comodidades), políticas, e serviços. Para fazer o máximo de sua estadia, você precisa saber o que o hotel oferece e como usar. Vamos aprender!</p><h4>Perguntando Sobre Amenidades</h4><p>Quando você chega, você pode perguntar: "What amenities do you have?" (Quais são as amenidades?). O recepcionista pode responder: "We have a fitness center, pool, business center, and room service" (Temos academia, piscina, centro de negócios, e serviço de quarto). Você pode fazer perguntas específicas: "What time is the pool open?" (Que horas a piscina abre?), "Is the fitness center 24 hours?" (A academia funciona 24 horas?), "Do you have a restaurant on-site?" (Vocês têm um restaurante aqui?), "Is there a business center?" (Tem um centro de negócios?).</p><p>Para muitos serviços você pode perguntar: "Is there a concierge service?" (Tem serviço de concierge?). Um concierge pode ajudar com: reservas de restaurante, reservas de passeios, compra de ingressos de museus, arranjar transporte, e recomendações. Você pode pedir: "Can you recommend a nice restaurant for dinner tonight?" (Pode recomendar um bom restaurante para jantar hoje à noite?). "Can you make a reservation for me?" (Pode fazer uma reserva para mim?). "Can you arrange airport transportation?" (Pode arranjar transporte para o aeroporto?).</p><h4>Wi-Fi e Conectividade</h4><p>Muitos hóspedes precisam de internet. Você pergunta: "How do I connect to the Wi-Fi?" (Como me conecto ao Wi-Fi?). O recepcionista responde: "The network name is [nome] and the password is [senha]" (O nome da rede é [nome] e a senha é [senha]). Você pode anotar ou pedir que escrevam: "Can you write that down?" (Pode escrever?). Se não consegue conectar: "I'm having trouble connecting to the Wi-Fi. Can you help?" (Estou com dificuldade para conectar ao Wi-Fi. Pode ajudar?). O hotel pode resetar a conexão ou enviar alguém para ajudar.</p><p>Para computadores ou impressora: "Do you have a business center?" (Tem um centro de negócios?) ou "Can I use a computer?" (Posso usar um computador?). "Is there a printer I can use?" (Tem uma impressora que posso usar?). Frequentemente o hotel oferece de graça para hóspedes.</p><h4>Café da Manhã e Refeições</h4><p>Você pergunta: "Is breakfast included in my room rate?" (O café da manhã está incluído no preço do meu quarto?). Se incluído: "What time is breakfast served?" (Que horas é servido café da manhã?), "Where is breakfast?" (Onde é o café da manhã?). "Is breakfast in the room or in a restaurant?" (É café da manhã no quarto ou em um restaurante?). Se não incluído: "How much is breakfast?" (Quanto custa o café da manhã?), "Is there a restaurant downstairs?" (Tem um restaurante aqui?), "Can I order room service?" (Posso pedir serviço de quarto?).</p><p>Para room service, você pega o menu no quarto ou liga: "Can I see a room service menu?" (Posso ver um cardápio de serviço de quarto?). Você pede: "I'd like to order breakfast. Can you send up eggs, bacon, and toast?" (Gostaria de pedir café da manhã. Podem enviar ovos, bacon e torradas?). "When will it arrive?" (Quando chegará?). O room service traz na sua porta, frequentemente em uma meia hora.</p><h4>Políticas de Estacionamento</h4><p>Se você tem um carro, você pergunta: "Do you have parking?" (Vocês têm estacionamento?), "Is there a parking lot?" (Tem um estacionamento?), "Is parking included?" (O estacionamento está incluído?). "How much does parking cost?" (Quanto custa o estacionamento?). "Where do I park?" (Onde estaciono?). O recepcionista responde: "There's valet parking for $25 a night" (Tem estacionamento com manobrista por $25 a noite) ou "There's a complimentary parking lot behind the hotel" (Tem um estacionamento gratuito atrás do hotel).</p><h4>Políticas de Check-out e Cancelamento</h4><p>"What time is checkout?" (Que horas é checkout?) - resposta típica é 11 AM. "Can I have a late checkout?" (Posso ter checkout atrasado?) - o hotel pode oferecer por uma taxa. "If I need to cancel my reservation, what's the policy?" (Se eu precisar cancelar minha reserva, qual é a política?) - o hotel explica se há taxa de cancelamento.</p><h4>Segurança e Safe</h4><p>"Do you have a safe in the room?" (Tem um cofre no quarto?) ou "Can I lock my valuables somewhere?" (Posso guardar meus valores em algum lugar?). Muitos quartos têm um pequeno cofre. O recepcionista explica: "There's a safe in the closet. Here's the key" (Tem um cofre no closet. Aqui está a chave). "How do I use it?" (Como uso?). "Just put your items in and set a code" (Coloque seus itens e configure uma senha).</p><h4>Serviços Adicionais</h4><p>"Can I arrange a massage?" (Posso agendar uma massagem?), "Do you have dry cleaning service?" (Vocês têm serviço de lavanderia?), "How much does dry cleaning cost?" (Quanto custa lavar a seco?), "How long does it take?" (Quanto tempo leva?). O hotel responde com horários e preços. Alguns oferecem: "We can have it ready by tomorrow morning" (Podemos ter pronto amanhã de manhã).</p>`,cards:[{q:"Como você pergunta se o Wi-Fi é gratuito?",a:"Você pode perguntar 'Is the Wi-Fi free?' ou 'Is there free Wi-Fi?' ou simplesmente 'What's the Wi-Fi password?' Geralmente em hotéis é gratuito para hóspedes."}]},
  {id:7,name:'Restaurantes - Ordenando Comida e Entendendo Cardápios',dur:'20 min',content:`<h3>Comendo Bem Enquanto Viaja</h3><p>Uma das melhores partes de viajar é experimentar a culinária local! Mas você precisa entender cardápios, fazer pedidos, e comunicar preferências dietérias. Vamos aprender como ser um diner confiante em inglês!</p><h4>Entrando em um Restaurante</h4><p>Você entra no restaurante. Se há um host/hostess (maître), ele diz: "Hello! Welcome to [restaurant name]. How many in your party?" (Olá! Bem-vindo ao [nome do restaurante]. Quantos pessoas?). Você responde: "Table for two, please" (Mesa para dois, por favor) ou "We're a party of three" (Somos um grupo de três). O host pergunta: "Do you have a reservation?" (Tem uma reserva?). Se tem: "Yes, under [seu nome]" (Sim, sob [seu nome]). Se não: "Do you have a wait?" (Qual é a espera?). O host responde: "About 20 minutes" ou senta você imediatamente: "Right this way" (Por aqui, por favor).</p><p>Você senta na mesa. O garçom/garçonete aparece: "Good evening! Can I get you something to drink?" (Boa noite! Posso trazer algo para beber?). Você responde: "I'll have water" (Vou tomar água) ou "Can I have a glass of wine?" (Posso tomar um copo de vinho?) ou "I'll start with a beer" (Vou começar com uma cerveja).</p><h4>Lendo o Cardápio</h4><p>O garçom traz o cardápio. Há seções: Appetizers/Starters (aperitivos), Entrees/Main courses (pratos principais), Sides (acompanhamentos), Desserts (sobremesas), Beverages (bebidas). O garçom diz: "Here's the menu. I'll be back in a few minutes to take your order" (Aqui está o cardápio. Volto em alguns minutos para pegar seu pedido).</p><p>Se você não entende algo no cardápio, você pode perguntar: "What is 'risotto'?" (O que é 'risotto'?). "What are the 'lamb chops'?" (O que são as 'lamb chops'?). O garçom explica. Se há um ingrediente que você não gosta: "What comes with the chicken?" (O que acompanha o frango?), "Is there any seafood in this?" (Tem fruto do mar nisto?), "Does it have nuts?" (Tem nozes?).</p><h4>Fazendo um Pedido</h4><p>O garçom volta: "Are you ready to order?" (Vocês estão prontos para pedir?). Você responde: "I'll have the grilled salmon with a side of vegetables" (Vou querer o salmão grelhado com um acompanhamento de legumes) ou "I'd like the pasta with marinara sauce" (Gostaria da pasta com molho marinara). Para bem-feito/passado/médio: "How would you like your steak?" (Como você quer seu bife?). Você responde: "Medium rare, please" (Médio, por favor) ou "Well done" (Bem cozido).</p><p>Se você quer recomendação: "What do you recommend?" (O que você recomenda?). O garçom responde: "The salmon is very popular" (O salmão é muito popular) ou "Our chef's special is excellent" (O especial do chefe é excelente). Se há um prato que você quer mas com modificação: "I'd like the pasta, but can you hold the garlic?" (Quero a pasta, mas sem alho?). "Can I substitute the fries for a salad?" (Posso substituir as batatas fritas por uma salada?). O garçom responde: "Of course" ou "Yes, no problem" (Claro/Sem problema).</p><h4>Comendo no Restaurante</h4><p>O garçom traz a comida: "Here's your salmon. Careful, the plate is hot" (Aqui está seu salmão. Cuidado, o prato está quente). Você diz: "Thank you!" (Obrigado!). Se há um problema com a comida: "This is too cold" (Isto está muito frio), "The steak is overdone" (O bife está muito bem cozido), "There's a hair in my food" (Tem cabelo na minha comida). O garçom responde: "I'll take this back and get you another one" (Vou levar de volta e trazer outro).</p><p>Enquanto come, o garçom pode perguntar: "How is everything?" (Como está tudo?). Você responde: "Delicious!" (Delicioso!) ou "It's great, thank you!" (Está ótimo, obrigado!). Se está ruim você pode dizer: "It's not what I expected" (Não é o que esperava) e o garçom oferece: "Can I get you something else?" (Posso trazer algo mais?). Se você não consegue terminar: "I'm getting full" (Estou ficando cheio/a) ou "The portions are very large" (As porções são muito grandes). O garçom pergunta: "Would you like a to-go box?" (Quer uma caixa para levar?). Você responde: "Yes, please" ou "No, I'm done" (Não, estou pronto).</p><h4>Recomendações e Alergias</h4><p>Se você tem alergias, diga claramente: "I'm allergic to peanuts" (Sou alérgico a amendoim), "I'm allergic to shellfish" (Sou alérgico a frutos do mar), "I have a gluten allergy" (Tenho alergia a glúten). O garçom leva essa informação a sério. Se é severo: "I have a severe allergy. Can you make sure this dish has no contact with [alérgeno]?" (Tenho alergia severa. Pode garantir que este prato não tem contato com [alérgeno]?).</p><p>Para preferências dietárias: "I'm vegetarian" (Sou vegetariano/a), "I'm vegan" (Sou vegano/a), "I don't eat meat" (Não como carne). O garçom responde: "We have several vegetarian options" (Temos várias opções vegetarianas) e pode sugerir pratos.</p><h4>Finalizando a Refeição</h4><p>O garçom tira os pratos: "Would you like dessert?" (Gostaria de sobremesa?). Você responde: "I'll have the chocolate cake" (Vou querer o bolo de chocolate) ou "No, thank you. Just the check, please" (Não, obrigado. Só a conta, por favor). O garçom traz a conta (bill/check). Você verifica, paga (dinheiro, cartão de crédito), deixa gorjeta, e diz: "Thank you! It was delicious!" (Obrigado! Estava delicioso!).</p>`,cards:[{q:"Como você pede uma steak bem feito?",a:"Você diz 'I'd like a steak, well done, please' ou quando o garçom pergunta 'How would you like your steak?' você responde 'Well done'."}]},
  {id:8,name:'Preferências Dietárias, Alergias e Solicitações Especiais',dur:'20 min',content:`<h3>Comunicando Necessidades Dietárias</h3><p>Seja por escolha, religião, ou saúde, muitas pessoas têm restrições dietárias especiais. Viajar com restrições dietárias pode ser desafiador, mas com as palavras corretas, você consegue se comunicar e encontrar comida apropriada!</p><h4>Comunicando Vegetarianismo e Veganismo</h4><p>"I'm vegetarian" (Sou vegetariano/a) significa que você não come carne, mas pode comer peixe, ovos, e laticínios. "I'm vegan" (Sou vegano/a) significa que você não come nada de origem animal - sem carne, peixe, ovos, laticínios, ou mel. É importante ser claro: "I'm vegetarian. I don't eat meat or fish" (Sou vegetariano. Não como carne nem peixe). Para veganos: "I'm vegan. I don't eat any animal products - no meat, fish, eggs, dairy, or honey" (Sou vegano. Não como nenhum produto animal - sem carne, peixe, ovos, laticínios ou mel).</p><p>Em restaurantes, você pergunta: "What vegetarian options do you have?" (Quais opções vegetarianas vocês têm?) ou "Do you have any vegan dishes?" (Vocês têm algum prato vegano?). O garçom pode responder com sugestões ou dizer: "We can modify dishes without meat" (Podemos modificar pratos sem carne). Você pode pedir: "Can I get the pasta with vegetables instead of meat?" (Posso pegar a pasta com legumes em vez de carne?).</p><h4>Alergias Alimentares - Comunicação Severa</h4><p>Alergias alimentares são sérias. Se você tem uma alergia, você deve comunicar isso claramente: "I have a severe allergy to peanuts" (Tenho alergia severa a amendoim). "I'm allergic to shellfish" (Sou alérgico a frutos do mar). "I have a gluten allergy" (Tenho alergia a glúten). O garçom deve levar isso a sério.</p><p>Para alergias severas, você pode pedir falar com o gerente ou chef: "Can I speak to the manager about my allergy?" (Posso falar com o gerente sobre minha alergia?). O chef pode garantir que o prato é preparado seguramente: "Our chef will prepare this without any contact with peanuts" (Nosso chef preparará isto sem contato com amendoim). Você pode pedir: "Can you guarantee there's no cross-contamination?" (Pode garantir que não há contaminação cruzada?).</p><h4>Intolerâncias Alimentares</h4><p>Intolerância é diferente de alergia - não é uma reação alérgica, mas desconforto digestivo. "I'm lactose intolerant" (Sou intolerante à lactose), "I have celiac disease" (Tenho doença celíaca), "I have a gluten sensitivity" (Tenho sensibilidade ao glúten). Para lactose: "I can't eat dairy" (Não posso comer laticínios), "Can you make this without milk?" (Pode fazer isto sem leite?). Para glúten: "I need a gluten-free option" (Preciso de uma opção sem glúten), "Is this gluten-free?" (Isto é sem glúten?).</p><h4>Outras Restrições Dietárias</h4><p>Religião: "I keep kosher" (Sigo as leis kosher), "I eat halal" (Como halal). Preferências: "I don't eat red meat" (Não como carne vermelha), "I only eat fish" (Só como peixe), "I don't eat processed foods" (Não como alimentos processados). Saúde: "I'm on a low-sodium diet" (Estou em uma dieta baixa em sódio), "I need to avoid sugar" (Preciso evitar açúcar), "I'm on a high-protein diet" (Estou em uma dieta rica em proteína).</p><h4>Perguntando Sobre Ingredientes</h4><p>Se você tem restrições, você pode perguntar sobre ingredientes: "Does this have dairy?" (Isto tem laticínios?), "Does this contain nuts?" (Isto contém nozes?), "What's in the sauce?" (O que tem no molho?), "Is there sugar in this?" (Tem açúcar nisto?), "Does this have gluten?" (Isto tem glúten?). O garçom pode não saber, então ele/ela pode levar sua pergunta para a cozinha: "Let me check with the chef" (Deixa eu verificar com o chef).</p><h4>Em Supermercados e Lojas</h4><p>Se você está comprando seu próprio alimento em um supermercado, você pode procurar labels (rótulos) que dizem "Gluten-free" (sem glúten), "Dairy-free" (sem laticínios), "Vegan", "Vegetarian", "Nut-free" (sem nozes). Se você tem dúvida, você pode pedir: "Excuse me, is this product vegetarian?" (Com licença, este produto é vegetariano?). Funcionários de supermercado frequentemente podem ajudar.</p><h4>Comunicando com Famílias Anfitriãs ou Hosts</h4><p>Se você está ficando com uma família ou Airbnb host, você deve informar restrições dietárias antecipadamente: "I wanted to let you know about my dietary restrictions. I'm vegetarian and can't eat meat or fish" (Queria informá-lo sobre minhas restrições dietárias. Sou vegetariano e não posso comer carne nem peixe). "Does that work for you?" (Funciona para você?). Se há um problema, o host pode sugerir alternativas ou permitir que você cozinhe você mesmo.</p>`,cards:[{q:"Como você comunica uma alergia grave a um garçom?",a:"Você diz claramente 'I have a severe allergy to...' (Tenho alergia severa a...). Para alergias sérias, você pode pedir para falar com o chef ou gerente para garantir que não há contaminação cruzada."}]},
  {id:9,name:'Compras, Dinheiro e Situações de Emergência',dur:'20 min',content:`<h3>Comprando e Lidando com Situações</h3><p>Viajar envolve comprar souvenirs, lidar com dinheiro, e às vezes (esperamos que nunca!) lidar com emergências. Vamos aprender frases práticas para essas situações!</p><h4>Em Lojas e Shopping</h4><p>Você entra em uma loja. Um vendedor pode dizer: "Hi! Can I help you find something?" (Oi! Posso ajudar você a encontrar algo?). Você responde: "I'm just looking, thanks" (Estou só olhando, obrigado) ou "I'm looking for a souvenir" (Estou procurando um souvenir). O vendedor responde: "Let me know if you need any help" (Deixa eu saber se precisar de ajuda).</p><p>Se você quer informações: "How much is this?" (Quanto custa isto?), "Do you have this in a different size?" (Vocês têm isto em outro tamanho?), "Do you have this in another color?" (Vocês têm isto em outra cor?), "Where's the fitting room?" (Onde é o provador?). O vendedor responde com preços e informações. Para negociação de preço (em mercados, não em lojas): "Can you do a better price?" (Você consegue um preço melhor?), "Is this your final price?" (Este é seu preço final?). Em lojas ocidentais, preço é fixo, mas em mercados você pode negociar.</p><h4>No Caixa</h4><p>Você leva seus itens para o caixa. O caixa diz: "That will be $50" ($50). Você pergunta: "Do you take cards?" (Vocês aceitam cartão?). O caixa responde: "Yes, we take Visa and Mastercard" (Sim, aceitamos Visa e Mastercard) ou "Cash only" (Apenas dinheiro). Você paga com cartão e o caixa pede: "Can I get your zip code?" (Qual é seu CEP?). Para dinheiro você diz: "I'll pay in cash" (Vou pagar em dinheiro). Se você pede troco: "Can I get my change?" (Posso pegar meu troco?). O caixa diz: "Your change is $10" (Seu troco é $10). Você pode pedir: "Can I have a bag?" (Posso pegar uma sacola?).</p><h4>Dinheiro e Câmbio</h4><p>Se você precisa trocar dinheiro: "Where can I exchange money?" (Onde posso trocar dinheiro?). "Is there a currency exchange here?" (Tem câmbio aqui?). Você pode ir a um banco ou casa de câmbio. Você diz: "I'd like to exchange $100 USD for [moeda local]" (Gostaria de trocar $100 USD por [moeda local]). O caixa pergunta: "Do you have your passport?" (Tem seu passaporte?). Você pode perguntar: "What's the exchange rate?" (Qual é a taxa de câmbio?), "How much will I get?" (Quanto vou receber?). Se há taxa: "Is there a fee?" (Tem uma taxa?).</p><p>ATMs: "Where's an ATM?" (Onde tem um caixa eletrônico?). Você insere seu cartão, digita seu PIN, e saca dinheiro. Muitas vezes seu banco cobra uma taxa para sacar do exterior - você pode receber uma aviso: "Your bank will charge a fee" (Seu banco cobrará uma taxa). Responda "OK" ou "Yes, proceed" (Sim, prossiga).</p><h4>Emergências Médicas</h4><p>Se você está doente ou ferido: "I need help! I need a doctor!" (Preciso de ajuda! Preciso de um médico!). "I think I'm having a heart attack" (Acho que estou tendo um infarto) - isto é sério, chame 911 (ou o número de emergência local). Você grita: "Call 911!" (Ligue para 911!). Se é menos sério: "Where's the nearest hospital?" (Onde fica o hospital mais próximo?), "I need to see a doctor" (Preciso ver um médico), "Can you recommend a clinic?" (Pode recomendar uma clínica?).</p><p>Em uma clínica/hospital: "I'm not feeling well" (Não estou me sentindo bem), "I have a headache" (Tenho dor de cabeça), "I have a stomachache" (Tenho dor de estômago), "I have a fever" (Tenho febre), "I'm vomiting" (Estou vomitando), "I have diarrhea" (Tenho diarreia). O médico pergunta: "How long have you had these symptoms?" (Há quanto tempo tem esses sintomas?), "Do you have any allergies?" (Tem alguma alergia?), "Are you taking any medications?" (Está tomando algum medicamento?). Você responde honestamente.</p><h4>Emergências Não-Médicas</h4><p>Se seus documentos são perdidos: "I lost my passport" (Perdi meu passaporte). Você precisa ir à embaixada. "Where's the US Embassy?" (Onde fica a Embaixada dos EUA?). Se você foi roubado: "I was robbed" (Fui assaltado), "Someone stole my wallet" (Alguém roubou minha carteira). Você pode chamar a polícia: "I need to call the police" (Preciso ligar para a polícia), "Where's the nearest police station?" (Onde fica a delegacia mais próxima?). Se há acidente: "Call the police!" (Ligue para a polícia!), "Is anyone hurt?" (Alguém está ferido?), "Do you have a car accident form?" (Vocês têm um formulário de acidente de carro?).</p><h4>Linguagem para Situações Difíceis</h4><p>"I don't understand" (Não entendo), "Can you speak more slowly?" (Pode falar mais lentamente?), "Can you repeat that?" (Pode repetir?), "I need help" (Preciso de ajuda), "Can I call the embassy?" (Posso ligar para a embaixada?), "I've lost my credit card" (Perdi meu cartão de crédito), "I've been scammed" (Fui enganado), "This is unsafe" (Isto é inseguro), "I feel unsafe" (Me sinto inseguro/a), "Can you please contact someone who speaks English?" (Pode por favor contatar alguém que fale inglês?).</p><h4>Números de Emergência</h4><p>Diferentes países têm diferentes números! Nos EUA é 911. No Reino Unido é 999. Na Europa muitos usam 112. Se você não sabe, procure online antes de viajar e anote os números.</p>`,cards:[{q:"Quais são as primeiras coisas que você diz em uma emergência médica?",a:"Diga 'I need help! Call 911!' (Preciso de ajuda! Ligue para 911!) ou descreva seu sintoma: 'I think I'm having a heart attack' (Acho que estou tendo um infarto). Se está consciente, dirija-se para o hospital ou clínica mais próxima."}]},
];
