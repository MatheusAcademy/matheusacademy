  { id:'iv_mod1', name:'Essenciais de Viagem e Hospedagem', free:true,
    topics:[
      {id:1, name:'No Aeroporto e Transporte', dur:'18 min', content:`<h3>No Aeroporto e Transporte</h3><p>Uma das primeiras coisas que fará quando viajar para um país de língua inglesa é passar pelo aeroporto. Este é o momento mais crucial para comunicar-se claramente em inglês!</p><h4>No Check-in do Aeroporto</h4><p><strong>Cumprimento e apresentação:</strong><br>"Good morning. I have a flight to New York at 10 AM." (Bom dia. Tenho um voo para Nova York às 10 da manhã.)<br>"I'm checking in for flight BA123 to London." (Estou me registrando para o voo BA123 para Londres.)<br>"I need to check my luggage, please." (Preciso despachar minha bagagem, por favor.)<br>"How many bags are you checking in?" (Quantas malas você está despachando?)<br>"I have two suitcases." (Tenho duas malas.)"</p><p><strong>Documentos e informações:**<br>"Here's my passport and boarding pass." (Aqui está meu passaporte e cartão de embarque.)<br>"Is my luggage over the weight limit?" (Minha bagagem excede o limite de peso?)<br>"Do I need to pay extra for this bag?" (Preciso pagar extra por esta mala?)<br>"Where is the security checkpoint?" (Onde fica o checkpoint de segurança?)<br>"What time do I need to board?" (Que hora preciso embarcar?)"</p><h4>Passando pela Segurança</h4><p><strong>Comunicação no checkpoint:**<br>"Good morning. Here's my boarding pass and ID." (Bom dia. Aqui está meu cartão de embarque e ID.)<br>"Do I need to remove my shoes?" (Preciso remover meus sapatos?)<br>"Can I keep my phone?" (Posso manter meu telefone?)<br>"Can I bring this through security?" (Posso passar com isto pela segurança?)<br>"It's allowed in carry-on luggage." (É permitido na bagagem de mão.)<br>"I have medication. Here's the prescription." (Tenho medicação. Aqui está a prescrição.)"</p><h4>Encontrando seu Voo e Portão</h4><p><strong>Perguntas de orientação:**<br>"Where is gate 12?" (Onde fica o portão 12?)<br>"Is this the line for flight BA456?" (Esta é a fila para o voo BA456?)<br>"When does boarding start?" (Quando começa o embarque?)<br>"What's the boarding group?" (Qual é o grupo de embarque?)<br>"Is this a direct flight?" (Este é um voo direto?)<br>"How long is the flight?" (Quanto tempo dura o voo?)"</p><h4>Táxis e Rideshare (Uber, Lyft)</h4><p><strong>Chamando um táxi:**<br>"Can you call me a taxi?" (Pode chamar um táxi para mim?)<br>"Taxi, please!" (Táxi, por favor!)<br>"To the downtown hotel, please." (Para o hotel no centro, por favor.)<br>"How much will it cost?" (Quanto vai custar?)<br>"Is it a fixed rate or meter?" (É uma taxa fixa ou taxímetro?)<br>"Keep the change." (Fico com o troco.)"</p><p><strong>Usando Rideshare Apps:**<br>"I'd like to book an Uber to the airport." (Gostaria de reservar um Uber para o aeroporto.)<br>"Can you confirm my address?" (Pode confirmar meu endereço?)<br>"What's your car make?" (Qual é a marca do seu carro?)<br>"Thank you for the ride!" (Obrigado pela carona!)"</p><h4>Transporte Público (Ônibus, Trem, Metrô)</h4><p><strong>Comprando passagens:**<br>"One ticket to downtown, please." (Uma passagem para o centro, por favor.)<br>"How much is a ticket?" (Quanto custa uma passagem?)<br>"Do you have a day pass?" (Vocês têm um passe do dia?)<br>"I need a round-trip ticket." (Preciso de uma passagem de ida e volta.)<br>"Where can I buy a ticket?" (Onde posso comprar uma passagem?)<br>"Can I pay with a credit card?" (Posso pagar com cartão de crédito?)"</p><p><strong>Encontrando sua linha:**<br>"Which line goes to the museum?" (Qual linha vai para o museu?)<br>"What's the next train?" (Qual é o próximo trem?)<br>"How long does this trip take?" (Quanto tempo leva esta viagem?)<br>"Is this the right platform?" (Esta é a plataforma certa?)<br>"Do I need to change trains?" (Preciso trocar de trem?)<br>"Where should I get off?" (Onde devo descer?)"</p><h4>Alugar um Carro</h4><p><strong>Na agência de aluguel:**<br>"I have a car rental reservation under the name Smith." (Tenho uma reserva de aluguel de carro sob o nome Smith.)<br>"What size car do I need?" (Que tamanho de carro preciso?)<br>"Is insurance included?" (O seguro está incluído?)<br>"What's the daily rate?" (Qual é a taxa diária?)<br>"Can I get a GPS?" (Posso conseguir um GPS?)<br>"How do I return the car?" (Como faço para devolver o carro?)<br>"Is there a late fee?" (Há uma taxa por atraso?)<br>"What's the fuel policy?" (Qual é a política de combustível?)"</p><p><strong>Na estrada:**<br>"Where is the nearest gas station?" (Onde fica o posto de gasolina mais próximo?)<br>"Can I park here?" (Posso estacionar aqui?)<br>"How much is the parking?" (Quanto é o estacionamento?)<br>"Where can I get a map?" (Onde posso conseguir um mapa?)<br>"My car is broken. Can you help?" (Meu carro quebrou. Pode ajudar?)"</p>`, cards:[{q:"Como dizer 'Tenho um voo para Nova York' em inglês?",a:"'I have a flight to New York at [time].' ou 'I'm checking in for flight [número] to New York.'"},{q:"O que dizer ao táxi?",a:"'To the hotel, please.' ou 'Can you take me to [address], please?' ou 'How much will this cost?'"},{q:"Como perguntar qual linha de ônibus vai para um lugar?",a:"'Which line goes to [lugar]?' ou 'What bus goes to [lugar]?'"}]},
      {id:2, name:'Hospedagem e Acomodações', dur:'20 min', content:`<h3>Hospedagem e Acomodações</h3><p>Uma vez chegado ao seu destino, você precisará de um lugar para ficar! Este é um dos aspectos mais importantes de viajar. Aprenda a se comunicar efetivamente com equipes de hotel e anfitriões de Airbnb.</p><h4>Reservando um Hotel</h4><p><strong>Ao chegar na recepção:**<br>"Hello, I have a reservation under the name Johnson." (Olá, tenho uma reserva sob o nome Johnson.)<br>"I have a booking for tonight." (Tenho uma reserva para esta noite.)<br>"Here's my confirmation number." (Aqui está meu número de confirmação.)<br>"What's the check-in time?" (Qual é o horário de check-in?)<br>"What's the check-out time?" (Qual é o horário de check-out?)<br>"Do you need my credit card?" (Você precisa do meu cartão de crédito?)"</p><p><strong>Informações da hospedagem:**<br>"What's included in the room?" (O que está incluído no quarto?)<br>"Is there a hair dryer in the room?" (Há um secador de cabelo no quarto?)<br>"Is breakfast included?" (O café da manhã está incluído?)<br>"What are the Wi-Fi details?" (Quais são os detalhes do Wi-Fi?)<br>"Is there air conditioning?" (Há ar condicionado?)<br>"How do I control the temperature?" (Como controlo a temperatura?)"</p><p><strong>Amenidades do hotel:**<br>"Do you have a gym?" (Vocês têm uma academia?)<br>"Is there a pool?" (Há uma piscina?)<br>"What are your restaurant hours?" (Qual é o horário do restaurante?)<br>"Do you offer room service?" (Vocês oferecem serviço de quarto?)<br>"Can I get a wake-up call?" (Posso ter um chamado de despertar?)<br>"Is there a business center?" (Há um centro de negócios?)<br>"Do you have a safe?" (Vocês têm um cofre?)"</p><h4>Problemas no Hotel</h4><p><strong>Reclamações e solicitações:**<br>"There's no hot water." (Não há água quente.)<br>"The air conditioning isn't working." (O ar condicionado não está funcionando.)<br>"The TV is broken." (A TV está quebrada.)<br>"There's a noise complaint from the room next door." (Há uma reclamação de ruído do quarto ao lado.)<br>"Can I have a quieter room?" (Posso ter um quarto mais silencioso?)<br>"The room is dirty." (O quarto está sujo.)<br>"Can you send housekeeping?" (Pode enviar o serviço de limpeza?)<br>"Can you fix this?" (Pode consertar isto?)<br>"I need new sheets." (Preciso de lençóis novos.)"</p><p><strong>Resolvendo problemas:**<br>"Can I get a refund?" (Posso ter um reembolso?)<br>"Can you move me to another room?" (Pode me mudar para outro quarto?)<br>"Can you send someone to fix this?" (Pode enviar alguém para consertar?)<br>"I need extra pillows." (Preciso de travesseiros extras.)<br>"Can you bring me extra towels?" (Pode trazer toalhas extras?)"</p><h4>Airbnb e Acomodações Particulares</h4><p><strong>Antes de reservar:**<br>"How much is the nightly rate?" (Qual é a taxa por noite?)<br>"Are utilities included?" (Os serviços estão incluídos?)<br>"How many bedrooms?" (Quantos quartos?)<br>"Is it a shared or private bathroom?" (É banheiro compartilhado ou privado?)<br>"Is there parking?" (Há estacionamento?)<br>"What about Wi-Fi?" (E o Wi-Fi?)<br>"Is it pet-friendly?" (É amigável para animais de estimação?)<br>"Can I cancel if I need to?" (Posso cancelar se precisar?)"</p><p><strong>Comunicando com o anfitrião:**<br>"Hi, I'm excited to stay with you!" (Oi, estou animado para ficar com você!)<br>"What time can I check in?" (Que horas posso fazer check-in?)<br>"Where should I park?" (Onde devo estacionar?)<br>"How do I get the keys?" (Como consigo as chaves?)<br>"Where is the nearest supermarket?" (Onde fica o supermercado mais próximo?)<br>"Is there anything I should know about the place?" (Há algo que eu deva saber sobre o lugar?)<br>"Thank you so much for hosting!" (Muito obrigado por me hospedar!)"</p><p><strong>Check-out:**<br>"What time should I check out?" (Que hora devo fazer check-out?)<br>"Where should I leave the keys?" (Onde devo deixar as chaves?)<br>"Should I strip the bed?" (Devo tirar os lençóis?)<br>"Where's the garbage?" (Onde fica o lixo?)<br>"Thank you for everything!" (Obrigado por tudo!)"</p><h4>Expressões Úteis para Hospedagem</h4><p><strong>Muito úteis:**<br>"That's perfect, thank you." (Isso é perfeito, obrigado.)<br>"I really appreciate your help." (Eu realmente aprecio sua ajuda.)<br>"You've been so helpful." (Você foi tão prestativo.)<br>"I'm very satisfied with the room." (Estou muito satisfeito com o quarto.)<br>"I'll definitely recommend this place." (Definitivamente recomendarei este lugar.)"</p>`, cards:[{q:"Como se registrar em um hotel?",a:"'I have a reservation under the name [seu nome].' ou 'Here's my confirmation number [número].'"},{q:"O que fazer se há problemas no quarto?",a:"Diga ao recepcionista: 'There's no hot water.' ou 'Can I have a different room?' e eles ajudarão."},{q:"Como se comunicar com anfitrião de Airbnb?",a:"Use as mensagens integradas: 'What time is check-in?' ou 'Thank you for hosting!'"}]},
      {id:3, name:'Comida e Restaurantes', dur:'19 min', content:`<h3>Comida e Restaurantes</h3><p>Uma das melhores partes de viajar é experimentar a culinária local! Ser capaz de pedir comida, fazer restrições alimentares conhecidas, e conversar com garçons é essencial.</p><h4>Entrando em um Restaurante</h4><p><strong>Pedindo uma mesa:**<br>"Hello, I'd like a table for two, please." (Olá, gostaria de uma mesa para dois, por favor.)<br>"Do you have a table available?" (Você tem uma mesa disponível?)<br>"I have a reservation at 7 PM under Smith." (Tenho uma reserva às 7 PM sob Smith.)<br>"What's the wait time?" (Qual é o tempo de espera?)<br>"Can I sit at that table?" (Posso sentar naquela mesa?)<br>"Is this smoking or non-smoking?" (Isso é para fumantes ou não-fumantes?)"</p><p><strong>Sentando-se:**<br>"Is this table okay?" (Esta mesa está bem?)<br>"Can I sit outside?" (Posso sentar lá fora?)<br>"Can I change tables?" (Posso trocar de mesa?)<br>"This area is quieter." (Esta área é mais silenciosa.)"</p><h4>Lendo o Menu e Pedindo</h4><p><strong>Entendendo o menu:**<br>"What do you recommend?" (O que você recomenda?)<br>"What's your specialty?" (Qual é sua especialidade?)<br>"Can you explain what this dish is?" (Pode explicar o que é este prato?)<br>"Is it spicy?" (É picante?)<br>"Does it contain nuts?" (Contém nozes?)<br>"Is it vegetarian?" (É vegetariano?)<br>"What's the difference between these two?" (Qual é a diferença entre estes dois?)<br>"Can you make it without...?" (Pode fazer sem...?)"</p><p><strong>Fazendo o pedido:**<br>"I'll have the chicken sandwich, please." (Vou comer o sanduíche de frango, por favor.)<br>"Can I get the pasta with no cream sauce?" (Posso pedir o macarrão sem molho de creme?)<br>"I'd like a salad instead of fries." (Gostaria de uma salada em vez de batatas fritas.)<br>"On the side, please." (Ao lado, por favor.)<br>"I'm ready to order." (Estou pronto para pedir.)<br>"Can I get a few more minutes?" (Posso ter alguns minutos a mais?)"</p><p><strong>Bebidas:**<br>"What would you like to drink?" (O que você gostaria de beber?)<br>"I'll have water, please." (Vou querer água, por favor.)<br>"Can I have lemon with that?" (Posso ter limão com isso?)<br>"I'd like a soft drink." (Gostaria de um refrigerante.)<br>"What beers do you have?" (Que cervejas você tem?)<br>"A glass of red wine, please." (Um copo de vinho tinto, por favor.)<br>"Can I get a coffee?" (Posso pedir um café?)"</p><h4>Restrições Alimentares e Alergias</h4><p><strong>Muito importante comunicar claramente:**<br>"I'm vegetarian." (Sou vegetariano.)<br>"I'm vegan." (Sou vegano.)<br>"I'm gluten-free." (Sou livre de glúten.)<br>"I'm allergic to nuts." (Sou alérgico a nozes.)<br>"I'm lactose intolerant." (Sou intolerante à lactose.)<br>"I don't eat pork." (Não como carne de porco.)<br>"I'm allergic to shellfish." (Sou alérgico a frutos do mar.)<br>"Can I see an ingredients list?" (Posso ver uma lista de ingredientes?)<br>"Is this cooked in the same oil as fish?" (Isto é cozido no mesmo óleo que peixe?)<br>"I need to avoid this ingredient." (Preciso evitar este ingrediente.)"</p><h4>Durante a Refeição</h4><p><strong>Conversando com o garçom:**<br>"Can I have more bread?" (Posso ter mais pão?)<br>"Can I have another drink?" (Posso ter outra bebida?)<br>"The food is delicious!" (A comida está deliciosa!)<br>"How much longer will my food take?" (Quanto tempo minha comida levará?)<br>"This isn't what I ordered." (Isto não é o que pedi.)<br>"Can I get some ketchup?" (Posso pegar um pouco de ketchup?)<br>"Can I get a refill?" (Posso pedir um reabastecimento?)"</p><p><strong>Problemas com a comida:**<br>"This is cold." (Isto está frio.)<br>"This doesn't taste right." (Isto não tem gosto certo.)<br>"I think there's a hair in my food." (Acho que há um cabelo na minha comida.)<br>"Can I get a new dish?" (Posso pedir um novo prato?)<br>"Can I send this back?" (Posso devolver isto?)"</p><h4>A Conta</h4><p><strong>Pagando:**<br>"Can I have the check/bill, please?" (Posso ter a conta, por favor?)<br>"Can I pay by card?" (Posso pagar com cartão?)<br>"Is there a service charge?" (Há uma taxa de serviço?)<br>"I don't understand this charge." (Não entendo esta cobrança.)<br>"Can you explain the bill?" (Pode explicar a conta?)<br>"Keep the change." (Fico com o troco.)<br>"This was excellent service." (Este foi um serviço excelente.)"</p><p><strong>Gorjeta (Tipping):**<br>Em muitos países de língua inglesa (EUA, Canadá), gorjeta é esperada. Geralmente 15-20% do total.<br>"What's the typical tip?" (Qual é a gorjeta típica?)<br>"Can I add a tip to the card?" (Posso adicionar uma gorjeta ao cartão?)"</p><h4>Situações Especiais</h4><p><strong>Celebrando:**<br>"We're celebrating our anniversary!" (Estamos celebrando nosso aniversário!)<br>"It's his birthday!" (É o aniversário dele!)<br>"Can we have a table with a special view?" (Podemos ter uma mesa com uma vista especial?)<br>"Can you bring a dessert?" (Pode trazer uma sobremesa?)"</p><p><strong>Eventos especiais:**<br>"Do you have a private room?" (Você tem uma sala privada?)<br>"Can we arrange a special menu?" (Podemos organizar um menu especial?)<br>"What's the catering policy?" (Qual é a política de catering?)"</p>`, cards:[{q:"Como pedir uma mesa em um restaurante?",a:"'I'd like a table for [número] people, please.' ou 'Do you have a table available?'"},{q:"Como informar uma alergia alimentar?",a:"'I'm allergic to [alimento].' ou 'I'm [tipo de dieta]. What do you recommend?' Sempre seja claro!"},{q:"Como pedir a conta em inglês?",a:"'Can I have the check, please?' (americano) ou 'Can I have the bill, please?' (britânico)"}]},
    ],
    summary:{title:"Resumo do Módulo 1: Essenciais de Viagem", points:["No aeroporto, comunique seu voo, apresente documentos, e faça perguntas sobre embarque. Seja claro e educado.","Para transporte, saiba como pedir informações sobre ônibus, táxis, trens. Aprenda frases para pedir direções e preços.","Na hospedagem, faça perguntas sobre amenidades, report problemas educadamente, e sempre seja respeitoso com equipes e anfitriões.","Em restaurantes, saiba como pedir mesa, ler menu, fazer pedidos, comunicar alergias claramente, e pagar a conta. Restrições alimentares são muito importantes!"]},
    quizFinal:[{q:"Como se registrar em um voo?",opts:["Apenas sente-se","I'm checking in for flight [número]","Fale português","Não diga nada"],correct:1},{q:"O que dizer a um táxi?",opts:["Silêncio","To the hotel, please","Fale em português","Apenas aponte"],correct:1},{q:"Como comunicar uma alergia alimentar?",opts:["Não fale nada","Espere pelos sintomas","'I'm allergic to [alimento]'","Coma mesmo assim"],correct:2},{q:"'What's the check-in time?' significa:",opts:["Quando sair do hotel","Quando entrar no hotel","Quando fazer o check-out","Quando tomar café"],correct:1},{q:"Como pedir uma mesa no restaurante?",opts:["Apenas sente-se","I'd like a table for [número], please","Fale português","Espere silenciosamente"],correct:1},{q:"Como avisar sobre um problema no quarto?",opts:["Não fale nada","'There's no hot water' ou 'Can I change rooms?'","Deixe uma crítica ruim","Simplesmente saia"],correct:1},{q:"O que é 'meal plan'?",opts:["Plano de refeições incluídas","Tipo de carro","Tipo de voo","Horário de sídesta"]},

  { id:'iv_mod2', name:'Navegação e Exploração', free:false,
    topics:[
      {id:4, name:'Pedindo Direções e Orientação Urbana', dur:'20 min', content:`<h3>Pedindo Direções e Orientação Urbana</h3><p>Uma das habilidades mais cruciais ao viajar é conseguir sair do seu hotel e explorar a cidade! Precisa de frases para pedir direções, entender instruções, e se orientar em um novo lugar.</p><h4>Pedindo Direções Básicas</h4><p><strong>Abordando alguém:**<br>"Excuse me, can you help me?" (Desculpa, pode me ajudar?)<br>"I'm sorry to bother you, but..." (Desculpa incomodar, mas...)<br>"Do you speak English?" (Você fala inglês?)<br>"Can you understand me?" (Pode me entender?)<br>"I'm lost. Can you help?" (Estou perdido. Pode ajudar?)"</p><p><strong>Perguntando por um lugar:**<br>"Where is the train station?" (Onde fica a estação de trem?)<br>"Can you point me to the museum?" (Pode me apontar o museu?)<br>"How do I get to the city center?" (Como chego ao centro da cidade?)<br>"Is it walking distance?" (É a pé?)<br>"Is it far from here?" (É longe daqui?)<br>"How long does it take to walk?" (Quanto tempo leva para caminhar?)<br>"Can I take a bus?" (Posso pegar um ônibus?)"</p><p><strong>Entendendo instruções:**<br>"Turn left/right." (Vire à esquerda/direita.)<br>"Go straight." (Vá reto.)<br>"It's on the right/left side." (É no lado direito/esquerdo.)<br>"It's next to the bank." (É ao lado do banco.)<br>"You can't miss it." (Você não pode errar.)<br>"It's about 5 minutes away." (É a cerca de 5 minutos de distância.)<br>"Cross the street." (Atravesse a rua.)<br>"Go past the church." (Passe pela igreja.)"</p><h4>Usando um Mapa e GPS</h4><p><strong>Com um mapa físico:**<br>"Can you show me where we are on the map?" (Pode me mostrar onde estamos no mapa?)<br>"Where is this street?" (Onde é esta rua?)<br>"Is there a map in the hotel?" (Há um mapa no hotel?)<br>"Can I buy a map?" (Posso comprar um mapa?)<br>"Do you have a tourist map?" (Você tem um mapa turístico?)"</p><p><strong>Usando GPS/Google Maps:**<br>"Can I use your WiFi to download a map?" (Posso usar seu WiFi para baixar um mapa?)<br>"Is there free WiFi here?" (Há WiFi grátis aqui?)<br>"Can I charge my phone?" (Posso carregar meu telefone?)<br>"How do I use this app?" (Como uso este aplicativo?)"</p><h4>Explorando Atrações Turísticas</h4><p><strong>Encontrando atrações:**<br>"Where is the main tourist attraction?" (Onde é a principal atração turística?)<br>"Is there a museum nearby?" (Há um museu por perto?)<br>"What's the best viewpoint?" (Qual é o melhor ponto de vista?)<br>"Are there historical sites?" (Há sítios históricos?)<br>"What should I not miss?" (O que não devo perder?)<br>"Are there walking tours?" (Há passeios a pé?)<br>"How much does admission cost?" (Quanto custa a entrada?)"</p><p><strong>Obtendo informações turísticas:**<br>"Is there a tourist information center?" (Há um centro de informações turísticas?)<br>"Can I get a guidebook?" (Posso pegar um guia?)<br>"What are the best restaurants?" (Quais são os melhores restaurantes?)<br>"What's popular with locals?" (O que é popular com os locais?)<br>"What's the best time to visit?" (Qual é a melhor hora para visitar?)<br>"Are there any local events?" (Há eventos locais?)<br>"What's the weather like?" (Como é o tempo?)"</p><h4>Conversando com Locais</h4><p><strong>Iniciando uma conversa:**<br>"This is my first time here. Any recommendations?" (Esta é minha primeira vez aqui. Alguma recomendação?)<br>"I'm visiting from Brazil." (Estou visitando do Brasil.)<br>"How long have you lived here?" (Há quanto tempo você mora aqui?)<br>"What's your favorite place to eat?" (Qual é seu lugar favorito para comer?)<br>"Is there anything I should know about this neighborhood?" (Há algo que eu deva saber sobre este bairro?)"</p><p><strong>Aprendendo sobre a cultura:**<br>"What's the history of this building?" (Qual é a história deste edifício?)<br>"What's famous about this place?" (O que é famoso sobre este lugar?)<br>"Can you recommend local food?" (Pode recomendar comida local?)<br>"What do locals do for fun?" (O que os locais fazem para se divertir?)<br>"Are there any local traditions?" (Há alguma tradição local?)"</p><h4>Explorando com Segurança</h4><p><strong>Segurança:**<br>"Is this neighborhood safe?" (Este bairro é seguro?)<br>"Is it safe to walk at night?" (É seguro caminhar à noite?)<br>"Should I avoid any areas?" (Devo evitar algumas áreas?)<br>"Where's the nearest police station?" (Onde fica a delegacia de polícia mais próxima?)<br>"What's the emergency number?" (Qual é o número de emergência?)<br>"Do I need to watch out for anything?" (Preciso ficar atento a algo?)"</p><p><strong>Se se perder:**<br>"I think I'm lost." (Acho que estou perdido.)<br>"Can you help me find my way back?" (Pode me ajudar a encontrar meu caminho de volta?)<br>"Do you know where [nome do hotel] is?" (Você sabe onde é [nome do hotel]?)<br>"Can I call a taxi?" (Posso chamar um táxi?)<br>"I need to get back to my hotel." (Preciso voltar para meu hotel.)"</p>`, cards:[{q:"Como pedir direções polidamente?",a:"'Excuse me, can you help me? Where is [lugar]?' ou 'I'm sorry to bother you, but can you point me to...?'"},{q:"O que significa 'You can't miss it'?",a:"Significa que o lugar é bem óbvio e não é fácil de errar. É uma forma confortadora de dizer que você encontrará."},{q:"Como perguntar se é seguro caminhar à noite?",a:"'Is it safe to walk at night?' ou 'Should I avoid any areas at night?'"}]},
      {id:5, name:'Compras e Negociação', dur:'19 min', content:`<h3>Compras e Negociação</h3><p>Compras é uma atividade comum em viagens! Desde souvenirs até necessidades diárias, você precisa saber como fazer compras, negociar preços, e lidar com transações.</p><h4>Em Lojas Regulares</h4><p><strong>Entrando na loja:**<br>"Hello, just browsing, thanks." (Olá, apenas olhando, obrigado.)<br>"Can I help you find something?" (Posso ajudá-lo a encontrar algo?)<br>"I'm looking for..." (Estou procurando...)<br>"Where is the..." (Onde é o...)<br>"Do you have this in another size?" (Você tem isto em outro tamanho?)<br>"Do you have this in another color?" (Você tem isto em outra cor?)"</p><p><strong>Perguntando sobre produtos:**<br>"How much is this?" (Quanto custa isto?)<br>"What's the price?" (Qual é o preço?)<br>"Is this on sale?" (Isto está em promoção?)<br>"When does the sale end?" (Quando termina a promoção?)<br>"Is there a discount?" (Há desconto?)<br>"Do you offer a warranty?" (Vocês oferecem garantia?)<br>"Can I try this on?" (Posso provar isto?)<br>"Where's the dressing room?" (Onde é o provador?)"</p><p><strong>Na caixa:**<br>"I'm ready to check out." (Estou pronto para pagar.)<br>"I'll take this." (Vou levar isto.)<br>"Can you bag this separately?" (Pode empacotar isto separadamente?)<br>"Do you take credit cards?" (Vocês aceitam cartão de crédito?)<br>"Can I get a receipt?" (Posso pegar um recibo?)<br>"Thank you, have a good day!" (Obrigado, tenha um bom dia!)"</p><h4>Mercados e Feiras</h4><p><strong>Navegando um mercado:**<br>"How much for this?" (Quanto por isto?)<br>"What's the best price?" (Qual é o melhor preço?)<br>"Can you give me a discount?" (Pode me dar um desconto?)<br>"What's the total?" (Qual é o total?)<br>"Do you take cash?" (Você aceita dinheiro?)<br>"Is this fresh?" (Isto é fresco?)<br>"Can I smell this?" (Posso cheirar isto?)<br>"I'll take two of these." (Vou levar dois destes.)"</p><p><strong>Negociação (em mercados tradicionais):**<br>"Is that your best price?" (Esse é seu melhor preço?)<br>"I'll give you..." (Vou te dar...)<br>"That's too much." (Isto é muito.)<br>"What's your lowest price?" (Qual é seu preço mais baixo?)<br>"If I buy two, can you give me a discount?" (Se eu comprar dois, pode me dar um desconto?)<br>"Let's make a deal." (Vamos fazer um acordo.)<br>"I really love this, but I can only pay..." (Eu realmente amo isto, mas posso pagar apenas...)"</p><h4>Compras Online enquanto Viaja</h4><p><strong>Pedindo informações:**<br>"Do you ship internationally?" (Vocês enviam internacionalmente?)<br>"How much is shipping?" (Quanto custa o envio?)<br>"How long will it take?" (Quanto tempo levará?)<br>"Can I pick it up instead?" (Posso buscar em vez de receber pelo correio?)<br>"What's the return policy?" (Qual é a política de devoluções?)"</p><p><strong>Problemas com compras:**<br>"This is broken." (Isto está quebrado.)<br>"This isn't what I ordered." (Isto não é o que pedi.)<br>"Can I return this?" (Posso devolver isto?)<br>"I want a refund." (Quero um reembolso.)<br>"Can I get a replacement?" (Posso pegar uma substituição?)"</p><h4>Barganhas Culturais</h4><p><strong>Em países onde negociação é esperada:**<br>Em muitos mercados tradicionais, especialmente em países do Oriente Médio, Ásia e África, negociar é uma parte normal da compra!</p><p><strong>Regras básicas:**<br>1. Comece com uma oferta significativamente mais baixa (30-50% menos)<br>2. Seja respeitoso e amigável<br>3. Tenha disposição de sair se o preço não cair<br>4. Lembre que é um jogo - seja divertido!<br><br>"This is beautiful, but the price is high." (Isto é lindo, mas o preço é alto.)<br>"I'm interested, but I can only pay..." (Estou interessado, mas posso pagar apenas...)<br>"What if I buy three?" (E se eu comprar três?)<br>"This is the maximum I can pay." (Este é o máximo que posso pagar.)<br>"You have a good business here." (Você tem um bom negócio aqui.)"</p><h4>Bens e Souvenirs</h4><p><strong>Procurando lembranças:**<br>"What's typical from this region?" (O que é típico desta região?)<br>"What would make a good gift?" (O que seria um bom presente?)<br>"Is this handmade?" (Isto é feito à mão?)<br>"What's the best souvenir?" (Qual é o melhor souvenir?)<br>"Is there a certificate of authenticity?" (Há certificado de autenticidade?)<br>"Where can I find traditional crafts?" (Onde posso encontrar artesanatos tradicionais?)"</p><p><strong>Levando para casa:**<br>"Can I bring this through customs?" (Posso levar isto pela alfândega?)<br>"Is this allowed on the plane?" (Isto é permitido no avião?)<br>"Can you ship this to my country?" (Pode enviar isto para meu país?)<br>"What's the damage risk?" (Qual é o risco de dano?)<br>"Can you wrap this safely?" (Pode embrulhar isto com segurança?)"</p>`, cards:[{q:"Como perguntaar o preço de algo?",a:"'How much is this?' ou 'What's the price?' Simples e direto!"},{q:"Como negociar em um mercado?",a:"'Is that your best price?' ou 'What's your lowest price?' Comece baixo e suba conforme negocia."},{q:"O que perguntar sobre um souvenir?",a:"'Is this handmade?' ou 'Is this authentic?' Para garantir que está comprando algo genuíno."}]},
      {id:6, name:'Situações de Emergência e Serviços', dur:'21 min', content:`<h3>Situações de Emergência e Serviços</h3><p>Espera-se que você não precise disto, mas é essencial saber como se comunicar em emergências, encontrar serviços médicos, e lidar com situações inesperadas enquanto viaja.</p><h4>Emergências Médicas</h4><p><strong>Muito importante - memorize isto!**<br>"I need a doctor!" (Preciso de um médico!)<br>"Call an ambulance!" (Chame uma ambulância!)<br>"Emergency!" (Emergência!)<br>"I'm hurt!" (Estou ferido!)<br>"I'm in pain!" (Estou com dor!)<br>"I need help!" (Preciso de ajuda!)<br>"What's the emergency number?" (Qual é o número de emergência?)<br>"Hospital - where is it?" (Hospital - onde é?)<br>"Can someone help me?" (Alguém pode me ajudar?)"</p><p><strong>Descrevendo seus sintomas:**<br>"I have a headache." (Tenho dor de cabeça.)<br>"I have a fever." (Tenho febre.)<br>"I feel dizzy." (Sinto-me tonto.)<br>"I feel nauseous." (Sinto-me enjoado.)<br>"I can't breathe." (Não consigo respirar.)<br>"My stomach hurts." (Meu estômago dói.)<br>"I think I broke my leg." (Acho que quebrei minha perna.)<br>"I'm allergic to..." (Sou alérgico a...)<br>"I have a medical condition..." (Tenho uma condição médica...)"</p><p><strong>No hospital/clínica:**<br>"I need to see a doctor." (Preciso ver um médico.)<br>"How much will this cost?" (Quanto vai custar?)<br>"Do you accept insurance?" (Vocês aceitam seguro?)<br>"What's the diagnosis?" (Qual é o diagnóstico?)<br>"What medication do you recommend?" (Qual medicamento você recomenda?)<br>"How should I take this?" (Como devo tomar isto?)<br>"Are there side effects?" (Há efeitos colaterais?)<br>"When should I come back?" (Quando devo voltar?)<br>"Can you write this down?" (Pode escrever isto?)"</p><h4>Perdendo Documentos</h4><p><strong>Se perder passaporte:**<br>"I lost my passport." (Perdi meu passaporte.)<br>"I need to contact my embassy." (Preciso contatar minha embaixada.)<br>"Can you help me?" (Pode me ajudar?)<br>"What should I do?" (O que devo fazer?)<br>"Can I get a temporary travel document?" (Posso pegar um documento de viagem temporário?)<br>"How long will it take?" (Quanto tempo levará?)"</p><p><strong>Contato de emergência:**<br>"I need to call my country's embassy." (Preciso ligar para a embaixada do meu país.)<br>"What's the embassy number?" (Qual é o número da embaixada?)<br>"I need a new passport." (Preciso de um novo passaporte.)<br>"Can you provide a police report?" (Pode fornecer um boletim de ocorrência?)"</p><h4>Roubos e Furtos</h4><p><strong>Se for roubado:**<br>"I've been robbed!" (Fui roubado!)<br>"Someone stole my bag!" (Alguém roubou minha bolsa!)<br>"I need to report a theft." (Preciso reportar um roubo.)<br>"I need the police." (Preciso da polícia.)<br>"What do I do?" (O que faço?)<br>"Can I get a police report?" (Posso pegar um boletim de ocorrência?)<br>"What was stolen:" (O que foi roubado:) [Descrever itens]<br>"I need to contact my insurance." (Preciso contatar meu seguro.)<br>"What's the police station number?" (Qual é o número da delegacia?)"</p><p><strong>Prevenção:**<br>"Is it safe to leave my valuables here?" (É seguro deixar meus valores aqui?)<br>"Do you have a safe?" (Vocês têm um cofre?)<br>"Should I use a money belt?" (Devo usar um cinto de dinheiro?)<br>"Any pickpocket warning?" (Algum aviso sobre carteiristas?)"</p><h4>Problemas de Transporte</h4><p><strong>Voo atrasado ou cancelado:**<br>"My flight is delayed." (Meu voo foi atrasado.)<br>"My flight was cancelled." (Meu voo foi cancelado.)<br>"When is the next flight?" (Quando é o próximo voo?)<br>"Can I get a refund?" (Posso ter um reembolso?)<br>"Are you providing accommodation?" (Vocês estão fornecendo acomodação?)<br>"What are my options?" (Quais são minhas opções?)<br>"Can I get a voucher?" (Posso pegar um vale?)"</p><p><strong>Bagagem perdida:**<br>"I can't find my luggage." (Não consigo encontrar minha bagagem.)<br>"My luggage hasn't arrived." (Minha bagagem não chegou.)<br>"I need to file a claim." (Preciso fazer uma reclamação.)<br>"What do I do now?" (O que faço agora?)<br>"How do I track it?" (Como rastreio?)<br>"How long will it take?" (Quanto tempo levará?)<br>"Can you send it to my hotel?" (Pode enviar para meu hotel?)"</p><h4>Contatos de Emergência Importantes</h4><p><strong>Saiba isto antes de viajar:**<br>- Número de emergência do país (111, 911, 112, etc.)<br>- Endereço e telefone de sua embaixada<br>- Número de seu seguro de viagem<br>- Contato de seu hotel<br>- Número de sua companhia aérea<br><br>Escreva isto em um papel e guarde em seu passaporte!</p><p><strong>Útil saber:**<br>"What's your name?" (Qual é seu nome?)<br>"Can you repeat that?" (Pode repetir?)<br>"Speak slower, please." (Fale mais lentamente, por favor.)<br>"Can you write it down?" (Pode escrever?)<br>"Thank you for your help." (Obrigado pela ajuda.)"</p>`, cards:[{q:"Qual é o primeiro passo se você se machucar?",a:"'I need a doctor!' ou 'Call an ambulance!' ou descubra o número de emergência local imediatamente."},{q:"O que fazer se perder seu passaporte?",a:"Contate imediatamente sua embaixada. 'I lost my passport. I need to contact my embassy.'"},{q:"Como reportar um roubo?",a:"'I've been robbed!' ou 'I need to report a theft' e peça um boletim de ocorrência: 'Can I get a police report?'"}]},
    ],
    summary:{title:"Resumo do Módulo 2: Navegação e Exploração", points:["Para pedir direções, seja educado: 'Excuse me, can you help?' e sempre verifique se a pessoa fala inglês.","Ao explorar, faça perguntas sobre segurança, atrações turísticas, e recomendações locais. Fale com os moradores para aprender sobre a cultura local.","Em compras, negocie polidamente em mercados tradicionais onde é esperado. Em lojas, seja claro sobre o que procura e pergunte sobre políticas de devolução.","Em emergências, saiba os números de emergência e como descrever seus sintomas. Sempre carregue informações de contato de sua embaixada."]},
    quizFinal:[{q:"Como pedir direções educadamente?",opts:["Apenas aponte","'Excuse me, can you help me?'","Fale português","Faça gestos"],correct:1},{q:"O que perguntar sobre um local?",opts:["Nada","'Is it safe?' 'How long does it take?' 'What's the best way to get there?'","Apenas caminhe","Não converse com estranhos"],correct:1},{q:"Como negociar em um mercado?",opts:["Não compre","Comece com uma oferta baixa e suba gradualmente","Pague o preço pedido","Simplesmente saia"],correct:1},{q:"Qual é o número de emergência universal?",opts:["911","112","999","Varia por país - descubra antes"],correct:3},{q:"Se perder seu passaporte, o que fazer?",opts:["Pânico","Contate imediatamente sua embaixada","Compre um novo","Vá direto ao aeroporto"],correct:1},{q:"Como descrever uma dor?",opts:["Não fale nada","'I have pain in...' ou 'My [parte] hurts'","Chore","Espere que melhore"],correct:1},{q:"Como pedir desconto em uma loja?",opts:["Nunca peça","'Is this on sale?' ou 'Do you have a discount?'","Exija","Compre outro lugar"],correct:1},{q:"Se seu voo for cancelado, peça:",opts:["Nada","'When is the next flight?' 'Can I get a refund?' 'What are my options?'","Apenas espere","Reclame agressivamente"],correct:1},{q:"Como comunicar uma alergia em emergência?",opts:["Espere","'I'm allergic to...'","Não fale nada","Apenas mostre"]},

      {id:7, name:'Diferenças Culturais e Etiqueta', dur:'22 min', content:`<h3>Diferenças Culturais e Etiqueta</h3><p>Diferentes culturas têm diferentes expectativas de comportamento, comunicação e respeito. Ser consciente destas diferenças o tornará um viajante mais apreciado e ajudará a evitar constrangimentos.</p><h4>Cumprimentos Apropriados</h4><p><strong>Nos EUA e Canadá:**<br>- Aperto de mão é padrão<br>- "Hi" ou "Hey" é aceitável até em contextos ligeiramente formais<br>- Contato direto dos olhos é importante<br>- Abraços apenas se você conhece bem a pessoa<br>- Distância: cerca de 45cm (braço estendido)</p><p><strong>Na Grã-Bretanha:**<br>- Aperto de mão é formal<br>- "Hello" é mais formal que "Hi"<br>- Menos contato físico que EUA<br>- "How do you do?" é uma saudação formal que requer resposta, não é pergunta genuína<br>- Evite ser muito casual de primeira</p><p><strong>Na Austrália:**<br>- Muito casual e amigável<br>- "G'day mate" é aceitável<br>- Abraços e palmadas nas costas são comuns<br>- Humor é importante<br>- Menos formalidade no geral</p><p><strong>Em geral:**<br>"Nice to meet you." (Prazer em conhecê-lo.)<br>"How do you do?" (Como vai? - Formal)<br>"What's your name?" (Qual é seu nome?)<br>"I'm from Brazil." (Sou do Brasil.)<br>"It's nice to be here." (É legal estar aqui.)"</p><h4>Etiqueta em Diferentes Contextos</h4><p><strong>Em restaurantes:**<br>- Não se apresse. Refeições são para aproveitar, não apenas comer.<br>- Não reclame muito (em algumas culturas, é considerado rude).<br>- Deixe gorjeta apropriada (15-20% nos EUA).<br>- "Thank you so much, this was delicious!" (Muito obrigado, foi delicioso!)<br>- Não peça doggy bag a menos que seja oferecido (em alguns países é normal, em outros é rude).</p><p><strong>Em lojas:**<br>- Pessoas diferentes têm diferentes velocidades de atendimento.<br>- Não assuma que o primeiro "no" é final.<br>- Seja paciente e respeitoso.<br>- "Thank you for your help." (Obrigado pela ajuda.)<br>- "You've been very helpful." (Você foi muito prestativo.)"</p><p><strong>Em transporte público:**<br>- Ofereça seu assento para idosos, grávidas ou pessoas com deficiência.<br>- Não coloque os pés em assentos.<br>- Use fones de ouvido se ouvir música.<br>- Não fale ao telefone em voz alta.<br>- Deixe pessoas saírem antes de entrar.</p><p><strong>Em museus e atrações:**<br>- Respeite as cordas de segurança.<br>- Não toque em artefatos a menos que permitido.<br>- Fale em voz baixa.<br>- Siga as instruções dos guias.<br>- "Thank you for the tour. It was very informative!" (Obrigado pelo passeio. Foi muito informativo!)"</p><h4>Tópicos Sensíveis a Evitar</h4><p><strong>Na conversação casual:**<br>- Evite discutir política de forma agressiva.<br>- Não pergunte quanto alguém ganha (muito pessoal).<br>- Não pergunte sobre a cor da pele ou origem (pode parecer exótico/rude).<br>- Não faça suposições sobre identidade religiosa ou sexual.<br>- Evite críticas ao país que está visitando.<br>- Não brinque sobre a aparência de alguém.</p><p><strong>Conversas seguras:**<br>"Where are you from originally?" (De onde você é originalmente?)<br>"What do you do for work?" (O que você faz para trabalhar?) - mas não pressione<br>"What are your hobbies?" (Quais são seus hobbies?)<br>"What's your favorite restaurant?" (Qual é seu restaurante favorito?)<br>"Have you traveled to...?" (Você já viajou para...?)"</p><h4>Expressões Educadas Essenciais</h4><p><strong>Sempre use:**<br>"Please." (Por favor.)<br>"Thank you." (Obrigado.)<br>"You're welcome." (De nada.)<br>"Excuse me." (Desculpa.) - para ganhar atenção<br>"I'm sorry." (Desculpa.) - para se desculpar<br>"Pardon?" (Como?) - para pedir repetição<br>"I appreciate your help." (Aprecio sua ajuda.)<br>"Thank you so much." (Muito obrigado.)<br>"You've been very kind." (Você foi muito gentil.)"</p><p><strong>Evite:**<br>"Yeah" (use "Yes, please")<br>Não olhar para a pessoa quando fala<br>Interrupções frequentes<br>Estar em seu telefone enquanto conversa<br>Ser muito direto ou blunt (especialmente em culturas mais indiretas)"</p><h4>Compreendendo o Humor e Linguagem Corporal</h4><p><strong>Sobre ironia e sarcasmo:**<br>Inglês (especialmente britânico) usa muito sarcasmo. "Oh, that's brilliant!" pode significar que algo é bom OU uma critica sarcástica.<br><br>"That's brilliant!" (context: positive) - Aquilo é incrível!<br>"Lovely weather we're having..." (context: chovendo) - Adorável tempo que temos... (sarcasmo)</p><p><strong>Linguagem corporal:**<br>- Contato visual direto é importante para mostrar atenção.<br>- Cruzar os braços pode parecer defensivo.<br>- Um sorriso genuíno (Duchenne smile - com rugas nos olhos) é mais apreciado.<br>- Não aponte com um dedo (use gesto aberto da mão).<br>- Dar thumbs up é positivo em culturas ocidentais.</p>`, cards:[{q:"O que é aceitável como saudação em diferentes culturas?",a:"Aperto de mão é padrão. Abraços variam. Sempre siga o lead da outra pessoa."},{q:"Quanto de gorjeta deixar?",a:"Nos EUA e Canadá: 15-20%. Na Grã-Bretanha: 10-15%. Em outros países: pergunta ao hotel."},{q:"O que evitar em conversação?",a:"Evite política, religião, quanto ganha, e críticas ao país que está visitando. Foque em hobbies, viagens, e comida."}]},
      {id:8, name:'Conversação Profunda e Conhecimento Local', dur:'20 min', content:`<h3>Conversação Profunda e Conhecimento Local</h3><p>Uma vez que domina o básico, você pode aprofundar suas conversas com locais, aprender sobre a história e cultura do lugar, e participar de discussões mais significativas.</p><h4>Aprendendo sobre Contexto Local</h4><p><strong>Sobre história e cultura:**<br>"What's the history of this city?" (Qual é a história desta cidade?)<br>"Why is this building important?" (Por que este edifício é importante?)<br>"What's a significant event that happened here?" (Qual é um evento significativo que aconteceu aqui?)<br>"What traditions are important to locals?" (Quais tradições são importantes para os locais?)<br>"How has the city changed over time?" (Como a cidade mudou ao longo do tempo?)<br>"What's the cultural significance of...?" (Qual é a importância cultural de...?)"</p><p><strong>Sobre arquitetura e arte:**<br>"Who designed this building?" (Quem projetou este edifício?)<br>"What architectural style is this?" (Qual é o estilo arquitetônico disto?)<br>"What does this art represent?" (O que esta arte representa?)<br>"Who is the artist?" (Quem é o artista?)<br>"Why was this created?" (Por que isto foi criado?)<br>"How old is this?" (Quantos anos tem isto?)"</p><h4>Conversação Pessoal com Locais</h4><p><strong>Indo além das formalidades:**<br>"How long have you lived here?" (Há quanto tempo você mora aqui?)<br>"Do you like living here?" (Você gosta de morar aqui?)<br>"What's something tourists usually miss?" (O que é algo que turistas geralmente perdem?)<br>"Where do you usually spend your free time?" (Onde você geralmente passa seu tempo livre?)<br>"What's your favorite place in the city?" (Qual é seu lugar favorito na cidade?)<br>"What's changed the most since you were younger?" (O que mudou mais desde que você era mais jovem?)<br>"What would you recommend that's not in the guidebook?" (O que você recomendaria que não está no guia?)"</p><p><strong>Expressando genuíno interesse:**<br>"That's fascinating." (Isso é fascinante.)<br>"I had no idea." (Não tinha ideia.)<br>"Tell me more about that." (Me conte mais sobre isso.)<br>"How interesting!" (Como é interessante!)<br>"I really appreciate you sharing this." (Realmente aprecio você compartilhando isto.)<br>"This is really insightful." (Isto é realmente perspicaz.)"</p><h4>Participando de Eventos Locais</h4><p><strong>Sobre eventos e atividades:**<br>"Is there a local market?" (Há um mercado local?)<br>"When does the festival happen?" (Quando o festival acontece?)<br>"Can I join in?" (Posso participar?)<br>"What should I know about this event?" (O que devo saber sobre este evento?)<br>"Is there an entry fee?" (Há uma taxa de entrada?)<br>"What time does it start?" (Que horas começa?)<br>"Are there any dress codes?" (Há algum código de vestuário?)<br>"What's the best spot to watch from?" (Qual é o melhor lugar para ver de?)"</p><p><strong>Durante o evento:**<br>"This is amazing!" (Isto é incrível!)<br>"Can you explain what's happening?" (Pode explicar o que está acontecendo?)<br>"Why do people celebrate this?" (Por que as pessoas celebram isto?)<br>"Is this a family-friendly event?" (Este é um evento adequado para famílias?)<br>"Can I take photos?" (Posso tirar fotos?)<br>"Thank you for including me." (Obrigado por me incluir.)"</p><h4>Aprendendo Noções Básicas de Linguagem Local</h4><p><strong>Mesmo que você não fale a língua local, aprender algumas frases mostra respeito:**<br>"Hello" (Olá)<br>"Thank you" (Obrigado)<br>"Excuse me" (Desculpa)<br>"I'm sorry" (Desculpa)<br>"Do you speak English?" (Você fala inglês?)<br>"I don't speak [language]." (Não falo [língua].)<br>"What does this mean?" (O que isto significa?)<br>"Can you teach me how to say...?" (Pode me ensinar a dizer...?)<br>"That's how you pronounce it?" (É assim que se pronuncia?)"</p><p><strong>Mostrando apreço pelo esforço:**<br>"I'm trying to learn [language]." (Estou tentando aprender [língua].)<br>"Forgive my accent." (Desculpe meu sotaque.)<br>"Thank you for being patient with me." (Obrigado pela paciência.)<br>"Your English is excellent." (Seu inglês é excelente.)<br>"I really respect that you speak English so well." (Realmente respeito que você fale inglês tão bem.)"</p><h4>Desculpas Genuínas e Recuperação</h4><p><strong>Se ofender acidentalmente:**<br>"I apologize, I didn't mean to..." (Peço desculpas, não pretendia...)<br>"That came out wrong. What I meant was..." (Isso saiu errado. O que quis dizer foi...)<br>"I'm sorry if I offended you." (Desculpe se o ofendi.)<br>"I didn't realize that was inappropriate." (Não percebi que era inapropriado.)<br>"Thank you for correcting me." (Obrigado por me corrigir.)<br>"I'll be more thoughtful." (Vou ser mais cuidadoso.)"</p><p><strong>Se perceber uma gafe cultural:**<br>"I apologize - I didn't understand the cultural significance." (Desculpe - não entendi a importância cultural.)<br>"Can you explain what I got wrong?" (Pode explicar o que errei?)<br>"I appreciate you taking the time to educate me." (Aprecio que tire tempo para me educar.)<br>"I'll remember that for next time." (Vou lembrar disso da próxima vez.)"</p>`, cards:[{q:"Como começar uma conversa profunda com um local?",a:"'What's something tourists usually miss?' ou 'Tell me about the history of this place?' Mostre genuíno interesse."},{q:"Se você ofender alguém, o que fazer?",a:"Peça desculpas genuínas: 'I apologize, I didn't mean to...' e tenha disposição de aprender."},{q:"Como mostrar apreço por alguém que fala inglês bem?",a:"'Your English is excellent.' ou 'I really respect that you speak English so well.'"}]},
      {id:9, name:'Deixando Impressões Positivas e Feedback', dur:'19 min', content:`<h3>Deixando Impressões Positivas e Feedback</h3><p>Como viajante, você deixará uma impressão nos locais que encontra. Aprender a dar feedback positivo, elogios genuínos, e manter relacionamentos é importante.</p><h4>Dando Elogios Genuínos</h4><p><strong>A hotéis e hóspedes:**<br>"This room is wonderful!" (Este quarto é maravilhoso!)<br>"You have excellent service here." (Vocês têm um excelente serviço aqui.)<br>"The staff was so helpful and friendly." (O pessoal foi tão prestativo e amigável.)<br>"I felt very welcomed." (Senti-me muito bem-vindo.)<br>"The food was delicious!" (A comida estava deliciosa!)<br>"This is the best hotel I've stayed in." (Este é o melhor hotel em que me hospedei.)<br>"Thank you for making my stay so comfortable." (Obrigado por tornar minha estadia tão confortável.)"</p><p><strong>A restaurantes e garçons:**<br>"This meal is delicious!" (Esta refeição é deliciosa!)<br>"You have excellent taste in wine pairings." (Vocês têm excelente gosto em harmonização com vinho.)<br>"The service was impeccable." (O serviço foi impecável.)<br>"Your recommendations were perfect." (Suas recomendações foram perfeitas.)<br>"I can tell you care about your work." (Consigo dizer que você se importa com seu trabalho.)<br>"Thank you for making our dinner special." (Obrigado por tornar nossa ceia especial.)"</p><p><strong>A guias turísticos:**<br>"You're an excellent guide." (Você é um guia excelente.)<br>"Your knowledge is impressive." (Seu conhecimento é impressionante.)<br>"I learned so much from you." (Aprendi muito com você.)<br>"You made this tour so engaging." (Você tornou este passeio tão envolvente.)<br>"Thank you for sharing your passion for this place." (Obrigado por compartilhar sua paixão por este lugar.)<br>"I will definitely recommend you to others." (Definitivamente vou recomendá-lo para outros.)"</p><h4>Deixando Reviews Online</h4><p><strong>Construir uma reputação online positiva para hospedagens e restaurantes:**<br>"I had an amazing experience here." (Tive uma experiência incrível aqui.)<br>"The staff went above and beyond." (O pessoal foi além do esperado.)<br>"Highly recommend!" (Altamente recomendado!)<br>"Worth every penny." (Vale cada centavo.)<br>"Would definitely stay here again." (Definitivamente ficaria aqui novamente.)<br>"Perfect location and friendly staff." (Localização perfeita e pessoal amigável.)<br>"One minor issue: [something], but overall excellent." (Um pequeno problema: [algo], mas no geral excelente.)<br>"I appreciate the hotel's effort to..." (Aprecio o esforço do hotel para...)"</p><p><strong>Feedback construtivo:**<br>"Great place, but could improve on..." (Ótimo lugar, mas poderia melhorar em...)<br>"The service was good, though there was a small wait." (O serviço foi bom, embora houvesse uma pequena espera.)<br>"Overall excellent, with one suggestion..." (No geral excelente, com uma sugestão...)<br>"I appreciated X, but wish there was..." (Apreciei X, mas gostaria que houvesse...)"</p><h4>Mantendo Contato</h4><p><strong>Se fez amigos:**<br>"I really enjoyed meeting you." (Realmente gostei de te conhecer.)<br>"Can I have your contact information?" (Posso ter suas informações de contato?)<br>"I'd love to stay in touch." (Gostaria de manter contato.)<br>"Let's exchange numbers/emails." (Vamos trocar números/emails.)<br>"I'll send you photos from our time together." (Vou enviar fotos de nosso tempo juntos.)<br>"When you visit Brazil, let me know!" (Quando você visitar o Brasil, me avise!)<br>"This has been one of the highlights of my trip." (Esta foi uma das melhores partes da minha viagem.)"</p><p><strong>Mantendo relacionamento virtual:**<br>"I've arrived back home safely, thank you for everything!" (Cheguei em casa com segurança, obrigado por tudo!)<br>"I'm thinking of you and remembering our time together." (Estou pensando em você e lembrando de nosso tempo juntos.)<br>"Your hospitality was exceptional." (Sua hospitalidade foi excepcional.)<br>"I hope we can meet again someday." (Espero que possamos nos encontrar novamente um dia.)<br>"Thank you for making my trip unforgettable." (Obrigado por tornar minha viagem inesquecível.)"</p><h4>Entendo Feedback Recebido</h4><p><strong>Se alguém lhe der crítica:**<br>"I appreciate your feedback." (Aprecio seu feedback.)<br>"Thank you for pointing that out." (Obrigado por apontar isso.)<br>"I'll remember that for next time." (Vou lembrar disso da próxima vez.)<br>"I understand, and I apologize." (Entendo, e peço desculpas.)<br>"How can I improve?" (Como posso melhorar?)<br>"Your insight is valuable." (Sua perspectiva é valiosa.)"</p><p><strong>Se receber elogios:**<br>"Thank you so much, that means a lot." (Muito obrigado, isso significa muito.)<br>"I'm glad you enjoyed it." (Fico feliz que você tenha apreciado.)<br>"Your kindness is much appreciated." (Sua gentileza é muito apreciada.)<br>"It was my pleasure." (Foi um prazer meu.)<br>"Thank you for taking the time to tell me." (Obrigado por tirar tempo para me dizer.)"</p><h4>Despedidas Significativas</h4><p><strong>Última noite/dia:**<br>"I can't believe our time together is ending." (Não consigo acreditar que nosso tempo junto está acabando.)<br>"This has been truly special." (Isto foi verdadeiramente especial.)<br>"Thank you for everything you've done." (Obrigado por tudo o que você fez.)<br>"I will never forget this." (Nunca vou esquecer isto.)<br>"You've made this trip unforgettable." (Você tornou esta viagem inesquecível.)<br>"Safe travels!" (Viagem segura!)<br>"I hope our paths cross again." (Espero que nossos caminhos se cruzem novamente.)<br>"Thank you for sharing this journey with me." (Obrigado por compartilhar esta jornada comigo.)"</p>`, cards:[{q:"Como elogiar genuinamente um restaurante ou guia?",a:"'Your service was impeccable.' ou 'You're an excellent guide. I learned so much.' Seja específico!"},{q:"Como deixar feedback online positivo?",a:"'I had an amazing experience here. The staff went above and beyond. Highly recommend!'"},{q:"Como se despedir significativamente de alguém que conheceu?",a:"'This has been truly special. Thank you for everything. I hope our paths cross again.'"}]},
    ],
    summary:{title:"Resumo do Módulo 3: Cultura e Feedback", points:["Compreenda diferenças culturais em saudações, etiqueta e tópicos de conversação. Sempre respeite o que é importante localmente.","Aprenda o básico sobre história, cultura e tradições do lugar. Mostrar genuíno interesse ganha respeito e conexões mais profundas.","Dê elogios genuínos e feedback construtivo. Deixar reviews positivos ajuda pequenos negócios e mostra apreciação.","Mantenha relacionamentos significativos e despedidas genuínas. As pessoas lembram de viajantes que foram respeitosos e apreciadores."]},
    quizFinal:[{q:"Qual é a saudação apropriada em diferentes contextos?",opts:["Sempre 'Hi'","'Hello' formal, 'Hi' casual - varia por cultura","Apenas aperto de mão","Não cumprimente"],correct:1},{q:"O que evitar em conversação casual?",opts:["Falar de comida","Falar de política de forma agressiva","Falar sobre hobbies","Falar sobre viagem"],correct:1},{q:"Como elogiar um serviço?",opts:["Apenas diga 'ok'","'Your service was impeccable' ou 'Thank you for going above and beyond'","Reclame","Não comente"],correct:1},{q:"Qual é o significado de sarcasmo britânico?",opts:["Sempre positivo","Às vezes positivo, às vezes crítica dependendo do contexto","Nunca sarcasmo","Sempre negativo"],correct:1},{q:"Como deixar review positivo?",opts:["Não deixe","'I had an amazing experience. Highly recommend!'","'It was okay'","Reclame"],correct:1},{q:"Se você ofender alguém, o que fazer?",opts:["Ignore","'I apologize, I didn't mean to...'","Culpe a pessoa","Deixe passar"],correct:1},{q:"Como iniciar conversa profunda com local?",opts:["Não fale","'What's something tourists usually miss?' ou 'Tell me the history'","Apenas faça compras","Fique em seu quarto"],correct:1},{q:"Como se despedir significativamente?",opts:["Apenas diga 'bye'","'This has been truly special. Thank you. I hope we meet again.'","Sem despedida","Reclame"],correct:1},{q:"Qual é o impacto de aprender noções básicas da língua local?",opts:["Não importa","Mostra respeito e aprecia a cultura local","É desnecessário","É complicado"]}]
  }
];
