        id: 'pib1',
        name: 'O que é PIB e Como é Calculado',
        content: '<h4>Entendendo o PIB</h4><p>O Produto Interno Bruto (PIB) é <strong>o indicador mais importante da saúde econômica de um país</strong>. Ele mede o valor total de todos os bens e serviços produzidos dentro das fronteiras de um país em um período (geralmente 1 ano). Quando o PIB cresce, significa a economia está se expandindo e há mais riqueza sendo gerada.</p><p>Existem <strong>três formas de calcular o PIB</strong>. A abordagem da despesa soma consumo das famílias, investimento das empresas, gastos do governo e exportações menos importações. A abordagem da renda soma salários, lucros e juros de toda a economia. A abordagem da produção soma o valor agregado em cada etapa da produção. Todas devem dar o mesmo resultado.</p><blockquote class="tip">Para entender a economia do Brasil, você deve saber que nosso PIB cresce em média 2-3% ao ano. Quando cresce menos de 2%, a economia está lenta. Quando cresce acima de 4%, é considerado muito bom. Crescimento negativo significa recessão - economia contraindo.</blockquote><p>O <strong>PIB per capita é o PIB dividido pela população</strong>. O Brasil tem PIB total de ~2 trilhões de reais, mas população de ~215 milhões, resultando em PIB per capita de ~9.300 reais por ano (~770 reais/mês). Isso explica por que muitos brasileiros ganham pouco - a economia total não gera tanta riqueza por pessoa.</p><blockquote class="example">Em 2022, o PIB do Brasil cresceu 2% (R$ 40 bilhões de valor agregado). Parece muito, mas dividido entre 215 milhões de pessoas, significa apenas ~R$ 186 per capita de novo valor. Para 1 pessoa, isso é ~R$ 15 a mais por mês. Você percebe por que crescimento de 2% não muda vidas? Precisa de crescimento acumulado por anos.</blockquote><p>Você deve entender que <strong>nem todo crescimento é igual</strong>. Crescimento de PIB que vem de consumo temporário (financiado por dívida) é menos sustentável que crescimento vindo de investimento produtivo. Brasil cresceu muito no passado com consumo, mas isso criou dívida que depois prejudicou crescimento futuro.</p><blockquote class="news">O Brasil tem potencial de PIB muito maior. Países asiáticos como Vietnã crescem 6-7% ao ano. Se o Brasil crescesse assim por 20 anos, seria país muito mais rico. O desafio é que crescimento requer investimento em infraestrutura, educação e política monetária estável - exatamente o que Brasil tem dificuldade em fazer.</blockquote>'

        content: '<h4>Por Que os Preços Sobem</h4><p>Inflação é <strong>o aumento contínuo dos preços de bens e serviços</strong>. Quando há 10% de inflação, aquilo que custava R$ 100 agora custa R$ 110. Isso reduz seu poder de compra - você consegue comprar menos com o mesmo dinheiro. A inflação é uma das maiores inimigas da população pobre, porque afeta mais quem vive com margem pequena de renda.</p><p>As <strong>causas da inflação são complexas</strong>. Inflação de custos ocorre quando custos de produção aumentam (salários, petróleo). Inflação de demanda ocorre quando há muito dinheiro perseguindo poucos bens. Inflação de importação ocorre quando o dólar sobe. No Brasil, temos um pouco de tudo, mas a inflação de importação é significativa porque importamos muitos bens.</p><blockquote class="tip">Você deve pensar em inflação quando faz investimentos. Se deixar R$ 10.000 em poupança ganhando 5% ao ano mas há 8% de inflação, você está perdendo poder de compra. Seus R$ 10.500 do próximo ano valem apenas ~R$ 9.660 em poder de compra de hoje. Inverso: investimentos que rendem acima da inflação fazem você ficar mais rico.</blockquote><p>O Brasil tem <strong>histórico de inflação alta e volatilidade inflacionária</strong>. Nos anos 80/90, havia inflação de 100-1000% ao ano! Isso causou danos enormes à economia. Hoje, com sistema de metas de inflação (o Banco Central tenta manter inflação entre 2.5% e 5.5%), a inflação é controlada mas ainda existe.</p><blockquote class="example">Você tem R$ 1.000 e precisa decidir: guardar em dinheiro ou investir em um título que rende 5% ao ano. Se há 3% de inflação, guardar em dinheiro significa você perde 3% de poder de compra. Se investe no título, ganha 5% - 3% = 2% real. Parece pequeno, mas após 10 anos: R$ 1.000 em dinheiro vale ~R$ 740 (3% inflação acumulada). R$ 1.000 investido vale ~R$ 1.220 (5% rendimento acumulado). Diferença: R$ 480!</blockquote><p>A <strong>inflação também afeta quem tem dívidas</strong>. Se pegou R$ 10.000 emprestado a taxa fixa de 5% ano, e há 8% de inflação, a dívida diminui em valor real. Você devolverá R$ 10.500 mas aquilo vale menos em poder de compra. Portanto, inflação alta beneficia devedores.</p><blockquote class="news">A inflação no Brasil em 2023-2024 ficou em ~7%, bem acima da meta do Banco Central (4%). Isso prejudicou poder de compra dos salários. Para você ganhar poder de compra, seu salário precisa subir mais que a inflação. A maioria dos brasileiros não consegue isso, perdendo poder de compra a cada ano.</blockquote>'

        name: 'Câmbio, Dólar e Moedas Estrangeiras',
        content: '<h4>Entendendo a Taxa de Câmbio</h4><p>O câmbio é a <strong>taxa de conversão entre moedas diferentes</strong>. Quando você vê "dólar a R$ 5,00", significa que 1 dólar americano vale 5 reais brasileiros. O dólar é importante para o Brasil porque usamos dólares em transações internacionais (exportações, importações, empréstimos).</p><p>A taxa de câmbio <strong>afeta toda a economia brasileira</strong>. Quando o dólar sobe (real enfraquece), as importações ficam mais caras. A gasolina fica mais cara (porque é cotada em dólares). Produtos importados ficam mais caros. Isso aumenta inflação. Também beneficia exportadores porque vendem dólares que valem mais.</p><blockquote class="tip">Para economistas, o dólar em R$ 5 é "caro" e em R$ 3 é "barato". Quando o dólar sobe muito (acima de R$ 5.50), as autoridades ficam preocupadas com inflação. Quando cai muito (abaixo de R$ 3.50), prejudica exportadores. O nível "ideal" do dólar para o Brasil é ~R$ 4-4.50.</blockquote><p>O câmbio é determinado por <strong>oferta e demanda de dólares</strong>. Quando estrangeiros querem investir no Brasil, precisam de reais, oferecendo dólares. Isso faz o dólar cair. Quando brasileiros querem investir no exterior, precisam de dólares, demandando dólares. Isso faz o dólar subir. Investimentos estrangeiros saindo do Brasil (fuga de capital) faz dólar subir muito.</p><blockquote class="example">Imagine que há crise política no Brasil. Investidores estrangeiros começam a sair. Todos tentam converter reais em dólares ao mesmo tempo. Demanda por dólares sobe muito. Oferta de reais cresce. O dólar que estava em R$ 4.50 sobe para R$ 6.00. Agora gasolina sobe 30%, produtos importados mais caros. Inflação cresce. Você perde poder de compra. Tudo por causa de fuga de capital.</blockquote><p><strong>A volatilidade do câmbio é problema para o Brasil</strong>. Enquanto desenvolvidos têm câmbio estável, o Brasil tem câmbio muito volátil. Isso prejudica planejamento de empresas. Se você é exportador, não sabe qual será o preço da sua venda em reais 3 meses na frente. Se você é importador, não sabe qual será o custo em reais. Instabilidade prejudica crescimento econômico.</p><blockquote class="news">Pesquisadores mostram que um dos principais fatores que mantém Brasil como país de renda média (não se torna desenvolvido) é a instabilidade macroeconômica: câmbio volátil, inflação alta, crescimento incerto. Países que controlaram essas variáveis (como Chile, Coréia do Sul) se tornaram desenvolvidos. Brasil ainda luta com isso.</blockquote>'

 Brasil está nessa segunda situação, com trajetória insustentável.</p><blockquote class="news">Economistas divergem sobre quando Brasil terá crise de dívida. Alguns dizem que falta crédito e há crise iminente. Outros dizem que Brasil aguenta dívida maior porque tem instituições fortes. O que todos concordam é que se não cortar despesas ou aumentar arrecadação, dívida vai crescer para nível perigoso em 10-15 anos.</blockquote>'

      {
        id: 'cola',
        name: 'Colônia, Império e Primeira República',
        content: '<h4>As Origens Econômicas do Brasil</h4><p>A economia brasileira começou como <strong>economia de exploração no período colonial</strong>. Portugal extraía ouro, açúcar e outras commodities para enriquecer a metrópole, deixando Brasil pobre. Essa mentalidade de "extrair sem reinvestir" permaneceu por séculos na forma de latifúndio e agricultura de exportação.</p><p>No <strong>Império (1822-1889), a economia dependia do café</strong>. Café representava 70% das exportações. A economia era agrária, latifundiária e escravista. Quando o preço do café caía, economia caía. Quando subia, economia subia. Isso criou vulnerabilidade econômica que persiste até hoje: exportar commodities com preço volátil.</p><blockquote class="tip">Brasil ainda é vulnerável a preços de commodities. Quando ouro, ferro, café, soja têm preço alto, economia cresce. Quando caem, economia sofre. Isso é herança do período colonial. Países desenvolvidos criaram indústrias de valor agregado alto. Brasil ainda extrai commodities baixas.</blockquote><p>A <strong>Primeira República (1889-1930) tentou diversificação</strong> com indústria. Mas era muito lenta e competia contra países desenvolvidos muito mais fortes. A estrutura de poder ainda era agrária (oligarquia do café). Quando crise de 1929 chegou, Brasil entrou em colapso porque dependia de exportações de café.</p><blockquote class="example">Em 1929, preço do café despencou. Brasil tinha trilhões de sacas de café para vender mas ninguém queria comprar por preço ridículo. A economia entrou em depressão. Desemprego alto. Pobreza. Fome. Apenas na década de 1930-40, com industrialização de Vargas, Brasil conseguiu sair disso.</blockquote><p>A lição histórica é que <strong>economias de monocultura (uma commodity) são frágeis</strong>. Quando a commodity enfrenta crise global de preço, todo o país sofre. Países desenvolvidos têm múltiplas fontes de renda (indústria diversificada, serviços, tecnologia). Brasil ainda depende muito de commodities.</p><blockquote class="news">Brasil é um dos maiores exportadores de commodities do mundo: soja, café, minério de ferro, petróleo, açúcar. Quando esses preços caem (o que acontece frequentemente), economia brasileira sofre. Isso explica volatilidade e dificuldade de crescimento consistente que vemos.</blockquote>'

        id: 'var2',
        name: 'Era Vargas, Desenvolvimentismo e Industrialização',
        content: '<h4>Quando o Brasil Tentou se Industrializar</h4><p>Getúlio Vargas (1930-1945, depois 1950-1954) foi <strong>o primeiro presidente a tentar realmente industrializar o Brasil</strong>. Criou políticas protecionistas, investiu em indústria nacional, e estabeleceu a ideia de que Brasil deveria deixar de ser "latifúndio agrário" e virar país industrial.</p><p>O desenvolvimentismo era a <strong>filosofia de que governo deveria direcionar economia para desenvolvimento</strong>. Substituição de importações: em vez de importar produtos industrializados, Brasil produziria. Criou BNDES (Banco de Desenvolvimento) para financiar indústrias. Funcionou! Brasil cresceu e se industrializou.</p><blockquote class="tip">O desenvolvimentismo funcionou nos anos 1950-1970 porque havia demanda mundial, preços de commodities altos, e Brasil tinha espaço para crescer. Mas ficou obsoleto. Quando mundo abriu economia (anos 80-90), estratégia de substituição de importações não competiu. Brasil perdeu espaço para Ásia.</blockquote><p>A <strong>era dourada foi 1950-1980</strong>. Brasil crescia 5-7% ao ano. Classe média crescia. Infraestrutura se expandia. Brasília foi construída. Indústria automóvel foi criada (Volkswagen, GM). Açúcar se transformou em etanol. Foi período de otimismo.</p><blockquote class="example">Um trabalhador em 1960 ganhava R$ 100 (em valores atualizados). Sua vida era simples mas estável. Economizava e podia comprar uma casa. Seus filhos tinham acesso a educação pública boa. 30 anos depois, em 1990, seu neto ganhava R$ 500, mas a vida era mais cara, educação pública piorou, moradia ficou inacessível. Mostra que crescimento econômico não beneficiou igualmente.</blockquote><p>O <strong>desenvolvimentismo criou problema que persiste: protecionismo excessivo</strong>. Indústrias brasileiras nunca foram realmente competitivas internacionalmente. Eram competitivas apenas dentro do mercado protegido. Quando mercado abriu nos anos 80-90, muitas indústrias quebraram.</p><blockquote class="news">Historiadores divergem se desenvolvimentismo foi bom ou ruim. Uns dizem que industrializou o Brasil e criou classe média. Outros dizem que criou indústrias ineficientes e dependentes de crédito estatal. O que é certo: a transição para economia aberta nos anos 80-90 foi dolorosa.</blockquote>'

      {
        id: 'crj1',
        name: 'Crises Financeiras e Estabilização',
        content: '<h4>O Caos da Inflação e a Estabilização</h4><p>Brasil viveu <strong>crises econômicas severas nos anos 70 e 80</strong>. A crise do petróleo (1973) elevou custos. Inflação disparou. Governo imprimiu dinheiro para financiar dívida. Inflação explodia (100-300% ao ano). Salários perdiam valor constantemente. Pobreza cresceu enormemente.</p><p>Os <strong>anos 80 foram "a década perdida"</strong>. Não houve crescimento real por 10 anos. Pobreza aumentou. Classe média diminuiu. Desemprego atingiu níveis altos. Dizia-se que Brasil nunca sairia do buraco. Havia quem predisse colapso total da economia.</p><blockquote class="tip">Viver em inflação acelerada é muito diferente de viver em estabilidade. Você precisa gastar dinheiro rápido porque em dias perde valor. Poupança é punida (você perde poder de compra). Investimentos de longo prazo são impossíveis. Toda economia fica focada em curto prazo. É muito desgastante.</blockquote><p>A <strong>solução veio com o Plano Real (1994)</strong>. Brasil trocou de moeda (de Cruzeiro para Real) e implantou disciplina fiscal. Inflação foi controlada. Poder de compra se estabilizou. A economia respirou. Crescimento voltou. Classe média voltou a crescer. Foi um turning point.</p><blockquote class="example">Um aposentado em 1990 recebia uma pensão que era suficiente por 1-2 meses. Depois inflação acelerada e pensão não subia no mesmo ritmo. Precisava trabalhar outro emprego para sobreviver. Economia inteira era voltada para tentar não perder com inflação. Após Plano Real, pensão voltava a ter valor, ele podia viver com dignidade, planejava futuro.</blockquote><p>Mas <strong>o Brasil ainda era vulnerável a crises externas</strong>. Crise da Ásia (1997), crise da Rússia (1998), câmbio flutuante (1999) traziam volatilidade. Era melhor que os anos 80, mas longe da estabilidade de países desenvolvidos.</p><blockquote class="news">O Plano Real é considerado um dos maiores sucessos da política econômica brasileira. Controlou a hiper-inflação e permitiu plano real. Mas não resolveu problemas estruturais: dívida pública, gastos públicos altos, falta de investimento em educação/infraestrutura.</blockquote>'

        content: '<h4>A Festa Acabou</h4><p>De 2000-2010, o Brasil viveu período extraordinário chamado de <strong>"boom de commodities"</strong>. China crescia rapidamente e demandava soja, ferro, petróleo. Preços disparavam. Brasil, como grande produtor, ficou rico. Crescimento de PIB médio de 4-5% ao ano. Desemprego caiu. Classe média cresceu.</p><p>Nesses <strong>anos "dourados" (2003-2010), a pobreza caiu de 35% para 22%</strong> da população. Milhões de brasileiros entraram na classe C. Consumo explodiu. Crédito fluxava facilmente. Otimismo era enorme. Alguns acreditavam que Brasil finalmente "decolaria".</p><blockquote class="tip">Você deve aprender que ciclos econômicos são cíclicos. Quando algo é bom, as pessoas assumem que vai continuar para sempre. Mas toda expansão tem limite. Quando demanda externa cai, economia que depende de exportações entra em crise. Brasil não aprendeu essa lição.</blockquote><p>Mas <strong>após 2010, preços de commodities começaram a cair</strong>. China desacelerou. Oferta global de soja e ferro aumentou. Preços caíram 40-60%. As receitas de exportação do Brasil despencaram. E o governo, em vez de economizar, continuou gastando como se a festa não acabasse.</p><blockquote class="example">Uma soja que custava $15 por bushel em 2010 caía para $8 em 2015. Um fazendeiro que investiu em maquinaria esperando preços altos, descobre que colher não é viável. Precisa demitir funcionários. Deixa de gastar na cidade. A cidade entra em crise. Desemprego volta. Pobreza sobe novamente.</blockquote><p>De 2015-2020, Brasil <strong>entrou em estagnação econômica</strong>. Crescimento médio de 0.5% ao ano (praticamente nulo). Desemprego subiu de 5% para 12%. Pobreza volta a crescer. Lições dos anos 80 foram esquecidas. Uma geração de brasileiros que nasceu durante boom descobriu desemprego e crise.</p><blockquote class="news">Economistas apontam que Brasil desperdiçou o boom de commodities. Deveria ter economizado (feito fundo soberano), investido em educação/infraestrutura, e controlado despesas públicas. Em vez disso, gastou tudo com consumo e folha de pagamento pública. Quando preços caíram, não havia "poupanças para tempos ruins".</blockquote>'

        content: '<h4>Quem Controla o Dinheiro do Brasil</h4><p>O Banco Central do Brasil (Bacen) é <strong>responsável pela política monetária e estabilidade do sistema financeiro</strong>. Quando você ouve "Banco Central subiu taxa de juros", significa que Bacen tomou uma decisão que afeta toda a economia. O governador do Bacen é tão influente quanto o presidente para a economia.</p><p>O Bacen tem <strong>três objetivos principais</strong>: controlar inflação, manter estabilidade do sistema financeiro, e promover emprego/crescimento. Frequentemente esses objetivos conflitam. Se sobe taxa para controlar inflação, prejudica crescimento. Bacen precisa balancear.</p><blockquote class="tip">Você deve entender que o Bacen é relativamente independente do presidente. Isso é bom porque evita que presidente use economia para ganhar eleição e depois prejudique o país. Mas também significa que decisões do Bacen podem ser impopulares (subir juros prejudica economia no curto prazo).</blockquote><p>O Bacen <strong>controla a oferta de dinheiro na economia</strong>. Se há muito dinheiro perseguindo poucos bens, inflação sobe. Se há pouco dinheiro, economia desacelera. O Bacen ajusta a oferta de dinheiro através de várias ferramentas. A mais importante é a taxa de juros básica (Selic).</p><blockquote class="example">Suponha inflação sobe para 8% (meta é 4%). Bacen pensa: "Há dinheiro demais na economia". Bacen sobe a Selic de 10% para 12%. Isso torna mais caro emprestar dinheiro. Empresas investem menos. Pessoas gastas menos (porque crédito é caro). Demanda cai. Inflação volta para 4%. Mas desemprego subiu porque empresas investiram menos.</blockquote><p>Além de Selic, Bacen também controla <strong>compulsório (quanto banco precisa guardar de reservas) e liquide de banco</strong>. Pode fazer operações de mercado aberto (compra/venda de títulos). Pode regular o sistema bancário.</p><blockquote class="news">A estrutura do Bacen é incomum: tem presidente indicado pelo presidente da república, mas mandato é maior que mandato presidencial, dando independência. Isso causou conflitos: em 2021-2022, presidente queria reduzir taxa de juros mas governador do Bacen manteve alta. Eleitor sofreu consequências.</blockquote>'

        content: '<h4>O Número Mais Importante da Economia</h4><p>A Selic é a <strong>taxa de juros básica que o Banco Central estabelece</strong>. Quando você lê "Selic subiu para 13.75%", isso afeta toda a economia: seus empréstimos, seu investimento, seus gastos. A Selic é como o "termostato" que regula a temperatura econômica.</p><p>A lógica é: se Selic é alta (13.75%), então:</p><p>- Banco oferece alta rentabilidade em poupança/investimentos (você quer poupar)</p><p>- Crédito fica caro (você não quer emprestar)</p><p>- Gastos caem (porque crédito caro desestimula consumo)</p><p>- Inflação cai (demanda menor)</p><p>Ao contrário, se Selic é baixa (5%):</p><p>- Poupança oferece pouca rentabilidade (você não quer poupar)</p><p>- Crédito fica barato (você quer emprestar)</p><p>- Gastos sobem (crédito barato estimula consumo)</p><p>- Inflação sobe (demanda maior)</p><blockquote class="tip">Como pessoa física, Selic alta é bom para seus investimentos (renda fixa rende mais) mas ruim se você tem dívidas (juros de cartão/empréstimo são mais altos). Selic baixa é ruim para investimentos mas bom se você tem dívidas. Ambiguidade é por isso que Selic é tão política.</blockquote><p>Muitas <strong>taxas de juros na economia seguem a Selic</strong>. Taxa de poupança fica ~70% da Selic. Taxa do cheque especial fica muito acima (30%+). Financiamento imobiliário fica um pouco acima. Não é que sejam exatamente iguais, mas existe correlação clara.</p><blockquote class="example">Selic está em 10%. Poupança rende ~7% ao ano. Você tem R$ 10.000. Deixa em poupança, ganha R$ 700 em 1 ano. Depois Selic cai para 5%, poupança rende ~3.5%. Você recebe R$ 350. Metade do rendimento! Isso afeta decisões de poupança/consumo de toda população.</blockquote><p>Brasil tem <strong>uma das maiores Selic do mundo</strong>. Enquanto EUA tem taxa de 5-6%, Brasil está em 10-13%. Por quê? Porque inflação no Brasil é estruturalmente mais alta, e mercado exige taxa maior para compor. Também porque Brasil tem risco maior de default.</p><blockquote class="news">Taxa Selic alta é um dos grandes problemas do Brasil. Afasta investimento estrangeiro (porque há melhor oportunidade em país desenvolvido com risco menor). Encarece dívida pública (governo paga juros altos). Prejudica crescimento (crédito caro desestimula empresas). Mas sem Selic alta, inflação sairia do controle.</blockquote>'

guem crédito barato para investir. Pessoas não conseguem crédito barato para consumir ou investir. Isso limita o potencial de crescimento. Um dos principais fatores para Brasil não se desenvolveu é o sistema de crédito caro.</blockquote>'

      {
        id: 'orgp',
        name: 'Orçamento Público e Alocação de Recursos',
        content: '<h4>Como o Governo Gasta Seu Dinheiro</h4><p>O orçamento público é <strong>um plano que mostra onde governo arrecada dinheiro (impostos) e onde gasta</strong>. Todo ano, governo aprova novo orçamento. Ele deve ser votado no Congresso. O orçamento mostra prioridades do governo: quanto gasta em educação vs defesa, saúde vs transporte.</p><p>O orçamento brasileiro tem <strong>três principais categorias de gastos</strong>: (1) Despesas obrigatórias (aposentadorias, benefícios) = 50-55% do orçamento. (2) Despesas discricionárias (educação, saúde, infraestrutura) = 15-20%. (3) Despesas com juros da dívida = 8-10%. O resto são outros gastos.</p><blockquote class="tip">O grande problema do Brasil é que 50%+ do orçamento é obrigatório. Governo não pode cortar porque está legalmente vinculado. Isso deixa pouco espaço para investimento. Aposentadorias devem ser pagas, benefícios devem ser pagos. Educação, saúde e infraestrutura lutam por migalhas.</blockquote><p>As <strong>despesas obrigatórias crescem automaticamente porque população envelhece</strong>. Mais aposentados = mais custos. Benefícios aumentam com inflação automaticamente. Folha de pagamento de servidores públicos aumenta com inflação. Enquanto economia cresce 2% ao ano, despesas crescem 4-5% ao ano. Déficit é inevitável.</p><blockquote class="example">Governo estabelece que todo aposentado recebe mínimo = salário mínimo. Em 2020, 32 milhões de aposentados custavam R$ 600 bilhões/ano. Em 2024, salário mínimo subiu 30%, custo sobe para ~R$ 780 bilhões. Governo não votou para gastar mais com aposentados, mas gastou. Déficit aumenta automaticamente.</blockquote><p>Um conceito importante é <strong>"gasto público em educação"</strong>. Brasil gasta ~6% do PIB em educação (valor razoável), mas distribuição é desigual. Universidades federais (que servem principalmente classe média/alta) recebem muito. Escolas públicas (que servem pobres) recebem pouco. Isso perpetua desigualdade.</p><blockquote class="news">Debate sobre orçamento público é permanente: deve-se investir em educação/saúde ou controlar déficit? Esquerda diz investir em serviços. Direita diz controlar déficit. A realidade é ambos são necessários, mas Brasil não consegue fazer. Resultado: educação/saúde ruins, déficit ainda alto.</blockquote>'

      {
        id: 'imps',
        name: 'Impostos, Arrecadação e Tributação',
        content: '<h4>De Onde Vem o Dinheiro do Governo</h4><p>Governo arrecada dinheiro principalmente através de <strong>impostos sobre renda, impostos sobre consumo, e impostos sobre propriedade</strong>. No Brasil, arrecadação total é ~20% do PIB. Nos EUA é ~27%. Países europeus desenvolvidos ficam em 30-40%. Brasil arrecada menos que desenvolvido mas mais que países em desenvolvimento pobres.</p><p>O <strong>sistema tributário brasileiro é complexo e regressivo</strong>. Regressivo significa que pobres pagam maior percentual de sua renda em impostos comparado a ricos. Exemplo: Imposto sobre consumo (ICMS, PIS, COFINS) fica em ~27% do preço final. Um pobre que gasta 100% de sua renda em consumo paga 27% em impostos. Um rico que gasta apenas 50% de sua renda paga ~13.5%.</p><blockquote class="tip">Você deve entender que governo brasileiro arrecada muito, mas gasta tudo (e mais) rapidamente. O problema não é falta de arrecadação, é excesso de gasto. Aumentar impostos ainda mais criaria resistência e afastaria investimento. A solução é controlar gastos, especialmente despesas obrigatórias.</blockquote><p>Os <strong>principais impostos brasileiros</strong> são: (1) Imposto de Renda (IR) - 7.5-27.5% sobre renda. (2) ICMS - ~18% sobre consumo. (3) IPI - imposto sobre produtos industrializados. (4) PIS/COFINS - ~9.25% sobre consumo. (5) Imposto Predial (IPTU) - sobre propriedade imobiliária. (6) IRPF sobre ganhos de capital.</p><blockquote class="example">Um trabalhador ganha R$ 2.000/mês. Paga ~15% em IR = R$ 300. Também paga ~27% em impostos de consumo em tudo que compra. Se gasta R$ 1.700 em consumo, paga ~R$ 459 em impostos indiretos. Total de impostos: R$ 759 / R$ 2.000 = 38% de sua renda!</blockquote><p>O <strong>problema de arrecadação é distribuição desigual</strong>. Conta bancária das pessoas físicas é fácil rastrear, então IR é cobrado eficientemente. Pequenas empresas evitam impostos (informal, subnotificação). Grandes empresas conseguem brechas legais. Resultado: tributação é desigual e injusta.</p><blockquote class="news">Brasil gasta ~R$ 4 trilhões/ano em impostos, mas a população sente que governo não fornece serviços de qualidade. Isso cria descontentamento e menor disposição de pagar impostos. Para quebrar esse ciclo, seria necessário: (1) gastar melhor, (2) combater corrupção, (3) ser mais eficiente. Nenhum acontecendo rápido.</blockquote>'

        id: 'dfd2',
        name: 'Reforma Fiscal e Medidas de Austeridade',
        content: '<h4>Tentativas de Equilibrar as Contas</h4><p>Várias vezes, governo brasileiro tentou reformas para controlar déficit fiscal. Uma das mais importantes foi a <strong>Emenda Constitucional 95 (Teto de Gastos) em 2016</strong>. Ela estabelecia que gastos federais não podiam crescer acima da inflação ao longo de 20 anos. Objetivo: impedir que déficit explodisse.</p><p>O teto de gastos <strong>funcionou teoricamente em conter crescimento absoluto, mas na prática prejudicou serviços</strong>. Saúde, educação, infraestrutura sofreram cortes. Desemprego subiu. Crescimento desacelerou. População sofreu. Muitos dizem que austeridade foi contraproducente - enquanto governo cortava, dívida continuava crescendo porque receitas caíram (desemprego = menos IR).</p><blockquote class="tip">Debate moderno em economia é se austeridade funciona. Lado "austeridade": se continuar gastando, dívida explode, vira crise. Lado "desenvolvimentismo": cortes prejudicam crescimento, receitas caem, déficit piora. Ambos têm ponto. O difícil é achar equilíbrio.</blockquote><p>Outra tentativa foi <strong>reforma da previdência (2019)</strong>. Aumentou idade mínima de aposentadoria, aumentou anos de contribuição necessários. Objetivo: reduzir custo de aposentadorias. Funcionou, mas resistência foi enorme. Servidor público e trabalhadores enfrentaram dificuldades.</p><blockquote class="example">Um trabalhador que previa se aposentar aos 62 anos após 30 anos de contribuição, foi "reformado" para 62 anos após 35 anos de contribuição (ou 65 anos após 30 anos). Muitos trabalhadores não conseguem trabalhar até 65 (saúde). Reforma previdenciária prejudicou esse grupo, mesmo que em longo prazo fosse necessária.</blockquote><p>Medidas de austeridade são <strong>politicamente impopulares mas economicamente "necessárias" quando dívida sai do controle</strong>. Governo enfrenta dilema: fazer cortes impopulares agora ou deixar dívida explodir e entrar em crise (muito pior).</p><blockquote class="news">Consenso entre economistas é que Brasil precisa de reforma fiscal maior: reforma tributária (simplificar impostos), reforma da previdência (mais profunda), e controle de gastos públicos. Mas reforma é extremamente difícil politicamente. Cada grupo defende seus benefícios. Resultado: faz-se nada e dívida cresce.</blockquote>'

        id: 'dcs2',
        name: 'Desigualdade e Distribuição de Renda',
        content: '<h4>O Problema Estrutural Brasileiro</h4><p>Brasil é um dos <strong>países mais desiguais do mundo</strong>. O índice de Gini (medida de desigualdade: 0=perfeita igualdade, 1=perfeita desigualdade) do Brasil é ~0.54. Comparação: EUA 0.41, Europa 0.30, China 0.47. Isso significa que Brasil distribui renda muito desigualmente.</p><p>A <strong>desigualdade brasileira tem raízes históricas</strong>. Período colonial deixou estrutura de latifúndio e escravidão que persiste. Escravidão foi abolida em 1888, mas negros não receberam educação, terra ou capital. Permaneceram pobres. Seus filhos e netos também pobres. Ciclo de pobreza se perpetua.</p><blockquote class="tip">Você deve saber que desigualdade extrema prejudica crescimento econômico. População pobre não consegue investir em educação dos filhos (ficam pobres). Não consegue abrir negócio (sem capital). Não consegue consumir (sem renda). Potencial econômico fica não realizado. Um Brasil mais igual seria mais rico.</blockquote><p>Os <strong>20% mais ricos ganham ~58% da renda nacional</strong>. Os 50% mais pobres ganham apenas 10%. A renda média de um rico (~R$ 15.000/mês) é ~30 vezes a de um pobre (~R$ 500/mês). Essa disparidade é enorme e causa problemas sociais: violência, falta de saúde mental, crime.</p><blockquote class="example">Uma criança nascida em família rica: vai para escola particular boa, recebe aulas de reforço, vai para universidade federal (concorrência menor para ricos por qual?), consegue estágio em empresa grande, consegue trabalho bem remunerado, compra casa, enriquece. Uma criança nascida em família pobre: vai para escola pública ruim, sem reforço, não consegue passar em universidade (prova difícil), fica desempregada ou subempregada, vive em aluguel precário, permanece pobre.</blockquote><p>Políticas de <strong>redistribuição (imposto progressivo, bolsa família, cotas) tentam reduzir desigualdade</strong>. Funcionam parcialmente. Bolsa Família reduziu extrema pobreza, mas não eliminou desigualdade estrutural. Cotas aumentaram diversidade em universidades, mas sistema continua desigual.</p><blockquote class="news">Debate político é acalorado: esquerda diz aumentar redistribuição (mais bolsa família, impostos mais altos para ricos). Direita diz que redistributribuição prejudica crescimento. Pesquisas mostram que moderada redistribuição aumenta crescimento (igualdade de oportunidades). Brasil precisaria tanto de redistribuição quanto de crescimento econômico.</blockquote>'

      {
        id: 'bnc1',
        name: 'Exportações, Importações e Balança Comercial',
        content: '<h4>Brasil no Comércio Global</h4><p>A balança comercial é a <strong>diferença entre o que um país exporta e o que importa</strong>. Se exporta mais que importa, há superávit. Se importa mais, há déficit. A balança comercial afeta o valor da moeda: superávit fortalece a moeda (mais demanda por ela), déficit enfraquece.</p><p>Brasil <strong>historicamente tem superávit comercial</strong> porque exporta muitas commodities (soja, ferro, café, petróleo). Em 2022, exportou ~US$ 280 bilhões e importou ~US$ 230 bilhões, superávit de US$ 50 bilhões. Esse superávit é importante - traz dinheiro para o país.</p><blockquote class="tip">Um superávit comercial não é automaticamente "bom". Se você exporta commodities baratas (alto volume, baixo preço) e importa produtos de valor agregado alto (baixo volume, alto preço), você está trocando muita coisa por pouca coisa. Brasil faz exatamente isso: exporta soja a R$ 100/saco, importa máquina a R$ 1 milhão.</blockquote><p>As <strong>principais exportações do Brasil</strong> são: soja (US$ 30 bilhões/ano), minério de ferro (US$ 25 bilhões), petróleo/derivados (US$ 20 bilhões), celulose (US$ 15 bilhões), açúcar (US$ 10 bilhões). Tudo commodities. Valor agregado baixo. Emprego gerado é limitado.</p><blockquote class="example">China exporta produtos eletrônicos de alto valor agregado (smartphone a US$ 800 com 70% margem). Brasil exporta soja (US$ 350/tonelada com 15% margem). Para ganhar US$ 1 bilhão de lucro, China vende ~2 milhões de smartphones (2 milhões de trabalhadores especializados). Brasil vende ~10 milhões de toneladas de soja (envolve ~500 mil trabalhadores + máquinas). Brasil emprega mais para ganhar menos.</blockquote><p>As <strong>principais importações do Brasil</strong> são: equipamentos e máquinas (US$ 30 bilhões), combustíveis refinados (US$ 20 bilhões), produtos químicos (US$ 15 bilhões), componentes eletrônicos (US$ 10 bilhões). Tudo valor agregado alto. Essas importações são necessárias para indústria brasileira funcionar.</p><blockquote class="news">Uma crítica comum é que Brasil deveria "industrializar mais" e "exportar produtos acabados". Mas isso é difícil porque: (1) países desenvolvidos já produzem isso melhor/mais barato. (2) requer investimento em tecnologia e pesquisa que Brasil não faz. (3) mano de obra brasileira custa 3-5x menos que desenvolvida, atraindo commodities.</blockquote>'

        id: 'trt1',
        name: 'Tratados Comerciais e Mercosul',
        content: '<h4>Relações Comerciais Internacionais</h4><p>Um tratado comercial é <strong>um acordo entre países para reduzir barreiras (impostos) sobre comércio</strong>. Brasil é membro do Mercosul (mercado comum sul-americano) e tem vários tratados bilaterais. Esses tratados facilitam comércio mas também expõem indústria doméstica a competição.</p><p>O <strong>Mercosul foi criado em 1991</strong> e reúne Brasil, Argentina, Uruguai e Paraguai. O objetivo era criar bloco comercial similar à União Europeia. Funcionou parcialmente: comércio intra-bloco aumentou de 5% para 15% das exportações. Mas nunca se tornou tão integrado quanto UE.</p><blockquote class="tip">Tratados comerciais têm "vencedores e perdedores". Setores competitivos do país ganham acesso a novo mercado (bem). Setores não competitivos enfrentam concorrência (mal). No Brasil, setor agrícola ganhou muito com liberalização (exporta para mundo). Indústria tradicional perdeu (competição chinesa).</blockquote><p>Brasil tem também <strong>acordo bilateral com UE que foi negociado mas ainda não ratificado</strong>. Se aprovado, Brasil teria acesso a mercado europeu, mas teria de aceitar padrões ambientais muito altos (Brasil teria de reduzir desmatamento). Há debate: vale a pena ou não?</p><blockquote class="example">Agricultor brasileiro exporta soja: sem tratado paga 15% de tarifa na UE = soja sai a US$ 425/ton. Com tratado não paga tarifa = soja sai a US$ 500/ton. Ganho: US$ 75/ton × milhões toneladas = bilhões de ganho. Mas acordo exige redução de desmatamento na Amazônia. Agricultor pensa: "Ganho dinheiro curto prazo, mas perco terra que poderia desflorestar".</blockquote><p><strong>China é o maior parceiro comercial do Brasil</strong>, não Mercosul. China compra 30%+ das exportações e vende 20% das importações. Essa dependência é preocupante se relações piorarem. Também causa vulnerabilidade a ciclos econômicos chineses.</p><blockquote class="news">Debate atual no Brasil é sobre ratificar acordo UE-Mercosul. Ambientalistas contro (exigem redução desmatamento). Agricultores favor (ganham com mercado europeu). Indústria teme competição europeia. Governo está dividido. Acordo está "congelado" há anos sem votação.</blockquote>'

      {
        id: 'inv1',
        name: 'Investimento Estrangeiro e Fuga de Capital',
        content: '<h4>Dinheiro Entrando e Saindo do Brasil</h4><p>Investimento estrangeiro direto (IDE) é quando <strong>estrangeiros compram empresas, imóveis ou fazem negócios no Brasil</strong>. Exemplo: Toyota construir fábrica no Brasil, Coca-Cola comprar marca brasileira. IDE traz dinheiro, cria empregos, transfere tecnologia. É muito importante para crescimento.</p><p>Brasil recebe ~US$ 30-50 bilhões/ano de IDE (varia com ciclo econômico e credibilidade política). Comparação: China recebe US$ 150-200 bilhões/ano. Vietnã recebe US$ 20-30 bilhões/ano. Brasil deveria receber mais considerando tamanho. Por quê recebe menos? Insegurança jurídica, burocracia, volatilidade macroeconômica.</p><blockquote class="tip">Para atrair IDE, país precisa de: (1) Estabilidade macroeconômica. (2) Segurança jurídica (contrato respeitado). (3) Mão de obra qualificada. (4) Infraestrutura boa. (5) Juros não muito altos. Brasil tem problemas em todos. Resultado: menos IDE que deveria.</blockquote><p>O <strong>lado negativo do IDE é dependência e "fuga de lucro"</strong>. Empresa estrangeira que investe no Brasil manda lucros para exterior. Isso enfraquece câmbio (precisa de dólares). Também significa que lucro fica com estrangeiro, não brasileiro. Brasil ganha emprego, mas lucro sai.</p><blockquote class="example">Coca-Cola investe US$ 1 bilhão no Brasil abrindo fábrica. Cria 5 mil empregos (bem). Mas a fábrica produz bebidas que rendem US$ 500 milhões/ano de lucro. A Coca-Cola manda US$ 300 milhões desse lucro para matriz nos EUA. Brasil ganha apenas US$ 200 milhões. O lucro "de verdade" fica com americanos.</blockquote><p>A <strong>"fuga de capital" acontece quando brasileiros tiram dinheiro do país</strong>. Pode ser legal (comprar dólar, investir no exterior) ou ilegal (corrupção, lavagem de dinheiro). Fuga de capital acontece quando: (1) Há incerteza política/econômica. (2) Juros no exterior são altos. (3) Há oportunidades no exterior. (4) Há insegurança no Brasil.</p><blockquote class="news">Estimativas indicam que brasileiros mantêm ~US$ 400-500 bilhões no exterior (contas privadas, imóveis, empresas). Se esse dinheiro estivesse no Brasil, seria 5-7% do PIB investido. Fuga de capital é um dos grandes drenadores de recursos da economia brasileira.</blockquote>'

        id: 'dvs1',
        name: 'Diversificação Econômica e Desindustrialização',
        content: '<h4>Brasil Precisa Inovar, Não Apenas Exportar Commodities</h4><p>Um dos grandes problemas de Brasil é <strong>baixa diversificação econômica</strong>. Exporta commodities. Importa manufaturados. Não tem indústria de tecnologia/valor agregado. Isso limita crescimento porque commodities têm baixo margem, preço volátil, emprego baixo.</p><p>Pior ainda, Brasil sofre de <strong>"desindustrialização"</strong>. Nos anos 80-90, Brasil tinha indústria respeitável. Mas com abertura de mercado, indústria não competiu com China. Fábricas fecharam. Empregos industriais caíram. Hoje Brasil é menos industrial que era 30 anos atrás. Tem menos emprego de qualidade.</p><blockquote class="tip">Para sair de "armadilha de commodities", Brasil precisaria investir em: (1) Educação (tecnólogos, engenheiros). (2) Pesquisa (universidades, startups). (3) Infraestrutura de TI/logística. (4) Incentivos para indústria de valor agregado. Nenhum desses acontecendo. Resultado: continua exportando commodities.</blockquote><p>Um setor que Brasil está tentando desenvolver é <strong>tecnologia/startups</strong>. São Paulo tem "silicon valley" própria com startups de fintech, delivery, marketplaces. Esses negócios geram valor agregado alto. Mas ainda é pequeno comparado ao tamanho da economia.</p><blockquote class="example">Uma startup de fintech brasileira (como Nubank) consegue atingir valuation de bilhões de dólares e criar milhares de empregos bem remunerados. Comparado a fazenda de soja que exporta centenas de milhões de dólares. A startup realmente traz mais valor à sociedade.</blockquote><p>Diversificação também significa <strong>reduzir dependência de um parceiro comercial (China)</strong>. Se Brasil tem 30% das exportações para China, e China entra em recessão, Brasil sofre. Seria melhor ter múltiplos parceiros (EUA, UE, Ásia, Mercosul).</p><blockquote class="news">Estudos mostram que países que conseguem se diversificar economicamente crescem mais e com menos volatilidade. Brasil é caso de estudo de país que NÃO conseguiu se diversificar. A razão é que commodities são lucrativas no curto prazo (agricultores podem ficar ricos rápido), então não há incentivo para mudar. Mas Brasil como país fica mais pobre porque lucro sai do país.</blockquote>'

      {
        id: 'pbrz',
        name: 'Pobreza, Classe Média e Mobilidade Social',
        content: '<h4>Quem Vive de Quê no Brasil</h4><p>A pobreza no Brasil é definida como <strong>renda mensal abaixo de ~R$ 600/pessoa</strong> (valor varia). Extrema pobreza é abaixo de ~R$ 300. Classe baixa é R$ 600-R$ 1.500. Classe média é R$ 1.500-R$ 5.000. Classe alta é acima de R$ 5.000. Essa classificação não é científica, mas útil para visualizar estratificação.</p><p>Atualmente, <strong>Brasil tem ~11% em extrema pobreza (25 milhões de pessoas)</strong> e ~32% em pobreza/classe baixa (70 milhões de pessoas). Isso significa que 40%+ da população ganha menos de R$ 600/mês. A classe média é ~45% da população, classe alta é apenas ~15%.</p><blockquote class="tip">Você deve entender que viver com R$ 600/mês no Brasil é quase impossível com dignidade. Aluguel em cidade grande é R$ 400-600 sozinho. Reste R$ 0-200 para tudo: comida, transporte, saúde, educação. Isso explica por quê pobreza perpetua - não há dinheiro para investir em educação dos filhos.</blockquote><p>A <strong>mobilidade social é baixa no Brasil</strong>. Filho de pobre tem 40-50% de chance de permanecer pobre. Filho de rico tem 70-80% de chance de permanecer rico. Isso contrasta com países desenvolvidos onde mobilidade é maior. Brasil está "preso" em termos sociais.</p><blockquote class="example">Dois meninos nascem no Brasil em 1990: um em família de milionário, outro em família ganhando R$ 500/mês. Após 20 anos: menino rico vai para universidade boa, consegue trabalho em multinacional ganhando R$ 20.000/mês. Menino pobre deixa escola aos 14 anos para trabalhar, ganha R$ 1.500/mês como balconista. Diferença de renda: 13x. Oportunidades foram completamente diferentes.</blockquote><p>O <strong>"boom da classe média" (2000-2010) expandiu classe média de 30% para 50% da população</strong>. Muitos pobres conseguiram melhorar de vida através de educação, emprego formal, crédito. Gerou otimismo. Mas desde 2015, classe média encolhe novamente (desemprego, recessão).</p><blockquote class="news">Pesqui         name: 'Educação como Motor de Desenvolvimento',
        content: '<h4>Investindo em Futuro</h4><p>Educação é <strong>o fator número um para sair da pobreza</strong>. Uma criança que completa ensino superior tem renda 3-5x maior que quem completou apenas ensino fundamental. Mas educação de qualidade é privilégio de ricos no Brasil. Escolas públicas são ruins, particulares são caras.</p><p>O <strong>Brasil gasta ~6% do PIB em educação (bom), mas resultado é ruim</strong>. Por quê? Distribuição desigual. Universidades federais (principalmente classe média/alta) recebem muito. Escolas públicas de ensino fundamental (pobres) recebem pouco. Resultado: educação que deveria reduzir desigualdade a amplia.</p><blockquote class="tip">Se você é filho de pobre, sua única chance de educação boa é ser exceção (nota alta no ENEM, bolsa em particular, ou cotas em universidade federal). Maioria não consegue. Resultado: ciclo de pobreza perpetua.</blockquote><p>Um conceito importante é <strong>"capital humano"</strong>. Países desenvolvidos têm população muito educada. Isso permite: trabalhos de alta produtividade, inovação, salários altos. Brasil tem população com educação baixa. Resultado: trabalhos de baixa produtividade, pouca inovação, salários baixos.</p><blockquote class="example">Um econometrista brasileiro com PhD em economia consegue vender seu trabalho por R$ 500/hora (expertise alta). Um brasileiro com ensino fundamental consegue vender seu trabalho por R$ 30/hora (expertise baixa). Diferença: 17x de produtividade. Um país de PhDs é mais rico que um país de analfabetos.</blockquote><p>Iniciativas de inclusão educacional incluem <strong>provas com cotas para pobres/negros, Enem para entrar em universidade federal, bolsa permanência</strong>. Elas ajudam, mas não resolvem: qualidade da educação básica continua ruim. Precisaria: melhorar escolas públicas, pagar melhor professores, investir em infraestrutura.</p><blockquote class="news">Pesquisadores da UNESCO mostram que Brasil está anos atrás em qualidade educacional. Aluno brasileiro médio está 2-3 anos de atraso comparado a aluno de país desenvolvido de mesma idade. A razão é baixo financiamento de escolas, professores mal pagos, alunos com problemas sociais (fome, violência). Não é "genética" ou "cultura", é estrutura.</blockquote>'

      {
        id: 'sd1d',
        name: 'Saúde, Bem-Estar e Desenvolvimento Humano',
        content: '<h4>Viver Bem, Não Apenas Ganhar Dinheiro</h4><p>Desenvolvimento não é apenas renda. O <strong>Índice de Desenvolvimento Humano (HDI) combina renda, educação e expectativa de vida</strong>. Um país pode ter PIB alto mas HDI baixo se população é analfabeta ou vive pouco. Brasil tem HDI de 0.754 (rankagem 87º mundial). Comparação: EUA 0.921, China 0.768, Bolívia 0.718.</p><p>A <strong>expectativa de vida em Brasil é 76 anos</strong> (boa). Mas há disparidade: homem pobre, 72 anos. Mulher rica, 82 anos. Pobreza reduz expectativa de vida porque: menos acesso a saúde, pior nutrição, mais violência.</p><blockquote class="tip">Sistema de saúde brasileiro (SUS) é universal (todo mundo tem acesso). Isso é excelente. Mas é subfinanciado (falta dinheiro) e sobrecorrido (muita gente). Resultado: atendimento lento, qualidade variável, espera de meses para procedimentos. Quem pode, paga por saúde privada.</blockquote><p>Brasil tem <strong>grandes problemas de saúde pública</strong>. Violência é a primeira causa de morte de homens jovens (facadas, tiros). Alcoolismo é problema. Obesidade aumenta. Depressão/ansiedade crescem. Há também doenças negligenciadas (dengue, zika) que afetam mais pobres.</p><blockquote class="example">Um homem pobre de 25 anos em favela tem 10% de chance de ser assaltado/atacado por ano. 5% de chance de ser preso por envolvimento com crime. Esperança de vida real é ~70 anos (não 76 da média). Já um homem rico de 25 anos: expectativa de vida 82 anos. Diferença de 12 anos vem de violência/estresse/saúde.</blockquote><p>Saúde mental é <strong>grande tabu em Brasil</strong> e problema crescente. Antidepressivos são prescritos cada vez mais. Suicídio é principal causa de morte em adolescentes. Cultura brasileira ainda tem estigma contra saúde mental.</p><blockquote class="news">OMS (Organização Mundial de Saúde) alerta que Brasil terá epidemia de doenças mentais (depressão, ansiedade) se não investir em prevenção/tratamento. A causa: desigualdade, violência, insegurança, desemprego, todos estressores que prejudicam saúde mental.</blockquote>'

        id: 'inf1',
        name: 'Infraestrutura e Acesso a Serviços',
        content: '<h4>Brasil Funciona Bem? Nem Sempre</h4><p>Infraestrutura é a <strong>base física que permite economia funcionar: estradas, portos, aeroportos, energia, água</strong>. Brasil tem infraestrutura inadequada em várias áreas. Estradas têm buracos. Portos são antigos. Energia é cara. Água é racionada em períodos de seca.</p><p>Uma <strong>pesquisa do Fórum Econômico Mundial ranking infraestrutura</strong> coloca Brasil em ~110º lugar (ruim). Comparação: Chile 30º, Argentina 54º, Colômbia 80º, Paraguai 85º. Brasil está atrás de vizinhos em infraestrutura.</p><blockquote class="tip">Infraestrutura ruim prejudica competitividade de empresas brasileiras. Uma empresa que exporta soja: pega em estrada com buracos (atraso), chega a porto congestionado (atraso), espera meses para navio (atraso). Custos de logística 30% do custo final. Comparado a Argentina com infraestrutura melhor, Brasil é menos competitivo.</blockquote><p>Investimento em infraestrutura é <strong>historicamente baixo no Brasil</strong>. Governo investe apenas ~2% do PIB em infraestrutura (deveria ser 3-4%). Resultado: rodovias deterioram, ferrovias são poucas, aeroportos são poucas. Constrói-se pouco novo porque gasto público vai para despesas correntes (folha de pagamento).</p><blockquote class="example">Uma estrada federal que conecta São Paulo a Brasília está cheia de buracos e acidentes. Consertá-la custaria R$ 5 bilhões. Governo tem dinheiro, mas prefere usar nos salários de servidores. Estrada piora, acidentes aumentam (perde-se vidas), economia fica menos competitiva. Mas governo não consegue cortar folha de pagamento por pressão política.</blockquote><p><strong>Acesso a serviços é desigual no Brasil</strong>. Morador de favela: não tem saneamento decente, eletricidade é precária, gás não chega. Morador de bairro nobre: tudo isso + internet de alta velocidade, gás, agua tratada. Essa desigualdade em acesso a serviços básicos é vergonha para país de renda média-alta.</p><blockquote class="news">Um paradoxo brasileiro: país exporta billhões em commodities, mas moradores de bairros pobres vivem sem saneamento básico. Saneamento decente (água limpa + esgoto tratado) deveria ser direito humano básico. Falta mostra que arrecadação grande, mas prioridades erradas.</blockquote>'

      {
        id: 'crs1',
        name: 'Crises Cíclicas e Recuperação Econômica',
        content: '<h4>Padrões de Ciclos Econômicos</h4><p>Economia não cresce em linha reta. Há ciclos: expansão (crescimento), pico, contração (recessão), fundo, e volta a expansão. Brasil está nesse ciclo há séculos. A Grande Depressão (1929), a crise dos anos 80, a crise de 1998, a recessão 2015-2020. Cada crise ensina lições, mas Brasil frequentemente as esquece.</p><p>O <strong>padrão de crise brasileira é similar</strong>: (1) Boom de commodity ou crédito fácil. (2) Governo e empresas desperdiçam/investem erradamente. (3) Câmbio se desvalori</p><p>za. (4) Inflação sobe. (5) Banco Central levanta juros. (6) Economia contrai, desemprego sobe, pobreza volta. (7) Após 3-5 anos, recuperação lenta.</p><blockquote class="tip">Se você entender que ciclos econômicos são inevitáveis, você se prepara para crises. Poupança durante boom, investe na recessão quando preços caem, oferece flexibilidade ao emprego durante recessão. Brasil sofre porque maioria pensa que boom continua para sempre.</blockquote><p><strong>Recuperação econômica após crise requer</strong>: (1) Controle de inflação/moeda (Banco Central independente). (2) Austeridade fiscal temporária (cortar gastos). (3) Reformas estruturais (previdência, tributária). (4) Investimento em educação/infraestrutura para longo prazo. Brasil raramente consegue fazer tudo junto.</p><blockquote class="example">Após recessão 2015-2020, Brasil começou recuperação em 2021-2022. Crescimento de PIB ~4-5%, desemprego caiu, pobreza caiu. Parecia que tudo ia bem. Mas governo e população pensaram "boom voltou" e aumentaram gastos. Agora vê-se que expansão foi apenas recuperação para nível pré-recessão, não crescimento novo. Volta de dificuldades já é esperada.</blockquote><p>A <strong>questão para Brasil é: será que próxima crise será melhor ou pior?</strong> Se houver reforma fiscal (controle dívida), próxima crise será menor. Se dívida continuar crescendo, próxima crise pode ser colapso.</p><blockquote class="news">Economistas debatem se Brasil terá crise fiscal iminente (1-3 anos) ou se ainda tem tempo (5-10 anos). O que é certo: sem reformas estruturais, crise é inevitável. Quando acontecer, será severa porque dívida e desemprego estarão altos.</blockquote>'

      {
        id: 'refm',
        name: 'Reformas Necessárias e Consenso',
        content: '<h4>O Que Brasil Precisa Fazer</h4><p>Existe consenso entre economistas (esquerda e direita) sobre <strong>o que Brasil precisa fazer</strong>: (1) Reforma tributária (simplificar impostos, reduzir para empresas de inovação). (2) Reforma da previdência (aumentar contribuição, idade mínima). (3) Redução de gastos públicos (folha de pagamento). (4) Investimento em educação/infraestrutura. (5) Combate à corrupção.</p><p>O problema é que <strong>todas as reformas têm oposição política</strong>. Reforma tributária: pequeno varejo se opõe. Reforma previdenciária: servidor público se opõe. Redução de gastos: servidores/beneficiários se opõem. Investimento em educação: disputa por onde investir. Combate à corrupção: políticos não querem.</p><blockquote class="tip">Você deve entender que reforma é sempre impopular no curto prazo (sacrifício) mas necessária no longo prazo (benefício). Brasil escolhe o curto prazo (ficar popular agora, deixar crise para depois). Resultado: sempre posterga e dívida piora.</blockquote><p>Uma reform que foi tentada é <strong>reforma da previdência (2019)</strong>. Foi feita parcialmente. Ajudará, mas não resolve. Brasil precisa de reforma mais profunda: talvez sistema de capitalização (cada um investe seu próprio dinheiro) em vez de sistema de repartição (ativo paga inativo).</p><blockquote class="example">Sistemas de previdência são sustentáveis quando: (1) Taxa de natalidade alta (muitos ativos para poucos inativos). (2) Expectativa de vida baixa (inativos vivem pouco). Brasil tem ambas caindo: população envelhecendo, expectativa de vida subindo. Sistema de repartição é insustentável. Precisa mudar.</blockquote><p>Outra reforma necessária é <strong>educação</strong>. Brasil investe em quantidade mas não em qualidade. Precisaria: aumentar salário de professores 50%, reduzir tamanho de classes, investir em infraestrutura escolar, melhorar qualidade de ensino. Isso custaria ~1% extra do PIB/ano, mas geraria retorno de 5-7% do PIB em 30 anos através de maior produtividade.</p><blockquote class="news">Pesquisa do Banco Mundial mostra que Brasil perde ~20% do PIB potencial por causa de deficiências em educação, saúde e instituições. Se resolvesse esses problemas, PIB seria 20% maior = cada pessoa seria 20% mais rica. Mas isso requer paciência (resultado em 20-30 anos) e Brasil quer resultado rápido.</blockquote>'

        name: 'Tecnologia, Inovação e Oportunidades Futuras',
        content: '<h4>Como Brasil Pode Crescer Diferente</h4><p>O <strong>futuro da economia global é tecnologia: inteligência artificial, biotecnologia, energia renovável</strong>. Países que investem nessas áreas crescerão. Brasil tem potencial, mas investe pouco em pesquisa.</p><p>Brasil tem <strong>vantagens em certos setores</strong>: (1) Biocombustíveis/etanol - Brasil é líder mundial. (2) Agricultura de precisão - sistema de pivô/drone/sensores. (3) Fintech - já tem startups valiosas (Nubank, Mercado Livre). (4) Energia renovável (hidrelétrica, eólica, solar) - Brasil tem potencial.</p><blockquote class="tip">Em vez de apenas exportar soja bruta, Brasil poderia: processá-la, criar produtos derivados, usar tecnologia de precisão para aumentar rendimento. Valor agregado aumentaria 10x. Emprego mudaria de "fazendeiro" para "tecnólogo agrícola" (salário maior).</blockquote><p>O setor de <strong>energia renovável é grande oportunidade</strong>. Brasil tem potencial em solar (nordeste), eólica (litoral), e hidroeletricidade. Com tecnologia de bateria (já melhorando), Brasil poderia ser exportador de energia limpa. Isso criaria empregos tecnológicos bem remunerados.</p><blockquote class="example">Suponha Brasil desenvolve tecnologia de bateria eficiente e barata. Poderia: (1) Vender baterias para mundo. (2) Produzir energia renovável e vender para vizinhos. (3) Atrair indústrias eletrônicas que precisam energia limpa. (4) Tornar-se hub de tecnologia verde. Valor agregado seria enormíssimo.</blockquote><p>O grande risco é que Brasil <strong>continue apenas exportando commodities enquanto mundo avança em tecnologia</strong>. China, Vietnã, Índia estão construindo indústrias de tecnologia. Se Brasil não consegue acompanhar, fica "trancado" em commodity trap indefinidamente.</p><blockquote class="news">O Fórum Econômico Mundial publica Índice de Competitividade Global anualmente. Brasil é rankado ~75º (entre 133 países). Está atrás de Chile, Uruguai, México. Razão: baixa inovação, infraestrutura ruim, educação fraca. Para subir no ranking, Brasil precisa de reformas e investimento em tecnologia.</blockquote>'

        name: 'Aposentadoria, Poupança e Planejamento Pessoal',
        content: '<h4>Protegendo Seu Futuro</h4><p>Enquanto Brasil tenta crescer, você precisa proteger seu futuro pessoal. Uma das maiores crises é <strong>falta de poupança entre brasileiros</strong>. Maioria não tem reserva de emergência (3 meses de salário). Quando perdem emprego, entram em dívida rápido.</p><p>A <strong>aposentadoria brasileira é realidade assustadora para muitos</strong>. INSS paga ~R$ 1.320 de mínimo (equivalente a ~R$ 400 de poder de compra após inflação). Muitos trabalhadores formais conseguem mais, mas valor é modesto. Trabalhadores informais (45% da força de trabalho) frequentemente não contribuem o suficiente e precisam trabalhar até morte.</p><blockquote class="tip">Para se proteger: (1) Comece a poupar cedo (tempo é seu melhor amigo). (2) Invista em educação (aumenta renda futura). (3) Contribua para INSS ou sistema privado. (4) Invista em renda fixa (títulos, CDB) acima da inflação. (5) Diversifique (não coloque tudo em uma fonte de renda).</blockquote><p>Uma estratégia comum é <strong>PGBL (Plano Gerador de Benefício Livre) ou VGBL (Vida Gerador de Benefício Livre) para poupança de aposentadoria</strong>. Você investe mensalmente, consegue redução de IR (PGBL), e no futuro recebe como aposentadoria complementar.</p><blockquote class="example">Você tem 30 anos e contribui R$ 1.000/mês em PGBL. Após 35 anos (até 65 anos), terá investido ~R$ 420.000. Com retorno de 7% ao ano (acima de inflação), ao final terá ~R$ 2 milhões. Uma aposentadoria de R$ 10.000/mês seria possível com essa estratégia.</blockquote><p>O <strong>erro mais comum é não começar cedo</strong>. Juros compostos são amigo do investidor de longo prazo. Se você espera até 50 anos para começar a poupar, é muito tarde. O tempo perdido não volta.</p><blockquote class="news">Uma pesquisa mostra que 70% dos aposentados brasileiros têm renda abaixo de R$ 2.000/mês (incluindo INSS + poupança). Muitos trabalham na informalidade até morte. A razão: não pouparam quando jovens, e quando velhos não há tempo para recuperar.</blockquote>'
