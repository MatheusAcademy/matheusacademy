        title: 'Conceitos Básicos e História',
        html: '<h4>O Que é Cibersegurança?</h4><p>Cibersegurança é a prática de proteger seus sistemas, redes e dados contra ataques digitais. Você usa computador, smartphone, acessa internet: todos estão vulneráveis a ataques. Cibersegurança é seu escudo.</p><p>Por que importa? Porque tudo que é valioso está digital agora. Seu dinheiro está em banco digital. Suas fotos estão na nuvem. Seus documentos estão em email. Se alguém acessa esses, você está em risco: roubo de identidade, fraude financeira, exposição de privacidade.</p><h4>Evolução da Ameaça</h4><p>Nos anos 1980-90, hackers eram "hobbyistas": exploravam vulnerabilidades por curiosidade, criavam vírus para chamar atenção. Robert Morris criou o primeiro "worm" (vírus auto-replicante) em 1988 para provar vulnerabilidade da internet. Resultou em crime, multa.</p><p>Nos anos 2000, mudou. Ataques ficaram criminosos: roubo de dados, extorsão, fraude. Em 2005, aproximadamente 40 milhões de números de cartão de crédito foram roubados da TJX Companies (empresa de varejo). Em 2013, 3 bilhões de Yahoo accounts foram hackeados.</p><blockquote><strong>Estatística Chocante:</strong> Em 2023, aproximadamente 2,5 bilhões de dados foram expostos globalmente em violações. Isso significa que ~30% da população mundial teve seus dados vazados. Você provavelmente está nessa lista.</blockquote><p>Hoje, ataques são sofisticados, patrocinados por governos (espionagem), por criminosos (lucro), por hacktivistas (protesto). Um ataque pode custar uma empresa milhões de reais em recuperação, multas regulatórias, perda de reputação.</p><h4>A Tríade de Cibersegurança</h4><p>Cibersegurança se baseia em 3 pilares: Confidencialidade (seu dado não pode ser visto por outro), Integridade (seu dado não pode ser alterado), Disponibilidade (seu sistema sempre funciona). Você queria CIA: Confidentiality, Integrity, Availability.</p><p>Um ataque de roubo de dados violarConfidencialidade. Um ataque que altera seu banco de dados viola Integridade. Um ataque que derruba seu servidor (DDoS) viola Disponibilidade. Você precisa proteger os três.</p>'
      },
      {
        id: 'atks',
        title: 'Tipos de Ataque Comum',
        html: '<h4>Phishing: O Ataque Mais Comum</h4><p>Phishing é quando alguém se faz passar por empresa legítima para roubar seus dados. Você recebe email: "Seu banco detectou atividade suspeita. Clique aqui para confirmar identidade." É falso, é phishing.</p><p>Você clica no link (que leva a site falso que parece seu banco). Digite sua senha. Hacker tem a senha. Sua conta é comprometida. Transferem dinheiro para conta dele.</p><p>Phishing funciona porque explora confiança. Você confia no seu banco. Criminoso se faz passar pelo banco. Você baixa guarda. Você é vítima.</p><blockquote><strong>Exemplo Real:</strong> Em 2023, campanha de phishing focou em clientes de NuBank. Email dizia: "Atualizar informações de segurança". Link levava a site falso que clonava login do NuBank. 10.000+ usuários caíram na armadilha, contas foram hackeadas.</blockquote><h4>Malware: Código Malicioso</h4><p>Malware é software malicioso. Você baixa programa (torrent, site suspeito), instala, malware toma controle de seu computador. Pode roubar dados, monitorar teclas (keylogger), enviar sua webcam como botnet (rede de computadores controlados).</p><p>Tipos de malware: Vírus (infecta arquivos), Worm (auto-replicante), Trojan (disfarçado de programa útil), Ransomware (criptografa seus arquivos, cobra resgate), Spyware (monitora atividade), Adware (exibe anúncios).</p><p>Como você pega malware? Baixando de site não confiável, abrindo anexo de email suspeito, visitando site infectado sem proteção.</p><blockquote><strong>Estatística:</strong> Em 2023, 560 milhões de endpoints (computadores, smartphones, servidores) foram infectados com malware. Um em cada 3 computadores está comprometido.</blockquote><h4>Ataques de Força Bruta e Dicionário</h4><p>Você tem senha fraca: "123456". Hacker tenta senha automaticamente. Computador tenta 1 milhão de combinações por segundo. Sua senha de 6 dígitos cai em segundos.</p><p>Força bruta é tentar todas as combinações até achar. Dicionário é tentar senhas comuns (password123, qwerty, admin). Você seria surpreso com quantas pessoas usam senhas de dicionário.</p><p>Como proteger? Senhas fortes (12+ caracteres, mix de maiúscula, minúscula, números, símbolos), autenticação multi-fator (SMS, app como Google Authenticator), bloqueio após N tentativas erradas.</p>'

        id: 'vrcn',
        title: 'Vulnerabilidades e CVE',
        html: '<h4>O Que é Uma Vulnerabilidade</h4><p>Vulnerabilidade é um defeito em software que pode ser explorado. Você usa Windows, Windows tem bug. Hacker descobre o bug, cria "exploit" (código que aproveita o bug), você é hackeado.</p><p>A indústria usa "CVE" (Common Vulnerabilities and Exposures) para categorizar vulnerabilidades. Cada CVE tem ID único (ex: CVE-2023-12345). Severidade é medida por "CVSS" (Common Vulnerability Scoring System): 0-10 (10 é crítica).</p><blockquote><strong>Exemplo Real:</strong> CVE-2021-44228 (Log4Shell) foi vulnerabilidade crítica (CVSS 10.0) em biblioteca Java usada por milhões de empresas. Um hacker conseguia executar código arbitrary em servidor. Descoberto em Dezembro 2021, afetou praticamente toda a internet por semanas.</blockquote><h4>Zero-Day vs. Known Vulnerabilities</h4><p>Vulnerabilidade "zero-day" é quando descoberta de um bug não é pública. Hacker sabe, fabricante não sabe. Hacker explora antes de patch ser liberado. É aterradora porque não há defesa conhecida.</p><p>Vulnerabilidade "conhecida" é quando patch já existe. Se você aplicar patch, está seguro. Se não aplicar, está vulnerável. Muitas empresas não aplicam patch por preguiça, medo de quebrar algo: resultado, são hackeadas.</p><p>Você provavelmente tem dezenas de vulnerabilidades em seu computador AGORA. Windows tem bugs, navegador tem bugs, programas têm bugs. Mas se você aplica patches de segurança regularmente, está seguro (vulnerabilidades conhecidas são exploradas por script kiddies, não por hackers sofisticados).</p><h4>Responsible Disclosure</h4><p>Quando um pesquisador de segurança encontra vulnerability, ele informa ao fabricante (não ao público). Fabricante tem tempo para criar patch. Depois, pesquisador publica discovery. Isso é "responsible disclosure".</p><p>Você está perguntando: por que não publicar logo e deixar usuários se protegerem? Porque criminosos também leriam. Seria corrida: fabricante vs. criminoso para explorar. Criminoso ganha se mais rápido.</p>'

      {
        id: 'encr',
        title: 'Criptografia: A Linguagem Secreta',
        html: '<h4>O Que é Criptografia</h4><p>Criptografia é arte de transformar mensagem legível em ilegível, para que só você e quem você quer possam ler. Você tem mensagem secreta: "Roubem o banco em sexta". Criptografa: "Kjsfljs&*%##@!#". Só quem tem "chave" consegue descriptografar de volta.</p><p>Criptografia é usado em WhatsApp, iCloud, email encriptado. Quando você manda WhatsApp, mensagem é encriptada antes de enviar. Whatsapp não consegue ler sua mensagem. Só você e destinatário conseguem.</p><h4>Encriptação Simétrica vs. Assimétrica</h4><p>Encriptação Simétrica: você e amigo compartilham chave secreta. Você encripta com chave, amigo descriptografa com mesma chave. Rápida, eficiente, mas tem problema: como você compartilha chave com segurança?</p><p>Encriptação Assimétrica: você tem 2 chaves: Pública (todo mundo tem) e Privada (só você tem). Alguém encripta com sua chave pública, só você consegue descriptografar com sua chave privada. Mais lento, mais seguro. É usada para criptografia de dados sensível.</p><blockquote><strong>Exemplo Prático:</strong> Você quer comunicar com seu banco. Banco tem chave pública divulgada. Você encripta sua senha com chave pública do banco. Banco descriptografa com chave privada (que só ele tem). Ninguém consegue interceptar sua senha; mesmo que interceptem, é ilegível.</blockquote><h4>Hash: Impressão Digital Digital</h4><p>Hash é função que transforma qualquer entrada em "impressão digital" única. Você tem arquivo grande (1 GB). Hash transforma em sequência de 64 caracteres que representa aquele arquivo. Se 1 bit do arquivo mudar, hash muda completamente.</p><p>Usado para verificar integridade: você baixa arquivo de site confiável. Site publica hash oficial. Você calcula hash do arquivo que baixou, compara. Se forem iguais, arquivo não foi alterado. Se diferentes, alguém o modificou (malware, man-in-the-middle).</p><p>Hash NÃO é encriptação. Você não consegue descriptografar hash de volta para arquivo original. É matemática uma-via: fácil transformar em hash, impossível reverter.</p>'

    topics: [
      {
        id: 'mim',
        title: 'Man-in-the-Middle e Ataques de Rede',
        html: '<h4>O Ataque Man-in-the-Middle (MITM)</h4><p>Você está em café usando WiFi livre. Hacker está no mesmo WiFi. Quando você acessa seu banco, hacker intercepta a comunicação. Você envia senha para banco, mas vai através de hacker. Hacker vê a senha, a passa para banco. Banco nunca souube que hacker viu.</p><p>Você está perguntando: "Mas encriptação não protege?" Se site usa HTTPS (encriptado), hacker vê apenas dados encriptados (ilegível). Mas se você não verifica "cadeado verde" no navegador e acessa HTTP (não encriptado), hacker consegue tudo.</p><p>Proteção: sempre use HTTPS (verifique cadeado verde), use VPN em WiFi público (VPN encripta comunicação mesmo com hacker no WiFi), nunca acesse banco em WiFi público desprotegido.</p><blockquote><strong>Exemplo Concreto:</strong> Você está em aeroporto com WiFi livre que não exige senha. Hacker cria rede falsa com mesmo nome ("AirportWiFi_Free"). Você conecta na rede falsa por acidente. Hacker agora está no meio entre você e internet. Vê tudo que você faz.</blockquote><h4>Sniffing de Pacotes</h4><p>Internet comunica via "pacotes" (pequenas unidades de dados). Hacker pode usar tool como Wireshark para "cheirar" (sniff) pacotes na rede WiFi. Se comunicação não é encriptada, hacker consegue ler dados brutos.</p><p>Proteção: encriptação (HTTPS, VPN) torna pacotes ilegíveis; mesmo hacker sniffando, não consegue entender nada.</p><h4>DNS Spoofing</h4><p>Você digita google.com no navegador. Computador pergunta ao DNS: "Qual é IP do google.com?" DNS normal responde com IP correto (142.251.41.14). Mas se hacker "spoofed" (falsificou) DNS, responde com IP malicioso. Você acessa site falso pensando estar no Google.</p><p>Proteção: usar DNS encriptado (DNS over HTTPS), confiar em DNS provider confiável, muitas vezes não tem solução cliente-side (precisa confiar no ISP/DNS provider).</p>'

        html: '<h4>O Que é DDoS</h4><p>DDoS = Distributed Denial of Service. Você tem website. Hacker envia BILHÕES de requisições para seu site simultaneamente. Servidor fica sobrecarregado, não consegue responder requisições legítimas. Site cai.</p><p>Diferença de DoS (Denial of Service): DoS é uma máquina atacando. DDoS é MUITAS máquinas atacando simultaneamente (botnet). DDoS é muito mais potente e difícil de parar.</p><h4>Como Hacker Consegue Botnet</h4><p>Hacker compromete milhões de computadores (através de malware, vulnerabilidade). Agora controla uma "botnet" de 1 milhão de máquinas. Quando quer derrubar site, ordena todas as máquinas atacarem simultaneamente. Resultado: 1 bilhão de requisições por segundo.</p><p>Por que isso é um problema? Porque site legítimo é derrotado por quantidade bruta de tráfego. Mesmo que site seja rápido, não consegue atender 1 bilhão de requisições.</p><blockquote><strong>Ataque Real:</strong> Em 2016, Dyn (empresa que gerencia DNS da internet) sofreu DDoS de aproximadamente 600.000 IoT devices (câmeras de vigilância, roteadores infectados). Resultado: 25% da internet caiu por horas. Amazon, Netflix, Twitter, GitHub ficaram inacessíveis.</blockquote><h4>Proteção Contra DDoS</h4><p>Usar CDN (Content Delivery Network) que filtra tráfego malicioso. Cloudflare, Akamai especializam em isso. Eles recebem tráfego, filtraram ataques, passam tráfego legítimo para seu site. Você paga pelo serviço, mas fica protegido.</p><p>Rate limiting: servidor rejeita requisições acima de certo número por segundo. Não é perfeito (ataques sofisticados conseguem passar), mas ajuda contra script kiddies.</p>'

      {
        id: 'inj',
        title: 'SQL Injection e Code Injection',
        html: '<h4>O Que é SQL Injection</h4><p>Seu website tem formulário de login. Você digita email e senha, clica "login". Site envia query para banco de dados: "SELECT * FROM users WHERE email = \'seu_email\' AND password = \'sua_senha\'".</p><p>Hacker ao invés de digitar email normal, digita: email@example.com\' OR \'1\'=\'1. Agora query vira: "SELECT * FROM users WHERE email = \'email@example.com\' OR \'1\'=\'1\' AND password = ...". A parte \'1\'=\'1\' é SEMPRE verdadeira. Banco de dados retorna TODOS os usuários. Hacker consegue logar como primeiro usuário (normalmente admin).</p><p>SQL injection é ataque onde hacker injeta código SQL na entrada para manipular banco de dados.</p><blockquote><strong>Exemplo Real:</strong> Em 2011, Sony Pictures sofreu hack de 77 milhões de usuários. Ataque começou com SQL injection em site que exibia informações de clientes. Hacker conseguiu acesso ao banco de dados, roubou dados sensíveis.</blockquote><h4>Como Proteger</h4><p>Usar "Prepared Statements" (ou "Parameterized Queries"). Em vez de concatenar strings, você passa dados como parâmetro separado. Banco de dados sabe que é dado, não código SQL. Mesmo que dados contêm caracteres especiais, não consegue "quebrar" a query.</p><p>Validar entrada: rejeitar inputs que contêm caracteres suspeitos (\'", ;, --). Um email não deveria conter ";" ou "--".</p><h4>Code Injection (similar a SQL Injection)</h4><p>Se website permite você executar código (ex: linguagem template), hacker injeta código malicioso. Site executa código de hacker. Hacker agora consegue fazer qualquer coisa (deletar dados, roubar, instalar malware).</p><p>Proteção: nunca permitir entrada de usuário em código executável. Escapar caracteres especiais, usar sandboxes (ambiente isolado), validação rigorosa.</p>'

      {
        id: 'xss',
        title: 'Cross-Site Scripting (XSS)',
        html: '<h4>O Que é XSS</h4><p>Você está em website de notícias. Comentários são públicos. Hacker posta comentário com código JavaScript: "&lt;script&gt; alert(\'Hackeado\'); &lt;/script&gt;". Quando você lê comentário, seu navegador executa o JavaScript. Alerta aparece.</p><p>Isso parece inofensivo, mas imagine JavaScript roubando seu cookie (autenticação). Hacker consegue sua sessão. Pode impersonar você, postar como você, roubar seus dados.</p><p>XSS é quando hacker injeta código JavaScript em website que será executado no navegador de outros usuários.</p><blockquote><strong>Exemplo Sério:</strong> Hacker cria tweet com código JavaScript. Quando vítima acessa tweet, código executa. Rouба cookie de autenticação do Twitter. Hacker agora consegue postar/apagar tweets da vítima.</blockquote><h4>Tipos de XSS</h4><p>Reflected XSS: JavaScript é enviado no URL. Você clica em link malicioso, código executa. Exemplo: "site.com/search?q=&lt;script&gt;alert(\'xss\')&lt;/script&gt;".</p><p>Stored XSS: JavaScript é armazenado no banco de dados (ex: comentário, post). Toda vez que someone acessa página, código executa. Mais perigoso que reflected.</p><p>Proteção: escapar caracteres especiais (&lt;, &gt;, &quot;) para que JavaScript não seja interpretado como código. Usar bibliotecas que fazem isso automaticamente. Validação de entrada rigorosa.</p>'
      }

il é a "mestre"), ative MFA em email (se hacker acessa email, consegue acessar tudo).</p>'

a TFA é MFA, mas nem toda MFA é TFA.</p>'

        title: 'Lei Geral de Proteção de Dados (LGPD)',
        html: '<h4>O Que é LGPD</h4><p>LGPD é lei brasileira (semelhante ao GDPR europeu) que regula como empresas coleta, usam e armazenam seus dados pessoais. Você tem direitos: saber que dados empresa tem, qual uso, deletar dados se quiser.</p><p>A lei entrou em vigor em 2020. Antes, sua privacidade era pouco protegida. Empresa X coletava email, telefone, comportamento, vendia para empresa Y. Você nunca sabia. Agora, LGPD proíbe isso sem consentimento explícito.</p><h4>Conceitos-chave de LGPD</h4><p>Dado Pessoal: qualquer informação relacionada a você identificado (nome, CPF, email, localização, IP, preferência).</p><p>Dado Sensível: dado pessoal "sensível" que requer proteção máxima (origem racial, religião, vida sexual, saúde, biometria, dados genéticos).</p><p>Controlador: empresa que decide como e por que coleta dados (Google, Facebook, banco).</p><p>Operador: empresa que processa dados em nome do controlador (serviço de cloud hosting, empresa de análise de dados).</p><p>Consentimento: você precisa autorizar explicitamente; pré-marcado (checkboxes) não é consentimento válido.</p><blockquote><strong>Exemplo Prático:</strong> App de fitness coleta sua localização. LGPD exige: (1) Informar você que coleta localização, (2) Explicar por que (melhorar rota de corrida), (3) Você ATIVO consentir (não pré-marcado), (4) Permitir você deletar dados, (5) Se empresa for hackeada, notificar você.</blockquote><h4>Direitos Garantidos</h4><p>Você tem direito a: (1) Acessar dados que empresa tem sobre você, (2) Saber origem dos dados, (3) Saber para quem dados são compartilhados, (4) Corrigir dados imprecisos, (5) Deletar dados, (6) Portar dados para outro serviço, (7) Saber se há automatização/decisão importante baseada em dados.</p>'

        id: 'irsp',
        title: 'Plano de Resposta a Incidentes',
        html: '<h4>Por Que Você Precisa de Plano</h4><p>Seu website é hackeado. Você descobre quando cliente avisa. Você entra em pânico. Qual é o próximo passo? Você não sabe. Dano aumenta porque sua resposta é desorganizada.</p><p>Empresa com plano de resposta: descobrem hack (via IDS/SIEM), imediatamente: (1) Isolam servidor, (2) Coletam evidência, (3) Notificam interessados, (4) Iniciam investigação forense, (5) Comunicam com clientes. Resposta é rápida, coordenada, dano é limitado.</p><h4>Estrutura de Plano</h4><p>Bom plano de incidente tem: (1) Preparação (ferramentas, treinamento, contatos), (2) Detecção (como você sabe que foi hackeado), (3) Contenção (como você limita dano imediato), (4) Investigação (o que aconteceu, como hacker entrou), (5) Recuperação (restaurar operação normal), (6) Lições (aprender para não repetir).</p><blockquote><strong>Exemplo Real:</strong> Empresa sofre ransomware. Equipe contém (desconecta servidores infectados). Restaura de backup offline (não foi criptografado). Operação volta em 4 horas. Se não tivesse plano, poderia levar 2-3 dias de downtime, perdendo milhões.</blockquote><h4>Comunicação de Incidente</h4><p>Você descobre hack. Primeiro pensamento: esconder. Não faça isso! Mentir é pior que transparência. Clientes descobrem (vazamento de dados circula na darknet), sua reputação é destruída.</p><p>Comunique rápido, transparente: "Descubrimos incidente. Dados de X clientes podem ter sido expostos. Estamos investigando, oferecemos monitoramento de crédito gratuito. Desculpe". Transparência reduz dano à reputação.</p>'

      {
        id: 'frns',
        title: 'Forense Digital e Coleta de Evidência',
        html: '<h4>O Que é Forense Digital</h4><p>Forense digital é análise de dados digitais para investigar crime/incidente. Você tem servidor hackeado. Forense analisa logs, recupera arquivos deletados, identifica malware, traça passos do hacker.</p><p>Objetivo: responder perguntas: Como hacker entrou? Por quanto tempo teve acesso? Qual dados foram roubados? De onde veio o ataque? Objetivo é recolher evidência que pode ser usada em corte de lei.</p><h4>Cadeia de Custódia</h4><p>Quando você coleta evidência, precisa de "cadeia de custódia" (documentação de quem tocou evidência, quando, por quê). Sem isso, evidência é inadmissível em corte.</p><p>Exemplo: você encontra disco rígido com malware. (1) Fotografa disco (timestamp), (2) Calcula hash do disco, (3) Cria imagem bitwise (cópia exata), (4) Calcula hash da imagem, (5) Armazena em local seguro, (6) Qualquer acesso posterior é documentado. Agora você tem cadeia de custódia válida; forense pode usar evidência em corte.</p><h4>Volatile vs. Non-Volatile Evidence</h4><p>Volatile: dados em RAM (memória). Se você desliga computador, dados desaparecem. Você precisa dumpar memória para arquivo ANTES de desligar (ferramenta como DumpIt no Windows). Dados voláteis incluem processos em execução, conectões abertas, variáveis do sistema.</p><p>Non-Volatile: dados em disco. Persistent. Você pode coletar depois. Mas dados deletados podem ser recuperados (disco não deleta realmente, apenas marca como "disponível"). Ferramenta como EnCase consegue recuperar dados deletados.</p><blockquote><strong>Procedimento Correto:</strong> (1) Dumpar memória primeiro, (2) Desligar computador, (3) Remover disco, (4) Crear imagem do disco (bitwise copy), (5) Analisar imagem (não toque original), (6) Documentar tudo.</blockquote>'

      {
        id: 'tlst',
        title: 'Threat Hunting e Análise de Ameaça',
        html: '<h4>O Que é Threat Hunting</h4><p>Você espera detectar ataque por IDS. Mas sofisticado hacker consegue evitar assinatura de IDS (zero-day, custom malware). Threat hunting é proativo: você procura por evidência de ataque mesmo que IDS não detectou.</p><p>Threat hunter analisa logs procurando por comportamento suspeito: usuário acessando muitos arquivos que não deveria, tráfego para IP suspeito, execução de comando incomum, modificação de sistema.</p><p>Exemplo: Threat hunter nota que usuário X acessou 1000 arquivos em 1 hora (normalmente acessa 50). Investigação revela: computador do usuário foi infectado com malware que roubava dados. Se não tivessem feito hunting, malware teria roubado por semanas.</p><h4>Indicadores de Comprometimento (IoC)</h4><p>IoC é evidência de ataque: arquivo malicioso (hash), IP da botnet, domínio malicioso, padrão de tráfego suspeito, linha de código maliciosa.</p><p>Você compartilha IoCs com comunidade (ISAC, CTI vendors). Outros conseguem proteger contra mesmo ataque. Exemplo: você descobre hash de malware Emotet. Você publica hash. Outras empresas procuram pelo hash nos seus logs, descobrem que foram infectadas também, conseguem se proteger.</p><h4>Threat Intelligence</h4><p>Threat Intelligence é informação sobre ameaças: quem está atacando, qual técnica usam, qual objetivo. Você integra TI com sua defesa.</p><p>Exemplo: você descobre que APT (Advanced Persistent Threat) X está atacando indústria de energia. Seu sistema de defesa procura por técnicas conhecidas do APT X em seus logs. Se encontra, você se prepare para ataque e implementa mitigações proativamente.</p>'

        html: '<h4>Demanda Crescente</h4><p>Cibersegurança é uma das áreas com maior demanda no mercado de TI. Em 2023, havia aproximadamente 3 milhões de vagas abertas de cibersegurança globalmente. No Brasil, demanda também é alta.</p><p>Por quê? Porque empresas fazem cibersegurança sério agora (LGPD, multas, reputação). Precisam de especialistas. Salário é competitivo: especialista em cibersegurança ganha 2-3x mais que desenvolvedor backend típico.</p><h4>Caminhos de Carreira</h4><p>Você pode escolher: (1) Blue Team (defesa): Analyst, Engineer, Architect, Incident Response, Threat Hunting. (2) Red Team (ataque/teste): Penetration Tester, Hacker Ético. (3) Compliance/Governance: especialista em LGPD, ISO 27001, Regulação. (4) Forensics/Investigação.</p><p>Cada caminho tem suas características. Blue Team é estável (sempre em demand, bem remunerado). Red Team é mais dinâmico (teste de novo ataque, precisa criatividade). Compliance é menos técnico (mais político, regulatório).</p><blockquote><strong>Exemplo de Trajetória:</strong> Você começa como Junior Analyst (monitora logs, detecta anomalias). Depois Security Engineer (implementa soluções). Depois Principal Engineer/Arquiteto (desenha estratégia). Cada passo: mais salário, mais responsabilidade, menos "hands-on".</blockquote>'
      },
      {
        id: 'crtn',
        title: 'Certificações e Treinamento',
        html: '<h4>Certificações Valorizadas</h4><p>Certificação prova expertise. Você fez curso online, mas sem certificação, empregador não sabe se você realmente sabe. Com certificação (exame difícil), você prova conhecimento.</p><p>Principais certificações: (1) CompTIA Security+ (entrada, mais acessível), (2) CEH (Certified Ethical Hacker, teste de penetração), (3) CISSP (Certified Information Systems Security Professional, alto nível, mais caro), (4) CCNA Security (Cisco, networking + security), (5) OSCP (Offensive Security Certified Professional, prático, muito respeitado em red team).</p><p>Cada certificação tem prerequisito (horas de experiência, exame anterior). CISSP exige 5+ anos de experiência, caro de fazer (R$ 1.500+ exame). CEH é mais acessível (R$ 500 exame, 3-6 meses estudo).</p><blockquote><strong>Conselho:</strong> Comece com CompTIA Security+ (3 meses estudo, custa R$ 300), depois CEH (6 meses estudo). Depois você tem credencial para achar trabalho em cibersegurança junior. Depois CISSP quando tiver 5 anos experiência.</blockquote><h4>Treinamento Prático</h4><p>Apenas teoria não basta. Você precisa praticar. Plataformas como HackTheBox, TryHackMe oferecem ambientes reais para você praticar hacking. Você resolve desafios, aprende técnicas, constrói portfolio.</p><p>Portfolio é importante. Quando você se candidata a job, você mostra: "Resolvei X desafios de segurança, realizei teste de penetração em empresa Y, encontrei Z vulnerabilidades". Contrata o vê portfolio, fica impressionado, o convida para entrevista.</p>'

      {
        id: 'ftur',
        title: 'Tendências Futuras em Cibersegurança',
        html: '<h4>IA e Segurança</h4><p>IA está mudando cibersegurança. (1) Defesa: IA detecta ataques mais rápido que human (0 falsos negativos em alguns modelos). (2) Ataque: hacker usa IA para gerar ataque (phishing email perfeito, malware customizado). Corrida armamentista entre defesa e ataque, ambos com IA.</p><p>Machine Learning permite detecção de anomalia: "Como você age normalmente em 100.000 comportamentos? Se vejo 1 comportamento fora padrão, alerta." Mais efetivo que assinatura.</p><h4>Quantum Computing e Criptografia</h4><p>Computador quântico (quando existir em escala real) vai quebrar criptografia atual. RSA (2048 bits) que é seguro hoje, seria quebrado em minutos por computador quântico.</p><p>Indústria está desenvolvendo "post-quantum cryptography" (algoritmos que são seguros até contra computador quântico). NIST está padronizando novos algoritmos. Você dentro de 5-10 anos vai precisar migrar para pós-quantum cryptography.</p><blockquote><strong>Preocupação Atual:</strong> Hacker pode estar coletando dados encriptados AGORA, esperando que computador quântico exista para descriptografar depois ("Store Now, Decrypt Later"). Você precisa proteger dados de longa duração com post-quantum cryptography AGORA.</blockquote><h4>Segurança em IoT e Edge</h4><p>Bilhões de dispositivos IoT (câmeras, sensores, roteadores) estão conectados. Maioria são inseguros (firmware antigo, senha padrão). Botnet Mirai foi 600.000 IoT devices.</p><p>Futuro de cibersegurança incluirá proteger borda (edge): cada IoT device precisa de segurança mínima, monitoramento. Especialista em IoT security tem grande demanda.</p><h4>Cibersegurança em Cloud</h4><p>Mais empresas migrando para cloud (AWS, Azure, Google Cloud). Cloud tem novas vulnerabilidades (misconfiguração S3 bucket, permissão excessiva em IAM, dados expostos em backup). Especialista em cloud security é área crescente.</p>'
      },
      {
        id: 'eth',
        title: 'Ética em Cibersegurança',
        html: '<h4>Hacker Ético vs. Hacker Criminoso</h4><p>Hacker ético (white hat) usa skills para defender, encontrar vulnerabilidades com permissão, reportar para empresa. Hacker criminoso (black hat) rouba, encripta dados, causa dano.</p><p>Você pode trabalhar em Red Team (teste de penetração ético) onde você tenta hackear uma empresa com permissão e contrato. Você encontra vulnerabilidades, reporta, empresa corrige. É legal, ético, bem remunerado.</p><p>Mas se você hackeia sem permissão, é crime. Lei de Crime de Computador (Lei 12.737 no Brasil) criminaliza acesso não autorizado. Pena: até 3 anos de prisão.</p><blockquote><strong>Exemplo Real:</strong> Hacker junior sem experiência tentou fazer "penetration test" em banco sem permissão (pensou que era legal porque "estava testando segurança"). Banco descobriu, chamou polícia, hacker foi preso. Lição: sempre ter contrato escrito ANTES de qualquer teste.</blockquote><h4>Responsabilidade de Divulgação</h4><p>Você encontra vulnerabilidade em software popular. Você pode publicar no Twitter agora? Não! Criminoso o usaria para atacar bilhões de usuários.</p><p>Você deve informar o fabricante (responsible disclosure), dar tempo para patch (geralmente 90 dias), depois publicar. Fabricante fica feliz, corrige, você fica com reputação de responsável.</p><h4>Conflitos Éticos</h4><p>Você descobre que seu próprio computador de trabalho tem malware (backdoor deixado por hacker anterior). Você relata para seu gerente. Gerente diz: "Não reporte para ninguém, vamos silenciosamente remover". Isso é errado! Você deveria forçar reporte adequado.</p><p>Você trabalha em cibersegurança, sua responsabilidade é ética. Se empresa pede para você fazer algo errado (esconder violação, não reportar), você deveria recusar e talvez reportar às autoridades.</p>'
      }
