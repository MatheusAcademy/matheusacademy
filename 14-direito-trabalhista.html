    content: `Direito Trabalhista é o ramo do direito que regula as relações de emprego entre trabalhadores e empregadores. Nasceu da constatação de que existe uma desigualdade enorme de poder: o empregador tem recursos, capital, expertise; o trabalhador geralmente tem apenas sua força de trabalho para sobreviver. Por isso, a lei intervém para proteger o trabalhador, estabelecendo garantias mínimas que nenhum contrato pode violar.

A principal legislação trabalhista no Brasil é a CLT - Consolidação das Leis do Trabalho, criada em 1943 e reformulada várias vezes, a última em 2017. A CLT estabelece direitos e deveres de ambos os lados, mas com foco em proteger o trabalhador porque reconhece essa desigualdade.

Os PRINCÍPIOS fundamentais do direito trabalhista são:

PRINCÍPIO DA PROTEÇÃO: O trabalhador é a parte fraca e merece proteção legal. Se há dúvida sobre interpretação de uma lei trabalhista, interpreta-se a favor do trabalhador.

PRINCÍPIO DA IRRENUNCIABILIDADE: O trabalhador não pode abrir mão de seus direitos. Se assina um contrato dizendo que renuncia férias ou décimo terceiro, essa cláusula é nula. A lei protege mesmo quem assinaria algo prejudicial.

PRINCÍPIO DA CONTINUIDADE: Presume-se que o contrato de trabalho é por tempo indeterminado. Se é temporário, precisa estar muito claro por que. Trabalho tem presumção de permanência.

PRINCÍPIO DA PRIMAZIA DA REALIDADE: A verdade dos fatos prevalece sobre o que está escrito. Se a carteira diz "trabalho temporário de 3 meses" mas você trabalha há 3 anos, a realidade vale - você é empregado permanente.

Uma RELAÇÃO DE EMPREGO exige 5 elementos:
1. PESSOALIDADE: O trabalho é prestado por pessoa certa (você), não pode ser substituída por outra.
2. SUBORDINAÇÃO: O trabalhador segue ordens e direcionamento do empregador. Não é totalmente independente.
3. HABITUALIDADE: É trabalho contínuo, não ocasional. Acontece regularmente.
4. ONEROSIDADE: Há remuneração. O trabalhador recebe algo em troca.
5. EXCLUSIVIDADE: O trabalho é para o empregador (em alguns casos). Mas isso não é sempre exigido.

Se um de esses elementos faltar, pode não haver relação de emprego. Por exemplo: se você trabalha para alguém mas pode ser substituído por qualquer pessoa, pode não ser emprego (pode ser contrato de prestação de serviço). Se é um trabalho ocasional (ajuda o vizinho uma vez por mês), não é emprego. Se não há remuneração, é voluntariado, não é emprego.

- Data de admissão

- Assinatura do empregador

O CONTRATO DE TRABALHO pode ser:
- Escrito: Formalizado em papel com ambas as partes assinando. Preferível porque deixa tudo registrado.
- Verbal: Válido legalmente, mas difícil de comprovar. A relação fica comprovada por contexto, testemunhas, tempo de serviço.

Mesmo contrato verbal, se houver subordinação e habitualidade, há relação de emprego válida. O trabalhador tem direitos mesmo sem papel assinado. Testemunhas, colegas de trabalho, registros de pagamento - tudo pode comprovar.

CONTRIBUIÇÃO SINDICAL: Percentual pequeno descontado da folha uma vez ao ano. Financia o sindicato. Desde 2017, é opcional para quem se filia.

NEGOCIAÇÃO COLETIVA: Sindicato negocia com sindicato patronal (representa empregadores). Acordam coisas que valem para toda a categoria:
- Aumento de salário acima da inflação
- Redução de jornada
- Adicional noturno maior
- Benefícios extras
- Condições de segurança

O acordo coletivo vale para todos, mesmo não-filiados. É vantagem do coletivo.

ASSEMBLEIA: Reunião de trabalhadores para decidir coisas importantes. Sindicato convoca assembleia para votar acordos, direção, greve, etc. Todo filiado pode participar e votar.

COMISSÃO INTERNA: Em empresas grandes, pode haver comissão de trabalhadores (CIPA - Comissão Interna de Prevenção de Acidentes) que cuida de segurança e saúde. Membros são eleitos por trabalhadores.

REPRESENTANTE LEGAL: Sindicato designa representantes que têm direito de acessar a empresa, conversar com empregador, verificar cumprimento da lei.

GREVE: Direito constitucional dos trabalhadores. Podem parar coletivamente para pressionar o empregador. Têm restrições:
- Não pode prejudicar serviços essenciais sem aviso prévio
- Não pode ser represália (empregador não pode punir quem greva)
- Precisa ser por motivo legítimo (não cumprimento de direitos, demanda por benefícios)

Empregador não pode descontar dia de greve se foi legítima. Mas pode descontar se greve foi ilegal.

PROTEÇÃO CONTRA RETALIAÇÃO: Se trabalhador participa de atividade sindical, é protegido:
- Não pode ser demitido por isso

- Informações sobre deveres da empresa
- Acesso a laudos técnicos (se há risco à saúde)

    content: `O salário é direito fundamental do trabalhador. A lei estabelece regras claras sobre como deve ser pago e quais benefícios são obrigatórios.

SALÁRIO MÍNIMO: Valor mais baixo que empregador pode pagar por mês de trabalho. É definido anualmente pelo governo. Varia conforme ano. Atualmente existe salário mínimo nacional e alguns estados têm salário mínimo estadual maior. Empregador deve pagar pelo menos o mínimo da sua região.

PISO SALARIAL: Alguns setores profissionais têm piso salarial (mínimo da categoria) que é maior que salário mínimo. Exemplo: profissionais com formação específica podem ter piso maior que mínimo geral. Sindicatos frequentemente negociam pisos.

COMPOSIÇÃO DO SALÁRIO: O salário é composto de:
- SALÁRIO BASE: Valor fixo acordado
- ADICIONAIS:
  - Adicional noturno (trabalho entre 22h e 5h = mínimo 20% extra)
  - Adicional de insalubridade (trabalho em ambiente perigoso = 10, 20 ou 40% extra conforme grau)
  - Adicional de periculosidade (trabalho perigoso = 30% extra)
  - Comissão (para vendedores, corretores)
  - Bônus (se acordado)

HORAS EXTRAS: Trabalho além da jornada normal:
- Deve ser pago com mínimo de 50% adicional sobre a hora normal
- Exemplo: hora normal R$ 50, hora extra = mínimo R$ 75
- Limite de 2 horas extras por dia (pode haver acordo coletivo permitindo mais)
- Deve ser controlado (não pode trabalhar sempre com extras como regime normal)

TRABALHO NOTURNO: Entre 22h e 5h:
- Hora noturna vale menos (redução de 1 hora na jornada para efeito de cálculo)
- Adicional noturno de mínimo 20% sobre a hora normal
- Se trabalhador misto (diurno e noturno), cálculo é proporcional

FÉRIAS: Direito de pausa remunerada:
- 30 dias de férias a cada 12 meses de trabalho
- Pode ser dividida em até 3 períodos (em acordo com empregador)
- Deve ser paga 1/3 extra (férias + 1/3 de adicional)
- Não pode ser acumulada indefinidamente (empresa deve dar férias regularmente)
- Se empregado sai sem usar férias, empregador paga em dinheiro
- Férias gozadas = direito não acumulado
- Férias vencidas (que passou prazo) = pode ter multa para empregador

DÉCIMO TERCEIRO (13º): Salário extra correspondente a 1 mês:
- Pago uma vez ao ano, geralmente em dezembro
- Ou em 2 parcelas: em novembro metade, em dezembro metade
- Trabalhador com menos de 1 ano recebe proporcional aos meses trabalhados
- Se trabalhou 8 meses, recebe 8/12 de um salário
- É considerado "gratificação natalina" pela lei

FUNDO DE GARANTIA DO TEMPO DE SERVIÇO (FGTS): Depósito mensal na conta do trabalhador:
- Empregador deposita 8% do salário bruto mensalmente
- Valores ficam em conta da Caixa Econômica Federal
- Trabalhador pode sacar em certos casos: demissão sem justa causa, doença grave, compra de imóvel, aposentadoria
- Seguro-desemprego: Se demitido, pode sacar FGTS

BENEFÍCIOS OBRIGATÓRIOS:
- INSS: Desconto de ~8% do salário (varia conforme faixa salarial). Garante aposentadoria, auxílio-doença, licença-maternidade, etc.
- IRRF: Imposto de renda. Descontado se salário é alto
- Vale transporte: Pode ser obrigatório conforme lei estadual/municipal

BENEFÍCIOS OPCIONAIS (não obrigatórios, mas comuns):
- Vale-refeição/vale-alimentação
- Vale-combustível
- Assistência médica/dental
- Plano de saúde
- Vale-cesta
- Bônus por desempenho

- Salário base

- Adicionais
- Valor líquido (o que realmente recebe)

- Contribui para renda mínima

JORNADA MÁXIMA LEGAL:
- 8 horas por dia
- 44 horas por semana
- Distribuídas em 5 ou 6 dias (conforme acordo)

Qualquer trabalho além disso é considerado HORA EXTRA. Trabalhador não é obrigado a fazer. Empregador pode solicitar, mas trabalhador pode recusar sem punição (salvo em situação de emergência).

INTERVALOS OBRIGATÓRIOS:
- Entre o fim de um dia e início do próximo: mínimo 11 horas
- Intervalo intrajornada (durante o dia de trabalho):
  - Para jornada de 6 horas: sem intervalo obrigatório
  - Para jornada de 6 a 8 horas: mínimo 1 hora
  - Pode ser reduzido a 30 minutos em acordo coletivo
- Esse intervalo NÃO é remunerado (trabalhador não é pago enquanto descansa)

TRABALHO EXTRAORDINÁRIO (Horas Extras):
- Deve pagar mínimo 50% de acréscimo
- Controlado: máximo 2 horas por dia normalmente
- Pode haver acordo coletivo permitindo até 4 horas
- Empresas devem manter registro de horas extras (folha de ponto)
- Pode ser compensado com folga em outro dia (acordo)

COMPENSAÇÃO: Pode compensar horas extras com folga em outro dia/semana. Exemplo: trabalhou 2 horas extras na segunda, folga na sexta. Mas tem regras:
- Deve haver acordo (coletivo ou individual)
- Deve ser compensado no mesmo mês (ou semana em alguns casos)
- Se não compensar, paga em dinheiro

FOLGA SEMANAL REMUNERADA:
- Todo trabalhador tem direito de 1 dia de descanso por semana
- Preferencialmente domingo, mas pode ser outro dia
- É pago como se trabalhasse (remunerado)
- Se trabalha em domingo/feriado por necessidade, recebe adicional

FERIADOS:
- Feriados nacionais: Não precisa trabalhar, é pago
- Feriados municipais: Depende do município, mas geralmente é pago se não trabalhar
- Se trabalha em feriado, recebe adicional (100% extra, ou em alguns estados 50%)
- Alguns setores funcionam em feriados (comércio, hospitais, transportes) - aí é obrigatório conforme lei
- Acordo coletivo pode estabelecer diferente

TRABALHO AOS SÁBADOS: Sábados não são feriados. Trabalhar sábado é obrigatório em alguns setores. Conforme acordo:
- Pode receber adicional
- Ou compensar com folga outro dia
- Ou meia jornada

JORNADA REDUZIDA: Algumas profissões têm jornadas reduzidas:
- Professor em escola: 3 horas por aula
- Telemarketing: Foi reduzido para 6 horas
- Alguns setores têm acordo reduzindo jornada

BANCO DE HORAS: Sistema onde horas extras são acumuladas e compensadas com folgas:
- Necessário acordo individual ou coletivo
- Trabalhador não recebe extras em dinheiro, mas ganha dias de folga
- Deve ser registrado
- Limite de acúmulo (não pode acumular infinitamente)

TRABALHO EM TURNOS: Trabalhadores que mudam de turnos (manhã, tarde, noite):
- Intervalo entre turnos: mínimo 11 horas
- Adicional noturno se trabalha à noite
- Rodízio de turno conforme lei (não pode deixar sempre na noite)

CONTROLE DE PONTO: Empregador obrigado a registrar horários de entrada e saída:
- Cartão de ponto (manual ou eletrônico)
- Sistema de biometria
- Aplicativo de ponto
- Trabalhador tem direito de ter cópia

Se empregador não controla ponto, presume-se a jornada que trabalhador relata. Isso protege trabalhador de ser explorado sem comprovação.

JORNADA INTEGRAL vs PARCIAL:
- Integral: Full time, 8 horas (44 horas por semana)
- Parcial: Menos de 6 horas por dia (até 30 horas por semana)
- Parcial NÃO é obrigado a ter 13º proporcional (lei antiga, mas em discussão)
- Parcial tem férias proporcionais

TELETRABALHO: Trabalho de casa ou remoto:
- Direitos são os mesmos (jornada, intervalo, extras)
- Empregador deve fornecer equipamento ou ressarcimento
- Intervalo deve ser respeitado mesmo em casa
- Empregador não pode exigir disponibilidade 24h

    content: `A saúde e segurança do trabalhador são prioridades da lei. Empregador tem obrigação de fornecer ambiente seguro e saudável.

NORMAS DE SAÚDE E SEGURANÇA:
- NR-1 até NR-37: Normas Regulamentadoras que estabelecem padrões de segurança
- Equipamento de Proteção Individual (EPI): Luvas, máscaras, capacete, etc. - GRATUITO para trabalhador, obrigação de empregador
- Equipamento de Proteção Coletiva (EPC): Escadas, corrimãos, ventilação - obrigação de empregador

CIPA: Comissão Interna de Prevenção de Acidentes:
- Obrigatória em empresas com mais de 20 trabalhadores
- Membros eleitos pelos trabalhadores
- Responsável por investigar acidentes, propor melhorias de segurança
- Pode paralisar setor perigoso se houver risco grave

ACIDENTE DE TRABALHO:
- Ocorre no ambiente de trabalho ou atividade de trabalho
- Responsabilidade do empregador
- Trabalhador precisa comunicar imediatamente (CAT - Comunicação de Acidente de Trabalho)
- INSS cobre parte da recuperação e renda (auxílio-acidente)
- Se grave (morte), família recebe pensão
- Empregador pode ser processado se negligente

DOENÇA OCUPACIONAL:
- Doença causada por exposição no trabalho
- Exemplo: trabalhador exposto a amianto pega câncer, é doença ocupacional
- INSS reconhece e fornece benefício
- Empregador pode ser processado

TRABALHO INSALUBRE:
- Ambiente prejudicial à saúde (exposição a químicos, calor extremo, barulho)
- Trabalhador tem direito a ADICIONAL DE INSALUBRIDADE:
  - 10% do salário para insalubridade mínima
  - 20% para insalubridade média
  - 40% para insalubridade máxima
- É determinado por laudo técnico
- Adicional é desconto ou bonificação? Obrigatório adicional, não desconto!

TRABALHO PERIGOSO:
- Ambiente ou atividade com risco de morte ou lesão grave
- Exemplo: trabalho com explosivos, eletricidade alta tensão, exposição a radiação
- Direito a ADICIONAL DE PERICULOSIDADE:
  - Mínimo 30% do salário
- Pode haver aposentadoria especial em alguns casos (redução de tempo de serviço)

LICENÇA-MATERNIDADE:
- 120 dias de licença remunerada para mulher que dá à luz
- Paga pelo INSS (não desconta do salário)
- Pode prorrogar por 60 dias (ainda remunerado) em alguns casos
- Empregador não pode demitir gestante sem justa causa grave
- Garantia de volta ao emprego após licença
- Trabalhadora tem direito a 2 períodos de descanso para amamentar

LICENÇA-PATERNIDADE:
- 5 dias úteis de licença remunerada para pai
- Em alguns estados/empresas é mais (10-20 dias) - acordos coletivos
- Não pode sofrer punição por usá-la

LICENÇA POR FILHO COM DEFICIÊNCIA:
- Pode haver redução de jornada ou afastamento para cuidar de filho com deficiência grave
- Depende de lei estadual/municipal

AUXÍLIO-DOENÇA:
- Se trabalhador fica doente e não consegue trabalhar
- INSS fornece benefício após 15 dias de afastamento
- Empregador paga primeiros 15 dias (geralmente)
- Precisa de comprovação médica (atestado)
- Passível de perícia pelo INSS

AFASTAMENTO POR INCAPACIDADE:
- Acidente de trabalho: INSS cobre desde o primeiro dia
- Doença comum: INSS cobre após 15 dias
- Necessário comprovação profissional

ATIVIDADES VEDADAS PARA MENORES:
- Menores de 16 anos: Não podem trabalhar (exceto como aprendiz)
- Menores de 18 anos: Não podem trabalhar à noite, em jornadas longas, em atividades perigosas
- Cumprimento é fiscalizado

ESTABILIDADE PROVISÓRIA:
- Alguns trabalhadores têm proteção contra demissão:
  - Dirigente sindical: Não pode ser demitido por atividade sindical

  - Membro de CIPA: Não pode ser demitido por atividade em CIPA

ASSÉDIO MORAL NO TRABALHO:
- Comportamento ofensivo, humilhante, repetido
- Prejudica dignidade e saúde do trabalhador
- Exemplos: grito público, tarefas impossíveis, isolamento deliberado
- Trabalhador pode processar por dano moral
- Diferente de pressão de trabalho legítima (exigência normal de produção)

ASSÉDIO SEXUAL:
- Investida sexual indesejada, pressão por favores sexuais
- Crime também na lei penal
- Empresa pode responder civilmente (indenizar)
- Assediador pode ser demitido por justa causa
- Denúncia protegida (empresa não pode retaliar)

    content: `Encerrar um contrato de trabalho segue regras específicas. Não é simples como "você está demitido". Existem formas diferentes com consequências legais diferentes.

AVISO PRÉVIO: Comunicação antecipada de encerramento do contrato:
- Prazo MÍNIMO de 30 dias
- Deve ser comunicado por escrito
- Pode ser dado pelo empregador (demissão) ou pelo trabalhador (pedido de demissão)
- Durante o aviso prévio, trabalhador continua trabalhando (ou pode ser dispensado)
- Trabalhador tem direito de trabalhar 2 horas a menos por dia durante aviso (lei antiga, em alguns estados ainda vigora)

AVISO PRÉVIO INDENIZADO: Empregador pode dispensar trabalhador do trabalho durante aviso:
- Paga os 30 dias como se trabalhasse
- Trabalhador pode aproveitar para procurar novo emprego
- É direito do empregador dispensar, não obrigação

AVISO PRÉVIO CUMPRIDO: Trabalhador trabalha normalmente durante os 30 dias:
- Garante experiência de emprego completa até final
- Pode cumprir na empresa ou via "aviso indenizado"

DEMISSÃO SEM JUSTA CAUSA: Quando empregador encerra sem motivo grave:
- Obrigado a dar aviso prévio (30 dias)
- Ou pagar aviso indenizado
- Trabalhador tem direito a indenização (40% do FGTS + outros)
- Pode sacar FGTS
- Tem direito a seguro-desemprego
- É a forma mais cara de demitir para empregador

DEMISSÃO COM JUSTA CAUSA: Quando trabalhador cometeu falta grave:
- Dispensa aviso prévio
- Não há indenização (40% do FGTS não é sacado)
- Não tem direito a seguro-desemprego imediato
- Anotação na Carteira: "Dispensa por justa causa"

O QUE CONSTITUI JUSTA CAUSA:
- Roubo ou apropriação de bem da empresa
- Violência física contra colega, chefe ou cliente
- Insubordinação grave (recusa sistemática em cumprir ordens)
- Improbidade (desonestidade, estelionato, fraude)
- Embriaguez habitual ou frequente
- Abandono de emprego (ausência injustificada por 30+ dias)
- Ato obsceno ou imoral prejudicial à empresa
- Ato que viola segredo profissional
- Condenação criminal do qual resulta impossibilidade de trabalhar

Importante: Falta deve ser GRAVE. Uma briga com colega não é justa causa se foi isolada. Embriaguez uma vez não é justa causa, precisa ser habitual. Atraso ocasional não é justa causa.

PROCEDIMENTO DE DEMISSÃO COM JUSTA CAUSA:
- Deve haver investigação prévia
- Oportunidade de o trabalhador se explicar
- Documentação do motivo
- Comunicação escrita do motivo (não pode ser vaga)
- Se não seguir procedimento, pode ser descaracterizada na justiça

PEDIDO DE DEMISSÃO: Quando trabalhador encerra:
- Deve dar aviso prévio de 30 dias
- Ou pagar 30 dias para não trabalhar
- Compensa 13º e férias proporcionais
- Não recebe indenização de 40% do FGTS
- Não tem direito a seguro-desemprego

RESCISÃO INDRETA: Quando empregador viola direitos e trabalhador quer sair:
- Não é demissão pela empresa, mas rescisão por culpa do empregador
- Exemplos: não pagar salário, reduzir salário ilegalmente, expor a risco grave, assédio
- Trabalhador tem direitos como se fosse demissão sem justa causa (indenização, 13º, férias, FGTS)
- Precisa documentar e geralmente reclamar na justiça

HOMOLOGAÇÃO DE RESCISÃO:
- Rescisão deve ser documentada formalmente
- Trabalhador recebe termo de rescisão que especifica:
  - Data de saída
  - Razão da demissão (com justa causa ou sem)
  - Valores a receber
  - Assinatura de ambas as partes
- Trabalhador tem direito de receber termo
- Sindicato pode acompanhar (em alguns casos é obrigatório)

CÁLCULO DE RESCISÃO:
- Salário do mês trabalhado (até data de saída)
- 13º proporcional (meses trabalhados / 12)
- Férias vencidas ou proporcionais
- Saldo de banco de horas (se houver)
- Vale-transporte não utilizado (em alguns casos)
- FGTS (saídas nos últimos meses + 40% se sem justa causa)

Dificuldade: Cálculos podem ser complexos. Trabalhador deve receber extrato claro e pode verificar com sindicato ou advogado.

SEGURO-DESEMPREGO:
- Benefício fornecido para trabalhador sem culpa que ficou desempregado
- NÃO se aplica a quem pediu demissão
- Pode sacar em parcelas após cumprir período de espera (geralmente 7 dias após demissão)
- Valor: cerca de 80-90% do salário anterior
- Prazo: 3 a 5 parcelas dependendo situação

    content: `Ao sair de um emprego, há vários cálculos e direitos que precisam ser respeitados. Entender como funcionam evita que seja enganado.

CÁLCULO DE FÉRIAS:
- 30 dias é o direito completo após 12 meses
- Se sai antes de completar 12 meses, recebe proporcional
- Fórmula: (30 dias × meses trabalhados) / 12
- Exemplo: trabalhou 6 meses = (30 × 6) / 12 = 15 dias
- Férias vencidas (que passou prazo para gozar): deve receber em dobro (punição para empresa)

CÁLCULO DO 13º:
- 1 mês de salário é o direito completo
- Se trabalhou parcial do ano: proporcional
- Fórmula: (salário × meses trabalhados) / 12
- Exemplo: trabalhou 8 meses = (salário × 8) / 12
- Se trabalhou de janeiro a outubro (10 meses): recebe 10/12

AVISO PRÉVIO EM DINHEIRO:

- É calculado sobre o salário base (sem extras)
- Ou negociado em comum acordo

COMISSÃO E BÔNUS:

- Bônus depende do acordo - pode ser integral ou proporcional
- Deve estar claro no contrato

MULTA POR AVISO PRÉVIO NÃO DADO:
- Se trabalhador sai sem dar 30 dias de aviso

DOCUMENTAÇÃO NA SAÍDA:
- Termo de Rescisão: deve especificar tudo

- Documento com cálculos detalhados

PERÍODO PARA RECEBER:

IMPUGNAÇÃO DOS CÁLCULOS:

- Sindicato pode ajudar a verificar cálculos
- Pode processar na justiça se valores estão errados

TRANSFERÊNCIA DE REGISTRO:

- Antigo empregador anota saída
- Não há "transferência" propriamente, é novo registro

REFERÊNCIA:

- Empregador pode fornecer ou se recusar
- Referência negativa pode prejudicar futuro emprego
- Há lei proibindo referência difamatória

CAUSAS DE EXTINÇÃO DO CONTRATO (além de demissão):
1. Rescisão bilateral: ambas concordam, rescindem

TRABALHADOR COM DEFICIÊNCIA:

RECLAMAÇÃO ADMINISTRATIVA:
- Primeira opção é falar diretamente com o empregador
- Conversa sobre o problema (falta de pagamento, horas extras não pagas, etc.)
- Muitas vezes resolve sem precisar de mais nada
- Mantenha registro (emails, mensagens)

MINISTÉRIO DO TRABALHO:
- Órgão federal que fiscaliza cumprimento da CLT
- Pode fazer denúncia de violação
- Auditores visitam empresas e investigam
- Se comprovado, empresa recebe multa
- Trabalhador pode não ser identificado (denúncia anônima)
- Útil para problemas sistêmicos (não paga salário, não registra, falta de segurança)

SINDICATO:
- Representa categoria profissional
- Pode:
  - Orientar trabalhador sobre direitos
  - Representar em negociação com empresa
  - Acompanhar trabalhador em processos legais
  - Processar empresa em ação coletiva
  - Defender trabalhador que sofre retaliação
- Oferta consultoria geralmente gratuita para filiados

JUSTIÇA DO TRABALHO: Via judicial
- Existe Justiça Especializada do Trabalho (não é justiça comum)
- Primeira Instância: Juiz do Trabalho ouve ambas as partes
- Segunda Instância: Tribunal do Trabalho revê decisão
- Terceira Instância: TST (Tribunal Superior do Trabalho)

PROCESSO TRABALHISTA:
- Pode ser feito sem advogado (trabalhador tem certa proteção), mas recomenda-se advogado
- Custas (taxas judiciais) são reduzidas
- Se ganhar, empregador paga honorários do seu advogado
- Pode ser gratuito se for pobre (justiça gratuita)
- Sindicato frequentemente oferece assessoria legal

PRAZO DE AÇÃO:
- Para reclamar diferenças de salário/horas: até 2 anos (valor vencido) + 5 anos (contiência)
- Para descontos ilegais: 2 anos
- Para rescisão abusiva: até 2 anos
- Importante não deixar passar: prazo prescreve direito

RECLAMAÇÃO TRABALHISTA: Processo começa com reclamação formal:
- Apresentada ao tribunal do trabalho
- Descreve o problema e o que pede de solução
- Identifica partes (trabalhador, empresa)
- Se aceita, cita a empresa para responder
- Empresa tem prazo para contestação

FASES DO PROCESSO:
1. Reclamação e Contestação: Apresentação inicial
2. Conciliação: Juiz tenta acordo (muitos processos resolvem aqui)
3. Instrução: Ouvem-se testemunhas, apresentam-se documentos
4. Argumentação: Ambas apresentam razões finais
5. Sentença: Juiz decide

PROVA NO PROCESSO TRABALHISTA:
- Documentos (contracheques, contrato, recibos)
- Testemunhas (colegas podem confirmar horas extras)
- Perícia (expert analisa documentos)
- Presunção de veracidade: às vezes o que trabalhador diz é presumido verdadeiro (se contracheque mostra horas normais mas ele diz que fez extras)

CONDENAÇÃO:
Se trabalhador ganha:
- Recebe direitos reclamados (salário atrasado, horas extras, etc.)
- Juros de mora (acréscimo por atraso)
- Multa sobre diferenças (em alguns casos)
- Honorários do advogado (25-30% da condenação)
- Possível dano moral (se houve assédio, discriminação, retaliação)

Se empregador ganha:
- Reclamação é rejeitada
- Trabalhador pode apelar

EXECUÇÃO DA SENTENÇA:
- Se empregador não paga voluntariamente
- Juiz ordena penhora de bens
- Conta bancária, equipamentos, propriedades podem ser penhorados
- Continua até pagar

AÇÃO CIVIL PÚBLICA:
- Sindicato ou Ministério Público pode processar empresa em nome de categoria
- Beneficia todos os trabalhadores prejudicados
- Exemplo: empresa não pagava adicional noturno há anos, todos recebem

AÇÃO COLETIVA:
- Representante da classe processa em nome de todos
- Todos os afetados podem aproveitar a decisão

DIREITOS IRRENUNCIÁVEIS:
- Trabalhador não pode abrir mão de:
  - Salário mínimo
  - Limitação de jornada
  - Férias
  - 13º
  - Segurança e saúde
  - Se assina contrato dizendo que abre mão, é nulo

ANOTAÇÃO DA CARTEIRA:
- Registro formal na Carteira de Trabalho
- Identifica períodos de emprego, razão de saída, informações
- Importante para comprovar tempo de serviço, experiência
- Empregador tem obrigação de anotar
- Se recusa, é crime

JUSTA CAUSA EM CARTEIRA:
- Anotação de demissão por justa causa prejudica trabalhador
- Futuro empregador vê que foi demitido por motivo grave
- Se o motivo foi falso, trabalhador pode processar por dano moral

PRESCRIÇÃO NO DIREITO TRABALHISTA:
- Direitos prescrever com tempo
- Salários atrasados: 5 anos (quanto ao débito futuro), 2 anos para o passado
- Horas extras: 2 anos
- Diferenças de salário: 2 anos
- Importante agir rápido antes de prescrever

ARBITRAGEM TRABALHISTA:
- Alternativa ao processo judicial
- Ambas as partes concordam em deixar um árbitro decidir
- Mais rápido que justiça
- Ganhou espaço após Lei 13.015/2015
- Decisão é vinculante (não pode apelar)
