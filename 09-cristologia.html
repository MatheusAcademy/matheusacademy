var TOPICS = [
  {id:1,name:'O Jesus Histórico',dur:'15 min',content:`<h3>Jesus de Nazaré: Figura Histórica Verificável</h3><p>Bem-vindo com imensa alegria a este estudo sobre a pessoa de Jesus Cristo! Este é o coração do cristianismo. Tudo o que cremos repousa sobre quem Jesus era e o que Ele fez. Que privilégio investigarmos juntos a vida e obra daquele que é mais importante que qualquer outra pessoa que já viveu!</p><p>Primeiro, deixe-me afirmar com confiança: Jesus era uma figura histórica real. Não é lenda. Não é ficção. Ele nasceu, viveu, ensinou, realizou milagres, morreu e ressuscitou na história humana real.</p><p>Como sabemos isto? Há evidência histórica tanto dentro quanto fora da Bíblia. O historiador judeu Flávio Josefo, escrevendo no final do século I, menciona Jesus. O historiador romano Tácito menciona Jesus e Sua execução sob Pôncio Pilatos. Plínio Jovem, governador romano, menciona cristãos adorando "Cristo como deus". Estes são escritores não-cristãos, secular, que confirmam que Jesus era figura histórica real.</p><p>Internamente, os Evangelhos apresentam detalhes que só teriam sentido para pessoas que conheceram a Palestina do século I. Mencionam topografia precisa, costumes judaicos, nomes de pessoas que podem ser verificadas. Incluem detalhes que ofenderiam os escritores (mulheres como primeiras testemunhas da ressurreição, um discípulo o traindo, Pedro negando). Se fossem inventados, os autores estariam criando uma história que não apoiaria sua própria causa. Isto sugere que estão relatando o que realmente aconteceu.</p><p>Quando foi Jesus nascido? Os estudiosos geralmente datam Seu nascimento entre 6 e 4 antes de Cristo. Nosso sistema de datas baseia-se em Sua vida! Ele não nasceu no ano 0, porque a cronologia foi calculada incorretamente, mas Ele nasceu definitivamente durante o tempo do rei Herodes da Judeia, como afirmam os Evangelhos.</p><p>Onde nasceu? Mateus e Lucas afirmam que nasceu em Belém. Isto é significativo porque profecia do Antigo Testamento (Miqueias 5:2) predissera: "E tu, Belém Efrata, pequena demais para ser contada entre os milhares de Judá, de ti é que há de sair o Dominador de Israel." Belém era um lugar insignificante. Se estivessem inventando uma história, teria feito mais sentido colocar o nascimento em Jerusalém, a capital. Que o Evangelho coloca em Belém sugere que está relatando a verdade histórica.</p><p>Quem eram Seus pais? Maria era Sua mãe, uma jovem mulher de Nazaré. José era carpinteiro que a criou. Jesus cresceu em Nazaré, uma aldeia pequena da Galileia. Lucas 2:52 afirma: "E Jesus crescia em sabedoria, estatura e graça, diante de Deus e dos homens." Ele tinha infância normal, desenvolvendo-se intelectual e fisicamente como qualquer criança, apesar de ser Deus encarnado.</p><p>Quando começou Seu ministério público? João 1:26 menciona que Jesus foi batizado por João Batista. Isto ocorreu cerca de 26-27 d.C., quando Jesus tinha aproximadamente 30 anos. O batismo marca o começo oficial de Seu ministério público, que duraria aproximadamente 3 anos.</p><p>Como é descrito Seu caráter? Os Evangelhos descrevem Jesus como cheio de compaixão. Ele dava tempo àqueles que sofriam. Curava os doentes. Alimentava os famintos. Recebia os rejeitados e pecadores. Havia também autoridade em Sua voz. Ensinava com sabedoria que deixava até Seus críticos admirados. Havia também santidade: Ele se apartava do pecado, condenava hipocrisia, chamava ao arrependimento.</p><p>Portanto, historicamente falando, Jesus era uma pessoa real, bem-documentada, cujas ações e ensinamentos tiveram impacto global duradouro. Você pode confiar que os Evangelhos relatam eventos reais da vida de uma figura histórica verificável!</p>`,cards:[{q:"Qual é a evidência de que Jesus foi figura histórica real?",a:"Referências de historiadores não-cristãos como Flávio Josefo, Tácito e Plínio; detalhes precisos nos Evangelhos sobre topografia e costumes."}]},

  {id:2,name:'A Divindade de Jesus',dur:'15 min',content:`<h3>Jesus é Deus: A Segunda Pessoa da Trindade</h3><p>Que verdade central e gloriosa! Jesus não era meramente um profeta ou mestre sábio. Ele era e é Deus em forma humana. Ele é a Segunda Pessoa da Trindade, co-eterno e co-igual com Deus o Pai. Esta verdade deve encher seu coração com admiração e devoção!</p><p>Como sabemos que Jesus é Deus? As Escrituras afirmam isto explicitamente e repetidamente. João 1:1 começa: "No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus." Isto é tão claro quanto possível: Jesus (o "Verbo") é Deus. Não é criatura. É plenamente Deus.</p><p>Em João 20:28, após a ressurreição, Tomás (que havia duvidado) ve Jesus ressuscitado e exclama: "Senhor meu, e Deus meu!" Jesus aceita esta confissão. Ele não a rejeita. Ele valida-a: "Porque me viste, creste; bem-aventurados os que não viram, e creram."</p><p>Há também as afirmações que Jesus fez sobre Si Mesmo. Em João 10:30, Jesus declara: "Eu e o Pai somos um." Os judeus entenderam isto como afirmação de divindade e tentaram apedrejá-Lo por blasfêmia (João 10:31-33). Em João 14:6, Jesus disse: "Eu sou o caminho, a verdade, e a vida; ninguém vem ao Pai, senão por mim." Isto é uma afirmação de autoridade absoluta e papel único.</p><p>Jesus também afirmou Seu direito de perdoar pecados. Quando um homem paralítico foi trazido a Ele, Jesus disse "teus pecados são perdoados." Os escribas imediatamente reconheceram a implicação: "Quem pode perdoar pecados, senão Deus?" (Marcos 2:7). Mas Jesus confirmou Sua autoridade realizando um milagre - Ele mandou o paralítico se levantar e andar. Se Ele fosse meramente humano, não poderia perdoar pecados. Mas porque é Deus, pode.</p><p>Jesus também aceitou adoração. Quando os discípulos O viram caminhando sobre o mar, a Bíblia relata: "E os que estavam no barco o adoraram, dizendo: Tu és verdadeiramente Filho de Deus" (Mateus 14:33). Se Jesus fosse meramente humano, teria repreendido-os por idolatria. Mas Ele aceitou a adoração, confirmando que é de fato Deus digno de adoração.</p><p>Há também as predições de Sua ressurreição. Jesus predisse três vezes que morreria e ressuscitaria no terceiro dia (Mateus 16:21; 17:23; 20:19). Ninguém mais poderia fazer isto. A ressurreição própria é privilégio de Deus apenas. Ninguém levanta a si mesmo. Mas Jesus fez. Isto é afirmação de divindade.</p><p>As Escrituras também descrevem Jesus em linguagem que pertence a Deus. Hebreus 1:3 afirma que Jesus é "a expressão exata da substância de Deus" e que "sustenta todas as coisas pela palavra do seu poder." Colossenses 1:15-17 afirma: "O qual é imagem do Deus invisível, o primogênito de toda a criação; porque nele foram criadas todas as coisas que há nos céus e na terra... Ele é antes de tudo, e todas as coisas nele subsistem."</p><p>Isto significa que Jesus não apenas é Deus; Ele é o Criador sustentador de todo o universo! Todas as partículas subatômicas, toda estrutura de átomos, toda galáxia - tudo está mantido em existência pela palavra de Jesus. Isto é poder inimaginável e majestade!</p><p>Há ainda o significado salvífico de Sua divindade. Se Jesus fosse meramente humano, Sua morte, por sacrificial que fosse, seria apenas a morte de um homem. Mas porque é Deus, Sua morte tem valor infinito. Pode pagar pelo pecado de toda a humanidade de todos os tempos. Isto é por que Sua morte salva!</p><p>Portanto, Jesus é plenamente Deus. Não é heresia. Não é exageração. É o ensino consistente das Escrituras. Você não está seguindo um homem apenas. Você está seguindo o Deus vivo encarnado! Que privilégio, que honra, que responsabilidade!</p>`,cards:[{q:"Como sabemos que Jesus é Deus?",a:"Ele afirmou ser Deus, aceitou adoração, perdoou pecados, ressuscitou a Si Mesmo, e criou/sustém todo universo."}]},

  {id:3,name:'Messias e Cumprimento de Profecia',dur:'15 min',content:`<h3>Jesus é o Messias: Cumprimento Perfeito de Profecia</h3><p>Que assunto extraordinariamente unificador! A Bíblia inteira aponta para Jesus. Do Gênesis ao Apocalipse, há tópicos, símbolos, profecia explícita e implícita que predizem a vinda, morte e ressurreição de Jesus. Quando você compreende isto, a Bíblia se transforma em um documento coeso e maravilhoso!</p><p>O que significa "Messias"? É a palavra hebraica para "ungido", aquele que é designado por Deus para um propósito divino especial. O equivalente grego é "Christos" (Cristo). Portanto, "Jesus Cristo" significa literalmente "Jesus, o Ungido; Jesus, o Messias".</p><p>Os judeus esperavam um Messias. Baseado na profecia do Antigo Testamento, esperavam um descendente de Davi que libertaria Israel e estabeleceria um reino eterno. Muitos esperavam por libertação política/militar. Mas o verdadeiro Messias tinha propósito maior: libertação espiritual da escravidão do pecado.</p><p>Como Jesus cumpre as profecias messiânicas? Permitam-me enumerar algumas das mais notáveis.</p><p>Primeira: Nascimento virgem. Isaías 7:14 predisse: "Portanto o Senhor mesmo vos dará um sinal: eis que uma virgem conceberá, e parirá um filho, e chamará o seu nome Emanuel." Lucas 1:26-35 relata que Maria, uma virgem, foi visitada pelo anjo Gabriel e informada que "o Espírito Santo virá sobre ti, e o poder do Altíssimo te envolverá com a sua sombra." Jesus nasceu de uma virgem. Profecia cumprida!</p><p>Segunda: Nascimento em Belém. Miqueias 5:2 predisse: "E tu, Belém Efrata, pequena demais para ser contada entre os milhares de Judá, de ti é que há de sair o Dominador de Israel." Mateus 2 e Lucas 2 relatam que Jesus nasceu em Belém. Profecia cumprida!</p><p>Terceira: Descendência de Davi. 2 Samuel 7:12-13 prometeu: "Quando teus dias forem completos, e repousares com teus pais, então farei que um da tua descendência seja levantado depois de ti... estabelecerei o trono do seu reino para sempre." Mateus 1 e Lucas 3 fornecedora genealogias mostrando Jesus como descendente de Davi através de Sua linhagem. Profecia cumprida!</p><p>Quarta: Ministério de milagres. Isaías 35:5-6 predisse sobre o Messias: "Então os olhos dos cegos se abrirão, e os ouvidos dos surdos se desobstruirão... porque rebentarão águas no deserto." Os Evangelhos relatam que Jesus curou cegos, surdos, leprosos e até ressuscitou mortos! Profecia cumprida!</p><p>Quinta: Rejeição pelos líderes. Salmo 22 e Isaías 53 descrevem o sofrimento do servo de Deus e Sua rejeição. Os Evangelhos relatam que Jesus foi rejeitado pelos líderes religiosos judeus, foi entregue aos gentios (romanos), foi crucificado. Profecia cumprida!</p><p>Sexta: Morte por transpassamento. Salmo 22:16 predisse "transpassaram as minhas mãos e os meus pés." Zacarias 12:10 predisse: "Olharão para aquele a quem transpassaram." Jesus foi crucificado, com pregos através de mãos e pés. Profecia cumprida!</p><p>Sétima: Casting de sortes pelas vestes. Salmo 22:18 predisse: "Repartem entre si as minhas vestes, e por minha túnica deitam sortes." Mateus 27:35 relata: "E depois de o terem crucificado, repartiram as vestes dele, lançando sortes..." Profecia cumprida!</p><p>Oitava: Ressurreição no terceiro dia. Oséias 6:2 predisse: "Ao terceiro dia nos ressuscitará, e viveremos diante dele." 1 Coríntios 15:4 afirma que Cristo "ressuscitou ao terceiro dia, segundo as Escrituras." Profecia cumprida!</p><p>Nona: Ascensão à direita de Deus. Salmo 110:1 predisse: "O Senhor disse ao meu Senhor: Senta-te à minha mão direita." Atos 2:33 relata que Jesus "havendo subido à destra de Deus" agora "derramou isto que vós vedes e ouvis." Profecia cumprida!</p><p>Décima: Seu reino eterno. Daniel 7:13-14 predisse: "Vi, numa visão da noite, e eis que vinha com as nuvens do céu um como filho do homem; e dirigiu-se ao Ancião de Dias... Foi-lhe dado domínio, glória e reino, para que povos, nações e línguas o servissem; o seu domínio é um domínio eterno, que não passará." Apocalipse descreve o reino eterno de Jesus. Profecia cumprida!</p><p>Agora, alguns céticos argumentam: "Estas são coincidências!" Mas a probabilidade matemática de uma pessoa cumprindo tão muitas profecias específicas é astronomicamente pequena. Se você pegasse apenas oito das profecias sobre o Messias e calculasse a chance de uma pessoa nascer e cumprir todas elas por coincidência, seria algo como 1 em 10 à 17ª potência. Impossível!</p><p>Portanto, Jesus é incontroversamente o Messias predito. Ele é aquele que toda a Bíblia aponta. Sua vida, morte e ressurreição não são eventos aleatórios na história, mas o cumprimento perfeito do plano de Deus revelado através de profecia! Que privilégio conhecer o Messias pessoalmente através da fé em Seu nome!</p>`,cards:[{q:"Como Jesus cumpre as profecias messiânicas?",a:"Nascimento virgem, Belém, descendência de Davi, milagres, rejeição, morte transpassado, ressurreição no terceiro dia, ascensão, reino eterno."}]},

  {id:4,name:'A Encarnação: Deus Se Faz Humano',dur:'15 min',content:`<h3>A Encarnação: O Mistério Supremo do Amor Divino</h3><p>Que verdade profunda e sublime! A encarnação - o ato de Deus tornando-Se humano em Jesus - é o coração do cristianismo. É mais que importante; é central para tudo que cremos. Deixe-me explorar este mistério maravilhoso com você!</p><p>O que é encarnação? Significa "colocar em carne". É quando a Palavra de Deus, que é completamente divina, eternamente espírito e incorpóreo, tomou sobre Si uma natureza humana completa. Tornou-Se humano sem deixar de ser Deus. Isto é o mistério que transcende compreensão plena, mas que podemos adorar e abraçar pela fé!</p><p>João 1:14 descreve magnificamente: "E o Verbo se fez carne, e habitou entre nós, cheio de graça e de verdade, e vimos a sua glória, glória como do unigênito do Pai." O Verbo eterno (Jesus) tornou-Se carne (humano completo). Não deixou de ser Deus. Tornou-Se humano também. Uma pessoa com duas naturezas!</p><p>Como era possível? Como poderia Deus, infinito, entrar em corpo finito? Como poderia um ser sem necessidade corpórea tomar um corpo vulnerável a fadiga, fome, dor? A Bíblia chama isto de "mistério da piedade" (1 Timóteo 3:16). Não é explicável pela lógica humana; é revelação divina que aceitamos pela fé.</p><p>Há analogias que ajudam (embora nenhuma seja perfeita). Assim como você, uma pessoa, você é espírito unido com corpo, assim Jesus é Deus unido com humanidade em uma pessoa. Ou assim como uma ampla inteligência humana pode expressar-se através de uma pequena criança aprendendo, assim Deus infinito expressou-Se através de Jesus humano em desenvolvimento.</p><p>Portanto, no mistério glorioso, Jesus durante Sua vida terrena era plenamente Deus e plenamente humano, duas naturezas em uma pessoa. Como homem, Ele tinha um corpo que poderia sentir dor. Tinha uma alma e espírito. Tinha vontade, emoções, mente. Lucas 2:52 afirma: "E Jesus crescia em sabedoria, estatura e graça, diante de Deus e dos homens." Ele se desenvolveu mentalmente. Aprendeu! Cresceu fisicamente.</p><p>Isto significa que Jesus experienciou tentação real como nós. Hebreus 4:15 afirma: "Pois não temos um sumo sacerdote que não possa compadecer-se das nossas fraquezas; antes foi ele tentado em tudo, à semelhança de nós, mas sem pecado." Isto é crucial! Jesus foi tentado como você é tentado - à fome, ao sexo, à ganância, ao poder, ao ódio. Mas Ele resistiu. Ele não caiu em pecado. Ele permaneceu perfeito.</p><p>Mas como Deus pôde ser tentado? Tiago 1:13 afirma: "Deus não pode ser tentado a fazer o mal." Portanto, a tentação veio através de Sua natureza humana. Satanás ofertou tentações reais. Mas por causa de quem Jesus é - Deus de amor perfeito, justiça, santidade - Ele não poderia capitular. Sua vontade divina permaneceu unida com Sua vontade humana em rejeição consistente do pecado.</p><p>Por que Deus Se encarnou? Por amor! Porque a humanidade estava condenada pelo pecado, Deus não pôde simplesmente ignorar isto. Sua justiça exigia punição. Mas Sua misericórdia desejava salvação. Portanto, Ele tornou-Se humano para ser nosso substituto na cruz. Ele tomou o lugar que era nosso. Ele sofreu a morte que merecíamos. Isto é o evangelho!</p><p>A encarnação também demonstra o valor que Deus coloca na humanidade. Você não é acidente insignificante. Deus o considera tão valioso que Ele Himself tornou-Se humano! Ele Se identificou com sua experiência. Ele sofreu. Ele sentiu dor. Ele conhece o que é ser tentado, exausto, rejeitado. Ele é Deus que entende verdadeiramente o que significa ser humano!</p><p>Portanto, a encarnação não é apenas doutrina abstrata. É o cumprimento do amor divino. É Deus dizendo: "Eu te amo tanto que deixarei o céu, serei rejeitado, sofrerei, morrerei - tudo para te salvar." Que dádiva inimaginável! Que razão para gratidão! Que fundação para fé e devoção!</p>`,cards:[{q:"O que significa que Jesus é plenamente Deus e plenamente humano?",a:"Uma pessoa com duas naturezas: divina e humana, unidas sem confusão, permitindo-O ser nosso substituto perfeito na redenção."}]},

  {id:5,name:'Ministério Público de Jesus',dur:'15 min',content:`<h3>A Vida Pública de Jesus: Ensinamento, Milagres e Compaixão</h3><p>Que privilégio estudar o ministério público de Jesus! Este período de aproximadamente três anos transformou a história. Deixe-me guiá-lo através de alguns aspectos principais de como Jesus viveu, ensinou e trabalhou!</p><p>BATISMO E TENTAÇÃO</p><p>Jesus começou Seu ministério público sendo batizado por João Batista no rio Jordão. Embora Jesus não tinha pecado para ser perdoado, Seu batismo foi de identificação com humanidade e de dedicação ao Seu chamado. Quando saiu da água, "o Espírito Santo desceu sobre ele em forma corpórea, como uma pomba; e ouve-se uma voz do céu, dizendo: Tu és o meu Filho bem-amado; em ti me comprazo" (Lucas 3:22). Isto foi comissionamento divino público.</p><p>Imediatamente depois, "Jesus, cheio do Espírito Santo, voltou do Jordão, e foi levado pelo Espírito ao deserto, durante quarenta dias, sendo tentado pelo Diabo" (Lucas 4:1-2). Quarenta dias, sem comer! Satanás ofereceu tentação após tentação: que Jesus transformasse pedra em pão (satisfazer necessidade por si mesmo), que adorasse o Diabo (comprometer princípios por poder), que se jogasse do templo (testar Deus). Mas Jesus resistiu firmemente. Venceu a tentação com a Palavra de Deus! "Está escrito...", Jesus respondeu consistentemente.</p><p>ENSINAMENTO E DISCIPULADO</p><p>Jesus pregava o evangelho do reino de Deus. Seu tema central era: "O reino de Deus está próximo; arrependei-vos e crede no evangelho" (Marcos 1:15). Ensinava através de parábolas (histórias que continham verdade espiritual), através de diálogo com questões, através de ensinamento direto. Suas palavras tinham autoridade. Mateus 7:29 afirma: "Porque ele as ensinava como tendo autoridade, e não como os escribas."</p><p>Alguns de Seus ensinamentos principais: o Sermão da Montanha (Mateus 5-7) onde ensina bem-aventuranças, oferece lei de Cristo, e mostra o caráter interior que Deus busca. Parábolas sobre o reino: o semeador, a semente crescendo, o fermento, o tesouro, a pérola, a rede. Ensinamento sobre Si Mesmo: "Eu sou o pão da vida" (João 6:35), "Eu sou a luz do mundo" (João 8:12), "Eu sou a ressurreição e a vida" (João 11:25-26).</p><p>Jesus escolheu doze apóstolos para Seu círculo interior. Não escolheu os mais inteligentes ou poderosos. Escolheu pescadores, publicanos (cobradores de impostos desprezados), homens comuns. Por quê? Para mostrar que o reino de Deus não é sobre mérito terreno. Trabalhou com eles por três anos, ensinando-lhes, modelando o caráter de discípulo, preparando-os para continuar Seu ministério.</p><p>MILAGRES E PODER</p><p>Jesus operou milagres extraordinários que validaram Suas afirmações de divindade. Curou os doentes: febre (a sogra de Pedro), paralisia (o paralítico e o oficial do rei), cegueira (Bartimeu e outros), surdez (o surdo-mudo). Expulsou demônios (o endemoninhado gadareno). Multiplicou alimento (5000 e 4000 alimentados com alguns pães e peixes). Acalmou uma tempestade andando sobre as águas. Ressuscitou mortos (filha de Jairo, Lázaro, filho da viúva de Naim).</p><p>Estes milagres não eram caprichosos ou para entretimento. Cada um tinha propósito. Cada um apontava para quem Jesus é. Curava os doentes demonstrando Seu poder sobre enfermidade. Alimentava os famintos demostrando Seu cuidado pelos necessitados e antecipando o pão eucarístico (Seu corpo). Acalmava tempestades mostrando autoridade sobre natureza. Ressuscitava mortos provando poder sobre a morte.</p><p>COMPAIXÃO E CUIDADO PELOS MARGINALIZADOS</p><p>Uma característica central de Jesus era Sua compaixão pelos pobres, doentes, rejeitados e pecadores. Ele não se separou deles como os líderes religiosos faziam. Comeu com publicanos (Levi/Mateus, Zaqueu). Defendeu a mulher adúltera quando tentaram apedrejá-la. Tocou leprosos, que eram intocáveis na sociedade. Falou com a mulher samaritana que era tripla-marginada (mulher, samaritana, mulher com história moral questionável).</p><p>Seu método era escuta, compreensão e misericórdia. Ele não condenou. Ele ofereceu redención. "Nem eu te condeno; vai-te, e não peques mais" (João 8:11). Ele via além do comportamento presente para a possibilidade da transformação futura.</p><p>CONFLITO COM LÍDERES RELIGIOSOS</p><p>Jesus constantemente entrou em conflito com escribas, fariseus e líderes do templo. Por quê? Porque expôs sua hipocrisia. Eles observavam a lei externa mas seu coração estava afastado de Deus (Mateus 23:25-26). Eles carregavam fardos pesados sobre as pessoas (Mateus 23:4). Eles buscavam honra humana em vez de honra de Deus (João 5:44). Jesus os desafiou consistentemente.</p><p>Portanto, o ministério público de Jesus foi um paradoxo: poder combinado com compaixão, autoridade combinada com humildade, verdade combinada com misericórdia. Ele era Deus que se relacionava com humanidade real em contextos reais, oferecendo salvação, cura e transformação!</p>`,cards:[{q:"Quais foram características principais do ministério público de Jesus?",a:"Ensinamento do reino, escolha de apóstolos, operação de milagres, compaixão pelos marginalizados, conflito com hipocrisia religiosa."}]},

  {id:6,name:'Morte Redentora de Jesus',dur:'15 min',content:`<h3>A Crucificação: Morte Substitucional e Redentora</h3><p>Este é o tópico mais importante e mais profundo de todos. A morte de Jesus na cruz é o evento central do cristianismo. Tudo aponta para isto. Tudo decorre disto. É a demonstração suprema de amor divino e o fundamento da salvação humana.</p><p>POR QUE JESUS MORREU?</p><p>Primeiro, é importante entender: a morte de Jesus não foi acidente. Não foi fracasso do plano divino. Foi o propósito eterno de Deus. Jesus veio especificamente para morrer pelo pecado da humanidade. "O Filho do Homem não veio para ser servido, mas para servir, e para dar a sua vida em resgate por muitos" (Marcos 10:45).</p><p>A morte de Jesus foi substitucional. Ele tomou o lugar que era nosso. Nós merecemos morte por nosso pecado. Ele tomou essa morte em nosso lugar. "Cristo morreu pelos nossos pecados, segundo as Escrituras" (1 Coríntios 15:3). "Aquele que não conheceu pecado, ele o fez pecado por nós; para que nele fôssemos feitos justiça de Deus" (2 Coríntios 5:21).</p><p>A morte de Jesus foi propiciatória. Propiciação significa "apaziguamento de ira através de satisfação". A ira de Deus sobre o pecado é real e justa. Mas Cristo ofereceu-Se como sacrifício que satisfez essa ira. "Porque ao mal ele pagou o preço da redenção; à culpa ele pagou o preço de perdão" (Salmo 130:7-8, interpretação). O derramamento de Seu sangue foi o payment final para a remissão de pecados.</p><p>COMO JESUS MORREU?</p><p>Jesus foi crucificado - executado pelo método romano de tortura e morte reservado para criminosos. Foi morte miserável. Primeiro foi flagelado (chicoteado), causando perda de sangue tremenda. Então uma coroa de espinhos foi colocada em Sua cabeça. Ele foi crucificado nu entre dois criminosos. Pregos foram cravados através de Suas mãos e pés. A cruz foi levantada, deixando Seu corpo pendurado por seu próprio peso.</p><p>A morte por crucificação era extremamente lenta e dolorosa. Você morreria por asfixia gradualmente enquanto seu corpo lutava para manter respiração. Cada respiração era agonia. A perda de sangue seria significativa. A choque e trauma seriam extremos. E tudo isto enquanto fodia ridicularizado, insultado, rejeitado pelos que passavam.</p><p>Mas Seu sofrimento físico não era o pior. O pior era o sofrimento espiritual. Porque Jesus tomou o pecado de toda a humanidade sobre Si, Ele experienciou separação de Deus que é o verdadeiro salário do pecado. Por isto Ele clamou: "Eli, Eli, lema sabactani?" (Meu Deus, meu Deus, por que me desamparaste? - Mateus 27:46). Isto era separação genuína, morte espiritual genuína, tudo porque Ele estava carregando pecado.</p><p>O SIGNIFICADO DE SUA MORTE</p><p>Primeira significância: Perdão. Sua morte paga o preço de nosso pecado. "Sem derramamento de sangue não há perdão" (Hebreus 9:22). Quando você confia em Cristo, seus pecados - passados, presentes e futuros - são perdoados. Completamente! Removido tão longe quanto o oriente está do ocidente (Salmo 103:12).</p><p>Segunda significância: Justificação. Você é declarado justo. Não baseado em sua justiça (que não existe). Baseado na justiça de Cristo creditada a você. Você está em posição correta com Deus. A culpa é removida. A condenação é cancelada.</p><p>Terceira significância: Redenção. Você é resgatado da escravidão do pecado. "Vós também sois resgatados... não por coisa corruptível, como ouro ou prata, mas pelo precioso sangue de Cristo" (1 Pedro 1:18-19). Você é libertado da escravidão, comprado com preço.</p><p>Quarta significância: Reconciliação. A brecha entre você e Deus causada pelo pecado é reparada. "Tudo isto provém de Deus, que nos reconciliou consigo mesmo por Cristo, e nos deu o ministério da reconciliação" (2 Coríntios 5:18). Você pode agora ter relacionamento com Deus por causa da morte de Cristo!</p><p>Quinta significância: Vitória. Christ venceu o pecado, a morte e Satanás. "Ora, acerca de todas essas coisas somos mais que vencedores, por aquele que nos amou" (Romanos 8:37). Você, em Cristo, compartilha dessa vitória!</p><p>RESPOSTA À MORTE</p><p>Como você deveria responder à morte de Jesus? Com gratidão. Com admiração. Com entrega. Pois Cristo morreu por você. Pessoalmente. Aquele que era Deus foi crucificado por você. Isto deveria transformar tudo como você vive. "E ele morreu por todos, para que os que vivem não vivam mais para si mesmos, mas para aquele que por eles morreu e ressuscitou" (2 Coríntios 5:15).</p>`,cards:[{q:"O que significa que a morte de Jesus foi substitucional e redentora?",a:"Ela tomou nosso lugar, pagou o preço de nosso pecado, nos oferecendo perdão, justificação, redenção, reconciliação e vitória."}]},

  {id:7,name:'Ressurreição e Poder Transformador',dur:'15 min',content:`<h3>Ressurreição: Validação da Divindade de Jesus</h3><p>Que notícia gloriosa é proclamada no terceiro dia! A ressurreição de Jesus não é apenas aspecto importante do cristianismo. É o fundamento de tudo! Sem ressurreição, não há cristianismo. Com ressurreição, há esperança eterna!</p><p>O QUE ACONTECEU NA RESSURREIÇÃO?</p><p>Jesus morreu na cruz sexta-feira. Seu corpo foi colocado num sepulcro pertencente a José de Arimateia, um membro do conselho que havia se tornado crente. A entrada foi selada com uma pedra. Uma guarda foi colocada lá. Tudo estava encerrado.</p><p>Mas no terceiro dia - domingo - aconteceu o impossível! Jesus ressuscitou! Não ressuscitação meramente espiritual. Não ressurreição metafórica. Ressurreição corpórea real. Seu corpo que havia sido morto, estava decomposição começando, foi trazido de volta à vida!</p><p>Lucas 24:39 relata Jesus dizendo aos discípulos (mostrando as marcas dos pregos em Suas mãos e pés): "Vede as minhas mãos e os meus pés, que sou eu mesmo; apalpai-me e vede, pois um espírito não tem carne nem ossos, como vedes que eu tenho." Jesus ressuscitou em corpo. Corpo real. Com feridas reais das crucificação. Mas também corpo transformado - corpo de ressurreição!</p><p>POR QUE A RESSURREIÇÃO É IMPORTANTE?</p><p>Primeira razão: Prova de divindade. Jesus predisse Sua ressurreição. "O Filho do Homem... será morto... e ao terceiro dia ressuscitará" (Mateus 16:21). E isto aconteceu exatamente como predisse! Ninguém mais poderia fazer isto. Ninguém mais poderia ressuscitar a si mesmo. Isto é privilégio de Deus apenas. Portanto, a ressurreição prova que Jesus é realmente Deus.</p><p>Segunda razão: Validação de tudo que ensinou. Os críticos pensavam que a morte de Jesus refutaria Suas afirmações. "Se fosse Filho de Deus, desceria da cruz!" Mas a ressurreição validou tudo. Provou que Ele era de fato quem afirmou ser. Suas palavras são palavras de Deus. Seus ensinamentos são autoridade divina.</p><p>Terceira razão: Oferecimento de esperança de ressurreição. "Porque se Cristo não ressuscitou, é vã a vossa fé, e ainda permaneceis nos vossos pecados... Mas agora Cristo ressuscitou dos mortos, sendo ele as primícias dos que dormem" (1 Coríntios 15:17, 20). Porque Jesus ressuscitou, você também ressuscitará! Sua morte não é final. Você tem eternidade à frente!</p><p>Quarta razão: Estabelecimento de Seu reino e autoridade. "Jesus aproximando-se, falou-lhes, dizendo: Toda a autoridade me foi dada no céu e na terra" (Mateus 28:18). Após ressurreição, Jesus está agora em autoridade suprema sobre todo universo. Aquele que você segue é o Rei dos reis, o Senhor dos senhores!</p><p>COMO SABEMOS QUE RESSURREIÇÃO ACONTECEU?</p><p>Há evidência histórica significativa.</p><p>Primeira: O sepulcro vazio. Até críticos seculares modernos reconhecem que o sepulcro estava vazio. Nem os judeus nem os romanos poderiam produzir o corpo. Se pudessem, simplesmente o exibiriam e falsidade cristã seria evidente. Mas não puderam. Por quê? Porque o corpo não estava lá!</p><p>Segunda: Aparições do Jesus ressuscitado. Ele apareceu aos discípulos em múltiplas ocasiões. Em Lucas 24 Ele comeu peixe com eles. Em João 20 disse a Tomás: "Chega a tua mão, e mete-a no meu lado; e não sejas incrédulo, mas crente." Isto não era imaginação. Era encontro com pessoa física ressuscitada.</p><p>Terceira: Conversão dos cépticos. Tiago, irmão de Jesus (que estava céptico durante o ministério de Jesus conforme João 7:5), tornou-se líder da Igreja em Jerusalém e foi martirizado por sua fé. Por que morreria por algo que sabia ser mentira? Porque testemunhou Jesus ressuscitado!</p><p>Quarta: Transformação dos discípulos. Após a crucificação, os discípulos estavam escondidos por medo. Tinham abandonado Jesus. Mas após a ressurreição, saíram proclamando abertamente: "Não podemos deixar de falar das coisas que vimos e ouvimos" (Atos 4:20). Medo transformado em coragem. Dúvida transformada em convicção. Por quê? Porque tinham experimentado Jesus ressuscitado!</p><p>Quinta: O "sinal" cumprido. Jesus havia dito: "Uma geração má e adúltera pede um sinal; mas não lhe será dado outro sinal senão o do profeta Jonas. Pois como Jonas esteve três dias e três noites no ventre da baleia, assim o Filho do Homem estará três dias e três noites no seio da terra" (Mateus 12:39-40). A ressurreição no terceiro dia era o sinal que validaria tudo!</p><p>IMPLICAÇÕES DA RESSURREIÇÃO</p><p>Porque Jesus ressuscitou, você tem esperança! Porque Jesus ressuscitou, a morte não é final. Porque Jesus ressuscitou, o pecado é vencível. Porque Jesus ressuscitou, você pode ser transformado. "Se alguém está em Cristo, é nova criatura; as coisas antigas já passaram; eis que se fizeram novas todas as coisas" (2 Coríntios 5:17).</p><p>Portanto, celebre a ressurreição! Porque nela repousa toda a fé cristã. Nela repousa toda a sua esperança. Nela repousa toda a transformação que você experiencia em Cristo!</p>`,cards:[{q:"Por que a ressurreição de Jesus é tão importante?",a:"Prova Sua divindade, valida Seus ensinamentos, oferece esperança de ressurreição futura, e estabelece Seu reino e autoridade."}]},

  {id:8,name:'Ascensão e Intercissão',dur:'15 min',content:`<h3>Exaltação de Jesus: Ascensão ao Céu e Intercissão</h3><p>Após quarenta dias de ressurreição, Cristo ascendeu ao céu. Isto não é simplesmente final da história de Jesus. É o começo de Seu ministério eterno de intercissão por você! Que verdade consoladora!</p><p>ASCENSÃO</p><p>Atos 1:9-11 relata: "Dito isto, foi-lhe arrebatado pela nuvem à vista deles. E enquanto olhavam para o céu, quando ele ia subindo, eis que dois homens se lhe puseram ao lado, em vestes brancas, e disseram: Varões galileus, por que estais olhando para o céu? Este Jesus, que dentre vós foi assunto ao céu, assim há de vir, do modo que o vistes ir para o céu."</p><p>A ascensão é Jesus retornando ao Pai no céu. Após Sua ressurreição, Ele passou 40 dias na terra, aparecendo aos discípulos, comendo com eles, instruindo-os. Então ascendeu ao céu, à direita de Deus Pai. Sua obra de redenção na terra foi completada. Seu ministério eterno de intercissão começou.</p><p>Por que ascensão importa? Primeira razão: completude da redenção. A morte conquistou o pecado. A ressurreição conquistou a morte. A ascensão completa a obra. Jesus não permaneceu na terra. Voltou ao Pai. Isto é completude, consumação, vitória final.</p><p>Segunda razão: Preparação do caminho. Jesus disse: "Vou preparar-vos lugar... para que onde eu estiver, estejais vós também" (João 14:2-3). Na ascensão, Ele foi preparar heaven para você. Está construindo, preparando, tornando pronto Seu lugar eterno.</p><p>Terceira razão: Estabelecimento do reino. Cristo agora está "sentado à direita de Deus" (Marcos 16:19). Isto é posição de autoridade suprema. "Toda a autoridade me foi dada no céu e na terra" (Mateus 28:18). Ele agora reina. Seu reino é estabelecido. Você serve um Rei que está no trono!</p><p>INTERCISSÃO</p><p>Agora, no céu à direita de Deus, Jesus intercede por você. Hebreus 7:25 afirma: "Portanto pode também salvar completamente aos que por ele se chegam a Deus, vivendo sempre para interceder por eles."</p><p>O que significa intercissão? É oração em favor de outro. É Jesus Himself continuamente orando por você, defendendo-o, intercedendo por você diante do Pai. Que consolo! Você não está sozinho. Seu Advogado, Seu Salvador, continuamente está orando por você!</p><p>Romanos 8:34 afirma: "Quem os condenará? Cristo é quem morreu, ou melhor, quem ressuscitou, está à direita de Deus, e também intercede por nós." Quando Satanás traz acusação contra você (e ele faz!), Jesus está lá intercedendo: "Pai, ele/ela é meu. Comprei-o/a com Meu sangue. Ele/ela é justo/a em Mim." Sua condenação é removida!</p><p>Lucas 22:31-32 registra Jesus dizendo a Pedro: "Simão, Simão, eis que Satanás vos pediu para vos peneirar como o trigo; mas eu roguei por ti, para que a tua fé não desfaleça." Jesus intercede por você em situações específicas, em tentações específicas, em necessidades específicas!</p><p>Que incrível privilégio! O Filho de Deus, aquele que conquistou pecado e morte, está no céu intercedendo por você! Não há condenação que possa ficar. Não há acusação que possa prevalecer. Não há situação tão desesperada que Ele não possa interceder por você.</p><p>JESUS ESTÁ VIVO E ATIVO</p><p>Um ponto crucial: Jesus não está morto no passado. Está vivo e ativo no presente! Ele não é figura histórica meramente. É pessoa vivente que você pode conhecer, com quem você pode ter relacionamento, de quem você pode experienciar poder transformador! "Jesus Cristo é o mesmo, ontem, hoje e eternamente" (Hebreus 13:8).</p><p>Portanto, quando você sente fraco, Jesus está intercedendo por você. Quando você é tentado, Jesus está intercedendo por você. Quando você está em desespero, Jesus está intercedendo por você. E quando você morre, Jesus receberá você no céu pessoalmente!</p>`,cards:[{q:"O que significa que Jesus está à direita de Deus e intercede por nós?",a:"Significa que Ele está em autoridade suprema, preparando heaven para você, e continuamente orando em sua favor diante do Pai."}]},

  {id:9,name:'Jesus no Coração do Cristão',dur:'15 min',content:`<h3>Conhecer Jesus Pessoalmente: Relacionamento Transformador</h3><p>Que privilégio glorioso encerrar este estudo de Cristologia refletindo sobre o que significa conhecer Jesus pessoalmente! Tudo que estudamos - Sua divindade, Seu ministério, Sua morte, Ressurreição, exaltação - tudo aponta para uma relação viva e pessoal com você!</p><p>NÃO APENAS CONHECIMENTO INTELECTUAL</p><p>Permitam-me ser claro: cristianismo não é simplesmente concordância intelectual com fatos sobre Jesus. Muitas pessoas sabem que Jesus existiu, que foi crucificado, que os cristãos creem que ressuscitou. Mas isto não é cristianismo. Isto é história.</p><p>Cristianismo é relacionamento pessoal com Jesus Cristo. É conhecê-Lo não meramente como figura histórica, mas como Senhor vivente. Não é "Eu acredito em Jesus historicamente" mas "Eu confio em Jesus pessoalmente. Ele é meu Senhor. Ele é meu Salvador. Eu O amo e Ele me ama."</p><p>João 17:3 oferece definição de vida eterna que Jesus Mesmo usa: "E a vida eterna é esta: que te conheçam a ti, o único Deus verdadeiro, e a Jesus Cristo, a quem tu enviaste." A vida eterna é conhecer Jesus pessoalmente! Não intelectualmente apenas. Pessoalmente. Intimamente.</p><p>RELACIONAMENTO BASEADO EM CONFIANÇA</p><p>Como você entra em relacionamento pessoal com Jesus? Através da fé. Que não é cegueira ou salto irracional. É confiança pessoal. É dizer: "Jesus, eu confio em você. Confio que você é quem afirmou ser. Confio que morreu por mim. Confio que me ama. Confio que é meu Senhor e Salvador."</p><p>Isto começa com arrependimento. Você reconhece que é pecador. Que viveu separado de Deus. Que merecia condenação. E você diz "não" ao pecado e "sim" a Jesus.</p><p>Então você confessa. Romanos 10:9-10 afirma: "Se confessares com a tua boca que Jesus é o Senhor, e creres em teu coração que Deus o ressuscitou dos mortos, serás salvo; porque com o coração se crê para a justiça, e com a boca se confessa para a salvação."</p><p>Não é complicado. Você simplesmente confessa: "Jesus, você é meu Senhor. Confio em você. Arrependo-me de meus pecados. Perdoe-me. Transforme minha vida. Salve-me." E Ele o salva!</p><p>RELACIONAMENTO VIVIDO</p><p>Mas isto não é experiência uma-vez e pronto. É relacionamento vivido diariamente. Você se dedica a conhecer Jesus melhor. Como? Através da oração - conversação constante com Ele. Através da Palavra - lendo a Bíblia para ouvir Sua voz. Através da comunhão - adorando com outros cristãos. Através da obediência - vivendo segundo Seus ensinamentos.</p><p>Jesus promete: "Eis que estou à porta e bato; se alguém ouve a minha voz, e abre a porta, entrarei em sua casa, e com ele cearei, e ele comigo" (Apocalipse 3:20). Ele deseja comunhão com você! Deseja passar tempo com você. Deseja conhecê-lo intimamente.</p><p>TRANSFORMAÇÃO PELA RELAÇÃO</p><p>Um dos sinais que você realmente conhece Jesus pessoalmente é transformação. "Se alguém está em Cristo, é nova criatura; as coisas antigas já passaram; eis que se fizeram novas todas as coisas" (2 Coríntios 5:17). Você não é mais mesma pessoa. Você é transformado de dentro para fora.</p><p>Como se manifesta isto? Através do fruto do Espírito. Gálatas 5:22-23 lista: "O fruto do Espírito é: amor, alegria, paz, paciência, gentileza, bondade, fidelidade, mansidão, temperança." Se você conhece Jesus, você está crescendo nestas qualidades. Seu caráter está sendo transformado em semelhança a Cristo (Romanos 8:29).</p><p>RELACIONAMENTO ETERNO</p><p>E finalmente, seu relacionamento com Jesus é eterno. Jesus promete: "As minhas ovelhas ouvem a minha voz, e eu as conheço, e elas me seguem; e eu lhes dou a vida eterna, e nunca hão de perecer, e ninguém as arrebatará da minha mão" (João 10:27-28).</p><p>Significa que quando você morre, você verá Jesus face a face. Você estará na Sua presença eternamente. E Ele não apenas será seu Deus em céu distante. Será seu companheiro íntimo para sempre. Você O conhecerá ainda mais profundamente do que agora. Comunhão perfeita. Eternamente.</p><p>PORTANTO...</p><p>Meu querido aluno, Jesus não é meramente figura histórica que você estuda. Não é meramente Deus distante em céu remoto. É pessoa vivente que deseja ter relacionamento com você! Deseja ser seu Senhor. Deseja ser seu Salvador. Deseja ser seu amigo. Deseja transformar sua vida. Deseja levá-lo à eternidade com Ele.</p><p>Se você nunca confiou em Jesus pessoalmente, faça isto agora! Não espere. Não adie. Confesse-O como seu Senhor. Confie Nele como seu Salvador. Abra seu coração para Ele. E experienciará o relacionamento mais transformador, redentor e alegre que é possível!</p><p>Que glória eterna aguarda aqueles que conhecem Jesus pessoalmente! Aleluia!</p>`,cards:[{q:"Como conhecemos Jesus pessoalmente?",a:"Através de arrependimento, fé pessoal, confissão de Seu senhorio, e vivência diária de relacionamento com Ele pela oração, Palavra e obediência."}]}
];
