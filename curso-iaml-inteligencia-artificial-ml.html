      title: 'Entendendo Inteligência Artificial',
      html: `<h4>Além do Hype</h4>
<p>Quando você ouve "inteligência artificial", você provavelmente pensa em ChatGPT ou Terminator. A realidade é mais nuançada e igualmente interessante.</p>
<p><strong>Inteligência Artificial (IA)</strong> é campo de estudo que tenta criar máquinas que comportam inteligentemente. "Inteligentemente" pode significar muitas coisas: resolver problemas, aprender de experiência, reconhecer padrões, tomar decisões.</p>
<p>Um problema fundamental: <strong>ninguém sabe realmente o que é inteligência</strong>. Como você define? Humanos são inteligentes porque resolvem problemas abstratos? Porque compreendem humor? Porque sentem empatia?</p>
<blockquote class="example">
Um sistema de IA pode ser "inteligente" em xadrez mas completamente estúpido em conversa. Deep Blue (computador) venceu Garry Kasparov em xadrez mas não conseguiria contar uma piada.

Isto nos ensina que "inteligência" é relativa à tarefa específica.
</blockquote>
<p>Há dois tipos de IA que frequentemente se discute:</p>
<p><strong>IA Fraca (Narrow AI):</strong> IA que é bom em uma tarefa específica. ChatGPT é IA fraca em geração de texto. Classificador de email é IA fraca em detectar spam. Todos os sistemas IA que existem hoje são fracos.</p>
<p><strong>IA Forte (General AI):</strong> IA que é bom em qualquer tarefa, como humano. Teoria, não realidade ainda. Ninguém sabe como construir isto.</p>
<blockquote class="tip">
Quando alguém diz "IA vai tomar o mundo", eles falam de IA Forte. Quando você usa ChatGPT, você usa IA Fraca. Diferença é imensa.
</blockquote>
<p>Uma taxonomia útil de IA:</p>
<p><strong>Simbólica (1950s-1980s):</strong> IA baseada em regras explícitas. "Se X, então Y". Sistemas especialistas.</p>
<blockquote name="example">
Sistema de diagnóstico médico: "Se paciente tem febre E tosse E falta de ar, ENTÃO suspeitar pneumonia."

Isto é IA simbólica. Regras escritas por humanos.
</blockquote>
<p><strong>Machine Learning (1990s-present):</strong> IA que aprende de dados. Você não escreve regras; você fornece dados de exemplo, e algoritmo descobre padrões.</p>
<p><strong>Deep Learning (2010s-present):</strong> ML com redes neurais com muitas camadas. Especialmente bom em dados complexos (imagens, texto, áudio).</p>
<p><strong>Grandes Modelos de Linguagem (Large Language Models, 2020s-present):</strong> GPT, Gemini, Claude. Treinados em trilhões de tokens de texto, conseguem conversar, escrever, codificar.</p>
<blockquote class="news">

</blockquote>
<p>Você aprenderá que IA não é monolítica. Diferentes técnicas servem diferentes problemas. Não há uma "verdadeira IA"; há muitas.</p>`

<p>Alan Turing, em 1950, propôs pergunta: "Podem máquinas pensar?" Ele respondeu com Teste de Turing: se conversa com algo e não consegue dizer se é humano ou máquina, então é inteligente.</p>
<p>Problema com Teste de Turing: não mede verdadera compreensão. Mede apenas engano convincente.</p>
<blockquote class="example">
ELIZA (1960s), programa simples de chatbot, passava Teste de Turing em conversa ingênua. Pessoas esqueciam que conversavam com máquina e abriamse emocionalmente. Mas ELIZA não entendia nada. Apenas fazia pattern matching ("você mencionou mãe. diga mais sobre sua mãe").

Isto ilustra diferença entre aparência de inteligência e genuíno entendimento.
</blockquote>
<p>Problema do Quarto Chinês (Searle, 1980): Imagine um homem em quarto que não conhece chinês. Ele tem libro de regras em inglês para responder perguntas em chinês. Pessoa fora envia pergunta em chinês. Homem segue regras, produz resposta em chinês. Pessoa fora pensa que alguém dentro entende chinês. Mas homem não entende nada; apenas segue regras.</p>
<blockquote class="tip">
Este é argumento Searle que máquinas nunca podem entender realmente; apenas simulam. ChatGPT, em seu núcleo, é sofisticado "Quarto Chinês": não entende, apenas segue padrões estatísticos.

Alguns discordam. Talvez entendimento é apenas padrões sofisticados.
</blockquote>
<p>A questão filosófica é: se uma máquina se comporta como entende, ela entende? Ou é apenas ilusão?</p>
<p>Pragmaticamente, não importa. Se ChatGPT consegue escrever código funcional, não importa se "entende" programação. Funciona.</p>

<p>• LLMs alucinam (inventam coisas) quando fora de distribuição</p>
<p>• LLMs não raciocina genuinamente; apenas segue padrões</p>
<p>• LLMs podem reproduzir viés dos dados de treinamento</p>

</blockquote>
<p>Você aprenderá que entender limitações de IA é tão importante quanto entender capacidades.</p>`

      title: 'Conceitos Básicos: Treino, Teste, Validação',
      html: `<h4>Como Máquinas Aprendem de Dados</h4>
<p>Machine Learning fundamental: você fornece dados de exemplo com respostas, algoritmo aprende padrão, depois pode predizer respostas para dados novos.</p>
<p>Processo típico:</p>
<p><strong>1. Coleta de Dados:</strong> Você precisa de muitos exemplos. Para detector de spam, você precisa 10.000+ emails classificados como "spam" ou "não spam".</p>
<p><strong>2. Preparação de Dados:</strong> Limpar dados, remover outliers, normalizar.</p>
<blockquote name="example">
Você tem dataset de emails. Alguns têm caracteres estranhos. Alguns têm attachments que quebram parsing. Você remove dados ruins, padroniza formato, converte palavras em números que algoritmo pode processar.
</blockquote>
<p><strong>3. Split em Treino/Teste:</strong> Você divide dados em dois sets.</p>
<p>• <strong>Treino (70-80%):</strong> Algoritmo aprende disto</p>
<p>• <strong>Teste (20-30%):</strong> Você avalia em dados nunca vistos</p>
<p>Nunca testar em dados que treinou, senão você mede memorização, não generalização.</p>
<blockquote name="example">
Você treina modelo de classificação de spam em 10.000 emails. Depois testa em 1.000 emails diferentes que modelo nunca viu. Se acurácia é 95% no treino mas 70% no teste, modelo está overfitted (memorização).
</blockquote>
<p><strong>4. Escolha de Modelo:</strong> Qual algoritmo usar? Regressão linear? Decision tree? Neural network?</p>
<p><strong>5. Treinamento:</strong> Algoritmo processa dados de treino, ajusta pesos internos para minimizar erro.</p>
<blockquote name="tip">
Treino é processo iterativo. Você começa com pesos aleatórios, calcula erro, ajusta pesos um pouco, repete até convergência. Isto é feito via backpropagation (ou outra técnica de otimização).
</blockquote>
<p><strong>6. Avaliação:</strong> Você testa em test set. Métricas dependem do problema:</p>
<p>• <strong>Regressão (preditar número):</strong> MAE (mean absolute error), RMSE (root mean square error)</p>
<p>• <strong>Classificação (predizer categoria):</strong> Acurácia, Precisão, Recall, F1-score</p>
<blockquote name="example">
Modelo de spam:
- Acurácia: 95% (95% das emails classificadas corretamente)
- Precisão: 92% (92% dos emails predictos como spam realmente são)
- Recall: 88% (88% dos spams reais foram detectados)

Precision vs Recall é trade-off. Você quer ambos mas é difícil ter ambos perfeitos.
</blockquote>
<p><strong>7. Validação Cruzada (opcional):</strong> Para dados limitados, você pode usar k-fold: divide dados em k partes, treina k vezes usando k-1 como treino e 1 como teste, media os resultados.</p>
<p><strong>8. Hyperparameter Tuning:</strong> Modelos têm "knobs" que você pode ajustar (learning rate, regularization, etc). Você experimenta diferentes valores para encontrar melhores.</p>
<p><strong>Overfitting vs Underfitting:</strong></p>
<p><strong>Overfitting:</strong> Modelo aprendeu padrões específicos do treino que não generalizam. Acurácia alta no treino, baixa no teste.</p>
<p><strong>Underfitting:</strong> Modelo é muito simples para dados. Acurácia baixa em ambos treino e teste.</p>
<p>Você quer modelo que está entre: generaliza bem a dados novos.</p>
<blockquote class="news">
Em 2024, técnicas como dropout, early stopping, e regularização são standard para combater overfitting. Mas é ainda arte: você precisa desenvolvimento intuição.
</blockquote>
<p>Você aprenderá que rigor em separar treino/teste é essencial para avaliar modelo honestamente.</p>`

      html: `<h4>Ferramentas no Toolbox</h4>
<p>Diferentes problemas requerem diferentes algoritmos. Você deve conhecer quando usar qual.</p>
<p><strong>Regressão Linear:</strong> Predizer número contínuo (preço casa, temperatura amanhã).</p>
<blockquote name="example">
Você tem dados de casas: tamanho (m²), número quartos, localização. Você quer predizer preço.

</blockquote>
<p><strong>Logistic Regression:</strong> Apesar do nome, é para classificação (predizer categoria, não número).</p>
<blockquote name="example">
Você tem dados de clientes: idade, renda, histórico de crédito. Você quer predizer se vão fazer compra (sim/não).

Logistic regression prediz probabilidade de "sim". Se >50%, prediz "sim".
</blockquote>
<p><strong>Decision Trees:</strong> Árvore de regras "Se X, então Y".</p>
<blockquote name="example">
Árvore de decisão para aprovar empréstimo:
<pre><code>[código removido]</code></pre>

Interpretável (você vê as regras), mas pode overfit facilmente.
</blockquote>
<p><strong>Random Forests:</strong> Múltiplas árvores de decisão votando. Melhor que uma árvore.</p>
<p><strong>Support Vector Machines (SVM):</strong> Encontra linha/plano que melhor separa classes. Bom para dados de alta dimensão.</p>
<blockquote name="example">
Você tem pontos em 2D: alguns são "spam", alguns são "não spam". SVM encontra linha que melhor separa os dois grupos. Dados no lado certo da linha são classificados como tal.
</blockquote>
<p><strong>K-Means Clustering:</strong> Agrupar dados em k clusters. Sem labels (unsupervised).</p>
<blockquote name="example">
Você tem 1 milhão de clientes. Você quer entender quantos segmentos existem. K-Means agrupa em k grupos baseado em similaridade de features. Se k=5, descobre 5 tipos de clientes.
</blockquote>
<p><strong>Quando usar qual?</strong></p>
<p>• <strong>Regressão Linear:</strong> Dados com relação linear clara, interpretabilidade importante</p>
<p>• <strong>Decision Trees:</strong> Interpretabilidade crítica (medicine, law), dados mistos</p>
<p>• <strong>Random Forests:</strong> Bom balanço de poder e interpretabilidade, dados complexos</p>
<p>• <strong>SVM:</strong> Dados de alta dimensão, kernel tricks</p>
<p>• <strong>K-Means:</strong> Explorar dados, entender clusters</p>
<p>Na prática, você treina múltiplos modelos e escolhe melhor performer no test set.</p>
<blockquote class="tip">
Modelo simples que generaliza bem é melhor que modelo complexo que overfits. Isso é "Occam's Razor": não multiplique complexidade sem necessidade.
</blockquote>
<blockquote class="news">
Em 2024, XGBoost (extreme gradient boosting) é modelo mais popular em Kaggle competitions e indústria. Combina árvores de decisão com boosting para desempenho excelente.
</blockquote>
<p>Você aprenderá que mestria em ML é saber qual ferramenta para qual trabalho.</p>`

    {
      id: 'aim7',
      title: 'Feature Engineering e Preparação de Dados',
      html: `<h4>80% do Trabalho</h4>
<p>Uma verdade incômoda: maioria do tempo em ML é gastos não em modelagem mas em preparação de dados.</p>
<p><strong>"Garbage in, garbage out":</strong> Se dados é ruim, modelo é ruim. Dados é onde batalha é ganho ou perdida.</p>
<p><strong>Feature Engineering:</strong> Processo de criar features (variáveis de entrada) que modelo pode aprender de.</p>
<blockquote name="example">
Você quer predizer se pessoa vai fazer compra. Features óbvias: idade, renda. Mas que tal engineered features:
- "Dias desde última compra" (pessoas que compraram recentemente compram novamente)
- "Número de visitas no último mês" (engagement)
- "Tempo média em site" (interesse)
- "Marca de produtos anteriores" (preferência)

Estes engineered features são muito mais preditivos que features brutos.
</blockquote>
<p><strong>Técnicas de Feature Engineering:</strong></p>
<p>• <strong>Scaling/Normalization:</strong> Colocar valores em range similar (0-1 ou -1 to 1) então algoritmo não é biased por magnitude</p>
<blockquote name="example">
Se você tem feature "edad" (0-100) e "income" (0-1 million), algoritmo pode dar peso muito maior a income simplesmente por magnitude. Você normaliza ambos para 0-1 range.
</blockquote>
<p>• <strong>One-Hot Encoding:</strong> Converter categoria em variáveis binárias</p>
<blockquote name="example">
Feature "color" pode ser "red", "blue", "green". One-hot encoding cria:
- color_red: 0 ou 1
- color_blue: 0 ou 1
- color_green: 0 ou 1

Algoritmo pode aprender que "red" tem efeito diferente de "blue".
</blockquote>
<p>• <strong>Polynomial Features:</strong> Criar features de ordem superior</p>
<blockquote name="example">
Se feature é "age", você pode criar "age²", "age³". Permite modelo capturar relações não-lineares.
</blockquote>
<p>• <strong>Interaction Features:</strong> Combinar features</p>
<blockquote name="example">
"age * income" = interação idade e renda. Pode ser que pessoas de certa idade mas alta renda tem comportamento único.
</blockquote>
<p><strong>Preparação de Dados:</strong></p>
<p>• <strong>Missing Values:</strong> Como lidar com dados faltando? Remover? Preencher com média? Aprender a imputar?</p>
<p>• <strong>Outliers:</strong> Valores muito extremos. Remover ou manter?</p>
<blockquote name="example">
Dataset de salários: você tem $30k a $200k típicos, mas 1 CEO ganha $10 million. Outlier? Mantém, remove, ou trata separado?
</blockquote>
<p>• <strong>Imbalanced Classes:</strong> Se 99% dados é "normal" e 1% é "fraude", modelo vai aprender "prediga sempre normal" e ter 99% acurácia. Ruim.</p>
<p>Soluções: oversampling (mais amostras da classe rara), undersampling (menos da classe comum), weighted loss (penalidade maior para erros na classe rara).</p>
<p>• <strong>Dimensionality Reduction:</strong> Muitos features podem levar a curse of dimensionality. Técnicas como PCA reduzem número de features preservando informação.</p>
<blockquote class="tip">
Feature engineering é onde domínio expertise importa. Você precisa entender negócio para saber quais features são importantes. Dados scientist puro não consegue; precisa trabalhar com especialista de domínio.
</blockquote>
<blockquote class="news">
Em 2024, automatização de feature engineering (AutoML) está melhorando. Ferramentas como TPOT e AutoKeras tentam automatizar seleção de features e modelo. Mas humano ainda é melhor.
</blockquote>
<p>Você aprenderá que 80% da vantagem competitiva em ML vem de features criativas, não de algoritmicamente sofisticado.</p>`

      title: 'Deep Learning: Redes Neurais Profundas',
      html: `<h4>Quando Você Precisa de Muitas Camadas</h4>
<p>Deep Learning é ML com redes neurais de muitas camadas. Especialmente poderoso para dados complexos: imagens, áudio, texto.</p>
<p><strong>Neurônio Artificial:</strong> Unidade básica. Recebe múltiplas inputs, aplica pesos, aplica função não-linear, produz output.</p>
<blockquote name="example">
Um neurônio: y = sigmoid(w1*x1 + w2*x2 + w3*x3 + b)

Onde w1, w2, w3 são pesos aprendidos durante treinamento, b é bias, sigmoid é função não-linear.

Múltiplos neurônios ligados formam rede.
</blockquote>
<p><strong>Redes Neurais Profundas:</strong> Múltiplas camadas (input → hidden → hidden → ... → output). Camadas "hidden" aprendem representações intermediárias.</p>
<p>Por que múltiplas camadas?</p>
<blockquote name="example">
Tarefa: reconhecer rosto em imagem.
- Camada 1 aprende baixo-level features: edges, texturas
- Camada 2 aprende mid-level: olhos, nariz, boca
- Camada 3 aprende high-level: "isto parece rosto"
- Camada final: "este é rosto de pessoa X"

Cada camada constrói em representações anteriores. É por isso deep learning é poderoso.
</blockquote>
<p><strong>Tipos de Redes Neurais:</strong></p>
<p><strong>CNN (Convolutional Neural Networks):</strong> Bom para imagens. Usa convolução (janela deslizante) para extrair features espaciais locais.</p>
<blockquote name="example">
CNN para classificar se imagem é "gato" ou "cão". Primeira camada de convolução detecta edges. Segunda detecta shapes (orelhas, olhos). Terceira detecta parts (cabeça, corpo). Última classifica.
</blockquote>
<p><strong>RNN (Recurrent Neural Networks):</strong> Bom para sequências (texto, série temporal). Neurônios têm feedback, formam loops.</p>
<blockquote name="example">
RNN para predizer próxima palavra em frase. Entrada: palavra anterior. Entrada também: hidden state (memória) da palavra anterior. Isto permite RNN "lembrar" contexto.
</blockquote>
<p><strong>Transformer:</strong> Bom para texto. Usa "attention mechanism" que permite focar em partes relevantes de sequência.</p>
<p><strong>Treinamento de Redes Profundas:</strong> Usa backpropagation para calcular gradiente de erro com respeito a cada peso. Pesos são atualizados na direção que reduz erro.</p>
<p><strong>Vanishing Gradient Problem:</strong> Em redes muito profundas, gradiente diminui exponencialmente com profundidade. Gradient para primeiras camadas fica próximo de zero, aprende lentamente.</p>
<p>Soluções: ReLU (ativação), residual connections (skip layers), batch normalization.</p>
<blockquote class="tip">
Deep Learning requer muito poder computacional e dados. Se você tem problema que poder ser resolvido com modelo simples, use simples. Deep Learning é quando simplista não funciona.
</blockquote>
<p><strong>Transfer Learning:</strong> Treinar modelo gigantesco do zero é caro. Ao invés, você pega modelo já treinado (exemplo: ImageNet para imagens) e "fine-tune" em seus dados específicos.</p>
<blockquote name="example">
Você quer classificar plantas. Você pega ResNet treinado em 1 milhão imagens de muitos objetos. Você remove última camada (que classifica 1000 objetos), adiciona sua camada final (que classifica 50 plantas). Treina apenas suas camadas finais em seus dados.

Isto é 100x mais rápido que treinar do zero porque camadas iniciais (edge detection, shape detection) já aprenderam.
</blockquote>
<blockquote class="news">
Em 2024, transformer-based models dominam. BERT, GPT, T5 para NLP. Vision Transformers para imagens. Arquitetura unificada, muito poderosa, escalável.
</blockquote>
<p>Você aprenderá que Deep Learning é poder incrível quando adequadamente aplicado.</p>`
