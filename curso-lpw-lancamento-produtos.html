      {
        id: 0,
        title: 'Os 3 Pilares de um Lançamento Bem-Sucedido',
        html: `<h2>Os 3 Pilares de um Lançamento Bem-Sucedido</h2><p>Olá! Bem-vindo ao primeiro módulo deste curso. Você aprenderá hoje os fundamentos que sustentam todo lançamento de produto digital bem-sucedido. Não importa se é um curso online, software, aplicativo ou membership — os princípios são universais.</p><h4>Pilar 1: Problema Bem Definido</h4><p>Antes de lançar qualquer coisa, você precisa entender profundamente o problema que seu produto resolve. Muitos empreendedores criam soluções para problemas que ninguém tem. Você conhece a dor do seu cliente?</p><blockquote class="tip"><strong>Dica:</strong> Converse com pelo menos 20 pessoas do seu público-alvo antes de criar. Anote as frustrações delas, as palavras que usam, o contexto em que sofrem. Esse ouro é inestimável.</blockquote><p>Quando você resolve um problema real, o boca a boca vem naturalmente. As pessoas compartilham soluções que funcionam.</p><h4>Pilar 2: Positioning Cristalino</h4><p>Positioning é como você se posiciona na mente do seu cliente. Não é sobre ficar rico ou vender muito — é sobre ter uma proposição única que diferencia você dos concorrentes.</p><blockquote class="example"><strong>Exemplo:</strong> Você não é "um curso de marketing". Você é "o curso que ensina como lançar produtos digitais em 30 dias com a fórmula que gerou \\\$500k em receita". Vê a diferença?</blockquote><p>Seu positioning deve responder: Por que você? Por que agora? Por que assim?</p><h4>Pilar 3: Estrutura de Lançamento</h4><p>O terceiro pilar é ter uma estrutura clara. Você sabe quantas pessoas precisa alcançar? Qual é a sua taxa de conversão alvo? Quantos dias você tem para lançar?</p><blockquote class="news"><strong>Realidade:</strong> 70% dos lançamentos falham porque não têm estrutura. A maioria das pessoas começa a vender quando está "pronta", mas pronta não existe. Você precisa de cronograma, métricas e ajustes constantes.</blockquote><p>Neste curso, você aprenderá a estrutura exata que grandes empreendedores usam. Prepare-se para sair daqui com um plano de lançamento pronto para executar.</p><h4>Próximos Passos</h4><p>Nos próximos módulos, você descobrirá como construir anticipação, criar sequências de email que convertem, utilizar prova social, despertar urgência no seu público e escalar o lançamento para lucros maiores. Mas tudo começa com esses 3 pilares que você está aprendendo agora.</p><p>Você está pronto para revolucionar a forma como lança seus produtos?</p>`

      {
        id: 1,
        title: 'Mentalidade do Lançador de Sucesso',
        html: `<h2>Mentalidade do Lançador de Sucesso</h2><p>Você sabe o que diferencia quem lança produtos que fracassam daquele que lança produtos que explodem em vendas? Não é sorte. Não é ter o melhor produto. É <strong>mentalidade</strong>.</p><h4>Crença 1: O Mercado Quer Comprar</h4><p>A primeira crença que você precisa ter é que seu público deseja desesperadamente a solução que você oferece. Ele está esperando por você. Não é sobre convencer — é sobre conectar.</p><blockquote class="quote"><strong>Verdade:</strong> As pessoas estão sempre buscando soluções para seus problemas. Você não está roubando dinheiro delas. Você está oferecendo alívio.</blockquote><p>Quando você acredita disso, sua comunicação muda. Você para de implorar, de ser desesperado. Você se posiciona como alguém que tem a resposta.</p><h4>Crença 2: Falhar é Aprender</h4><p>Todo lançador de sucesso falhou múltiplas vezes. A diferença é que eles aprenderam com cada fracasso e ajustaram. Você não vai acertar tudo na primeira vez, e tudo bem.</p><blockquote class="tip"><strong>Mindset:</strong> Trate seu lançamento como um experimento. Você tem hipóteses. Você testa. Você mede. Você aprende. Não é fracasso — é validação ou pivô.</blockquote><p>Se você não falhar, você não está testando o suficiente. Se você falha, significa que tentou.</p><h4>Crença 3: Ação Imperfeita Bate Perfeição Parada</h4><p>O maior inimigo do lançamento é a procrastinação disfarçada de perfeccionismo. "Vou lançar quando o site estiver perfeito", "quando meu video ficar profissional", "quando eu tiver 10 mil followers".</p><blockquote class="example"><strong>Verdade da Rua:</strong> Um email imperfeito que sai hoje converte mais do que o email perfeito que sai em 3 meses. O mercado não espera. Seus concorrentes não esperam.</blockquote><p>Você vai aprender neste curso a lançar rápido, medir e iterar. Essa é a mentalidade que funciona.</p>`

        title: 'Anatomia de um Lançamento de 7 Dias',
        html: `<h2>Anatomia de um Lançamento de 7 Dias</h2><p>Você já se perguntou por que alguns lançamentos geram \\\$10k em poucas horas enquanto outros levam semanas para chegar a \\\$1k? A resposta está na estrutura. Um lançamento bem-estruturado é como uma orquestra — cada instrumento toca no momento certo.</p><h4>A Sequência de 7 Dias</h4><p>Dia 1-2 (Abertura): Você envia o primeiro email anunciando que algo vem. Não vende ainda. Apenas desperta curiosidade.</p><p>Dia 3-4 (Educação): Você oferece valor gratuito relacionado ao seu produto. Um webinar, um vídeo, um guia. Você ganha confiança.</p><p>Dia 5 (Revelação): Você mostra finalmente o que está vendendo. A estrutura, o preço, por que vale.</p><p>Dia 6-7 (Urgência): Você cria escassez. Vagas limitadas, preço especial que sobe amanhã, bônus que desaparecem.</p><blockquote class="tip"><strong>Princípio:</strong> Cada dia tem uma função. Dia 1 não é para vender. Dia 5 não é para impacientar. Cada momento é estratégico.</blockquote><h4>Por Que Isso Funciona</h4><p>Você está alinhado com o ciclo de decisão natural do cliente. A maioria das pessoas precisa de 3 a 7 touchpoints antes de comprar. Você não está inventando essa necessidade — você está respeitando a psicologia de compra.</p><blockquote class="example"><strong>Dados:</strong> Campanhas que seguem essa estrutura de 7 dias converteram 3x mais do que campanhas de "hard sell" imediato. O cliente se sente educado, não manipulado.</blockquote><h4>Personalizando para Seu Produto</h4><p>Claro, nem todo lançamento é exatamente 7 dias. Alguns são 14 dias, outros são 3 dias. Mas a estrutura permanece: despertação, educação, revelação, urgência. Você vai aprender a adaptar esse framework para seu contexto.</p><blockquote class="news"><strong>Novo Dado 2026:</strong> Com a sobrecarga de emails, creators que seguem a estrutura de valor + urgência escalada conseguem 15-20% de abertura nos últimos dias.</blockquote><p>Esse é o mapa que você seguirá nos módulos que vêm. Vem comigo!</p>`

      {
        id: 3,
        title: 'Métrica Essencial: O Tripé de Ouro',
        html: `<h2>Métrica Essencial: O Tripé de Ouro</h2><p>Você não pode gerenciar o que não mede. Muitos lançadores falham porque não sabem se estão indo bem ou mal. Você precisa de métrica. Você precisa de números que digam a verdade.</p><h4>Métrica 1: Alcance (Reach)</h4><p>Quantas pessoas você atingiu? Se você mandar email para 1.000 pessoas, seu alcance é 1.000. Se você postou para 500 seguidores, seu alcance é até 500 (nem todos veem).</p><blockquote class="tip"><strong>Fórmula:</strong> Alcance é o denominador de tudo. Sem alcance, não há conversão possível. Você precisa expandir sua audiência.</blockquote><p>A maioria dos lançamentos fracassa porque o alcance é pequeno. Você está tentando vender para 100 pessoas quando precisa de 1.000.</p><h4>Métrica 2: Engajamento (Engagement)</h4><p>Quantas das pessoas que você alcançou realmente interagiram? Clicaram, responderam, comentaram, assistiram ao vídeo?</p><blockquote class="example"><strong>Exemplo:</strong> Você enviou email para 1.000 pessoas. 200 abriram. 50 clicaram. Seu engagement rate é 5%. Sua taxa de clique é 5%. Esses números dizem se seu copy funciona.</blockquote><p>Se seu engajamento é baixo, o problema é sua mensagem ou positioning. Você não está ressonando com a audiência.</p><h4>Métrica 3: Conversão (Conversion)</h4><p>Quantas das pessoas engajadas realmente compraram? Se 50 clicaram e 5 compraram, você tem 10% de taxa de conversão. Excelente.</p><blockquote class="news"><strong>Benchmarks 2026:</strong> Taxa de conversão "normal" é 1-3%. Acima de 5%, você está fazendo algo direito. Acima de 10%, você é um gênio.</blockquote><h4>O Tripé Funciona Assim</h4><p>Alcance baixo? Expanda sua lista, faça mais posts, crie buzz. Engajamento baixo? Reescreva seu copy, ajuste seu positioning. Conversão baixa? Mude a oferta, o preço ou o bônus. Cada métrica aponta para a solução. Você vai dominar isso neste curso.</p>`

    free: false,
    topics: [
      { id: 0, title: 'A Waitlist que Converte em Vendas', html: `<h2>A Waitlist que Converte em Vendas</h2><p>Seu segredo começa aqui: construir uma waitlist qualificada ANTES de lançar. Você não lança do nada. Você cria anticipação. Você cria demanda antes de ofertar.</p><h4>Por Que Waitlist Importa</h4><p>Uma waitlist faz 3 coisas: valida sua ideia (se 500 pessoas se inscrevem, a demanda existe), cria senso de urgência (as pessoas sabem que há limite de vagas) e gera feedback (você pode entrevistar pessoas da waitlist).</p><blockquote class="tip"><strong>Fato:</strong> Um produto com 1.000 pessoas na waitlist qualificada renderá 10x mais vendas do que um lançado para uma lista fria.</blockquote><h4>Como Construir Sua Waitlist</h4><p>Use ads no Facebook/Instagram direcionadas para seu público-alvo. Ofereça algo grátis (lead magnet) em troca do email. Um guia, checklist, vídeo, template. Quanto mais valioso, melhor.</p><blockquote class="example"><strong>Exemplo de Oferta:</strong> "7 Emails Que Vendem Produtos Digitais — Copie & Cole" gera muito mais inscrições do que "Receba dicas sobre lançamento".</blockquote><p>Você quer pessoas que já demonstraram interesse. Não é sobre quantidade — é sobre qualidade.</p><h4>Segmentação da Waitlist</h4><p>Nem todas as pessoas são iguais. Divida sua waitlist em segmentos: iniciantes vs. avançados, diferentes nichos, diferentes níveis de engagement. Quando você lançar, você mandará mensagens diferentes para cada grupo.</p><blockquote class="news"><strong>Dados de Conversão:</strong> Emails segmentados converteram 58% melhor do que emails genéricos enviados para toda a lista.</blockquote><p>Você vai aprender a segmentar sua audiência como um pro neste módulo.</p>` },
      { id: 1, title: 'Early Access & Community Building', html: `<h2>Early Access & Community Building</h2><p>Aqui está um segredo que os top lançadores usam: eles não lançam para estranhos. Eles lançam para uma comunidade que já se conhece, já se conecta, já confia no criador.</p><h4>Estratégia de Early Access</h4><p>Antes do lançamento oficial, ofereça acesso antecipado para um grupo pequeno de super fãs. Pode ser 50 pessoas, 100 pessoas. Eles entram primeiro, por um preço especial ou até grátis, em troca de feedback.</p><blockquote class="tip"><strong>Vantagem:</strong> Essas pessoas viram seus evangelistas. Elas geram prova social, testimonials, momentum antes do lançamento grande. O buzz é orgânico, não pago.</blockquote><p>Quando você lança para o público geral, você já tem vídeos de clientes felizes, depoimentos, reviews. Tudo isso aumenta a confiança exponencialmente.</p><h4>Community Building</h4><p>A maioria dos creators pensam em community como um extra. Você precisa pensar diferente. Sua comunidade é seu ativo mais valioso. Quando você tem uma comunidade engajada, cada lançamento novo é fácil.</p><blockquote class="example"><strong>Realidade:</strong> Um creator com 10 mil seguidores frios venderá menos do que um com 1 mil seguidores quentes em uma comunidade ativa.</blockquote><p>Como você cria comunidade? Discord, grupo no WhatsApp, Facebook group, membership light (grátis). Você cria um espaço onde seu público se sente parte de algo maior.</p><blockquote class="news"><strong>Tendência 2026:</strong> Communities privadas (Discord, Telegram) têm 5x mais engagement do que redes públicas.</blockquote>` },
      { id: 2, title: 'Validação de Mercado e Ajuste de Ofertas', html: `<h2>Validação de Mercado e Ajuste de Ofertas</h2><p>Antes de investir em produção do seu produto, você precisa validar que existe demanda real. Validação é conversas, é testes, é dados do mundo real.</p><h4>Como Validar Sua Ideia</h4><p>Maneira 1: Venda antes de criar. Abra pré-vendas do seu produto ainda em desenvolvimento. Se 50 pessoas compram, você sabe que funciona. Se ninguém compra, você economizou o tempo de criar.</p><blockquote class="tip"><strong>Princípio:</strong> Risco é validação. Se você está arriscando dinheiro (dos clientes) antes de construir, você está sério.</blockquote><p>Maneira 2: Entreviste 10-20 pessoas do seu público. Mostre o conceito, ouça feedback. Suas hipóteses são testadas.</p><h4>Ajustes de Oferta</h4><p>Preço é sempre a grande dúvida. Você testa começando com preço baixo (validação) ou preço premium (demanda real)?</p><blockquote class="example"><strong>Estratégia Híbrida:</strong> Ofereça preço early bird baixo para os primeiros 50 clientes, depois sobe para preço premium. Assim você valida E cria urgência.</blockquote><p>Você também vai testar pacotes: básico, profissional, premium. Qual converte melhor? Qual gera mais receita? Dados te dizem.</p><blockquote class="news"><strong>Insight:</strong> Muitos creators deixam dinheiro na mesa porque cobram muito barato. Teste aumentar o preço em 25-50% e veja se conversão cai proporcionalmente.</blockquote>` },
      { id: 3, title: 'Criando Prova Social Antes do Lançamento', html: `<h2>Criando Prova Social Antes do Lançamento</h2><p>A prova social é a moeda mais valiosa em um lançamento. As pessoas não compram porque você é ótimo. Elas compram porque outras pessoas já compraram e ficaram felizes.</p><h4>Tipos de Prova Social</h4><p>Testimonials: Vídeos ou depoimentos de clientes anteriores. Tem um de seus clientes dizendo "isso mudou meu negócio"? Ouro puro.</p><p>Números: "10.000 pessoas já fizeram esse curso", "Gerou \\\$5M em receita para clientes", "98% de satisfação".</p><p>Casos de Uso: Mostre exemplos reais. "Fulano saiu de \\\$0 para \\\$50k/mês em 90 dias usando esse método". Concreto vende.</p><blockquote class="tip"><strong>Fato:</strong> Prova social aumenta conversão em 20-50% dependendo de como é apresentada.</blockquote><h4>Como Gerar Prova Social Agora</h4><p>Se você é novo e não tem clientes, crie no seu próprio negócio. Aplique o método, documente os resultados, você é o caso de estudo.</p><blockquote class="example"><strong>Exemplo:</strong> Você criou um método de copywriting. Use em seus próprios emails, mostre os antes & depois de abertura, taxa de clique, conversão. Você é a prova.</blockquote><p>Depois, quando tiver clientes do seu programa de early access, peça prova social. Pergunte: "Qual foi seu maior resultado?" E use essas histórias no seu lançamento.</p><blockquote class="news"><strong>Dato:</strong> Testimonials de vídeo converteram 10x melhor do que texto escrito em 2026. Invista em gravar alguns vídeos curtos (30 segundos) com clientes.</blockquote>` }

    free: false,
    topics: [
      { id: 0, title: 'Canais de Tráfego: Qual Escolher', html: `<h2>Canais de Tráfego: Qual Escolher</h2><p>Você não pode vender para ninguém se ninguém sabe que você existe. Audiência é o combustível do lançamento. Mas qual canal escolher? Email, Instagram, YouTube, TikTok, LinkedIn?</p><h4>Os Principais Canais</h4><p><strong>Email</strong> é o ouro. Taxa de conversão média: 3-5%. Você tem permissão para falar com essas pessoas. Você controla a frequência. Você tem seu histórico de comportamento.</p><blockquote class="tip"><strong>Verdade:</strong> 1.000 emails na lista valem mais do que 100.000 seguidores no Instagram porque email converte 10x melhor.</blockquote><p><strong>Instagram</strong> é visual e rápido. Funciona para nichos lifestyle, beleza, fitness. Você pode vender direto por DM ou link na bio.</p><p><strong>YouTube</strong> é o motor de busca do vídeo. Você cria conteúdo educativo, as pessoas te encontram, você ganha confiança, você vende. Longo prazo.</p><p><strong>LinkedIn</strong> é para B2B e nichos profissionais. CEO de empresa, especialistas, consultores. Alta qualidade, baixo volume.</p><blockquote class="example"><strong>Estratégia Híbrida:</strong> Use Instagram/TikTok para build audiência rápido, LinkedIn para credibilidade, YouTube para SEO, Email para conversão. Não escolha um — use múltiplos.</blockquote><h4>Métrica: Custo de Aquisição (CAC)</h4><p>Qual canal traz audiência mais barata? Se você gasta \\\$1 por email na sua lista, mas email converte 3%, você pagou \\\$33 por cliente. Se você gasta \\\$2 por click no Instagram, você pagou muito mais por menos conversão.</p><blockquote class="news"><strong>Realidade 2026:</strong> Email é ainda o canal com melhor ROI. Ads em redes sociais ficaram 3x mais caro em 2 anos.</blockquote>` },
      { id: 1, title: 'Conteúdo que Atrai e Converte', html: `<h2>Conteúdo que Atrai e Converte</h2><p>Você não consegue audiência do nada. Você cria conteúdo que resolve problemas. Pessoas compartilham, comentam, seguem você. Conteúdo é investimento em audiência futura.</p><h4>Fórmula de Conteúdo Que Funciona</h4><p>Primeiro: Problema. Comece seu post, vídeo, artigo com um problema que seu público conhece. "Você está criando email marketing mas ninguém compra?" Conecta.</p><p>Segundo: Insight. Conte por que esse problema existe. A maioria pensa errado porque... Educação.</p><p>Terceiro: Ação. Qual é o passo concreto? "Não mande email genérico, segmente sua lista e envie mensagens diferentes". Prático.</p><p>Quarto: Resultado. "Com essa mudança, minha taxa de clique subiu de 2% para 8%". Concreto, inspirador.</p><blockquote class="tip"><strong>Fórmula Mágica:</strong> Problema → Insight → Ação → Resultado. Repita isso 1.000 vezes e você tem audiência.</blockquote><h4>Tipos de Conteúdo por Canal</h4><p><strong>Email</strong>: Stories, educação, ofertas. Você pode ser mais longo, mais profundo.</p><p><strong>Instagram</strong>: Carousels, Reels, Stories. Visual + uma frase impactante. Curto e direto.</p><p><strong>LinkedIn</strong>: Artigos curtos, mini-cases. Profissional mas humanizado. Você mostrando resultado.</p><p><strong>YouTube</strong>: Vídeos de 8-15 minutos com estrutura: intro, problema, solução, call-to-action. Qualidade conta.</p><blockquote class="example"><strong>Exemplo:</strong> Um post que funcionou: "Enviei 1.000 emails e fiz \\\$0. Então mudi 1 coisa e fiz \\\$10.000 em 7 dias. Aqui está o que mudei..." Boom. Você quer saber.</blockquote><h4>Frequência e Consistência</h4><p>Você não ganha audiência com 1 post. Você ganha com 100 posts de qualidade. Consistência é a chave. 3-5 posts por semana em Instagram, 2-3 emails por semana, 1-2 vídeos por semana no YouTube.</p><blockquote class="news"><strong>Tendência:</strong> Creators que postam 5x por semana conseguem 10x mais resultado do que quem posta 1x por semana.</blockquote>` },
      { id: 2, title: 'Ads Pagos vs. Crescimento Orgânico', html: `<h2>Ads Pagos vs. Crescimento Orgânico</h2><p>Você quer audiência rápido ou quer sustentável? Ads são rápido, orgânico é longo mas grátis. A realidade é: você usa os dois.</p><h4>Crescimento Orgânico</h4><p>Você cria conteúdo. Pessoas acham seu conteúdo porque é valioso. Elas seguem você. Você cria comunidade. Custo: tempo e criatividade.</p><blockquote class="tip"><strong>Vantagem:</strong> Audiência orgânica é mais leal, mais engajada. Elas encontraram você porque você resolveu problema delas. Não pagou por atenção.</blockquote><p>O problema é que crescimento orgânico é lento. Você talvez leve 6 meses para chegar a 10.000 seguidores.</p><h4>Ads Pagos</h4><p>Você tem \\\$1.000 por mês? Você coloca em ads. Facebook, Instagram, TikTok, Google. Você alcança pessoas novas que você nunca alcançaria organicamente.</p><blockquote class="example"><strong>Caso:</strong> Um criador sem audiência rodou \\\$2.000 em ads durante 30 dias e conseguiu 5.000 emails na lista. Custo: \\\$0.40 por email. Depois ele vendeu para essa lista e fez \\\$30.000.</blockquote><p>O problema é que ads custam dinheiro e o ROI precisa ser bom. Se você gasta \\\$1.000 em ads e não faz \\\$1.500 de volta, está errado.</p><h4>Estratégia Híbrida</h4><p>Comece com crescimento orgânico. Crie 20-30 posts de conteúdo bom. Você testa qual tipo funciona melhor. Depois, você pega seu melhor conteúdo e escala com ads.</p><blockquote class="news"><strong>Dado 2026:</strong> Creators que combinam orgânico + ads crescem 5x mais rápido do que quem usa só um dos dois.</blockquote><p>Você vai aprender a calcular o ROI de ads e saber quando vale ou não a pena investir.</p>` },
      { id: 3, title: 'Conversão de Seguidores em Clientes', html: `<h2>Conversão de Seguidores em Clientes</h2><p>Audiência sem conversão é ego, não negócio. Você pode ter 100.000 seguidores e fazer \\\$0. Você pode ter 1.000 fãs e fazer \\\$100.000. Conversa importa.</p><h4>O Funil de Conversão</h4><p>Estágio 1: Conscientização. Pessoa descobre você no TikTok, vê seu video, se interessa.</p><p>Estágio 2: Educação. Você oferece conteúdo grátis — guia, vídeo, webinar. Ela quer mais informação.</p><p>Estágio 3: Consideração. Você apresenta sua oferta. "Tenho um curso que te ensina isso em profundidade". Ela está curiosa.</p><p>Estágio 4: Conversão. Ela compra. Ou não. Depende do preço, da oferta, da urgência.</p><blockquote class="tip"><strong>Princípio:</strong> Você não passa de 1 estágio pro próximo sem valor. Cada touchpoint precisa ser valioso.</blockquote><h4>Mecanismo de Captura</h4><p>Como você captura email? Você precisa de algo que ela quer mais do que quer manter seu email privado.</p><blockquote class="example"><strong>Exemplos que Funcionam:</strong> Quiz: "Qual é seu nível de expertise em copywriting?" (resultado é personalizado); Lead magnet: "5 Templates de Email que Vendem" em PDF; Webinar: "Como fazer \\\$10k em 30 dias com sua audiência"; Challenge: "7 dias de email marketing ao vivo"</blockquote><p>Qual tipo funciona melhor? Teste. Diferentes públicos respondem melhor a diferentes mecanismos.</p><h4>Acompanhamento (Follow-up)</h4><p>A maioria dos criadores captura email uma vez e nunca fala com a pessoa de novo. Ou envia email genérico. Você precisa de uma sequência.</p><blockquote class="news"><strong>Dato:</strong> A 1ª vez que alguém recebe seu email, 1% compra. A 7ª vez, 20% está pronto. Persistência importa.</blockquote><p>Você vai aprender a construir sequências de email que educam, criam confiança e vendem sem parecer desesperado.</p>` }
    ],

  {
    id: 3,
    title: 'O Grande Dia: Lançamento',
    free: false,
    topics: [
      { id: 0, title: 'Sequência de Lançamento Dia a Dia', html: `<h2>Sequência de Lançamento Dia a Dia</h2><p>Chegou a hora. Você preparou tudo. Agora é executar. Cada dia tem um propósito. Cada email tem um objetivo. Você não improvisa — você segue o plano.</p><h4>Dia 1: O Anúncio Misterioso</h4><p>Você não fala ainda qual é o produto. Você apenas diz que algo vem. "Amanhã vou te mostrar algo que vai mudar seu negócio. Prepara seu café."</p><blockquote class="tip"><strong>Psicologia:</strong> Curiosidade é mais poderosa que certeza. Você desperta interesse. A pessoa abre seu email amanhã porque quer saber.</blockquote><p>Você manda para sua lista, posta nos stories, faz teaser no LinkedIn. Todo lugar onde você tem audiência.</p><h4>Dia 2-3: Storytelling e Conexão Emocional</h4><p>Agora você começa a educar. Você conta sua história. Como você descobriu esse método. Qual foi seu pior fracasso. Como você aprendeu.</p><blockquote class="example"><strong>Exemplo:</strong> "Perdi \\\$50k lançando um produto errado. Ninguém comprou. Eu estava quebrado. Então descobri um sistema que funcionava. Neste email, te conto os 3 erros que cometi."</blockquote><p>Histórias conectam emocionalmente. Quando você compartilha vulnerabilidade, as pessoas acreditam em você.</p><h4>Dia 4: O Agora Você</h4><p>Você começa a transicionar. "Você pode estar fazendo os mesmos 3 erros que eu cometi." Você faz diagnóstico. Isso é seu produto — uma solução para esses erros.</p><blockquote class="news"><strong>Técnica:</strong> Mostre o problema deles antes de mostrar sua solução. Quando você identifica a dor, a solução fica irresistível.</blockquote><h4>Dia 5: O Grande Reveal</h4><p>Finalmente você mostra o produto. O que é? Quanto custa? Quando começa? Como entra? Tudo claro.</p><p>Você também mostra o que está incluído. Módulos, videos, templates, acesso à comunidade. Você dá valor visible.</p><blockquote class="tip"><strong>Formato:</strong> Vídeo de 5-10 minutos é poderoso. Você falando, mostrando a tela, mostrando o produto de verdade.</blockquote><h4>Dia 6-7: A Urgência</h4><p>Preço sobe amanhã. Vagas limitadas. Bônus desaparecem. Você cria motivo para comprar hoje, não amanhã.</p><blockquote class="example"><strong>Urgência Real:</strong> "Tenho 50 vagas. Tenho 200 pessoas na waitlist. Isso termina em 24 horas. Não tem segundo chance."</blockquote><p>Urgência artificial não funciona. Urgência real (limite de vagas, preço temporário) funciona.</p>` },
      { id: 1, title: 'Copywriting que Vende', html: `<h2>Copywriting que Vende</h2><p>A qualidade do seu copy determina seu resultado. Dois emails com a mesma oferta — um com copy ruim converte 1%, outro com copy bom converte 10%. 10x diferença. Você precisa aprender.</p><h4>Estrutura de Email que Vende</h4><p><strong>Subject:</strong> Seu trabalho é fazer alguém abrir. Se seu subject é ruim, 99% não abre. "Novo Curso Disponível" não funciona. "Você cometeu este erro no seu último lançamento?" Funciona.</p><blockquote class="tip"><strong>Técnica:</strong> Subject lines que abrem são: curiosidade, número, pergunta, urgência, promessa.</blockquote><p><strong>Abertura:</strong> Você tem 2 linhas. "Oi! Tudo bem?" não funciona. Você precisa conectar com o leitor IMEDIATAMENTE. "Você gastou \\\$2k em ads e fez \\\$500 de volta. Qual foi o erro?" Conecta.</p><p><strong>Corpo:</strong> Você conta uma história ou explica um conceito. Você educa, entretém, inspira. Sem vender ainda.</p><p><strong>Call-to-Action (CTA):</strong> "Clique aqui para aprender mais" não funciona. Específico funciona: "Clique para garantir sua vaga" ou "Assista o vídeo de 10 minutos onde te mostro a fórmula exata".</p><blockquote class="example"><strong>Estrutura Pronta:</strong> Subject: Pergunta provocante; Abertura: Conexão imediata; Parágrafo 1: Reconhecimento do problema; Parágrafo 2-4: Educação ou história; Parágrafo 5: Transição para solução; Parágrafo 6: Call-to-action específico</blockquote><h4>Gatilhos Psicológicos</h4><p>Reciprocidade: Você dá valor primeiro (guia grátis, dica). Depois pede (clique no link).</p><p>Escassez: "Tenho 20 vagas, 19 já estão ocupadas".</p><p>Urgência: "Termina em 24 horas".</p><p>Autoridade: "Como alguém que gerou \\\$2M em vendas...".</p><blockquote class="news"><strong>Dado:</strong> Emails que usam 2-3 gatilhos psicológicos converteram 40% melhor do que emails sem gatilhos.</blockquote>` },
      { id: 2, title: 'Lidar com Objeções Comuns', html: `<h2>Lidar com Objeções Comuns</h2><p>Nem todo mundo que vê sua oferta vai comprar. Tem gente que acha caro, que acha que não é para ela, que duvida se funciona. Você precisa antecipar e responder essas objeções.</p><h4>Objeção 1: "É Muito Caro"</h4><p>Você não rebaixa preço. Você reframes valor. "Você vai aprender um método que pode gerar \\\$50k para você em 90 dias. \\\$2k é investimento, não custo."</p><blockquote class="tip"><strong>Princípio:</strong> Caro é relativo. Se o valor é \\\$50k e o preço é \\\$2k, é barato. Se o valor é desconhecido, é caro.</blockquote><p>Você mostra o ROI. Casos de cliente que geraram 10x o investimento.</p><h4>Objeção 2: "Não Tenho Tempo"</h4><p>"Entendo. Por isso a estrutura é feita para você executar em 30 minutos por dia. Mesmo com agenda lotada, você consegue."</p><blockquote class="example"><strong>Resposta:</strong> Mostre prova que pessoas ocupadas conseguem fazer. Depoimento de um CEO que completou o curso em 90 dias mesmo trabalhando 60 horas/semana.</blockquote><h4>Objeção 3: "Não Tenho Certeza se Funciona Comigo"</h4><p>Garantia de satisfação. "Se em 30 dias você não vê resultado, devolvemos 100% do seu dinheiro, sem perguntas."</p><blockquote class="news"><strong>Insight:</strong> Garantia remove risco. Você está tão seguro que funciona que aceita devolver. Isso vende.</blockquote><h4>Objeção 4: "Tem Muito Conteúdo, Vou Ficar Sobrecarregado"</h4><p>"A estrutura é passo-a-passo. Semana 1 você faz módulo 1, semana 2 você faz módulo 2. Não é tudo de uma vez. Você progride devagar."</p><p>Você responde as objeções ANTES que apareçam. Seu email de revelação responde: sim é caro, mas aqui está o ROI; sim é tempo, mas é pouco tempo; sim tem risco, mas tem garantia. Tudo claro.</p>` },
      { id: 3, title: 'Metrificação em Tempo Real', html: `<h2>Metrificação em Tempo Real</h2><p>Você está lançando. Você precisa saber em tempo real como está indo. Está funcionando? Precisa fazer ajuste?</p><h4>As Métricas que Importam</h4><p><strong>Email Opens:</strong> Que % de pessoas que recebem seu email abrem? 20% é bom, 30% é excelente. Se está baixo, seu subject ruim.</p><p><strong>Click Rate (CTR):</strong> Que % clica no link? 2% é normal, 5% é bom. Se está baixo, seu copy não conecta.</p><p><strong>Conversion Rate:</strong> Quantos dos que clicam compram? 1% é mínimo, 5% é ótimo, 10%+ você está fazendo algo certo.</p><blockquote class="tip"><strong>Fórmula:</strong> Conversão Total = (Audiência alcançada) × (Open Rate) × (CTR) × (Conversion Rate)</blockquote><p><strong>Receita por Email:</strong> Quanto você fez em receita dividido por emails enviados? Se você enviou 10.000 emails e fez \\\$50.000, você fez \\\$5 por email.</p><h4>Ajustes em Tempo Real</h4><p>Dia 1 você envia email 1. Você vê que open rate é 15% (baixo). O que você faz? Você não reclama — você pega o learning. "Meu subject não conecta com esse público. Próximo email precisa de um subject melhor."</p><blockquote class="example"><strong>Ação Imediata:</strong> Se CTR é baixo (1%), você pode mandar um segundo email para quem abriu o primeiro mas não clicou. Diferente subject, diferente ângulo. Sem custo extra, só reaproveitando.</blockquote><p>Isso é a diferença entre amador e profissional. Amador manda tudo e torce. Profissional mede, aprende, ajusta.</p><blockquote class="news"><strong>Prática 2026:</strong> Top creators rodam testes A/B constantemente. Subject A vs B, copy curto vs longo, imagem vs sem imagem. Dados ditam próximos passos.</blockquote>` }
    ],
    flashcards: [
      { q: 'Qual é o objetivo do Dia 1 de um lançamento?', a: 'Despertar curiosidade com um teaser misterioso, não revelando ainda qual é o produto.' },
      { q: 'Qual é o objetivo do Dia 2-3?', a: 'Storytelling e conexão emocional — contar sua história e vulnerabilidades.' },
      { q: 'Qual é o objetivo do Dia 5?', a: 'Reveal do produto — mostrar exatamente o que é, quanto custa, como entra.' },
      { q: 'Qual é o objetivo do Dia 6-7?', a: 'Criar urgência com preço aumentando, vagas limitadas ou bônus desaparecendo.' },
      { q: 'Qual é a estrutura de um email que vende?', a: 'Subject provocante → Abertura de conexão → Parágrafo 1-4: educação → Parágrafo 5: transição → Parágrafo 6: CTA específico.' },
      { q: 'O que faz um subject line ter alta taxa de abertura?', a: 'Curiosidade, número, pergunta, urgência ou promessa.' },
      { q: 'Qual é a diferença entre "clique aqui" vs um CTA específico?', a: 'Genérico não funciona. "Clique para garantir sua vaga" ou "Assista ao vídeo" funciona melhor.' },
