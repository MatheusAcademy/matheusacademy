        content: `<h4>Adaptação ao Estresse</h4><p><strong>Exercício é estresse controlado. Seu corpo percebe estresse (músculos recebem carga), causa dano microscópico. Durante recuperação (e especialmente sono), corpo adapta: músculos ficam mais fortes, densos, resistentes</strong>.</p><blockquote class="tip">Estresse + Recuperação = Adaptação. Exercício sem recuperação = apenas dano. Recuperação sem exercício = sem estímulo para adaptação. Você precisa de ambos.</blockquote><p>Esse ciclo de estresse-recuperação é fundamental. Você não ganha músculo durante treino. Você ganha durante sono e repouso quando corpo está reconstruindo.</p><h4>Progressão</h4><p><strong>Seu corpo se adapta rapidamente. Após 2-4 semanas do mesmo treino, corpo acostuma e platôs. Você precisa de estímulo novo para continuar adaptando. Isso é "progressive overload"</strong>.</p><blockquote class="example">Você faz 10 flexões. Segunda semana é fácil. Terceira semana ainda é fácil. Seu corpo já se adaptou. Para continuar ganho, você precisa fazer 12 flexões, ou fazer em velocidade lenta, ou fazer com peso. Novo estímulo = novo ganho.</blockquote><blockquote class="quote">Seu corpo é adaptável. Mas se pede estímulo novo para continuar adaptando.</blockquote>`},

        id: 'program',
        name: 'Programação de Treino: Periodização e Ciclos',
        content: `<h4>Linear Periodization</h4><p><strong>Linear periodization é estrutura onde você varia volume e intensidade ao longo de semanas: começar leve/volume alto, depois pesado/volume baixo, depois médio/volume médio. Ciclo típico é 4-8 semanas</strong>.</p><blockquote class="tip">Semana 1: 3x12 (volume alto, leve). Semana 2: 3x10 (volume médio, moderado). Semana 3: 3x8 (volume baixo, pesado). Semana 4: 3x5 (volume muito baixo, muito pesado). Semana 5: 3x12 (reset). Você não faz "mesma coisa" todos os dias.</blockquote><p>Variação previne platô e lesão.</p><h4>Undulating Periodization</h4><p><strong>Undulating varia dentro semana ao invés de progressivamente ao longo: segunda força (5x5), quarta hipertrofia (3x10), sexta resistência (2x15)</strong>.</p><blockquote class="example">Alguém que faz força segunda consegue recuperar completamente antes quarta (hipertrofia) porque treino diferente não compete por mesmos recursos. Terça/quinta são descanso/leve. Sexta é alta repetição.</blockquote><blockquote class="quote">Periodização evita platô porque seu corpo nunca se acomoda completamente.</blockquote>`},
