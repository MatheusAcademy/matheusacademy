<h3>As duas maiores economias do planeta</h3>
<p>Estados Unidos e China são, indiscutivelmente, as duas maiores potências econômicas do mundo, e a rivalidade entre elas define a arquitetura econômica global do século XXI. Os Estados Unidos possuem o maior Produto Interno Bruto (PIB) nominal do mundo, atingindo aproximadamente <strong>US$ 28,8 trilhões</strong> em 2024, sustentado por um setor de serviços altamente sofisticado, um ecossistema de inovação tecnológica sem paralelo (Silicon Valley, Boston, Austin, Seattle), mercados de capitais profundos e líquidos (NYSE e NASDAQ são as duas maiores bolsas do mundo por capitalização), e uma moeda — o dólar americano — que serve como reserva global e meio de troca do comércio internacional. A economia americana é construída sobre consumo interno (que representa cerca de 70% do PIB), propriedade intelectual, marcas globais e uma vantagem militar-tecnológica que sustenta sua hegemonia econômica.</p>

<h4>O milagre econômico chinês</h4>
<p>A China, por sua vez, é a segunda maior economia do mundo por PIB nominal (aproximadamente <strong>US$ 18,5 trilhões</strong> em 2024) e, crucialmente, a <strong>maior economia do mundo por Paridade de Poder de Compra (PPC)</strong> — uma métrica que ajusta o PIB pelo custo de vida local, situando o PIB chinês em PPC em torno de US$ 35 trilhões. O crescimento econômico chinês nas últimas quatro décadas é o fenômeno econômico mais impressionante da história moderna: desde as reformas de Deng Xiaoping em 1978, a China tirou mais de 800 milhões de pessoas da pobreza extrema, transformou-se de uma economia agrária fechada em uma potência industrial global, e passou de representar menos de 2% do PIB mundial para mais de 18%. A China é hoje o maior exportador do mundo, o maior parceiro comercial de mais de 120 países, o maior produtor industrial do planeta e o principal detentor de títulos do Tesouro americano entre países estrangeiros.</p>

<blockquote class="tip">Embora a China seja a maior economia em PPC, os EUA mantêm vantagem significativa em PIB per capita: aproximadamente US$ 85.000 contra US$ 13.000. Isso significa que, embora a economia chinesa total seja maior em termos de poder de compra, o cidadão americano médio é significativamente mais rico. Essa diferença reflete o estágio de desenvolvimento: a China ainda é classificada como economia de renda média-alta pelo Banco Mundial.</blockquote>

<h4>Interdependência e rivalidade</h4>
<p>O que torna a relação EUA-China tão complexa é que ela combina profunda interdependência econômica com rivalidade estratégica crescente. Os EUA são o maior mercado de exportação da China, enquanto a China é o terceiro maior mercado de exportação dos EUA (e o maior se contarmos Hong Kong). Empresas americanas dependem massivamente de cadeias de suprimento chinesas: a Apple fabrica virtualmente todos os seus iPhones na China, a Tesla opera uma de suas maiores fábricas em Xangai, e dezenas de milhares de empresas americanas dependem de componentes chineses. Simultaneamente, a China depende de tecnologia americana em setores críticos como semicondutores, software, equipamentos de fabricação avançada e propriedade intelectual em biotecnologia e farmacêutica.</p>

<h4>Modelos econômicos divergentes</h4>
<p>A rivalidade é amplificada por modelos econômicos fundamentalmente diferentes. Os EUA operam uma economia de mercado com regulação relativamente leve, onde o setor privado é o principal motor de crescimento e inovação, e o governo desempenha um papel relativamente limitado na direção da economia. A China opera o que chama de "socialismo com características chinesas" — na prática, um modelo de <strong>capitalismo de Estado</strong> onde o Partido Comunista Chinês (PCC) mantém controle estratégico sobre setores-chave da economia, empresas estatais dominam setores como energia, telecomunicações e finanças, e planos quinquenais definem prioridades industriais. O Estado chinês subsidia maciçamente setores considerados estratégicos (semicondutores, veículos elétricos, energia renovável, IA), utiliza políticas industriais agressivas, e controla o fluxo de capitais e a taxa de câmbio.</p>

<blockquote class="news">Em 2025, a China manteve seu status como maior parceiro comercial do mundo, com volume de comércio exterior ultrapassando US$ 6 trilhões. Entretanto, a economia chinesa enfrenta desafios sérios: crise imobiliária prolongada, deflação, desemprego juvenil acima de 15%, e o chamado "middle income trap" — a dificuldade de transição de economia de renda média para alta.</blockquote>

<h4>A inevitabilidade do confronto?</h4>
<p>O cientista político Graham Allison, de Harvard, cunhou o termo "Armadilha de Tucídides" para descrever a dinâmica histórica em que uma potência emergente (China) desafia uma potência estabelecida (EUA), frequentemente resultando em conflito. Dos 16 casos históricos que Allison identificou nos últimos 500 anos, 12 terminaram em guerra. A questão central do nosso tempo é se EUA e China conseguirão ser a exceção — gerenciando sua rivalidade dentro de limites que evitem confronto direto — ou se a competição econômica, tecnológica e militar escalará inevitavelmente para algo mais perigoso. Este curso examina a dimensão econômica dessa rivalidade em profundidade.</p>

<h3>A era do engajamento (1972-2016)</h3>
<p>A relação econômica entre EUA e China que conhecemos hoje não surgiu da noite para o dia — ela é o produto de mais de cinco décadas de evolução diplomática, comercial e estratégica que passou por fases distintas. Compreender essa história é essencial para entender por que a guerra econômica atual era, em retrospectiva, quase inevitável, e por que as tentativas de resolvê-la enfrentam obstáculos tão profundos.</p>

<h4>Nixon e a abertura (1972)</h4>
<p>O ponto de partida simbólico é a visita histórica do presidente Richard Nixon a Pequim em fevereiro de 1972. Até então, os EUA não reconheciam a República Popular da China (mantinham relações diplomáticas com Taiwan) e o comércio entre os dois países era praticamente inexistente. A abertura de Nixon — motivada pela estratégia de Henry Kissinger de usar a China como contrapeso à União Soviética — iniciou um processo de normalização que culminou no reconhecimento diplomático em 1979, sob Jimmy Carter. Este movimento geopolítico abriu a porta para o que viria a ser a maior transformação econômica da história moderna.</p>

<h4>Deng Xiaoping e a reforma econômica (1978-1989)</h4>
<p>As reformas de Deng Xiaoping a partir de 1978 — sintetizadas no slogan "reforma e abertura" (gaige kaifang) — transformaram a China de uma economia planejada fechada em uma potência exportadora. Deng criou as Zonas Econômicas Especiais (ZEEs) em Shenzhen, Zhuhai, Shantou e Xiamen, onde investimento estrangeiro e práticas de mercado eram permitidos. O conceito era simples mas revolucionário: atrair capital e tecnologia estrangeiros oferecendo mão de obra abundante e barata, infraestrutura em rápida expansão e regulação favorável. Empresas americanas, europeias e japonesas foram seduzidas pela perspectiva de custos de produção dramaticamente menores e acesso potencial a um mercado de mais de 1 bilhão de consumidores.</p>

<blockquote class="quote">Deng Xiaoping declarou: "Não importa se o gato é preto ou branco, desde que cace ratos." Esta frase sintetiza o pragmatismo econômico que guiou as reformas chinesas — a ideologia comunista foi subordinada ao objetivo de crescimento econômico e modernização.</blockquote>

<h4>A entrada na OMC (2001): o ponto de inflexão</h4>
<p>O momento mais transformador na história econômica recente da China foi sua adesão à <strong>Organização Mundial do Comércio (OMC)</strong> em 11 de dezembro de 2001. A entrada foi fortemente apoiada pelo governo Clinton e pelo establishment bipartidário americano, baseada na teoria de que a integração econômica levaria eventualmente à liberalização política chinesa — uma tese que se provaria fundamentalmente equivocada. A adesão à OMC abriu os mercados mundiais para as exportações chinesas em condições de "nação mais favorecida" e desencadeou uma avalanche de investimento estrangeiro na China. O resultado foi o que os economistas chamam de "Choque da China": entre 2001 e 2010, estima-se que 2 a 2,4 milhões de empregos industriais americanos foram perdidos diretamente como resultado da competição com importações chinesas baratas.</p>

<h4>A era Obama e a virada estratégica</h4>
<p>O governo Barack Obama (2009-2017) marcou o início da mudança de postura americana. O "Pivot to Asia" (Rebalanceamento para a Ásia) reconhecia que a China não estava seguindo o caminho de liberalização política que os arquitetos do engajamento haviam previsto. O Acordo Transpacífico (TPP) foi concebido como uma ferramenta para estabelecer regras comerciais na Ásia-Pacífico que excluíssem a China. Simultaneamente, preocupações com propriedade intelectual, subsídios estatais, manipulação cambial, ciberespionagem econômica e práticas de "dumping" industrial começaram a dominar o discurso bilateral. Em 2015, o governo Obama alcançou um acordo com Xi Jinping para que ambos os países não conduzissem ciberespionagem para ganho comercial — um acordo que muitos analistas consideram ter sido violado pela China.</p>

<blockquote class="news">O "Choque da China" pós-OMC devastou regiões industriais americanas como o Rust Belt (Cinturão da Ferrugem). Estudos econômicos mostram que condados americanos mais expostos à competição chinesa experimentaram não apenas perda de empregos, mas aumento de mortalidade, abuso de opioides, divórcios e radicalização política — contribuindo diretamente para o clima que elegeu Donald Trump em 2016.</blockquote>

<h4>O consenso que ruiu</h4>
<p>O período de 1972 a 2016 pode ser resumido como uma era em que o consenso bipartidário americano — compartilhado por democratas e republicanos, Wall Street e Silicon Valley, academia e governo — era de que a integração econômica com a China beneficiaria ambos os países e, eventualmente, o mundo. Esse consenso ruiu. Hoje, a postura dura contra a China é um dos raros pontos de acordo entre republicanos e democratas no Congresso. A questão não é mais "se" os EUA devem confrontar as práticas econômicas chinesas, mas "como" e "até que ponto".</p>

  content:`
<h3>A ruptura do consenso</h3>
<p>A eleição de Donald Trump em novembro de 2016 marcou o fim definitivo da era de engajamento econômico com a China. Trump fez da confrontação comercial com a China um pilar central de sua campanha, denunciando décadas de acordos comerciais que ele considerava desfavoráveis aos EUA e prometendo impor tarifas pesadas para "nivelar o campo de jogo". Em janeiro de 2018, suas promessas se tornaram realidade, inaugurando a mais significativa guerra comercial entre grandes potências desde os anos 1930.</p>

<h4>A escalada tarifária de 2018</h4>
<p>A guerra comercial começou oficialmente em 6 de julho de 2018, quando os EUA impuseram uma tarifa de 25% sobre US$ 34 bilhões em importações chinesas — a primeira fase de um pacote de US$ 50 bilhões proposto em março. Uma segunda rodada, atingindo mais US$ 16 bilhões, seguiu-se em agosto de 2018. A China retaliou imediatamente e de forma proporcional: impôs tarifas de 25% sobre US$ 34 bilhões em exportações americanas (principalmente produtos agrícolas como soja, carne suína e automóveis) em julho, e mais 25% sobre US$ 16 bilhões adicionais em agosto. A lógica americana era que as tarifas forçariam a China a negociar mudanças estruturais em suas práticas comerciais — incluindo roubo de propriedade intelectual, transferência forçada de tecnologia, subsídios estatais e acesso restrito ao mercado chinês para empresas americanas.</p>

<h4>A escalada de 2019: sem limites à vista</h4>
<p>Após negociações fracassadas, a guerra tarifária escalou dramaticamente em 2019. Em maio, Trump elevou tarifas de 10% para 25% sobre US$ 200 bilhões em produtos chineses. Em agosto, anunciou tarifas adicionais de 15% sobre mais US$ 300 bilhões — efetivamente cobrindo quase todas as importações chinesas. A China retaliou com tarifas sobre US$ 75 bilhões em produtos americanos, desvalorizou o yuan para além da marca simbólica de 7 por dólar (provocando acusações americanas de manipulação cambial), e suspendeu compras de produtos agrícolas americanos. No auge do conflito em 2019, os EUA tinham tarifas de 15% sobre US$ 300 bilhões e 30% sobre US$ 250 bilhões de bens chineses.</p>

<blockquote class="example">Os agricultores americanos foram as maiores vítimas colaterais da guerra comercial. As exportações de soja para a China caíram 75% em 2018 após as tarifas retaliatórias chinesas. O governo Trump autorizou US$ 28 bilhões em subsídios emergenciais aos fazendeiros — mais do que o dobro do custo do bailout da indústria automobilística em 2009. A China rapidamente substituiu a soja americana pela brasileira, e muitos analistas acreditam que o Brasil se beneficiou permanentemente dessa mudança.</blockquote>

<h4>O Acordo Fase Um (janeiro de 2020)</h4>
<p>Em 15 de janeiro de 2020, após meses de negociações, EUA e China assinaram o <strong>Acordo Comercial Fase Um</strong>. A China comprometeu-se a comprar US$ 200 bilhões adicionais em bens e serviços americanos ao longo de dois anos (2020-2021), incluindo manufaturados, energia, agricultura e serviços. Em troca, os EUA cancelaram novas tarifas programadas e reduziram algumas existentes. O acordo também incluía compromissos chineses sobre propriedade intelectual, transferência forçada de tecnologia, acesso a mercados financeiros e manipulação cambial. Porém, os compromissos estruturais mais profundos — como a questão dos subsídios estatais — foram adiados para uma hipotética "Fase Dois" que nunca se materializou.</p>

<h4>COVID-19 e o colapso da Fase Um</h4>
<p>A pandemia de COVID-19, que emergiu na China no final de 2019 e devastou a economia global em 2020, destruiu qualquer possibilidade de cumprimento do acordo. O comércio global colapsou temporariamente, cadeias de suprimento foram interrompidas, e a China ficou longe de atingir as metas de compra: ao final de 2021, a China havia cumprido apenas 57% dos compromissos de compra do Acordo Fase Um. A pandemia também envenenou ainda mais as relações bilaterais, com acusações mútuas sobre a origem do vírus, restrições a jornalistas, fechamento de consulados e uma espiral de hostilidade retórica que eliminou qualquer goodwill remanescente.</p>

<blockquote class="news">A taxa efetiva média de tarifas americanas sobre importações chinesas saiu de menos de 5% em 2017 para aproximadamente 20% ao final de 2020 sob Trump, manteve-se estável sob Biden, e então disparou para 145% em abril de 2025 no início do Trump 2.0 — o nível mais alto desde a Lei Smoot-Hawley de 1930, que é amplamente creditada por ter aprofundado a Grande Depressão.</blockquote>

<h4>Avaliação do Trump 1.0</h4>
<p>A guerra comercial Trump 1.0 produziu resultados mistos. Por um lado, colocou as práticas econômicas chinesas no centro do debate global, forçou alguma abertura do mercado financeiro chinês, e estabeleceu que tarifas eram uma ferramenta viável de pressão. Por outro, não reduziu significativamente o déficit comercial bilateral (que na verdade cresceu), impôs custos significativos aos consumidores e empresas americanos, devastou setores agrícolas, e não provocou as reformas estruturais profundas que eram seu objetivo declarado.</p>

<h3>O retorno e a radicalização</h3>
<p>O retorno de Donald Trump à presidência em janeiro de 2025 inaugurou uma nova fase da guerra comercial que superou em escala e agressividade tudo o que havia sido visto no primeiro mandato. Se o Trump 1.0 usou tarifas como instrumento de pressão negociadora, o Trump 2.0 elevou a confrontação tarifária a um nível que muitos economistas consideram sem precedentes na era moderna, rivalizando apenas com o protecionismo da Lei Smoot-Hawley de 1930.</p>

<h4>A escalada relâmpago de 2025</h4>
<p>Trump começou a elevar tarifas contra a China imediatamente após a posse, citando inicialmente o combate ao tráfico de fentanil como justificativa. Em fevereiro de 2025, impôs uma tarifa adicional de 20% sobre todas as importações chinesas. Em abril de 2025, anunciou uma tarifa universal de 10% sobre todas as importações de todos os países (o chamado "Liberation Day"), com tarifas adicionais escalonadas por país baseadas no déficit comercial bilateral. Para a China, o efeito cumulativo foi devastador: em poucas semanas, as tarifas americanas sobre produtos chineses saltaram de aproximadamente 20% para <strong>145 pontos percentuais acima</strong> do nível anterior. A China retaliou impondo tarifas de 125% sobre produtos americanos, além de restrições à exportação de terras raras e minerais críticos.</p>

<blockquote class="news">Em abril de 2025, a tarifa efetiva média dos EUA sobre importações chinesas atingiu 145% — um nível que economistas da Tax Foundation classificaram como "o maior aumento tributário como porcentagem do PIB nos EUA desde 1993", representando um custo adicional médio de US$ 1.500 por família americana em 2026.</blockquote>

<h4>A Suprema Corte e a crise constitucional</h4>
<p>Em fevereiro de 2026, a Suprema Corte dos Estados Unidos decidiu que as tarifas impostas sob a <strong>IEEPA (International Emergency Economic Powers Act)</strong> — a base legal usada por Trump para impor tarifas emergenciais — eram ilegais quando aplicadas como ferramenta comercial generalizada. A decisão forçou o governo a reestruturar sua estratégia tarifária, substituindo as tarifas IEEPA por uma combinação de investigações e tarifas sob a Seção 122 (tarifa temporária de emergência de 10% por 150 dias), Seção 301 (práticas comerciais desleais) e Seção 232 (segurança nacional). Em março de 2026, o USTR (Representante Comercial dos EUA) lançou novas investigações Seção 301 contra a China, Vietnam, Taiwan, México, Japão e UE, e a China retaliou com investigações próprias sobre práticas comerciais americanas.</p>

<h4>O acordo de novembro de 2025 e a trégua parcial</h4>
<p>Em novembro de 2025, após meses de escalada que ameaçavam causar uma recessão global, Trump e Xi Jinping alcançaram um acordo parcial: os EUA reduziram em 10 pontos percentuais as tarifas sobre importações chinesas originalmente justificadas pelo combate ao fentanil, e suspenderam as tarifas recíprocas mais elevadas até novembro de 2026. A China concordou com medidas de cooperação no combate ao tráfico de fentanil e com a retomada de compras de determinados produtos agrícolas americanos. O acordo foi amplamente visto como uma trégua tática, não uma resolução — as tensões estruturais permaneceram intocadas.</p>

<h4>Impactos econômicos globais</h4>
<p>A escalada tarifária de 2025 enviou ondas de choque pela economia global. O comércio bilateral EUA-China contraiu drasticamente: importações americanas da China caíram significativamente enquanto empresas buscavam fornecedores alternativos no Vietnã, Índia, México e outros países. Os preços ao consumidor americano subiram, pressionando a inflação. Cadeias de suprimento globais foram reorganizadas em um processo chamado de "China Plus One" — empresas mantendo operações na China mas diversificando para outros países como hedge contra risco geopolítico. Mercados financeiros experimentaram volatilidade significativa, e o FMI reduziu projeções de crescimento global.</p>

<blockquote class="tip">A cúpula Trump-Xi programada para maio de 2026 — a primeira visita de Trump à China em oito anos — é vista como potencialmente decisiva. Analistas especulam que um "grand bargain" (grande acordo) poderia incluir reduções tarifárias em troca de concessões chinesas em propriedade intelectual, acesso a mercados e compras de energia. No entanto, as posições de ambos os lados permanecem muito distantes.</blockquote>

<h4>A nova realidade</h4>
<p>O Trump 2.0 estabeleceu uma nova realidade na relação comercial EUA-China: tarifas de três dígitos são agora o ponto de partida, não o extremo. A doutrina de "desacoplamento seletivo" (selective decoupling) do primeiro mandato deu lugar a algo mais próximo de uma "contenção econômica" (economic containment) no segundo. A China, por sua vez, acelerou seus esforços de autossuficiência tecnológica e diversificação de parcerias comerciais, reduzindo deliberadamente sua dependência do mercado americano. Dados do PIIE mostram que, em 2026, a China praticamente não compra mais exportações americanas em diversos setores — uma mudança estrutural que pode ser irreversível.</p>

<h3>Por que semicondutores são tão importantes?</h3>
<p>Semicondutores — os minúsculos chips de silício que alimentam praticamente toda a tecnologia moderna — tornaram-se o recurso estratégico mais disputado da rivalidade EUA-China, comparável ao que o petróleo foi no século XX. Sem chips avançados, não existem smartphones, computadores, servidores de dados, sistemas de IA, veículos autônomos, armas guiadas, satélites ou praticamente nenhum equipamento eletrônico sofisticado. A cadeia global de semicondutores é extraordinariamente concentrada: a <strong>TSMC (Taiwan Semiconductor Manufacturing Company)</strong>, com sede em Taiwan, produz mais de 90% dos chips mais avançados do mundo (abaixo de 7 nanômetros). Essa concentração cria uma vulnerabilidade geopolítica sem precedentes: quem controla os chips controla o futuro tecnológico — e, por extensão, econômico e militar — do planeta.</p>

<h4>A ofensiva americana de controles de exportação</h4>
<p>A partir de 2022, os EUA lançaram a mais agressiva campanha de controles de exportação tecnológicos desde a Guerra Fria, com o objetivo declarado de impedir a China de acessar chips avançados e equipamentos de fabricação de semicondutores. Em outubro de 2022, o governo Biden emitiu regras abrangentes que proibiam a venda de chips avançados para a China, restringiam o acesso chinês a equipamentos de litografia (especialmente os produzidos pela holandesa ASML, a única empresa no mundo capaz de fabricar máquinas de litografia EUV necessárias para chips abaixo de 7nm), e até proibiam cidadãos americanos de trabalhar na indústria de semicondutores chinesa. Em janeiro de 2025, a "AI Diffusion Rule" ampliou os controles para impedir que a China acessasse poder computacional avançado de IA através de países terceiros.</p>

<blockquote class="tip">A cadeia de semicondutores é a mais complexa e globalizada de qualquer indústria humana: areias de quartzo são purificadas em cristais de silício no Japão, wafers são cortados na Alemanha, designs são criados nos EUA com software da Synopsys/Cadence, equipamentos de litografia vêm da Holanda (ASML), fabricação ocorre em Taiwan (TSMC) ou Coreia (Samsung), e montagem final acontece na China, Malásia ou Vietnã. Nenhum país controla toda a cadeia.</blockquote>

<h4>O cerco à China</h4>
<p>Os EUA não agiram sozinhos: pressionaram aliados para aderir às restrições. Japão e Holanda — os dois outros países com capacidade significativa em equipamentos de fabricação de chips — concordaram em impor suas próprias restrições à exportação para a China em 2023. A ASML, que detém monopólio mundial em equipamentos EUV, foi proibida de vender suas máquinas mais avançadas para clientes chineses. Sem EUV, a China está limitada a produzir chips de no máximo 7nm usando técnicas de litografia DUV mais antigas — um processo possível mas extremamente ineficiente e com rendimento muito inferior. Os EUA também colocaram dezenas de empresas chinesas na "Entity List", efetivamente proibindo-as de adquirir qualquer tecnologia americana.</p>

<h4>Trump 2.0 e as oscilações políticas</h4>
<p>O governo Trump 2.0 manteve a maioria dos controles de exportação de Biden e, em março de 2025, adicionou dezenas de novas entidades chinesas à lista negra. Porém, em uma mudança surpreendente, em dezembro de 2025, Trump autorizou a NVIDIA a vender seus processadores de IA H200 para clientes chineses — com condições de que o volume não excedesse 50% das vendas americanas e que cada remessa passasse por testes independentes nos EUA. A decisão refletiu uma realidade incômoda: os controles de exportação estavam prejudicando empresas americanas como NVIDIA, Qualcomm e Intel tanto quanto estavam prejudicando a China, pois a China representa um mercado de dezenas de bilhões de dólares para chips americanos.</p>

<blockquote class="news">Um relatório do ITIF (Information Technology and Innovation Foundation) de outubro de 2025 concluiu que os controles de exportação "saíram pela culatra": ajudaram a Huawei a desenvolver capacidades domésticas e prejudicaram empresas americanas que perderam receita e participação de mercado. A NVIDIA perdeu estimados US$ 17 bilhões em vendas potenciais para a China entre 2022 e 2025.</blockquote>

<h4>O significado estratégico</h4>
<p>A guerra dos chips representa uma mudança fundamental na natureza da competição econômica: pela primeira vez, os EUA estão usando controles de exportação de tecnologia não para conter uma ameaça militar imediata, mas para manter uma vantagem tecnológica estrutural sobre um rival econômico. Jake Sullivan, conselheiro de Segurança Nacional de Biden, articulou explicitamente a doutrina: os EUA não buscam apenas manter uma vantagem, mas manter uma vantagem tão grande que a China não possa alcançá-los. Essa abordagem tem precedentes históricos (o embargo tecnológico contra a URSS durante a Guerra Fria), mas nunca foi aplicada em uma escala tão ampla contra uma economia tão integrada ao sistema comercial global.</p>

  content:`
<h3>A determinação chinesa de superar o cerco</h3>
<p>Diante dos controles de exportação americanos, a China respondeu com uma mobilização industrial e tecnológica de escala impressionante, canalizada pelo que o governo chama de estratégia de "dupla circulação" — fortalecer o mercado interno (circulação interna) enquanto mantém integração seletiva com a economia global (circulação externa). No setor de semicondutores, essa estratégia se traduziu em investimentos estatais massivos, programas de pesquisa acelerados e uma determinação política de alcançar autossuficiência a qualquer custo.</p>

<h4>Huawei: o símbolo da resistência</h4>
<p>Nenhuma empresa exemplifica melhor a resposta chinesa do que a <strong>Huawei Technologies</strong>. Em 2019, os EUA colocaram a Huawei na Entity List, cortando-a do acesso a chips americanos, software Google (Android com serviços Google) e equipamentos de fabricação. O que deveria ter sido uma sentença de morte comercial tornou-se um catalisador de inovação. Em agosto de 2023, a Huawei surpreendeu o mundo ao lançar o smartphone Mate 60 Pro equipado com o chip Kirin 9000S — fabricado pela chinesa SMIC usando um processo de 7nm que os analistas não acreditavam que a China fosse capaz de dominar tão rapidamente. A Huawei também desenvolveu seu próprio sistema operacional (HarmonyOS) para substituir o Android e seu próprio ecossistema de serviços para substituir os do Google.</p>

<blockquote class="example">Em uma manobra audaciosa, a Huawei supostamente utilizou empresas de fachada para enganar a TSMC e obter a fabricação de 2 milhões de chiplets para seus processadores de IA Ascend 910. A Huawei planeja combinar dois desses chiplets para construir a próxima geração Ascend 910C. Em abril de 2025, a Huawei anunciou o Ascend 920, posicionado como alternativa direta ao H20 da NVIDIA para aplicações de inteligência artificial.</blockquote>

<h4>SMIC e a capacidade de fabricação chinesa</h4>
<p>A <strong>SMIC (Semiconductor Manufacturing International Corporation)</strong> é a maior fundição de chips da China e o principal veículo do esforço de autossuficiência. Em 2025, a capacidade total de nós avançados da SMIC era estimada em 45.000 wafers por mês, expandindo para 60.000 até 2026. Em março de 2026, a <strong>Hua Hong Group</strong> anunciou que estava preparando capacidade de produção de 7nm em sua fábrica de Xangai. Além disso, pesquisadores da Universidade de Pequim anunciaram em março de 2025 o desenvolvimento de transistores 2D usando novos materiais que operam 40% mais rápido que dispositivos de 3nm da TSMC, consumindo 10% menos energia — embora essa tecnologia esteja anos distante da produção em massa.</p>

<h4>O Big Fund e o investimento estatal</h4>
<p>O principal instrumento de investimento estatal é o <strong>National Integrated Circuit Industry Investment Fund</strong> (conhecido como "Big Fund"). A primeira fase (2014) investiu aproximadamente US$ 22 bilhões, a segunda fase (2019) US$ 29 bilhões, e a terceira fase, lançada em maio de 2024, foi capitalizada com impressionantes <strong>US$ 47 bilhões</strong> — o maior fundo setorial da história chinesa. Esses recursos são direcionados para fabricação de chips, equipamentos, materiais e design, com o objetivo declarado de alcançar 70% de autossuficiência em semicondutores até 2025 (meta amplamente considerada inatingida) e independência substancial até 2030.</p>

<h4>Limitações e realidades</h4>
<p>Apesar dos progressos impressionantes, a China enfrenta limitações significativas. Sem acesso à litografia EUV da ASML, fabricar chips abaixo de 7nm é extremamente difícil e ineficiente. O rendimento (yield) das fábricas chinesas é significativamente inferior ao da TSMC e Samsung, tornando a produção mais cara e menos competitiva. A China ainda depende de equipamentos estrangeiros para etapas críticas da fabricação e de software EDA (Electronic Design Automation) americano para design de chips. A meta de 50% de autossuficiência em semicondutores para 2025 não foi atingida — a taxa real está entre 20% e 25% para chips em geral, e próxima de zero para chips de ponta.</p>

<blockquote class="news">A meta chinesa de autossuficiência de 50% em semicondutores para 2025 não foi alcançada — a taxa real está entre 20-25%. Porém, o ritmo de progresso é notável: em 2018, a taxa era inferior a 15%. Analistas projetam que a China pode atingir 40-50% até 2030, especialmente em chips maduros (acima de 14nm) onde já domina parcelas crescentes do mercado global.</blockquote>

{
  id:7,
  name:'A Corrida da Inteligência Artificial: DeepSeek vs. OpenAI',
  dur:'15min',
  content:`
<h3>IA como campo de batalha estratégico</h3>
<p>Se semicondutores são o hardware da guerra tecnológica, a Inteligência Artificial é o software — e a corrida pela supremacia em IA entre EUA e China tornou-se possivelmente o eixo mais consequente de toda a rivalidade bilateral. Ambas as nações reconhecem que a IA é uma tecnologia transformadora com implicações para absolutamente tudo: produtividade econômica, capacidade militar, vigilância e governança, pesquisa científica, e a própria estrutura do poder global. Quem liderar em IA terá uma vantagem potencialmente insuperável nas décadas vindouras.</p>

<h4>O panorama competitivo</h4>
<p>Os EUA mantêm liderança em modelos de linguagem de grande porte (LLMs) graças a empresas como OpenAI (GPT-4, GPT-5), Google DeepMind (Gemini), Anthropic (Claude) e Meta (LLaMA). Essa liderança é sustentada por acesso a hardware superior (chips NVIDIA A100, H100, H200 e futuros B200), enormes quantidades de dados em inglês, ecossistemas de pesquisa acadêmica de ponta, e capitais de risco abundantes. No entanto, a China avançou com velocidade impressionante: a participação global de LLMs chineses saltou de 3% para 13% em apenas dois meses em 2025, impulsionada principalmente pelo <strong>DeepSeek</strong> — um modelo de código aberto que surpreendeu o mundo ao demonstrar capacidades comparáveis a modelos americanos usando significativamente menos poder computacional.</p>

<blockquote class="news">O DeepSeek, desenvolvido por uma startup chinesa, abalou o mercado em janeiro de 2025 ao demonstrar que era possível treinar modelos de IA competitivos com GPT-4 usando uma fração dos recursos computacionais. A implicação estratégica foi profunda: os controles de exportação de chips americanos podiam ser parcialmente contornados por inovação em eficiência de software.</blockquote>

<h4>Estratégias divergentes: EUA vs. China</h4>
<p>Os EUA e a China estão adotando estratégias fundamentalmente diferentes na corrida da IA. Os EUA apostam em <strong>desregulação para acelerar inovação</strong>: em dezembro de 2025, Trump assinou uma ordem executiva ("Ensuring A National Policy Framework For AI") que preemptivelmente invalida leis estaduais de regulação de IA, seguindo a doutrina "Winning the Race" que prioriza remover obstáculos regulatórios para que empresas americanas inovem mais rapidamente. A China, paradoxalmente, lidera os esforços globais de <strong>regulação de IA</strong>: durante a World AI Conference de julho de 2025, o primeiro-ministro Li Qiang alertou que a IA poderia se tornar "um jogo exclusivo de poucos países e empresas" e propôs a criação da WAICO (World AI Cooperation Organization) para coordenar a regulação global de IA.</p>

<h4>IA open-source como estratégia geopolítica</h4>
<p>Uma das jogadas mais astutas da China é sua aposta em modelos de IA de código aberto. Enquanto empresas americanas como OpenAI e Anthropic mantêm seus modelos mais avançados proprietários, empresas chinesas como DeepSeek, Alibaba (Qwen) e Baidu (Ernie) estão liberando modelos poderosos como open-source. A estratégia tem uma lógica geopolítica clara: ao disponibilizar modelos gratuitos e de alta qualidade, a China busca capturar a infraestrutura global de IA — se desenvolvedores ao redor do mundo construírem seus sistemas sobre modelos chineses, isso cria dependência e influência tecnológica chinesa, análoga à influência que os EUA exercem através de plataformas como Android, Windows e AWS.</p>

<h4>O dilema dos chips e a IA</h4>
<p>A interseção entre a guerra dos chips e a corrida da IA cria um dilema estratégico para os EUA. Restringir o acesso chinês a chips avançados de IA retarda o progresso chinês no curto prazo, mas incentiva a China a desenvolver alternativas domésticas (como os chips Ascend da Huawei) e a inovar em eficiência de software (como o DeepSeek demonstrou). Além disso, as restrições reduzem a receita de empresas americanas como NVIDIA, potencialmente limitando seus investimentos em P&D futuros. É um jogo de consequências não-intencionais onde cada movimento ofensivo cria novas vulnerabilidades para o atacante.</p>

<blockquote class="tip">Analistas do Atlantic Council projetam que, até 2026, os EUA liderarão em chips de IA, a China avançará em modelos de linguagem (especialmente open-source), e ambos competirão pela influência na governança global de IA. A especialização, não a vitória total, pode ser o resultado mais provável da corrida da IA.</blockquote>

<h3>A guerra pela rede do futuro</h3>
<p>A disputa sobre a tecnologia 5G — a quinta geração de redes de telecomunicações móveis — foi uma das primeiras frentes da guerra tecnológica EUA-China e permanece um dos exemplos mais claros de como a tecnologia se tornou uma arena de competição geopolítica. A batalha pelo 5G transcende a questão de qual empresa fornece equipamentos de rede: trata-se de quem controlará a infraestrutura digital sobre a qual a economia do século XXI será construída — desde cidades inteligentes e veículos autônomos até telemedicina, manufatura automatizada e defesa militar.</p>

<h4>A ascensão da Huawei no 5G</h4>
<p>Até 2018, a <strong>Huawei</strong> era a maior fornecedora de equipamentos de telecomunicações do mundo, com participação de mercado global de aproximadamente 30%, à frente da sueca Ericsson (27%) e da finlandesa Nokia (22%). A empresa chinesa oferecia equipamentos 5G tecnologicamente avançados a preços significativamente menores que seus concorrentes europeus — até 30% mais baratos, segundo estimativas da indústria. A Huawei também liderava o número de patentes essenciais para o padrão 5G. Para muitas operadoras de telecomunicações, especialmente em países em desenvolvimento, a Huawei era simplesmente a opção mais atraente do ponto de vista de custo-benefício.</p>

<h4>A campanha americana contra a Huawei</h4>
<p>Os EUA lançaram uma campanha diplomática global sem precedentes para convencer aliados e parceiros a excluir a Huawei de suas redes 5G. O argumento central era de segurança nacional: leis chinesas de inteligência (especialmente a Lei de Inteligência Nacional de 2017) obrigam empresas chinesas a cooperar com serviços de inteligência do Estado quando solicitadas. Isso significava, segundo os EUA, que equipamentos Huawei em redes 5G críticas poderiam ser explorados pelo governo chinês para espionagem, sabotagem ou até mesmo como "kill switch" (interruptor de desligamento) em caso de conflito. A Huawei negou repetidamente essas alegações, e nenhuma evidência pública de backdoors em equipamentos Huawei foi apresentada.</p>

<blockquote class="example">A campanha americana produziu resultados significativos: Austrália (2018), Japão (2018), Nova Zelândia (2018), EUA (2019), Reino Unido (2020), Canadá (2022), Alemanha (2024) e diversos outros países baniram ou restringiram a Huawei de suas redes 5G. Porém, muitos países — especialmente na África, Sudeste Asiático, Oriente Médio e América Latina — optaram por manter a Huawei, atraídos por preços menores e relações comerciais com a China.</blockquote>

<h4>As consequências estratégicas</h4>
<p>A batalha do 5G revelou uma dinâmica fundamental da guerra econômica: a China está construindo uma "infraestrutura digital paralela" em grande parte do mundo em desenvolvimento, baseada em tecnologia chinesa (Huawei, ZTE), plataformas chinesas (TikTok, WeChat, Alibaba Cloud), e sistemas de pagamento chineses (Alipay, WeChat Pay). Para os EUA, isso representa um risco estratégico de longo prazo: países que adotam infraestrutura digital chinesa podem se tornar dependentes da China para upgrades, manutenção e compatibilidade, criando uma esfera de influência digital chinesa que os EUA terão dificuldade em penetrar ou reverter.</p>

<h4>O campo de batalha evolui: 6G e além</h4>
<p>Enquanto a batalha do 5G ainda está em curso, EUA e China já estão posicionando-se para a próxima geração: o 6G, que deve ser comercializado no início da década de 2030. Ambos os países estão investindo pesadamente em pesquisa e desenvolvimento de 6G e buscam dominar o processo de definição de padrões — um campo de batalha menos visível mas igualmente importante, pois quem define os padrões técnicos de uma tecnologia tem vantagem estrutural permanente. A China lidera em número de patentes 6G registradas, enquanto os EUA lideram em pesquisa fundamental. A corrida do 6G será mais uma arena onde tecnologia, economia e geopolítica se entrelaçam inextricavelmente.</p>

<blockquote class="news">Em 2025, a Huawei mantinha participação significativa no mercado global de equipamentos 5G, especialmente em países do Sul Global. A empresa investiu pesadamente em pesquisa 5.5G e 6G, registrando mais de 20% das patentes essenciais para 6G globalmente. A batalha pela infraestrutura digital do futuro está longe de terminada.</blockquote>

<h3>A hegemonia do dólar</h3>
<p>O dólar americano é, sem exagero, a arma econômica mais poderosa do mundo. Desde os Acordos de Bretton Woods (1944), o dólar serve como moeda de reserva global — aproximadamente 58% das reservas cambiais mundiais são denominadas em dólares, e cerca de 88% de todas as transações de câmbio envolvem o dólar de um lado. Mas o poder do dólar vai muito além de estatísticas: ele confere aos Estados Unidos um "privilégio exorbitante" (termo cunhado por Valéry Giscard d'Estaing) que inclui a capacidade de financiar déficits aparentemente ilimitados, imprimir a moeda que o mundo inteiro necessita, e — crucialmente para a guerra econômica — a capacidade de excluir qualquer entidade, empresa ou país do sistema financeiro global com uma única decisão.</p>

<h4>O sistema SWIFT e seu poder</h4>
<p>O mecanismo primário desse poder é o <strong>SWIFT (Society for Worldwide Interbank Financial Telecommunication)</strong>, uma cooperativa belga que processa mensagens de transações financeiras entre mais de 11.000 instituições em 200 países. Embora tecnicamente neutro, o SWIFT opera sob forte influência americana — quase todas as transações em dólar passam por bancos correspondentes americanos e, portanto, estão sujeitas à jurisdição dos EUA. Quando os EUA decidem sancionar um país, a exclusão do SWIFT é a "opção nuclear": a Rússia experimentou isso em 2022, quando grande parte de seus bancos foi desconectada do SWIFT após a invasão da Ucrânia, causando disrupção massiva em seu comércio exterior.</p>

<blockquote class="tip">A "weaponization" (armamentização) do dólar e do SWIFT tem um efeito paradoxal: quanto mais os EUA usam essas ferramentas como arma, mais incentivo outros países têm para buscar alternativas. Cada sanção reforça o poder americano no curto prazo, mas corrói a confiança no sistema no longo prazo.</blockquote>

<h4>Sanções contra a China: riscos e limites</h4>
<p>Embora os EUA tenham aplicado sanções direcionadas contra entidades chinesas (Huawei, empresas de defesa, oficiais de Xinjiang e Hong Kong), uma desconexão total da China do SWIFT ou do sistema do dólar é considerada praticamente impensável — a economia chinesa é grande demais e interconectada demais para ser isolada sem causar uma catástrofe financeira global. Contudo, a ameaça de sanções mais amplas funciona como pressão constante, e a experiência russa demonstrou vividamente o que pode acontecer. A China estudou cuidadosamente o caso russo e acelerou seus esforços para desenvolver alternativas ao sistema dominado pelo dólar.</p>

<h4>A resposta chinesa: CIPS e yuan digital</h4>
<p>A China desenvolveu o <strong>CIPS (Cross-Border Interbank Payment System)</strong> como alternativa ao SWIFT. Até março de 2025, o CIPS cobria operações em 186 países e regiões. Embora ainda muito menor que o SWIFT em volume, o CIPS oferece à China e a seus parceiros comerciais a capacidade de processar transações internacionais em yuan sem passar pelo sistema dominado pelo dólar. Paralelamente, o <strong>yuan digital (e-CNY)</strong> — a moeda digital do banco central chinês (CBDC), em desenvolvimento desde 2014 e em testes pilotos desde 2020 — tem o potencial de permitir transações internacionais instantâneas e programáveis que contornam completamente o sistema bancário baseado no dólar.</p>

<blockquote class="news">Em 2025, Rússia e China já liquidam aproximadamente 90% de seu comércio bilateral em rublos e yuans, sem usar o dólar. Os acordos de swap cambial da China se estendem a 31 países da Belt and Road, e o BRICS Pay — sistema de pagamentos baseado em blockchain — está em fase piloto.</blockquote>
`,

{
  id:10,
  name:'Desdolarização e BRICS: O Yuan Desafia o Dólar?',
  dur:'15min',
  content:`
<h3>O movimento global de desdolarização</h3>
<p>A <strong>desdolarização</strong> — o esforço de reduzir a dependência global do dólar americano como moeda de reserva, meio de troca e unidade de conta — é uma das tendências geoeconômicas mais discutidas e consequentes do século XXI. A China é a principal impulsionadora desse movimento, motivada tanto por aspirações de liderança global quanto pelo medo pragmático de que os EUA possam um dia usar o sistema do dólar como arma contra ela, assim como fizeram contra Rússia, Irã, Venezuela e outros. A questão central é: a desdolarização é um processo inevitável que remodelará a ordem financeira global, ou é uma aspiração que esbarra em realidades estruturais que sustentam a dominância do dólar?</p>

<h4>O papel do BRICS</h4>
<p>O <strong>BRICS</strong> — originalmente Brasil, Rússia, Índia, China e África do Sul, agora expandido para incluir Egito, Etiópia, Irã, Emirados Árabes, Indonésia e diversos novos membros em 2025 (Argélia, Belarus, Bolívia, Cuba, Cazaquistão, Nigéria, Turquia, Uganda, Uzbequistão) — tornou-se o veículo institucional primário dos esforços de desdolarização. As iniciativas concretas incluem o BRICS Pay (sistema de pagamentos blockchain em fase piloto), o BRICS Bridge (plataforma de pagamentos multissided que alcançou seu MVP em junho de 2024), o New Development Bank (banco de desenvolvimento do BRICS que faz empréstimos em moedas locais), e acordos bilaterais para comercializar commodities em moedas diferentes do dólar (como o acordo Arábia Saudita-China para vender petróleo em yuan).</p>

<blockquote class="example">A reação americana ao BRICS foi dura: Trump declarou em fevereiro de 2025 que "BRICS está morto" e ameaçou repetidamente membros do BRICS com tarifas de 100% caso se movessem para substituir o dólar. A ameaça ilustra perfeitamente o dilema americano: usar o dólar como arma para defender o dólar reforça exatamente as motivações que levam outros países a buscar alternativas.</blockquote>

<h4>Divisões internas do BRICS</h4>
<p>Apesar da retórica, o BRICS está longe de unido na questão da desdolarização. China e Rússia favorecem um BRICS mais coordenado e assertivo, mas Brasil e Índia preferem uma aliança mais frouxa que não comprometa suas relações com o Ocidente. O ministro de Relações Exteriores da Índia declarou em março de 2025 que "o dólar como moeda de reserva é fonte de estabilidade econômica global" — uma declaração que contradiz diretamente a narrativa chinesa e russa. A declaração final da cúpula do BRICS no Rio de Janeiro não mencionou desdolarização nem a criação de uma moeda comum, indicando que essas aspirações estão longe de consenso.</p>

<h4>A realidade da dominância do dólar</h4>
<p>Apesar dos esforços de desdolarização, a dominância do dólar permanece estruturalmente robusta por razões fundamentais: os mercados de capitais americanos são os mais profundos e líquidos do mundo (o mercado de títulos do Tesouro americano, com mais de US$ 27 trilhões, não tem equivalente), o yuan não é totalmente conversível (a China mantém controles de capitais que limitam seu uso como moeda de reserva), não existe alternativa que combine a liquidez, estabilidade institucional e confiança do dólar, e a própria China mantém mais de US$ 750 bilhões em títulos do Tesouro americano. A participação do yuan nas reservas globais é de apenas 2,3% — comparada a 58% do dólar e 20% do euro.</p>

<blockquote class="tip">Economistas do Chicago Policy Review notam que a desdolarização é mais provável como processo gradual e parcial (redução marginal da dominância do dólar ao longo de décadas) do que como evento disruptivo (substituição abrupta). O cenário mais provável é um mundo "multimoeda" onde o dólar mantém primazia mas compartilha espaço com o yuan, euro e moedas digitais.</blockquote>
`,
  cards:[
    {q:'Quais são as principais iniciativas de desdolarização do BRICS?',a:'BRICS Pay (pagamentos blockchain), BRICS Bridge (MVP jun 2024), New Development Bank (empréstimos em moedas locais), acordos bilaterais para comércio em moedas não-dólar. Rússia-China já liquidam 90% do comércio bilateral sem dólar.'},
    {q:'Por que a desdolarização enfrenta limitações estruturais apesar dos esforços?',a:'Yuan não é totalmente conversível (controles de capitais), yuan representa apenas 2,3% das reservas globais vs. 58% do dólar, mercados de capitais americanos são os mais profundos (US$ 27 tri em títulos), e a própria China detém US$ 750 bi em títulos do Tesouro.'}

{
  id:11,
  name:'Terras Raras: A Arma Secreta da China',
  dur:'15min',
  content:`
<h3>O trunfo mineral chinês</h3>
<p>Se os EUA têm o dólar e o SWIFT como armas econômicas, a China possui seu próprio trunfo estratégico: o domínio quase monopolístico sobre <strong>terras raras</strong> (Rare Earth Elements — REE). Apesar do nome, esses 17 elementos químicos (incluindo neodímio, disprósio, samário, térbio e outros) não são particularmente raros na crosta terrestre, mas a capacidade de extraí-los, processá-los e refiná-los está extraordinariamente concentrada na China — resultado de décadas de investimento estratégico, tolerância ambiental e política industrial deliberada. A China minera mais de 60% e processa mais de 85% das terras raras globais, e produz aproximadamente 90% dos ímãs de terras raras de alto desempenho que são essenciais para praticamente toda a tecnologia moderna.</p>

<h4>Para que servem as terras raras?</h4>
<p>A importância estratégica das terras raras é difícil de exagerar. Elas são componentes essenciais em: motores de veículos elétricos (um Tesla Model S contém aproximadamente 4,5 kg de terras raras), turbinas eólicas (uma turbina de 3 MW contém cerca de 600 kg), sistemas de defesa (mísseis de precisão, radares, jatos de combate, satélites), eletrônicos de consumo (smartphones, laptops, telas), equipamentos médicos (MRI), fibra óptica e muito mais. Sem terras raras, a transição energética verde é impossível, e sem ímãs de neodímio, a defesa militar moderna é comprometida. Essa dependência dá à China uma alavanca estratégica extraordinária.</p>

<blockquote class="news">Em abril de 2025, no auge da escalada tarifária, a China impôs controles de exportação sobre 7 elementos de terras raras e todos os metais, compostos e ímãs derivados — exigindo licenças especiais de exportação. Em outubro de 2025, expandiu as restrições. Um acordo temporário Trump-Xi em outubro suspendeu os controles, mas a mensagem foi clara: a China pode estrangular cadeias de suprimento críticas ocidentais quando quiser.</blockquote>

<h4>A vulnerabilidade ocidental</h4>
<p>Os EUA e aliados ocidentais estão dolorosamente cientes de sua vulnerabilidade. Embora países aliados possuam 35-40% das reservas globais de terras raras, eles respondem por apenas 10-15% da capacidade de refino e processamento. A construção de uma cadeia de suprimento alternativa é estimada em pelo menos uma década, mesmo com investimento maciço. O Departamento de Defesa dos EUA investiu US$ 400 milhões na MP Materials (a única mina de terras raras em grande escala nos EUA, em Mountain Pass, Califórnia) em julho de 2025, incluindo um compromisso de compra de 100% de seus ímãs. A UE estabeleceu meta de processar 40% de seu consumo anual internamente até 2030.</p>

<h4>A estratégia chinesa</h4>
<p>O domínio chinês em terras raras não é acidente — é resultado de planejamento estratégico de longo prazo. Deng Xiaoping declarou em 1992: "O Oriente Médio tem petróleo, a China tem terras raras." Nas décadas seguintes, a China investiu massivamente em mineração e processamento, subsidiou a indústria, tolerou impactos ambientais severos, e inundou o mercado global com preços tão baixos que concorrentes ao redor do mundo foram eliminados (incluindo a antiga mina de Mountain Pass nos EUA, que faliu em 2015 e só foi reaberta em 2018). Quando a competição foi eliminada, a China havia consolidado uma posição de domínio que agora usa como alavanca geopolítica.</p>

<blockquote class="tip">O controle chinês de terras raras é um exemplo clássico de como dominância em um recurso estratégico pode ser construída deliberadamente ao longo de décadas. A lição para os EUA e aliados é que diversificação de cadeias de suprimento críticas requer investimento paciente e consistente — não reações de pânico após a crise já estar instalada.</blockquote>
`,
  cards:[
    {q:'Qual é a extensão do domínio chinês sobre terras raras e por que isso importa?',a:'China minera 60%+, processa 85%+ e produz 90% dos ímãs de terras raras globais. São essenciais para EVs, turbinas eólicas, defesa militar, eletrônicos e saúde. Diversificação levará pelo menos uma década, mesmo com investimento maciço.'},

{
  id:12,
  name:'Belt and Road Initiative: A Infraestrutura como Poder',
  dur:'15min',
  content:`
<h3>O maior projeto de infraestrutura da história</h3>
<p>A <strong>Belt and Road Initiative (BRI)</strong>, também conhecida como "Nova Rota da Seda", é o mais ambicioso projeto de investimento em infraestrutura da história moderna — e um dos pilares centrais da estratégia chinesa de projeção de poder econômico global. Lançada pelo presidente Xi Jinping em 2013, a BRI envolve investimentos massivos em portos, ferrovias, rodovias, redes elétricas, telecomunicações e zonas industriais em mais de 140 países, conectando a Ásia à Europa, África, Oriente Médio e América Latina. Em 2025, os projetos BRI atingiram US$ 213,5 bilhões em investimentos, superando o pico anterior de 2016, com foco em energia, mineração e novas tecnologias.</p>

<h4>Os objetivos estratégicos da BRI</h4>
<p>Embora oficialmente apresentada como uma iniciativa de "desenvolvimento e cooperação", a BRI serve a múltiplos objetivos estratégicos chineses: cria mercados para o excesso de capacidade industrial chinesa (aço, cimento, equipamentos pesados), diversifica rotas de suprimento de energia e matérias-primas (reduzindo dependência dos estreitos de Malaca e Hormuz), internacionaliza o yuan (projetos BRI frequentemente são financiados e denominados em yuan), estabelece presença militar indireta (portos como Gwadar no Paquistão e Hambantota no Sri Lanka têm potencial uso militar dual), cria dependência econômica em países participantes (gerando alavanca política), e posiciona a China como alternativa aos EUA como provedor de bens públicos internacionais.</p>

<blockquote class="example">O caso do Porto de Hambantota no Sri Lanka tornou-se emblemático das críticas à BRI: o Sri Lanka tomou empréstimos chineses para construir um porto que se provou economicamente inviável, e quando não conseguiu pagar, cedeu o porto à China em um contrato de arrendamento de 99 anos em 2017. Críticos chamam isso de "diplomacia da armadilha da dívida" — embora economistas debatam se essa é uma estratégia deliberada ou resultado de projetos mal planejados.</blockquote>

<h4>A resposta americana: Build Back Better World e PGII</h4>
<p>Os EUA demoraram anos para formular uma resposta à BRI. Em 2021, o G7 lançou o <strong>Build Back Better World (B3W)</strong>, rebatizado em 2022 como <strong>Partnership for Global Infrastructure and Investment (PGII)</strong>, prometendo mobilizar US$ 600 bilhões em investimentos em infraestrutura no mundo em desenvolvimento até 2027. Contudo, a iniciativa tem sido criticada por falta de concretude: enquanto a China entrega projetos tangíveis (portos, ferrovias, pontes), o PGII se concentra em "frameworks de investimento" e "padrões de governança" que, embora importantes, são menos visíveis e imediatos. Além disso, o orçamento é misto (público e privado) e depende de alavancagem financeira que pode não se materializar.</p>

<h4>BRI 2.0: reinvenção sob pressão</h4>
<p>A BRI evoluiu significativamente desde seu lançamento. A primeira fase (2013-2019) enfatizou mega-projetos de infraestrutura física, resultando em críticas sobre endividamento insustentável, padrões ambientais frouxos e corrupção. A segunda fase (2020-presente) — o que analistas chamam de "BRI 2.0" — enfatiza projetos menores, mais sustentáveis e focados em "novas fronteiras": Rota da Seda Digital (cabos submarinos, data centers, redes 5G), Rota da Seda Verde (energia renovável, tecnologia limpa), Rota da Seda da Saúde (hospitais, farmacêuticas) e Rota da Seda Espacial (estações terrestres de satélite, navegação BeiDou). Essa reinvenção tornou a BRI mais resiliente a críticas e mais difícil de combater para os EUA.</p>

<blockquote class="news">Em abril de 2026, analistas da Foreign Policy observaram que as tarifas ocidentais aceleraram a reinvenção da BRI: empresas chinesas excluídas de mercados ocidentais estão redirecionando capacidade e investimento para países BRI, fortalecendo paradoxalmente a infraestrutura comercial alternativa que a China está construindo para reduzir sua dependência dos mercados americano e europeu.</blockquote>
`,

{

  name:'Taiwan: O Barril de Pólvora da Economia Global',
  dur:'15min',
  content:`
<h3>A ilha que pode desencadear a crise do século</h3>
<p>Taiwan é, simultaneamente, o ponto de maior risco e maior consequência na rivalidade EUA-China. A ilha de 23 milhões de habitantes não é apenas uma questão de soberania e identidade nacional — ela é o nó central da economia tecnológica global. Taiwan produz mais de <strong>90% dos chips mais avançados do mundo</strong> através da TSMC, e o Estreito de Taiwan é uma das rotas marítimas mais importantes do planeta, por onde transita mais de um quinto do comércio marítimo global (US$ 2,45 trilhões em bens em 2022). Um conflito militar no Estreito de Taiwan não seria apenas uma crise geopolítica — seria uma catástrofe econômica global sem precedentes.</p>

<h4>A situação político-militar</h4>
<p>A China considera Taiwan uma província rebelde que deve ser "reunificada" com o continente, e Xi Jinping declarou que a reunificação "não pode ser passada para a próxima geração". Os EUA mantêm uma política de "ambiguidade estratégica": reconhecem formalmente a posição de "Uma Só China" mas mantêm relações não-oficiais com Taiwan, vendem armas à ilha, e nunca se comprometeram explicitamente com a defesa militar de Taiwan (embora Biden tenha sugerido isso em declarações que a Casa Branca depois "corrigiu"). Em 2025, a China intensificou dramaticamente a pressão militar: os exercícios Strait Thunder-2025A em abril mobilizaram 135 aeronaves, 38 navios de guerra e 12 embarcações oficiais, praticando o bloqueio de rotas marítimas e aéreas de Taiwan.</p>

<blockquote class="news">Especialistas militares chineses declararam que os exercícios de abril de 2025 focaram em "ocupar pontos de estrangulamento marítimo" para simultaneamente cortar importações de energia de Taiwan, linhas de apoio de forças estrangeiras, e rotas de saída da ilha. Operações de "zona cinzenta" — abaixo do limiar de guerra — tornaram-se cada vez mais frequentes, incluindo o corte de um cabo submarino de fibra óptica próximo a Taiwan em janeiro de 2025.</blockquote>

<h4>O cenário de conflito e suas consequências econômicas</h4>
<p>Estudos da Rhodium Group e do CSIS estimam que um conflito no Estreito de Taiwan causaria danos econômicos catastróficos: a perda de acesso aos chips da TSMC paralisaria indústrias inteiras globalmente — eletrônicos, automotivo, saúde, telecomunicações e defesa. Japão e Coreia do Sul dependem da rota marítima do estreito para ~32% e ~30% de suas importações, respectivamente. Modelos econômicos estimam perdas de trilhões de dólares no PIB global. Crucialmente, as consequências atingiriam a própria China com severidade: interrupções no comércio pelo estreito prejudicariam severamente a economia chinesa, que depende da mesma rota para suas exportações.</p>

<h4>O "Silicon Shield" de Taiwan</h4>
<p>A importância da TSMC para a economia global criou o que analistas chamam de "Silicon Shield" (Escudo de Silício): a teoria de que a dependência mundial dos chips taiwaneses torna Taiwan valiosa demais para ser atacada, porque destruir ou danificar a TSMC prejudicaria a China tanto quanto qualquer outro país. Porém, essa proteção tem limites: a China poderia buscar um bloqueio naval em vez de invasão (evitando danos à TSMC), ou a própria China pode calcular que, à medida que desenvolve capacidade doméstica de fabricação, a vulnerabilidade chinesa diminui enquanto a vulnerabilidade ocidental permanece.</p>

<h4>Diversificação de cadeias de suprimento</h4>
<p>A consciência do risco Taiwan acelerou esforços globais de diversificação. A TSMC está construindo fábricas nos EUA (Arizona), Japão (Kumamoto) e Alemanha (Dresden). Os EUA aprovaram o CHIPS Act em 2022, investindo US$ 52 bilhões para incentivar a fabricação doméstica de semicondutores. Porém, replicar a capacidade da TSMC é extraordinariamente difícil: a fábrica do Arizona sofreu atrasos, custos excedentes e dificuldades de recrutamento. Especialistas estimam que levará pelo menos uma década para que a produção fora de Taiwan atinja volume significativo em chips de ponta.</p>

<blockquote class="tip">O CHIPS Act dos EUA (US$ 52 bilhões) e o European Chips Act (€43 bilhões) são os maiores investimentos governamentais em semicondutores da história, mas representam uma fração do que a TSMC investiu ao longo de décadas. A construção de uma fábrica de chips de ponta leva 3-5 anos e custa US$ 20+ bilhões — não é algo que se improvisa.</blockquote>

  dur:'15min',
  content:`
<h3>O grande redesenho industrial do século XXI</h3>
<p>A guerra econômica EUA-China, combinada com os choques de suprimento da pandemia de COVID-19 e os riscos geopolíticos associados a Taiwan, desencadeou a maior reorganização de cadeias de suprimento globais desde a globalização dos anos 1990. Empresas, governos e investidores ao redor do mundo estão reavaliando onde produzem, de onde compram e como distribuem — não apenas por eficiência de custo (a lógica que direcionou a globalização), mas por <strong>resiliência, segurança e alinhamento geopolítico</strong>. Três conceitos dominam essa reorganização: "China Plus One", "nearshoring/friendshoring" e "desacoplamento seletivo".</p>

<h4>China Plus One</h4>
<p>A estratégia <strong>China Plus One</strong> significa que empresas mantêm operações na China (aproveitando sua infraestrutura, escala e eficiência incomparáveis) mas diversificam para pelo menos mais um país como "seguro" contra risco chinês. Os principais beneficiários dessa estratégia são: <strong>Vietnã</strong> (crescimento de exportações de 30%+ em eletrônicos para os EUA desde 2018), <strong>Índia</strong> (iniciativa "Make in India" atraindo Apple, Samsung e empresas farmacêuticas), <strong>México</strong> (nearshoring para o mercado americano favorecido pelo USMCA/T-MEC), <strong>Indonésia</strong> (recursos naturais abundantes e mão de obra jovem) e <strong>Bangladesh</strong> (têxteis e vestuário). No entanto, nenhum país individualmente pode substituir a China: a escala de sua base industrial, infraestrutura logística e mão de obra qualificada simplesmente não tem equivalente global.</p>

<blockquote class="tip">O "China Plus One" tem um efeito paradoxal: muitas empresas que "diversificam" para o Vietnã ou Malásia descobrem que seus fornecedores nesses países compram componentes da China. O resultado é que a cadeia de suprimento se torna mais longa e complexa, mas não necessariamente menos dependente da China — apenas menos diretamente. Alguns analistas chamam isso de "desacoplamento cosmético".</blockquote>

<h4>Nearshoring e friendshoring</h4>
<p>Conceitos complementares ao China Plus One: <strong>nearshoring</strong> significa mover produção para países geograficamente mais próximos do mercado consumidor (México para os EUA, Turquia e Marrocos para a Europa), reduzindo custos de transporte e riscos de cadeia de suprimento longa. <strong>Friendshoring</strong> — termo cunhado pela secretária do Tesouro Janet Yellen — significa concentrar cadeias de suprimento em países aliados ou geopoliticamente alinhados, mesmo que não sejam os mais baratos. O México tornou-se o maior beneficiário: em 2023, ultrapassou a China como maior parceiro comercial dos EUA (em parte porque empresas chinesas estabeleceram fábricas no México para contornar tarifas).</p>

<h4>O custo da reorganização</h4>
<p>A reorganização de cadeias de suprimento não é gratuita. Produzir fora da China é, na maioria dos casos, significativamente mais caro: salários podem ser menores em alguns países (Bangladesh, Etiópia), mas a infraestrutura, logística, fornecedores locais e eficiência burocrática raramente se comparam. Um estudo da McKinsey estimou que a diversificação completa de cadeias de suprimento custaria US$ 25-35 trilhões globalmente ao longo de uma década. Esses custos são inevitavelmente repassados aos consumidores na forma de preços mais altos — uma "taxa de resiliência" implícita que substitui a "dividendo da globalização" (preços baixos garantidos por produção chinesa eficiente).</p>

<blockquote class="news">Em 2025-2026, o México tornou-se um campo de batalha na guerra econômica EUA-China: empresas chinesas (especialmente de veículos elétricos, como BYD e CATL) estão estabelecendo fábricas no México para acessar o mercado americano via USMCA. Os EUA suspeitam que a China está usando o México como "porta dos fundos" para contornar tarifas, o que adiciona tensão à já complexa relação trilateral EUA-México-China.</blockquote>
`,

<h3>Quando economia é segurança nacional</h3>
<p>A guerra econômica EUA-China não pode ser compreendida isoladamente da dimensão militar — as duas esferas estão profundamente entrelaçadas no que analistas chamam de <strong>"techno-economic competition"</strong> (competição tecno-econômica). Tecnologias desenvolvidas para fins comerciais (IA, computação quântica, biotecnologia, materiais avançados) têm aplicações militares diretas, e inversamente, investimentos em defesa impulsionam inovação tecnológica comercial. Essa fusão civil-militar (chamada de "Military-Civil Fusion" — MCF — na doutrina chinesa) é precisamente o que torna os controles de exportação americanos tão amplos: restringir chips de IA não é apenas sobre competição comercial, é sobre impedir que a China use esses chips para treinamento de sistemas autônomos de armas, vigilância e guerra eletrônica.</p>

<h4>Os gastos de defesa como indicador</h4>
<p>Os EUA gastam mais em defesa do que os próximos 10 países combinados: aproximadamente US$ 886 bilhões em 2024, representando 3,4% do PIB. A China é o segundo maior gastador, com um orçamento oficial de defesa de aproximadamente US$ 232 bilhões em 2024 — mas estimativas ocidentais (incluindo do DoD e SIPRI) sugerem que o gasto real é 50-100% maior que o declarado, possivelmente chegando a US$ 350-460 bilhões quando se incluem itens como pesquisa militar classificada, forças paramilitares e programas espaciais militares. A China modernizou radicalmente suas forças armadas na última década: construiu a maior marinha do mundo em número de navios, desenvolveu mísseis hipersônicos, expandiu seu arsenal nuclear e estabeleceu capacidades avançadas de guerra cibernética e espacial.</p>

<blockquote class="example">O F-35 Lightning II, o avião de combate mais avançado e caro da história (custo unitário: US$ 80-100 milhões), contém terras raras chinesas em seus motores, eletrônica e sistemas de sensores. O DoD tem trabalhado para diversificar fornecedores, mas a dependência demonstra como cadeias de suprimento comerciais e segurança militar estão inextricavelmente ligadas.</blockquote>

<h4>A corrida espacial como frente econômica</h4>
<p>O espaço é uma nova arena da competição econômica-militar. A China completou sua estação espacial Tiangong em 2022, enviou rovers à Lua e a Marte, e está desenvolvendo capacidades anti-satélite que ameaçam a constelação de satélites americanos (GPS, comunicações, reconhecimento) da qual a economia e o exército dos EUA dependem. O sistema de navegação chinês BeiDou já supera o GPS em número de satélites e oferece serviços a mais de 200 países — mais um exemplo de infraestrutura alternativa chinesa que compete com a americana. A SpaceX de Elon Musk, com sua constelação Starlink, representa a resposta americana no setor comercial-espacial.</p>

<h4>Ciberespaço: a guerra invisível</h4>
<p>O ciberespaço é talvez a frente mais ativa e menos visível da guerra econômica. Os EUA acusam a China de conduzir espionagem cibernética econômica em escala industrial: o roubo de propriedade intelectual de empresas americanas por hackers ligados ao Estado chinês é estimado em centenas de bilhões de dólares anuais. A China, por sua vez, acusa os EUA de espionagem cibernética extensiva (as revelações de Snowden confirmaram vigilância da NSA sobre empresas e líderes chineses). Em 2025, incidentes cibernéticos atribuídos a grupos chineses (como "Salt Typhoon" e "Volt Typhoon") comprometeram redes de telecomunicações e infraestrutura crítica americana.</p>

<blockquote class="news">Em 2025, a NDAA FY2026 incluiu provisões para fortalecer a base industrial de defesa americana, reduzir dependência de componentes chineses em sistemas de armas e acelerar o desenvolvimento de contramedidas contra capacidades militares chinesas emergentes — refletindo a convergência entre política comercial e estratégia de defesa.</blockquote>

<h3>Brasil: entre dois gigantes</h3>
<p>A guerra econômica EUA-China não é um assunto distante para o Brasil e a América Latina — pelo contrário, ela afeta diretamente as economias, o comércio, os investimentos e até as opções políticas da região. O Brasil, como maior economia da América Latina e membro do BRICS, está posicionado em uma encruzilhada estratégica: é simultaneamente um parceiro comercial crítico da China (que é o maior parceiro comercial do Brasil desde 2009) e um aliado tradicional dos EUA com relações econômicas e de segurança profundas. Navegar essa dupla relação sem alienar nenhum dos lados é o desafio geopolítico central da política externa brasileira no século XXI.</p>

<h4>O eixo comercial Brasil-China</h4>
<p>A China é, de longe, o maior parceiro comercial do Brasil: o comércio bilateral ultrapassou US$ 180 bilhões em 2024. O Brasil exporta predominantemente commodities — soja, minério de ferro, petróleo, carne bovina, celulose — enquanto importa da China manufaturados, eletrônicos, equipamentos industriais e veículos elétricos. A guerra comercial EUA-China beneficiou diretamente o agronegócio brasileiro: quando a China impôs tarifas retaliatórias sobre a soja americana em 2018, o Brasil substituiu os EUA como principal fornecedor de soja para a China, uma posição que mantém até hoje. A invasão de veículos elétricos chineses (BYD, GWM, Chery) no mercado brasileiro também é consequência direta da estratégia chinesa de diversificação após as tarifas americanas e europeias.</p>

<blockquote class="news">Em 2025, BYD inaugurou sua fábrica em Camaçari, Bahia — no terreno da antiga fábrica da Ford — com investimento de R$ 3 bilhões e capacidade para 150.000 veículos/ano. A instalação simboliza a nova presença industrial chinesa na América Latina, substituindo literalmente uma empresa americana.</blockquote>

<h4>Os investimentos chineses na América Latina</h4>
<p>A presença chinesa na América Latina vai muito além do comércio. Investimentos chineses na região incluem infraestrutura portuária (o porto de Chancay no Peru, inaugurado em 2024, é o maior investimento chinês em infraestrutura na América do Sul), mineração de lítio na Argentina e Chile (essencial para baterias de veículos elétricos), redes de telecomunicações 5G (Huawei é fornecedora principal em diversos países latino-americanos), projetos de energia (hidrelétricas, solar, eólica) e empréstimos de bancos estatais chineses. A BRI se expandiu formalmente para a América Latina, com mais de 20 países da região aderindo à iniciativa.</p>

<h4>A pressão americana</h4>
<p>Os EUA observam a crescente presença chinesa na América Latina com preocupação e, cada vez mais, com ação. Washington pressiona países da região a excluir Huawei de suas redes 5G, oferece alternativas de financiamento através da DFC (Development Finance Corporation) e do PGII, alerta sobre riscos de "armadilha da dívida" chinesa, e utiliza seu peso diplomático para limitar a influência de Pequim. Para o Brasil especificamente, a pressão se manifesta em questões como a decisão sobre fornecedores de 5G (que acabou incluindo Huawei), a expansão de investimentos chineses em setores estratégicos como mineração de terras raras e lítio, e o alinhamento do Brasil com a China no BRICS.</p>

<h4>O dilema brasileiro</h4>
<p>O Brasil enfrenta um dilema fundamental: sua economia depende enormemente da China como mercado para commodities e fonte de investimentos, mas suas instituições democráticas, sistema jurídico, valores culturais e tradição diplomática estão mais alinhados com os EUA e o Ocidente. Cada vez mais, decisões econômicas e tecnológicas (5G, cabos submarinos, sistemas de pagamento, cadeias de suprimento de minerais) forçam o Brasil a escolher — ou pelo menos a priorizar — entre os dois gigantes. A presidência do BRICS pelo Brasil em 2025 exemplificou a tentativa de manter equilíbrio: a declaração final evitou mencionar desdolarização, refletindo a posição brasileira de manter boas relações com ambos os lados.</p>

<blockquote class="tip">A América Latina como um todo experimenta o que analistas chamam de "nova corrida por influência": China e EUA competem por parcerias comerciais, investimentos em infraestrutura, acesso a minerais críticos (lítio na Argentina/Chile/Bolívia, cobre no Peru/Chile, nióbio no Brasil) e alinhamento político em fóruns multilaterais. Países que navegarem essa competição com habilidade podem extrair benefícios de ambos os lados.</blockquote>

  content:`
<h3>A bifurcação da economia global</h3>
<p>O cenário mais extremo — e talvez o mais temido por economistas — é o de um <strong>desacoplamento total</strong> (full decoupling) entre as economias americana e chinesa, resultando em uma bifurcação da economia global em dois blocos tecnológicos, comerciais e financeiros largamente separados. Neste cenário, o mundo evoluiria para algo similar à divisão da Guerra Fria, mas com consequências econômicas muito mais profundas dado o grau de integração atual entre as duas economias e suas respectivas esferas de influência.</p>

<h4>Como seria um mundo desacoplado?</h4>
<p>Em um desacoplamento total, existiriam dois ecossistemas tecnológicos paralelos: um americano/ocidental (baseado em chips Intel/NVIDIA/TSMC, software Microsoft/Google, plataformas Meta/Apple, nuvem AWS/Azure/GCP) e um chinês (baseado em chips Huawei/SMIC, software Alibaba/Tencent, plataformas WeChat/TikTok, nuvem Alibaba Cloud/Huawei Cloud). Dois sistemas financeiros: SWIFT/dólar versus CIPS/yuan. Dois conjuntos de padrões técnicos: 5G/6G americano versus chinês, IA com valores diferentes incorporados, protocolos de internet potencialmente divergentes. Países seriam forçados a escolher entre os dois ecossistemas, como durante a Guerra Fria — mas com implicações econômicas muito maiores.</p>

<blockquote class="example">Um estudo do FMI estimou que um desacoplamento total EUA-China reduziria o PIB global em 7% — equivalente a eliminar as economias da Alemanha e Japão combinadas. Para países em desenvolvimento que dependem de ambos, o custo seria ainda maior: seriam forçados a duplicar investimentos em infraestrutura tecnológica para manter compatibilidade com ambos os blocos, ou a escolher um lado e perder acesso ao outro.</blockquote>

<h4>Indicadores de que estamos caminhando nessa direção</h4>
<p>Vários desenvolvimentos apontam para uma tendência de bifurcação: tarifas de 145% efetivamente bloqueiam grande parte do comércio bilateral, controles de exportação de chips criam mundos tecnológicos separados, a China desenvolve seus próprios padrões de IA/5G/6G, o CIPS cresce como alternativa ao SWIFT, a BRI cria infraestrutura econômica paralela, e ambos os lados recrutam aliados para suas respectivas esferas. Dados do PIIE mostram que, em 2026, a China praticamente não compra mais exportações americanas em diversos setores — uma mudança que pode ser estrutural e irreversível.</p>

<h4>Por que o desacoplamento total é improvável</h4>
<p>Apesar dos indicadores preocupantes, a maioria dos economistas considera o desacoplamento total improvável por razões estruturais: a interdependência é simplesmente profunda demais para ser desfeita sem custo catastrófico para ambos. A China detém mais de US$ 750 bilhões em títulos do Tesouro americano; empresas americanas têm centenas de bilhões investidos na China; cadeias de suprimento globais são tão intrincadas que isolar completamente os dois países é virtualmente impossível sem provocar uma recessão global. Além disso, muitos países — incluindo aliados americanos como Japão, Coreia do Sul, Austrália e a maioria da Europa — se recusam a escolher lados, preferindo manter relações comerciais com ambos.</p>

<blockquote class="tip">A metáfora mais útil talvez não seja "cortina de ferro" mas "divórcio difícil com filhos em comum": EUA e China podem reduzir a convivência, mas compartilham "filhos" (cadeias de suprimento globais, mudanças climáticas, pandemias, estabilidade financeira) que exigem cooperação mínima independentemente da intensidade do conflito.</blockquote>
`,

  content:`
<h3>O cenário do "equilíbrio instável"</h3>
<p>O cenário de <strong>competição gerenciada</strong> (managed competition) é amplamente considerado o mais provável e, em certa medida, já é a realidade atual: EUA e China mantêm intensa rivalidade econômica, tecnológica e geopolítica, mas dentro de "guardrails" (proteções) que impedem escalada para conflito aberto ou desacoplamento total. Neste cenário, a relação oscila permanentemente entre confrontação e cooperação, com momentos de crise seguidos de distensão, tarifas sendo impostas e parcialmente removidas, restrições tecnológicas sendo aplicadas com exceções estratégicas, e cúpulas bilaterais produzindo acordos limitados que compram tempo sem resolver questões fundamentais.</p>

<h4>Como a competição gerenciada funciona na prática</h4>
<p>Exemplos concretos desse cenário já são visíveis: a escalada tarifária de abril de 2025 (145%) seguida da trégua de novembro (redução de 10 pontos); a proibição de chips avançados para China seguida da autorização da venda de NVIDIA H200 com condições; as restrições de terras raras chinesas seguidas de acordo temporário Trump-Xi; exercícios militares agressivos no Estreito de Taiwan seguidos de comunicações estabilizadoras entre forças armadas. O padrão é de "brinkmanship" controlado: ambos os lados pressionam até o limite, mas recuam antes da ruptura irreversível. A cúpula Trump-Xi programada para maio de 2026 exemplifica essa dinâmica: mesmo no auge das tensões, ambos os lados reconhecem a necessidade de diálogo.</p>

<h4>Áreas de cooperação necessária</h4>
<p>Mesmo em meio à rivalidade mais intensa, existem áreas onde a cooperação EUA-China é não apenas desejável, mas necessária: mudanças climáticas (China e EUA são os dois maiores emissores de CO2), prevenção de pandemias (a experiência COVID demonstrou a necessidade de cooperação em saúde global), estabilidade financeira (uma crise financeira em uma economia inevitavelmente afeta a outra), proliferação nuclear (Coreia do Norte), e regulação de tecnologias emergentes (IA, biotecnologia, armas autônomas). A capacidade de manter canais de cooperação nessas áreas, mesmo enquanto compete ferozmente em outras, é o que define a "competição gerenciada" bem-sucedida.</p>

<blockquote class="tip">O historiador Niall Ferguson descreve a relação EUA-China como "Chimerica" — uma simbiose econômica onde China produz e poupa enquanto EUA consomem e gastam. Desmontar essa simbiose de forma ordenada — mantendo as partes mutuamente benéficas enquanto reduzindo vulnerabilidades — é o desafio definidor da competição gerenciada.</blockquote>

<h4>Riscos da competição gerenciada</h4>
<p>O principal risco é que "guardrails" falhem: uma crise de Taiwan, um incidente militar no Mar do Sul da China, ou uma escalada cibernética podem rapidamente empurrar a relação além do ponto de retorno. A competição gerenciada também exige liderança competente de ambos os lados — capacidade de calibrar pressão e distensão, comunicar intenções claramente e evitar erros de cálculo. A história mostra que grandes potências frequentemente não são tão hábeis quanto acreditam em gerenciar rivalidades: a Primeira Guerra Mundial começou não porque as potências europeias queriam a guerra, mas porque seus mecanismos de "gerenciamento" falharam em uma crise.</p>

<blockquote class="news">Analistas do Council on Foreign Relations observam que a cúpula Trump-Xi de maio de 2026 será teste crucial: se produzir um "grand bargain" (reduções tarifárias por concessões estruturais), a competição gerenciada ganha fôlego. Se fracassar, o risco de escalada descontrolada aumenta significativamente.</blockquote>
`,
