{
  id:0, name: 'Fundamentos do Direito Civil', free:true,
  topics:[
    {id:'dciv', name: 'Conceito e Aplicação do Direito Civil', content:'<h4>Entendendo O Ramo Mais Importante Do Direito Para Você</h4><p>Bem-vindo ao curso de Direito Civil! Este é ramo mais amplo do direito, regulando relações entre pessoas. Contratos, casamento, herança, propriedade: tudo é direito civil. Você o usa diariamente.</p><p>O que é direito civil? É conjunto de regras que regulam relações entre indivíduos (compra/venda, aluguel, casamento, família, morte/herança). Diferente de penal (crimes), trabalhista (emprego), fiscal (impostos).</p><blockquote class="tip"><strong>Dica:</strong> Direito civil é o mais importante na vida quotidiana. Você contrata, compra, casa, herda. Conhecer direito civil protege você em tudo isso.</blockquote><p>Qual é a base legal? Código Civil brasileiro (Lei 10.406/2002) é principal. Estabelece: pessoas (quem é sujeito de direito), bens (o que se pode ter), fatos jurídicos (eventos que geram direitos/deveres), contratos, propriedade, família, sucessões.</p><p>Qual é o objetivo? Equilibrar direitos individuais. Você tem direito à propriedade, mas vizinho tem direito ao repouso. Lei equilibra esses direitos em conflito.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra casa e reforma. Mas reforma causa barulho prejudicando vizinhos. Lei diz: você tem direito ao seu bem, mas não pode prejudicar vizinhos (horário específico para reforma, técnicas para diminuir ruído).</blockquote><p><strong>Princípios fundamentais:</strong> Boa-fé (presumir honestidade), função social da propriedade (propriedade não é absoluta, tem deveres sociais), dignidade da pessoa humana (acima de bens), autonomia privada (você pode contratar conforme vontade).</p><blockquote class="quote"><strong>Ramo essencial:</strong> "Direito civil regula convivência. Você não é criminalista, mas usa direito civil diariamente. Conhecimento protege seus direitos."</strong></blockquote><p>Como se estuda? Dividindo-se em: teoria geral (conceitos), contratos (vendas, aluguéis), propriedade, família, sucessão. Cada tema tem aplicação prática que você enfrenta.</p>'},
    {id:'pess', name: 'Pessoas: Quem Tem Direitos e Deveres', content:'<h4>Entendendo Quem É Sujeito De Direito</h4><p>Direito civil começa com "pessoa": quem tem capacidade de ter direitos e deveres. Lei reconhece dois tipos: pessoa física (você) e pessoa jurídica (empresa, associação).</p><p><strong>Pessoa física:</strong> Todo ser humano. Você nasce, adquire direitos (propriedade, herança, casamento), tem responsabilidades (pagar dívidas, respeitar alheios direitos). Morte encerra personalidade.</p><blockquote class="tip"><strong>Dica:</strong> Você é pessoa física. Lei assume que você é capaz de ter direitos desde nascimento. Se você não pode exercitar direitos (menor idade, doença mental), alguém deve representar você.</blockquote><p><strong>Pessoa jurídica:</strong> Entidade criada por lei que também tem direitos/deveres. Empresa LTDA, associação, sindicato, governo. Pessoa jurídica existe porque lei reconhece (registrou CNPJ, por exemplo).</p><p><strong>Capacidade de direito:</strong> Aptidão legal de ter direitos. Você tem desde nascimento. Pessoa jurídica tem a partir do registro legal.</p><p><strong>Capacidade de agir:</strong> Aptidão legal de exercer direitos/deveres pessoalmente. Você maior de 18 anos tem. Menor, pessoa com deficiência mental, precisam de representante legal.</p><blockquote class="example"><strong>Exemplo:</strong> Criança de 8 anos tem direito de herança (capacidade de direito). Mas não pode contratar/vender sozinha (sem capacidade de agir). Pais gerenciam para ela.</blockquote><p><strong>Incapacidade:</strong> Menores de 18 anos (incapazes), maiores de 60 com limitações cognitivas (relativamente incapazes). Lei oferece proteção, exigindo representante.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Lei reconhece que algumas pessoas não podem exercitar direitos sozinhas. Protetor (pais, curador) age em nome deles até capacidade retornar."</strong></blockquote><p>Como você identifica capacidade de outra pessoa? Pergunte idade, estado mental. Se menor ou incapaz, exija que representante legal assine contrato, não a pessoa diretamente.</p>'},
    {id:'bens', name: 'Bens: O Que Você Pode Ter', content:'<h4>Entendendo Propriedade E Tipos De Bens</h4><p>Direito civil protege sua propriedade (bens). Lei classifica bens para regular como você pode usá-los, vendê-los, transferi-los, herdá-los.</p><p><strong>Bem imóvel:</strong> Propriedade fixa (casa, apartamento, terreno, plantação). Registra-se em cartório de imóveis. Transferência requer escritura, registro. Direitos/deveres são fortes (você é dono absoluto?).</p><p><strong>Bem móvel:</strong> Propriedade móvel (carro, computador, joia, dinheiro). Transferência é simples (venda, presente, herança). Menos formalidade que imóvel.</p><blockquote class="tip"><strong>Dica:</strong> Imóvel e móvel têm proteções legais diferentes. Imóvel tem registro (maior segurança), móvel é por posse (mais fácil de vender, mais inseguro).</blockquote><p><strong>Bem consumível vs não-consumível:</strong> Consumível se uso o destrói (comida, combustível). Não-consumível se uso não destrói (casa, livro). Lei oferece proteções diferentes.</p><p><strong>Bem fungível vs não-fungível:</strong> Fungível se pode ser substituído por outro idêntico (dinheiro, grãos). Não-fungível se é único (carro específico, quadro). Lei rege diferentes direitos para cada.</p><blockquote class="example"><strong>Exemplo:</strong> Você empresta dinheiro de R$ 1.000. Você pode devolver R$ 1.000 de "outro" dinheiro (fungível): credor não importa qual dinheiro específico. Mas você empresta relógio antigo de herança: você deve devolver aquele exato (não-fungível).</blockquote><p><strong>Bem público vs privado:</strong> Bem público pertence ao governo (rua, praia, parque). Bem privado pertence a pessoa (sua casa). Lei permite uso público de bens públicos, mas propriedade privada é mais restrita.</p><blockquote class="quote"><strong>Propriedade regida:</strong> "Lei oferece proteção à propriedade. Seu bem é seu, mas com deveres (não prejudicar vizinhos, cumprir função social). Propriedade não é absoluta."</strong></blockquote><p>Como você protege propriedade? Registre imóvel em seu nome no cartório, mantenha documentos (notas fiscais, registros), insira em testamento se quiser deixar a herdeiros.</p>'},
    {id:'ftid', name: 'Fatos e Atos Jurídicos', content:'<h4>Eventos Que Geram Direitos E Deveres Legais</h4><p>Direito civil repousa sobre "fatos" e "atos": eventos que geram direitos/deveres legais. Você precisa entender quando lei reconhece que algo mudou seus direitos.</p><p><strong>Fato jurídico:</strong> Evento (natural ou humano) que gera consequências legais. Nascimento, morte, chuva, acidente. Lei reconhece esses fatos e oferece proteções.</p><blockquote class="tip"><strong>Dica:</strong> Alguns fatos geram direitos automáticos (nascimento te dá direito a herança), outros geram deveres (morte seus bens vão herdeiros), outros geram indenização (acidente te prejudicou = direito a reparação).</blockquote><p><strong>Ato jurídico:</strong> Ação (voluntária) que alguém realiza com intenção de gerar efeito legal. Contrato, herança, adoção. Você age com vontade de gerar resultado legal.</p><p><strong>Ato lícito vs ilícito:</strong> Lícito respeita lei (você vende casa legalmente). Ilícito viola lei (você rouba casa). Lei oferece proteção para atos lícitos, punição para ilícitos.</p><blockquote class="example"><strong>Exemplo:</strong> Você assina contrato de compra/venda (ato jurídico lícito): lei protege contrato, ambas partes têm direitos/deveres. Você, em raiva, quebra carro de alguém (ato jurídico ilícito): lei exige reparação (indenização).</blockquote><p><strong>Nulidade:</strong> Ato que lei declara nulo (sem efeito). Exemplo: contrato com menor sem representante. Não vale, pode ser anulado. Lei oferece proteção.</p><blockquote class="quote"><strong>Efeitos legais:</strong> "Fatos/atos geram consequências legais. Você precisa conhecer: atos válidos geram direitos, atos nulos não geram direitos, atos ilícitos geram responsabilidade."</strong></blockquote><p>Como você protege direitos em atos jurídicos? Exija documentação clara, entenda o ato antes de agir, procure advogado se dúvida sobre validade.</p>'}

{
  id:1, name: 'Contratos no Dia a Dia', free:false,
  topics:[
    {id:'ctr', name: 'Conceito de Contrato e Elementos Essenciais', content:'<h4>Entendendo Contratos: Fundamento De Convivência</h4><p>Contrato é acordo entre duas ou mais pessoas para criar direitos/deveres mútuos. Você contrata diariamente: compra, aluguel, empréstimo. Lei protege contratos válidos.</p><p><strong>Elementos essenciais:</strong> (1) Partes (duas ou mais pessoas), (2) Capacidade (partes devem ter capacidade legal), (3) Consentimento (ambas devem concordar), (4) Objeto lícito (o que se contrata deve ser legal), (5) Forma (escrito ou verbal, conforme lei).</p><blockquote class="tip"><strong>Dica:</strong> Sempre verifique se contrato tem elementos essenciais. Se falta algo, contrato pode ser nulo. Exija contrato escrito para proteção.</blockquote><p><strong>Contrato escrito vs verbal:</strong> Escrito oferece prova (você tem documentação). Verbal é válido mas difícil provar se disputa. Lei exige escrito para alguns contratos (imóvel, longa duração).</p><p><strong>Princípio da autonomia privada:</strong> Você é livre para contratar o que quiser, desde que legal. Lei não restringe conteúdo (você pode negociar qualquer preço, prazo, condição) desde que lícito.</p><blockquote class="example"><strong>Exemplo:</strong> Você vende carro por R$ 100. Outra pessoa oferece R$ 50, você recusa. Ambas têm direito: compradora de oferecer, vendedora de recusar. Contrato forma quando ambas concordam.</blockquote><p><strong>Boa-fé:</strong> Lei presume que ambas as partes agirão com boa-fé (honestidade, transparência). Se uma parte age de má-fé (engana, oculta informação), contrato pode ser anulado/reparação exigida.</p><blockquote class="quote"><strong>Fundamento de liberdade:</strong> "Contrato é expressão de sua liberdade. Lei protege contratos válidos. Mas oferece proteção se outro viola boa-fé ou contrato é nulo."</strong></blockquote><p>Como você se protege em contrato? Leia totalmente antes de assinar, negocie termos injustos, exija contrato escrito, guarde cópia.</p>'},
    {id:'comp', name: 'Compra e Venda: A Transação Mais Comum', content:'<h4>Sua Proteção Quando Compra Ou Vende</h4><p>Compra e venda é contrato mais comum. Você compra diariamente (alimento, roupa, carro). Lei oferece proteções específicas ao comprador/vendedor.</p><p><strong>Obrigação do vendedor:</strong> Entregar coisa conforme contratado, transferir propriedade, responder por defeitos. Se vende algo com defeito, comprador pode reclamar.</p><blockquote class="tip"><strong>Dica:</strong> Se compra algo com defeito, você tem direito de devolução, conserto ou redução de preço. Exija comprovação (nota fiscal, foto do defeito).</blockquote><p><strong>Obrigação do comprador:</strong> Pagar preço, receber coisa, cumprir prazo. Se não paga, vendedor pode cobrar (ação judicial) ou devolver coisa (se ainda não transferida propriedade).</p><p><strong>Transferência de propriedade:</strong> Para imóvel: requer escritura e registro em cartório. Para móvel: pode ser verbal (você compra e sai com coisa). Propriedade passa quando ambas as partes concordam.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra celular na loja. Você paga, loja entrega. Propriedade passou para você no momento do acordo. Se celular tem defeito após 30 dias, loja ainda pode responder se defeito é de fábrica (vício oculto).</blockquote><p><strong>Defeito:</strong> Vício que torna coisa inadequada para uso normal. Loja responde por defeito durante tempo razoável (dias para eletrônico, semanas para roupa, meses para móvel).</p><blockquote class="quote"><strong>Proteção ao comprador:</strong> "Lei presume que vendedor entrega coisa adequada. Se tem defeito, você pode reclamar, devolver, ou pedir desconto. Sua proteção é automática."</strong></blockquote><p>Como você prova compra? Nota fiscal, recibo, foto produto. Sem comprovante, mais difícil provar direito, mas não impossível (testemunhas, cámaras segurança).</p>'},
    {id:'alug', name: 'Aluguel: Direitos e Deveres do Inquilino e Proprietário', content:'<h4>Proteção Legal Em Contrato De Aluguel</h4><p>Aluguel é contrato de longa duração. Lei oferece proteções diferentes para inquilino e proprietário. Você deve conhecer seus direitos.</p><p><strong>Direito do proprietário:</strong> Receber aluguel em dia, respeitar imóvel (não danificar), permitir inspeção. Se inquilino não paga, proprietário pode despejar.</p><p><strong>Direito do inquilino:</strong> Moradia decente (proprietário mantém imóvel seguro), privacidade (proprietário não entra sem aviso), não ser despejado sem motivo válido.</p><blockquote class="tip"><strong>Dica:</strong> Lei brasileira protege inquilino. Despejo exige motivo legal (não pagar, fim contrato, cumprir sentença judicial). Proprietário não pode despejar por capricho.</blockquote><p><strong>Prazo de contrato:</strong> Mínimo 30 dias (lei exige para aluguel urbano), máximo conforme acordado. Contrato é para período específico; após expiração, ambas devem renovar ou encerrar.</p><p><strong>Depósito caução:</strong> Proprietário pode exigir depósito (geralmente um mês de aluguel) como segurança. Deve ser devolvido ao fim contrato se sem danos (descontado danos causados).</p><blockquote class="example"><strong>Exemplo:</strong> Você aluga apartamento, depósito R$ 1.500. Após 2 anos sai. Apartamento está íntegro. Proprietário deve devolver R$ 1.500. Se você danificou parede (R$ 500 conserto), proprietário pode reter R$ 500.</blockquote><p><strong>Reformas:</strong> Proprietário é responsável por reformas estruturais (telhado, encanamento). Inquilino por reforma pequena (pintura, luminária). Lei define responsabilidade clara.</p><blockquote class="quote"><strong>Equilíbrio de direitos:</strong> "Lei equilibra direitos proprietário e inquilino. Proprietário tem direito ao imóvel íntegro; inquilino tem direito a moradia decente e segurança."</strong></blockquote><p>Como você se protege em aluguel? Exija contrato escrito, fotografe condições iniciais, mantenha comprovante de pagamentos, comunique problemas ao proprietário por escrito.</p>'},
    {id:'emp', name: 'Empréstimo e Cobrança: Quando Pedir Dinheiro Emprestado', content:'<h4>Sua Proteção Legal Em Empréstimos</h4><p>Empréstimo é contrato onde você recebe dinheiro (ou bem) com obrigação de devolver depois. Lei oferece proteções se contrato foi bem feito.</p><p><strong>Empréstimo mutuo:</strong> Você recebe dinheiro, deve devolver mesma quantidade depois. Simples: sem juros, sem prazo específico (Lei presume: devolver quando pedido).</p><blockquote class="tip"><strong>Dica:</strong> Empréstimo entre amigos é delicado. Faça contrato escrito mesmo com amigo. Dinheiro muda relacionamentos; documentação protege ambas as partes.</blockquote><p><strong>Empréstimo com juros:</strong> Você recebe dinheiro e juros. Taxa de juros deve ser declarada clara (por escrito). Juros exagerados podem ser questionados como abusivos.</p><p><strong>Cobrança:</strong> Se você toma empréstimo e não devolve, credor pode cobrar (aviso amigável primeiro, depois ação judicial). Lei permite cobrança até 2 anos após prazo (depois prescreve).</p><blockquote class="example"><strong>Exemplo:</strong> Seu amigo empresta R$ 1.000. Você promete devolver em 1 mês. Você não devolve. Amigo pode cobrar (aviso, depois judicial). Se espera 3 anos sem cobrar, prescreve (amigo perde direito de cobrar).</blockquote><p><strong>Juros abusivos:</strong> Se empréstimo tem juros muito altos (ex: 10% ao mês), você pode questionar como abusivos. Juiz pode reduzir juros se achar excessivos.</p><blockquote class="quote"><strong>Proteção ao devedor:</strong> "Lei oferece proteção contra juros abusivos. Se juros são muito altos, você pode questionar. Juiz pode reduzir para taxa razoável."</strong></blockquote><p>Como você se protege? Peça contrato por escrito especificando valor, prazo, juros (se houver), consequência atraso. Guarde cópia.</p>'}
  ],

{
  id:2, name: 'Direito de Família', free:false,
  topics:[
    {id:'casa', name: 'Casamento, Divórcio e Separação', content:'<h4>Lei Protege Sua Vida Familiar</h4><p>Casamento é contrato especial. Lei oferece proteções ao casal durante casamento e garantias equitativas em separação/divórcio. Você deve conhecer direitos.</p><p><strong>Casamento requisitos:</strong> Você é maior de 18 anos, tem capacidade mental, oferece consentimento livre (não é forçado). Exige cartório (casamento civil, obrigatório no Brasil). Registro em cartório é validade.</p><blockquote class="tip"><strong>Dica:</strong> Casamento oferece proteções legais: direito a herança do cônjuge, direito a pensão de alimentos se separação prejudica você, direito a comunhão de bens (se regime escolhido).</blockquote><p><strong>Regimes matrimoniais:</strong> (1) Comunhão universal (tudo que ganham juntos é comum), (2) Comunhão parcial (bens adquiridos durante casamento são comuns, anteriores são pessoais), (3) Separação de bens (tudo é pessoal). Casal escolhe regime.</p><p><strong>Separação:</strong> Você para de viver junto (separação de fato) ou formaliza judicialmente (separação legal). Lei oferece proteção até divórcio: direito a alimentos, guarda filhos, divisão de bens.</p><blockquote class="example"><strong>Exemplo:</strong> Você casa em regime de comunhão parcial. Durante 10 anos de casamento ganham juntos R$ 500 mil. Bens anteriores ao casamento são pessoais. Se separam, bens de R$ 500 mil são divididos meio a meio (R$ 250 mil cada).</blockquote><p><strong>Divórcio:</strong> Encerramento formal do casamento. Lei permite divórcio por consenso (ambas concordam, é rápido) ou litigioso (um quer, outro não; exige juiz). Divide bens conforme regime matrimonial.</p><p><strong>Alimentos:</strong> Um cônjuge pode ser obrigado a pagar pensão ao outro se separação prejudica (ex: cônjuge parou de trabalhar para cuidar filhos). Alimentos são direito de quem necessita.</p><blockquote class="quote"><strong>Proteção familiar:</strong> "Lei reconhece compromisso do casamento. Oferece proteções durante e após separação. Direitos são equitativos: ambas ganham/perdem conforme regime escolhido."</strong></blockquote><p>Como você se protege? Escolha regime matrimonial consciente, guarde documentação durante casamento (gastos, patrimônio), considere contrato pré-nupcial se tem bens significativos.</p>'},
    {id:'filh', name: 'Pátrio Poder e Guarda de Filhos', content:'<h4>Direitos e Deveres de Pai/Mãe Perante Lei</h4><p>Ter filho gera direitos e deveres legais. Lei oferece proteção ao menor através dos pais. Você como pai/mãe tem responsabilidade legal sobre filho.</p><p><strong>Pátrio poder:</strong> Direito e dever de pais de educar, cuidar, representar filho. Pais têm autoridade sobre filho até 18 anos (maioridade). Autoridade é para proteger, não explorar.</p><blockquote class="tip"><strong>Dica:</strong> Você tem direito de corrigir filho (educação), mas não direito de abusar/bater. Lei equilibra autoridade parental com proteção ao menor.</blockquote><p><strong>Guarda:</strong> Direito de viver com filho, tomar decisões diárias (escola, médico, lazer). Se pais estão juntos, ambas têm guarda. Se separados, juiz define quem tem guarda (normalmente quem melhor pode cuidar).</p><p><strong>Visitação:</strong> Se um pai não tem guarda, tem direito de visitar filho regularmente. Lei define horários/dias. Pai/mãe sem guarda não pode impedir visitação (salvo risco ao filho).</p><blockquote class="example"><strong>Exemplo:</strong> Casal separa. Mãe tem guarda, pai tem visitação todo fim de semana. Lei exige que mãe permita visitação regular. Pai tem direito de estar com filho mesmo sem guarda.</blockquote><p><strong>Pensão alimentícia:</strong> Pai/mãe sem guarda é obrigado a pagar pensão por alimentos (educação, saúde, moradia) do filho. Pensão é direito do filho, não da mãe/pai com guarda.</p><p><strong>Adoção:</strong> Você pode adotar menor se preenche requisitos (idade mínima, idoneidade moral). Adoção cria relação legal de pai/mãe-filho. Filho adotado tem mesmos direitos de filho biológico.</p><blockquote class="quote"><strong>Interesse do menor:</strong> "Lei sempre considera interesse do menor. Guarda é decidida pelo melhor interesse da criança, não pela preferência dos pais."</strong></blockquote><p>Como você se protege? Se disputa guarda, tenha documentação (comprovante renda para pagar pensão, relatório de escola mostrando cuidado). Juiz decide baseado em interesse da criança.</p>'},
    {id:'her', name: 'Herança e Sucessão: O Que Deixar Para Herdeiros', content:'<h4>Protegendo Patrimônio Para Seus Herdeiros</h4><p>Herança é transmissão de patrimônio após morte. Lei oferece proteções: você pode deixar sua vontade em testamento, herdeiros têm direito a patrimônio. Você deve planejar sucessão.</p><p><strong>Herdeiros legais:</strong> Lei define ordem: filhos (prioridade 1), cônjuge, pais, irmãos. Se você tem testamento, pode alterar ordem. Sem testamento, herança segue lei (parentes próximos herdam primeiro).</p><blockquote class="tip"><strong>Dica:</strong> Faça testamento se tem patrimônio significativo ou quer deixar bem específico para pessoa específica. Testamento evita confusão entre herdeiros.</blockquote><p><strong>Testamento:</strong> Documento que expressa sua vontade. Você define quem herda, quanto cada herdeiro recebe. Exige assinatura (notário oferece certificação). Testamento é válido até sua morte.</p><p><strong>Legítima:</strong> Lei oferece proteção: herdeiros próximos têm direito a pelo menos 50% do patrimônio (legítima). Você pode dispor de outros 50% como quiser (metade disponível). Lei protege herdeiros de serem excluídos.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem patrimônio R$ 100 mil, filho e cônjuge. Lei exige que filho + cônjuge recebam no mínimo R$ 50 mil (legítima). Você pode deixar outro R$ 50 mil para pessoa fora da família (se quiser).</blockquote><p><strong>Inventário:</strong> Processo legal após morte para definir herdeiros e dividir patrimônio. Exige documentação (testamento, nota de bens, provas parentesco). Juiz supervisiona distribuição.</p><p><strong>Imposto de herança:**  Existe ITCMD (Imposto de Transmissão Causa Mortis), varia por estado. Alguns herdeiros próximos podem ser isentos (cônjuge, filhos em alguns estados). Imposto reduz patrimônio herdado.</p><blockquote class="quote"><strong>Planejamento sucessório:</strong> "Lei oferece liberdade de testar. Você planeja sucessão escolhendo herdeiros, definindo valores. Testamento evita disputa, honra sua vontade."</strong></blockquote><p>Como você se protege? Faça testamento com advogado, atualize se vida muda (novo filho, novo casamento), guarde cópia, comunique herdeiros da existência de testamento.</p>'},
    {id:'resp', name: 'Responsabilidade Civil: Reparando Danos Que Você Causou', content:'<h4>Lei Exige Reparação Se Você Prejudicou Alguém</h4><p>Responsabilidade civil é obrigação de reparar dano causado a outra pessoa. Se você prejudica alguém (acidente, negligência, abuso), lei exige compensação.</p><p><strong>Dano patrimonial:</strong> Você prejudicou bem alheio (bateu carro, quebrou vaso). Lei exige reparação: você paga valor para consertar/substituir bem.</p><blockquote class="tip"><strong>Dica:</strong> Se causou dano, melhor resolver rápido (pagar reparação) que esperar processo. Juiz pode condenar ao pagamento + juros + multa se espera processo.</blockquote><p><strong>Dano moral:</strong> Você ofendeu dignidade/privacidade (humilhação pública, difamação, lesão ao corpo). Lei permite indenização por dano moral mesmo sem dano patrimonial.</p><p><strong>Responsabilidade objetiva:</strong> Você responde mesmo sem culpa se ato causa dano. Exemplo: seu cão morde vizinho. Você responde mesmo que cão "normalmente" não morde. Lei presume culpa.</p><blockquote class="example"><strong>Exemplo:</strong> Você dirige carro negligentemente (rápido demais), bate em outro carro. Você é responsável: paga conserto do carro atingido, indenização se passageiro foi ferido, multa se há crime.</blockquote><p><strong>Indenização:</strong> Valor que você paga para reparar dano. Juiz calcula baseado em: gravidade do dano, capacidade econômica sua, impacto na vítima. Pode ser centenas a milhões de reais.</p><blockquote class="quote"><strong>Obrigação de reparar:</strong> "Se sua ação/negligência prejudica alguém, você é responsável. Lei exige reparação proporcional ao dano. Indenização compensa vítima."</strong></blockquote><p>Como você se protege? Tenha seguro de responsabilidade civil (cobre acidentes), dirija/aja com cuidado, procure evitar danos, trate danos rapidamente antes virem ação judicial.</p>'}
  ],

{
  id:3, name: 'Propriedade e Vizinhança', free:false,
  topics:[
    {id:'prop', name: 'Direito de Propriedade: Posse e Domínio', content:'<h4>Seu Direito de Ser Dono E Controlar Seu Bem</h4><p>Propriedade é direito de você ser dono de bem, controlá-lo, usá-lo, dispor dele. Lei oferece proteção legal: você pode reclamar contra quem invade propriedade.</p><p><strong>Posse:</strong> Situação de fato de controlar bem. Você entra na casa alugada e toma posse (controla). Posse oferece proteção contra invasão (você pode exigir que invasor saia).</p><blockquote class="tip"><strong>Dica:</strong> Posse é proteção temporária. Propriedade é permanente. Se você compra casa, você tem posse + propriedade. Se aluga, você tem posse (temporária) mas não propriedade.</blockquote><p><strong>Propriedade:</strong> Direito permanente de ser dono. Você tem registro em cartório (imóvel) ou possui bem (móvel). Propriedade passa aos herdeiros. Lei protege contra confisco.</p><p><strong>Função social da propriedade:</strong> Lei exige que propriedade cumpra função social. Você não pode simplesmente deixar bem vago (terreno baldio vira invasão). Propriedade tem deveres sociais.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem terreno vago na cidade. Lei exige que use bem (construir, alugar, etc). Se deixa vago indefinidamente (causa problemas sociais), governo pode desapropriar em interesse público.</blockquote><p><strong>Usucapião:</strong> Se você ocupa bem alheio por tempo longo (normas 5-15 anos conforme tipo bem) sem oposição do proprietário, você pode adquirir propriedade. Lei reconhece posse contínua como direito.</p><blockquote class="quote"><strong>Proteção legal:</strong> "Propriedade oferece direito absoluto de controlar bem. Mas lei exige que propriedade cumpra função social. Propriedade tem deveres."</strong></blockquote><p>Como você protege propriedade? Registre imóvel em seu nome, mantenha documentação (comprovante compra, títulos), opor-se a invasões rapidamente (se tolera invasão, pode perder direito via usucapião).</p>'},
    {id:'viz', name: 'Direito de Vizinhança: Limites Ao Direito De Propriedade', content:'<h4>Seu Direito Termina Onde Começa Direito Do Vizinho</h4><p>Você é dono da sua propriedade, mas vizinhos também têm direitos. Lei limita seu direito de propriedade para proteger vizinhos. Vizinhança é equilibrio de direitos.</p><p><strong>Ruído e incômodo:</strong> Você não pode fazer ruído excessivo prejudicando vizinhos (música alta, reforma 3 da manhã). Lei define horário de repouso (normalmente 22h-7h). Violação pode gerar ação de vizinhos.</p><blockquote class="tip"><strong>Dica:</strong> Se vizinho reclama de barulho, ofereça solução (reduzir volume, reformar em horários permitidos). Processo de incômodo pode resultar em indenização para vizinho.</blockquote><p><strong>Águas de chuva:</strong> Você não pode direcionar água de chuva para propriedade vizinha. Lei exige que águas escorram naturalmente ou você as dirija para espaço seu. Desvio prejudicial é violação.</p><p><strong>Árvores em divisa:</strong> Árvore na divisa é de ambos. Se frutos caem no vizinho, vizinho pode aproveitar. Se raízes/galhos prejudicam vizinho, você deve podar/cortar. Ambos têm direitos.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem árvore na divisa que transpõe para terreno vizinho. Você deve podar galhos que prejudicam vizinho. Vizinho pode aproveitar frutos que caem em seu terreno.</blockquote><p><strong>Animais perigosos:</strong> Se você tem cachorro agressivo, você é responsável por manter contido. Se cachorro escapa e morde vizinho, você paga indenização. Lei exige contenção de animais perigosos.</p><blockquote class="quote"><strong>Vizinhança equilibrada:</strong> "Seu direito à propriedade existe, mas é limitado por direitos vizinhos. Lei oferece proteção a ambos. Vizinhança exige respeito mútuo."</strong></blockquote><p>Como você evita conflitos? Conheça vizinhos, respeite horários, evite incômodos, pedir autorização antes de reforma que afeta vizinho, resolver disputas amigavelmente antes de litigar.</p>'},
    {id:'inv', name: 'Invasão de Propriedade: Seu Direito de Reclamar', content:'<h4>Protegendo Sua Propriedade Contra Invasão</h4><p>Se alguém invade sua propriedade (entra sem permissão, ocupa), você tem direito de reclamar. Lei oferece proteção: você pode exigir saída imediata.</p><p><strong>Esbulho:</strong> Invasão de propriedade alheia (alguém entra na sua casa, ocupa sua terra). Lei permite reclamar imediatamente. Você pode chamar polícia.</p><blockquote class="tip"><strong>Dica:</strong> Se invasor está em propriedade sua, chame polícia (é crime em alguns casos). Se invasão é contínua (ocupação prolongada), procure juiz para ordem de despejo.</blockquote><p><strong>Reintegração de posse:</strong> Ação judicial para recuperar propriedade invadida. Juiz ordena que invasor saia. Se recusa, polícia executa a ordem.</p><p><strong>Esbulho vs controvérsia de posse:</strong> Esbulho é invasão clara (você tem propriedade, outro entra sem permissão). Controvérsia é quando ambas afirmam direito (ambas argumentam que tem posse). Lei trata diferente.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem casa registrada. Invasor entra e ocupa. Você tem ação de reintegração: juiz ordena saída. Mas se invasor argumenta que você alugou e agora recusa sair, é controvérsia de posse (mais complexo).</blockquote><p><strong>Defesa possessória:</strong> Você pode se defender contra invasão usando força mínima necessária. Lei permite que você empurre invasor, feche porta. Mas proibido violência excessiva.</p><blockquote class="quote"><strong>Proteção da posse:</strong> "Lei reconhece que posse é direito protegido. Se invadido, você pode reclamar imediatamente. Defesa possessória oferece proteção rápida."</strong></blockquote><p>Como você se protege? Mantenha documentação (título, comprovante, registro), denuncie invasão rápido (deixar tempo facilita invasor ganhar direito via usucapião), considere segurança (muro, câmeras).</p>'},
    {id:'serv', name: 'Servidões e Direitos de Passagem', content:'<h4>Permissão Legal De Acessar Propriedade Alheia</h4><p>Servidão é direito legal de usar propriedade alheia para benefício da sua propriedade. Exemplo: você precisa passar por terra vizinha para acessar sua propriedade (sem saída própria).</p><p><strong>Servidão necessária:</strong> Você tem direito se propriedade sua está encravada (sem saída). Lei oferece direito de passagem pela propriedade vizinha. Vizinho não pode negar.</p><blockquote class="tip"><strong>Dica:</strong> Se sua propriedade não tem saída (encravada), procure cartório para registrar servidão de passagem. Lei pode forçar vizinho a permitir passagem.</blockquote><p><strong>Indenização de servidão:</strong> Você pode ser obrigado a pagar indenização ao vizinho se exerce servidão. Lei define: compensação é proporcional ao prejuízo ao vizinho.</p><p><strong>Servidão de oleoduto, tubulação:</strong> Empresa de água/gás pode ter servidão legal de passar tubulação por propriedade sua. Você recebe indenização. Lei oferece interesse público.</p><blockquote class="example"><strong>Exemplo:</strong> Sua casa está atrás de outra casa (encravada). Você tem direito de passagem pela propriedade frontal. Você paga indenização ao vizinho (definida por juiz conforme prejuízo).</blockquote><p><strong>Cancelamento de servidão:</strong> Servidão continua indefinidamente. Mas pode ser cancelada se bem-estar deixa de ser necessário (ex: sua propriedade ganha saída própria).</p><blockquote class="quote"><strong>Interesse público:</strong> "Lei reconhece que servidões beneficiam interesse público. Você tem direito de acessar sua propriedade mesmo que precise passar por alheio."</strong></blockquote><p>Como você procede? Se propriedade é encravada, procure cartório local para requisitar servidão. Vizinho pode oferecer indenização; se recusa, você litigua para fixação judicial.</p>'}
  ],

  id:4, name: 'Divórcio e Guarda', free:false,
  topics:[
    {id:'div', name: 'Processo de Divórcio: Consensual vs Litigioso', content:'<h4>Quando Casamento Não Funciona: Caminho Legal Para Separar</h4><p>Divórcio é encerramento formal do casamento. Lei oferece dois caminhos: consensual (ambas concordam, é rápido) e litigioso (um quer, outro não, juiz decide). Você deve conhecer cada um.</p><p><strong>Divórcio consensual:</strong> Ambos cônjuges concordam em separar e em como dividir bens/cuidados com filhos. Processo é simples: contrata advogado, preenche documento, juiz aprova, divórcio é formalizado. Tempo: 2-4 meses.</p><blockquote class="tip"><strong>Dica:</strong> Divórcio consensual é melhor opção se ambas conseguem conversar. Você economiza tempo, dinheiro, e evita trauma prolongado. Recomendado.</blockquote><p><strong>Divórcio litigioso:</strong> Um cônjuge quer divorciar, outro não (ou discordam de divisão de bens/guarda). Exige processo judicial completo. Juiz ouve ambos, analisa evidência, decide. Tempo: 2-5 anos.</p><p><strong>Questões de divórcio:</strong> Divisão de bens (conforme regime matrimonial), guarda de filhos (decidida por interesse do menor), visitação (pai/mãe sem guarda), pensão alimentícia (obrigação de pagar por alimentos).</p><blockquote class="example"><strong>Exemplo:</strong> Casal consensual: ambas concordam em separar, dividem bens 50/50, filhos moram com mãe (pai visita fim de semana), pai paga R$ 1.500/mês pensão. Tudo pronto em 3 meses. vs. Casal litigioso: marido quer guarda, esposa não concorda, discutem bens, processo dura 3 anos.</blockquote><p><strong>Custas e honorários:</strong> Divórcio consensual: baixa custo (cartório, advogado comum ~R$ 2-5 mil). Litigioso: alto custo (advogados, perícias, processo ~R$ 10-30 mil+).</p><blockquote class="quote"><strong>Caminhos diferentes:</strong> "Consensual é rápido e barato. Litigioso é longo e caro. Lei oferece ambas opções. Escolha depende se consegue conversar com cônjuge."</strong></blockquote><p>Como você se protege? Procure entender o que é justo (divisão de bens conforme lei), negocie com cônjuge antes de processar, contrate advogado família (especialista).</p>'},
    {id:'gua', name: 'Guarda Compartilhada e Unilateral', content:'<h4>Cuidando Do Filho Após Separação</h4><p>Guarda é direito/dever de viver com filho, tomar decisões diárias (escola, médico). Lei oferece dois modelos: compartilhada (ambos pais decidem) e unilateral (um pai/mãe decide).</p><p><strong>Guarda compartilhada:</strong> Ambos pais têm custódia e autoridade. Decisões importantes (educação, saúde) são conjuntas. Filho pode morar alternando entre casas (cada semana, cada 15 dias). Lei favorece este modelo (mantém relacionamento com ambos pais).</p><blockquote class="tip"><strong>Dica:</strong> Guarda compartilhada é melhor para filho (mantém relacionamento com ambos pais). Ambos pais devem cooperar. Se cooperarem, é excelente opção.</blockquote><p><strong>Guarda unilateral:</strong> Um pai/mãe tem custódia e autoridade. Outro pai/mãe tem visitação (direito de visitar). Unilateral é usada quando pais não conseguem cooperar ou um é incapaz (negligência, abuso).</p><p><strong>Critério para decidir guarda:</strong> Juiz considera interesse do menor: qual pai oferece ambiente melhor, estabilidade, já está com filho. Não é sobre qual pai "ama mais", é sobre cuidado prático.</p><blockquote class="example"><strong>Exemplo:</strong> Casal separa. Mãe tem residência estável (apartamento, emprego), filho estava com ela. Pai tem vida instável (sem moradia fixa). Juiz concede guarda à mãe (interesse do menor). Pai tem visitação todo fim de semana.</blockquote><p><strong>Modificação de guarda:</strong> Situações mudam. Se pai/mãe sem guarda melhora condições, pode pedir modificação. Se pai/mãe com guarda piora (abuso, negligência), guarda pode ser transferida.</p><blockquote class="quote"><strong>Interesse do menor:</strong> "Lei SEMPRE prioriza interesse da criança. Guarda é decidida por quem oferece melhor ambiente, não pela preferência dos pais."</strong></blockquote><p>Como você se protege como pai/mãe? Mantenha condições boas (moradia, emprego), participe ativamente na vida do filho, documente cuidados (fotos, relatórios escola), evite brigas com outro pai na frente do filho.</p>'},
    {id:'vis', name: 'Direito de Visitação e Convivência', content:'<h4>Mantendo Contato Com Filho Após Separação</h4><p>Se você não tem guarda, você tem direito de visitação: períodos regulares para estar com filho. Lei protege este direito. Você não pode ser alienado do filho.</p><p><strong>Visitação estabelecida:</strong> Juiz define horários/dias de visitação. Tipicamente: fim de semana (sábado-domingo), feriados, férias escolares. Ambas partes devem cumprir.</p><blockquote class="tip"><strong>Dica:</strong> Se pai/mãe com guarda impede visitação sem causa legal, você pode pedir sanção ao juiz (multa, até mudança de guarda). Lei protege seu direito.</blockquote><p><strong>Alienação parental:</strong> Quando pai/mãe com guarda impede contato com outro pai/mãe (diz coisas ruins, nega visitação sem motivo). Lei proíbe. Alienação parental é forma de abuso ao filho.</p><p><strong>Visitação supervisionada:</strong> Se há risco ao filho (pai/mãe com histórico de abuso), visitação pode ser supervisionada por terceiro (profissional). Garante segurança do filho.</p><blockquote class="example"><strong>Exemplo:</strong> Pai tem histórico de violência. Juiz concede visitação supervisionada: pai visita filho 2h por semana na presença de psicólogo. Quando melhora comportamento, visitação pode se tornar sem supervisão.</blockquote><p><strong>Mudança de residência:</strong> Se pai/mãe com guarda quer mudar de cidade/país, deve informar outro pai/mãe e pedir autorização (se guarda compartilhada) ou juiz (se guarda unilateral). Lei protege manutenção de contato.</p><blockquote class="quote"><strong>Direito de convivência:</strong> "Pai/mãe sem guarda tem direito de visitar/conviver com filho. Lei protege este direito. Impedimento de visitação sem causa é ilegal."</strong></blockquote><p>Como você se protege? Tenha visitação por escrito (juiz define ou ambas assinam), cumpra horários (mostra responsabilidade), documente impedimentos de visitação (se ocorrem), considere processo se impedido.</p>'},
    {id:'pen', name: 'Pensão Alimentícia: Obrigação de Sustentar Filho', content:'<h4>Responsabilidade Financeira Após Separação</h4><p>Pai/mãe sem guarda é obrigado a pagar pensão alimentícia por alimentos (educação, saúde, moradia) do filho. Pensão é direito do filho, obrigação do pai/mãe incapaz de cuidar.</p><p><strong>Cálculo de pensão:</strong> Juiz considera renda de ambos pais, necessidades do filho (quantos filhos, idade). Tipicamente: 20-30% da renda do pai/mãe sem guarda. Pode variar baseado em capacidade/necessidade.</p><blockquote class="tip"><strong>Dica:</strong> Se você tem filho e separa, espere pagar pensão. Lei presume responsabilidade financeira. Se renda muda (piora), você pode pedir redução (com comprovação).</blockquote><p><strong>Atraso de pensão:</strong> Se você não paga pensão, você acumula dívida com juros. Juiz pode determinar penhora de renda, bloqueio de bens. Atraso não desaparece (prescreve em até 20 anos).</p><p><strong>Pensão alimentícia do cônjuge:</strong> Se você separa e cônjuge não tem renda, pode ter direito a pensão alimentícia também. Juiz avalia capacidade sua e necessidade do cônjuge.</p><blockquote class="example"><strong>Exemplo:</strong> Pai tem renda R$ 5.000, mãe é dona de casa (renda 0), filho tem 8 anos. Pensão é ~R$ 1.000 (20% de R$ 5.000). Pai paga R$ 1.000/mês. Se pai piora (desemprego), pode pedir redução com comprovação.</blockquote><p><strong>Término de pensão:</strong> Pensão continua até filho completar 18 anos (ou terminar educação se ainda em escola com até 24 anos). Se filho tem renda (trabalho), pensão pode ser reduzida.</p><blockquote class="quote"><strong>Obrigação parental:</strong> "Pai/mãe tem obrigação de sustentar filho até 18 anos. Lei garante que filho tenha alimentos mesmo se pais separam. Pensão é direito do filho."</strong></blockquote><p>Como você se protege como pai/mãe com guarda? Peça pensão por escrito (juiz define), abra conta separada para pensão (fácil rastrear), denuncie atrasos (pode processar), reclame se atraso prejudica filho.</p>'}
  ],

  id:5, name: 'Herança e Sucessão', free:false,
  topics:[
    {id:'her', name: 'Planejamento Sucessório e Testamento', content:'<h4>Deixando Patrimônio Para Seus Herdeiros De Forma Legal</h4><p>Herança é transferência de patrimônio após morte. Lei oferece proteções: herdeiros têm direito legal, você pode deixar testamento expressando vontade. Planejamento sucessório é importante.</p><p><strong>Herdeiros legais:</strong> Lei define ordem (conforme parentesco): filhos (prioridade 1), cônjuge, pais, irmãos. Se você não deixa testamento, herança segue esta ordem. Herdeiros recebem conforme classe.</p><blockquote class="tip"><strong>Dica:</strong> Se tem patrimônio significativo ou quer deixar para pessoa específica, faça testamento. Testamento expressa sua vontade, evita confusão entre herdeiros.</blockquote><p><strong>Testamento requisitos:</strong> Você soa maior de 18 anos, tem capacidade mental (entende consequências), expressa vontade com clareza. Testamento é documento escrito ou feito perante notário.</p><p><strong>Testamento escrito (particular):</strong> Você escreve à mão ou digitado, assina com testemunhas (2-3 pessoas). Simples, gratuito, mas exige prova após morte (testador pode ter sido forçado).</p><blockquote class="example"><strong>Exemplo:</strong> Você escreve testamento: "Deixo minha casa para filho Maria, meu carro para irmão João, R$ 10 mil para cunhada Ana." Assina com 3 testemunhas. Após morte, herdeiros seguem testamento.</blockquote><p><strong>Testamento público (notariado):</strong> Você comparece notário, declara vontade, notário redige. Custa R$ 500-2.000, mas é prova mais forte. Menos contestação após morte.</p><blockquote class="quote"><strong>Importância do planejamento:</strong> "Testamento expressa sua vontade após morte. Lei oferece liberdade de testar. Planejamento sucessório evita disputa entre herdeiros."</strong></blockquote><p>Como você faz testamento? Procure notário público ou advogado especializado em sucessões. Eles orientam sobre requisitos legais, confirmam capacidade sua.</p>'},
    {id:'leg', name: 'Legítima: Proteção Aos Herdeiros Próximos', content:'<h4>Lei Oferece Proteção Mínima Aos Herdeiros</h4><p>Lei oferece proteção: herdeiros próximos têm direito a "legítima" (percentual mínimo do patrimônio). Você não pode excluir filhos/cônjuge completamente. Lei oferece proteção.</p><p><strong>O que é legítima:</strong> Direito legal dos herdeiros próximos (filhos, cônjuge, pais) de receber pelo menos 50% do patrimônio. Você pode dispor de outros 50% como quiser (metade disponível).</p><blockquote class="tip"><strong>Dica:</strong> Legítima protege herdeiros. Você não pode deixar tudo para terceiro excluindo filhos. Lei garante que filhos herdem algo.</blockquote><p><strong>Quem tem direito a legítima:</strong> Filhos (absoluto), cônjuge (absoluto), pais (se não há filhos). Irmãos, tios, outros não têm direito a legítima (mas podem herdar se lei assim permite).</p><p><strong>Como calcula legítima:</strong> Patrimônio total x 50% = legítima total. Divide entre herdeiros próximos conforme lei. Exemplo: patrimônio R$ 100 mil, filhos = legítima R$ 50 mil, dividida entre filhos.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem patrimônio R$ 300 mil, 2 filhos, cônjuge. Legítima é R$ 150 mil (50%). Cônjuge recebe sua metade (~R$ 75 mil), cada filho recebe (~R$ 37,5 mil). Você pode deixar R$ 150 mil restante para qualquer pessoa.</blockquote><p><strong>Redução de legítima:</strong> Se você deixa muito para pessoa fora da família (testamento muito generoso com terceiro), herdeiros podem reclamar que testamento viola legítima. Juiz pode reduzir disposição.</p><blockquote class="quote"><strong>Equilíbrio de direitos:</strong> "Lei oferece liberdade de testar (você escolhe quem herda), mas protege herdeiros próximos com legítima. Equilíbrio entre liberdade e proteção."</strong></blockquote><p>Como você protege herança? Testamento claro, legítima respeitada (evita contestação), comunicar herdeiros da existência de testamento (evita surpresa).</p>'},
    {id:'inv', name: 'Inventário e Partilha: Dividindo Patrimônio', content:'<h4>Processo Legal Para Distribuir Herança</h4><p>Inventário é processo legal para definir herdeiros e dividir patrimônio após morte. Lei exige documentação, supervisão. Inventário pode ser consensual (simples) ou litigioso (complexo).</p><p><strong>Inventário consensual:</strong> Herdeiros concordam quem herda e quanto. Advogado prepara documento, juiz aprova. Simples, rápido (3-6 meses), barato (custas ~R$ 1-5 mil).</p><blockquote class="tip"><strong>Dica:</strong> Inventário consensual é melhor. Se herdeiros conseguem conversar, faça consensual. Economiza tempo, dinheiro, evita desgaste.</blockquote><p><strong>Inventário litigioso:</strong> Herdeiros discordam quem herda, quanto cada recebe, ou há reclamação sobre testamento. Exige processo judicial completo. Complexo, longo (2-5 anos), caro (custas ~R$ 5-30 mil+).</p><p><strong>O que inventário divide:</strong> Bens (casa, carro, conta bancária), dívidas (empréstimos, impostos), débitos do inventário (funeral, cartório, advogado). Herança líquida é o que sobra após descontar dívidas.</p><blockquote class="example"><strong>Exemplo:</strong> Falecido deixa: casa R$ 400 mil, carro R$ 50 mil, conta bancária R$ 100 mil. Dívidas: empréstimo R$ 100 mil, funeral R$ 30 mil, custas inventário R$ 20 mil. Herança líquida: R$ 400 mil a dividir entre herdeiros.</blockquote><p><strong>Imposto de herança (ITCMD):</strong> Alguns estados cobram imposto sobre herança. Taxa varia (0% a 8% conforme estado). Herdeiros próximos (cônjuge, filhos) podem ter isenção em alguns estados.</p><blockquote class="quote"><strong>Formalidade necessária:</strong> "Inventário é processo legal obrigatório após morte. Supervisão garante que herança é dividida conforme lei. Sem inventário, propriedade fica indefinida."</strong></blockquote><p>Como você se prepara? Se tem patrimônio, deixe testamento claro. Se falecido deixou herança, procure advogado especializado em sucessões para orientação sobre inventário.</p>'},
    {id:'cont', name: 'Contencioso Sucessório: Quando Herdeiros Discordam', content:'<h4>Resolvendo Disputas Sobre Herança</h4><p>Se herdeiros discordam sobre testamento ou divisão de herança, há contencioso (disputa). Lei oferece mecanismos para resolver. Você deve conhecer seus direitos em disputa.</p><p><strong>Contestação de testamento:</strong> Se você acredita testamento é falso/inválido (testador foi coagido, testador era incapaz, testamento viola legítima), você pode contestar. Juiz analisa se testamento é válido.</p><blockquote class="tip"><strong>Dica:</strong> Se suspeita que testamento foi feito sob coação ou testador era incapaz, conteste. Juiz pode anular testamento (herança segue lei então).</blockquote><p><strong>Ação de nulidade:</strong> Você processa para anular testamento que acredita nulo (violações de requisitos legais). Exige prova: testador era incapaz (demência, alzheimer), testador foi coagido, testamento não respeita forma legal.</p><p><strong>Ação de redução:</strong> Se testamento viola legítima (deixa menos que 50% para herdeiros próximos), você pode pedir redução. Juiz reduz disposição de terceiros, garante legítima.</p><blockquote class="example"><strong>Exemplo:</strong> Testador deixa R$ 1 milhão para amigo, R$ 100 mil para filho. Lei exige legítima R$ 550 mil para filho. Filho processa pedindo redução. Juiz reduz disposição ao amigo, garante legítima ao filho.</blockquote><p><strong>Litigação de herança:</strong> Processo é complexo, pode durar 3-10 anos. Custas são altas (~R$ 10-100 mil+). Recomendado apenas se patrimônio é muito grande ou há injustiça clara.</p><blockquote class="quote"><strong>Resolução de conflitos:</strong> "Disputas sobre herança são comuns. Lei oferece mecanismos (contestação, nulidade, redução). Você tem direito de defender sua parte."</strong></blockquote><p>Como você se protege? Se herdeiro, guarde documentação (testamento, inventário, comprovante pago custas). Se disputa, procure advogado especializado em sucessões rapidamente (prazos existem).</p>'}

  topics:[
    {id:'resp', name: 'Responsabilidade Civil: Quando Você Prejudica Alguém', content:'<h4>Lei Exige Reparação Se Você Causou Dano</h4><p>Responsabilidade civil é obrigação de reparar dano causado a pessoa. Se você prejudica alguém (acidente, negligência, abuso), lei exige compensação (indenização).</p><p><strong>Dano patrimonial:</strong> Prejuízo em bem alheio (carro batido, joia roubada, prédio danificado). Lei exige reparação: você paga valor para consertar/substituir bem prejudicado.</p><blockquote class="tip"><strong>Dica:</strong> Se causou dano, é melhor resolver rápido (pagar reparação) que esperar processo. Juiz pode condenar ao pagamento + juros + multa.</blockquote><p><strong>Dano moral:</strong> Ofensa à dignidade/privacidade (humilhação pública, difamação, infringimento de direitos). Lei permite indenização mesmo sem dano patrimonial concreto.</p><p><strong>Cálculo de indenização:</strong> Juiz considera: gravidade do dano, capacidade econômica do responsável, impacto na vítima. Pode variar de centenas a milhões de reais conforme dano.</p><blockquote class="example"><strong>Exemplo:</strong> Você dirige negligentemente, bate em outro carro. Responsável: pagar conserto (R$ 10 mil), indenização a ferido (R$ 50 mil por dano moral), multa por negligência. Total: ~R$ 60 mil+.</blockquote><p><strong>Responsabilidade objetiva vs subjetiva:</strong> Objetiva: você responde mesmo sem culpa (dano ocorreu, você é responsável). Subjetiva: você responde apenas se agiu com negligência/imprudência.</p><blockquote class="quote"><strong>Obrigação de reparar:</strong> "Se sua ação/negligência prejudica alguém, você é responsável. Lei exige reparação proporcional ao dano. Indenização protege vítima."</strong></blockquote><p>Como você se protege? Tenha seguro de responsabilidade civil, dirija/aja com cuidado, respeite propriedade alheio, resolva danos rapidamente.</p>'},
    {id:'ind', name: 'Cálculo e Recebimento de Indenização', content:'<h4>Quanto Você Pode Receber Se Prejudicado</h4><p>Se você foi prejudicado (acidente, negligência, abuso), lei oferece direito a indenização. Valor varia conforme tipo dano, gravidade, impacto em você.</p><p><strong>Indenização por dano patrimonial:</strong> Valor exato para consertar/substituir bem. Exemplo: carro conserta R$ 10 mil, você recebe R$ 10 mil. Simples de calcular.</p><blockquote class="tip"><strong>Dica:</strong> Se prejudicado, recolha documentação: nota de conserto, fotos do dano, comprovante de compra do bem. Isso prova valor da indenização.</blockquote><p><strong>Indenização por dano moral:</strong> Valor arbitrário decidido por juiz. Não há fórmula exata. Juiz considera: gravidade (humilhação pequena vs pública), impacto na sua vida (afetou trabalho, relacionamentos?), capacidade econômica do responsável.</p><p><strong>Tabela de indenizações:</strong> Alguns tribunais usam tabelas estimativas (morte de parente próximo = x reais, perda de emprego = y reais). Tabelas ajudam juiz a decidir, mas não são obrigatórias.</p><blockquote class="example"><strong>Exemplo:</strong> Você sofreu difamação pública (responsável espalhou boato falso). Juiz avalia: você perdeu clientes (dano patrimonial R$ 50 mil), sofreu humilhação (dano moral R$ 30 mil). Total: R$ 80 mil.</blockquote><p><strong>Lucro cessante:</strong> Se você deixou de ganhar por causa do dano (por exemplo: acidente tirou você de trabalho por 6 meses, você perdeu R$ 30 mil de renda), você pode receber como indenização.</p><blockquote class="quote"><strong>Reparação justa:</strong> "Indenização busca reparar prejudicado. Valor deve compensar dano sofrido. Lei oferece flexibilidade para juiz decidir conforme caso concreto."</strong></blockquote><p>Como você calcula indenização para pedir? Liste danos patrimoniais (com documentação), descreva dano moral (efeito na vida), calcule lucro cessante (renda perdida). Juiz ajusta conforme prova.</p>'},
    {id:'seg', name: 'Seguro de Responsabilidade Civil', content:'<h4>Proteção Contra Riscos De Causar Danos</h4><p>Seguro de responsabilidade civil protege você contra risco de causar danos (acidentes, negligência). Você paga prêmio, segurador paga indenização se você causa dano.</p><p><strong>Como funciona:</strong> Você contrata seguro, paga prêmio mensal/anual. Se você causa dano coberto, você notifica segurador. Segurador paga indenização ao prejudicado (até limite da apólice).</p><blockquote class="tip"><strong>Dica:</strong> Seguro é excelente proteção. Você continua com vida normal; segurador paga indenização. Custo é baixo (~R$ 50-500/ano) comparado ao risco.</blockquote><p><strong>Tipos de seguro:</strong> Responsabilidade civil automóvel (obrigatório no Brasil para carros), responsabilidade civil residencial (acidentes na casa), responsabilidade civil profissional (médicos, advogados, etc).</p><p><strong>Limites de cobertura:</strong> Apólice tem limite máximo que segurador paga. Exemplo: seguro de carro com limite R$ 500 mil. Se você causa dano de R$ 1 milhão, você paga diferença (R$ 500 mil).</p><blockquote class="example"><strong>Exemplo:</strong> Você tem seguro de responsabilidade civil residencial com limite R$ 100 mil. Visitante cai na sua escada, quebra perna, indenização é R$ 150 mil. Segurador paga R$ 100 mil, você paga R$ 50 mil.</blockquote><p><strong>Exclusões:</strong> Seguro pode excluir certas situações. Exemplo: seguro pode excluir danos intencional (você deliberadamente prejudica alguém). Leia apólice para entender cobertura.</p><blockquote class="quote"><strong>Proteção financeira:</strong> "Seguro de responsabilidade civil oferece proteção contra risco financeiro de causar danos. Recomendado para quem tem propriedade/vida ativa."</strong></blockquote><p>Como você contrata? Procure corretora de seguros, compare ofertas, escolha cobertura adequada, leia apólice completa antes de assinar.</p>'},
    {id:'dn', name: 'Direito de Denunciar e Reclamar', content:'<h4>Seus Direitos Quando Prejudicado</h4><p>Se você foi prejudicado (crime, acidente, negligência), você tem direito de denunciar/reclamar. Lei oferece várias vias: polícia (crimes), órgãos de proteção, judiciário.</p><p><strong>Boletim de ocorrência (BO):</strong> Se crime ocorreu (roubo, agressão), você faz BO na polícia. BO registra crime, oferece número de processo. Importantes para seguir processo criminal.</p><blockquote class="tip"><strong>Dica:</strong> Sempre faça BO se crime ocorreu. BO oferece documentação oficial que você é vítima. Seguro pode exigir BO para cobrir dano.</blockquote><p><strong>Reclamação administrativa:</strong> Alguns danos devem ser reportados a órgão regulador (saúde, financeiro, etc). Exemplo: se médico negligente, você faz reclamação ao Conselho Regional de Medicina.</p><p><strong>Ação judicial:</strong> Você processa responsável buscando indenização. Processo pode ser em Pequenas Causas (dano pequeno, sem advogado) ou Justiça Ordinária (dano grande, com advogado).</p><blockquote class="example"><strong>Exemplo:</strong> Você sofre acidente de carro. Faz BO (registra crime de negligência), notifica segurador (seguro paga), processa motorista por danos adicionais (dano moral não coberto por seguro).</blockquote><p><strong>Prazo para reclamar:</strong> Você tem 3 anos para processar por dano (prazo de prescrição). Após 3 anos, você perde direito de reclamar. Comece processo rápido.</p><blockquote class="quote"><strong>Acesso à justiça:</strong> "Lei oferece vários caminhos para reclamar se prejudicado. BO, órgão regulador, judiciário. Você tem direito de buscar reparação."</strong></blockquote><p>Como você se protege? Documento tudo (fotos, vídeo, testemunhas), faça BO se crime, notifique segurador, procure advogado especializado em reparação de danos.</p>'}
  ],
