<h3>Realidade Virtual: Escapar Completamente do Mundo Real</h3>
<p>Realidade Virtual (VR) substitui completamente o ambiente visual e auditivo. Você entra em mundo digital 100%. Diferente de AR (que sobrepõe), VR é imersão total.</p>

<h4>Como VR Funciona: A Física</h4>
<ul>
<li><strong>Visão Estéreo:</strong> Duas imagens ligeiramente diferentes (uma para cada olho) criam profundidade 3D</li>
<li><strong>Head Tracking:</strong> Sensores rastreiam movimento da cabeça (acelerador, giroscópio)</li>
<li><strong>Refresh Rate:</strong> 90-120 fps (muito rápido para não causar enjoo)</li>
<li><strong>Motion-to-Photon:</strong> Latência < 20ms entre movimento da cabeça e atualização visual</li>
<li><strong>Controllers:</strong> Rastreamento de mão/bastão para interação</li>
</ul>

<blockquote class="tip">
<strong>👓 Anatomia de um Headset VR:</strong>
<br>
<br>Display OLED/LCD: 2-4K por olho
<br>Lentes: Grande campo de visão (90-110 graus)
<br>Sensores: IMU (acelerador, giroscópio, magnetômetro)
<br>Processador: Snapdragon 888+ ou equivalente

<h3>Unity: Criando Mundos Imersivos</h3>
<p>Unity é engine usado para 90% dos games VR/AR. C#, visual intuitive, deploy a múltiplas plataformas (Oculus, PlayStation VR, WebGL, mobile).</p>

<h4>Setup Mínimo</h4>
<ul>
<li>Unity Hub + Unity Editor (versão 2022 LTS recomendada)</li>
<li>XR Plugin Management (suporte VR/AR)</li>
<li>OpenXR (padrão open para VR)</li>
<li>Headset ou simulador</li>

<h4>Conceitos Fundamentais</h4>
<p><strong>1. Scene:</strong> Seu mundo (cena). Contém GameObjects, luzes, câmera.</p>
<p><strong>2. GameObject:</strong> Objeto na scene (cubo, esfera, jogador, NPC).</p>
<p><strong>3. Component:</strong> Comportamento de GameObject (física, rotação, som).</p>
<p><strong>4. Script:</strong> Código C# que controla GameObject.</p>

<blockquote class="example">
<strong>🎮 Exemplo: Cubo Rotativo em VR</strong>

<br>1. Criar novo Scene
<br>2. Adicionar Cube (GameObject)
<br>3. Adicionar Script:
<br>

using UnityEngine;
<br>
public class RotateCube : MonoBehaviour {
<br>  void Update() {
<br>    transform.Rotate(0, 100 * Time.deltaTime, 0);
<br>  }
<br>}
</code>
<br>
<br>4. Buildar para Oculus Quest
<br>5. Deploy no headset
<br>6. Vê cubo girando na sua frente!
</blockquote>

<li><strong>CPU:</strong> Rastreamento, física, IA rodando rapidamente</li>
<li><strong>Latência:</strong> < 20ms entre movimento e renderização</li>

<blockquote class="tip">
<strong>⚡ Técnicas de Optimization:</strong>
<br>
<br>• Level of Detail (LOD): Modelos complexos longe, simples perto
<br>• Occlusion Culling: Não renderizar objetos atrás de paredes
<br>• Batching: Juntar múltiplas geometrias (reduz draw calls)
<br>• Asynchronous Readback: Ler dados sem bloquear render
<br>• Eye Tracking: Render detalhado apenas onde você olha (foveated rendering)
<br>

</blockquote>

<h3>WebXR: Realidade na Web</h3>
<p>WebXR permite criar experiências VR/AR diretamente no navegador. Sem instalação, sem download. Accesso via URL. Revolucionário para casual gaming e marketing.</p>

<h4>O que é WebXR?</h4>
<p>APIs JavaScript que acessam headset VR, controllers, sensores de AR — tudo no navegador.</p>
<ul>
<li>Suportado: Meta Quest, HTC Vive, PlayStation VR, alguns smartphones</li>
<li>Compatibilidade: Chrome, Firefox, Safari (parcial)</li>
<li>Uso: Gaming, educação, e-commerce, social</li>
</ul>

<h4>Stack Técnico WebXR</h4>
<ul>
<li><strong>Babylon.js:</strong> Engine web profissional, WebXR nativo excelente</li>
<li><strong>Three.js:</strong> Outra engine web, mais comunidade</li>
<li><strong>A-Frame:</strong> Abstração sobre Three.js, super simples</li>
<li><strong>PlayCanvas:</strong> Cloud-based editor, deploy direto</li>
</ul>

<h4>Exemplo Simples com Babylon.js</h4>
<blockquote class="example">
<strong>💻 VR Scene em Babylon.js:</strong>
<br>
<br><code>
const scene = new BABYLON.Scene(engine);
<br>const xr = await scene.createDefaultXRExperienceAsync();
<br>
<br>// Criar cubo
<br>const box = BABYLON.MeshBuilder.CreateBox("box", {}, scene);
<br>box.position.z = 2;
<br>
<br>// Interação com mão
<br>xr.pointerSelection.onPointerSelectObservable.add((event) => {
<br>  box.rotate(BABYLON.Axis.Y, Math.PI / 4);
<br>});
<br>
<br>// Enter VR
<br>document.getElementById("enter-vr").onclick = () => xr.baseExperience.enterXRAsync();
</code>
<br>
<br>Resultado: Cena VR com cubo interativo em 30 linhas!
</blockquote>

<br>  ├─ Scripts/

<br>  │  ├─ ObjectCollector.cs
<br>  │  └─ ScoreUI.cs
<br>  ├─ Models/ (3D meshes)
<br>  ├─ Materials/ (texturas)
<br>  └─ Scenes/
<br>     └─ GameScene.unity
</blockquote>

<h4>Implementação Passo 1: Setup XR Rig</h4>
<ul>
<li>Criar novo Project, importar XR Plugin</li>

<li>Configurar hand tracking (Left/Right controllers)</li>
<li>Testar no headset ou simulador</li>
</ul>

<h4>Implementação Passo 2: Collectible Object Script</h4>
<blockquote class="example">
<strong>💻 C# Script Simplificado:</strong>
<br>
<br><code>
public class CollectibleObject : MonoBehaviour {
<br>  public bool isCollected = false;
<br>  private XRGrabInteractable grabInteractable;
<br>
<br>  void Start() {
<br>    grabInteractable = GetComponent<XRGrabInteractable>();
<br>    grabInteractable.selectEntered.AddListener(OnGrabbed);
<br>  }
<br>
<br>  void OnGrabbed(SelectEnterEventArgs args) {
<br>    isCollected = true;
<br>    GameManager.instance.AddScore(10);
<br>    Destroy(gameObject);  // sumir
<br>  }
<br>}
</code>

<h4>Implementação Passo 3: Game Manager</h4>
<blockquote class="example">

<p><strong>Para máxima compatibilidade: usar Unity com XR Plugin</strong></p>

<h4>Projeto: Furniture Preview App</h4>
<p>Usuário aponta câmera no quarto, clica, vê móvel 3D em tempo real. Pode rotacionar, mover, ver em seu espaço antes de comprar.</p>

<br>
<br>1. Usuário abre app
<br>2. ARCore/ARKit detecta plano (chão, parede)
<br>3. Usuário toca na tela
<br>4. Modelo 3D aparece no local
<br>5. Gestos: rotate (2 dedos), move (arrastar), scale (pinch)
<br>6. Botão "Comprar" vai para loja

<h4>Implementação em Unity</h4>

<br>    if (Input.touchCount > 0) {

<br>      if (raycastManager.Raycast(touch.position,
