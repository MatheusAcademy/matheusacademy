<h3>Ucrânia e Rússia: Irmãos que se Tornaram Inimigos</h3>
<p>A relação entre Rússia e Ucrânia é uma das mais complexas e trágicas da geopolítica moderna. Para a Rússia, a Ucrânia não é apenas um vizinho — é o berço de sua civilização. Kiev (Kyiv em ucraniano) foi a capital da Rus de Kiev no século IX, o primeiro estado eslavo oriental. Vladimir Putin repetidamente argumentou que russos e ucranianos são "um único povo" dividido artificialmente. Para a Ucrânia, no entanto, essa narrativa é uma negação de sua identidade nacional, de sua língua distinta e de séculos de resistência à dominação russa — incluindo o Holodomor, a fome artificial de 1932–33 orquestrada por Stalin que matou entre 3,5 e 7,5 milhões de ucranianos. Quando a União Soviética colapsou em 1991, a Ucrânia declarou independência com 92,3% de aprovação em referendo. No Memorando de Budapeste de 1994, a Ucrânia entregou o terceiro maior arsenal nuclear do mundo (1.900 ogivas estratégicas) em troca de garantias de segurança da Rússia, EUA e Reino Unido — garantias que a Rússia violaria duas décadas depois.</p>

<h4>A Revolução Laranja (2004) e os Primeiros Sinais</h4>
<p>O primeiro grande confronto entre a orientação pró-europeia e pró-russa da Ucrânia veio em 2004. Nas eleições presidenciais, o candidato pró-russo Viktor Yanukovych foi declarado vencedor em meio a fraudes massivas. Centenas de milhares de ucranianos tomaram as ruas de Kiev na "Revolução Laranja", forçando uma nova eleição que levou Viktor Yushchenko ao poder. Yushchenko era abertamente pró-ocidental e buscou aproximação com a UE e a OTAN. A Rússia reagiu com pressão econômica, cortando o fornecimento de gás natural à Ucrânia em janeiro de 2006 — afetando também a Europa, que dependia dos gasodutos ucranianos. Esse padrão — a Ucrânia se aproxima do Ocidente, a Rússia retalia — se repetiria com consequências cada vez mais graves.</p>

<h4>Euromaidan — A Revolução da Dignidade (2013–2014)</h4>
<p>Em novembro de 2013, o presidente Viktor Yanukovych (que havia retornado ao poder em 2010) anunciou que não assinaria o Acordo de Associação com a União Europeia, preferindo um pacote econômico de US$ 15 bilhões oferecido pela Rússia. A decisão provocou protestos massivos na Praça Maidan (Praça da Independência) de Kiev. Centenas de milhares de ucranianos acamparam no centro da capital por meses, enfrentando temperaturas abaixo de zero. Em fevereiro de 2014, forças de segurança abriram fogo contra manifestantes, matando mais de 100 pessoas em poucos dias — os "Céu dos Cem" (Nebesna Sotnia). A violência provocou a fuga de Yanukovych para a Rússia em 22 de fevereiro de 2014. A Revolução da Dignidade havia triunfado — mas a resposta de Moscou seria devastadora.</p>

<h4>Crimeia — A Primeira Anexação na Europa desde 1945</h4>
<p>Menos de uma semana após a queda de Yanukovych, em 27 de fevereiro de 2014, soldados sem insígnias — os "homenzinhos verdes" que depois Putin admitiu serem tropas russas — tomaram o parlamento da Crimeia e prédios governamentais. A operação foi rápida e precisa: em duas semanas, a Rússia controlava toda a península. Um referendo apressado em 16 de março de 2014, realizado sob ocupação militar e sem observadores internacionais, registrou 97% de votos pela adesão à Rússia — um número que a comunidade internacional rejeitou como fraudulento. Em 18 de março, Putin assinou o tratado de anexação da Crimeia, a primeira anexação territorial forçada na Europa desde a Segunda Guerra Mundial. A Crimeia tinha valor estratégico imenso: a base naval de Sevastopol (sede da Frota do Mar Negro), recursos energéticos offshore, e simbolismo histórico como território russo desde 1783 (transferido administrativamente para a Ucrânia em 1954 por Khrushchev). A reação internacional foi de sanções, mas nenhuma ação militar — o que muitos analistas consideram ter encorajado Putin a ir mais longe.</p>

<h4>A Guerra no Donbas (2014–2022) — O Conflito Esquecido</h4>
<p>Em abril de 2014, separatistas pró-russos — apoiados por soldados, tanques e artilharia russos — tomaram cidades nas regiões de Donetsk e Luhansk, no leste da Ucrânia (região conhecida como Donbas). Proclamaram as "Repúblicas Populares de Donetsk e Luhansk" (DPR e LPR). O conflito se tornou uma guerra de trincheiras que durou oito anos, matando mais de 14.000 pessoas (incluindo 3.400 civis). Os Acordos de Minsk (Minsk I em 2014, Minsk II em 2015), mediados por França e Alemanha, tentaram estabelecer um cessar-fogo e uma solução política, mas nunca foram implementados de fato — cada lado acusava o outro de violar os termos. Putin usou o Donbas como ferramenta de pressão permanente contra Kiev: enquanto o conflito existisse, a Ucrânia não poderia aderir à OTAN (a aliança não aceita membros com disputas territoriais ativas). Para a Ucrânia, aceitar os termos de Minsk significava dar à Rússia poder de veto sobre sua política externa através das repúblicas fantoche. O impasse durou até 2022.</p>

<h4>O Caminho para a Invasão (2021–2022)</h4>
<p>Ao longo de 2021, a Rússia começou uma mobilização militar massiva nas fronteiras da Ucrânia. Até dezembro de 2021, mais de 100.000 soldados russos estavam posicionados ao norte (Bielorrússia), leste (Rússia) e sul (Crimeia) da Ucrânia. Putin publicou um ensaio em julho de 2021 intitulado "Sobre a Unidade Histórica de Russos e Ucranianos", argumentando que a Ucrânia como nação independente era uma criação artificial. Em dezembro, a Rússia apresentou um ultimato exigindo que a OTAN garantisse nunca aceitar a Ucrânia como membro e retirasse forças da Europa Oriental — demandas que os EUA e a OTAN rejeitaram. A inteligência americana alertou repetidamente que a invasão era iminente, mas muitos — incluindo o presidente ucraniano Zelensky — resistiram a acreditar que Putin realmente invadiria. Em 21 de fevereiro de 2022, Putin reconheceu a independência das DPR e LPR. Três dias depois, em 24 de fevereiro de 2022, às 5:00 da manhã hora local, a Rússia lançou a maior operação militar na Europa desde 1945.</p>

<blockquote class="tip"><strong>Contexto essencial:</strong> A guerra de 2022 não começou em 2022 — começou em 2014, com a anexação da Crimeia e a guerra no Donbas. E suas raízes vão ainda mais fundo: à queda da URSS, ao Memorando de Budapeste, e à tensão fundamental entre a Ucrânia buscando soberania ocidental e a Rússia reivindicando sua esfera de influência. Fontes: Britannica, NPR, House of Commons Library, CFR, Wikipedia.</blockquote>

<h3>24 de Fevereiro de 2022 — O Dia que Mudou a Europa</h3>
<p>Às 5:00 da manhã de 24 de fevereiro de 2022, a Rússia lançou uma invasão em múltiplas frentes contra a Ucrânia. Mísseis de cruzeiro e balísticos atingiram aeroportos, bases militares, depósitos de munição e instalações de defesa aérea em todo o país. Colunas blindadas cruzaram as fronteiras pelo norte (a partir da Bielorrússia, rumo a Kiev), pelo leste (Donbas) e pelo sul (Crimeia em direção a Kherson e Zaporizhzhia). O plano russo original, segundo documentos capturados e análises de inteligência, previa a captura de Kiev em 72 horas, a deposição de Zelensky e a instalação de um governo fantoche. Putin acreditava que as forças ucranianas se desintegrariam rapidamente, que a população russófona do leste receberia os soldados como libertadores, e que o Ocidente reagiria com protestos verbais mas sem ação significativa. Ele estava errado em todos os pontos.</p>

<h4>A Resistência Ucraniana e a Batalha de Kiev</h4>
<p>O presidente Volodymyr Zelensky — um ex-comediante e ator que muitos subestimavam — tomou uma decisão que definiu o conflito. Quando os EUA ofereceram evacuá-lo de Kiev, Zelensky respondeu com a frase que se tornou icônica: "Eu preciso de munição, não de uma carona" ("I need ammunition, not a ride"). Sua recusa em fugir galvanizou a resistência ucraniana e a opinião pública mundial. As forças ucranianas, embora superadas em número e equipamento, lutaram ferozmente pela capital. A coluna blindada russa de 64 quilômetros que avançava sobre Kiev ficou atolada em congestionamento, falta de suprimentos e emboscadas constantes. Tropas aerotransportadas russas que tentaram tomar o aeroporto de Hostomel, nos arredores de Kiev, foram repelidas após combates intensos. Em março, tornou-se evidente que a Rússia não conseguiria tomar Kiev. Em 2 de abril de 2022, a Rússia retirou suas forças do norte da Ucrânia — revelando ao mundo os horrores do Massacre de Bucha, onde mais de 400 civis foram encontrados mortos em ruas e valas comuns na cidade ocupada, com evidências de execuções, torturas e violência sexual.</p>

<h4>A Contraofensiva Ucraniana de 2022</h4>
<p>Com armamento ocidental chegando em volumes crescentes — Javelin antitanque americanos, NLAW britânicos, sistemas HIMARS de precisão — a Ucrânia passou à ofensiva no segundo semestre de 2022. Em setembro, uma contraofensiva relâmpago na região de Kharkiv reconquistou mais de 6.000 km² em questão de dias, expulsando as forças russas de quase toda a região. Em novembro, a Ucrânia liberou Kherson, a única capital regional que a Rússia havia capturado — um golpe humilhante para Moscou, especialmente porque Putin havia declarado a anexação de Kherson (junto com Donetsk, Luhansk e Zaporizhzhia) à Rússia apenas semanas antes, em 30 de setembro de 2022. A Rússia respondeu com uma mobilização de 300.000 reservistas (a primeira desde a Segunda Guerra Mundial) e uma campanha sistemática de bombardeios contra a infraestrutura energética ucraniana, deixando milhões sem eletricidade e aquecimento durante o inverno.</p>

<h4>2023–2024 — A Guerra de Atrito</h4>
<p>A contraofensiva ucraniana de 2023, muito aguardada e apoiada com equipamento ocidental (tanques Leopard 2, Bradley, munições cluster), produziu resultados decepcionantes. A Rússia havia construído centenas de quilômetros de linhas defensivas — trincheiras, campos minados, "dentes de dragão" (obstáculos de concreto) — no sul e leste. A Ucrânia avançou apenas alguns quilômetros em meses de combates brutais, perdendo equipamento precioso. O conflito se transformou em uma guerra de atrito reminiscente da Primeira Guerra Mundial: trincheiras, drones, artilharia constante, ganhos territoriais mínimos a custo enorme. Em agosto de 2024, a Ucrânia surpreendeu o mundo com uma incursão audaciosa no território russo da região de Kursk, capturando cerca de 380 km² de solo russo — a primeira vez que forças estrangeiras ocupavam território russo desde a Segunda Guerra Mundial. A operação visava criar uma moeda de troca para futuras negociações, mas a Rússia contra-atacou com ferocidade, recuperando grande parte do território até início de 2025, inclusive com o apoio de tropas norte-coreanas.</p>

<h4>Os Aliados da Rússia — Coreia do Norte e Irã</h4>
<p>Um dos aspectos mais preocupantes da guerra foi a formação de uma aliança militar de fato entre Rússia, Coreia do Norte e Irã. A Coreia do Norte enviou mais de 12 milhões de projéteis de artilharia e dezenas de mísseis balísticos KN-23 à Rússia, tornando-se o principal fornecedor de munição de Moscou. Mais chocante ainda: entre 14.000 e 15.000 soldados norte-coreanos foram enviados para combater na frente de Kursk, com Kim Jong Un realizando cerimônia de boas-vindas para os que retornaram. O 11º Corpo de Elite norte-coreano participou da reconquista de Kursk em 2025. Em troca, a Coreia do Norte recebeu combustível, alimentos e — mais perigosamente — tecnologia militar e espacial russa. O Irã, por sua vez, forneceu milhares de drones Shahed-136 (rebatizados pela Rússia como "Geran-2"), que se tornaram uma das armas mais devastadoras da guerra. No segundo semestre de 2025, a Rússia lançava mais de 5.000 drones Shahed por mês contra cidades e infraestrutura ucranianas — o dobro do ritmo de 2024. Os drones são fabricados em Teerã e transportados pelo Mar Cáspio até o porto russo de Makhachkala. Em troca, a Rússia transferiu ao Irã tecnologia nuclear, de mísseis e espacial — uma cooperação que contribuiu para a crise que levou à guerra no Oriente Médio em 2026.</p>

<h4>O Apoio Ocidental — Armas, Sanções e Fadiga</h4>
<p>O Ocidente respondeu à invasão com o maior pacote de sanções econômicas da história moderna e assistência militar massiva à Ucrânia. Os EUA lideram com mais de US$ 175 bilhões em ajuda total (militar, econômica e humanitária) desde 2022. A União Europeia contribuiu com aproximadamente €120 bilhões. Armas entregues incluem tanques Leopard 2 e Challenger 2, sistemas HIMARS, mísseis ATACMS, sistemas de defesa aérea Patriot e NASAMS, e caças F-16 (a partir de 2024). No entanto, a "fadiga da guerra" se instalou progressivamente no Ocidente. A eleição de Donald Trump em novembro de 2024 trouxe incerteza: Trump havia criticado o volume de ajuda à Ucrânia e prometido "acabar com a guerra em 24 horas". Em fevereiro de 2025, Trump suspendeu temporariamente a ajuda militar e o compartilhamento de inteligência com a Ucrânia como pressão para forçar negociações — uma decisão que provocou pânico em Kiev e nas capitais europeias.</p>

<h3>O Mapa da Guerra em Abril de 2026</h3>
<p>Após mais de quatro anos de conflito, a Rússia controla aproximadamente 20% do território ucraniano — 116.165 km² segundo dados do grupo OSINT DeepState em março de 2026. A ocupação por região é devastadora: Luhansk está 99,6% sob controle russo; Donetsk, 78,1%; Zaporizhzhia, 74,8%; Kherson, 72%. A Crimeia permanece integralmente ocupada desde 2014. Ao longo de 2025, a Rússia conquistou 4.336 km² adicionais de território ucraniano — quase o dobro do que havia capturado em 2023 e 2024 combinados, segundo Euromaidan Press. Apesar disso, os avanços são medidos em quilômetros, não em regiões: a frente de batalha se estende por mais de 1.000 km e os ganhos territoriais vêm a um custo humano colossal. Na semana de 24 a 31 de março de 2026, a Rússia ganhou 17 milhas quadradas de território ucraniano, enquanto a Ucrânia manteve uma pequena faixa de 4 milhas quadradas em Kursk, segundo dados do ISW (Institute for the Study of War).</p>

<h4>A Frente de Kursk — O Último Trunfo Ucraniano</h4>
<p>A incursão ucraniana em Kursk (agosto de 2024), que capturou 380 km² de território russo, foi gradualmente reduzida ao longo de 2025. Forças russas, apoiadas pelo 11º Corpo norte-coreano, reconquistaram mais de 40% do território tomado pela Ucrânia, segundo a Associated Press. Moscou chegou a declarar em abril de 2025 que havia retomado toda a região de Kursk, mas Kiev negou, afirmando que "operações defensivas ucranianas continuam em certas áreas do Oblast de Kursk" e que suas forças repeliram cinco assaltos terrestres russos em um único dia. A Ucrânia mantém uma faixa de ~4 milhas quadradas — simbólica, mas estrategicamente importante como moeda de troca em potenciais negociações. A participação de tropas norte-coreanas em combate em solo russo foi confirmada pelo próprio Gerasimov (Chefe do Estado-Maior russo), que elogiou sua "fortaleza e heroísmo" — a primeira confirmação oficial russa do envolvimento norte-coreano.</p>

<h4>As Negociações — Um Labirinto sem Saída</h4>
<p>As tentativas de negociação ao longo de 2025 e 2026 revelam a profundidade do impasse. Após tomar posse em janeiro de 2025, Trump buscou rapidamente um acordo, convocando uma reunião no Salão Oval com Zelensky em fevereiro. O encontro se tornou um dos momentos mais tensos da diplomacia recente: Trump acusou Zelensky de "desrespeito" e de "apostar na Terceira Guerra Mundial" ao resistir a fazer concessões territoriais. Zelensky insistiu que qualquer acordo precisava de garantias de segurança, não apenas promessas. Em março de 2025, Trump apresentou um plano de cessar-fogo de 30 dias que incluía congelamento das linhas de frente atuais, retomada de ajuda militar americana à Ucrânia, e início de negociações para um acordo permanente. A Ucrânia aceitou. A Rússia rejeitou. O porta-voz do Kremlin, Dmitry Peskov, declarou que a Rússia "não tem interesse em cessar-fogos temporários" e exigiu que Kiev buscasse um "acordo abrangente" — código para a aceitação das demandas russas de rendição territorial.</p>

<h4>A "Coalizão dos Dispostos" e as Garantias de Segurança</h4>
<p>Diante da incerteza sobre o comprometimento americano, a Europa tomou uma iniciativa inédita. Em janeiro de 2026, uma cúpula em Paris reuniu 35 países na chamada "Coalizão dos Dispostos" (Coalition of the Willing), que prometeu apoio militar sustentado à Ucrânia. O avanço mais significativo veio da França e do Reino Unido, que se comprometeram a instalar "hubs militares" em território ucraniano como parte de um plano de paz — essencialmente tropas europeias em solo ucraniano como garantia de segurança. O presidente Macron declarou que a presença militar europeia seria um "fator dissuasório" contra futura agressão russa. Zelensky afirmou que o texto de garantias de segurança americanas estava "pronto para ser finalizado com Trump". Mas a Rússia reagiu com fúria: a porta-voz do Ministério das Relações Exteriores, Maria Zakharova, denunciou a proposta como "perigosa e destrutiva", chamando a coalizão de "eixo de guerra". Putin alertou que qualquer presença militar da OTAN na Ucrânia seria considerada uma "ameaça existencial" à Rússia — linguagem associada à doutrina nuclear russa.</p>

<h4>A Proposta de Páscoa — Rejeitada</h4>
<p>Na semana mais recente (final de março/início de abril de 2026), Zelensky propôs um cessar-fogo temporário para a Páscoa Ortodoxa (12 de abril), seja como trégua total ou como moratória em ataques à infraestrutura energética. A resposta russa foi desprezo: Grigory Karasin, presidente do Comitê de Relações Exteriores do Conselho da Federação Russa, afirmou que "as declarações de Zelensky não devem ser levadas a sério". Peskov reiterou que a Rússia não tem interesse em cessar-fogos temporários. Enquanto isso, os bombardeios continuam: na semana de 1 a 7 de abril de 2026, a Rússia lançou centenas de drones e mísseis contra cidades ucranianas, incluindo ataques a infraestrutura energética em Kharkiv, Odessa e Dnipro.</p>

<h4>As Exigências de Cada Lado</h4>
<p>O abismo entre as posições é enorme. A Rússia exige: reconhecimento da anexação de Crimeia, Donetsk, Luhansk, Zaporizhzhia e Kherson (incluindo áreas que não controla militarmente); garantia de que a Ucrânia nunca aderirá à OTAN; "desnazificação" (remoção do governo Zelensky e partidos que Moscou considera hostis); "desmilitarização" (redução drástica das Forças Armadas ucranianas); e neutralidade permanente da Ucrânia. A Ucrânia exige: restauração de suas fronteiras de 1991 (incluindo Crimeia e todo o Donbas); retirada total das forças russas; compensação por danos de guerra; julgamento de crimes de guerra; e garantias de segurança vinculantes (preferencialmente adesão à OTAN ou presença militar aliada permanente). O CSIS (Centro de Estudos Estratégicos e Internacionais) analisou provisão por provisão o "plano inacabado de paz" e concluiu que os obstáculos principais são território e segurança — exatamente as questões onde as posições são mais irreconciliáveis.</p>

<h4>O Impacto na Economia Russa</h4>
<p>Quatro anos de guerra e sanções cobram seu preço na economia russa. O crescimento acelerado de 2023–2024 (impulsionado por gastos militares maciços) acabou: o FMI projeta crescimento de apenas 0,6% em 2025 e 1,0% em 2026, perto da recessão. Os gastos militares saltaram de 3,6% do PIB em 2021 para 7,2% em 2025 — 13,5 trilhões de rublos (US$ 168,8 bilhões), o maior nível desde a Guerra Fria. A receita do governo ficou abaixo do planejado em 2025: 36,6 trilhões de rublos contra 40,3 trilhões previstos. O desconto do petróleo Urals em relação ao Brent atingiu US$ 29 por barril em fevereiro de 2026, corroendo a principal fonte de receita. A inflação russa permanece acima de 7%, o Banco Central mantém juros a 21% (os mais altos desde 2003), e a fuga de cérebros é massiva — mais de 1 milhão de russos emigraram desde 2022, incluindo profissionais de tecnologia, cientistas e empresários. O Bank of Finland projeta que a Rússia está presa a crescimento de ~1% ao ano, com recessão sendo "uma possibilidade muito real".</p>

<h3>Como Esta Guerra Pode Terminar?</h3>
<p>Após mais de quatro anos, a pergunta que define a geopolítica mundial é: como e quando a guerra Rússia–Ucrânia terminará? Analistas do Carnegie Endowment for International Peace questionaram em fevereiro de 2026 se "uma solução que encerre o conflito é sequer possível" — e a resposta não é animadora. A guerra se tornou um conflito existencial para ambos os lados: para a Ucrânia, a derrota significa perda de soberania, identidade e provavelmente o fim do país como estado independente; para Putin, aceitar menos do que uma vitória significativa pode significar o fim de seu regime, dado o investimento colossal de vidas e recursos. Nenhum dos lados pode se permitir perder — e nenhum dos lados pode vencer decisivamente com os recursos atuais. Esse é o impasse fundamental.</p>

<h4>Cenário 1 — Acordo Negociado com Concessões Mútuas (15–20%)</h4>
<p>Neste cenário, a pressão combinada — fadiga militar, custos econômicos, pressão americana sobre Kiev e europeia sobre Moscou — força ambos os lados a um acordo. As linhas gerais possíveis: a Ucrânia aceita a perda de facto (não de jure) da Crimeia e partes do Donbas por um período transitório de 10–20 anos, submetido a eventual referendo supervisionado internacionalmente; a Rússia aceita retirar forças das áreas de Zaporizhzhia e Kherson que não controla efetivamente; uma zona desmilitarizada é estabelecida ao longo da linha de frente; a Ucrânia recebe garantias de segurança robustas (presença militar europeia, acordo bilateral com EUA, ou pathway para OTAN após período de transição); e sanções são parcialmente aliviadas conforme a Rússia cumpre os termos. Este cenário requer liderança corajosa de ambos os lados e enorme pressão externa. Probabilidade estimada: 15–20%.</p>

<h4>Cenário 2 — Conflito Congelado tipo "Coreia" (Mais Provável, 45–50%)</h4>
<p>O cenário considerado mais provável pelo CSIS, Carnegie e RAND Corporation é um "conflito congelado" — uma cessação de hostilidades de facto sem acordo de paz formal, semelhante à Península Coreana desde 1953. Neste cenário, a intensidade dos combates diminui gradualmente por exaustão mútua, uma linha de controle efetiva se estabiliza aproximadamente nas posições atuais, mas nenhum tratado de paz é assinado. A Rússia mantém o território ocupado (~20% da Ucrânia), mas não o controle formal reconhecido internacionalmente. A Ucrânia nunca reconhece a perda, mantendo reivindicação legal sobre todo seu território. Sanções contra a Rússia permanecem parcialmente, a Ucrânia recebe garantias de segurança ocidentais e inicia processo de reconstrução e integração europeia (possivelmente adesão à UE). Este é essencialmente o status quo estendido — sem vitória, sem derrota, sem resolução. O risco: como a Coreia, o conflito pode reacender a qualquer momento, e a tensão permanece por décadas.</p>

<h4>Cenário 3 — Escalada e Envolvimento Direto da OTAN (10–15%)</h4>
<p>O cenário mais perigoso: uma escalada que arrasta a OTAN diretamente para o conflito. Possíveis gatilhos incluem: um ataque russo (intencional ou acidental) a território de um membro da OTAN (Polônia, Romênia, países bálticos); uso de armas nucleares táticas pela Rússia; ou envio de tropas europeias à Ucrânia que entram em combate direto com forças russas. A proposta franco-britânica de "hubs militares" em solo ucraniano eleva esse risco significativamente. A Rússia já declarou que presença militar da OTAN na Ucrânia seria uma "ameaça existencial" — linguagem que na doutrina russa pode justificar uso de armas nucleares. Este cenário poderia escalar para a Terceira Guerra Mundial e é o que todas as partes afirmam querer evitar — mas a lógica de escalação da guerra já provou ser imprevisível. Probabilidade: 10–15%, mas com consequências potencialmente catastróficas.</p>

<h4>Cenário 4 — Vitória Militar de um dos Lados (10–15%)</h4>

<h4>O Impacto Global — Uma Guerra que Mudou o Mundo</h4>
<p>A guerra Rússia–Ucrânia já transformou a ordem mundial de formas que serão sentidas por décadas. A OTAN se expandiu, incorporando Finlândia (2023) e Suécia (2024) — exatamente o oposto do que Putin buscava. Os gastos militares europeus aumentaram dramaticamente: a Alemanha anunciou um fundo de €100 bilhões para defesa em 2022 e elevou gastos para 2,5% do PIB; a Polônia gasta 4% do PIB em defesa, o maior da OTAN proporcionalmente. A dependência europeia de energia russa foi eliminada em velocidade recorde: o gás russo representava 40% do consumo europeu em 2021, caiu para menos de 15% em 2025. A "desglobalização" acelerou, com cadeias de suprimento sendo reorganizadas por critérios geopolíticos ("friendshoring"). A aliança Rússia–China–Irã–Coreia do Norte se solidificou como um bloco antiocidental. E o precedente de uma grande potência nuclear invadindo um vizinho sem consequências militares diretas levanta questões sobre Taiwan, o Ártico e outras zonas de tensão. No Sul Global, a guerra dividiu opiniões: enquanto Europa e América do Norte condenam a Rússia unanimemente, muitos países africanos, asiáticos e latino-americanos adotam posição neutra, vendo o conflito como uma guerra entre potências que não os representa.</p>

<h4>O Impacto no Brasil</h4>
<p>O Brasil mantém posição oficial de neutralidade, defendendo diálogo e solução diplomática na ONU, e absteve-se em várias votações da Assembleia Geral condenando a Rússia. O presidente Lula propôs um "clube da paz" para mediar negociações, incluindo Brasil, China, Índia e outros países não-alinhados — proposta que foi recebida com ceticismo tanto por Kiev quanto pelo Ocidente. Economicamente, o Brasil foi impactado pelo aumento de custos de fertilizantes (a Rússia e Bielorrússia são os maiores exportadores mundiais), com o preço dos fertilizantes subindo 80% em 2022, afetando diretamente o agronegócio brasileiro. Por outro lado, o Brasil se beneficiou da alta dos preços de commodities agrícolas e energéticas. A guerra também reconfigurou o comércio de combustíveis: o Brasil aumentou importações de diesel russo a preços descontados, tornando-se um dos maiores compradores, o que gerou críticas internacionais.</p>

<h4>O Que Observar nas Próximas Semanas</h4>
<p>Para acompanhar a evolução do conflito, monitore: primeiro, a Páscoa Ortodoxa (12 de abril) — se houver qualquer pausa, mesmo informal, nos combates, pode ser um sinal de abertura; se os bombardeios intensificarem, é sinal de que a Rússia busca pressão máxima antes de qualquer negociação. Segundo, o impacto da guerra no Oriente Médio — a destruição da capacidade militar iraniana pelos EUA e Israel em fevereiro/março de 2026 afeta diretamente o fornecimento de drones Shahed à Rússia; se o fluxo diminuir, a Ucrânia ganha vantagem no campo de batalha. Terceiro, as negociações de Islamabad sobre o Irã (10 de abril) — qualquer acordo EUA–Irã pode liberar atenção e recursos diplomáticos americanos para a questão ucraniana. Quarto, a posição de Trump — se o presidente americano decidir forçar um acordo impondo concessões à Ucrânia (ameaçando cortar ajuda), o cenário de negociação pode mudar rapidamente. Quinto, as eleições americanas de novembro de 2026 — o resultado pode determinar o futuro da ajuda à Ucrânia e, por extensão, o desfecho da guerra. Sexto, a economia russa — se entrar em recessão, a pressão doméstica sobre Putin aumentará; se estabilizar, pode sustentar a guerra por mais anos.</p>
