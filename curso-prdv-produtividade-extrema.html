    { id: 'pd20', name: 'Gestão de E-mail e Comunicação Digital', dur: '20 min', content: `<h3>Gestão de E-mail e Comunicação Digital</h3><p>O profissional médio verifica e-mail 74 vezes por dia e gasta 2,6 horas diárias gerenciando comunicação digital. Isso é insustentável. Estratégias comprovadas: verifique e-mail apenas 2-3 vezes por dia em horários fixos. Use a regra dos 2 minutos (responda, delegue ou arquivo). Crie templates para respostas recorrentes. Desative notificações. Uma pesquisa da UC Irvine mostrou que trabalhadores sem acesso a e-mail por 5 dias reduziram stress em 50% e aumentaram produtividade em 20%.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },

      {q: 'O que significa GTD?', a: 'Getting Things Done. É um sistema de organização criado por David Allen que reduz estresse capturando todas as tarefas em um sistema confiável.'},
      {q: 'Qual é o primeiro passo do método GTD?', a: 'Captura: anotar TUDO o que passa pela sua cabeça em uma caixa de entrada única, reduzindo a carga mental.'},
      {q: 'O que é a Técnica Pomodoro?', a: 'Um método que divide o trabalho em intervalos de 25 minutos (pomodoros) separados por pausas curtas, otimizando foco e energia.'},
      {q: 'Por que 25 minutos é o tempo ideal no Pomodoro?', a: 'Porque é suficiente para criar impulso e fluxo, mas curto o bastante para manter concentração máxima sem fadiga.'},
      {q: 'O que fazer durante a pausa no Pomodoro?', a: 'Descansar realmente: sair do computador, caminhar, beber água, alongar. Não se deve trabalhar em outra coisa.'},
      {q: 'Qual é a diferença entre captura e processamento no GTD?', a: 'Captura: anotar tarefas. Processamento: decidir se é acionável, qual é o próximo passo e qual é a data relevante.'},
      {q: 'O que é revisão semanal no GTD?', a: 'É uma reunião de 1-2 horas semanais consigo mesmo para revisar todas as tarefas, caixas de entrada e ajustar planos.'},
      {q: 'Como o Pomodoro trata a procrastinação?', a: 'Reduzindo a resistência inicial. Iniciar 25 minutos é psicologicamente mais fácil que "trabalhar indefinidamente".'},
      {q: 'O que são contextos no GTD?', a: 'Rótulos que agrupam tarefas pelo local/ferramenta necessária (@casa, @computador, @telefone), facilitando execução eficiente.'},
      {q: 'Como o Pomodoro melhora a autoconsciência sobre tempo?', a: 'Você tem contato direto com o passar do tempo (visual do timer), criando sensação mais precisa de quanto trabalho é realmente possível em um dia.'},

    { id: 'pd31', name: 'Tomada de Decisão Rápida', dur: '20 min', content: `<h3>Tomada de Decisão Rápida</h3><p>Decisões lentas são um dos maiores assassinos de produtividade. Jeff Bezos distingue entre decisões tipo 1 (irreversíveis, exigem análise profunda) e tipo 2 (reversíveis, devem ser tomadas rapidamente). A maioria das decisões é tipo 2, mas tratamos todas como tipo 1. Para decisões tipo 2, use a regra dos 70%: se tem 70% da informação necessária, decida agora. Esperar por 100% custa mais em atraso do que uma eventual correção de curso.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },

    { id: 'pd33', name: 'Revisão Semanal e Melhoria Contínua', dur: '20 min', content: `<h3>Revisão Semanal e Melhoria Contínua</h3><p>David Allen considera a revisão semanal o hábito mais importante de produtividade pessoal. Uma vez por semana (sexta-feira à tarde ou domingo à noite), revise: o que completou, o que está pendente, o que deve ser reprioritizado, e o que aprendeu. Esse hábito garante que nada escapa, que prioridades estão alinhadas, e que você está melhorando continuamente. Sem revisão regular, qualquer sistema de produtividade degrada em semanas.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` }

    { id: 'pd40', name: 'Produtividade para Criativos e Trabalho Intelectual', dur: '20 min', content: `<h3>Produtividade para Criativos e Trabalho Intelectual</h3><p>Trabalho criativo tem dinâmica diferente de trabalho operacional. Você não pode forçar criatividade — mas pode criar condições para ela emergir. As melhores ideias surgem quando o cérebro alterna entre foco intenso e relaxamento difuso (default mode network). Newton teve seu insight sobre gravidade sob uma macieira, não em seu escritório. Shower thoughts são reais — o cérebro criativo precisa de espaço para conexões inconscientes.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
    { id: 'pd41', name: 'Digital Minimalism e Distrações Tecnológicas', dur: '20 min', content: `<h3>Digital Minimalism e Distrações Tecnológicas</h3><p>Cal Newport define digital minimalism como usar tecnologia de forma intencional, mantendo apenas ferramentas que servem a valores importantes. A maioria das pessoas é maximizadora tecnológica — adota toda nova ferramenta por default. O resultado: notificações constantes, atenção fragmentada e sensação de estar sempre ocupado sem produzir nada significativo. Um detox digital de 30 dias revela quais ferramentas realmente agregam valor.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
    { id: 'pd42', name: 'Energia e Sono para Produtividade', dur: '20 min', content: `<h3>Energia e Sono para Produtividade</h3><p>Sono é o fundamento de toda produtividade. Matthew Walker, neurocientista e autor de Why We Sleep, demonstrou que uma noite de 6 horas de sono reduz performance cognitiva em 15-30%. Após 10 dias de 6 horas de sono, sua performance equivale a de alguém acordado por 24 horas seguidas — mas você não percebe porque a privação é gradual. Para produtividade máxima: 7-9 horas de sono, consistência de horário e escuridão total.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
    { id: 'pd43', name: 'Exercício Físico como Ferramenta de Produtividade', dur: '20 min', content: `<h3>Exercício Físico como Ferramenta de Produtividade</h3><p>Exercício não compete com trabalho — multiplica trabalho. Pesquisas consistentemente mostram que exercício regular aumenta produtividade em 21%, melhora memória em 20%, reduz stress em 40% e aumenta criatividade em 60%. O mecanismo: exercício aumenta BDNF (fator neurotrófico que melhora aprendizado), dopamina (motivação), e norepinefrina (foco). 30 minutos de exercício moderado geram 2-3 horas de performance cognitiva superior.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` }

    { id: 'pd51', name: 'Sistemas de Produtividade: GTD, Zettelkasten e PARA', dur: '20 min', content: `<h3>Sistemas de Produtividade: GTD, Zettelkasten e PARA</h3><p>Existem dezenas de sistemas de produtividade, mas os três mais comprovados são: GTD (Getting Things Done) de David Allen para gestão de tarefas e projetos, Zettelkasten (caixa de notas) para gestão de conhecimento, e PARA (Projects, Areas, Resources, Archive) de Tiago Forte para organização digital. Você não precisa adotar todos — escolha um para tarefas e um para conhecimento. A consistência com um sistema imperfeito supera a busca pelo sistema perfeito.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
    { id: 'pd52', name: 'Métricas de Produtividade e Tracking', dur: '20 min', content: `<h3>Métricas de Produtividade e Tracking</h3><p>O que não é medido não é gerenciado. Métricas simples de produtividade incluem: horas de deep work por dia, número de tarefas MIT completadas por semana, e projetos avançados por mês. Ferramentas como Toggl (time tracking) e RescueTime (rastreamento automático de atividade digital) revelam padrões que surpreendem — a maioria das pessoas superestima quanto tempo gasta em trabalho produtivo e subestima tempo em distrações.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
    { id: 'pd53', name: 'Produtividade Sustentável vs Burnout', dur: '20 min', content: `<h3>Produtividade Sustentável vs Burnout</h3><p>Produtividade extrema sem sustentabilidade leva ao burnout. A OMS classifica burnout como fenômeno ocupacional desde 2019. Os sinais: exaustão crônica, cinismo e sensação de ineficácia. A produtividade sustentável requer: limites claros (hora de parar), desconexão regular (férias reais, finais de semana off), e investimento em recuperação (sono, exercício, hobbies). Paradoxalmente, descansar mais frequentemente aumenta produção total porque mantém qualidade e criatividade.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` }

    { id: 'pd60', name: 'Planejamento Anual e Objetivos de Longo Prazo', dur: '20 min', content: `<h3>Planejamento Anual e Objetivos de Longo Prazo</h3><p>Produtividade diária sem direção estratégica é eficiência sem eficácia — fazer bem as coisas erradas. Um plano anual com 3-5 objetivos transformadores fornece direção. Cada objetivo deve ter: resultado mensurável, prazo definido e ações trimestrais. A regra: se não está no seu plano anual, provavelmente não deveria estar no seu dia. Diga não a tudo que não se alinha com seus 3-5 objetivos principais.</p><blockquote class="tip">💡 Aplique esta técnica imediatamente — produtividade é sobre execução, não sobre planejamento perfeito. Comece com 80% e ajuste no caminho.</blockquote><p>A produtividade real se mede por resultados significativos, não por horas trabalhadas ou tarefas completadas. Foque na qualidade e impacto do que produz, não na quantidade. Um profissional que produz uma entrega excepcional por dia supera quem completa 20 tarefas triviais.</p><blockquote class="example">📌 Exemplo: Profissionais que implementam deep work de 3-4 horas diárias consistentemente reportam dobrar sua produção de trabalho significativo em 30 dias, mesmo trabalhando menos horas totais. A chave não é mais tempo, é mais foco.</blockquote><p>Lembre-se que produtividade sem propósito é apenas velocidade sem direção. Antes de otimizar como você trabalha, certifique-se de que está trabalhando nas coisas certas. A pergunta mais produtiva que você pode fazer toda manhã é: qual é a ÚNICA coisa que, se feita hoje, torna todo o resto mais fácil ou desnecessário?</p><blockquote class="news">📰 McKinsey Global Institute (2025) estima que trabalhadores do conhecimento são produtivos apenas 39% do tempo — o restante é consumido por e-mails, reuniões e multitasking. Empresas que implementam práticas de deep work reportam aumento de 20-40% em output por funcionário.</blockquote>` },
