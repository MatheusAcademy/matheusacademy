      {
        id: 'mfst',
        name: 'O que é Mercado Financeiro e Suas Funções',
        content: `<h4>O Coração da Economia</h4><p>O mercado financeiro é <strong>um sistema onde pessoas, empresas e governo negociam valores (moeda, títulos, ações) para transferir dinheiro no tempo</strong>. Você empresta dinheiro hoje esperando receber mais amanhã. Empresa investe hoje esperando ganho futuro. Governo toma empréstimo hoje para pagar depois.</p><p>As <strong>principais funções do mercado financeiro</strong> são: (1) <strong>Intermediação de recursos</strong> - conecta quem tem dinheiro (poupadores) com quem precisa (tomadores). (2) <strong>Precificação de ativos</strong> - determina preço justo de ações, títulos, moedas. (3) <strong>Liquidez</strong> - permite converter ativo em dinheiro rápido. (4) <strong>Descoberta de preço</strong> - preço é descoberto por oferta/demanda, não arbitrariamente. (5) <strong>Alocação eficiente de recursos</strong> - dinheiro vai para melhores oportunidades.</p><blockquote class="tip">O mercado financeiro é motor da economia. Sem ele, empresa não consegue capital para expandir, pessoa não consegue crédito para comprar casa, governo não consegue financiar serviços públicos. Um mercado financeiro disfuncional = economia disfuncional.</blockquote><p>O mercado financeiro é dividido em <strong>4 segmentos principais</strong>: (1) <strong>Mercado monetário</strong> - operações de curto prazo (dias/meses) com liquidez alta. (2) <strong>Mercado de crédito</strong> - empréstimos, financiamentos. (3) <strong>Mercado de capitais</strong> - ações, debêntures, bonds com prazo maior. (4) <strong>Mercado de câmbio</strong> - compra/venda de moedas estrangeiras.</p><blockquote class="example">Você precisa de R$ 200 mil para comprar carro. Você não tem. Vai ao banco (mercado de crédito), pega financiamento (R$ 200 mil emprestados) a 5 anos. Empresa precisa de R$ 100 milhões para expandir. Vai ao mercado de capitais (B3), emite ações ou debêntures (empresta dos investidores). Governo precisa pagar aposentadorias (R$ 500 bilhões). Vai ao mercado de capitais, vende títulos do Tesouro.</blockquote><p>Um conceito importante é <strong>"taxa de juros"</strong> - o preço do dinheiro. Se está pedindo emprestado R$ 1 milhão a 10% ao ano, está pagando R$ 100 mil de "aluguel" do dinheiro. Taxa reflete: risco de não pagar, inflação, oportunidade custo.</p><blockquote class="news">Mercado financeiro é sofisticado e rápido. Bilhões de dólares são negociados cada segundo em todo mundo. Computadores fazem negociações em milissegundos. Humanos mal conseguem acompanhar. Isso cria desafio: mercado pode ser ineficiente por períodos longos (bolha especulativa).</blockquote>`},
      {
        id: 'inst1',
        name: 'Instituições Financeiras: Bancos, Corretoras, Seguradoras',
        content: `<h4>Os Atores Principais do Mercado</h4><p>O mercado financeiro é composto por várias <strong>instituições que intermediam operações</strong>. Cada uma tem papel específico na engrenagem.</p><p>Os <strong>bancos são intermediários principais</strong>. Eles pegam depósitos de pessoas (seu dinheiro na conta corrente), empresas (seu caixa) e governo. Depois emprestam para outras pessoas comprar casa, para empresas expandir, para governo fazer obras. Ganham a diferença entre o que pagam em depósito (2-4% de juros) e cobram em empréstimo (8-12% de juros).</p><blockquote class="tip">Você deposita R$ 100 mil em poupança ganhando 4%/ano = ganha R$ 4 mil. Banco pega seu R$ 100 mil e empresta para alguém comprar carro a 10%/ano = banco ganha R$ 10 mil. Banco fica com diferença de R$ 6 mil. Isso é o negócio dos bancos.</blockquote><p>As <strong>corretoras de valores fazem intermediação de investimentos</strong>. Você quer comprar ações da Petrobras, mas Petrobras não vende direto para você. Corretora é intermediária: você manda ordem de compra para corretora, corretora conecta você com vendedor (outro investidor), operação acontece. Corretora cobra comissão.</p><blockquote class="example">Você decide comprar 100 ações da Petrobrás a R$ 30 cada = R$ 3.000. Você liga para corretora. Corretora, através do sistema da B3, encontra vendedor disposto vender 100 ações a R$ 30. Operação é feita. Você ganha as ações, vendedor ganha R$ 3.000. Corretora ganha comissão de ~R$ 15 (0.5%).</blockquote><p>As <strong>seguradoras gerenciam risco</strong>. Você contrata seguro de carro (paga R$ 100/mês). Se tiver acidente, seguradora paga conserto. Seguradora ganha a diferença entre o que você paga (R$ 1.200/ano) e o que gasta em sinistros. É jogo de probabilidade - algumas pessoas vão ter acidente, maioria não.</p><blockquote class="news">Bancos brasileiros são muito lucrativos porque: (1) Spreads grandes (diferença entre depósito e empréstimo é alta). (2) Mercado oligopolizado (5 bancos controlam 70% do mercado). (3) Econômia instável faz taxa de juros alta. Um banco grande como Itaú ganha R$ 50 bilhões/ano de lucro.</blockquote>`},

        name: 'B3: A Bolsa de Valores Brasileira',
        content: `<h4>Onde Ações são Negociadas</h4><p>A B3 é a <strong>principal bolsa de valores do Brasil, localizada em São Paulo</strong>. É um mercado onde ações de empresas públicas, títulos de renda fixa e derivativos são negociados.</p><p>Na B3, todos os dias, <strong>bilhões de reais são negociados</strong>. Maior volume é em ações de grandes empresas (Petrobras, Vale, Itaú, Bradesco). Mas também há negociação de: títulos do governo (Tesouro Direto), debêntures de empresas, opções, futuros.</p><blockquote class="tip">Para qualquer brasileiro, B3 é acessível. Você abre conta em uma corretora, manda dinheiro, compra ações direto. Operação é em segundos. Não precisa ser "rico" - pode começar com R$ 1.000.</blockquote><p>O índice da B3 é o <strong>IBOVESPA (Índice Brasil Bolsa de Valores)</strong>. É uma cesta com 70-100 ações das maiores empresas. Quando noticiário diz "Ibovespa subiu 2%", significa ações "em média" subiram 2%. É barômetro da saúde econômica do país.</p><blockquote class="example">IBOVESPA tem ações de: Petrobras (energia), Vale (mineração), Itaú (financeiro), Bradesco (financeiro), Natura (consumidor), Embraer (indústria), Lojas Americanas (varejo). Se economia vai bem, maioria dessas ações sobem. Se economia vai mal, caem.</blockquote><p><strong>Volume de negociação da B3 varia com mercado</strong>. Em alta (investidores otimistas), volume é alto, preços movem muito. Em crise (investidores pessimistas), volume é baixo, preços stagnados. Volatilidade é maior em crises.</p><blockquote class="news">A B3 é uma das bolsas maiores do mundo por market cap (valor das empresas listadas). Brasil é 12º maior no ranking global. Isso reflete importância econômica do país.</blockquote>`},

        content: `<h4>Quem Fiscaliza o Mercado</h4><p>O mercado financeiro é altamente regulado para <strong>proteger investidores de fraude e garantir estabilidade</strong>. O Brasil tem duas principais reguladoras.</p><p>A <strong>CVM (Comissão de Valores Mobiliários)</strong> regulamenta: compra/venda de ações, debêntures, fundos de investimento, corretoras. É responsável por punir fraude (insider trading, manipulação de preço), exigir disclosure (empresas divulgarem informações), autorizar novos produtos financeiros.</p><blockquote class="tip">Se uma empresa quer abrir capital (vender ações ao público), precisa fazer IPO (Initial Public Offering) que é regulado pela CVM. Empresa precisa divulgar balanço, estratégia, riscos. Depois, precisa continuar divulgando resultados trimestrais para investidores saberem como está o negócio.</blockquote><p>O <strong>Banco Central regulamenta</strong>: bancos, instituições de crédito, sistema de pagamento, câmbio, moeda. Se banco está com solvência ruim, BC pode intervir. Se há risco sistêmico (falência de banco grande ameaça todo sistema), BC pode injetar dinheiro.</p><blockquote class="example">Em 2008, quando crise financeira global atingiu Brasil, Banco Central injetou bilhões de reais em sistema para evitar falência de bancos. Isso evitou que pessoas perdessem suas poupanças (depósitos em banco até R$ 250 mil são garantidos pelo FGC - Fundo Garantidor de Crédito).</blockquote><p>O <strong>FGC é um fundo de proteção</strong>. Se seu banco quebra, FGC cobre até R$ 250 mil dos seus depósitos. Isso é importante: banco pode falir, você não perde tudo. É transferência de risco para fundo.</p><blockquote class="news">Regulação é custosa (bancos gastam bilhões em compliance), mas benefício é evitar crises sistemáticas. Brasil aprendeu com crises de 1990-2000 quando regulação era fraca. Agora é mais rigorosa.</blockquote>`}

  {

      {
        id: 'tf01',
        name: 'O que é Renda Fixa e Como Funciona',
        content: `<h4>Investimento Previsível</h4><p>Renda fixa é <strong>investimento onde você empresta dinheiro e recebe juros em datas preestabelecidas</strong>. Diferente de ações (preço varia, dividendo incerto), renda fixa é previsível.</p><p>Na renda fixa, você sabe: (1) <strong>Quanto vai receber de juros</strong> - a taxa é fixada no início. (2) <strong>Quando vai receber</strong> - datas estão no contrato. (3) <strong>Quando recupera o capital</strong> - data de vencimento está definida. Tudo é conhecido no momento da compra.</p><blockquote class="tip">Renda fixa é para quem quer dormir tranquilo. Você sabe exatamente quanto vai ganhar no vencimento. Não há surpresas agradáveis (ganho 50%) nem surpresas ruins (perde 50%).</blockquote><p>Os <strong>principais tipos de renda fixa</strong> são: (1) <strong>CDB (Certificado de Depósito Bancário)</strong> - você empresta para banco, ganha juros. (2) <strong>Tesouro Direto</strong> - você empresta para governo, ganha juros. (3) <strong>Debênture</strong> - você empresta para empresa, ganha juros. (4) <strong>LCI/LCA</strong> - investimento em financiamento agrícola/imobiliário.</p><blockquote class="example">Você tem R$ 100 mil. Opcões de renda fixa: (1) CDB a 10% ao ano = ganha R$ 10 mil/ano. (2) Tesouro a 8% ao ano = ganha R$ 8 mil/ano. (3) Debênture de empresa confiável a 12% ao ano = ganha R$ 12 mil/ano. Diferença é taxa + risco (governo é mais seguro que empresa).</blockquote><p>Um conceito importante é <strong>"risco de crédito"</strong> - risco de quem pegar emprestado não pagar. Governo é risco menor (pode imprimir dinheiro). Banco grande é risco baixo. Empresa pequena é risco maior. Taxa de juros é proporcional ao risco.</p><blockquote class="news">Pesquisa mostra que investidor brasileiro prefere renda fixa (66% da carteira) a ações (26%), diferente de países desenvolvidos onde preferem ações. Razão: brasil foi hiperinflacionário, povo desconfia de investimentos voláteis.</blockquote>`},

        id: 'td01',
        name: 'Tesouro Direto: Emprestando para o Governo',
        content: `<h4>O Investimento Mais Seguro</h4><p>Tesouro Direto é <strong>quando você empresta dinheiro para o governo brasileiro</strong>. É o investimento mais seguro (risco praticamente zero), porque governo pode pagar através de impostos.</p><p>O governo emite diferentes tipos de títulos: <strong>(1) Tesouro Selic - taxa acompanha Selic, ideal se acha que Selic vai subir. (2) Tesouro Prefixado - taxa fixa conhecida na compra, ideal se acha que taxa vai cair. (3) Tesouro IPCA - taxa fixa + inflação, ideal proteção contra inflação.</strong></p><blockquote class="tip">Tesouro Direto é ideal para iniciante em investimento porque: (1) Segurança máxima (governo quase nunca quebra). (2) Acesso fácil (compra via banco/corretora). (3) Transparência total (você sabe exatamente quanto vai ganhar). (4) Baixa volatilidade.</blockquote><p>O <strong>cálculo de retorno é simples</strong>. Você compra Tesouro Prefixado 10 anos a 10% ao ano. Investe R$ 100 mil. Após 10 anos, recebe R$ 259.937 (R$ 100 mil × 1.10^10). Ganho é R$ 159.937. Desconta imposto de renda (progressivo 15-22%) e você fica com ~R$ 130 mil de ganho líquido.</p><blockquote class="example">Você está em dúvida: investir em Tesouro ou em CDB. Tesouro prefixado está em 10% ao ano. CDB está em 10% ao ano. Parece igual. Mas Tesouro é mais seguro (governo como tomador) e é isento de IR se deixar até vencimento (CDB tem IR 22.5%). Tesouro é melhor.</blockquote><p>Um conceito importante é <strong>"duration"</strong> - sensibilidade do título a mudanças de taxa de juros. Tesouro de 30 anos é muito mais sensível que de 5 anos. Se você vender antes do vencimento, pode ter ganho/perda dependendo de como taxa evoluiu.</p><blockquote class="news">Tesouro Direto se tornou muito popular no Brasil após 2020 quando taxa começou a ficar atrativa. Agora bilhões em Tesouro são investidos por pessoas físicas. Isso reflete: preferência por segurança, desconfiança em ações, busca de renda.</blockquote>`},
      {
        id: 'cdb1',
        name: 'CDB e Outros Depósitos Bancários',
        content: `<h4>Emprestando para Bancos</h4><p>CDB é <strong>quando você empresta dinheiro para um banco</strong>. Você deposita, banco toma emprestado, usa para emprestar para clientes (financiamento de carro, hipoteca). Você recebe juros.</p><p>A <strong>vantagem de CDB sobre poupança</strong> é taxa maior. Poupança rende ~70% da Selic = 5-7% ao ano (hoje). CDB rende 95%+ de Selic = 10%+ ao ano (hoje). A diferença é pequena mas em longo prazo é significativa.</p><blockquote class="tip">Se tem R$ 100 mil e deixar 30 anos: Poupança a 6% = vira R$ 574 mil. CDB a 10% = vira R$ 1.744 mil. Diferença de R$ 1 milhão! Por isso CDB é popular entre investidores.</blockquote><p>Os <strong>outros tipos similares são</strong>: (1) <strong>LCI (Letra de Crédito Imobiliário)</strong> - financiamento imobiliário, isento de IR. (2) <strong>LCA (Letra de Crédito do Agronegócio)</strong> - financiamento agrícola, isento de IR. (3) <strong>RDB (Recibo de Depósito Bancário)</strong> - similar a CDB.</p><blockquote class="example">Você tem R$ 100 mil. Opções: (1) Poupança 6% = ganha R$ 6 mil/ano, paga 0 IR = R$ 6 mil líquido. (2) CDB 10% = ganha R$ 10 mil/ano, paga 22.5% IR = R$ 7.750 líquido. (3) LCI 10% = ganha R$ 10 mil/ano, isento de IR = R$ 10 mil líquido. LCI é melhor.</blockquote><p>Um risco importante é <strong>"risco de crédito do banco"</strong>. Se banco quebra, FGC cobre até R$ 250 mil. Acima disso, você perde. Raramente banco quebra (não acontecia há 20+ anos no Brasil), mas é possível.</p><blockquote class="news">Com Selic em 10%+ e LCI isenta de IR, muitas pessoas estão migrando de poupança/Tesouro para LCI. Isso é bom para governo (reduz demanda por Tesouro, barateia dívida) e para bancos (conseguem capital mais barato via LCI).</blockquote>`},
      {
        id: 'dbn1',
        name: 'Debêntures: Emprestando para Empresas',
        content: `<h4>Renda Fixa de Maior Risco e Retorno</h4><p>Debênture é <strong>quando você empresta dinheiro para uma empresa (não para banco/governo)</strong>. Empresa promete pagar juros + capital em data específica. Risco é maior porque empresa pode falir.</p><p>A <strong>taxa de debênture é maior que Tesouro/CDB</strong> porque risco é maior. Tesouro pode estar em 10%, CDB em 10%, debênture em 12-15%. O "spread" extra (2-5%) é prêmio pelo risco maior.</p><blockquote class="tip">Debênture é investimento intermediário entre renda fixa conservadora e ações. Se você quer ganho maior que CDB mas sem volatilidade de ação, debênture é opção. Mas requer avaliação de risco da empresa.</blockquote><p>Antes de comprar debênture, você deve: <strong>(1) Pesquisar a empresa - é sólida? Tem histórico de pagar dívidas? (2) Ler rating de crédito - agências como Moody's dão nota A+, A, BBB, etc. Quanto melhor nota, menor risco. (3) Calcular spread - está compensando o risco?</strong></p><blockquote class="example">Empresa XYZ quer levantar R$ 100 milhões para expandir. Emite debêntures por R$ 100 milhões, prometendo pagar 12% ao ano por 5 anos, depois devolver capital. Você compra R$ 100 mil delas. Recebe R$ 12 mil/ano por 5 anos, depois recupera R$ 100 mil. Total ganha R$ 60 mil. Risco é se empresa falir nos próximos 5 anos.</blockquote><p>Um risco importante é <strong>"callability"</strong> - se empresa quer, pode resgate (chamar) a debênture antes do vencimento. Isso prejudica você se taxa caiu (porque você terá que reinvestir em taxa menor).</p><blockquote class="news">Debêntures de empresas financeiras (bancos, corretoras) são comuns e têm risco baixo. Debêntures de startups/empresas pequeninhas são arriscadas. Um portfólio bem feito mistura debêntures de diferentes empresas para diluir risco.</blockquote>`}

  {

    topics: [
      {
        id: 'drv1',
        name: 'O que são Derivativos: Opções, Futuros, Swaps',
        content: `<h4>Instrumentos Complexos para Profissionais</h4><p>Derivativo é <strong>um contrato cujo valor depende do preço de outro ativo (ativo subjacente)</strong>. Exemplo: opção de compra de ação Petrobras tem valor que depende do preço de PETR4. Se PETR4 sobe, opção sobe. Se PETR4 cai, opção cai.</p><p>Os <strong>principais derivativos são</strong>: (1) <strong>Opção</strong> - direito (não obrigação) de comprar/vender a preço fixo. (2) <strong>Futuro</strong> - obrigação de comprar/vender a preço fixo em data futura. (3) <strong>Swap</strong> - troca de fluxos de caixa entre partes.</p><blockquote class="tip">Derivativos têm dois usos: (1) Hedge (proteção) - empresa que vai receber dólares em 3 meses faz futuro de dólar para proteger contra queda do câmbio. (2) Especulação - você aposta que PETR4 vai subir, compra opção de compra (leverage maior que ação).</blockquote><p><strong>Opção de compra (call)</strong>: você tem direito de comprar ação a preço fixo (strike). Se preço da ação sobe acima do strike, opção vale dinheiro. Se não, você simplesmente não exercita.</p><blockquote class="example">PETR4 está em R$ 30. Você compra opção de compra com strike R$ 32 por R$ 0.50 (prêmio). Se PETR4 sobe para R$ 35, opção vira R$ 3. Você ganha R$ 2.50 com investimento de R$ 0.50 = 500% de retorno. Mas se PETR4 cai para R$ 25, opção vira zero, você perde R$ 0.50.</blockquote><p><strong>Futuro é obrigação</strong>, não direito. Você compra futuro de ouro para daqui 3 meses a R$ 200 por grama. Em 3 meses, independente do preço estar R$ 100 ou R$ 300, você tem obrigação de comprar a R$ 200. Isso é mais arriscado que opção.</p><blockquote class="news">Derivativos foram vilões na crise de 2008. Bancos fizeram derivativos tão complexos que ninguém entendia o risco real. Quando crise veio, derivativos entrou em colapso e arrastou tudo. Regulação agora é muito maior.</blockquote>`},
      {

        name: 'Volatilidade Implícita e Precificação de Derivativos',
        content: `<h4>O Mercado Precifica o Risco</h4><p>O preço de um derivativo (especialmente opção) depende de <strong>volatilidade implícita - quanto mercado acha que o preço do ativo vai variar no futuro</strong>.</p><p>Se você acredita que PETR4 vai variar muito (volatilidade alta), opção vale mais. Se acredita que vai variar pouco (volatilidade baixa), opção vale menos. Isso é refletido na <strong>"volatilidade implícita" (VI)</strong> - estimativa de volatilidade que mercado está precificando.</p><blockquote class="tip">Traders de opções apostam em mudanças de volatilidade, não apenas em preço. Você pode estar certo que PETR4 vai subir, mas se volatilidade cair, opção pode perder valor mesmo que PETR4 suba.</blockquote><p>Um conceito importante é <strong>"theta" - o decay (decaimento) de valor da opção com tempo</strong>. Uma opção que vence em 3 meses vale mais que a mesma opção que vence em 1 mês, mesmo que preço de PETR4 seja idêntico. Todos os dias que passa, opção perde valor.</p><blockquote class="example">PETR4 opção de compra com strike R$ 32 e vencimento em 90 dias vale R$ 1.00. Mesma opção com vencimento em 30 dias vale R$ 0.60. Mesma com vencimento em 1 dia vale R$ 0.10. Theta (decaimento) é acelerado próximo ao vencimento.</blockquote><p>A precificação de opção usa modelo <strong>Black-Scholes</strong> que leva em conta: preço atual, strike, tempo até vencimento, volatilidade implícita, taxa de juros. A fórmula é complexa, mas intuitivamente: quanto maior a volatilidade, maior o valor da opção.</p><blockquote class="news">Volatilidade implícita é medida pelo índice VIX nos EUA ("índice de medo"). Quando VIX sobe (mercado assustado), opciones de proteção ficam caras. Quando VIX cai (confiança), opções ficam baratas. Profissionais usam VIX para calibrar risco do portfólio.</blockquote>`},

      {
        id: 'cmb1',
        name: 'Mercado de Câmbio: Comprando e Vendendo Moedas',
        content: `<h4>O Mercado Maior do Mundo</h4><p>O mercado de câmbio (forex) é <strong>o maior mercado financeiro do mundo - trilhões de dólares negociados diariamente</strong>. Você compra moeda estrangeira pagando real, ou vende moeda estrangeira recebendo real.</p><p>O <strong>dólar americano é a moeda principal do câmbio</strong>. Praticamente todas as transações envolvem dólar (USD). Se você quer comprar euro, você compra EUR/USD (euro em dólar). Se quer comprar real, compra USD/BRL (dólar em real).</p><blockquote class="tip">Taxa de câmbio é como preço de ação - oscila constantemente. Um dólar que estava em R$ 5.00 pode estar em R$ 5.10 horas depois. Você pode ganhar ou perder com oscilações, assim como em ações.</blockquote><p>Os <strong>participantes do mercado de câmbio</strong> incluem: (1) Bancos (maior volume). (2) Hedge funds e traders. (3) Corporações (importadores/exportadores). (4) Governo e Banco Central. (5) Pessoas físicas (via corretora).</p><blockquote class="example">Empresa brasileira que exporta para EUA: vende produtos por US$ 1 milhão. Precisa converter para real para pagar funcionários. Vai ao banco, vende USD 1 milhão a R$ 5.00, recebe R$ 5 milhões. Banco oferece taxa não tão boa quanto mercado (lucra margem), empresa aceita porque quer facilidade.</blockquote><p>Um conceito importante é <strong>"spot" vs "forward"</strong>. Spot é preço hoje (entrega imediata). Forward é preço combinado hoje para entrega futura (dias/meses/anos). Forward é usado para proteção (hedge).</p><blockquote class="news">Brasil tem grande volatilidade cambial porque: (1) Economia aberta (muito comércio internacional). (2) Fluxo de capital instável (entrada/saída de estrangeiros). (3) Incerteza política. Isso cria oportunidades e riscos para traders.</blockquote>`},
      {

        name: 'Hedge: Proteção contra Variações de Câmbio',
        content: `<h4>Gerenciando Risco de Moeda</h4><p>Para quem tem dinheiro em moeda estrangeira ou vai receber no futuro, <strong>câmbio é risco importante que precisa ser gerenciado</strong>. Uma empresa que vai receber US$ 1 milhão em 3 meses pode querer "travar" o câmbio para evitar surpresa.</p><p>As <strong>formas principais de hedge de câmbio</strong> são: (1) <strong>Futuro de dólar</strong> - você compra futuro do dólar para travar preço. (2) <strong>Forward (contrato a termo)</strong> - banco oferece taxa fixa para 3 meses. (3) <strong>Opção de câmbio</strong> - você compra opção dando direito de compra/venda a preço fixo.</p><blockquote class="tip">Hedge de câmbio é "seguro" - você paga um preço (taxa pior que mercado) para se proteger. Nem sempre vale a pena, mas em situações de incerteza alta, sim.</blockquote><p>Exemplo de hedge: <strong>você vai receber US$ 100 mil em 3 meses</strong>. Dólar está em R$ 5.00. Você quer garantir R$ 500 mil. Você compra futuro de dólar para 3 meses a R$ 5.00. Em 3 meses, se dólar estiver em R$ 4.50 (queda), você ainda ganha R$ 500 mil (porque travou). Se estiver em R$ 5.50 (alta), você ainda ganha R$ 500 mil (porque travou). Sem hedge, você teria ganhado R$ 450 mil (queda) ou R$ 550 mil (alta) - incerteza reduzida.</p><blockquote class="example">Empresa brasileira tem filial nos EUA que vai mandar R$ 1 milhão em lucro em 6 meses. Dólar está em R$ 5.00 = US$ 200 mil. Empresa quer garantir que vai receber em torno de R$ 1 milhão. Faz forward com banco: troca em 6 meses a R$ 5.00 (fixo). Se dólar cair para R$ 4.50, ainda ganha R$ 1 milhão. Se subir para R$ 5.50, ainda ganha R$ 1 milhão. Proteção perfeita.</blockquote><p>Um risco é <strong>"over-hedging"</strong> - quando você se protege demais, pode perder oportunidades. Se você travou dólar em R$ 5.00 e depois sobe para R$ 6.00, você está preso em R$ 5.00.</p><blockquote class="news">Muitas empresas brasileiras usam hedge de câmbio para proteger suas operações. Bancos ganham muito disso porque oferecem derivativos de câmbio com spreads grandes. É forma lucrativa de ganho para bancos.</blockquote>`},

        content: `<h4>Por Que Dólar Sobe e Cai</h4><p>O câmbio de moedas é determinado pela <strong>oferta e demanda internacional</strong>. Demanda por dólar sobe quando: há interesse estrangeiro investir no Brasil. Demanda por dólar cai quando: brasileiros querem investir no exterior.</p><p>Os <strong>principais fatores que afetam câmbio BRL</strong> são: (1) <strong>Fluxo de investimento estrangeiro</strong> - se estrangeiros entram para comprar ações B3, demandam reais, dólar cai. Se saem, demandam dólares, dólar sobe. (2) <strong>Preços de commodities</strong> - Brasil é exportador de commodities. Se preço cai, receita cai, dólar sobe. (3) <strong>Taxa de juros</strong> - se Brasil tem Selic alta, estrangeiros vêm investir, dólar cai. Se cai, saem, dólar sobe. (4) <strong>Risco político</strong> - se há incerteza política no Brasil, estrangeiros saem, dólar sobe.</p><blockquote class="tip">Para prever câmbio brasileiro, observe: preço de commodities, entrada/saída de estrangeiros na B3, Selic Brasil vs taxa exterior, notícias políticas. Não é ciência exata, mas esses fatores são importantes.</blockquote><p><strong>Influência do dólar americano global</strong> também importa. Se Federal Reserve levanta taxa de juros, dólar fica mais atrativo mundialmente, real enfraquece. Se levanta muito, estrangeiros saem de mercados emergentes e vêm para EUA.</p><blockquote class="example">2022: Federal Reserve levanta taxa de 0% para 4% ao longo do ano. Dólar fica muito atrativo. Estrangeiros saem de Brasil. Real cai de R$ 4.90 para R$ 5.50. 2023-2024: Fed mantém juros altos, mas no Brasil a Selic sobe para 10%+. Brasil fica novamente atrativo. Real sobe para R$ 4.90.</blockquote><p>Um fenômeno importante é <strong>"safe haven" (porto seguro)</strong> - em crise global, dinheiro corre para dólar (e ouro). Brasil e outras economias emergentes sofrem saída de capital. Por isso real é mais volátil que moedas desenvolvidas.</p><blockquote class="news">Economistas brasileiros frequentemente criticam que "Brasil é otém de câmbio volátil" porque depende de commodities e tem insegurança política. Moeda que seria estável seria moeda de país com: política estável, crescimento consistente, diversificação econômica. Brasil não tem nenhum desses.</blockquote>`}
