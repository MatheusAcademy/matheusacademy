        dur: '20 min',
        content: `<h3>Estrutura do Email Profissional</h3>
<p>A comunicação por email é a base da correspondência comercial moderna. Você aprenderá a estruturar emails claros, concisos e profissionais que geram resultados. Um email bem escrito economiza tempo, evita mal-entendidos e constrói confiança com colegas e clientes.</p>
<h4>Componentes Essenciais</h4>
<ul>
<li><strong>Subject Line:</strong> Deve ser específica e descritiva. Exemplo: "Quarterly Report Q2 2025 — Budget Review" é melhor do que "Report"</li>
<li><strong>Saudação:</strong> "Dear [Name]" (formal), "Hi [Name]" (semiformal), "Hello" (casual)</li>
<li><strong>Abertura:</strong> Estabeleça o propósito imediatamente</li>
<li><strong>Corpo:</strong> Informações principais em parágrafos curtos</li>
<li><strong>Fechamento:</strong> Chamada à ação clara</li>
<li><strong>Assinatura:</strong> Nome, título, empresa, telefone</li>
</ul>
<h4>Exemplo de Email Formal</h4>
<blockquote class="example">
<strong>Subject: Project Proposal — New Marketing Initiative</strong><br><br>
Dear Mr. Johnson,<br><br>
I hope this email finds you well. I am writing to present our proposed marketing initiative for the upcoming quarter. As discussed in our meeting last Friday, we have identified three key opportunities for expansion.<br><br>
The attached document outlines:<br>
• Timeline and deliverables<br>
• Budget requirements (estimated at $50,000)<br>
• Expected ROI projections<br><br>
Could we schedule a 30-minute call this week to discuss your feedback? I am available Tuesday or Wednesday after 2 PM.<br><br>
Looking forward to your thoughts.<br><br>
Best regards,<br>
Sarah Anderson<br>
Marketing Director<br>
Growth Solutions Inc.
</blockquote>
<h4>Frases-Chave para Emails</h4>
<p><strong>Abertura:</strong> "I am reaching out to...", "I wanted to follow up on...", "Thank you for your email regarding..."</p>
<p><strong>Corpo:</strong> "As requested, I have enclosed...", "Please find attached...", "Could you please clarify...", "I would appreciate your input on..."</p>
<p><strong>Fechamento:</strong> "Please let me know if you have any questions", "I look forward to hearing from you", "Thank you for your time and consideration"</p>
<p>Os emails em contexto corporativo devem ser sempre profissionais, mas podem variar em tom dependendo da relação com o destinatário. Emails para clientes exigem mais formalidade; emails para colegas podem ser mais relaxados, mas ainda profissionais.</p>
<h4>Erros Comuns a Evitar</h4>
<ul>
<li>Subject line vazio ou genérico</li>
<li>Parágrafos muito longos (limite a 3-4 linhas)</li>
<li>Falta de chamada à ação clara</li>
<li>Erros de gramática ou ortografia (revise sempre!)</li>
<li>Tom muito casual ou muito agressivo</li>
<li>Attachments não mencionados no corpo do email</li>
</ul>`,

          {q: "Quando usar 'Dear' vs 'Hi' em emails comerciais?", a: "'Dear' é para correspondes formais ou primeiros contatos com clientes; 'Hi' é aceitável com colegas ou relacionamentos já estabelecidos."},

        name: 'Reuniões de Negócios: Participação e Liderança',
        dur: '22 min',
        content: `<h3>Conduzindo Reuniões Eficazes</h3>
<p>As reuniões são o coração da comunicação corporativa. Saber como participar efetivamente, fazer contribuições relevantes e até liderar reuniões são habilidades essenciais para o sucesso profissional. Nesta lição, você aprenderá vocabulário, expressões e estratégias para brilhar em qualquer contexto de reunião.</p>
<h4>Fases da Reunião</h4>
<h4>1. Abertura (Opening)</h4>
<blockquote class="tip">
"Good morning everyone. Thank you all for being here. Today we'll discuss three main topics: budget allocation, timeline, and team assignments. We have 60 minutes scheduled."
</blockquote>
<p>Na abertura, estabeleça o tom profissional, agradeça a presença, e deixe clara a agenda.</p>
<h4>2. Apresentação (Presentation)</h4>
<p><strong>Vocabulário chave:</strong> "Let me walk you through...", "As you can see in this slide...", "I'd like to highlight...", "This is significant because..."</p>
<p>Ao apresentar informações, sempre conecte os dados ao impacto no negócio. Não apenas apresente números; explique o contexto.</p>
<h4>3. Discussão (Discussion)</h4>
<p>Para fazer perguntas:</p>
<ul>
<li>"Could you elaborate on that point?"</li>
<li>"I'm not sure I understand the connection. Could you clarify?"</li>
<li>"How does this align with our Q3 objectives?"</li>
<li>"What would be the implications if we proceed with this approach?"</li>
</ul>
<p>Para discordar respeitosamente:</p>
<ul>
<li>"I appreciate your perspective, but I'd like to offer a different angle..."</li>
<li>"That's a valid point, however we should also consider..."</li>
<li>"I see where you're coming from, and I agree with the goal, but perhaps we could..."</li>
</ul>
<h4>4. Conclusão (Closing)</h4>
<blockquote class="example">
"Let me summarize what we've agreed on: John will handle vendor negotiations, Sarah will prepare the financial projections, and I'll coordinate with the legal team. Next meeting is Thursday at 2 PM. Please send me your preliminary reports by Wednesday EOD."
</blockquote>
<h4>Expressões para Participação Efetiva</h4>
<p><strong>Pedir a palavra:</strong> "May I add something?", "I'd like to share my thoughts on this", "Can I jump in here?"</p>
<p><strong>Concordar:</strong> "That's an excellent point", "I couldn't agree more", "Absolutely, and I'd add that..."</p>
<p><strong>Ganhar tempo:</strong> "That's a great question. Let me think about that for a moment", "I'll need to look into that and get back to you"</p>`,
        cards: [

          {q: "Como encerrar uma reunião de forma profissional?", a: "Resuma os pontos acordados, confirme as responsabilidades de cada pessoa, estabeleça a próxima data e claro, o próximo encontro."}

        content: `<h3>Estratégias de Negociação em Inglês</h3>
<p>A negociação é uma arte que equilibra assertividade com diplomacia. Em um contexto internacional, dominar a negociação em inglês é crucial para alcançar acordos vantajosos e manter relacionamentos comerciais saudáveis.</p>
<h4>Fases da Negociação</h4>
<h4>1. Preparação e Abertura</h4>
<p>Sempre chegue preparado. Conheça seu BATNA (Best Alternative to a Negotiated Agreement) e saiba quais são seus limites aceitáveis.</p>
<blockquote class="tip">
"Thank you for meeting with me. I'd like to discuss our contract renewal. Based on market research, I believe we can find terms that benefit both parties."
</blockquote>
<h4>2. Apresentação de Posições</h4>
<p><strong>Para sua proposta:</strong> "Our proposal includes a 15% price reduction in exchange for a 24-month commitment", "We're looking for flexibility on delivery schedules to manage our costs effectively"</p>
<p><strong>Para ouvir o outro lado:</strong> "What are your primary concerns regarding this arrangement?", "Help me understand your position on the pricing structure"</p>
<h4>3. Exploração de Opções</h4>
<p>Não fique preso em uma única solução. Explore múltiplas opções:</p>
<ul>
<li>"What if we structured it differently...?"</li>
<li>"Let's brainstorm other approaches that could work for both of us"</li>
<li>"Could we potentially adjust the timeline in exchange for volume commitments?"</li>
</ul>
<h4>4. Resolução e Acordo</h4>
<blockquote class="example">
"So, to confirm: we'll proceed with a 12-month contract at 10% discount, with quarterly price reviews based on market conditions. We'll finalize the details in writing and both parties will sign by next Friday. Does this work for you?"
</blockquote>
<h4>Expressões para Negociação</h4>
<p><strong>Fazer concessões:</strong> "We can offer a 5% reduction if you commit to quarterly orders of at least 1,000 units"</p>
<p><strong>Buscar concessões:</strong> "In exchange for extending the payment terms, could you offer a volume discount?"</p>
<p><strong>Manter posição:</strong> "I understand your concern, but our bottom line is $50,000. That's non-negotiable."</p>
<p><strong>Impasse:</strong> "We seem to be at an impasse. Should we bring in our managers to explore options?"</p>
<h4>Erros em Negociação</h4>
<ul>
<li>Aceitar a primeira oferta (sempre há espaço para negociação)</li>
<li>Revelar seu BATNA ou limite máximo</li>
<li>Fazer concessões sem pedir nada em troca</li>
<li>Criar um ambiente adversarial em vez de colaborativo</li>
</ul>`,
