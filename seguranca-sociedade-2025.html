      {id:43,name:'Segurança: O Fiel da Balança das Eleições Presidenciais de 2026',dur:'7min',
       content:`<h3>Segurança: O Tema que Vai Definir 2026</h3>
<p>Com 63% dos brasileiros priorizando segurança (AtlasIntel/Bloomberg, nov/2025), analistas de diferentes espectros convergem: o tema será central nas eleições presidenciais de 2026 — provavelmente o mais importante da campanha.</p>
<blockquote>📊 O Cenário Eleitoral: 63% citam segurança como maior problema · Lula sofreu queda após operação no RJ · Tarcísio cresceu nas pesquisas pós-megaoperação · Segurança foi o tema mais citado em debates municipais de 2024.</blockquote>
<h4>Por Que a Segurança Sempre Mobiliza o Voto</h4>
<p>Diferentemente de saúde e educação, ações repressivas de segurança pública produzem efeitos visíveis no curto prazo — operações, prisões, apreensões —, gerando percepção de resultado imediato. Isso explica por que governantes de todos os espectros buscam esse capital político, mesmo quando os impactos de longo prazo são questionáveis.</p>`,
       quiz:{q:'Por que segurança gera mais capital político que saúde ou educação?',opts:['Porque custa menos','Porque produz efeitos visíveis no curto prazo','Porque não tem custo eleitoral','Porque o eleitor não entende as outras políticas'],correct:1},
       cards:[{q:'Qual o cenário eleitoral de 2026 desenhado pelos dados de 2025?',a:'Segurança é o tema central — 63% dos brasileiros a priorizam. Tarcísio cresce, Lula perde pontos. Candidato que domine o tema tem vantagem decisiva.'},{q:'Por que segurança gera percepção de resultado mais rápido que saúde e educação?',a:'Ações repressivas (operações, prisões, apreensões) são visíveis imediatamente. Saúde e educação têm retorno de longo prazo, menos perceptível.'}]},

      {id:44,name:'Os Candidatos e Seus Modelos de Segurança Pública',dur:'7min',
       content:`<h3>Modelos em Disputa nas Eleições de 2026</h3>
<p>Para o eleitor de 2026, a escolha em segurança pública será entre modelos com pressupostos e consequências distintas. Entender cada um é essencial para votar com informação.</p>
<h4>Modelo 1: Linha Dura Policial</h4>
<p>Mais operações, mais letalidade aceita como custo, câmeras opcionais, discurso de tolerância zero. Resultado imediato visível, questionamentos de longo prazo sobre sustentabilidade e direitos humanos.</p>
<h4>Modelo 2: Segurança Integrada</h4>
<p>Policiamento comunitário + presença estatal ampla + programas sociais. Resultado mais lento, mais duradouro. Maior custo fiscal no curto prazo.</p>
<blockquote>💡 Para o Empreendedor: Cada modelo impacta diferentemente os negócios. Linha dura pode reduzir crime de rua mas aumentar insegurança jurídica. Segurança integrada tem custo mais alto no curto prazo mas ambiente mais estável no longo.</blockquote>`,
       quiz:{q:'Qual modelo de segurança tende a ter resultados mais duradouros?',opts:['Linha dura policial','Segurança integrada com presença estatal ampla','Privatização da segurança','Descriminalização geral'],correct:1},
       cards:[{q:'Qual a diferença fundamental entre linha dura e segurança integrada?',a:'Linha dura: resultado imediato e visível, questionamentos de longo prazo. Segurança integrada: resultado mais lento, mais duradouro, maior custo fiscal inicial.'},{q:'Como cada modelo impacta negócios diferentemente?',a:'Linha dura reduz crime de rua mas pode aumentar insegurança jurídica. Segurança integrada tem custo maior no curto prazo mas ambiente mais estável no longo.'}]},

      {id:45,name:'Fake News, Medo e Manipulação Eleitoral em Ano de Campanha',dur:'7min',
       content:`<h3>Desinformação em Segurança: Como Identificar</h3>
<p>Em ano eleitoral, o tema da segurança se torna terreno fértil para desinformação. Dados são selecionados, distorcidos ou fabricados para amplificar o medo e beneficiar candidatos específicos.</p>
<h4>Os Padrões de Desinformação</h4>
<p><strong>Dados isolados sem série histórica:</strong> "houve X homicídios este mês" sem contexto. <strong>Atribuição falsa:</strong> associar crime a grupos políticos sem evidência. <strong>Casos extremos como regra:</strong> tratar crimes raros como cotidianos. <strong>Estatísticas de outros países como se fossem brasileiras.</strong></p>
<blockquote>💡 O Filtro Crítico: Antes de compartilhar qualquer dado de segurança, pergunte: Qual a fonte? É dado primário ou relato de relato? Tem série histórica? Qual o contexto geográfico? Quem se beneficia politicamente desta informação circular?</blockquote>`,
       quiz:{q:'Qual é o principal padrão de desinformação em dados de segurança?',opts:['Inventar mortos','Usar dados isolados sem série histórica ou contexto','Atribuir crimes a extraterrestres','Usar dados de outros continentes'],correct:1},
       cards:[{q:'Quais as principais técnicas de desinformação em segurança pública?',a:'Dados isolados sem contexto, atribuição falsa a grupos políticos, casos extremos apresentados como cotidianos, estatísticas de outros países como brasileiras.'},{q:'Quais perguntas fazer antes de compartilhar dados de segurança?',a:'Qual a fonte primária? Tem série histórica? Qual o contexto geográfico? Quem se beneficia politicamente desta informação?'}]},

      {id:46,name:'A Polarização e Como o Eleitor de Segurança Decide o Voto',dur:'7min',
       content:`<h3>Como o Eleitor de Segurança Decide</h3>
<p>Pesquisas eleitorais mostram que o eleitor que prioriza segurança decide principalmente com base na <em>percepção</em> de segurança — não nos dados objetivos. Isso cria uma dinâmica em que a narrativa importa tanto quanto os resultados.</p>
<h4>O Eleitor de Segurança em 2026</h4>
<p>Majoritariamente dos estratos C e D da população, morador de periferia ou área de risco, mais impactado diretamente pela violência cotidiana. Vota em quem parece mais "duro com o crime" — mesmo que os dados não sustentem essa percepção.</p>
<blockquote>⚠️ A Armadilha da Percepção: A percepção de segurança pode divergir dos dados objetivos. Em cidades onde a violência caiu, mas a cobertura midiática aumentou, os moradores podem se sentir menos seguros. Em 2026, o candidato que gerenciar melhor a percepção pode ter vantagem independente da realidade.</blockquote>`,
       quiz:{q:'Com base em que o eleitor que prioriza segurança tende a decidir seu voto?',opts:['Dados objetivos do FBSP','Percepção de segurança e narrativa','Recomendação de juristas','Comparação com outros países'],correct:1},
       cards:[{q:'Qual o perfil do eleitor que prioriza segurança em 2026?',a:'Majoritariamente das classes C e D, morador de periferia, impactado diretamente pela violência cotidiana. Vota em quem parece mais duro com o crime.'},{q:'Por que a percepção pode divergir dos dados objetivos de segurança?',a:'Cobertura midiática intensa pode aumentar percepção de insegurança mesmo quando a violência cai. Em 2026, quem gerenciar a percepção pode ter vantagem.'}]},

      {id:47,name:'Modelos que Funcionaram no Mundo: O Que a Evidência Diz',dur:'7min',
       content:`<h3>Evidências Internacionais para o Debate Brasileiro</h3>
<p>Com eleições à vista e promessas em abundância, a evidência internacional serve como contraponto racional às retóricas de campanha. O que realmente funcionou?</p>
<h4>O Que a Ciência Comprova que Funciona</h4>
<p><strong>Policiamento orientado por dados (hot spots):</strong> concentrar policiamento onde o crime realmente ocorre reduz crimes em 20–30% sem aumento de letalidade. <strong>Intervenção preventiva em jovens:</strong> programas como Boston Ceasefire reduziram homicídios juvenis em 63% nos EUA. <strong>Presença estatal integral:</strong> Medellín reduziu homicídios em 95% com urbanismo social.</p>
<blockquote>⚠️ O Que Não Funciona: Encarceramento massivo sem reinserção (gera reincidência), pena de morte (sem evidência de efeito dissuasório), e policiamento puramente repressivo sem inteligência.</blockquote>`,
       quiz:{q:'Quanto o policiamento orientado por dados (hot spots) reduz crimes?',opts:['5–10%','20–30%','50–60%','80%+'],correct:1},
       cards:[{q:'Quais são os modelos com evidência científica de eficácia em reduzir violência?',a:'Policiamento por dados (hot spots): −20–30%. Intervenção preventiva em jovens: −63% (Boston). Presença estatal integral: −95% (Medellín).'},{q:'O que a ciência mostra que não funciona isoladamente?',a:'Encarceramento massivo sem reinserção, pena de morte sem evidência dissuasória, policiamento repressivo sem inteligência.'}]},

      {id:48,name:'Cenários para os Próximos 12 Meses em Segurança Pública',dur:'7min',
       content:`<h3>Cenários para 2026: O Que Esperar</h3>
<p>Com base nos dados de 2025 e nas tendências identificadas ao longo deste curso, é possível desenhar cenários plausíveis para os próximos 12 meses em segurança pública no Brasil.</p>
<h4>Cenário Base (Mais Provável)</h4>
<p>Continuidade das operações em SP com alta letalidade policial. Feminicídios permanecem em patamar elevado. Debate político se intensifica com aproximação das eleições. Governo federal pressiona por PEC da Segurança. Candidatos de linha dura ganham nas pesquisas mas enfrentam questionamentos de direitos humanos.</p>
<h4>Cenário de Ruptura</h4>
<p>Nova operação de grande escala com elevado número de mortes → crise política aguda → mudança de posicionamento do governo federal → janela para debate mais qualificado sobre modelos de segurança.</p>
<blockquote>💡 Para o Empreendedor: Qualquer que seja o cenário, a chave é monitorar os dados mensais (SSP-SP, FBSP) e antecipar como mudanças regulatórias ou operacionais em segurança impactam seu setor específico.</blockquote>`,
       quiz:{q:'Qual a chave para o empreendedor navegar qualquer cenário de segurança pública?',opts:['Aguardar as eleições','Monitorar dados mensais e antecipar impactos setoriais','Migrar o negócio para outro país','Contratar mais segurança privada'],correct:1},
       cards:[{q:'Qual o cenário mais provável para segurança em SP nos próximos 12 meses?',a:'Continuidade das operações com alta letalidade, feminicídios em patamar elevado, debate político intenso com candidatos de linha dura crescendo nas pesquisas.'},{q:'Como o empreendedor deve se preparar para os cenários de segurança em 2026?',a:'Monitorar dados mensais do SSP-SP e FBSP, antecipar mudanças regulatórias e operacionais, e diversificar estratégias por região e setor.'}]}
    ]
  },
  {
    id:9, name:'Módulo 9 — Visão de Negócio: Navegando a Turbulência', free:true,
    topics:[
      {id:49,name:'Lendo o Cenário com Olhos de Empreendedor Estratégico',dur:'7min',
       content:`<h3>A Leitura Estratégica do Cenário</h3>
<p>Chegamos ao módulo final. Tudo o que aprendemos sobre dados, política e violência agora converge para uma pergunta central: <strong>como o empreendedor brasileiro navega este cenário?</strong></p>
<h4>O Empreendedor Estratégico vs. O Reativo</h4>
<p>O empreendedor reativo espera a crise para agir. O estratégico <em>antecipa</em> — usando dados como os deste curso para tomar decisões antes que os problemas se manifestem no negócio.</p>
<blockquote>💡 A Vantagem da Informação: Você terminou este curso sabendo que feminicídios crescem, que letalidade policial é alta, que 63% do eleitorado prioriza segurança e que US$ 19,97 tri é o custo global da violência. Esse conhecimento é um ativo de negócio — use-o.</blockquote>`,
       quiz:{q:'Qual a diferença entre o empreendedor reativo e o estratégico?',opts:['O estratégico tem mais dinheiro','O estratégico antecipa usando dados','O reativo tem mais experiência','Não há diferença na prática'],correct:1},
       cards:[{q:'Por que conhecer dados de segurança é um ativo de negócio?',a:'Permite antecipar riscos operacionais, identificar oportunidades em mercados de segurança e posicionar melhor o negócio em cenários eleitorais de 2026.'},{q:'O que diferencia o empreendedor estratégico do reativo?',a:'O estratégico usa informação para antecipar. O reativo espera a crise para agir — pagando preço maior em custo e tempo de reação.'}]},

      {id:50,name:'Setores em Alta Durante Crises de Segurança Pública',dur:'7min',
       content:`<h3>Oportunidades em Cenário de Crise de Segurança</h3>
<p>Crises de segurança criam demandas específicas que se traduzem em oportunidades de negócio para quem está preparado para identificá-las.</p>
<h4>Setores em Crescimento</h4>
<p><strong>Segtech:</strong> monitoramento remoto, biometria, análise preditiva — crescimento de 35% em 2024. <strong>Segurança privada:</strong> R$ 50 bilhões/ano, crescimento de 8–12%. <strong>Jurídico especializado:</strong> escritórios com expertise em Lei Maria da Penha, direito penal empresarial. <strong>Seguros:</strong> vida, patrimonial e empresarial crescem com a insegurança. <strong>ESG:</strong> empresas com programas de proteção à mulher acessam mais capital.</p>
<blockquote>📊 Oportunidade Específica: O mercado de câmeras corporais para polícias, sistemas de alerta para vítimas de violência doméstica e plataformas de denúncia anônima são segmentos com demanda crescente e pouco competidores qualificados.</blockquote>`,
       quiz:{q:'Qual setor cresceu 35% em 2024 relacionado à segurança?',opts:['Segurança privada tradicional','Segtech (tecnologia de segurança)','Armamento civil','Serviços jurídicos criminais'],correct:1},
       cards:[{q:'Quais setores crescem em crises de segurança pública?',a:'Segtech (+35% em 2024), segurança privada (+8–12%/ano), jurídico especializado, seguros e ESG com programas de proteção à mulher.'},{q:'Qual oportunidade específica de nicho foi identificada no curso?',a:'Câmeras corporais para polícias, sistemas de alerta para vítimas de violência doméstica e plataformas de denúncia anônima — demanda crescente, poucos concorrentes qualificados.'}]},

      {id:51,name:'Como Proteger Seu Negócio em Ambientes de Alto Risco',dur:'7min',
       content:`<h3>Proteção Operacional em Ambientes de Alto Risco</h3>
<p>Além de identificar oportunidades, o empreendedor em zona de risco precisa de protocolos práticos para proteger seu negócio, seus funcionários e sua família.</p>
<h4>Protocolo de Segurança Básico</h4>
<p><strong>Mapeamento de risco:</strong> identificar quais são os riscos específicos da região e do setor. <strong>Segurança física:</strong> câmeras, alarmes, controle de acesso. <strong>Segurança de dados:</strong> backup, criptografia, plano de continuidade. <strong>Protocolo de emergência:</strong> o que cada funcionário faz em caso de assalto, extorsão ou ameaça. <strong>Seguros:</strong> patrimonial, vida e responsabilidade civil.</p>
<blockquote>💡 O Elemento Humano: O protocolo mais sofisticado falha se os funcionários não foram treinados. Simulações regulares de situações de risco aumentam a resiliência operacional e reduzem o impacto de incidentes.</blockquote>`,
       quiz:{q:'Qual o elemento mais crítico de qualquer protocolo de segurança empresarial?',opts:['Câmeras de alta resolução','Treinamento dos funcionários','Seguro patrimonial','Sistema de alarme 24h'],correct:1},
       cards:[{q:'Quais são os componentes do protocolo de segurança básico para empresas?',a:'Mapeamento de risco, segurança física, segurança de dados, protocolo de emergência e seguros patrimonial, vida e responsabilidade civil.'},{q:'Por que o elemento humano é crítico em protocolos de segurança?',a:'O protocolo mais sofisticado falha sem treinamento. Simulações regulares aumentam resiliência e reduzem impacto de incidentes.'}]},

      {id:52,name:'Posicionamento de Marca em Contexto Político Sensível',dur:'6min',
       content:`<h3>Comunicação Empresarial em Ano Eleitoral</h3>
<p>Em ano eleitoral — especialmente com segurança como tema central — posicionar a marca de forma equivocada pode custar clientes, parceiros e reputação. Mas o silêncio também tem seu preço.</p>
<h4>As Três Posições</h4>
<p><strong>Engajamento ativo:</strong> a empresa toma partido explícito. Alto risco, potencial de ganho de nicho. <strong>Silêncio estratégico:</strong> evita o tema completamente. Seguro, mas pode parecer omissão. <strong>Posição baseada em dados:</strong> a empresa comunica com base em fatos verificados (redução de feminicídio, proteção de funcionárias) sem tomar partido político. Mais sustentável.</p>
<blockquote>💡 A Regra de Ouro: Em contexto político sensível, comunique o que você faz — não o que você pensa sobre os candidatos. Ações verificáveis (programa de proteção, doação a instituições, treinamento) comunicam valores sem exposição política.</blockquote>`,
       quiz:{q:'Qual posicionamento de marca é mais sustentável em ano eleitoral?',opts:['Engajamento ativo com candidato preferido','Silêncio total','Posição baseada em ações verificáveis e dados','Crítica aberta a todos os candidatos'],correct:2},
       cards:[{q:'Quais são as três posições possíveis para uma marca em ano eleitoral?',a:'Engajamento ativo (alto risco), silêncio estratégico (pode parecer omissão) e posição baseada em dados e ações verificáveis (mais sustentável).'},{q:'Como comunicar valores empresariais sem exposição política?',a:'Comunicar o que a empresa faz (programas, treinamentos, doações) — não o que pensa sobre candidatos. Ações verificáveis comunicam mais que opiniões.'}]},

      {id:53,name:'Oportunidades no Terceiro Setor, ESG e Impacto Social',dur:'6min',
       content:`<h3>ESG e Terceiro Setor: Onde Segurança Vira Oportunidade</h3>
<p>A crise de segurança pública cria demanda por iniciativas de impacto social. Para empresas que querem acessar capital ESG, parceiros internacionais ou simplesmente construir reputação, atuar nesse espaço é estratégico.</p>
<h4>Oportunidades Específicas</h4>
<p><strong>Programas corporativos de proteção à mulher:</strong> licença remunerada para vítimas, parceria com delegacias, psicólogo no local. ROI em retenção e imagem. <strong>Investimento social privado:</strong> apoio a organizações como o Instituto Sou da Paz ou o FBSP, com benefício fiscal. <strong>B Corps e certificações ESG:</strong> empresas com políticas verificáveis de proteção têm acesso a capital mais barato.</p>
<blockquote>📊 O Mercado de Capital ESG: Fundos ESG movimentaram US$ 35 trilhões globalmente em 2024. Empresas com políticas verificáveis de proteção à mulher e prevenção à violência têm acesso preferencial a esse capital.</blockquote>`,
       quiz:{q:'Qual o tamanho do mercado de capital ESG globalmente em 2024?',opts:['US$ 5 tri','US$ 12 tri','US$ 20 tri','US$ 35 tri'],correct:3},
       cards:[{q:'Como empresas se beneficiam de programas de proteção à mulher funcionária?',a:'ROI em retenção, produtividade e imagem, além de acesso a capital ESG de fundos com critérios socioambientais.'},{q:'Qual o benefício de investimento social privado em organizações de segurança?',a:'Benefício fiscal, reputação corporativa e acesso a redes de parceiros internacionais com critérios ESG.'}]},

      {id:54,name:'Síntese Final: O Brasil que Vem Por Aí — Seus Próximos Passos',dur:'8min',
       content:`<h3>Síntese Final: O Brasil que Vem Por Aí</h3>
<p>Chegamos ao final de 54 tópicos e 9 módulos. Hora de integrar o conhecimento e projetar o que vem — não como analistas de segurança pública, mas como empreendedores, profissionais e cidadãos que precisam navegar um Brasil em transformação acelerada.</p>
<h4>As Cinco Grandes Verdades deste Curso</h4>
<p><strong>1. Os dados são reais e verificáveis.</strong> 270 feminicídios em SP (SSP-SP), 834 mortes por polícia (CNN Brasil), 63% dos brasileiros preocupados (AtlasIntel). Fontes identificadas, sem exagero.</p>
<p><strong>2. A violência tem dimensão econômica enorme.</strong> US$ 19,97 trilhões/ano globalmente (GPI 2025). No Brasil, deprime o crescimento, afasta investimentos e aumenta custos operacionais.</p>
<p><strong>3. A política de segurança vai definir 2026.</strong> O eleitor vai escolher entre modelos radicalmente diferentes. Essa escolha impacta o ambiente de negócios dos próximos 4 anos.</p>
<p><strong>4. Dados sem contexto são armas de manipulação.</strong> Leia queda de homicídios e alta de letalidade com os mesmos critérios analíticos. Este curso te deu esse filtro.</p>
<p><strong>5. Há oportunidades reais nesse cenário.</strong> Segtech, ESG, proteção à mulher, seguros — o mercado de segurança está em forte expansão no Brasil.</p>
<blockquote>💡 Seus 5 Próximos Passos: 1. MONITORE SSP-SP, FBSP e Sou da Paz mensalmente. 2. MAPEIE como cada candidato impacta seu setor. 3. DIVERSIFIQUE estratégias em regiões de alto risco. 4. INVISTA em proteção de funcionárias — é gestão de capital humano. 5. COMUNIQUE COM RESPONSABILIDADE — em ano eleitoral, posicionamento precipitado custa caro.</blockquote>

/* ═══ SOM DE MOEDAS (Web Audio API) ═══ */
function playCoinSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var times=[0,.08,.16,.22,.28];
    var freqs=[1046,1318,1568,1318,1046];
    times.forEach(function(t,i){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freqs[i];
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.22,ctx.currentTime+t+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.12);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.14);
    });
  }catch(e){}
}

/* ═══ ACESSO ═══ */
function isUnlocked(){
  if(COURSE.free)return true;
  var ac=gA(),now=Date.now();
  if(ac.master&&ac.masterTs&&now-ac.masterTs<(ac.expiry||EXP_M))return true;
  var raw=localStorage.getItem(COURSE.ak);
  if(raw){try{var d=JSON.parse(raw);if(d.ts&&now-d.ts<(d.expiry||EXP_I))return true;}catch(e){}}
  return false;
}
function modFree(mi){return mi<COURSE.freeModules;}

/* ═══ SIDEBAR BUILD ═══ */
var _allTopics=[],_curModIdx=0,_curTopIdx=0,_filterStr='';
function buildSidebar(){
  var prog=gProg(),unlocked=isUnlocked();
  _allTopics=[];
  var total=0,done=0,html='';
  MODS.forEach(function(mod,mi){
    var mFree=modFree(mi),canAcc=unlocked||mFree;
    var doneT=mod.topics.filter(function(t){return prog[mod.id+'_'+t.id];}).length;
    var pct=mod.topics.length?Math.round(doneT/mod.topics.length*100):0;
    var completed=pct===100;
    total+=mod.topics.length;done+=doneT;
    mod.topics.forEach(function(t,ti){_allTopics.push({mod:mod,mi:mi,t:t,ti:ti,canAcc:canAcc});});
    var visible=!_filterStr||mod.name.toLowerCase().includes(_filterStr)||mod.topics.some(function(t){return t.name.toLowerCase().includes(_filterStr);});
    if(!visible)return;
    var isOpenMod=mi===_curModIdx;
    html+='<div class="sb-module"><div class="sb-mod-hdr'+(completed?' completed':'')+(isOpenMod?' active-mod open':'')+'" onclick="toggleSbMod('+mi+','+canAcc+')" id="sbModHdr'+mi+'">';
    html+='<div class="sb-mod-num">'+(completed?'✓':(mi+1))+'</div>';
    html+='<div class="sb-mod-info"><span class="sb-mod-name">'+mod.name+(mFree&&!unlocked?' <span style="font-size:.5rem;color:var(--grn);font-weight:700">FREE</span>':'')+'</span><span class="sb-mod-meta">'+mod.topics.length+' tópicos · '+doneT+' concluídos</span></div>';
    if(completed)html+='<span class="sb-mod-badge">✓ OK</span>';
    if(!canAcc)html+='<span class="sb-mod-lock">🔒</span>';
    html+='<span class="sb-mod-arrow">›</span></div>';
    if(pct>0)html+='<div class="sb-mod-prog"><div class="sb-mod-prog-fill" style="width:'+pct+'%"></div></div>';
    html+='<div class="sb-topics'+(isOpenMod?' open':'')+'" id="sbTopics'+mi+'">';
    mod.topics.forEach(function(topic,ti){
      var topDone=!!prog[mod.id+'_'+topic.id];
      var isActive=mi===_curModIdx&&ti===_curTopIdx;
      var vis2=!_filterStr||topic.name.toLowerCase().includes(_filterStr);
      if(!vis2)return;
      html+='<div class="sb-topic-item'+(isActive?' active':'')+(topDone?' done':'')+'" onclick="selectTopic('+mi+','+ti+','+canAcc+')" id="sbTopic'+mi+'_'+ti+'">';
      html+='<div class="sb-topic-dot">'+(topDone?'✓':(ti+1))+'</div><span class="sb-topic-name">'+topic.name+'</span><span class="sb-topic-dur">'+topic.dur+'</span>';
      if(!canAcc)html+='<span class="sb-topic-lock">🔒</span>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('sbList').innerHTML=html;
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('sbProgFill').style.width=pct+'%';
  document.getElementById('sbProgDone').textContent=done+' de '+total+' tópicos';
  document.getElementById('sbProgPct').textContent=pct+'%';
  updateCertPct(pct);
  // Atualizar capa
  // Atualizar progresso na capa — sempre visível
  var cpw=document.getElementById('coverProgressWrap');
  if(cpw){
    cpw.style.display='block';
    document.getElementById('coverProgVal').textContent=pct+'%';
    document.getElementById('coverProgFill').style.width=pct+'%';
  }
  // Atualizar carrossel de módulos
  buildModuleCarousel();
}

function filterModules(val){_filterStr=val.trim().toLowerCase();buildSidebar();if(_filterStr){document.querySelectorAll('.sb-topics').forEach(el=>el.classList.add('open'));document.querySelectorAll('.sb-mod-hdr').forEach(el=>el.classList.add('open'));}}

function _showPuller(){

/* Som de check — lápis riscando papel */
function playCheckSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Ruído branco filtrado — simula lápis no papel
    var buf=ctx.createBuffer(1,ctx.sampleRate*0.18,ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
    var src=ctx.createBufferSource();src.buffer=buf;
    var hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=2200;
    var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=7000;
    var gain=ctx.createGain();gain.gain.setValueAtTime(0.18,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);
    src.connect(hp);hp.connect(lp);lp.connect(gain);gain.connect(ctx.destination);
    src.start();src.stop(ctx.currentTime+0.18);
    // Click seco no final
    var osc=ctx.createOscillator();var g2=ctx.createGain();
    osc.connect(g2);g2.connect(ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(900,ctx.currentTime+0.12);
    osc.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.18);
    g2.gain.setValueAtTime(0.12,ctx.currentTime+0.12);
    g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
    osc.start(ctx.currentTime+0.12);osc.stop(ctx.currentTime+0.22);
  }catch(e){}
}

/* ── ÁUDIO ÚNICO DO MÓDULO (lê todo o conteúdo dos tópicos em sequência) ── */
var _mlModSynth=null,_mlModMi=-1;
function mlToggleModAudio(mi){
  var btn=document.getElementById('ml_abtn_'+mi);
  var st=document.getElementById('ml_ast_'+mi);
  // Para áudio de outro módulo
  if(_mlModSynth&&_mlModMi!==mi){
    _mlModSynth.cancel();_mlModSynth=null;
    var ob=document.getElementById('ml_abtn_'+_mlModMi);
    var os=document.getElementById('ml_ast_'+_mlModMi);
    if(ob)ob.textContent='▶️';if(os)os.textContent='Clique ▶️ para ouvir';
  }
  // Pausa se já tocando este módulo
  if(_mlModSynth&&_mlModMi===mi){
    _mlModSynth.cancel();_mlModSynth=null;
    if(btn)btn.textContent='▶️';if(st)st.textContent='Clique ▶️ para ouvir';return;
  }
  // Monta texto de todos os tópicos do módulo
  var mod=MODS[mi];
  var txt='';
  mod.topics.forEach(function(t){
    var tmp=document.createElement('div');tmp.innerHTML=t.content||'';
    var t2=tmp.textContent||'';
    if(t2.trim())txt+=t.name+'. '+t2+' ';
  });
  if(!txt.trim()){showToast('Sem conteúdo para narrar','warn');return;}
  var spd=parseFloat(document.getElementById('ml_aspd_'+mi)&&document.getElementById('ml_aspd_'+mi).value||1);
  var utt=new SpeechSynthesisUtterance(txt);
  utt.lang='pt-BR';utt.rate=spd;
  utt.onstart=function(){if(btn)btn.textContent='⏸️';if(st)st.textContent='Narrando módulo...';};
  utt.onend=utt.onerror=function(){if(btn)btn.textContent='▶️';if(st)st.textContent='Concluído';_mlModSynth=null;};
  window.speechSynthesis.speak(utt);
  _mlModSynth=window.speechSynthesis;_mlModMi=mi;
}
function mlChangeModSpeed(mi,val){
  if(_mlModSynth&&_mlModMi===mi){mlToggleModAudio(mi);setTimeout(function(){mlToggleModAudio(mi);},100);}
}

/* ── FINALIZAR QUIZ DO MÓDULO ── */
function mlFinishQuiz(mi,corrects){
  // Verifica se todas as questões foram respondidas
  var allAnswered=true;
  for(var qi=0;qi<corrects.length;qi++){
    if(_mlQzSel[mi+'_'+qi]===undefined){allAnswered=false;break;}
  }
  if(!allAnswered){showToast('⚠️ Responda todas as questões antes de finalizar!','warn');return;}

  var score=0,totalPts=0;
  corrects.forEach(function(correct,qi){
    var selected=_mlQzSel[mi+'_'+qi];
    var isCorrect=selected===correct;
    if(isCorrect){score++;totalPts+=20;}else{totalPts-=50;}

    // Colorir opções
    var optsEl=document.getElementById('mlq_opts_'+mi+'_'+qi);
    if(optsEl)optsEl.querySelectorAll('.mlq-opt').forEach(function(o,oi){
      o.classList.remove('selected');
      if(oi===correct){o.classList.add('correct-ans');o.querySelector('.mlq-opt-dot').textContent='✓';}
      else if(oi===selected&&!isCorrect){o.classList.add('wrong-ans');o.querySelector('.mlq-opt-dot').textContent='✕';}
      o.style.pointerEvents='none';
    });

    // Feedback por questão
    var res=document.getElementById('mlq_res_'+mi+'_'+qi);
    if(res){
      res.className='mlq-result '+(isCorrect?'correct':'wrong');
      res.textContent=isCorrect?'✅ Correto! +20 pontos':'❌ Incorreto. −50 pontos';
    }
  });

  // Pontos — aplica total (pode ser negativo, mas não deixa ir abaixo de 0)
  if(totalPts>0){addPoints('Quiz do Módulo '+(mi+1),totalPts);}
  else if(totalPts<0){
    var p=gP();p.total=Math.max(0,p.total+totalPts);
    localStorage.setItem('ma_points',JSON.stringify(p));updateTopbar();
    showToast('📉 '+(totalPts)+' pontos pelas respostas incorretas','');
  }

  // Score final
  var scoreEl=document.getElementById('ml_qscore_'+mi);
  if(scoreEl){
    scoreEl.classList.add('show');
    var pct2=Math.round(score/corrects.length*100);
    var icon=pct2===100?'🏆':pct2>=60?'🎯':'📚';
    var msg=pct2===100?'Perfeito! Acertou tudo!':pct2>=60?'Bom resultado! Continue assim.':'Revise o conteúdo e tente novamente.';
    var nextModBtn='';
    // Botão próximo módulo só aparece se acertou 100% E existe próximo módulo
    if(pct2===100&&mi+1<MODS.length){
      var nextMod=MODS[mi+1];
      var canNext=isUnlocked()||mi+1<COURSE.freeModules;
      if(canNext){
        nextModBtn='<button class="ml-next-mod-btn" onclick="selectTopic('+(mi+1)+',0,true);window.scrollTo({top:0,behavior:\'smooth\'})">'

var _toolbar=null,_notePopup=null,_curRange=null,_pendingHlId=null;
function initHighlight(){
  _toolbar=document.getElementById('highlightToolbar');
  _notePopup=document.getElementById('hlNotePopup');
  document.addEventListener('mouseup',onTextSelect);
  document.addEventListener('touchend',function(){setTimeout(onTextSelect,100);});
  document.addEventListener('mousedown',function(e){if(!_toolbar.contains(e.target)&&!_notePopup.contains(e.target)){hideToolbar();closeHlNote();}});
}
function onTextSelect(){
  // Quando caneta está no modo ON, não mostra toolbar — o clique já aplica direto
  if(_penActive){hideToolbar();return;}
  var sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.toString().trim().length<2){hideToolbar();return;}
  var range=sel.getRangeAt(0);
  var content=document.getElementById('lessonContent');
  if(!content||!content.contains(range.commonAncestorContainer)){hideToolbar();return;}
  _curRange=range.cloneRange();
  var rect=range.getBoundingClientRect();
  var tbH=_toolbar.offsetHeight||50;
  var top=rect.top+window.scrollY-tbH-12;
  var left=rect.left+window.scrollX+(rect.width/2)-(_toolbar.offsetWidth/2||120);
  left=Math.max(12,Math.min(left,window.innerWidth-(_toolbar.offsetWidth||240)-12));
  if(top<70)top=rect.bottom+window.scrollY+10;
  _toolbar.style.top=top+'px';_toolbar.style.left=left+'px';
  _toolbar.classList.add('visible');
}
function hideToolbar(){if(_toolbar)_toolbar.classList.remove('visible');}
function applyHighlight(color){
  if(!_curRange)return;
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(_curRange);
  try{
    var span=document.createElement('mark');
    span.className='hl-'+color;span.dataset.hlColor=color;span.dataset.hlId='hl_'+Date.now();
    _curRange.surroundContents(span);
    saveHighlight(span.dataset.hlId,color,span.textContent);
    addPoints('Destaque no texto',3);showToast('✏️ Trecho destacado!','ok');
  }catch(e){showToast('Selecione texto simples sem formatações para destacar','warn');}
  sel.removeAllRanges();hideToolbar();_curRange=null;
}
function removeHighlight(){
  var sel=window.getSelection();if(!sel||sel.rangeCount===0){showToast('Clique sobre o texto destacado e selecione-o','warn');return;}
  var node=sel.getRangeAt(0).commonAncestorContainer;
  var mark=node.nodeType===3?node.parentElement:node;
  while(mark&&mark.tagName!=='MARK'&&mark.id!=='lessonContent')mark=mark.parentElement;
  if(mark&&mark.tagName==='MARK'){var hlId=mark.dataset.hlId;var parent=mark.parentNode;while(mark.firstChild)parent.insertBefore(mark.firstChild,mark);parent.removeChild(mark);if(hlId)deleteHighlight(hlId);showToast('Destaque removido','ok');}
  else showToast('Selecione o texto destacado para remover','warn');
  sel.removeAllRanges();hideToolbar();
}
function saveHighlight(id,color,text){var data=gHlData();data.unshift({id:id,color:color,text:text.substring(0,200),note:'',topicKey:_curModIdx+'_'+_curTopIdx,date:new Date().toLocaleDateString('pt-BR')});sHlData(data);}
function deleteHighlight(id){var data=gHlData().filter(d=>d.id!==id);sHlData(data);}
function addNoteToHighlight(){
  if(!_curRange)return;
  var sel=window.getSelection();
  if(sel&&sel.rangeCount>0){var node=sel.getRangeAt(0).commonAncestorContainer;var mark=node.nodeType===3?node.parentElement:node;while(mark&&mark.tagName!=='MARK')mark=mark.parentElement;if(mark)_pendingHlId=mark.dataset.hlId;}
  var tbRect=_toolbar.getBoundingClientRect();
  _notePopup.style.top=(tbRect.bottom+window.scrollY+8)+'px';
  _notePopup.style.left=_toolbar.style.left;
  _notePopup.classList.add('show');
  document.getElementById('hlNoteInput').focus();
}
function saveHlNote(){
  var note=document.getElementById('hlNoteInput').value.trim();if(!note){closeHlNote();return;}
  var data=gHlData();
  if(_pendingHlId){var item=data.find(d=>d.id===_pendingHlId);if(item)item.note=note;}
  else{data.unshift({id:'note_'+Date.now(),color:_activeHlColor,text:window.getSelection().toString().substring(0,200),note:note,topicKey:_curModIdx+'_'+_curTopIdx,date:new Date().toLocaleDateString('pt-BR')});}

function renderHlNotes(){

    el.innerHTML='<div class="nb-empty">Nenhum trecho grifado ainda.<br>Ative a canetinha e toque no texto da aula!</div>';

/* ═══ ÁUDIO ═══ */
var _synth=window.speechSynthesis,_utt=null,_speaking=false,_paused=false;
function toggleAudio(){
  if(!_synth)return;
  if(_speaking&&!_paused){_synth.pause();_paused=true;_speaking=false;document.getElementById('audioBtn').textContent='▶️';document.getElementById('audioStatus').textContent='Pausado';}
  else if(_paused){_synth.resume();_paused=false;_speaking=true;document.getElementById('audioBtn').textContent='⏸️';document.getElementById('audioStatus').textContent='Reproduzindo...';}
  else{
    var txt=document.getElementById('lessonContent').innerText;if(!txt)return;
    _synth.cancel();
    var rate=parseFloat(document.getElementById('audioSpeed').value)||1;
    _utt=new SpeechSynthesisUtterance(txt);_utt.lang='pt-BR';_utt.rate=rate;
    _utt.onstart=()=>{_speaking=true;_paused=false;document.getElementById('audioBtn').textContent='⏸️';document.getElementById('audioStatus').textContent='Reproduzindo... ('+rate+'×)';};
    _utt.onend=_utt.onerror=()=>{_speaking=false;_paused=false;document.getElementById('audioBtn').textContent='▶️';document.getElementById('audioStatus').textContent='Concluído';};
    _synth.speak(_utt);
  }
}
/* Altera velocidade em tempo real — reinicia a fala com nova taxa */
function changeAudioSpeed(val){
  var rate=parseFloat(val)||1;
  if(_speaking||_paused){
    /* Guarda posição aproximada não é possível via API — reinicia do começo com nova velocidade */
    var txt=document.getElementById('lessonContent').innerText;if(!txt)return;
    _synth.cancel();_speaking=false;_paused=false;
    _utt=new SpeechSynthesisUtterance(txt);_utt.lang='pt-BR';_utt.rate=rate;
    _utt.onstart=()=>{_speaking=true;_paused=false;document.getElementById('audioBtn').textContent='⏸️';document.getElementById('audioStatus').textContent='Reproduzindo... ('+rate+'×)';};
    _utt.onend=_utt.onerror=()=>{_speaking=false;_paused=false;document.getElementById('audioBtn').textContent='▶️';document.getElementById('audioStatus').textContent='Concluído';};
    _synth.speak(_utt);
    showToast('🔊 Velocidade: '+rate+'×','ok');
  }
}

var _qData=null,_qSel=-1,_qAnswered=false,_qIdx=0,_qResults=[];
function loadQuiz(quizArr){
  // Aceita array de perguntas ou objeto único (legado)
  if(!Array.isArray(quizArr))quizArr=[quizArr];
  _qData=quizArr;_qIdx=0;_qResults=new Array(quizArr.length).fill(null);
  renderQuizQuestion();
}
function renderQuizQuestion(){
  if(!_qData||!_qData.length)return;
  var q=_qData[_qIdx];
  _qSel=-1;_qAnswered=false;
  document.getElementById('quizQ').textContent=q.q;
  document.getElementById('quizOpts').innerHTML=q.opts.map(function(o,i){return '<div class="quiz-opt" onclick="selOpt('+i+')" id="qo'+i+'"><div class="quiz-dot"></div>'+o+'</div>';}).join('');
  var fb=document.getElementById('quizFb');fb.className='quiz-feedback';fb.textContent='';
  var btn=document.getElementById('quizBtn');btn.disabled=false;btn.textContent='Confirmar';btn.style.background='';
  // Dots de progresso
  var label=document.getElementById('quizStepLabel');
  if(label)label.textContent=(_qIdx+1)+' / '+_qData.length;
  var dotsEl=document.getElementById('quizProgDots');
  if(dotsEl)dotsEl.innerHTML=_qData.map(function(_,i){
    var cls='quiz-prog-dot'+(i===_qIdx?' active':'');
    if(_qResults[i]==='correct')cls='quiz-prog-dot correct';
    else if(_qResults[i]==='wrong')cls='quiz-prog-dot wrong';
    return '<div class="'+cls+'" onclick="jumpQuiz('+i+')"></div>';
  }).join('');
}
function jumpQuiz(i){if(_qResults[i]!==null||i===_qIdx)return;_qIdx=i;renderQuizQuestion();}
function selOpt(i){if(_qAnswered)return;_qSel=i;document.querySelectorAll('.quiz-opt').forEach(function(el,idx){el.className='quiz-opt'+(idx===i?' selected':'');});}
function submitQuiz(){
  if(_qAnswered||_qSel<0||!_qData)return;_qAnswered=true;
  var q=_qData[_qIdx],c=q.correct;
  document.querySelectorAll('.quiz-opt').forEach(function(el,i){if(i===c)el.className='quiz-opt correct';else if(i===_qSel&&i!==c)el.className='quiz-opt wrong';});
  var fb=document.getElementById('quizFb'),btn=document.getElementById('quizBtn');
  var isCorrect=_qSel===c;
  _qResults[_qIdx]=isCorrect?'correct':'wrong';
  if(isCorrect){fb.className='quiz-feedback show ok';fb.textContent='✅ Correto! Excelente!';addPoints('Quiz correto',25);btn.style.background='var(--grn)';}
  else{fb.className='quiz-feedback show err';fb.textContent='❌ Errado. Correto: "'+q.opts[c]+'"';btn.style.background='var(--red)';}
  // Avançar para próxima ou finalizar
  var next=_qIdx+1;
  if(next<_qData.length){
    btn.textContent='Próxima →';btn.style.background='var(--pri)';
    btn.onclick=function(){_qIdx=next;renderQuizQuestion();btn.onclick=submitQuiz;};
  }else{
    btn.textContent='✅ Concluído!';
    var total=_qResults.filter(function(r){return r==='correct';}).length;
    showToast('🧠 Quiz: '+total+'/'+_qData.length+' corretas!','ok');
    grantMission('quiz');
  }
  renderQuizQuestion();
}

function moaToggle(mi,ti){
  var item=document.getElementById('moa_item_'+mi+'_'+ti);
  var hdr=item.querySelector('.moa-item-header');
  var isOpen=item.classList.contains('open');
  // Fecha todos
  document.querySelectorAll('.moa-item').forEach(function(el){
    el.classList.remove('open');
    el.querySelector('.moa-item-header').classList.remove('open');
  });
  if(!isOpen){
    item.classList.add('open');
    hdr.classList.add('open');
    // Marcar visto
    var mod=MODS[mi],t=mod.topics[ti];
    var prog=gProg(),key=mod.id+'_'+t.id;
    if(!prog[key]){prog[key]=true;sProg(prog);addPoints('Aula: '+t.name,10);buildSidebar();renderModAccordion(mi);}
  }
}

function moaMarkDone(mi,ti){
  var mod=MODS[mi],t=mod.topics[ti];
  var prog=gProg(),key=mod.id+'_'+t.id;
  if(!prog[key]){prog[key]=true;sProg(prog);addPoints('Tópico concluído: '+t.name,20);buildSidebar();}
  // Atualiza botão
  var btn=document.getElementById('moa_done_'+mi+'_'+ti);
  if(btn){btn.textContent='✅ Tópico Concluído';btn.classList.add('completed');}
  // item
  var item=document.getElementById('moa_item_'+mi+'_'+ti);
  if(item){item.classList.add('done');var num=item.querySelector('.moa-item-num');if(num)num.textContent='✓';}
  // Abre próximo tópico automaticamente
  var next=ti+1;
  if(next<mod.topics.length){
    setTimeout(function(){moaToggle(mi,next);
      var el=document.getElementById('moa_item_'+mi+'_'+next);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },350);
  }else{
    // Último tópico — concluir módulo
    completeModule(mi);
  }
  // Atualiza progresso no header
  var doneCount=mod.topics.filter(function(t2){return !!gProg()[mod.id+'_'+t2.id];}).length;
  var pct=Math.round(doneCount/mod.topics.length*100);
  var pf=document.getElementById('moaProgFill');var pp=document.getElementById('moaProgPct');
  if(pf)pf.style.width=pct+'%';if(pp)pp.textContent=pct+'%';
}

function moaFlipCard(mi,ti,ci){
  var fc=document.getElementById('moa_fc_'+mi+'_'+ti+'_'+ci);
  if(fc){fc.classList.toggle('flipped');addPoints('Flashcard revisado',3);}
}

// Estado do quiz por tópico
var _moaQState={};
function moaSelOpt(mi,ti,oi){
  var key=mi+'_'+ti;
  if(!_moaQState[key])_moaQState[key]={idx:0,sel:-1,answered:false,results:[]};
  var s=_moaQState[key];
  if(s.answered)return;
  s.sel=oi;
  var qArr=Array.isArray(MODS[mi].topics[ti].quiz)?MODS[mi].topics[ti].quiz:[MODS[mi].topics[ti].quiz];
  var q=qArr[s.idx];
  q.opts.forEach(function(_,i){
    var el=document.getElementById('moa_qo_'+mi+'_'+ti+'_'+i);
    if(el)el.className='quiz-opt'+(i===oi?' selected':'');
  });
}
function moaSubmitQuiz(mi,ti){
  var key=mi+'_'+ti;
  if(!_moaQState[key])_moaQState[key]={idx:0,sel:-1,answered:false,results:[]};
  var s=_moaQState[key];
  if(s.answered||s.sel<0)return;
  s.answered=true;
  var qArr=Array.isArray(MODS[mi].topics[ti].quiz)?MODS[mi].topics[ti].quiz:[MODS[mi].topics[ti].quiz];
  var q=qArr[s.idx];
  var correct=s.sel===q.correct;
  s.results[s.idx]=correct?'correct':'wrong';
  // Visual
  q.opts.forEach(function(_,i){
    var el=document.getElementById('moa_qo_'+mi+'_'+ti+'_'+i);
    if(!el)return;
    if(i===q.correct)el.className='quiz-opt correct';
    else if(i===s.sel&&!correct)el.className='quiz-opt wrong';
  });
  var fb=document.getElementById('moa_qfb_'+mi+'_'+ti);
  var btn=document.getElementById('moa_qbtn_'+mi+'_'+ti);
  if(correct){if(fb){fb.className='quiz-feedback show ok';fb.textContent='✅ Correto!';}addPoints('Quiz correto',25);}
  else{if(fb){fb.className='quiz-feedback show err';fb.textContent='❌ Correto: "'+q.opts[q.correct]+'"';}}
  // Dot
  var dot=document.getElementById('moa_qd_'+mi+'_'+ti+'_'+s.idx);
  if(dot){dot.className='moa-quiz-dot '+(correct?'correct':'wrong');}
  playCoinSound();
  // Avança para próxima
  var next=s.idx+1;
  if(next<qArr.length){
    btn.textContent='Próxima →';btn.style.background='var(--pri)';
    btn.onclick=function(){
      s.idx=next;s.sel=-1;s.answered=false;
      var nq=qArr[next];
      var qq=document.getElementById('moa_qq_'+mi+'_'+ti);
      if(qq)qq.textContent=nq.q;
      var opts=document.getElementById('moa_qopts_'+mi+'_'+ti);
      if(opts)opts.innerHTML=nq.opts.map(function(o,oi){
        return '<div class="quiz-opt" onclick="moaSelOpt('+mi+','+ti+','+oi+')" id="moa_qo_'+mi+'_'+ti+'_'+oi+'"><div class="quiz-dot"></div>'+o+'</div>';
      }).join('');
      if(fb){fb.className='quiz-feedback';fb.textContent='';}
      btn.textContent='Confirmar';btn.style.background='';btn.onclick=function(){moaSubmitQuiz(mi,ti);};
      var label=document.getElementById('moa_qlabel_'+mi+'_'+ti);
      if(label)label.textContent=(next+1)+' / '+qArr.length;
      var nd=document.getElementById('moa_qd_'+mi+'_'+ti+'_'+next);
      if(nd){document.querySelectorAll('[id^="moa_qd_'+mi+'_'+ti+'_"]').forEach(function(d){d.classList.remove('active');});nd.classList.add('active');}
    };
  }else{
    btn.textContent='✅ Quiz Concluído!';btn.style.background='var(--grn)';
    var total=s.results.filter(function(r){return r==='correct';}).length;
    showToast('🧠 '+total+'/'+qArr.length+' corretas! +'+total*25+' pts','ok');
  }
}
function buildModuleCarousel(){

  var prog=gProg();
  var unlocked=isUnlocked();
  // Divide módulos em fileiras de 4
  var rows=[];
  for(var i=0;i<MODS.length;i+=4)rows.push(MODS.slice(i,i+4));
  var html='';
  rows.forEach(function(row,ri){
    html+='<div class="mod-row">';
    row.forEach(function(mod,ci){
      var mi=ri*4+ci;
      var canAcc=unlocked||mi<COURSE.freeModules;
      var doneT=mod.topics.filter(function(t){return prog[mod.id+'_'+t.id];}).length;
      var pct=mod.topics.length?Math.round(doneT/mod.topics.length*100):0;
      var isDone=pct===100;

      html+='<div class="mod-card-cover-grid"></div>';

      html+='<div class="mod-card-logo">';
      html+='<svg viewBox="0 0 120 90" width="60" height="45" xmlns="http://www.w3.org/2000/svg">';
      html+='<text x="60" y="65" text-anchor="middle" fill="#FFFFFF" font-family="Arial Black,sans-serif" font-weight="900" font-size="68" letter-spacing="-2">M</text>';
      html+='<line x1="8" y1="72" x2="112" y2="72" stroke="#4A7EFF" stroke-width="2.5"/>';
      html+='<line x1="8" y1="78" x2="112" y2="78" stroke="#4A7EFF" stroke-width="1" opacity=".4"/>';
      html+='</svg></div>';
      // Badge concluído
      html+='<div class="mod-card-done-badge">✓</div>';
      // Lock
      html+='<div class="mod-card-lock">🔒</div>';
      html+='</div>';
      // Info
      html+='<div class="mod-card-info">';
      html+='<span class="mod-card-name">'+mod.name+'</span>';
      html+='<div class="mod-card-meta"><span>'+mod.topics.length+' tópicos</span></div>';
      html+='<div class="mod-card-prog"><div class="mod-card-prog-fill" style="width:'+pct+'%"></div></div>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  section.innerHTML=html;
}

/* ═══ MODAL DE MÓDULO ═══ */
var _modalMi=-1,_modalTi=0;
function openModModal(mi){
  var unlocked=isUnlocked();
  var canAcc=unlocked||mi<COURSE.freeModules;
  if(!canAcc){openLockScreen();return;}
  // Abre direto o primeiro tópico do módulo — sem mostrar modal de lista
  selectTopic(mi,0,true);
}
function closeModModal(e){
  if(e&&e.target!==document.getElementById('modModalBg'))return;
  document.getElementById('modModalBg').classList.remove('open');
}
function renderModModalTopics(){
  var mod=MODS[_modalMi];
  var prog=gProg();
  var unlocked=isUnlocked();
  var canAcc=unlocked||_modalMi<COURSE.freeModules;
  // Corpo — lista de tópicos
  var html='';
  mod.topics.forEach(function(t,ti){
    var done=!!prog[mod.id+'_'+t.id];
    var isActive=ti===_modalTi;
    var cls='mod-topic-item'+(done?' done-t':'')+(isActive?' active-t':'');
    html+='<div class="'+cls+'" onclick="modSelectTopic('+ti+')">';
    html+='<div class="mod-topic-num">'+(done?'✓':(ti+1))+'</div>';
    html+='<div class="mod-topic-info">';
    html+='<span class="mod-topic-name">'+t.name+'</span>';
    html+='<span class="mod-topic-dur">'+t.dur+'</span>';
    html+='</div>';
    html+='<span class="mod-topic-arrow">›</span>';
    html+='</div>';
  });
  document.getElementById('modModalBody').innerHTML=html;
  // Footer
  var total=mod.topics.length;
  document.getElementById('modModalStep').textContent=(_modalTi+1)+' / '+total;
  document.getElementById('modModalPrev').disabled=_modalTi===0;
  var nextBtn=document.getElementById('modModalNext');
  if(_modalTi>=total-1){
    nextBtn.innerHTML='▶ Abrir Tópico <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 6 15 12 9 18"/></svg>';
  }else{
    nextBtn.innerHTML='Avançar <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 6 15 12 9 18"/></svg>';
  }
  // Scroll para o tópico ativo
  setTimeout(function(){
    var items=document.querySelectorAll('.mod-topic-item');
    if(items[_modalTi])items[_modalTi].scrollIntoView({block:'nearest',behavior:'smooth'});
  },50);
}
function modSelectTopic(ti){
  _modalTi=ti;
  renderModModalTopics();
}
function modModalNav(dir){
  var mod=MODS[_modalMi];
  var newTi=_modalTi+dir;
  if(newTi<0)return;
  if(newTi>=mod.topics.length){
    // Abre o tópico atual
    document.getElementById('modModalBg').classList.remove('open');
    selectTopic(_modalMi,_modalTi,true);
    return;
  }
  _modalTi=newTi;
  renderModModalTopics();
}

/* Cores CSS de cada nome */
var _colorMap = {
  amarelo:'rgba(251,191,36,.9)',
  verde:'rgba(34,197,94,.85)',
  azul:'rgba(91,127,255,.9)',

/* Atualiza visual do botão (badge + bolinha de cor) */
function _updatePenUI(){
  var pen=document.getElementById('floatingPen');
  var badge=document.getElementById('fpStatusBadge');
  var dot=document.getElementById('fpColorDot');
  if(!pen)return;
  if(_penActive){
    pen.classList.add('pen-on');
    if(badge){badge.textContent='ON';}
    if(dot){dot.style.background=_colorMap[_activeHlColor]||_colorMap.amarelo;}
    document.body.classList.add('pen-mode-active');
    document.body.className=document.body.className.replace(/\bpen-\w+\b/g,'').trim();
    document.body.classList.add('pen-mode-active','pen-'+_activeHlColor);
  }else{
    pen.classList.remove('pen-on');
    if(badge){badge.textContent='OFF';}
    document.body.classList.remove('pen-mode-active');
    document.body.className=document.body.className.replace(/\bpen-\w+\b/g,'').trim();
  }
}

/* Toggle ON/OFF da canetinha (chamado ao clicar no botão sem arrastar) */
function fpToggleMode(){
  _penActive=!_penActive;
  _updatePenUI();
  showToast(_penActive?'✏️ Canetinha ATIVADA — toque no texto para marcar':'✏️ Canetinha desativada',_penActive?'ok':'');
}

function fpSelectColor(c){
  _activeHlColor=c;

/* Auto-highlight por clique/toque no texto da aula quando caneta ON */
function _setupPenClickHighlight(){
  // Delegação de evento — funciona para conteúdo dinâmico (tópicos renderizados depois)
  var main=document.getElementById('courseMain')||document.body;

  function isInContent(node){
    var el=node.nodeType===3?node.parentElement:node;
    return !!(el&&(el.closest('.ml-topic-content')||el.closest('#lessonContent')));
  }

  function highlightAtPoint(x,y){
    if(!_penActive)return;
    var range;
    if(document.caretRangeFromPoint){range=document.caretRangeFromPoint(x,y);}
    else if(document.caretPositionFromPoint){var pos=document.caretPositionFromPoint(x,y);if(!pos)return;range=document.createRange();range.setStart(pos.offsetNode,pos.offset);range.setEnd(pos.offsetNode,pos.offset);}
    else return;
    if(!range)return;
    var node=range.startContainer;
    if(node.nodeType!==3)return;
    if(!isInContent(node))return;
    var txt=node.textContent;
    var off=range.startOffset;
    var start=off;while(start>0&&!/\s/.test(txt[start-1]))start--;
    var end=off;while(end<txt.length&&!/\s/.test(txt[end]))end++;
    if(start===end)return;
    var wordRange=document.createRange();
    wordRange.setStart(node,start);wordRange.setEnd(node,end);
    _curRange=wordRange;
    applyHighlight(_activeHlColor);
  }

  main.addEventListener('click',function(e){
    if(!_penActive)return;
    if(!isInContent(e.target))return;
    e.preventDefault();e.stopPropagation();
    highlightAtPoint(e.clientX,e.clientY);
  });
  main.addEventListener('touchend',function(e){
    if(!_penActive)return;
    var t2=e.changedTouches[0];
    var el=document.elementFromPoint(t2.clientX,t2.clientY);
    if(!el||!isInContent(el))return;
    highlightAtPoint(t2.clientX,t2.clientY);
  });
}

function initFloatingPen(){
  var pen=document.getElementById('floatingPen');
  var btn=document.getElementById('fpBtn');
  var palette=document.getElementById('fpPalette');
  if(!pen||!btn)return;

  /* Inicializa visual */
  _updatePenUI();
  // Bolinha de cor inicial
  var dot=document.getElementById('fpColorDot');
  if(dot)dot.style.background=_colorMap[_activeHlColor]||_colorMap.amarelo;

  var _dragging=false,_startX,_startY,_origX,_origY,_longPressTimer=null;

  /* Mouse — drag ou click simples (toggle) ou click-direito (paleta) */
  btn.addEventListener('contextmenu',function(e){e.preventDefault();palette.classList.toggle('open');});
  btn.addEventListener('mousedown',function(e){
    _dragging=false;_startX=e.clientX;_startY=e.clientY;
    var r=pen.getBoundingClientRect();_origX=r.left;_origY=r.top;
    function onMove(e){var dx=e.clientX-_startX,dy=e.clientY-_startY;
      if(Math.abs(dx)>4||Math.abs(dy)>4){_dragging=true;}
      if(_dragging){pen.style.left=Math.max(0,_origX+dx)+'px';pen.style.top=Math.max(0,_origY+dy)+'px';pen.style.right='auto';pen.style.bottom='auto';}}
    function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
      if(!_dragging){
        if(palette.classList.contains('open')){palette.classList.remove('open');}
        else{fpToggleMode();}
      }}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);e.preventDefault();
  });

  /* Touch — drag, tap (toggle) ou toque longo (paleta) */
  btn.addEventListener('touchstart',function(e){
    _dragging=false;var tc=e.touches[0];_startX=tc.clientX;_startY=tc.clientY;
    var r=pen.getBoundingClientRect();_origX=r.left;_origY=r.top;
    // Toque longo (500ms) → abre paleta de cores
    _longPressTimer=setTimeout(function(){
      if(!_dragging){palette.classList.toggle('open');}
    },500);
    function onMove(e){var tc=e.touches[0];var dx=tc.clientX-_startX,dy=tc.clientY-_startY;
      if(Math.abs(dx)>4||Math.abs(dy)>4){_dragging=true;clearTimeout(_longPressTimer);}
      if(_dragging){pen.style.left=Math.max(0,_origX+dx)+'px';pen.style.top=Math.max(0,_origY+dy)+'px';pen.style.right='auto';pen.style.bottom='auto';}}
    function onEnd(){clearTimeout(_longPressTimer);document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onEnd);
      if(!_dragging&&!palette.classList.contains('open')){fpToggleMode();}
      else if(!_dragging&&palette.classList.contains('open')){/* já abriu no longpress, não fecha */}}
    document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onEnd);e.preventDefault();
  },{passive:false});

  /* Setup do auto-highlight por clique/toque */
  _setupPenClickHighlight();
}
function showFloatingPen(){var p=document.getElementById('floatingPen');if(p)p.style.display='block';}
function hideFloatingPen(){var p=document.getElementById('floatingPen');if(p)p.style.display='none';}

/* ═══ LOGO INTERATIVA — SOM DE GOTA + ONDAS DE PISCINA ═══ */
function playDropSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Oscilador principal — tom descendente tipo gota
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    var filter=ctx.createBiquadFilter();

    filter.type='lowpass';
    filter.frequency.value=1800;
    filter.Q.value=6;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    osc.type='sine';
    // Frequência começa alta e cai — efeito "glot" de gota
    var t=ctx.currentTime;
    osc.frequency.setValueAtTime(980,t);
    osc.frequency.exponentialRampToValueAtTime(260,t+0.18);
    osc.frequency.exponentialRampToValueAtTime(130,t+0.32);

    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.38,t+0.015);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.38);

    osc.start(t);
    osc.stop(t+0.42);

    // Sub-grave que dá o "ploc" inicial da gota
    var osc2=ctx.createOscillator();
    var gain2=ctx.createGain();
    osc2.connect(gain2);gain2.connect(ctx.destination);
    osc2.type='sine';
    osc2.frequency.setValueAtTime(320,t);
    osc2.frequency.exponentialRampToValueAtTime(60,t+0.12);
    gain2.gain.setValueAtTime(0.28,t);
    gain2.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    osc2.start(t);osc2.stop(t+0.16);
  }catch(e){}
}

function logoDropEffect(el){
  // Som de gota
  playDropSound();

  // Pega o container de ondas dentro do elemento
  var rc=el.querySelector('.logo-ripple-container');
  var svg=el.querySelector('.logo-svg');
  if(!rc||!svg)return;

  // Animação da logo — splash tipo piscina
  svg.classList.remove('splashing');
  void svg.offsetWidth; // reflow para resetar
  svg.classList.add('splashing');
  svg.addEventListener('animationend',function(){svg.classList.remove('splashing');},{once:true});

  // Remove ondas antigas
  rc.querySelectorAll('.logo-ripple,.logo-drop').forEach(function(r){r.remove();});

  // Gota visual caindo
  var drop=document.createElement('div');
  drop.className='logo-drop';
  rc.appendChild(drop);
  setTimeout(function(){drop.remove();},600);

  // 3 ondas concêntricas
  for(var i=0;i<3;i++){
    (function(idx){
      setTimeout(function(){
        var r=document.createElement('div');
        r.className='logo-ripple';
        rc.appendChild(r);
        setTimeout(function(){r.remove();},1000);
      },idx*60);
    })(i);
  }
}

/* ═══ INTERSECTION OBSERVER — pausa animações fora da tela ═══ */
(function(){
  if(!window.IntersectionObserver)return;
  var coverAnimEls=[];
  function initCoverObserver(){
    var cover=document.getElementById('courseCoverSection');
    if(!cover)return;
    coverAnimEls=cover.querySelectorAll('.cover-grid,.cover-scan,.cover-horizon,.cover-orb,.logo-svg');
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        coverAnimEls.forEach(function(el){
          el.style.animationPlayState=entry.isIntersecting?'running':'paused';
        });
      });
    },{threshold:0.05});
    obs.observe(cover);
  }
  document.addEventListener('DOMContentLoaded',function(){setTimeout(initCoverObserver,500);});
})();

var _isLight=false;
function initTheme(){
  var saved=localStorage.getItem('ma_theme');
  _isLight=(saved==='light');
  _applyTheme();
}
function toggleTheme(){
  _isLight=!_isLight;
  localStorage.setItem('ma_theme',_isLight?'light':'dark');
  _applyTheme();
  showToast(_isLight?'☀️ Tema claro ativado':'🌙 Tema escuro ativado','ok');
}
function _applyTheme(){
  document.body.classList.toggle('light',_isLight);
  document.getElementById('themeIconSun').style.display=_isLight?'block':'none';
  document.getElementById('themeIconMoon').style.display=_isLight?'none':'block';
}
