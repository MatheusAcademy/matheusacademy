    dur: '15 min',
    content: `<h3>A Criação: Obra Magnífica do Deus Vivo</h3>
<p>Querido estudante, que privilégio extraordinário podemos ter ao compreender que fomos criados por um Deus amoroso! No início, quando Deus criou os céus e a terra, Ele manifestou Seu poder incomparável. Tudo foi feito segundo Sua palavra: "Disse Deus: Fiat lux - Faça-se luz." E a luz se fez! Que criador magnificente!</p>

<p>Que privilégio maravilhoso ser uma criatura feita à imagem do Criador! Isto não significa que somos deuses, mas que refletimos algo da natureza divina. Temos capacidade de raciocinar, de amar, de criar, de escolher livremente — estas são qualidades que espelham a natureza de Deus. Somos racionais, morais, espirituais e relacionais, assim como nosso Criador!</p>

<h4>O Livre Arbítrio: O Dom Precioso da Escolha</h4>

<p>Adam e Eva foram colocados no Jardim do Éden, um lugar de perfeição, beleza e comunhão com Deus. Tinham tudo que precisavam — alimento abundante, trabalho significativo, comunhão com o Criador. Deus até lhes deu o direito de nomearem os animais! Que responsabilidade honrosa! Mas também lhes deu um comando, um teste de sua lealdade: não deveriam comer da árvore do conhecimento do bem e do mal. Este comando tinha um propósito espiritual profundo.</p>

<h4>A Comunhão Original com Deus</h4>
<p>Oh, como era perfeita aquela comunhão com Deus no Éden! Não havia separação entre o criador e a criatura. Adão e Eva andavam com Deus no jardim, conversavam com Ele face a face, experimentavam Seu amor direto, Sua provisão perfeita. Não havia culpa, não havia vergonha, não havia medo. Era pura harmonia, pura paz, puro shalom — a paz completa de Deus que tudo satisfaz.</p>

<p>Esta é a imagem que devemos guardar em nosso coração: Deus desejava comunhão com Suas criaturas! Não criou o homem para servi-lo como escravo, mas para relacionar-se com ele, para que o homem experimentasse Seu amor e conhecesse Sua vontade. A primeira finalidade da criação do homem era glorificar a Deus através de relacionamento vivo, dinâmico e amoroso.</p>

<h4>A Responsabilidade Delegada</h4>

<p>Esta delegação de autoridade revela a confiança de Deus no homem. Deus não apenas criou o universo e depois desapareceu. Ele envolveu o homem no processo contínuo de cuidar da criação, de desenvolver a terra, de exercer domínio sábio e amoroso sobre as criaturas. Isto dignifica o trabalho humano! O trabalho não é punição — é vocação, é chamado divino!</p>

<h4>O Propósito Eterno Revelado na Criação</h4>

<p>Aleluia! Esta é a beleza do plano redentor de Deus! Ele não nos criou para nos abandonar, mas para estar conosco eternamente. A criação à imagem de Deus é o fundamento sobre o qual toda a redenção é construída. Cristo virá restaurar a imagem perdida, renovar a comunhão quebrada e estabelecer um novo céu e nova terra onde seremos eternamente com Deus!</p>`,

    content: `<h3>O Pecado: A Ruptura da Comunhão Perfeita</h3>
<p>Amado irmão, irmã, agora precisamos confrontar uma verdade dolorosa mas absolutamente necessária: a queda da humanidade no pecado. Foi um momento de ruptura total, de separação entre o Criador e Suas criaturas. Satanás, aquela serpente astuta, aquele que se rebelou contra Deus no princípio dos tempos, tentou Adão e Eva não apenas para prejudicá-los, mas para afastar a humanidade do seu Criador amoroso.</p>

<p>Que consequências imediatas! Seus olhos se abriram, mas não para o bem — abriram-se para a vergonha. Viram-se nus e tiveram medo de Deus. A comunhão perfeita foi quebrada instantaneamente! Aquele shalom, aquela paz perfeita, desapareceu. Agora havia culpa, havia separação, havia medo do Criador que antes era tão próximo e amoroso.</p>

<h4>O Castigo Justo e Terrível</h4>
<p>Deus havia dito: "No dia em que dela comeres, certamente morrerás." E assim aconteceu — não uma morte imediata e física apenas, mas uma morte espiritual instantânea, uma separação de Deus que levaria à morte física eventual. A morte entrou no mundo através do pecado. "Portanto, como por um homem entrou o pecado no mundo, e pelo pecado a morte, assim também a morte passou a todos os homens, porque todos pecaram" (Romanos 5:12).</p>

<p>Mais ainda — o trabalho que era vocação divina tornou-se labuta dolorosa. A mulher experimentaria dor ao dar à luz. O relacionamento entre homem e mulher seria marcado por tensão. A natureza se corrupiria. O paraíso foi perdido. Adão e Eva foram expulsos do Éden, separados daquela presença divina que antes era seu gozo supremo.</p>

<h4>A Universalidade do Pecado</h4>
<p>Mas oh, como esta verdade é crucial para entendermos tudo que vem depois! O pecado de Adão não ficou apenas com ele. Ele representava toda a humanidade. Todos fomos incluídos naquela transgressão. Todos nós herdamos uma natureza pecaminosa, uma inclinação para o mal, uma separação de Deus. "Todos nós erramos e estamos privados da glória de Deus" (Romanos 3:23).</p>

<p>Veja só a seriedade disto: não somos apenas fracos, não somos apenas ignorantes. Somos pecadores! Temos uma condição espiritual que nos separa de Deus. O Senhor é santo, absolutamente puro, e não pode estar na presença do pecado. Mas nós somos contaminados pelo pecado. Há um abismo entre Deus e nós que não podemos transpor com nossas próprias forças.</p>

<h4>A Necessidade Absoluta da Redenção</h4>
<p>É aqui que a Boa Notícia brilha como um farol na escuridão! Se estávamos perdidos, separados, condenados, precisávamos de um Salvador. E é exatamente isto que Deus, em Sua infinita misericórdia e amor, providenciou! Não nos deixou órfãos, não nos abandonou na escuridão do pecado.</p>

<p>Imediatamente após a queda, já no Gênesis 3:15, vemos a primeira profecia messiânica: "E porei inimizade entre ti e a mulher, e entre a tua descendência e a sua descendência; esta te ferirá a cabeça, e tu lhe ferirás o calcanhar." Isto fala de Cristo! O descendente da mulher que venceria o inimigo supremo, que quebraria o poder do pecado e da morte!</p>

<h4>O Caminho da Redenção Foreshadowado</h4>
<p>Vemos isto continuado quando Deus faz vestes de pele para Adão e Eva, cobrindo sua vergonha e nudez. Animais foram mortos para isto — havia derramamento de sangue, morte substitutiva. Esta é a antecipação do sacrifício de Cristo! "Sem derramamento de sangue não há remissão de pecados" (Hebreus 9:22). Deus estava já ensinando que a solução para o pecado envolvia morte, substituto e sangue derramado.</p>

<p>O sistema sacrificial que Deus estabeleceria posteriormente, através de Abraão, Moisés e os profetas, era todo um apontar para o Sacrifício Final, para o Cordeiro de Deus que tira o pecado do mundo! Glórias ao Senhor! Mesmo em nossa condenação, Deus nos oferecia esperança redentora!</p>

<h4>A Esperança em Meio à Queda</h4>
<p>Então, queridos irmãos, embora tenhamos caído no pecado, embora tenhamos sido separados de Deus, temos esperança firme e inabalável! Porque Deus, sabendo que caeríamos, já tinha planejado nossa redenção. Ele não foi pego de surpresa. Seu plano de salvação foi designado "desde a fundação do mundo" (Apocalipse 13:8). Aleluia!</p>`,

    content: `<h3>O Papel Vital do Espírito Santo na Redenção</h3>
<p>Aleluia! Bendito seja o Espírito Santo de Deus! Nós, na tradição Pentecostal e Assembleiana, entendemos profundamente a importância vivificadora do Espírito Santo. Ele não é meramente uma força impessoal ou um símbolo — Ele é Deus Espírito, a terceira pessoa da Trindade Santa, tão verdadeiro e tão real quanto o Pai e o Filho!</p>

<p>O Espírito Santo é aquele que executa a obra da redenção em nossos corações. Enquanto Cristo realizou a redenção objetiva na cruz do Calvário — pagando o preço pelo nosso pecado com Seu sangue — o Espírito Santo realiza a aplicação subjetiva dessa redenção em cada vida! Ele é o executor do plano redentor de Deus em nossas almas.</p>

<h4>A Convicção do Pecado: O Trabalho Inicial do Espírito</h4>
<p>Jesus nos disse em João 16:8-11: "E quando ele vier, convencerá o mundo do pecado, da justiça e do juízo." Esta é a obra primária do Espírito Santo — convencer! Não condemnar permanentemente, mas convencer de modo que nos leve ao arrependimento genuíno.</p>

<p>Oh, como isto é maravilhoso! Nós, que estávamos perdidos no pecado, cegos espiritualmente, mortos espiritualmente, precisávamos daquele que pudesse abrir nossos olhos para ver a realidade terrível de nosso estado separado de Deus. O Espírito Santo faz isto! Ele traz à nossa consciência a verdade do pecado. Não de forma condenatória apenas, mas de forma que nos leva a um santo desejo de mudar, de voltar para Deus.</p>

<p>Quantas vezes ouvimos testemunhos de pessoas que, sem qualquer motivo aparente, de repente sentiram peso tremendamente em seus corações por seus pecados? Isto é o Espírito Santo convencendo! É aquele incômodo que não sai, aquele vazio que nenhuma diversão preenche, aquele desejo de paz que o mundo não pode oferecer. É o Espírito Santo tocando aquele coração endurecido!</p>

<h4>A Convicção da Justiça de Deus</h4>
<p>Mas o Espírito não apenas nos convence do pecado — nos convence também da justiça! Ele nos mostra que há um Deus justo, santo e perfeito, cujos padrões nós não apenas violamos, mas que continua nos oferecendo graça e misericórdia. A justiça de Deus é manifesta quando vemos que Ele não ignora o pecado, mas que também não retém Sua misericórdia.</p>

<p>Quando compreendemos a justiça de Deus através do Espírito Santo, entendemos que não há qualquer desculpa para o pecado. Não podemos culpar Adão, culpar o diabo, culpar circunstâncias. Somos responsáveis. Mas simultaneamente, reconhecemos que Deus, em Sua justiça perfeita, oferece uma saída: Cristo! A justiça de Deus é satisfeita apenas quando nos arrependemos verdadeiramente e abraçamos Cristo como Senhor e Salvador.</p>

<h4>A Convicção do Juízo Vindouro</h4>
<p>O Espírito também nos convence do juízo! Há um dia em que Deus julgará toda a humanidade. "Porque está estabelecido aos homens morrerem uma só vez, e depois disto o juízo" (Hebreus 9:27). Esta é uma verdade sóbria mas absolutamente real. O Espírito Santo nos torna cientes disto, não para nos aterrorizar, mas para nos levar a uma decisão urgente por Cristo.</p>

<p>Quando entendemos que haverá um juízo, que não podemos escapar, que nossa vida tem consequências eternas, isto muda tudo! Deixamos de brincar com o pecado. Deixamos de adiar nossa decisão por Cristo. O Espírito Santo cria em nós uma urgência santa de nos reconciliarmos com Deus enquanto ainda há tempo!</p>

<h4>O Arrependimento que Leva à Conversão</h4>
<p>É esta convicção tríplice — convicção de pecado, de justiça e de juízo — que leva a um arrependimento genuíno. E note bem: não é qualquer arrependimento. É o arrependimento que a Bíblia chama de metanoia em grego — uma mudança de mente, uma volta de 180 graus, uma transformação completa de direção.</p>

<p>O arrependimento não é simplesmente sentir-se mal pelos nossos pecados. Muitas pessoas se sentem mal e continuam no mesmo caminho. O arrependimento bíblico é uma decisão de deixar o pecado, de virar costas para o caminho errado e abraçar o caminho certo com todo o nosso ser. É interior e exterior. É coração e ações. É transformação real!</p>

<h4>A Obra Contínua do Espírito na Vida do Crente</h4>
<p>Mas a obra do Espírito Santo não termina na conversão — ela continua! O Espírito que nos convenceu e nos levou a Cristo agora nos habita, nos transforma, nos capacita para viver para Deus. Ele é a garantia de nossa herança eterna (Efésios 1:13-14). Ele nos consolida na fé, nos fortalece, nos dá poder para testemunhar, para amar, para servir.</p>

<p>Em Atos 1:8, Jesus promete: "Mas recebereis poder, vindo sobre vós o Espírito Santo, e sereis minhas testemunhas." Esta é a promessa Pentecostal que tanto valoramos! O Espírito Santo capacita os crentes com poder sobrenatural para proclamar o evangelho, para realizar milagres, para transformar vidas. Que privilégio extraordinário!</p>

<h4>A Certeza que o Espírito Testemunha em Nossos Corações</h4>
<p>E acima de tudo, o Espírito Santo testemunha em nossos corações que somos filhos de Deus! "O próprio Espírito testifica com nosso espírito que somos filhos de Deus" (Romanos 8:16). Querido, isto é o cúmulo da graça! Não apenas fomos salvos — somos filhos! Temos um Pai celeste que nos ama profundamente!</p>

<p>Aleluia! Isto é a Boa Notícia em seu cerne! Aquele que nos convenceu do pecado e nos levou a Cristo, o próprio Espírito Santo, agora habita em nós, testemunhando constantemente de nosso relacionamento restituo com Deus. Que segurança, que paz, que alegria isto proporciona ao coração do crente verdadeiro!</p>`,

      {q: "Como o Espírito Santo continua agindo após a conversão?", a: "Habita no crente, o transforma, capacita com poder sobrenatural para testemunho, e testifica que somos filhos de Deus."}

    dur: '15 min',
    content: `<h3>Compreendendo as Alianças Divinas</h3>
<p>Irmãos e irmãs, um dos conceitos mais importantes para entender a narrativa bíblica é o conceito de aliança! Uma aliança é um pacto solene, um acordo divino através do qual Deus Se compromete a cumprir Suas promessas. Não é uma negociação entre iguais — é a promessa de um Deus Santo e Todo-Poderoso aos Seus filhos.</p>

<p>As alianças de Deus estruturam toda a história da redenção. Elas não são fluidas ou mutáveis — quando Deus estabelece uma aliança, Ele a cumpre completamente, sempre e para sempre. Esta é a confiabilidade de Deus! Quando Ele faz uma promessa, podemos contar com ela como a coisa mais certa do universo.</p>

<h4>A Aliança de Abraão: A Aliança da Promessa</h4>
<p>Abraão é chamado o pai de todos os fiéis, e com razão! Deus chamou Abraão quando ele estava em Ur dos Caldeus e lhe disse: "Sai da tua terra, da tua parentela e da casa de teu pai, e vai para a terra que eu te mostrarei. Far-te-ei uma grande nação, e te abençoarei, engrandecerei teu nome, e tu serás uma bênção" (Gênesis 12:1-2).</p>

<p>Que chamado extraordinário! Abraão não sabia para onde ia, mas confiou em Deus. Deixou tudo: sua segurança, sua família, sua terra conhecida. Isto é fé! E Deus recompensou essa fé estabelecendo uma aliança com Abraão. Prometeu-lhe uma descendência inumerável como as estrelas do céu, prometeu dar-lhe a terra de Canaã, prometeu que através de sua descendência todas as nações seriam abençoadas.</p>

<p>Observem isto: a promessa de que "todas as nações seriam abençoadas" através de Abraão aponta para Cristo! Porque é através de Cristo, o descendente final de Abraão, que a bênção da salvação chega a todas as nações. Toda a história redentora de Deus estava resumida naquela aliança com Abraão!</p>

<h4>A Aliança de Moisés: A Aliança da Lei</h4>
<p>Séculos depois, quando Israel foi escravizado no Egito, Deus levantou Moisés para libertar Seu povo. Com grande poder — as dez pragas terrificantes — Deus demonstrou Seu poder sobre os deuses do Egito e libertou Seu povo. Os israelitas saíram do Egito com mão poderosa!</p>

<p>No Monte Sinai, Deus estabeleceu outra aliança, a Aliança da Lei. Deus ofereceu a Israel a Lei — os Dez Mandamentos e toda a estrutura legal que os ordenaria como povo de Deus. Isto não era uma aliança de salvação — não se salva guardando a Lei. Era uma aliança de regulação, de como o povo do Deus deveria viver em comunidade, refletindo a santidade de Deus.</p>

<p>A Lei era um pedagogo para levar a Cristo (Gálatas 3:24). Ela revelava a santidade de Deus, mostrava ao homem seus pecados, o humilhava diante de Deus. Quando alguém tentava guardar a Lei, descobria que era impossível — porque a Lei é perfeita mas nós somos pecadores. Isto nos preparava para recebermos a graça de Cristo!</p>

<h4>A Aliança de Davi: A Aliança Dinástica</h4>
<p>Deus também estabeleceu uma aliança com o Rei Davi. Por causa da fidelidade de Davi (embora imperfeita), Deus prometeu que seu trono seria estabelecido para sempre, que haveria sempre um descendente seu sentado no trono (2 Samuel 7:12-16). Esta aliança também aponta para Cristo, o Rei Eterno que virá do trono de Davi!</p>

<p>Cristo é o cumprimento desta aliança davídica. Ele é o Rei dos reis, sentado no trono eterno, Seu reino nunca terá fim. Quando Jesus é chamado "Filho de Davi" no Novo Testamento, está sendo reconhecido como o cumprimento desta promessa aliançal que Deus fez a Davi!</p>

<h4>A Nova Aliança: O Cumprimento em Cristo</h4>
<p>Mas a culminação de todas as alianças é a Nova Aliança em Cristo Jesus! O profeta Jeremias predisse isto: "Eis que vêm dias, diz o Senhor, em que farei uma aliança nova com a casa de Israel e com a casa de Judá... porei a minha lei no seu interior e a escreverei no seu coração" (Jeremias 31:31-33).</p>

<p>A Nova Aliança não é escrita em tábuas de pedra — é escrita nos corações! Não é externa — é interna, transformadora, regeneradora! Esta aliança foi inaugurada pelo sangue de Cristo na cruz do Calvário. O próprio Jesus, na Última Ceia, disse: "Este é o meu sangue da nova aliança, derramado em favor de muitos, para remissão de pecados" (Mateus 26:28).</p>

<h4>A Segurança Eterna da Aliança</h4>
<p>Oh, que segurança magnífica temos em Cristo através da Nova Aliança! Nós que cremos em Jesus somos herdeiros de todas as promessas aliançais de Deus. Somos filhos de Abraão por fé em Cristo. Temos Seu Espírito escrito em nossos corações. Somos súditos do Rei Eterno, Jesus Cristo!</p>

<p>E porque a aliança é de Deus, não depende de nossas obras ou mérito. Deus a cumpre independentemente de nossas falhas. Isto é a segurança eterna do crente! Não somos guardados por nós mesmos, mas por Deus através de Cristo. Aleluia! Que maravilhoso Deus nós servimos!</p>`,
    cards: [
      {q: "O que é uma aliança divina segundo a teologia bíblica?", a: "Um pacto solene no qual Deus promete cumprir Suas promessas aos Seus filhos de maneira confiável e eterna."},
      {q: "Como as alianças anteriores apontam para Cristo?", a: "Abraão foi prometida uma bênção para todas as nações através de sua descendência; Davi foi prometido um rei eterno; Jeremias prometeu uma lei escrita no coração — tudo cumprido em Cristo."}
    ]

  {
    id: 5,
    name: 'Os Profetas: Mensageiros da Vontade de Deus',
    dur: '15 min',
    content: `<h3>O Ministério Profético através da História</h3>
<p>Queridos filhos de Deus, em nossa tradição Pentecostal, compreendemos profundamente a importância dos profetas. O profeta não é adivinho, não prediz o futuro por magia — o profeta é o porta-voz de Deus! É aquele a quem Deus revela Sua vontade e o capacita a proclamá-la com autoridade divina.</p>

<p>Os profetas do Antigo Testamento foram os intermediários entre Deus e Seu povo Israel. Quando Israel se desviava para a idolatria e o pecado, Deus levantava profetas para chamar o povo ao arrependimento. Quando a esperança de Israel se desvanecia, Deus levantava profetas para proclamar as promessas de redenção vindoura. Os profetas eram a consciência de Deus em Israel!</p>

<h4>Os Profetas Maiores: Proclamadores da Redenção</h4>
<p>Os profetas maiores — Isaías, Jeremias, Lamentações, Ezequiel e Daniel — proclamaram as maiores esperanças redentoras. Isaías é deslumbrante! Ele viu o Servo Sofredor de Deus em Isaías 53 — uma descrição tão detalhada e profunda de Cristo que parece que o profeta estava diante da cruz do Calvário!</p>

<p>Isaías predisse que o Servo seria desprezado, rejeitado, ferido por nossas iniquidades, angustiado, levado ao sacrifício, tendo sua vida oferecida por oferta pelo pecado. Mas também proclamou que "pelas suas feridas fomos sarados" (Isaías 53:5). Este é Cristo em toda Sua glória redentora! Cada detalhe da paixão de Cristo foi predito pelo profeta!</p>

<p>Jeremias, o profeta chorador, proclamava julgamento sobre Judá, mas também esperança: "Porque bem sei os pensamentos que penso de vós, diz o Senhor; pensamentos de paz, e não de mal, para vos dar um futuro e uma esperança" (Jeremias 29:11). Que promessa consoladora para todo crente que passa por tribulação!</p>

<h4>Os Profetas Menores: Apelos à Volta para Deus</h4>
<p>Os profetas menores — Oseias, Joel, Amós, Obadias, Jonas, Miquéias, Naum, Habacuc, Sofonias, Ageu, Zacarias e Malaquias — cada um proclamava uma mensagem específica adequada à época. Mas todos apontavam para a necessidade de arrependimento e apontavam para a vinda do Messias.</p>

<p>Miquéias predisse que o Messias nasceria em Belém (Miquéias 5:2) — e assim Jesus nasceu em Belém! Zacarias viu o Messias entrando em Jerusalém montado em um jumento (Zacarias 9:9) — e assim Jesus fez na Semana Santa! Cada profeta, com sua própria voz, contribuía à narrativa da vinda de Cristo.</p>

<p>Malaquias, o último profeta do Antigo Testamento, predisse que Deus levantaria um precursor: "Eis que eu envio o meu mensageiro, que há de preparar o caminho diante de mim" (Malaquias 3:1). Este é João o Batista, que veio preparar o caminho para Jesus!</p>

<h4>A Autoridade Profética: Fala de Deus</h4>
<p>Oh, que privilégio extraordinário ter profetas através dos quais Deus falava diretamente ao Seu povo! Os profetas diziam: "Assim diz o Senhor..." e isto era a palavra final, a vontade divina revelada. Não era opinião humana, era a voz de Deus através do profeta.</p>

<p>Por isto a Bíblia nos ensina que devemos testar os profetas (1 João 4:1). Nem todo aquele que fala em nome de Deus é verdadeiro profeta. Os verdadeiros profetas falam a verdade de Deus, suas palavras se cumprem, e eles levam as pessoas para mais perto de Deus, não para longe d'Ele.</p>

<h4>O Cumprimento em Cristo: O Maior Profeta</h4>
<p>Mas Jesus é o Profeta por excelência! Deuteronômio 18:15 predisse: "O Senhor teu Deus te levantará um profeta do meio de ti, de teus irmãos, como a mim; a ele ouvirás." Esta profecia refere-se a Cristo! Jesus é o maior profeta porque Ele não apenas fala a palavra de Deus — Ele É a Palavra de Deus (João 1:1)!</p>

<p>A revelação de Deus em Cristo é a revelação final e completa. A Carta aos Hebreus nos diz: "Havendo Deus, antigamente, falado muitas vezes, e de muitos modos, aos pais pelos profetas, a nós nos falou nestes últimos dias pelo Filho" (Hebreus 1:1-2). Cristo é o cumprimento de toda a revelação profética!</p>

<h4>O Espírito Santo e o Dom de Profecia Hoje</h4>
<p>Na tradição Pentecostal, cremos que o Espírito Santo continua capacitando os crentes com dons espirituais, incluindo o dom de profecia. Não no sentido de novos livros bíblicos — a Bíblia é a revelação completa de Deus. Mas no sentido de edificação, exortação e consolação (1 Coríntios 14:3). O Espírito Santo pode dar ao crente uma palavra para um irmão, uma exortação do Senhor, uma revelação da vontade de Deus.</p>

<p>Isto é tão bonito! O mesmo Espírito que falava através dos profetas do Antigo Testamento continua falando através de Seu povo hoje! Não somos profetas no sentido de ser autoridades canônicas como Isaías ou Jeremias. Mas temos acesso ao Espírito Santo que pode nos falar, nos guiar, nos capacitar com dons espirituais. Aleluia!</p>`,
    cards: [
      {q: "Qual é a função essencial de um profeta bíblico?", a: "Ser porta-voz de Deus, proclamar Sua vontade, chamar o povo ao arrependimento e apontar para a vinda de Cristo."},
      {q: "Como os profetas do Antigo Testamento apontavam para Cristo?", a: "Através de profecias detalhadas sobre Seu nascimento, morte, ressurreição e reino que se cumpriram perfeitamente em Jesus."}
    ]

  {
    id: 6,
    name: 'A Encarnação do Verbo Divino',
    dur: '15 min',
    content: `<h3>O Maior Mistério: Deus Se Tornando Homem</h3>
<p>Amados irmãos e irmãs, chegamos a um dos maiores mistérios da fé cristã: a Encarnação! Que verdade extraordinária, que transcende nossa compreensão humana! O Deus Eterno, Onipotente, o Criador de todas as coisas, se tornou homem. O Verbo divino foi feito carne. Aleluia!</p>

<p>João nos diz em João 1:1-3: "No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus. Ele estava no princípio com Deus. Todas as coisas foram feitas por intermédio dele, e sem ele nada do que foi feito se fez." Este é Cristo! O Verbo que era Deus, que estava com Deus desde a eternidade, que criou todas as coisas. E então, em João 1:14, a grande revelação: "E o Verbo se fez carne, e habitou entre nós, cheio de graça e de verdade."</p>

<h4>A Necessidade da Encarnação</h4>
<p>Por que Deus precisava se encarnar? Como poderia um Deus infinito se limitar em corpo finito? Como poderia o Sagrado habitar na humanidade pecadora? Estas são perguntas profundas, mas a resposta é clara: porque nós, pecadores, não poderíamos nos salvar sozinhos!</p>

<p>Nós estávamos perdidos, separados de Deus pelo pecado, condenados à morte eterna. Nenhuma obra humana poderia nos salvar. Nenhum profeta poderia pagar pela nossa redenção. Nenhuma criatura poderia satisfazer a justiça de Deus. Precisávamos de alguém que fosse completamente Deus para ter valor infinito, e completamente homem para nos representar!</p>

<p>É exatamente isto que Cristo é! Verdadeiro Deus e verdadeiro homem. Não metade Deus e metade homem. Não um mero homem elevado à divindade. Mas plenamente Deus e plenamente homem em uma pessoa. O mistério da incarnação é que a divindade não diminuiu a humanidade, nem a humanidade diminuiu a divindade!</p>

<h4>O Nascimento de Cristo: Cumprimento de Profecias</h4>
<p>A encarnação de Cristo teve cumprimento literal e histórico no nascimento de Jesus em Belém. Nascido de uma virgem, Maria, por ação do Espírito Santo — isto cumpriu a profecia de Isaías 7:14: "Eis que uma virgem conceberá, e dará à luz um filho, e será chamado pelo nome de Emanuel" (que significa "Deus conosco").</p>

<p>Belém era a cidade de Davi, exatamente como Miquéias havia predito. Magos vieram do oriente, levando presentes, reconhecendo o Rei recém-nascido. Tudo conforme as Escrituras! A encarnação não foi uma surpresa para Deus — foi planejada desde a fundação do mundo, anunciada através dos profetas, e chegou em Seu tempo perfeito.</p>

<h4>A Vida Encarnada de Cristo</h4>
<p>Durante trinta e três anos, Jesus viveu entre nós. Não foi um espectro, não foi apenas uma aparição. Comeu, dormiu, cansou-se, chorou. Mas ao mesmo tempo, realizava milagres impossíveis — curava os enfermos, ressuscitava os mortos, caminhava sobre as águas. Ele era plenamente humano em experiência, mas divino em poder!</p>

<p>E Cristo viveu uma vida de obediência perfeita. Em tudo O que fez, O que falou, O que pensou — foi completamente fiel a Seu Pai celeste. "Não fiz nada de mim mesmo, mas falo como o Pai me ensinou" (João 8:28). Esta é a perfeição de Cristo! Enquanto nós tropeçamos, falhamos, pecamos — Cristo foi o único que nunca pecou!</p>

<h4>O Significado Redentor da Encarnação</h4>
<p>Mas a encarnação não foi apenas para que Cristo vivesse entre nós. Foi para que pudesse morrer por nós! A culminação da encarnação é a cruz. Cristo veio em carne mortal para que em carne mortal pudesse derramar Seu sangue pelos nossos pecados.</p>

<p>A Bíblia diz que "Cristo, sendo em forma de Deus, não considerou usurpação ser igual a Deus, mas esvaziou-se a si mesmo, tomando forma de servo, fazendo-se semelhante aos homens" (Filipenses 2:6-7). Este é o amor incondicional de Deus! Aquele que tudo criou, que deveria ser adorado por todas as criaturas, humilhou-se até à morte, morte mesmo de cruz!</p>

<h4>A Glória da Encarnação no Coração do Crente</h4>
<p>Oh, que verdade gloriosa é isto para o coração do cristão! Deus não está distante, não está frio. Deus se tornou homem, experimentou as limitações humanas (exceto o pecado), conhece as nossas dores, as nossas tentações, as nossas fraquezas. A Bíblia nos diz: "Porque não temos um sumo sacerdote que não possa compadecer-se das nossas fraquezas; pelo contrário, aquele que, como nós, em tudo foi tentado, mas sem cometimento de pecado" (Hebreus 4:15).</p>

<p>Cristo é o Deus que entende, que se compadece, que sofre conosco. A encarnação nos diz que Deus ama tanto a humanidade que Se dispôs a Se tornar humano, a sofrer, a morrer, a ressuscitar! Que amor é este? Que Deus é este? Certamente o nosso Deus é único, digno de toda adoração e reverência! Aleluia!</p>`,
    cards: [
      {q: "O que significa a Encarnação do Verbo Divino?", a: "O Deus Eterno se tornou homem em Jesus Cristo — plenamente Deus e plenamente homem — para nossa redenção."},
      {q: "Por que a Encarnação era necessária para a salvação humana?", a: "Porque precisávamos de um Redentor que fosse completamente Deus (para ter valor infinito) e completamente homem (para nos representar e morrer por nossos pecados)."}
    ]

  {
    id: 7,
    name: 'A Morte Expiatória de Cristo no Calvário',
    dur: '15 min',
    content: `<h3>O Sacrifício Perfeito na Cruz</h3>
<p>Irmãos e irmãs queridos, chegamos ao coração do evangelho, à razão central pela qual toda a história bíblica existe: a morte redentora de Cristo na cruz do Calvário! Este é o evento mais importante não apenas da história cristã, mas de toda a história humana. Aqui, no Calvário, Deus pagou o preço pelo pecado da humanidade com o sangue do Cordeiro imaculado!</p>

<p>Cristo foi condenado injustamente por Pilatos, levado para o lugar chamado Caveira (Gólgota), e ali crucificado. A crucificação era a morte mais vergonhosa, a mais dolorosa conhecida pelos romanos. Os criminosos eram postos sobre uma cruz, expostos ao escárnio público, e deixados para sofrer e morrer lentamente. E Cristo, nosso Senhor, perfeito e sem culpa, experimentou esta morte abominável por nós!</p>

<h4>A Expiação: Cristo Como Nosso Substituto</h4>
<p>Mas não era meramente morte física que Cristo experimentava. Era morte substitutiva! A Bíblia nos ensina que Cristo morreu em nosso lugar, levando sobre Si a punição que nós merecíamos. "Ele foi ferido por nossas transgressões, e moído por nossas iniquidades; o castigo que nos dá a paz estava sobre ele, e pelas suas pisaduras fomos sarados" (Isaías 53:5).</p>

<p>Isto é a expiação — a propiciação pelo pecado. Cristo é o Cordeiro de Deus que tira o pecado do mundo! Assim como nos tempos do Antigo Testamento, um animal inocente era sacrificado em lugar do pecador, levando a culpa e a punição — assim Cristo, o Cordeiro perfeito e imaculado, foi oferecido em lugar de todos nós, levando os nossos pecados!</p>

<p>E note bem: a morte de Cristo não foi apenas um exemplo moral. Não foi apenas uma demonstração de amor. Foi um pagamento real, uma satisfação real da justiça de Deus. A pena pelo pecado é morte — "o salário do pecado é a morte" (Romanos 6:23). Cristo pagou este salário com Sua própria morte, satisfazendo completamente a justiça divina!</p>

<h4>A Propiciação: Deus Satisfeito</h4>
<p>Há um termo teológico lindo que descreve isto: propiciação. Significa "virar a ira." Deus, em Sua justiça, tem ira contra o pecado. Mas através do sangue de Cristo, a ira de Deus é voltada para longe do pecador arrependido. Deus está satisfeito! A justiça foi satisfeita! Podemos aproximar-nos de Deus sem medo porque Cristo já pagou tudo!</p>

<p>Hebreus 10:12 nos diz: "Mas este [Cristo], depois de ter oferecido um único sacrifício pelos pecados, assentou-se à destra de Deus." Único sacrifício! Não precisa ser repetido. Não precisa de novos sacrifícios de animais. Não precisa de nada mais. O sacrifício de Cristo é completo, suficiente, eterno!</p>

<h4>A Cruz: Demonstração de Amor e Justiça</h4>
<p>A cruz é simultaneamente a revelação do amor de Deus e de Sua justiça. Amor, porque Deus estava disposto a dar Seu único Filho para que não pereçamos. Justiça, porque Deus não ignorou o pecado — o castigou completamente em Cristo. Não há contradição — há uma harmonia perfeita!</p>

<p>Romanos 3:25-26 resume isto maravilhosamente: "Ao qual Deus propôs no seu sangue, como propiciação, mediante a fé, para demonstração da sua justiça, por ter ele na sua paciência deixado passar os pecados anteriormente cometidos; para demonstração, no tempo presente, da sua justiça, que ele seja justo e justificador daquele que tem fé em Jesus."</p>

<p>A cruz revela que Deus é radicalmente justo — Ele não pode deixar o pecado impune. Mas também revela que Deus é radicalmente amoroso — Ele mesmo paga o preço, em Cristo! Não temos uma religião onde Deus pune a criatura inocente (a vítima animal). Temos a religião onde Deus Se oferece a Si mesmo em sacrifício redimidor!</p>

<h4>A Redenção Consumada</h4>
<p>Na cruz, Cristo cumpriu a redenção. Pela Sua morte, todos os que crerem receberão perdão de pecados. Não será baseado em suas obras — será baseado no sacrifício de Cristo. "Se confessarmos os nossos pecados, ele é fiel e justo para nos perdoar os pecados e nos purificar de toda injustiça" (1 João 1:9).</p>

<p>E não é apenas perdão — é transformação! Quando entregamos nossas vidas a Cristo, quando nos apropriamos de Seu sacrifício, somos justificados. Isto significa que diante de Deus somos declarados justos, não baseado em nossa justiça (que é como trapos imundos), mas baseado na justiça de Cristo que nos é imputada!</p>

<h4>A Esperança da Redenção Eterna</h4>
<p>Oh, que esperança gloriosa é isto! Fomos redimidos — comprados com preço, o preço do sangue de Cristo! Não pertencemos mais ao pecado, não pertencemos mais ao diabo, não pertencemos mais ao mundo. Pertencemos a Cristo! Somos Seu povo, comprados com Seu sangue!</p>

<p>E esta redenção é eterna. Não é frágil, não depende de nós. Depende do sacrifício completo de Cristo. "Sabendo que fostes resgatados, não com coisa corruptível, como ouro ou prata, mas com sangue precioso, como de cordeiro sem defeito e sem mácula, Cristo, conhecido, com efeito, antes da fundação do mundo" (1 Pedro 1:18-20).</p>

<p>Aleluia! Gloria ao nosso Redentor! Que amor indizível! Que graça incomparável! Que segurança eterna! Fomos comprados com o sangue do Cordeiro. Nada, absolutamente nada, poderá nos separar deste amor (Romanos 8:38-39)! Isto é o evangelho em seu poder máximo!</p>`,
    cards: [
      {q: "O que significa a morte expiatória de Cristo?", a: "Cristo morreu em nosso lugar, levando sobre Si a punição pelos nossos pecados e satisfazendo completamente a justiça de Deus."},
      {q: "Como a Cruz demonstra simultaneamente a justiça e o amor de Deus?", a: "A justiça: Deus não ignorou o pecado, o castigou completamente. O amor: Deus mesmo se ofereceu em sacrifício para que fôssemos redimidos."}
    ]
  },
  {
    id: 8,
    name: 'A Ressurreição Vitoriosa e o Poder do Evangelho',
    dur: '15 min',
    content: `<h3>O Evento que Mudou a História</h3>
<p>Amados, se a morte de Cristo foi a conclusão de Sua obra redentora, a ressurreição é a validação e a vitória dessa obra! Se Cristo tivesse permanecido morto, o evangelho seria apenas um conto triste de um profeta injustamente executado. Mas Cristo ressuscitou! E com Sua ressurreição, toda a história mudou, toda a eternidade foi transformada, toda a esperança humana foi restaurada!</p>

<p>Os discípulos estavam desesperados. Seu Mestre, aquele a quem tinham seguido, em quem acreditavam ser o Messias, havia sido brutalmente executado. Eles se trancavam em uma casa por medo dos judeus, completamente derrotados e sem esperança. Tudo parecia perdido. O sepulcro havia fechado. Tudo havia terminado. Ou assim parecia...</p>

<h4>A Ressurreição de Cristo: Vitória sobre a Morte</h4>
<p>Mas no terceiro dia, o que ninguém esperava aconteceu! Cristo ressuscitou dos mortos! O sepulcro estava vazio. O corpo de Jesus não estava ali. Ele havia ressuscitado em poder e glória! A morte, aquele inimigo terrível, havia sido vencida! "Onde está, ó morte, a tua vitória? Onde está, ó morte, o teu aguilhão?" (1 Coríntios 15:55).</p>

<p>Mas não era um ressuscitamento qualquer. Cristo não era um fantasma. Seus discípulos O tocaram, comeram com Ele, conversaram com Ele. Era Seu corpo real, glorificado, transformado, mas real. Ele tinha ferimentos das chagas na cruz, que demonstravam que era verdadeiramente Ele. Mas simultaneamente, podia aparecer através de portas fechadas, podia desaparecer de vista, podia estar em múltiplos lugares — era um corpo glorificado, celestial!</p>

<p>A ressurreição de Cristo não foi apenas ressuscitamento para vida mortal de novo (como Lázaro, que depois morreu novamente). Foi ressurreição para vida eterna, vida imperecível, vida celestial! Cristo não apenas reviveu — ascendeu ao céu quarenta dias depois, assentado à destra de Deus Pai, onde reina eternamente!</p>

<h4>A Garantia da Ressurreição Futura do Crente</h4>
<p>Mas observe: Cristo foi ressuscitado como as primícias de uma colheita! Ele é "as primícias dos que dormem" (1 Coríntios 15:20). Isto significa que Sua ressurreição é a garantia e o modelo de nossa ressurreição futura! Se Cristo ressuscitou, aqueles que creem em Cristo também ressuscitarão!</p>

<p>Isto é uma verdade gloriosa para o coração do crente! Não morreremos permanentemente. Sim, nossos corpos morrem — isto é a consequência do pecado. Mas se temos recebido a graça de Deus através de Cristo, se temos sido salvos, seremos ressuscitados! Teremos novos corpos glorificados, semelhantes ao corpo ressuscitado de Cristo, e viveremos para sempre com Deus!</p>

<p>"Sabemos que aquele que ressuscitou ao Senhor Jesus ressuscitará também a nós com Jesus" (2 Coríntios 4:14). Que certeza é esta! Que esperança é esta! A morte não é o fim para o crente — é apenas uma transição, uma mudança, uma transformação para melhor!</p>

<h4>A Justificação através da Ressurreição</h4>
<p>A ressurreição de Cristo também é essencial para nossa justificação! A Bíblia diz: "Se Cristo não ressuscitou, vã é a nossa fé, e ainda estais nos vossos pecados" (1 Coríntios 15:17). Ou seja, se Cristo não ressuscitou, não há salvação, não há esperança! Mas porque Ele ressuscitou, temos justificação completa!</p>

<p>Romanos 4:25 é maravilhoso: "Ele, que foi entregue por causa dos nossos pecados, e ressuscitou por causa da nossa justificação." A morte de Cristo apagou nossos pecados; Sua ressurreição validou que a obra foi completada e agora somos justificados! Agora podemos ter certeza de que Deus aceitou o sacrifício de Cristo, porque a ressurreição é a confirmação de Deus!</p>

<h4>O Poder da Ressurreição na Vida do Crente</h4>
<p>Mas não apenas nossa justificação futura depende da ressurreição — nossa vida presente é transformada pelo poder da ressurreição! "Para que eu conheça a ele e o poder da sua ressurreição" (Filipenses 3:10), diz Paulo. O Espírito Santo nos capacita com o mesmo poder que ressuscitou Cristo!</p>

<p>Este é o poder pentecostal que tanto valorizamos! Quando o Espírito Santo nos enche, quando recebemos o batismo com o Espírito Santo, recebemos poder da ressurreição! Poder para vencer o pecado, poder para testemunhar com boldeza, poder para curar os enfermos, poder para proclamar o evangelho. É o poder que ressuscitou Cristo, agora operando em nós!</p>

<h4>A Ressurreição Como Penhor da Eternidade</h4>
<p>E finalmente, a ressurreição de Cristo é o penhor de nossa eternidade. Porque Ele vive, nós também viveremos! Porque Ele foi ressuscitado, podemos esperar ser ressuscitados! Porque Ele ascendeu ao céu, podemos esperar estar com Ele eternamente!</p>

<p>O apóstolo João teve uma visão na Ilha de Patmos do Cristo ressuscitado e glorificado. E o Cristo vivo e glorificado falou a João: "Eu sou o vivo; fui morto, mas agora vivo para sempre, e tenho as chaves da morte e do Hades" (Apocalipse 1:18). Cristo conquistou a morte! Cristo tem poder sobre a morte! Aquele que morreu por nós agora vive eternamente para interceder por nós!</p>

<p>Aleluia! Que Redentor glorioso! Que Salvador poderoso! A morte não pode nos separar dEle. O Hades não tem poder sobre aqueles que estão em Cristo. Temos esperança eterna porque Cristo ressuscitou! Gloria e honra ao nosso Senhor Ressuscitado!</p>`,
    cards: [
      {q: "Por que a Ressurreição de Cristo é tão importante para o evangelho?", a: "Porque valida que o sacrifício de Cristo foi aceito por Deus e é a garantia da ressurreição futura de todos que creem em Cristo."},
      {q: "Como a Ressurreição afeta a vida do crente hoje?", a: "O Espírito Santo nos capacita com o poder da ressurreição para vencer o pecado, testemunhar com poder e viver uma vida transformada."}

    content: `<h3>Vivendo com Esperança Celestial</h3>
<p>Querido povo de Deus, chegamos à culminação gloriosa de toda a história bíblica: o retorno de Cristo e o estabelecimento de Seu reino eterno! Isto não é apenas um detalhe doutrinário — isto é a esperança viva que sustenta todo crente cristão genuíno! Temos esperança não em circunstâncias terrenas, não em governos humanos, não em riquezas passageiras — temos esperança em Cristo e em Seu retorno!</p>

<p>O próprio Jesus prometeu isto antes de ascender ao céu. Falou a Seus discípulos: "Vou para a casa de meu Pai, para vos preparar lugar. Se assim não fora, vos o teria dito. Porque vou e vos levarei comigo; para que onde estou, estejais vós também" (João 14:2-3). Cristo está preparando um lugar para nós! E Ele virá novamente para nos buscar!</p>

<h4>A Promessa da Vinda de Cristo</h4>
<p>Os discípulos, quando viram Cristo ser levantado ao céu, ficaram olhando para cima. Mas dois anjos apareceram a eles e disseram: "Homens da Galileia, por que estais aí olhando para cima? Este Jesus, que dentre vós foi levado para o céu, há de vir assim como para o céu o vistes ir" (Atos 1:11).</p>

<p>Esta é a certeza bíblica: Jesus virá novamente! Não está vago quando — a Bíblia diz claramente que ninguém conhece o dia nem a hora, nem mesmo os anjos. Mas virá! A Bíblia o repete insistentemente: "Eis que venho em breve" (Apocalipse 22:12). Este é um motivo de gozo inexprimível para todo crente!</p>

<h4>O Propósito da Segunda Vinda de Cristo</h4>
<p>Cristo virá para cumprir o que começou em Sua primeira vinda. Virá para buscar Sua noiva, a Igreja (1 Tessalonicenses 4:16-17). Os crentes que estão vivos serão arrebatados juntamente com aqueles que já dormiram em Cristo — ressuscitados — e serão levados ao encontro do Senhor nos ares. Que maravilha! Que gloria!</p>

<p>Virá também para julgar — o juízo final sobre os ímpios e o prêmio eterno para os justos. "Quando o Filho do Homem vier em sua glória, com todos os seus anjos, então se sentará no trono da sua glória; e todas as nações serão reunidas diante dele; e apartará uns dos outros, como o pastor aparta as ovelhas dos cabritos" (Mateus 25:31-32).</p>

<h4>A Transformação da Criação: Novo Céu e Nova Terra</h4>
<p>Mas ainda mais glorioso: Cristo virá para renovar toda a criação! A Bíblia nos fala de "novo céu e nova terra" (Apocalipse 21:1). Este não é destruição — é transformação! A criação corrupta pelo pecado será restaurada, transformada em sua forma perfeita e eterna. As coisas que conhecemos serão renovadas. Não estaremos em um estado espiritual vago — teremos novos corpos glorificados em uma terra real, nova e perfeita!</p>

<p>"Vi nova Jerusalém que descia do céu, vinda de Deus, preparada como noiva adornada para seu esposo... e ouvi uma grande voz do trono que dizia: Eis aqui está o tabernáculo de Deus com os homens, pois com eles habitará. Eles serão povos de Deus, e o próprio Deus estará com eles. Enxugará dos seus olhos toda lágrima; e não haverá mais morte, nem pranto, nem clamor, nem dor; porque as primeiras coisas já passaram" (Apocalipse 21:2-4).</p>

<p>Observe: Deus estará pessoalmente com Seu povo! Não haverá mais separação, não haverá mais dor, não haverá mais morte. Seremos eternamente com nosso Deus, gozando Sua comunhão perfeita, assim como Adão e Eva no Éden, mas de forma infinitamente mais gloriosa!</p>

<h4>A Vida Presente Transformada Pela Esperança Futura</h4>
<p>Mas isto não é apenas esperança futura — muda nossa vida hoje! Quando vivemos conscientes de que Cristo pode vir a qualquer hora, quando compreendemos que a eternidade é real, isto transforma nossas prioridades. Não nos apegamos às coisas temporais. Não buscamos satisfação em prazeres passageiros. Buscamos realmente o reino de Deus e Sua justiça (Mateus 6:33).</p>

<p>Paulo escreve: "Portanto, se fostes ressuscitados com Cristo, buscai as coisas lá do alto, onde Cristo está assentado à direita de Deus. Pensai nas coisas lá do alto, não nas que são da terra" (Colossenses 3:1-2). Isto é vida com perspectiva eterna! Isto é liberdade verdadeira — porque sabemos que o que realmente importa não se perderá, porque está garantido em Cristo!</p>

<h4>A Certeza do Crente na Eternidade</h4>
<p>Oh, que segurança indizível é esta! Sabemos para onde vamos. Sabemos quem nos espera. Sabemos que nossa herança é incorruptível, incontaminada e que não se pode murchar, reservada nos céus (1 Pedro 1:4). Mesmo que tenhamos perdas nesta vida, mesmo que soframos tribulações, mesmo que passemos pela morte — temos esperança certa!</ p>

<p>"Porque sabemos que se a nossa casa terrestre deste tabernáculo se desfizer, temos de Deus um edifício, uma casa não feita por mão, eterna, nos céus" (2 Coríntios 5:1). Temos uma casa no céu! Preparada por Cristo para nós! Este é o evangelho em sua plenitude!</p>

<h4>Vivendo em Esperança Viva Até Seu Retorno</h4>
<p>Assim, caríssimos irmãos e irmãs, que possamos viver cada dia em esperança viva! Que não nos desanimemos pelas circunstâncias presentes. Que não perdamos a fé quando enfrentamos tribulação. Lembremo-nos continuamente que esta vida não é tudo. Lembremo-nos que Cristo virá, que estabelecerá Seu reino, que viveremos eternamente com Ele!</p>

<p>Esta é a esperança que nos sustenta, que nos anima, que nos motiva a servir a Deus com todo nosso coração. "Sabendo que do Senhor recebereis a recompensa da herança, porque a Cristo, o Senhor, é que servis" (Colossenses 3:24). Estamos trabalhando para a eternidade! Estamos vivendo para o Rei que virá!</p>

<p>Maranata! Vem, Senhor Jesus! (1 Coríntios 16:22). Que nossa oração final seja esta: que Cristo venha, que restaure todas as coisas, que estabeleça Seu reino eterno, e que então, finalmente e para sempre, estaremos na presença de nosso Deus amado! Aleluia! Gloria a Deus! Amém!</p>`,
