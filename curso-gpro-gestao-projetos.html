      content: '<h4>Definição de Projeto</h4><p>Um projeto é um esforço temporário com objetivo claro, recursos definidos e resultado esperado. Não é operação rotineira. É início, meio e fim. Você gerencia projetos todos dias: reformar casa, lançar produto novo, implementar sistema. Cada um precisa de planejamento.</p><blockquote class="tip">A maior parte dos projetos falham não porque são difíceis, mas porque ninguém os planejou direito. Você pensa que vai virar ao longo do caminho. Errado. Planejamento salva tudo.</blockquote><p><strong>Escopo</strong> é o que você vai fazer. Quais features o produto tem? Quantas páginas o site tem? Claro é melhor. Se escopo é vago, projeto fica sem fim, todo mundo insatisfeito.</p><blockquote class="example">Projeto: "Fazer um app". Vago. Escopo claro: "App com login, 5 telas principais (feed, perfil, mensagens, notificações, settings), integração com Google Maps, suporta iOS e Android, não suporta offline mode."</blockquote><p><strong>Cronograma</strong> é quando você vai fazer. Qual é prazo? Você quebrá o projeto em fases, atribui duração, identifica dependências (tarefa X precisa ser feita antes de Y). Cronograma realista é chave.</p><p><strong>Orçamento</strong> é quanto vai gastar. Quanto em salários? Ferramentas? Licenças? Um projeto que estrapola orçamento é projeto fracassado, mesmo que funcione bem tecnicamente.</p><blockquote class="quote">Projeto bem-sucedido: entregue no prazo, dentro do orçamento, com qualidade, e cliente satisfeito. Se um desses falha, projeto tem problema.</blockquote>'

      name: 'Definição e Validação de Escopo',
      content: '<h4>Se Escopo é Vago, Projeto Falha</h4><p>Escopo é o que você vai fazer. Claro, acordado, documentado. Se escopo é vago, projeto fica sem fim: cliente pede mais, equipe não sabe até onde vai, orçamento estoura.</p><blockquote class="tip">Escopo creep (aumento não planejado de escopo) é causa #1 de atrasos. Você precisa dizer "não" a coisas fora do escopo.</blockquote><blockquote class="example">Cliente: "Quero um website." Vago. Você: "Website com quanto?" Cliente: "Não sei, tipo 20 páginas?" Você: "Ok, dessas 20, quais?" Cliente: "Página inicial, sobre, contato, blog, loja...". Agora está ficando claro. Você documenta cada página e o que tem nela.</blockquote><p><strong>Work Breakdown Structure (WBS)</strong> quebra projeto em pedaços menores. Projeto > Fases > Deliverables > Tarefas. Cada nível fica mais específico. Assim você nada esquece.</p><p><strong>Validação com cliente</strong>. Você documenta escopo, mostra para cliente, cliente assina concordando. Assim não tem ambiguidade depois.</p>'
    },
    {
      id: 'pla2',
      name: 'Estimativa e Cronograma Realista',
      content: '<h4>Como Não Prometer Impossível</h4><p>Erro comum: cliente pede prazo otimista, você promete, falha. Verdade é que estimativa é difícil. Você pode estar 30% errado e isso é ok.</p><blockquote class="tip">Estimativa ruim é causa comum de atrasos. Você precisa de metodologia, não adivinhação.</blockquote><p><strong>3-point estimate</strong>: você estima 3 cenários. Otimista (melhor caso), realista (mais provável), pessimista (pior caso). Média ponderada dá estimativa melhor que só uma.</p><blockquote class="example">Task: integrar API de pagamento. Otimista: 2 dias (tudo corre bem). Realista: 5 dias (alguns problemas, algumas idas e vindas). Pessimista: 10 dias (API tem bugs, documentação ruim). Você usa 5 dias como estimativa (realista).</blockquote><p><strong>Contingência</strong>. Seu cronograma nunca é 100% utilizado. Alguém fica doente. Tem reunião inesperada. Você coloca buffer (20-30%) no cronograma.</p><p><strong>Dependências</strong>. Tarefa A precisa estar pronta antes de B. Você identifica e sequencia. Se A atrasa, B atrasa. Tarefas paralelas reduzem tempo total.</p><blockquote class="quote">Cronograma realista é melhor que otimista. Otimista quebra confiança; realista você entrega no prazo e cliente fica surpreso positivamente.</blockquote>'
    },
    {
      id: 'pla3',
      name: 'Alocação de Recursos e Orçamento',
      content: '<h4>Quanto Vai Custar?</h4><p>Orçamento é soma de custos: salários, ferramentas, licenças, infraestrutura. Você precisa estimar realista, não otimista.</p><blockquote class="tip">Não pergunte "quanto você quer gastar?" Calcule "quanto realmente custa?" e proponha.</blockquote><blockquote class="example">Projeto: "App para empresa." Você calcula: Dev Sr (60h @ R$ 200/h) = R$ 12k. Dev Jr (100h @ R$ 80/h) = R$ 8k. Designer (40h @ R$ 150/h) = R$ 6k. Server (3 meses) = R$ 1.5k. Total = R$ 27.5k. Você propõe R$ 30k (buffer). Cliente queria R$ 15k. Você negocia escopo ou preço.</p><p><strong>Alocação de recursos</strong>. Quantas pessoas? Qual nível? Período inteiro ou parte? Você calendário recursos para que não fiquem ociosos e nem sobrecarregados.</p><p><strong>ROI (Return on Investment)</strong>. Quanto projeto vai trazer de volta? Se custa R$ 30k e projeto vai gerar R$ 100k de receita, vale. Se vai gerar R$ 20k, não vale.</p><blockquote class="quote">Melhor é ser honesto sobre custo upfront do que prometer barato e depois pedir mais grana todo mês.</blockquote>'

      content: '<h4>Quando Coisas Mudam</h4><p>Mundo muda. Cliente muda ideia. Requisitos mudam. Isso é normal. Mas você não pode só aceitar tudo sem controlar. Você precisa de processo de mudança.</p><blockquote class="tip">Sem processo de mudança, você termina com escopo 3x maior que original e ninguém sabe por quê.</blockquote><p><strong>Change request formal</strong>. Alguém pede mudança. Você analisa: que impacto tem? Cronograma? Orçamento? Você quantifica. Cliente decide se vale pagar a mais ou esperar.</p><blockquote class="example">Cliente: "Quer adicionar feature X." Você: "Feature X vai adicionar 30h de trabalho = R$ 6k extra e 2 semanas no cronograma. Vale?" Cliente: "Sim, paga" ou "Não, deixa pra depois."</blockquote><p><strong>Diga não educadamente</strong>. "Isso está fora do escopo acordado. Pode fazer? Sim. Quanto vai custar? R$ 8k e 3 semanas." Cliente pode mudar ideia quando vê custo real.</p><p><strong>Baseline de escopo</strong>. Uma vez que cliente assina escopo, isso é baseline. Qualquer mudança precisa de approval formal e é paid change.</p><blockquote class="quote">Escopo creep não é culpa do cliente. É sua falha em comunicar trade-offs e dizer não. Controle sua comunicação e você controla projeto.</blockquote>'
