        content: `Você tem a experiência de consciência - a sensação de estar vivo, ciente, pensando. Mas a maioria do seu cérebro funciona completamente fora da consciência. Você não está consciente dos bilhões de processos que mantêm seu corpo funcionando: respiração, batimento cardíaco, digestão. Você não está consciente de como seus olhos focam ou como seus músculos se coordenam quando você caminha. Você não está consciente de muitos dos processos que produzem seus pensamentos e decisões. O cérebro é principalmente uma máquina de processamento inconsciente com um pequeno "eu" consciente sentado no topo, acreditando que está no controle. Compreender a relação entre consciente e inconsciente é fundamental para entender por que você faz o que você faz.

<h3>Consciência: Uma Coisa Pequena em um Cérebro Vasto</h3>
<p>Sua mente consciente é incrivelmente limitada. Você consegui manter apenas cerca de 7 itens em memória ativa por vez. Você consegui prestar atenção a apenas uma coisa por vez (apesar de parecer multitarefa, você está realmente alternando atenção rapidamente). Sua consciência é serial - uma coisa após outra - enquanto sua mente inconsciente é paralela - muitas coisas acontecendo simultaneamente. Isto significa que sua experiência consciente é apenas uma pequena fração do processamento acontecendo. Consciência é como a tela de um computador; inconsciente é todo hardware rodando por trás. Consciência evolui para alguns fins específicos: para ser ciente de ambiente imediato, para planejar futuro, para comunicar com outros. Mas a maioria da sua mente operações inconsciente, e a maioria de seu comportamento é inconsciente.</p>

<h3>Processamento Automático: Hábito, Intuição, e Esquemas</h3>
<p>Seu cérebro adora automatizar coisas. Uma vez que você aprendeu dirigir um carro, você não precisa pensar conscientemente sobre cada movimento. Você simplesmente "conhece" como fazê-lo. Seu pé sabe quando freiar, suas mãos sabem como virar. Todo aprendizado avançado é realmente a transferência de consciente para inconsciente. Quando você aprende nova habilidade, tem de pensar cuidadosamente. Com prática, torna-se automático. Sua mente inconsciente também cria "esquemas" - modelos do mundo baseado em sua experiência. Uma vez que você tem schema para "restaurante", você não precisa pensar sobre o que fazer quando chegar em um. Você sabe automaticamente onde sentar, que menu virá, que você pagará depois. Esquemas são eficientes, mas também podem ser prejudiciais: se seu schema para "pessoa de certa raça" é negativo, você interpretará comportamento deles através dessa lente sem conscientemente notar.</p>

<h3>Intuição: Quando Seu Inconsciente Sabe</h3>
<p>Intuição - sensação de "saber" algo sem saber por quê - é frequentemente seu inconsciente processando informação que seu consciente não registrou. Um xadrezista experiente "sente" que certo movimento é bom sem calcular por quê; seu inconsciente reconhece padrão. Um terapeuta "sente" que paciente está mentindo mesmo que consegue não articular por quê; seu inconsciente detectou micro-expressão ou incongruência. Intuição pode ser incrivelmente precisa quando é baseado em experiência extensa. Mas intuição também pode ser prejudicial quando é baseado em viés: "eu tenho um sentimento ruim sobre esse tipo de pessoa" pode ser viés não processado inconsciente. A chave é ser ciente de quando você está operando em intuição versus processamento consciente e questionar intuitivamente quando apropriado.</p>

<h3>Atenção: O Farol da Consciência</h3>
<p>Aquilo a que você presta atenção molda sua experiência. Seu cérebro recebe bombardeio constante de informação sensória, mais do que você consegui processar. Atenção funciona como um farol, iluminando certos bits enquanto deixa outros no escuro. Você consegui mudar conscientemente seu farol ("deixe-me focar nisso") ou ele consegui ser capturado automaticamente por coisas salientes (movimento repentino, seu próprio nome). Uma das razões que você não vê outras coisas é que seu farol está em outro lugar. Se você é dito "conte quantas vezes a bola branca passa" enquanto assiste vídeo de pessoas jogando bola, você provavelmente não verá gorila que passa pela cena (experimento de atenção seletiva famoso). Sua atenção está em outro lugar. Isto significa que sua experiência do mundo é altamente filtrada através de aonde você coloca atenção. Dois pessoas no mesmo evento podem ter experiências muito diferentes baseado em aonde cada uma colocou atenção.</p>`,

<h3>Os Três Sistemas de Memória</h3>
<p>Memória tem múltiplos sistemas. Memória sensória retém informação sensória por frações de segundo - você pode "ver" informação visual por um breve momento após desviar o olhar. Memória operacional (de curto prazo) retém informação por minutos enquanto você está ativamente a processar - é por isto você consegui manter número de telefone em mente temporariamente. Memória de longo prazo retém informação por horas, dias, anos - isto inclui fatos que você aprendeu, eventos que você viveu, habilidades que desenvolveu. Informação deve ser codificada e consolidada para passar de memória operacional para longo prazo. A consolidação é facilitado por repetição, emoção, e significância pessoal. É por isto que você lembra eventos emocionais vívidamente mas esquece eventos mundanos - emoção marca informação como "importante" e mobiliza consolidação.</p>

<h3>Amnésia Anterógrada Versus Retrógrada</h3>
<p>Amnésia anterógrada é incapacidade de formar novas memórias de longo prazo. Alguém com amnésia anterógrada pode conversar com você, mas 5 minutos depois não se lembram da conversa. Isto é frequentemente causado por dano ao hipocampo ou circuitos de consolidação. Amnésia retrógrada é perda de memória de longo prazo já formada. Alguém pode esquecer eventos de suas vidas, mas consegui ainda aprender coisas novas. Compreensão destes dois tipos mostra que formação e armazenamento de memória são processos separados, localizados em partes diferentes do cérebro.</p>

<h3>Reconsolidação e Maleabilidade de Memória</h3>
<p>Descoberta alucinante: quando você recupera uma memória, ela não volta ao armazenamento apenas como estava. Ela é reconsolidada - reescrita - baseado em seu estado atual. Isto significa que cada vez que você rememora algo, você está potencialmente alterando a lembrança levemente. Você consegui adicionar detalhes que não estavam lá, alterar emoção associada com lembrança, até mesmo alterar eventos principais. Isto explica por que testemunha ocular é tão não confiável: pessoas genuinamente relembram eventos diferente de como aconteceram porque sua memória foi reconsolidada múltiplas vezes desde então. Isto também oferece oportunidade para terapia: se você conseguir recuperar memória traumática e reconsolidá-la com uma lente diferente (menos ameaçadora), você consegui efetivamente "reescrever" trauma memória.</p>

<h3>Esquecimento: Saudável ou Patológico?</h3>
<p>Esquecimento frequentemente é visto como falha da memória. Mas esquecimento serve funções importantes. Se você lembrasse tudo em perfeito detalhe, você seria sobrecarregado. Esquecimento permite que você esqueça detalhes triviais e mantenha ampla abordagem. Também permite que você deixe morrer lembrança dolorosa ao longo do tempo. Problema é quando esquecimento é patológico - quando você não consegue lembrar de informação importante (demência) ou quando informação foi perdida devido a trauma (amnésia traumática). Balanceado esquecimento de detalhes enquanto retendo essência e significância é saudável.</p>`,

<h3>Plasticidade Neural e Forja de Novos Circuitos</h3>
<p>Quando você aprende algo, estrutura física do seu cérebro muda. Novas conexões sinápticas são feitas, conexões existentes são fortalecidas. Este processo é chamado plasticidade neural. A regra de Hebb ("neurônios que disparam juntos, fiam-se juntos") descreve o mecanismo: quando dois neurônios são repetidamente ativados simultaneamente, suas conexão é fortalecida. Isto significa que com prática repetida, circuitos para novo comportamento ou conhecimento se tornam mais fortes. Isto é verdade em todas as idades, mas é mais marcado em cérebro jovem (que é por isto crianças aprendem idiomas tão rapidamente). Compreensão que seu cérebro é plástico permite você saber que você consegui aprender qualquer coisa com tempo e esforço suficientes; você não está "fixo" em sua capacidade.</p>

<h3>Curva de Esquecimento e Repetição Espaçada</h3>
<p>Psicólogo Hermann Ebbinghaus descobriu que você esquece informação em padrão previsível: você esquece rapidamente inicialmente, então mais lentamente. Se você não revisar informação, você a esquece dentro de dias. No entanto, cada vez que você revisa (consolida), a curva de esquecimento se torna mais gradual. A melhor forma de reforçar memória é através de "repetição espaçada" - revisar informação em intervalos crescentes (após 1 dia, 3 dias, uma semana, dois semanas). Isto é por isto que estudar pelo menos uma semana de antecedência é muito mais eficaz que cram no último momento: você consegui múltiplas consolidações ao invés de uma.</p>

<blockquote class="tip">
Para aprender melhor, use espaçamento: não tente aprender tudo de uma vez. Aprender um pouco, deixar descansar, revisitar. Repetição espaçada cria retenção muito melhor que massed practice (praticar todo de uma vez).
</blockquote>

<h3>Aprendizagem Ativa Versus Passiva</h3>
<p>Aprendizagem passiva - ouvir palestra, ler livro, assistir vídeo - oferece informação para seu cérebro mas não força muito processamento. Aprendizagem ativa - fazer perguntas, resolver problemas, explicar conceito a alguém - força seu cérebro a processar e organizar informação ativamente. Aprendizagem ativa resulta em retenção muito melhor. Isto é por isto que testes são ferramenta de aprendizagem tão poderosa: forçam recuperação de memória, o que consolida. É por isto que teaching é forma de aprendizagem tão poderosa: para explicar conceito a alguém, você precisa organizá-lo mentalmente. Isto é por isto que discussão é mais eficaz que palestra passiva: você está ativamente engajado em processamento.</p>

<h3>Transferência de Aprendizagem e Aplicação de Conhecimento</h3>
<p>Uma vez que você aprendeu algo, você quer conseguir aplicá-lo em novo contexto (transferência). Isto não é automático. Você consegui aprender conceito em classe mas não saber como aplicá-lo em mundo real. Transferência é facilitada por aprendizagem de múltiplos exemplos, exposição a variação, e prática deliberada. Alguém que aprende matemática através de único tipo de problema pode não conseguir transferir quando problema é enquadrado diferente. Alguém que pratica múltiplos enquadramentos consegui transferir melhor. Isto é por isto que especialistas estão realmente bons em transferência: eles têm deep knowledge e têm visto múltiplas aplicações, permitindo flexibilidade em sua aplicação de conhecimento.</p>`,

        content: `Emoção não é luxo opcional; é sistema fundamentalmente enraizado em cérebro que impulsiona comportamento. Compreender emoção oferece chave para entender por que você e outros fazem o que fazem.

<h3>As Bases Evolutivas de Emoção</h3>
<p>Emoções básicas - medo, raiva, nojo, tristeza, surpresa, alegria - aparece em todas as culturas humanas e até mesmo em primatas. Isto sugere que elas evoluíram porque serviram funções vitais de sobrevivência. Medo motiva você fugir de perigo. Raiva motiva você a lutar contra ameaça. Nojo motiva você evitar toxinas. Tristeza motiva você a processar perda. Surpresa captura sua atenção para novo. Alegria motiva você em direção a coisas benéficas. Cada emoção tinha função evolutiva de promover sobrevivência. Hoje, essas emoções são menos sobre sobrevivência físico e mais sobre navegação de complexidade social, mas padrões básicos permanecem.</p>

<h3>O Circuito de Medo e Resposta de Ameaça</h3>
<p>Quando você detecta ameaça, amígdala é acionada e inicia resposta. Se é ameaça clara, você obtém "seqüestro da amígdala" - resposta automática sem entrada do córtex pré-frontal racional. Isto é evolutivamente inteligente: se vir predador, você não quer parar e pensar racionalmente; você quer reagir. No entanto, no mundo moderno, muitas de nossas "ameaças" são psicológicas, não físicas (falar em público, rejeição, fracasso) e resposta amígdala automática frequentemente não é apropriada. Isto causa ansiedade. Compreensão que sua amígdala está reagindo a ameaça percebida permite você engajar córtex pré-frontal racional para avaliar se ameaça é realmente tão severa quanto parece.</p>

<h3>A Cascata Dopaminérgica e Busca de Recompensa</h3>
<p>Dopamina não causa prazer direto; causa busca de recompensa. Isto motiva você aproximar coisas desejadas. Em mundo ancestral, isto motivava você buscar alimento, sexo, status social - coisas que promovem sobrevivência. Em mundo moderno, dopamina motiva você buscar qualquer coisa que seu cérebro aprendeu a desejar. Isto pode ser saudável (trabalho significativo, criatividade, aprendizagem) ou prejudicial (comida viciante, drogas, sexo compulsivo). Compreensão que sua busca de recompensa é dopaminérgica oferece insight: se você quer mudar comportamento de busca de recompensa, você não consegui apenas "tentar mais duro"; você precisa engajar sistema de recompensa diferente.</p>

<blockquote class="example">
Um exemplo: alguém quer parar de comer viciante mas simplesmente tentar resistir não trabalha porque dopamina ainda está ligada a alimento. Melhor abordagem é engajar sistema de recompensa diferente (exercício libera dopamina e endorfinas, criatividade libera dopamina, aprendizagem libera dopamina) que compete com alimento para ativação dopaminérgica.

        dur: 18,
        content: `O que motiva você? O que mantém você em direção a objetivo mesmo quando fica difícil? Compreensão de motivação oferece chave para entender por que pessoas conseguem manter alguns comportamentos mas não outros.

<h3>Motivação Intrínseca: Comportamento Pelo Seu Próprio Bem</h3>
<p>Você está intrinsecamente motivado quando faz algo porque você realmente quer, porque o acha significativo ou satisfatório. Pesquisador Edward Deci descobriu que motivação intrínseca é sustentada por três necessidades psicológicas: autonomia (senso de controle), competência (sensação de eficácia), e relacionamento (conexão com outros). Quando estas necessidades são satisfeitas, você é altamente motivado e performance é boa. Quando não são, motivação sofre. Isto explica por que pessoal com chefes controladores frequentemente fazem pior: sua autonomia está comprometida. Isto também explica por que trabalho que é muito fácil é entediante (competência não é desafiada) e trabalho que é muito duro é demoralizante (senso de competência é prejudicado).</p>

<h3>Motivação Extrínseca: Comportamento por Recompensa ou Punição</h3>
<p>Você está extrinsecamente motivado quando faz algo por recompensa externa (dinheiro, elogio) ou para evitar punição. Motivação extrínseca pode trabalhar a curto prazo mas frequentemente é prejudicial a longo prazo. Se você está motivado apenas por dinheiro, você pode performar bem enquanto pagado mas quando pagamento é reduzido, motivação cai. Pior, pesquisa mostra que recompensa extrínseca frequentemente reduz motivação intrínseca: se você ama algo mas depois começam pagando você fazer isto, sua motivação muda de "amo isto" para "faço isto para dinheiro", e se pagamento for tirado, você perde interesse.</p>

<h3>Grit e Persistência: Motivação Através de Dificuldade</h3>
<p>Pesquisador Angela Duckworth pesquisou "grit" - capacidade de manter esforço e interesse em objetivo a longo prazo apesar de dificuldade. Ela encontrou que grit era mais preditor de sucesso do que talento inato. O que construiu grit? Propósito: sentido claro de por que objetivo importa. Prática deliberada: trabalho focado para melhorar. Esperança: crença que esforço fará diferença. Comunidade: apoio de outros que compartilham objetivo. Com estes, mesmo quando motivação intrínseca wavered, pessoas conseguem manter persistência. Isto explica por que alguns conseguem alcançar maestria enquanto outros não: não é meramente talento mas comprometimento de longo prazo e propósito.</p>

<h3>Propósito: O Motivador Maior</h3>
<p>Uma das descobertas mais consistentes em psicologia é que propósito - senso de que sua vida tem significado, que você estão contribuindo para algo maior que você - é um dos maiores motivadores de bem-estar e persistência. Pessoas com forte senso de propósito conseguem suportar dificuldade que would quebrar alguém sem propósito. Isto explica por que people frequentemente conseguem mais fazendo voluntariado (propósito) do que em trabalho remunerado (dinheiro). Isto também explica por que pessoas com propósito têm melhor saúde mental e vivem mais tempo: propósito é motivador tão poderoso que afeta saúde física.</p>`,

        content: `Quando você toma decisão, múltiplas regiões cerebrais estão em ação simultaneamente. Compreender o que está acontecendo neurobiologicamente oferece insight em por que você frequentemente fazem decisões que não servem seus interesses.

<h3>Conflito Entre Sistema Emocional e Racional: Diálogo Interno</h3>
<p>Você experiência frequentemente "conflito interno" quando o que seu emocional (amígdala, sistema límbico) quer é diferente do que seu racional (córtex pré-frontal) sabe é melhor. Você quer sobremesa (emoção) mas sabe que você deveria comer salada (razão). Você quer procrastinar (emoção) mas sabe que você deveria trabalhar (razão). Estes não são conflito entre personalidade múltipla; eles são conflito entre diferentes sistemas cerebrais que evoluíram em diferentes tempos. Seu sistema emocional evoluiu para oferecer resposta rápida a situação imediata. Seu sistema racional evoluiu para planejamento de longo prazo. Quando eles concordam, você tem alinhamento e paz. Quando discordam, você tem conflito. Qual sistema "ganha" frequentemente depende de estado: se você está cansado, estressado, ou em estado emocional, sistema emocional é mais provável ganhar.</p>

<h3>Vieses Inconscientes e Limitações Racionais</h3>
<p>Seu cérebro não consegue processar mundo objetivamente. Isto filtra, simplifica, e interpreta baseado em expectativa e viés. Isto é necessário para navegar mundo complexo, mas isto também significa que seu julgamento é frequentemente não-racional. Vieses como confirmação (buscando informação que confirma crença), disponibilidade (pensamento eventos memoráveis são mais frequentes), ancoragem (sendo influenciado por número inicial) todos distorcem seu julgamento. Compreensão que você tem vieses inconscientes é primeiro passo para lidar com eles.</p>

<blockquote class="tip">
Para melhorar tomada de decisão, reconheça que você tem vieses. Questione suas próprias conclusões. Procure ativa por informação que contradiz sua inclinação. Consulte pessoas com perspectivas diferentes. Espere por forte emoção se acalmar antes de decisões importantes. Use listas de verificação para evitar erros conhecidos.
</blockquote>

<h3>O Papel de Emoção em Decisão Sábia</h3>
<p>Paradoxalmente, enquanto emoção frequentemente prejudica julgamento, ela é também necessária para decisão sábia. Pacientes com dano ao córtex ventromedial pré-frontal (que processa informação emocional) têm QI normal mas fazem decisões de vida desastrosas. Isto sugere que emoção fornece informação valiosa: um sentimento de "algo é errado aqui" é frequentemente baseado em padrões detectados inconscientemente. Decisão sábia envolve tanto pensar logicamente quanto sentir intuitivamente, e permitindo que ambos informem sua decisão.</p>`,

        content: `Compreender como o cérebro funciona não é apenas conhecimento teórico; oferece ferramenta poderosa para entender e navegar comportamento humano cotidiano.

<h3>Procrastinação e Aversão a Tarefa</h3>
<p>Procrastinação é frequentemente visto como fraqueza de vontade, mas neurobiologicamente, é conflito entre seu sistema emocional (que quer evitar desconforto de tarefa) e seu sistema racional (que sabe que tarefa precisa ser feito). A chave não é culpar a si mesmo mas compreender mecanismo: desconforto antecipatório da tarefa ativa aversão. Uma solução é reduzir barreira para começar ("eu vou trabalhar por apenas 5 minutos"). Uma vez começando, aversão frequentemente diminui. Outra é quebrar tarefa em partes menores para reduzir sobrecarga percebida. Compreensão da neurobiologia permite você trabalhar com sistema ao invés de contra ele.</p>

<h3>Comportamento Impulsivo e Falta de Autocontrole</h3>
<p>Comportamento impulsivo - fazer algo sem pensar - acontece quando seu sistema emocional rápido ativa antes seu sistema racional consegui "vetar" ação. Isto é particularmente provável quando você está cansado, estressado, ou intoxicado (todos prejudicam função do pré-frontal). Compreensão disto oferece várias estratégias: evite situações de tentação quando cansado ou em baixo autocontrole. Construa "pontos de pausa" entre impulso e ação (contar para 10, fazer perguntas a si mesmo). Fortaleça sistema pré-frontal através de meditação e exercício. Pré-comprometa (eliminar opção através de design ambiental) ao invés de depender de willpower no momento.</p>

<h3>Julgamento Moral e Inconsistência Cognitiva</h3>
<p>Você frequentemente julga comportamento de outros enquanto ignorando comportamento similar de si mesmo. Isto não é hipocrisia consciente; é viés de correspondência - você atribui comportamento de outros a traço, mas sua próprio comportamento a circunstância. Seu cérebro adora manter consistência cognitiva. Quando você tem crença contraditória, você experiencia dessonância cognitiva - estado desconfortável - e tende a mudar crença ao invés de comportamento, ou reformular para tornar consistente. Isto explica por que é tão difícil mudar de ideia mesmo com contra-evidência: seu cérebro prefere mudar interpretação de evidência a mudar crença.</p>

<h3>Mudança de Hábito e Recaída</h3>
<p>Mudança de hábito é difícil porque hábito é armazenado no estriado primitivo, não no córtex pré-frontal consciente. Compreensão disto oferece esperança e estratégia. Primeiro, recaída é normal; o velho circuito ainda existe, apenas menos ativo. Segundo, mudança é mais bem alcançada através de design ambiental e substituição de hábito do que através de força de vontade pura. Terceiro, reconexão a propósito (por que você quer mudar?) reativa motivação quando força de vontade falha. Quarto, autocompaixão durante recaída é mais eficaz que auto-culpa: culpa causa retirada e derrota; compaixão facilita aprendizagem e tentativa novamente.</p>`,

        content: `Uma vez que você entende como sua própria mente funciona, você consegui generalizar para entender como outras mentes funcionam. Isto cria base para empatia genuína.

<h3>Mindblindness: Imaginando Perspectiva de Outro</h3>
<p>"Theory of Mind" - capacidade de imaginar pensamentos, crenças, e perspectiva de outro - é habilidade fundamental que permite empatia. Quando você entende que alguém tem mente que funciona diferente que a sua, você consegui imaginar por que eles fazem o que fazem mesmo se você não concordaria com as mesmas escolhas. Isto é particularmente importante com pessoas muito diferentes que você. Alguém com diferentes background, valores, ou neurologia pode operar baseado em lógica muito diferente que você. Compreensão que lógica deles funciona para eles mesmo que diferente que a sua permite compreensão e respeito.</p>

<h3>O Papel de História em Compreensão</h3>
<p>Comportamento nunca se origina no vácuo. Isto vem de história: traumático experiência, apego patterns, valores ensinados, genética. Quando você está frustrado com comportamento de alguém, pergunta "qual história resultou em este comportamento?" frequentemente oferece compaixão. O controle freak pode ter crescido em caos e desenvolvido necessidade de controle como segurança. O perfeccionista pode ter sido criticado crescendo e desenvolvido crença que só vale seu sucesso. A pessoa emocionalmente distante pode ter aprendido que emoção era sinal de fraqueza. Compreensão da história não desculpa comportamento prejudicial, mas oferece compreensão que permite compaixão.</p>

<h3>Normalização de Experiência Psicológica Comum</h3>
<p>Uma coisa que compreensão de cérebro oferece é normalização. Você não é "quebrado" por ter ansiedade ou depressão ocasional - essas são experiências humanas comuns que resultado da neurobiologia. Você não é "fraco" por ter dificuldade com autocontrole - é inerente ao como sistemas cerebrais funcionam. Você não é "ruins pessoa" por ter vieses - todo mundo tem eles. Esta normalização reduz vergonha e permite você trabalhar em mudança de lugar de autossuficiência ao invés de autodeterioramento.</p>

<h3>Compreensão de Respostas de Trauma e Comportamento Maladaptative</h3>
<p>Comportamento que parece "irracional" ou "mau" frequentemente faz sentido em contexto de história de pessoa. Alguém que foi abusado pode ter padrão de reenacting dinâmica de abuso porque é "familiar". Alguém que foi negligenciado pode ser hiperresponsivo aos sinais de abandono. Alguém que foi traído pode ser incapaz de confiar mesmo em pessoas confiáveis. Estes não são escolhas conscientes; são adaptações cerebrais a experiência passada. Compreensão disto permite resposta compassiva ao invés de julgamento. Também oferece esperança: se comportamento é resultado de aprendizagem passada, comportamento novo consegui ser aprendido.</p>`,

<h3>Design da Vida Baseado em Neurobiologia</h3>
<p>Uma vez que você entende como seu cérebro funciona, você consegui deliberadamente desenhar vida que funciona com seu cérebro ao invés de contra ele. Se você é pessoa que precisa autonomia, você consegui procurar carreiras que ofereça isto. Se você é pessoa com sensibilidade aumentada, você consegui desenhar ambiente que é menos estimulante. Se você é pessoa que prospera com comunidade, você consegui priorizar tempo social. Se você é pessoa com baixa dopamina natural, você consegui desenhar atividades que disparam dopamina. Design consciente de vida em acordo com neurobiologia sua resulta em maior bem-estar.</p>

<h3>Compreensão de Compatibilidade Relacional e Aceitação de Diferença</h3>
<p>Muito conflito relacional vem de expectativa que outro pessoa funciona como você funciona. Compreensão que cérebros são profundamente diferentes permite aceitação. Seu parceiro não está sendo controlador porque querem te ferir; podem ser processador ansiosos que precisa de segurança. Seu colega não está sendo lento porque é incompetente; pode ser processador deliberativo que precisa de tempo. Compreensão disto permite você trabalhar com diferença em vez de contra ela. Você consegui dizer "eu sei você processa diferente que eu; deixe-me tentar comunicar de forma que trabalha para você" ao invés de "por que você sempre...?"</p>

<h3>Crescimento Contínuo Através de Neuroplasticidade</h3>
<p>Talvez maior presente que compreensão de cérebro oferece é conhecimento que você não é fixo. Sua neurobiologia molda você, mas neuroplasticidade significa você consegui mudar. Hábito que você desenvolveu consegui ser mudado. Padrão de pensamento que você aprendeu consegui ser mudado. Trauma que você experienciou consegui ser curado. Isto não é rápido ou fácil, mas é possível. Compreensão disto oferece esperança. Você não está preso a ser quem você sempre foi. Com esforço, compreensão, suporte, e tempo, você consegui crescer e mudar.</p>`,
