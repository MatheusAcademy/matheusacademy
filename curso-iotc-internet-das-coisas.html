      id: 'iot1',
      name: 'O que é IoT e sua importância',
      content: `<h4>Objetos Inteligentes Conectados</h4>
<p>Você já parou para pensar em quantos dispositivos ao seu redor estão conectados à internet? Seu relógio inteligente, sua geladeira, seu carro, seu termostato. Isto é IoT (Internet of Things).</p>
<p><strong>IoT</strong> é a rede de objetos físicos embarcados com sensores, software, e conectividade que permite que troquem dados com outros dispositivos e sistemas via internet.</p>
<p>A diferença crucial entre IoT e computadores tradicionais:</p>
<blockquote class="example">
Um computador tradicional: você interage com teclado/mouse, vê resultado em tela. Você está no controle ativo.

Um dispositivo IoT: é autônomo. Um sensor de temperatura coleta temperatura a cada minuto, envia para nuvem, nuvem processa, toma decisão (ligar/desligar ar), tudo sem você fazer nada. Você é passivo.
</blockquote>
<p>Por que IoT importa?</p>
<p><strong>1. Dados em tempo real:</strong> Você tem visibilidade instantânea em qualquer coisa que importa. Sabe que seu refrigerador está em 4°C mesmo que você está no trabalho.</p>
<p><strong>2. Automação:</strong> Sistemas respondem automaticamente sem intervenção humana. Temperatura sobe, ar liga sozinho.</p>
<p><strong>3. Eficiência:</strong> Você pode otimizar sistemas. Luz liga apenas quando sala tem movimento.</p>
<p><strong>4. Dados para AI/ML:</strong> Com trilhões de dados de sensores, você treina algoritmos que predizem falhas antes de acontecerem.</p>
<blockquote class="tip">
Uma fábrica com sensores IoT sabe que uma máquina vai quebrar em 3 dias (algoritmo prevê) e programa manutenção preventiva. Fábrica sem IoT descobre quando máquina quebra de repente, causando shutdown de produção. A diferença é bilhões em economia/lucro.
</blockquote>
<p>Tamanho do mercado IoT:</p>
<p>Em 2023, havia ~15 bilhões de dispositivos IoT conectados. Em 2030, expectativa é 35 bilhões. É crescimento explosivo.</p>
<p>Valor do mercado: >$400 bilhões/ano e crescendo 15% ao ano.</p>
<blockquote class="news">
Em 2024, IoT deixou de ser "o futuro" para ser "o presente". Praticamente toda indústria está implementando IoT. Saúde (dispositivos wearable monitoram pacientes), manufatura (máquinas reportam saúde), agricultura (sensores de umidade), cidades (semáforos inteligentes).
</blockquote>
<p>Os desafios principais de IoT são:</p>
<p>• <strong>Segurança:</strong> Bilhões de dispositivos, cada um é vetor de ataque potencial</p>
<p>• <strong>Privacidade:</strong> Você está coletando dados intrusivos sobre pessoas</p>
<p>• <strong>Escalabilidade:</strong> Como lidar com bilhões de mensagens por segundo?</p>
<p>• <strong>Energia:</strong> Dispositivos frequentemente rodam em bateria com orçamento de energia rigoroso</p>
<p>• <strong>Conectividade:</strong> Nem todo lugar tem wi-fi ou 5G</p>
<p>Você verá que IoT é mais complexo que computação tradicional porque você está lidando com mundo físico com latências, falhas, energia limitada.</p>`

      id: 'iot2',
      name: 'Arquitetura IoT: Camadas e fluxo de dados',
      content: `<h4>Como Dados Fluem de Sensores a Insights</h4>
<p>Uma arquitetura IoT típica tem camadas:</p>
<p><strong>Camada 1 - Sensores/Atuadores:</strong> Dispositivos físicos que coletam dados ou controlam coisas. Termostato coleta temperatura, luz muda brilho.</p>
<p><strong>Camada 2 - Gateway/Edge:</strong> Dispositivo local que coleta dados de sensores, faz pré-processamento, e envia para nuvem. Pode ser um Raspberry Pi em sua casa.</p>
<blockquote class="example">
Seu termostato inteligente coleta temperatura cada 30 segundos. Ao invés de enviar cada medição para nuvem (consumo de energia/banda enorme), o gateway agrupa dados, calcula média/média móvel, envia resumo a cada 10 minutos. Isto reduz transmissão em 20x.
</blockquote>
<p><strong>Camada 3 - Conectividade:</strong> Transmissão de dados. WiFi, 4G/5G, LoRaWAN, Sigfox, NB-IoT. Diferentes tecnologias para diferentes necessidades.</p>
<p><strong>Camada 4 - Cloud/Backend:</strong> Servidores que recebem dados, armazenam, processam. AWS IoT Core, Azure IoT Hub, Google Cloud IoT.</p>
<p><strong>Camada 5 - Análise/Aplicação:</strong> Software que transforma dados em insights. Dashboards, alertas, ML models.</p>
<p>Fluxo de dados:</p>
<blockquote class="example">
Sensor de temperatura → Lê 28°C → Envia para gateway → Gateway envia para AWS IoT Core → Função Lambda processa → Se >27°C, publica para SNS → SNS notifica App mobile → App mostra "Ar ligou" → Usuário vê no telefone.

Tudo acontece em <2 segundos. Este é um "feedback loop" em tempo real.
</blockquote>
<p>Padrões de fluxo de dados:</p>
<p><strong>Pull (Polling):</strong> Aplicação periodicamente pergunta ao dispositivo "qual é sua temperatura?". Simples mas ineficiente se dados mudam raramente.</p>
<p><strong>Push (Event-driven):</strong> Dispositivo envia dados apenas quando algo importante acontece. Temperatura mudou mais de 1°C, envia. Eficiente se eventos são raros.</p>
<p><strong>Hybrid:</strong> Dispositivo envia importante imediatamente, menos importante a cada 10 minutos. Balanço de eficiência e real-time.</p>
<blockquote class="tip">
Escolher padrão certo economiza bateria. Um dispositivo com bateria de 10 anos não pode estar enviando dados constantemente. Precisa ser inteligente: enviar apenas quando necessário.
</blockquote>
<p>Latência vs Energia:</p>
<p>Uma temperatura menor latência (1 segundo) vs bateria que dura 1 ano. Você precisa escolher trade-off.</p>
<blockquote class="news">
Em 2024, "edge AI" está emergindo. Ao invés de enviar todos dados para nuvem para processar, o gateway executa modelo de AI localmente. Isto reduz latência a millisegundos, reduz banda, reduz privacidade (dados nunca deixam o local).
</blockquote>
<p>Você aprenderá que arquitetura IoT é fundamentalmente sobre eficiência e trade-offs.</p>`
    },

      name: 'Sensores e Hardware: Tipos e características',
      content: `<h4>Coletando Dados do Mundo Físico</h4>
<p>Sensores são o coração de IoT. Eles convertem mundo físico em dados digitais.</p>
<p><strong>Sensor de Temperatura:</strong> DHT22, LM35. Mede temperatura ambiente. Custa $5-10.</p>
<blockquote class="example">
Uma estufa inteligente precisa monitorar temperatura. Instala DHT22 na estufa. Sensor mede -40 a 80°C com precisão de 0.5°C. Conecta a Arduino ou Raspberry Pi. Dados são lidos cada minuto, enviados para nuvem.
</blockquote>
<p><strong>Sensor de Umidade:</strong> Mede umidade relativa. Importante para agricultura, armazenamento.</p>
<p><strong>Sensor de Distância/Proximidade:</strong> HC-SR04 (ultrassônico), sensor PIR (infrared). Detecta movimento ou distância. $2-5.</p>
<blockquote name="example">
Uma lâmpada inteligente usa sensor PIR. Quando detecta movimento, liga. Quando ninguém detectado por 10 minutos, desliga. Isto economiza eletricidade se você esquece de desligar.
</blockquote>
<p><strong>Sensor de Pressão:</strong> BMP280, BMP390. Mede pressão barométrica. Útil para previsão de tempo.</p>
<p><strong>Sensor de Qualidade do Ar:</strong> MQ-135, SDS011. Detecta CO2, particulate matter. Importante em cidades inteligentes para alertar sobre poluição.</p>
<p><strong>Sensor de Umidade do Solo:</strong> Capacitive soil moisture sensor. Agricultor sabe quando irrigar. Bateria dura 2-3 anos.</p>
<blockquote class="tip">
Escolher sensor certo é crítico. Um sensor impreciso dá dados ruins. Um sensor muito preciso custa 100x mais. Você deve entender necessidade antes de comprar.
</blockquote>
<p><strong>Placas de Desenvolvimento:</strong></p>
<p><strong>Arduino:</strong> Microcontrolador simples. Léo programação, $15-30. Perfeito para iniciantes. Limitado em poder de processamento.</p>
<p><strong>Raspberry Pi:</strong> Mini computador completo. Linux inteiro. ~$50. Mais poder que Arduino, mais energia.</p>
<p><strong>Microcontroladores especia lizados:</strong> STM32, ARM Cortex. Barato, eficiente, usado em produção.</p>
<p><strong>Processadores Edge:</strong> NVIDIA Jetson, Intel Movidius. Rodam AI/ML localmente. Caros (~$500-1000) mas poderosos.</p>
<blockquote name="example">
Um produto IoT em produção não usa Raspberry Pi (caro, alto consumo). Usa chip STM32 customizado (~$5 em massa) que faz apenas o que precisa. Isto permite vender produto por $50 em vez de $200.
</blockquote>
<p><strong>Eficiência de Energia:</strong></p>
<p>Muitos dispositivos IoT rodam em bateria. Sleep modes são críticos.</p>
<blockquote name="example">
Um sensor de temperatura em bateria:
- Acorda a cada 10 minutos
- Lê temperatura (1ms, consome pouco)
- Envia dados via WiFi (100ms, consome bastante)
- Volta a dormir por 9:59

A maioria do tempo o dispositivo dorme, consumindo apenas leakage current (~1-10µA). WiFi é ativado apenas 100ms a cada 10 minutos.

Com bateria de 2000mAh, isto dura ~2 anos.
</blockquote>
<blockquote class="news">
Em 2024, novo protocolo chamado Wi-Fi HaLow oferece até 1km range com 1/10 da energia de WiFi normal. Isto abre possibilidade de colocar sensores em lugares remotos com bateria que dura 10+ anos.
</blockquote>
<p>Você aprenderá que hardware IoT é equilíbrio fino entre capacidade, custo, e consumo de energia.</p>`

      name: 'Protocolos de Comunicação: WiFi, Bluetooth, LoRaWAN',
      content: `<h4>Como Dispositivos Conversam</h4>
<p>Sensores precisam comunicar com gateway/nuvem. Diferentes protocolos servem diferentes necessidades.</p>
<p><strong>WiFi:</strong> O mais comum. Range ~100m, velocidade alta (10-100 Mbps), consome bastante energia.</p>
<blockquote name="example">
Sua câmera de segurança em casa usa WiFi. Range cobre a casa, bandwidth é suficiente para stream de vídeo. Poder é OK porque plugado em tomada.
</blockquote>
<p>WiFi é bom para: aplicações próximas que precisam banda alta, plugadas em poder.</p>
<p><strong>Bluetooth/BLE:</strong> Low Energy. Range ~100m, velocidade média (~1 Mbps), consome pouco.</p>
<blockquote name="example">
Seu relógio inteligente usa BLE para conectar ao telefone. Precisa ser próximo (< 10m típico), mas bateria dura dias. Dados são heartbeat, passos, isto não precisa alta velocidade.
</blockquote>
<p>BLE é bom para: dispositivos portáteis, próximos um do outro, pouca banda.</p>
<p><strong>LoRaWAN:</strong> Long Range, Wide Area Network. Range ~10km em área aberta, velocidade baixa (~50 kbps), consome muito pouco.</p>
<blockquote name="example">
Uma utilidade elétrica tem smart meters espalhados pela cidade. LoRaWAN permite que cada meter envie consumo uma vez por dia para gateway central no telhado do prédio administrativo. Range cobre toda cidade, bateria dura 10 anos, dados são pequenos (apenas número).
</blockquote>
<p>LoRaWAN é bom para: redes de larga escala, baixa frequência de dados, bateria de longa duração.</p>
<p><strong>Sigfox:</strong> Similar a LoRaWAN mas proprietary. Range ~10km, velocidade ~100 bps (muito lenta). Caro porque paga a operador Sigfox.</p>
<p><strong>NB-IoT / LTE-M:</strong> Celular otimizado para IoT. Range ~1km (através de torres celulares), velocidade ~250 kbps. Paga operadora celular.</p>
<blockquote name="tip">
Escolher protocolo é decisão estratégica:
- Precisa banda alta? WiFi
- Portátil perto de outro dispositivo? BLE
- Espalhado geograficamente, bateria longa? LoRaWAN
- Já tem cobertura celular? NB-IoT
</blockquote>
<p><strong>Topologias de Rede:</strong></p>
<p><strong>Star:</strong> Todos dispositivos conectam a hub central. Simples, mais fácil gerenciar. Hub é ponto de falha único.</p>
<p><strong>Mesh:</strong> Cada dispositivo pode retransmitir para outro. Se um falha, mensagem toma rota alternativa. Mais resiliente mas mais complexo.</p>
<blockquote name="example">
Zigbee (protocolo mesh) é usado em casas inteligentes. Cada luz smart é repetidor. Se uma luz cai, rede continua através de caminhos alternativos. Este é resilência de mesh.
</blockquote>
<p><strong>Segurança em Transmissão:</strong></p>
<p>Dados IoT frequentemente é sensível. Você quer:</p>
<p>• <strong>Criptografia:</strong> Dados são encriptados em trânsito (TLS/SSL)</p>
<p>• <strong>Autenticação:</strong> Saber que é realmente seu dispositivo enviando</p>
<p>• <strong>Integridade:</strong> Verificar que mensagem não foi adulterada</p>
<blockquote name="news">
Em 2024, padrão MQTT (Message Queuing Telemetry Transport) é dominante para IoT por ser leve e eficiente. CoAP (Constrained Application Protocol) é alternativa para dispositivos muito limitados.
</blockquote>
<p>Você aprenderá que protocolo certo é fundamental para sucesso de sistema IoT.</p>`

      content: `<h4>Vivendo com IoT</h4>
<p>Smart homes são talvez a primeira aplicação de IoT que maioria das pessoas encontra. Você liga luz com voz, termostato aprende sua preferência, câmera notifica quando alguém na porta.</p>

- 23:00: desligar
- Feriados: não acorda em 7 AM

</blockquote>

<p><strong>Energia:</strong> Smart plugs monitoram consumo, ligar/desligar por agenda ou automação. Por exemplo, desligar TV em standby à noite economiza. Smart meters monitoram consumo total.</p>

<p><strong>Smartwatches Populares:</strong></p>

<p><strong>Fitness Trackers:</strong> Simples, focados em steps, calorias, atividade.</p>
<p><strong>Medical Devices:</strong> Glucose monitors (diabetes), blood pressure monitors. Agora muitos são connected e enviam dados para médico.</p>
<p><strong>Dados de Saúde:</strong></p>
<p>Todos esses wearables coletam dados imensamente pessoais:</p>
<p>• Quando você dorme/acorda</p>
<p>• Quando você está ativo</p>
<p>• Sua saúde cardíaca</p>
<p>• Seu local (via GPS no relógio)</p>
<blockquote class="tip">
Isto é ouro para seguro de saúde. Se seu relógio mostra que você dorme pouco e não se exercita, seguro pode aumentar prima ou recusar cobertura. Isto é razão para privacidade em dados de wearable.
</blockquote>
<p><strong>Aplicações Médicas:</strong></p>
<blockquote name="example">
Um paciente com insuficiência cardíaca coloca patch (adesivo IoT) no peito. Patch monitora atividade elétrica do coração 24/7, via Bluetooth envia dados a aplicativo. Aplicativo usa AI para detectar sinais de deterioração e alerta médico. Médico intervém antes que paciente tem crise. Isto economiza vida e hospitalizações.
</blockquote>
<p><strong>Benefícios:</strong></p>
<p>• <strong>Monitoramento Contínuo:</strong> Dados 24/7, não apenas quando em médico</p>
<p>• <strong>Detecção Precoce:</strong> AI detecta problemas antes de sintomas</p>
<p>• <strong>Empowerment:</strong> Você vê seus dados, pode fazer mudanças</p>
<p><strong>Desafios:</strong></p>
<p>• <strong>Privacidade:</strong> Dados de saúde são extremamente sensíveis</p>
<p>• <strong>Precisão:</strong> Nem todos sensores são tão precisos quanto médico-grade</p>
<p>• <strong>Battery:</strong> Relógio precisa carregar todo dia, inconveniente</p>
<blockquote class="news">
Em 2024, FDA começou reconhecer wearables como dispositivos médicos. Isto quer dizer regulação, mas também significa de fato médicos podem confiar dados para tomar decisões clínicas.
</blockquote>
<p>Você verá que wearables são IoT mais íntimo que você tem — literalmente no seu corpo.</p>`
    },

      id: 'iot7',
      name: 'Integração: Dashboards, Alertas e Automações',
      content: `<h4>Transformando Dados em Ações</h4>
<p>Ter sensores coletando dados é início. Transformar dados em ações úteis é arte.</p>
<p><strong>Dashboards:</strong> Visualização de dados em tempo real. Um painel mostra temperatura de cada cômodo, consumo de energia, status de cada dispositivo.</p>
<blockquote name="example">
Sua dashboard Home Assistant mostra:
- Temperatura: Sala 24°C, Quarto 22°C, Cozinha 26°C
- Umidade: Banheiro 60% (úmido demais, ventilar)
- Energia: 500W consumindo agora (ar está ligado)
- Câmeras: Última pessoa na porta 2 horas atrás
- Segurança: Todas portas trancadas, sistema armado

Você vê tudo num relance, identifica problemas rapidamente.
</blockquote>
<p><strong>Alertas:</strong> Notificações quando algo excepcional acontece.</p>
<p>• Temperatura >28°C por >1 hora? Alerta.</p>
<p>• Movimento detectado entre 22:00-06:00? Alerta.</p>
<p>• Porta aberta mas ninguém deveria estar em casa? Alerta.</p>
<p>• Consumo de energia acima de normal? Alerta.</p>
<blockquote name="tip">
Alertas bem-calibrados são críticos. Muito poucos e você perde eventos importantes. Muitos e você ignora (alerta fatigue). O ponto certo é diferente para cada pessoa.
</blockquote>
<p><strong>Automações Complexas:</strong> Lógica "Se isto, então aquilo".</p>
<blockquote name="example">
"Se (hora é 19:00) E (ninguém em casa segundo geolocation) ENTÃO (acender lâmpadas de entrada e sala à 50% brilho para parecer alguém está em casa)"

Isto é home security sem estar em casa.
</blockquote>
<p>Outro exemplo:</p>
<blockquote name="example">
"Se (alguém na cama, segundo motion detector) E (horário é 21:00) ENTÃO (diminuir temperatura para 20°C, desligar TV, desligar luzes principal, ligar lâmpada de banheiro a 1% vermelho)"

Isto é rotina de dormir automática.
</blockquote>
<p><strong>Inteligência Contextual:</strong> Automações que sabem sua contexto (onde você está, que horas são, que dia é).</p>
<blockquote name="example">
"Se tempo é segunda-feira-sexta 7 AM E está chovendo E você é geolocation está a casa, ENTÃO disparar alarme 10 minutos antes porque vai pegar trânsito mais pesado."
</blockquote>
<p><strong>Plataformas de Automação:</strong></p>
<p><strong>Home Assistant:</strong> Open-source, roda localmente, privado, mais controle. Requer tech knowledge.</p>
<p><strong>SmartThings (Samsung):</strong> Cloud-based, simples, menos privacidade.</p>
<p><strong>Hubitat:</strong> Local-first, privado, bom balanço de poder e simplicidade.</p>
<p><strong>IFTTT (If This Then That):</strong> Cloud-based, muito simples, integra tudo. Menos poder.</p>
<blockquote name="example">
"Se temperatura em quarto >28°C ENTÃO enviar push notification"

Sem programação, configuração visual.
</blockquote>
<p><strong>Histórico de Dados:</strong> Guardar dados históricos permite aprendizado.</p>
<blockquote name="example">
Seu sistema sabe que vocês dorme 22:00-7:00 em weekdays, mas 22:30-8:00 nos fins de semana. Ele ajusta seu padrão de temperatura automático baseado nisto. Você não programou; aprendeu pelo histórico.
</blockquote>
<p><strong>Integração com Calendário:</strong> Automações baseadas em seu calendário.</p>
<blockquote name="example">
"Se meu calendário mostra 'traveling' e há evento de vários dias, ENTÃO ligar 'away mode': luz aleatória para parecer alguém em casa, fechar todos os serviços, baixar temperatura."
</blockquote>
<blockquote class="news">
Em 2024, Matter (novo padrão) está emergindo para unificar smart homes. Ao invés de cada dispositivo usar seu próprio protocolo, todos usariam Matter. Isto simplificaria integração drasticamente.
</blockquote>
<p>Você verá que inteligência em smart homes vem da combinação de sensores + lógica + histórico.</p>`

      name: 'Segurança e Privacidade em IoT Residencial',
      content: `<h4>Protegendo Sua Casa Conectada</h4>
<p>Quanto mais dispositivos conectados, mais vetores de ataque. Sua casa inteligente pode se tornar fraca se não é segura.</p>
<p><strong>Ataques Comuns:</strong></p>
<p><strong>Força Bruta:</strong> Alguém tenta adivinhar sua senha ao hub. Se você usa "password123", ele entrará.</p>
<blockquote name="example">
Hacker tem lista de 10 milhões senhas comuns. Tenta cada uma contra seu hub até uma funciona (5% das vezes funciona). Entra no sistema, desativa segurança, e rouba coisas.
</blockquote>
<p><strong>Man-in-the-Middle:</strong> Intercepta comunicação entre dispositivo e hub. Se não é encriptada, ele vê dados ou muda comandos.</p>
<p><strong>Exploit de Software:</strong> Dispositivo tem bug de segurança. Hacker usa exploit para conseguir acesso.</p>
<p><strong>Botnet:</strong> Seu dispositivo é comprometido e usado para atacar outros sistemas (DDoS attack). Você não sabe porque não há sintomas óbvios.</p>
<blockquote class="tip">
Uma câmera de segurança hackeada pode: espiar você, usar banda para ataque DDoS em outra rede, ser controlada remotamente.
</blockquote>
<p><strong>Boas Práticas:</strong></p>
<p><strong>1. Senhas Fortes:</strong> Use senhas únicas, 20+ caracteres, um gerenciador de senhas.</p>
<p><strong>2. Atualizações:</strong> Atualize dispositivos assim que novos patches saem. Bugs de segurança são explorados em horas.</p>
<p><strong>3. Rede Separada:</strong> Coloque dispositivos IoT em rede Wi-Fi separada de computador/dados pessoais. Se IoT é hackeado, não acessa seus dados importantes.</p>
<blockquote name="example">
Dois Wi-Fi: "Home-Devices" (IoT) e "Home-Personal" (computador, telefone). Hacker entra "Home-Devices", vê que câmera está ligada. Mas não consegue acessar "Home-Personal" porque são redes diferentes.
</blockquote>
<p><strong>4. Firewall:</strong> Seu roteador tem firewall. Configure para bloquear acesso incoming a menos que necessário.</p>
<p><strong>5. Desabilitar UPnP:</strong> UPnP automático abre portas, útil mas perigoso. Desabilite se não precisa.</p>
<p><strong>6. Local-First:</strong> Quando possível, use hub local (Home Assistant, Hubitat) em vez de cloud. Dados nunca deixam casa.</p>
<p><strong>Privacidade:</strong></p>
<p>Mesmo se hub é seguro, você confia os dados a alguém?</p>
<p><strong>Cloud Privacidade:</strong></p>
<p>Amazon Alexa, Google Home enviamáudio para nuvem para processar. Humanos ouvem algumas gravações (para melhorar). Isto é invasivo.</p>
<p><strong>Local Privacidade:</strong></p>
<p>Home Assistant processa tudo localmente. Dados nunca deixam sua casa. Ninguém sabe quantas vezes você vai ao banheiro (dado de motion sensor).</p>
<blockquote class="example">
Uma pessoa carregou Home Assistant. Seu relógio inteligente envia dados de dormir localmente. Sua câmera processa faces localmente (não envia video). Seu termostato aprende preferências localmente.

Zero dados deixam casa. Privacidade máxima.
</blockquote>
<p><strong>Regulamentação:</strong></p>
<p>GDPR na Europa requer que você saiba que dados é coletado e poder excluir. Muitos dispositivos violam isto.</p>
<blockquote class="news">
Em 2024, regulação está aumentando. EUA está considerando standards de segurança para IoT. Expectativa é que em 5 anos, IoT inseguro não possa ser vendido.
</blockquote>
<p>Você aprenderá que segurança e privacidade devem estar em forefront quando escolhe dispositivos.</p>`
