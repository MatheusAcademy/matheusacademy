    {id:1,
     name:"Direito à Vida, Dignidade e Proteção Física",
     dur:"17 min",
     content:`O direito mais fundamental é o direito à vida. Tudo o mais depende dele. A Constituição Federal o coloca como primeiro direito.

O QUE SIGNIFICA DIREITO À VIDA?
Não significa apenas existir biologicamente. Significa viver com dignidade. Implica:
1. Proteção contra morte arbitrária (governo não pode matar)
2. Acesso a condições básicas de subsistência (comida, abrigo, saúde)
3. Proteção contra violência (estado tem dever de proteger)
4. Direito de desenvolver potencial humano

PROIBIÇÃO DE PENA DE MORTE:
- Brasil aboliu pena de morte em 1889
- Constituição de 1988 reafirma: "A vida é inviolável"
- Não há exceção (nem para crime grave, nem para guerra)
- É cláusula pétrea (não pode ser alterada)
- Diferente de alguns países que ainda usam pena de morte
- Brasil segue tendência internacional de abolição

DIREITO DE LEGÍTIMA DEFESA:
- Se alguém tenta tirar sua vida, você pode se defender
- Pode usar força necessária
- Excesso de defesa não é justificado
- Exemplo: Alguém invade sua casa para roubar, você pode bater na pessoa, mas não pode matá-la se fugiu
- Lei reconhece: "Não constitui crime o agente que, para proteger direito seu ou de outrem, reage contra injusta agressão"

DIREITO AO ANONIMATO E SIGILO:
- Sua privacidade é protegida
- Não é obrigado a se identificar em manifesto (pode ser anônimo)
- Está protegido contra tortura, humilhação pública
- Privacidade é respeito à dignidade

PROIBIÇÃO DE TORTURA:
- Tortura é crime
- Não pode ser praticada para extrair confissão
- Implica: Polícia não pode bater, chocar, privação de sono como interrogatório
- Confissão obtida por tortura não vale
- Direito internacional: Convenção contra Tortura

TORTURA PSICOLÓGICA:
- Também é proibida
- Ameaças, intimidações, humilhação pública
- Separação forçada de família como punição
- Deixar em cela sem higiene mínima
- Tudo isso é considerado tortura/tratamento cruel

PROTEÇÃO CONTRA ESCRAVIDÃO:
- Proibida toda forma de escravidão
- Inclui trabalho forçado
- Inclui "servidão por dívida" (ser preso por dever)
- Direito internacional: ONU proíbe escravidão

TRABALHO INFANTIL:
- Proibido trabalho para menores de 16 anos
- Exceção: Aprendizagem a partir de 14 anos
- Menores de 18: Não podem trabalhar à noite, em atividades perigosas
- Função social: Criança deve estudar, não trabalhar
- Proteção: Evita exploração, permite desenvolvimento

DIREITO A ATENDIMENTO MÉDICO:
- Emergência médica é atendida
- SUS fornece atendimento gratuito
- Hospital não pode negar atendimento por falta de dinheiro
- Medicamentos essenciais são fornecidos
- Vacinação é direito

DIREITO A SEGURANÇA:
- Estado tem dever de manter segurança pública
- Polícia (civil, militar) trabalha para isso
- Cidadão tem direito de se sentir seguro
- Crítica: Segurança pública é problema no Brasil (altas taxas de homicídio, criminalidade)

DIREITO CONTRA VIOLÊNCIA DOMÉSTICA:
- Lei Maria da Penha protege mulheres contra violência de companheiro
- Pode pedir medida protetiva (afastamento do agressor)
- Atendimento prioritário em delegacia
- Proteção contra tentativa de reconciliação forçada
- Denúncia é pública (não precisa da vítima querer processar)

DIREITO CONTRA ASSÉDIO:
- Assédio moral é punível
- Assédio sexual é crime
- Empregador responde se assédio ocorre no trabalho
- Vítima pode pedir indenização por dano moral

<blockquote class="example">
📌 Exemplo: Você é preso injustamente. Police tenta bater para você confessar. Você tem direito de recusar, de acesso a advogado, de defesa. Confissão obtida por violência não vale. Direito à vida inclui direito de não ser torturado.
</blockquote>`,
     cards:[{"q":"Qual é a proteção brasileira contra pena de morte?","a":"Pena de morte é totalmente proibida no Brasil e é cláusula pétrea (não pode ser alterada). Direito à vida é inviolável, sem exceção, nem para crime grave."}]

    {id:2,
     name:"Liberdade de Expressão, Pensamento e Associação",
     dur:"18 min",
     content:`Liberdade é direito fundamental. Sem liberdade, outros direitos ficam vazios. Constituição protege várias formas de liberdade.

LIBERDADE DE EXPRESSÃO:
- Direito de expressar opinião, pensamento
- Pode falar, escrever, publicar
- Pode criticar governo, pessoas, instituições
- Sem censura prévia (governo não pode proibir antes)
- Mas é responsável pelo excesso

LIMITES À LIBERDADE DE EXPRESSÃO:
- Não pode ofender, difamar, xingar de forma falsa
- Não pode incitar violência
- Não pode caluniar (afirmar falsamente que fez crime)
- Não pode fazer racismo, discriminação
- Exemplo: Pode criticar presidente, mas não pode mentir que roubou se não for verdade

DIFAMAÇÃO vs CRÍTICA:
- Crítica: "O presidente está fazendo mal ao país" - permitido, é opinião
- Difamação: "O presidente é ladrão" (falso) - punível
- Importante: Verdade é defesa
- Se prova que é verdade, não é difamação

LIBERDADE DE IMPRENSA:
- Jornalista pode publicar
- Direito de reportagem
- Proteção contra censura governamental
- Responsabilidade por notícia falsa (fake news)
- Interesse público é defesa: notícia é importante de conhecer

FAKE NEWS:
- Lei de redes sociais: Disseminação dolosa de desinformação prejudicial
- Pode resultar em remoção de conteúdo, bloqueio de conta
- Responsabilidade da rede social também (deixar fake news)
- Importante durante eleições (proibição de fake news)

LIBERDADE DE CONSCIÊNCIA E RELIGIÃO:
- Cada pessoa tem liberdade de crer ou não crer
- Pode seguir qualquer religião
- Pode não ter religião
- Governo é laico (não é católico, protestante, agnóstico)
- Nenhuma religião é oficial
- Ninguém é discriminado por religião

PROSELITISMO:
- Direito de praticar religião, inclusive converter outros
- Mas não pode coagir, pressionar, ou enganar
- Educação religiosa em escolas: Pode, mas não obrigatório

LIBERDADE DE ASSOCIAÇÃO:
- Direito de se reunir com outros em grupo
- Pode formar clube, associação, sindicato, partido
- Governo não pode proibir por opinião do grupo
- Reunião pacífica é direito
- Reunião com armas ou intenção de violência não é protegida

DIREITO DE MANIFESTAÇÃO:
- Direito de protesto, passeata, piquete
- Pode ser pacífico ou com confrontação (desde que não seja ilegal)
- Polícia não pode impedir manifestação legítima
- Limite: Não pode impedir direito alheio (ex: bloquear rua sem motivo não nega direito de outro, bloqueia seu trânsito)

LIBERDADE DE LOCOMOÇÃO:
- Pode se mover livremente no Brasil
- Pode entrar e sair do país
- Restrições: Suspensão de direitos políticos (pode impedir deixar país durante processo)
- Exílio é proibido (governo não pode exilar)
- Restrição por dívida? Não pode impedir locomoção por dívida, salvo situações extremas

DIREITO DE PETIÇÃO:
- Pode enviar petição ao governo
- Governo tem dever de receber e responder
- Não pode punir por petição legítima
- Importante: Povo pode reclamar

DIREITO DE PRIVACIDADE:
- Governo não pode invadir sua casa sem mandado
- Correspondência é inviolável (não pode abrir sua carta)
- Comunicações telefônicas/eletrônicas: Protegidas (não podem ser interceptadas sem mandado)
- Exceção: Investigação de crime grave com ordem judicial

DIREITO AO ESQUECIMENTO:
- Pessoa pode pedir que informação antiga sobre ela seja removida (direito ao esquecimento)
- Especialmente em internet
- Limite: Interesse histórico/público (não pode apagar história)
- Importante para LGPD (Lei Geral de Proteção de Dados)

LIBERDADE DE INFORMAÇÃO:
- Lei de Acesso à Informação: Pode pedir qualquer informação ao governo
- Governo tem dever de fornecer
- Prazo: 20 dias
- Transparência é regra, sigilo é exceção
- Motivos legítimos para sigilo: Defesa do Estado, privacidade de terceiro

CENSURA:
- Proibida censura prévia (antes da publicação)
- Não precisa de autorização para falar/publicar
- Posterior: Pode ser punido se ofende lei (mas já publicou)
- Importante: Protege liberdade de imprensa e cidadãos

DISCURSO DE ÓDIO:
- Proibido discurso contra grupo (racismo, sexismo, homofobia extremo)
- Lei de Crimes Raciais
- Importante: Não é apenas opinião, é incitamento a violência
- Limite a liberdade justificado por proteção de grupo vulnerável

<blockquote class="tip">
💡 Dica: Liberdade de expressão não significa liberdade de consequências. Você é livre de falar, mas responsável se prejudica outro indevidamente.
</blockquote>`,
     cards:[{"q":"Qual é a diferença entre crítica (protegida) e difamação (punível)?","a":"Crítica é opinião sobre fatos (exemplo: \"presidente está fazendo mal\"). Difamação é afirmar falsamente que alguém fez crime. Verdade é defesa contra difamação."}]

    {id:3,
     name:"Igualdade, Não-Discriminação e Direitos de Minorias",
     dur:"17 min",
     content:`A Constituição garante que todos são iguais perante a lei. Isso significa: sem discriminação injusta, com proteção especial para grupos vulneráveis.

PRINCÍPIO DA IGUALDADE:
- "Todos são iguais perante lei"
- Significa: Lei vale para todos, independentemente de status
- Não é igualdade econômica (rico e pobre têm bens diferentes)
- É igualdade legal: mesmos direitos, mesmas obrigações
- Discriminação injusta é proibida

FUNDAMENTOS DA IGUALDADE:
- Ninguém pode ser discriminado por:
  - Raça ou cor
  - Sexo ou identidade de gênero
  - Idade
  - Religião
  - Opinião política
  - Origem (de que estado, de que país)
  - Deficiência
  - Condição social

DISCRIMINAÇÃO vs DIFERENCIAÇÃO:
- Discriminação injusta: Tratamento desfavorável por preconceito (proibida)
- Diferenciação justificada: Trato diferente por motivo legítimo (permitido)
- Exemplo: Proibir mulher de trabalhar = discriminação. Dar licença-maternidade = diferenciação justificada
- Exemplo: Não contratar por ser negro = discriminação. Cota para negros = diferenciação justificada

DIREITOS DAS MULHERES:
- Igualdade com homens em direitos políticos, civis, sociais
- Proteção especial: Maternidade, amamentação
- Lei Maria da Penha: Proteção contra violência doméstica
- Lei do Feminicídio: Homicídio de mulher por razão de gênero é agravado
- Assédio sexual: Proibido, especialmente no trabalho
- Direito de propriedade: Mulher casada não precisa de autorização de marido

DIREITOS LGBTQIA+:
- Direito de existir sem discriminação
- Proibição de discriminação em emprego, moradia, educação
- Casamento entre pessoas do mesmo sexo (reconhecido legalmente)
- Adoção por casais do mesmo sexo
- Mudança de nome/gênero nos documentos
- Crime de homofobia: Discriminação/violência contra LGBTQIA+ é crime
- Direito de reconhecimento legal

DIREITOS DAS PESSOAS COM DEFICIÊNCIA:
- Acessibilidade: Rampas, elevadores, intérpretes, legendas
- Atendimento preferencial (fila, banco, atendimento)
- Educação inclusiva (escola deve acomodar deficiência)
- Trabalho: Cotas (empresas grandes contratam percentual de deficientes)
- BPC (Benefício de Prestação Continuada): Assistência para deficientes pobres
- Não pode ser discriminado no trabalho
- Direito de acompanhante em hospital, atividades

DIREITOS DOS IDOSOS:
- Proteção especial contra discriminação
- Atendimento preferencial
- Direito de viver com dignidade
- Proteção contra abandono
- Aposentadoria: Direito automático após tempo de trabalho
- Medicamentos: Acesso garantido
- Educação: Direito de continuar estudando
- Não pode ser destituído de direitos por idade

DIREITOS DAS CRIANÇAS:
- Proteção integral
- Educação obrigatória
- Saúde
- Proteção contra exploração, abuso sexual, trabalho infantil
- Direito de brincar, ter infância
- Processo criminal diferente (socioeducativo, não criminoso)
- Pai/mãe tem obrigação de sustentar até certa idade

DIREITOS DOS INDÍGENAS:
- Direito à terra ancestral
- Direito a língua própria
- Direito a cultura e tradições
- Demarcação de terras: Estado tem obrigação
- Proteção contra discriminação
- Autonomia em organização social
- Direito de consulta em projetos que afetam terras

DIREITOS DOS AFRODESCENDENTES:
- Igualdade legal
- Lei do Racismo: Racismo é crime inafiançável (não solto por dinheiro)
- Ações afirmativas: Cotas em educação superior, concursos públicos
- Justiça reparatória: Políticas para reparar desigualdades históricas
- Educação: Ensino de história africana é obrigatório
- Combate ao racismo institucional

AÇÕES AFIRMATIVAS:
- Políticas de discriminação positiva (para favorecer grupo prejudicado historicamente)
- Cotas raciais: Universidades reservam percentual para negros, indígenas
- Cotas sociais: Reservam para pobres
- Concursos: Percentual para deficientes, mulheres em alguns cargos
- Objetivo: Igualar oportunidades
- Debate: Alguns veem como justiça, outros como injustiça reversa

DIREITOS ECONÔMICOS IGUALITÁRIOS:
- Mulher pode ter propriedade sem autorização
- Pessoa pobre tem direito a defesa gratuita, justiça acessível
- Direito a trabalho dignificante
- Proibição de trabalho escravo, trabalho infantil

DIREITO À IMAGEM E REPUTAÇÃO:
- Sua imagem é sua (não pode usar sem permissão)
- Pode processar se prejudicarem reputação
- Proteção contra revenge porn (publicação de fotos íntimas sem permissão)
- Pode exigir remoção de conteúdo ofensivo internet

COMBATE À DISCRIMINAÇÃO:
- Denúncia em delegacia: Crime de discriminação
- Reclamação ao CONADE (Conselho Nacional de Direitos da Pessoa com Deficiência)
- Processamento por dano moral
- Lei de proteção: Várias leis específicas (racismo, sexismo, homofobia)

<blockquote class="quote">
💬 "Igualdade não significa que todos são idênticos. Significa que todos merecem respeito, oportunidade, dignidade independentemente de características pessoais."
</blockquote>`,

    {id:1,
     name:"Direito ao Voto, Participação Política e Cidadania",
     dur:"17 min",
     content:`Democracia depende de participação política. Constituição garante voto e outras formas de participação.

O DIREITO DE VOTAR:
- Cidadãos brasileiros maiores de 18 anos têm direito de votar
- Voto é direto (você escolhe), secreto (ninguém vê), universal (para todos maiores), periódico (a cada tempo)
- Menores de 16 podem votar (facultativo)
- Analfabetos têm direito de votar (facultativo), mas podem não ser elegíveis
- Restrições: Condenados, suspensos direitos políticos

VOTO OBRIGATÓRIO:
- Maiores de 18 anos têm obrigação de votar
- Não votar: Multa, restrições (não conseguir emprego público, passaporte)
- Absenteísmo: Não comparecimento sem justificativa
- Justificativa: Doença, viagem, impedimento

TÍTULO DE ELEITOR:
- Documento que comprova direito de voto
- Obtido em cartório eleitoral ou TSE online
- Obrigatório para votar
- Necessário para alguns serviços (tirar passaporte, banco)

SELEÇÃO DO CANDIDATO:
- Pessoalmente decide em quem votar
- Voto é secreto (ninguém sabe em quem votou)
- Coação de voto: Proibida
- Você pode votar diferente do que partido/patrão quer
- Voto de cabresto: Praticar coação para voto é crime

DIREITO DE SER CANDIDATO:
- Direito de se candidatar a cargo eletivo
- Requisitos variam conforme cargo:
  - Presidente: Brasileiro nato, maior de 35
  - Governador: Maior de 30
  - Senador: Maior de 35
  - Deputado: Maior de 21
  - Vereador: Maior de 18
- Filiação a partido: Obrigatória
- Inelegibilidade: Alguns crimes tornam inelegível por tempo

CAMPANHA ELEITORAL:
- Candidatos podem fazer campanha
- Usar mídia, redes sociais
- Gastar dinheiro em campanha (com limites)
- Gastos devem ser registrados
- Crítica a adversário é permitida, mentira não

FINANCIAMENTO DE CAMPANHA:
- Campanhas são caras
- Limite de gasto é lei
- Financiamento público: Alguns partidos recebem
- Doação privada: Permitida com limite
- Fake news: Campanha que dissemina desinformação pode ser retirada do ar

CAMPANHAS FRAUDULENTAS:
- Promessa impossível: Condenatória
- Fake news: Disseminação de mentira é crime
- Coação de voto: Crime
- Compra de voto: Crime (voto por dinheiro)
- Prejuizo: Candidato pode ter registro cassado

DIREITO A INFORMAÇÃO DURANTE ELEIÇÃO:
- Direito de saber programa dos candidatos
- Acesso a pesquisas eleitorais
- Direito de saber fontes de financiamento
- Debates públicos (emissoras podem ser obrigadas a transmitir)
- Transparência: Gastos de campanha são públicos

COLIGAÇÃO E ALIANÇA:
- Partidos podem se unir para apoiar candidato
- Coligação pode ser prejudicial ou benéfica
- Voto por coligação: Você vota no candidato, não no partido

VOTO NULO E BRANCO:
- Nulo: Voto errado, rasurado, não tem sentido
- Branco: Voto em branco (não vota em ninguém)
- Ambos não elegem ninguém
- Importante: Tanto nulo quanto branco prejudicam representação de povo

RECONTAGEM E CONTESTAÇÃO:
- Se resultado é muito apertado, pode haver recontagem
- Candidato pode contestar resultado em tribunal eleitoral
- TSE julga fraude, irregularidade
- Poder de cassação: TSE pode anular eleição se houver fraude grave

INELEGIBILIDADE:
- Lei da Ficha Limpa: Pessoa condenada por crime grave não pode ser candidato por 8 anos
- Condenado em segunda instância pode ser inelegível
- Importante: Limpa candidatos com passado criminoso
- Debate: Alguns acham que 8 anos é pouco, outros que é muito

DIREITO A RECLAMAÇÃO ELEITORAL:
- Se houver fraude, coação de voto, fake news
- Pode reclamar ao TSE
- Processo rápido (eleição não espera)
- Importante para integridade eleitoral

VOTO À DISTÂNCIA:
- Brasileiro no exterior pode votar
- Secções eleitorais em embaixadas
- Online: Ainda em discussão

DIREITO DE QUESTIONAR RESULTADO:
- Pode contestar resultado
- Recurso ao TSE
- Tribunal pode anular votação em urnas
- Recontagem de votos

<blockquote class="example">
📌 Exemplo: Candidato A dissemina fake news de que candidato B roubou. B procura TSE, prova que é mentira. TSE ordena remoção de conteúdo. Candidato A pode ser penalizado, votos podem ser anulados dependendo do dano.
</blockquote>`,

    {id:2,
     name:"Direito à Educação, Saúde e Bem-estar Social",
     dur:"18 min",
     content:`Constituição reconhece que direitos civis não bastam. Pessoas precisam de educação, saúde, segurança. Esses são direitos sociais.

DIREITO À EDUCAÇÃO:
- "Educação é direito de todos e dever do Estado e da família"
- Educação pública é gratuita
- Ensino fundamental é obrigatório (6 a 14 anos)
- Incluindo educação de qualidade, não apenas acesso
- Educação em casa é permitida (homeschooling)
- Educação religiosa: Pode, mas não obrigatória
- Afrodescendentes: Ensino de história africana é obrigatório

ACESSO À EDUCAÇÃO:
- Filho deve estudar (obrigação familiar)
- Falta na escola: Pais podem ser punidos
- Educação especial: Criança com deficiência tem direito a educação adaptada
- EJA (Educação de Jovens e Adultos): Direito de voltar a estudar

EDUCAÇÃO SUPERIOR:
- Direito de acesso, mas não é obrigatória
- Cotas: Ações afirmativas em universidades públicas
- PROUNI: Bolsas em faculdades privadas
- FIES: Financiamento estudantil
- Importante: Universidade é cara, Estado ajuda pobres

QUALIDADE DA EDUCAÇÃO:
- Não é só matrícula, precisa ser qualidade
- Currículo mínimo (disciplinas obrigatórias)
- Professores treinados
- Infraestrutura adequada
- Crítica: Educação brasileira é desigual

DIREITO À SAÚDE:
- "Saúde é direito de todos e dever do Estado"
- SUS (Sistema Único de Saúde) garante acesso universal
- Gratuita (financiada por impostos)
- Sem discriminação
- Atendimento urgente sempre

COMO ACESSAR SAÚDE:
- Postos de saúde: Atendimento básico
- Hospitais: Atendimento urgente/internação
- Telemedicina: Consulta por telefone/video
- Ambulância: Chamado pelo 192 (SAMU) em emergência
- Doença + pobreza: Medicamentos podem ser fornecidos gratuitamente

SAÚDE PÚBLICA vs PRIVADA:
- Pública: Gratuita, universal (mas sobrecarregada, filas)
- Privada: Paga (mais rápido, especificidades)
- Plano de saúde: Cobertura privada regulada (ANS)
- Importante: Direito de ter plano privado, mas SUS não é alternativa, é direito

EDUCAÇÃO SANITÁRIA:
- Campanha de vacinação: Obrigatória (alguns imunizantes)
- Prevenção de doenças: Informação e programas
- Saúde mental: Direito a atendimento psicológico
- Importante: Prevenção é melhor que tratamento

DIREITO À MORADIA:
- "Todos têm direito a moradia digna"
- Dever do Estado fornecer programas
- Fundiário: Regularização de terrenos
- Habitação: Programas de casa própria
- Aluguel: Algumas proteções (não pode despejo arbitrário)

DIREITO AO LAZER:
- Incluído em direitos sociais
- Férias remuneradas: Direito
- Descanso: Finaldesenho de semana
- Parques, praças, atividades culturais: Acesso público
- Importante: Saúde mental depende de lazer

DIREITO À PREVIDÊNCIA SOCIAL:
- Proteção em idade avançada (aposentadoria)
- Doença/incapacidade: Auxílio-doença
- Desemprego: Seguro-desemprego
- Dependentes: Pensão se morre contribuinte
- INSS: Instituição que cuida
- Contribuição: Trabalhador contribui, depois recebe benefício

DIREITO À ASSISTÊNCIA SOCIAL:
- Para pobres/vulneráveis
- Programas: Bolsa Família, BPC (idosos/deficientes pobres)
- Abrigo: Para sem-teto
- Alimentação: Programas de alimentação escolar
- Importante: Rede de proteção social

DIREITO DE ACESSO AOS BENEFÍCIOS:
- Inscrição em programas sociais
- Renda mínima: Bolsa Família para familias pobres
- Idoso pobre: BPC garante mínimo
- Desempregado: Seguro-desemprego temporário
- Criança: Vale-bolsa para estudar

CRÍTICA E DEBATE:
- Alguns veem direitos sociais como fundamental (estado intervencionista)
- Outros acham que custam muito, geram dependência
- Debate político: Quanto Estado deve investir?
- Realidade: Brasil investe menos que países ricos em direitos sociais
- Consequência: Desigualdade, qualidade baixa

EDUCAÇÃO FINANCEIRA:
- Direito de aprender a gerenciar dinheiro
- Educação sobre crédito, poupança
- Proteção contra endividamento predatório
- Algumas escolas ensinam (educação financeira é nova disciplina)

DIREITO A ESPORTE E CULTURA:
- Acesso a atividades esportivas
- Patrimônio cultural é proteção estatal
- Museus, teatros, bibliotecas: Financiados ou acesso público
- Importante: Cultura não é só luxo, é direito

    {id:3,
     name:"Proteções Especiais: Crianças, Idosos, Deficientes",
     dur:"18 min",
     content:`Grupos vulneráveis recebem proteção especial da Constituição e leis.

PROTEÇÃO ÀS CRIANÇAS E ADOLESCENTES:
- Prioridade absoluta em política pública
- Protegidas contra abuso, exploração, abandono
- Direito a convivência familiar
- Educação obrigatória
- Saúde: Atendimento prioritário
- Trabalho: Proibido antes de 16 anos (exceção: aprendiz aos 14)
- Exploração: Sexual, tráfico, trabalho forçado são crimes graves
- Processo judicial diferente: Socioeducativo, não criminoso (menores)

ESTATUTO DA CRIANÇA E DO ADOLESCENTE (ECA):
- Lei específica para crianças/adolescentes
- Direitos e deveres
- Proteção contra abuso
- Guarda, adoção, tutela
- Medidas socio-educativas (não pena, mas educação)

DIREITO AO ACOMPANHAMENTO FAMILIAR:
- Criança tem direito a pai e mãe
- Ambos devem sustentar
- Se pais são separados, direito de ver ambos
- Guarda pode ser compartilhada
- Pensão alimentícia é obrigatória

ABUSO E EXPLORAÇÃO:
- Abuso sexual: Crime, pode resultar em prisão, indenização
- Tráfico de crianças: Crime grave
- Trabalho infantil: Proibido, explorador é criminoso
- Negligência: Falta de cuidado pode resultar em perda de guarda

DIREITO AO BRINCAR:
- Direito explícito da criança
- Educação deve permitir
- Importante: Desenvolvimento saudável

ADOLESCENTE INFRATOR:
- Menor que comete crime é responsável?
- Sim, mas de forma diferente
- Medida socio-educativa (não pena)
- Objetivo: Reabilitação, não punição
- Internação: Só em casos graves
- Nomes mantidos em sigilo

PROTEÇÃO AOS IDOSOS:
- "A família, a sociedade e o Estado têm o dever de amparar os idosos"
- Direito a convivência familiar
- Atendimento prioritário (filas, atendimento)
- Acesso a medicamentos
- Proteção contra negligência, abuso, abandono
- Direito a viver dignamente

ESTATUTO DO IDOSO (Lei 10.741/2003):
- Direitos e deveres do idoso
- Maior de 60 anos é considerado idoso
- Desconto em transporte público
- Isenção de taxas em alguns serviços
- Prisão: Idoso pode ter regime especial (prisão domiciliar)

ABUSO CONTRA IDOSO:
- Negligência: Falta de cuidado (crime)
- Abuso físico: Violência
- Abuso psicológico: Humilhação, isolamento
- Financeiro: Roubo de patrimônio
- Vítima pode processar, denunciar
- Agressor pode perder direitos

APOSENTADORIA:
- Direito do idoso que trabalhou
- Valor: Baseado em contribuição
- Tempo de contribuição: Variável conforme lei
- Aposentadoria por idade: Após certa idade (65M/62H)
- Aposentadoria por contribuição: Após tempo de serviço

PROTEÇÃO A PESSOAS COM DEFICIÊNCIA:
- "A Lei assegura aos portadores de deficiência a plena exercício de seus direitos..."
- Sem discriminação
- Acessibilidade: Rampa, elevador, banheiro adaptado, piso tátil
- Atendimento preferencial
- Educação inclusiva (escola deve acomodar)
- Trabalho: Cotas obrigatórias em empresas (2% a 5%)

DEFICIÊNCIA LEGAL:
- Pessoa com deficiência é quem tem impedimento de longo prazo (mais de 2 anos)
- Físico, mental, intelectual, sensorial
- Que atrapalha participação plena na sociedade
- Avaliação médica e social

DIREITOS EM TRANSPORTE:
- Assentos prioritários
- Rampas, elevadores em estações
- Desconto (em alguns transportes)
- Acompanhante gratuito se necessário
- Serviço de paratransporte (ônibus especial)

DIREITOS NO TRABALHO:
- Não pode ser discriminado
- Acomodações razoáveis (lugar próximo, pausas)
- Direito de acompanhante em entrevista (se necessário)
- Cotas: Empresa com 100+ funcionários tem cotas
- Aposentadoria: Benefícios especiais em alguns casos

TECNOLOGIA ASSISTIVA:
- Equipamentos que ajudam (prótese, cadeira de rodas, bengala)
- Direito de acesso
- Financiamento: Alguns programas ajudam
- Inovação: Novas tecnologias permitem maior independência

SAÚDE ESPECÍFICA:
- Terapia: Fonoaudiologia, fisioterapia, psicologia
- SUS cobre
- Medicamentos: Acesso garantido
- Reabilitação: Programas de reabilitação

BPC (BENEFÍCIO DE PRESTAÇÃO CONTINUADA):
- Assistência a deficientes pobres
- Valor: Salário mínimo (não é trabalho)
- Requisitos: Deficiente comprovado + pobre
- Importante: Bolsa pra deficiente sem renda

DIREITO À CONSULTA:
- Políticas que afetem deficientes devem consultá-los
- Voz importante em decisões
- Importante: Incluir afetados na decisão

INCLUSÃO vs INTEGRAÇÃO:
- Integração: Pessoa se adapta ao sistema (exclusivo)
- Inclusão: Sistema se adapta à pessoa (acolhedor)
- Objetivo: Incluir, não integrar apenas

</blockquote>`,

    {id:1,
     name:"Garantias Processuais e Direito de Defesa",
     dur:"17 min",
     content:`Se você está envolvido em processo (criminal ou cível), tem garantias legais. Governo não pode arbitrariamente prendê-lo ou julgar.

GARANTIAS PROCESSUAIS FUNDAMENTAIS:
- Direito de acesso à justiça
- Direito de ser ouvido
- Direito de defesa (ter advogado)
- Direito ao contraditório (poder questionar acusação)
- Direito a julgamento imparcial
- Direito a recurso (questionar decisão)

PRESUNÇÃO DE INOCÊNCIA:
- Acusado presume-se inocente
- Acusação precisa provar, não acusado provar inocência
- Dúvida razoável favorece acusado
- Importante: Não significa que é realmente inocente, é proteção legal

DIREITO A ADVOGADO:
- Se tem dinheiro: Escolhe advogado
- Se pobre: Defensoria Pública fornece gratuitamente
- Advogado é direito, não privilégio
- Sem advogado: Pode prejudicar defesa
- Acesso à justiça: Essencial para democracia

DIREITO DE SILÊNCIO:
- Em processo criminal: Pode não responder perguntas
- Silêncio não é admissão de culpa
- Não pode sofrer punição por se calar
- Importante: Contra auto-incriminação

DIREITO AO SIGILO:
- Privacidade em investigação inicial (pode ser sigilosa)
- Após ponto: Abre público
- Segredo profissional: Advogado não pode revelar conversas
- Confessor: Padre não pode revelar confissão
- Médico: Não pode revelar informação do paciente

CONTRADITÓRIO:
- Acusação apresenta versão
- Defesa pode questionar, apresentar contra-versão
- Ambas com oportunidade igual
- Juiz ouve ambas
- Importante: Ninguém é julgado em ausência

DIREITO À PROVA:
- Defesa pode apresentar prova
- Pode chamar testemunhas
- Pode fazer perícia
- Juiz precisa considerar
- Prova ilícita (obtida illegalmente) não vale

JULGAMENTO RÁPIDO:
- Direito a julgamento sem demora injustificada
- Crítica: Justiça é lenta, demora anos
- Importante: Não pode ficar preso indefinidamente esperando julgamento
- Excesso de prazo: Pode levar a reparação

DIREITO À EXECUÇÃO JUSTA:
- Sentença tem que ser clara
- Condenação tem que especificar por quê
- Pode apelar se discorda
- Execução: Não pode ser arbitrária
- Prisão: Tem condições mínimas (higiene, alimentação)

DIREITO A CONDIÇÕES HUMANAS:
- Prisão: Não é lugar de tortura
- Alimentação: Suficiente
- Higiene: Acesso a banho, roupa
- Saúde: Atendimento médico
- Abuso: É crime

DIREITO A HABEAS CORPUS:
- Quando liberdade está sendo injustamente restringida
- Pessoa ou terceiro pode pedir
- Juiz revê se prisão é legal
- Se ilegal, liberta imediatamente
- Importante: Proteção contra prisão arbitrária

DIREITO A MANDADO DE SEGURANÇA:
- Quando direito claro é violado
- Contra autoridade
- Rápido
- Não é processo normal, é urgente

DIREITO A JUSTIÇA GRATUITA:
- Pobre pode processar sem pagar custas
- Defensoria fornece advogado
- Importante: Acesso à justiça é direito de todos
- Riqueza não pode determinar quem tem direito

DIREITO A PUBLICIDADE:
- Julgamento é público (salvo exceção)
- Imprensa pode cobrir
- Importante: Transparência, limite abuso
- Sigilo: Pode ser em casos especiais (segurança, privacidade vítima)

DIREITO A JUSTIÇA ESPECIALIZADA:
- Menores: Processo especial, socioeducativo
- Indígenas: Consideração de direito próprio
- Trabalhadores: Justiça do Trabalho especializada

DIREITO A REVISÃO:
- Sentença pode ser revisada
- Ação rescisória: Anula sentença por vício grave
- Recurso: Questiona sentença
- Importante: Sistema não é perfeito, permite correção

DIREITO A COMUTAÇÃO DE PENA:
- Presidente pode cominar (reduzir) pena
- Governador em crimes estaduais
- Importante: Pode levar a liberdade antecipada

<blockquote class="tip">
💡 Importante: Se preso, peça advogado imediatamente. Não fale sem advogado. Silêncio é seu direito e melhor proteção em muitos casos.
</blockquote>`,

    {id:2,
     name:"Deveres e Responsabilidades do Cidadão",
     dur:"18 min",
     content:`Direitos vêm com deveres. Cidadão não só recebe, mas também tem responsabilidades para funcionamento da sociedade.

DEVER DE CUMPRIR LEI:
- Leis obrigam todos
- Ninguém está acima
- Violar lei: Pode resultar em pena
- Importante: Lei é consenso social, precisa ser respeitada

DEVER DE PAGAR IMPOSTOS:
- Imposto financia Estado
- Educação, saúde, segurança vêm de impostos
- Sonegação: Não pagar é crime
- Declaração: Precisar declarar renda
- Importante: Sistema funciona com arrecadação

DEVER DE ACESSO À EDUCAÇÃO:
- Pais: Colocar filho na escola (obrigação)
- Crianças: Frequentar escola (obrigação)
- Falta: Pode resultar em processo contra pais
- Importante: Educação é fundamento da democracia

DEVER ELEITORAL:
- Votar é obrigatório (maiores de 18)
- Não votar: Multa, restrições
- Importante: Participação é dever da democracia
- Crítica: Alguns veem como restrição

DEVER MILITAR:
- Homens maiores de 18: Obrigação de serviço militar
- Exceções: Objeção de consciência (religião, ética)
- Duração: ~1 ano
- Importante: Defesa do país

DEVER COMUNITÁRIO:
- Jurados: Pode ser chamado a ser jurado (dever moral)
- Testemunha: Obrigação de testemunhar se chamado
- Não responder: Crime de desobediência
- Importante: Justiça depende de participação

DEVER DE NÃO DISCRIMINAR:
- Patrão: Não pode discriminar em emprego
- Estabelecimento: Não pode recusar por raça, religião
- Escola: Não pode discriminar
- Público: Não pode usar violência discriminatória
- Lei: Aplicada para todos

DEVER DE PATERNIDADE/MATERNIDADE:
- Pai/mãe: Obrigação de sustentar filho
- Alimentação, moradia, educação
- Pensão alimentícia: Obrigatória se separado
- Negligência: Pode resultar em perda de direitos parentais

DEVER DE CUIDADO COM PROPRIEDADE ALHEÍA:
- Se outro confia bem, tem dever de cuidado
- Danificar: Pode ter que reparar
- Importante: Responsabilidade civil

DEVER AMBIENTAL:
- "Todos têm direito ao meio ambiente... dever de defendê-lo"
- Não pode destruir natureza
- Pode ser responsabilizado por dano ambiental
- Plantio: Alguns Estados obrigam a plantar árvore
- Importante: Meio ambiente é de todos

RESPONSABILIDADE CRIMINAL:
- Maior de 18: Totalmente responsável por crimes
- Menor de 18: Responsabilidade reduzida
- Inimputáveis: Doentes mentais, menores de certa idade
- Importante: Responsabilidade é elemento de maturidade

RESPONSABILIDADE CIVIL:
- Dano a terceiro: Precisa reparar
- Responsabilidade dos pais: Responsáveis por filho menor
- Responsabilidade do patrão: Responsável por funcionário
- Importante: Não é só pena, é reparação

DEVER DE INFORMAÇÃO:
- Decente: Informar se bem está defeituoso
- Empregador: Informar condições de trabalho
- Fornecedor: Informar composição do produto
- Importante: Transparência

DEVER DE DENÚNCIA:
- Conhece crime: Não precisa denunciar, mas é moral
- Servidor público: Denúncia é obrigação
- Importante: Sociedade funciona com denúncia

DEVER DE SIGILO:
- Informação confidencial: Não revelar
- Criança: Proteção de identidade (sigilo)
- Vítima: Proteção contra exposição
- Importante: Privacidade de vulnerável

RESPONSABILIDADE AMBIENTAL:
- Lixo: Descartar responsavelmente
- Poluição: Não poluir
- Preservação: Proteger natureza própria
- Reciclagem: Importante para futuro

RESPONSABILIDADE SOCIAL:
- Empresa: Responsabilidade com sociedade (RSE)
- Comunidade: Responsabilidade com comunidade
- Transparência: Informar atividades
- Importante: Negócio não é só lucro

RESPONSABILIDADE DIGITAL:
- Internet: Não publicar fake news
- Redes sociais: Responsabilidade pelo conteúdo
- Ciberbullying: Crime
- Importante: Digital é real, tem consequências

DEVER DE BOA-FÉ:
- Contratos: Cumprir contrato de boa-fé
- Negociação: Não enganar
- Relacionamento: Não prejudicar injustamente
- Importante: Confiança é base

DEVER DE ASSISTÊNCIA:
- Alguém em perigo: Pode ter dever de ajudar
- Afogado: Pode ter obrigação de chamar ajuda
- Criança sozinha: Obrigação de cuidar/chamar polícia
- Importante: Não é abandonismo

<blockquote class="quote">
💬 "Democracia depende não só de direitos, mas de cidadãos responsáveis cumprindo deveres. Direito vem com responsabilidade."
</blockquote>`,

    {id:3,
     name:"Situações Práticas: Conhecendo Seus Direitos no Dia a Dia",
     dur:"18 min",
     content:`Teoria é importante, mas aplicação prática é essencial. Vamos ver situações reais onde conhecer direitos protege você.

SITUAÇÃO 1 - PRISÃO OU ABORDAGEM POLICIAL:
Direitos que você tem:
- Identificação: Polícia pode pedir ID
- Revista: Podem revistar, mas não pode ser abusivo
- Prisão: Só com motivo legal (flagrante, mandado)
- Informação: "Por que estou sendo preso?"
- Advogado: Pode pedir e tem direito
- Silêncio: Não é obrigado a responder
- Comunicação: Pode avisar família/advogado

Situação: Você é parado na rua e polícia quer revistar.
Seu direito: Pode pedir para fazer de forma respeitosa. Não é abusivo? Respeita. Abusivo? Pode reclamar depois.

SITUAÇÃO 2 - ACUSAÇÃO DE CRIME:
Direitos:
- Presunção de inocência
- Direito a advogado
- Direito de silêncio
- Prova justa
- Julgamento rápido

Ação: Se acusado, procure advogado imediatamente. Não confesse sem advogado. Procure defender-se legalmente.

SITUAÇÃO 3 - DISCRIMINAÇÃO:
Você sofre discriminação (racial, religiosa, sexual, por deficiência).

Direitos:
- Não sofrer discriminação
- Denunciar
- Pedir indenização

Ação: Denuncie em delegacia (crime), registre em PROCON/órgão competente. Procure advogado para indenização.

SITUAÇÃO 4 - VIOLÊNCIA DOMÉSTICA:
Você ou alguém sofre abuso de companheiro.

Direitos (Lei Maria da Penha):
- Proteção contra violência
- Medida protetiva (afastamento do agressor)
- Atendimento especializado
- Sigilo

Ação: Denuncie polícia, procure delegacia especializada. Defensoría oferece ajuda legal gratuita. Casa de abrigo disponível se precisar.

SITUAÇÃO 5 - DÉBITO/COBRANÇA INDEVIDA:
Você é cobrado por coisa que não deve/nunca contratou.

Direitos:
- Não pagar o indevido
- Pedir devolução em dobro
- Processar credor
- Reclamar no PROCON

Ação: Notifique credor por escrito. Se não resolver, procure PROCON. Se precisa, processe.

SITUAÇÃO 6 - DIREITO À MORADIA:
Você está à procura de moradia/é despejado.

Direitos:
- Direito a moradia digna
- Programas de habitação (governo)
- Proteção contra despejo arbitrário

Ação: Procure prefeitura por programas habitacionais. Se despejo é ilegal, procure advogado. Existe beneplacito de Lei há contra despejo sem processo.

SITUAÇÃO 7 - EDUCAÇÃO:
Seu filho é negado acesso a escola/sofre discriminação.

Direitos:
- Educação obrigatória
- Acesso à escola
- Sem discriminação
- Qualidade

Ação: Procure escola, depois se negar secretaria de educação. Se discriminação, procure PROCON/órgão de direitos humanos.

SITUAÇÃO 8 - SAÚDE:
Você precisa de atendimento/medicamento e SUS nega.

Direitos:
- Saúde é direito universal
- SUS cobre
- Medicamento: Se prescrito, direito

Ação: Procure outro hospital/posto. Se negar, procure Ministério Público/tribunal. Às vezes justiça ordena fornecimento mesmo se SUS hesita.

SITUAÇÃO 9 - VOTO:
Você é coagido a votar em alguém/seu direito de voto é negado.

Direitos:
- Voto é secreto, de quem você quer
- Ninguém pode coagir
- Se negam direto de votar, pode reclamar

Ação: Denuncie TSE se há coação. Se lhe negam voto, procure tribunal eleitoral urgentemente (eleição é no prazo).

SITUAÇÃO 10 - TRABALHO:
Você é demitido injustamente/não é pago.

Direitos:
- Aviso prévio ou indenização
- Direito a FGTSão
- Seguro-desemprego
- Reclamação trabalhista

Ação: Procure sindicato, Ministério do Trabalho. Processe na Justiça do Trabalho. É gratuita para pobre.

SITUAÇÃO 11 - DEFICIÊNCIA:
Você tem deficiência e sofre discriminação/barreira.

Direitos:
- Acessibilidade
- Não discriminação
- Atendimento preferencial
- Cotas em emprego

Ação: Procure lugar competente (repartição, emprego, escola) com pedido formal. Se nega, PROCON/tribunal.

SITUAÇÃO 12 - IDOSO:
Você é abandonado/sofre negligência.

Direitos:
- Convivência familiar
- Atendimento prioritário
- Proteção contra abuso
- Indenização por negligência

Ação: Denuncie polícia, procure conselho de direitos de idoso. Pode processar filho/familiar por abandono.

COMO COBRAR DIREITO:
1. Informal: Converse, peça respeitosamente
2. Formal escrita: Carta registrada, email registrado
3. Órgão administrativo: PROCON, Ministério do Trabalho, etc.
4. Legislativo: Vereador, deputado pode ajudar
5. Judiciário: Processo, juizado especial, tribunal

IMPORTANTE:
- Documentação: Guarde tudo (notas, emails, fotos, vídeos)
- Procedimento: Registre ordem e datas
- Prova: Comprova seus direitos
- Testemunha: Pessoas que viram ajudam
