    content: `Contrato é parte fundamental da vida moderna. Você firma contratos diariamente, às vezes sem perceber. Entender contratos protege você.

O QUE É CONTRATO?
Contrato é acordo entre duas ou mais pessoas (físicas ou jurídicas) onde cada uma assume direitos e obrigações. É consenso sobre troca: você dá algo, recebe algo em troca. Ambas as partes consentem.

Elementos essenciais de todo contrato:
1. CONSENTIMENTO: Ambas as partes concordam livremente
2. CAPACIDADE: Partes são capazes (maiores de idade, mentalmente sãs)
3. OBJETO LÍCITO: O que está sendo negociado é legal
4. FORMA: Pode ser escrita ou verbal (escrita é mais segura)

CONTRATO ESCRITO vs VERBAL:
- Escrito: Deixa registro. Ambas assinam. Se há disputa, tem prova. Recomendável.
- Verbal: Válido legalmente, mas é palavra contra palavra. Difícil provar. Riscos.
- Importante: Se está negociando algo importante (propriedade, emprego, grande soma), peça por escrito.

TIPOS DE CONTRATOS COMUNS:

1. CONTRATO DE COMPRA E VENDA:
- Uma parte vende, outra compra
- Transferência de propriedade
- Exemplos: Compra de casa, carro, objetos
- Importante: Para imóvel, precisa registrar em cartório para ser válido

2. CONTRATO DE LOCAÇÃO (ALUGUEL):
- Proprietário aluga bem, inquilino paga
- Duração: Mínimo 30 dias
- Valor: Acordado entre partes
- Garantia: Fiador ou depósito
- Termo: Pode ser renovado

3. CONTRATO DE TRABALHO:
- Patrão e empregado
- Direitos (salário, férias, 13º)
- Obrigações (trabalhar, cumprir ordens)
- Escrito: Carteira assinada é importante

4. CONTRATO DE EMPRÉSTIMO:
- Alguém empresta dinheiro
- Pode ter ou não juros
- Prazo: Para devolver
- Importante: Deixe por escrito, especialmente se é entre amigos (evita desentendimento)

5. CONTRATO DE PRESTAÇÃO DE SERVIÇO:
- Profissional oferece serviço
- Cliente paga por serviço
- Escopo: Que exatamente vai ser feito
- Importante: Detalhe bem o que se espera

6. CONTRATO DE SOCIEDADE:
- Dois ou mais sócios formam empresa
- Contribuem capital
- Dividem lucro/prejuízo
- Importante: Detalhado, pois podem surgir conflitos

CONDIÇÕES IMPORTANTES EM CONTRATO:
- Partes: Nomes completos, documentos (RG, CPF, CNPJ)
- Objeto: O que está sendo acordado, em detalhe
- Preço/Valor: Quanto se paga (se aplicável)
- Prazo: Quanto tempo dura
- Obrigações: Cada parte faz o quê?
- Penalidades: O que acontece se alguém viola?
- Assinatura: Ambas as partes assinam (ou representantes)
- Data: Quando foi feito

CLÁUSULAS ABUSIVAS:
- Se contrato tem cláusula que prejudica excessivamente uma parte, pode ser nula
- Exemplos: "Você renuncia a direitos trabalhistas", "Não pode processar"
- Lei protege contra abuso
- Se discorda de cláusula, não assine, ou peça para mudar

RESCISÃO DE CONTRATO:
- Acordo pode ser encerrado
- Mútuo acordo: Ambas concordam, podem negociar rescisão
- Violação: Parte viola, outra pode rescindir
- Prazo: Alguns contratos têm prazo de saída ou penalidade

FORÇA MAIOR:
- Evento imprevisto que impede cumprimento
- Exemplo: Incêndio destroi loja, não consegue cumprir contrato
- Ambas podem rescindir sem culpa
- Precisa documentar que foi força maior

PRAZO DE PRESCRIÇÃO:
- Direito de processar por violação de contrato prescreve
- Período: Geralmente 5 anos (varia conforme contrato)
- Importante: Não deixe passar, perde direito

TESTEMUNHAS:
- Contrato não precisa de testemunha para ser válido
- Mas testemunha ajuda se há disputa
- Comprador/vendedor de imóvel: Testemunhas recomendáveis

REGISTRO:
- Imóvel: Precisa registrar em cartório para ser válido
- Empresa: Precisa registrar em junta comercial
- Marca/Patente: Registro no INPI
- Importante: Registro é prova pública

CONTRATO PADRÃO:
- Alguns setores usam contratos padrão (locação, trabalho)
- Lei pode determinar cláusulas mínimas
- Você pode negociar mesmo em contrato padrão (nada é 100% rígido)

DIREITOS DO CONSUMIDOR EM CONTRATO:
- Direito a informação clara
- Direito de arrependimento (em alguns casos)
- Proteção contra cláusulas abusivas
- Prazo para decidir

<blockquote class="tip">

O QUE É PROPRIEDADE?
Propriedade é direito de uma pessoa sobre um bem (coisa). Significa direito de usar, gozar e dispor do bem como achar apropriado, respeitando lei.

TIPOS DE BEM:

BEM IMÓVEL:
- Propriedade fixa que não se move
- Imóvel: Casa, terreno, apartamento
- Direitos: Plantas, árvores no imóvel também são seus
- Registro: Em cartório de registro de imóveis
- Importante: Propriedade precisa de registro para ser totalmente segura

BEM MÓVEL:
- Propriedade que se move
- Exemplos: Carro, celular, roupas, móveis, dinheiro
- Registro: Alguns têm (carro = DETRAN, etc.)
- Importante: Posse demonstra propriedade (tem na mão, é seu)

COMO SE ADQUIRE PROPRIEDADE:

1. COMPRA E VENDA:
- Forma mais comum
- Comprador paga, vendedor transfere bem
- Imóvel: Precisa registrar em cartório
- Móvel: Entrega é suficiente (mas recibo ajuda)

2. HERANÇA:
- Pai morre, filho herda propriedade
- Automática por lei (se não tiver testamento)
- Precisar fazer inventário (processo para dividir patrimônio)

3. DOAÇÃO:
- Alguém oferece bem a você, sem pagamento
- Pode ser com ou sem condições
- Imóvel: Precisa escritura pública

4. OCUPAÇÃO:
- Bem sem dono é abandonado
- Você ocupa, usa continuamente
- Pode reivindicar posse
- Difícil em propriedade urbana, mais comum em rural

5. USUCAPIÃO (Prescrição Aquisitiva):
- Ocupar terra por tempo contínuo (10-20+ anos conforme tipo)
- Sem interrupção
- De boa-fé (achando que é seu)
- Resultado: Vira seu por lei
- Precisa registrar em tribunal

6. INVENÇÃO/CRIAÇÃO:
- Você cria algo (patente, marca, direito autoral)
- Direito é seu automaticamente
- Registro aumenta proteção

DIREITOS DO PROPRIETÁRIO:
- Usar: Utilizar como desejar (respeitando lei)
- Gozar: Receber frutos (aluguel de imóvel, produção agrícola)
- Dispor: Vender, dar, destruir (se deseja)
- Reivindicar: Se roubado, recuperar
- Excluir: Outras pessoas não podem sem consentimento

FUNÇÃO SOCIAL DA PROPRIEDADE:
- Propriedade não é absoluta
- Precisa cumprir função social
- Imóvel urbano: Precisa ser usado (não deixar vazio indefinidamente)
- Propriedade rural: Produção, preservação ambiental
- Lei pode exigir melhorias

LIMITAÇÕES À PROPRIEDADE:
- Vizinho: Direito de não ter perturbação excessiva
- Público: Interesse coletivo pode limitar seu direito (desapropriação)
- Ambiental: Não pode destruir natureza em sua propriedade
- Lei: Respeitar leis que regulam propriedade

CONDOMÍNIO:
- Propriedade compartilhada (prédio com apartamentos)
- Você é dono do apartamento
- Comum: Corredor, elevador, telhado (de todos)
- Taxa de condomínio: Obrigatória para manutenção do comum
- Assembléia: Decide sobre o comum

PROPRIEDADE EM CASAMENTO:
- Comunhão de bens: Bens adquiridos durante casamento são de ambos
- Separação de bens: Cada um mantém seus bens
- Regime estabelecido no casamento
- Divórcio: Patrimônio é dividido conforme regime

PROPRIEDADE E DÍVIDA:
- Credor pode penhorar propriedade
- Se deve, bem pode ser vendido em leilão
- Exceções: Casa de moradia (até certo valor), ferramentas de trabalho

ROUBO/FURTO:
- Se sua propriedade é roubada
- Você pode processar ladrão criminalmente
- Pode solicitar indenização civilmente
- Registro de bens ajuda comprovar propriedade

SEGURO:
- Propriedade cara (casa, carro): Considere seguro
- Seguro protege contra dano, roubo, acidente
- Prêmio: Você paga periodicamente
- Sinistro: Se ocorre sinistro, seguro compensa

DOCUMENTOS DE PROPRIEDADE:
- Imóvel: Certidão de Registro de Imóveis
- Carro: CRLV (Certificado de Registro de Licenciamento de Veículo)
- Empresa: Registro na Junta Comercial
- Importante: Guarde documento, é prova de propriedade

TRANSFERÊNCIA DE PROPRIEDADE:
- Venda: Contrato de compra e venda, transferência formal
- Herança: Inventário, partilha, registro
- Doação: Escritura pública, registro (se imóvel)
- Importante: Registre para ser seguro

</blockquote>`,

    name: 'Direito de Família: Casamento, Filhos, Divórcio, Herança',
    dur: '18 min',
    content: `Direito de Família cuida de relações entre pessoas: casamento, filhos, separação, herança. Affects você pessoalmente.

CASAMENTO:
- Contrato entre duas pessoas
- Direitos: Comunhão de bens, heranço mútuo, etc.
- Obrigações: Fidelidade, apoio mútuo (antes era obrigação moral, agora é legal)
- Requisitos: Maiores de 18 (menores 16 com autorização)
- Sexo: Casamento é entre duas pessoas (pode ser mesmo sexo desde 2013)

REGIME DE BENS:
- Comunhão de bens: Bens adquiridos durante casamento são compartilhados
- Separação de bens: Cada um mantém seus bens, não compartilha
- Participação final dos aquestos: Híbrido
- Importante: Define o que é de quem no divórcio

CASAMENTO X UNIÃO ESTÁVEL:
- Casamento: Formalizado em cartório
- União estável: Convivência contínua, pública, com intenção de casamento (mesmo sem papel)
- Direitos: Praticamente iguais
- Importante: União estável também é reconhecida legalmente

FILHOS LEGÍTIMOS E ILEGÍTIMOS:
- Essa distinção foi abolida
- Todos os filhos têm mesmos direitos
- Filiação: Pode ser reconhecida judicialmente (teste de DNA)
- Importante: Filho de relação não-formalizada tem direitos iguais

PODER FAMILIAR:
- Pais têm direito e dever sobre filhos
- Criar, educar, sustentar
- Direito de impor disciplina (dentro do limite legal)
- Perda de poder familiar: Se pais abusam, maltratam

SUSTENTO DE FILHOS:
- Ambos os pais obrigados (proporção de renda)
- Até filho completar 18 anos
- Pode continuar se estuda (até certa idade)
- Pensão alimentícia: Valor é fixado judicialmente
- Falta de pagamento: É crime, juiz pode cobrar

GUARDA:
- Quem fica com filho após separação
- Tipos: Unilateral (um dos pais), compartilhada (ambos)
- Interesse do filho: Prioridade
- Direito de visita: Pai/mãe sem guarda tem direito de ver filho
- Importante: Decisão é flexível, pode ser mudada

ADOÇÃO:
- Direito de adotar filho
- Casal casado ou solteiro pode adotar
- Casais do mesmo sexo: Podem adotar
- Processo: Judicial, investigação, período probatório
- Importante: Filho adotado tem mesmos direitos

DIVÓRCIO:
- Dissolução do casamento
- Causas: Pode ser sem culpa (só quer separar)
- Processo: Concordado (rápido) ou litigioso (lento)
- Patrimônio: Dividido conforme regime de bens
- Filhos: Decisão sobre guarda, pensão

DIVÓRCIO CONCORDADO:
- Ambas as partes concordam
- Acordo sobre tudo (bens, filhos, guarda)
- Rápido (meses) e barato
- Importante: Se há acordo, faça assim, economiza

DIVÓRCIO LITIGIOSO:
- Partes discordam
- Um quer separar, outro quer continuar (ou discordam sobre bens)
- Judicial: Juiz decide
- Lento (anos) e caro
- Importante: Evite se possível

SEPARAÇÃO JUDICIAL (PROCESSO SEPARADO):
- Alternativa ao divórcio (menos comum)
- Separa patrimônio e filhos, mas continua casado
- Raro: Maioria prefere divórcio (que é dissolução total)

ALIMENTOS (PENSÃO ALIMENTÍCIA):
- Obrigação de sustentar alguém necessitado
- Pode ser para filho, cônjuge (durante período transitório)
- Valor: Proporção de renda de quem paga
- Não pagamento: Execução, prisão por dívida de alimentos

HERANÇA:
- Bens deixados quando alguém morre
- Testamento: Se deixou vontade expressa
- Lei de sucessão: Se não deixou testamento
- Ordem legal: Cônjuge, filhos, pais, irmãos

TESTAMENTO:
- Documento onde expressa vontade sobre herança
- Pode favorecer pessoas (não precisa deixar para filhos apenas)
- Requisitos: Maior de 18, mentalmente sã
- Tipos: Ológrafo (escrita mão), público (cartório), cerrado
- Importante: Testamento pode ser contestado se há vício

INVENTÁRIO E PARTILHA:
- Processo para dividir herança entre herdeiros
- Inventário: Levanta todos os bens
- Partilha: Divide entre herdeiros
- Judicial: Se há disputa
- Amigável: Se todos concordam (mais rápido)

LEGÍTIMA:
- Parte que filhos/cônjuge têm direito obrigatório
- Não pode ser completamente excluído
- Pessoa pode dispor livremente do resto

DIREITOS SUCESSÓRIOS:
- Cônjuge: Herdeiro (compartilha com filhos)
- Filhos: Herdam por igual
- Filhos falecidos: Direito passa aos netos (representação)
- Importante: Lei é bem estabelecida

DOCUMENTOS NA SEPARAÇÃO/HERANÇA:
- Certidão de casamento/morte
- Documentação de bens (registro imóvel, carro)
- Testamento (se houver)
- Contrato pré-nupcial (se houver)
- Importante: Guarde tudo

<blockquote class="tip">

</blockquote>`,

    name: 'Proteção de Dados, Privacidade e Direitos Digitais',
    dur: '17 min',
    content: `Era digital criou novos direitos: privacidade na internet, proteção de dados pessoais, direitos digitais.

DIREITO À PRIVACIDADE:
- Privacidade é direito fundamental
- Na era digital: Dados pessoais são valiosos
- Governo e empresa não podem coletar sem consentimento
- Lei: LGPD (Lei Geral de Proteção de Dados) regulamenta

DADOS PESSOAIS:
- Informação que identifica ou pode identificar pessoa
- Nome, email, CPF, telefone, endereço, foto
- Dado biométrico: Impressão digital, facial
- Importante: Sua propriedade, não de terceiro

LEI GERAL DE PROTEÇÃO DE DADOS (LGPD):
- Lei 13.709/2018, em vigor desde 2020
- Regulamenta coleta, uso, armazenamento de dados
- Direitos: Acesso, retificação, exclusão de dados
- Empresa: Responsável por proteger dados
- Penalidade: Multa por violação

CONSENTIMENTO:
- Empresa precisa de consentimento para coletar dados
- Consentimento deve ser explícito (você concorda)
- Pode revogar consentimento depois
- Sem consentimento: Pode processar empresa

DIREITO DE ACESSO:
- Você pode pedir que empresa diga quais dados tem de você
- Empresa tem prazo para fornecer
- Importante: Transparência

DIREITO DE RETIFICAÇÃO:
- Se dado está errado, pode pedir para corrigir
- Empresa tem obrigação de corrigir

DIREITO DE EXCLUSÃO:
- Pode pedir para empresa deletar seus dados
- Chamado "direito ao esquecimento"
- Exceções: Dados que são necessários por lei

COOKIE E RASTREAMENTO:
- Website usa cookie para rastrear você
- Personalizaçãoão de anúncios
- Consentimento: Precisa avisar e você pode recusar
- Banner: Website pede consentimento para cookie

REDES SOCIAIS:

    content: `Dívida e crédito são parte da vida. Entender as leis de crédito protege você de exploração.

O QUE É CRÉDITO?
Crédito é quando alguém fornece bem ou dinheiro, você promete devolver depois. Há interesse (lucro): Você paga mais do que pegou emprestado.

TIPOS DE CRÉDITO:
- Cartão de crédito: Paga depois do consumo
- Empréstimo: Pega dinheiro, promete devolver com juros
- Financiamento: Compra algo financiado (carro, imóvel)
- Cheque especial: Limite no banco para usar se cai no negativo
- Crédito pessoal: Empresa empresta sem exigir garantia

JUROS:
- Custo do empréstimo (fee pelo uso do dinheiro)
- Taxa: Percentual do valor
- Juros simples: Calculados sobre valor original
- Juros compostos: Calculados sobre valor + juros anteriores (mais caro)
- Importante: Juros compostos é "juros sobre juros"

JUROS ABUSIVOS:
- Juros muito altos, acima do mercado
- Lei proíbe (art. 4º CDC)
- Crédito pessoal: Pode chegar a 100%+ ao ano (abusivo)
- Cartão de crédito: Pode passar de 200% ao ano (abusivo)
- Cheque especial: Pode passar de 100% ao ano (abusivo)
- Você pode processar para reduzir juros

TAXA DE JURO DO BANCO CENTRAL:
- Banco Central estabelece "taxa de juro" de referência (Selic)
- Bancos cobram acima disso (sua margem)
- Comparação: Se Selic é 10%, banco cobra 10-15%+ é normal
- Muito acima: Pode ser abusivo

CPF NEGATIVADO:
- Se você não paga dívida, credor registra no SPC/SERASA
- Seu nome fica negativado (restringido)
- Consequência: Não consegue crédito, às vezes não consegue emprego
- Duração: 5 anos (depois sai automaticamente)
- Direito: Pode pedir remoção se pagar

DEFESA CONTRA NEGATIVAÇÃO:
- Se negativação é indevida (dívida já paga), procure credor
- Peça para remover
- Se recusar, processe por dano moral
- Tribunal pode ordenar remoção imediata

COBRANÇA:
- Credor entra em contato para cobrar
- Proteção: Não pode ligar de madrugada, intimidar, ameaçar
- Lei: Limita forma de cobrança
- Abuso: Cobrança abusiva é passível de indenização

PRESCRICÇÃO DE DÍVIDA:
- Dívida não vence para sempre
- Prazo: 5 anos (pode variar)
- Passado o prazo: Credor não pode mais processar
- Mas: Dívida moral continua (você deve moralmente)

Lei DE USURA:
- Lei antiga que proíbe juros "excessivos"
- Modernamente substituída por LGCG (Lei de Garantias de Crédito)
- Juros: Devem estar escritos, compreensíveis

PROMOÇÃO E FINANCIAMENTO:
- "Compre agora, pague depois" é crédito
- Taxa: Pode estar oculta ("0%", mas com outras taxas)
- Atenção: Leia letra miúda
- Importante: Saber o custo total

COMPARAÇÃO DE TAXAS:
- Banco A: 10% ao mês
- Banco B: 5% ao mês
- Diferença é grande (composto)
- Importante: Sempre compare antes de contratar

TAXA EFETIVA:
- Taxa anunciada vs taxa efetiva (real)
- Podem ser diferentes
- Lei exige transparência (taxa efetiva clara)
- Importante: Entenda o custo real

FINANCIAMENTO IMOBILIÁRIO:
- Compra casa com financiamento
- Juros: Geralmente em torno de 6-8% (varia)
- Prazo: 20-30 anos (muito longo)
- Garantia: Casa é garantia (banco pode tomar se não pagar)
- Importante: Verifique se consegue pagar
- Se atrasar: Banco executa, perde a casa

SEGURO DE CRÉDITO:
- Alguns financiamentos exigem seguro
- Seguro paga dívida se você morre/fica desempregado
- Custo: Agregado ao financiamento
- Importante: Nem sempre vale a pena

FINANCIAMENTO DE CARRO:
- Similar ao imóvel, mas prazo menor (5-7 anos)
- Juros: Mais altos que imóvel (mais risco)
- Garantia: Carro é garantia
- Se atrasar: Banco retoma carro
- Seguro obrigatório: Além do financiamento

EDUCAÇÃO FINANCEIRA JURÍDICA:
- Entender leis de crédito protege você
- Muitas pessoas assinam sem ler
- Importante: Ler contrato, entender cláusulas
- Busca: Compare ofertas antes de contratar

FURO NO CRÉDITO:
- Falta de histórico (você nunca pegou crédito)
- Pode ter dificuldade de conseguir
- Solução: Começar com crédito pequeno, pagar, construir histórico

REFINANCIAMENTO:
- Você já tem dívida, tira novo empréstimo para pagar
- Pode melhorar condições (juros menores, prazo maior)
- Atenção: Acumula dívida se não for cuidadoso
- Importante: Calcule se vale a pena

    dur: '17 min',
    content: `Conflitos são inevitáveis. Resolvê-los eficientemente é importante para economizar tempo, dinheiro e estresse.

TIPOS DE CONFLITO:
- Comercial: Disputa sobre contrato
- Trabalhista: Conflito empregado-empregador
- Familiar: Disputa entre parentes
- Vizinhos: Disputa com vizinho
- Consumidor: Disputa sobre compra/serviço

ESCALAS DE RESOLUÇÃO:
1. Negociação direta
2. Mediação
3. Conciliação
4. Arbitragem
5. Processo judicial

NEGOCIAÇÃO DIRETA:
- Você e outra parte conversam
- Tentam chegar em acordo
- Sem terceiro
- Vantagem: Rápido, barato, preserva relacionamento
- Desvantagem: Pode não funcionar se há raiva

COMO NEGOCIAR:
- Seja cortês (agressividade afasta)
- Ouça (entenda posição da outra parte)
- Clarifique (explique sua posição)
- Procure solução ganha-ganha (ambos ganham)
- Registre acordo (por escrito)
- Importante: Negociação bem feita evita processo

MEDIAÇÃO:
- Terceiro neutro ajuda ambas as partes a chegar em acordo
- Mediador não decide, apenas facilita
- Confidencial
- Menos formal que conciliação
- Voluntária (ambas concordam)
- Importante: Muitas cidades têm centro de mediação gratuito

CONCILIAÇÃO:
- Similar a mediação, mas mais formal
- Terceiro (conciliador) pode sugerir solução
- Mais estruturada
- Pode resultar em acordo documentado
- Também confidencial
- Importante: Justiça tenta conciliação antes de julgar

CÂMARA DE ARBITRAGEM:
- Terceiro escolhido (árbitro) escuta ambas as partes e decide
- Não é juiz, é árbitro
- Decisão é vinculante (tem que cumprir)
- Rápido (meses, não anos)
- Confidencial (não é público)
- Custo: Ambas pagam (árbitro é pago)

QUANDO USAR ARBITRAGEM:
- Contrato prevê arbitragem
- Ambas concordam
- Quer sigilo (processo judicial é público)
- Quer rapidez
- Quer especialista (árbitro pode ser expert da área)

PROCESSO JUDICIAL (última opção):
- Juiz ouve ambas as partes
- Público
- Lento (anos)
- Caro (custas, honorários)
- Vencedor pode obrigар vencido a pagar custas
- Importante: Use quando outras opções não funcionam

QUANDO PROCESSAR:
- Outro lado não quer negociar
- Montante é grande
- Princípio está em jogo (não é só dinheiro)
- Prova é forte (você tem chance real de ganhar)
- Tenha recursos (processo é caro)

ANTES DE PROCESSAR:
- Tente acordo (economia de tempo/dinheiro)
- Procure mediador/conciliador
- Consulte advogado (opine sobre chances)
- Calcule custos (vale a pena?)

ESCOLHA DE ADVOGADO:
- Experiência em área relevante
- Honorários: Negocie (% de ganho ou valor fixo)
- Confiança: Precisa de relação boa
- Importante: Advogado bom é investimento

TERMOS DO ACORDO:
- Claro: Ambas entendem exatamente o que foi acordado
- Específico: Detalhes definidos (valor, prazo, forma)
- Escrito: Acordo deve estar por escrito
- Assinado: Ambas assinam (prova)
- Importante: Acordo bem escrito evita novo conflito

EXECUÇÃO DO ACORDO:
- Ambas cumprem
- Se uma não cumpre: Outra pode processar para cobrar acordo
- Mais fácil cobrar acordo: Já existe documento assinado
- Importante: Documento de acordo é "título executório"

MEDIAÇÃO ONLINE:
- Algumas plataformas oferecem mediação online
- Rápido (semanas)
- Conveniente (de casa)
- Importante: Crescendo no Brasil

SMALL CLAIMS (PEQUENAS CAUSAS):
- Juizado Especial para causas até R$ 20 mil
- Sem advogado obrigatório
- Rápido (meses)
- Barato
- Ideal para conflitos pequenos
- Importante: Não custa muito tentar

PROVA EM CONFLITO:
- Documento: Contrato, email, recibo
- Testemunha: Pessoa que viu/sabe
- Perícia: Especialista analisa (ex: imóvel)
- Importante: Melhor prova é documento

ACORDO PARCIAL:
- Às vezes não consegue 100% do que quer
- Acordo parcial é melhor que processo longo
- Economia: De tempo e dinheiro
- Importante: Pragmatismo

    name: 'Proteção de Consumidor em Compras Offline e Online',
    dur: '18 min',
    content: `Direito do consumidor é amplo. Protege tanto em compra na loja física como online.

COMPRA OFFLINE (LOJA FÍSICA):
- Direito a informação clara: Preço, composição, origem
- Direito a qualidade: Produto não pode ser defeituoso
- Direito a prazo: Produto deve cumprir prazo
- Direito a não discriminação: Loja não pode recusar por raça, etc.

VENDEDOR RESPONSÁVEL:
- Loja é responsável por qualidade do produto
- Não é "como está vendido", precisa funcionar
- Defeito dentro de prazo: Troca, conserto ou reembolso
- Importante: Loja não pode se isentar

RECLAMAÇÃO NA LOJA:
- Produto foi danificado? Procure loja
- Leve nota fiscal (prova de compra)
- Peça para trocar ou devolver
- Se recusa, procure PROCON
- Importante: Não agueça, procure direito

COMPRA ONLINE:
- Mesmos direitos de loja física
- Plus: Direito de arrependimento (7 dias)
- Plus: Direito a informação antes de clicar "comprar"

INFORMAÇÕES OBRIGATÓRIAS ONLINE:
- Nome da empresa
- Endereço
- Telefone
- Email
- Política de privacidade
- Termos de serviço
- Preço total
- Prazo de entrega
- Forma de devolução
- Importante: Tudo acessível

VERIFICAÇÃO ANTES DE COMPRAR:
- Site seguro? Procure "https://" e cadeado
- Empresa existe? Google, verifique reviews
- Preço realista? Compare com outros
- Formas de pagamento? Seguras?
- Importante: Desconfiança é proteção

PAGAMENTO SEGURO:
- Cartão de crédito: Proteção contra fraude
- Boleto: Mais seguro (você controla)
- PIX: Rápido, mas menos proteção
- PayPal: Intermediária, proteção extra
- Importante: Cartão é mais seguro

FAKE SHOP (LOJA FALSA):
- Website parece real, mas não entrega
- Sinais: Preço muito baixo, site ruim, sem informação de contato
- Proteção: Verificar reputação, pesquisar
- Denúncia: Pode reportar site falso
- Importante: Se comprou, denuncie cartão para chargeback

DIREITO DE ARREPENDIMENTO:
- 7 dias para devolver compra online
- Sem motivo
- Reembolso completo
- Prazo: Contar de recebimento do produto
- Exceções: Produtos personalizados, perecíveis já abertos

COMO USAR ARREPENDIMENTO:
- Notifique loja (email, formulário)
- Devolva produto (prazo para devolver é até 30 dias)
- Guarde comprovante de envio
- Prazo de reembolso: Até 30 dias após recebimento da devolução
- Importante: Procure como devolver ANTES de comprar

PRODUTO COM DEFEITO ONLINE:
- Mesmos direitos que loja física
- Conserto, troca ou reembolso
- Prazo: 30 dias para defeito aparente, 180 para oculto
- Loja cobre o frete de devolução (geralmente)
- Importante: Documente problema (foto, vídeo)

ATRASO NA ENTREGA:
- Prazo não foi cumprido
- Direito: Cancelar e pedir reembolso, ou receber com desconto
- Responsável: Loja é responsável (mesmo que culpa seja da transportadora)
- Importante: Procure loja primeiro

RASTREAMENTO:
- Loja deve fornecer número de rastreamento
- Você pode acompanhar
- Se diz "entregue" mas você não recebeu: Problema da loja
- Importante: Guarde número

ASSINATURA NA ENTREGA:
- Você assina que recebeu
- Importante: Verifique produto antes de assinar
- Se defeituoso: Recuse ou assine "recebido com defeito"
- Importante: Assinatura é prova

DEVOLUÇÃO:
- Loja deve fornecer mecanismo de devolução

- Frete: Geralmente loja cobre
- Importante: Verifique antes de comprar

REEMBOLSO:
- Prazo: 30 dias após recebimento da devolução
- Forma: Mesmo método de pagamento (se cartão, volta para cartão)
- Importante: Não desista antes de prazo

AVALIAÇÃO E REVIEW:
- Você pode avaliar produto/loja
- Resenha honesta é protegida (não é difamação)
- Importante: Avaliação ajuda outros

PROTEÇÃO DE DADOS NA COMPRA:
- Loja coleta seus dados (nome, email, endereço)
- Proteção: LGPD garante privacidade
- Consentimento: Precisa de seu consentimento
- Importante: Leia política de privacidade

PROMOÇÃO FALSA:
- "50% de desconto" que não existe
- Crime: Enganosa
- Direito: Processar por dano
- Importante: Compare preços

LEI DE DEFESA DO CONSUMIDOR (CDC):
- Lei 8.078/1990
- Protege consumidor em compra/serviço
- PROCON fiscaliza
- Direito: Indenização por dano moral se violado

PROCESSAMENTO:
- Se loja não resolve, procure PROCON
- PROCON tenta resolver (gratuito)
- Se PROCON não consegue, processe
- Juizado Especial é rápido, barato
- Importante: Procure direito

    content: `Conhecer lei é teoria. Aplicação prática é o que protege você. Vamos ver como agir em situações reais.

CENÁRIO 1 - ACIDENTE COM CARRO:
Você bate seu carro em outro.

Ações imediatas:
1. Verificar se há feridos (chamar ambulância se houver)
2. Chamar polícia (boletim de ocorrência é importante)
3. Trocar informação com outro motorista (nome, telefone, placa, seguro)
4. Tirar foto (cena, danos)
5. Testemunhas: Peça nome e telefone de quem viu

Legalmente:
- Se foi culpa sua: Seu seguro paga dano do outro
- Se foi culpa do outro: Seguro dele paga seu dano
- BO: Importante para reclamação de seguro
- Indenização: Se houver lesão, pode processar

Proteção:
- Seguro: Obrigatório (DPVAT)
- Documentação: Boletim, fotos, informações
- Importante: Não admita culpa no local

CENÁRIO 2 - ACIDENTE NO TRABALHO:
Você sofre acidente no trabalho (se machuca).

Ações:
1. Avise ao patrão imediatamente
2. Vá ao hospital (SUS ou privado)
3. Peça atestado médico
4. CAT: Patrão deve fazer Comunicação de Acidente de Trabalho (INSS)
5. Foto: Se houver lesão, tire foto

Direitos:
- Afastamento: INSS cobre (até certa quantia)
- Indenização: Se patrão foi negligente (falta de equipamento, segurança)
- Processe: Justiça do Trabalho é opção
- Importante: Documente negligência do patrão

Proteção:
- Denuncie: Patrão negligente com segurança
- Sindicato: Pode ajudar
- Ministério do Trabalho: Fiscaliza

CENÁRIO 3 - DIVÓRCIO COM FILHOS:
Você quer se separar, tem filhos.

Primeiro: Procure advogado (consultoria)
Negociar:
1. Guarda: Quem fica com filhos
2. Pensão: Quanto paga
3. Patrimônio: Como divide bens

Opções:
- Concordado: Se concordam sobre tudo (rápido, ~3 meses)
- Litigioso: Se discordam (lento, ~2-3 anos)
- Mediação: Tentar acordo com mediador (mais rápido que litigioso)
- Importante: Concordado economiza tempo e dinheiro

Documento:
- Acordo: Se concordam, fazem acordo escrito (assinado, com advogado)
- Sentença: Se litigioso, juiz decide

Pós-separação:

- Pensão: Obrigatória enquanto filho é menor
- Importante: Ambos seguem tendo direitos parentais

2. PROCON: Registre reclamação
3. Pequenas Causas: Se loja não resolve
4. Importante: Primeiro tente loja, depois órgãos

Prazos:
- 30 dias: Defeito aparente
- 90-180 dias: Defeito oculto (depende durável/não durável)
- Importante: Guarde comprovante de compra

Você é cobrado por algo que não contratou.

1. Procure credor: Explique que não contratou
2. Peça para cancelar
3. Notifique por escrito: Email registrado, carta registrada
4. Se não resolver, procure PROCON

Direitos:
- Devolução em dobro: Cobrança indevida = devolver em dobro
- Indenização por dano moral: Se nome foi negativado
- Importante: Documente tudo

Passo-a-passo:
1. Email/carta: "Não contratei, cancelem"
2. PROCON: Se não responder
3. Justiça: Se PROCON não resolve

Você ou alguém sofre violência de companheiro.

2. Procurar local seguro (amigos, família, abrigo)
3. Chamar polícia (190)
4. Procurar delegacia de mulher

Proteção legal:
- Lei Maria da Penha: Proteção especial
- Medida protetiva: Juiz ordena afastamento do agressor
- Ordem de restrição: Agressor não pode se aproximar
- Importante: Denúncia é pública (você não precisa processar)

Documentação:
- Boletim de ocorrência: Base para medida protetiva
- Atestado médico: Prova de violência
- Fotos: Lesões
- Importante: Guarde tudo

Suporte:
- Defensoria: Advogado gratuito
- Delegacia de Mulher: Especializada
- Casa de Abrigo: Proteção temporária
- Importante: Não esteja sozinha

- Verifique se está correto
- Se duvidoso, procure sindicato

Se patrão não paga:

- Importante: Prazo é 2 anos para reclamar

3. Denúncia: Sindicato, ministério do trabalho

Processamento:

- IGUALDADE: Existe para proteger
- Indenização: Pode resultar em compensação financeira
- Importante: Lei proíbe discriminação

- Importante: Você é protegido

Seu vizinho faz barulho excessivo.

Ações:

3. Condomínio: Procure síndico/assembléia (se condomínio)
4. Polícia: Denuncie para polícia

Legalmente:
- Limite de ruído: Lei estabelece (geralmente até certa hora)
- Meio-ambiente: Poluição sonora é considerada ambiental
- Vizinho pode ser processado por dano moral
- Importante: Documente (áudio, fotos horárias)

Proteção:
- Ato obsceno contra vizinho: Pode ser processado também
- Medida protetiva: Juiz pode ordenar redução de barulho
- Importante: Tem direito ao sossego

Pessoa morre, herança é disputada entre herdeiros.

4. Judicial: Se há disputa (longo)

- Inventário judicial: 1-3+ anos
- Importante: Comece processo logo

Documentação:
- Testamento: Se houver (muda ordem de herança)
- Certidão de morte: Base para inventário
- Documentação de bens: Imóvel, carro, bancos
- Importante: Procure cartório da pessoa falecida

Direitos:
- Herdeiro tem direito à sua parte
- Pode questionar se sentir prejudicado
- Mediação: Pode tentar resolver
- Importante: Lei define ordem de herança
