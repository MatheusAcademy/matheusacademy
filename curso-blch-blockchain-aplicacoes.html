      name: 'O que é Blockchain e como funciona',
      content: `<h4>Introdução ao Blockchain</h4>
<p>Você deve estar cansado de ouvir falar em blockchain apenas no contexto de criptomoedas, não é? Neste módulo inicial, vamos explorar a verdadeira essência da tecnologia blockchain e entender por que ela está revolucionando diversos setores da economia.</p>
<p>Um blockchain é, fundamentalmente, um <strong>registro digital distribuído e imutável</strong> que funciona como um livro-razão compartilhado entre múltiplos participantes. Diferentemente de um banco de dados tradicional, que é centralizado e controlado por uma única entidade, o blockchain distribui cópias do registro entre todos os participantes da rede.</p>
<blockquote class="example">
Imagine que você e seus amigos querem manter um registro de quem deve quanto para cada um em uma viagem. Ao invés de uma única pessoa guardar este registro (e correr o risco de manipulação), todos vocês mantêm uma cópia idêntica. Toda vez que alguém faz uma transação, ela é registrada em todas as cópias simultaneamente. Ninguém pode mudar o histórico sem que todos os outros percebam. Isto é o blockchain.
</blockquote>
<p>A estrutura do blockchain é composta por <strong>blocos</strong> conectados sequencialmente, onde cada bloco contém um lote de transações ou dados. Cada bloco possui uma identificação única chamada <strong>hash</strong>, que é como uma impressão digital digital. Se alguém tentar alterar uma transação dentro de um bloco, seu hash muda completamente, o que quebraria a cadeia inteira.</p>
<h4>Características Fundamentais</h4>
<p>O que torna o blockchain especial são suas características intrínsecas:</p>
<p><strong>1. Imutabilidade:</strong> Uma vez que uma transação é registrada no blockchain, é praticamente impossível alterá-la sem que todos os participantes notem. Isso ocorre porque cada bloco novo referencia o bloco anterior através de seu hash.</p>
<p><strong>2. Descentralização:</strong> Não existe uma autoridade central controlando o blockchain. Todos os participantes (chamados de nós) possuem uma cópia completa ou parcial do registro.</p>
<p><strong>3. Transparência:</strong> Todas as transações são visíveis para todos os participantes da rede (embora possam ser criptografadas para privacidade).</p>
<p><strong>4. Segurança:</strong> A combinação de criptografia e consenso distribuído torna o blockchain extremamente seguro contra fraudes e ataques.</p>
<blockquote class="tip">
A criptografia é a base da segurança do blockchain. Você verá que todo dado importante é protegido usando algoritmos matemáticos complexos que seriam praticamente impossíveis de quebrar com a tecnologia atual.
</blockquote>
<p>Você pode estar se perguntando: por que isso importa? A resposta é que essas características permitem que o blockchain seja aplicado em qualquer situação em que você precisa de um registro confiável, seguro e descentralizado de informações.</p>
<blockquote class="news">
Em 2024, mais de 60% das empresas Fortune 500 estão explorando ou implementando blockchains em suas operações, segundo pesquisas do Gartner. Não é mais uma tecnologia apenas de entusiastas de criptomoedas.
</blockquote>
<p>Ao longo deste curso, você verá que o blockchain é muito mais que Bitcoin. É uma ferramenta fundamental para reconstruir sistemas de confiança em praticamente qualquer indústria.</p>`
    },

      id: 'blc2',
      name: 'História e evolução da tecnologia',
      content: `<h4>Das Origens ao Presente</h4>
<p>Para você entender realmente o blockchain, é importante conhecer sua história. A tecnologia não surgiu do nada; ela é o resultado de décadas de pesquisa em criptografia, sistemas distribuídos e economia comportamental.</p>
<p>Os primeiros conceitos teóricos de blockchain surgiram nos anos 1980 e 1990, quando criptógrafos exploravam como criar sistemas de assinatura digital que não pudessem ser falsificados. O trabalho de Stuart Haber e Scott Stornetta em 1991 sobre "timestamps criptográficos" foi particularmente importante.</p>
<p>No entanto, foi apenas em 2008 que alguém (ou alguns, ainda não se sabe) usando o pseudônimo Satoshi Nakamoto publicou um documento chamado "Bitcoin: A Peer-to-Peer Electronic Cash System". Este documento apresentou a primeira implementação prática bem-sucedida de blockchain.</p>
<blockquote class="example">
Satoshi resolveu um problema que atormentava criptógrafos por décadas: como permitir que dois estranhos façam transações financeiras sem confiar um no outro e sem um intermediário como um banco? A resposta foi o blockchain com Bitcoin.
</blockquote>
<p>A primeira fase do blockchain (2008-2011) foi dominada pelo Bitcoin. As pessoas perceberam que a tecnologia funcionava, mas também perceberam suas limitações para aplicações além de transferências de moeda.</p>
<p>A segunda fase começou em 2015 com o Ethereum, criado por Vitalik Buterin quando tinha apenas 19 anos. Ethereum introduziu um conceito revolucionário: você não apenas podia registrar transações, mas podia executar código complexo no blockchain através de <strong>smart contracts</strong>. Isso mudou tudo.</p>
<blockquote class="tip">
Smart contracts são programas que executam automaticamente quando certas condições são atendidas. Você verá muito mais sobre isso nos próximos módulos, mas por enquanto, entenda que eles transformaram o blockchain de um sistema de registro em uma <strong>plataforma de computação distribuída</strong>.
</blockquote>
<p>De 2015 em diante, o ecossistema blockchain explodiu. Surgiram blockchains especializados: Solana para transações rápidas, Polkadot para interoperabilidade, Cardano com foco em pesquisa acadêmica, e muitos outros.</p>
<p>Cada inovação trouxe melhorias: consenso mais rápido, maior escalabilidade, menos consumo de energia. O blockchain evoluiu de uma curiosidade criptográfica para uma tecnologia com aplicações reais em diversos setores.</p>
<blockquote class="news">
Em 2024, vimos a aprovação dos ETFs de Bitcoin nos EUA, os primeiros ativos blockchain ser aceitos por grandes instituições financeiras tradicionais, e governos começar a explorar blockchains para registros públicos de terras e cidadania.
</blockquote>
<p>A trajetória do blockchain é uma história fascinante de como uma ideia acadêmica pode se transformar em uma tecnologia que impacta bilhões de pessoas. E você está aqui para aprender isto no momento certo.</p>`

      id: 'blc3',
      name: 'Diferenças entre públicos e privados',
      content: `<h4>Blockchains Públicos vs Privados</h4>
<p>Nem todo blockchain é igual. Você verá que existem diferentes tipos, cada um com características e aplicações específicas. As duas categorias principais são públicos e privados.</p>
<p>Um <strong>blockchain público</strong> é aquele em que qualquer pessoa pode participar, enviar transações e auditar o histórico completo. Bitcoin e Ethereum são exemplos perfeitos. Não há necessidade de permissão, registro ou aprovação de ninguém.</p>
<p>As vantagens dos blockchains públicos incluem:</p>
<p>• <strong>Verdadeira descentralização:</strong> Ninguém controla a rede</p>
<p>• <strong>Transparência total:</strong> Todas as transações são públicas e auditáveis</p>
<p>• <strong>Resistência à censura:</strong> É muito difícil censurar ou bloquear transações</p>
<p>• <strong>Confiança sem intermediários:</strong> Você não precisa confiar em ninguém específico</p>
<blockquote class="example">
Imagine que você está em um país com censura financeira. Você não consegue abrir conta em banco porque o governo não permite, ou sua conta é congelada por razões políticas. Com Bitcoin, você pode enviar e receber dinheiro sem permissão de ninguém. Isto é o poder real de um blockchain público.
</blockquote>
<p>As desvantagens são:</p>
<p>• <strong>Velocidade:</strong> Tipicamente mais lentos porque precisam de consenso de muitos nós</p>
<p>• <strong>Escalabilidade:</strong> Dificuldade em processar muitas transações simultaneamente</p>
<p>• <strong>Consumo de energia:</strong> Especialmente se usarem consenso por Proof of Work</p>
<p>• <strong>Imutabilidade absoluta:</strong> Erros não podem ser desfeitos</p>
<p>Um <strong>blockchain privado</strong> (ou permissionado) é aquele em que apenas participantes aprovados podem se unir à rede. Você precisa de permissão para participar. Hyperledger Fabric e Corda são exemplos populares.</p>
<blockquote class="tip">
Blockchains privados são frequentemente usados em ambientes corporativos onde você quer os benefícios do blockchain (auditoria imutável, transparência entre participantes autorizados) mas sem abrir para qualquer pessoa na internet.
</blockquote>
<p>As vantagens dos blockchains privados incluem:</p>
<p>• <strong>Velocidade:</strong> Menos nós significam consenso mais rápido</p>
<p>• <strong>Escalabilidade:</strong> Mais fácil de otimizar para um grupo específico</p>
<p>• <strong>Controle:</strong> A organização pode estabelecer regras e políticas</p>
<p>• <strong>Privacidade:</strong> Apenas participantes autorizados veem os dados</p>
<p>As desvantagens são:</p>
<p>• <strong>Centralização relativa:</strong> O operador do blockchain tem poder</p>
<p>• <strong>Confiança necessária:</strong> Você precisa confiar que o operador é honesto</p>
<p>• <strong>Menos transparência:</strong> O público geral não pode auditar</p>
<blockquote class="news">
Um hibrido interessante surgiu recentemente: blockchains públicos com privacidade melhorada (como Monero e Zcash) e blockchains privados com auditoria pública (como Hyperledger com exploradores públicos). Você verá que a realidade é mais nuançada que simples categorias.
</blockquote>
<p>A escolha entre público e privado depende do caso de uso. Para um sistema de dinheiro digital resistente à censura, público é melhor. Para auditoria interna de uma empresa, privado pode ser mais eficiente. Você aprenderá a avaliar qual é melhor para cada situação.</p>`

      name: 'Conceitos essenciais: hash, merkle tree, criptografia',
      content: `<h4>Os Pilares Criptográficos do Blockchain</h4>
<p>Para você realmente entender blockchain, você precisa dominar alguns conceitos criptográficos fundamentais. Não se preocupe se parecer técnico no início; vamos descomplicar tudo.</p>
<p>Comecemos com <strong>hash criptográfico</strong>. Um hash é uma função matemática que converte qualquer entrada (texto, imagem, arquivo) em uma sequência de caracteres de tamanho fixo. É como uma impressão digital digital.</p>
<blockquote class="example">
Se você usar um algoritmo SHA-256 (usado no Bitcoin) para fazer hash da frase "Olá mundo", você sempre obtém exatamente: "64ec88ca00b268e5ba1a35678a1b5316d212f4f366b2477232534a8aeca37f3c". Se mudar uma única letra (digamos, "Olá mundo!"), o hash muda completamente: "d09f33f89d46fa50e5ef36eae11f3a5ed3e5a6e2bdc12f04e7a36b6f78c90d8c". É impossível saber o novo hash sem recalcular.
</blockquote>
<p>As propriedades cruciais de um hash criptográfico são:</p>
<p>• <strong>Determinístico:</strong> A mesma entrada sempre produz o mesmo hash</p>
<p>• <strong>Rápido de calcular:</strong> Computar o hash de qualquer dados é rápido</p>
<p>• <strong>Efeito avalanche:</strong> Qualquer mudança pequena muda o hash completamente</p>
<p>• <strong>Impossível reverter:</strong> Você não pode obter a entrada original a partir do hash</p>
<p>• <strong>Colisão improvável:</strong> É impossível (na prática) encontrar duas entradas diferentes com o mesmo hash</p>
<p>Por que isso importa para blockchain? Porque cada bloco contém o hash do bloco anterior. Se alguém tentar alterar um bloco antigo, seu hash muda, o que quebra a referência do próximo bloco, que por sua vez quebra o do próximo, e assim por diante. Toda a cadeia quebra. Essa é a imutabilidade do blockchain.</p>
<p>Agora, vamos falar sobre <strong>Merkle Trees</strong>. Uma árvore de Merkle é uma estrutura de dados onde dados são agrupados em pares, seus hashes são combinados, e esse processo se repete até que haja um único hash no topo, chamado <strong>Merkle root</strong>.</p>
<blockquote class="tip">
Em um bloco de Bitcoin, todas as transações (às vezes centenas delas) são organizadas em uma árvore de Merkle. Você pode verificar se uma transação específica está no bloco verificando apenas alguns hashes, não todos. Isto é incrivelmente eficiente para <strong>verificação leve</strong>.
</blockquote>
<p>A criptografia de chave pública é outro pilar. Você tem duas chaves: uma pública (que você compartilha) e uma privada (que mantém secreta). Se você criptografa algo com sua chave privada, qualquer um com sua chave pública pode descriptografar e saber que foi você quem criou.</p>
<blockquote class="example">
Quando você envia criptomoeda, você está essencialmente dizendo: "Eu, pessoa com esta chave pública, autorizo esta transação". Você prova isso usando sua chave privada para criar uma assinatura digital. Ninguém pode falsificar esta assinatura sem sua chave privada. É como uma assinatura que só você pode fazer.
</blockquote>
<p>Juntos, essas ferramentas criptográficas criam um sistema onde:</p>
<p>1. As transações são imutáveis (hash)</p>
<p>2. As transações podem ser verificadas rapidamente (Merkle tree)</p>
<p>3. As transações são autenticadas (criptografia de chave pública)</p>
<blockquote class="news">
A segurança criptográfica usada em blockchain é tão robusta que até mesmo computadores quânticos (ainda em desenvolvimento) levaria séculos para quebrar. Isto é por que blockchain é considerado a fundação para uma internet mais segura.
</blockquote>
<p>Você não precisa ser um especialista em criptografia para usar blockchain, mas entender esses conceitos fundamentais o ajudará a avaliar a segurança de qualquer sistema blockchain que você encontre.</p>`

    {
      id: 'blc5',
      name: 'Mecanismos de consenso: Proof of Work',
      content: `<h4>Proof of Work: O Consenso Original</h4>
<p>Você já se perguntou como um blockchain descentralizado decide qual bloco adicionar à cadeia sem um coordenador central? A resposta está no <strong>mecanismo de consenso</strong>. O Proof of Work (PoW) foi o primeiro mecanismo bem-sucedido, usado pelo Bitcoin.</p>
<p>No Proof of Work, os mineradores competem para resolver um quebra-cabeça matemático complexo. O primeiro a resolver ganha o direito de adicionar o próximo bloco à cadeia e recebe uma recompensa.</p>
<blockquote class="example">
Imagine que há um jogo onde você precisa encontrar um número que, quando combinado com os dados do bloco e passado por um hash SHA-256, produz um resultado que começa com vários zeros. Por exemplo, o resultado pode ser: "00000abcdef123456...". Você não pode prever qual número funcionará; só tentativa e erro. Quando finalmente encontra, todos podem verificar rapidamente que você tem razão. Isto é Proof of Work.
</blockquote>
<p>A dificuldade deste quebra-cabeça é ajustada dinamicamente. Se muitos mineradores estão tentando resolver, a dificuldade aumenta. Se poucos estão tentando, diminui. Isto mantém o tempo médio para encontrar um bloco aproximadamente constante (10 minutos no Bitcoin, 12 segundos no Ethereum antigo).</p>
<p>As vantagens do Proof of Work incluem:</p>
<p>• <strong>Segurança comprovada:</strong> O Bitcoin usa PoW há 16 anos sem ser hackeado</p>
<p>• <strong>Descentralização verdadeira:</strong> Qualquer um com um computador pode minerar</p>
<p>• <strong>Imutabilidade forte:</strong> Alterar um bloco passado requer mais poder computacional que toda a rede</p>
<blockquote class="tip">
Para você atacar um blockchain Proof of Work e alterar um bloco antigo, você precisaria de mais de 50% do poder computacional da rede inteira. Para Bitcoin, isto significaria bilhões de dólares em equipamento. É economicamente impraticável.
</blockquote>
<p>As desvantagens são significativas:</p>
<p>• <strong>Consumo de energia enorme:</strong> Bitcoin usa tanta eletricidade quanto alguns países</p>
<p>• <strong>Lentidão:</strong> O Bitcoin pode processar apenas 7 transações por segundo</p>
<p>• <strong>Custos de hardware:</strong> Você precisa de equipamento especializado (ASICs) para ser competitivo</p>
<p>• <strong>Centralização de mineração:</strong> Grandes pools de mineração controlam grande parte do PoW</p>
<p>O processo é: um minerador coleta transações pendentes em mempool, inclui-as em um bloco, tenta encontrar um hash válido. Quando encontra, transmite para a rede. Outros nós verificam rapidamente que o hash está correto e aceitam o novo bloco.</p>
<blockquote class="news">
Em 2024, o maior evento relacionado a PoW foi a implementação de tecnologias de eficiência energética em mineração, como uso de energia renovável. Alguns estudos mostram que mais de 50% da mineração de Bitcoin agora usa fontes renováveis.
</blockquote>
<p>Apesar das críticas sobre energia, o Proof of Work permanece o mecanismo mais seguro e comprovado para blockchains verdadeiramente descentralizados.</p>`

      id: 'blc6',
      name: 'Proof of Stake e alternativas',
      content: `<h4>Além do Proof of Work</h4>
<p>Se você já criticou o Bitcoin por consumir muita energia, você entenderá por que pesquisadores desenvolveram alternativas. O <strong>Proof of Stake (PoS)</strong> é a alternativa mais importante.</p>
<p>No Proof of Stake, ao invés de competir resolvendo quebra-cabeças matemáticos, você obtém o direito de validar blocos baseado na quantidade de criptomoeda que você tem em "stake" (bloqueada na rede).</p>
<blockquote class="example">
Imagine um jogo de loteria onde você compra bilhetes com sua própria criptomoeda. Quanto mais bilhetes você compra, maior sua chance de ganhar. Quando você ganha, você valida o próximo bloco e recebe uma recompensa. Se você tentar trapacear (validar um bloco fraudulento), você perde parte ou toda sua aposta. Isto é Proof of Stake.
</blockquote>
<p>As vantagens do PoS incluem:</p>
<p>• <strong>Eficiência energética:</strong> Usa 99% menos energia que Proof of Work</p>
<p>• <strong>Escalabilidade:</strong> Pode processar mais transações por segundo</p>
<p>• <strong>Baixa barreira de entrada:</strong> Você não precisa de hardware especializado</p>
<p>• <strong>Incentivos alinhados:</strong> Validadores têm incentivo financeiro para ser honesto</p>
<blockquote class="tip">
Ethereum mudou de Proof of Work para Proof of Stake em 2022, num evento chamado "The Merge". Isto reduziu o consumo de energia em 99% mantendo a segurança. É um exemplo perfeito de como você pode melhorar uma tecnologia existente.
</blockquote>
<p>As desvantagens são:</p>
<p>• <strong>Riqueza concentrada:</strong> Pessoas ricas têm mais poder</p>
<p>• <strong>Menos comprovado:</strong> Não há tanto tempo de teste quanto PoW</p>
<p>• <strong>Complexidade:</strong> Os algoritmos são mais complexos</p>
<p>Existem muitas variações de PoS. Delegated Proof of Stake (DPoS) permite que você delegue sua aposta a outras pessoas. Liquid Proof of Stake permite retirar sua aposta a qualquer momento. Cada variação traz diferentes trade-offs.</p>
<p>Além de PoW e PoS, outras alternativas existem:</p>
<p><strong>Proof of Authority (PoA):</strong> Você confía em um conjunto de validadores conhecidos. Mais rápido e eficiente, mas mais centralizado. Usado em algumas blockchains privadas.</p>
<p><strong>Proof of History (PoH):</strong> Usado por Solana, cria um registro criptográfico do tempo. Permite velocidades muito altas.</p>

      content: `<h4>Código que Executa Automaticamente</h4>
<p>Smart contracts são uma das inovações mais poderosas da tecnologia blockchain. Se você entender smart contracts, você entenderá porque blockchains são mais que apenas sistemas de transação.</p>
<p>Um <strong>smart contract</strong> é um programa que executa automaticamente quando certas condições pré-definidas são atendidas. Não há intermediário, não há gerenciador de contrato, não há subjetividade. O código é lei.</p>
<blockquote class="example">

</blockquote>
<p>Antes de smart contracts, você precisaria de um intermediário (um exchange, um cartório, um sistema de pagamento). O intermediário cobra taxas, pode ser hackeado, pode desaparecer. Smart contracts eliminam este intermediário.</p>
<p>As características que tornam smart contracts poderosos são:</p>
<p>• <strong>Automação:</strong> Executa sem intervenção humana</p>
<p>• <strong>Transparência:</strong> Todo mundo pode ler o código</p>
<p>• <strong>Imutabilidade:</strong> Não pode ser alterado (uma vez deployado)</p>
<p>• <strong>Determinístico:</strong> Sempre produz o mesmo resultado para as mesmas entradas</p>
<blockquote class="tip">
Smart contracts são executados em cada nó da rede blockchain. Isto significa que não há um único servidor que pode falhar ou ser hackeado. O programa é executado em centenas ou milhares de computadores simultaneamente, concordando no resultado.
</blockquote>
<p>A máquina virtual Ethereum (EVM) é a implementação mais popular. Você escreve código em Solidity (uma linguagem semelhante a JavaScript), o compila para bytecode, e o deploy no Ethereum blockchain.</p>

      content: `<h4>Pagando Pela Computação Distribuída</h4>
<p>Quando você executa um smart contract no Ethereum, não é grátis. Você paga pelo "gas", que é uma medida da computação necessária.</p>
<p>Por que? Porque cada nó da rede precisa executar seu código. Se fosse grátis, alguém poderia sobrecarregar a rede com computações infinitas. Gas cria um mercado: você paga pela computação, então você é incentivado a usar só o necessário.</p>

</blockquote>

<p>Você pode escolher quanto está disposto a pagar. Se oferecer muito pouco, sua transação fica na fila espérando. Se oferecer bastante, é processada rápido. Isto cria um mercado eficiente onde a taxa reflete o custo real.</p>
<blockquote class="tip">

<p>1. Executar funções read-only (que não modificam estado) são grátis</p>
<p>2. Otimizar seu código para usar menos operações</p>
<p>3. Usar storage eficientemente (storage é caro, memória é barato)</p>
<p>4. Enviar sua transação em horários de baixa demanda</p>
<p>Às vezes, otimizar economiza mais dinheiro que o custo da otimização vale a pena.
</blockquote>
<p>Diferentes operações custam diferentes quantidades de gas:</p>

<p>• <strong>Criar um novo contrato:</strong> 53.000 gas mínimo</p>

<blockquote class="example">

<blockquote class="example">

</blockquote>
<p><strong>NFTs:</strong> Contratos que representam propriedade de ativos digitais únicos. Você pode vender NFTs com o código garantindo que apenas o novo dono tem direitos.</p>
<p><strong>DAOs (Organizações Autônomas Descentralizadas):</strong> Smart contracts que implementam democracia. Você é dono de tokens que representam voto. Você vota em propostas, e quando aprovadas, o smart contract executa automaticamente.</p>
<p><strong>Supply Chain:</strong> Registros imutáveis de cada etapa da cadeia de produção. Você sabe exatamente de onde veio seu produto, verificado por código.</p>
<p><strong>Seguros:</strong> Smart contracts que pagam automaticamente quando certas condições ocorrem. Não há necessidade de reclamações humanas.</p>
<blockquote class="tip">
Até hoje, a maioria dos smart contracts usados são bem simples. Mas conforme a tecnologia amadurece, espere ver smart contracts cada vez mais sofisticados integrados em sistemas tradicionais.
</blockquote>
<p>No entanto, smart contracts têm tido problemas de segurança significativos:</p>
<p><strong>Re-entrancy:</strong> Um atacante chama uma função que chama uma função externa, que chama a função original novamente antes de completar. Em 2016, isto causou o roubo de $50 milhões em Ether no "DAO hack".</p>

</blockquote>
<p><strong>Integer overflow:</strong> Um número inteiro ultrapassa o máximo permitido e volta para zero. Isto pode quebrar cálculos financeiros.</p>
<p><strong>Delegatecall vulnerabilities:</strong> A função delegatecall do Solidity pode ser perigosa se usada incorretamente, permitindo que atacantes modifiquem estado.</p>
<p><strong>Oráculo manipulation:</strong> Se seu contrato confia em um oráculo para preço, um atacante pode manipular o preço temporariamente para explorar.</p>
<p>As boas práticas incluem:</p>

<p>• Testes automatizados extensivos</p>
<p>• Auditorias de segurança por especialistas</p>

<p>Agora que você entende smart contracts, você está pronto para entender DApps (aplicações descentralizadas). Um DApp é uma aplicação que usa blockchain como backend ao invés de um servidor tradicional.</p>
<p>A arquitetura típica é:</p>
<p><strong>Frontend:</strong> Interface web (JavaScript/React) que o usuário interage. Conectado a uma carteira (MetaMask, Wallet Connect, etc.).</p>
<p><strong>Backend:</strong> Smart contracts no blockchain que processam lógica de negócio.</p>
<p><strong>Storage:</strong> Dados armazenados no blockchain ou em IPFS (sistema de armazenamento descentralizado).</p>
<blockquote class="example">

</blockquote>
<p>A grande diferença de uma aplicação web tradicional:</p>

</blockquote>
<p>Exemplos de DApps populares:</p>
