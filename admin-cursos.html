<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Simplificado · Matheus Academy</title>
<script src="firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --sf: #0d1421;
  --card: #111827;
  --brd: #1e2d47;
  --acc: #3b82f6;
  --acc2: #60a5fa;
  --grn: #22c55e;
  --red: #ef4444;
  --txt: #f0f4ff;
  --t2: #8899bb;
  --t3: #4a5c7a;
  --sans: 'Sora', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: linear-gradient(135deg, var(--bg) 0%, #0a0f1b 100%);
  color: var(--txt);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  padding: 20px;
  background: rgba(8, 12, 20, .8);
  border: 1px solid var(--brd);
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
  color: white;
}

header h1 {
  font-size: 24px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--txt), var(--acc2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header small {
  color: var(--t3);
  margin-left: auto;
}

/* ── GRID PRINCIPAL ── */
.grid-main {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 24px;
  margin-bottom: 40px;
}

/* ── CARD DESTAQUE (Categorias) ── */
.card-destaque {
  background: linear-gradient(135deg, rgba(59, 130, 246, .1) 0%, rgba(34, 197, 94, .05) 100%);
  border: 2px solid var(--acc);
  border-radius: 16px;
  padding: 32px;
  position: relative;
  overflow: hidden;
}

.card-destaque::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(59, 130, 246, .1) 0%, transparent 70%);
  border-radius: 50%;
}

.card-destaque h2 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.card-destaque p {
  color: var(--t2);
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

/* ── BOTÕES PRINCIPAIS ── */
.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.btn {
  padding: 16px 24px;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 100%);
  color: white;
  box-shadow: 0 8px 24px rgba(59, 130, 246, .3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(59, 130, 246, .4);
}

.btn-secondary {
  background: rgba(59, 130, 246, .1);
  color: var(--acc2);
  border: 1px solid rgba(59, 130, 246, .3);
}

.btn-secondary:hover {
  background: rgba(59, 130, 246, .15);
  border-color: var(--acc);
}

.btn-danger {
  background: rgba(239, 68, 68, .1);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, .3);
}

.btn-danger:hover {
  background: rgba(239, 68, 68, .15);
}

/* ── SIDEBAR ── */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card-stat {
  background: var(--card);
  border: 1px solid var(--brd);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}

.stat-number {
  font-size: 32px;
  font-weight: 800;
  color: var(--acc);
  margin-bottom: 8px;
}

.stat-label {
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ── LISTA DE CATEGORIAS ── */
.categories-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 24px;
}

.cat-item {
  background: var(--card);
  border: 1px solid var(--brd);
  border-radius: 10px;
  padding: 16px;
  transition: all .15s;
  cursor: pointer;
  border-left: 4px solid transparent;
}

.cat-item:hover {
  border-color: var(--acc);
  background: rgba(59, 130, 246, .05);
}

.cat-item.active {
  border-left-color: var(--acc);
  background: rgba(59, 130, 246, .08);
}

.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.cat-icon {
  font-size: 24px;
}

.cat-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--txt);
  flex: 1;
}

.cat-count {
  font-size: 11px;
  background: rgba(59, 130, 246, .15);
  color: var(--acc2);
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
}

.cat-desc {
  font-size: 12px;
  color: var(--t3);
  margin-left: 36px;
}

/* ── AÇÕES QUICK ── */
.cat-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  margin-left: 36px;
}

.action-btn {
  padding: 6px 12px;
  font-size: 11px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: all .15s;
  font-family: var(--sans);
}

.action-edit {
  background: rgba(96, 165, 250, .1);
  color: var(--acc2);
  border: 1px solid rgba(96, 165, 250, .3);
}

.action-edit:hover {
  background: rgba(96, 165, 250, .15);
}

.action-del {
  background: rgba(239, 68, 68, .1);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, .3);
}

.action-del:hover {
  background: rgba(239, 68, 68, .15);
}

/* ── MODAL ── */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, .8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--sf);
  border: 1px solid var(--brd);
  border-radius: 14px;
  padding: 32px;
  max-width: 500px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-header {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 20px;
  color: var(--txt);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--t2);
  text-transform: uppercase;
  margin-bottom: 8px;
  letter-spacing: .06em;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--brd);
  border-radius: 8px;
  color: var(--txt);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: all .2s;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.form-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 24px;
}

/* ── STATUS MESSAGE ── */
.status-msg {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 12px;
  font-weight: 600;
  display: none;
  align-items: center;
  gap: 8px;
}

.status-msg.success {
  display: flex;
  background: rgba(34, 197, 94, .1);
  border: 1px solid rgba(34, 197, 94, .3);
  color: #86efac;
}

.status-msg.error {
  display: flex;
  background: rgba(239, 68, 68, .1);
  border: 1px solid rgba(239, 68, 68, .3);
  color: #fca5a5;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .grid-main {
    grid-template-columns: 1fr;
  }
  
  .btn-group {
    grid-template-columns: 1fr;
  }
  
  header {
    flex-direction: column;
    text-align: center;
  }
  
  header small {
    margin-left: 0;
  }
  
  .modal-content {
    width: 95%;
    padding: 24px;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">M</div>
    <h1>Matheus Academy</h1>
    <small>Admin Simplificado</small>
  </header>

  <!-- GRID PRINCIPAL -->
  <div class="grid-main">
    
    <!-- CARD DESTAQUE: CATEGORIAS -->
    <div class="card-destaque">
      <h2>🏷️ Gerenciar Sessões</h2>
      <p>Organize suas categorias de cursos facilmente</p>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="abrirModalAdicionar()">
          ➕ Nova Sessão
        </button>
        <button class="btn btn-secondary" onclick="refreshCategorias()">
          🔄 Atualizar
        </button>
      </div>

      <div id="status-msg" class="status-msg"></div>

      <!-- LISTA DE CATEGORIAS -->
      <div class="categories-list" id="cat-list">
        <p style="color: var(--t3); text-align: center; padding: 20px;">Carregando...</p>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="card-stat">
        <div class="stat-number" id="total-cats">0</div>
        <div class="stat-label">Sessões</div>
      </div>
      <div class="card-stat">
        <div class="stat-number" id="total-cursos">0</div>
        <div class="stat-label">Cursos</div>
      </div>
      <div class="card-stat">
        <div class="stat-number" id="cursos-ativos">0</div>
        <div class="stat-label">Ativos</div>
      </div>
      <div class="card-stat">
        <div class="stat-number" id="cursos-breve">0</div>
        <div class="stat-label">Em Breve</div>
      </div>
    </div>

  </div>

</div>

<!-- MODAL: ADICIONAR/EDITAR -->
<div class="modal" id="modal-editar">
  <div class="modal-content">
    <div class="modal-header" id="modal-titulo">➕ Nova Sessão</div>
    
    <div class="form-group">
      <label>Nome da Sessão</label>
      <input type="text" id="cat-nome" placeholder="Ex: Tráfego Pago">
    </div>

    <div class="form-group">
      <label>Ícone</label>
      <input type="text" id="cat-icon" placeholder="Ex: 📢" maxlength="2">
    </div>

    <div class="form-group">
      <label>Descrição</label>
      <textarea id="cat-desc" placeholder="Descrição da sessão..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="salvarCategoria()">
        💾 Salvar
      </button>
      <button class="btn btn-secondary" onclick="fecharModal()">
        ❌ Cancelar
      </button>
    </div>
  </div>
</div>

<!-- MODAL: DELETAR -->
<div class="modal" id="modal-deletar">
  <div class="modal-content">
    <div class="modal-header">⚠️ Deletar Sessão</div>
    
    <div id="delete-msg" style="color: var(--t2); margin-bottom: 20px; line-height: 1.6;"></div>

    <div id="redirect-container" style="display: none; margin-bottom: 20px;">
      <div class="form-group">
        <label>Mover cursos para:</label>
        <select id="redirect-cat" style="width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--brd); border-radius: 8px; color: var(--txt); font-family: var(--sans);">
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-danger" onclick="confirmarDelete()">
        🗑️ Deletar
      </button>
      <button class="btn btn-secondary" onclick="fecharModalDelete()">
        ❌ Cancelar
      </button>
    </div>
  </div>
</div>

<script>

// ========== VARIÁVEIS GLOBAIS ==========

var _catEditIndex = -1;
var _catDeleteIndex = -1;

// ========== FUNÇÕES DE INTERFACE ==========

function abrirModalAdicionar() {
  _catEditIndex = -1;
  document.getElementById('modal-titulo').textContent = '➕ Nova Sessão';
  document.getElementById('cat-nome').value = '';
  document.getElementById('cat-icon').value = '📚';
  document.getElementById('cat-desc').value = '';
  document.getElementById('modal-editar').classList.add('active');
  document.getElementById('cat-nome').focus();
}

function fecharModal() {
  document.getElementById('modal-editar').classList.remove('active');
}

function abrirModalEditar(index) {
  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];
  if (index < 0 || index >= cats.length) return;

  _catEditIndex = index;
  var cat = cats[index];

  document.getElementById('modal-titulo').textContent = '✏️ Editar Sessão';
  document.getElementById('cat-nome').value = cat.name || '';
  document.getElementById('cat-icon').value = cat.icon || '📚';
  document.getElementById('cat-desc').value = cat.sub || '';
  document.getElementById('modal-editar').classList.add('active');
  document.getElementById('cat-nome').focus();
}

function abrirModalDelete(index) {
  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];
  var courses = typeof MA_COURSES !== 'undefined' ? MA_COURSES.filter(function(c) { return c.active !== false; }) : [];
  
  if (index < 0 || index >= cats.length) return;

  _catDeleteIndex = index;
  var cat = cats[index];
  var cursosNaCat = courses.filter(function(c) { return c.cat === cat.name; });

  var msg = '🏷️ <strong>' + cat.name + '</strong>';
  
  var redirectContainer = document.getElementById('redirect-container');
  if (cursosNaCat.length > 0) {
    msg += '<br><br>⚠️ Contém <strong>' + cursosNaCat.length + ' curso(s)</strong>:<br>';
    cursosNaCat.forEach(function(c) {
      msg += '• ' + c.name + '<br>';
    });
    msg += '<br>Escolha para qual sessão movê-los:';
    redirectContainer.style.display = 'block';

    var select = document.getElementById('redirect-cat');
    select.innerHTML = '';
    cats.forEach(function(c, i) {
      if (i !== _catDeleteIndex) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = c.icon + ' ' + c.name;
        select.appendChild(opt);
      }
    });
  } else {
    msg += '<br><br>✅ Sessão vazia - pode deletar sem risco';
    redirectContainer.style.display = 'none';
  }

  document.getElementById('delete-msg').innerHTML = msg;
  document.getElementById('modal-deletar').classList.add('active');
}

function fecharModalDelete() {
  document.getElementById('modal-deletar').classList.remove('active');
  _catDeleteIndex = -1;
}

// ========== FUNÇÕES DE DADOS ==========

function salvarCategoria() {
  var nome = document.getElementById('cat-nome').value.trim();
  var icon = document.getElementById('cat-icon').value.trim() || '📚';
  var desc = document.getElementById('cat-desc').value.trim();

  if (!nome) {
    showStatus('Nome da sessão é obrigatório!', 'error');
    return;
  }

  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];

  // Verificar duplicação
  if (cats.some(function(c, i) { return i !== _catEditIndex && c.name === nome; })) {
    showStatus('Já existe uma sessão com este nome!', 'error');
    return;
  }

  if (_catEditIndex === -1) {
    // ADICIONAR
    cats.push({
      name: nome,
      sub: desc,
      icon: icon,
      soon: []
    });
  } else {
    // EDITAR
    cats[_catEditIndex].name = nome;
    cats[_catEditIndex].icon = icon;
    cats[_catEditIndex].sub = desc;
  }

  atualizarMACATS(cats, function(sucesso) {
    if (sucesso) {
      showStatus('✅ Sessão salva com sucesso!', 'success');
      fecharModal();
      setTimeout(function() { refreshCategorias(); }, 1000);
    } else {
      showStatus('❌ Erro ao salvar - verifique token GitHub', 'error');
    }
  });
}

function confirmarDelete() {
  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];
  var courses = typeof MA_COURSES !== 'undefined' ? MA_COURSES : [];

  var catADelete = cats[_catDeleteIndex];
  var cursosNaCat = courses.filter(function(c) { return c.cat === catADelete.name; });

  var novoIndCat = -1;
  if (cursosNaCat.length > 0) {
    novoIndCat = parseInt(document.getElementById('redirect-cat').value);
    if (novoIndCat < 0 || novoIndCat >= cats.length) {
      showStatus('Selecione uma sessão válida!', 'error');
      return;
    }
  }

  // Redirecionar cursos
  if (novoIndCat >= 0) {
    var novaCatName = cats[novoIndCat].name;
    cursosNaCat.forEach(function(c) {
      c.cat = novaCatName;
    });
    atualizarMAcoURSES(courses);
  }

  // Deletar categoria
  cats.splice(_catDeleteIndex, 1);

  atualizarMACATS(cats, function(sucesso) {
    if (sucesso) {
      showStatus('✅ Sessão deletada com sucesso!', 'success');
      fecharModalDelete();
      setTimeout(function() { refreshCategorias(); }, 1000);
    } else {
      showStatus('❌ Erro ao deletar - verifique token GitHub', 'error');
    }
  });
}

function refreshCategorias() {
  renderCategorias();
  renderStats();
}

function renderCategorias() {
  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];
  var courses = typeof MA_COURSES !== 'undefined' ? MA_COURSES.filter(function(c) { return c.active !== false; }) : [];

  var html = '';

  if (cats.length === 0) {
    html = '<p style="color: var(--t3); text-align: center; padding: 40px 20px;">Nenhuma sessão criada ainda. Clique em "➕ Nova Sessão" para começar!</p>';
    document.getElementById('cat-list').innerHTML = html;
    return;
  }

  cats.forEach(function(cat, i) {
    var cc = courses.filter(function(c) { return c.cat === cat.name; });
    var soonCount = (cat.soon || []).length;

    var statusColor = cc.length > 0 ? 'rgba(34, 197, 94, .2)' : 'rgba(245, 158, 11, .1)';

    html += '<div class="cat-item">';
    html += '<div class="cat-header">';
    html += '<span class="cat-icon">' + (cat.icon || '📚') + '</span>';
    html += '<span class="cat-name">' + cat.name + '</span>';
    html += '<span class="cat-count">' + cc.length + ' cursos</span>';
    html += '</div>';

    if (cat.sub) {
      html += '<div class="cat-desc">' + cat.sub + '</div>';
    }

    html += '<div class="cat-actions">';
    html += '<button class="action-btn action-edit" onclick="abrirModalEditar(' + i + ')">✏️ Editar</button>';
    html += '<button class="action-btn action-del" onclick="abrirModalDelete(' + i + ')">🗑️ Deletar</button>';
    html += '</div>';
    html += '</div>';
  });

  document.getElementById('cat-list').innerHTML = html;
}

function renderStats() {
  var cats = typeof MA_CATS !== 'undefined' ? MA_CATS : [];
  var courses = typeof MA_COURSES !== 'undefined' ? MA_COURSES : [];

  var cursosAtivos = courses.filter(function(c) { return c.active !== false; }).length;
  var cursosBreve = 0;
  cats.forEach(function(c) {
    cursosBreve += (c.soon || []).length;
  });

  document.getElementById('total-cats').textContent = cats.length;
  document.getElementById('total-cursos').textContent = courses.length;
  document.getElementById('cursos-ativos').textContent = cursosAtivos;
  document.getElementById('cursos-breve').textContent = cursosBreve;
}

function showStatus(msg, type) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
  setTimeout(function() {
    el.className = 'status-msg';
  }, 3000);
}

// ========== ATUALIZAÇÃO DO GITHUB ==========

function atualizarMACATS(novasCats, callback) {
  var ghToken = localStorage.getItem('gh_token');
  if (!ghToken) {
    showStatus('❌ Token GitHub não configurado!', 'error');
    callback(false);
    return;
  }

  fetch('https://api.github.com/repos/MatheusAcademy/matheusacademy/contents/courses.js', {
    headers: { 'Authorization': 'token ' + ghToken }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var content = atob(data.content);

    var markerPos = content.indexOf('\nvar MA_CATS');
    if (markerPos === -1) {
      showStatus('❌ Arquivo courses.js corrompido!', 'error');
      callback(false);
      return;
    }

    var beforeMarker = content.substring(0, markerPos + 1);
    var afterMarkerStart = content.indexOf(';', markerPos);
    var afterMarker = afterMarkerStart !== -1 ? content.substring(afterMarkerStart) : ';';

    var novasCatsStr = 'var MA_CATS = ' + JSON.stringify(novasCats, null, 2);
    var novoContent = beforeMarker + novasCatsStr + afterMarker;

    fetch('https://api.github.com/repos/MatheusAcademy/matheusacademy/contents/courses.js', {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + ghToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '[Admin] Atualizar categorias',
        content: btoa(novoContent),
        sha: data.sha
      })
    })
    .then(function(res) {
      if (res.ok) {
        setTimeout(function() { location.reload(); }, 500);
        callback(true);
      } else {
        callback(false);
      }
    })
    .catch(function(e) {
      console.error('Erro:', e);
      callback(false);
    });
  })
  .catch(function(e) {
    console.error('Erro:', e);
    callback(false);
  });
}

function atualizarMAcoURSES(novosCourses) {
  var ghToken = localStorage.getItem('gh_token');
  if (!ghToken) return;

  fetch('https://api.github.com/repos/MatheusAcademy/matheusacademy/contents/courses.js', {
    headers: { 'Authorization': 'token ' + ghToken }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var content = atob(data.content);

    var markerPos = content.indexOf('\nvar MA_COURSES');
    if (markerPos === -1) return;

    var beforeMarker = content.substring(0, markerPos + 1);
    var afterMarkerStart = content.indexOf('];', markerPos);
    var afterMarker = afterMarkerStart !== -1 ? content.substring(afterMarkerStart + 1) : '';

    var novosCourseStr = 'var MA_COURSES = ' + JSON.stringify(novosCourses, null, 2);
    var novoContent = beforeMarker + novosCourseStr + afterMarker;

    fetch('https://api.github.com/repos/MatheusAcademy/matheusacademy/contents/courses.js', {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + ghToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '[Admin] Sincronizar cursos',
        content: btoa(novoContent),
        sha: data.sha
      })
    })
    .catch(function(e) { console.error('Erro:', e); });
  })
  .catch(function(e) { console.error('Erro:', e); });
}
