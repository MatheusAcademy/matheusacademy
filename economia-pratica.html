        dur: '12 min',
        content: '<h3>Escassez, Escolhas e Custo de Oportunidade</h3><p>A economia existe porque os recursos são escassos. Não há quantidade ilimitada de terra, trabalho, capital ou tecnologia. Essa realidade cria um dilema fundamental: toda escolha envolve renúncia. Quando você decide investir seu dinheiro em educação, está deixando de usá-lo para comprar um carro. Quando um país dedica recursos militares à defesa, não os investe em saúde pública. Esse trade-off é o conceito de <strong>custo de oportunidade</strong>, que é central para entender economia.</p><p>O custo de oportunidade não é apenas o dinheiro gasto, mas o melhor uso alternativo daquele recurso. Se você trabalha 8 horas por dia, o custo de oportunidade de estudar durante 2 horas é aquilo que você deixaria de ganhar nessas 2 horas trabalhando. Para uma empresa, o custo de oportunidade de manter R$ 1 milhão em caixa é o retorno que esse dinheiro poderia gerar se fosse investido.</p><blockquote class="tip">💡 <em>Dica: sempre considere o que você está deixando de fazer quando toma uma decisão econômica.</em></blockquote><p>A produção em uma economia depende de recursos limitados chamados <strong>fatores de produção</strong>: terra, trabalho, capital e empreendedorismo. Um agricultor tem uma quantidade fixa de terra. Um país tem uma população numericamente definida. Um empresário tem acesso limitado a crédito. Diante dessa limitação, economias precisam responder a três perguntas fundamentais: O que produzir? Como produzir? Para quem produzir?</p><h4>Cadeias de Produção e Interdependência</h4><p>Nenhuma economia moderna funciona isoladamente. A produção de um bem envolve centenas de etapas, frequentemente espalhadas por diferentes países. Um smartphone, por exemplo, contém componentes fabricados na Coreia do Sul, Japão, Taiwan, Vietnã e China. A montagem final acontece em outro país. A distribuição atravessa oceanos. Essa interdependência global significa que uma perturbação em qualquer ponto da cadeia afeta todos os consumidores finais.</p><p>Durante a pandemia de COVID-19, vimos isso na prática. Fábricas fechadas no Vietnã impactaram a produção de componentes eletrônicos. Portos congestionados na China atrasaram a distribuição. O resultado foi escassez de chips, aumentos de preços em eletrônicos e atrasos em cadeias de produção globais. Economias que pareciam resilientes mostraram fragilidades profundas.</p><blockquote class="example">📌 <em>Exemplo: a produção de um carro envolve aço (siderúrgica), alumínio (mineração), componentes eletrônicos (indústria de semicondutores), borracha (agricultura), vidro (indústria química) e montagem. Cada etapa tem custos, margens de lucro e riscos. Quando um fornecedor de airbags atrasa entrega, a montadora paralysa.</em></blockquote><h4>Eficiência Produtiva e Especialização</h4><p>Uma das razões pelas quais a economia global existe é a <strong>eficiência da especialização</strong>. Se cada pessoa ou país tentasse ser autossuficiente, produzindo tudo que precisa, a produtividade seria muito baixa. Mas quando pessoas e países se especializam naquilo que fazem melhor (em termos de custo), a produção total aumenta.</p><p>Um exemplo clássico é David Ricardo e a teoria da vantagem comparativa. Suponha que Portugal e Inglaterra produzem vinho e pano. Portugal pode fazer ambos com mais eficiência. Mas se Portugal se especializar em vinho (onde tem maior vantagem relativa) e Inglaterra em pano, ambos ganham através do comércio, porque o custo de oportunidade é reduzido. Isso explica por que o Brasil exporta café, minério de ferro e soja, enquanto importa dispositivos médicos de alta tecnologia e semicondutores.</p><p>A eficiência também depende de <strong>inovação tecnológica</strong>. Um trator moderno permite que um agricultor cultive 10 vezes mais terra com o mesmo esforço. Máquinas de IA reduzem o tempo necessário para tarefas administrativas. A internet conecta bilhões de pessoas, criando novos mercados. Tecnologia altera a fronteira de possibilidades de produção, tornando economias mais produtivas.</p><blockquote class="news">📰 <em>Notícia: em 2024, a produção de energia renovável ultrapassou combustíveis fósseis pela primeira vez em muitos países europeus, mudando toda a cadeia de energia.</em></blockquote>',

        dur: '14 min',
        content: '<h3>Demanda, Oferta e Formação de Preços</h3><p>Os preços não são números mágicos. São sinais que comunicam informação sobre escassez e abundância. Quando muitas pessoas querem comprar algo (alta demanda) e poucos oferecem (baixa oferta), o preço sobe. Quando a situação se inverte, o preço cai. Esse mecanismo de preços aloca recursos de forma eficiente em economias de mercado.</p><p><strong>Demanda</strong> é a quantidade de um bem que consumidores estão dispostos a comprar a diferentes preços, em um determinado período. A lei da demanda diz que, mantidas outras condições constantes, quanto maior o preço, menor a quantidade demandada. Isso ocorre porque consumidores têm orçamentos limitados e procuram o melhor valor. Se café sobe de preço, algumas pessoas podem trocar por chá.</p><blockquote class="tip">💡 <em>Dica: a demanda não é uma quantidade fixa, mas uma função que varia com o preço e outras condições (renda, preferências, preços de substitutos).</em></blockquote><p><strong>Oferta</strong> é a quantidade de um bem que produtores estão dispostos a vender a diferentes preços. A lei da oferta diz que, mantidas outras condições constantes, quanto maior o preço, maior a quantidade ofertada. Produtores ganham mais revenue e lucro com preços altos, então aumentam a produção. Inversamente, preços baixos desincentivam produção.</p><h4>O Equilíbrio de Mercado</h4><p>O <strong>preço de equilíbrio</strong> é onde a quantidade demandada iguala a quantidade ofertada. Nesse ponto, há perfeita compatibilidade: consumidores querem comprar exatamente o que produtores querem vender. Não há escassez (que causaria pressão para preços subirem) nem excesso de estoque (que causaria pressão para descer).</p><p>Quando a demanda aumenta (porque, por exemplo, a renda das pessoas cresce), a curva de demanda se desloca para cima. Se a oferta permanece constante, há escassez temporária e preços sobem até encontrar novo equilíbrio, em quantidade maior e preço maior. Quando a oferta aumenta (por inovação tecnológica), preços caem e quantidade transacionada sobe.</p><p>A história dos preços de eletrônicos ilustra bem isso. Quando computadores pessoais surgiram, eram caríssimos (alguns milhares de dólares). Pouquíssimas pessoas os compravam. Mas conforme a tecnologia avançou, a produção se escalonizou, a oferta explodia, e preços caíram dramaticamente. Hoje um smartphone custa uma fração disso e tem milhões de vezes mais poder computacional. A demanda explodiu, mas a oferta cresceu ainda mais rápido.</p><blockquote class="example">📌 <em>Exemplo: mercado de passagens aéreas. No pico de férias (demanda alta), preços disparam. Nas épocas baixas, companhias aéreas oferecem promoções para encher aviões (aumentar receita quando há excesso de oferta). Uma greve de pilotos reduz oferta, subindo preços dramaticamente.</em></blockquote><h4>Elasticidade de Preço</h4><p>Nem todos os bens respondem da mesma forma a mudanças de preço. <strong>Bens elásticos</strong> são aqueles cuja quantidade demandada é muito sensível a mudanças de preço. Exemplo: passagens aéreas internacionais (se subirem de preço, muitas pessoas adiam viagem). <strong>Bens inelásticos</strong> são aqueles cuja demanda não muda muito com preço. Exemplo: insulina para diabéticos (aumentar preço não reduz a demanda significativamente, porque é essencial).</p><p>A elasticidade depende de: (1) se há substitutos disponíveis (produtos similares tendem a ser mais elásticos), (2) se o bem é essencial ou supérfluo, (3) do peso do gasto no orçamento (quanto maior, mais elástico). Comida é relativamente inelástica porque é essencial. Mas dentro de comida, carne bovina é mais elástica (pode ser substituída por frango) que alimentos básicos.</p><p>Governo usa esse conhecimento para política fiscal. Taxar bens elásticos reduz consumo e arrecada pouco. Taxar bens inelásticos reduz pouco o consumo (porque é essencial) e arrecada mais. Por isso cigarros e álcool são altamente taxados.</p><blockquote class="news">📰 <em>Notícia: em 2022, aumento de preços de combustível não reduziu significativamente seu consumo nos primeiros meses (inelástico), mas ao longo do tempo, pessoas trocaram por carros elétricos, aumentando elasticidade.</em></blockquote>',

        content: '<h3>Moeda, Valor e Poder de Compra</h3><p>Moeda é um dos maiores inventos da história econômica. Antes de moeda, havia escambo (troca direta de bens). Você tinha galinhas e queria sapato. Precisava encontrar alguém que tivesse sapato e quisesse galinhas, no mesmo momento e quantidade. Isso era ineficiente. Moeda resolve esse problema sendo um <strong>meio de troca amplamente aceito</strong>. Todos aceitam moeda porque sabem que podem usá-la para comprar qualquer coisa depois.</p><p>Moeda tem três funções principais: (1) <strong>meio de troca</strong> (você a usa para comprar), (2) <strong>reserva de valor</strong> (você a guarda para gastar depois sem perder poder de compra), (3) <strong>unidade de conta</strong> (você expressa preços em moeda). Em uma hiperinflação, moeda falha em todas as três. O dinheiro perde valor tão rapidamente que ninguém quer guardar, as pessoas voltam para escambo ou dolarização.</p><blockquote class="tip">💡 <em>Dica: moeda só funciona se houver confiança de que ela manterá valor. Essa confiança vem de bancos centrais responsáveis e economias estáveis.</em></blockquote><h4>Inflação e Poder de Compra</h4><p><strong>Inflação</strong> é o aumento persistente e generalizado de preços. Significa que, com a mesma quantia de dinheiro, você compra menos coisas. Se inflação é 10% ao ano, seu salário precisa crescer 10% apenas para você manter o mesmo poder de compra. Se crescer menos, você fica mais pobre. Se não crescer, você fica 10% mais pobre.</p><p>Inflação acontece por várias razões. (1) <strong>Inflação de demanda</strong>: há muito dinheiro perseguindo poucos bens. Durante a pandemia, governos injetaram trilhões em estímulo, demanda explodia enquanto oferta era restrita. Resultado: inflação. (2) <strong>Inflação de custos</strong>: custos de produção sobem (salários, matérias-primas, energia), empresas repassam ao consumidor. A crise de energia na Europa em 2022 causou inflação de custos. (3) <strong>Inflação de expectativas</strong>: se as pessoas acreditam que inflação vai ser alta, exigem reajustes salariais maiores, o que pressiona ainda mais preços.</p><p>Inflação moderada (2-3% ao ano) é considerada saudável porque incentiva gasto e investimento em vez de entesouramento. Mas inflação alta (acima de 10% ao ano) distorce decisões econômicas. Pessoas preferem gastar logo antes que o dinheiro perca valor. Empresas não conseguem planejar porque não sabem seus custos futuros. Investimentos de longo prazo desaparecem.</p><blockquote class="example">📌 <em>Exemplo: Brasil 1990s. Inflação chegou a 2000% ao ano em alguns momentos. A moeda (cruzado) era tão instável que preços mudavam diariamente. O Plano Real em 1994 criou nova moeda (real) lastreada em dólar e controlou inflação, estabilizando a economia.</em></blockquote><h4>Taxa de Juros e Custo do Dinheiro</h4><p><strong>Taxa de juros</strong> é o preço do dinheiro. Se você empresta R$ 1.000, a taxa de juros determina quanto o devedor paga de volta. Juros existem porque há custo de oportunidade: ao emprestar dinheiro hoje, você deixa de usá-lo para outras coisas. O credor também enfrenta risco (o devedor pode não pagar).</p><p>Taxa de juros é determinada por oferta e demanda de crédito. Se há muito dinheiro disponível para emprestar e pouca demanda (pessoas não querem pedir emprestado), juros caem. Se há pouco dinheiro e muita demanda, juros sobem. O <strong>banco central</strong> de cada país controla a taxa básica de juros (taxa SELIC no Brasil, federal funds rate nos EUA), que influencia todas as outras taxas na economia.</p><p>Juros altos reduzem consumo e investimento (porque é caro pegar empréstimo), ajudando a controlar inflação. Juros baixos estimulam consumo e investimento, aquecendo economia, mas podem gerar inflação se excessivos. Esse é um dos principais dilemas de política monetária: controlar inflação ou estimular crescimento.</p><p>Para pessoas comuns, juros altos significam que hipotecas, empréstimos de carro e cheque especial ficam caros. Isso reduz poder de compra. Para savers, juros altos significam maiores retornos em poupança e investimentos. Há sempre ganhadores e perdedores com mudanças de taxas de juros.</p><blockquote class="news">📰 <em>Notícia: em 2023-2024, bancos centrais globais elevaram juros agressivamente para conter inflação pós-pandêmica, aumentando custo de crédito e criando pressão sobre endividados.</em></blockquote>',

        dur: '15 min',
        content: '<h3>Estruturas de Mercado: Concorrência Perfeita até Monopólio</h3><p>Nem todos os mercados funcionam igual. Alguns têm muitos concorrentes, produtos homogêneos, onde nenhuma empresa consegue controlar preço. Outros têm apenas um vendedor que tem total poder sobre preços. Essas diferenças têm implicações profundas para eficiência, inovação e bem-estar do consumidor.</p><p><strong>Concorrência Perfeita</strong> é um modelo teórico onde: (1) há muitos compradores e vendedores, (2) produtos são homogêneos (idênticos), (3) há perfeita informação, (4) há livre entrada e saída do mercado. Em concorrência perfeita, preço é determinado pela oferta e demanda de mercado. Nenhuma empresa individual consegue cobrar mais, porque consumidores compram de concorrentes. Nenhuma consegue cobrar menos para aumentar vendas além de sua capacidade sem perder margem. Resultado: eficiência econômica máxima. Exemplos aproximados: mercados agrícolas (muitos fazendeiros, grãos homogêneos), mercados de commodities (ouro, trigo).</p><blockquote class="tip">💡 <em>Dica: em concorrência perfeita, empresas ganham apenas lucro normal (retorno sobre capital), não lucro extraordinário.</em></blockquote><p><strong>Concorrência Monopolística</strong> é onde há muitos vendedores, mas produtos são diferenciados. Marcas, qualidade, localização, design criam diferenças. Cada empresa tem algum poder de controlar preço (não é escrava do mercado como em concorrência perfeita), mas esse poder é limitado. Exemplos: restaurantes, lojas de roupas, apps de delivery. Um restaurante italiano pode cobrar mais que uma lanchonete, porque há diferenciação, mas não pode cobrar 10x mais, porque há muitos substitutos. Essa estrutura gera mais inovação que concorrência perfeita, porque empresas competem por diferenciação.</p><h4>Oligopólio e Sua Dinâmica</h4><p><strong>Oligopólio</strong> é onde poucos grandes vendedores controlam a maioria do mercado. Indústria automóvel (dominada por meia dúzia de gigantes), telefonia celular (poucas operadoras por país), aviação comercial (poucos fabricantes mundiais de aviões). Em oligopólio, preços tendem a ser mais altos que em concorrência, mas há espaço para inovação porque empresas ganham altos lucros.</p><p>O dilema dos oligopolistas é: competir agressivamente (reduzir preços, aumentar marketing) para ganhar market share, ou cooperar tacitamente, mantendo preços altos e lucros enormes? Se todos competem, todos perdem margem. Se todos mantêm preços altos, todos ganham muito. Mas há incentivo para trapacear: se seus rivais mantêm preços altos, você pode reduzir levemente e roubar clientes. Isso leva a ciclos de competição e cooperação.</p><p>Reguladores vigiam oligopólios porque tendem a abusar do poder de mercado. Podem combinar preços ilegalmente (cartel), exercer práticas predatórias contra rivais, cobrar preços excessivos. Grandes fusões são frequentemente bloqueadas por autoridades antitruste para preservar concorrência.</p><blockquote class="example">📌 <em>Exemplo: setor de telefonia no Brasil. Durante anos, 3 operadoras dominavam (Vivo, Claro, TIM). Preços eram altos, serviço ruim. Entrada de Oi e mais recentemente competidores regionais aumentou concorrência, reduzindo preços e melhorando qualidade.</em></blockquote><h4>Monopólio e Seus Efeitos</h4><p><strong>Monopólio</strong> é onde uma única empresa domina o mercado inteiro. Há barreiras que impedem novos entrantes: (1) controle de recurso essencial (única mina de um mineral raro), (2) economia de escala tão grande que nenhum rival consegue competir (utilidade pública como água, energia), (3) patentes e propriedade intelectual, (4) concessão governamental (correios, alguns leilões de frequência).</p><p>Em monopólio, a empresa pode cobrar preço acima do custo marginal, gerando lucro extraordinário. Pode também restringir produção para manter preços altos. Resultado: preços mais altos, quantidade menor, e bem-estar do consumidor reduzido comparado a concorrência. A empresa não tem incentivo para inovar rapidamente porque não enfrenta concorrência.</p><p>Por isso governo regula monopólios naturais (utilities). Ou evita que se formem (proibindo fusões em mercados concentrados). Ou quebra monopólios existentes (antitruste). Um caso célebre foi a AT&T nos EUA, que dominava telecomunicações. Governo a dividiu em várias empresas regionais. Isso aumentou concorrência e inovação.</p><p>Monopólios tecnológicos são um dilema moderno. Empresas de IA, cloud computing, redes sociais ganham escala tão rapidamente que criam poder monopolístico. Ao mesmo tempo, inovação é rápida. Reguladores em todo mundo lutam com questão: como preservar inovação e crescimento enquanto evita abuso de poder?</p><blockquote class="news">📰 <em>Notícia: em 2024, reguladores globais investigam gigantes de IA e big tech por práticas anticompetitivas, tentando balancear inovação com proteção de mercados.</em></blockquote>',

        content: '<h3>Taxa de Câmbio e Comércio Internacional</h3><p>Taxa de câmbio é o preço de uma moeda em relação a outra. Quantos reais você precisa para comprar 1 dólar? Essa taxa flutua diariamente nos mercados cambiais globais. Tem impacto profundo em comércio internacional, investimentos e poder de compra de países.</p><p><strong>Taxa de câmbio nominal</strong> é o preço que você observa: 1 USD = 5 BRL (um dólar vale 5 reais). <strong>Taxa de câmbio real</strong> leva em conta inflação. Se Brasil tem inflação 8% e EUA tem 2%, a moeda brasileira enfraquece em termos reais, mesmo que taxa nominal permaneça igual. Consumidores brasileiros acham produtos americanos mais caros e vice-versa.</p><blockquote class="tip">💡 <em>Dica: aprecie de moeda = sua moeda fica mais forte (precisa menos dela para comprar estrangeira). Depreciação = sua moeda fica mais fraca.</em></blockquote><h4>Apreciação e Depreciação</h4><p>Quando o real <strong>aprecia</strong> frente ao dólar (passa de 5 reais/dólar para 4 reais/dólar), brasileiros podem comprar dólares e bens importados mais barato. Mas exportadores brasileiros ficam prejudicados porque seus produtos ficam mais caros para estrangeiros. Uma unidade que custava 100 dólares agora custa 20% menos em reais, o que é ótimo para importadores, mas um desastre para exportadores (ganham menos reais pelos mesmos dólares).</p><p>Quando o real <strong>deprecia</strong> (passa de 5 para 6 reais/dólar), importações ficam mais caras para brasileiros. Mas exportadores ganham, porque ganham mais reais pelos mesmos dólares. Isso incentiva exportação e desestimula importação. Taxa de câmbio afeta fluxos comerciais e balança comercial.</p><p>O que determina taxa de câmbio? Basicamente, demanda e oferta de moeda. Se estrangeiros querem investir mais no Brasil, demandam mais reais, apreciando a moeda. Se Banco Central do Brasil vende reais em mercado, aumenta oferta, depreciando-a. Se inflação brasileira sobe demais, produtos brasileiros ficam caros, estrangeiros demandam menos reais, depreciando-a.</p><h4>Comércio Internacional e Competitividade</h4><p>Comércio internacional existe porque países têm vantagens comparativas. Brasil é bom em agrícola (clima, terra). Japão é bom em eletrônicos de alta tecnologia. Cada país se especializa e troca. Resultado: ambos ganham (teórico), porque consomem mais barato do que se produzissem tudo sozinhos.</p><p>Mas comércio tem perdedores locais. Um país que importa muito têxtil prejudica suas fábricas têxteis locais, que fecham e demitem. Trabalhadores sofrem desemprego e redução salarial. Por isso, comércio livre é politicamente controverso. Grupos prejudicados pedem proteção (tarifas, quotas). Países que protegem setores ineficientes acabam com custos mais altos para consumidores e menos crescimento.</p><blockquote class="example">📌 <em>Exemplo: Brasil vende soja para China a preço global. Se Brasil impusesse tarifas na soja chinesa, teria sojas mais baratas domesticamente, mas prejudicaria agricultores brasileiros que exportam. Comércio livre beneficia agricultores brasileiros.</em></blockquote><h4>Balança Comercial e Conta Corrente</h4><p><strong>Balança comercial</strong> é a diferença entre exportações e importações de bens. Se Brasil exporta 100 bilhões e importa 80 bilhões, tem superávit de 20 bilhões. <strong>Conta corrente</strong> é mais ampla, incluindo comércio de bens, serviços, e transferências (remessas, ajuda externa).</p><p>Superávit comercial significa mais dólares entrando do que saindo. Déficit é o oposto. Ambos podem ser saudáveis ou problemáticos dependendo do contexto. Um país em desenvolvimento pode ter déficit porque está importando máquinas para crescer. Um país desenvolvido pode ter superávit porque exporta tecnologia. O que importa é sustentabilidade.</p><p>Déficits crônicos e crescentes sinalizam que país está perdendo competitividade, acumulando dívida externa insustentável. Superávits crônicos sinalizam que país está empobrecido (não investe em si mesmo) ou manipula taxa de câmbio para vantagem comercial injusta (prática que EUA acusa China de fazer).</p><blockquote class="news">📰 <em>Notícia: em 2023-2024, Brasil teve déficit comercial acentuado devido a importações de energia e componentes eletrônicos, enquanto exportações agrícolas crescem, refletindo mudanças estruturais na economia.</em></blockquote>',
        cards: [
          { q: 'O que é apreciação de moeda e como afeta exportadores e importadores?', a: 'Apreciação = moeda fica mais forte. Importadores ganham (produtos estrangeiros mais baratos). Exportadores perdem (seus produtos menos competitivos no exterior).' },

        ]

        name: 'Crédito, Endividamento e Ciclo de Expansão e Contração',
        dur: '15 min',
        content: '<h3>Crédito, Endividamento e Ciclo de Expansão e Contração</h3><p>Crédito é o coração de economias modernas. Sem capacidade de emprestar e pedir emprestado, economia não cresceria. Empresários não conseguiriam financiar fábricas. Pessoas não comprariam casas. Mas crédito excessivo cria bolhas que explodem em crises. Entender dinâmica de crédito é crítico para entender ciclos econômicos.</p><p><strong>Ciclo de crédito</strong> funciona assim: economia está em crescimento, confiança é alta, banco central reduz taxa de juros para estimular ainda mais. Crédito fica barato e abundante. Consumidores pegam empréstimos para comprar carros, casas. Empresas pegam para expandir. Demanda explode, preços sobem, pessoas se sentem ricas e gastam mais. Tudo parece perpétuo.</p><p>Mas à medida que crédito cresce desmedidamente, endividamento sobe. Pessoas e empresas têm dívidas cada vez maiores relativas a sua renda. Preços de ativos (imóveis, ações) sobem para patamares insustentáveis. Mercado imobiliário é especialmente vulnerável porque imóvel é caro e gerações precisam de financiamento. Quando preços sobem muito, especuladores entram, comprando só para revender, aquecendo bolha.</p><blockquote class="tip">💡 <em>Dica: bolhas explodem quando: (1) crédito fica mais caro/apertado, (2) pessoas não conseguem mais pagar dívidas, (3) ativos começam a cair, desencadeando vendas em pânico.</em></blockquote><h4>O Colapso e a Crise</h4><p>Eventualmente, realidade volta. Banco central aperta juros para controlar inflação. Crédito fica caro e escasso. Pessoas não conseguem mais refinanciar dívidas. Preços de ativos começam a cair. Especuladores fogem. Pânico toma conta. Instituições financeiras que emprestaram demais enfrentam calotes (inadimplência). Algumas quebram.</p><p>Durante a Grande Recessão de 2008-2009, exatamente isso aconteceu. Bancos nos EUA financiaram hipotecas a pessoas com péssimo crédito (subprime mortgages). Enquanto preços imobiliários subiam, tudo funcionava. Mas quando caíram, milhões de proprietários ficaram com dívidas maiores que o valor da casa (negative equity). Começaram a não pagar. Bancos descobriram que seus ativos (as dívidas hipotecárias) não valiam o que pensavam. Crise de confiança. Instituições financeiras faliram ou foram resgatadas pelo governo.</p><p>Crises de crédito propagam rapidamente porque instituições financeiras estão interconectadas. Um banco que quebra deve dinheiro a outros bancos, que por sua vez devem a terceiros. O sistema inteiro congela. Crédito seca. Pessoas e empresas que precisavam de empréstimos para operações normais não conseguem. Desemprego sobe, consumo colapsa, economia entra em recessão.</p><h4>Regulação Prudencial</h4><p>Após 2008, governos e bancos centrais implementaram regulação <strong>macroprudencial</strong>: limites de alavancagem (quanto dívida um banco pode ter relativo ao capital), limites de exposição a setores específicos, requisitos de capital mais altos. Ideia é criar "amortecedores" que evitem que um problema local vire crise sistêmica.</p><p>Testes de stress (simulações de cenários ruins) são agora práticas. Reguladores perguntam: se taxa de juros sobe 3%, preços imobiliários caem 20% e desemprego dispara para 10%, seu banco sobrevive? Se não, precisa aumentar capital ou reduzir risco.</p><p>Mas há dilema: muita regulação sufoca crescimento (bancos ficam avessos ao risco, crédito seca). Pouca regulação leva a crises. Encontrar equilíbrio é arte e ciência que reguladores ainda estão aperfeiçoando. Crises sempre surgem em formas novas porque mercados evoluem mais rápido que regulação.</p><blockquote class="example">📌 <em>Exemplo: crise de crédito imobiliário brasileiro 2008-2012. Crédito imobiliário explodia, preços de imóveis em São Paulo dobraram em alguns anos. Quando juros subiram e crédito apertou, mercado esfriou, construção paralisou, desemprego cresceu na construção civil.</em></blockquote><blockquote class="news">📰 <em>Notícia: em 2024, alguns países enfrentam bolhas imobiliárias novamente em contexto de juros altos, gerando preocupações de reguladores sobre estabilidade financeira.</em></blockquote>',
        cards: [
          { q: 'Descreva as fases do ciclo de crédito (expansão, pico, contração)', a: 'Expansão: juros baixos, crédito barato, demanda explode, preços sobem, confiança alta. Pico: endividamento insustentável, bolhas em ativos. Contração: juros sobem, crédito aperta, calotes começam, preços caem, pânico.' },
          { q: 'Por que crises de crédito propagam rapidamente pelo sistema financeiro?', a: 'Instituições financeiras estão interconectadas. Quando uma quebra, deve dinheiro a outras, causando problema em cascata. Confiança seca, crédito congela, afetando toda economia.' },

        name: 'Ciclos Econômicos: Expansão, Pico, Contração e Recuperação',
        dur: '14 min',
        content: '<h3>Ciclos Econômicos: Expansão, Pico, Contração e Recuperação</h3><p>Economias não crescem em linha reta. Crescem em ciclos, com períodos de expansão seguidos de contração. Às vezes a contração é suave (desaceleração). Às vezes é severa (recessão). Entender ciclos é chave para entender por que desemprego varia, por que investimentos disparam ou desaparecem, por que governos mudam políticas.</p><p><strong>Produto Interno Bruto (PIB)</strong> é a medida mais comum de tamanho e crescimento de economia. É o valor total de todos os bens e serviços finais produzidos em um país em um período (geralmente um ano). Se PIB cresce 3% ao ano, significa economia produziu 3% mais coisas (ou mesma quantidade a preços 3% mais altos, ou combinação). PIB per capita (PIB dividido pela população) é melhor medida de bem-estar, porque leva em conta crescimento populacional.</p><blockquote class="tip">💡 <em>Dica: crescimento nominal de PIB inclui inflação. Crescimento real de PIB remove inflação, mostrando crescimento "de verdade".</em></blockquote><h4>Fases do Ciclo Econômico</h4><p><strong>Expansão (recuperação)</strong>: economia sai de recessão. Emprego cresce, confiança volta, consumo aumenta, investimento retoma. Empresas contratam mais funcionários. Preços estão ainda moderados. Tudo melhora gradualmente. Essa fase pode durar anos.</p><p><strong>Pico (boom)</strong>: economia está operando acima da capacidade normal. Desemprego atinge mínimos históricos. Inflação sobe porque há excesso de demanda. Preços de ativos (ações, imóveis) explodem. Consumidores estão otimistas demais e gastam como nunca. Empresas ganham muito, lucros recordes. Parece que vai durar para sempre. Geralmente é quando bolhas se formam.</p><p><strong>Contração (recessão)</strong>: crescimento desacelera ou fica negativo. Emprego cai, desemprego sobe. Confiança desaba. Consumo reduz, investimento colapsa. Empresas cortam custos, demitem. Se contração é longa e severa (crescimento negativamente por 2+ trimestres), chama-se <strong>recessão</strong>. Se muito severa (grande queda de PIB, desemprego acima de 10%, pode durar anos), chama-se <strong>depressão</strong>.</p><p><strong>Recuperação</strong>: economia toca fundo (trough), para de cair. Gradualmente retoma crescimento. Fase pela qual Brasil passou 2016-2017, depois 2020-2021. Pode levar meses ou anos. Durante essa fase, inventários que foram liquidados precisam ser repostos, o que estimula produção.</p><h4>Causas de Ciclos</h4><p>Economistas discutem causas. <strong>Teoria de demanda agregada</strong> (Keynesiana) diz que ciclos são causados por flutuações em demanda total. Quando demanda cai (talvez por choque externo como crise financeira), empresas produzem menos, emprego cai, renda cai, demanda cai mais. É um círculo vicioso. Governo pode quebrar esse ciclo aumentando gasto ou reduzindo impostos.</p><p><strong>Teoria de ciclos de negócios reais</strong> diz que ciclos são causados por choques de oferta (tecnologia, energia, pandemias, guerras) que afetam capacidade produtiva. Quando há choque positivo (inovação), economia cresce. Quando há choque negativo (guerra, embargo de petróleo), economia contrai. Nesse caso, política de governo é menos eficaz.</p><p>Realidade provavelmente envolve ambos. Choques de demanda (confiança, crédito) e choques de oferta (tecnologia, recursos) causam ciclos. <strong>Choques externos</strong> (guerra, pandemia, crise em outro país) transmitem ciclos entre países. Mundo cada vez mais integrado significa que crises se propagam mais rápido (globalizando também recessões).</p><blockquote class="example">📌 <em>Exemplo: crise de 2008. Originada em EUA (bolha imobiliária). Bancos europeus tinham exposição a hipotecas americanas ruins. Quando exploraram, crises se espalharam pela Europa. Moeda única (euro) impediu ajustes cambiais que normalmente absorveriam choque. Resultado: recessão global.</em></blockquote>',

      {
        id: 8,
        name: 'Desemprego, Pobreza e Desigualdade Econômica',
        dur: '14 min',
        content: '<h3>Desemprego, Pobreza e Desigualdade Econômica</h3><p>Economia é em última análise sobre pessoas. Números de PIB e taxa de juros importam porque afetam vidas. Quando economia contrai, desemprego sobe, pessoas sofrem perda de renda, dignidade, segurança. Desigualdade extrema cria ressentimento e instabilidade social. Entender essas dimensões humanas é vital.</p><p><strong>Desemprego</strong> é fração da força de trabalho que não tem emprego mas está procurando ativamente. Taxa de desemprego = desempregados / (empregados + desempregados). Durante expansões, taxa cai (empresa contrata). Durante recessões, sobe (empresas demitem). Em recessão severa, pode superar 10%. No Brasil, em 2023-2024, desemprego ronda 7-8%.</p><p>Mas taxa de desemprego oficial subestima desemprego real porque não inclui: (1) <strong>desempregados desalentados</strong> (param de procurar porque desistiram), (2) <strong>subempregados</strong> (trabalham meio período quando querem tempo integral), (3) <strong>informalidade</strong> (trabalham sem registro). No Brasil, economia informal é enorme (~40% da força de trabalho), então muitas pessoas ganham pouco e sem proteção.</p><blockquote class="tip">💡 <em>Dica: taxa de desemprego natural (NAIRU) é aproximadamente 4-5% em economias avançadas. Abaixo disso, inflação tende a acelerar.</em></blockquote><h4>Tipos de Desemprego</h4><p><strong>Desemprego cíclico</strong> é causado por contrações econômicas. Quando economia cresce, desaparece. Durante Grande Recessão, desemprego nos EUA atingiu 10%. Hoje está em 3.9% (2024). Cíclico é o mais sensível a política de governo.</p><p><strong>Desemprego estrutural</strong> é causado por mudanças tecnológicas ou mudanças de estrutura econômica que deixam alguns trabalhadores sem relevância. Máquinas eliminam trabalho manual. Automação elimina empregos de rotina. Quando indústria se muda de país, postos de trabalho desaparecem. Desemprego estrutural é mais difícil de resolver porque requer reciclagem profissional, mudança geográfica, redução salarial.</p><p><strong>Desemprego friccional</strong> é temporário, resultado de pessoas mudando de emprego. Sempre existe porque pessoas otimizam para melhor posição. Em economia dinâmica, friccional é maior (mais pessoas mudando).</p><h4>Pobreza e Desigualdade</h4><p><strong>Pobreza absoluta</strong> é impossibilidade de satisfazer necessidades básicas (comida, moradia, saúde). Afeta centenas de milhões globalmente. <strong>Pobreza relativa</strong> é estar significativamente abaixo da média de seu país. Um desempregado em país rico pode ter renda maior que uma pessoa empregada em país pobre (absoluto vs relativo).</p><p><strong>Desigualdade econômica</strong> é medida por indicadores como coeficiente Gini (varia de 0=igualdade perfeita a 100=desigualdade máxima). Brasil tem Gini de ~57, entre os mais altos do mundo. Noruega tem ~27. EUA tem ~42. Desigualdade afeta mobilidade social (oportunidade de sair da pobreza), saúde mental, confiança pública.</p><p>Desigualdade crescente é preocupação de muitos países. Razões incluem: (1) <strong>mudança tecnológica</strong> que favorece trabalhadores altamente qualificados, (2) <strong>globalização</strong> que reduz salários de trabalhadores menos qualificados em países ricos, (3) <strong>financiamento de campanha</strong> que dá poder a ricos, (4) <strong>educação desigual</strong> que perpetua vantagens de nascimento.</p><blockquote class="example">📌 <em>Exemplo: EUA 1970 tinha menor desigualdade que hoje. CEO ganhava ~20x salário médio. Hoje ganha ~300x. Tecnologia e globalização impuseram pressão para baixo em salários de trabalhadores menos qualificados, enquanto CEOs e banqueiros ganham cada vez mais.</em></blockquote><h4>Política Social</h4><p>Governos usam políticas para reduzir desemprego e desigualdade: (1) <strong>seguro desemprego</strong> (renda temporária durante desemprego), (2) <strong>educação pública e gratuita</strong> (aumenta mobilidade), (3) <strong>redistribuição de renda via impostos progressivos</strong> (ricos pagam percentual maior), (4) <strong>proteção ao trabalhador</strong> (dificulta demissão, mandando-a é caro), (5) <strong>salário mínimo</strong> (garante piso de renda).</p><p>Mas há trade-offs. Seguro desemprego muito generoso pode desestimular procura de emprego. Impostos muito altos podem desestimular investimento e inovação. Proteção ao trabalhador pode desestimular contratação. Salário mínimo muito alto pode desestimular contratação de trabalhadores menos qualificados. Política social eficaz requer balanceamento.</p><blockquote class="news">📰 <em>Notícia: em 2023-2024, Brasil discute aumento de salário mínimo, reforma tributária para aumentar progressividade e programas de transferência de renda (Bolsa Família expandida), debatendo trade-offs entre proteção social e estímulo econômico.</em></blockquote>',
        cards: [
          { q: 'O que diferencia desemprego cíclico, estrutural e friccional?', a: 'Cíclico: causado por recessão, desaparece em expansão. Estrutural: tecnologia/mudanças econômicas deixam trabalhadores sem relevância, difícil de resolver. Friccional: transição entre empregos, sempre existe.' },
          { q: 'Como desemprego estrutural difere de cíclico em termos de solução?', a: 'Cíclico: resolvido por estímulo econômico/expansão. Estrutural: requer reciclagem profissional, investimento em educação, mudança geográfica, ajuste de salários.' },
          { q: 'O que é coeficiente Gini e o que representa?', a: 'Medida de desigualdade de renda: 0=igualdade perfeita, 100=desigualdade máxima. Brasil ~57, Noruega ~27, EUA ~42. Maior número = maior desigualdade.' }

      {
        id: 9,
        name: 'Crises Econômicas Globais: Causas, Contágio e Recuperação',
        dur: '16 min',
        content: '<h3>Crises Econômicas Globais: Causas, Contágio e Recuperação</h3><p>Crises econômicas severas são eventos que transformam sociedades. A Grande Depressão (1929) levou a desemprego de 25%+, pobreza massiva, eventualmente nazismo e Segunda Guerra. A crise de 2008 custou trilhões em riqueza perdida, milhões de pessoas sem-abrigo (foreclosures), recessão global. Crises geram sofrimento humano enorme.</p><p>O que causa crises severas? Geralmente é combinação de: (1) <strong>bolha de ativos</strong> (preços insustentavelmente altos), (2) <strong>excesso de crédito</strong> (muita dívida relativa a capacidade de pagar), (3) <strong>choques externos</strong> (evento inesperado que desencadeia fuga de confiança), (4) <strong>fraqueza regulatória</strong> (instituições financeiras mal supervisionadas). Quando bolha estoura, cascata de problemas.</p><blockquote class="tip">💡 <em>Dica: crises tendem a ser rápidas e dramáticas. Recuperações são lentas e gradualmente. Por isso policy makers preferem evitá-las.</em></blockquote><h4>Contágio e Transmissão Global</h4><p>Crises em um país rapidamente se espalham globalmente porque: (1) <strong>mercados financeiros integrados</strong> (investidores globais sofrem perdas onde quer que sejam), (2) <strong>cadeias de valor globais</strong> (colapso em um país afeta fornecedores e clientes globais), (3) <strong>confiança é global</strong> (pessimismo em um país causa fuga de capital de países similares), (4) <strong>moedas e commodities</strong> (crise em um país pode desvalorizar moeda, afetando países que comerciam).</p><p>Exemplo 1997: Crise financeira asiática originária da Tailândia (currency crisis, débitos em moeda estrangeira não sustentáveis). Rapidamente se espalhou para Indonésia, Coreia do Sul, Hong Kong. Moedas entraram em colapso, empresas faliram. Propagação para Brasil levou a ataques especulativos ao real (2001). O mundo estava conectado demais para uma crise local permanecer local.</p><p>Exemplo 2008: crise subprime nos EUA (hipotecas ruins explodindo). Bancos europeus tinham investimentos em hipotecas americanas. Quando caíram, instituições financeiras europeias foram impactadas (Dexia na Bélgica faliu, NordLB na Alemanha quase faliu). Depois: recessão global. Todos sofreram porque economias estão conectadas. Comércio internacional caiu 15% em 2009.</p><h4>Mecanismos de Propagação</h4><p>Quando crise eclode, há fuga de capital. Investidores saem de economias emergentes para segurança de EUA, Alemanha, etc. Moedas locais desvalorizam. Débitos em moeda estrangeira se tornam insustentáveis. Empresas locais não conseguem pagar. Bancos locais enfrentam corrida (todos tentam sacar dinheiro simultaneamente). Sem acesso a crédito internacional, economia congela.</p><p>Supply chains se rompem. Se fábrica na Tailândia fecha, empresa americana que depende dos componentes não consegue produzir. Desemprego se espalha. Consumidores reduzem gastos, demanda cai, mais empresas cortam. É círculo vicioso.</p><p>Governo e banco central tentam evitar pior: (1) <strong>banco central injeta liquidez</strong> (empresta dinheiro a bancos para evitar faliências em cascata), (2) <strong>governo aumenta gasto</strong> (tenta manter demanda quando setor privado desaba), (3) <strong>taxas de juros caem</strong> para incentivar empréstimos e gastos. Tudo isso aumenta dívida pública, mas é preço de evitar depressão.</p><h4>Recuperação e Lessons Learned</h4><p>Recuperação de crise severa leva tempo. Após 2008, EUA levou 7-8 anos para desemprego voltar a níveis pré-crise. Zona do euro levou ainda mais (e nunca totalmente recuperou em alguns países periféricos). Brasil levou anos para recuperar de sua recessão 2015-2017.</p><p>Cada crise deixa lessons. Após 2008: regulação mais apertada dos bancos (Basel III), requerimentos de capital maiores, testes de stress, restrições em derivativos. Instituições como Fundo Monetário Internacional e Banco Central Europeu ganham ferramentas e poderes. Coordenação internacional melhora. Ninguém quer crise novamente.</p><p>Mas há sempre risco de próxima crise ser diferente. Reguladores fecham porta passada enquanto mercados abrem janela futura. Após 2008, foco era em bancos, então risco migrou para sombra bancária (shadow banking). Após COVID, bolha imobiliária ameaça novamente. Vigilância eterna é preço de estabilidade.</p><blockquote class="example">📌 <em>Exemplo: COVID-19 em 2020. Crise de oferta (lockdowns param produção) combinada com choque de demanda (pessoas assustadas, reduzem gasto). Governo responde com estímulos maciços. Resultado: crescimento forte 2021-2022, mas inflação alta 2022-2023. Trade-off entre recessão imediata e inflação depois.</em></blockquote><blockquote class="news">📰 <em>Notícia: em 2023-2024, economistas debatem risco de recessão global, citando juros altos, dívida elevada e tensões geopolíticas como fatores de risco. Alguns argumentam que recessão é inevitável e melhor aceitar logo do que estender indefinidamente.</em></blockquote>',
