<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nichos Lucrativos — O Guia Definitivo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#0f1424;--bg3:#151b30;
  --card:rgba(20,28,50,.7);--card2:rgba(25,35,62,.8);
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);
  --brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.1);
  --cy:#00d4ff;--cy2:#00e5ff;--cy3:#b3f0ff;--cyd:rgba(0,212,255,.08);
  --pu:#a855f7;--pu2:#c084fc;
  --txt:#94a3c0;--txt2:#5a6a88;--txt3:#354060;
  --wh:#edf2fc;--grn:#34d399;--warn:#fbbf24;
  --font:'Plus Jakarta Sans',sans-serif;--serif:'Instrument Serif',serif;
  --glow:0 0 20px rgba(0,212,255,.15);
  --card-glow:0 4px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:15px;line-height:1.7;min-height:100vh}
::selection{background:rgba(232,168,56,.2);color:var(--wh)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
.header{position:fixed;top:32px;left:0;right:0;height:60px;background:rgba(8,9,12,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 20px;z-index:200;gap:14px}
.logo{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:var(--cy);white-space:nowrap}
.logo span{color:var(--txt3);font-weight:400;font-size:.85rem}
.search-box{flex:1;max-width:400px;margin:0 auto;position:relative}
.search-box input{width:100%;background:var(--bg3);border:1.5px solid var(--brd);border-radius:8px;padding:8px 14px 8px 36px;color:var(--wh);font-family:var(--font);font-size:.85rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--cy)}.search-box input::placeholder{color:var(--txt3)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);width:16px;height:16px}
.hdr-prog{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--txt3);white-space:nowrap}
.hdr-prog b{color:var(--cy)}
.glob-bar{position:fixed;top:60px;left:0;right:0;height:3px;background:var(--bg3);z-index:199}
.glob-fill{height:100%;background:linear-gradient(90deg,var(--cy),var(--gold2));transition:width .8s cubic-bezier(.22,1,.36,1)}
.layout{display:flex;margin-top:63px;min-height:calc(100vh - 63px)}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--brd);overflow-y:auto;position:fixed;top:63px;bottom:0;left:0;z-index:100;transition:transform .3s}
.main{flex:1;margin-left:280px;padding:28px 32px 80px;max-width:860px}
.sb-cat{padding:6px 14px;font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cy);margin-top:14px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;color:var(--txt2);font-size:.8rem}
.sb-item:hover{background:rgba(232,168,56,.05);color:var(--txt);transform:translateX(3px)}
.sb-item.active{background:rgba(232,168,56,.1);border-left-color:var(--cy);color:var(--wh)}
.sb-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:var(--bg3);font-size:.65rem;font-weight:700;color:var(--txt3);flex-shrink:0}
.sb-item.active .sb-num{background:var(--cy);color:var(--bg)}
.sb-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto}
.sb-dot.full{background:var(--grn);box-shadow:0 0 6px rgba(52,211,153,.4)}
.sb-dot.part{border:2px solid var(--cy)}
.menu-btn{display:none;background:none;border:none;color:var(--txt);font-size:1.4rem;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
.home-hero{text-align:center;padding:50px 16px 30px}
.home-hero .ey{font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cy);margin-bottom:6px}
.home-hero h1{font-family:var(--serif);font-size:2.4rem;font-weight:700;color:var(--wh);line-height:1.15;margin-bottom:10px}
.home-hero p{color:var(--txt2);font-size:.92rem;max-width:520px;margin:0 auto}
.home-stats{display:flex;justify-content:center;gap:28px;margin-top:20px;flex-wrap:wrap}
.home-stat{text-align:center}.home-stat b{font-size:1.4rem;color:var(--cy);display:block}
.home-stat span{font-size:.68rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:30px}
.hcard{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:16px;cursor:pointer;transition:all .35s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden}
.hcard:hover{border-color:var(--cy);transform:translateY(-6px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.hcard .hc-n{font-family:var(--serif);font-size:2rem;font-weight:700;color:rgba(232,168,56,.08);position:absolute;top:6px;right:12px}
.hcard .hc-c{font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cy);margin-bottom:4px}
.hcard h3{font-family:var(--serif);font-size:.98rem;font-weight:600;color:var(--wh);margin-bottom:4px;line-height:1.3}
.hcard p{font-size:.72rem;color:var(--txt3);line-height:1.4}
.hcard .hc-bar{margin-top:8px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.hcard .hc-bf{height:100%;background:var(--cy);transition:width .4s}
.mod-hdr{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--brd)}
.mod-ey{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cy);margin-bottom:4px}
.mod-t{font-family:var(--serif);font-size:1.7rem;font-weight:700;color:var(--wh);margin-bottom:6px}
.mod-d{color:var(--txt2);font-size:.88rem}
.mod-nav{display:flex;gap:6px;margin-top:12px}
.mod-nav button{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:4px 10px;color:var(--txt3);font-family:var(--font);font-size:.7rem;cursor:pointer;transition:all .15s}
.mod-nav button:hover{border-color:var(--cy);color:var(--cy)}
.mp-wrap{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;margin-bottom:16px}
.mp-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.7rem}
.mp-top span{color:var(--txt3)}.mp-top b{color:var(--cy)}
.mp-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.mp-fill{height:100%;background:linear-gradient(90deg,var(--cy),var(--gold2));border-radius:3px;transition:width .5s}
.topic{background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;transition:all .3s cubic-bezier(.25,.46,.45,.94)}
.topic:hover{transform:translateX(4px);border-color:var(--brd2);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.topic.done{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.02)}
.topic-h{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.topic-h:hover{background:rgba(232,168,56,.03)}
.t-chk{width:26px;height:26px;border-radius:7px;border:2px solid var(--brd2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;color:transparent;font-size:.75rem;font-weight:700}
.t-chk:hover{border-color:var(--cy);transform:scale(1.1)}
.t-chk.on{background:var(--grn);border-color:var(--grn);color:var(--bg);animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.t-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--bg3);font-size:.78rem;font-weight:700;color:var(--cy);flex-shrink:0}
.t-title{flex:1;font-weight:600;font-size:.88rem;color:var(--wh)}
.topic.done .t-title{color:var(--txt2)}
.t-arr{color:var(--txt3);transition:transform .2s;font-size:1rem}
.t-arr.open{transform:rotate(180deg)}
.t-body{padding:0 16px 16px 80px;display:none;color:var(--txt);font-size:.88rem;line-height:1.85}
.t-body.open{display:block}
.t-body p{margin-bottom:12px}.t-body p:last-child{margin-bottom:0}.t-body strong{color:var(--gold2)}
.sr-wrap{padding:16px 0}.sr-t{font-family:var(--serif);font-size:1.3rem;font-weight:600;color:var(--wh);margin-bottom:16px}
.sr-item{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.sr-item:hover{border-color:var(--cy);transform:translateX(4px)}
.sr-m{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cy);margin-bottom:2px}
.sr-tp{font-weight:600;color:var(--wh);font-size:.85rem}
.sr-pv{font-size:.75rem;color:var(--txt3);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--txt2);font-family:var(--font);font-size:.78rem;cursor:pointer;padding:4px 0;margin-bottom:12px}
.back:hover{color:var(--cy)}.empty{text-align:center;padding:50px 16px;color:var(--txt3)}
.cert-banner{background:linear-gradient(135deg,rgba(232,168,56,.15),rgba(232,168,56,.05));border:2px solid var(--cy);border-radius:12px;padding:24px;text-align:center;margin:20px 0}
.cert-banner h3{font-family:var(--serif);color:var(--cy);font-size:1.3rem;margin-bottom:8px}
.cert-banner p{color:var(--txt2);font-size:.85rem;margin-bottom:14px}
.cert-btn{background:var(--cy);color:var(--bg);border:none;padding:12px 28px;border-radius:8px;font-family:var(--font);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.cert-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,168,56,.3)}
canvas#cert-canvas{display:none}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.overlay.open{display:block}.main{margin-left:0;padding:18px 12px 80px}.menu-btn{display:block}.hdr-prog span{display:none}.home-hero h1{font-size:1.7rem}.home-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.home-grid{grid-template-columns:1fr}}

/* ===== MISSING FEATURES CSS ===== */
/* Achievement Toast */
.achievement{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,var(--card),var(--bg2));border:2px solid var(--cy);color:var(--wh);padding:12px 24px;border-radius:10px;font-family:var(--font);font-size:.9rem;font-weight:700;z-index:9999;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 8px 32px rgba(232,168,56,.2);pointer-events:none}
.achievement.show{transform:translateX(-50%) translateY(0)}
/* Highlight tool */
.hl-float{position:fixed;bottom:80px;right:16px;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--card);border:2px solid var(--brd2);color:var(--txt2);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all .25s}
.hl-float:hover{transform:scale(1.1);border-color:#eab308;color:#a16207}
.hl-float.active{background:#fef9c3;border-color:#eab308;color:#a16207;animation:penPulse 1.5s infinite}
@keyframes penPulse{0%,100%{box-shadow:0 0 0 4px rgba(234,179,8,.15)}50%{box-shadow:0 0 0 8px rgba(234,179,8,.08)}}
.hl-tip{position:fixed;bottom:134px;right:6px;z-index:501;background:#fef9c3;border:1px solid #fde68a;color:#92400e;font-family:var(--font);font-size:.65rem;font-weight:600;padding:5px 10px;border-radius:6px;display:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hl-tip.show{display:block}
mark.hl{background:rgba(255,245,157,.35);color:inherit;border-radius:2px;padding:0 1px}
body.hl-mode{cursor:crosshair!important}
body.hl-mode *{cursor:crosshair!important}
/* Login */
.lw{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.lb{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:32px;max-width:420px;width:100%;text-align:center;box-shadow:0 16px 64px rgba(0,0,0,.5)}
.lb .ll{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--wh);margin-bottom:4px}.lb .ll span{color:var(--cy)}
.lb .ls{font-size:.75rem;color:var(--txt2);margin-bottom:22px}
.lb input{width:100%;background:var(--bg2);border:1.5px solid var(--brd);border-radius:8px;padding:11px 14px;color:var(--wh);font-family:var(--font);font-size:.85rem;outline:none;margin-bottom:8px;transition:border .2s}
.lb input:focus{border-color:var(--cy)}
.lb-btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:var(--font);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--cy);color:var(--bg);margin-top:4px}
.lb-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,168,56,.3)}
.lb-btn:disabled{opacity:.5;transform:none}
.lb-msg{font-size:.75rem;margin-top:10px;padding:8px;border-radius:6px;line-height:1.4}
.lb-msg.ok{background:rgba(52,211,153,.15);color:var(--grn);border:1px solid rgba(52,211,153,.3)}
.lb-msg.er{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.lb-steps{text-align:left;margin-top:14px;font-size:.72rem;color:var(--txt2)}
.lb-steps div{padding:5px 0;display:flex;align-items:center;gap:8px}
.lb-steps .n{width:22px;height:22px;border-radius:50%;background:rgba(232,168,56,.15);color:var(--cy);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.lb-foot{font-size:.65rem;color:var(--txt3);margin-top:12px}
/* Logout */
.logout{position:fixed;bottom:12px;right:12px;background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:5px 12px;font-size:.68rem;color:var(--txt2);cursor:pointer;z-index:301;font-family:var(--font);transition:all .2s}
.logout:hover{border-color:var(--cy);color:var(--cy)}
/* Dark mode toggle */
.thm-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;color:var(--txt2);flex-shrink:0}
.thm-btn:hover{border-color:var(--cy);color:var(--cy)}
/* Continue Banner */
.continue-banner{background:linear-gradient(135deg,rgba(232,168,56,.12),rgba(232,168,56,.05));border:1.5px solid rgba(232,168,56,.4);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);cursor:pointer;transition:all .25s}
.continue-banner:hover{border-color:var(--cy);transform:translateY(-2px)}
.continue-banner .cb-icon{width:42px;height:42px;border-radius:8px;background:rgba(232,168,56,.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.continue-banner .cb-text{flex:1}
.continue-banner .cb-text h4{font-size:.85rem;font-weight:700;color:var(--wh);margin-bottom:2px}
.continue-banner .cb-text p{font-size:.72rem;color:var(--txt2)}
.continue-banner .cb-btn{background:var(--cy);color:var(--bg);border:none;border-radius:6px;padding:8px 16px;font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap}
/* Netflix rows */
.cat-sec{padding:10px 0 4px;margin-bottom:4px}
.cat-hd{font-size:.88rem;font-weight:700;color:var(--wh);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cat-hd em{font-size:1rem}
.cat-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.cat-row::-webkit-scrollbar{height:0}
.cc{min-width:190px;max-width:190px;background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);scroll-snap-align:start;flex-shrink:0;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.cc:hover{transform:scale(1.06);z-index:5;box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:var(--cy)}
.cc.locked{opacity:.45;pointer-events:none;position:relative}
.cc.locked::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:rgba(0,0,0,.15)}
.cc.done{border-color:rgba(52,211,153,.3)}
.cc-top{height:90px;position:relative;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.cc-logo{width:100%;height:100%;object-fit:cover}
.cc-num{position:absolute;bottom:4px;right:8px;font-size:2rem;font-weight:900;color:rgba(255,255,255,.12);line-height:1;pointer-events:none}
.cc-body{padding:8px 10px 10px}
.cc-body h4{font-size:.74rem;font-weight:700;color:var(--wh);line-height:1.25;margin-bottom:2px}
.cc-body p{font-size:.6rem;color:var(--txt3);line-height:1.3}
.cc .cc-bar{height:2px;background:var(--brd);margin-top:6px;border-radius:1px;overflow:hidden}
.cc .cc-bf{height:100%;background:var(--cy);transition:width .4s}
.cc.done .cc-bf{background:var(--grn)}
/* Font size tools */
.tools-row{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fs-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--txt2);font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fs-btn:hover{border-color:var(--cy);color:var(--cy)}
.fs-lbl{font-size:.65rem;color:var(--txt3)}
/* Audio bar */
.abar{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 70px;background:rgba(232,168,56,.06);border-top:1px solid var(--brd);font-size:.65rem;color:var(--txt2);flex-wrap:wrap}
.abar .spd{display:flex;gap:3px}
.abar button{background:var(--card);border:1px solid var(--brd);border-radius:4px;padding:2px 7px;font-family:var(--font);font-size:.6rem;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .15s}
.abar button:hover{border-color:var(--cy);color:var(--cy)}.abar button.on{background:var(--cy);border-color:var(--cy);color:var(--bg)}
.abtn{width:26px;height:26px;border-radius:50%;border:1px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:.7rem;color:var(--txt3)}
.abtn:hover{border-color:var(--cy);color:var(--cy)}
.abtn.play{border-color:var(--cy);color:var(--cy);background:rgba(232,168,56,.12);animation:pul 1.8s infinite}
@keyframes pul{0%,100%{box-shadow:0 0 0 0 rgba(232,168,56,.15)}50%{box-shadow:0 0 0 5px rgba(232,168,56,0)}}
/* Notes */
.notes-box{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-top:10px}
.notes-box label{font-size:.65rem;font-weight:700;color:var(--cy);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.notes-box textarea{display:block;width:100%;min-height:100px;background:var(--bg2);border:1.5px solid var(--brd);border-radius:6px;padding:10px;font-family:var(--font);font-size:.84rem;color:var(--wh);outline:none;resize:none;overflow:hidden;transition:border .2s;line-height:1.65;box-sizing:border-box}
.notes-box textarea:focus{border-color:var(--cy)}
.notes-box .saved{font-size:.6rem;color:var(--grn);margin-top:4px;opacity:0;transition:opacity .3s}
.notes-box .saved.show{opacity:1}
/* Quiz */

<script>
// HIGHLIGHT SYSTEM
let hlData=JSON.parse(localStorage.getItem('nl_hl')||'{}');
let hlMode=false;
document.getElementById('hlBtn').addEventListener('click',function(){
  hlMode=!hlMode;
  this.classList.toggle('active',hlMode);
  document.body.classList.toggle('hl-mode',hlMode);
  document.getElementById('hlTip').classList.toggle('show',hlMode);
  if(!hlMode)window.getSelection().removeAllRanges();
});
function applyHighlight(){
  if(!hlMode)return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||sel.toString().trim().length<2)return;
  const range=sel.getRangeAt(0);
  const mark=document.createElement('mark');
  mark.className='hl';
  try{range.surroundContents(mark)}catch(e){return}
  sel.removeAllRanges();
  const container=mark.closest('.t-body');
  if(!container)return;
  const key=container.dataset.hlkey||'0';
  if(!hlData[key])hlData[key]=[];
  hlData[key].push(mark.textContent);
  localStorage.setItem('nl_hl',JSON.stringify(hlData));
}
document.addEventListener('mouseup',function(){setTimeout(applyHighlight,10)});
document.addEventListener('touchend',function(){setTimeout(applyHighlight,200)});
function restoreHL(el,key){
  if(!hlData[key])return;
  hlData[key].forEach(h=>{
    const idx=el.innerHTML.indexOf(h);
    if(idx>-1)el.innerHTML=el.innerHTML.replace(h,'<mark class="hl">'+h+'</mark>');
  });
}
function showAchievement(msg){
  const t=document.getElementById('achToast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

              {openT[i]&&(<div className="notes-box" style={{margin:'0 12px 12px 70px'}}>
                <label>✍️ Minhas Anotações</label>
                <textarea placeholder="Escreva insights, ideias e planos de ação sobre este tópico..." value={notes['n_'+modIdx+'_'+i]||''} onChange={e=>{handleNote(e.target.value,'n_'+modIdx+'_'+i);e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px'}} ref={el=>{if(el&&notes['n_'+modIdx+'_'+i]){el.style.height='auto';el.style.height=el.scrollHeight+'px'}}}/>
                <div className={`saved ${noteSaved?'show':''}`}>✓ Salvo automaticamente</div>
              </div>)}
            </div>
          ))}
          <div className="mod-summary">
            <h3>🧠 Resumo do Módulo {modIdx+1}</h3>
            <div className="ms-item"><span className="ms-icon">📌</span><span><strong>Pontos principais:</strong> Você estudou {MODULES[modIdx].topics.length} tópicos sobre {MODULES[modIdx].title} dentro de {getCat(modIdx)}.</span></div>
            <div className="ms-item"><span className="ms-icon">📋</span><span><strong>Passo a passo:</strong> Revise suas anotações, identifique os 3 conceitos mais importantes e crie um plano de ação com prazos para aplicar.</span></div>
            <div className="ms-item"><span className="ms-icon">🚀</span><span><strong>Aplicação prática:</strong> Aplique pelo menos 1 conceito de {MODULES[modIdx].title} nas próximas 24 horas em algo concreto do seu negócio.</span></div>
            <div className="ms-item"><span className="ms-icon">✅</span><span><strong>Próximo passo:</strong> Complete a avaliação abaixo para desbloquear o próximo módulo.</span></div>
          </div>
          {Q[modIdx]&&(<div className="quiz-box">
            <h3>📝 Avaliação — Módulo {modIdx+1}</h3>
            {Q[modIdx].map((q,qi)=>(<div key={qi} className="qq">
              <div className="ql">{qi+1}. {q.q}</div>
              <div className="opt">{q.o.map((opt,oi)=>{
                const selected=quizAnswers[qi]===oi;const submitted=quizSubmitted[modIdx];const isCorrect=oi===q.a;
                let cls='';if(submitted&&selected&&isCorrect)cls='correct';if(submitted&&selected&&!isCorrect)cls='wrong';if(submitted&&!selected&&isCorrect)cls='correct';
                return(<label key={oi} className={cls}><input type="radio" name={'q'+modIdx+'_'+qi} checked={selected} onChange={()=>handleQuizAnswer(qi,oi)} disabled={submitted}/>{opt}</label>)
              })}</div>
            </div>))}
            {!quizSubmitted[modIdx]&&<button className="quiz-btn" onClick={submitQuiz} disabled={Object.keys(quizAnswers).length<3}>Enviar Respostas</button>}
            {quizSubmitted[modIdx]&&(<>
              {quizPassed[modIdx]?(<div className="quiz-result pass">✅ Aprovado! Próximo módulo desbloqueado.</div>):(<div className="quiz-result fail">❌ Não atingiu 67%. Revise o conteúdo e tente novamente.<br/><button className="quiz-btn" onClick={retryQuiz} style={{marginTop:8}}>Refazer Avaliação</button></div>)}
            </>)}
          </div>)}
          <div style={{display:'flex',gap:8,marginTop:14}}>
            {modIdx>0&&isUnlocked(modIdx-1)&&<button className="back" onClick={()=>goMod(modIdx-1)} style={{background:'var(--card)',border:'1px solid var(--brd)',padding:'7px 14px',borderRadius:6}}>← Anterior</button>}
            {modIdx<MODULES.length-1&&isUnlocked(modIdx+1)&&<button onClick={()=>goMod(modIdx+1)} style={{background:'var(--cy)',border:'none',padding:'7px 16px',borderRadius:6,color:'var(--bg)',fontWeight:700,fontFamily:'var(--font)',cursor:'pointer'}}>Próximo →</button>}
          </div>
        </>)}
        {view==='search'&&(<div className="sr-wrap">
          <div className="sr-t">{sr.length} resultado{sr.length!==1?'s':''} para "{search}"</div>
          {sr.length===0&&<div className="empty">🔍 Nenhum resultado encontrado</div>}
          {sr.map((r,i)=>(<div key={i} className="sr-item" onClick={()=>{goMod(r.mi);setTimeout(()=>togT(r.ti),100)}}>
            <div className="sr-m">Módulo {r.mi+1} — {r.mt}</div>
            <div className="sr-tp">{r.tt}</div>
            <div className="sr-pv">{r.pv}...</div>
          </div>))}
        </div>)}
      </main>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
