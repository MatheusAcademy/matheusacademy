<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1792" width="1024" height="1792">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000a1a"/>
      <stop offset="100%" stop-color="#00050f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b7fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5b7fff"/>
      <stop offset="100%" stop-color="#5b7fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b7fff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1024" height="1792" fill="url(#bg)"/>

  <!-- Elementos visuais tematicos -->
  
    <!-- Simbolo academico -->
    <circle cx="512" cy="420" r="200" fill="none" stroke="#5b7fff" stroke-width="1.5" opacity="0.3"/>
    <circle cx="512" cy="420" r="150" fill="none" stroke="#5b7fff" stroke-width="1" opacity="0.2"/>
    <text x="512" y="470" text-anchor="middle" fill="#5b7fff" font-family="Arial" font-size="120" opacity="0.2">🎓</text>
    <!-- Raios de luz -->
    <g stroke="#5b7fff" stroke-width="1" opacity="0.1">
      <line x1="512" y1="220" x2="512" y2="100"/>
      <line x1="654" y1="278" x2="722" y2="172"/>
      <line x1="712" y1="420" x2="840" y2="420"/>
      <line x1="654" y1="562" x2="722" y2="668"/>
      <line x1="370" y1="278" x2="302" y2="172"/>
      <line x1="312" y1="420" x2="184" y2="420"/>
    </g>

  <!-- Gradiente escuro embaixo (area do titulo) -->
  <rect width="1024" height="1792" fill="url(#fadeBottom)"/>

  <!-- Gradiente escuro em cima -->
  <rect width="1024" height="340" fill="url(#fadeTop)"/>

  <!-- Linha de cor no topo -->
  <rect x="0" y="0" width="1024" height="10" fill="url(#acc2)"/>

  <!-- TITULO -->
  
    <text x="516" y="1187" text-anchor="middle" fill="#000000" font-family="Arial Black, Arial" font-weight="900" font-size="88" opacity="0.5">TRILHA</text>
    <text x="512" y="1184" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial" font-weight="900" font-size="88" stroke="#000000" stroke-width="6" paint-order="stroke">TRILHA</text>
    <text x="516" y="1285" text-anchor="middle" fill="#000000" font-family="Arial Black, Arial" font-weight="900" font-size="88" opacity="0.5">ESTRATEGISTA</text>
    <text x="512" y="1282" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial" font-weight="900" font-size="88" stroke="#000000" stroke-width="6" paint-order="stroke">ESTRATEGISTA</text>
    <text x="516" y="1383" text-anchor="middle" fill="#000000" font-family="Arial Black, Arial" font-weight="900" font-size="88" opacity="0.5">GLOBAL</text>
    <text x="512" y="1380" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Arial" font-weight="900" font-size="88" stroke="#000000" stroke-width="6" paint-order="stroke">GLOBAL</text>

  <!-- Linha decorativa -->
  <rect x="60" y="1404" width="904" height="5" fill="url(#acc)" opacity="0.9" rx="2"/>

  <!-- Subtitulo -->
  <text x="512" y="1444" text-anchor="middle" fill="#5b7fff" font-family="Arial" font-weight="700" font-size="26" opacity="0.95"
    stroke="#000000" stroke-width="3" paint-order="stroke">MATHEUS ACADEMY</text>

  <!-- Metadados -->
  <text x="512" y="1757" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="22" opacity="0.85"
    stroke="#000000" stroke-width="3" paint-order="stroke">0H  |  0 MODULOS  |  0 TOPICOS</text>

  <!-- Barra lateral esquerda -->
  <rect x="0" y="0" width="8" height="1792" fill="url(#acc2)" opacity="0.8"/>

</svg>