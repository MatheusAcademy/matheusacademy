  free: true,

    {
      id: 'FUBB',
      name: 'O Mandato Pastoral: Cuidado Espiritual Como Chamado Divino',
      content: `<p>Você sabe qual é o fundamento bíblico para aconselhamento pastoral? <strong>Está em 2 Timóteo 4:2: "Pregue a palavra, instando a tempo e fora de tempo, repreenda, repreenda, exorte com toda a paciência e doutrina."</strong> Você está sendo chamado para algo específico: cuidado de almas.</p><p>Aconselhamento pastoral não é psicologia (embora use técnicas semelhantes). É ministério espiritual onde você, como representante de Cristo, ajuda pessoa a encontrar caminho de volta para Deus, ou de mais perto de Deus.</p><h4>O Modelo de Jesus Como Conselheiro</h4><p>Jesus fazia aconselhamento: Nicodemus vem à noite, Jesus conversa. Mulher samaritana no poço, Jesus oferece água viva (espiritual e literal). Zaqueu, Jesus o vê quando outros o rejeitam. Jesus não apenas pregava. Jesus aconselha, restaura, transforma.</p><p><strong>Qual era o método de Jesus?</strong> Escutava (mulher samaritana fala primeiro). Questionava (a faz pensar sobre próprio julgamento). Oferecia verdade com amor (não condenava, mas chamava a arrependimento). Restaurava (Zaqueu prometia restituir).</p><div class="tip"><strong>Método Pastoral de Jesus:</strong> Encontro autêntico + escuta profunda + verdade com graça + chamado a transformação + restauração de relacionamento com Deus.</div><p>Seu aconselhamento pastoral deve espelhar isso. Não é "dar conselhos" (você sabe a solução). É ajudar pessoa a ouvir Deus em sua própria situação e seguir aquela voz.</p><div class="example"><strong>Exemplo de Jesus com Zaqueu:</strong> Zaqueu é homem rico que roubou (cobrador de impostos corrupto). Outros o rejeitam. Jesus o escolhe para comer (aceitação). Zaqueu, se sentindo amado e aceito, promete restaurar (transformação). Jesus não pregou para Zaqueu sobre honestidade. Ofereceu amizade. Amizade levou a transformação. Você aprende: aconselhamento é relacionamento que leva a mudança, não sermão que dita mudança.</div><div class="quote"><strong>Verdade de Aconselhamento Pastoral:</strong> Você não muda pessoas. Deus muda. Seu papel é criar espaço onde pessoa pode encontrar Deus e ser transformada. Você é ferramenta, não agente da mudança.</div>`},
    {
      id: 'OUVI',
      name: 'A Teologia da Escuta: Ouvir Como Ato Espiritual Profundo',
      content: `<p><strong>"Sê pronto para ouvir."</strong> (Tiago 1:19) Você sabe por que escuta é teologicamente importante? Porque escuta é forma de honrar imagem de Deus em outra pessoa. Quando você escuta de verdade, você diz: "Sua vida importa. Sua dor importa. Você importa".</p><p>Escuta pastoral não é escuta passiva (apenas ouvir palavras). É escuta ativa que: 1) Valida experiência da pessoa, 2) Oferece presença sagrada, 3) Honra dignidade humana, 4) Cria espaço para revelação de Deus.</p><h4>Escuta Como Ministério Espiritual</h4><p>Pessoa vem ao pastor: "Perdi meu filho na semana passada." Pastor que escuta de verdade não diz logo "Você vai ao céu, ele está com Deus." (verdade, mas não é hora). Pastor escuta o choro. Pastor honra o luto. Pastor está presente. Depois, quando dor começar a abrir espaço, pastor oferece verdade espiritual.</p><p>Escuta é teologia encarnada: você corporifica presença de Deus. Porque Deus é aquele que escuta (Salmo 34:15 "Os olhos do Senhor estão sobre os justos, e os seus ouvidos atentos ao seu clamor"). Quando você escuta, você é Deus para aquela pessoa naquele momento.</p><div class="tip"><strong>Princípio de Escuta Pastoral:</strong> Antes de falar verdade, valide experiência. Antes de oferecer solução, honre problema. Escuta cria abertura onde palavra de Deus pode entrar.</div><p>Muitos pastores falam demais. Aconselhador pastoral sábio escuta muito, fala pouco, mas quando fala, palavra é ungida.</p><div class="example"><strong>Escuta vs. Aconselhamento Apressado:</strong> Pessoa em crise: "Estou pensando em suicídio." Pastor apressado: "Não faça isso, a vida é um dom de Deus." Pessoa fecha. Pastor sábio: "Você está em lugar tão escuro que morte parece alívio. Pode me contar mais?" Pessoa abre, vulnerabilidade é honrada, conexão é criada, ministério pode acontecer.</div><div class="quote"><strong>Escuta Sagrada:</strong> Quando você escuta pessoa em dor sem pressa de consertar, você oferece mais que conselho. Você oferece presença de Cristo. Isso é ministério.</div>`},
    {
      id: 'GRAC',
      name: 'Graça e Verdade: Equilibrando Compaixão com Sanidade Bíblica',
      content: `<p>João 1:14 diz que Jesus era "cheio de graça e verdade." <strong>Não é "graça OU verdade". É "graça E verdade".</strong> Equilibrar os dois é arte de aconselhamento pastoral bom.</p><p>Graça sem verdade: "Você fez errado, mas tudo bem, Deus te ama e perdoa." Resultado? Pessoa continua em padrão destrutivo (porque verdade não foi dita). Verdade sem graça: "Você pecou, você é culpado, você merece castigo." Resultado? Pessoa fica paralisada em culpa (porque graça não foi oferecida).</p><h4>O Equilíbrio de Jesus</h4><p>Mulher apanhada em adultério (João 8): Jesus oferece graça ("Ninguém te condenou? Nem eu"; presença amorosa). Depois oferece verdade ("Vai e não peques mais"; chamado a transformação). Ambas.</p><p>Você como pastor oferece: 1) Aceitação incondicional (graça de Deus), 2) Chamado a seguir Jesus (verdade), 3) Esperança de transformação (ambas trabalham juntas).</p><div class="tip"><strong>Proporção de Graça e Verdade:</strong> Pessoa quebrada, deprimida, culpada: mais graça (validação, aceitação). Pessoa justificando pecado, negando responsabilidade: mais verdade (confrontação amorosa). Você calibra baseado em onde pessoa está.</div><p>Jesus foi mestre nisso. Com Zaqueu (quebrado), ofereceu graça. Com fariseus (justificando), ofereceu verdade. Seu aconselhamento faz o mesmo.</p><div class="example"><strong>Equilíbrio com Pessoa em Adultério:</strong> Esposa descobre marido em infidelidade. Marido vem confessar, culpado. Você primeiro oferece graça: "Confissão é primeiro passo, perdão de Deus está disponível aqui" (abre espaço para esperança). Depois oferece verdade: "Traição foi escolha, precisa de mudança real de coração e ações para reconstruir confiança" (torna claro que arrependimento exige mais que confissão). Depois oferece esperança: "Com Deus, restauração é possível. Exigirá tempo, honestidade, mudança. Você está disposto?" (caminho é oferecido).</div><div class="quote"><strong>Verdade de Graça e Verdade:</strong> Graça sem verdade é conivência. Verdade sem graça é condenação. Ambas juntas é redenção.</div>`},
    {
      id: 'LIMI',
      name: 'Limites e Confidencialidade: Proteção da Confiança Pastoral',
      content: `<p><strong>Pessoa em sessão de aconselhamento você diz: "Confie em mim, isto é confidencial."</strong> Depois você fala com outro membro da igreja sobre "aquele problema". Você acabou de quebrar confiança, violou confidencialidade pastoral, e perdeu autoridade espiritual.</p><p>Confidencialidade não é luxo em aconselhamento pastoral. É fundamento. Pessoa só se abre se sabe que o que diz fica privado. Quando confidencialidade é quebrada, pessoa fecha, confiance é perdida, ministério é prejudicado.</p><h4>Exceções a Confidencialidade</h4><p>Há exceções (onde você DEVE falar): 1) Pessoa está em perigo imediato (risco de suicídio), 2) Criança está sendo abusada, 3) Crime violento foi revelado. Nestes casos, você tem obrigação legal e moral de avisar autoridades/pais/pessoas relevantes.</p><p>Antes de iniciar aconselhamento, você explica estes limites: "Tudo que você disser é confidencial EXCETO se você está em risco imediato de machucar você ou outro, ou se há abuso de criança. Nestes casos, preciso envolver pessoas certas. Você entende?" Transparência desde início.</p><div class="tip"><strong>Proteção de Confidencialidade:</strong> 1) Não fale com ninguém (a menos que exceção), 2) Não fale em público (mesmo vago), 3) Não compartilhe histórias (mesmo "anônimas", pessoa reconhece), 4) Documente minimamente (notas podem ser descobertas), 5) Proteja fisicamente confidencialidade (não sente onde outros ouvem).</div><p>Sua reputação como pastor seguro depende de confidencialidade ser ouro em suas mãos.</p><div class="example"><strong>Quebra de Confidencialidade:</strong> Pessoa confessa luta com pornografia. Você fala para esposa daquela pessoa (acha que é "ajudar o casamento"). Resultado: pessoa sente traída, confiança em você é perdida, pessoa não volta mais, ministério é prejudicado. Se você sente que esposa precisa saber, você pergunta primeiro: "Você acha que seria útil conversar com sua esposa sobre isso? Como você gostaria que eu procedesse?"</div><div class="quote"><strong>Confiança Pastoral:</strong> É conquistada em atos pequenos (confidencialidade mantida), perdida em atos pequenos (confidencialidade quebrada). Cuide como ouro.</div>`}

{
  id: 1,
  name: 'Escuta Ativa e Empatia: Fundamentos da Conexão Pastoral',
  free: false,
  topics: [
    {
      id: 'EATA',
      name: 'Técnica de Escuta Ativa: Oferecendo Presença Sagrada',
      content: `<p>Você está em sessão de aconselhamento. Pessoa começa a falar sobre luta. Você está no celular? Você está pensando no que vai dizer depois? Você está preparado para consolar mal? Você não está escutando. Você está falhando em ministério.</p><p><strong>Escuta ativa é técnica específica:</strong> 1) Você coloca celular longe, 2) Você desativa pensamentos próprios, 3) Você foca totalmente na pessoa, 4) Você ouve não só palavras, mas emoção embaixo das palavras, 5) Você valida sem julgamento, 6) Você clarifica para estar certo que entendeu.</p><h4>Os Passos de Escuta Ativa</h4><p>Passo 1 (Suspensão de Julgamento): Pessoa diz algo que você discorda. Você não refuta. Você entende primeiro. Depois, quando compreensão for total, você oferece perspectiva diferente (se apropriado).</p><p>Passo 2 (Reflexão): "Então você sente que Deus o abandonou porque não respondeu oração?" Você reflete o que você ouviu, validando emoção (não a verdade da emoção, mas a realidade da emoção).</p><p>Passo 3 (Clarificação): "Quando você diz 'Deus não cuida', você quer dizer que Deus não existe, ou que existe mas não se importa?" Você pergunta para entender completamente.</p><div class="tip"><strong>Presença Pastoral:</strong> Escuta ativa oferece que pessoa mais quer: ser entendida. Quando pessoa sente que você entende, porta do coração abre para verdade espiritual.</div><p>Você não está ali para impressionar com conhecimento. Você está ali para oferecer presença que diz: "Você é ouvido. Você é visto. Você importa."</p><div class="example"><strong>Escuta Ativa na Prática:</strong> Homem em depressão: "Não vejo motivo para viver. Tudo que faço é inútil." Pastor apressado: "Deus tem propósito para você!" (verdade, mas rejeitada). Pastor de escuta ativa: "Você está em lugar tão escuro que até propósito parece impossível de ver." Homem: "Exatamente." Pastor: "Aquela escuridão você sente há quanto tempo?" Homem começa a falar, ser entendido, porta se abre para ministério real.</div><div class="quote"><strong>Poder da Escuta:</strong> Uma pessoa entendida é pessoa aberta. Uma pessoa não entendida é pessoa fechada. Sua escuta abre porta que suas palavras nunca conseguiriam abrir.</div>`},
    {
      id: 'EMPA',
      name: 'Empatia Verdadeira: Entrando no Coração da Pessoa, Não na Sua Cabeça',
      content: `<p>Empatia é frequentemente confundida com simpatia. <strong>Simpatia é "Sinto pela você" (de fora). Empatia é "Sinto com você" (de dentro).</strong> Empatia é você entrando no coração daquela pessoa, vivendo momentaneamente sua realidade.</p><p>Para oferecer empatia verdadeira, você precisa: 1) De vulnerabilidade (você já sofreu algo semelhante), 2) De imaginação espiritual (você pode se colocar em sapatos dela), 3) De coragem (estar perto de dor é desconfortável).</p><h4>Empatia Como Ministério</h4><p>Pessoa vem: "Meu marido me deixou." Você que nunca sofreu divórcio sente vácuo. Como você oferece empatia? Você acessa momento em sua vida onde você foi rejeitado/abandonado. Você revive aquela dor. De lá, você diz: "Quando você é deixado por quem ama, há vácuo que parece eterno. Aquele vácuo você está sentindo agora." Você entrou no coração dela.</p><p>Empatia não é "Eu sofri divórcio também, então entendo." (isso é simpatia). Empatia é "Eu conheço dor de rejeição, e posso imaginar como é ser rejeitada pelo seu marido" (você entra na realidade dela).</p><div class="tip"><strong>Cultivar Empatia Pastoral:</strong> 1) Permita-se sofrer (não negue própria dor), 2) Lembre de dor passada (para conectar), 3) Imagine o mundo dela (seus valores, medos, esperanças), 4) Ofereça presença de verdade (você está ali porque importa).</div><p>Pastor que nunca sofreu não tem empatia. Pastor que sofreu mas nega sofrimento não tem empatia. Pastor que sofreu e integrou sofrimento tem compaixão de Cristo para oferecer.</p><div class="example"><strong>Empatia vs. Simpatia:</strong> Pessoa perdeu filho. Simpatia: "Sinto muito pela sua perda. Deus tem plano." (reconforto teológico, mas de fora). Empatia: "Aquele vácuo de perder alguém amado... aquela sensação de que mundo deveria parar, mas continua... aquela raiva em Deus por permitir..." (você entrou no coração dela). De lá, você pode oferecer verdade que será recebida, porque você está com ela na dor, não fora dela observando.</div><div class="quote"><strong>Empatia é Ministério:</strong> Quando você entra na dor de alguém, você oferece presença de Cristo. Porque Cristo sofreu e entende. Sua empatia testemunha daquele entendimento.</div>`},
    {
      id: 'CONF',
      name: 'Confrontação Amorosa: Oferecer Verdade Quando Amor Exige',
      content: `<p>Você está aconselhand o pessoa que nega responsabilidade (sempre culpa é de outro), que está em pecado e se justifica, que está prejudicando relacionamento mas não vê. <strong>Amar significa às vezes dizer o que pessoa precisa ouvir, não o que quer ouvir.</strong></p><p>Confrontação amorosa é verdade dita com respeito, privacidade, intenção de bem. É dizer "Eu te amo e porque te amo, preciso oferecer perspectiva diferente sobre isso." Resultado pode ser pessoa abre (confrontação era necessária) ou pessoa fecha (porque verdade dói). Ambos são resultados válidos (seu trabalho é oferecer verdade, não garantir aceitação).</p><h4>Como Confrontar Amorosamente</h4><p>Passo 1 (Estabeleça confiança): Você só confronta pessoa que sabe que você se importa. Sem confiança, confrontação é julgamento. Com confiança, é amor.</p><p>Passo 2 (Ofereça perspectiva, não julgamento): Não "Você é egoísta." É "De onde você está, vejo que está focado em próprio bem-estar à custa de relacionamento. É assim que você quer viver?"</p><p>Passo 3 (Ofereça escolha): Não "Você precisa parar com isso." É "Você tem escolha. Você continua assim, ou você abre para mudança. Qual você escolhe?"</p><div class="tip"><strong>Confrontação que Funciona:</strong> Entra com humildade (você também erra), oferece perspectiva (não certeza), honra escolha (pessoa pode recusar), continua presente (mesmo se pessoa nega verdade).</div><p>Confrontação feita errado quebra relacionamento. Confrontação feita certo abre coração para verdade.</p><div class="example"><strong>Confrontação Amorosa:</strong> Esposa em aconselhamento confessa desprezo constante por marido (critica tudo que faz). Pastor escuta, entende origem (medo de abandono leva a crítica para manter controle). Depois, com amor: "O desprezo que você oferece ao seu marido é proteção (você tenta controlar medo), mas está destruindo o relacionamento que você quer proteger. Você vê essa dinâmica?" Esposa pode: negar (indefensável), defensiva (dói), ou aberta (reconhece). Independente, verdade foi oferecida amorosamente, e relacionamento pode ser transformado de lá.</div><div class="quote"><strong>Verdade Amorosa:</strong> Confrontação sem amor é violência. Amor sem verdade é conivência. Confrontação amorosa é redenção.</div>`},
    {
      id: 'LIMI',
      name: 'Limites Pessoais do Pastor: Cuidando de Você Mesmo Enquanto Cuida de Outros',
      content: `<p>Você passa 8 horas ouvindo outras pessoas. Você absorve dor, carreg a peso, oferece esperança. Você é emocionalmente exaurido. Você não tem limites. <strong>Resultado? Você queima, ministério sofre, você faz mal a quem quer ajudar.</strong></p><p>Cuidar de almas exige que você cuide de sua própria alma. Você não pode oferecer água se seu poço está vazio. Você não pode oferecer esperança se você mesmo está desesperado. Limites não são egoísmo. São necessidade para sustentabilidade.</p><h4>Limites Práticos</h4><p>1) Horário: Você aconselha de 9-5? Às 5:01 você está off (emergência verdadeira exceto). 2) Duração: Sessão é 60 minutos (ou quanto você determina). Depois, sessão termina (não se estende). 3) Frequência: Pessoa pode vir 1x por semana. Quando está melhor, vai para 2x por mês. Quando está bem, termina. (Você não cria dependência.) 4) Emocional: Você absorve dor, mas você não carrega responsabilidade de mudar pessoa. Deus muda. Você facilita.</p><p>Sem estes limites, você se torna todo de todos, ninguém, e queimado.</p><div class="tip"><strong>Autossacrifício vs. Autodestruição:</strong> Jesus oferecia-se, mas se retirava para deserto para orar (Lucas 5:16). Jesus tinha limites. Ele não aconselhou todos, não curou todos, não estava disponível sempre. Ele modelava limites saudáveis.</div><p>Seu ministério sustentável exige limites que parecem egoístas, mas são espirituais.</p><div class="example"><strong>Limites Práticos em Ação:</strong> Pessoa chama pastor 11 da noite: "Preciso conversar agora, estou em crise." Pastor que não tem limites sai da cama. Pastor saudável: "Você está em risco imediato de se machucar?" Se sim, envolve profissional. Se não: "Vamos conversar amanhã às 9. Por agora, aqui estão números de crise." Pastor cuida (oferece recurso), mas não absorve emergência que não é emergência.</div><div class="quote"><strong>Sustentabilidade de Ministério:</strong> Pastor que queima é inútil. Pastor que cuida de si mesmo é instrumento durável. Cuidar de você é cuidado de sua congregação.</div>`}

{

  name: 'Aconselhamento em Crise: Luto, Trauma e Emergências Espirituais',

  topics: [
    {
      id: 'LUTO',
      name: 'Luto: Acompanhando Pessoa Através Escuridão de Perda',
      content: `<p>Pessoa perdeu alguém amado. A dor é imensa. O mundo deveria parar, mas continua. <strong>O papel do pastor no luto é estar presente na escuridão, não tentar eliminar a escuridão.</strong></p><p>Erro comum de pastor: "Deus tem plano" (verdade, mas não é o que pessoa precisa ouvir no primeiro dia). "Ela está em céu melhor" (verdade, mas soa como "sua dor é inválida"). "Você tem que ser forte" (pressão que aumenta culpa).</p><h4>Fases de Luto e Como Acompanhar</h4><p>Fase 1 (Choque/Negação): Pessoa não consegue acreditar que é real. Pastor: válida a não-realidade ("É como se não fosse verdade"). Não tenta convencer realidade ainda.</p><p>Fase 2 (Raiva): Pessoa quer culpar alguém (Deus, médico, defunto, si mesmo). Pastor: honra raiva ("Sua raiva é válida"), oferece espaço para raiva ser expressada (não suprimida). Não defende Deus (Deus pode defender si mesmo).</p><p>Fase 3 (Barganha): Pessoa negocia com Deus ("Se você me devolver, vou..."). Pastor: escuta, não critica a barganha como ingênua.</p><p>Fase 4 (Tristeza): Realidade que defunto não volta. Pastor: chora junto. Não oferece consolo prematuramente. Apenas presença.</p><p>Fase 5 (Aceitação): Pessoa começa a integrar perda (não como se nunca aconteceu, mas como parte de história). Pastor: oferece perspectiva espiritual agora (pessoa está mais aberta).</p><div class="tip"><strong>Acompanhamento em Luto:</strong> Você não tira dor. Você oferece presença que diz "você não está sozinho na escuridão." Essa presença é suficiente nos primeiros meses.</div><p>Nos anos posteriores, pessoa pode trabalhar como perda moldou fé (frequentemente perda aprofunda fé, não destrói).</p><div class="example"><strong>Mãe Perdeu Filho:</strong> Dia 1-7: Mãe está em choque. Pastor: valida não-realidade ("Parece que tudo é sonho."), oferece ajuda prática (busca comida, organiza funeral). Dia 8-30: Mãe está em raiva. Dirige raiva a Deus ("Por que você o levou?"). Pastor: não defende Deus, diz "Você tem direito de estar furiosa com Deus. Ele pode lidar com isso." Mês 2-12: Mãe está em tristeza genuína. Pastor: chora junto, não oferece "porquê" agora. Simplesmente está. Ano 2+: Mãe pergunta "Como eu sigo? Como honro a memória dele?" Pastor agora oferece perspectiva espiritual (pessoa está pronta para significado).</div><div class="quote"><strong>Ministério no Luto:</strong> Você não oferece respostas. Você oferece presença. Presença é resposta suficiente.</div>`},
    {
      id: 'TRAM',
      name: 'Trauma e PTSD: Quando Ferida Espiritual Precisa de Cura Profunda',
      content: `<p>Pessoa sofreu abuso, acidente, violência, abandono traumático. Resultado: mundo é perigoso, Deus é desconfiável, relacionamentos são ameaçadores. <strong>Trauma é ferida que se atualiza constantemente; memória traumática é como se fosse acontecendo agora.</strong></p><p>Aconselhamento pastoral de trauma exige você entender: 1) Trauma não é fraqueza (é resposta cerebral a ameaça real), 2) Trauma não desaparece com oração simples (exige tempo, trabalho, às vezes profissional), 3) Trauma afeta fé (pessoa desconfia de Deus porque foi desprotegido).</p><h4>Aconselhamento de Trauma</h4><p>Você não trata trauma (psicólogo/psiquiatra faz). Você facilita cura espiritual enquanto pessoa trabalha com profissional. Você honra a ferida sem tentar consertá-la rápido.</p><p>Pessoa com trauma de abuso: "Não consigo confiar em Deus porque não me protegeu." Pastor: não defende Deus ("Ele tinha razão para permitir"), não nega desconfiança ("Sua desconfiança é válida dado que foi desprotegido"). Apenas: "Sua ferida é real. Cura é possível. Vamos acompanhar juntos enquanto você processa com profissional."</p><div class="tip"><strong>Trauma Requer Referência Profissional:</strong> Se você suspeita trauma (PTSD, flashbacks, hipervigilância), você refere para psicólogo. Você não trata trauma sozinho. Sua função é apoio espiritual enquanto profissional trabalha na ferida.</div><p>Quando pessoa está em segurança e tendo suporte profissional, fé pode começar a ser reconstruída. Mas exige tempo.</p><div class="example"><strong>Sobrevivente de Abuso:</strong> Pessoa foi abusada na infância. Como adulta, confia em ninguém, incluindo Deus. Pastor: referencia psicólogo. Enquanto pessoa está em terapia (processando trauma), pastor oferece: 1) Validação de ferida ("O abuso foi real, foi errado"), 2) Espaço seguro (pastor é diferente de abusador; pessoa experimenta relacionamento seguro), 3) Paciência com desconfiança (não toma pessoalmente). Depois de meses de terapia + apoio pastoral, pessoa começa a confiar em Deus novamente. Não porque pastor pregou, mas porque pessoa processou ferida e experimentou amor consistente.</div><div class="quote"><strong>Trauma e Fé:</strong> Trauma não destrói fé permanentemente. Mas exige que fé seja processada através ferida, não apesar da ferida.</div>`},
    {
      id: 'EMG',
      name: 'Emergência Espiritual: Suicídio, Possessão, Crise de Fé Acute',
      content: `<p><strong>Pessoa chama: "Vou me matar." Ou "Sinto presença demoníaca." Ou "Não acredito em Deus mais."</strong> Estas são emergências espirituais exigindo resposta imediata, cuidadosa, com envolvimento de profissionais quando apropriado.</p><h4>Risco de Suicídio</h4><p>Se pessoa está em risco imediato: 1) Você não a deixa sozinha, 2) Você chama serviço de emergência ou polícia, 3) Você remove meios (armas, medicação excessiva), 4) Você fica com pessoa até que profissional chegue. Sua função é manter viva até que profissional assuma.</p><p>Depois, pessoa precisa de avaliação psiquiátrica, medicação possivelmente, terapia continuada. Você oferece suporte espiritual: "Sua vida importa. Deus a ama. Há caminhos para frente que você não consegue ver agora. Vamos encontrá-los."</p><div class="tip"><strong>Em Crise de Suicídio:</strong> Não discuta "por que" não fazer (pessoa já sabe). Apenas: "Você está em segurança agora. Vamos cuidar de você." Ação, não debate.</div><h4>Possessão Demoníaca</h4><p>Pessoa sente possessão. Pode ser: possessão real (rara), doença mental (comum), ou mistura. Sua função: não assumir nenhum dos dois. Você refere para psicólogo primeiro (diagnóstico). Se é doença mental, medicação ajuda. Se depois de medicação sintomas continuam, ENTÃO você considera possessão espiritual.</p><p>Possessão real exige oração especializada (você talvez não seja qualificado). Você não improvisa exorcismo. Você refere para denominação que tem expertise.</p><div class="example"><strong>Emergência Espiritual:</strong> Pessoa vem: "Há vozes me dizendo para morrer. Sou possuída." Pastor: 1) Tira ofensa leve (ouve completamente), 2) Refere para psicólogo (pode ser esquizofrenia, bipolaridade), 3) Não presume possessão, 4) Oferece oração ("Você está em proteção de Deus"), 5) Acompanha processo (se é doença, medicação ajuda; se é possessão, oração especializada ajuda).</div><div class="quote"><strong>Em Emergência Espiritual:</strong> Você cuida (chama profissional), oferece esperança (há caminhos), oferece presença (você está com eles). Ação + Hope + Presence = resposta apropriada.</div>`},
    {
      id: 'APOC',
      name: 'Apostasia e Crise de Fé: Quando Pessoa Abandona Fé',
      content: `<p>Pessoa que amava a Jesus começa a duvidar. Depois nega. Depois abandona. <strong>Você como pastor sente traição pessoal, decepção, até raiva. Mas sua função é oferecer porta aberta, não condenação.</strong></p><p>Apostasia frequentemente tem origem: trauma mal processado (Deus não respondeu oração), intelectual (dúvida racional cresce), relacional (igreja o feriu), ou espiritual (rejeição ativa).</p><h4>Como Acompanhar Apostasia</h4><p>Você não tenta reconverter forçadamente. Você pergunta: "O que levou a isso? O que você viu na fé que não funciona?" Você escuta a história real. Frequentemente há ferida real (não apenas desobediência).</p><p>Você oferece: 1) Espaço seguro para dúvida (dúvida é válida), 2) Comunidade que não julga (pessoa pode estar perto de Jesus novamente mesmo que duvidando), 3) Porta aberta (se pessoa quer voltar, pode; não há vergonha).</p><p>Alguns voltam. Alguns não. Sua função não é forçar volta. É oferecer graça, honrar liberdade, manter porta aberta.</p><div class="tip"><strong>Dúvida Como Fé:</strong> Dúvida de pessoa que ama Jesus é diferente de dúvida de pessoa que rejeita Jesus. Primeira é fé questionando si mesma (fé madura). Segunda é rejeição. Você diferencia.</div><div class="example"><strong>Pessoa Abandonando Fé:</strong> Pessoa que era líder de jovens agora diz "Deus não existe" ou "Não consigo acreditar mais." Pastor quer pregar, defender, reconverter. Erro. Pastor escuta primeiro: "O que aconteceu?" Pessoa confessa: "Orei por meu filho, ele morreu de qualquer forma. Não consigo acreditar em Deus que permite isso." Origem real. Pastor não defende Deus. Honra luto. Oferece: "Sua dor é válida. Sua dúvida é válida. Se você quer explorar fé em contexto de dor, estou aqui. Se você quer distância, ainda há lugar para você." Porta fica aberta. Às vezes pessoa volta (após processar luto). Às vezes não. Ambos são Ok.</div><div class="quote"><strong>Apostasia é Jornada:</strong> Não é ponto de rejeição. É jornada de desconfiança levando a rejeição. Ofereça presença em jornada, não condenação no destino.</div>`}

{
  id: 3,
  name: 'Casamento e Família: Aconselhamento Para Relacionamentos em Dificuldade',
  free: false,
  topics: [
    {
      id: 'CASX',
      name: 'Conflito Marital: Quando Amor Encontra Incompatibilidade e Magoação',
      content: `<p>Casal vem: "Nos amamos, mas não conseguimos viver juntos." Ou "Ele é controlador." Ou "Ela não respeita minhas decisões." <strong>Conflito marital é frequente, normalizado na vida real, e recebe pouco treinamento de pastores.</strong></p><p>Conflito marital frequentemente tem padrão: marido tem padrão de controle (origem: medo de perda de estabilidade), esposa tem padrão de desprezo (origem: medo de não ter voz). Juntos, criam ciclo onde controle leva a desprezo, desprezo leva a mais controle.</p><h4>Ciclos Destrutivos de Casal</h4><p>Ciclo 1 (Controle-Desprezo): Esposo controla (como gastar, onde ir, com quem falar). Esposa responde com desprezo (critica, ridiculariza). Esposo controla mais (sente desrespeitado). Ciclo piora.</p><p>Ciclo 2 (Distância-Perseguição): Esposo afasta (trabalho demais, amigos demais, evita intimidade). Esposa persegue (quer conversa, proximidade). Esposo afasta mais (se sente asfixiado). Ciclo piora.</p><p>Seu trabalho é: 1) Identificar ciclo, 2) Nomear ciclo para casal (eles veem padrão), 3) Oferecer novo padrão ("Em lugar de controle-desprezo, podem ter conversa-escuta").</p><div class="tip"><strong>Ciclos de Casal:</strong> Frequentemente ambos têm "razão" (ele está controlador, ela está desrespeitosa). Mas ciclo é o culpado. Você não toma lado. Você quebra ciclo.</div><p>Casamento que tem ciclo destrutivo mas reconhece ciclo tem esperança (porque pode mudar).</p><div class="example"><strong>Ciclo Marital Típico:</strong> Esposo: "Ela gasta demais, preciso controlar contas." Esposa: "Ele nunca confia em mim, é controlador." Pastor nomeia: "Vejo ciclo: controle leva a desrespei to, desrespeito leva a mais controle. Vocês estão em ciclo, não em relacionamento." Casal: "Exatamente!" Pastor: "Vocês duas querem sair? Se sim, precisam quebrar padrão. Esposo precisa confiar, esposa precisa ser confiável. Viável?" Quando casal vê ciclo e quer sair, transformação é possível.</div><div class="quote"><strong>Casamento em Ciclo:</strong> Não é que casamento está morto. É que padrão está matando casamento. Quebrar padrão é salvar casamento.</div>`},
    {
      id: 'INFX',
      name: 'Infidelidade: Quando Confiança é Quebrada e Reconstrução Parece Impossível',
      content: `<p>Esposo revela infidelidade. Esposa está destruída. Confiança, que leva anos para construir, é quebrada em segundos. <strong>Reconstrução de confiança após infidelidade é possível, mas exige honestidade radical, remorso genuíno, tempo, e frequentemente aconselhamento profissional.</strong></p><p>Dois cenários: 1) Esposo nega, justifica, culpa esposa ("Você não era afetuosa suficiente"). Resultado: confiança não é reconstruída, divorça é provável. 2) Esposo confessa, mostra remorso genuíno, está disposto a transparen cia radical, oferece acesso a tudo (telefone, email, localização). Resultado: confiança é reconstruída lentamente (não em dias, em meses ou anos).</p><h4>Aconselhamento de Infidelidade</h4><p>Você primeiro avalia: infidelidade era evento (uma noite imprudente) ou padrão (relacionamento sustentado)? Evento é mais reparável; padrão é sinal de problema maior na pessoa ou casamento.</p><p>Você oferece: 1) Espaço para raiva de esposa (ela tem direito), 2) Confrontação de esposo (se nega remorso ou justifica), 3) Honestidade radical (esposo precisa responder tudo que esposa pergunta), 4) Referência para terapia de casal (infidelidade exige profissional).</p><div class="tip"><strong>Reconstrução de Confiança:</strong> Não é perdão (que é instantâneo). É confiança (que leva tempo). Esposa pode perdoar em 1 dia; confiança leva 1 ano ou mais.</div><p>Alguns casamentos sobrevivem infidelidade (e até se fortalecem). Alguns não. Sua função é oferecer caminho, não garantir resultado.</p><div class="example"><strong>Infidelidade e Recuperação:</strong> Espuso confessa. Esposa quer divorçar. Pastor oferece espaço de lamento (não pula para "perdão"). Depois, pergunta a espuso: "Você quer recuperar casamento?" Se sim: "Você está disposto a transparência radical? Esposa pode ver seu telefone, email, localização, hora de chega, com quem está?" Se espuso está disposto, há esperança. Se não, reconstrução é impossível. Casal refere para terapia. Com honestidade radical + terapia + tempo, 40% dos casamentos sobrevivem e se fortalecem. 60% não. Ambas são realidades.</div><div class="quote"><strong>Infidelidade é Morte e Ressurreição:</strong> Casamento que era morre. Se casal escolhe, novo casamento pode nascer (baseado em honestidade, vulnerabilidade, perdão). Não é o mesmo casamento. Mas pode ser novo casamento melhor.</div>`},
    {
      id: 'DIVO',
      name: 'Divórcio: Oferecer Pastoral Quando Casamento Morre',
      content: `<p><strong>Divórcio não é pecado em todas as circunstâncias.</strong> Você sabe isso? Muitos pastores pregam que divórcio é sempre errado. Mas Bíblia oferece exceções (Mateus 19:9: infidelidade; 1 Coríntios 7:15: abandono). Além disso, há casamentos que continuam morrendo apesar terapia, confrontação, oração.</p><p>Seu papel é: 1) Oferecer esperança de reconciliação se possível, 2) Oferecer suporte se divórcio é inevitável, 3) Oferecer graça (não condenação) ao divorciad o.</p><h4>Quando Divórcio é Necessário</h4><p>Casamento sem arrependimento em abuso (físico, emocional, sexual) é casamento que deveria terminar (segurança é mais importante que "tentar"). Casamento onde um cônjuge é adúltero consistente e não quer mudar é casamento onde divórcio é válido.</p><p>Você não força pessoa a permanecer em casamento prejudicial. Você oferece pastoral durante separação e depois.</p><div class="tip"><strong>Divórcio Como Última Opção:</strong> Você esgota todas as opções (terapia, oração, confrontação) antes de apoiar divórcio. Mas se esgotadas, você oferece graça (não condenação) e suporte.</div><p>Pessoa divorciada não é menos valiosa à Igreja. Sua vida continua. Você acompanha jornada.</p><div class="example"><strong>Abuso e Divórcio:</strong> Mulher vem: "Marido é emocionalmente abusivo. Controla, critica, isola." Pastor oferece terapia de casal (marido não vai, diz que problema é dela). Pastor oferece confrontação (marido nega abuso). Pastor oferece mais terapia (marido continua negando). Depois de anos, pastor ofere ce: "Segurança é importante. Se marido não quer mudar, você tem direito de se proteger. Divórcio é opção válida." Mulher divorceia. Pastor oferece pastoral durante e depois. Não condenação, suporte.</div><div class="quote"><strong>Graça Para Divorciados:</strong> Igreja frequentemente rejeita divorciados. Seu papel é rejeitar rejeição. Oferça bem-vindo de volta, restauração de dignidade, comunidade.</div>`},
    {
      id: 'FAMI',
      name: 'Família Disfuncional: Quando Origem Molda Padrões de Vida',
      content: `<p>Pessoa vem: "Sou sempre dominado por mãe" (limites não estabelecidos). Ou "Pai nunca me aprovou" (busca aprovação em tudo). Ou "Pais brigavam constantemente" (relacionamentos parecem sempre conflituosos).</p><p><strong>Padrões de infância moldam padrões de vida.</strong> Pessoa que teve mãe controladora frequentemente procura parceiros controladores (porque é familiar). Pessoa que teve pai ausente frequentemente procura parceiros distantes (porque é conhecido).</p><h4>Aconselhamento de Padrões Familiares</h4><p>Você ajuda pessoa: 1) A ver padrão ("Você está repetindo o modelo de seu pai"), 2) A entender origem (padrão vinha de necessidade quando criança, mas é prejudicial agora), 3) A escolher novo padrão (você pode ser diferente de seus pais).</p><p>Pessoa não pode mudar pais. Mas pode mudar como pais a afetam. Pode estabelecer limites com pais, pode escolher relacionamentos diferentes, pode quebrar ciclo.</p><div class="tip"><strong>Ruptura de Padrão Familiar:</strong> Frequentemente exige tempo, consciência, às vezes terapia. Não é culpabilidade ("Seus pais fizeram errado"). É responsabilidade ("Agora você pode escolher diferente").</div><p>Você oferece esperança: "Você pode quebrar padrão. Não será fácil (estar perto de pais vai ativar padrão antigo). Mas é possível."</p><div class="example"><strong>Padrão de Rejeição:</strong> Pessoa foi criada por pai rejeitador ("Você nunca é bom o suficiente.") Agora, procura parceiros que a rejeitam (inconscientemente, porque é familiar). Pastor ajuda a ver: "Você está repetindo rejeição de seu pai em seus relacionamentos românticos. Por quê?" Pessoa: "Porque é o que conheço." Pastor: "Você pode conhecer algo diferente. Será estranho (porque não é familiar), mas é possível." Com tempo + consciência, pessoa começa a procurar parceiros mais valorizadores. Padrão quebra.</div><div class="quote"><strong>Ruptura Geracional:</strong> Você tem poder de quebrar ciclo que seus pais começaram. Nem sempre é fácil (família pode resistir). Mas é seu direito, sua responsabilidade, sua oportunidade de cura.</div>`}
  ],

{
  id: 5,
  name: 'Vícios, Recuperação e Liberdade: Aconselhamento Para Adicção',
  free: false,
  topics: [
    {
      id: 'VICI',
      name: 'Natureza da Adicção: Compreendendo a Escravidão Espiritual',
      content: `<p><strong>"Não sou mais eu que vivo, mas o pecado que habita em mim."</strong> (Romanos 7:20) Paulo descreve exatamente a experiência de pessoa viciada. Ela quer parar. Ela sabe que é destrutivo. Mas continua. Porque adicção é escravidão.</p><p>Adicção é diferente de pecado ocasional. Pecado ocasional é escolha deliberada que você pode parar. Adicção é padrão tão profundo que livre arbítrio é enfraquecido (não eliminado, mas enfraquecido). Pessoa não consegue parar apenas por vontade.</p><h4>Adicção Como Doença Espiritual e Fisiológica</h4><p>Adicção não é fraqueza de caráter (embora pecado esteja envolvido). É: 1) Fisiológica (cérebro é modificado pela substância/comportamento), 2) Psicológica (trauma, ansiedade, depressão frequentemente estão embaixo), 3) Espiritual (pessoa perdeu conexão com Deus, usa substância/comportamento em lugar de Deus).</p><p>Seu aconselhamento honra os três níveis. Você não apenas ofereça "confesse e pare" (como se fosse único nível). Você refere para tratamento físico (detox, medicação), suporte psicológico (terapia), e ministério espiritual (Igreja, oração, comunidade).</p><div class="tip"><strong>Abordagem Tripla de Adicção:</strong> Física (médico/detox), psicológica (terapeuta), espiritual (pastor/Igreja). Pessoa em 12 passos já sabe disso. Você, como pastor, deveria também.</div><p>Pessoa que recebe apenas aconselhamento espiritual de adicção frequentemente recai (porque fisiologia e psicologia não foram endereçadas).</p><div class="example"><strong>Homem em Adicção de Álcool:</strong> Vem para pastor: "Quero parar, orei, ainda bebo." Pastor oferece: "Confesse, ore, procure comunidade." Homem tenta, falha (porque cérebro ainda está dependente fisicamente, depressão ainda está embaixo psicologicamente). Depois de 3 falhas, homem abandona Igreja ("Deus não funcionou.") Erro: pastor não refere para detox + terapeuta. Pastor refere ENTÃO comunidade volta a fazer sentido.</div><div class="quote"><strong>Adicção é Escravidão:</strong> Você não critica escravo por não conseguir se libertar sozinho. Você oferece correntes quebradas (tratamento) + comunidade para suportar + Deus para transformar.</div>`},
    {
      id: 'RECA',
      name: 'Caminho de Recuperação: Suportando Pessoa em Sobriedade',
      content: `<p>Pessoa completa detox. Pessoa está sóbria 3 meses. Pessoa está vulnerável (cérebro está se reajustando, há imensa tentação). <strong>Seu papel aqui é presença consistente, não condenação por recaída se acontecer.</strong></p><p>Recuperação não é linear. Pessoa tem dias bons (sóbria, esperançosa) e dias maus (tentação, desespero). Seu aconselhamento acompanha os dois.</p><h4>Suporte em Recuperação</h4><p>Você: 1) Conecta com 12 passos/AA/NA (comunidade de pessoas em recuperação é ouro), 2) Oferece acesso a Igreja como comunidade segura, 3) Monitora sem ser policial ("Como você está?" não "Você bebeu?"), 4) Oferece espiritualidade que funciona ("Seu 'poder maior' é Deus; qual é seu relacionamento com Deus agora?"), 5) Educa sobre recaída (não é fracasso; é aviso de que precisa mais suporte).</p><p>Recaída frequentemente acontece. Não é fim. É oportunidade para aprender o que levou ao gatilho e reforçar comunidade/espiritualidade.</p><div class="tip"><strong>Recaída vs. Falha:</strong> Recaída é evento. Falha é permanência. Pessoa que recai uma vez e volta a 12 passos + Igreja está em recuperação. Pessoa que recai e renuncia está falhando. Você diferencia.</div><p>Anos de sobriedade são possível. Pessoa que escolhe comunidade (12 passos + Igreja + família) tem taxa alta de sucesso.</p><div class="example"><strong>Mulher em Recuperação de Drogas:</strong> Depois de detox, vem para Igreja. Pastor conecta com NA (Narcóticos Anônimos). Mulher vai 5 dias por semana (essencial no começo). Pastor oferece: "Qual é seu 'poder maior'? Você crê em Deus?" Mulher: "Não sei." Pastor: "Tudo bem. Comece com 'poder maior' sendo grupo NA. Depois você explora Deus." Mulher passa 3 meses em NA + Igreja + terapia. Sobriedade cresce. Relacionamento com Deus cresce. Depois de 1 ano, ela oferece testemunho. Depois de 5 anos, ela está ajudando outras. Recuperação é possível.</div><div class="quote"><strong>Recuperação é Esperança:</strong> Pessoa viciada frequentemente perdeu esperança. Sua função é oferecer esperança + comunidade que sustenta esperança até que pessoa redescubra Deus.</div>`},

      id: 'RELA',
      name: 'Relacionamentos Danificados: Reparando Confiança Quebrada',
      content: `<p>Pessoa estava viciada. Ela mentiu, roubou, negligenciou família. Agora está sóbria. Mas família não confia. Cônjuge é distante. Filhos não a respeitam. <strong>Sobriedade física não repara relacionamentos danificados automaticamente.</strong></p><p>Você ajuda pessoa a: 1) Aceitar que danificou confiança, 2) Oferecer restituição concreta (não apenas "desculpe"), 3) Demonstrar mudança através ação consistente (não apenas promessa), 4) Reconstruir relacionamentos lentamente (confiança leva tempo).</p><h4>Restituição e Mudança</h4><p>Pessoa que roubou da família para droga precisa: 1) Admitir ("Roubei"), 2) Reparar ("Vou pagar de volta"), 3) Demonstrar ("Aqui está plano de pagamento"). Não é desculpa que cura. É ação que cura.</p><p>Você oferece pastoral enquanto pessoa faz trabalho de reconstrução. Relacionamentos não se restauram porque pessoa está sóbria. Restauram-se porque pessoa demonstra mudança consistente.</p><div class="tip"><strong>Confiança Lenta:</strong> Pessoa quebrou confiança em 6 meses. Pode levar 3 anos para reconstruir. Você não apressa. Você acompanha processo.</div><p>Família também precisa de apoio (terapeuta familiar ajuda). Você e profissional trabalham junto.</p><div class="example"><strong>Filho Viciado, Família Danificada:</strong> Filho estava em crack, roubava para droga, mãe teve infarto de stress. Agora filho está sóbrio. Mãe não confia (com razão). Filho diz "Desculpe, estou sóbrio agora." Mãe: "Ouvi essas promessas 3 vezes." Pastor ajuda filho a entender: "Sobriedade é começo, não fim. Sua mãe precisa ver ação consistente (trabalho, responsabilidade, honestidade) por meses até confiar de novo." Filho oferece: "Vou trabalhar, vou sustentar a casa, vou ser responsável." Com tempo + ação, mãe reconstrói confiança. Não é rápido. Mas é real.</div><div class="quote"><strong>Reparação é Processo:</strong> Pessoa sóbria que está disposta a restaurar relacionamentos é pessoa em verdadeira recuperação. Não apenas está deixando substância. Está reconstruindo vida.</div>`},
    {
      id: 'ESPI',
      name: 'Espiritualidade em Recuperação: Encontrando Deus Quando Vazio É Enorme',
      content: `<p>Pessoa viciada usava vício para preencher vazio. Agora está sóbria. O vazio está de volta. <strong>Sem encontrar Deus para preencher aquele vazio, pessoa frequentemente recai (porque vazio é intolerável).</strong></p><p>Sua função é oferecer: 1) Comunidade (Igreja preenche isolamento), 2) Propósito (Deus tem plano para vida recuperada), 3) Espiritualidade prática (oração, leitura bíblica, meditação), 4) Esperança (você pode viver vida diferente).</p><h4>Encontrando Deus em Recuperação</h4><p>Pessoa pode estar com raiva de Deus ("Se ele cuidasse, eu não seria viciado"). Pastor: escuta raiva, não defende Deus. Oferece: "Seu vício não era culpa de Deus. Mas sua recuperação pode ser Graça de Deus. Você está disposta a explorar?" Lentamente, pessoa reconstrói relacionamento com Deus.</p><p>12 passos oferecem "poder maior" (frequentemente interpretado como Deus em contexto de Igreja cristã). Você ofere ce Deus específico: Jesus que sofreu, que oferece redenção, que não condena. Deus que recebe pessoa quebrada.</p><div class="tip"><strong>Deus para Viciado Recuperado:</strong> Não é Deus de julgamento. É Deus de redenção. Não é Deus distante. É Deus próximo. Pessoa que foi viciada entende Graça como ninguém.</div><p>Pessoas em recuperação frequentemente têm fé mais profunda que nunca (porque passaram pelo vale da sombra da morte).</p><div class="example"><strong>Homem em Recuperação Encontrando Fé:</strong> Homem estava em crack 10 anos. Roubou tudo da família. Ficou nas ruas. Entrou em programa de recuperação. Quando sóbrio 6 meses, vem para Igreja. Pastor oferece: "Você foi longe demais para ser salvo?" Homem: "Sim. Estou condenado." Pastor: "Tem um homem que passou por pior. Era crucificado, morreu. Mas ressuscitou. Ele estende mão para você agora. Você quer pegá-la?" Homem chora. Com tempo, homem se torna crente fervoroso (porque entende Graça profundamente).</div><div class="quote"><strong>Recuperação e Fé:</strong> Pessoa que foi escravizada por vício e liberada por Deus entende redenção com corpo todo. Sua fé é combustível para recuperação duradoura.</div>`}

{
  id: 6,
  name: 'Depressão, Ansiedade e Saúde Mental: Integrando Pastoral com Psicologia',
  free: false,
  topics: [
    {
      id: 'DEPR',
      name: 'Depressão: Quando Espírito Está Quebrado e Corpo Segue',
      content: `<p>Pessoa vem: "Não vejo motivo para viver. Nada importa. Até Deus parece distante." <strong>Você acha que é falta de fé? Talvez. Frequentemente é depressão clínica.</strong></p><p>Depressão não é fraqueza espiritual. É doença com componentes: neurológico (química do cérebro está desequilibrada), psicológico (padrões de pensamento negativo), e espiritual (desconexão de Deus e esperança). É tudo junto.</p><p>Seu aconselhamento pastoral não é substituir tratamento psiquiátrico. É acompanhar pessoa enquanto ela recebe tratamento.</p><h4>Depressão vs. Luto</h4><p>Luto é resposta apropriada a perda. Depressão é persistência de tristeza sem razão proporcional. Luto tem picos e vales (dia ruim, depois melhor). Depressão é constante. Luto tem esperança embaixo. Depressão não tem esperança.</p><p>Se pessoa perdeu alguém e está triste 3 meses, é luto. Se pessoa perdeu alguém e 1 ano depois ainda não consegue sair de cama, é depressão que precisa de tratamento.</p><div class="tip"><strong>Depressão Requer Profissional:</strong> Você ofereça aconselhamento pastoral, mas refira para psiquiatra (medicação frequentemente ajuda profundamente). Oração sozinha não cura depressão química.</div><p>Você quer saber quando referir? Se pessoa menciona falta de razão para viver, suicídio, desesperança persistente, mudança de sono/apetite, perda de interesse em coisas que amava: refira.</p><div class="example"><strong>Mulher em Depressão:</strong> Mulher é "ativa em Igreja, ama Jesus, nunca perdeu ninguém recentemente." Mas ela vem: "Não consigo sair de cama. Tudo é pesado. Até oração sente vazia." Não é falta de fé. É depressão. Pastor: refere para psiquiatra, prescreve medicação, depois medicação + oração + pastoral = mudança. Mulher depois de 3 meses: "Consigo orar de novo. Consigo ter esperança. Ainda triste (medicação ajuda tristeza clínica, não remove luto), mas consigo viver."</div><div class="quote"><strong>Depressão é Doença:</strong> Não é fraqueza espiritual. É doença que precisa de tratamento multifacetado: medicação + terapia + pastoral + comunidade.</div>`},
    {
      id: 'ANSD',
      name: 'Ansiedade: Quando Mente Entra em Loop de Preocupação',
      content: `<p>Pessoa está em loop: "E se eu morrer? E se alguém que amo morrer? E se ficar sozinha?" <strong>Ansiedade é quando cérebro entra em modo de ameaça e não consegue sair.</strong></p><p>Ansiedade não é falta de fé (embora fé ajude). Ansiedade é transtorno que envolve neurologia (amígdala hiperativa) + psicologia (traumas passados aumentam vigilância). Você não critica pessoa por estar ansiosa. Você oferece caminho para gerenciar.</p><h4>Ansiedade vs. Preocupação Normal</h4><p>Preocupação normal: você se preocupa, depois segue em frente. Ansiedade: você se preocupa, depois preocupação cresce, aí você se preocupa com preocupação, ciclo piora.</p><p>Ansiedade frequentemente tem gatilho (medo de perda, de desaprovação, de futuro desconhecido). Seu aconselhamento ajuda a: 1) Identificar gatilho, 2) Entender origem (frequentemente trauma ou padrão de infância), 3) Aprender técnicas para gerenciar (respiração, assunção de pensamentos, exercício).</p><div class="tip"><strong>Ansiedade Pastoral:</strong> Ofereça esperança bíblica ("Lançai toda ansiedade sobre ele" - 1 Pedro 5:7), mas refira para profissional se ansiedade é paralisante. Terapia cognitivo-comportamental + meditação contemplativa funcionam bem juntas.</div><p>Alguns acreditam que medicação é "falta de fé". Descorde respeitosamente. Medicação para ansiedade é como vitamina para deficiência. É cuidado do corpo que Deus deu.</p><div class="example"><strong>Homem em Ansiedade:</strong> Homem foi abandonado pela mãe na infância. Agora, qualquer pequena distância de esposa o ativa em pânico ("E se ela me deixe?"). Pastor: ajuda a conectar ansiedade atual ao trauma de abandono, refere para terapeuta (terapia cognitivo-comportamental ajuda), oferece: "Sua ansiedade tem origem válida. Mas você pode gerenciar. Vamos acompanhar juntos." Com terapia + pastoral + às vezes medicação, ansiedade diminui.</div><div class="quote"><strong>Ansiedade é Gerenciável:</strong> Não é cura instantânea. Mas é muito melhor com profissional, pastoral, comunidade, e às vezes medicação.</div>`},

      name: 'Integração de Pastoral e Psicologia: Trabalhando Com Profissionais',
      content: `<p>Você é pastor, não psicólogo. Você sabe isso? Frequentemente pastores agem como psicólogos (oferecendo terapia sem treinamento). Resultado: pessoa piora porque conselho é ingênuo.</p><p><strong>Melhor modelo: você trabalha COM psicólogo/psiquiatra, não em lugar dele.</strong> Você oferece pastoral (esperança, fé, comunidade). Profissional oferece terapia (técnicas, medicação, diagnóstico). Ambos juntos = cura.</p><h4>Como Trabalhar Com Profissional</h4><p>1) Você identifica que pessoa precisa terapia/medicação (não pode fazer sozinho). 2) Você refere para profissional específico (peça recomendação para pastor de outra Igreja, faça lista de psicólogos cristãos). 3) Você permanece em contato com profissional (se apropriado e com permissão de cliente) 4) Você oferece pastoral enquanto profissional oferece tratamento. 5) Você celebra progresso quando profissional + pastor trabalham juntos.</p><p>Algumas denominações têm "aconselhador pastoral certificado" (tem treinamento em terapia básica). Você sabe se está certificado? Se não, não tente terapia profunda. Refira.</p><div class="tip"><strong>Seu Limite Como Pastor:</strong> Você pode aconselhar sobre: fé, perdão, esperança, comunidade, chamado, propósito. Você NÃO DEVE tentar tratar: depressão clínica, transtorno bipolar, esquizofrenia, PTSD severo. Refira.</div><p>Muitas pessoas sofrem porque pastor ofereceu "conselho" que era inadequado. Você pode fazer diferença negativa. Confira seus limites.</p><div class="example"><strong>Integração Bem Feita:</strong> Pessoa em depressão. Pastor: refere para psiquiatra (diagnóstico + medicação), psicólogo (terapia). Enquanto isso, pastor oferece: comunidade (grupos de Igreja), esperança (testemunho de outros que se recuperaram), oração (não como tratamento, mas como suporte). Resultado: pessoa tem acesso de múltiplos lados (medicina + terapia + pastoral). Cura é mais provável porque é multifacetado.</div><div class="quote"><strong>Integração é Respeito:</strong> Você respeita limite do profissional (você não oferece medicação), profissional respeita seu papel (pastoral não é terapia). Ambos ganham. Pessoa mais ainda.</div>`},
