    topics:[
      {
        id:1, name:'O Colapso da URSS e o Fim da Bipolaridade', dur:'15min',
        content:`<h3>O Colapso da URSS e o Fim da Bipolaridade</h3><p>O fim da União Soviética em 1991 representou um dos eventos mais transformadores da história contemporânea e redefiniu completamente o tabuleiro geopolítico global. Durante quase cinco décadas, o mundo esteve dividido entre dois blocos ideológicos: o capitalismo liderado pelos Estados Unidos e o comunismo sob a égide soviética. Essa rivalidade, conhecida como Guerra Fria, condicionou alianças militares, conflitos regionais, corridas armamentistas e até a exploração espacial.</p><h4>O Declínio Soviético</h4><p>Com o colapso da URSS, os Estados Unidos emergiram como a única superpotência remanescente, inaugurando o que muitos analistas chamaram de <strong>momento unipolar</strong>. A dissolução soviética não foi um evento repentino, mas o resultado de décadas de estagnação econômica, rigidez burocrática, gastos militares insustentáveis e a incapacidade de acompanhar as revoluções tecnológicas do Ocidente.</p><blockquote>💡 <em>As reformas de Mikhail Gorbachev — a glasnost (transparência) e a perestroika (reestruturação) — tentaram salvar o sistema, mas acabaram acelerando sua desintegração.</em></blockquote><h4>Consequências Geopolíticas</h4><p>Os países do Leste Europeu, que haviam sido satélites soviéticos, rapidamente buscaram integração com a Europa Ocidental e a OTAN. A Alemanha se reunificou em 1990, símbolo máximo do fim de uma era. O impacto geopolítico foi imenso: surgiram <strong>15 novos Estados independentes</strong> das cinzas soviéticas, muitos deles instáveis politicamente e economicamente frágeis.</p><p>A Rússia, como principal herdeira da URSS, manteve o arsenal nuclear e a cadeira permanente no Conselho de Segurança da ONU, mas enfrentou uma década de caos econômico nos anos 1990. O vácuo de poder deixado pela URSS criou zonas de instabilidade na Ásia Central, no Cáucaso e nos Bálcãs, gerando conflitos étnicos e guerras civis.</p><h4>O "Fim da História"?</h4><p>A queda da bipolaridade trouxe uma falsa sensação de que a história havia chegado ao fim, como propôs Francis Fukuyama, sugerindo que a democracia liberal seria o destino inevitável de todas as nações. Os eventos posteriores — terrorismo global, ascensão da China, ressurgimento russo — mostraram que essa visão era prematura.</p><blockquote>📌 <em>O colapso da URSS não encerrou os conflitos globais — apenas redefiniu suas linhas.</em></blockquote>`,

        cards:[{q:'O que significou o momento unipolar após 1991?',a:'Período em que os EUA eram a única superpotência global após o colapso da URSS, dominando militar, econômica e culturalmente o sistema internacional.'}]
      },
      {
        id:2, name:'A Hegemonia Americana e seus Limites', dur:'15min',
        content:`<h3>A Hegemonia Americana e seus Limites</h3><p>Após o colapso soviético, os Estados Unidos se viram numa posição sem precedentes na história moderna: eram a única potência com alcance militar global, a maior economia do mundo, líderes em inovação tecnológica e exportadores culturais dominantes.</p><h4>As Dimensões do Poder Americano</h4><ul><li><strong>Militar:</strong> Centenas de bases ao redor do globo, presença em mais de 80 países, porta-aviões nos oceanos e capacidade de inteligência que monitorava o mundo inteiro.</li><li><strong>Econômico:</strong> O dólar consolidou-se como moeda de reserva mundial. O PIB americano representava cerca de 25% da economia global, e Wall Street ditava os ritmos das finanças internacionais.</li><li><strong>Cultural:</strong> Hollywood, a música pop, universidades de elite e o modelo de vida americano se espalharam pelo planeta numa onda de soft power sem paralelo.</li></ul><h4>Os Limites Estruturais</h4><p>A intervenção no Iraque em 2003, baseada em alegações falsas sobre armas de destruição em massa, revelou os riscos do unilateralismo e gerou uma crise de credibilidade internacional. O custo das guerras no Afeganistão e no Iraque — estimado em <strong>mais de 8 trilhões de dólares</strong> — drenou recursos que poderiam ter sido investidos internamente.</p><blockquote>⚠️ <em>A crise financeira de 2008 expôs fragilidades do modelo econômico americano e reduziu a confiança global no capitalismo desregulado.</em></blockquote><p>Internamente, a polarização política crescente, a desigualdade econômica e a erosão da infraestrutura mostraram que o poder externo não garantia saúde interna. O conceito de <strong>overstretch imperial</strong> — quando um império se expande além de sua capacidade de sustentação — começou a ser aplicado aos EUA por analistas como Paul Kennedy.</p>`,

        cards:[{q:'O que é soft power?',a:'Capacidade de influenciar outros países através da cultura, valores e instituições — sem uso de força militar. Hollywood, universidades e o modo de vida americano são exemplos clássicos.'}]

      {
        id:3, name:'Organizações Internacionais no Novo Cenário', dur:'15min',
        content:`<h3>Organizações Internacionais no Novo Cenário</h3><p>Com o fim da Guerra Fria, as organizações internacionais criadas no pós-Segunda Guerra Mundial precisaram se reinventar para lidar com um mundo radicalmente diferente.</p><h4>A ONU e suas Limitações</h4><p>A ONU, nascida em 1945 para evitar outro conflito global, viu-se diante de desafios para os quais não havia sido projetada: guerras civis, genocídios, terrorismo transnacional e mudanças climáticas. O Conselho de Segurança, com seus cinco membros permanentes e poder de veto, tornou-se frequentemente paralisado por divergências entre as potências.</p><blockquote>⚠️ <em>A incapacidade de agir no genocídio de Ruanda em 1994 e a lenta resposta na Bósnia expuseram limitações graves do sistema ONU.</em></blockquote><h4>A Reinvenção da OTAN</h4><p>A OTAN, aliança militar criada em 1949 para conter a URSS, enfrentou uma crise existencial: sem o inimigo que justificava sua existência, qual seria seu propósito? A resposta veio com a <strong>expansão para o leste europeu</strong>, incorporando antigos membros do Pacto de Varsóvia, e com intervenções fora da área original. Essa expansão, vista como natural pelo Ocidente, foi interpretada pela Rússia como uma ameaça direta à sua segurança.</p><h4>FMI, Banco Mundial e o Consenso de Washington</h4><p>Organismos econômicos como o FMI e o Banco Mundial também enfrentaram questionamentos. Suas políticas de ajuste estrutural impostas a países em desenvolvimento — privatizações aceleradas, cortes de gastos sociais, abertura comercial radical — frequentemente agravaram crises ao invés de resolvê-las.</p><h4>Novos Fóruns de Governança</h4><p>Surgiram novos fóruns como o <strong>G20</strong>, que a partir de 2008 incluiu economias emergentes nas discussões sobre regulação financeira. Os <strong>BRICS</strong> criaram mecanismos próprios, como o Novo Banco de Desenvolvimento, sinalizando insatisfação com a arquitetura institucional dominada pelo Ocidente.</p>`,

        cards:[{q:'O que é o Consenso de Washington?',a:'Conjunto de políticas econômicas liberais (privatização, desregulação, abertura comercial) promovidas pelo FMI e Banco Mundial para países em desenvolvimento nos anos 1990, com resultados frequentemente contestados.'}]

      {
        id:4, name:'Multipolaridade: O Mundo em Transição', dur:'15min',
        content:`<h3>Multipolaridade: O Mundo em Transição</h3><p>O conceito de multipolaridade define o cenário geopolítico que começou a se desenhar a partir dos anos 2000, quando ficou claro que a hegemonia americana unipolar não se sustentaria indefinidamente. Multipolaridade significa a existência de <strong>múltiplos polos de poder significativo</strong> no sistema internacional.</p><h4>A China</h4><p>Com crescimento econômico médio superior a 9% ao ano por três décadas consecutivas, o país se tornou a segunda maior economia do mundo e o maior parceiro comercial de mais de 120 nações. Sua ascensão não é apenas econômica: modernização militar, programa espacial, liderança em 5G e IA, e a Iniciativa Cinturão e Rota demonstram ambições globais.</p><h4>A Rússia</h4><p>Apesar de sua economia relativamente modesta, reassumiu papel de grande potência sob Vladimir Putin. Modernização do arsenal nuclear, intervenções na Geórgia (2008), Crimeia (2014) e Síria (2015), e capacidade de usar energia como arma geopolítica devolveram Moscou ao centro do tabuleiro.</p><h4>Índia e União Europeia</h4><p>A <strong>Índia</strong>, com mais de 1,4 bilhão de habitantes e economia em rápido crescimento, emergiu como potência regional com aspirações globais. A <strong>União Europeia</strong>, apesar de crises internas como o Brexit, permanece como bloco econômico gigantesco com influência regulatória global.</p><h4>Potências Regionais</h4><p>Turquia, Arábia Saudita, Irã e Brasil também exercem influência significativa em suas áreas.</p><blockquote>📌 <em>A multipolaridade traz maior complexidade, mais pontos de atrito e menos previsibilidade — o mundo do século XXI não tem um árbitro único.</em></blockquote>`,

      {
        id:5, name:'O Milagre Econômico Chinês', dur:'15min',
        content:`<h3>O Milagre Econômico Chinês</h3><p>A transformação econômica da China nas últimas quatro décadas é o fenômeno de desenvolvimento mais impressionante da história humana. Em 1978, quando Deng Xiaoping iniciou as reformas de abertura econômica, a China era um país majoritariamente agrícola com renda per capita inferior à de muitos países africanos. Hoje, é a segunda maior economia do mundo.</p><h4>A Estratégia de Desenvolvimento</h4><p>O modelo combinou elementos capitalistas com controle estatal centralizado — o <strong>"socialismo com características chinesas"</strong>. As Zonas Econômicas Especiais, criadas em cidades costeiras como Shenzhen, permitiram investimento estrangeiro e exportações em condições favoráveis. A entrada na OMC em 2001 acelerou dramaticamente esse processo.</p><h4>Números Impressionantes</h4><ul><li><strong>800 milhões</strong> de pessoas retiradas da pobreza extrema</li><li>Urbanização saltou de 18% para mais de 65%</li><li>Maior rede de trens de alta velocidade do mundo: <strong>+42 mil km</strong></li></ul><h4>Contradições do Modelo</h4><p>Desigualdade entre regiões costeiras e interior permanece enorme. O endividamento de governos locais e do setor imobiliário atingiu níveis alarmantes — a crise da Evergrande em 2021 expôs a fragilidade do modelo baseado em construção e especulação.</p><blockquote>⚠️ <em>A população está envelhecendo rapidamente devido à política do filho único, e a força de trabalho começou a encolher — um desafio demográfico sem precedentes.</em></blockquote>`,

        cards:[{q:'O que são as Zonas Econômicas Especiais?',a:'Áreas costeiras chinesas como Shenzhen criadas a partir de 1978 com regras favoráveis a investimento estrangeiro e exportações, que impulsionaram o boom econômico chinês.'}]

      {
        id:6, name:'A Iniciativa Cinturão e Rota', dur:'15min',
        content:`<h3>A Iniciativa Cinturão e Rota</h3><p>Lançada oficialmente por Xi Jinping em 2013, a Iniciativa Cinturão e Rota (Belt and Road Initiative - BRI) é o projeto geopolítico e econômico mais ambicioso do século XXI. Inspirada na antiga Rota da Seda, propõe a construção de uma vasta rede de infraestrutura conectando a Ásia à Europa, à África e à América Latina.</p><h4>Duas Dimensões</h4><ul><li><strong>Cinturão Econômico Terrestre:</strong> Atravessa a Ásia Central até a Europa</li><li><strong>Rota da Seda Marítima:</strong> Conecta portos do Sudeste Asiático, Oceano Índico, Golfo Pérsico, África e Mediterrâneo</li></ul><p>Com investimentos estimados em <strong>mais de 1 trilhão de dólares</strong>, o projeto envolve mais de 140 países. Projetos emblemáticos incluem o Corredor Econômico China-Paquistão (US$60 bi), a ferrovia China-Laos e o porto de Piraeus na Grécia.</p><h4>Objetivos Estratégicos</h4><p>Para a China, a BRI cria mercados para suas empresas, garante rotas de fornecimento de matérias-primas, expande influência geopolítica e estabelece padrões técnicos chineses como norma internacional.</p><h4>A "Diplomacia da Dívida"</h4><blockquote>⚠️ <em>Críticos apontam que muitos países receptores acumulam dívidas impagáveis com Pequim. O Sri Lanka cedeu o porto de Hambantota à China por 99 anos após não conseguir pagar empréstimos — símbolo dessa dinâmica.</em></blockquote><p>Países ocidentais lançaram iniciativas concorrentes — Build Back Better World (G7) e Global Gateway (UE) — mas nenhuma se aproxima da escala e velocidade chinesa.</p>`,
        quiz:{q:'O que é a diplomacia da dívida associada à BRI?',opts:["Empréstimos do FMI à China","Países receptores acumulam dívidas impagáveis com a China, ficando vulneráveis à pressão política","A China perdoa todas as dívidas","Acordo comercial entre EUA e China"],correct:1},
        cards:[{q:'O que é a Iniciativa Cinturão e Rota (BRI)?',a:'Mega projeto chinês lançado em 2013 para construir infraestrutura conectando Ásia, Europa, África e América Latina, envolvendo 140+ países e investimentos superiores a 1 trilhão de dólares.'}]

      {
        id:7, name:'A Rivalidade Tecnológica EUA-China', dur:'15min',
        content:`<h3>A Rivalidade Tecnológica EUA-China</h3><p>A competição tecnológica entre Estados Unidos e China se tornou o eixo central da rivalidade geopolítica do século XXI. Quem dominar as tecnologias-chave — IA, semicondutores, computação quântica, biotecnologia — terá vantagem decisiva nas próximas décadas.</p><h4>A Estratégia Chinesa</h4><p>O plano <strong>"Made in China 2025"</strong> busca autossuficiência em dez setores estratégicos. A China já lidera em 5G (Huawei), pagamentos digitais, veículos elétricos, baterias e painéis solares.</p><h4>A Resposta Americana</h4><ul><li>Restrições de exportação de semicondutores avançados à China</li><li><strong>CHIPS Act (2022):</strong> US$52 bilhões para produção doméstica de chips</li><li>Pressão sobre Japão e Holanda para restringir exportações de litografia</li></ul><h4>A Questão Taiwan</h4><p>A ilha abriga a <strong>TSMC</strong>, que produz mais de 90% dos chips mais avançados do mundo. Um conflito em Taiwan seria um cataclisma para a economia global, interrompendo a cadeia de semicondutores que alimenta desde smartphones até sistemas de armas.</p><h4>A Corrida pela IA</h4><blockquote>📌 <em>A China possui vantagens em volume de dados e velocidade de implementação, enquanto os EUA lideram em pesquisa fundamental e atração de talentos globais. A supremacia em IA pode redefinir poder militar, produtividade e controle social.</em></blockquote>`,
        quiz:{q:'Por que Taiwan é estrategicamente crucial na rivalidade EUA-China?',opts:["Taiwan possui maiores reservas de petróleo da Ásia","A ilha abriga a TSMC, que produz 90%+ dos chips mais avançados do mundo","Taiwan controla o estreito de Malaca","Taiwan é membro do Conselho de Segurança"],correct:1},
        cards:[{q:'O que é o CHIPS Act?',a:'Lei americana de 2022 que destina US$52 bilhões para revitalizar a produção doméstica de semicondutores, reduzindo dependência da Ásia e competindo com a China na corrida tecnológica.'}]

      {
        id:8, name:'O Modelo Político Chinês e o Autoritarismo Digital', dur:'15min',
        content:`<h3>O Modelo Político Chinês e o Autoritarismo Digital</h3><p>O sistema político chinês desafia a tese ocidental de que desenvolvimento econômico inevitavelmente leva à democratização. A China combinou crescimento espetacular com o fortalecimento de um regime autoritário de partido único.</p><h4>A Era Xi Jinping</h4><p>Sob Xi Jinping (2012-), a China passou por recentralização dramática do poder. A campanha anticorrupção eliminou rivais, os limites de mandato foram abolidos em 2018, e seu "Pensamento" foi incorporado à Constituição. A repressão a dissidentes se intensificou — especialmente em <strong>Xinjiang</strong>, onde mais de um milhão de uigures foram detidos em campos de "reeducação".</p><h4>Tecnologia como Controle Social</h4><ul><li><strong>Grande Firewall:</strong> Bloqueia Google, Facebook, YouTube, Twitter</li><li><strong>Sistema de Crédito Social:</strong> Pontuações baseadas em comportamento do cidadão</li><li><strong>Vigilância:</strong> Mais de 600 milhões de câmeras com reconhecimento facial</li></ul><h4>O Modelo Exportado</h4><blockquote>📌 <em>O "autoritarismo digital exportado" atrai regimes ao redor do mundo que importam tecnologia chinesa de vigilância. A China oferece um contraponto: desenvolvimento sem democracia, ordem sem liberdade individual plena.</em></blockquote><p>Esse modelo atrai especialmente países em desenvolvimento frustrados com a instabilidade de democracias jovens e com as condicionalidades impostas pelo Ocidente.</p>`,

    topics:[
      {
        id:9, name:'A Era Putin e a Reconstrução do Poder Russo', dur:'15min',
        content:`<h3>A Era Putin e a Reconstrução do Poder Russo</h3><p>A chegada de Vladimir Putin ao poder na virada do milênio transformou radicalmente a trajetória da Rússia pós-soviética. Nos caóticos anos 1990, a Rússia era vista como potência em declínio terminal: economia encolhida pela metade, oligarcas controlando setores estratégicos, corrupção endêmica.</p><h4>Consolidação Interna</h4><p>Putin domou os oligarcas — prendendo ou exilando os que se opunham e cooptando os alinhados — e recentralizou o poder no Kremlin. A imprensa independente foi silenciada, a oposição marginalizada e o sistema transformado numa <strong>democracia controlada</strong>.</p><h4>A Arma Energética</h4><p>A alta dos preços do petróleo e gás nos anos 2000 financiou a modernização militar e melhora do padrão de vida. A Rússia, como <strong>maior exportadora de gás natural do mundo</strong>, transformou energia em arma geopolítica, especialmente sobre a Europa dependente.</p><h4>Modernização Militar</h4><p>Putin investiu em armas nucleares estratégicas, mísseis hipersônicos, capacidades cibernéticas e forças especiais. A intervenção na <strong>Geórgia em 2008</strong> foi o primeiro sinal claro de disposição para usar força para defender sua esfera de influência.</p><blockquote>📌 <em>Putin adotou uma narrativa de civilização russa distinta, nem ocidental nem oriental, com valores tradicionais e soberania como pilares — em contraste direto com o liberalismo progressista do Ocidente.</em></blockquote>`,

        id:10, name:'A Crise da Ucrânia: De 2014 à Invasão de 2022', dur:'15min',
        content:`<h3>A Crise da Ucrânia: De 2014 à Invasão de 2022</h3><p>A Ucrânia se tornou o epicentro da maior crise de segurança na Europa desde a Segunda Guerra Mundial.</p><h4>2013-2014: Maidan e Crimeia</h4><p>A crise começou quando o presidente ucraniano Yanukovich recuou de acordo com a UE sob pressão de Moscou. Protestos na <strong>Praça Maidan</strong> levaram à sua deposição. Em resposta, a Rússia <strong>anexou a Crimeia</strong> e apoiou separatistas em Donetsk e Luhansk, iniciando conflito que matou 14 mil pessoas até 2021.</p><h4>24 de Fevereiro de 2022</h4><p>A Rússia lançou invasão em grande escala. Putin justificou como necessário para "desnazificar" a Ucrânia. A resistência ucraniana, liderada por <strong>Volodymyr Zelensky</strong>, surpreendeu a todos.</p><h4>Resposta Ocidental</h4><ul><li>Sanções sem precedentes contra a economia russa</li><li>Congelamento de reservas do banco central russo</li><li>Exclusão de bancos do SWIFT</li><li>Fornecimento massivo de armas: HIMARS, tanques Leopard</li></ul><h4>Consequências</h4><p>O conflito se transformou em guerra de atrito com centenas de milhares de baixas e <strong>6+ milhões de refugiados</strong>. Finlândia e Suécia aderiram à OTAN, Alemanha anunciou rearmamento histórico.</p><blockquote>⚠️ <em>A guerra na Ucrânia reconfigurou completamente a segurança e a política energética europeia.</em></blockquote>`,
        quiz:{q:'O que desencadeou a crise na Ucrânia em 2013-2014?',opts:["Invasão russa sem provocação","Recusa do presidente ucraniano em assinar acordo com a UE sob pressão de Moscou","Adesão da Ucrânia à OTAN","Um terremoto em Kiev"],correct:1},
        cards:[{q:'Por que a guerra na Ucrânia reconfigurou a segurança europeia?',a:'Levou Finlândia e Suécia à OTAN, provocou rearmamento massivo europeu (Alemanha: €100 bi), acelerou independência energética da Rússia e reviveu o debate sobre defesa europeia autônoma.'}]

      {
        id:11, name:'A Expansão da OTAN e a Segurança Europeia', dur:'15min',
        content:`<h3>A Expansão da OTAN e a Segurança Europeia</h3><p>A expansão da OTAN é central para entender as tensões Rússia-Ocidente no século XXI.</p><h4>Ondas de Expansão</h4><p>Em 1999: República Tcheca, Hungria e Polônia. Em 2004: Estônia, Letônia, Lituânia, Eslováquia, Eslovênia, Bulgária e Romênia — levando a OTAN até as fronteiras russas. A Rússia argumenta que houve <strong>promessas verbais a Gorbachev</strong> de não expansão. O Ocidente contesta, afirmando que nenhum tratado formal foi assinado.</p><h4>Finlândia e Suécia</h4><p>A adesão da Finlândia à OTAN em 2023 e da Suécia em 2024, após décadas de neutralidade, representaram mudança tectônica: a fronteira da OTAN com a Rússia mais que dobrou com a entrada finlandesa.</p><h4>A Defesa Europeia</h4><p>A maioria dos países europeus negligenciou gastos militares por décadas, confiando no guarda-chuva americano. A meta de 2% do PIB era cumprida por pouquíssimos membros.</p><blockquote>💡 <em>A guerra na Ucrânia mudou tudo: Alemanha anunciou fundo de €100 bilhões para defesa, Polônia elevou gastos para 4%+ do PIB, e o debate sobre defesa europeia autônoma ganhou urgência.</em></blockquote>`,
        quiz:{q:'Qual foi o impacto da adesão da Finlândia à OTAN?',opts:["Nenhum impacto significativo","A fronteira da OTAN com a Rússia mais que dobrou","A Rússia se retirou de todos os conflitos","A UE se dissolveu"],correct:1},
        cards:[{q:'Qual a importância do Nord Stream?',a:'Gasoduto que ligava Rússia à Alemanha pelo Mar Báltico, símbolo da dependência energética europeia. Destruído por sabotagem em setembro de 2022.'}]

      {
        id:12, name:'Energia como Arma Geopolítica', dur:'15min',
        content:`<h3>Energia como Arma Geopolítica</h3><p>A dimensão energética da geopolítica europeia é um estudo de caso sobre como dependência econômica se transforma em vulnerabilidade estratégica.</p><h4>A Dependência Europeia</h4><p>Antes da invasão da Ucrânia, a Europa importava <strong>~40% do gás natural da Rússia</strong>, com a Alemanha chegando a 55%. O gasoduto <strong>Nord Stream</strong> era o símbolo dessa relação — e foi destruído por explosões em setembro de 2022, num dos atos de sabotagem mais espetaculares da história moderna.</p><h4>A Crise Energética</h4><p>Quando a Rússia cortou o fornecimento em 2022, a Europa enfrentou crise que disparou preços, elevou inflação, ameaçou a indústria e testou a coesão social. A decisão alemã de fechar usinas nucleares e apostar no gás russo revelou-se <strong>erro estratégico monumental</strong>.</p><h4>A Resposta</h4><ul><li>Diversificação massiva de fornecedores de GNL (EUA, Qatar, Noruega)</li><li>Aceleração de projetos de energia renovável</li><li>Construção de terminais de regaseificação em tempo recorde</li><li>Planos de redução de consumo</li></ul><blockquote>📌 <em>Lição geopolítica: energia não é apenas commodity, é instrumento de poder. Países que dependem de um único fornecedor se colocam em posição de vulnerabilidade estratégica.</em></blockquote>`,
        quiz:{q:'Qual foi a consequência da dependência europeia de gás russo?',opts:["Europa ficou imune à crise","Rússia fechou todas as exportações permanentemente","Europa enfrentou crise energética severa com disparada de preços e inflação","Alemanha aumentou usinas nucleares"],correct:2},
        cards:[{q:'Por que energia é arma geopolítica?',a:'Países que controlam fornecimento energético (como a Rússia com gás) podem usar essa dependência para pressionar politicamente outros países, como demonstrado na crise europeia de 2022.'}]

        id:13, name:'A Primavera Árabe e Suas Consequências', dur:'15min',
        content:`<h3>A Primavera Árabe e Suas Consequências</h3><p>A Primavera Árabe, onda de protestos e revoluções a partir de dezembro de 2010, foi um dos eventos mais transformadores do início do século XXI na região.</p><h4>A Fagulha</h4><p>Tudo começou na Tunísia, quando Mohamed Bouazizi ateou fogo ao próprio corpo em protesto contra humilhação policial. Seu ato detonou uma revolta que derrubou o ditador Ben Ali em semanas e inspirou milhões. O Egito seguiu: milhões ocuparam a <strong>Praça Tahrir</strong>, forçando a renúncia de Hosni Mubarak após 30 anos.</p><h4>Causas Profundas</h4><ul><li>Décadas de autoritarismo e corrupção endêmica</li><li>Maior taxa de desemprego jovem do mundo</li><li>Desigualdade crescente</li><li>Juventude conectada por redes sociais</li></ul><h4>O Fracasso Democrático</h4><p>A <strong>Tunísia</strong> foi o único caso de sucesso relativo (que também regrediu sob Kais Saied a partir de 2021). No Egito, golpe militar de al-Sisi em 2013. Na Líbia, Estado falido com milícias rivais. A Síria mergulhou em guerra civil com 500 mil mortos. O Iêmen entrou na pior crise humanitária do mundo.</p><blockquote>📌 <em>Lição amarga: derrubar ditadores é mais fácil do que construir democracias em sociedades fragmentadas por divisões sectárias, tribais e étnicas.</em></blockquote>`,

        content:`<h3>A Guerra Civil Síria e o Tabuleiro de Potências</h3><p>A guerra civil síria (2011-) é o conflito mais complexo e devastador do século XXI, transformando-se de protesto popular contra Assad numa guerra por procuração envolvendo todas as grandes potências.</p><h4>O Tabuleiro</h4><ul><li><strong>Rússia:</strong> Apoio militar a Assad — base naval em Tartus e poder aéreo</li><li><strong>Irã + Hezbollah:</strong> Milícias e Guarda Revolucionária no terreno</li><li><strong>EUA:</strong> Armaram rebeldes moderados e depois focaram no combate ao ISIS</li><li><strong>Turquia:</strong> Intervenção contra curdos e jihadistas</li><li><strong>Arábia Saudita e Qatar:</strong> Financiaram facções rebeldes rivais</li><li><strong>Israel:</strong> Centenas de ataques contra posições iranianas</li></ul><h4>O Estado Islâmico</h4><p>O surgimento do ISIS a partir de 2014, controlando vastos territórios e proclamando um califado, chocou o mundo com brutalidade sem precedentes: decapitações filmadas, escravidão, destruição de patrimônio histórico.</p><h4>Custo Humano</h4><blockquote>⚠️ <em>Mais de 500 mil mortos, 12+ milhões de deslocados (metade da população), cidades destruídas, uso documentado de armas químicas. Assad sobreviveu com apoio russo e iraniano, mas governa ruínas.</em></blockquote>`,

        id:15, name:'Irã vs Arábia Saudita: A Rivalidade Sectária', dur:'15min',
        content:`<h3>Irã vs Arábia Saudita: A Rivalidade Sectária</h3><p>A rivalidade entre Irã e Arábia Saudita é o eixo central de conflito no Oriente Médio do século XXI, combinando geopolítica, religião, identidade e ambição regional.</p><h4>Os Dois Polos</h4><p><strong>Irã:</strong> República islâmica xiita desde 1979, desafia a ordem regional. <strong>Arábia Saudita:</strong> Monarquia sunita, guardiã dos lugares sagrados do Islã, aliada histórica dos EUA.</p><h4>Guerras por Procuração</h4><ul><li><strong>Iêmen:</strong> Coalizão saudita vs houthis apoiados pelo Irã</li><li><strong>Líbano:</strong> Hezbollah financiado pelo Irã como Estado dentro do Estado</li><li><strong>Iraque:</strong> Milícias xiitas pró-Teerã com enorme influência</li><li><strong>Síria:</strong> Lados opostos do conflito</li></ul><h4>O Programa Nuclear Iraniano</h4><p>O acordo JCPOA de 2015 foi abandonado por Trump em 2018. Desde então, o Irã acelerou enriquecimento de urânio, aproximando-se da capacidade de produzir armas nucleares.</p><h4>A Virada de 2023</h4><blockquote>💡 <em>A China mediou reaproximação diplomática entre Irã e Arábia Saudita — sinalizando crescente influência chinesa no Oriente Médio, região historicamente dominada pela diplomacia americana.</em></blockquote>`,

        id:16, name:'O Conflito Israel-Palestina no Século XXI', dur:'15min',
        content:`<h3>O Conflito Israel-Palestina no Século XXI</h3><p>O conflito israelense-palestino entrou numa fase particularmente dramática no século XXI, com a solução de dois Estados cada vez mais difícil de implementar.</p><h4>Assentamentos e Gaza</h4><p>A expansão contínua de assentamentos israelenses na Cisjordânia é o fator mais corrosivo: <strong>700+ mil colonos</strong> em territórios que deveriam formar o futuro Estado palestino. Em Gaza, o Hamas assumiu controle em 2007, levando Israel a impor bloqueio severo.</p><h4>7 de Outubro de 2023</h4><p>O ataque do Hamas matou mais de 1.200 israelenses e levou ~250 reféns — o maior ataque contra judeus desde o Holocausto. A resposta militar israelense em Gaza foi devastadora, com bombardeios massivos, invasão terrestre e dezenas de milhares de mortes palestinas.</p><h4>Impacto Global</h4><ul><li>Protestos massivos em todo o mundo</li><li>Divisões profundas na ONU</li><li>Tensões em campus universitários americanos e europeus</li><li>Acordos de Abraão (2020) abalados</li><li>Normalização com Arábia Saudita suspensa</li></ul><blockquote>📌 <em>O conflito expôs as limitações do poder militar para resolver questões políticas fundamentais e a incapacidade da comunidade internacional de proteger civis.</em></blockquote>`,

        id:17, name:'O 11 de Setembro e a Guerra ao Terror', dur:'15min',
        content:`<h3>O 11 de Setembro e a Guerra ao Terror</h3><p>Os atentados de 11 de setembro de 2001 foram o evento definidor da geopolítica das duas primeiras décadas do século XXI. Dezenove terroristas da Al-Qaeda sequestraram quatro aviões: dois atingiram as Torres Gêmeas, um o Pentágono, e o quarto caiu na Pensilvânia. <strong>Quase 3.000 pessoas morreram.</strong></p><h4>A "Guerra ao Terror"</h4><p>Bush declarou uma Guerra ao Terror global que justificaria duas décadas de intervenções. A invasão do <strong>Afeganistão (2001)</strong> derrubou o Talibã mas se transformou na guerra mais longa da história americana — terminando com a caótica retirada de 2021 e retorno dos talibãs.</p><h4>Iraque 2003</h4><p>A invasão do Iraque, justificada por alegações falsas de armas de destruição em massa, desestabilizou todo o Oriente Médio e eventualmente deu origem ao Estado Islâmico.</p><h4>Vigilância e Liberdades Civis</h4><ul><li>Patriot Act expandiu poderes de vigilância</li><li>NSA monitorou comunicações globais (revelado por Snowden, 2013)</li><li>Guantánamo Bay e prisões secretas da CIA</li></ul><blockquote>⚠️ <em>Custo total da Guerra ao Terror: estimado em 8+ trilhões de dólares e centenas de milhares de mortes, com resultados geopolíticos discutíveis.</em></blockquote>`,

      {
        id:18, name:'O Estado Islâmico e o Jihadismo Global', dur:'15min',
        content:`<h3>O Estado Islâmico e o Jihadismo Global</h3><p>O Estado Islâmico (ISIS) representou a mais brutal manifestação do jihadismo global no século XXI. Nascido das cinzas da insurgência iraquiana pós-2003, o grupo conquistou vastos territórios proclamando um <strong>califado</strong> — o primeiro desde o Império Otomano.</p><h4>O Califado</h4><p>No auge, controlava área do tamanho da Grã-Bretanha com ~8 milhões de habitantes, administrando infraestrutura e cobrando impostos — governado por interpretação ultraextremista do Islã.</p><h4>Propaganda Revolucionária</h4><p>A máquina de propaganda online atraiu <strong>40 mil combatentes estrangeiros</strong> de 100+ países: revistas multilíngues, vídeos cinematográficos, uso profissional de redes sociais para radicalizar jovens globalmente.</p><h4>Ataques na Europa</h4><ul><li>Paris (novembro 2015): 130 mortos</li><li>Bruxelas, Nice, Manchester, Barcelona (2016-2017)</li></ul><h4>Derrota e Persistência</h4><p>O território foi destruído até 2019 e al-Baghdadi morto em operação americana. Contudo, o ISIS persiste como insurgência e expandiu franquias para Sahel africano, Moçambique, Afeganistão e Sudeste Asiático.</p><blockquote>📌 <em>A derrota territorial não equivale à eliminação ideológica.</em></blockquote>`,

      {
        id:19, name:'Ciberguerra: O Quinto Domínio de Conflito', dur:'15min',
        content:`<h3>Ciberguerra: O Quinto Domínio de Conflito</h3><p>A ciberguerra emergiu como o quinto domínio de conflito — ao lado de terra, mar, ar e espaço. Ataques cibernéticos podem causar danos devastadores sem disparar um único tiro e são extremamente difíceis de atribuir.</p><h4>Marcos Históricos</h4><p><strong>Stuxnet</strong> (2010): Vírus EUA-Israel que sabotou centrífugas nucleares iranianas — primeira arma cibernética a causar destruição física.</p><h4>Operações Russas</h4><ul><li>Ataques à rede elétrica da Ucrânia (2015-16)</li><li>Interferência nas eleições americanas de 2016</li><li><strong>NotPetya (2017):</strong> US$10+ bilhões em danos globais</li><li>Comprometimento da SolarWinds em agências governamentais</li></ul><h4>Outros Atores</h4><p><strong>China:</strong> Espionagem industrial em escala massiva (centenas de bilhões/ano em PI roubada). <strong>Coreia do Norte:</strong> Financia programa nuclear com cibercrimes (US$1+ bi em cripto roubada).</p><h4>Ransomware</h4><p>O ataque ao <strong>Colonial Pipeline</strong> (2021) paralisou combustível na costa leste dos EUA por dias.</p><blockquote>📌 <em>A próxima grande guerra provavelmente começará — e talvez seja decidida — no ciberespaço.</em></blockquote>`,

        id:20, name:'Desinformação e Guerra Híbrida', dur:'15min',
        content:`<h3>Desinformação e Guerra Híbrida</h3><p>A desinformação como arma geopolítica atingiu escala sem precedentes no século XXI, tornando-se componente central da <strong>guerra híbrida</strong> — combinação de meios militares, cibernéticos, informacionais e econômicos.</p><h4>A Doutrina Gerasimov</h4><p>Atribuída ao chefe do Estado-Maior russo, sugere que métodos não-militares podem ser mais eficazes que armas convencionais para atingir objetivos estratégicos.</p><h4>Operações de Influência</h4><ul><li><strong>Rússia:</strong> Milhares de contas falsas, fábricas de trolls (Internet Research Agency), vazamento seletivo de informações hackeadas</li><li><strong>China:</strong> Operações sofisticadas na Ásia-Pacífico e África</li><li><strong>Irã:</strong> Redes próprias de desinformação</li></ul><h4>O Papel das Redes Sociais</h4><p>Algoritmos projetados para maximizar engajamento favorecem conteúdo emocional, polarizante e frequentemente falso. Câmaras de eco reforçam crenças pré-existentes.</p><h4>A Ameaça da IA Generativa</h4><blockquote>⚠️ <em>Deepfakes de vídeo e áudio, textos gerados por IA — ameaçam criar uma realidade onde será impossível distinguir verdadeiro do falso. Eleições se tornaram alvos prioritários de operações de influência estrangeira.</em></blockquote>`,

        content:`<h3>A América Latina no Tabuleiro Global</h3><p>A América Latina no século XXI experimentou ciclos intensos de transformação, oscilando entre onda progressista, virada conservadora e retorno à esquerda.</p><h4>A Maré Rosa (anos 2000)</h4><p>Governos de esquerda chegaram ao poder: Lula (Brasil), Chávez (Venezuela), Evo Morales (Bolívia), Correa (Equador), Kirchner (Argentina). O boom de commodities, impulsionado pela demanda chinesa, financiou programas sociais que reduziram pobreza em toda a região.</p><h4>A Crise (2015-)</h4><ul><li>Queda dos preços das commodities expôs fragilidades</li><li>Escândalos como a Operação Lava Jato deslegitimaram a classe política</li><li>Virada à direita: Bolsonaro (2018), Macri (2015)</li><li><strong>Venezuela:</strong> Catástrofe econômica, hiperinflação, 7+ milhões de emigrantes</li></ul><h4>A Penetração Chinesa</h4><p>A China se tornou o maior parceiro comercial de Brasil, Chile e Peru, investindo pesadamente em infraestrutura, mineração, energia e telecomunicações. Os EUA viram sua influência diminuir na região.</p><blockquote>📌 <em>A América Latina se tornou campo de disputa entre EUA e China pela influência econômica e política no século XXI.</em></blockquote>`,
        quiz:{q:'Qual o impacto da China na América Latina no século XXI?',opts:["Nenhum","Tornou-se maior parceiro comercial de vários países, investindo em infraestrutura e recursos","Invadiu militarmente a região","Apenas vendeu produtos baratos"],correct:1},

        id:22, name:'A África: O Continente Disputado', dur:'15min',
        content:`<h3>A África: O Continente Disputado</h3><p>A África no século XXI é simultaneamente o continente de maior potencial e o campo de batalha mais intenso pela influência entre grandes potências.</p><h4>Demografia e Recursos</h4><p>Com <strong>1,4+ bilhão de habitantes</strong> (projetados para 2,5 bilhões em 2050) e idade mediana de 19 anos, a África possui a força de trabalho do futuro. Recursos indispensáveis: cobalto, coltan, lítio, ouro, urânio, petróleo, terras raras.</p><h4>A Corrida pelas Potências</h4><ul><li><strong>China:</strong> Investimentos massivos em infraestrutura sem condicionalidades democráticas</li><li><strong>Rússia:</strong> Grupo Wagner/África Corps oferece segurança em troca de recursos e influência</li><li><strong>Turquia, Emirados, Índia:</strong> Expansão agressiva de presença</li></ul><h4>Golpes e Sentimento Antifrancês</h4><p>Golpes militares no Mali, Burkina Faso, Níger e Gabão (2020-2023) acompanhados por sentimento antifrancês e aproximação com Moscou.</p><h4>AfCFTA</h4><blockquote>💡 <em>A Zona de Livre Comércio Continental Africana, lançada em 2021, ambiciona criar o maior mercado livre do mundo por número de países — mas a implementação enfrenta enormes desafios.</em></blockquote>`,

        cards:[{q:'Por que a África é estrategicamente importante para a China?',a:'Recursos naturais essenciais (cobalto, lítio, terras raras), mercado crescente, votos em organismos internacionais, investimento sem exigir reformas democráticas.'}]

        id:23, name:'BRICS e a Redefinição do Sul Global', dur:'15min',
        content:`<h3>BRICS e a Redefinição do Sul Global</h3><p>O agrupamento BRICS evoluiu de acrônimo do Goldman Sachs (2001) para fórum geopolítico que ambiciona reformar a ordem internacional.</p><h4>Expansão 2024</h4><p>Incorporação de Egito, Etiópia, Irã, Arábia Saudita e Emirados — reunindo países com quase metade da população mundial e mais de um terço do PIB global.</p><h4>A Premissa</h4><p>A arquitetura institucional global reflete o equilíbrio de poder de <strong>1945, não de hoje</strong>. A China é a 2ª economia mas sem voto proporcional no FMI. A Índia tem 1,4 bilhão de habitantes sem cadeira permanente no Conselho de Segurança.</p><h4>Instituições Alternativas</h4><ul><li><strong>Novo Banco de Desenvolvimento (NDB):</strong> Financiamento sem condicionalidades do Banco Mundial</li><li><strong>Arranjo Contingente de Reservas (CRA):</strong> Mecanismo financeiro de emergência</li><li><strong>Desdolarização:</strong> Acordos em moedas locais se multiplicam</li></ul><h4>Contradições</h4><blockquote>⚠️ <em>China e Índia são rivais geopolíticos, Arábia Saudita e Irã foram inimigos até recentemente, sistemas políticos variam de democracias a teocracias. O grupo é mais eficaz como contestação do que como construtor de alternativa coerente.</em></blockquote>`,
        quiz:{q:'Qual é a maior contradição interna dos BRICS?',opts:["Todos são democracias","China e Índia são rivais e membros têm sistemas e interesses divergentes","O grupo não tem membros relevantes","Todos concordam em substituir o dólar"],correct:1},

      {
        id:24, name:'Desigualdade Global e Migração', dur:'15min',
        content:`<h3>Desigualdade Global e Migração</h3><p>A desigualdade global e as migrações massivas são fenômenos definidores do século XXI, interconectados com conflitos, mudanças climáticas e fracassos de governança.</p><h4>Desigualdade</h4><p>O <strong>1% mais rico</strong> possui mais riqueza que os 50% mais pobres combinados. A diferença de expectativa de vida entre países ricos e pobres pode chegar a 30 anos.</p><h4>Migrações Recordes</h4><p><strong>280+ milhões</strong> de migrantes internacionais em 2023, incluindo 100+ milhões de deslocados forçados — o maior número já registrado. Causas: guerras (Síria, Ucrânia, Sudão), colapsos econômicos (Venezuela), perseguição e desastres climáticos.</p><h4>Impacto Político</h4><ul><li>Partidos anti-imigração cresceram em toda Europa</li><li>Brexit (2016) parcialmente impulsionado por sentimento anti-imigração</li><li>Migração pela fronteira sul dos EUA tornou-se questão polarizante</li></ul><h4>Migrações Climáticas</h4><blockquote>⚠️ <em>O Banco Mundial estima 216 milhões de migrantes climáticos internos até 2050 devido a secas, inundações e colapso agrícola.</em></blockquote>`,

        id:25, name:'Mudanças Climáticas como Fator Geopolítico', dur:'15min',
        content:`<h3>Mudanças Climáticas como Fator Geopolítico</h3><p>As mudanças climáticas se tornaram uma das forças geopolíticas mais transformadoras do século XXI.</p><h4>Novos Vencedores e Perdedores</h4><p>A transição energética redistribui poder: petro-Estados enfrentam risco existencial, enquanto detentores de minerais críticos ganham importância. A <strong>China domina a cadeia de tecnologias verdes</strong>: 80% dos painéis solares, 60% das turbinas eólicas, líder em veículos elétricos e baterias.</p><h4>O Ártico</h4><p>O derretimento do gelo abre rotas comerciais e expõe vastas reservas. Rússia, EUA, Canadá, Noruega e Dinamarca disputam soberania. A Rússia militarizou suas bases e a China se autodeclara "potência quase-ártica".</p><h4>Segurança Alimentar e Hídrica</h4><ul><li>Mudanças nos padrões de chuva afetam produtividade agrícola globalmente</li><li>Primavera Árabe foi parcialmente desencadeada por alta nos preços de alimentos</li><li>Bacias compartilhadas (Nilo, Jordão, Tigre-Eufrates, Mekong) são focos de conflito potencial</li></ul><blockquote>📌 <em>O Acordo de Paris (2015) estabeleceu meta de 1,5°C, mas trajetórias atuais apontam para 2,5-3°C — cenário que cientistas descrevem como catastrófico.</em></blockquote>`,

      {
        id:26, name:'Inteligência Artificial e o Futuro do Poder', dur:'15min',
        content:`<h3>Inteligência Artificial e o Futuro do Poder</h3><p>A IA é consensualmente a tecnologia mais transformadora do século XXI, com potencial para redefinir economia, poder militar e governança.</p><h4>Avanços Recentes</h4><p>Modelos de IA generativa demonstraram capacidades revolucionárias: geração de texto, imagens, vídeos, codificação de software e raciocínio cada vez mais sofisticado.</p><h4>Dimensão Militar</h4><ul><li>Drones autônomos e sistemas de defesa inteligentes</li><li>Análise de inteligência e ciberarmas autônomas</li><li>Debate urgente sobre <strong>armas autônomas letais (LAWS)</strong></li></ul><h4>Impacto Econômico</h4><p>Até <strong>300 milhões de empregos</strong> podem ser afetados por automação baseada em IA. Países líderes terão vantagens enormes; retardatários arriscam irrelevância econômica.</p><h4>Riscos e Governança</h4><blockquote>⚠️ <em>EUA, UE e China adotam abordagens regulatórias radicalmente diferentes, sem acordo internacional vinculante. A corrida pela IA é a corrida armamentista do século XXI.</em></blockquote>`,

        id:27, name:'A Nova Corrida Espacial', dur:'15min',
        content:`<h3>A Nova Corrida Espacial</h3><p>O espaço voltou a ser arena de competição geopolítica, mas com o setor privado como protagonista.</p><h4>Revolução Privada</h4><p><strong>SpaceX</strong> revolucionou com foguetes reutilizáveis e o sistema Starlink (6 mil+ satélites). Blue Origin, Virgin Galactic e dezenas de startups transformam a economia espacial.</p><h4>Competição Estatal</h4><ul><li><strong>China:</strong> Estação Tiangong, rovers em Marte e Lua, planos para base lunar</li><li><strong>EUA:</strong> Programa Artemis para retorno à Lua e missões a Marte</li><li><strong>Índia, Japão, Emirados:</strong> Programas com sofisticação crescente</li></ul><h4>Dimensão Militar</h4><p>Satélites são essenciais para comunicações, GPS, inteligência e alerta de mísseis. China e Rússia demonstraram capacidades antisatélite. Os EUA criaram a <strong>Space Force</strong> em 2019.</p><h4>Economia do Futuro</h4><blockquote>💡 <em>Economia espacial projetada para US$1 trilhão até 2040: mineração de asteroides, turismo espacial, manufatura em microgravidade. O controle do espaço pode ser tão decisivo quanto o controle dos mares em séculos anteriores.</em></blockquote>`,

        id:28, name:'Cenários para 2050: Ordem ou Desordem Mundial?', dur:'15min',
        content:`<h3>Cenários para 2050: Ordem ou Desordem Mundial?</h3><p>As tendências atuais permitem vislumbrar possibilidades que variam do otimista ao catastrófico.</p><h4>Cenário 1: Multipolaridade Cooperativa</h4><p>EUA, China, UE, Índia encontram mecanismos de coexistência pacífica e cooperação em desafios globais. Instituições reformadas dão voz proporcional a potências emergentes. Requer maturidade diplomática que nenhuma grande potência demonstrou plenamente.</p><h4>Cenário 2: Bifurcação em Dois Blocos</h4><p>"Nova Guerra Fria" com cadeias de suprimento, padrões tecnológicos, sistemas financeiros e até Internet separados. Países forçados a escolher lados. Sinais já existem: guerra de chips, desacoplamento, AUKUS vs BRICS.</p><h4>Cenário 3: Desordem Global</h4><p>Crises simultâneas — climática, demográfica, tecnológica, migratória — sobrecarregam a governança. Conflitos se multiplicam, Estados colapsam, populismos avançam.</p><h4>Variáveis-Chave</h4><ul><li>Relação EUA-China: cooperação, competição ou confronto?</li><li>Transição energética rápida o suficiente?</li><li>Como a IA transformará economias?</li><li>Democracias conseguirão se adaptar?</li></ul><blockquote>📌 <em>O futuro não está escrito — mas as escolhas feitas nesta década serão decisivas.</em></blockquote>`,
