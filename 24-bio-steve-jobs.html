      {
        id:1,
        name:'Origens e Apple',
        dur:'20min',
        content:`<h3>Origens e Apple: Do Nascimento à Revolução</h3><p>Steven Paul Jobs nasceu em 24 de fevereiro de 1955, em São Francisco, Califórnia. Sua história começa de forma notável: Steve era filho adotivo. Sua mãe biológica, Joanne Schieble, era uma estudante não casada de filosofia, e seu pai biológico, Abdulfattah Jandali, era um professor de economia político sírio. Os pais biológicos não poderiam criar uma criança, então colocaram Steve para adoção. Steve foi adotado por Paul Jobs, um mecânico, e Clara Jobs, uma contadora. Paul não era um homem fino, tinha apenas formação técnica, mas criou um ambiente em que a curiosidade era encorajada e onde coisas podiam ser desmontadas e reconstruídas para aprender como funcionavam.</p><p>A infância de Steve foi marcada por essa disposição para explorar. Ele frequentava uma escola média em Mountain View, próximo ao que se tornaria o Vale do Silício. Estava cercado por inovadores, engenheiros e empreendedores. Seu pai, Paul, era um mecânico autodidata que restaurava carros antigos e construía componentes eletrônicos. Steve aprendeu com seu pai que você poderia pegar máquinas, entender como funcionavam, e melhorá-las. Ao mesmo tempo, sua mãe Clara encorajava leitura e apreciação por arte e humanas. Essa combinação de mentalidade técnica e apreciação por artes criou em Steve uma perspectiva única: acreditava que tecnologia não deveria ser meramente funcional, mas também bela e elegante.</p><p>Na adolescência, Steve se envolveu em eletrônica. Conheceu Wozniak, um jovem prodígio de eletrônica alguns anos mais velho, em uma escola de eletrônicos. Wozniak era um gênio de hardware, alguém que podia olhar para circuitos complexos e visualizar como simplificá-los e melhorá-los. Steve não era um gênio de hardware no mesmo nível que Wozniak, mas era um gênio de visão de produto e marketing. Juntos, formariam uma parceria extraordinária. Como muitos estudantes do Vale do Silício dos anos 1970, Jobs frequentou a Universidade de Reed, uma universidade experimental em Portland, Oregon, conhecida por sua cultura liberal, artística e anticonformista. Em Reed, Steve foi exposto a tudo, de arte a zen budismo a filosofia oriental. Embora tenha frequentado Reed por apenas 18 meses (e deixado a universidade), seus estudos em caligrafia e design tiveram impacto profundo em sua estética e visão de design. Frequentemente citaria seus tempos em Reed como tendo fornecido as bases para sua apreciação de tipografia e design elegante.</p><p>Em 1976, Jobs e Wozniak lançaram o Apple I, um computador pessoal pioneiro que poderia ser comprado e levado para casa. O Apple I não era o primeiro computador pessoal, mas foi um dos primeiros completamente funcional e acessível. Jobs e Wozniak a construíram em uma garagem, refletindo a narrativa de startup de garagem que se tornou clichê. Venderam-na por $666,66 (Wozniak escolheu esse preço deliberadamente como uma piada). O computador era basicamente uma placa de circuito, mas provou o conceito. Investidores e entusiastas viram o potencial. Jobs e Wozniak frequentemente descrevem esse período como mágico: tinham pouca experiência de negócios, mas tinham paixão genuína pela ideia de computadores pessoais.</p><p>O Apple II, lançado em 1977, foi o verdadeiro primeiro computador pessoal bem-sucedido comercialmente. Jobs trouxe visão de marketing, enquanto Wozniak traz engenhosidade técnica. O Apple II era elegante, funcional, e acessível. Tinha uma carcaça de plástico limpa (em vez de ser apenas uma placa de circuito como o Apple I), teclado integrado, e monitor em cores. Mais importante, o Apple II teve software útil. A planilha VisiCalc, originalmente escrita para Apple II, o tornou indispensável para contadores e analistas financeiros. Subitamente, computadores pessoais não eram apenas brinquedos para entusiastas; eram ferramentas de negócio genuínos.</p><p>A partir do sucesso do Apple II, Jobs e Wozniak têm uma oportunidade para construir um negócio. Wozniak queria permanecer como engenheiro, focando em design de produtos. Jobs, com sua visão maior, via potencial em construir uma empresa. Jobs trouxe Mike Markkula, um homem de negócios com experiência e capital, que os ajudou a estruturar a Apple Computer Company. A empresa se tornou pública em 1980 em uma das IPOs mais bem-sucedidas de sua era. Jobs e Wozniak se tornaram milionários quase imediatamente. Jobs tinha apenas 25 anos.</p><p>No início dos anos 1980, a Apple era uma empresa em ascensão, mas Jobs era ainda uma figura controversa. Era conhecido por ser temperamental, exigente, e às vezes até cruel com aqueles cujo trabalho ele sentia que não atingia seus padrões. Perfeccionismo de Jobs era lendário. Ele dizia que detalhes menores importavam extraordinariamente. Se uma carcaça de computador tinha uma borda com menos de um milímetro de diferença de outra, Jobs o notaria e exigiria ajustes. Alguns viam isso como obsessão genuína com excelência; outros como arrogância e abuso. A verdade provavelmente estava em ambos.</p><p>Do ponto de vista de lições empresariais, os primeiros anos de Steve Jobs demonstram o poder de visão clara combinada com execução. Jobs não era o melhor engenheiro (Wozniak era), nem era o melhor homem de negócios (Markkula tinha mais experiência), mas tinha uma visão clara de como computadores pessoais poderiam ser bonitos, acessíveis e transformadores. Essa visão era contagiosa. Ele poderia motivar engenheiros a trabalhar incansavelmente para alcançá-la, poderia convencer investidores de que era alcançável, e poderia comunicar aos clientes por que deveriam comprar Apple ao invés de concorrentes. Da perspectiva cristã, o passado de Jobs como filho adotivo moldou sua identidade. Frequentemente refletia sobre o fato de ter sido adotado, vendo isso como significativo para seu caráter. Acreditava que seus pais adotivos tinham escolhido estar ao seu lado, o que criava um senso especial de obrigação de honrar essa escolha através de excelência.</p>`,
        cards:[{q:'Em que ano Steve Jobs e Steve Wozniak lançaram a Apple?',a:'Lançaram o Apple I em 1976 em uma garagem, e o Apple II em 1977.'}]
      },
      {
        id:2,
        name:'Queda e Renascimento',
        dur:'20min',
        content:`<h3>Queda e Renascimento: A Jornada do Fracasso e Retorno</h3><p>A história de Steve Jobs não é uma narrativa linear de sucesso. Contém reveses, fracassos, e um retorno tão improvável quanto interessante. Em 1983, Jobs trouxe John Sculley, presidente da Pepsi, para ser CEO da Apple. A contratação de Sculley refletia a crescente sofisticação da Apple como empresa. Jobs queria alguém com experiência corporativa enquanto ele se focava em estratégia de produtos. Porém, um conflito entre Jobs e Sculley se desenvolveu. Jobs era visibilitário mas às vezes descuidado com detalhes operacionais. Sculley era meticuloso mas às vezes lento em decisões estratégicas. Em 1985, o conselho da Apple, sob pressão de investidores preocupados com o custo de operação e a personalidade temperamental de Jobs, pediu a ele que deixasse a empresa que havia fundado.</p><p>A demissão de Steve Jobs da Apple em 1985 foi uma das mais devastadoras de sua vida, apesar de ser uma das mais formativas. Jobs apenas 30 anos era efetivamente forçado a deixar sua própria empresa. Descreveu o sentimento como semelhante a ser traído. Porém, em um discurso commencement muito depois (Stanford em 2005), Jobs reinterpretaria esse fracasso como sendo verdadeiramente uma bênção disfarçada. A demissão o libertou. Livre dos constrangimentos corporativos, Jobs poderia perseguir novos projetos sem as limitações da vida corporativa.</p><p>Imediatamente após sair da Apple, Jobs fundou a NeXT Computer Company em 1985. NeXT era uma empresa que tentaria construir computadores mais avançados tecnicamente do que aqueles que Apple estava fazendo. Jobs tinha uma visão clara: computadores que eram tão fáceis de usar quanto Apple, mas tão poderosos quanto mainframes. NeXT desenvolveu computador com design extraordinário (o cubo preto NeXT era uma obra de arte), software inovador, e pensamento avançado. Porém, NeXT enfrentou desafios de manufatura e produção. Era um computador caro que não encontrou o mercado mainstream. Hardware de NeXT nunca foi um sucesso comercial.</p><p>Porém, o software NeXT foi transformador. O sistema operacional NeXTSTEP foi um sistema operacional inovador baseado em Unix com uma interface gráfica bela. Tornou-se popular em universidades e pesquisa científica. Universidades como Stanford e MIT usavam computadores NeXT. Uma das razões para o software NeXT ser tão bom era que Jobs contratava os melhores engenheiros e criava um ambiente de inovação. Ainda que NeXT como negócio de hardware tenha fracassado, o software e a cultura de inovação que Jobs construiu tiveram impacto duradouro.</p><p>Enquanto NeXT lutava, outra empresa que Jobs foi envolvido conquistou sucesso extraordinário: Pixar. Em 1986, Jobs comprou a divisão de computadores gráficos da Lucasfilm, a empresa que criou a trilogia Star Wars original. Jobs pagou 10 milhões de dólares por essa divisão. A maioria das pessoas, inclusive analistas de tecnologia, acreditavam que Jobs havia cometido um erro tolo. Computadores gráficos eram uma tecnologia de nicho. O que havia Jobs visto que outros não? Visão de Jobs era que computadores gráficos em 3D poderiam revolucionar a animação. Pixar, sob a liderança de Jobs, se concentrou em desenvolvimento de software de animação e na criação de filmes animados por computador.</p><p>O primeiro longa-metragem da Pixar, "Toy Story", foi lançado em 1995. Foi um sucesso revolucionário. "Toy Story" provou que filmes inteiramente animados por computador não eram apenas viáveis, mas podiam ser emocionalmente poderosos e comercialmente bem-sucedidos. Seguiram-se "A Bug's Life", "Monsters, Inc.", e uma série de sucessos. Pixar se tornou um estúdio de animação de classe mundial. Jobs possuía a Pixar e, quando a empresa se tornou pública, sua ação aumentou dramaticamente em valor. Jobs, que havia perdido o controle da Apple, havia construído e controlava a Pixar. Quando a Disney comprou a Pixar em 2006 por 7,4 bilhões de dólares, Jobs, que ainda era o principal acionista, recebeu uma quantidade significativa de ações da Disney, tornando-o o maior acionista individual da Disney.</p><p>Em 1997, Apple enfrentava dificuldades existenciais. O computador pessoal havia se tornado uma commodity. Microsoft Windows era dominante. A Apple estava perdendo participação de mercado e sua liderança era questionada. Jobs, apesar de não ser mais CEO, ainda era uma figura influente. Ele viu uma oportunidade. Microsoft, sob Bill Gates, havia investido em Apple para mantê-la à tona (uma decisão estratégica para manter a competição viva e evitar aparência de monopolista). Jobs usou essa relação e convenceu o conselho de diretores da Apple a trazê-lo de volta como "Interim CEO" em 1997. Aos 42 anos, Jobs retornava à empresa que havia fundado e da qual havia sido expulso 12 anos antes.</p><p>O retorno de Steve Jobs à Apple em 1997 é uma das histórias de reabilitação corporativa mais espetaculares de todos os tempos. Ele não era mais o jovem visionário dos anos 1970 e 1980. Havia envelhecido, havia sofrido, havia experimentado tanto fracasso quanto sucesso. Mas sua visão de como a tecnologia poderia ser bela, intuitiva e transformadora permanecia intacta. Jobs começou a redesenhar completamente a Apple. Cortou inúmeras linhas de produtos que acreditava que distraíam da missão central. Deixou apenas um computador para negócios, um para consumidores. Contratou os melhores designers, particularmente Jonathan Ive, um designer visionário britânico que compartilhava a obsessão de Jobs com elegância e simplicidade.</p><p>Quando Jobs retornou à Apple, o caminho não foi fácil. A empresa estava em crise. Mas sua visão, combinada com design exemplar, lançou a Apple em sua trajetória de volta. O iBook, uma linha de laptops coloridos e bonitos, re-energizou o negócio consumidor da Apple. Posteriormente, a revisão radical do iMac, com seu design tão iconicamente novo e colorido (desenhado por Jony Ive), capturou a imaginação do público. O iMac não apenas era um computador funcional; era uma obra de arte que as pessoas queriam em suas mesas. Esse foi o retorno bem-sucedido que Jobs perseguiu.</p><p>A perspectiva cristã sobre o fracasso e retorno de Steve Jobs é profunda. Houve um tempo na vida de Jobs quando tudo que havia construído foi tirado dele. Mas ao invés de se render ao desespero, usou esse tempo para explorar, experimentar, e eventualmente retornar mais forte. A Bíblia fala sobre perseverança através de dificuldade e sobre como Deus frequentemente trabalha através de experiências difíceis para moldar nosso caráter. Jobs nunca teria se tornado o líder que foi na volta para Apple se não tivesse experimentado fracasso de forma tão profunda. Seu fracasso o fez humilde, mas não o fez render-se. Isso é uma lição importante para qualquer pessoa em liderança: fracassos, quando enfrentados com resiliência e determinação, podem ser degraus para maiores sucessos.</p>`,
        cards:[{q:'Por que Steve Jobs foi demitido da Apple em 1985?',a:'Foi demitido porque o conselho de diretores, sob pressão de investidores, pediu sua saída devido a conflitos com CEO John Sculley e preocupações com seus custos operacionais e personalidade temperamental.'}]
      },
      {
        id:3,
        name:'Revolução e Legado',
        dur:'20min',
        content:`<h3>Revolução e Legado: iPod, iPhone, iPad e Criatividade</h3><p>O retorno de Steve Jobs à Apple em 1997 foi apenas o começo de uma era de inovação extraordinária. Enquanto Gates e Bezos construíram seus impérios através de domínio de mercado e escala, Jobs construiu seu segundo ato através de design radical, intuição de produto, e obsessão com a experiência do usuário. Em 2001, Jobs lançou o iPod, um reprodutor de música digital portátil. Isso pode não soar revolucionário em retrospectiva, mas em 2001, a música digital era ainda um conceito novo. A maioria dos "MP3 players" de então eram desajeitados, com interfaces confusas, e com bateria ruim. O iPod era diferente. Tinha um design limpo, interface intuitiva (a roda de navegação giratória era inovadora), e capacidade de armazenar milhares de músicas. Mas ainda mais importante, o iPod funcionava com o iTunes, uma aplicação que permitia que usuários comprassem músicas legalmente pela internet.</p><p>O iTunes Store, lançado em 2003, foi revolucionário. Enquanto a indústria fonográfica tentava proteger sua propriedade intelectual e criminalizar compartilhamento de música, Jobs persuadiu as grandes gravadoras a permitir que suas músicas fossem vendidas por 99 centavos cada através do iTunes. O modelo funcionou brilhantemente. As pessoas preferiram comprar músicas legalmente por um preço justo do que roubar. O iTunes Store se tornou a maior varejista de música do mundo, gerando receita para a indústria fonográfica enquanto permitia que Apple capturasse uma margem significativa. O iPod e iTunes demonstraram que Jobs entendeu a importância de ecossistemas: hardware, software, e conteúdo trabalhando juntos de forma harmoniosa.</p><p>O sucesso do iPod e iTunes transformou Apple de um fabricante de computadores em uma empresa de tecnologia geral. Jobs enxergava a convergência de tecnologia, artes liberais, e humanidades que havia buscado sua carreira inteira. Seus discursos comuns refletiam isso. Frequentemente citava Picasso: "Pessoas boas copiam, pessoas grandes roubam." Ele estava dizendo que a criatividade veio de tomar ideias de muitos campos e combiná-las de forma nova. Isso era exatamente o que Jobs fazia: pegava ideias de design de carros, de interfaces de usuário de Xerox, de simplicidade de filosofia japonesa, e as combinava para criar produtos que eram ao mesmo tempo belos e funcionais.</p><p>O verdadeiro apogeu da visão de Jobs veio com o lançamento do iPhone em 2007. A maioria das pessoas já tinha telemóveis em 2007, mas eles eram desajeitados. Tinham teclados físicos pequenos, telas pequenas, e eram difíceis de navegar. Jobs viu uma oportunidade. Imaginou um telemóvel que era principalmente uma tela de toque, sem teclado físico. Isso era audacioso. A indústria de telemóveis era dominada por empresas como Motorola e Nokia que eram conservadoras em design. Jobs reuniu sua equipe de designers, engenheiros, e especialistas em interface de usuário, e concebeu o iPhone. O anúncio do iPhone em janeiro de 2007 foi espetacular. Jobs apresentou pessoalmente, vestido casualmente em sua marca pessoal de jeans e gola alta, e demonstrou como o iPhone funcionava. Pessoas ficaram impressionadas.</p><p>O iPhone revolucionou a indústria de telemóveis. Dentro de alguns anos, a maioria dos telemóveis do mundo eram smartphones similares ao iPhone. Apple conseguiu cobrar preços premium porque os consumidores viam valor em qualidade, design, e integração com outros produtos Apple. O iPhone fez mais do que qualquer outro produto para transformar Apple em uma empresa de valor extraordinário. Seguiu-se o iPad, um tablet que Jobs acreditava seria um novo tipo de computador pessoal. Inicialmente, críticos questionaram a utilidade de um iPad. Mas Jobs enxergou corretamente que as pessoas queriam algo entre um telemóvel e um laptop: algo portátil, intuitivo, e adequado para consumo de conteúdo.</p><p>A saúde de Steve Jobs começou a deteriorar no final dos anos 2000. Em 2003, havia recebido diagnóstico de câncer de pâncreas. Surpreendentemente, aquele era um tipo raro de câncer de pâncreas que era mais lentamente progressivo que o tipo típico. Jobs subsequentemente teve cirurgia e aparentemente se recuperou. Porém, em 2008, começou a parecer mais magro e frágil. Rumores de piora de saúde circulavam. Jobs, mantendo sua privacidade, não divulgava detalhes de sua condição. Em 2011, aos 56 anos, Jobs renunciou como CEO da Apple, designando Tim Cook, um operador de negócios brilhante, como seu sucessor. Jobs permaneceu como presidente. Apenas algumas semanas depois, em outubro de 2011, Steve Jobs faleceu.</p><p>A morte de Steve Jobs foi amplamente lamentada. Ele havia se tornado uma figura culturalmente tão significativa que seu falecimento pareceu um momento seminal para a tecnologia. Tributos poured in de pessoas em todo o mundo. Até pessoas que não conheciam Jobs pessoalmente sentiram conexão emocional a ele porque seus produtos haviam se tornado partes tão integrais de suas vidas. A Apple, que havia quase falido em 1997, era agora uma das empresas mais valiosas do mundo. Seus produtos eram possuídos por centenas de milhões de pessoas. Jobs havia transformado não apenas a tecnologia, mas a forma como as pessoas interagem com tecnologia.</p><p>O legado de Steve Jobs é particularmente sobre a intersecção de tecnologia e humanidades. Em um mundo onde as empresas tech frequentemente focam puramente em performance técnica, Jobs insistia que design, beleza, e simplicidade importavam. Criou um ecossistema tão elegante e integrado (hardware, software, aplicativos, serviços) que desafiou a concorrência para acompanhar. Seus sucessores na Apple têm continuado sua visão, e Apple permanece uma das empresas mais admiradas do mundo.</p><p>Pessoalmente, a vida de Steve Jobs é uma história sobre perseverança, visão, e morte. Jobs enfrentou adversidade significativa: era adotivo, havia sido rejeitado pela empresa que fundou, havia sofrido câncer. Porém, sua disposição para perseverar, sua criatividade extraordinária, e sua exigência de excelência permitem que ele deixe um legado duradouro. Seu discurso de commencement em Stanford em 2005, pouco antes de sua morte, é um dos discursos mais tocantes sobre vida, morte, e viver com propósito já proferidos por alguém de negócios. Refletindo sobre sua morte inevitável, Jobs falou sobre simplicidade e vivendo cada dia como se fosse o último. Essa perspectiva filosoficamente profunda, combinada com seu gênio para design de produto, é talvez o que o distinguiu entre seus contemporâneos.</p><p>Da perspectiva cristã, a vida e morte de Steve Jobs levanta questões teológicas profundas. Jobs era budista e frequentemente citava filosofia oriental. Não era cristão declarado. Porém, seu discurso sobre morte, sua reflexão sobre significado e propósito, e sua dedicação a criar coisas belas ecoam com valores cristãos de mordomia, criação, e busca de significado. Para qualquer pessoa em liderança criativa ou empresarial, a vida de Steve Jobs oferece um modelo poderoso: a possibilidade de sucesso extraordinário através de visão clara, execução excelente, design belo, e recusa a aceitar mediocridade. Sua morte prematura também serve como lembrete de que a vida é finita e que devemos usar nosso tempo para criar coisas significativas.</p>`,
        cards:[{q:'Em que ano Steve Jobs lançou o iPhone?',a:'O iPhone foi lançado em janeiro de 2007.'}]
      }
    ],
