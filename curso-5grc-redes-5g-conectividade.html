      id: 'HSTL',
      name: 'Histórico de Gerações de Redes',
      content: `<h4>Do 1G ao 5G: a revolução contínua</h4><p><strong>Cada geração de rede móvel trouxe mudanças fundamentais</strong>. Você está vivendo a quarta revolução; a quinta está aqui. Compreender história ajuda entender futuro.</p><p><strong>1G (1981)</strong>: Primeiros telefones celulares. Analógicos, volumosos, baterias fracas. Qualidade ruim, cobertura limitada. "Carro móvel" era melhor nome que celular.</p><p><strong>2G (1991)</strong>: GSM (Global System for Mobile). Voz digital, SMS. Revolucionário: SMS permitiu comunicação assíncrona. Telefones menores. Roaming internacional.</p><blockquote class="tip">Dica: SMS foi subproduto inesperado. Ninguém estimou demanda; adolescentes criaram mercado de mensagens.</blockquote><p><strong>3G (2001)</strong>: UMTS. Dados em tempo real. Primeiros smartphones. Você poderia acessar internet "móvel", não só voz. Lento (0.5-2 Mbps), mas revolucionário.</p><p><strong>4G/LTE (2009)</strong>: Long Term Evolution. 5-100 Mbps. Mudança qualitativa: streaming de vídeo, apps, redes sociais. Smartphone como computador principal se tornou realidade.</p><blockquote class="example">Exemplo: 3G permitia email, mas lento. 4G permitia YouTube. Essa diferença de velocidade transformou comportamento: 3G era funcional, 4G era experiência.</blockquote><p><strong>5G (2019+)</strong>: Até 10 Gbps. Latência ultra-baixa (1ms). Densidade de dispositivos altíssima (1 milhão/km²). Não é só mais rápido; é diferente. Habilita IoT, drones, carros autônomos.</p><p><strong>Padrão**: cada geração 10x mais rápida e 10x menor latência. Espectro muda, arquitetura muda, aplicações mudam. Não é upgrade; é revolução.</p><blockquote class="quote">\"5G não é 4G melhorado. É arquitetura completamente nova que habilita coisas impossíveis antes.\"</blockquote><p>Você aprenderá que evolução contínua é motor de tecnologia móvel.</p>`},
    {
      id: 'FNDM',
      name: 'Fundamentos de Telecomunicações',
      content: `<h4>O ABC das redes sem fio</h4><p><strong>Redes móveis usam ondas eletromagnéticas</strong>. Frequência, comprimento de onda, potência, modulação são fundamentais. Sem entender, 5G é mágica; com entender, é engenharia.</p><p><strong>Espectro eletromagnético</strong>: Rádio (MHz), Micro-ondas (GHz), Infrared, UV, etc. Redes móveis usam bandas específicas: LTE em 700MHz-2.6GHz, 5G em 2.6GHz-28GHz+.</p><p><strong>Frequência e comprimento de onda**: Inversamente relacionados. Frequência alta = comprimento curto = viaja menos longe = precisa mais antenas. 5G (28GHz) viaja menos que 4G (2GHz), por isso precisa células menores.</p><blockquote class="tip">Dica: Frequência alta é "caro" em distância, mas "barato" em latência e capacidade. Trade-off fundamental.</blockquote><p><strong>Modulação**: Forma como informação é codificada na onda. 4G usa OFDM. 5G usa OFDM melhorado. Modulação melhor = capacidade maior com mesma energia.</p><p><strong>Antenas e MIMO</strong>: Multiple Input Multiple Output. 4G tem 2x2 ou 4x4. 5G tem 64x64 ou mais. Múltiplas antenas significam múltiplos streams de dados simultâneos = capacidade exponencial.</p><blockquote class="example">Exemplo: Célula 4G com 4x4 MIMO = 4 streams. Se cada stream é 100Mbps = 400Mbps total. Célula 5G com 64x64 MIMO = 64 streams. Se cada é mesmo 100Mbps = 6.4 Gbps. Diferença: MIMO.</blockquote><p><strong>Codificação e modulação**: Técnicas para comprimir mais dados em mesma banda. Shannon limit diz qual é máximo teórico; técnicas novas se aproximam desse limite.</p><p><strong>Duplex e duplexação**: Full-duplex (falar e ouvir simultaneamente) vs Half-duplex (alternancia). 4G é hybrid; 5G tende Full-duplex com TDD (time division duplex).</p><blockquote class="quote">\"Entender espectro é entender limitações e possibilidades de redes móveis.\"</blockquote><p>Você aprenderá física e engenharia por trás das redes que você usa diariamente.</p>`},
    {
      id: 'ARCH',
      name: 'Arquitetura de Redes Móveis',
      content: `<h4>Como redes móveis são organizadas</h4><p><strong>Rede móvel tem três partes: dispositivo, rede acesso, rede core</strong>. Compreender arquitetura revela por que 5G é melhor.</p><p><strong>Dispositivo (UE)</strong>: Seu telefone. Tem antenas, rádio, SIM. Comunica com base station mais próxima usando espectro alocado.</p><p><strong>Rede de acesso (RAN - Radio Access Network)</strong>: Base stations (torres celulares). Cada célula cobre ~1km (cidade) a 10km (rural). Quando você se move entre células, handoff automático acontece.</p><p><strong>4G vs 5G RAN**: 4G tem arquitetura centralizada. 5G é distribuída (Distributed RAN ou DU). Fronthaul (conexão entre DU e CU) precisa alta performance. Isso permite latência menor.</p><blockquote class="tip">Dica: Menor latência em 5G vem de arquitetura distribuída, não só frequência. Design de rede importa tanto quanto espectro.</blockquote><p><strong>Rede Core**: Switches, routers, bancos de dados. Conecta todas as células. Roteia chamadas, gerencia dados, executa policy (QoS, throttling). 5G Core é completamente novo, cloud-native, baseado em containers.</p><p><strong>Backhaul</strong>: Fibra/microondas conectando base station ao core. 4G usava fibra ou microondas. 5G também, mas requisitos de latência são rígidos.</p><blockquote class="example">Exemplo: Call de vídeo entre dois smartphones. 1) Teu phone → base station (RAN). 2) RAN → Core. 3) Core → base station destino. 4) Base station → phone destino. Qualquer gargalo quebra qualidade. 5G otimiza cada etapa.</blockquote><p><strong>Slicing**: Fatiar rede virtual. Banco pode ter slice crítico (ultra-confiável), video pode ter slice relaxado. Mesmo espectro, diferentes serviços, diferentes QoS. Novo em 5G.</p><p><strong>Edge Computing**: Computação perto do usuário, não em data center remoto. 5G + MEC (Multi-Access Edge Computing) = latência ainda menor, aplicações locais possíveis.</p><blockquote class="quote">\"Arquitetura 5G não é upgrade de 4G; é redesenho completo baseado em princípios novos.\"</blockquote><p>Você aprenderá como redes trabalham por trás da cortina.</p>`},

      content: `<h4>Números que contam história</h4><p><strong>Comparação técnica revela o quão maior é o passo 5G</strong>. Não é upgrade linear; é mudança qualitativa.</p><p><strong>Latência**: 4G: 50ms. 5G: 1ms. 6G teórico: 0.1ms. Diferença: 4G é "sentir" delay em chamada. 5G é "instantâneo" em aplicações críticas (cirurgia remota). 6G é imperceptível humano.</p><p><strong>Velocidade**: 4G: até 100 Mbps prático. 5G: até 10 Gbps prático. 6G: teórico 100+ Gbps. Diferença: 4G para streaming. 5G para download de filme em segundos. 6G para hologramas live.</p><p><strong>Densidade de conexão**: 4G: 60 mil/km². 5G: 1 milhão/km². 6G: indefinido, mas esperado 100+ milhões/km². Diferença: 4G para cidades. 5G para estádio lotado. 6G para "smart dust" (sensores minúsculos ubíquos).</p><blockquote class="tip">Dica: Latência é métrica mais importante, não velocidade. Velocidade importa para download; latência importa para interatividade.</blockquote><p><strong>Espectro usado**: 4G: até 3 GHz. 5G: até 100 GHz (mmWave). 6G: até 300+ GHz (terahertz). Frequência alta = capacidade exponencial, mas alcance reduzido.</p><p><strong>Eficiência energética**: 4G: ~1 byte/joule. 5G: ~10 bytes/joule. 6G: esperado 100+. Significado: 5G transmite mesmo volume com menos bateria. Importante para IoT.</p><blockquote class="example">Exemplo: Teleconferência em 4G é pixelado, lag notável. 5G é clara, zero lag. 6G seria holograma 3D em tempo real. Diferença em latência faz aplicações completamente diferentes viáveis.</blockquote><p><strong>Banda disponível**: 4G: ~100 MHz por banda. 5G: até 400 MHz (FR1) ou 800 MHz (FR2 mmWave). Mais banda = capacidade maior.</p><p><strong>Alcance**: 4G: 2-10km típico. 5G: 300m-1.5km típico (mmWave menor, sub-6GHz parecido com 4G). 6G: incerto. Frequência alta viaja menos, precisa mais cells.</p><blockquote class="quote">\"5G não é revolucionário por velocidade. É por latência ultra-baixa que habilita novas aplicações.\"</blockquote><p>Você aprenderá que números revelam capacidades, não só velocidade do download.</p>`}

  topics: [
    {
      id: 'FRQN',
      name: 'Frequências e Bandas 5G',
      content: `<h4>Onde 5G transmite</h4><p><strong>5G usa duas principais faixas: FR1 (Sub-6 GHz) e FR2 (mmWave acima de 24 GHz)</strong>. Cada uma tem trade-offs únicos.</p><p><strong>FR1 (Sub-6 GHz)</strong>: 450MHz a 6GHz. Alcance excelente (1-2km). Viaja através paredes. Velocidade moderada (até 1 Gbps real). Desvantagem: menos banda disponível, espectro congestionado.</p><p><strong>Bandas FR1 comuns**: n78 (3.5 GHz, Brasil), n77 (3.5 GHz, China), n79 (4.5 GHz, vários países). Estas são "primeira onda" de 5G.</p><blockquote class="tip">Dica: BR usa principalmente n78 em 3.5 GHz. Seu telefone 5G precisa suportar n78 para funcionar bem.</blockquote><p><strong>FR2 (mmWave)</strong>: 24-100 GHz. Alcance curto (300m-1km). NÃO penetra paredes bem. Velocidade extrema (até 10 Gbps real). Vantagem: banda ENORME disponível (não congestionada).</p><p><strong>Bandas FR2 comuns**: n257 (28 GHz), n258 (26 GHz), n260 (39 GHz). EUA usa 28 e 39 GHz. Brasil está explorando, mas não implementado em massa.</p><p><strong>Vantagem Sub-6**: Cobertura, penetração. "Real" 5G que chega em casa. Desvantagem: velocidade moderada, menos especial que mmWave.</p><blockquote class="example">Exemplo: Você está em rua. Smartphone conecta Sub-6 5G (n78), obtém ~500 Mbps, funciona bem em qualquer lugar. Em estádio com mmWave, obtém ~5 Gbps, mas só em linha de visão com antena.</blockquote><p><strong>Desvantagem mmWave**: Alcance curto, penetração pobre. Mas latência é melhor. Ideal para indoor de alta densidade (estádios, aeroportos) ou links ponto-a-ponto.</p><p><strong>Mid-band**: Termo não-oficial para 3.5-6 GHz. Melhor compromisso entre cobertura e capacidade. "Ouro" de 5G. Brasil investe aqui.</p><blockquote class="quote">\"Sub-6 5G é para massa. mmWave é para hotspots. Ambos são 5G; contextos diferentes.\"</blockquote><p>Você aprenderá que frequência determina aplicação.</p>`},
    {
      id: 'TXEC',
      name: 'Transmissão e Codificação',
      content: `<h4>Como dados viajam pelo ar</h4><p><strong>5G otimiza cada bit</strong>. Modulação, codificação, MIMO work together para máxima capacidade em espectro disponível.</p><p><strong>OFDM (Orthogonal Frequency Division Multiplexing)</strong>: Divide banda em múltiplas sub-carriers. Cada sub-carrier é portadora de dados. Ortogonal significa sem interferência. 4G usa OFDM. 5G usa OFDM-A (melhorado).</p><p><strong>Modulação em 5G</strong>: QPSK (4 estados), 16-QAM, 64-QAM, 256-QAM. Quanto mais estados, mais bits por símbolo, mas requer sinal mais limpo. 4G para a em 256-QAM; 5G continua aí. Não é diferença maior.</p><blockquote class="tip">Dica: Modulação alta (256-QAM) requer sinal bom. Se sinal ruim, automático degrada para QPSK. Adaptativo baseado qualidade.</blockquote><p><strong>Codificação (FEC - Forward Error Correction)</strong>: Adiciona redundância. Se alguns bits são perdidos, pode recuperar. LDPC é novo código em 5G (vs Turbo code em 4G). LDPC é mais eficiente em latência baixa.</p><p><strong>MIMO (Multiple-Input Multiple-Output)</strong>: 4G tipicamente 4x4. 5G pode ser 64x64 (ou até 256x256 em futuro). 64 antenas = 64 streams simultâneos = 16x capacidade de 4x4. Diferença é gigante.</p><p><strong>Beamforming**: Antenas apuntam sinal direto a usuário, não dispersa. Melhora SNR (signal-to-noise ratio). Essencial para mmWave pois sinal é fraco.</p><blockquote class="example">Exemplo: Antena transmite em 28 GHz mmWave. Sem beamforming, sinal se dispersa, atenuação enorme. Com beamforming (256 antenas apontando você), sinal concentrado, recepção boa. Diferença é dia/noite.</blockquote><p><strong>Massive MIMO e hybrid precoding**: 64x64 MIMO em frequência alta (mmWave) requer muita circuitaria. Solução: hybrid—alguns beamforming em RF (analog), depois processamento digital. Reduz complexidade.</p><p><strong>Spatial Multiplexing**: Transmite múltiplos streams para mesmo usuário simultaneamente. Usuario tem múltiplas antenas, recebe múltiplos streams, combina. Capacidade linear com número de antenas (até limite de canais).</p><blockquote class="quote">\"5G multiplica capacidade via MIMO. 64 antenas vs 4 é diferença entre gridlock e autoestrada vazia.\"</blockquote><p>Você aprenderá que transmissão em 5G é orquestração complexa de técnicas.</p>`},
    {
      id: 'QOS',

      content: `<h4>Garantindo experiência</h4><p><strong>QoS (Quality of Service) é promessa: você obtém X Mbps, Y ms latência, Z% confiabilidade</strong>. Antes, era "melhor esforço". 5G é diferente.</p><p><strong>Ultra-Reliable Low-Latency Communication (URLLC)</strong>: Até 99.999% confiabilidade, 1ms latência. Para cirurgias, carros autônomos, drones. Trade-off: menos throughput para mais confiabilidade.</p><p><strong>Enhanced Mobile Broadband (eMBB)</strong>: Velocidade alta (até 10 Gbps), latência moderada (10ms OK). Para streaming, download. Volume alto, confiabilidade moderada.</p><p><strong>Massive Machine Type Communication (mMTC)</strong>: Bilhões de dispositivos IoT, latência relaxada (100ms OK), pouca dados por device. Densidade extrema, não velocidade.</p><blockquote class="tip">Dica: 5G tem múltiplas "sabores". URLLC é diferente de eMBB. Escolha certo para aplicação.</blockquote><p><strong>Network Slicing viabiliza isto</strong>. Operador cria slice URLLC com garantia, slice eMBB com melhor esforço, slice mMTC com densidade. Mesmo espectro, diferentes contratos.</p><p><strong>Latência em 5G**: RAN contribui ~1ms (vs 50ms em 4G). Core contribui ~5-10ms (fiber speed of light). Total: ~10ms possível (vs 50-100ms em 4G). Gigante diferença.</p><blockquote class="example">Exemplo: Cirurgia remota. Médico em São Paulo, paciente em Rio. Câmera → São Paulo (5ms), feedback → Rio (5ms), total ~10ms round-trip. Imperceptível. Em 4G (100ms), seria desconcertante.</blockquote><p><strong>Redundância e failover**: Para URLLC, dados viajam múltiplos caminhos. Se um falha, outro continua. Overhead, mas confiabilidade aumenta exponencialmente.</p><p><strong>Orchestration e SDN**: Software-Defined Network permite roteamento dinâmico. Se caminho A está congestionado, muda para B. Inteligência em software, não hardware.</p><blockquote class="quote">\"QoS em 5G é diferença entre "hope for best" e "guarantee performance\".\"</blockquote><p>Você aprenderá que confiabilidade é planejada, não acidental.</p>`},
    {
      id: 'SEC',
      name: 'Segurança em 5G',
      content: `<h4>Proteção contra ameaças modernas</h4><p><strong>5G é mais vulnerável que 4G</strong>—maior superfície de ataque. Mitigações incorporadas, mas complexidade aumenta risco.</p><p><strong>Aumentos de atacantes</strong>: Mais dispositivos IoT = mais pontos de entrada. mmWave e frequências altas permitem direcionamento de sinal (menos espionagem?). Mas SDN e cloud core = novo vetor de ataque.</p><p><strong>Authentication e encryption**: 5G reforça. SIM authentication obrigatória (4G era optional). Criptografia em camadas (PHY, MAC, RLC). Mas chaves devem ser gerenciadas bem.</p><blockquote class="tip">Dica: 5G é tão seguro quanto sua implementação. Backdoors em hardware (chips), protocols fracos em software, configuração pobre = inseguro.</blockquote><p><strong>Geopolitics**: China vs. EUA batalhando sobre Huawei/ZTE equipment. Preocupação: backdoors em RAN. Brasil navegando tensão—Huawei fez muito de 4G, compete em 5G.</p><p><strong>Network slicing security**: Isolação entre slices. URLLC slice isolado de mMTC. Se um violado, outros protegidos. Mas orquestrator é ponto crítico.</p><p><strong>API security**: 5G expõe muitas APIs (MEC, edge). APIs abertas = conveniência, mas também risco. Autenticação, autorização, throttling são críticos.</p><blockquote class="example">Exemplo: Banco usa 5G URLLC para transações. Ataque em slice de video não afeta slice de banco. Isolação funciona. Mas se ataque direto em slice de banco, falha (requer autenticação forte, cifrado).</blockquote><p><strong>Quantum resistance**: Criptografia atual (RSA) será quebrada por computador quântico. 5G deve migrar para PQC (Post-Quantum Crypto) nos próximos anos. Pesquisa ativa.</p><p><strong>Zero trust**: Modelo de segurança. Não confie em rede. Autentique tudo sempre. 5G permite granular zero trust via slicing e API management.</p><blockquote class="quote">\"5G mais rápido é óbvio. 5G mais seguro é hard. Vigilância constante é necessária.\"</blockquote><p>Você aprenderá que segurança é processo contínuo, não destino.</p>`}

  free: false,
  topics: [
    {
      id: 'EDCM',
      name: 'Computação de Borda',
      content: `<h4>Trazer processamento perto do usuário</h4><p><strong>Edge computing é paradigma onde processamento acontece perto da fonte de dados</strong>. Em vez de enviar tudo para data center remoto (10-100ms), processa localmente (1-5ms).</p><p><strong>Motivações</strong>: Latência (data center distante é lento). Bandwidth (enviar 4K video para cloud é caro). Privacidade (dados sensíveis não deixam local). Resiliência (offline still works).</p><p><strong>Arquitetura**: Cloud (centrado, poderoso) → Fog (intermediário) → Edge (local). Histórico reverso: Cloud era tudo; agora, inteligência distribuída.</p><p><strong>MEC (Multi-Access Edge Computing)</strong>: Computação no RAN, perto das base stations. Sub-6 GHz pode suportar MEC (mais latência tolerante). mmWave requer MEC (latência crítica).</p><blockquote class="tip">Dica: Edge não substitui cloud. É complemento. Crítico/local em edge; bulk/histórico em cloud.</blockquote><p><strong>Casos de uso**</strong>: 1) Análise de vídeo local (face recognition, crowd detection sem enviar para cloud). 2) Jogos (servidor local para latência <10ms). 3) AR/VR (processamento local de sensor fusion). 4) Automação (robôs decidem localmente).</p><p><strong>Implementação**: Containerização (Docker) para rodar microservices em edge. Orquestração (Kubernetes) para escalar. Importante: resources limitados, deve ser eficiente.</p><blockquote class="example">Exemplo: Câmera de segurança em loja. Modelo ML roda em edge device (Raspberry Pi). Detecta roubo localmente, alerta imediatamente. Se enviasse para cloud, latência 100ms+, muito tarde. Edge resolve em 50ms.</blockquote><p><strong>Latência edge**: ~5-10ms vs cloud ~100ms. Diferença é crítica em aplicações tempo-real.</p><p><strong>Persistência de dados**: Edge pode cachear dados, servir offline. Quando reconecta, sincroniza com cloud. Resiliência aumenta.</p><blockquote class="quote">\"Edge computing é não perguntar 'posso processar em cloud?' mas 'deve processar em edge?'.\"</blockquote><p>Você aprenderá arquitetura distribuída moderna.</p>`},
    {
      id: 'MEC',
      name: 'MEC e 5G',
      content: `<h4>Sinergia natural</h4><p><strong>5G e MEC são feitos um para outro</strong>. 5G fornece bandwidth/latência; MEC fornece processamento local. Juntos, aplicações impossíveis se tornam viáveis.</p><p><strong>Por que 5G+MEC</strong>: 1) RAN latência 1ms. 2) Processamento local 5ms. 3) Total: ~6ms. Em 4G+cloud seria ~150ms. Gigante diferença.</p><p><strong>Casos 5G+MEC</strong>: 1) Cirurgia remota (1ms latência crítica). 2) Carros autônomos (decisão local em <50ms). 3) Drones em ambiente complexo (feedback imediato). 4) Industrial IoT (máquinas decidem localmente).</p><blockquote class="tip">Dica: MEC não é apenas máquinas. É arquitetura onde inteligência está distribuída, não centralizada.</blockquote><p><strong>Arquitetura 5G+MEC**: UE → gNB (5G base station) com MEC co-localizado → cloud. UE obtém latência ultra-baixa para local, pode usar cloud para bulk.</p><p><strong>Orquestração**: Operador decide: este aplicativo roda no edge, esse na cloud. Policy-based. Pode mudar dinamicamente.</p><p><strong>Exemplo prático: Jogos online</strong>. Servidor game em MEC local (1ms latência). Conteúdo (assets, texturas) em cloud CDN (batching OK, latência não importa). Game client em edge envia commands (baixa bandwidth), recebe estado (stream contínua).</p><blockquote class="example">Exemplo: Carro autônomo em São Paulo. LTE base station tem MEC (servidor local). Câmeras → edge ML model → decisão (frenar) em <50ms. Sem MEC, latência seria 150ms, muito tarde se criança corre rua.</blockquote><p><strong>Segurança em MEC**: Dados processados localmente = privacidade melhor. Face recognition em edge phone vs cloud. Mas, edge devices são mais vulneráveis. Trade-off.</p><p><strong>Custonomia**: MEC pode operar offline. Se 5G desconecta, edge continua servindo. Resiliência aumenta.</p><blockquote class="quote">\"5G+MEC é computação distribuída para era de IoT. Não há volta para cliente-servidor centralizado.\"</blockquote><p>Você aprenderá que latência baixa habilita sistemas autônomos.</p>`},
    {
      id: 'APLI',
      name: 'Aplicações Práticas',
      content: `<h4>Exemplos no mundo real</h4><p><strong>Edge computing não é teoria. Já está sendo usado em produção em vários setores</strong>. Exemplos mostram impacto real.</p><p><strong>Logística**: Sensores em containers, processamento local detecta roubo/damage imediatamente. Operador sabe em segundos, não horas.</p><p><strong>Manufatura**: Máquinas CNC com sensores, detecção de anomalia local. Se vibração anormal, máquina para antes danificar. Prevenção vs reação.</p><p><strong>Varejo**: Câmeras na loja, análise de footfall local. "Quantos clientes estão na seção X?" Inventário inteligente, não contagem manual.</p><blockquote class="tip">Dica: Edge viável começou com 5G. 4G latência não permitia. 5G habilita, mas é aplicação + tecnologia.</blockquote><p><strong>Saúde**: Wearables com análise local. Queda detectada imediatamente sem enviar para cloud. Privacidade mantida, latência zero.</p><p><strong>Telecomunicações**: Operador oferece "edge as a service". Desenvolvedor sobe aplicação no edge, atinge latência ultra-baixa.</p><blockquote class="example">Exemplo: Startup de AR realidade aumentada. App roda no edge device de usuário. ML roda em MEC local. Latência <10ms permite AR responsivo. Sem edge, seria 100ms+, desastroso para AR (faz ficar tonto).</blockquote><p><strong>Desafio**: Fragmentação. Cada operador, cada device, diferentes specs. Portabilidade é difícil. Kubernetes ajuda, mas ainda é challenge.</p><p><strong>Futuro**: "Composable edge" onde você encadeia múltiplos edge nodes. Aplicação distribuída entre plusieurs edges. Mais complexo, mas mais poderoso.</p><blockquote class="quote">\"Edge computing é invisível quando funciona bem. Você não sente latência, só pensa 'funciona'.\"</blockquote><p>Você aprenderá que tecnologia é apenas ferramenta; aplicação importa.</p>`},
    {
      id: 'ARQD',
      name: 'Arquitetura de Edge',
      content: `<h4>Desenho de sistemas distribuídos</h4><p><strong>Arquitetura edge requer pensamento diferente de cloud tradicional</strong>. Recursos limitados, latência crítica, resiliência essencial.</p><p><strong>Modelo de carga**: Decisão: esta função roda onde? Local, edge, cloud? Baseado em: latência requerida, recursos disponíveis, data sensitivity.</p><p><strong>Orquestração**: Sistema decide onde rodar workload. Baseado em disponibilidade, load, latência. Kubernetes, OpenStack, ou propietário.</p><p><strong>Resiliência**: Edge desconecta? Sistema funciona offline em modo degradado. Quando reconecta, sincroniza. Eventual consistency, não strong consistency.</p><blockquote class="tip">Dica: Offline-first design é diferente de cloud. Você assume desconexão, planeja recovery. Difícil psicologicamente mas essencial.</blockquote><p><strong>Sincronização de estado**: Se edge processa, cloud deve sincronizar. Conflitos podem ocorrer (versão A e B ambos atualizaram). Resolução é complexa. CRDTs ajudam.</p><p><strong>Observabilidade**: Com múltiplos edges, debugging é hard. Logs, traces, metrics devem ser agregados. ELK stack, Prometheus são padrão.</p><blockquote class="example">Exemplo: Aplicação de delivery. Edge (phone driver) decide rota localmente (GPS, ML, offline). Envia decision para cloud (assíncrono). Cloud verifica, atualiza mapa global. Conflito: driver foi para A, mas cloud recomendou B. Resolução: "driver local sabe melhor", usa decisão local.</blockquote><p><strong>Security**: Edge é mais vulnerável. Criptografia, attestation, secure boot críticos. Mas edge é resource-constrained, trade-off é real.</p><p><strong>Networking**: Latência entre edges pode ser variável. Aplicação deve tolerar jitter. Protocols como QUIC (vs TCP) ajudam tolerância a pacotes perdidos.</p><blockquote class="quote">\"Arquitetura edge é puzzel. Cada peça tem trade-offs. Design holístico é essencial.\"</blockquote><p>Você aprenderá a desenhar sistemas robusto</p>`}
  ],

    {
      id: 'MANU',
      name: 'Manufatura e Indústria 4.0',
      content: `<h4>5G transformando fábricas</h4><p><strong>Indústria 4.0 é sonho de 30 anos. 5G o torna viável</strong>. Latência ultra-baixa, confiabilidade 99.999%, densidade conexão permitem automação completa.</p><p><strong>Wireless em fábrica**: Historicamente, fábricas usavam cabos. Wireless é disruptivo porque máquinas podem mover. Antes: máquina instalada, nunca muda. Depois: máquinas móveis, reconfiguráveis.</p><p><strong>URLLC crítico para manufatura**: Braço robótico precisa latência <50ms para segurança. Produtividade requer uptime >99.99%. Banda larga para vídeo HD de sensores.</p><blockquote class="tip">Dica: Fábrica 5G não é science fiction. Siemens, Samsung, outras iniciativas piloto já em produção.</blockquote><p><strong>Aplicações manufatura**</strong>: 1) AGV (autonomous guided vehicles) em fábrica, navegam sem cabos. 2) Sensores em máquinas, detecção preditiva de falhas. 3) Robots colaborativos com humans, comunicação instantânea. 4) Qualidade via visão computacional em tempo real.</p><p><strong>ROI**: Minimizar downtime, maximizar uptime. Exemplo: fábrica de chips, downtime custa R$1M/hora. Confiabilidade 5G economiza centenas de milhões.</p><blockquote class="example">Exemplo: Montadora de carros. Esteira de produção com 50 robôs, cada um com câmera 4K, sensores diversos. Processamento via MEC, decisões locais <1ms. Antes 4G: latência varia 50-500ms, produção para frequentemente. Depois 5G: latência consistente <10ms, uptime cresce 5%.</blockquote><p><strong>Desafios**: Implementação é cara. Interoperabilidade entre máquinas antigas e 5G é hard. Segurança é crítico (sabotagem via wireless é risco).</p><p><strong>Visão futuro**: "Lights-out" fabricas onde poucos humanos (só supervisão). Robots e ML fazem tudo. Não fiction, mas 10-20 anos.</p><blockquote class="quote">\"Manufatura 5G não é over-hype. Economia é real, implementação está começando.\"</blockquote><p>Você aprenderá que 5G habilita eficiência industrial.</p>`},

      content: `<h4>Carros que se dirigem sozinhos</h4><p><strong>Carros autônomos não são possíveis sem 5G</strong>. Latência de decisão <50ms é crítico. 4G é incapaz.</p><p><strong>Sensor fusion**: Carro tem câmeras, LiDAR, radar, GPS. Dados fusionados em MEC local (nem sempre). Decisão: acelerar, frenar, virar. Tudo em <50ms.</p><p><strong>Comunicação V2X (Vehicle-to-Everything)</strong>: Carro fala com infraestrutura, outros carros, pedestres. Carro A freando → alerta carro B → freio automático. Sem demora, sem latência. 5G é enabler.</p><blockquote class="tip">Dica: Carros autônomos dependem em parte de conectividade. Sem 5G, ficam somente em trajetos programados (não dinâmicos).</blockquote><p><strong>Casos de uso**: 1) Taxis autônomos em cidades. 2) Trucks autônomos em rodovia. 3) Shuttle em campus/aeroporto. Cada um tem diferentes requisitos.</p><p><strong>Confiabilidade requerida**: Falha significa acidente. Requisito é "falha ultra-rara". 5G URLLC promete, mas implementação requer redundância (dual 5G, backup 4G).</p><blockquote class="example">Exemplo: Uber, Waymo testando carros autônomos em cidades. Dependem de maps, dados tempo real, comunicação. 5G reduce latência de sensor→decision→action. Sem ele, experiência é desconfortável (lag perceptível).</blockquote><p><strong>Regulação**: Governos ainda definem regras. "Quem é responsável se carro autônomo bate? Dono? Fabricante? Operadora 5G?" Resposta afeta viabilidade.</p><p><strong>Privacidade**: Carro coleta muitos dados (localização, câmeras). Onde dados vão? Quem acessa? Regulation tipo GDPR/LGPD aplicável.</p><blockquote class="quote">\"Carros autônomos com 5G é próximo passo da revolução de transporte. Impacto societal é gigante.\"</blockquote><p>Você aprenderá impacto de latência em segurança de transporte.</p>`},
    {
      id: 'SAUD',
      name: 'Saúde Remota e Telemedicina',
      content: `<h4>5G levando healthcare para casa</h4><p><strong>Telemedicina foi limited pela latência e banda</strong>. 5G libera novo tipos de intervenção remota.</p><p><strong>Cirurgia remota**: Cirurgião em São Paulo, paciente em região remota. Câmeras 4K no OR local, robô controlado remotamente pelo cirurgião. 5G latência <1ms faz impossível ficar imperceptível, quase como estar lá.</p><p><strong>Monitoramento contínuo**: Wearables com sensores (ECG, temperatura, O2). 5G permite streaming contínuo para hospital. Médico alerta se anormalidade. Prevenção vs reação.</p><blockquote class="tip">Dica: Regulação em saúde é rigorosa. Telemedicina cirurgia requer certificação, treinamento, responsabilidade legal.</blockquote><p><strong>Diagnóstico remoto**: Paciente em casa, câmera examina. AI análise junto com médico remoto. Diagnóstico, sem ir ao hospital. Reduz congestionamento hospitalar.</p><p><strong>Ambulância conectada**: Paciente em ambulância, vital signs streamed para hospital. Hospital sabe situação antes ambulância chegar. Preparação prévia salva tempo crítico.</p><blockquote class="example">Exemplo: Acidente em rodovia. Ambulância com 5G envia ECG, pressão, pulso em tempo real. Hospital vê, inicia preparo (chamada cirurgião, prepara sala). Ambulância chega, cirurgião já pronto. Reduz "golden hour" delay.</blockquote><p><strong>Mental health**: Terapia remota com vídeo claro, áudio cristalino (5G assegura). Pacientes em regiões rurais têm acesso. Destigmatiza telemedicina.</p><p><strong>Desafios**: Privacidade de dados médicos é crítica. Criptografia end-to-end essencial. Regulação varia por país. Brasil tem LGPD, EUA HIPAA, etc.</p><blockquote class="quote">\"5G em saúde salva vidas, não porque é medicina melhor, mas porque leva medicina a lugares antes inacessível.\"</blockquote><p>Você aprenderá que tecnologia é apenas enabler; aplicação importa.</p>`},
    {

      content: `<h4>5G chegando ao país</h4><p><strong>Brasil iniciou 5G em 2021 com espectro alocado. Implementação acelerada, mas em ritmo brasileiro</strong>. Desafios únicos como grandes distâncias, diversidade de contextos.</p><p><strong>Timeline</strong>: 2021 primeiros pilotos em São Paulo. 2023 expansão para principais cidades. 2024+ cobertura regional. Completa cobertura (como 4G) é 10+ anos.</p><p><strong>Operadoras**: Claro, Vivo, TIM, Oi disputam. Claro/Vivo têm more spectrum (mais investimento esperado). Competição beneficia consumidor.</p><blockquote class="tip">Dica: 5G no Brasil começará nas capitais/cidades grandes. Cobertura rural é problema histórico (4G ainda chega parcialmente em regiões).</blockquote><p><strong>Espectro alocado**: Principalmente n78 (3.5 GHz, mid-band). Alguns pilotos em mmWave. Banda baixa (<1 GHz) será mantida para cobertura, banda alta para capacidade.</p><p><strong>Infraestrutura existente**: Operadoras devem compartilhar torres, fibra. Regulação do Anatel estabelece regras. Compartilhamento reduz custo, acelera expansão.</p><blockquote class="example">Exemplo: Vivo licencia 200 MHz em n78, Claro 100 MHz. Ambos precisam cobertura em Rio. Solução: compartilham torre RJ. Claro coloca antena própria, Vivo também mesma torre. Custo reduzido, cobertura igual para ambos.</blockquote><p><strong>Investimento total**: Estimado R$50B+ em 5 anos para cobertura nacional. Operadoras distribuem custo (usuários pagarão mais? talvez gradualmente).</p><p><strong>Desafios brasileiros**: 1) Dimensão geográfica (grande e sparsely populated em regiões). 2) Pobreza (muitos não pagam premium 5G). 3) Energia (regiões com faltas frequentes). 4) Segurança (latrocínios de equipment).</p><blockquote class="quote">\"5G no Brasil é viável, mas contexto é diferente de EUA/Europa. Pragmatismo é necessário.\"</blockquote><p>Você aprenderá que 5G não é uniforme globalmente.</p>`},
    {

    {

    {
      id: 'SAUDT',
      name: 'Transformação da Saúde',
      content: `<h4>5G revolucionando healthcare</h4><p><strong>5G em saúde não é melhoria incremental; é transformação</strong>. Aplicações impossíveis antes viram rotina.</p><p><strong>Monitoramento contínuo de crônicos**: Paciente diabético com sensor glucose, transmite em tempo real para aplicativo. Médico recebe alerta se anormal. Prevenção vs reação. Reduz hospitalizações 20%+.</p><p><strong>Ambulância conectada como mini-hospital**: Equipamento diagnóstico em ambulância (ECG, ultrassom), todos conectados 5G. Hospital recebe dados em tempo real, prepara antes ambulância chegar. Salvam vidas.</p><blockquote class="tip">Dica: Telemedicina é ópcion agora; será padrão depois. Patients esperam opção remota.</blockquote><p><strong>Cirurgia remota**: Cirurgião em SP, paciente no Amazonas. Câmera 4K, braço robótico, haptic feedback (sente resistência). 5G latência <1ms permite. Especial em emergências em regiões remotas.</p><p><strong>Reabilitação remota**: Paciente pós-AVE em casa, terapeuta remoto guia exercícios via vídeo 5G. Frequent acompanhamento, melhor resultado. Reduz readmissão hospital.</p><blockquote class="example">Exemplo: Hospital em São Paulo equipa ambulâncias com 5G. Paramédico faz ultrassom pré-hospitalar, envia para cardiologista remotamente. Cardiologista vê, interpreta, guia paramédico. Diagnóstico cardíaco em ambulância (não esperando ER). Salvam 50 vidas/ano.</blockquote><p><strong>Mental health escalado**: Psicólogo atende 10x mais pacientes via video 5G (sem latência, sem delay). Acesso aumenta, custo por sessão reduz. Destigmatiza.</p><p><strong>Treinamento de médicos**: Cirurgia rara acontece em hospital A. Médicos em hospital B assistem via vídeo ao vivo 5G (câmera 4K, latência zero). Aprendem sem viajar.</p><blockquote class="quote">\"5G em saúde não é tech gimmick; economiza vidas e reduz custo. ROI é óbvio.\"</blockquote><p>Você aprenderá que tecnologia muda medicina.</p>`},
    {
      id: 'SMART2',
      name: 'Cidades Inteligentes Avançadas',

    {
      id: 'COMBI',
      name: 'Sinergia: Saúde + Smart City',
      content: `<h4>Impacto combinado</h4><p><strong>Quando saúde e smart city se combinam, impacto é multiplicado</strong>. Exemplos mostram sinergia real.</p><p><strong>Ambulância em smart city**: 1) Paciente chama 911. 2) Sistema sabe localização ambulância mais próxima (GPS real-time). 3) Semáforos na rota ficam verde para ambulância (automático). 4) Ambulância chegaa 2 min (vs 8 min tradicional). 5) Dados vitais enviados hospital antes chegada. Hospital prepara. 6) Salvam vida.</p><p><strong>Queda de idoso em smart city**: 1) Wearable detecta queda. 2) Envia para smart city system. 3) Sistem identifica localização exata (GPS). 4) Chama ambulância + vizinhos registrados. 5) Vizinho chega em 1 min, aplica primeiro socorros. 6) Ambulância chega 3 min preparada com dados médico. 7) Hospital aguardando. Idoso salvo.</p><blockquote class="tip">Dica: Sinergia acontece quando sistemas conversam. APIs abertas, dados compartilhados, decision making coordenado.</blockquote><p><strong>Epidemiologia em smart city**: Sensores distribuídos detectam padrão de doença (ex: tosse = possível COVID). Sistema alerta autoridades. Outbreak detectado cedo, contido. Vidas salvas.</p><p><strong>Saúde mental via smart city**: Lights na rua ajustam baseado em padrão de pessoas (se vazio, reduz=menos seguro). Se muita gente, aumenta=seguro. Psychological safety aumenta, depressão reduz (light affects mood).</p><blockquote class="example">Exemplo: Seoul smart city+saúde integrado. 1) Traffic reduz congestionamento = menos stress. 2) Air quality monitored = menos problemas respiratórios. 3) Parks iluminados, seguros = mais exercise. 4) Telemedicina integrada = acesso fácil. Resultado: felicidade média aumenta 12%, crime cai 25%, saúde pública melhora. ROI gigante.</blockquote><p><strong>Futura: Predictive health city**: Cidade prediz epidemias antes acontecer. Pessoas em risco recebem intervenção preventiva. Saúde é proativa, não reativa.</p><blockquote class="quote">\"Saúde + smart city integrados é futuro. Cidades que não integram ficam para trás.\"</blockquote><p>Você aprenderá sistemas integrados são mais que partes.</p>`},
    {
      id: 'ETHC',

      content: `<h4>Desafios não-técnicos</h4><p><strong>5G saúde + smart city habilita, mas também ameaça privacidade. Governança é crítica</strong>.</p><p><strong>Privacidade médica**: Dados médicos de paciente fluem. Quem acessa? Seguro (nega cobertura se pre-existing conhecido)? Employer (discrimina sick workers)? Gov (controle)? Proteção é essencial.</p><p><strong>Surveillance state**: Câmeras smart city monitoram movimento. Quem acessa? Por quê? Chantagem? Dissident oppression? Safeguards são necessárias.</p><blockquote class="tip">Dica: Tecnologia não é neutra. Mesma sistema pode salvar vidas ou oprimir. Governance importa.</blockquote><p><strong>Consent**: Paciente consente dados usados para telemedicina. Mas dados também usados para pesquisa? Para treinamento AI? Consentimento informado é difícil.</p><p><strong>Algoritmo bias**: AI em saúde pode discriminar raça/gênero se treino é biased. Exemplo: algoritmo de risco cardíaco menos acurado em mulheres (treino com homens). Resultados são desiguais.</p><blockquote class="example">Exemplo: Câmeras smart city com reconhecimento facial discriminam rostos escuros. Possível inocente é erroneously arrested. Blame é tecnologia, mas culpado é falta de oversight.</blockquote><p><strong>Transparency**: Sistema de saúde usa algoritmo preditivo. Qual critério? Porque? Paciente pode questionar? Transparency é direito.</p><p><strong>Accountability**: Se sistema falha, quem é responsável? Médico? Hospital? Vendor? Lei é vaga. Clareza é necessária.</p><blockquote class="quote">\"5G saúde+city é poderoso. Com poder vem responsabilidade. Governance não é opcional.\"</blockquote><p>Você aprenderá que ética é parte integral de tecnologia.</p>`}

    {
      id: 'FUTV',
      name: 'Visão do Futuro: 6G',
      content: `<h4>Próximo horizonte da conectividade</h4><p><strong>5G é presente. 6G é futuro próximo (2030s). Visualizar 6G ajuda entender trajetória</strong>.</p><p><strong>Especificações teóricas 6G**</strong>: Frequência terahertz (100-300 GHz). Latência 0.1ms (vs 1ms em 5G). Velocidade 100+ Gbps (vs 10 Gbps 5G). Densidade 100M+ connections/km² (vs 1M em 5G).</p><p><strong>Aplicações 6G desconhecidas**: Holoframas imersivas. AI distribuída ubíqua. Quantumcomputing acessível. Brain-computer interfaces (BCI) wireless. Tudo especulativo, mas possível.</p><blockquote class="tip">Dica: 6G está em pesquisa acadêmica, não comercial. 10-15 anos antes mainstream.</blockquote><p><strong>Habilitadores de 6G**: 1) Terahertz transmission. 2) Quantum technology (quantum computing, quantum sensing). 3) AI nativa na rede. 4) Holographic communication. 5) Semantic communication (envia significado, não bits).</p><p><strong>Desafios 6G**: Terahertz penetração é má (millimeters). Consumo energético é gigante. Quantum tech é experimental. Semantic comm é cutting edge research.</p><blockquote class="example">Exemplo: 6G hologram. Você está em reunião, avatar 3D de colega em outro país é holograficamente presente (não 2D video). Conversam como se estivessem na mesma sala. Latência <1ms faz imperceptível. Revoluciona trabalho remoto.</blockquote><p><strong>Implicações sociais**: 6G libera aplicações desconhecidas (como internet mobile em 2005 não imaginou smartphones, apps, social media). Prudência em predição é sábia.</p><p><strong>Preparação atual**: Brasil (e mundo) deve investir em educação 6G. Pesquisa. Infraestrutura. Não esperar até 2030 para começar.</p><blockquote class="quote">\"6G é distant, mas trajectory é set now. Escolhas hoje afetam viabilidade amanhã.\"</blockquote><p>Você aprenderá que imaginar futuro é parte de construir.</p>`},

      content: `<h4>Evolução contínua</h4><p><strong>Entre 5G e 6G, várias tecnologias emergem que melhoram conectividade</strong>.</p><p><strong>Satellite internet (Starlink, Amazon Kuiper)**: Constelação de satélites oferece conectividade global. Latência ~30ms (vs <10ms 5G). Mas coverages reach tudo, não só cidades.</p><p><strong>Free-space optical (FSO)**: Comunica via laser. Alta velocidade (100 Gbps+), baixa latência, sem espectro RF. Desafios: weather (chuva bloqueia), alineamento.</p><blockquote class="tip">Dica: Satélite + 5G é combinação poderosa. 5G em cidades, satélite em rural. Cobertura completa.</blockquote><p><strong>Visible Light Communication (VLC)**: Modular luz visível (LED) para comunicar. Latência ultra-baixa, eficiência energética, segurança (luz viaja poucos metros). Aplicações indoor.</p><p><strong>Millimetre wave (mmWave) avançado**: Frequências acima 100 GHz. 5G usa até 100 GHz. 6G+ uso terahertz (0.1-10 THz). Trade-offs penetração vs capacidade.</p><p><strong>AI nativa em rede**: Não rodar AI em servidores remotos; rodar na rede mesma. Otimização em tempo real. Roteamento inteligente. Detecção de anomalia automática.</p><blockquote class="example">Exemplo: Network com AI nativa. Detecta padrão de attack em tempo real. Automaticamente isolava slice afetada, protegendo outros. Sem humano intervenção.</blockquote><p><strong>Quantum-enhanced sensing**: Quantum sensores detectam signals fracos. Melhora recepção. Especial em mmWave/terahertz onde sinal é fraco naturalmente.</p><p><strong>RIS (Reconfigurable Intelligent Surface)**: Superfícies que refletem sinais de forma controlada. Melhora propagação. Promissor para indoor onde walls bloqueiam sinal.</p><blockquote class="quote">\"Futuro da conectividade é diverso. Não é uma tecnologia; é ecosystem de complementários.\"</blockquote><p>Você aprenderá que inovação é contínua.</p>`},
    {

      content: `<h4>Tecnologia verde para futuro verde</h4><p><strong>5G usa mais energia que 4G. 6G deve ser mais eficiente, não menos</strong>. Sustentabilidade é imperativo.</p><p><strong>Eficiência energética em 5G**: Técnicas como sleep modes (antenas desativam à noite), dynamic power scaling (usam menos potência quando traffic baixo). Reduz 30% consumo vs naive implementation.</p><p><strong>6G energia**: Estimada <0.1 nJ/bit (vs 10 nJ em 5G). Gigante eficiência. Necessário para economical deployment em escala.</p><blockquote class="tip">Dica: Eficiência energética não é ambiental; é econômico. Reduz OPEX de operadora enormemente.</blockquote><p><strong>Renewable energy em towers**: Solar, vento alimentam base stations. Especial em rural onde grid é fraco. Win-win: ambiente + operacional.</p><p><strong>Circular economy**: Hardware 5G reciclado, matérias recovered. Electronics waste é problema crescente. Infraestrutura deve ser resposável.</p><blockquote class="example">Exemplo: Operadora BR instala solar em 80% de towers. Economia R$100M/ano em eletricidade. Emissão reduzida 50k toneladas CO2/ano. ROI 3-5 anos.</blockquote><p><strong>Indirect effects**: 5G habilita smart cities, eficiência energética urbana. Redução indireta de emissão é maior que construção da própria rede.</p><p><strong>Carbon-aware networking**: Rotear traffic baseado em fonte de energia. Se renewables estão high, rote mais traffic. Se fossil combustion, rote menos. Smart carbon management.</p><blockquote class="quote">\"5G/6G pode ser green se desenhado bem. Não é trade-off: eficiência é viabilidade.\"</blockquote><p>Você aprenderá que sustentabilidade é business imperative.</p>`}
