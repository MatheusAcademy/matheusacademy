  cat:'Inglês', free: true,
    topics: [
      {
        id: 'CHEK', name: 'Check-in e Segurança do Aeroporto',
        content: `<h4>No Check-in</h4><p>Quando você chega no aeroporto, seu primeiro destino é o balcão de check-in (check-in counter). Você pode perguntar de maneira simples:</p><p><strong>"Hello, I have a flight to New York at 3 PM. Where is the check-in counter for my airline?"</strong> (Olá, tenho um voo para Nova York às 3 da tarde. Onde fica o balcão de check-in para minha companhia aérea?)</p><p>Quando está na fila de check-in, o agente (agent) pode perguntar:</p><blockquote><strong>"Do you have any checked luggage?" (Você tem bagagem despachada?) / "How many pieces of luggage?" (Quantas peças de bagagem?) / "Did you pack these bags yourself?" (Você mesmo embalou essas malas?)</strong></blockquote><p>Suas respostas podem ser simples:</p><p><strong>"Yes, I have one checked bag." / "No, I only have a carry-on." / "Yes, I packed them myself."</strong> (Sim, tenho uma mala despachada / Não, só tenho bagagem de mão / Sim, eu mesmo embalei.)</p><h4>Na Segurança</h4><p>Na segurança (security), agentes pedem que você tire sapatos, coloque liquids em uma sacola separada, coloque eletrônicos em uma bandeja. Você pode perguntar se não tem certeza:</p><p><strong>"Do I need to remove my shoes?" / "Can I keep my laptop in my bag?" / "How much liquid am I allowed?" / "Where do I put my boarding pass?"</strong></p><p>Respostas comuns: Yes, please remove them. / Put it in the bin. / 100ml per container. / Keep it with you.</p>`},
      {
        id: 'BOAR', name: 'Boarding, Assento e Emergências a Bordo',
        content: `<h4>Embarque e Busca de Assento</h4><p>Quando você entra no avião (boarding), uma comissária pode perguntar seu assento (seat). Você pode procurar sozinho ou pedir ajuda:</p><p><strong>"Excuse me, where is seat 12B?" / "I cannot find my seat. Can you help me?" / "Is this seat taken?"</strong></p><p>Se um assento está ocupado mas é seu, seja educado:</p><p><strong>"I'm sorry, I think that's my seat. Let me check my boarding pass."</strong> (Desculpa, acho que esse é meu assento. Deixa eu conferir minha cartão de embarque.)</p><blockquote><strong>Dica prática:</strong> Leve sua cartão de embarque sempre à mão. Facilita quando precisa confirmar informações.</blockquote><h4>Pedindo Ajuda a Bordo</h4><p>Enquanto voa, você pode precisar de ajuda. Comissárias estão ali para servir. Algumas frases úteis:</p><p><strong>"Excuse me, could I have a glass of water?" / "I'm not feeling well, can I get a sickness bag?" / "The air is too cold, could you bring me a blanket?" / "Can I get some headphones?"</strong></p><p>Se há uma emergência (emergência), comissários darão instruções. Escute cuidadosamente. Se precisa ajuda:</p><p><strong>"I don't understand. Can you help me?" / "What should I do?" / "Is there a doctor on the plane?"</strong></p>`},
      {
        id: 'DESM', name: 'Desembarque, Bagagem e Saída',
        content: `<h4>Saindo do Avião</h4><p>Quando o avião chega, comissários anunciarão. Aguarde sua fileira. Você pode perguntar:</p><p><strong>"Are we in New York?" / "What time is it here?" / "Where do I go for baggage claim?"</strong> (Estamos em Nova York? / Que horas são aqui? / Onde fico buscar a bagagem?)</p><p>Após sair do avião, você vai para a sala de embarque. Procure sinais para "Baggage Claim" (área de retirada de bagagem) ou "Arrivals" (chegadas).</p><blockquote><strong>Importante:</strong> Guarde seu cartão de bagagem (baggage tag) que recebeu no check-in. Você precisará conferir o número com sua mala.</blockquote><h4>Procurando Sua Bagagem</h4><p>Na esteira de bagagens (baggage carousel), procure sua mala. Se não conseguir achar:</p><p><strong>"Excuse me, I cannot find my luggage. My flight was from São Paulo, arriving at 2 PM. My baggage tag number is 456789."</strong></p><p>Se sua mala está danificada ou não chegou:</p><p><strong>"My luggage arrived damaged. / My luggage did not arrive on this flight. Can you help me file a report?"</strong> (Minha mala chegou danificada / Minha mala não chegou neste voo. Você pode me ajudar a fazer um relatório?)</p>`},

        content: `<h4>Problemas no Aeroporto</h4><p>Se você perdeu seu voo ou há algum problema:</p><p><strong>"I missed my flight. Can I get on the next one?" / "My flight was cancelled. What options do I have?" / "I need to change my flight. Is there a fee?"</strong></p><p>Se você perdeu algo no aeroporto:</p><p><strong>"I left my passport at the restaurant. Who do I contact?" / "I lost my wallet. Is there a lost and found?"</strong> (Deixei meu passaporte no restaurante. Com quem falo? / Perdi minha carteira. Há um achados e perdidos?)</p><blockquote><strong>Dica importante:</strong> Mantenha fotos de seus documentos importantes em seu telefone. Se perder algo, você tem comprovação.</blockquote><h4>Comunicação em Situações de Pânico</h4><p>Se quer comunicar urgência de forma clara:</p><p><strong>"This is an emergency! / Please help me immediately! / I need medical assistance right away! / Where is the nearest police officer?"</strong></p><p>Se não compreendeu instruções:</p><p><strong>"I don't understand. Can you speak slower? / Can you write it down? / Can you show me on the map?"</strong></p>`}

    id: 1, name: 'Hotel e Hospedagem: Acomodação Confortável', free: false,

      {
        id: 'CHEK', name: 'Check-in, Quarto e Comodidades',
        content: `<h4>No Balcão de Check-in do Hotel</h4><p>Ao chegar no hotel, dirija-se à recepção (front desk). Você pode dizer simplesmente:</p><p><strong>"Hello, I have a reservation for two nights under the name Silva."</strong> (Olá, tenho uma reserva para duas noites sob o nome Silva.)</p><p>O recepcionista pode perguntar:</p><blockquote><strong>"Do you have your reservation confirmation?" / "How many guests?" / "Do you prefer a room with a view?" / "Will you need any extra services?"</strong></blockquote><p>Suas respostas podem ser:</p><p><strong>"Yes, I have my confirmation number." / "Two guests." / "A room with a city view would be nice." / "Just the basic room is fine."</strong></p><p>Quando recebe a chave (key card ou key), pergunte se tem dúvidas:</p><p><strong>"What floor is my room?" / "How does this key card work?" / "Where is the elevator?" / "What time is checkout?"</strong></p><h4>No Quarto</h4><p>Quando entra em seu quarto (room), você pode notar que algo não está bem. Se há algum problema:</p><p><strong>"I'm sorry, but the air conditioner isn't working." / "The shower doesn't have hot water." / "The TV is broken." / "There's no toilet paper in the bathroom."</strong></p><p>Se quer solicitar algo adicional:</p><p><strong>"Could I have extra pillows?" / "Could you bring me some towels?" / "I need an iron to press my clothes." / "Can I get another blanket?"</strong></p><blockquote><strong>Dica:</strong> Muitos problemas podem ser resolvidos chamando a recepção. Sua extensão de telefone está no quarto, geralmente em um cartão ao lado do telefone.</blockquote>`},
      {
        id: 'SERV', name: 'Serviços do Hotel e Amenidades',
        content: `<h4>Café da Manhã (Breakfast)</h4><p>Se seu quarto inclui café (breakfast included), pergunte onde fica e que horários:</p><p><strong>"Where is the breakfast room?" / "What time does breakfast start and end?" / "Is breakfast included in my room rate?"</strong></p><p>No café, você pode pedir:</p><p><strong>"Can I have orange juice?" / "Do you have gluten-free bread?" / "Where are the napkins?" / "Can I get more coffee?"</strong></p><h4>Piscina, Academia e Outras Amenidades</h4><p>Se quer usar piscina (pool) ou academia (gym):</p><p><strong>"Where is the pool?" / "What are the pool hours?" / "Do I need a password for the WiFi?" / "Where is the gym located?" / "What time does the gym close?"</strong></p><p>Se quer informações turísticas:</p><p><strong>"Can you recommend a good restaurant nearby?" / "How do I get to [tourist attraction]?" / "Can you call a taxi for me?" / "Is there public transportation nearby?"</strong></p><blockquote><strong>Importante:</strong> Muitos hotéis oferecem serviço de concierge que pode ajudar com recomendações e reservas. Não hesite em usar esse serviço.</blockquote>`},
      {
        id: 'PROB', name: 'Problemas e Solicitações Especiais',
        content: `<h4>Problemas de Barulho e Conforto</h4><p>Se seu quarto é barulhento ou desconfortável:</p><p><strong>"The room is too noisy. Could I change rooms?" / "The bed is uncomfortable. Could you provide a softer mattress?" / "The room is too cold. Can you adjust the temperature?"</strong></p><p>Se há barulho externo ou hóspedes barulhentos:</p><p><strong>"There's noise from construction outside." / "The guests in the next room are very loud. Can you ask them to be quiet?"</strong></p><h4>Solicitações Especiais</h4><p>Se você tem necessidades especiais (dietary, acessibilidade, etc.):</p><p><strong>"I'm vegetarian. Are there vegetarian options for breakfast?" / "I need a room on the ground floor because of my disability." / "I need a high chair for my baby. Can you provide one?"</strong></p><p>Se você quer serviços adicionais:</p><p><strong>"Can I get laundry service?" / "Do you offer room service? What are the hours?" / "Can you book a tour for me?" / "I need to print some documents. Is there a business center?"</strong></p>`},
      {
        id: 'CHEK2', name: 'Check-out e Saída do Hotel',
        content: `<h4>Processo de Check-out</h4><p>Na manhã de partida (departure), você deve fazer check-out. Geralmente há horário limite (checkout time), frequentemente 11 AM. Se quer sair mais cedo ou tarde:</p><p><strong>"Can I do an early checkout at 8 AM?" / "Can I do a late checkout? I'm leaving at 2 PM."</strong> (Posso fazer check-out cedo às 8 da manhã? / Posso fazer check-out tarde? Saio às 2 da tarde.)</p><p>Late checkout pode ter taxa adicional (extra fee), então pergunte:</p><p><strong>"Is there an additional charge for late checkout?"</strong></p><h4>Conta e Pagamento</h4><p>Antes de partir, confirme sua conta (bill). Você pode dizer:</p><p><strong>"Can I review my bill before checkout?" / "I think there's an error on my bill." / "Do you accept credit cards?" / "Can I pay with my debit card?"</strong></p><p>Se há algo discrepante:</p><p><strong>"I was charged for minibar but I didn't use it." / "The room rate seems higher than quoted." / "Can you explain these extra charges?"</strong></p><blockquote><strong>Dica:</strong> Frequentemente você pode pagar diretamente no quarto através de TV interativa ou ligando para frente (front desk). Confirme como pagar antes de sair.</blockquote>`}

      {q:'O que são phrasal verbs?',opts:["Verbos regulares simples", "Combinação de verbo + preposição com significado próprio", "Verbos no passado apenas", "Gírias informais regionais"],correct:1},

  {
    id: 2, name: 'Restaurante e Comida: Pedindo com Confiança', free: false,
    topics: [
      {
        id: 'REST', name: 'Chegando ao Restaurante e Sendo Sentado',
        content: `<h4>Entrada e Reserva</h4><p>Ao chegar em um restaurante (restaurant), você será recebido por uma anfitriã (hostess). Você pode dizer:</p><p><strong>"Hello, do you have a table for two?" / "We have a reservation under the name Silva for 7 PM."</strong> (Olá, vocês têm uma mesa para duas pessoas? / Temos uma reserva sob o nome Silva para 7 da noite.)</p><p>Se não tem reserva e o restaurante está cheio:</p><p><strong>"Do you have any tables available?" / "How long is the wait?" / "Can we wait at the bar?"</strong> (Vocês têm mesas disponíveis? / Quanto tempo de espera? / Podemos esperar no bar?)</p><blockquote><strong>Dica:</strong> Em cidades grandes, reservar com antecedência é importante. Você pode reservar online ou ligando: "I would like to make a reservation for two people on Friday at 8 PM."</blockquote><h4>Sendo Sentado</h4><p>Quando você é levado à sua mesa (table), você pode pedir preferências:</p><p><strong>"Could we sit by the window?" / "Is this table okay, or can we have a quieter spot?" / "Can we have a booth instead of a regular table?"</strong></p><p>Quando a anfitriã tira o cobertor (napkin) para você, isso já está sendo feito. Quando estiver sentado, a garçonete (waitress) ou garçom (waiter) virá em breve.</p>`},
      {
        id: 'PEDI', name: 'Lendo o Cardápio e Fazendo Pedidos',
        content: `<h4>Compreendendo o Cardápio</h4><p>Quando recebe o cardápio (menu), ele geralmente tem seções: entradas (appetizers), pratos principais (main courses), sobremesas (desserts), bebidas (drinks).</p><p>Se não entende um prato:</p><p><strong>"What is [dish name]?" / "What's in this dish?" / "Is this hot or mild?" / "Is this vegetarian?" / "Does this contain nuts?"</strong></p><p>Se tem alergias (allergies) ou intolerâncias:</p><p><strong>"I'm allergic to peanuts. Are there any peanuts in this dish?" / "I don't eat shellfish. What do you recommend?" / "I'm vegetarian. What are your vegetarian options?"</strong></p><blockquote><strong>Importante:</strong> Sempre avise sobre alergias. Restaurantes levam isto muito seriamente e vão verificar com o chef.</blockquote><h4>Fazendo Seu Pedido</h4><p>Quando o garçom perguntar "Are you ready to order?", você pode dizer:</p><p><strong>"I'll have the grilled salmon with rice." / "I'd like the pasta with marinara sauce." / "Can I get the steak medium-rare?" / "I'll have a salad, no dressing, please."</strong></p><p>Se você quer tempo para decidir:</p><p><strong>"Give us a few more minutes, please." / "Can you come back in 5 minutes?" / "What's your recommendation?"</strong></p>`},
      {
        id: 'BEBI', name: 'Bebidas e Requisições Especiais',
        content: `<h4>Pedindo Bebidas</h4><p>Para bebidas, você pode perguntar:</p><p><strong>"What wines do you have?" / "What's your house wine?" / "I don't drink alcohol. What non-alcoholic options do you have?" / "Can I have water with ice?" / "Do you have sparkling water?"</strong></p><p>Bebidas comuns em restaurantes:</p><p><strong>Water (água), Coffee (café), Tea (chá), Soft drinks (refrigerantes), Wine (vinho), Beer (cerveja), Juice (suco)</strong></p><p>Se quer especificar como quer sua bebida:</p><p><strong>"Coffee with milk, no sugar." / "Iced tea, no lemon." / "Wine, not too dry."</strong></p><h4>Durante a Refeição</h4><p>Enquanto come, o garçom pode perguntar "How is everything?" Você pode responder:</p><p><strong>"It's delicious!" / "Everything is great, thank you." / "Actually, the food is a bit cold. Can you reheat it?" / "I didn't get my salad. I ordered it 10 minutes ago."</strong></p><p>Se você quer algo durante a refeição:</p><p><strong>"Could I have more bread, please?" / "Can I get some ketchup/mustard?" / "Could you bring me some extra napkins?" / "We're ready for dessert now."</strong></p>`},
      {
        id: 'CONT', name: 'Contando, Pagando e Saindo',
        content: `<h4>Solicitando a Conta</h4><p>Quando termina de comer e quer ir, você pode chamar o garçom ou garçonete:</p><p><strong>"Can we have the check, please?" / "Could you bring the bill?" / "We're ready to pay."</strong> (Podemos ter a conta, por favor? / Você poderia trazer a conta? / Estamos prontos para pagar.)</p><p>Quando recebe a conta, revise para certificar que tudo está correto:</p><p><strong>"Can you explain this charge?" / "I don't see the discount we talked about." / "Did you add the tip already?"</strong></p><blockquote><strong>Sobre Gorjeta (Tip):</strong> Nos EUA e Canadá, é costume deixar 15-20% de gorjeta. Em outros países, pergunte "Is tip included?" para saber se foi adicionada automaticamente.</blockquote><h4>Pagando</h4><p>Você pode pagar com cartão (credit card) ou dinheiro (cash):</p><p><strong>"Can I pay with a credit card?" / "Do you accept Visa?" / "Can I pay in cash?" / "I'll pay separately" (se está com mais pessoas).</strong></p><p>Se pagar com cartão, o garçom trará uma máquina (card reader) ou levará seu cartão. Quando retorna:</p><p><strong>"Thank you for your business! Have a great day!"</strong> (Obrigado! Tenha um ótimo dia!)</p>`}

      {
        id: 'MEDI', name: 'Problemas Médicos e Farmácia',
        content: `<h4>Comunicando Sintomas</h4><p>Se você não se sente bem, você pode procurar uma farmácia (pharmacy) ou clínica (clinic). Na farmácia, você diz:</p><p><strong>"I don't feel well." / "I have a headache/fever/stomach ache." / "I'm nauseous." / "I'm coughing a lot."</strong></p><p>O farmacêutico (pharmacist) pode perguntar:</p><p><strong>"How long have you had this symptom?" / "Do you have any allergies?" / "Are you taking any medications?"</strong></p><p>Você responde:</p><p><strong>"Since this morning." / "I'm allergic to penicillin." / "Yes, I take [medication name]."</strong></p><h4>Comprando Medicamentos</h4><p>Na farmácia, você pode pedir:</p><p><strong>"I need something for a headache." / "Do you have any pain relief medication?" / "I need cough syrup." / "Do you have antihistamine for allergies?"</strong></p><p>O farmacêutico pode perguntar:</p><p><strong>"How strong do you want?" / "Are you taking any other medications?"</strong></p><blockquote><strong>Dica:</strong> Leve uma lista dos seus medicamentos habituais e alergias. Alguns medicamentos têm nomes diferentes em países diferentes.</blockquote>`},
