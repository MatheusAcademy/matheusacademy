    {
      id: 'COLO',
      title: 'Herança Colonial: Quando Roubo Era Sistema Oficial',
      html: `<p>Você sabe por que o Brasil foi "descoberto" em 1500? Porque Portugal queria roubar. <strong>Literalmente.</strong> A colonização portuguesa não foi sobre colonização civilizada. Foi sobre extração brutal de recursos.</p><p>Os portugueses chegaram, encontraram ouro, escravizaram populações indígenas, e instalaram um sistema onde <strong>roubo era a estrutura oficial do governo.</strong> Não era exceção. Era regra.</p><h4>O Sistema de Capitanias Hereditárias</h4><p>Coroa portuguesa delegou o Brasil para "capitães hereditários": essencialmente, permitiu que homens ricos saqueassem a terra em nome da Coroa. Você conseguiu ouro? Parte vai para Coroa, parte fica com você. Corrupção institucional. Não tinha lei. Tinha ganância.</p><p>Esses capitães criaram uma dinâmica que continuaria séculos: <strong>você ganha poder político, você rouba. Você rouba, você fica mais poderoso.</strong> Era a equação original.</p><div class="tip"><strong>Padrão Fundacional:</strong> Brasil nasceu não como nação, mas como fazenda de extração. Não há "raízes de corrupção". A corrupção É a raiz. Tudo que veio depois tentou se livrar disso, frequentemente fracassando.</div><p>Quando você entende isso, você entende que corrupção no Brasil não é <strong>desvio de sistema ético.</strong> É <strong>continuidade de sistema que sempre foi feito para roubo.</strong></p><div class="example"><strong>Exemplo: O Ouro de Minas Gerais</strong> Quando ouro foi descoberto em Minas Gerais (1693), a Coroa portuguesa estabeleceu que mineradores tinham que pagar "quinto" (20%) para Coroa. Resultado? Mineradores começaram a contrabandear ouro. Coroa criava impostos. Mineradores criavam formas de contornar. Corrupção bilateral: sistema corrupto vs. pessoas tentando sobreviver em sistema corrupto.</div><div class="quote"><strong>Verdade Histórica:</strong> O Brasil não tem problema de corrupção porque pessoas más chegaram. O Brasil tem corrupção porque nasceu de projeto de roubo. Pessoas más? Estão apenas continuando tradição.</div>`},
    {
      id: 'IMPE',
      title: 'Império Brasileiro: Corrupção Elegante e Transações de Poder',
      html: `<p>Dom Pedro I é aclamado imperador (1822). Finda colonialismo? Não. Muda formato. <strong>De português roubando, para brasileiro elite roubando brasileiros comuns.</strong></p><p>Império cria uma elite política (agricultores, comerciantes, militares) que tem monopólio de poder. Corrupção continua, mas agora é mais sofisticada: não é roubo declarado. É transações de poder disfarçadas como "política".</p><h4>O Sistema de Clientelismo Imperial</h4><p>Imperador precisava de apoio de elite. Elite tinha recursos. Resultado? Transações invisíveis: você apoia meu governo, eu dou contrato de terra, privilégio de comércio, cargo político para seu filho. Era corrupção sistêmica disfarçada de governança.</p><p>Esse sistema criou uma classe parasita que governava em benefício próprio. Não em benefício do povo. E quando alguém tentava mudar? Golpe militar. Porque sistema corrupto defende a si mesmo com violência.</p><div class="tip"><strong>Mecanismo Imperial:</strong> Corrupção mudou de "roubo direto" (colonial) para "transações de benefício mútuo" (clientelismo). Mais sofisticado, mais difícil de combater, mais eficiente em extrair recursos da população.</div><div class="example"><strong>Transações Imperiais Típicas:</strong> General apoia golpe imperial. Recebe terra na Amazônia (valor imenso, preço nenhum). Seu filho fica senador (poder político permanente). Sua família controla comércio de açúcar em região (monopólio não concorrido). Resultado: uma família, várias gerações, poder absoluto. Corrupção? Não parecia. Era "tradição".</div><div class="quote"><strong>Evoluçãodação de Corrupção:</strong> Colonial: roubo direto. Imperial: roubo disfarçado de política. Repúblicano: roubo institucionalizado em lei. A evolução é em sofisticação, não em abolição.</div>`},
    {
      id: 'PROC',
      title: 'Processo de Independência: Corrupção Declarada na Mudança de Regime',
      html: `<p>1889: República. Monarquia cai. <strong>Você acha que sistema corrupto caiu também?</strong> Errado. Mudou de roupa.</p><p>Transição de Império para República foi negociação entre elite antiga e elite militar. Nenhum delas queria perder poder. Resultado? República foi criada para continuar status quo: elite continua no poder, continua roubando, mas agora tem "legitimidade democrática".</p><h4>A Primeira República (1889-1930): Corrupção Republicana</h4><p>Não havia democracia de verdade. Era oligarquia redecorada. Coronelismo: bosses locais (coronéis) controlavam votos de população (através dependência econômica e coerção). Votos iam para quem coronel mandava. Corrupção eleitoral sistêmica.</p><p>"Voto de Cabresto" (rédea de cavalo): eleitor é rebanho, coronel é dono, poder é coerção. Você votava em quem coronel mandava ou perdia emprego, acesso a tierra, proteção. Era democracia fachada, autoritarismo na base.</p><div class="tip"><strong>Inovação de Corrupção Republicana:</strong> Coloniais roubavam. Imperiais transacionavam. Republicanos legalizaram. Criaram leis que permitiam transações de poder disfarçadas de política. Corrupção ganhou roupagem legal.</div><div class="example"><strong>Transações de Primeira República:</strong> Coronel de cidade X controla 30.000 votos (população é dependente dele). Ele oferece aqueles votos para senador em troca de que senador ajuda a passar lei que favorece os negócios do coronel. Ambos saem ganhando. Eleitor (rebanho) nem sabe que está siendo transacionado. Corrupção massiva, aparentemente legal porque voto foi "dado".</div><div class="quote"><strong>Lei Como Cúmplice:</strong> Primeira República não eliminou corrupção. Criou leis que a permitiam chamar-se de política. Lei tornou-se ferramenta de corrupção, não barragem contra ela.</div>`},
    {
      id: 'RSGD',
      title: 'Resgate de Poder: Revoltas, Golpes e Reorganização Corrupta',
      html: `<p>1930: Getúlio Vargas chega ao poder via golpe. Promete fim de corrupção oligárquica. <strong>Você acha que consegue?</strong> Consegue criar sistema corrupto diferente, mais centralizado, mas igualmente destrutivo.</p><p>Vargas instaura "Estado Novo" (1937-1945): ditadura declarada. Corrupção deixa de ser entre oligarcas e vira centralizada em Vargas e sua máquina estatal. Ele rouba abertamente porque não há quem o questione. Corrupção vai de "secretada entre elites" para "institucionalizada pelo Estado".</p><h4>Padrão de Vargas: Centralização de Roubo</h4><p>Vargas cria estrutura estatal onde <strong>roubo passa por mãos de governo.</strong> Contratos de obra? Vai para empresas de amigos de Vargas. Importações? Vai para comerciantes que apoiam Vargas. Tudo passando por máquina estatal, toda ela corrupta.</p><p>Novo padrão: não é elite oligárquica roubando. É <strong>governo usando máquina estatal para roubar em nome do povo.</strong> É roubo legalizado como "razão de estado".</p><div class="tip"><strong>Evolução de Locus de Corrupção:</strong> Colonial: capitanias privadas. Imperial: transações entre elite. República: oligarquias. Vargas: máquina estatal centralizada. Cada um foi "avanço" em sofisticação de roubo.</div><div class="example"><strong>Corrupção de Vargas:</strong> Ele precisava construir fábrica estatal de aço (Volta Redonda). Convida empresário importante para concorrência. "Vença a concorrência se pagar meu custo de campanha e garantir contrato vitalício para fornecimento de X." Empresário paga (é investimento seguro). Fábrica sai 400% mais cara que deveria ser (porque empresário recupera o roubo em preços inflados). Vargas fica rico. Empresário fica rico. Povo paga em inflação + produto caro.</div><div class="quote"><strong>Ciclo de Corrupção Getulista:</strong> Vargas não eliminou corrupção oligárquica. Centralizou-a. Transformou de rede distribuída em estrutura estatal unificada. Mais eficiente em roubar, mais impossível de combater porque é governo.</div>`}

{
  id: 1,
  title: 'República Populista e Desenvolvimentismo: Modernizando Roubo',
  free: false,
  topics: [
    {
      id: 'POPA',
      title: 'Populismo Brasileiro: Promessas de Mudança, Continuidade de Roubo',
      html: `<p>Getúlio volta (1951-1954) com promessa: "Vou dar para povo, vou modernizar Brasil, vou criar indústria." Povo acredita. <strong>Acredita em promessa de um homem que desceu de poder roubando bilhões.</strong></p><p>Populismo é <strong>promessa de redistribuição mascarada sob roubo massivo.</strong> Vargas diz "Vou dar salário", rouba tanto que inflação come o salário. Diz "Vou construir indústria", rouba na construção (obra custa 5x mais que deveria, porque está pagando "comissões"). Resultado: infraestrutura cara demais para pouca utilidade, população pobre apesar de "gastos".</p><h4>O Mecanismo Populista</h4><p>Populista cria "benefício popular" (aumento de salário, fundo de pensão, indústria estatal), mas financia com <strong>roubo do orçamento público.</strong> Benefício é real, mas custo para sociedade é enorme porque foi financiado ineficientemente. É redistribuição via corrupção.</p><p>Povo ganha pouco. Elite ganha muito. Classe média perde. Sistema fica quebrado porque ninguém confia em estrutura (ela não funciona, porque foi roubada).</p><div class="tip"><strong>Fórmula Populista:</strong> Promessa bonita + roubo massivo = queda eventual. Populista consegue fazer funcionar alguns anos porque povo está contente (recebe algo). Depois, sistema falha porque foi tão roubado que não tem recurso. Próximo populista promete novo benefício financiado com novo roubo. Ciclo continua.</div><div class="example"><strong>Salário Mínimo Vargas:</strong> 1940: Vargas cria salário mínimo (benefício real). Mas ao mesmo tempo, rouba tanto que inflação sobe 100% em 10 anos. Salário mínimo que "aumenta 20%" realmente vale 20% menos em termos reais porque inflação comeu diferença. Povo sente como se recebesse, mas realmente perdeu.</div><div class="quote"><strong>Verdade de Populismo:</strong> Populista não elimina corrupção. Transforma-a em mecanismo de redistribuição precária. Povo recebe algo, elite recebe mais, sistema colapsa, novo populista chega.</div>`},
    {
      id: 'DENV',
      title: 'Desenvolvimentismo: Modernizando com Dinheiro Roubado',
      html: `<p>1950-1960: Brasil quer se industrializar. Juscelino Kubitschek (JK) promete: "50 anos de progresso em 5". <strong>Você faz isso sem corrupção? Vai lentamente, caro, mas vai. Você faz com corrupção? Rápido, do jeito errado, e quebra sistema.</strong></p><p>JK escolhe caminho 2. Desenvolvimentismo corre na corrupção. Ele precisa de dinheiro para construir indústrias, represas, rodovias, Brasília. Onde consegue? Roubando. Onde rouba? Empréstimos internacionais (que povo acaba pagando). Resultado: Brasil se industrializa, mas fica endividado e corrupto.</p><h4>Brasília: Monumento de Corrupção</h4><p><strong>Brasília é símbolo máximo:</strong> cidade planejada, construída com dinheiro roubado, beneficiando apenas elite que se mudou lá. Trabalhadores que construíram? Deixados para trás (depois se tornaram "invasores" da própria cidade que construíram).</p><p>Custo de Brasília? Duas vezes estimativa original. Todas diferenças? Desapareceram em "comissões", "transações", "mistério". Cidade linda construída com roubo, capital de nação roubada.</p><div class="tip"><strong>Padrão de Desenvolvimentismo:</strong> Você pega empréstimo internacional. Dinheiro entra. Elite e governo roubam percentual. Resto usa para construir. Resultado: obra cara, qualidade meia, infraestrutura que não sustenta porque foi roubada.</div><div class="example"><strong>Rodovia Belém-Brasília:</strong> Projeto de integração nacional (1960s). Custo estimado: X. Custo real: 3X (ninguém sabe onde extra foi). Qualidade? Péssima (terra em lugar de asfalto em muitas seções). Por quê? Dinheiro que ia para material foi para "comissões". Resultado: rodovia que virou lama em época de chuva, integrando nação mal.</div><div class="quote"><strong>Desenvolvimentismo Corrupto:</strong> Você consegue infra(estrutura e dívida ao mesmo tempo. Brasil modernizou, mas hipotecou futuro. Próximas gerações pagam dívida de modernização que beneficiou elite de 1950.</div>`},
    {
      id: 'DITA',
      title: 'Ditadura Militar: Corrupção Institucionalizada Pelo Exército',
      html: `<p>1964-1985: Golpe militar. Promessa: fim de corrupção, ordem, progresso. Promessa: mentira. <strong>Militares instalaram corrupção mais brutal que tudo que veio antes.</strong></p><p>Diferença: militar rouba, mas não precisa de consentimento popular porque tem armas. Pode matar quem reclama. Corrupção sem limite de transparência, sem risco político, com poder absoluto.</p><h4>Máquina Corrupta Militar</h4><p>Oficiais de governo pega licitações (contrato público). Dá para empresa de amigo de general. Empresa cobra 400% do valor real. General recebe percentual. Obra fica ruim porque foi tão roubada. Ninguém reclama porque polícia política mata jornalistas que investigam.</p><p>Ditadura militar multiplicou roubo porque eliminou accountability. Eliminaram imprensa livre, judiciário independente, congresso com poder. Restou apenas máquina corrupta do exército.</p><div class="tip"><strong>Eficiência de Corrupção Militar:</strong> Sem imprensa, roubo não precisa ser secreto (já é segredo). Sem justiça, não precisa ser legal (justiça é braço do exército). Sem democracia, não precisa de voto (voto é simulado). Corrupção pura, sem constrangimento.</div><div class="example"><strong>Obra do Exército na Ditadura:</strong> General precisa de mansão no Rio. Convida empresa de construção. "Construa minha mansão, cobro do orçamento da defesa como 'pesquisa de habitação para militares'". Empresa constrói por 1 milhão, cobra 5 milhões, compartilha lucro com general. Obra termina, ninguém investiga (imprensa poderia morrer investigando).</div><div class="quote"><strong>Corrupção sem Limites:</strong> Ditadura provou que roubo máximo não precisa de consentimento. Precisa de repressão. Corrupção multiplicou porque accountability desapareceu.</div>`},
    {
      id: 'REDE',
      title: 'Redemocratização: Tentativa de Consertar Sistema Quebrado',
      html: `<p>1985: Ditadura cai. Novo presidente: Tancredo Neves (morre antes de tomar posse). Próximo: José Sarney (vice, militar ainda no fundo). <strong>Você acha que sistema corrupto muda porque regime muda?</strong></p><p>Errado. Redemocratização é simplesmente: militar sai do poder, oligarquia volta. Corrupção continua, agora com face democrática. "Ah, mas agora é democracia!" Sim, forma é democracia. Conteúdo? Corrupção igual, apenas reorganizada.</p><h4>Transição Corrupta</h4><p>Transição de ditadura para democracia é frequentemente negociação entre quem sai e quem entra: militar cede poder em troca de garantia que não será punido (anistia). Oligarquia volta em troca de respeitar "abertura". Corrupção? Fica de fora da negociação.</p><p>Resultado: democracia frágil porque é negociação entre corruptos que concordaram em esquecer que foram corruptos. Instituição fica quebrada porque ninguém queria consertar, apenas mudar cara.</p><div class="tip"><strong>Padrão de Transição:</strong> Que sai garante impunidade. Quem entra garante democracia (forma). Ninguém toca em corrupção. Sistema continua, agora "democratizado".</div><div class="example"><strong>Anistia Brasileira (1979, reafirmada 1985):</strong> Militares saem, em troca de Lei de Anistia que perdoa crimes de tortura, roubo, assassinato. Nenhum militar é punido. Oligarquia volta de braços abertos, também perdoada. Redemocratização acontece, mas sem prestação de contas. Sistema corrupto + novo formato democrático = democracia sem legitimidade.</div><div class="quote"><strong>Tragédia de Transição:</strong> Brasil trocou regime, manteve corrupção, ganhou aparência de democracia. Pior dos mundos: corrupção agora tem legitimidade democrática.</div>`}

  topics: [
    {
      id: 'FHCE',
      title: 'Fernando Henrique Cardoso: Modernidade Sem Combater Raízes',
      html: `<p>1995-2002: Fernando Henrique Cardoso (FHC), sociólogo, promete modernizar Brasil. Cria Plano Real (combate inflação), abre economia, "coloca Brasil no mapa". <strong>Tudo muito moderno. Tudo muito corrupto.</strong></p><p>FHC não combate corrupção de verdade. Apenas a sofistica. Coloca dinheiro em contas no exterior. Privatiza estatal para empresa de amigo. Cria contrato de PPP (parceria público-privada) onde privado fica com lucro, público fica com risco. É corrupção moderna, elegante, difícil de ver.</p><h4>Privatização Como Roubo Legalizado</h4><p>Estatal vale X. FHC vende para empresa Y por 0.3X. Empresa Y faz muito dinheiro porque comprou subestimado. FHC afirma "Privatização é eficiência!" Realmente é transferência de bem público para privado abaixo de preço. Roubo, mas legal.</p><p>Povo perde porque bem que era seu (estatal) vai para privado que cobrava preço inflado. FHC ganha apoio de empresário porque criou oportunidade de roubo. Sistema fica quebrado porque privado não quer investir (já tirou lucro da compra subestimada).</p><div class="tip"><strong>Corrupção Moderna de FHC:</strong> Não é militar roubando abertamente. É intelectual legitimando roubo como "neoliberalismo", "eficiência", "modernidade". Mesmo roubo, linguagem diferente.</div><div class="example"><strong>Privatização de Estatal de Energia:</strong> Vale X bilhão. FHC vende para empresa por 0.3X bilhão (amostra para investidor privado assumir "risco"). Empresa recupera em 5 anos aumentando tarifa 300%. Povo paga. Governo economizou (não precisa mais manter estatal). Empresa fica rica. FHC: "Viu como modernidade funciona?"</div><div class="quote"><strong>Sofisticação de Roubo:</strong> FHC não inventou corrupção. Apenas a tornou invisível dentro de linguagem de economia moderna. Roubo com PhD.</div>`},
    {
      id: 'LULA',
      title: 'Lula: Promessas de Esquerda, Prática de Corrupção Direita',
      html: `<p>2003-2010: Lula chega ao poder prometendo "fim de corrupção", "Brasil para povo", "zero hunger". Povo acredita porque Lula é de esquerda, é ex-operário, "é nosso". <strong>Corrupção não tem partido. Lula prova isso.</strong></p><p>Lula não combate corrupção de verdade. Apenas a democratiza: em lugar de elite roubando, é PT que rouba (apoiadores de PT ficam ricos). É transferência de máquina corrupta de PSDB para PT. Sistema continua roubando, apenas beneficiários mudam.</p><h4>Mensalão: Corrupção Institucionalizada do PT</h4><p><strong>Mensalão (2005) é revelado:</strong> PT usava dinheiro de estatais para pagar deputados para manter maioria (mensalidade para votar com governo). Roubo descarado, institucionalizado, normalizado. PT dizia "Todos roubam", como defesa.</p><p>Sistema corrupto: PT rouba, usa dinheiro para comprar voto de outros, governa, mantém máquina. Povo recebe alguns benefícios (Bolsa Família real), mas foi financiado com roubo (orçamento foi desviado para mensalão).</p><div class="tip"><strong>Corrupção de Esquerda:</strong> Lula democratizou roubo: em lugar de elite de direita roubando tudo, é máquina de esquerda roubando meta. Semelhante eficiência, menos transparência porque esquerda prometia "moralidade".</div><div class="example"><strong>Mensalão na Prática:</strong> PT precisava de voto de deputado de partido pequeno. "Se votar comigo, seu partido recebe dotação orçamentária anual". Deputado vota. PT transfere dinheiro. Tanto governo como deputado enriquecem. Povo... bem, povo paga inflação que corrupção causa.</div><div class="quote"><strong>Verdade Incômoda:</strong> Corrupção não tem cor política. Lula não eliminou corrupção de direita. Criou corrupção de esquerda. Ambas roubam povo.</div>`},
    {
      id: 'CRES',
      title: 'Anos Crescimento: Riqueza Mascarando Corrupção',
      html: `<p>2003-2010: Lula governa em era de crescimento (commodity boom: China compra soja, minério brasileiro por preço alto). Economia cresce. Desemprego cai. Renda sobe. Povo "melhora de vida". <strong>Está tudo bem? Não. Corrupção cresce mais que economia.</strong></p><p>Crescimento econômico mascara corrupção. Quando economia cresce, povo não está tão atento (vida está melhorando). Corrupção acontece, mas ninguém nota porque crescimento "compensa". Problema: crescimento não dura. Corrupção sim.</p><h4>A Bolha de Commodities</h4><p>Quando preço de commodities cai (2008, depois 2014), economia brasileira cai junto. Mas corrupção continua. Resultado: roubo + economia fraca = colapso.</p><p>Enquanto crescimento cobria corrupção, sistema frágil continuava se desenvolvendo. Estruturas públicas ficavam mais ineficientes (roubadas). Dívida crescia (roubo inflava custos). Infraestrutura piorava (roubada).</p><div class="tip"><strong>Ilusão de Crescimento:</strong> Crescimento econômico pode mascarar corrupção estrutural. Quando crescimento acaba, corrupção fica exposta. Brasil de 2010-2015 foi desmascaramento: economiafraca + corrupção forte = crise.</div><div class="example"><strong>Investimento Roubado:</strong> Lula investe em infraestrutura (Pré-sal, Porto-Alegre, etc). Investimento é real, benefício é real (energia, emprego). Mas percentual foi roubado (custo inflado, comissões desaparecidas). Resultado: investimento de 10 bilhões realmente rendeu como investimento de 6 bilhões (4 desapareceram).</div><div class="quote"><strong>Crescimento Ilusório:</strong> Brasil cresceu, mas crescimento foi construído sobre corrupção estrutural crescendo mais rápido que economia. Quando economia parou, corrupção continuou crescendo, criando pressão que explodiu em crise.</div>`},
    {
      id: 'CRIS',
      title: 'Crise de 2014-2018: Quando Corrupção Colapsa o Sistema',
      html: `<p>2014 em diante: economia desacelera. Preços de commodities caem. Crescimento para. <strong>Corrupção não para.</strong> Resultado: governo fica sem dinheiro, mas continua roubando. Sistema colapsa.</p><p>Dilma Rousseff (2011-2016) herda economia que não cresce mais, mas sistema que continua sangrando (Petrobras sendo roubada massivamente, contratos de obra sendo desviados). Dilma não consegue consertar. Sofre impeachment (oficialmente por "crime fiscal", realmente por falta de votos no congresso).</p><h4>Lava Jato: Resposta a Colapso</h4><p>Colapso econômico + revelação de corrupção massiva = reação. Operação Lava Jato (2014 em diante) começa a investigar corrupção em Petrobras. Encontra <strong>esquema gigantesco onde construtoras roubavam bilhões.</strong></p><p>Lava Jato expõe que corrupção não era marginal. Era sistema. Bilhões roubados, não milhões. Envolvendo não apenas PT, mas também PSDB, PMDB, praticamente todos partidos.</p><div class="tip"><strong>Escala Real de Corrupção:</strong> Antes de Lava Jato, achava-se que corrupção era bilhões. Depois: descobriu-se que era dezenas de bilhões. Esquema era tão grande que economia inteira estava estruturada sobre roubo.</div><div class="example"><strong>Esquema de Construtoras:</strong> Construtoras pagavam propina para Petrobras dar contratos. Contratos eram inflados (custos reais: 1 bilhão, contrato: 3 bilhões). Diferença era dividida entre construtora, executivos de Petrobras, políticos. Lava Jato descobriu dezenas destes esquemas simultâneos, envolvendo bilhões.</div><div class="quote"><strong>Revelação de Lava Jato:</strong> Corrupção brasileira não é problema individual (alguns corruptos). É problema sistêmico (sistema inteiro). Cada nível (construtora, Petrobras, política) tinha papel em esquema.</div>`}

{
  id: 3,
  title: 'Lava Jato: Investigação, Escândalo e Questões de Justiça',
  free: false,
  topics: [
    {
      id: 'LVJT',
      title: 'Lava Jato: O Maior Escândalo de Corrupção Revelado',
      html: `<p>2014: Operação Lava Jato começa como investigação de lavagem de dinheiro em car wash. Descobre esquema de bilhões em Petrobras. <strong>Expõe corrupção massiva de sistema inteiro.</strong></p><p>Lava Jato é investigação que revela verdade terrível: corrupção brasileira não é marginal. É estrutural. Construtoras, Petrobras, política, todos são partes de mesmo sistema de roubo.</p><h4>O Funcionamento do Esquema</h4><p>1) Construtora precisa de contrato de obra em Petrobras. 2) Paga propina para executivo de Petrobras (geralmente via empresa de fachada). 3) Petrobras dá contrato por preço inflado. 4) Construtora paga percentual a político que "facilitou". 5) Todos enriquecem. 6) Povo paga em inflação + dinheiro público roubado.</p><p>Esquema funcionava porque cada ator tinha interesse: construtora ficava rica, Petrobras financiava campanha de político, político ficava poderoso, executivos de Petrobras ficavam ricos. Povo? Pagava.</p><div class="tip"><strong>Sistema Circular de Corrupção:</strong> Não era indivíduo isolado roubando. Era sistema onde cada nível tinha papel no roubo. Eliminar um nível não funcionava porque sistema continuava através outras vias.</div><div class="example"><strong>Contrato Típico de Lava Jato:</strong> Construtora X precisava de contrato em Petrobras. Pagou 50 milhões em propina (via consultoria fake). Recebeu contrato de 200 milhões (valor real: 80 milhões). Rentabilidade: 250%. Executivo de Petrobras recebeu 5 milhões. Político recebeu 10 milhões. Todos ficaram ricos. Povo? Pagou em impostos e inflação.</div><div class="quote"><strong>Verdade de Lava Jato:</strong> Não era roubo de marginal. Era roubo organizado de elite contra povo. Sistema era tão robusto que funcionava por décadas sem ser descoberto.</div>`},
    {
      id: 'INVX',
      title: 'Investigação: Como Juiz Sergio Moro Expôs Sistema',
      html: `<p>Juiz Sergio Moro liderou Lava Jato. Sua investigação foi revolucionária: <strong>não investigava casos isolados, investigava sistema.</strong> Rastreava dinheiro. Conectava atores. Revelava rede.</p><p>Métodos de Moro eram efetivos (talvez demais): colaboração premiada (delação premiada), investigação de contas bancárias, sequestro de bens. Resultado: centenas de condenações, bilhões recuperados.</p><h4>A Delação Premiada</h4><p>Moro usava "delação premiada": um corruptor fala, recebe pena reduzida. Delator depois fala sobre outros, que falam sobre outros. Corrente de delatores leva a exposição de sistema inteiro.</p><p>Método era efetivo contra esquema (delator quebra código de silêncio), mas problemático para justiça (pena reduzida para quem roubou bilhões? incentiva delação de bandido para liberar outro?)</p><div class="tip"><strong>Dilema de Delação Premiada:</strong> Funciona para romper silêncio de corruptos, mas cria problema moral: bandido que delata fica livre, enquanto vítima fica prejudicada.</div><div class="example"><strong>Delação Típica:</strong> Executivo de Petrobras admite ter roubado 500 milhões. Em troca de delação, recebe pena de 8 anos (em lugar de 20). Fala sobre rede inteira. Rede é presa. Executivo fica livre em 4 anos (por bom comportamento). Resultado: rede descoberta, mas executor principal fica livre. Justiça?</div><div class="quote"><strong>Paradoxo de Lava Jato:</strong> Investigação expôs corrupção massiva, mas métodos levantaram questões sobre se justiça foi realmente servida ou apenas balanceada politicamente.</div>`},
    {
      id: 'POLT',
      title: 'Questões Políticas: Lava Jato Como Arma de Poder',
      html: `<p>Lava Jato investigava PT massivamente (já que PT estava no poder quando corrupção acontecia). Resultado: PT é desgastado politicamente. Lula é condenado (controversamente). <strong>Lava Jato se torna arma política?</strong></p><p>Questão central: Lava Jato era investigação legítima de corrupção, ou era operação política disfarçada? Vazamentos de mensagens (Vaza Jato, 2019) mostram diálogo entre Moro e promotores sugerindo viés político.</p><h4>O Papel de Moro em Governo Bolsonaro</h4><p>2019: Bolsonaro ganha eleição (em contexto de Lava Jato desacreditando PT). Moro aceita ser Ministro da Justiça de Bolsonaro. <strong>Isso é problema:</strong> juiz que investigava, agora é executivo de presidente que se beneficiou dessa investigação?</p><p>Questão levantada: foi Lava Jato investigação neutra, ou foi operação política para remover PT? Vazamentos de mensagens sugerem envolvimento político. Moro depois nega, STF depois anula condenações de Lula (baseado em Moro ser parcial).</p><div class="tip"><strong>Crise de Legitimidade:</strong> Mesma que corrompeu Brasil por séculos (justiça a serviço de poder) pode ter corrompido Lava Jato. Investigação de corrupção pode ter sido ferramenta de corrupção política.</div><div class="example"><strong>Movimento Político:</strong> 2014-2018: Lava Jato desgasta PT. 2018: Bolsonaro ganha com anti-PT (benef iciado por Lava Jato). 2019: Lava Jato é integrada ao governo de Bolsonaro (Moro é Ministro). Padrão: investigação se torna arma política ao invés de busca por justiça.</div><div class="quote"><strong>Ironia de Lava Jato:</strong> Operação que começou para combater corrupção pode ter se tornado ferramenta de corrupção política. Sistema continua roubando, apenas personagens mudaram.</div>`},
    {
      id: 'FUTU',
      title: 'Futuro: Reforma de Instituições ou Repetição de Ciclo?',
      html: `<p>2018-2022: Bolsonaro está no poder. Promete combate a corrupção. <strong>Combate diferente do de Lava Jato (PT), combate na sua base política?</strong> Não. Resultado: nova corrupção emerge (caixa dois de Bolsonaro, investigações suspensas).</p><p>2022: Lula volta ao poder. Promete reformas. <strong>Você já ouviu essa promessa antes?</strong> 2003, 2007, 2011. Sempre promessa, frequentemente continuidade de corrupção em novas formas.</p><h4>O Ciclo de Promessas Quebradas</h4><p>Novo presidente chega prometendo fim de corrupção. Descobre que sistema é tão robusto que não consegue eliminar (porque eliminar significaria remover a si mesmo). Alterna entre combater corrupção de rivais políticos e ignorar a sua.</p><p>Resultado: ciclo infinito onde cada presidente promete combater corrupção do predecessor, implementa corrupção própria, próximo presidente combate a dele.</p><div class="tip"><strong>Reforma Necessária:</strong> Não é combater corrupção individual de cada presidente. É reformar instituições para que poder seja distribuído (não concentrado), transparência seja real (não simulada), punição seja certa (não seletiva).</div><p>Isso nunca foi feito porque reformar significaria que elite abre mão de poder. Elite não quer. Portanto ciclo continua.</p><div class="example"><strong>Promessa Recorrente:</strong> Novo presidente promete: "Vou acabar com corrupção, vou ser diferente, vou ser moral." Resultado? 4-8 anos depois, mesma corrupção com novo rosto. Próximo presidente: mesmo discurso. Sistema nunca muda porque beneficiários nunca querem que mude.</div><div class="quote"><strong>Realidade de Brasil:</strong> Corrupção não é problema que será "resolvido" por próximo presidente. É estrutura que foi tão bem instalada que sustenta a si mesma. Enquanto não houver reforma institucional real, ciclo continua.</div>`}
  ],

    {
      id: 'MECM',
      title: 'Corrupção Moderna: Licitações, Desvios, Conluios',
      html: `<p>2024: Corrupção não acabou. Mudou formato. <strong>Moderno, sofisticado, frequentemente legal aparentemente.</strong></p><p>Mecanismo principal: licitação pública. Governo precisa contratar obra/serviço. Abre licitação. Empresas participam. Ganhador executa.</p><p><strong>Problema: todo esse processo é zona de roubo.</strong> Empresas combinam preço (conluio). Vencedor paga propina a funcionário que avaliar. Executivo de empresa que venceu negocia com político para garantir próximas licitações. Tudo passa como "processo legal".</p><h4>Licitação Como Sistema de Roubo</h4><p>Verdadeiro preço de obra: 1 bilhão. Licitação é aberta. Empresas combinam (cartel): todas vão ofertar entre 2-3 bilhões (sobre-preço combinado). Governo "economicamente" escolhe 2,5 bilhões (ainda sobre 2.5x do real). Vencedor paga 200 milhões em propina para funcionário público. Resto (1.3 bilhões) é lucro de vencedor.</p><p>Funcionário recebeu "presente" por ter escolhido "economicamente a melhor proposta". Povo? Pagou 2.5 bilhões por obra que custa 1 bilhão. Diferença (1.5 bilhões) desapareceu em roubo.</p><div class="tip"><strong>Invisibilidade de Corrupção de Licitação:</strong> Não é roubo óbvio (desvia dinheiro). É roubo sofisticado (sobre-preço disfarçado de processo legal).</div><div class="example"><strong>Licitação Concreta:</strong> Prefeitura abre licitação para asfaltar rua (custo real: 10 mil/km). 4 empresas participam (todas cartéis da mesma rede). Todas ofertam 25 mil/km (sobre-preço 150%). Prefeitura "escolhe mais barata" (25 mil/km). Vencedor paga prefeito em "consultoria" (500 mil). Obra fica cara, qualidade ruim (porque foi tão roubada), povo paga impostos para pagar rua cara/fraca.</div><div class="quote"><strong>Lei Como Cúmplice de Corrupção:</strong> Lei de licitação foi feita para evitar corrupção (transparência, competição). Mas elite descobriu como corromper dentro da lei (conluios, sobre-preços, propinas disfarçadas).</div>`},
    {
      id: 'DESX',
      title: 'Desvios de Orçamento: Roubo Disfarçado de Realocação',
      html: `<p>Budge é aprovado para construir escola (50 milhões). Prefeitura "realoca" orçamento: "Precisamos mais para saúde, então levamos 20 milhões de escola para saúde." Resultado: escola não é construída, saúde também não (porque 20 milhões é insuficiente), dinheiro desaparece.</p><p>Desvio é roubo disfarçado de "realocação orçamentária". Legalmente, prefeito tem poder de realocar. Realmente, é autorização para roubar.</p><h4>Como Desvio Funciona</h4><p>Orçamento é aprovado em lei (transparente, público). Governo tem poder de "realoca r" (também legal). Aí é que entra crime: governo realoca sistematicamente (50% de orçamento é realocado). Dinheiro é desaparecido ou vai para obra de interesse político (que beneficia um grupo, não povo).</p><p>Problema: é "realocação legal" feita ilegalmente. Lei permite realocação. Prática usa realocação para roubar. Difícil de processar porque legalmente é permitido.</p><div class="tip"><strong>Fraude Dentro da Lei:</strong> Desvio é exemplo perfeito de como corrupção moderna funciona: usa legalidade para fazer ilegalidade.</div><div class="example"><strong>Desvio Típico de Prefeitura:</strong> Orçamento 2024 é 100 milhões (50 educação, 30 saúde, 20 infraestrutura). Prefeito realoca: "Vamos levar 25 de educação para fundo discricionário de prefeito" (poder que tem legalmente). Fundop assa para "consultoria" (empresa de amigo de prefeito). Consultoria "realiza serviço" invisível. Dinheiro desaparece. Escola não sai, aí Prefeito culpa "economia ruim".</div><div class="quote"><strong>Legalidade Como Escudo:</strong> Corrupção moderna não viola lei explicitamente; usa lei como ferramenta.</div>`},
    {
      id: 'CPLT',
      title: 'Corrupção de Cabeça de Lista: Elite Política Financiando-se Ilegalmente',
      html: `<p>Candidato a prefeito precisa de dinheiro para campanha. Legalmente, pode receber doações de empresa. Ilegalmente, pode receber caixa dois (dinheiro sem registro).</p><p><strong>Caixa Dois é corrupção que financia a si mesma:</strong> empresas doam "fora dos livros" para campanha. Candidato ganha eleição com dinheiro ilegal. Como presidente, candidato retorna "favor": da contrato para empresa que doou. Empresa recupera investimento (com lucro).</p><h4>O Ciclo de Financiamento Ilegal</h4><p>1) Empresa X doa 5 milhões ilegais para campanha de candidato Y. 2) Y ganha eleição. 3) Y da contrato de 50 milhões para Empresa X (inflado em 30 milhões). 4) Empresa recupera 5 milhões investidos + 15 milhões de lucro = 20 milhões de ganho em um contrato.</p><p>Problema: eleições são decididas por quem tem dinheiro para campanha. Quem tem dinheiro? Elite econômica. Resultado: democracia é comprada pelo mais rico.</p><div class="tip"><strong>Financiamento Ilegal de Campanha:</strong> Sistema eleito por povo, mas financiado por elite. Resultado: política é feita para elite, não para povo, porque elite pagou campanha.</div><div class="example"><strong>Caixa Dois na Prática:</strong> Prefeito precisa de 20 milhões para campanha (legal é insuficiente). Construtora empresta 10 milhões "fora dos livros" (caixa dois). Prefeito ganha. Agora, construtora "espera retorno": próximo contrato de obra vai para ela (sobre-preço 20 milhões). Construtora recupera 10 + ganha 10 = 20 de lucro. Povo? Pagou obra cara.</div><div class="quote"><strong>Verdade de Eleição Brasileira:</strong> Teoricamente é "uma pessoa, um voto" (democracia). Realmente é "mais dinheiro, mais voto" (plutocracia). Porque quem financia campanha é quem ganha poder.</div>`},
    {
      id: 'FRAU',
      title: 'Fraudes Eleitorais e Manipulação de Votos: A Democracia Corrompida',
      html: `<p>Corrupção não para em financiamento ilegal. Vai para manipulação de votos diretamente. <strong>Cédula trocada, sistema de urna eletrônica manipulada, votos contados errado.</strong> Democracia é corrupção final: nem voto é respeitado.</p><p>Fraude eleitoral é raro no Brasil contemporâneo (audit trail de urnas é relativamente seguro), mas era comum em passado (voto de cabresto, recontagem manual onde prefeito contava).</p><h4>História de Fraude Eleitoral</h4><p>República Velha: voto de cabresto (coronel escolhe). Ditadura Militar: "eleição indireta" (congresso elegia presidente, elite escolhia congresso). Era-FHC: eleições relativamente livres, mas com caixa dois massivo. Era-Lula: eleições livres, caixa dois massivo. Agora: eleições relativamente livres (tecnologicamente), mas financiamento ilegal continua.</p><p>Problema moderno é menos fraude de voto (técnica está segura), mais fraude de informação: fake news, desinformação, manchetes falsas que influenciam voto. É fraude mais sofisticada: não troca voto fisicamente, troca intenção de votante.</p><div class="tip"><strong>Nova Fraude Eleitoral:</strong> Antes era trocar voto fisicamente. Agora é manipular informação que leva votante a votar "errado" (segundo interesse de quem manipula).</div><div class="example"><strong>Desinformação em Eleição:</strong> Campanha "neutra" espalha notícia falsa sobre candidato rival. Votante lê, acredita, vota contra rivalno-li. Voto é contado corretamente (urna é segura), mas votante foi desinformado. Resultado: fraude eleitoral sem tocar em voto (fraude de informação).</div><div class="quote"><strong>Evolução de Fraude Eleitoral:</strong> De física (trocar voto) para informacional (manipular mente). Mais sofisticada, mais efetiva, mais difícil de combater.</div>`}
  ],
  flashcards: [

    {q: 'Como conluio funciona em licitação?', a: 'Empresas combinam (cartel) ofertar sobre-preço; governo escolhe "mais barata" (ainda sobrevaloriz ada).'},
    {q: 'O que é desvio de orçamento?', a: 'Realocação legal de dinheiro de uma rubrica para outra, frequentemente levando a roubo.'},
    {q: 'Por que desvio é difícil processar?', a: 'Porque lei permite realocação; prática usa legalidade para fazer ilegalidade.'},
    {q: 'O que é caixa dois?', a: 'Financiamento ilegal de campanha: doação sem registro que cria obrigação de retorno (contrato inflado).'},
    {q: 'Como caixa dois financia a si mesmo?', a: 'Empresa doa ilegalmente, eleito retorna via contrato inflado; empresa recupera + lucra.'},
    {q: 'Por que caixa dois torna democracia em plutocracia?', a: 'Porque quem tem dinheiro para financiar é quem ganha poder; maioria é financeiramente impotente.'},
    {q: 'Qual é a fraude eleitoral moderna?', a: 'Menos fraude física de voto, mais fraude de informação (desinformação, fake news).'},
    {q: 'Como desinformação funciona como fraude?', a: 'Campanha espalha notícia falsa; votante acredita, vota "errado"; voto é contado corretamente mas votante foi desinformado.'},

{
  id: 5,
  title: 'Instituições Anti-Corrupção: Funcionam, Por Que Falham, O Que Poderia Funcionar',
  free: false,
  topics: [
    {
      id: 'INST',
      title: 'CGU, MPF, Polícia Federal: Existem, Têm Poder, Falham em Uso',
      html: `<p>Brasil tem instituições anti-corrupção: Controladoria-Geral da União (CGU), Ministério Público Federal (MPF), Polícia Federal (PF). <strong>Existem. Têm poder legal. Frequentemente falham em usar poder.</strong></p><p>Por quê? Porque instituições estão dentro de sistema corrupto. MPF é investigar corrupção? Mas procurador que investi ga pode ser pressionado politicamente. PF é federal? Mas presidente nomeia diretor-geral. Sistema rouba-se a si mesmo.</p><h4>CGU: Auditoria Que Audita o Auditor</h4><p>CGU é órgão de controle de governo. Deveria auditar todos gastos públicos, revelar desvios, processar fraudadores. Realidade: CGU audita o que lhe deixam auditar (governo escolhe que auditoria é "prioritária"). Auditorias de interesse político são feitas; de aliado político são ignoradas.</p><p>Resultado: CGU existe, tem poder, mas usa poder seletivamente. Não é corrupção clássica (não recebe propina), é <strong>corrupção institucional:</strong> usa poder público para beneficiar aliados.</p><div class="tip"><strong>Problema de Instituição Anti-Corrupção:</strong> Se está dentro de governo, é pressionada por governo. Se é independente, é criticada por governo como "ativista". Sistema corrompido não tolera instituição realmente independente.</div><div class="example"><strong>Auditoria Política:</strong> 2020-2022: CGU audita secretaria de saúde de governo federal (aliado). Encontra desvios. Resultado: relatório é "revisado", desvios são "contextualizados", ninguém é punido. Ano anterior: CGU audita secretaria de saúde de prefeito rival (da oposição). Encontra desvios pequenos. Resultado: relatório é publicado amplamente, prefeito é atacado politicamente.</div><div class="quote"><strong>Ilusão de Instituição Anti-Corrupção:</strong> Institução só combate corrupção se está realmente fora de sistema. Estando dentro, combate apenas corrupção de rivais.</div>`},
    {
      id: 'MPPF',
      title: 'MPF e PF: Poder Gigantesco, Responsabilidade Zero',
      html: `<p>MPF tem poder legal de investigar federal crimes. PF tem poder de prender. <strong>Dois poderes imensamente concentrados em duas instituições. Qual é a supervisão? Mínima.</strong></p><p>Procurador Federal Denuncia empresa? Empresa é investigada, processada, condenada frequentemente (sistema legal está contra poder privado). Procurador Federal denuncia colega? Frequentemente é "arquivado" (corrupção de corporação: corporação protege corporação).</p><h4>Corporativismo de MPF</h4><p>MPF é corporação de procuradores. Corporação protege membros (como polícia protege polícia, militar protege militar). Se procurador é investigado por colega, frequentemente investigação é arquivada ou minimizada por "questão de corporação".</p><p>Resultado: MPF tem poder contra privado, corporações, governo. Raramente contra si mesmo. É corporação acima da lei, não órgão de justiça.</p><div class="tip"><strong>Poder Sem Responsabilidade:</strong> MPF e PF têm poder imenso (investigar, processar, prender), mas responsabilidade é mínima (investigação interna é corporativista).</div><div class="example"><strong>Caso de Corporativismo:</strong> Procurador é acusado de aceitar propina. Investigação interna é aberta. Resultado? 95% das vezes é arquivada (porque corporação protege). Se cidadão comum é acusado de crime, 30% das vezes é condenado mesmo sem prova. Desigualdade massiva.</div><div class="quote"><strong>Dilema de Instituição Poderosa:</strong> Quanto mais poder tem, menos transparência pode ter (porque transparência limita poder). Resultado: corrupção cresce não porque não há instituição anti-corrupção, mas porque instituição anti-corrupção é tão poderosa que não pode ser supervisionada.</div>`},
    {
      id: 'STF',
      title: 'Supremo Tribunal Federal: Intérprete Ultimo Ou Político?',
      html: `<p>STF é corte suprema de Brasil. Última instância. 11 ministros. <strong>Nenhum deles é eleito. Todos são nomeados por presidente.</strong></p><p>Problema: se presidente nomeia ministros, e ministros julgam atos de presidente, há conflito de interesse gigantesco. Ministro nomeado por presidente A pode favorecer presidente A. Quando presidente B chega, ministros nomeados por A continuam julgando atos de B.</p><h4>STF Como Arena Política</h4><p>STF não é apenas corte de justiça. É arena política. Decisões "jurídicas" frequentemente refletem posição política do ministro. Há "blocos" dentro de STF (ministro X com ministro Y frequentemente votam junto). Parece menos como "justiça interpretando lei" e mais como "política decidindo lei".</p><p>Exemplo clássico: Lula é condenado por Moro/TRF4. Apela a STF. STF anula condenação (em decisão 8-3 dizendo Moro era parcial). Decisão legal é válida, mas timing político é suspeito (anulação aconteceu meses antes de Lula poder concorrer novamente).</p><div class="tip"><strong>Justiça Sem Legitimidade:</strong> Quando corte suprema é percebida como política (não apenas jurídica), justiça perde legitimidade. Povo não acredita que ministro julga por lei, mas por política.</div><div class="example"><strong>Voto de Ministro Político:</strong> Ministro nomeado por Lula vota favor de Lula. Ministro nomeado por FHC vota contra. Não por lei, por política. STF se torna 11 políticos decidindo, não 11 juízes julgando.</div><div class="quote"><strong>Crise de STF:</strong> Órgão que deveria ser mais imparcial é um dos mais políticos. Porque nomeação é política, decisões frequentemente refletem nomeação.</div>`},
    {
      id: 'REFO',
      title: 'O Que Poderia Funcionar: Reformas Institucionais Necessárias',
      html: `<p>Para combater corrupção de verdade, não é combater indivíduo. É reformar instituição. <strong>O que seria necessário?</strong></p><p>Reforma 1 (Descentralização de Poder): Concentração de poder em presidente, governo permite corrupção massiva. Solução: descentralizar (congresso com poder real, estados com autonomia, municípios independentes). Quando poder é distribuído, nenhum grupo consegue roubar tudo.</p><p>Reforma 2 (Transparência Radical): Orçamento público deve ser publicado em tempo real (não depois). Quando governo sabe que gasto será público em segundos, roubo diminui (porque será descoberto rapidamente).</p><p>Reforma 3 (Responsabilidade Judicial Igual): Procurador deve ser julgado com rigor igual a cidadão comum. Ministro de STF deve ser investigado com rigor igual a prefeito. Quando lei é igual para todos, corrupção de corporação diminui.</p><p>Reforma 4 (Termo Limite em Todos os Cargos): Presidente governa 8 anos, sai. Procurador tem 10 anos, sai. Ministro tem 20 anos, sai. Quando você sabe que sai em tempo, você investe menos em "rooubar para futuro" (porque não vai ter futuro no cargo).</p><div class="tip"><strong>Reformas Estruturais:</strong> Não é "prender mais corruptos". É "estruturar instituição para que corrupção seja mais difícil". Diferença é tudo.</div><div class="example"><strong>Transparência Radical na Prática:</strong> Prefeito quer desviar 1 bilhão. Abre orçamento? Sistema publicará em tempo real. Em horas, vai ficar óbvio que 1 bilhão desapareceu. Mídia reportará. Investigação será aberta. Roubo é muito mais arriscado. Versus: sistema atual onde orçamento é publicado 6 meses depois. Desvio tem meses para ser escondido.</div><div class="quote"><strong>Verdade de Combate a Corrupção:</strong> Não se combate corrupção punindo corruptores (nunca prenderá todos). Se combate criando instituição que torna roubo risco-benefício péssimo (muito risco, pouco benefício). Então roubo diminui, não porque pessoas são boas, mas porque sistema desincentiva.</div>`}
  ],
  flashcards: [
    {q: 'Por que instituições anti-corrupção falham?', a: 'Porque estão dentro de sistema corrupto que as pressiona politicamente.'},
    {q: 'O que CGU audita?', a: 'Gastos públicos, desvios, fraudes. Mas audita seletivamente (governo escolhe prioridade).'},
    {q: 'Qual é o problema de poder sem responsabilidade?', a: 'MPF/PF têm poder imenso, responsabilidade interna é corporativista (corporação protege corporação).'},
    {q: 'Por que STF é político?', a: 'Porque ministros são nomeados por presidente; decisões refletem política de quem nomeou.'},
    {q: 'Qual é o maior problema de nomeação de ministros?', a: 'Ministro joga para presidente que nomeou; conflito de interesse é permanente.'},
    {q: 'O que é corporativismo de instituição?', a: 'Corporação protege membros contra investigação; membro é raramente punido por corporação própria.'},
    {q: 'Qual seria a reforma 1 contra corrupção?', a: 'Descentralização de poder: quando poder é distribuído, nenhum grupo rouba tudo.'},
    {q: 'Qual seria a reforma 2?', a: 'Transparência radical: orçamento publicado em tempo real, não depois (roubador é descoberto rapidamente).'},

    {q: 'Qual seria a reforma 4?', a: 'Termo limite em todos cargos: presidente 8 anos, procurador 10, ministro 20; incentivo a não roubar é menor.'},

{
  id: 6,
  title: 'Perspectivas: Futuro de Corrupção e Caminhos para Mudança Real',
  free: false,
  topics: [
    {
      id: 'DIAG',
      title: 'Diagnóstico: Corrupção É Estrutural, Não Residual',
      html: `<p><strong>Diagnóstico brutal: corrupção no Brasil não é exceção. É estrutura.</strong></p><p>Não é "alguns corruptores". É "sistema inteiro é corrupto". Não é problema de indivíduo moral. É problema de instituição desenhada para roubo.</p><p>Brasil nasceu como projeto de extração (colônia). Evoluiu para máquina de transferência de recursos públicos para elite privada (monarquia, república, ditadura). Agora é "democracia" onde elite continua roubando, apenas com voto.</p><div class="tip"><strong>Aceitação do Diagnóstico:</strong> Enquanto o povo achar que corrupção é problema que será "resolvido" por próximo presidente, ciclo continua. Corrupção é estrutural: presidentes são sintoma, não causa.</div>`},
    {
      id: 'ESPE',
      title: 'Esperança: Por Que Mudança Ainda É Possível',
      html: `<p>Diagnóstico é sombrio, mas esperança existe. Por quê?</p><p>Porque estrutura corrompida é frágil (depende de consentimento de povo). Povo que acorda para realidade pode exigir mudança. Sociedade civil pode construir instituição fora do governo que audita governo. Transparência tecnológica (blockchain, tecnologia) pode tornar roubo mais difícil.</p><p><strong>Mudança não será fácil (elite defenderá status quo com tudo que tem). Mas é possível se povo de verdade exigir.</strong></p><div class="tip"><strong>Alavanca de Mudança:</strong> Não é próximo presidente. É povo que exige que toda instituição (pública e privada) seja transparente, auditada, e responsável.</div>`},
