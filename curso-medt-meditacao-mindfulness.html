        content: '<h4>Meditação Não é Relaxamento Somente</h4><p><strong>Meditação é treinamento de atenção. Você treina sua mente para focar em um alvo (respiração, mantra, sensação corporal) e quando mente vagueia, você traz de volta. Isso é repetição que muda cérebro fisicamente</strong>.</p><blockquote class="tip">Meditação é para mente como exercício é para corpo. Você não faz um dia de exercício e espera estar em forma. Você não medita um dia e espera iluminação. Consistência ao longo de tempo cria mudança.</blockquote><p>Você provavelmente associa meditação com esoterismo, monges em cavernas, ou coisa "flaky". Realidade: meditação é prática de atenção secular estudada extensivamente em neurociência. Cérebro responde detectavelmente a meditação consistente.</p><h4>Tipos de Meditação</h4><p>Existem muitos tipos: meditação focada (concentração em respira ção), varredura corporal (atenção em sensações), meditação de compaixão (envio de bondade), meditação de movimento (ioga, tai chi). <strong>Todos compartilham elemento comum: treinar atenção voluntária</strong>.</p><blockquote class="example">Meditação focada você traz atenção para respiração repetidamente. Seu trabalho é retornar quando mente vagueia, não ter mente "vazia". Mente vaguear é normal. Trazer de volta é meditação.</blockquote><blockquote class="quote">Meditação é o oposto de multitarefa obsessiva moderna. É retorno ao foco.</blockquote>'
