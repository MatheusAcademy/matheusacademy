    {id:1,
     name:"Armadilhas Específicas em Investimento e Crédito",
     dur:"50 min",
     content:`<h3>Como Vieses Cognitivos Sabotam Financeiro Pessoal</h3><p>Agora vamos ver como vieses específicos afetam as duas atividades financeiras mais importantes: investimento e crédito.</p><p>Em investimento, ilusão de controle leva a overtrading. Investor que acompanha preços diariamente (às vezes minuto a minuto) desenvolve falsa sensação de que consegue "time the market" ou "beat the market". Pesquisa mostra que trader que troca portfolio muito frequentemente tem retorno inferior a "buy and hold" investor. Por quê? Porque custo de transação, impostos, e timing ruim (compra em pico, vende em fundo) superam qualquer ganho do trading skill. Ilusão de controle é culpada por muito underperformance.</p><p>Recency bias é superexposição a eventos recentes. Se mercado subiu nos últimos 3 meses, investor recentes acho que continuará subindo e compra no pico. Se mercado caiu nos últimos 3 meses, investor pensa que continuará caindo e vende no fundo. Mas mercado frequentemente reverte depois de movimentos extremos. Recency bias leva a compra no pico e venda no fundo, timing terrível.</p><p>Herd mentality é seguir multidão. Durante bolhas (dot-com 2000, imóvel 2008, criptomoedas 2017-2021), todos estão comprando porque "todos ganham". Medo de ficar para trás (FOMO - fear of missing out) leva pessoas a comprar no pico de bolha. Resultado é perda quando bolha estufa. Aqueles que resistiram a herd mentality e permaneceram racional ganham quando bolha estufa (comprando o fundo).</p><p>Disponibilidade bias é julgar probabilidade baseado em quanto fácil é lembrar exemplos. Se recentemente viu história de alguém que ficou rico na bolsa, acha que probabilidade de enriquecer na bolsa é maior que realmente é. Se recentemente viu história de algu��m que perdeu dinheiro com fraud, acha que probabilidade de fraud é maior. Disponibilidade bias leva a distribuição errada de probabilidades de eventos.</p><p>Narrative fallacy é preferência por histórias coerentes. Depois que preço sobe, é fácil construir história "óbvio por que subiu". Antes do sobe, não era óbvio. Mas "expert" constrói narrativa convincente ex-post. Investor ouve narrativa, acha que "faz sentido", compra baseado em narrativa. Problema é que mesmos fundamentals podiam ter construído narrativa oposta ex-ante. Narrativa fallacy leva a overconfidence em análise que é realmente apenas just-so story.</p><p>Em crédito, presente bias é privilegiar presente sobre futuro. Pessoa pega crédito para compra hoje, ignora que terá que pagar amanhã. Especialmente durante crises quando renda é incerta, pegar crédito para consumo é arriscado. Mas presente bias leva pessoas a fazer exatamente isso. Quando renda desaparece e dívida permanece, pessoa enfrenta problema grave.</p><p>Self-control é problema relacionado. Pessoa sabe que "deveria" economizar para aposentadoria, mas presente bias leva a escolher consumo hoje. Pessoa conhece que "deveria" sair de dívida de cartão (juros 20%), mas presente bias leva a pegar mais empréstimo para consumir hoje. Autocontrole é recurso finito (não consegue resistir a tudo), então importante desenhar ambiente para minimizar tentação.</p><p>Mental accounting é dividir dinheiro em "buckets" mentais separados com regras diferentes. Pessoa que "tira meu salário para gastar" e "deixa investimento de longo prazo intocado" está fazendo mental accounting. Problema é quando mental accounting leva a decisões irracionais. Por exemplo, pessoa que pega empréstimo de curto prazo a 20% de juros para investir em CDB de 8% de juros está violando lógica (paga 20%, ganha 8%, perde 12%). Mas mental accounting ("dinheiro de investimento é separado de dinheiro de empréstimo") leva a decisão irracional.</p><p>Loss aversion em crédito leva a evitar risco necessário. Pessoa que recusa tomar empréstimo mesmo em situação onde esperança matemática é positiva (por exemplo, empréstimo a 5% para investimento que espera render 8%) porque "não quer dívida". Isso é racional se pessoa tem aversão ao risco, mas frequentemente é excessivo. Muitas pessoas ficam pobres porque recusam dívida estratégica enquanto ricos usam dívida para amplificar retorno.</p><p>Sunk cost fallacy leva a jogar dinheiro bom atrás de dinheiro ruim. Pessoa que pegou empréstimo para estudar que não resultou em melhor emprego, agora tira outro empréstimo para estudar outra coisa (esperando que dessa vez funciona). Sunk cost fallacy: o empréstimo anterior é "sunk" (j�� foi) e não deveria influenciar decisão futura. Mas emocionalmente, pessoa quer recuperar o investimento anterior, levando a decisão ruim.</p><blockquote class="example"><strong>Caso Real Comum:</strong> Pessoa tira crédito do cartão para comprar eletrônico (presente bias leva a querer hoje). Depois não consegue pagar (renda cai ou gastos aumentam). Entra em espiral de dívida: tira mais crédito para pagar anterior (dinheiro bom atrás de ruim). Mental accounting separa "dívida de cartão" de "dinheiro para emergência" assim não reduz gastos para pagar dívida. Sunk cost fallacy faz pensar "já paguei tanto, preciso investir mais para recuperar". Resultado é dívida descontrolada. Múltiplos vieses se combinam em desastre financeiro.</blockquote><p>Compreender essas armadilhas permite evitá-las. Se sabe que tem overtrading bias, coloca limite de trades por mês. Se sabe que tem recency bias, mantém plano de investimento fixo (SIP) que ignora movimentos recentes. Se sabe que tem presente bias, automatiza poupança (sai de conta antes que você veja e gaste).</p>`,
     cards:[{"q":"O que é ilusão de controle em investimento e qual é seu efeito?","a":"Ilusão de controle leva a achar que consegue \"time the market\" ou \"beat the market\" através de trading frequente. Resultado é retorno inferior a buy-and-hold por custos de transação e timing ruim."}]
    },
    {id:2,
     name:"Múltiplos Vieses Combinados: Quando Erro se Amplifica",
     dur:"50 min",
     content:`<h3>A Sinfonia Perfeita de Erros: Como Vieses se Reforçam Mutuamente</h3><p>Até agora analisamos vieses individualmente. Mas na vida real, múltiplos vieses agem simultaneamente, frequentemente reforçando um ao outro em ciclos viciosos que amplificam erro inicial.</p><p>Considere cenário típico de bolha especulativa. Começa com asset que tem fundamental positivo (ação de empresa boa, imóvel em localização popular, criptomoeda com tecnologia interessante). Ancoragem faz primeiro comprador pensar "expert diz que pode valer 2x mais, então compra a preço que acha que é barganha". Conforme mais pessoas compram, preço sobe. Disponibilidade bias da segunda onda de compradores: veem história de primeiro comprador que ganhou, pensam que fácil ganho está disponível para todos, compram. Herd mentality: "todos estão comprando, deve ser bom", mais compram. Ilusão de controle: trader acha que consegue vender no pico (não consegue), fica dentro da bolha mais tempo que deveria.</p><p>Conforme bolha fica maior, narrativa fallacy entra. Experts construem história convincente por qual preço deve continuar subindo ("população crescendo, urbanização aumenta valor de imóvel", ou "tecnologia blockchain revolucionará tudo"). Viés de confirmação faz que quem comprou busque apenas histórias confirmando narrativa, ignorando sinais de alerta. Quando dados contradizem narrativa, é racionalizado ("mercado estava tendo um pulso natural").</p><p>Mentira para si mesmo (denial) entra como novo viés. Pessoa que viu preço triplicar não consegue acreditar que pode cair. Ilusão de controle faz pensar "consegui ir com a trend, conseguirei sair no pico". Aversão à perda faz que em vez de vender no pico, segura esperando recuperar se cair. Resultado é vende no fundo quando já caiu muito, realizando máxima perda.</p><p>Após bolha estufa e pessoas perdem dinheiro, novo conjunto de vieses entra. Culpar externo (não é culpa minha, é culpa do governo/Fed/especialistas). Reescrita de história (acho que nunca acreditei mesmo, ou acreditei por "boas razões" que agora vejo que eram erradas). Essas racionalizações reduzem desconforto emocional de perda, mas impedem aprendizado.</p><p>Ciclo frequentemente se repete: próxima bolha em asset diferente, mesma mecânica de vieses, mesma amplificação, mesma queda. Pessoa que perdeu em dot-com frequentemente perde em imóvel. Pessoa que perdeu em imóvel frequentemente perde em criptomoeda. Porque não aprende padrão de vieses; apenas aprende "dot-com era bolha" (especial knowledge) mas não aprende "vieses combinados criam bolhas" (padrão geral).</p><p>Outra amplificação vem de feedback loops financeiros. Quando você pede empréstimo (porque acha que investimento vai ganhar), e investimento de fato ganha no curto prazo, fica confiante, pede mais empréstimo. Alavancagem amplifica ganho inicial, tornando mais confiante. Mas quando mercado vira, alavancagem amplifica perda, levando à ruína. Muitas falências financeiras vêm de feedback loop onde alavancagem amplificou viés de confiança em ciclo ascendente, depois amplificou perda em ciclo descendente.</p><p>Sistema emocional também entra em feedback loop. Ganho causa dopamina, reforçando comportamento de trading/risco-taking. Perda causa cortisol, reforçando comportamento de pânico/venda. Ambos levam a decisões ruins. Durante ganhos, pessoa toma risco excessivo (dopamina causa overconfidence). Durante perdas, pessoa vende em pânico (cortisol causa medo). Isso é inverso do que seria ideal (tomar risco quando mercado está em fundo, ser conservador quando mercado está em pico).</p><p>Contexto social amplifica também. Amigo é entusiasmado sobre investimento, compartilha ganhos com você. Viés de conformidade faz você querer participar. Viés de comparação social faz você comparar seu retorno com dele (e se sente mal se está atrás). Resultado é você investe em coisa que normalmente não investiria. Se ganhar, ambos celebram, reforçando comportamento. Se perder, ambos culpam externo.</p><p>Para quebrar ciclos de vieses combinados, importante é: (1) Humildade: reconhecer que você é sujeito a vieses como todos. (2) Sistemas: implementar regras que funcionam mesmo quando você está enviesado (por exemplo, "vendo 10% anualmente independente de performance"). (3) Diversidade: ouvir perspectivas diferentes que contradizem sua narrativa. (4) Reflexão: depois de decisão importante, faça "autopsy": "que vieses influenciaram essa decisão?" Reflexão permite aprendizado em próxima oportunidade.</p><blockquote class="news"><strong>Exemplo Contemporâneo 2021-2024:</strong> Fase de criptomoedas 2021: ancoragem em "pode ir a 100k", disponibilidade (ganhadores visíveis), narrativa (revolucionará finanças), alavancagem (pedir empréstimo para comprar), feedback social (todos têm criptomoeda). Bolha estufa 2022. Agora 2024: reciclagem da narrativa (próxima inovação), novos compradores que não viveram 2021, mesmo ciclo de vieses pronto a repetir.</blockquote><p>Compreender amplificação de vieses permite antecipar bolhas e crises. Quando vê convergência de múltiplos sinais (preços subiram muito, narrativa é muito convincente, alavancagem está alta, conformidade social está em máximo), é hora de ser cético e defensivo. Isso não previne todas bolhas, mas oferece melhor odd de não estar exposto demais quando estoura.</p>`,
     cards:[{"q":"Como múltiplos vieses se combinam para amplificar erro durante bolha especulativa?","a":"Ancoragem estabelece preço inicial, herd mentality e conformidade levam outros a comprar, narrativa fallacy justifica preços, alavancagem amplifica ganhos fictícios, e ilusão de controle evita venda no pico."}]
    },
    {id:3,
     name:"Reconhecendo Seus Próprios Vieses: Autoconhecimento",
     dur:"50 min",
     content:`<h3>Conhecer Tua Mente: Primeiro Passo Para Melhor Decisão</h3><p>Saber que vieses existem não é suficiente. Precisa saber quais vieses afetam você especificamente. Diferentes pessoas têm diferentes "perfil de vieses". Pessoa que é naturally risk-averse pode ter exagerado preocupação com perda (aversão à perda forte), enquanto pessoa que é naturally risk-seeking pode ter ilusão de controle forte. Auto-conhecimento permite desenhar defesas específicas.</p><p>Uma ferramenta útil é "behavioral financial audit": revisar suas últimas 10 decisões financeiras significativas e identificar qual viés provavelmente influenciou. Comprou ação porque expert que respeitava recomendou? Viés de autoridade. Vendeu ação porque preço caiu muito e medo era alto? Aversão à perda + pânico. Mantém investimento original apesar de fundamentals deteriorarem? Sunk cost fallacy. Não investe em ações porque "bolsa é para ricos"? Aversão ao risco + status quo.</p><p>Próximo passo é aceitar que vieses são parte de você. Não consegue eliminá-los (tente resistir: quanto mais tenta ignorar pensamento, mais ele invade sua mente). Ao invés, precisa trabalhar com vieses, não contra. Desenha sistema que funciona mesmo com vieses presentes.</p><p>Exemplos de sistemas que compensam vieses:</p><p>Aversão à perda + Ilusão de controle = overtrading → Solução: limitar trades por mês, usar "trade journal" para rastrear performance, ver que maioria de trades são perda. Feedback claro que trading não funciona muda comportamento.</p><p>Presente bias + Overconfidence = gastar demais, poupar de menos → Solução: automatizar poupança (transferência automática de salário para investimento antes que veja o dinheiro). Automação vence vieses por não dar chance de decidir emocionalmente.</p><p>Herd mentality + FOMO = compra em pico de bolha → Solução: plano de investimento fixo (SIP - contribui valor fixo em intervalos regulares independente de preço). SIP força a "contrarian" comportamento: quando preço está alto, sua contribuição fixa compra menos shares (venda). Quando preço está baixo, compra mais shares (compra).</p><p>Recency bias = timing ruim de mercado → Solução: ignorar notícias de curto prazo, focar em plano de longo prazo. Desabilitar notificações de preço, não olhar portfolio frequentemente (por exemplo, verificar apenas trimestralmente).</p><p>Mental accounting = decisão financeira irracional → Solução: net worth accounting. Ao invés de pensar em "buckets" separados (esse dinheiro é para investimento, esse é para emergência), pense em net worth total. Decisão que melhora net worth total é boa; que piora é ruim. Elimina ilusão de separação mental.</p><p>Narrativa fallacy = acredita em histórias não-verificadas → Solução: verificar fontes, ser cético de claims extraordinários, lembrar que "correlation is not causation". Se expert diz "A causou B", pergunta "como sabe que não foi C que causou B?"</p><p>Um conceito importante é "commitment device": antes de estar em situação emocional, faz contrato consigo mesmo sobre qual será a ação. Exemplo clássico de Ulysses: Ulysses pediu que amarrassem ele ao mast quando ouviria sereias (que causam perda de controle). De forma similar, você pode fazer "commitment devices" financeiros. Antes de mercado cair, decide "não vendo nada". Quando mercado de fato cai e medo é alto, honra o commitment feito quando emoção era neutral.</p><p>Outro conceito útil é "pre-mortems": antes de decisão importante, imagina que falhou e pensa por quais razões falhou. Isso força antecipação de possíveis problemas que vieses normalmente ocultam. "Vou investir em ação X: se perder 50% em 2 anos, foi porque: setor teve queda, empresa perdeu market share, EU subestimei riscos porque tinha ilusão de controle." Identificar esses riscos ex-ante muda cálculo de risk-reward.</p><p>Também importante é ter "external advisor" ou "accountability partner": pessoa que você conversa sobre decisões financeiras que é racional e desapaixonada. Não amigo que também quer ganhar rápido (reforçaria viés), mas person que pode dizer "espera, você está cometendo erro X". Às vezes confundir seus vieses requer perspectiva de fora.</p><p>Meditação e mindfulness têm mostrado benefício em reduzir reatividade emocional. Pessoa que medita regularmente consegue observar impulsos emocionais ("quero vender agora") sem agir imediatamente. Isso cria espaço entre stimulus (queda de preço) e response (venda), permitindo resposta mais racional.</p><blockquote class="tip"><strong>Exercício Prático:</strong> Mantenha "decision journal": sempre que faz decisão financeira significativa, anota: data, decisão, sua justificação, emocional seu estava, qual viés você suspeita influenciou, qual teria sido resposta se fosse totalmente racional. Depois, revisa regularmente para ver se vieses esperados realmente ocorreram. Padrões emergirão rapidamente.</blockquote><p>Compreender e aceitar próprios vieses é liberdade. Pessoa que pensa "não tenho viés, sou racional" é presa de vieses (chamado "bias blind spot"). Pessoa que reconhece "tenho esses vieses específicos" consegue desenhar vida para compensá-los. Você não consegue vencer vieses (são hard-wired em cérebro), mas consegue vencê-los se trabalha com a mente, não contra.</p>`,
     cards:[{"q":"Como você pode descobrir qual é seu perfil de vieses cognitivos?","a":"Revisar decisões financeiras passadas, identificar padrões de erro, fazer behavioral financial audit listando últimas decisões e viés provável. Isso revelar quais vieses afetam você especificamente."}]
    }
  ],
  summary:{"title":"Resumo do Módulo 2","points":["Aversão à perda: pessoas sofrem mais com perda de dinheiro que com ganho de montante similar, levando a riscos excessivos de recuperação","Ancoragem: primeira informação influencia desproporcionalmente futuras decisões e estimativas","Ilusão do controle: pessoas subestimam influência do acaso e superestimam sua capacidade de controlar resultados","Viés de confirmação: tendência de buscar informação que confirma crença existente enquanto ignora informação que contradiz"]},
  quizFinal:[{"q":"O que é aversão à perda?","opts":["Medo de perder dinheiro","Sofrer mais com perda de 100 reais que com ganho de 100 reais","Evitar qualquer risco","Ser conservador"],"correct":1},{"q":"O que é efeito ancoragem?","opts":["Ficar com primeira informação permanentemente","Primeira informação influencia desproporcionalmente","Ignorar informação inicial","Dar peso igual a toda informação"],"correct":1},{"q":"Qual é efeito de ilusão de controle em investimentos?","opts":["Investidor é sempre bem-sucedido","Investidor acha que controla mais que realmente controla","Investidor não consegue controlar nada","Não há tal coisa como ilusão"],"correct":1}]

     name:"Nudges: Pequenas Mudanças com Grande Impacto",
     dur:"50 min",
     content:`<h3>Como Desenho de Escolha Muda Comportamento Sem Forçar</h3><p>Um dos maiores contribuições de economia comportamental é conceito de "nudges" (literalmente "empurrões"). Nudge é pequena mudança no desenho de escolha que leva a melhor decisão sem remover opção de escolher. Richard Thaler, um dos fundadores de behavioral economics, ganhou Nobel em 2017 em parte pelo trabalho em nudges.</p><p>O exemplo clássico é "default option" (opção padrão). Quando empresa de pensão oferece plano de aposentadoria, se default é "participate" (você é automaticamente enrolado), taxa de participação é 90%+. Se default é "not participate" (você precisa opt-in), taxa cai para 20%. Mesma opção, mesma oportunidade, mas simplesmente mudar default muda comportamento radicalmente. Por quê? Inércia: maioria não muda default. Viés de status quo: deixar como está é mais fácil que mudar.</p><p>Isso tem implicação enorme. Se quer que mais pessoas economizem para aposentadoria, mude default de "opt-in" para "opt-out". Se quer que menos pessoas gastem em coisas nocivas, mude default de "fácil acessar" para "difícil acessar". Default importa profundamente.</p><p>Outro nudge é "salience" (visibilidade). Se informação é visível e fácil, pessoa toma em conta. Se é invisível ou enterrada em fine print, ignora. Exemplo: nutrição label em comida. Simples change de mostrar calórias em font maior tornou pessoas mais cientes do que estão comendo, mudando compra. Outro exemplo: mostrar consumo de energia em "dollar per month" em vez de "kilowatt-hours" tornou mais visível o custo, reduzindo consumo.</p><p>Outro nudge é "peer comparison". Pessoas são motivadas por que outros fazem. Se mostra "seus vizinhos usam X kilowatt de energia, você usa Y" (onde Y é maior), pessoa reduz consumo. Se mostra "todos nesse prédio pagam imposto, você não", pessoa é mais provável a pagar. Peer comparison é poderoso motivador porque engaja status social.</p><p>Outro nudge é "commitment". Se pessoa publica compromisso ("vou economizar 100 reais por mês"), é mais provável a honrar porque reputação está em jogo. Apps de investimento frequentemente usam isso: "Share your goal com amigos" para que pessoa seja accountable.</p><p>Temporal nudges são sobre quando decisão é apresentada. Se pergunta "prefere 100 reais hoje ou 110 reais em um mês?" muitas escolhem hoje (present bias). Mas se pergunta "prefere 100 reais em 12 meses ou 110 reais em 13 meses?" muitas escolhem 110 reais (racional). A única diferença é timing relativo, mostrando que present bias é relativo, não absoluto. Nudge de "present bias" pode ser reframing da questão.</p><p>Opt-out nudges são particularmente poderosas porque usam inércia a favor de interesse da pessoa. Ao invés de "você precisa se inscrever em programa de matching de poupança", é "você está automaticamente inscrito em programa de matching de poupança, clique aqui se quer sair". Inércia faz que muitas pessoas não saem, logo maioria se beneficia.</p><p>Feedback nudges. Se mostra frequentemente o progresso ("você economizou 1000 reais em 3 meses, em ritmo de 4000 por ano"), pessoa fica motivada a continuar. Gamification usa feedback nudges: pontos, badges, leaderboards tornam comportamento desejado mais engajante.</p><p>Framing nudges. "Essa ação tem 90% chance de sucesso" vs "Essa ação tem 10% chance de fracasso" transmitem mesma informação mas primeira parece mais atrativa (loss aversion faz fracasso parecer pior que sucesso parecer bom). Framing muda decisão sem mudar informação.</p><p>Mensagem social nudges. "Join 100,000 pessoas que já começaram a investir" invoca herd mentality. "Your savings will feed 5 children" apela a emoção. "Money saved today becomes 5x in 30 years through investment" apela a ilusão de controle. Diferentes mensagens evocam diferentes vieses para levam ao comportamento desejado.</p><p>Importante é que nudges são "libertarian paternalist": eles guiam para melhor decisão mas preservam escolha. Pessoa ainda consegue escolher diferente se realmente quer. Isto contrasta com "hard paternalism" onde governo proíbe coisas (você não consegue comprar criptomoeda mesmo se quiser). Nudges são mais suave e respeitam autonomia enquanto melhora bem-estar.</p><p>Para finança pessoal, aplicar nudges a você mesmo é estratégia poderosa. Quer economizar mais? Mude default de transferência manual para automática. Quer investir melhor? Compartilhe plano com amigo (commitment device). Quer gastar menos? Coloque app de rastreamento de gasto visível (salience). Quer tomar menos risco? Coloque stop-loss automático (pre-commitment device).</p><p>Muitas apps modernas de finança usam nudges explicitamente. Nubank mostra gastos categorizados com comentários motivacionais. Stone mostra economia em juros quando paga antecipado. Esses aren't accidents; são desenhados por behavioristas para influenciar comportamento positivamente.</p><blockquote class="example"><strong>Nudge Prático Efetivo:</strong> Você quer investir 10% de salário em ações mensalmente. Dificuldade é que quando salário chega, há "necessidades" que absorvem dinheiro (presente bias, mental accounting). Solução: automatizar. Salário chega, automaticamente 10% é transferido para conta de investimento ANTES que você veja e tenha chance de gastar. Inércia e status quo bias agora trabalham a favor, não contra. Nudge simples muda comportamento permanentemente.</blockquote><p>O poder de nudges é que são baratos (implementar é quase free) e altamente efetivos (frequentemente 10-20% mudança em comportamento). Por isso governos e empresas estão adotando. Brasil usa nudges em saúde pública, educação, tributação. Tendência continuará.</p>`,
     cards:[{"q":"O que é um nudge e como difere de paternalism duro?","a":"Nudge é pequena mudança em desenho de escolha que guia para melhor decisão preservando opção de escolher. Paternalism duro remove opção completamente. Nudges respeita autonomia enquanto melhora bem-estar."}]
    },
    {id:2,
     name:"Arquitetura de Escolha: Como O Contexto Muda Tudo",
     dur:"50 min",
     content:`<h3>O Contexto em Que Você Decide Importa Tanto Quanto A Decisão Mesma</h3><p>Economia comportamental revela que ordem em que opções são apresentadas, como são descritas, em qual contexto você está, afeta radicalmente que você escolhe. Chama-se "choice architecture" (arquitetura de escolha). Design matter.</p><p>Um experimento clássico: oferecem frutas (maçã) vs chocolate. Quando ambas opções são apresentadas, 60% escolhem maçã ("healthier"). Quando pergunta primeiro "qual é sua identidade: saúde-focado ou prazer-focado?" depois apresenta opções, 20% escolhem maçã (priming efeito: pergunta anterior ativa diferentes motivação). Mesma opção, mas contexto priming diferente mudou resposta radicalmente.</p><p>Outro exemplo: quando pede "quanto está disposto a pagar por caneta?" respostas variam dependendo de priora do que pessoa viu. Se viu caneta cara antes, diz que está disposto a pagar mais. Se viu caneta barata antes, diz que está disposto a pagar menos. Anchoring novamente.</p><p>Para finança pessoal, implicação é importante: ambiente em que você está quando toma decisão importa. Se está em mall vendo vitrinas bonitas, é mais provável a comprar (shopping é designed para isso). Se está em casa, ambiente neutro é facilita ser racional. Se está cansado, é mais provável a gastar (ego depletion: controle mental está esgotado). Se acabou de receber bonus, é mais provável a gastar (windfall effect: dinheiro "extra" é fácil de gastar).</p><p>Arquitetura de escolha em apps é ferramenta poderosa. Se checkout de e-commerce coloca "continue shopping" grande e "checkout" pequeno, menos pessoas finalizam compra. Se inverte, mais pessoas compram. Se pede detalhes de pagamento antes de mostrar preço final, pessoa pensa que já investiu (sunk cost) e é menos provável a desistir. Websites de streaming mantém você "sticky" com boa arquitetura de escolha (é fácil continuar vendo, difícil cancelar assinatura).</p><p>Status quo bias é amplificado pela arquitetura. Se precisa ativamente clicar para mudar, status quo é default. Se precisar ativamente clicar para manter, muda é default. Simples mudança de qual ação requer clique muda profundamente que pessoas escolhem.</p><p>Número de opções também afeta. Quando oferece 2-3 opções, pessoa consegue decidir bem (compara). Quando oferece 10+ opções, pessoa fica sobrecarregada (decision paralysis) e frequentemente não escolhe nada. Paradox of choice: mais opções não necessariamente é melhor, porque paralisa.</p><p>Framing de opções. "70% de chance de sucesso" vs "30% de chance de falha" mesmo significado, mas primeira parece melhor. "Preço normal \$100, agora \$80 (20% off)" vs "Preço novo \$80" mesmo preço, mas primeira parece melhor deal (salience de desconto). Loss aversion faz "save \$20" parecer mais atrativo que "pay \$80".</p><p>Sequência de opções. Se coloca "default conservador" primeiro e "opção agressiva" depois, pessoa é mais provável a escolher conservador (first option bias). Se inverte, mais escolhem agressivo. Ordem importa.</p><p>Bundling (agrupamento) de opções. Oferecer "pacote completo" ao invés de itens individuais muda decisão. Pessoa que não compraria cada item individual ás vezes compra bundle (ilusão de valor). Bancos usam bundling: oferece "conta premium com cartão + investimento + seguro" por preço que parece barato se comparado a soma individual.</p><p>Para melhorar suas próprias decisões financeiras, pense sobre arquitetura de escolha ao seu redor. Seu banco coloca button de "withdraw" grande e "invest" pequeno? Isso design de arquitetura guiando você a sacar. Seu broker torna fácil tradear frequentemente (confirmação rápida, poucos cliques)? Isso design que incentiva overtrading. Reconhecer design e ativamente combater é importante.</p><p>Criar sua própria "good choice architecture" para si mesmo. Quer investir mais? Remova a opção de "withdraw easily" (dificulte withdrawal, coloque em conta diferente, coloque período de bloqueio). Quer gastar menos? Remova acesso fácil (deixe cartão de crédito em casa, delete app de compras, remova métodos de pagamento salvos). Quer poupar mais? Torne poupança opção default (transferência automática que requer ação para parar).</p><blockquote class="tip"><strong>Design Seu Ambiente Financeiro:</strong> Seu sistema financeiro pessoal é como app: como você "designed" afeta muito seu comportamento. Se interface é complicada para investir, investirá menos. Se interface é complicada para gastar, gastará menos. Propositalmente design interface financeira para te empurrar (nudge) para onde quer ir.</blockquote><p>Compreender choice architecture permite tanto proteger-se (reconhecer quando companies estão designando para explorar vieses você) e ajudar-se (design próprio ambiente para te guiar para melhor decisões). É ferramenta de empowerment pessoal e social.</p>`,
     cards:[{"q":"Como choice architecture afeta decisões financeiras?","a":"Ordem de opções, modo são apresentadas, contexto em que está decide radicalmente que escolhe. Default importa (inércia), framing importa (loss aversion), número de opções importa (paralysis)."}]
    },
    {id:3,
     name:"Paternalismo Libertário e Política Pública Comportamental",
     dur:"50 min",
     content:`<h3>Usando Economia Comportamental Para Bem Público Sem Sacrificar Liberdade</h3><p>Economia comportamental tem aplicação não apenas pessoal mas pública. Governos estão usando insights comportamentais para melhorar outcomes sem impor regulação dura. Isso é "libertarian paternalism" ou "behavioral policy".</p><p>Exemplo clássico é "Pension Reform UK" em 2012. Problema era que maioria de pessoas não economizava suficientemente para aposentadoria (presente bias, falta de autocontrole). Governo poderia forçar (hard paternalism), mas isso seria impopular. Ao invés, mudou default: empresas agora automaticamente inscreveriam empregados em plano de pensão (opt-out ao invés de opt-in). Maioria não se inscrevia antes; agora maioria participa. Mesmo direito de escolher (consegue opt-out se quer), mas default mudou, comportamento mudou, bem-estar coletivo melhorou.</p><p>Outro exemplo é "semakin de conformidade de imposto". Brasil usa isso agora: mostra quanto imposto você pagou vs quanto seus vizinhos pagaram. People feel compelled a pagar se veem que outros pagam (peer comparison effect). Governal receita aumenta sem aumentar enforcement duro (mais fiscais, auditorias).</p><p>Saúde pública usa behavioral insights. Simplicidade de menus em refeitório de empresa (colocar opções saudáveis em frente, não-saudáveis no fundo) muda o que pessoas escolhem sem proibir. Mensagens de SMS recordando para tomar medicação aumentam compliance. Informar resultado de teste de saúde rapidamente (em vez de esperar meses) muda comportamento porque feedback rápido é motivador.</p><p>Educação usa behavioral policy. Informar estudantes de baixa renda sobre bolsas disponíveis (salience) aumenta applications e enrollment. Mensagens de texto recordando para inscrever aumentam enrollment. Permitir inscrição online em vez de apenas em papel (choice architecture) aumenta participation.</p><p>O desafio é fazer behavioral policy sem virar "social control". Governo que usa nudges para "bem comum" pode ser tentado a usar nudges para controle político. Por exemplo, nudge que orienta pessoas a votar de certa forma é manipulação (é libertarian paternalism ou autoritarianismo disfarçado?). Limite entre "helping people make better decisions" e "manipulating people to make decisions government wants" é fino.</p><p>Por isso importante é transparência. Governo deveria ser explícito: "Estamos mudando ordem de opções para nudge você para escolha saudável, porque análise comportamental mostra que escolha saudável aumenta bem-estar. Você ainda pode escolher opção não-saudável se quer." Transparência permite accountability. Se feito escondido, é manipulação pura.</p><p>Brasil está começando usar behavioral policy. Banco Central usa comunicação clara e educação para ancorar expectativas inflacionárias (em vez de "surpresa" política). Receita Federal tenta comportamento de conformidade de imposto usando peer comparison. Ministério de Saúde usa mensagens de SMS para recordar vacinação. Esses são início de behavioral policy mais consciente.</p><p>Libertarian paternalism tem critério de Pareto: melhora bem-estar de alguns (aqueles que tomam melhor decisão com nudge) sem piorar de outros (aqueles que quer escolher diferente ainda conseguem). Se todos ficam melhor ou igual, é paternalismo libertário legítimo. Se alguns ganham e outros perdem (em sentido sério), é questão distributiva que precisa debate político, não apenas behavioral engineering.</p><p>Implicação para você como cidadão é dupla: (1) Reconheça quando está sendo nudged e por quem. Seu banco está nudgando você a investir em produto de mais alta margem. Seu governo está nudgando você a comportar certas formas. (2) Use nudges eticamente em sua própria vida e ao desenhar políticas que afetam outros. Se quer que empresa reduza uso de plástico, mude default de "sacos de plástico automáticos" para "precisa pedir sacos de plástico". Nudge funciona sem forçar.</p><p>Discussão importante é quanto de liberdade sacrificar por bem-estar. Se governo proíbe certo investimento arriscado, está "protegendo" pessoas irracionais, mas também removendo liberdade de pessoa racional que quer tomar risco. Sempre há trade-off. Behavioral policy tenta minimizar trade-off usando nudges (protege sem forçar) em vez de proibições (forçando).</p><blockquote class="quote"><strong>Perspectiva Ética:</strong> Em visão cristã protestante, livre arbítrio é sagrado. Pessoa deveria ser livre para tomar decisões, inclusive más decisões. Porém, enganação é também mal. Nudges que guiam para melhor decisão mantendo liberdade são éticos. Manipulação que engana pessoa é não-ético. A linha entre nudge e manipulação é em transparência: nudge é explícito, manipulação é escondida.</blockquote><p>O futuro de economia comportamental provavelmente incluirá mais uso de behavioral policy públicos. Conforme problemas ficam mais complexos (mudança climática, saúde pública, educação), simples regulação/proibição é menos efetiva que design inteligente de escolhas que incentiva comportamento desejado. Behavioral policy é ferramenta importante, mas como toda ferramenta, pode ser usada bem ou mal. Vigilância democrática é necessário para garantir que é usado bem.</p>`,
     cards:[{"q":"Qual é a diferença entre paternalismo libertário e paternalismo duro?","a":"Paternalismo libertário guia para melhor decisão preservando opção de escolher (nudges). Paternalismo duro remove opção completamente (proibições). Primeira respeita liberdade, segunda não."}]
    }
  ],
  summary:{"title":"Resumo do Módulo 3","points":["Nudges (empurrões comportamentais) podem melhorar decisões sem remover liberdade de escolha","Arquitetura de escolha importa: como opções são apresentadas afeta decisão final significativamente","Educação financeira behavioral focar em reconhecer próprios vieses e implementar sistemas que compensam","Regulação comportamental (paternalismo libertário) pode proteger consumidor enquanto mantém liberdade essencial"]},
  quizFinal:[{"q":"O que é um nudge (empurrão comportamental)?","opts":["Forçar alguém a fazer algo","Pequena mudança que incentiva melhor decisão sem remover opção","Publicidade enganosa","Proibição de escolha"],"correct":1},{"q":"Como arquitetura de escolha afeta decisão?","opts":["Não afeta","Ordem e formato das opções influencia significativamente qual é escolhida","Afeta apenas pessoa indecisa","Única coisa que importa é racional"],"correct":1},{"q":"O que é paternalismo libertário?","opts":["Governo controla tudo","Proteger consumidor enquanto mantém liberdade de escolha essencial","Deixar todos fazer o que quiser","Proibir tudo prejudicial"],"correct":1}]
