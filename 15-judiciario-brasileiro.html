O judiciário brasileiro divide-se em duas grandes categorias:

JUSTIÇA COMUM: Resolve a maioria dos casos (direito civil, penal)
- Cível: Contratos, propriedade, família, sucessão, consumidor
- Penal: Crimes e infrações penais

JUSTIÇA ESPECIALIZADA: Resolve casos específicos de áreas especializadas

- Justiça Militar: Delitos militares, crimes de oficiais

- Justiça Federal: Quando União é parte, crimes federais, direitos indígenas

ESTRUTURA EM INSTÂNCIAS: O judiciário se divide em 3 níveis de decisão:

PRIMEIRA INSTÂNCIA: Onde começam os casos

- Função: Ouvir ambas as partes, receber provas, fazer primeira decisão

FASE 1 - PREPARAÇÃO E APRESENTAÇÃO
Antes de ir ao tribunal, pessoa ou empresa consulta um advogado. O advogado faz análise do caso:
- Quais são os fatos?
- Qual lei se aplica?
- Qual é a chance de ganhar?

- Requerimentos (pedidos ao juiz)

FASE 2 - APRESENTAÇÃO AO TRIBUNAL
A petição é apresentada no Fórum. O cartório (setor administrativo) registra:
- Número do processo (é como identificação do caso)
- Valor (importante para determinar valor das custas)
- Juízo responsável (qual juiz vai acompanhar)

FASE 3 - CITAÇÃO DO RÉU
O tribunal cita o réu (notifica que está sendo processado). Formas:
- Oficial de Justiça entrega pessoalmente
- Correio com aviso de recebimento (em alguns casos)
- Publicação em jornal (se não encontra)
- Edital (em últimos recursos)

Réu recebe cópia da petição e prazo (geralmente 15 dias) para responder.

FASE 4 - CONTESTAÇÃO
O réu (ou seu advogado) apresenta resposta:
- CONTESTAÇÃO: Defesa, negando ou admitindo fatos
- Pode apresentar documentos também
- Pode fazer reconvenção (processar de volta o autor)

FASE 5 - INSTRUÇÃO

- PERÍCIA (se necessário): Expert é nomeado para analisar questão técnica (valor de imóvel, autenticidade de assinatura)
- DEPOIMENTO: Partes podem depor explicando sua versão
- TESTEMUNHAS: Pessoas que conhecem os fatos testemunham
- AUDIÊNCIA: Concentra provas. Juiz ouve, questiona, colhe informações
- DEBATES: Ambas as partes apresentam argumentos finais

FASE 6 - SENTENÇA
Juiz, considerando provas, lei, e argumentos, decide. Escreve sentença contendo:
- Histórico dos fatos
- Análise do direito
- Conclusão (qual parte ganha)
- Razões e fundamentos

Sentença:
- Procedente: Juiz concorda com autor, concede o pedido
- Improcedente: Juiz não concorda, nega o pedido
- Parcialmente procedente: Concede parte do pedido

FASE 7 - RECURSO
Se uma parte não concorda, pode apelar. A apelação:
- Vai para Tribunal de Segunda Instância
- Tribunal revê se juiz errou em questão de fato ou direito
- Ambas as partes apresentam memoriais (argumentos escritos)
- Desembargadores votam
- Resultado é acórdão (decisão de tribunal)

FASE 8 - TERCEIRA INSTÂNCIA (se aplicável)
Se envolve questão constitucional ou legal federal importante:
- Recurso Extraordinário (STF)
- Recurso Especial (STJ)
- Pode ser ou não aceito

FASE 9 - EXECUÇÃO
Sentença final vira "título executório". Se réu não cumpre voluntariamente:
- Credor volta à justiça pedindo execução
- Juiz ordena penhora (apreensão de bens)
- Bens são vendidos, credor é pago

- Apresentação de contestação: 15 dias
- Recurso de apelação: 15 dias
- Recurso especial/extraordinário: 15 dias
- Prazo prescricional: Varia, mas geralmente alguns anos para processar

- Honorários: Remuneração do advogado
- Perícias e laudos: Podem ser caros

- Se ganhar, outro lado paga sua custo (eventual)

- Ideal para: Compras erradas, dano em bem pequeno, pequenos conflitos

- Importante para proteger liberdade

- Muito rara
- Precisa de motivo muito sério
- Prazos estritos

    dur: '16 min',
    content: `Para entender o sistema, é importante saber quem são os personagens principais e qual é o papel de cada um.

JUIZ (ou Magistrado de Primeira Instância):
- Profissional com diploma de Direito, aprovado em concurso público
- Trabalha em Fórum ou Foro
- Responsável por primeira decisão
- É neutro: Não é parte do conflito
- Ouve ambas as partes igualmente
- Aplica lei conforme fatos e provas
- Tem poder de investigação (pode pedir documentos, citar testemunhas)
- Escreve sentença explicando razões
- Recebe salário do Estado
- Tem vitaliciedade após período de teste
- Pode ser juiz corregedor (fiscaliza outros juízes)
- Responsabilidade civil se errar grosseiramente

Atributos importantes: Imparcialidade, independência, conhecimento de lei.

DESEMBARGADOR (Magistrado de Segunda Instância):
- Juiz promovido ou nomeado para Tribunal
- Trabalha em Tribunal de Justiça ou Tribunal Especializado
- Integrante de câmara (grupo de desembargadores que julga juntos)
- Vota nas decisões (não é sozinho como juiz)
- Revisa decisões de juízes
- Escreve votos (justificativa do seu voto)
- Participa de decisões importantes que criam jurisprudência
- Geralmente tem mais experiência que juiz de primeira instância
- Salário maior que juiz

Tribunal tem vários desembargadores (pode ser 15, 30, dependendo do estado). Se há decisão discordante (voto dividido), considera-se a maioria.

MINISTRO (Magistrado de Tribunal Superior):
- Trabalha em STF, TST, STJ, etc.
- Nomeado (não por concurso como juízes)
- Maior autoridade
- Vota em questões de grande importância constitucional/legal
- Suas decisões impactam toda jurisprudência nacional
- Salário mais alto
- Trabalho mais conceitual, menos de "caso a caso"

PROMOTOR DE JUSTIÇA:
- Não é juiz
- É órgão da acusação em processo penal
- Representa interesse público/coletivo em casos que envolvem sociedade
- Aprovado em concurso público
- Pode atuar também em processo cível quando interesse coletivo está em jogo
- Responsabilidades: Investigar crimes, oferecer denúncia, buscar condenação, proteger direitos coletivos
- Tem poder de investigação (oferecimento policial também)
- Não pode condenar, só acusar; juiz é quem decide culpa
- Pode ser ombudsman (defensor de direitos)
- Sindicalmente é membro do Ministério Público
- Importante: É independente (não serve a governo, defende lei)

O erro comum: As pessoas confundem Promotor com Juiz. Promotor não decide, só acusa. Juiz decide.

ADVOGADO:
- Profissional diplomado em Direito
- Representa cliente (pessoa ou empresa)
- Não é funcionário público (é profissional liberal)
- Responsabilidade: Defender direitos de cliente conforme lei
- Pode atuar em processo (advocacia contenciosa) ou orientar fora de processo
- Ética profissional rigorosa
- Pode perder inscrição se violar ética
- Trabalha para cliente, não para lei (diferente de promotor)
- Cobra honorários
- Se cliente é pobre, pode ter advogado de graça (Defensoria Pública)

Importante: Advogado de defesa em processo criminal tem dever especial de defender vigorosamente mesmo sabendo que cliente é culpado. É direito constitucional. Defensor público representa pobres em processo penal.

ESCRIVÃO/CARTORÁRIO:
- Funcionário administrativo do tribunal
- Responsável por registrar, guardar documentos
- Certifica assinaturas e datas
- Emite certidões (cópias autenticadas de documentos)
- Importante para manter registro de processo

OFICIAL DE JUSTIÇA:
- Funcionário que executa ordens do juiz
- Entrega citações (notifica réu)
- Realiza arrestos (sequestro de bens)
- Entrega mandados
- Presta informações ao juiz sobre cumprimento

DEFENSOR PÚBLICO:
- Advogado funcionário público
- Representa pobres em processo penal
- Trabalha para Defensoria Pública
- Pode recusar caso por motivo ético, não deve
- Importante para direito de defesa

DELEGADO:
- Autoridade policial que investiga crimes
- Não é juiz
- Não pode prender indefinidamente (precisa de ordem judicial)
- Faz inquérito (investigação policial)
- Baseia-se em inquérito o Promotor oferece denúncia ou não
- Delega investigação para policiais

Relacionamento:
- Crime ocorre → Polícia investe (Delegado coordena) → Promotor oferece denúncia → Juiz julga
- Polícia, Promotor, Juiz: Todos têm papéis diferentes, não se confundem

CONSELHO NACIONAL DE JUSTIÇA (CNJ):
- Órgão de fiscalização do judiciário
- Investiga juízes por mau comportamento
- Pode remover ou suspender juiz
- Independente, mas ligado ao judiciário

    name: 'Jurisprudência, Súmulas e Interpretação da Lei',
    dur: '17 min',
    content: `A lei é escrita de forma geral. Mas como é aplicada? Como um juiz sabe o que a lei significa? Aqui entra jurisprudência.

JURISPRUDÊNCIA: Significa as decisões dos tribunais sobre interpretação de lei. Quando um tribunal importante (como STF) decide um caso, sua interpretação influencia como toda justiça vai aplicar aquela lei no futuro.

Exemplo: Lei diz "demissão sem justa causa gera indenização". Mas quanto é "indenização"? STF decide "indenização é 40% de FGTS". Daí por diante, toda justiça do trabalho aplica isso.

EFEITO VINCULANTE: Decisões de certos tribunais obrigam juízes inferiores a seguir:
- Decisão do STF vincula todos os juízes
- Súmula vinculante do STF obriga todos os tribunais
- Jurisprudência pacífica (repetida muitas vezes) cria expectativa

EFEITO PERSUASIVO: Outras decisões influenciam mas não obrigam:
- Decisão de Tribunal diferente pode ser argumentada mas juiz pode discordar
- Entender jurisprudência ajuda a prever resultado de caso

SÚMULA: Resumo de jurisprudência
- Tribunal publica enunciado (texto curto) dos pontos decididos
- Facilita conhecimento rápido da posição do tribunal
- Exemplo: "Súmula 372: Apesar da inexistência de novo contrato escrito, surge relação de emprego quando o trabalhador foi contratado verbalmente..."
- Juízes consultam súmulas para resolver questões rápido

JURISPRUDÊNCIA CONSTANTE: Quando tribunal decide mesmo assunto da mesma forma várias vezes
- Cria certeza
- Juiz que discordar precisa de motivação forte
- Importante para previsibilidade

REVERSÃO DE JURISPRUDÊNCIA: Tribunal pode mudar opinião
- Ocorre quando lei muda, ou tribunal entende que estava errado
- Publicam enunciado novo
- Pode ser retroativo ou não, conforme discussão

Exemplo histórico: STF decidiu que mulher casada não podia abrir conta bancária sozinha (marido tinha poder). Depois, com mudança na lei e sociedade, STF reverteu, disso mulher tem igualdade de direitos.

INTERPRETAÇÃO LITERAL vs TELEOLÓGICA:
- Literal: Aplica exatamente o que lei diz
- Teleológica: Considera objetivo e espírito da lei
- Progressista vs Conservadora: Alguns juízes interpretam amplo (protetor), outros restrito

Exemplo: Lei protege "consumidor". Literal: pessoa que compra. Teleológica: pode incluir quem usa gratuitamente se prejudicado.

PRINCÍPIOS CONSTITUCIONAIS como guia:
- Lei não é isolada, integra-se com Constituição
- Princípios (dignidade humana, igualdade, proporcionalidade) guiam interpretação
- Juiz deve considerar espírito constitucional

DOUTRINA: Opinião de especialistas (professores, juristas)
- Não é decisão, mas análise
- Influencia interpretação e argumentação
- Ajuda juízes a ter embasamento
- Publicada em livros, artigos, revistas jurídicas

CONFLITO DE JURISPRUDÊNCIA:
- Dois tribunais decidem diferente sobre mesma questão
- Pode ir ao STF para pacificar
- Recurso Especial vai ao STJ
- Recurso Extraordinário vai ao STF
- Objetivo: Uniformizar

SÚMULA VINCULANTE:
- Decisão do STF sobre questão constitucional que cria jurisprudência
- Vincula todos os tribunais inferiores
- Pouquíssimas (poucas foram criadas)
- Muito forte, praticamente lei
- Exemplo: "Súmula Vinculante 11: Não é lícito dispor de direito sobre o próprio corpo quanto à comercialização de sangue" - proíbe venda de sangue

ORIENTAÇÃO JURISPRUDENCIAL:
- Tribunal publica orientação não-vinculante
- Ajuda juizes mas podem discordar
- Menos forte que súmula vinculante

PRURISPRUDÊNCIA DO STJ vs STF:
- STJ (Superior Tribunal de Justiça): Interpreta leis federais e infraconstitucionais
- STF (Supremo): Interpreta Constituição
- STJ é mais importante para lei comum
- STF é mais importante para direitos constitucionais

APLICAÇÃO PRÁTICA:
Ao processar, advogado pesquisa jurisprudência:
- Como tribunais vêm decidindo esse tipo de caso?
- Há súmula sobre o assunto?
- Há jurisprudência pacífica ou dividida?
- Juiz que vai julgar tende a seguir qual posição?

Se jurisprudência é favorável, advogado argumenta citando decisões. Se desfavorável, argumento para reverter.

<blockquote class="example">
📌 Exemplo: Você processa empregador por horas extras não pagas. Advogado verifica: TST já decidiu muitas vezes que jornada com saídas para alimentação ainda conta como trabalho. Jurisprudência é pacífica. Apresenta isso ao juiz como argumento. Juiz provavelmente segue jurisprudência pacífica.
</blockquote>`,

      }

    content: `Se você não concorda com uma decisão de juiz, não termina ali. Existem vários recursos (caminhos) para questionar e tentar reverter a decisão.

RECURSO: Pedido ao tribunal superior para revisar decisão
- Não é novo processo, é revisão da decisão anterior
- Pode ser parcial (questiona só parte) ou total
- Precisa de fundamento legal (não é por vontade, precisa de motivo)

APELAÇÃO: Recurso principal na maioria dos casos
- Vai de juiz de primeira instância para Tribunal (segunda instância)
- Tribunal ouve ambas as partes de novo
- Revisa questões de fato E questões de direito
- Prazo para apelar: 15 dias após sentença (é prazo peremptório, não alonga)
- Se não apela nesse prazo, sentença fica pronta (transita em julgado)

Exemplo: Juiz sentencia que você deve pagar R$ 10.000 ao vizinho. Você não concorda. Tem 15 dias para entrar com apelação no Tribunal.

APELAÇÃO CÍVEL vs PENAL:
- Cível: Ambas partes apelam (autor apela se perdeu, réu apela se não ganhou o máximo)
- Penal: Acusado apela para sair livre, Promotor apela para condenar ou aumentar pena

RECURSO DE REVISTA: Em casos trabalhistas
- Equivalente a apelação em Justiça do Trabalho
- Vai ao Tribunal do Trabalho

RECURSO ORDINÁRIO: Em certos casos
- Vai direto para tribunal superior (pulando segunda instância)
- Exemplo: Mandado de Segurança indeferido na primeira instância

RECURSO EXTRAORDINÁRIO:
- Vai ao STF
- Questiona decisão sobre matéria CONSTITUCIONAL
- Precisa ter repercussão geral (afetar muitas pessoas)
- Muito raro ser aceito (STF recebe milhares, aceita poucos)
- Prazo: 15 dias para entrar

RECURSO ESPECIAL:
- Vai ao STJ
- Questiona decisão sobre lei federal
- Menos raro que Extraordinário, mas ainda assim seletivo
- Prazo: 15 dias

AGRAVO: Recurso contra decisão de juiz que nega acesso a recurso
- Exemplo: Você quer apelar, juiz nega a apelação alegando que prazo passou
- Entra com Agravo questionando isso
- Tribunal revê se juiz estava certo

AGRAVO DE INSTRUMENTO:
- Questiona decisão do juiz durante processo (não sobre mérito)
- Exemplo: Juiz nega produção de prova
- Agravo pede ao tribunal que revise se era certo negar

MONOCRATICAMENTE: Julgamento por um desembargador sozinho
- Alguns recursos são julgados por um desembargador
- Se uma parte discorda, pode pedir julgamento pelo colegiado (grupo)

JULGAMENTO EM COLEGIADO:
- Grupo de 3 (ou mais) desembargadores julga
- Cada um vota
- Maioria vence
- Mais importante que monocrático

TRANSITO EM JULGADO:
- Momento em que sentença se torna final
- Quando prazo de recurso passa ou último recurso é julgado
- Depois disso, sentença é praticamente imutável
- Pode executar a sentença (cobrar o que ganhou)

AÇÃO RESCISÓRIA: Última tentativa
- Anula sentença já transitada em julgado
- Precisa de vício grave (nulidade absoluta, fraude, erro materialidade)
- Muito rara ser aceita
- Prazo: 2 anos após transito em julgado

DECISÃO ABSOLUTÓRIA FINAL: Em penal
- Condenado é absolvido
- Não pode ser julgado de novo (princípio ne bis in idem = não condenar duas vezes)
- Promotor pode apelar mas não pode levar a nova condenação injusta

EFEITO SUSPENSIVO: Quando recurso é aceito
- Algumas vezes, sentença é suspensa enquanto recurso anda
- Exemplo: Condenado apela, pode não ir preso enquanto tribunal julga
- Depende do tipo de recurso e circunstâncias

PREQUESTIONAMENTO:
- Para usar certos recursos, questão precisa ser levantada antes
- Exemplo: Para Recurso Extraordinário, questão deve ter sido discutida em primeira instância
- Sem prequestionamento, recurso é rejeitado

ARGUMENTAÇÃO EM RECURSO:
- Mais focada que primeira instância
- Geralmente está em aberto o que juiz decidiu errado
- Cita jurisprudência relevante
- Aponta vício legal

MOROSIDADE DO SISTEMA:
- Apelação leva 2-3 anos para julgamento em alguns estados
- Recurso Extraordinário pode levar 5+ anos
- Por isso há iniciativas de acelerar (pautas concentradas, informatização)

    name: 'Processo Criminal: Diferenças e Garantias Importantes',
    dur: '19 min',
    content: `Processo criminal é bem diferente de processo cível. As garantias são maiores porque está em jogo a liberdade de uma pessoa.

PRINCÍPIO FUNDAMENTAL: Presunção de Inocência
- Acusado presume-se inocente até prova em contrário
- Essa é a base do processo criminal brasileiro
- Inversão de ônus: Acusação precisa PROVAR, não acusado se defender
- Comparação cível: Em cível, ambos precisam provar. Aqui, acusado é "presumido inocente"
- Significa que mesmo que haja "indícios", se acusação não prova além de dúvida razoável, é absolvido

DIREITO DE DEFESA:
- Acusado tem direito a advogado (se pobre, defensoria pública)
- Pode escolher advogado de confiança
- Advogado tem direito de questionar acusação plenamente
- Advogado tem direito de acessar investigação
- Acusado pode se calar (direito de silêncio)

DIREITO DE SILÊNCIO:
- Acusado NÃO precisa responder perguntas
- Silêncio não é admissão de culpa
- Juiz não pode prejudicar acusado por se calar
- Pode ser exercido total ou parcialmente
- Não há sanção por exercê-lo

DEVIDO PROCESSO LEGAL:
- Processo tem que seguir regras (não pode ser arbitrário)
- Acusado é ouvido
- Provas são apresentadas de forma controvertida
- Há oportunidade de defesa
- Juiz fundamenta decisão em lei

PROVA ILÍCITA:
- Prova obtida violando direitos é inadmissível
- Exemplo: Polícia invade casa sem mandado, encontra droga, não serve
- Mesmo que comprove crime, não vale
- Protege direito fundamental mesmo que prejudique acusação
- Diferença de cível: Em cível, prova ilícita às vezes é usada; em penal, nunca

PRISÃO EM FLAGRANTE:
- Polícia prende no momento do crime
- Precisa ser comunicado à autoridade
- Tem que ir ao juiz em até 24 horas
- Juiz decide se mantém prisão ou solta
- Garante rápida revisão

PRISÃO PREVENTIVA:
- Polícia pede ao juiz que detenha acusado antes de julgamento
- Juiz analisa: Está confesso? É perigoso? Pode fugir? Pode interferir em investigação?
- Precisa de fundamento, não é automática
- Pode ser revogada se circunstâncias mudam
- Tempo preso em preventiva desconta da pena

REGRA DO REPOUSO DIURNO (já revogada em muitos casos):
- Regra antiga que proibia trabalho de noite
- Atualmente: Cumpre-se pena onde for designado

DENÚNCIA:
- Promotor oferece denúncia ao juiz
- Juiz recebe denúncia (aceita como base para processo)
- Ou rejeita se foi infundada
- Aí acusado responde em juízo

RECEBIMENTO DA DENÚNCIA:
- Juiz recebe denúncia após ouvir acusado
- Aí começa processo criminal formal
- Antes disso é investigação

INTERROGATÓRIO:
- Acusado é ouvido pelo juiz
- Pode responder ou ficar em silêncio
- Perguntas do juiz, promotor, advogado
- Registra-se tudo

TESTEMUNHAS:
- Vítima é testemunha especial
- Testemunhas de defesa e acusação podem depor
- Comparecimento pode ser obrigatório

CONDENAÇÃO:
- Juiz decide se crime foi provado além de dúvida razoável
- Se não há dúvida razoável, é absolvido
- Se há provas, é condenado
- Sentença especifica: Condenação a X anos de prisão, ou Y multa, ou ambas

PENA:
- Prisão: Vai para cadeia
- Multa: Paga dinheiro
- Restritiva de direitos: Perda de direitos (não dirigir, etc.)
- Pena suspensa: Fica em liberdade condicionada (se descumpre, vai preso)

RECURSO EM CRIMINAL:
- Condenado apela (pode ser absolvido em apelação)
- Promotor apela se acha pena muito leve (raramente consegue aumentar se há direito de defesa bem exercido)

GARANTIAS ESPECIAIS:
- Não pode ter prisão perpétua
- Pode haver indulto
- Prescrição (crime não pode ser julgado após certo tempo)
- Reabilitação (apaga registro após cumprir pena)

NE BIS IN IDEM (Não condenar duas vezes):
- Pessoa não pode ser julgada duas vezes por mesmo crime
- Se foi absolvido, não pode ser julgado de novo
- Se foi condenado, não pode ser condenado de novo (pode ser pena revista, mas não novo julgamento)

SIGILO PROCESSUAL:
- Investigação pode ser sigilosa
- Proteção para não prejudicar investigação
- Após certo ponto, abre público
- Importante para direito à informação vs. direito de defesa

ESTATUTO DA CRIANÇA E ADOLESCENTE:
- Menores de 18 anos têm processo diferente
- Mais protetor
- Foco em ressocialização
- Nomes não são divulgados
- Diferentes limitações de pena

- Estabilidade: Algumas situações tem estabilidade provisória
- Sentenças vão para execução rápido (não espera transito em julgado para cobrar)

- Responsabilidades: Registra candidatos, julga fraude eleitoral, resolve sobre direitos políticos
- Decisões muito rápidas (eleição não espera)
- Importante para democracia
- Acompanha registro e apuração
- Pode anular eleição se houver fraude

- Procedimento varia
- Jurisprudência de cada especialidade é diferente
- Juiz precisa ser especializado na área

    name: 'Sistema de Execução, Cumprimento de Sentença e Prática Forense',
    dur: '18 min',
    content: `Uma sentença ganha é apenas o papel. Agora precisa ser cumprida. Como se executa? Como se cobra? Isso é execução.

EXECUÇÃO: Fase após sentença onde se cobra o devido
- Sentença transita em julgado (virou final)
- Credor (quem ganhou) volta à justiça
- Pede execução contra devedor (quem perdeu)
- Juiz de execução ordena cobro

TÍTULO EXECUTIVO: Documento que permite execução
- Sentença judicial
- Acordo homologado judicialmente
- Nota promissória, duplicata, cheque (títulos de crédito)
- Contrato escrito
- Precisa ser claro quanto ao valor

PENHORA: Apreensão de bens do devedor
- Juiz ordena oficial de justiça a penhorar bens
- Oficial vai à casa/empresa do devedor e apreende
- Bens são avaliados
- Penhor é levado a hasta pública (leilão)

BENS QUE NÃO PODEM SER PENHORADOS:
- Casa de morada (até certo valor)
- Ferramentas de trabalho
- Salário (parcialmente protegido)
- Bens de pequeno valor
- Alimentos, medicamentos essenciais
- Objetos de família com valor emocional

CONTA BANCÁRIA:
- Juiz pode bloquear conta do devedor
- Banco é obrigado a informar saldos
- Juiz pode liberar para que credor receba
- Relativamente rápido

SALÁRIO:
- Pode ser penhorado mas parcialmente
- Proteção de mínimo (não pode deixar sem viver)
- Desconto é percentual do salário
- Permanece enquanto houver débito

IMÓVEL:
- Pode ser penhorado
- Processo é mais longo
- Vai a hasta pública
- Credor recebe o valor após execução

EXECUÇÃO ESPECÍFICA:
- Não é de dinheiro, é de coisa
- Exemplo: Entregar imóvel, devolver bem
- Juiz ordena entrega
- Se não entrega, prazo se converte em perdas e danos

CUMPRIMENTO DE SENTENÇA:
- Procedimento mais rápido que execução antiga
- Após sentença cível transitada em julgado
- Credor requer cumprimento
- Juiz cita devedor para pagar em prazo
- Se não paga, vai penhora
- Mais eficiente

EMBARGOS À EXECUÇÃO:
- Devedor pode alegar questões contra execução
- Não pode discutir sentença (só executar)
- Pode alegar erro no cálculo, pagamento feito, etc.

INSOLVÊNCIA:
- Se devedor não tem bens, credor pode ter prejuízo
- Juiz declara insolvência
- Credor fica na fila de credores
- Se devedor tiver bens depois, participa do rateio
- Credor pode esperar anos

EXECUÇÃO FISCAL:
- Específica para cobro de impostos e taxas
- Procedimento ágil
- Governo tem privilégio no recebimento

CUSTAS E HONORÁRIOS DE EXECUÇÃO:
- Custas adicionais podem ser cobradas
- Honorários de advogado na execução também
- Se sucesso, devedor paga tudo

PRÁTICA FORENSE - DICAS PARA QUEM LIDIA COM TRIBUNAIS:

1. PRAZOS: Absolutamente rigorosos. Perder prazo = perder direito. Agendar com antecedência.

2. DOCUMENTOS: Tudo por escrito. Emails, comunicados, contratos. Papel vale mais em tribunal que palavra.

3. ADVOGADO: Vale a pena contratar para caso sério. Fica caro mas evita erros que custam caro.

4. HONESTIDADE: Fraude ou mentira em tribunal é grave. Crime de falso testemunho, fraude processual. Não compensa.

5. ORGANIZAÇÃO: Documentos bem organizados, cronologia clara. Facilita argumentação.

6. CONHECIMENTO: Saber direitos básicos evita exploração. Não confie que advogado vai lhe dizer tudo.

7. MOROSIDADE: Justiça é lenta. Paciência. Não desista só porque demora.

8. CUSTAS: Antecipe custos. Não é barato. Se perde, paga do outro lado também.

9. PRECAUÇÃO: Antes de processar, tente acordo. Acordo é certo, justiça é incerta.

10. TRANSPARÊNCIA: Seja honesto com advogado. Mentira prejudica defesa.
