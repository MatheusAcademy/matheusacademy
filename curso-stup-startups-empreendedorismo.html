      content: `<h4>Startup vs Negócio Tradicional</h4><p>Startup é empresa criada para resolver problema não resolvido com modelo de negócio escalável e repetível. Diferente de negócio tradicional que já sabe o modelo. Startup está descobrindo.</p><blockquote class="tip">A maioria de startups falham. Não porque fundador é incompetente, mas porque mundo é incerto e é difícil. Você precisa resiliência.</blockquote><blockquote class="example">Negócio tradicional: "Vou abrir restaurante usando modelo que funciona, com receita previsível." Startup: "Tenho ideia de app que conecta restaurantes com clientes. Não sei se vai funcionar, mas se funcionar, posso escalar 10x."</blockquote><p><strong>Por que empreender?</strong> Liberdade. Você é o dono. Impacto. Você resolve problema. Oportunidade. Potencial de multiplicar seu dinheiro. Aprendizado. Você aprende mais em 1 ano em startup que 5 anos em empresa grande.</p><p>Mas também: stress massivo, renda incerta, sacrifício pessoal. Empreendedorismo não é para todos. Você precisa tolerar incerteza.</p><blockquote class="quote">Melhor empreendedor não é aquele sem medo. É aquele que tem medo mas age mesmo assim.</blockquote>`

    {
      id: 'mvp1',
      name: 'O Que É MVP (Minimum Viable Product)',
      content: `<h4>Construa Mínimo Viável</h4><p><strong>MVP</strong> é versão mínima do produto que valida hipótese principal. Não é versão feia ou incompleta. É versão que resolve core problem, nada mais. Tudo além é perfeccionismo que mata startup.</p><blockquote class="tip">MVP existe para aprender rápido qual funciona. Não é versão "final". É máquina de teste.</blockquote><blockquote class="example">Uber MVP: app que conecta motorista com passageiro. Não tinha: ratings, histórico detalhado, suporte 24/7, 10 idiomas. Tinha: core: chamar carro, motorista aceita, chegar, pagar. Tudo mais veio depois de validação.</blockquote><p><strong>Core feature</strong> é feature que resolve o problema principal. Tudo além é feature</p>`
    },
    {

      content: `<h4>Como Você Faz Dinheiro?</h4><p>Você precisa modelo de receita. Quanto você cobra? De quem? Com que frequência? <strong>SaaS</strong>: assinatura mensal/anual. <strong>Marketplace</strong>: comissão por transação. <strong>Licença</strong>: paga uma vez. <strong>Freemium</strong>: básico grátis, premium pago.</p><blockquote class="tip">Melhor modelo é aquele que cliente entende e aceita pagar. Seja simples.</blockquote><blockquote class="example">SaaS de gestão de projetos: R$ 50/mês por usuário. Você tem 100 clientes, 10 usuários cada = R$ 50k/mês. Escalável.</blockquote><p><strong>Unit economics</strong>. Quanto custa adquirir cliente? Quanto ele gera de receita ao longo da vida? Se LTV > 3x CAC, você tem negócio viável.</p><p><strong>Tração</strong>. Você tem usuários ativos, crescimento consistente, retenção boa? Isso é tração. Investidor quer ver tração, não promessas.</p><blockquote class="quote">Modelo de receita simples que funciona bate modelo complexo que supostamente é perfeito.</blockquote>`
