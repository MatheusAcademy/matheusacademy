      {
        id: 'defn',
        title: 'Definição e Importância da Saúde Mental',
        html: '<h4>Saúde Mental Vai Além de Ausência de Doença</h4><p><strong>Saúde mental não é simplesmente ausência de transtorno mental, é capacidade de lidar com estresse, manter relacionamentos significativos, contribuir para sociedade e sentir bem-estar geral</strong>. Você pode não ter diagnóstico de depressão ou ansiedade e ainda estar com saúde mental ruim.</p><blockquote class="tip">Saúde mental é espectro, não binário. Você não está "saudável" ou "doente". Você está em ponto do espectro que flutua baseado em circunstâncias, relacionamentos, trabalho, sono e estilo de vida.</blockquote><p>Durante anos, saúde mental foi negligenciada. Sociedade focava em saúde física enquanto saúde mental era tabu, ignorada ou estigmatizada. <strong>Agora entendemos que saúde mental é tão importante quanto saúde física, se não mais importante, porque afeta tudo</strong>: seu corpo, seus relacionamentos, seu trabalho, sua qualidade de vida.</p><h4>Por que Sua Mente Importa</h4><p>Sua mente controla seu corpo. Estresse crônico causa inflamação, que causa doença. Depressão causa fadiga e morte precoce. Ansiedade causa tensão muscular e insônia. <strong>Cuidar de sua saúde mental é cuidar de sua saúde física também</strong>.</p><blockquote class="example">Uma pessoa sob estresse crônico sem lidar com ele pode desenvolver pressão alta, doença cardiovascular, sistema imunológico comprometido. Não há separação entre corpo e mente - eles trabalham juntos.</blockquote><blockquote class="quote">Saúde mental não é luxo. É fundação sobre qual todo o resto da sua vida é construído.</blockquote>'

      {
        id: 'norm',
        title: 'Normalizando a Conversa Sobre Saúde Mental',
        html: '<h4>O Estigma Precisa Acabar</h4><p>Durante séculos, pessoas com problemas de saúde mental foram silenciadas, institucionalizadas ou chamadas de "fracas". <strong>Isso criou cultura de silêncio onde milhões de pessoas sofrem em isolamento porque têm vergonha de falar</strong>. Você precisa saber que sofrer é humano, pedir ajuda é forte, não fraco.</p><blockquote class="tip">Se você está lutando, você não está sozinho. Depressão afeta 280 milhões de pessoas globalmente. Ansiedade afeta 300 milhões. Você é parte de população enorme que entende essa luta.</blockquote><p>Normalização significa falar abertamente sobre saúde mental como falamos sobre saúde física. Quando alguém tem gripe, dizem "tenho gripe". Quando alguém tem depressão, deveriam poder dizer "estou com depressão" sem medo de julgamento.</p><h4>Quebrando Mitos</h4><p><strong>Mito: saúde mental ruim significa fraqueza mental. Realidade: é como qualquer outra condição de saúde, baseada em neurobiologia, genética e circunstâncias</strong>. Você não escolhe ter depressão. Você não escolhe ter ansiedade. Isso não é falha sua.</p><blockquote class="example">Alguém com depressão não consegue simplesmente "pensar positivo" e ficar bem, como alguém com diabetes não consegue simplesmente "positivo" e controlar açúcar no sangue. Ambas requerem tratamento, suporte e manejo adequado.</blockquote><p>Outro mito: pedir ajuda é fracasso. Realidade: pedir ajuda é força extraordinária. Reconhecer que você precisa de suporte e procurá-lo é um dos atos mais corajosos que você consegue fazer.</p><blockquote class="quote">Sua saúde mental importa. Você importa. E procurar ajuda é o primeiro passo para viver melhor.</blockquote>'

        title: 'Os Fatores que Afetam Sua Saúde Mental',
        html: '<h4>A Natureza vs Criação</h4><p>Sua saúde mental é resultado de dois fatores principais: sua genética (natureza) e seu ambiente/experiências (criação). <strong>Se você tem história familiar de depressão ou ansiedade, você tem risco maior, mas isso não significa que você inevitavelmente desenvolverá. Ambiente pode proteger ou piorar</strong>.</p><blockquote class="tip">Você herda vulnerabilidade, não destino. Vulnerabilidade genética + ambiente estressante = problema. Vulnerabilidade genética + ambiente de suporte = possível proteção ou gerenciamento bem-sucedido.</blockquote><p>Fatores ambientais que afetam saúde mental incluem: relacionamentos significativos (ou falta deles), trabalho satisfatório (ou tóxico), sono adequado (ou insônia), movimento físico (ou sedentarismo), propósito (ou vazio), comunidade (ou isolamento).</p><h4>Construindo Resiliência</h4><p>Resiliência não significa nunca sentir dor. Significa capacidade de lidar com dor e recuperar. <strong>Você constrói resiliência através de: relacionamentos de qualidade, lidar com desafio pequeno e construir confiança, dormir bem, exercitar, ter propósito, praticar aceitação e compaixão consigo mesmo</strong>.</p><blockquote class="example">Alguém que teve infância de abandono pode ser vulnerável a depressão, mas se está em relacionamento amoroso agora, dorme bem, exercita, tem trabalho significativo e amigos próximos, é altamente resiliente. Passado não determina presente.</blockquote><blockquote class="quote">Sua genética pode ser sua disposição, mas seu ambiente é seu escolha. Escolha sabiamente.</blockquote>'

      {
        id: 'anse',
        title: 'O que é Ansiedade e Como Ela Funciona',
        html: '<h4>Ansiedade é Resposta de Proteção</h4><p><strong>Ansiedade é resposta de medo do seu corpo para ameaça percebida. Evolutivamente, isso foi útil: medo de predador ativava você para lutar ou fugir</strong>. Hoje, seu corpo ativa medo para apresentação de trabalho, que não é ameaça física.</p><blockquote class="tip">Alguns nível de ansiedade é normal e adaptativo. Ansiedade patológica é quando resposta de medo é desproporcionada à ameaça ou persiste sem ameaça real.</blockquote><p>Seu corpo tem sistema chamado amígdala que detecta ameaça e ativa "luta ou fuga": coração acelera, respiração fica rápida, músculos ficam tensos. Sistema este é útil, mas você pode ficar preso nele sem razão racional.</p><h4>O Ciclo da Ansiedade</h4><p>Ansiedade cria ciclo: você sente medo, seu corpo ativa resposta física, você interpreta essas sensações físicas como confirmação de ameaça, que intensifica medo. <strong>Você fica preso em loop onde seus próprios sintomas alimentam o medo</strong>.</p><blockquote class="example">Você está em reunião de trabalho. Seu coração bate rápido (por qualquer motivo). Você pensa "estou nervoso, algo ruim vai acontecer". Esse pensamento intensifica batida cardíaca. Que intensifica medo. Que intensifica pensamentos catastróficos. E assim continua.</blockquote><blockquote class="quote">Ansiedade não é sua culpa. Mas gerenciar é sua responsabilidade.</blockquote>'

      {

        html: '<h4>Transtorno de Ansiedade Generalizada</h4><p><strong>TAG é preocupação excessiva sobre múltiplas áreas da vida que continua mesmo sem estressor óbvio</strong>. A pessoa quer parar de se preocupar, mas não consegue. Pensamentos se tornam ruminativos e incontroláveis.</p><blockquote class="tip">TAG não é ter uma preocupação. É ter preocupação constante, persistente que interfere na vida, sono, trabalho. É diferente de pessoa naturalmente cautelosa.</blockquote><p>Transtorno do Pânico é ataques de medo extremo que vêm "do nada", com sensações físicas intensas: coração acelerado, tontura, falta de ar, medo de morte ou loucura. <strong>A pessoa frequentemente desenvolve medo de ter outro ataque (ansiedade antecipatória), levando a evitação</strong>.</p><h4>Fobias e Ansiedade Social</h4><p>Fobias são medo extremo de objeto ou situação específica: voar, altura, socializar. Ansiedade social é medo de julgamento em situações sociais. Ambas podem ser incapacitantes quando não tratadas.</p><blockquote class="example">Alguém com fobia de voar pode estar preso em relacionamento ruim porque viagem para sair é impossível. Alguém com ansiedade social pode perder oportunidades de trabalho porque entrevistas causam pânico. Ambos são tratáveis.</blockquote><p>O bom: todo tipo de ansiedade é tratável. Terapia cognitivo-comportamental, medicação, e técnicas de exposição têm altas taxas de sucesso.</p><blockquote class="quote">Seu tipo de ansiedade não define você. Sua vontade de tratá-la define seu futuro.</blockquote>'

        title: 'Técnicas para Lidar com Ansiedade no Momento',
        html: '<h4>Regulação de Respiração</h4><p><strong>Sua respiração é a única coisa que conecta seu sistema nervoso consciente e inconsciente. Quando você controla respiração, você controla resposta de ansiedade</strong>. Técnica 4-7-8 é simples: inspire por 4, segure por 7, expire por 8.</p><blockquote class="tip">Expiração longa sinaliza ao seu corpo que perigo passou. Isso ativa sistema parasimpático (descanso e digestão) que é oposto a resposta de luta ou fuga. Faça isso 5-10 vezes durante ansiedade para reduzir sintomas.</blockquote><p>Outra técnica: respiração em caixa (4-4-4-4). Simples, funciona bem para algumas pessoas. O importante é qualquer respiração lenta e propositada.</p><h4>Aterramento Sensorial</h4><p>Técnica 5-4-3-2-1: nomeie 5 coisas que você vê, 4 que você ouve, 3 que você sente, 2 que você cheira, 1 que você gosto. Isso tira sua mente de pensamentos ansiosos e a âncora no presente.</p><blockquote class="example">Durante ataque de pânico, você está preso em pensamentos catastróficos sobre futuro. Técnica 5-4-3-2-1 força seu cérebro a se focar em realidade presente: "Vejo parede azul. Vejo árvore. Vejo luz." Ansiedade diminui quando presente está em foco.</blockquote><p><strong>Aceitação é chave em todas técnicas. Ao invés de lutar contra ansiedade, observe-a, reconheça-a, e deixe-a passar</strong>. Luta intensifica. Aceitação a reduz.</p><blockquote class="quote">Sua respiração é seu superpoder contra ansiedade. Pratique agora para que você possa usar depois.</blockquote>'

        title: 'Estilo de Vida para Ansiedade Menor',
        html: '<h4>Sono, Exercício e Nutrição</h4><p>Você provavelmente sabe disso: sono ruim piora ansiedade. Exercício reduz ansiedade. Cafeína em excesso piora ansiedade. <strong>Fundamentos simples: dormir 7-9 horas, exercitar 150+ minutos por semana, reduzir cafeína em 100mg, aumentar magnésio e ômega-3</strong>.</p><blockquote class="tip">Exercício é um dos tratamentos mais eficazes para ansiedade, comparável a medicação em alguns estudos. Você não precisa de academia. Caminhada rápida 30 minutos 5 dias por semana é suficiente.</blockquote><p>Álcool piora ansiedade a longo prazo apesar de parecer ajudar curto prazo. Evite usar álcool para gerenciar ansiedade.</p><h4>Conexão Social e Propósito</h4><p><strong>Isolamento piora ansiedade. Conexão a pessoas, comunidade e propósito reduz significativamente</strong>. Passa tempo com pessoas que você ama. Contribua para algo maior que você. Participe em atividade significativa.</p><blockquote class="example">Alguém que se sente ansioso e isolado fica pior. Mesma pessoa que passa tempo com amigos, faz voluntariado, ou está em grupo que se importa com ela, sente significativamente menos ansiedade. Conexão é antídoto para ansiedade.</blockquote><blockquote class="quote">Ansiedade cresce em isolamento. Ansiedade encolhe em conexão.</blockquote>'

      {
        id: 'depr',
        title: 'Entendendo Depressão: Mais que Tristeza',
        html: '<h4>Depressão não é Tristeza</h4><p><strong>Depressão é transtorno médico onde seu cérebro não está produzindo neurotransmissores suficientes (serotonina, dopamina, noradrenalina) para manter humor estável e motivação</strong>. Você pode estar deprimido mesmo que nada "ruim" aconteça. Você pode estar deprimido apesar de "tudo certo" em sua vida.</p><blockquote class="tip">Tristeza é emoção normal em resposta a evento (morte, perda, fracasso). Depressão é persistente, muitas vezes sem causa evidente, e interfere com funcionamento diário. Tristeza passa com tempo; depressão requer intervenção.</blockquote><p>Depressão não é falta de vontade ou atitude. Não é preguiça. Não é que você "deveria apenas" se animar. É alteração bioquímica no cérebro que afeta como você pensa, sente e funciona.</p><h4>Sintomas de Depressão</h4><p>Sintomas incluem: tristeza persistente, perda de interesse em coisas que você gostava, mudança em apetite/peso, insônia ou sono excessivo, fadiga, sentimentos de inutilidade, culpa, dificuldade concentrando, agitação ou lentidão, e pensamentos de morte. <strong>Você não precisa de todos os sintomas para ter depressão, apenas alguns persistindo por 2+ semanas</strong>.</p><blockquote class="example">Alguém pode ter depressão e ainda ir trabalhar (funcionamento externo) enquanto internamente está destruído (funcionamento interno). Depressão não é óbvia. Muitas pessoas sofrem em silêncio.</blockquote><blockquote class="quote">Depressão é mentira que seu cérebro diz. Seu trabalho é reconhecer mentira e procurar ajuda para corrigi-la.</blockquote>'
      },

        id: 'tipo',
        title: 'Tipos e Severidade de Depressão',
        html: '<h4>Depressão Maior vs Outros Tipos</h4><p><strong>Depressão Maior é diagnóstico clínico onde você tem sintomas graves por pelo menos 2 semanas</strong>. É diferente de tristeza normal. É tão incapacitante que você pode não conseguir trabalhar, cuidar de si mesmo, ou sair da cama.</p><blockquote class="tip">Existem outros tipos: Distimia (depressão crônica leve), Depressão Sazonal (inverno), Depressão Pós-parto, Depressão Resistente a Tratamento. Cada um requer abordagem ligeiramente diferente.</blockquote><p>Severidade varia: leve (afeta funcionamento um pouco), moderado (afeta funcionamento significativamente), severo (praticamente incapacitante). <strong>Severidade não determina validade. Depressão leve ainda requer tratamento</strong>.</p><h4>Causas e Contribuidores</h4><p>Depressão é multifatorial: genética (50% herdável), eventos traumáticos, perda, estresse crônico, isolamento, dormir mal, saúde física ruim, deficiências nutricionais (B12, D, folato), e desequilíbrio químico cerebral.</p><blockquote class="example">Uma pessoa pode ter genética para depressão, mas se está em ambiente amoroso, dormindo bem, exercitando, comendo bem e conectada socialmente, pode nunca desenvolver. Mesma genética em isolamento e estresse pode levar a depressão severa.</blockquote><blockquote class="quote">Depressão raramente tem uma causa. É convergência de múltiplos fatores que seu cérebro não consegue lidar.</blockquote>'

      {
        id: 'trat',
        title: 'Caminho de Recuperação: Terapia e Medicação',
        html: '<h4>Terapia: A Base da Recuperação</h4><p><strong>Terapia Cognitivo-Comportamental (TCC) é tratamento de ouro para depressão. Você aprende a reconhecer pensamentos depressivos distorcidos, desafiar-los, e substituir por pensamentos mais realistas</strong>. Isso lentamente reconstrói circuitos neurais.</p><blockquote class="tip">TCC funciona porque depressão frequentemente envolve pensamentos automáticos negativos. "Sou inútil", "Ninguém me ama", "Sempre vou estar sozinho". Essas mentiras alimentam depressão. Terapia teach você a reconhecer e rejeitar essas mentiras.</blockquote><p>Outros tipos de terapia: Terapia de Aceitação e Compromisso, Mindfulness, Psicodrama. Todas têm evidência de efetividade. <strong>O tipo menos importante que o terapeuta. Conexão com seu terapeuta importa enormemente</strong>.</p><h4>Medicação</h4><p>Antidepressivos trabalham reequilibrando neurotransmissores. SSRIs (Sertraline, Fluoxetina) são prescritos frequentemente. <strong>Medicação não é fraqueza, é ferramenta para reequilibrar cérebro assim como insulina reequilibra diabete</strong>.</p><blockquote class="example">Alguém em depressão severa pode não conseguir se beneficiar de terapia porque está muito disfuncional. Medicação tira o peso o suficiente para que terapia possa trabalhar. Combinação é geralmente mais efetiva que qualquer um sozinho.</blockquote><p>Medicação leva 4-6 semanas para funcionar completamente. Paciência é necessária. Efeitos colaterais podem ocorrer inicialmente mas frequentemente diminuem. <strong>Encontrar medicação correta às vezes leva tentativa</strong>.</p><blockquote class="quote">Medicação é não é solução permanente, mas ponte para recuperação. Use como ferramenta para melhorar, não como substituto para mudança de vida.</blockquote>'

        title: 'Mudanças de Estilo de Vida para Recuperação',
        html: '<h4>O Poder da Ação Pequena</h4><p><strong>Quando você está deprimido, você não tem motivação. Esperando motivação significa nunca fazer nada. Você deve agir mesmo sem motivação, e a motivação segue a ação</strong>. Comece pequeno: 10 minutos de caminhada. Uma conversa com amigo. Uma refeição nutritiva.</p><blockquote class="tip">Máquina de Hábito: pequena ação repetida cria hábito que cria mudança neurológica que cria mudança de humor. Você não precisa de grande ação. Você precisa de ação consistente pequena.</blockquote><p>Exercício é um dos tratamentos mais eficazes para depressão, comparável a medicação. Luz solar também. Sono adequado é fundamental. Nutrição importa. Conexão social é crítica.</p><h4>Autopiedade, não Autocrítica</h4><p><strong>Depressão traz autocrítica feroz. "Sou fraco", "Deveria conseguir lidar", "Sou carga". Sua trabalho é reconhecer essas vozes como depressão falando, não verdade</strong>. Tratar você mesmo como você trataria amigo em depressão.</p><blockquote class="example">Se amigo está deprimido, você diz "você não é fraco, você está lutando, vou estar aqui para você". Você não diz "deveria apenas se animar". Você deve dizer isso para você mesmo também.</blockquote><blockquote class="quote">Autopiedade não é autossabotagem. É reconhecimento de que você está sofrendo e merece compaixão - de outros e de você mesmo.</blockquote>'

        title: 'O que é Burnout e Como Você Sabe que Tem',
        html: '<h4>Burnout é Mais que Estresse</h4><p><strong>Burnout é estado de esgotamento emocional, despersonalização e senso reduzido de realização causado por estresse prolongado no trabalho</strong>. Você está tão exausto que não consegue funcionar. É diferente de "estar ocupado". É destruição do seu ser.</p><blockquote class="tip">Sinais de burnout: exaustão persistente, cinismo sobre trabalho, diminuição de performance, insônia, doença frequente, irritabilidade, desconexão de pessoas e tarefas. Você pode estar fisicamente presente mas mentalmente desaparecido.</blockquote><p>Burnout não é falha sua. É falha do sistema que permite esgotamento. Ambientes tóxicos, falta de controle, falta de reconhecimento, conflito de valores - estes causam burnout. <strong>Você não precisa estar fazendo "errado" para ter burnout</strong>.</p><h4>Diferença Entre Estresse Normal e Burnout</h4><p>Estresse é resposta a desafio que, quando removido, você recupera. Burnout é esgotamento profundo que persiste mesmo em descanso. <strong>Alguém em burnout pode ter semana de férias e ainda se sente totalmente esgotado na volta</strong>.</p><blockquote class="example">Gerente de projeto estressado pode trabalhar 60 horas por semana mas sente-se capaz e apreciado. Gerente em burnout trabalha 60 horas e sente-se invisível, inútil, destruído. Horas não determinam burnout, contexto determina.</blockquote><blockquote class="quote">Burnout não é preguiça. É seu corpo gritando que algo precisa mudar.</blockquote>'

        id: 'prev',
        title: 'Prevenção e Recuperação de Burnout',
        html: '<h4>Prevenção é Mais Fácil que Recuperação</h4><p><strong>Estabeleça limites agora: hora de trabalho definida, tempo desconectado, atividades fora de trabalho, relacionamentos não-trabalho</strong>. Quando você tem estrutura, você resiste melhor à pressão.</p><blockquote class="tip">A Regra da Recuperação: 1 hora de trabalho intenso requer 1 hora de recuperação (descanso, lazer, movimento). Se você trabalha 10 horas com 1 hora de almoço, você tem débito de 9 horas de recuperação. Esse déficit causa burnout.</blockquote><p>Significado é escudo contra burnout. Se seu trabalho tem significado para você, você resiste melhor à exaustão. Se não tem, você está apenas suportando para paycheck.</p><h4>Recuperação de Burnout</h4><p><strong>Se você já está em burnout, você precisa de mudança real, não só férias. Férias ajudam, mas você volta para mesmo ambiente e fica queimado de novo</strong>. Você precisa mudar trabalho, mudar ambiente, ou mudar relacionamento com trabalho.</p><blockquote class="example">Alguém em burnout severo pode precisar de licença médica para recuperação completa. Algumas semanas fora pode permitir seu corpo e mente recuperarem o suficiente para tomar decisão clara sobre próximo passo (mudar de trabalho, voltar com limite novo, etc).</blockquote><p>Durante recuperação: priorize sono, exercício, terapia, conexão social. Sua trabalho não é sua identidade. Você é mais que sua carreira.</p><blockquote class="quote">Você não pode sair da queimadura sem deixar situação que a criou. Mudança é necessária.</blockquote>'

        title: 'Terapia Cognitivo-Comportamental: A Mais Estudada',
        html: '<h4>O Que é TCC e Como Funciona</h4><p><strong>TCC é baseada no princípio que seus pensamentos determinam seus sentimentos, que determinam suas ações. Ao mudar pensamentos, você muda sentimentos e ações</strong>. Você aprende a reconhecer padrões de pensamento distorcido e corrigi-los.</p><blockquote class="tip">TCC não é "pensar positivo" forçado. É realismo racional. Quando você pensa "Sou completamente inútil", TCC teach você a desafiar: "Sou inútil? Tenho trabalho. Tenho relacionamentos. Há coisas em que sou bom. Esse pensamento não é verdade".</blockquote><p>TCC tem estrutura clara: você e terapeuta trabalham juntos em problemas específicos, aprende ferramentas, pratica entre sessões. É ativa, colaborativa, e orientada para solução.</p><h4>Efetividade de TCC</h4><p><strong>TCC tem a maior evidência de qualquer terapia. É efetiva para depressão, ansiedade, PTSD, transtornos alimentares, vício e mais</strong>. Pode ser feita em terapia individual, grupo, ou até auto-ajuda online.</p><blockquote class="example">Alguém com ansiedade social aprende que pensamento automático "vou parecer ridículo e todos vão rir" é mentira. Terapeuta ajuda a desafiar: "Você já riu de alguém nervoso? Pessoas estão focadas em si mesmas, não em você". Gradualmente, ansiedade diminui quando verdade replace mentira.</blockquote><blockquote class="quote">Suas pensamentos são seus padrões de voo. Corrija os padrões e você voa reto.</blockquote>'
      },
      {
        id: 'act',
        title: 'Terapia de Aceitação e Compromisso',
        html: '<h4>ACT: Aceitar e Comprometer com Vida Significativa</h4><p><strong>ACT é diferente de TCC. Ao invés de tentar mudar pensamentos, ACT teach você a aceitar pensamentos (até negativos) enquanto ainda age de forma alinhada com seus valores</strong>. Você para de lutar com sua mente e começa a viver com propósito.</p><blockquote class="tip">Exemplo: você tem pensamento "sou inútil". TCC diria desafie esse pensamento. ACT diria aceite que tem esse pensamento, mas não deixe determinar suas ações. Você é inútil? Pode ser mentira. Agora, vá fazer algo significativo apesar da mentira.</blockquote><p>ACT trabalha em seis áreas: aceitação (deixar pensamentos passarem), defusão cognitiva (separar-se de pensamentos), autopiedade, presença (mindfulness), valores (o que importa), e ação (viver alinhado com valores).</p><h4>Quando ACT é Particularmente Útil</h4><p><strong>ACT é particularmente útil para pessoas com pensamentos crônicos que não podem ser totalmente mudados (trauma, crises existenciais, doenças crônicas)</strong>. Você aprende a viver bem com dor, não eliminá-la.</p><blockquote class="example">Alguém com PTSD tem pensamentos traumáticos que retornam constantemente. ACT teach que você não pode eliminar esses pensamentos, mas você pode aceitar tê-los e viver significativamente apesar deles. Isso é libertação.</blockquote><blockquote class="quote">Você não consegue parar de pensar. Mas você consegue parar de ser controlado por pensamentos.</blockquote>'
