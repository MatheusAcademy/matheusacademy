  id: 6, name: 'Estratégias Fiscais e Tributárias', free: false,
  topics: [
    { id: 'ef01', name: 'IRPF: Otimizando sua Declaração', dur: '22 min', content: `<h3>IRPF: Otimizando sua Declaração</h3><p>O Imposto de Renda Pessoa Física é o tributo mais significativo para a maioria dos brasileiros, com alíquotas de 0% a 27,5% dependendo da faixa de renda. A otimização fiscal legal — usar todas as deduções, isenções e estratégias disponíveis na legislação — pode economizar milhares de reais por ano. Sonegação é crime; planejamento tributário é inteligência financeira.</p><h4>Declaração Completa vs Simplificada</h4><p>A escolha entre declaração completa e simplificada é a primeira decisão fiscal do ano. O desconto simplificado é de 20% da renda tributável (limitado a R$ 16.754,34 em 2025). Se suas deduções reais (saúde, educação, dependentes, previdência) superam esse valor, a declaração completa é mais vantajosa. O próprio programa da Receita Federal compara as duas opções — sempre verifique qual gera menos imposto.</p><blockquote class="tip">💡 Mantenha todos os recibos e notas fiscais de despesas médicas durante o ano. Despesas médicas são as únicas deduções SEM LIMITE no IRPF. Uma cirurgia de R$ 50.000, ortodontia de R$ 15.000 ou tratamento psicológico de R$ 12.000 reduzem sua base de cálculo integralmente.</blockquote><p>Deduções com dependentes (R$ 2.275,08 por dependente em 2025), educação (até R$ 3.561,50 por pessoa) e previdência privada PGBL (até 12% da renda bruta) são as mais comuns. Pensão alimentícia judicialmente fixada é dedutível integralmente. Contribuições a empregados domésticos ainda podem ser dedutíveis em alguns cenários.</p><blockquote class="example">📌 Exemplo: Médica com renda de R$ 400.000/ano, dois filhos, despesas médicas de R$ 40.000, educação de R$ 7.123, dependentes de R$ 4.550, e PGBL de R$ 48.000 (12%). Total de deduções: R$ 99.673. Economia fiscal: ~R$ 27.000/ano. Se usasse declaração simplificada, economia seria apenas ~R$ 4.600. A declaração completa economizou R$ 22.400 adicionais.</blockquote><p>O contribuinte com renda mista (CLT + autônomo/aluguel) precisa atenção especial. Rendimentos de aluguel são tributados no carnê-leão mensalmente. Rendimentos de aplicações financeiras têm tributação específica. Dividendos de ações são isentos. Organizar essas diferentes fontes corretamente é essencial para evitar tanto pagamento excessivo quanto problemas com a Receita.</p><blockquote class="news">📰 Receita Federal (2025): 43 milhões de declarações de IRPF foram entregues em 2025. Apenas 29% usaram declaração completa, mas entre contribuintes com renda acima de R$ 100.000, 67% se beneficiam mais da declaração completa. A restituição média foi de R$ 2.340, mas contribuintes com planejamento fiscal reportam restituição média de R$ 8.700.</blockquote>` },
    { id: 'ef02', name: 'Tributação de Investimentos no Brasil', dur: '20 min', content: `<h3>Tributação de Investimentos no Brasil</h3><p>Entender a tributação de cada tipo de investimento é essencial para maximizar retornos líquidos. No Brasil, diferentes classes de ativos têm tratamentos fiscais muito diferentes, e essa diferença pode impactar significativamente o resultado final. Um investimento que rende mais bruto pode render menos líquido se a tributação for mais pesada.</p><h4>Renda Fixa</h4><p>CDBs, Tesouro Direto e outros títulos de renda fixa seguem a tabela regressiva de IR: 22,5% (até 180 dias), 20% (181-360 dias), 17,5% (361-720 dias) e 15% (acima de 720 dias). LCI, LCA e debêntures incentivadas são ISENTAS de IR para pessoa física. Poupança também é isenta. O IOF incide sobre resgates nos primeiros 30 dias (de 96% a 0%), então evite resgates no primeiro mês.</p><blockquote class="tip">💡 Para investimentos de longo prazo em renda fixa, a diferença entre 22,5% (curto prazo) e 15% (longo prazo) é enorme. Em R$ 100.000 com rendimento de 13%, a economia de manter por 2+ anos é de ~R$ 975 por ano. Não resgate antes da hora só para trocar de título.</blockquote><p>Ações têm tratamento especial: vendas abaixo de R$ 20.000/mês são ISENTAS de IR. Acima, a alíquota é de 15% sobre o ganho de capital (20% para day trade). Dividendos são isentos. JCP (Juros sobre Capital Próprio) são tributados em 15% na fonte. FIIs: rendimentos mensais são isentos, ganho de capital na venda de cotas é tributado em 20%.</p><blockquote class="example">📌 Exemplo de otimização: Ricardo quer vender R$ 30.000 em ações com lucro de R$ 5.000. Se vender tudo em um mês, paga 15% de IR sobre R$ 5.000 = R$ 750. Se dividir em dois meses (R$ 15.000 + R$ 15.000, ambos abaixo de R$ 20.000), cada venda é isenta. Economia: R$ 750. Simples, legal e eficaz.</blockquote><p>Previdência privada tem tributação própria: tabela regressiva (de 35% até 10%) ou tabela progressiva (igual ao IRPF). Para horizontes longos (10+ anos), a tabela regressiva é quase sempre superior. A previdência também permite transferência entre planos sem tributação (portabilidade), o que é uma vantagem única sobre outros investimentos.</p><blockquote class="news">📰 Receita Federal (2025): brasileiros pagaram R$ 32 bilhões em IR sobre investimentos em 2024. Estimativas de especialistas sugerem que 15-20% desse valor (~R$ 5 bilhões) poderia ser legalmente economizado com melhor planejamento tributário, como uso de isenção de R$ 20k em ações e preferência por ativos isentos quando equivalentes.</blockquote>` },
    { id: 'ef03', name: 'Come-Cotas e Eficiência em Fundos', dur: '20 min', content: `<h3>Come-Cotas e Eficiência em Fundos</h3><p>O come-cotas é um mecanismo de antecipação de imposto que incide sobre fundos de investimento abertos (exceto fundos de ações) nos últimos dias úteis de maio e novembro. O governo "come" suas cotas — reduz a quantidade de cotas para cobrar o IR antecipado. Para fundos de curto prazo, a alíquota é 20%; para fundos de longo prazo, 15%. Isso reduz a base de rendimento e impacta negativamente os juros compostos.</p><h4>O Impacto Real do Come-Cotas</h4><p>O come-cotas parece inofensivo — "é só antecipação de IR que eu pagaria de qualquer forma". Mas o efeito no longo prazo é significativo porque o dinheiro pago em come-cotas DEIXA de render juros compostos. Em 20 anos, um fundo com come-cotas rende 5-8% MENOS que um investimento equivalente sem come-cotas (como ações, ETFs ou Tesouro Direto mantido até o vencimento).</p><blockquote class="tip">💡 Fundos de ações NÃO têm come-cotas — IR é pago apenas no resgate (15%). ETFs também não têm come-cotas. Para investimentos de longo prazo, prefira veículos sem come-cotas sempre que possível.</blockquote><p>Comparação prática: R$ 100.000 investidos por 20 anos a 12% ao ano bruto. Em fundo com come-cotas de 15%: patrimônio final ~R$ 680.000 (já deduzido come-cotas semestral). No Tesouro IPCA+ mantido até vencimento (IR só no final): patrimônio final ~R$ 740.000 (antes de IR de 15%). Após pagar IR no resgate: ~R$ 700.000. Diferença de R$ 20.000 — dinheiro perdido para o efeito do come-cotas nos juros compostos.</p><blockquote class="example">📌 Exemplo: Fundo multimercado rende CDI+2% com come-cotas semestral de 15%. CDB de banco médio rende CDI+2% com IR só no resgate após 2 anos (15%). O CDB rende mais líquido porque não sofre come-cotas. Para o investidor de longo prazo, a eficiência fiscal do CDB (IR diferido) supera o fundo mesmo que a gestão profissional gere retorno bruto marginalmente superior.</blockquote><p>Fundos exclusivos (para investidores com R$ 10 milhões+) tinham isenção de come-cotas até 2023, quando a Lei 14.754/2023 acabou com essa vantagem. Essa mudança equalizou o tratamento fiscal e reduziu uma vantagem que existia apenas para os mais ricos.</p><blockquote class="news">📰 CVM (2025): o come-cotas arrecadou R$ 28 bilhões em 2024 para o governo. A indústria de fundos estima que o efeito acumulado do come-cotas reduz o patrimônio dos cotistas em ~R$ 45 bilhões por ano quando se considera o custo de oportunidade dos juros compostos perdidos.</blockquote>` },
    { id: 'ef04', name: 'Planejamento Tributário para Diferentes Perfis', dur: '20 min', content: `<h3>Planejamento Tributário para Diferentes Perfis</h3><p>O planejamento tributário eficaz depende do seu perfil: CLT, autônomo, empresário ou investidor. Cada perfil tem oportunidades e armadilhas específicas. O objetivo não é pagar menos imposto a qualquer custo, mas pagar o imposto correto — nem mais (desperdício) nem menos (crime). A diferença entre elisão fiscal (legal) e evasão fiscal (ilegal) é clara na lei, e profissionais competentes navegam sempre dentro da legalidade.</p><h4>Perfil CLT</h4><p>Para assalariados, as principais estratégias são: maximizar deduções na declaração completa (especialmente médicas), contribuir 12% ao PGBL, usar a isenção de R$ 20.000/mês em vendas de ações, preferir LCI/LCA isentas quando equivalentes a CDB tributado, e fazer doações dedutíveis a fundos de cultura e esporte (até 6% do IR devido).</p><blockquote class="tip">💡 Se você é CLT com renda de R$ 15.000/mês e não contribui para PGBL, está potencialmente desperdiçando R$ 6.000/ano em economia fiscal. Mesmo que não goste de previdência privada, o benefício fiscal por si só justifica a contribuição — você pode resgatar em 10+ anos com alíquota de apenas 10%.</blockquote><p>Profissionais autônomos (médicos, advogados, engenheiros) frequentemente se beneficiam de abrir PJ (pessoa jurídica) quando a renda justifica. No Simples Nacional, a alíquota efetiva para serviços começa em ~6%, versus até 27,5% como pessoa física. No Lucro Presumido, a tributação efetiva para profissionais de saúde pode ser de 11-16%. A economia pode chegar a 50% da carga tributária.</p><blockquote class="example">📌 Exemplo: Dra. Ana, dentista, renda de R$ 25.000/mês como autônoma. Como PF: IR de ~R$ 5.800/mês + INSS. Como PJ no Simples (com fator R favorável): total de impostos ~R$ 2.500/mês. Economia mensal: R$ 3.300. Economia anual: R$ 39.600. Em 10 anos investidos: ~R$ 600.000. A PJ paga-se no primeiro mês.</blockquote><p>Para investidores com patrimônio significativo, a escolha entre tributação na pessoa física e na jurídica pode impactar muito. Imóveis de aluguel tributados na PF pagam até 27,5% de IR. Na PJ (holding patrimonial), podem pagar 11-14% no Lucro Presumido. A economia é real, mas a estrutura tem custos de manutenção (contabilidade, DCTF, ECD) que devem ser considerados.</p><blockquote class="news">📰 IBPT (2025): a carga tributária brasileira é de 33,7% do PIB — a maior entre países emergentes. O contribuinte médio trabalha 149 dias por ano só para pagar impostos. Porém, estudos do IBPT estimam que 35% dos contribuintes pagam mais impostos do que deveriam por falta de planejamento tributário adequado.</blockquote>` }
  ],
