  {id:1,name:'O que é Blockchain?',dur:'15 min',content:`<h3>Blockchain: A Tecnologia que Mudou Tudo</h3><p>Blockchain é talvez a invenção mais importante desde internet. Permite que pessoas, sem conhecer uma à outra, sem confiar uma na outra, façam transações seguras e imutáveis. É revolução de confiança.</p><p>Imagine um caderno compartilhado por 10000 pessoas. Quando você escreve algo nele, todas as 10000 pessoas anotam também. Se você tenta apagar o que escreveu, 9999 cópias ainda têm registrado. Alteração é impossível. É basicamente blockchain: um ledger (registro contábil) distribuído que impossibilita alteração retrospectiva.</p><p>Blockchain foi inventado em 2008 por Satoshi Nakamoto (nome pseudônimo) para resolver problema matemático: como fazer transação financeira entre dois estranhos na internet sem intermediário? Bancos cobram taxa alta e demoram. Bitcoin foi solução: blockchain de moeda digital que qualquer um pode enviar a qualquer um instantaneamente sem banco no meio.</p><p>Como funciona? Você envia transação. Múltiplos computadores (chamados nodes) recebem sua transação. Eles verificam se você realmente tem o dinheiro usando chaves criptográficas (próxima seção). Se maioria concorda que transação é válida, ela é incluída em um bloco. Blocos são encadeados (daí 'blockchain'). Uma vez inserido, é impossível alterar sem refazer todas as cópias na rede.</p><p>Imutabilidade é poder real. Se você registrar no blockchain que é dono de um ativo, registro é permanente. Ninguém, nem mesmo governo, pode apagar esse registro. Isso é revolucionário para propriedade digital. Títulos de propriedade imóvel, certificados acadêmicos, documentos médicos—tudo pode viver em blockchain permanentemente.</p><p>Descentralização é a beleza. Web tradicional tem servidores centrais (Google, Facebook, Amazon). Se servidor cai, serviço inteiro cai. Se empresa decide deletar seus dados, desaparecem. Blockchain é milhares de servidores independentes. Se um cai, rede continua. Se uma entidade quer alterar dados, outras copias verificam e rejeitam. Controle é distribuído entre milhares.</p><p>Transparência é consequência. Toda transação em blockchain público é visível para qualquer pessoa. Você vê de onde vem cada Satoshi de Bitcoin. Isso reduz fraude porque tudo é auditável. Privacidade é preservada porque endereços são anônimos, mas transações são rastreáveis. É equilibrio perfeito.</p>`,cards:[{q:'O que torna blockchain imutável?',a:'Distribuição de dados entre muitos computadores e criptografia que torna alteração de dados históricos tecnicamente impossível de ocultar.'}]},
  {id:2,name:'Criptografia: Chaves Pública e Privada',dur:'15 min',content:`<h3>Criptografia Moderna: Segurança Através de Matemática</h3><p>Se blockchain é o começo da história, criptografia é o coração. Sem criptografia moderna, blockchain seria ilusão de segurança. Com criptografia, segurança é matemática garantida.</p><p>Chave privada é número secreto de 256 bits (32 bytes) que representa suas riquezas. Se você tem 1 Bitcoin, aquele Bitcoin está asociado com sua chave privada. Qualquer um com sua chave privada pode transferir seu Bitcoin. Por isso: NUNCA compartilhe chave privada. É equivalente a deixar carteira com todo seu dinheiro em cima da mesa.</p><p>Chave pública é derivada matematicamente de chave privada, mas é impossível reverter o processo. Você pode tornar chave pública pública (daí o nome)—ela aparece em broadcasts a cada transação. Chave pública é como seu número de conta banco: outras pessoas precisam dela para enviar você dinheiro, mas ela sozinha não permite saques.</p><p>Assinatura digital funciona assim: você tem mensagem (transação). Você assina com sua chave privada, criando assinatura. Qualquer um pode verificar a assinatura com sua chave pública e confirmar que você realmente iniciou aquela transação. É como assinatura em papel, mas criptograficamente irrefutável.</p><p>Exemplo prático: você quer enviar 1 Bitcoin a amigo. Você cria transação: 'Enviar 1 BTC do meu endereço para endereço de amigo'. Você assina com sua chave privada. Network verifica sua chave pública contra assinatura. Se assinatura é válida, transação é aceita. Alguém poderia falsificar? Não—falsificar exigiria conhecer sua chave privada, que é computacionalmente impossível quebrar.</p><p>Hash é outro componente. Hash criptográfico transforma qualquer dado (1MB de filme, ou 1 byte) em string aleatória de 256 caracteres. Se você altera qualquer bit de dado original, hash muda completamente. Isso permite detectar alteração. Blockchain usa hash para encadear blocos: cada bloco contém hash do bloco anterior, criando corrente imutável.</p><p>Segurança vem de problemas matemáticos que são fáceis de verificar mas impossível de resolver sem conhecimento especial. Sua chave pública é derivada de chave privada através de função unidirecional. Sem a chave privada, é impossível falsificar transação. Matemática pura, não confiança em intermediários.</p>`,cards:[{q:'Por que chave privada deve ser secreta?',a:'Porque qualquer pessoa com a chave privada pode controlar e transferir todos os ativos associados àquele endereço blockchain.'}]},
  {id:3,name:'Consenso Distribuído: Proof of Work e Proof of Stake',dur:'15 min',content:`<h3>Como Blockchain Alcança Acordo Sem Autoridade Central</h3><p>Maior desafio de blockchain descentralizado: como 10000 computadores independentes chegam ao acordo sobre verdade sem entidade central? Se 5000 dizem 'transação é válida' e 5000 dizem 'não é', quem decide?</p><p>Resposta é consenso. Blockchain usa mecanismos matemáticos que incentivam honestidade. Se você tenta fraudar, sistema torna economicamente impossível. Duas abordagens dominam: Proof of Work e Proof of Stake.</p><p>Proof of Work é método original do Bitcoin. Imagine problema de matemática muito difícil que apenas computador poderoso consegue resolver em minutos, mas qualquer um pode verificar resposta em segundos. Quem resolve o problema (chamaod 'mining') ganha recompensa (novos bitcoins). Isso incentiva honestidade: se você tenta fraudar, outros mineiros rejeitam seu bloco fraudulento, você perde recompensa. É mais lucrativo ser honesto.</p><p>Segurança vem de custo. Para controlar Bitcoin network, atacante teria que controlar 51% da capacidade computacional mundial. Custo estimado: dezenas de bilhões de dólares em hardware e eletricidade. Roubo que você poderia fazer com ese hardware seria insignificante. Economicamente irracional atacar.</p><p>Proof of Stake é método mais novo (Ethereum o usa agora). Ao invés de resolver problemas matemáticos, você coloca seu próprio capital como 'stake'. Se você quer validar bloco, você 'cria' uma certa quantidade de coin. Se bloco é honesto, você ganha taxa. Se bloco é fraudulento, você perde seu stake (chamado 'slashing'). Isso incentiva honestidade: fraude te custa diretamente.</p><p>Vantagem de Proof of Stake sobre Proof of Work: muito menor consumo de energia (90% menos). Bitcoin usa ~5 TWh eletricidade por ano. Ethereum pós-Stake usa ~0.05 TWh. Essa é diferença entre sustentabilidade e envergonhamento ambiental.</p><p>Desvantagem de Proof of Stake: rico fica mais rico. Se você tem muito capital para stake, você ganha muitas fees. Mecanismo recompensa acumulação. Proof of Work é mais democrático: qualquer um pode comprar hardware e minerar (embora em maior escala, GPUs especializadas chamadas ASICs tornem acesso mais centralizado).</p><p>Outros mecanismos existem: Proof of Authority (confiança em validadores conhecidos), Proof of History (sequência temporal criptográfica), Proof of Capacity (usar espaço em disco). Blockchain moderno é laboratório de inovação consensual.</p>`,cards:[{q:'Qual é o objetivo do mecanismo de consenso em blockchain?',a:'Alcançar acordo entre nós descentralizados sobre qual é a verdade sem autoridade central, incentivando honestidade e prevenindo fraude.'}]},
  {id:4,name:'Smart Contracts: Programas na Blockchain',dur:'15 min',content:`<h3>Smart Contracts: Código Como Lei</h3><p>Bitcoin permite transações de valor. Ethereum permite programas inteiros rodar na blockchain. Esses programas são chamados smart contracts, e são revolucionários.</p><p>Contrato tradicional é acordo entre partes escrito em papel. Ambas assinam. Se alguém viola, você toma para corte (caro, lento, incerto). Smart contract é programa que implementa automaticamente: 'se condição X acontecer, execute ação Y'. Não requer confiança. Código garante execução.</p><p>Exemplo: aposta entre amigos. Bob aposta com Alice que chuva amanhã. Se chover, Bob paga Alice R$100. Como garantir honestidade? Normalmente confiam um no outro (fraude é possível). Smart contract: ambos colocam R$100 em contrato. Contrato consultará dados de chuva automáticos (weather API). Se choveu, R$100 de Bob vai para Alice. Se não choveu, R$100 de Alice vai para Bob. Execução automática, sem intermediário.</p><p>Aplicações são infinitas. Seguros: "Se voo for cancelado (dados automáticos), segurado recebe R$X instantaneamente". Empréstimos: "Se emprestador não pagar em data X (data é registrada na blockchain), colateral é automaticamente transferido para credor". Acordos comerciais: "Se fornecedor entregar produto em qualidade verificada pelo sensor IoT, pagamento é automático".</p><p>Ethereum é plataforma principal de smart contracts. Usa linguagem Solidity que é semelhante a JavaScript. Desenvolvedores escrevem contrato, o carrega na blockchain (pagando taxa 'gas' em ETH), e contrato vive para sempre, executando exatamente como programado.</p><p>Segurança é preocupação. Código com bugs é desastre. Se smart contract de empréstimo tem bug que permite saques duplos, alguém vai explorar. Bilhões já foram perdidos em hacks de smart contracts. Auditoria profissional de código é necessário para contratos de alto valor. Imutabilidade é faca de dois gumes: código correto é garantido forever, mas código errado também é garantido forever.</p><p>Oráculo é problema. Contrato inteligente funciona perfeito dentro da blockchain, mas e dados externos? Se contrato precisa saber temperatura de fora, precisa de 'oracle'—entidade que fornece dados externos. Mas qual oracle confiar? Isso reintroduz ponto de centralização. Soluções emergem: múltiplos oráculos, mecanismos de votação, provas criptográficas de dados.</p>`,cards:[{q:'O que é um smart contract e como se difere de contrato tradicional?',a:'É programa na blockchain que executa automaticamente quando condições são atingidas, sem necessidade de intermediário ou confiança entre partes.'}]},
  {id:5,name:'DApps: Aplicações Descentralizadas',dur:'15 min',content:`<h3>DApps: O Futuro do Software Descentralizado</h3><p>Se smart contracts são motor, DApps (Decentralized Applications) são carro inteiro. Uma DApp é aplicação que roda em blockchain ao invés de servidores centralizados. Usuário mantém controle total. Nenhuma empresa pode derrubar ou censurar DApp.</p><p>DeFi (Decentralized Finance) é categoria maior de DApps. Uniswap é exchange descentralizado onde você troca criptogramas sem intermediário. Aave é protocolo de empréstimo: você empresta seu ETH e ganha juros. Maker permite criar stablecoin (moeda estável) colateralizada. Tudo sem banco, sem KYC (Know Your Customer), sem restrições geográficas.</p><p>Vantagem versus finanças tradicional: velocidade (transações em minutos), acessibilidade (qualquer um com internet pode participar, sem discriminação), transparência (pode ver toda lógica do protocolo), censura-resistência (governo não pode bloquear suas finanças).</p><p>Desvantagem: complexidade (interface é intimidadora para novatos), risco técnico (bugs podem custar milhões), volatilidade (preços são extremamente voláteis), regulação incerta (governo está perdido em como regular). DeFi é futuro, mas ainda jovem e experimental.</p><p>NFTs são categoria diferente de DApp. Non-Fungible Token é representação digital de propriedade única. Uma moeda é fungível: seu R$100 é igual a meu R$100 (permutável). Um NFT não é fungível: meu Picasso não é igual ao seu (único). Blockchain permite registrar essa unicidade.</p><p>Aplicações: arte digital, colecionáveis, ingressos de evento, certificados, títulos de propriedade. Um artista cria arte digital, cria NFT, vende por ETH diretamente ao colecionador. NFT prova propriedade e raridade. Secundariamente, artista recebe royalties automaticamente cada vez que NFT é revendido (revolucionário).</p><p>Crítica de NFTs é frequente: muitos são scams ou esquemas piramidais. Mas potencial legítimo existe. Sistema de propriedade digital verificável em blockchain é inovação fundamental. Abuso é esperado em tecnologia nova, assim como spams no email inicial.</p>`,cards:[{q:'Qual é a principal diferença entre DApp e aplicação tradicional?',a:'DApp roda em blockchain descentralizada, dando controle ao usuário, enquanto app tradicional roda em servidores da empresa que pode censura ou derrubar.'}]},
  {id:6,name:'Ethereum e Evolução da Blockchain',dur:'15 min',content:`<h3>Ethereum: Blockchain Programável</h3><p>Bitcoin foi primeira blockchain. Ethereum foi segunda revolução. Bitcoin permite transações de valor. Ethereum permite qualquer coisa: smart contracts, DApps, tokens customizados, tudo.</p><p>Visão de Ethereum era criar 'computador mundial'. Imagine computador operado por 10000 nós distribuindo globalmente. Qualquer desenvolvedor pode publicar programa nele. Programa roda exatamente como foi programado, sem possibilidade de corrupção. É profundo.</p><p>ERC-20 é padrão de token. Desenvolvedor pode criar seu próprio token (tipo moeda) com poucas linhas de código. Existem 500000+ tokens ERC-20. Alguns com valor legítimo, a maioria são shitcoins (moedas sem valor, frequentemente scams). Mas permite inovação: empresas podem criar economia própria.</p><p>Evolução foi longa. Bitcoin usa Proof of Work (PoW) puro. Ethereum começou com PoW, mas em 2022 fez 'The Merge' migrando para Proof of Stake (PoS). Mudança reduziu consumo de energia 99.95%. Um passo gigante para sustentabilidade.</p><p>Layer 2 solutions multiplicaram throughput. Ethereum base é lento (~15 transações/segundo). Polygon, Arbitrum, Optimism rodam smart contracts compatíveis com Ethereum, mas 100-1000x mais rápido (e barato). Você escolhe qual layer usar conforme velocidade/custo necessários.</p><p>Competidores emergiram. Solana é fast mas menos segura. Cardano é acadêmico. Polkadot é modular. Bitcoin persiste como store of value (ouro digital). Ethereum domina DeFi e DApps. Mercado é grande o suficiente para múltiplos winners.</p><p>Futuro de Ethereum inclui prototipagem contínua. Layer 2 scaling, rollups otimistas e zero-knowledge, sharding para maior descentralização. Ethereum não é produto fixo, é experimento vivo melhorando continuamente.</p>`,cards:[{q:'O que torna Ethereum diferente de Bitcoin?',a:'Bitcoin permite apenas transações de valor, enquanto Ethereum permite smart contracts e DApps arbitrárias, atuando como computador mundial programável.'}]},
  {id:7,name:'Web3: A Internet Descentralizada do Futuro',dur:'15 min',content:`<h3>Web3: Reimaginando a Internet</h3><p>Evoluímos da Web 1.0 (internet estática, ler-apenas) para Web 2.0 (internet interativa, redes sociais). Agora exploramos Web 3.0: internet descentralizada e proprietária do usuário.</p><p>Web 2.0 concentrou poder em poucas empresas. Google controla busca. Facebook controla redes sociais. Amazon controla e-commerce. Essas empresas possuem seus dados. Se dão ban, você perde acesso. Privacidade é questionável (dados são minados para publicidade). Inovação é sufocada por monopólios.</p><p>Web3 inverte poder. Você é proprietário de seus dados. Você autoriza qual aplicação pode acessar qual informação. Você pode portar dados de um app para outro. Inovação floresce porque qualquer desenvolvedor pode criar DApp e competir com gigantes no mesmo plano.</p><p>Identidade descentralizada é fundação. Ao invés de usar Google/Facebook login, você usa identidade blockchain. Seu DID (Decentralized Identifier) é endereço blockchain. Você controla qual informação pessoal anexa àquela identidade. Você não é rastreado através de web. Privacidade é padrão, rastreamento é opt-in.</p><p>Soberania de dados é revolução. Seus emails pertencem a você, não a Gmail. Seus fotos pertencem a você, não a Instagram. Você decide quem vê, quem copia, quem lucra. Isso muda incentivos fundamentalmente. Aplicações competem em qualidade, não em quem melhor captura dados.</p><p>Economia criativa é transformada. Artista publica NFT de obra. Fãs podem investir diretamente, recebendo royalties conforme obra se aprecia. Intermediários (galerias, editoras) são desintermediadas. Relacionamento direto artista-fã permite recompensa maior para artista, preços menores para fã.</p><p>Crítica de Web3: muita buzzword, pouca implementação real. Muitos anúncios não correspondem a realidade. Experiência de usuário ainda é complexa (gas fees, wallet management, UI confusa). Adoção mainstream ainda longe. Mas fundamentalmente, movimento é correto.</p><p>Desafios técnicos e culturais permanecem. Velocidade de transação precisa melhorar. Interfaces precisam simplificar. Regulação precisa clarificar. Educação pública precisa disseminar. Esses anos 2024-2026 são críticos para resolver desafios, senão Web3 continua nicho permanente.</p>`,cards:[{q:'Qual é a diferença fundamental entre Web 2.0 e Web3?',a:'Web 2.0 concentra dados em empresas grandes, Web3 dá propriedade dos dados aos usuários que controlam como são usados.'}]},
  {id:8,name:'Identidade Digital Descentralizada e Autossoberania',dur:'15 min',content:`<h3>Identidade Digital: Controlando Você Mesmo</h3><p>Identidade digital descentralizada (também chamada autossoberania) é uma das mudanças mais profundas de Web3. Ao invés de depender de Google/Facebook/governo para provar quem você é, você prova a si mesmo.</p><p>Hoje, identidade é fragmentada. Governos têm CPF/RG. Bancos têm conta. Google sabe email. Facebook sabe interesses. Ninguém tem visão completa além você mesmo. Pior, você não controla. Governo pode bloquear CPF. Banco pode fechar conta. Google pode deletar email.</p><p>Identidade descentralizada funciona assim: você controla chave privada que representa sua identidade. Você anexa credenciais: diploma universitário, certificado de trabalho, comprovante de endereço. Qualquer organização pode verificar credenciais criptograficamente sem contatar intermediário. Uma universidade pode emitir certificado digital verificável sem necessidade de transcrição em papel.</p><p>Aplicação revolucionária: documentos perdidos. Pessoa com certificado digital em blockchain não precisa de transcrição original. Prova é criptográfica. Essa é revolução para refugiados, migrantes, pessoas com registros perdidos. Identidade não pode ser deletada ou perdida porque está distribuída globalmente na blockchain.</p><p>Empoderamento econômico: bilhões de pessoas sem identidade oficial. Não podem abrir conta banco. Não podem pegar empréstimo. Com identidade descentralizada, podem acessar serviços financeiros globais. Impacto é maior em países em desenvolvimento onde infraestrutura é deficiente.</p><p>Privacidade é melhorada. Você não revela tudo a todos. Ao aplicar emprego, revela apenas credenciais de trabalho. Ao abrir conta bancária, revela apenas comprovante de renda. Ninguém (nem banco) vê perfil inteiro sua. Cada aplicação vê apenas o necessário.</p><p>Desafios existem. Se você perde sua chave privada de identidade, identidade é perdida (ao contrário de senha de email que você pode recuperar com backup). Revogação de credenciais é complexa. Privacidade é maior, mas rastreabilidade de crime é menor (benefício double-edged).</p><p>Implementação está começando. Estonia digitalizou identidade cidadão. China usa credenciais sociais (diferente mas similar). Comunidade blockchain trabalha em padrões para credenciais verificáveis. Próxima década vai ver adoção massiva de identidade descentralizada.</p>`,cards:[{q:'Como identidade descentralizada muda acesso a serviços financeiros?',a:'Permite que pessoas sem documentação oficial acessem serviços financeiros globais baseado em credenciais verificáveis na blockchain.'}]},
  {id:9,name:'Implementando Web3: Começando Sua Jornada',dur:'15 min',content:`<h3>Primeiros Passos em Web3: Guia Prático</h3><p>Blockchain e Web3 parecem intimidadores. Mas começar é mais simples que você imagina. Vamos guiar você através de primeiros passos reais.</p><p>Passo 1: Escolha e Wallet. Você precisa de carteira digital para armazenar criptomoedas. MetaMask é mais popular (extensão de navegador). Baixe, crie wallet, anote suas 12 palavras de recuperação (NUNCA compartilhe), configure senha forte. Você agora tem identidade blockchain.</p><p>Passo 2: Obtenha Criptomoeda. Você precisa de alguma criptomoeda para pagar transações. Compre Bitcoin ou Ethereum em exchange (Binance, Coinbase, FTX em seu país). Transfira para seu MetaMask. Você agora é dono de valor digital.</p><p>Passo 3: Explore DeFi. Visite Uniswap.org. Conecte seu MetaMask. Você verá interface para trocar tokens. Experimente trocar pequena quantia de USDC por DAI. Você completou sua primeira transação DeFi sem intermediário. Parabéns, você é DeFi user.</p><p>Passo 4: Aprenda Smart Contracts. Se tem conhecimento de programação, visite Remix.ethereum.org. Escreva simples smart contract em Solidity (semelhante a JavaScript). Compile e deplay em rede de teste (Sepolia). Veja seu contrato vivendo na blockchain. É momento wow.</p><p>Passo 5: Minhe um NFT. Visite OpenSea.io. Conecte MetaMask. Explore diferentes coleções. Compre um NFT interessante (comece com barato para aprender). Você agora possui arte digital verificada na blockchain. É meio loucura, meio interessante.</p><p>Passo 6: Aprofunde Conforme Interessa. Se DeFi fascina, aprenda Aave, Compound, Curve. Se Web3 negócios fascina, aprenda DAOs (Decentralized Autonomous Organizations) que permitem governo descentralizado. Se smart contracts fascina, aprenda Solidity profundamente. Comunidade é receptiva a aprendizes.</p><p>Recursos: CryptoZombies.io ensina Solidity de forma divertida. Ethereum.org tem documentação completa. Reddit r/defi e r/ethereum são comunidades amigáveis. YouTube tem tutoriais infinitos. Comece pequeno, aprenda iterativamente, nunca invista mais do que pode perder (volatilidade é extrema).</p><p>Cuidado: Web3 é ainda Wild West. Scams são abundantes. Nunca compartilhe chave privada com ninguém. Verificue URLs (site fake pode parecer real). Não FOMO (Fear Of Missing Out) em investimento de risco. Se parece bom demais ser verdade, é. Comunidade é amigável, mas inimigos são agressivos. Vigilância é necessária.</p>`,cards:[{q:'Qual é o primeiro e mais crítico componente de Web3 que você precisa?',a:'Uma carteira digital (como MetaMask) que armazena sua chave privada e permite interagir com aplicações blockchain descentralizadas.'}]}
];
