      <h3>Hashes Criptográficos Explicados</h3>

      <h3>Casos de Uso Práticos de SSI</h3>
      <h4>1. Refugiados e Deslocados</h4>
      <p>Pessoa é refugiada em novo país. Perdeu documentos (ou governo destruiu). Consegue registrar identidade em blockchain. Prova quem é sem papel. Consegue trabalho, abre conta bancária, aluga casa. Anteriormente impossível.</p>

      <h3>Governança Descentralizada (DAOs)</h3>
      <p>Como uma organização funciona sem CEO? Via DAO.</p>

      <h4>Estrutura Típica de DAO</h4>
      <p>(1) <strong>Tokenomics:</strong> Organização emite token governança. Token holders votam em decisões. (2) <strong>Proposta:</strong> Alguém propõe mudança (contratar pessoa, alocar budget, mudar regra). (3) <strong>Discussão:</strong> Comunidade discute em forum/Discord. (4) <strong>Votação:</strong> Token holders votam. Maioria decide. (5) <strong>Execução:</strong> Smart contract executa decisão automaticamente (transfere fundos, muda parâmetros, etc).</p>

      <h4>Exemplos de DAOs</h4>
      <p><strong>Uniswap DAO:</strong> Governa protocolo Uniswap (exchange descentralizado). Holders de UNI votam em mudanças. <strong>Maker DAO:</strong> Governa protocolo Maker (stablecoin). MKR holders votam em parâmetros de risco. <strong>Loot DAO:</strong> DAO de investimento imobiliário. Token holders votam em que propriedade comprar. Ganhos são distribuídos proporcionalmente.</p>

      <h3>Desafios de DAOs em 2026</h3>
