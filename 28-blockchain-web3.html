<h3>Blockchain: Uma Nova Forma de Confiar</h3>
<p>Blockchain é uma ledger (registro) distribuída, imutável e descentralizada. Sem banco central, sem intermediário. Apenas matemática, criptografia e consenso. Revolucionário.</p>

<h4>O Problema que Blockchain Resolve</h4>
<p>Historicamente, confiar exigiu terceiros:</p>
<ul>
<li><strong>Enviar dinheiro:</strong> Precisa de banco (taxa, espera, intermediário)</li>
<li><strong>Contratar:</strong> Precisa advogado (caro, lento)</li>
<li><strong>Autenticar:</strong> Precisa de cartório (ineficiente)</li>
<li><strong>Propriedade:</strong> Precisa de registro (centralizado, sujeito a falha)</li>
</ul>

<p>Blockchain permite confiança sem terceiros. Código é lei, matemática não mente.</p>

<h4>Os 4 Pilares do Blockchain</h4>
<p><strong>1. Descentralização:</strong> Não há servidor central. Milhares de nós mantêm cópia idêntica.</p>
<blockquote class="example">
<strong>Bitcoin:</strong> ~45.000 nós executando código Bitcoin, cada um verifica cada transação
<br><strong>Ethereum:</strong> ~11.000 nós, rede ainda mais distribuída que Bitcoin
<br><strong>Impacto:</strong> Ninguém pode "desligar" a rede, ninguém controla sozinho
</blockquote>

<p><strong>2. Imutabilidade:</strong> Uma vez registrado, é impossível mudar. Requer reescrita de histórico inteiro + consenso 51% da rede.</p>

<p><strong>3. Transparência:</strong> Todas as transações são visíveis publicamente (exceto identidade). Qualquer um pode auditar.</p>

<p><strong>4. Segurança Criptográfica:</strong> Hash SHA-256 garante que qualquer mudança invalida tudo depois. Uma letra muda → hash completamente diferente.</p>

<h4>Jargão Essencial</h4>
<ul>
<li><strong>Blockchain:</strong> Corrente de blocos conectados criptograficamente</li>
<li><strong>Bloco:</strong> Contém transações, timestamp, hash do bloco anterior</li>
<li><strong>Hash:</strong> Impressão digital de dados (SHA-256)</li>
<li><strong>Nó:</strong> Computador que executa software blockchain</li>
<li><strong>Mineração/Validação:</strong> Computar poder para confirmar transações</li>
<li><strong>Consenso:</strong> Mecanismo para nós concordarem (Proof of Work, Proof of Stake)</li>
</ul>

<h3>Carteiras: Seu Banco Pessoal</h3>
<p>Carteira Ethereum é sua identidade Web3. Quem tem chave privada, tem seu dinheiro e ativos. Segurança é crítica. Um erro = perda permanente.</p>

<h4>Tipos de Carteira</h4>
<p><strong>1. Hot Wallet (Conectada à Internet)</strong></p>
<ul>
<li>MetaMask, Phantom, Trust Wallet</li>

<strong>🔌 MetaMask Workflow:</strong>
<br>

<br>2. Criar carteira (ou importar existente via seed)
<br>3. Conectar a dApps (Uniswap, Aave, etc)
<br>4. Assinar transações manualmente (segurança)
<br>
<br>Risco: malware no PC rouba extensão
</blockquote>

<p><strong>2. Cold Wallet (Offline)</strong></p>
<ul>
<li>Hardware wallet: Ledger, Trezor</li>
<li>Chave privada nunca toca internet</li>
<li>Assinar é feito fisicamente (botão)</li>
<li>Ideal para: holdings grandes, longo prazo</li>

<blockquote class="tip">
<strong>🔒 Hardware Wallet Segurança:</strong>
<br>
<br>Você tem 10 ETH = $25k

<br>Mesmo se PC é hacked, $25k está seguro
<br>
<br>Para cada transação:
<br>1. Conectar Ledger ao PC
<br>2. Confirmar endereço e valor no visor Ledger
<br>3. Apertar botão (assinar)
<br>4. Desconectar
<br>
<br>Hacker não consegue roubar sem o dispositivo físico.

<p><strong>3. Self-Custodial vs Custodial</strong></p>
<ul>

<li><strong>Custodial:</strong> Exchange controla chaves (Binance, Coinbase, Kraken)</li>

<h3>Solidity: Programando o Futuro Descentralizado</h3>
<p>Smart contracts são código imutável executado em blockchain. Vamos aprender Solidity e criar nosso primeiro contrato.</p>

<h4>Setup: Ferramentas Mínimas</h4>
<ul>
<li><strong>Remix IDE:</strong> https://remix.ethereum.org (zero instalação)</li>
<li><strong>MetaMask:</strong> Carteira no navegador para testar</li>
<li><strong>Testnet (Sepolia):</strong> Ethereum de teste, ETH gratuito em faucet</li>
<li><strong>Etherscan:</strong> Blockchain explorer para verificar transações</li>
</ul>

<h4>Contrato Simples: Token ERC-20</h4>
<blockquote class="example">
<strong>💻 Seu Primeiro Token:</strong>
<br>
<br><code>pragma solidity ^0.8.0;
<br>
<br>contract MyToken {
<br>  string public name = "My Token";
<br>  string public symbol = "MTK";
<br>  uint public totalSupply = 1000000;
<br>
<br>  mapping(address => uint) public balances;
<br>
<br>  constructor() {
<br>    balances[msg.sender] = totalSupply;
<br>  }
<br>
<br>  function transfer(address to, uint amount) public {
<br>    require(balances[msg.sender] >= amount, "Saldo insuficiente");
<br>    balances[msg.sender] -= amount;
<br>    balances[to] += amount;
<br>  }
<br>}</code>
<br>
<br>Isso é token funcional! Pode transferir, verificar saldo, tudo descentralizado.
</blockquote>

<h4>Conceitos-Chave Solidity</h4>
<ul>
<li><strong>mapping:</strong> Dicionário (address → saldo)</li>
<li><strong>require:</strong> Validação (se falsa, revert transação)</li>
<li><strong>msg.sender:</strong> Quem chamou a função</li>
<li><strong>public/private:</strong> Visibilidade (quem pode chamar)</li>
<li><strong>view:</strong> Apenas lê, não muda estado (sem gas)</li>
<li><strong>pure:</strong> Não acessa estado, apenas computa</li>
</ul>

<h4>Gas Optimization</h4>
<p>Gas caro = menos usuários usam seu contrato. Otimização é crítica.</p>
<blockquote class="tip">
<strong>⛽ Técnicas de Economia:</strong>
<br>
<br>❌ Loop sobre array grande (O(n) gas)
<br>✅ Usar mapping (O(1) gas)
<br>
<br>❌ Variáveis string longas
<br>✅ Usar bytes32 para dados pequenos
<br>
<br>❌ Múltiplas transações
<br>✅ Batch em uma transação (economiza overhead)
<br>
<br>Um contrato bem otimizado economiza 50-90% em gas.
</blockquote>

</blockquote>

</blockquote>
