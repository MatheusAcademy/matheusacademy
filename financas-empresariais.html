        dur: '12 min',
        content: '<h3>Fluxo de Caixa: O Coração Financeiro da Empresa</h3><p>Lucro e fluxo de caixa não são a mesma coisa. Uma empresa pode ser super lucrativa no papel e quebrar porque não tem dinheiro para pagar contas. <strong>Fluxo de caixa</strong> é movimento real de dinheiro dentro e fora da empresa. Se você vende para um cliente e ele promete pagar em 90 dias, você tem uma receita (lucro), mas não tem caixa. Se você espera muito tempo para receber, pode ficar sem dinheiro para pagar funcionários agora. Muitos negócios quebram por má gestão de caixa, não por falta de lucro.</p><p><strong>Entradas de caixa</strong> incluem: vendas à vista, recebimento de vendas a prazo, empréstimos, investimentos de sócios, venda de ativos. <strong>Saídas de caixa</strong> incluem: pagamento de fornecedores, folha de pagamento, aluguel, impostos, empréstimos a pagar, compra de equipamentos. O fluxo líquido é a diferença. Se positivo, empresa tem mais dinheiro. Se negativo, está queimando caixa.</p><blockquote class="tip">💡 <em>Dica: fluxo de caixa projetado é ferramenta de planejamento crítica. Muitos empreendedores falham porque não planejam quando vão ter caixa ou falta de caixa.</em></blockquote><h4>Ciclo Operacional e Ciclo de Caixa</h4><p><strong>Ciclo operacional</strong> é tempo entre comprar matéria-prima até receber pelo produto vendido. Suponha empresa de manufatura: compra matéria-prima (dia 0), produz (5 dias), vende (dia 10), recebe pagamento (dia 40). Ciclo operacional é 40 dias. Durante esses 40 dias, empresa tem dinheiro "preso" em inventário e contas a receber.</p><p><strong>Ciclo de caixa</strong> é ciclo operacional menos o tempo de pagamento a fornecedor. Se empresa paga fornecedor em 30 dias, ciclo de caixa é 40 - 30 = 10 dias. Nesses 10 dias, empresa precisa ter caixa disponível. Se pagar fornecedor antes de receber cliente, ciclo é negativo, o que é ótimo (empresa financia operações com dinheiro de outros). Se receber depois de pagar, ciclo é positivo, requer capital de giro.</p><blockquote class="example">📌 <em>Exemplo: Walmart tem ciclo de caixa negativo (~-10 dias). Vende rápido (dias 0-2), recebe à vista. Paga fornecedor em 30+ dias. Walmart fica com dinheiro do cliente 28+ dias antes de pagar fornecedor. Usa esse dinheiro para financiar operações. Empresa pequena pode ter ciclo positivo de 60 dias, precisando de capital de giro significativo.</em></blockquote><h4>Capital de Giro</h4><p><strong>Capital de giro</strong> é dinheiro necessário para financiar operações do dia a dia: inventário, contas a receber, contas a pagar. Fórmula: Capital de Giro = Ativo Circulante - Passivo Circulante. Se empresa tem R$ 500.000 em inventário + R$ 300.000 em contas a receber, mas só deve R$ 200.000 a fornecedores, precisa de R$ 600.000 em capital de giro (dinheiro preso em operações).</p><p>Capital de giro cresce quando empresa cresce. Se dobrar vendas, tipicamente dobra inventário e contas a receber. Se não tiver dinheiro extra, pode entrar em crise de caixa. Crescimento rápido sem capital de giro é perigoso. Muitas startups crescem demais rápido, ficam sem caixa, precisam de investimento urgente ou quebram.</p><p>Gerenciar capital de giro é arte: reduzir ciclo operacional (vender mais rápido), estender pagamento a fornecedor (negociar prazos maiores), cobrar clientes mais rápido (oferecer desconto para pagamento à vista). Tudo ajuda. Algumas empresas usam <strong>factoring</strong> (vender suas contas a receber a desconto para levantar caixa rápido) ou <strong>supply chain financing</strong> (fornecedor financia comprador).</p><blockquote class="news">📰 <em>Notícia: durante pandemia, muitas PMEs enfrentaram crise de caixa porque clientes atrasaram pagamentos e fornecedores cobram rápido. Programas de crédito emergencial foram críticos para evitar falências em cascata.</em></blockquote>',

        content: '<h3>Demonstrações Financeiras: Balanço, DRE e Fluxo de Caixa</h3><p>Demonstrações financeiras são relatórios que resumem saúde econômica de empresa. Existem três principais: (1) <strong>Balanço Patrimonial</strong> mostra o que empresa tem e deve em um ponto no tempo, (2) <strong>Demonstração do Resultado do Exercício (DRE)</strong> mostra receita, custos, lucro durante período, (3) <strong>Demonstração de Fluxo de Caixa</strong> mostra movimentação de dinheiro. Juntas, contam história completa.</p><p><strong>Balanço Patrimonial</strong> segue equação: Ativo = Passivo + Patrimônio Líquido. Ativo é tudo que empresa possui (dinheiro, máquinas, estoques, prédios, marcas). Passivo é tudo que empresa deve (empréstimos, contas a pagar, salários a pagar). Patrimônio Líquido é diferença (capital dos sócios + lucro retido - prejuízos). Se empresa vale R$ 1 bilhão em ativos mas deve R$ 900 milhões, patrimônio é R$ 100 milhões.</p><blockquote class="tip">💡 <em>Dica: balanço é como foto. DRE é como filme. Fluxo de caixa é o dinheiro real que você coloca no bolso.</em></blockquote><h4>Análise de Balanço</h4><p>Analistas olham proporções: (1) <strong>Ativo Circulante / Passivo Circulante (Índice de Liquidez Corrente)</strong>: se for maior que 1, empresa tem mais caixa/ativos líquidos que débitos próximos. Se menor que 1, pode ter problemas para pagar contas em 12 meses. Ideal é 1.5-2.0. (2) <strong>Dívida Total / Patrimônio</strong>: mede alavancagem. Se for 0, empresa não deve nada (conservadora). Se for 3, empresa tem 3x mais dívida que capital próprio (alavancada, mais risco).</p><p>(3) <strong>Ativo Fixo / Ativo Total</strong>: indica natureza do negócio. Fabricante tem alto ativo fixo (máquinas, fábricas). Empresa de software tem baixo. (4) <strong>Estoque / Ativo Circulante</strong>: mede quanto capital está preso em estoque. Retail tem alto. SaaS tem baixo.</p><p><strong>DRE</strong> começa com Receita (vendas), subtrai Custos de Bens Vendidos (COGS), obtendo Lucro Bruto. Lucro Bruto / Receita é Margem Bruta. Se vende R$ 1 bilhão e COGS é R$ 600 milhões, margem bruta é 40%. Depois subtrai Despesas Operacionais (folha, aluguel, marketing), obtendo Lucro Operacional. Depois subtrai Juros (custo de dívida), obtendo Lucro antes de Imposto. Depois subtrai Impostos, obtendo Lucro Líquido.</p><h4>Índices de Rentabilidade</h4><p><strong>ROE (Return on Equity)</strong> = Lucro Líquido / Patrimônio Líquido. Mede retorno sobre capital de sócios. Se sócios investem R$ 100 milhões e empresa ganha R$ 10 milhões ao ano, ROE é 10%. Investidores esperam ROE de 15%+ em empresas. Se for 5%, estão ganhando pouco (poderiam colocar em renda fixa). <strong>ROA (Return on Assets)</strong> = Lucro / Ativo Total. Mede eficiência de usar ativos para gerar lucro.</p><p><strong>EBITDA</strong> (Earnings Before Interest, Taxes, Depreciation, Amortization) = Lucro Operacional + Depreciação + Amortização. É lucro "operacional puro" sem custos financeiros e contábeis. Usado para comparar empresas em setores diferentes porque remove impacto de estrutura de capital e política fiscal.</p><blockquote class="example">📌 <em>Exemplo: Empresa A tem ROE 15%, lucro líquido R$ 100M, patrimônio R$ 667M. Empresa B tem ROE 10%, lucro R$ 100M, patrimônio R$ 1B. Ambas ganham igual, mas A usa menos capital = mais eficiente. Investidores pagam prêmio por A.</em></blockquote>',

        content: '<h3>Custos, Despesas e Estrutura de Custos Empresarial</h3><p>Entender custos é fundamental para lucro. Uma empresa que não sabe seus custos não sabe sua rentabilidade. <strong>Custos</strong> são gastos diretos para produzir bem ou serviço. Para fábrica, é matéria-prima e mão de obra direta. Para restaurante, é comida e chef. <strong>Despesas</strong> são gastos indiretos para rodar negócio: aluguel, marketing, folha administrativa, utilities.</p><p><strong>Custos Fixos</strong> não variam com volume de produção. Aluguel de fábrica é R$ 100.000/mês independente de produzir 1.000 ou 100.000 unidades. Salário do gerente é fixo. <strong>Custos Variáveis</strong> variam com volume. Matéria-prima para produzir 1.000 unidades custa menos que 100.000 unidades. Combustível para transportar aumenta com volume.</p><blockquote class="tip">💡 <em>Dica: empresa com alto custo fixo precisa produzir muito para diluir custo por unidade. Mínimo de volume é crítico.</em></blockquote><h4>Análise de Ponto de Equilíbrio</h4><p><strong>Ponto de equilíbrio (break-even)</strong> é volume de vendas onde receita iguala custos totais (fixos + variáveis). Abaixo desse ponto, empresa tem prejuízo. Acima, tem lucro. Fórmula: Break-even = Custos Fixos / (Preço - Custo Variável Unitário). Se custo fixo é R$ 100.000/mês, preço é R$ 100, e custo variável é R$ 60, margem é R$ 40. Break-even = 100.000 / 40 = 2.500 unidades/mês. Até vender 2.500, tem prejuízo. Depois tem lucro.</p><p>Empresas novatas devem calcular break-even antes de começar. Se precisam vender 50.000 unidades/mês para lucrar, mas mercado potencial é 10.000, negócio não é viável. Se conseguem vender break-even em 1 mês, ótimo. Se precisam de 2 anos, precisam de capital inicial enorme para sobreviver.</p><h4>Margem de Contribuição e Análise ABC</h4><p><strong>Margem de Contribuição</strong> = Preço de Venda - Custos Variáveis. É quanto cada venda contribui para cobrir custos fixos e gerar lucro. Se vende a R$ 100 com custo variável R$ 60, margem é R$ 40. Com R$ 100.000 de custos fixos, precisa vender 2.500 unidades para cobrir. Margem em percentual (margem de contribuição / preço) é útil para comparação. 40% margem é mais saudável que 10%.</p><p><strong>Análise ABC</strong> classifica produtos/clientes por importância: A (20% de clientes geram 80% de receita), B (próximos 30% geram 15%), C (últimos 50% geram 5%). Foco deve ser em clientes A: servir bem, manter relacionamento, cobrar taxa pela customização. Clientes C às vezes não são rentáveis depois de custos operacionais. Empresa pode deixá-los de lado ou aumentar preço.</p><blockquote class="example">📌 <em>Exemplo: Consultoria tem 100 clientes. Top 10 clientes (A) geram R$ 5 milhões. Próximos 30 clientes (B) geram R$ 1 milhão. Últimos 60 clientes (C) geram R$ 500.000. Consultoria deve focar em manter clientes A happy, espaço em clientes B, e aumentar preço ou descartar clientes C não rentáveis.</em></blockquote><h4>Orçamento e Controle de Custos</h4><p><strong>Orçamento</strong> é plano financeiro para período (mês, trimestre, ano). Estima receita esperada e aloca custos. Compare orçado vs real para identificar desvios. Se estimou R$ 500.000 em custos e gastou R$ 550.000, por quê? Matéria-prima subiu? Ineficiência? Escopo mudou? Entender desvios ajuda a corrigir.</p><p>Controle de custos contínuo é importante. Semanalm ente, revisar custos principais. Mensalmente, revisar orçamento vs real. Anualmente, fazer orçamento para próximo ano. Empresas que não controlam custos deixam gordura crescer: gastos inúteis, desperdícios, ineficiências. Controle apertado mantém margem saudável.</p><blockquote class="news">📰 <em>Notícia: em 2024, muitas startups enfrentam pressão para atingir rentabilidade. Aquelas que controlam custos agressivamente (cortar gastos desnecessários, otimizar operações) conseguem lucrar com receita menor.</em></blockquote>',

        name: 'Estratégias de Precificação e Elasticidade de Demanda',
        dur: '15 min',
        content: '<h3>Estratégias de Precificação e Elasticidade de Demanda</h3><p>Preço é a variável mais poderosa em negócio. Aumentar preço 10% pode aumentar lucro 50% se elasticidade é baixa. Diminuir preço 10% pode destruir margem sem aumentar volume. Precificar bem é ciência e arte que separa negócios mediocres de altamente lucrativos.</p><p><strong>Precificação por Custo Plus (Cost-Plus)</strong> é simples: calcule custo total, adicione margem desejada. Se custo é R$ 100 e quer margem de 30%, preço é R$ 130. Problema: ignora demanda e competição. Pode sobreapreçar (cliente não paga) ou subapreçar (deixa dinheiro na mesa). Mas é útil como baseline.</p><p><strong>Precificação por Valor</strong> não olha custo, olha valor que cliente percebe em produto. Um remédio que custa R$ 1 para produzir mas salva vida do cliente pode ser precificado em R$ 100. Software de análise de dados que custa R$ 10.000 em desenvolvimento pode ser precificado em R$ 100.000/ano se gera R$ 1 milhão em valor para cliente. Cliente compra se ROI é positivo, não se preço é alto.</p><blockquote class="tip">💡 <em>Dica: valor percebido é tudo. Cobrar pela margem de ganho do cliente (capturar fração do valor criado) geralmente funciona bem.</em></blockquote><h4>Elasticidade de Preço na Prática</h4><p>Produtos com <strong>demanda elástica</strong> (sensível a preço) requerem preços baixos e competitivos. Exemplos: passagens aéreas, hotéis, commodities, produtos genéricos. Se aumentar preço, perde muitos clientes para concorrente. Estratégia: volume alto, margem baixa. Walmart vende com margem ~3% mas volume enorme = lucro substancial.</p><p>Produtos com <strong>demanda inelástica</strong> (insensível a preço) permitem preços altos. Exemplos: medicamentos para doença rara, patentes, luxo, marcas fortes, ferramentas profissionais (cirurgião não econômico em bisturi). Estratégia: volume baixo, margem alta. Marca de luxo vende 10.000 bolsas a R$ 50.000 (margem 80%) em vez de 1 milhão a R$ 5.000 (margem 30%).</p><p><strong>Discriminação de Preço</strong> é cobrar diferentes preços de diferentes clientes para mesmo produto. Exemplos: desconto para volume (compre 100, pague menos por unidade), desconto por segmento (estudante paga menos que executivo), desconto temporal (happy hour, Black Friday), bundling (pacote A + B por preço menor que comprá-los separado). Tudo é discriminação legal que aumenta receita.</p><blockquote class="example">📌 <em>Exemplo: Disney cobra diferentes preços dependendo de dia (fim de semana mais caro) e temporada (férias muito mais caro). Mesmo parque, mesmos rides, diferentes preços. Captura mais valor de clientes dispostos a pagar mais. Econômico racional: iria em dia menos movimentado pagaria menos.</em></blockquote><h4>Psicologia de Preço</h4><p><strong>Preço psicológico</strong> usa números específicos porque afetam percepção. R$ 9.99 parece muito mais barato que R$ 10. R$ 999 parece barganha perto de R$ 1.000. Muitas lojas usam isso. Também importa: não mudar preço frequentemente (cria desconfiança), ter "preço originalmente X, agora Y" (cria percepção de desconto), sinalizar que preço é justo ("nosso preço mais baixo deste ano").</p><p><strong>Âncora de preço</strong> é referência que cliente usa para julgar se preço é bom. Se restaurante mostra preço de prato no concorrente como R$ 50 e oferece o seu por R$ 45, cliente sente desconto mesmo que custo de ambos seja R$ 20. Preço anterior funciona como âncora. Varejo usa isso constantemente.</p><p>Análise de concorrência é importante. Se competidor principal cobra R$ 100, você cobra R$ 105, pode ser visto como premium (se tem diferenciação legítima). Cobrar R$ 200 é arriscado (clientes desertam). Cobrar R$ 95 é race to bottom (margem desaba). Posicionamento relativo a concorrência afeta percepção de valor.</p><blockquote class="news">📰 <em>Notícia: em 2024, muitas empresas de streaming ajustam preços ou criam tiers (básico, premium, premium sem ads) para capturar diferentes segmentos de clientes e aumentar receita média por usuário.</em></blockquote>',

        content: '<h3>ROI, Lucratividade por Produto e Decisões de Mix de Produtos</h3><p>Nem todos os produtos são igualmente lucrativos. Uma empresa pode estar perdendo dinheiro em 50% do portfólio sem saber. Analisar rentabilidade por produto ajuda a focar em vencedores e eliminar perdedores. <strong>ROI (Return on Investment)</strong> é métrica crítica. ROI = (Ganho - Investimento) / Investimento. Se investiu R$ 1 milhão para lançar produto e ganhou R$ 300.000 em lucro, ROI é 30%.</p><p>Toda decisão de investimento tem ROI implícito. Investir em marketing para crescer receita 20% com investimento de R$ 100.000 tem ROI 20% (0.2 x R$ 100.000 = R$ 20.000 em ganho incremental). Investir em automação que reduz custos em R$ 50.000 com investimento de R$ 200.000 tem ROI 25%. Empresa deve fazer projetos com ROI alto primeiro (acima de custo de capital, que é 8-12% para maioria).</p><blockquote class="tip">💡 <em>Dica: sempre calcule ROI antes de aprovar gastos maiores. Evita desperdício em projetos que parecem bons mas não geram retorno.</em></blockquote><h4>Análise de Lucratividade por Produto</h4><p>Supor empresa vende 3 produtos: A, B, C. Revenue anual: A R$ 5M, B R$ 3M, C R$ 2M (total R$ 10M). À primeira vista, A é maior. Mas analisar profundidade:</p><p>Produto A: R$ 5M em receita, R$ 3M em COGS (60% custo), R$ 1.2M em despesa alocada (publicidade, vendas, suporte específico). Lucro: R$ 0.8M. Rentabilidade: 16%.</p><p>Produto B: R$ 3M em receita, R$ 1.2M em COGS (40% custo), R$ 0.6M em despesa alocada. Lucro: R$ 1.2M. Rentabilidade: 40%.</p><p>Produto C: R$ 2M em receita, R$ 1.8M em COGS (90% custo), R$ 0.3M em despesa alocada. Lucro: -R$ 0.1M (prejuízo!).</p><p>Ranking por lucro: B (R$ 1.2M) > A (R$ 0.8M) > C (perdendo R$ 0.1M). Empresa deveria aumentar alocação a B, manter A controlado, cortar ou redesenhar C. Muitos gestores não fazem essa análise e continuam investindo em produtos perdedores porque são "históricos" ou "complementam portfólio".</p><blockquote class="example">📌 <em>Exemplo: Ford descobriu que seu modelo Mustang era muito mais lucrativo que esperava. Focou nele, transformou em carro ícone. General Motors descobriu que pequenos carros perdiam dinheiro. Focou em SUVs e trucks (mais lucrativos). Essas decisões de mix de produtos separaram vencedores de perdedores.</em></blockquote><h4>Decisões de Discontinuidade</h4><p>Quando um produto é persistentemente não rentável, decisão é: (1) cortar completamente, (2) redesenhar para ser rentável, (3) manter como "perda líder" (atrai cliente que depois compra produtos lucrativos). Maioria deve ser (1): cortar. Alguns pode ser (2): investir para melhorar. Nenhum deve ser (3) indefinidamente.</p><p>Cortar produto assusta porque: (1) reduz receita total (psicologicamente ruim), (2) desemprega pessoas se foi manufaturado internamente, (3) alguns clientes podem se sentir traídos. Mas manter produto não rentável está queimando dinheiro. Capital deveria ir para produtos vencedores. Decisão correta frequentemente é impopular mas necessária.</p><p><strong>Portfolio estratégico</strong> balanceia: (1) <strong>Estrelas</strong> (alto crescimento, alta margem) = investir agressivamente, (2) <strong>Vacas Leiteiras</strong> (baixo crescimento, alta margem) = coletar caixa, (3) <strong>Crianças Problema</strong> (alto crescimento, baixa margem) = investir condicionalmente, (4) <strong>Cães</strong> (baixo crescimento, baixa margem) = cortar ou vender. Portfólio saudável tem mistura de todos, mas foco está em Estrelas.</p><blockquote class="news">📰 <em>Notícia: em 2024, Apple descontinua linhas de produtos inteiras (Watch Series regulares, AirPods específicas) para focar em modelos premium com margem melhor.</em></blockquote>',
        cards: [
          { q: 'O que é ROI e qual é o critério mínimo para aprovar projeto?', a: 'ROI = (Ganho - Investimento) / Investimento. Projeto deve ter ROI acima do custo de capital da empresa (tipicamente 8-12%) para ser atrativo.' },

        name: 'Alavancagem Financeira e Estrutura de Capital',
        dur: '15 min',
        content: '<h3>Alavancagem Financeira e Estrutura de Capital</h3><p>Alavancagem financeira é usar dívida para amplificar retorno para sócios. Se sócio investe R$ 1 milhão e empresa ganha R$ 100.000 ao ano, ROE é 10%. Mas se sócio investe R$ 500.000 e pega R$ 500.000 emprestado a 5% de juros (R$ 25.000 ao ano), lucro é R$ 100.000 - R$ 25.000 = R$ 75.000, ROE é 75.000 / 500.000 = 15%. Alavancagem amplificou retorno.</p><p>Mas alavancagem é faca de dois gumes. Se negócio vai mal e lucra R$ 50.000, juros são ainda R$ 25.000, lucro líquido é R$ 25.000, ROE é apenas 5% (pior que sem dívida!). Pior ainda, se negócio perde R$ 50.000 e tem dívida de R$ 500.000, sócio tem prejuízo massivo. Dívida não desaparece em maus tempos.</p><blockquote class="tip">💡 <em>Dica: alavancagem funciona bem quando retorno do negócio > custo de dívida. Mas amplifica risco. Empresa alavancada pode quebrar em recessão.</em></blockquote><h4>Razão Dívida-Patrimônio</h4><p><strong>Debt-to-Equity Ratio</strong> = Dívida Total / Patrimônio Líquido. Empresa conservadora tem razão 0.5 (R$ 50 em dívida para R$ 100 em patrimônio). Empresa alavancada tem razão 3 (R$ 300 em dívida para R$ 100 em patrimônio). Razão maior que 3 é perigosa para maioria (quebra fácil em crise). Razão menor que 1 é conservadora mas deixa oportunidades de alavancagem no chão.</p><p>Razão ótima depende de: (1) <strong>tipo de indústria</strong> (utilidade pública = segura, pode ser 3+; startup = arriscada, deve ser <1), (2) <strong>ciclo econômico</strong> (em expansão, pode alavancar; em contração, deve desalavancar), (3) <strong>estabilidade de fluxo de caixa</strong> (fluxo estável pode suportar mais dívida; volátil deve evitar).</p><h4>Custo de Capital e WACC</h4><p><strong>WACC (Weighted Average Cost of Capital)</strong> = custo médio ponderado de capital da empresa, combinando custo de dívida e custo de patrimônio. Se empresa financia 60% com dívida a 5% custo e 40% com patrimônio a 12% custo, WACC é (0.6 x 5%) + (0.4 x 12%) = 3% + 4.8% = 7.8%. Qualquer investimento com retorno > 7.8% aumenta valor de empresa.</p><p>Custo de dívida é determinado por taxa de juros (banco cobra 5%). Custo de patrimônio é determinado por risco do negócio e retorno esperado por investidores (se negócio é arriscado, esperam 15%+; se seguro, esperam 8%). Mais dívida reduz WACC (dívida é mais barata porque é prioritária em falência), mas aumenta risco de quebra.</p><h4>Estrutura Ótima de Capital</h4><p>Existe uma estrutura ótima que minimiza WACC e maximiza valor da empresa. Baixa dívida = baixo custo mas WACC alto (patrimônio caro é peso). Alta dívida = baixo WACC mas risco de quebra explode. Ponto ótimo é frequentemente razão dívida-patrimônio de 1-2 em empresas estáveis.</p><p>Exemplo: Empresa A (100% patrimônio) tem WACC 10%. Empresa B (30% dívida, 70% patrimônio) tem WACC 8.5% (melhor). Empresa C (60% dívida, 40% patrimônio) tem WACC 8% (ainda melhor). Mas Empresa D (80% dívida, 20% patrimônio) tem WACC 9% porque risco de quebra sobe custo de patrimônio. B ou C é ótimo.</p><blockquote class="example">📌 <em>Exemplo: Embraer (empresa aérea brasileira) mantém dívida controlada porque falência é desastre (perde aeronaves). Fintech pode ter dívida maior porque não tem ativos físicos colateralizáveis e pode pivotar rapidamente se precisar. Estrutura varia com modelo de negócio.</em></blockquote><blockquote class="news">📰 <em>Notícia: em 2024, empresas de tech reduzem alavancagem após anos de dívida barata. Com juros mais altos, custo de dívida subiu, tornando estruturas mais conservadoras ótimas.</em></blockquote>',

          { q: 'O que é Debt-to-Equity ratio e qual é range saudável?', a: 'Dívida / Patrimônio. Range saudável é 0.5-2 dependendo de industria. Acima de 3 é perigoso, abaixo de 0.5 deixa oportunidades de retorno no chão.' },
          { q: 'Defina WACC e por que é importante para decisões de investimento', a: 'WACC = custo médio de capital (dívida + patrimônio ponderados). Qualquer investimento com retorno > WACC aumenta valor da empresa.' }

        name: 'Orçamento, Projeções e Planejamento Estratégico',
        dur: '14 min',
        content: '<h3>Orçamento, Projeções e Planejamento Estratégico</h3><p>Planejamento financeiro não é adivinhação; é extensão de estratégia empresarial traduzida em números. Empresa define estratégia (crescer, consolidar, penetrar mercado novo), traduz em metas de receita/lucro, aloca recursos, monitora progresso. Sem planejamento, empresa erra gastos, não cresce proporcional ao potencial, perde controle.</p><p><strong>Orçamento Operacional</strong> estima receita esperada e aloca custos para período (tipicamente 1 ano, dividido em trimestres/meses). Começa com projeção de vendas: quantas unidades espera vender, a qual preço? Depois aloca custos de produção, despesas operacionais (folha, aluguel, marketing), juros de dívida, impostos. Resultado é lucro esperado. Compara com meta (10% ROE, R$ 50M em lucro, 15% crescimento).</p><blockquote class="tip">💡 <em>Dica: orçamento deve ser desafiador mas alcançável. Muito fácil = não motiva. Muito difícil = desmoraliza time que nunca atinge.</em></blockquote><h4>Previsão Financeira de Múltiplos Cenários</h4><p>Realidade é incerta. Não se sabe se economia vai bem, se concorrente ataca, se fornecedor tem problema. Por isso, fazer 3 cenários: (1) <strong>Otimista</strong> (tudo dá certo, crescimento 30%), (2) <strong>Base case</strong> (espera-se: crescimento 10%), (3) <strong>Pessimista</strong> (recessão, concorrência: crescimento -5%). Para cada, estimar receita, custos, lucro, fluxo de caixa. Identificar qual receita/lucro é preciso atingir para quebrar ou ganhar mínimo aceitável.</p><p>Análise de sensibilidade responde: se receita cair 20% (em vez de crescer 10%), qual é impacto em lucro? Se custo de matéria-prima sobe 15%, qual é impacto? Se taxa de juros sobe 1%? Essas análises ajudam a identificar riscos críticos e desenvolver planos de contingência.</p><h4>Fluxo de Caixa Projetado</h4><p>Mais importante que lucro é fluxo de caixa. Empresa pode ser lucrativa no papel mas quebrar por falta de caixa. Projeção de fluxo de caixa mensal é crítica para startup e empresas em crescimento. Se cresce 200% ao ano, caixa pode estar negativo durante crescimento (todo dinheiro reinvestido em estoque e receber de clientes). Sem entender isso, empreendedor é surpreendido.</p><p>Projete: (1) caixa inicial, (2) inflows (vendas à vista, recebimento de vendas a prazo, empréstimos), (3) outflows (compra de inventário, folha, impostos, capex), (4) caixa final. Se caixa final é negativo em qualquer mês, precisa de crédito ou investimento para cobrir. Se negatividade persiste, modelo não é sustentável sem mais capital.</p><blockquote class="example">📌 <em>Exemplo: Startup de e-commerce projeta crescer 200% ao ano. Vende a termo 60 dias (recebe em 60 dias). Compra de estoque precisa ser feita 30 dias antes de venda. Mês 1: investe R$ 500.000 em estoque, recebe R$ 0. Mês 2: investe mais R$ 1.000.000 em estoque (crescimento), recebe R$ 500.000 (mês 1). Caixa cai R$ 1.000.000 acumulado. Sem linha de crédito, quebra. Precisa de VC funding ou linha de crédito para financiar crescimento.</em></blockquote>',

      {
        id: 8,
        name: 'Métricas de Crescimento e Rentabilidade para PMEs',
        dur: '14 min',
        content: '<h3>Métricas de Crescimento e Rentabilidade para PMEs</h3><p>PMEs (Pequenas e Médias Empresas) precisam de dashboard de métricas para saber se estão saudáveis. Grandes empresas têm CFO/controller monitorando tudo. PME geralmente tem dono que não tem tempo para análise profunda. Mas sem monitorar KPIs (Key Performance Indicators), erra decisões.</p><p><strong>Receita Anual Recorrente (ARR)</strong> ou <strong>Monthly Recurring Revenue (MRR)</strong> é métrica importante para negócios de subscription (SaaS, academia, estacionamento). MRR é receita previsível por mês (clientes recorrentes). Se academia tem 500 alunos pagando R$ 200/mês, MRR é R$ 100.000. Se cada mês perde 5% de alunos (churn) mas ganha 8%, MRR cresce 3% ao mês. Monitorar MRR ajuda a ver saúde do negócio claramente.</p><blockquote class="tip">💡 <em>Dica: para negócio de subscription, taxa de churn (% que deixa cada mês) é crítica. Churn acima de 5% mensal é sinal de problema (insatisfação, falta de valor).</em></blockquote><h4>Métricas de Eficiência</h4><p><strong>Ticket Médio</strong> = Receita / Número de Transações. Se restaurante faz 500 transações/mês com R$ 20.000 em receita, ticket é R$ 40. Se cresce ticket para R$ 45 (oferecendo bebida, sobremesa), receita cresce 12.5% sem aumento de clientes. Ticket é alavanca poderosa para crescimento de receita.</p><p><strong>Lifetime Value (LTV)</strong> = valor total que cliente gasta com empresa na vida. Se cliente médio gasta R$ 3.000 ao longo de 5 anos, LTV é R$ 3.000. <strong>Customer Acquisition Cost (CAC)</strong> = custo para adquirir cliente. Se gasta R$ 300 em marketing/vendas para adquirir cliente, CAC é R$ 300. Razão LTV/CAC deve ser >3:1 (ganha 3x mais do que gasta para conquistar). Se for <2:1, modelo de negócio não é escalável.</p><p><strong>Margem de Lucro Líquido</strong> = Lucro Líquido / Receita. Varejo típico é 3-5%. Software SaaS é 20-30%. Consultoria é 15-25%. Se sua margem está abaixo de peers, há ineficiência (custos altos ou preço baixo). Melhorar margem em 1% para receita de R$ 10M = R$ 100.000 em lucro adicional.</p><h4>Benchmarking e Comparação com Peers</h4><p>Comparar seus números com outras empresas no setor ajuda a identificar se está acima ou abaixo. Associações de indústria frequentemente publicam benchmarks. Se sua margem bruta é 40% e média de setor é 60%, há problema. Se seu ROE é 8% e setor é 15%, capital está sendo usado ineficientemente.</p><p><strong>Razão Teste Ácido</strong = (Ativo Circulante - Estoque) / Passivo Circulante. Mede liquidez sem contar estoque (que pode não ser convertido rápido). Se for menor que 1, empresa pode ter dificuldade pagar contas em curto prazo. Se for 2+, empresa tem muito caixa ocioso (ganho baixo).</p><blockquote class="example">📌 <em>Exemplo: Duas lojas de roupas. Loja A tem ROE 8%, ticket médio R$ 150, churn baixo. Loja B tem ROE 15%, ticket R$ 200, churn alto. Loja A é negócio melhor: clientes satisfeitos, previsibilidade. Loja B está maximizando receita curto-prazo mas cliente instável (risco).</em></blockquote>',

      {
        id: 9,
        name: 'Financiamento, Capital de Giro e Investimento para Crescimento',
        dur: '16 min',
        content: '<h3>Financiamento, Capital de Giro e Investimento para Crescimento</h3><p>Crescimento requer capital. Empresa pode crescer com lucro retido (reinvestindo lucro), ou pode acelerar levantando capital externo. Compreender opções de financiamento é crucial para planejar crescimento sem quebrar. Não há opção uniforme; depende de estágio, setor, contexto macroeconômico.</p><p><strong>Financiamento Interno (Lucro Retido)</strong> é gratuito em termos de custo direto (não paga juros), mas tem custo de oportunidade (dinheiro poderia ser distribuído para sócios ou investido em produtos de renda fixa). Cresce lentamente mas não dilui propriedade nem aumenta risco de dívida. Bom para empresas rentáveis.</p><p><strong>Empréstimo Bancário</strong> é dívida. Banco cobra juros (5-15% dependendo de risco e taxa base). Não dilui propriedade mas aumenta alavancagem. Requer colateral ou garantia de sócios. Geralmente para PME, requer histórico de crédito bom. Crescimento rápido pode não qualificar (muita alavancagem já).</p><blockquote class="tip">💡 <em>Dica: antes de pedir empréstimo, certifique que ROI do projeto > juros do empréstimo. Não pegue dívida para financiar atividade que não gera retorno.</em></blockquote><h4>Capital de Terceiros vs Próprio</h4><p><strong>Venture Capital (VC)</strong> investe em startups de alto crescimento. Compram equity (~20% da empresa em troca de R$ 5 milhões). Não é dívida (não paga juros), é propriedade. VC quer saída (IPO ou venda em 7-10 anos) que valorize investimento 10x. Vem com pressão de crescimento e dilui propriedade. Bom para startups que precisam crescer rápido e podem não ter lucro por anos.</p><p><strong>Private Equity (PE)</strong> investe em empresas maduras. Compram controle, reestruuram, melhoram rentabilidade, vendem ou fazem IPO. Geralmente financiam com muita dívida (alavanca o retorno). Rápido (2-5 anos). Pode ser disruptivo (corta empregos, vende ativos não-core).</p><p><strong>Crowdfunding</strong> é multidão de pequenos investidores. Pode ser equity crowdfunding (veem % empresa), ou reward crowdfunding (você promete produto/benefício, não acionário). Levanta capital sem pressão de VC/PE, mas é mais lento e requer marketing bom.</p><h4>Gestão Estratégica de Capital de Giro para Crescimento</h4><p>Crescimento sem gestão de capital de giro é armadilha. Cenário: startup vende SaaS com MRR R$ 100.000. Cresce 10% mês (explosivo). MRR vai para R$ 110.000, R$ 121.000, R$ 133.100... Em 12 meses, R$ 313.000 MRR. Ganhou R$ 213.000 MRR. Mas se gasta R$ 500.000 em salários/infraestrutura durante crescimento, está queimando caixa. Precisa de VC funding ou linha de crédito para cobrir queima até ficar rentável. Sem capital, quebraria.</p><p>Inversamente, negócio de e-commerce com margem alta (40%) pode estar queimando caixa apesar de lucro. Se cresce vendas 100% e financia com 60 dias, caixa é negativado. Mesmo com lucro de R$ 500.000, se inventário é R$ 2 milhões (congelado), capital circulante seca.</p><p><strong>Supply Chain Financing</strong> é inovação moderna. Banco financia espaço entre pagamento de fornecedor e recebimento de cliente, reduzindo capital de giro necessário. Walmart usa extensivamente para não prender caixa. PME pode usar também.</p><blockquote class="example">📌 <em>Exemplo: Natura cresceu com lucro retido até ponto, depois levantou capital para IR agressivo em mercado. IPO em 2004 alavancou para crescimento global. Sem capital externo, seria confinado a Brasil. Com VC/IPO, virou multinacional.</em></blockquote><h4>Quando Levantar Capital</h4><p>Levantar capital tem custo (dilui propriedade, obrigação, tempo de diligência). Bom momento é: (1) quando ROI do capital > custo dele, (2) quando mercado está receptivo (taxa de juros baixa, apetite de investidor alto), (3) quando empresa está crescendo (não em contração, quando investidor desce preço), (4) quando empresa tem runway suficiente (não está em pânico).</p><p>Levantar capital em pânico (falta 3 meses de caixa) resulta em péssimas condições (preço baixo, termos desfavoráveis, perda de controle). Levantar quando tem 12+ meses de caixa e momento é favorável = posição de força.</p><blockquote class="news">📰 <em>Notícia: em 2023-2024, muitas startups enfrentam dificuldade em levantar capital porque VC está mais seletivo (juros altos, apetite reduzido). Aquelas que conseguem levantam em avaliações menores, diluição maior.</em></blockquote>',
        cards: [
