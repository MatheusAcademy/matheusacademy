<script>
var COURSE = { id:'vvfe', name:'Realidade Virtual, Aumentada e Imersão', subtitle:'Dominie as tecnologias que estão transformando o futuro da educação, entretenimento e negócios', free: false, freeModules: 1 , cat:'Desenvolvimento', desc:'Aprenda tudo sobre Realidade Virtual, Aumentada e Imersão com conteúdo completo e interativo.', modules:10, topics:8, hours:4.0, quizzes:30, color:'#4A7EFF', glow:'rgba(74,126,255,.35)', shortName:'Realidade Virtual, Aument'};
var MODS = [
  { id: 0, name: 'Fundamentos de VR e AR',
  desc:'Aprenda tudo sobre Fundamentos de VR e AR com conteúdo completo, flashcards e quizzes interativos.',
  cat:'Desenvolvimento', free: true, topics: [
    { id: 0, name: 'VR vs AR vs XR: As Diferenças', content: `<h2>VR vs AR vs XR: As Diferenças</h2><p>Muita gente confunde realidade virtual com realidade aumentada. Eles são bem diferentes. Entender essa diferença é essencial para aplicar corretamente.</p><h4>Realidade Virtual (VR)</h4><p>Você coloca um headset (óculos). O mundo real desaparece completamente. Você está em um ambiente 100% digital. Você pode andar, pegar objetos, interagir.</p><blockquote class="tip"><strong>Exemplos:</strong> Jogar no Meta Quest, treinar cirurgias em ambiente virtual, explorar Marte em 360 graus.</blockquote><p>Imersão é TOTAL. Seu cérebro literalmente acredita que você está lá. Isso é neurocientificamente comprovado.</p><h4>Realidade Aumentada (AR)</h4><p>Você permanece no mundo real, mas adiciona camadas digitais. Você vê pelo seu smartphone ou óculos especiais — o quarto fica como está, mas há um Pokémon sentado no seu sofá.</p><blockquote class="example"><strong>Exemplos:</strong> Pokémon Go, IKEA Place (visualizar móvel antes de comprar), Google Translate (aponta câmera na rua e traduz sinais).</strongquote><p>AR é menos imersivo que VR, mas mais prática para uso cotidiano.</p><h4>Extended Reality (XR)</h4><p>É o guarda-chuva. VR, AR, Mixed Reality — tudo junto é XR. O futuro é XR, não um ou outro.</p><blockquote class="news"><strong>Tendência 2026:</strong> Apple Vision Pro e Meta Quest Pro dominam o mercado de headsets. Preço caindo, adoção crescendo exponencialmente.</strongquote><p>Você vai aprender a desenvolver para todas as plataformas neste curso.</p>` },
    { id: 1, name: 'O Impacto Neurocientífico da Imersão', content: `<h2>O Impacto Neurocientífico da Imersão</h2><p>Por que VR é tão poderoso? Porque seu cérebro NÃO consegue diferenciar uma experiência virtual real de uma experiência real.</p><h4>Neuroplasticidade em VR</h4><p>Quando você treina algo em VR (cirurgia, pilotagem de avião, defesa pessoal), seu cérebro forma os mesmos caminhos neurais que formaria no mundo real.</p><blockquote class="tip"><strong>Estudo Científico:</strong> Cirurgiões que treinem 5 horas em VR têm 230% menos erros em suas primeiras cirurgias reais comparado a cirurgiões que treinam só observando vídeos.</blockquote><p>VR não é diversão — é ferramenta de aprendizado neurocientificamente comprovada.</p><h4>Presença Psicológica</h4><p>Em VR, você sente que está realmente lá. Seu coração bate rápido se há altura. Sua palma sua se há confronto. É REAL psicologicamente, mesmo que o mundo seja digital.</p><blockquote class="example"><strong>Exemplo:</strong> Pessoa com fobia de altura entra em VR simulando estar em um prédio alto. Seu medo é real. Mas em VR, pode estar se expondo controladamente — terapia exposição.</blockquote><h4>Retenção de Aprendizado</h4><p>Você aprende com: 10% lendo, 30% visualizando, 90% fazendo. VR é o 90% — você está FAZENDO em ambiente imersivo.</p><blockquote class="news"><strong>Resultado:</strong> Alunos que aprendem em VR retêm 275% mais informação 1 ano depois comparado a aulas tradicionais.</strongquote>` },
    { id: 2, name: 'História e Evolução das Tecnologias de Realidade', content: `<h2>História e Evolução das Tecnologias de Realidade</h2><p>VR não é novo. Mas recentemente ficou prático e acessível. Entender a história ajuda você ver para onde vai.</p><h4>Era 1: VR Teórica (1950s-1990s)</h4><p>Visionários como Jaron Lanier criaram os primeiros headsets. Eram máquinas gigantes, cara \\\$100k, e imersão era ruim. Mas provou que era possível.</p><h4>Era 2: VR Niche (2000s-2010s)</h4><p>Videogames avançaram (PlayStation VR, Oculus Rift). Mas ainda cara, ainda para entusiastas. Mercado pequeno.</p><h4>Era 3: VR Mainstream (2020-presente)</h4><p>Meta Quest 3 custa \\\$500. Qualidade é excelente. Aplicações práticas em medicina, educação, negócios. Adoção exponencial.</p><blockquote class="example"><strong>Dado 2026:</strong> 1.7 bilhões de pessoas ao redor do mundo usaram VR/AR no ano passado. Era 300 milhões em 2020.</blockquote><h4>O Futuro: Metaverso</h4><p>Não é só jogar em VR. É viver em VR. Você trabalha, estuda, socializa em ambientes virtuais com pessoas reais. Seu avatar representa você. Você tem propriedade digital (terreno, casa, arte).</p><blockquote class="news"><strong>Previsão 2026:</strong> Metaverse vai passar \\\$100 bilhões em economia ano que vem. Ainda cedo, mas crescimento é exponencial.</strongquote>` },
    { id: 3, name: 'Casos de Uso Atuais e Futuros', content: `<h2>Casos de Uso Atuais e Futuros</h2><p>VR não é só para jogar. Aplica-se em praticamente toda indústria. Você vai ver casos reais.</p><h4>Educação</h4><p>Aluno estuda história em VR — está em Egito antigo, vê as pirâmides sendo construídas em tempo real. Aprende biologia vendo o interior de uma célula gigante.</p><blockquote class="tip"><strong>Realidade Escolas 2026:</strong> 5% das escolas ao redor do mundo já usam VR como ferramenta educacional principal. Crescimento é 40% ao ano.</strongquote><h4>Medicina</h4><p>Cirurgião treina cirurgia complexa em VR. Pratica 50 vezes sem risco. Quando faz a cirurgia real, é quase automática. Tempo de cirurgia reduz 30%, erros reduzem 90%.</p><h4>Marketing e Vendas</h4><p>Imobiliária: cliente entra em VR, visita apartamento antes de estar pronto. Carro: cliente "testa" carro em VR, configura cores, opcionais. Taxa de decisão de compra aumenta.</p><blockquote class="example"><strong>Caso Real:</strong> Mercedes criou showroom virtual. Clientes globalmente podem testar carros novos em VR. Aumentou suas vendas 35% em um mercado.</strongquote><h4>Fitness e Saúde Mental</h4><p>Pessoa com ansiedade faz terapia em VR — exposição controlada. Pessoa com depressão faz exercício em VR — gamificado, divertido. Resultado: 45% mais aderência ao programa.</p><blockquote class="news"><strong>Aplicação Futura:</strong> Próteses neurais usando VR feedback — pessoa com paralisia controla mão robótica vendo em VR como se fosse sua mão real.</strongquote>` }
  ], flashcards: [
    { q: 'Qual é a diferença entre VR e AR?', a: 'VR: mundo 100% digital, você está imerso. AR: mundo real + camadas digitais, você está no mundo real.' },
    { q: 'O que é XR?', a: 'Extended Reality — guarda-chuva que inclui VR, AR, Mixed Reality — tudo junto.' },
    { q: 'Qual é o impacto neurocientífico da imersão em VR?', a: 'Seu cérebro forma os mesmos caminhos neurais que formaria em experiência real.' },
    { q: 'Quanto melhor cirurgiões se saem após treino de 5 horas em VR?', a: '230% menos erros na primeira cirurgia real.' },

    { q: 'Qual foi a primeira era de VR (1950s-1990s)?', a: 'Era teórica — máquinas gigantes, caras (\\\$100k), prova de conceito.' },
    { q: 'Em qual era estamos agora (2020-presente)?', a: 'Era Mainstream — Meta Quest 3 custa \\\$500, qualidade excelente, adoção exponencial.' },
    { q: 'Quanto as pessoas usaram VR/AR no ano passado?', a: '1.7 bilhões de pessoas ao redor do mundo (vs 300 milhões em 2020).' },
    { q: 'Qual é o preço atual do Meta Quest 3?', a: '\\\$500 aproximadamente.' },
    { q: 'Qual é a projeção econômica do metaverso em 2026?', a: 'Vai passar \\\$100 bilhões em economia ao ano.' },
    { q: 'Qual é a taxa de crescimento de escolas usando VR?', a: '40% ao ano, 5% de escolas globais já usam como ferramenta principal.' },
    { q: 'Quanto tempo de cirurgia reduz com treino em VR?', a: '30% de redução, 90% de redução em erros.' }
  ], quizzes: [
    { q: 'Se você está em um ambiente totalmente digital com óculos especiais, você está em:',opts: ['AR','VR','Mixed Reality','Metaverso'], correct: 1 },
    { q: 'Qual é a maior vantagem de VR em treinamento médico?', opts: ['É barato','Prática sem risco, reduz erros 90% na cirurgia real','É divertido','Elimina necessidade de aulas reais'], correct: 1 },
    { q: 'Qual era VR estava em estágio teórico?', opts: ['2000s-2010s','1950s-1990s','2020-presente','Nunca'], correct: 1 }
  ], summary: { name: 'Resumo do Módulo 0', points: ['VR: imersão 100% digital. AR: mundo real + digital. XR: todas as realidades juntas','Neurociência: VR cria mesmos caminhos neurais que experiência real — treino é efetivo','História: teórica (1950s) → niche (2000s) → mainstream (2020s)','Aplicações: educação, medicina, marketing, fitness, metaverso — futuro multiplicado'] },
    quizFinal: [
      {q:'O que é Realidade Virtual (VR)?',opts:["Assistir TV em 3D", "Ambiente digital imersivo totalmente simulado por computador", "Videoconferência online", "Jogo de tabuleiro digital"],correct:1},
      {q:'O que diferencia VR de AR?',opts:["São exatamente a mesma coisa", "VR é totalmente imersiva; AR sobrepõe elementos ao mundo real", "AR é sempre mais cara", "VR só usa celular"],correct:1},
      {q:'Qual dispositivo é usado para VR?',opts:["Mouse comum", "Headset e óculos de realidade virtual", "Impressora 3D industrial", "Smartwatch convencional"],correct:1}
    ]
  },
  { id: 1, name: 'Hardware, Plataformas e Ecossistema', free: false, topics: [
    { id: 0, name: 'Principais Headsets VR e AR 2026', content: `<h2>Principais Headsets VR e AR 2026</h2><p>Você precisa conhecer o hardware atual para entender qual desenvolver para. Mercado muda rápido, mas esses líderes dominam.</p><h4>Meta Quest 3</h4><p>Headset mais popular. \\\$500. Qualidade excelente, processamento potente, bateria 2-3 horas. Foco em gaming e redes sociais. Catalogo de apps enormes.</p><blockquote class="tip"><strong>Estatística:</strong> Meta Quest tem 45% do mercado de VR. Se você desenvolve para VR, começa aqui.</blockquote><h4>Apple Vision Pro</h4><p>\\\$3.500. Premium absoluto. Qualidade de imagem insuperável. Foco em profissionais (design, medicina, arquitetura). Mercado menor mas crescendo.</p><blockquote class="example"><strong>Diferencial:</strong> Vision Pro tem eye tracking e hand tracking — você controla tudo com olhos e mãos, nenhum controle necessário.</strongquote><h4>PlayStation VR2</h4><p>\\\$550. Foco em gaming. Conecta-se ao PS5. Catalogo de jogos AAA. Gráficos superiores mas requer console.</p><h4>HTC Vive Cosmos</h4><p>\\\$700. Foco em empresas e educação. Suporte excelente, aplicações B2B robustas. Mercado profissional.</p><h4>Para AR: Magic Leap 2, HoloLens 2</h4><p>Caras (\\\$2k+) mas poderosas. Usado em medicina cirúrgica, manufatura, design. Mercado B2B.</p><blockquote class="news"><strong>Tendência:</strong> Headsets ficam mais baratos e poderosos a cada ano. Em 2-3 anos, \\\$200 será o preço padrão.</strongquote>` },
    { id: 1, name: 'Game Engines e Desenvolvimento', content: `<h2>Game Engines e Desenvolvimento</h2><p>Para criar VR/AR, você precisa de um game engine — software que te permite criar ambientes 3D imersivos.</p><h4>Unity</h4><p>Mais popular. Flexível, comunidade gigante, assets baratos/grátis. Se você aprende uma engine, comece aqui.</p><blockquote class="tip"><strong>Vantagem:</strong> Você desenvolve para VR, AR, desktop, mobile — tudo com um código base. Reutiliza muito.</blockquote><h4>Unreal Engine</h4><p>Mais poderoso graficamente. AAA games usam (Fortnite é em Unreal). Curva de aprendizado mais íngreme, mas resultado final é premium.</p><h4>WebXR</h4><p>Realidade virtual direto no navegador. Sem download, sem instalação. Acessível mas com limitações. Futuro da web.</p><h4>Desenvolvimento Prático</h4><p>Você precisa: conhecimento de 3D (modelagem, animação), programação (C#, C++), design UX/UI (porque imersão é diferente).</p><blockquote class="example"><strong>Caminho Recomendado:</strong> 1. Aprenda game engine (Unity/Unreal). 2. Aprenda 3D (Blender é grátis). 3. Aprenda programação básica. 4. Comece com projeto simples.</strongquote><h4>Mercado de Talentos</h4><p>Desenvolvedor VR especializado ganha 2x mais que desenvolvedor web comum. Demanda é 10x maior que oferta.</p><blockquote class="news"><strong>Empregabilidade 2026:</strong> Desenvolvedores VR/AR têm taxa de emprego de 99% — faltam talentos no mercado.</strongquote>` },
    { id: 2, name: 'Designing para Imersão: UX/UI em VR', content: `<h2>Designing para Imersão: UX/UI em VR</h2><p>Design em VR é radicalmente diferente de web ou mobile. Princípios tradicionais não aplicam. Você está projetando para 3D imersivo.</p><h4>Diferenças Fundamentais</h4><p>No web, você clica botão. Em VR, você aponta mão no botão, gesto "pinch" ativa. Interface precisa ser intuitiva no espaço 3D.</p><blockquote class="tip"><strong>Princípio 1:</strong> Menu deve estar no seu campo visual sem mover cabeça. Deve ser acessível com um gesto natural.</strongquote><p><strong>Princípio 2:</strong> Minimizo texto. VR é visual/motor, não textual. Ícones e feedback sonoro > texto.</p><h4>Comfort é King</h4><p>Se usuário sente motion sickness, experiência é ruim. Você evita: movimento rápido não natural, mudanças de perspectiva drástica, imagens que piscam.</p><blockquote class="example"><strong>Técnica:</strong> "Gaze stabilization" — quando usuário olha algo e clica, a câmera fica ali por 0.2s antes de mover. Elimina quase toda náusea.</strongquote><h4>Feedback Haptico</h4><p>Você pode fazer controlador vibrar para "sensação de impacto". Quando pega objeto, vibração diz "pegou". Quando bate na parede, vibração diz "bateu".</p><blockquote class="news"><strong>Tecnologia 2026:</strong> Haptic bodysuits estão começando a ser mainstream — sente quando é tocado, temperatura, peso.</strongquote>` },
    { id: 3, name: 'Monetização e Oportunidades de Negócio', content: `<h2>Monetização e Oportunidades de Negócio</h2><p>VR/AR é novo, e nova tecnologia = oportunidade. Múltiplas formas de ganhar dinheiro.</p><h4>Modelo 1: Vender Aplicação</h4><p>Desenvolve app (jogo, ferramenta, educação), vende na Meta Quest Store, Steam VR, Apple App Store. Preço típico: \\\$10-\\\$50. Comissão de 30% vai para plataforma, você fica com 70%.</p><blockquote class="tip"><strong>Realidade:</strong> Apps VR simples podem gerar \\\$5k-\\\$50k/mês se forem bons. Alguns geram seis dígitos.</strongquote><h4>Modelo 2: Serviços B2B</h4><p>Empresa quer treinar funcionários em VR. Você desenvolve solução customizada. Pode cobrar \\\$50k-\\\$500k+ por projeto.</p><blockquote class="example"><strong>Caso Real:</strong> Empresa de construção contratou VR training — economizou \\\$2M em acidentes evitados. Pagou \\\$100k por solução VR.</strongquote><h4>Modelo 3: Assinatura Mensal</h4><p>Tipo Netflix de VR. Usuário paga \\\$10/mês acesso unlimited. Você ganha mensalmente previsível.</p><h4>Modelo 4: Publicidade</h4><p>App é grátis, mas tem publicidade dentro. Menos invasiva que web (não interrompe gameplay), mas presente.</p><h4>Modelo 5: Metaverse & Land</h4><p>Você compra "terreno" no metaverso (Decentraland, The Sandbox), desenvolve nele, vende acessos/serviços. Alguns terrenos valem \\\$500k+.</p><blockquote class="news"><strong>Oportunidade 2026:</strong> Ainda é greenfield — você entra cedo, pode dominar seu nicho antes que concorrentes apareçam.</strongquote>` }
  ], flashcards: [
    { q: 'Qual é o headset mais popular em 2026?', a: 'Meta Quest 3 — 45% do mercado, \\\$500, excelente relação qualidade/preço.' },
    { q: 'Qual é o headset premium?', a: 'Apple Vision Pro — \\\$3.500, qualidade insuperável, eye tracking, para profissionais.' },
    { q: 'Qual é a diferença entre PlayStation VR2 e Meta Quest 3?', a: 'PS VR2 requer console PS5 mas gráficos superiores para jogos. Quest é standalone mais acessível.' },
    { q: 'Qual é o game engine mais popular para VR?', a: 'Unity — flexível, comunidade gigante, suporta múltiplas plataformas.' },

    { q: 'Quanto um desenvolvedor VR ganha comparado a web?', a: '2x mais que desenvolvedor web comum.' },
    { q: 'Qual é a taxa de emprego para desenvolvedores VR/AR?', a: '99% — faltam talentos no mercado, demanda é 10x maior que oferta.' },
    { q: 'Qual é o princípio mais importante em UI/UX para VR?', a: 'Menu deve ser acessível no campo visual com gesto natural — comfort é king.' },

    { q: 'Qual é o preço típico de venda de um app VR?', a: '\\\$10-\\\$50, você fica com 70%, plataforma fica com 30%.' }
  ], quizzes: [
    { q: 'Você quer desenvolver VR para máximo alcance. Qual headset começaria?', opts: ['Apple Vision Pro','Meta Quest 3','HTC Vive Cosmos','PlayStation VR2'], correct: 1 },

    { q: 'Qual é o modelo mais lucrativo a curto prazo?', opts: ['Vender app na store','Serviços B2B customizado','Assinatura mensal','Publicidade'], correct: 1 }
  ], summary: { name: 'Resumo do Módulo 1', points: ['Meta Quest 3 domina mercado (45%), Apple Vision Pro é premium, PlayStation VR2 para gamers','Unity é engine mais acessível, Unreal é mais poderoso — escolha baseado em necessidade','UI/UX em VR é radicalmente diferente — comfort, acessibilidade, feedback haptico importam mais','Monetização múltipla: app store (\\\$5k-\\\$50k/mês), B2B (\\\$50k-\\\$500k), assinatura, publicidade, metaverse'] },
    quizFinal: [
      {q:'O que é Realidade Virtual (VR)?',opts:["Assistir TV em 3D", "Ambiente digital imersivo totalmente simulado por computador", "Videoconferência online", "Jogo de tabuleiro digital"],correct:1},
      {q:'O que diferencia VR de AR?',opts:["São exatamente a mesma coisa", "VR é totalmente imersiva; AR sobrepõe elementos ao mundo real", "AR é sempre mais cara", "VR só usa celular"],correct:1},
      {q:'Qual dispositivo é usado para VR?',opts:["Mouse comum", "Headset e óculos de realidade virtual", "Impressora 3D industrial", "Smartwatch convencional"],correct:1}
    ]
  }
];
