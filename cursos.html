<style>
:root{
  --bg:#08080f;--bg2:#0d0d1a;--bg3:#111122;--card:#0f0f1e;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.12);
  --pri:#4A7EFF;--neon:#00d4ff;
  --txt:#e8e8ef;--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.28);
  --grn:#22c55e;--orn:#f59e0b;--red:#ef4444;
  --font:'Outfit',sans-serif;--serif:'Playfair Display',serif;
  --topbar:56px;--bottombar:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden;}
::selection{background:var(--pri);color:#fff;}

/* ══ TOPBAR ══ */
.ma-topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:rgba(4,4,10,.99);
  border-bottom:1px solid rgba(91,127,255,.15);
  display:flex;align-items:center;padding:0 14px;gap:6px;
  z-index:9999;font-family:var(--font);
}
.ma-topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent 0%,#4A7EFF 30%,#00d4ff 65%,transparent 100%);
  opacity:.75;
}
.ma-tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.ma-tb-logo svg{display:block;flex-shrink:0;}
.ma-tb-sep{width:1px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0;}
.ma-tb-page-name{font-size:.64rem;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;}
.ma-tb-spacer{flex:1;min-width:0;}
.ma-tb-pts-block{
  display:flex;align-items:center;gap:7px;
  text-decoration:none;flex-shrink:0;
  padding:5px 12px 5px 10px;border-radius:22px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  transition:all .2s;cursor:pointer;
}
.ma-tb-pts-block:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08);}
.ma-tb-trophy{color:#f59e0b;display:flex;align-items:center;}
.ma-tb-trophy svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ma-tb-pts-num{font-size:.78rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
.ma-tb-theme-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#f59e0b;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding:0;
}
.ma-tb-theme-btn svg{width:15px;height:15px;stroke:currentColor;}
.ma-tb-theme-btn:hover{border-color:rgba(245,158,11,.4);}
.ma-tb-menu-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding:0;
}
.ma-tb-menu-btn svg{width:16px;height:16px;stroke:currentColor;pointer-events:none;}
.ma-tb-menu-btn:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.ma-menu-overlay{position:fixed;inset:0;z-index:10000;display:none;}
.ma-menu-overlay.open{display:block;}
.ma-menu-dd{
  position:fixed;top:62px;right:10px;
  background:#0f0f1e;border:1px solid #252540;border-radius:16px;
  min-width:240px;z-index:10001;
  box-shadow:0 16px 56px rgba(0,0,0,.75);overflow:hidden;
  opacity:0;transform:scale(.88) translateY(-12px);pointer-events:none;
  transition:all .22s cubic-bezier(.2,0,.3,1);transform-origin:top right;
}
.ma-menu-dd.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all;}
.ma-menu-user{padding:14px 16px 12px;border-bottom:1px solid #1e1e35;}
.ma-mu-name{font-size:.85rem;font-weight:700;color:#fff;display:block;margin-bottom:3px;}
.ma-mu-pts{font-size:.6rem;color:rgba(255,255,255,.35);}
.ma-menu-sec{padding:5px 0;}
.ma-menu-sec+.ma-menu-sec{border-top:1px solid #1e1e35;}
.ma-mi{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:.78rem;font-weight:600;color:#8888a8;text-decoration:none;cursor:pointer;border:none;background:transparent;font-family:var(--font);width:100%;text-align:left;transition:background .15s;}
.ma-mi:hover{background:#161628;color:#e8e8f0;}
.ma-mi-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0;}
.ma-mi.gold{color:#f59e0b;}.ma-mi.red{color:#ef4444;}

/* Tema claro */
body.light{--bg:#f5f5fb;--bg2:#eeeef8;--bg3:#e3e4f0;--card:#fff;--brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.12);--txt:#1a1a2e;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.28);}
body.light .ma-topbar{background:rgba(240,242,248,.99);}
body.light .ma-menu-dd{background:#fff;border-color:#d0d4e8;}
body.light .ma-menu-user{border-color:#e8eaf2;}
body.light .ma-mi{color:#5a5a7a;}
body.light .ma-mi:hover{background:#f0f2f8;color:#1a1a2e;}
body.light .ma-menu-sec+.ma-menu-sec{border-color:#e8eaf2;}

/* ══ HERO ══ */
.page-hero{
  padding:calc(var(--topbar) + 48px) 24px 40px;
  text-align:center;position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(74,126,255,.12) 0%,transparent 60%),var(--bg);
  pointer-events:none;
}
.hero-label{
  display:inline-block;
  font-size:.5rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--pri);margin-bottom:14px;position:relative;
}
.hero-label::before,.hero-label::after{
  content:'';display:inline-block;width:20px;height:1px;background:var(--pri);
  vertical-align:middle;opacity:.5;
}
.hero-label::before{margin-right:10px;}
.hero-label::after{margin-left:10px;}
.hero-title{
  font-family:var(--serif);font-size:clamp(1.8rem,5vw,2.6rem);
  font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.02em;
  margin-bottom:12px;position:relative;
}
body.light .hero-title{color:#0a0a1e;}
.hero-sub{font-size:.82rem;color:var(--txt2);max-width:420px;margin:0 auto;line-height:1.7;position:relative;}

/* ══ SUMMARY ══ */
.summary-bar{
  max-width:680px;margin:32px auto 0;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
}
.summary-stat{text-align:center;}
.summary-val{font-size:1.4rem;font-weight:900;color:#fff;display:block;line-height:1;}
body.light .summary-val{color:#0a0a1e;}
.summary-lbl{font-size:.46rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;margin-top:4px;display:block;}
.summary-div{width:1px;height:32px;background:var(--brd);}
.summary-prog{flex:1;max-width:180px;}
.summary-prog-label{font-size:.46rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;display:block;margin-bottom:6px;}
.summary-prog-bar{height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.summary-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pri),var(--neon));transition:width 1s ease;}

/* ══ GRID ══ */
.courses-grid{
  max-width:680px;margin:0 auto;
  padding:32px 24px calc(var(--bottombar) + 32px);
  display:flex;flex-direction:column;gap:1px;
}

/* Separador de categoria */
.section-divider{
  display:flex;align-items:center;gap:14px;padding:28px 0 16px;
}
.section-divider span{
  font-size:.46rem;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.12em;
}
.section-divider::after{
  content:'';flex:1;height:1px;background:var(--brd);
}

/* ══ CARD ══ */
.course-card{
  position:relative;
  background:var(--card);border:1px solid var(--brd);border-radius:16px;
  padding:24px;cursor:pointer;transition:all .25s cubic-bezier(.2,0,.3,1);
  overflow:hidden;
}
.course-card:hover:not(.locked){
  border-color:var(--card-color);
  background:rgba(74,126,255,.04);
  transform:translateY(-2px);
}
.course-card.locked{
  opacity:.55;
}
.course-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(var(--rgb-color),0) 0%,rgba(var(--rgb-color),.06) 100%);
  pointer-events:none;
}
.card-accent{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-color);
}
.card-body{
  display:flex;gap:14px;margin-bottom:16px;position:relative;z-index:1;
}
.card-icon{
  font-size:2.4rem;width:auto;flex-shrink:0;line-height:1;filter:drop-shadow(0 0 8px rgba(74,126,255,.15));}
.card-info{
  flex:1;min-width:0;
}
.card-cat{
  display:block;font-size:.46rem;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;
}
.card-name{
  display:block;font-size:.95rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:4px;word-break:break-word;
}
body.light .card-name{color:#0a0a1e;}
.card-desc{
  display:block;font-size:.7rem;color:var(--txt2);line-height:1.3;word-break:break-word;
}
.card-badge{
  position:absolute;top:24px;right:24px;
  display:inline-block;font-size:.5rem;font-weight:700;padding:5px 10px;
  border-radius:8px;letter-spacing:.08em;text-transform:uppercase;z-index:2;
}
.badge-free{background:rgba(34,197,94,.15);color:#22c55e;}
.badge-owned{background:rgba(74,126,255,.15);color:#4A7EFF;}
.badge-locked{background:rgba(239,68,68,.15);color:#ef4444;}
.card-footer{
  position:relative;z-index:1;
}
.card-stats{
  display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;
}
.card-stat{
  display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--txt2);
}
.card-stat svg{
  width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0;
}
.card-prog-row{
  display:flex;align-items:center;gap:10px;
}
.card-prog-bar{
  flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;
}
.card-prog-fill{
  height:100%;border-radius:3px;transition:width .6s ease;
}
.card-prog-val{
  font-size:.6rem;font-weight:600;white-space:nowrap;
}
.card-arrow{
  position:absolute;bottom:24px;right:24px;
  color:var(--txt3);width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.course-card:hover:not(.locked) .card-arrow{
  color:var(--card-color);
  transform:translateX(2px);
}
.card-arrow svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;}
.card-lock-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;border-radius:16px;
}
.lock-msg{
  font-size:.75rem;font-weight:600;color:#fff;text-align:center;padding:12px;
}

/* ══ STATUS INDICATOR ══ */
.refresh-indicator {
  position: fixed;
  bottom: 90px;
  right: 20px;
  padding: 8px 14px;
  background: rgba(74, 126, 255, 0.15);
  border: 1px solid rgba(74, 126, 255, 0.3);
  border-radius: 20px;
  font-size: 0.65rem;
  color: #4A7EFF;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.refresh-indicator.show {
  opacity: 1;
}
.refresh-indicator.updated {
  background: rgba(34, 197, 94, 0.15);
  border-color: rgba(34, 197, 94, 0.3);
  color: #22c55e;
}

/* ══ TOAST ══ */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 15, 30, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #e8e8ef;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 0.75rem;
  z-index: 10001;
  backdrop-filter: blur(10px);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateX(-50%) translateY(20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ──────────────────────────────── */
</style>

<script>
/* ═══════════════════════════════════════════════════════════════════════ */
/* ═══  SISTEMA DE ATUALIZAÇÃO AUTOMÁTICA EM TEMPO REAL  ═══ */
/* ═══════════════════════════════════════════════════════════════════════ */

// Armazena a última lista de cursos para comparação
let LAST_COURSES = null;
let REFRESH_TIMEOUT = null;
let AUTO_REFRESH_INTERVAL = null;

// Função para mostrar indicador de atualização
function showRefreshIndicator(text, isSuccess = false) {
  const indicator = document.getElementById('refreshIndicator');
  if (!indicator) return;
  
  indicator.textContent = text;
  indicator.classList.add('show');
  indicator.classList.toggle('updated', isSuccess);
  
  clearTimeout(REFRESH_TIMEOUT);
  REFRESH_TIMEOUT = setTimeout(() => {
    indicator.classList.remove('show');
  }, 3000);
}

// Função para mostrar toast
function showToast(text) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// Função que verifica se cursos foram atualizados
function hasCoursesChanged(newCourses) {
  if (!LAST_COURSES || !newCourses) return true;
  
  // Compara quantidade
  if (LAST_COURSES.length !== newCourses.length) return true;
  
  // Compara IDs e timestamps dos cursos
  for (let i = 0; i < newCourses.length; i++) {
    const newC = newCourses[i];
    const oldC = LAST_COURSES.find(c => c.id === newC.id);
    
    if (!oldC || oldC.addedTs !== newC.addedTs || oldC.name !== newC.name) {
      return true;
    }
  }
  
  return false;
}

// Função PRINCIPAL que carrega cursos (estático + Firebase)
function loadCoursesFromSources() {
  // 1. Começa com cursos estáticos
  let courses = [];
  
  if (typeof MA_COURSES !== 'undefined' && MA_COURSES && MA_COURSES.length) {
    courses = [...MA_COURSES];
  }
  
  // 2. Se Firebase estiver disponível, sincroniza com Firestore
  if (typeof firebase !== 'undefined' && firebase.firestore) {
    try {
      const db = firebase.firestore();
      
      // Listener em tempo real para a coleção de cursos
      db.collection('courses')
        .where('active', '==', true)
        .onSnapshot(
          (snapshot) => {
            // Cursos do Firebase
            const firebaseCourses = [];
            snapshot.forEach((doc) => {
              const data = doc.data();
              firebaseCourses.push({
                id: data.id || doc.id,
                name: data.name,
                desc: data.desc,
                cat: data.cat,
                icon: data.icon,
                color: data.color,
                file: data.file,
                modules: data.modules,
                topics: data.topics,
                hours: data.hours,
                quizzes: data.quizzes,
                free: data.free,
                active: data.active,
                addedTs: data.addedTs || 0,
              });
            });
            
            // Merge: Firebase sobrescreve estáticos pelo ID
            const finalCourses = [...courses];
            firebaseCourses.forEach((fbCourse) => {
              const idx = finalCourses.findIndex(c => c.id === fbCourse.id);
              if (idx >= 0) {
                finalCourses[idx] = fbCourse;
              } else {
                finalCourses.push(fbCourse);
              }
            });
            
            // Verifica se realmente mudou
            if (hasCoursesChanged(finalCourses)) {
              LAST_COURSES = finalCourses;
              renderCursos(finalCourses);
              showRefreshIndicator('✅ Cursos atualizados', true);
            }
          },
          (error) => {
            console.log('Firebase listener erro (não crítico):', error);
            // Continua com dados estáticos
            if (courses.length > 0) {
              renderCursos(courses);
            }
          }
        );
    } catch (e) {
      console.log('Firebase não configurado, usando dados estáticos');
      if (courses.length > 0) {
        renderCursos(courses);
      }
    }
  } else {
    // Sem Firebase, apenas estáticos
    if (courses.length > 0) {
      renderCursos(courses);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════

// Funções auxiliares (mesmas do original)
function gU() { return (MAStore && MAStore.getCurrentUser && MAStore.getCurrentUser()) || null; }
function gP() { return (MAStore && MAStore.getPoints && MAStore.getPoints()) || {total: 0}; }

function isCourseUnlocked(c) {
  if (c.free === true || c.ak === 'free') return true;
  var u = gU();
  if (!u) return false;
  if (MAStore && MAStore.hasCourseAccess) return MAStore.hasCourseAccess(c.ak || (c.id + '_access'));
  return (u.courses||[]).indexOf(c.id||c.ak) >= 0;
}

function getCourseProgress(c) {
  if (!c.id) return {pct: 0, count: 0};
  var stored = localStorage.getItem('ma_prog_' + c.id);
  if (!stored) return {pct: 0, count: 0};
  try {
    var p = JSON.parse(stored);
    var mods = (c.modules || 1);
    var done = p.done || 0;
    var pct = mods ? Math.round((done / mods) * 100) : 0;
    return {pct: Math.min(pct, 100), count: done};
  } catch (e) {
    return {pct: 0, count: 0};
  }
}

function renderCard(c) {
  var unlocked = isCourseUnlocked(c);
  var prog = getCourseProgress(c);
  var statusBadge = c.free || c.ak === 'free'
    ? '<span class="card-badge badge-free">Gratuito</span>'
    : unlocked
      ? '<span class="card-badge badge-owned">Com Acesso</span>'
      : '<span class="card-badge badge-locked">🔒 Bloqueado</span>';
  var progColor   = prog.pct === 100 ? '#22c55e' : (c.color || '#4A7EFF');
  var progLabel   = prog.pct === 0 ? 'Não iniciado' : prog.pct === 100 ? 'Concluído' : prog.pct + '% concluído';
  var progValColor= prog.pct === 100 ? '#22c55e' : prog.pct > 0 ? (c.color||'#4A7EFF') : 'rgba(255,255,255,.25)';
  var onclick = unlocked
    ? 'onclick="window.location.href=\'' + c.file + '\'"'
    : 'onclick="showToast(\'🔒 Acesse os planos para desbloquear\')"';
  return '<div class="course-card' + (unlocked?'':' locked') + '" style="--card-color:' + (c.color||'#4A7EFF') + '" ' + onclick + '>'
    + '<div class="card-accent"></div>'
    + '<div class="card-body">'
    + '<div class="card-icon">' + (c.icon||'📚') + '</div>'
    + '<div class="card-info">'
    + '<span class="card-cat">' + (c.cat||'Curso') + '</span>'
    + '<span class="card-name">' + he(c.name) + '</span>'
    + '<span class="card-desc">' + he(c.desc||'') + '</span>'
    + '</div>'
    + statusBadge
    + '</div>'
    + '<div class="card-footer">'
    + '<div class="card-stats">'
    + '<span class="card-stat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' + (c.modules||1) + ' módulos</span>'
    + '<span class="card-stat"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>' + (c.topics||0) + ' tópicos</span>'
    + '<span class="card-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + (c.hours||1) + 'h</span>'
    + (c.quizzes ? '<span class="card-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' + c.quizzes + ' quizzes</span>' : '')
    + '</div>'
    + '<div class="card-prog-row">'
    + '<div class="card-prog-bar"><div class="card-prog-fill" style="width:' + prog.pct + '%;background:' + progColor + '"></div></div>'
    + '<span class="card-prog-val" style="color:' + progValColor + '">' + progLabel + '</span>'
    + '</div></div>'
    + (unlocked ? '<div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg></div>' : '')
    + (unlocked ? '' : '<div class="card-lock-overlay"><div class="lock-msg">🔒 Clique para ver planos</div></div>')
    + '</div>';
}

function he(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCursos(cursos) {
  if (!cursos || !cursos.length) {
    cursos = [];
  }
  
  var grid = document.getElementById('coursesGrid');

  // Garante cursos ativos
  cursos = cursos.filter(function(c) { return c.active !== false; });

  // ═══ ORDENA POR DATA — mais recentes primeiro ═══
  cursos.sort(function(a, b) { return (b.addedTs || 0) - (a.addedTs || 0); });

  // ═══ SEPARA: Notícias vs Cursos completos ═══
  var NEWS_CAT = 'Atualize-se! Notícias Mais Relevantes da Semana';
  var noticias = cursos.filter(function(c) { return c.cat === NEWS_CAT; });
  var cursosCompletos = cursos.filter(function(c) { return c.cat !== NEWS_CAT; });

  var html = '';
  var totalPct = 0, concluidos = 0, temBloqueado = false;

  function renderLista(lista) {
    var out = '';
    lista.forEach(function(c) {
      var prog = getCourseProgress(c);
      totalPct += prog.pct;
      if (prog.pct === 100) concluidos++;
      if (!isCourseUnlocked(c)) temBloqueado = true;
      out += renderCard(c);
    });
    return out;
  }

  if (noticias.length) {
    html += '<div class="section-divider"><span>Notícias & Atualidades</span></div>';
    html += renderLista(noticias);
  }

  if (cursosCompletos.length) {
    html += '<div class="section-divider"><span>Cursos Completos</span></div>';
    html += renderLista(cursosCompletos);
  }

  grid.innerHTML = html || '<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,.25);font-size:.8rem;">Nenhum curso disponível no momento.</div>';

  var avgPct = cursos.length ? Math.round(totalPct / cursos.length) : 0;
  document.getElementById('sumCursos').textContent = cursos.length;
  document.getElementById('sumConcluidos').textContent = concluidos;
  document.getElementById('sumProgFill').style.width = avgPct + '%';
}

// ══ MENU ══
function toggleMenu() {
  document.getElementById('menuDd').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menuDd').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('open');
}
function updateMenuUser() {
  var u = gU(), p = gP();
  var us = document.getElementById('menuUserSec');
  var as = document.getElementById('menuAuthSec');
  if (u) {
    if (us) us.innerHTML = '<div style="padding:0"><span class="ma-mu-name">' + he((u.name||u.email||'').split(' ')[0]) + '</span><div class="ma-mu-pts">' + (p.total||0).toLocaleString('pt-BR') + ' pontos</div></div>';
    if (as) as.innerHTML = '<button class="ma-mi red" onclick="doLogout()"><span class="ma-mi-icon">🚪</span>Sair</button>';
  } else {
    if (us) us.innerHTML = '<div><span class="ma-mu-name" style="color:rgba(255,255,255,.35)">Visitante</span></div>';
    if (as) as.innerHTML = '<a class="ma-mi" href="index.html"><span class="ma-mi-icon">🔑</span>Entrar</a>';
  }
}
function doLogout() {
  if (typeof MAStore !== 'undefined') { MAStore.logout(); return; }
  if (window.MA_AUTH) { MA_AUTH.logout().catch(function(){}); }
  localStorage.removeItem('ma_user');
  closeMenu();
  location.href = 'index.html';
}

// ══ TEMA ══
var _light = localStorage.getItem('ma_theme') === 'light';
function applyTheme() {
  document.body.classList.toggle('light', _light);
  document.getElementById('iconSun').style.display = _light ? 'block' : 'none';
  document.getElementById('iconMoon').style.display = _light ? 'none' : 'block';
}
function toggleTheme() { _light = !_light; localStorage.setItem('ma_theme', _light?'light':'dark'); applyTheme(); }

// ══ PONTOS ══
function updatePts() {
  var el = document.getElementById('maPtsNum');
  if (!el) return;
  var p = gP();
  var total = p.total || 0;
  el.textContent = total < 1000 ? String(total).padStart(3,'0') : total.toLocaleString('pt-BR');
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', function() {
  applyTheme();
  updatePts();
  updateMenuUser();
  
  // CARREGA CURSOS COM ATUALIZAÇÃO AUTOMÁTICA
  loadCoursesFromSources();
  
  // Recarrega a cada 30 segundos (você pode ajustar)
  AUTO_REFRESH_INTERVAL = setInterval(() => {
    loadCoursesFromSources();
  }, 30000);
  
  // Cleanup ao desmontar
  window.addEventListener('beforeunload', () => {
    if (REFRESH_TIMEOUT) clearTimeout(REFRESH_TIMEOUT);
    if (AUTO_REFRESH_INTERVAL) clearInterval(AUTO_REFRESH_INTERVAL);
  });
});
</script>
