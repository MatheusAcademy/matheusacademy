<html lang="pt-BR">
<head>

<!-- ═══ DADOS CENTRALIZADOS ═══ -->
<script src="data/courses.js"></script>
<script src="data/userStore.js"></script>
<script src="firebase-config.js"></script>
<script src="shared/time-tracker.js"></script>

<style>
:root{
  --bg:#08080f;--bg2:#0d0d1a;--bg3:#111122;--card:#0f0f1e;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.12);
  --pri:#4A7EFF;--neon:#00d4ff;
  --txt:#e8e8ef;--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.28);
  --grn:#22c55e;--orn:#f59e0b;--red:#ef4444;
  --font:'Outfit',sans-serif;--serif:'Playfair Display',serif;
  --topbar:56px;--bottombar:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden;}
::selection{background:var(--pri);color:#fff;}

/* ══ TOPBAR ══ */
.ma-topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:rgba(4,4,10,.99);
  border-bottom:1px solid rgba(91,127,255,.15);
  display:flex;align-items:center;padding:0 14px;gap:6px;
  z-index:9999;font-family:var(--font);
}
.ma-topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent 0%,#4A7EFF 30%,#00d4ff 65%,transparent 100%);
  opacity:.75;
}
.ma-tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.ma-tb-logo svg{display:block;flex-shrink:0;}
.ma-tb-sep{width:1px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0;}
.ma-tb-page-name{font-size:.64rem;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;}
.ma-tb-spacer{flex:1;min-width:0;}
.ma-tb-pts-block{
  display:flex;align-items:center;gap:7px;
  text-decoration:none;flex-shrink:0;
  padding:5px 12px 5px 10px;border-radius:22px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  transition:all .2s;cursor:pointer;
}
.ma-tb-pts-block:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08);}
.ma-tb-trophy{color:#f59e0b;display:flex;align-items:center;}
.ma-tb-trophy svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ma-tb-pts-num{font-size:.78rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
.ma-tb-theme-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#f59e0b;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding:0;
}
.ma-tb-theme-btn svg{width:15px;height:15px;stroke:currentColor;}
.ma-tb-theme-btn:hover{border-color:rgba(245,158,11,.4);}
.ma-tb-menu-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding:0;
}
.ma-tb-menu-btn svg{width:16px;height:16px;stroke:currentColor;pointer-events:none;}
.ma-tb-menu-btn:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.ma-menu-overlay{position:fixed;inset:0;z-index:10000;display:none;}
.ma-menu-overlay.open{display:block;}
.ma-menu-dd{
  position:fixed;top:62px;right:10px;
  background:#0f0f1e;border:1px solid #252540;border-radius:16px;
  min-width:240px;z-index:10001;
  box-shadow:0 16px 56px rgba(0,0,0,.75);overflow:hidden;
  opacity:0;transform:scale(.88) translateY(-12px);pointer-events:none;
  transition:all .22s cubic-bezier(.2,0,.3,1);transform-origin:top right;
}
.ma-menu-dd.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all;}
.ma-menu-user{padding:14px 16px 12px;border-bottom:1px solid #1e1e35;}
.ma-mu-name{font-size:.85rem;font-weight:700;color:#fff;display:block;margin-bottom:3px;}
.ma-mu-pts{font-size:.6rem;color:rgba(255,255,255,.35);}
.ma-menu-sec{padding:5px 0;}
.ma-menu-sec+.ma-menu-sec{border-top:1px solid #1e1e35;}
.ma-mi{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:.78rem;font-weight:600;color:#8888a8;text-decoration:none;cursor:pointer;border:none;background:transparent;font-family:var(--font);width:100%;text-align:left;transition:background .15s;}
.ma-mi:hover{background:#161628;color:#e8e8f0;}
.ma-mi-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0;}
.ma-mi.gold{color:#f59e0b;}.ma-mi.red{color:#ef4444;}

/* Tema claro */
body.light{--bg:#f5f5fb;--bg2:#eeeef8;--bg3:#e3e4f0;--card:#fff;--brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.12);--txt:#1a1a2e;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.28);}
body.light .ma-topbar{background:rgba(240,242,248,.99);}
body.light .ma-menu-dd{background:#fff;border-color:#d0d4e8;}
body.light .ma-menu-user{border-color:#e8eaf2;}
body.light .ma-mi{color:#5a5a7a;}
body.light .ma-mi:hover{background:#f0f2f8;color:#1a1a2e;}
body.light .ma-menu-sec+.ma-menu-sec{border-color:#e8eaf2;}

/* ══ HERO ══ */
.page-hero{
  padding:calc(var(--topbar) + 32px) 16px 24px;
  text-align:center;position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(74,126,255,.08) 0%,transparent 60%),var(--bg);
  pointer-events:none;
}
.hero-label{
  display:inline-block;
  font-size:.46rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--pri);margin-bottom:10px;position:relative;
}
.hero-label::before,.hero-label::after{
  content:'';display:inline-block;width:16px;height:1px;background:var(--pri);
  vertical-align:middle;opacity:.5;
}
.hero-label::before{margin-right:8px;}
.hero-label::after{margin-left:8px;}
.hero-title{
  font-family:var(--serif);font-size:clamp(1.4rem,4vw,1.8rem);
  font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.01em;
  margin-bottom:8px;position:relative;
}
body.light .hero-title{color:#0a0a1e;}
.hero-sub{font-size:.75rem;color:var(--txt2);max-width:380px;margin:0 auto;line-height:1.6;position:relative;}

/* ══ SUMMARY ══ */
.summary-bar{
  max-width:100%;margin:20px 0 0;padding:16px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;
}
.summary-stat{
  background:rgba(74,126,255,.08);
  border:1px solid rgba(74,126,255,.15);
  border-radius:12px;padding:12px 8px;text-align:center;
}
.summary-val{font-size:1.2rem;font-weight:900;color:#fff;display:block;line-height:1;}
body.light .summary-val{color:#0a0a1e;}
.summary-lbl{font-size:.42rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;display:block;}
.summary-prog{grid-column:1/-1;padding:0;}
.summary-prog-label{font-size:.42rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px;padding:0 16px;}
.summary-prog-bar{height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:0 16px;}
.summary-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pri),var(--neon));transition:width 1s ease;}

/* ══ MAIN GRID ══ */
.courses-grid{
  max-width:100%;margin:0;
  padding:0 12px calc(var(--bottombar) + 16px);
  display:flex;flex-direction:column;gap:0;
}

/* ══ SECTION HEADER ══ */
.section-divider{
  display:flex;align-items:center;gap:12px;
  padding:20px 4px 12px;
  margin-top:8px;
  border-bottom:2px solid var(--brd);
}
.section-divider span{
  font-size:.48rem;font-weight:800;color:var(--txt);
  text-transform:uppercase;letter-spacing:.1em;
  flex-shrink:0;
}
.section-divider::after{
  content:'';flex:1;height:1px;background:var(--brd);display:none;
}

/* ════════════════════════════════════════════════════════ */
/* ══  CARD LAYOUT — NOTÍCIAS (Tipo Feed/Jornal)  ═══ */
/* ════════════════════════════════════════════════════════ */

.news-card{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:12px;
  padding:12px;
  margin-bottom:8px;
  background:var(--card);
  border:1px solid var(--brd);
  border-radius:12px;
  cursor:pointer;
  transition:all .2s cubic-bezier(.2,0,.3,1);
  overflow:hidden;
  position:relative;
  border-left:4px solid;
}

.news-card:hover:not(.locked){
  border-color:var(--card-color);
  background:rgba(74,126,255,.04);
  transform:translateX(2px);
}

.news-card.locked{
  opacity:.5;
}

.news-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(var(--rgb-color),0) 0%,rgba(var(--rgb-color),.04) 100%);
  pointer-events:none;
}

.news-thumb{
  width:80px;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.2rem;
  flex-shrink:0;
  background:rgba(74,126,255,.12);
  border:1px solid rgba(74,126,255,.2);
  position:relative;
  z-index:1;
}

.news-content{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-width:0;
  position:relative;
  z-index:1;
}

.news-category{
  font-size:.42rem;
  font-weight:700;
  color:var(--txt3);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:2px;
}

.news-title{
  font-size:.85rem;
  font-weight:800;
  color:#fff;
  line-height:1.2;
  margin-bottom:4px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}

body.light .news-title{
  color:#0a0a1e;
}

.news-excerpt{
  font-size:.65rem;
  color:var(--txt2);
  line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  margin-bottom:6px;
}

.news-meta{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  font-size:.58rem;
  color:var(--txt3);
}

.news-stat{
  display:flex;
  align-items:center;
  gap:3px;
  white-space:nowrap;
}

.news-stat svg{
  width:12px;
  height:12px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.5;
  flex-shrink:0;
}

.news-badge{
  position:absolute;
  top:8px;
  right:8px;
  font-size:.48rem;
  font-weight:700;
  padding:3px 8px;
  border-radius:6px;
  background:rgba(34,197,94,.2);
  color:#22c55e;
  text-transform:uppercase;
  z-index:2;
}

.news-badge.locked{
  background:rgba(239,68,68,.2);
  color:#ef4444;
}

/* ════════════════════════════════════════════════════════ */
/* ══  CARD LAYOUT — CURSOS (Compacto)  ═══ */
/* ════════════════════════════════════════════════════════ */

.course-card{
  display:grid;
  grid-template-columns:70px 1fr;
  gap:12px;
  padding:12px;
  margin-bottom:8px;
  background:var(--card);
  border:1px solid var(--brd);
  border-radius:12px;
  cursor:pointer;
  transition:all .2s cubic-bezier(.2,0,.3,1);
  position:relative;
  border-left:4px solid;
  overflow:hidden;
}

.course-card:hover:not(.locked){
  border-color:var(--card-color);
  background:rgba(74,126,255,.04);
  transform:translateX(2px);
}

.course-card.locked{
  opacity:.55;
}

.course-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(var(--rgb-color),0) 0%,rgba(var(--rgb-color),.04) 100%);
  pointer-events:none;
}

.course-icon{
  width:70px;
  height:70px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  flex-shrink:0;
  background:rgba(74,126,255,.12);
  border:1px solid rgba(74,126,255,.2);
  position:relative;
  z-index:1;
}

.course-content{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-width:0;
  position:relative;
  z-index:1;
}

.course-category{
  font-size:.42rem;
  font-weight:700;
  color:var(--txt3);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:2px;
}

.course-name{
  font-size:.82rem;
  font-weight:800;
  color:#fff;
  line-height:1.2;
  margin-bottom:3px;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}

body.light .course-name{
  color:#0a0a1e;
}

.course-desc{
  font-size:.63rem;
  color:var(--txt2);
  line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:6px;
}

.course-stats{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:.56rem;
  color:var(--txt3);
}

.course-stat{
  display:flex;
  align-items:center;
  gap:3px;
  white-space:nowrap;
}

.course-stat svg{
  width:12px;
  height:12px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.5;
  flex-shrink:0;
}

.course-badge{
  position:absolute;
  top:8px;
  right:8px;
  font-size:.46rem;
  font-weight:700;
  padding:3px 8px;
  border-radius:6px;
  background:rgba(34,197,94,.2);
  color:#22c55e;
  text-transform:uppercase;
  z-index:2;
}

.course-badge.owned{
  background:rgba(74,126,255,.2);
  color:#4A7EFF;
}

.course-badge.locked{
  background:rgba(239,68,68,.2);
  color:#ef4444;
}

.course-progress{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:2px;
  background:rgba(255,255,255,.06);
  overflow:hidden;
}

.course-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--pri),var(--neon));
  transition:width .6s ease;
}

/* ══ TOAST ══ */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 15, 30, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #e8e8ef;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 0.72rem;
  z-index: 10001;
  backdrop-filter: blur(10px);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateX(-50%) translateY(20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

</style>

</head>

<!-- ══ HERO ══ -->
<div class="page-hero">
  <span class="hero-label">Biblioteca Digital</span>
  <h1 class="hero-title">Seus Cursos</h1>
  <p class="hero-sub">Expanda seus conhecimentos com a melhor plataforma</p>
  
  <div class="summary-bar">
    <div class="summary-stat">
      <span class="summary-val" id="sumCursos">0</span>
      <span class="summary-lbl">Disponíveis</span>
    </div>
    <div class="summary-stat">
      <span class="summary-val" id="sumConcluidos">0</span>
      <span class="summary-lbl">Concluídos</span>
    </div>
    <div class="summary-stat">
      <span class="summary-val" id="sumProgPct">0%</span>
      <span class="summary-lbl">Progresso</span>
    </div>
    <div class="summary-prog">
      <div class="summary-prog-bar"><div class="summary-prog-fill" id="sumProgFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- ══ GRID ══ -->
<div class="courses-grid" id="coursesGrid">
  <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,.25);font-size:.75rem;">⏳ Carregando cursos...</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════ */
/* ═══  SISTEMA DE ATUALIZAÇÃO AUTOMÁTICA EM TEMPO REAL  ═══ */
/* ═══════════════════════════════════════════════════════════════════════ */

let LAST_COURSES = null;
let AUTO_REFRESH_INTERVAL = null;

// Cores temáticas para as categorias de notícias
const CATEGORY_COLORS = {
  'Atualize-se! Notícias Mais Relevantes da Semana': '#ef4444',
};

function showToast(text) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

function hasCoursesChanged(newCourses) {
  if (!LAST_COURSES || !newCourses) return true;
  if (LAST_COURSES.length !== newCourses.length) return true;
  
  for (let i = 0; i < newCourses.length; i++) {
    const newC = newCourses[i];
    const oldC = LAST_COURSES.find(c => c.id === newC.id);
    
    if (!oldC || oldC.addedTs !== newC.addedTs || oldC.name !== newC.name) {
      return true;
    }
  }
  
  return false;
}

function loadCoursesFromSources() {
  let courses = [];
  
  if (typeof MA_COURSES !== 'undefined' && MA_COURSES && MA_COURSES.length) {
    courses = [...MA_COURSES];
  }
  
  if (typeof firebase !== 'undefined' && firebase.firestore) {
    try {
      const db = firebase.firestore();
      
      db.collection('courses')
        .where('active', '==', true)
        .onSnapshot(
          (snapshot) => {
            const firebaseCourses = [];
            snapshot.forEach((doc) => {
              const data = doc.data();
              firebaseCourses.push({
                id: data.id || doc.id,
                name: data.name,
                desc: data.desc,
                cat: data.cat,
                icon: data.icon,
                color: data.color,
                file: data.file,
                modules: data.modules,
                topics: data.topics,
                hours: data.hours,
                quizzes: data.quizzes,
                free: data.free,
                active: data.active,
                addedTs: data.addedTs || 0,
              });
            });
            
            const finalCourses = [...courses];
            firebaseCourses.forEach((fbCourse) => {
              const idx = finalCourses.findIndex(c => c.id === fbCourse.id);
              if (idx >= 0) {
                finalCourses[idx] = fbCourse;
              } else {
                finalCourses.push(fbCourse);
              }
            });
            
            if (hasCoursesChanged(finalCourses)) {
              LAST_COURSES = finalCourses;
              renderCursos(finalCourses);
            }
          },
          (error) => {
            console.log('Firebase listener error:', error);
            if (courses.length > 0) {
              renderCursos(courses);
            }
          }
        );
    } catch (e) {
      console.log('Firebase not configured, using static data');
      if (courses.length > 0) {
        renderCursos(courses);
      }
    }
  } else {
    if (courses.length > 0) {
      renderCursos(courses);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════

function gU() { return (MAStore && MAStore.getCurrentUser && MAStore.getCurrentUser()) || null; }
function gP() { return (MAStore && MAStore.getPoints && MAStore.getPoints()) || {total: 0}; }

function isCourseUnlocked(c) {
  if (c.free === true || c.ak === 'free') return true;
  var u = gU();
  if (!u) return false;
  if (MAStore && MAStore.hasCourseAccess) return MAStore.hasCourseAccess(c.ak || (c.id + '_access'));
  return (u.courses||[]).indexOf(c.id||c.ak) >= 0;
}

function getCourseProgress(c) {
  if (!c.id) return {pct: 0, count: 0};
  var stored = localStorage.getItem('ma_prog_' + c.id);
  if (!stored) return {pct: 0, count: 0};
  try {
    var p = JSON.parse(stored);
    var mods = (c.modules || 1);
    var done = p.done || 0;
    var pct = mods ? Math.round((done / mods) * 100) : 0;
    return {pct: Math.min(pct, 100), count: done};
  } catch (e) {
    return {pct: 0, count: 0};
  }
}

// Renderiza card de NOTÍCIA (estilo jornal)
function renderNewsCard(c) {
  var unlocked = isCourseUnlocked(c);
  var color = CATEGORY_COLORS[c.cat] || '#ef4444';
  var badge = c.free ? 'GRATUITO' : (unlocked ? 'COM ACESSO' : '🔒 BLOQUEADO');
  var badgeClass = c.free ? '' : (unlocked ? '' : 'locked');
  var onclick = unlocked
    ? 'onclick="window.location.href=\'' + c.file + '\'"'
    : 'onclick="showToast(\'🔒 Acesse os planos para desbloquear\')"';
  
  return '<div class="news-card' + (unlocked?'':' locked') + '" style="--card-color:' + color + ';border-left-color:' + color + ';" ' + onclick + '>'
    + '<div class="news-thumb">' + (c.icon||'📰') + '</div>'
    + '<div class="news-content">'
    + '<div>'
    + '<div class="news-category">📰 ' + (c.cat||'Notícia') + '</div>'
    + '<div class="news-title">' + he(c.name) + '</div>'
    + '<div class="news-excerpt">' + he((c.desc||'').substring(0, 100)) + '...</div>'
    + '</div>'
    + '<div class="news-meta">'
    + '<span class="news-stat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' + (c.modules||1) + ' mód</span>'
    + '<span class="news-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + (c.hours||1) + 'h</span>'
    + '<span class="news-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' + (c.quizzes||0) + 'q</span>'
    + '</div>'
    + '</div>'
    + '<div class="news-badge' + (badgeClass ? ' ' + badgeClass : '') + '">' + badge + '</div>'
    + '</div>';
}

// Renderiza card de CURSO (compacto)
function renderCourseCard(c) {
  var unlocked = isCourseUnlocked(c);
  var prog = getCourseProgress(c);
  var badge = c.free ? 'GRATUITO' : (unlocked ? 'COM ACESSO' : '🔒 BLOQUEADO');
  var badgeClass = c.free ? '' : (unlocked ? 'owned' : 'locked');
  var onclick = unlocked
    ? 'onclick="window.location.href=\'' + c.file + '\'"'
    : 'onclick="showToast(\'🔒 Acesse os planos para desbloquear\')"';
  
  return '<div class="course-card' + (unlocked?'':' locked') + '" style="--card-color:' + (c.color||'#4A7EFF') + ';border-left-color:' + (c.color||'#4A7EFF') + ';" ' + onclick + '>'
    + '<div class="course-icon">' + (c.icon||'📚') + '</div>'
    + '<div class="course-content">'
    + '<div>'
    + '<div class="course-category">' + (c.cat||'Curso') + '</div>'
    + '<div class="course-name">' + he(c.name) + '</div>'
    + '<div class="course-desc">' + he((c.desc||'').substring(0, 80)) + '</div>'
    + '</div>'
    + '<div class="course-stats">'
    + '<span class="course-stat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' + (c.modules||1) + '</span>'
    + '<span class="course-stat"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>' + (c.topics||0) + '</span>'
    + '<span class="course-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + (c.hours||1) + 'h</span>'
    + '</div>'
    + '</div>'
    + '<div class="course-badge' + (badgeClass ? ' ' + badgeClass : '') + '">' + badge + '</div>'
    + '<div class="course-progress"><div class="course-progress-fill" style="width:' + prog.pct + '%"></div></div>'
    + '</div>';
}

function he(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCursos(cursos) {
  if (!cursos || !cursos.length) cursos = [];
  
  var grid = document.getElementById('coursesGrid');
  cursos = cursos.filter(function(c) { return c.active !== false; });
  cursos.sort(function(a, b) { return (b.addedTs || 0) - (a.addedTs || 0); });

  var NEWS_CAT = 'Atualize-se! Notícias Mais Relevantes da Semana';
  var noticias = cursos.filter(function(c) { return c.cat === NEWS_CAT; });
  var cursosCompletos = cursos.filter(function(c) { return c.cat !== NEWS_CAT; });

  var html = '';
  var totalPct = 0, concluidos = 0;

  // Renderiza notícias com renderNewsCard
  if (noticias.length) {
    html += '<div class="section-divider"><span>📰 Notícias em Destaque</span></div>';
    noticias.forEach(function(c) {
      html += renderNewsCard(c);
    });
  }

  // Renderiza cursos com renderCourseCard
  if (cursosCompletos.length) {
    html += '<div class="section-divider"><span>📚 Cursos Disponíveis</span></div>';
    cursosCompletos.forEach(function(c) {
      var prog = getCourseProgress(c);
      totalPct += prog.pct;
      if (prog.pct === 100) concluidos++;
      html += renderCourseCard(c);
    });
  }

  grid.innerHTML = html || '<div style="text-align:center;padding:40px 0;color:rgba(255,255,255,.25);font-size:.75rem;">Nenhum curso disponível no momento.</div>';

  var totalCursos = cursosCompletos.length;
  var avgPct = totalCursos ? Math.round(totalPct / totalCursos) : 0;
  document.getElementById('sumCursos').textContent = totalCursos;
  document.getElementById('sumConcluidos').textContent = concluidos;
  document.getElementById('sumProgPct').textContent = avgPct + '%';
  document.getElementById('sumProgFill').style.width = avgPct + '%';
}

// ══ MENU ══
function toggleMenu() {
  document.getElementById('menuDd').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menuDd').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('open');
}
function updateMenuUser() {
  var u = gU(), p = gP();
  var us = document.getElementById('menuUserSec');
  var as = document.getElementById('menuAuthSec');
  if (u) {
    if (us) us.innerHTML = '<div style="padding:0"><span class="ma-mu-name">' + he((u.name||u.email||'').split(' ')[0]) + '</span><div class="ma-mu-pts">' + (p.total||0).toLocaleString('pt-BR') + ' pontos</div></div>';
    if (as) as.innerHTML = '<button class="ma-mi red" onclick="doLogout()"><span class="ma-mi-icon">🚪</span>Sair</button>';
  } else {
    if (us) us.innerHTML = '<div><span class="ma-mu-name" style="color:rgba(255,255,255,.35)">Visitante</span></div>';
    if (as) as.innerHTML = '<a class="ma-mi" href="index.html"><span class="ma-mi-icon">🔑</span>Entrar</a>';
  }
}
function doLogout() {
  if (typeof MAStore !== 'undefined') { MAStore.logout(); return; }
  if (window.MA_AUTH) { MA_AUTH.logout().catch(function(){}); }
  localStorage.removeItem('ma_user');
  closeMenu();
  location.href = 'index.html';
}

// ══ TEMA ══
var _light = localStorage.getItem('ma_theme') === 'light';
function applyTheme() {
  document.body.classList.toggle('light', _light);
  document.getElementById('iconSun').style.display = _light ? 'block' : 'none';
  document.getElementById('iconMoon').style.display = _light ? 'none' : 'block';
}
function toggleTheme() { _light = !_light; localStorage.setItem('ma_theme', _light?'light':'dark'); applyTheme(); }

// ══ PONTOS ══
function updatePts() {
  var el = document.getElementById('maPtsNum');
  if (!el) return;
  var p = gP();
  var total = p.total || 0;
  el.textContent = total < 1000 ? String(total).padStart(3,'0') : total.toLocaleString('pt-BR');
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', function() {
  applyTheme();
  updatePts();
  updateMenuUser();
  
  loadCoursesFromSources();
  
  AUTO_REFRESH_INTERVAL = setInterval(() => {
    loadCoursesFromSources();
  }, 30000);
  
  window.addEventListener('beforeunload', () => {
    if (AUTO_REFRESH_INTERVAL) clearInterval(AUTO_REFRESH_INTERVAL);
  });
});
</script>

</body>
</html>
