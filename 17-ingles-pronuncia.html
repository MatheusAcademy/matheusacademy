        dur: '25 min',
        content: `<h3>Dominando o Alfabeto Fonético Internacional (IPA)</h3>
<p>O IPA (International Phonetic Alphabet) é o sistema padrão para representar sons da fala. Aprender IPA é fundamental para pronunciar qualquer palavra corretamente, independente de como é escrita. Em inglês, existe uma grande discrepância entre ortografia e pronúncia — não dá para adivinhar!</p>
<h4>Por que IPA é Essencial?</h4>
<p>A palavra "read" tem duas pronunciações diferentes dependendo do tempo verbal: /riːd/ (presente) e /red/ (passado). Sem IPA, você ficaria confuso! O IPA remove essa ambiguidade. Veja como dicionários modernos sempre incluem a pronúncia em IPA ao lado das palavras.</p>
<h4>Consoantes Principais do Inglês</h4>
<p><strong>/p/ — pat, happy, stop</strong> — Plosivo bilabial desvozeado. Feche os lábios e libere ar explosivamente.</p>
<p><strong>/b/ — bat, about, club</strong> — Plosivo bilabial vozeado. Como /p/, mas com vibração vocal (sinta sua garganta vibrar).</p>
<p><strong>/t/ — tap, water, cat</strong> — Plosivo alveolar desvozeado. Toque a língua atrás dos dentes superiores.</p>
<p><strong>/d/ — dog, middle, bad</strong> — Plosivo alveolar vozeado. Como /t/, mas com vibração vocal.</p>
<p><strong>/k/ — kite, cooking, back</strong> — Plosivo velar desvozeado. Levante o dorso da língua para o fundo da boca.</p>
<p><strong>/g/ — goat, going, big</strong> — Plosivo velar vozeado. Como /k/, mas com vibração vocal.</p>
<h4>Consoantes Fricativas</h4>
<p><strong>/f/ — fan, coffee, half</strong> — Fricativa labiodental desvozeada. Morda levemente o lábio inferior e deixe ar passar.</p>
<p><strong>/v/ — van, love, give</strong> — Fricativa labiodental vozeada. Como /f/, mas com vibração vocal.</p>
<p><strong>/θ/ — think, thanks, month</strong> — Fricativa interdental desvozeada. Coloque a língua levemente entre os dentes.</p>
<blockquote class="tip">
DICA: /θ/ (th desvozeado) é um som muito cômodo para falantes de português. Pratique com "think", "thank", "thirsty".
</blockquote>
<p><strong>/ð/ — this, that, mother</strong> — Fricativa interdental vozeada. Como /θ/, mas com vibração vocal. Este som é ainda mais natural!</p>
<p><strong>/s/ — sun, sit, face</strong> — Fricativa alveolar desvozeada. Deixe ar passar entre a língua e a crista alveolar (atrás dos dentes).</p>
<p><strong>/z/ — zoo, plays, easy</strong> — Fricativa alveolar vozeada. Como /s/, mas com vibração vocal.</p>
<p><strong>/ʃ/ — ship, fish, station</strong> — Fricativa pós-alveolar desvozeada. Semelhante a um "sshhh" para pedir silêncio.</p>
<p><strong>/ʒ/ — vision, pleasure, measure</strong> — Fricativa pós-alveolar vozeada. Como /ʃ/, mas com vibração vocal. Raro em português!</p>
<p><strong>/h/ — hat, house, behind</strong> — Fricativa glotal desvozeada. Apenas deixe ar passar pela garganta, sem obstáculos.</p>
<h4>Consoantes Africadas</h4>
<p><strong>/tʃ/ — chip, church, watch</strong> — Africada pós-alveolar desvozeada. Começa como /t/, termina como /ʃ/.</p>
<p><strong>/dʒ/ — judge, large, bridge</strong> — Africada pós-alveolar vozeada. Começa como /d/, termina como /ʒ/.</p>
<h4>Consoantes Nasais</h4>
<p><strong>/m/ — make, come, home</strong> — Nasal bilabial. Feche os lábios e deixe ar passar pela nariz.</p>
<p><strong>/n/ — name, on, green</strong> — Nasal alveolar. Toque a língua no alveolo e deixe ar passar pela nariz.</p>
<p><strong>/ŋ/ — sing, thing, coming</strong> — Nasal velar. Levante o dorso da língua e deixe ar passar pela nariz. Não existe em português!</p>
<blockquote class="example">
PRÁTICA: "sing" (/sɪŋ/) vs "sin" (/sɪn/). Repita alternando: o /ŋ/ é mais profundo, enquanto /n/ é mais frontal.
</blockquote>
<h4>Aproximantes e Laterais</h4>
<p><strong>/l/ — light, letter, all</strong> — Lateral alveolar. Toque a língua no alveolo e deixe ar passar pelos lados.</p>
<p><strong>/r/ — red, very, car</strong> — Aproximante pós-alveolar. Não é como o "r" português! A língua não toca em nada; apenas levante um pouco a ponta.</p>
<blockquote class="tip">
DICA CRUCIAL: O /r/ inglês é muito diferente do português. Não bata a língua contra os dentes. Posicione a boca como em um "oo" e levante a ponta da língua sem tocar em nada. Pratique com "red", "very", "car".
</blockquote>
<p><strong>/j/ — yes, you, beyond</strong> — Aproximante palatal. Como um "y" suave no início da sílaba.</p>
<p><strong>/w/ — we, was, away</strong> — Aproximante labializado. Arredonde os lábios e deixe ar passar.</p>`,

        content: `<h3>Sistema Vocálico Completo do Inglês</h3>
<p>O inglês possui mais sons vocálicos que o português. Enquanto o português tem cerca de 5 vogais principais, o inglês tem mais de 14 sons vocálicos distintos! Dominar essas vogais é crucial para uma pronúncia inteligível.</p>
<h4>Vogais Monoftongas (Simples)</h4>
<p><strong>/ɪ/ — kit, sit, fish</strong> — Vogal anterior central alta. Semelhante ao "i" português, mas um pouco mais relaxada. Não é tão fechada como /iː/.</p>
<p><strong>/iː/ — see, feel, green</strong> — Vogal anterior central alta longa. Mais fechada e alongada que /ɪ/. Repita o som: "seeee".</p>
<p><strong>/e/ — bed, get, seven</strong> — Vogal anterior central média. Semelhante ao "é" português aberto.</p>
<p><strong>/æ/ — cat, hand, dad</strong> — Vogal anterior baixa. Abra bem a boca, entre "a" e "é". Este som não existe bem em português!</p>
<blockquote class="example">
PRÁTICA: "cat" (/kæt/) vs "cot" (/kɑːt/). A diferença é sutil mas importante. "Cat" tem a vogal mais aberta e anterior.
</blockquote>
<p><strong>/ɑː/ — car, father, start</strong> — Vogal posterior baixa longa. Abra bem a boca, como um "a" forte português, mas alongado.</p>
<p><strong>/ɔː/ — dog, thought, long</strong> — Vogal posterior média longa. Entre "ó" e "ô" português, mas alongado.</p>
<p><strong>/ʊ/ — book, look, good</strong> — Vogal posterior central alta. Mais relaxada que /uː/. Não é tão fechada.</p>
<p><strong>/uː/ — food, moon, blue</strong> — Vogal posterior central alta longa. Bem fechada e alongada, como "u" português.</p>
<p><strong>/ʌ/ — but, cup, love</strong> — Vogal central média. Muito importante! Tem som de "a" bem fraco. Pratique: "but" (não "bat").</p>
<p><strong>/ə/ — about, sofa, letter</strong> — Schwa — a vogal mais comum em inglês! Ocorre em sílabas átonas. Som neutro, muito reduzido.</p>
<h4>Ditongos (Duas Vogais Combinadas)</h4>
<p><strong>/eɪ/ — make, day, say</strong> — Começa como /e/, termina como /ɪ/. Som como "ei" em português, mas mais longo: "meiik".</p>
<p><strong>/aɪ/ — like, my, time</strong> — Começa como /a/, termina como /ɪ/. Som como "ai" português: "laiik".</p>
<p><strong>/ɔɪ/ — boy, noise, oil</strong> — Começa como /ɔː/, termina como /ɪ/. Som como "oi" português: "boiz".</p>
<p><strong>/oʊ/ — go, home, know</strong> — Começa como /o/, termina como /ʊ/. Som como "ou" português, mas com transição suave: "gou".</p>
<p><strong>/aʊ/ — house, now, out</strong> — Começa como /a/, termina como /ʊ/. Som como "au" português: "haus".</p>
<p><strong>/ɪə/ — ear, near, beer</strong> — Começa como /ɪ/, termina como /ə/. Som tipo "ia": "iər".</p>
<p><strong>/eə/ — care, hair, air</strong> — Começa como /e/, termina como /ə/. Som tipo "ea": "kɛər".</p>
<p><strong>/ʊə/ — poor, tour, sure</strong> — Começa como /ʊ/, termina como /ə/. Som tipo "ua": "pʊr".</p>
<h4>Minimal Pairs para Praticar</h4>
<blockquote class="tip">
Minimal pairs são palavras que diferem em apenas um som. São excelentes para praticar discriminação e produção de sons.
</blockquote>
<ul>
<li>/ɪ/ vs /iː/: "sit" vs "seat", "kit" vs "keep"</li>
<li>/e/ vs /æ/: "bed" vs "bad", "send" vs "sand"</li>
<li>/ɑː/ vs /ɔː/: "car" vs "caw", "heart" vs "bought"</li>
<li>/ʊ/ vs /uː/: "look" vs "Luke", "book" vs "boot"</li>
<li>/ʌ/ vs /ɑː/: "but" vs "bar", "cup" vs "car"</li>
</ul>`,
        cards: [

        name: 'Stress (Acento Tônico) e Intonação',
        dur: '20 min',
        content: `<h3>Dominar o Ritmo e a Musicalidade do Inglês</h3>
<p>O inglês é uma língua com ritmo acentual forte. Ao contrário do português, que tem um ritmo mais silábico, o inglês enfatiza sílabas específicas e negligencia outras. Dominar stress e intonação transforma sua pronúncia de "estrangeiro" para "natural".</p>
<h4>Word Stress (Acento Tônico em Palavras)</h4>
<p>Cada palavra em inglês tem uma sílaba tônica — a que você pronuncia mais longa, mais alta, mais forte. As outras sílabas ficam reduzidas e rápidas.</p>
<blockquote class="example">
EXEMPLO: "PREsent" (presente/regalo) vs "preSENT" (apresentar). A mesma ortografia, pronuncia diferente dependendo da sílaba tônica!
</blockquote>
<h4>Padrões Comuns de Stress</h4>
<p><strong>Nomes:</strong> Geralmente o stress vem na primeira sílaba.</p>
<ul>
<li>"TAble" /ˈteɪbəl/</li>
<li>"COMputer" /kəmˈpjuːtər/</li>
<li>"STUdent" /ˈstjuːdənt/</li>
</ul>
<p><strong>Verbos:</strong> Frequentemente diferem dos nomes correspondentes.</p>
<ul>
<li>PREsent (noun) vs preSENT (verb)</li>
<li>"REcord" (noun) vs "reCORD" (verb)</li>
<li>"OBject" (noun) vs "obJECT" (verb)</li>
</ul>
<p><strong>Palavras com Sufixos:</strong> O stress frequentemente vai para a sílaba antes do sufixo.</p>
<ul>
<li>"ciTIzen" (stem + -zen)</li>
<li>"inFORmation" (stem + -tion)</li>
<li>"COMfortable" (note: COM é tônica em AmE, COM-for em BrE)</li>
</ul>
<h4>Sentence Stress e Intonação</h4>
<p>Além do stress em palavras individuais, há também stress em nível de sentença. Palavras importantes recebem ênfase; palavras funcionais ficam reduzidas.</p>
<blockquote class="example">
"I WENT to the STORE and BOUGHT some MILK" — As palavras em maiúscula recebem ênfase. Artigos, preposições, conjunções ficam rápidos e reduzidos.
</blockquote>
<h4>Padrões de Intonação</h4>
<p><strong>Declarativas:</strong> Intonação desce no final.</p>
<p>I LIKE coFFEE. ↓</p>
<p><strong>Perguntas Fechadas (Yes/No):</strong> Intonação sobe no final.</p>
<p>Do you LIKE coFFEE? ↑</p>
<p><strong>Perguntas Abertas:</strong> Intonação desce no final (como declarativas).</p>
<p>What do you LIKE? ↓</p>
<p><strong>Listas:</strong> Sobe em itens intermediários, desce no final.</p>
<p>I like coFFEE, TEA, and JUice. ↑ ↑ ↓</p>
<h4>Reduced Forms e Connected Speech</h4>
<p>Falantes nativos não pronunciam cada palavra isoladamente. Eles reduzem e conectam sons:</p>
<ul>
<li>"Going to" → "gonna" /ɡɑnə/</li>
<li>"Want to" → "wanna" /wɑnə/</li>
<li>"Did you" → "didja" /dɪdʒə/</li>
<li>"What are you doing" → "Whaddya doin'?" /wɑdʒə duːɪŋ/</li>
</ul>
<p>Entender essas reduções é crucial para compreender falantes nativos e soar natural você mesmo!</p>`,
