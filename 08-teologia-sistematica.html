  {
    id:'ts_mod1', name:'Fundamentos da Teologia Sistemática', free:true,
    topics:[
      {id:1, name:'O que é Teologia Sistemática', dur:'15 min', content:`<h3>O que é Teologia Sistemática</h3><p>Teologia sistemática é a tentativa de organizar de forma coerente, lógica e comprehensiva as doutrinas reveladas na Escritura. O termo "sistemática" não implica que a teologia cristã é construída como um sistema lógico fechado, mas que buscamos entender como as diversas doutrinas da fé cristã inter-relacionam-se e coexistem sem contradição. Enquanto que a teologia bíblica pode ser temática (explorando um tópico através de toda a Escritura) ou histórica (traçando o desenvolvimento de doutrinas ao longo da história), a teologia sistemática é organizada por loci (lugares) doutrinários — Deus, Cristo, Espírito Santo, Salvação, Igreja, Escatologia — e dentro de cada locus procura responder às grandes questões que humanos sempre fizeram.</p><p>A necessidade da teologia sistemática surge desde cedo na história da Igreja. Já no século II, figuras como Irineu de Lyon buscavam refutar heresias apresentando uma visão coerente da revelação bíblica. No século III, Orígenes iniciou uma abordagem mais filosófica e sistemática à verdade cristã. Durante a Escolástica Medieval, Tomás de Aquino compilou a Summa Theologiae — uma obra monumental que tenta sintetizar toda verdade bíblica numa estrutura lógica. A Reforma trouxe novas necessidades sistemáticas. A Institutas da Religião Cristã de Calvino é uma obra de teologia sistemática clássica. Mesmo contemporaneamente, teólogos pentecostais como Horton e Stronstad têm contribuído sistematizações teológicas das doutrinas pentecostais.</p><p>É importante compreender que a teologia sistemática não é meramente exercício acadêmico. 2 Timóteo 2:2 instrui: "E o que de mim ouviste entre muitas testemunhas, confia-o a homens fiéis, que sejam também capazes de ensinar a outros". A Igreja é responsável por guardar, ensinar e transmitir fielmente as doutrinas recebidas. Isto requer articulação clara e sistemática. Um jovem cristão com perguntas precisas sobre Deus, salvação e vida eterna merece respostas precisas, não evasivas. A teologia sistemática serve este propósito.</p><blockquote class="tip"><strong>Princípio Hermenêutico Crucial:</strong> A teologia sistemática não é leitura de "pensamentos" humanos no texto bíblico. Deve ser sempre accountable à Escritura. Qualquer sistema teológico que contradiz a revelação clara bíblica é falso, não importa quão logicamente coerente seja. Tito 1:9 ordena aos líderes que "retenham a palavra fiel, que é conforme a doutrina, para que sejam capazes tanto de exortar com sã doutrina como de convencer aos contradizentes".</blockquote><h4>Os Loci Principais da Teologia Sistemática</h4><p>Teólogos tradicionais organizaram a teologia sistemática em vários loci principais. A Prolegômena (introdução) trata questões sobre a própria teologia — como conhecemos Deus, a autoridade da Bíblia, a natureza da revelação. A Teologia Própria trata da natureza, atributos e ações de Deus. A Cristologia estuda a pessoa e obra de Cristo. A Pneumatologia examina a doutrina do Espírito Santo. A Soteriologia (doutrina da salvação) investiga como as pessoas são salvas. A Eclesiologia estuda a natureza e função da Igreja. A Escatologia, conforme abordado no módulo anterior, trata dos últimos tempos. Alguns adicionam Antropologia (teologia da humanidade) e Pecadologia (teologia do pecado). Outros adicionam Demonologia (teologia dos demônios e guerra espiritual), especialmente relevante para pneumatologia pentecostal.</p><p>Dentro de cada locus há sub-questões importantes. Na Cristologia, por exemplo: Como Cristo é tanto completamente Deus quanto completamente humano? Como Sua morte propicia salvação? Como entender Sua ressurreição e ascensão? Na Soteriologia: Como é que a graça de Deus se relaciona com a liberdade humana? O que é fé e como ela se relaciona com obras? Como é que a predestinação divina coexiste com escolha humana? Estas não são questões meramente especulativas. Têm implicações práticas profundas para vida cristã e missão.</p>`, cards:[{q:"O que significa o termo 'loci' em teologia sistemática?",a:"Significa 'lugares' — tópicos ou categorias doutrinárias em que a teologia é organizada."}]},
      {id:2, name:'Os Atributos de Deus: Incomunicáveis e Comunicáveis', dur:'15 min', content:`<h3>Os Atributos de Deus: Incomunicáveis e Comunicáveis</h3><p>Um dos tópicos centrais da teologia sistemática é a natureza dos atributos de Deus. Um atributo é uma qualidade ou propriedade essencial de Deus. Teólogos tradicionais distinguem entre atributos incomunicáveis (aqueles únicos a Deus) e atributos comunicáveis (aqueles que em forma limitada humanos podem participar). Os atributos incomunicáveis de Deus incluem: Aseidade (auto-existência absoluta), Eteridade (não limitado pelo tempo), Oniescência (conhecimento de todas as coisas), Onipotência (poder ilimitado), Onipresença (presença em todos os lugares), Imutabilidade (não sofre mudança), e Incomprehensibilidade (não pode ser completamente compreendido pela mente finita).</p><p>A aseidade de Deus significa que Deus não depende de nada externo a Si mesmo para existência. Êxodo 3:14 reflete isto quando Deus declara: "EU SOU O QUE SOU" — Deus é ser auto-subsistente. Isto o diferencia fundamentalmente de toda criação, que é contingente (depende de causas externas). A eteridade significa que Deus transcende tempo. Enquanto que nós experimentamos tempos sequencialmente (passado, presente, futuro), Deus vê toda a eternidade numa visão perpétua. 2 Pedro 3:8 afirma: "Mas, amados, não ignoreis uma coisa: que um dia para o Senhor é como mil anos, e mil anos como um dia". Isto não significa que Deus simplesmente vive para sempre (isso seria imortalidade eterna), mas que Ele está fundamentalmente fora da dimensão temporal.</p><p>A onisciência de Deus é que Ele conhece todas as coisas — passado, presente e futuro — simultaneamente. Isto criou uma tensão teológica clássica: Como pode Deus conhecer o futuro se humanos têm liberdade genuína? Se Deus sabe que vou pecar, posso genuinamente não pecar? Diferentes tradições teológicas responderam diferentemente. Os calvinistas afirmam que Deus não apenas conhece o futuro mas predestina tudo. Os arminianos afirmam que Deus conhece o futuro contingente (o que livremente ocorrerá) sem determinar que deva ocorrer. Ambos concordam que Deus é onisciente; eles diferem em como relacionam onisciência com livre arbítrio.</p><blockquote class="example"><strong>Atributos Comunicáveis:</strong> Em contraste com os atributos incomunicáveis que são únicos a Deus, há atributos que humanos, criados à imagem de Deus, podem possuir em forma limitada. Estes incluem: Sabedoria (Provérbios 9:10 — "O temor do SENHOR é o princípio da sabedoria"), Justiça (Gênesis 1:27 — criados à imagem de Deus, refletimos Seu caráter justo), Misericórdia (Lucas 6:36 — "Sede, pois, misericordiosos, como também é misericordioso o vosso Pai"), Amor (1 João 4:8 — "Deus é amor"), Santidade (1 Pedro 1:15-16 — "mas, como é santo aquele que vos chamou, sede vós também santos em toda a vossa maneira de viver"). Esta distinção é teologicamente importante porque afirma tanto a transcendência de Deus quanto a possibilidade de comunhão e semelhança entre Deus e humanos.</blockquote><h4>Implicações da Natureza de Deus</h4><p>Compreender os atributos de Deus tem implicações práticas profundas. Se Deus é eterno e onisciente, então Suas promessas são absolutamente confiáveis. Não pode haver variação ou arrependimento em Deus (Hebreus 13:8 — "Jesus Cristo, ontem e hoje, e eternamente"). Se Deus é onipotente, nada está além de Seu controle ou capacidade. Isto não significa que Deus causa tudo — Ele permitiu liberdade genuína — mas significa que nada em última análise surpreende Deus ou frustra Seu propósito. Se Deus é santo e justamente justo, então Seu julgamento é perfeitamente reto. Aqueles que sofrem injustiça temporária nesta vida podem confiar que Deus ultimately fará justiça.</p><p>A imutabilidade de Deus não significa que Deus é insensível ou impassível. Deus responde genuinamente à oração e arrependimento humanos (vide Êxodo 32:14 onde Deus Se "arrepende" da calamidade que planejava trazer). Mas significa que Deus não muda em Seu caráter fundamental. Sua santidade não se torna imoralidade; Seu amor não se torna ódio. Malaquias 3:6 afirma: "Porque eu, o SENHOR, não mudo; por isso vós, filhos de Jacó, não sois consumidos". A imutabilidade de Deus é confortadora — oferece estabilidade absoluta num universo que constantemente muda.</p>`, cards:[{q:"Qual é a diferença entre um atributo 'incomunicável' e um 'comunicável' de Deus?",a:"Incomunicáveis são únicos a Deus (como aseidade); comunicáveis podem ser participados por humanos em forma limitada (como amor e justiça)."}]},
      {id:3, name:'A Doutrina da Trindade', dur:'15 min', content:`<h3>A Doutrina da Trindade</h3><p>A Trindade é talvez a doutrina mais complicada e paradoxal da teologia cristã. Afirma que Deus é uma essência (substância) mas três pessoas — Pai, Filho e Espírito Santo. Não é tritheísmo (três deuses) nem modalismo (um Deus com três modos de existência). É uma afirmação que dentro da unidade essencial de Deus há uma distinção genuína de três pessoas coeternas e consubstanciais. Mateus 28:19 reflete isto: "Portanto ide, fazei discípulos de todas as nações, batizando-os em nome do Pai, e do Filho, e do Espírito Santo". O uso singular "nome" combinado com três pessoas é gramaticalmente significativo.</p><p>A palavra "Trindade" (do latim "trinitas") não aparece na Bíblia, mas a doutrina é desenvolvida ao longo da Escritura. O Novo Testamento consistentemente apresenta o Pai como Deus, o Filho como Deus (João 1:1, Colossenses 2:9), e o Espírito Santo como Deus (Atos 5:3-4). Simultaneamente, há Deus (João 17:3) — um singular "Deus único verdadeiro". Como reconciliar isto? A resposta foi a doutrina da Trindade desenvolvida pelos Pais da Igreja, particularmente nos Concílios de Niceia (325 d.C.) e Constantinopla (381 d.C.).</p><p>A formulação clássica usa terminologia filosófica grega. "Ousia" (substância/essência) refere-se àquilo que faz Deus ser Deus — a divindade partilhada por Pai, Filho e Espírito. "Hypostasis" (subsistência/pessoa) refere-se às distinções reais entre as três pessoas. Todas as três pessoas compartilham a mesma ousia (essência), mas são hypostasis distintas (pessoas distintas). Cada pessoa possui a plenitude dos atributos divinos e realiza operações divinas, mas cada pessoa executa certos papéis específicos na economia da salvação.</p><blockquote class="quote"><strong>Mistério da Fé:</strong> É importante reconhecer que a Trindade, embora ensinada na Escritura, permanece um mistério genuíno da fé que transcende a compreensão racional. 1 Timóteo 3:16 afirma: "E, sem dúvida alguma, grande é o mistério da piedade: Aquele que foi manifestado em carne...". A Trindade não é irracional, mas transrracional — não pode ser derivada meramente de lógica mas é revelação divina. Muitas analogias (água em três estados, raio de luz com três partes) têm sido propostas, mas todas falham em alguma medida em comunicar o mistério. Talvez isto seja apropriado — se pudéssemos completamente racionalizar Deus, Ele não seria Deus.</blockquote><h4>Funções das Três Pessoas na Salvação</h4><p>Embora as três pessoas da Trindade são coiguais e coeternas, as Escrituras descrevem funções distintas na obra da salvação. O Pai é tradicionalmente entendido como o iniciador e sustentador da criação, o Planejador da salvação, e o Juiz final. 1 Coríntios 15:28 fala de "Deus" (Pai) como aquele para quem tudo está subjugado. O Filho é o Executor da redenção, tornou-Se humano, foi morto e ressuscitado para nossa salvação. Hebreus 1:3 descreve o Filho como "o resplendor da glória de Deus, e a expressa imagem da sua essência". O Espírito Santo aplica os benefícios da redenção aos crentes, habitando-os, santificando-os, capacitando-os para ministério. Atos 1:8 promete: "Mas recebereis a virtude do Espírito Santo, que há de vir sobre vós".</p><p>Esta distribuição de funções não implica hierarquia de poder ou valor. Todas as três pessoas estão envolvidas em toda operação divina. A criação é obra do Pai (através da Palavra e Espírito). A encarnação foi decisão da Trindade. Salvação requer ação de todas as três pessoas. A descrição de funções distintas é uma concessão à compreensão finita — ajuda-nos a manter os atributos infinitos de Deus enquanto entendemos como Ele trabalha através da história. Na eternidade, a Trindade opera numa perfeita unidade incompreensível para nossa mente finita.</p>`, cards:[{q:"O que significa dizer que a Trindade é 'transrracional' em vez de 'irracional'?",a:"Significa que não contradiz a razão mas a transcende — não pode ser derivada meramente da lógica mas é revelação divina."}]}
    ],
    summary:{title:"Resumo: Fundamentos da Teologia Sistemática", points:["Teologia sistemática organiza doutrinas bíblicas coerentemente em loci (categorias) doutinárias", "Os atributos incomunicáveis de Deus (aseidade, eternidade) são únicos a Ele; comunicáveis podem ser participados por humanos", "A Trindade afirma que Deus é uma essência mas três pessoas coeternas e cosubstanciais", "A compreensão da natureza de Deus deve transformar nossa confiança, esperança e resposta a Ele"]},
    quizFinal:[
      {q:"Qual é a diferença entre teologia bíblica e teologia sistemática?",opts:["Teologia bíblica não é importante","Teologia bíblica é temática e histórica; sistemática organiza doutrinas em loci","São a mesma coisa com nomes diferentes","Teologia sistemática não usa a Bíblia"],correct:1},
      {q:"O que significa 'aseidade' no contexto dos atributos divinos?",opts:["Deus é sábio","Deus é auto-existente e não depende de nada externo","Deus é misericordioso","Deus é eterno"],correct:1},
      {q:"Que palavra grega refere-se à essência de Deus na Trindade?",opts:["Hypostasis","Ousia","Logos","Pneuma"],correct:1}
    ]
  },
  {
    id:'ts_mod2', name:'Cristologia: A Pessoa e Obra de Cristo', free:false,
    topics:[
      {id:4, name:'A Encarnação: Deus Tornando-se Humano', dur:'15 min', content:`<h3>A Encarnação: Deus Tornando-se Humano</h3><p>A encarnação é o evento em que o Filho eterno de Deus assumiu natureza humana completa em Jesus Cristo. João 1:1, 14 declara: "No princípio era a Palavra, e a Palavra estava com Deus, e a Palavra era Deus... E a Palavra se fez carne, e habitou entre nós, cheio de graça e de verdade". Este é o fundamento de toda fé cristã. Não é meramente que Deus Se revelou através de um homem especialmente inspirado, nem que um ser humano extraordinariamente espiritual alcançou divindade. É que a segunda pessoa da Trindade, eternalmente igual ao Pai em poder e glória, voluntariamente Se humilhou para assumir carne humana.</p><p>A Trindade sempre foi, e no centro da eternidade, o Pai, Filho e Espírito existiam em comunhão perfeita. Contudo, em certo ponto na história (há aproximadamente 2000 anos), o Filho eternamente gerado, sem deixar de ser quem é, Se uniu permanentemente a uma natureza humana completa. Filipenses 2:6-8 oferece uma descrição profunda: "Ele, subsistindo em forma de Deus, não considerou a igualdade com Deus como uma coisa para aproveitar-se, mas esvaziou-se a si mesmo, tomando a forma de servo, fazendo-se semelhante aos homens; e, achado na forma de homem, humilhou-se a si mesmo, tornando-se obediente até à morte, e morte de cruz". O "esvaziamento" (kenosis) não significa que Cristo deixou de ser Deus, mas que voluntariamente limitou Sua auto-expressão às limitações da existência humana.</p><p>A questão teológica crucial é: Como pode Cristo ser completamente Deus e completamente humano simultaneamente? A resposta cristã ortodoxa, formulada no Concílio de Calcedônia (451 d.C.), é que Cristo possui duas naturezas (divina e humana) unidas numa só pessoa (hypostasis). Ele é um único Cristo, não dois Cristos. Sua natureza divina permanece divina em todos os respeitos; Sua natureza humana permanece humana em todos os respeitos (exceto o pecado). Contudo, estas duas naturezas estão unidas numa única pessoa tal que quando falamos de "Jesus", nos referimos a uma pessoa que é simultânea e completamente Deus e homem.</p><blockquote class="tip"><strong>Importância Soteriológica:</strong> A duas-natureza de Cristo é essencial para salvação. Se Cristo fosse meramente humano, Sua morte não poderia propiciar infinita. Se fosse meramente Deus aparentando ser humano, Sua morte não teria sido genuína e Ele não poderia ser nosso substituto. Mas sendo completamente ambos, Sua morte como humanidade ofereceu satisfação infinita como divindade. Hebreus 9:26 afirma que "Acabada a consumação dos séculos, uma só vez apareceu, para tirar os pecados pela oblação de si mesmo".</blockquote><h4>A Virgem Maria e Conceitos Cristológicos</h4><p>Um aspecto importante da encarnação é o nascimento virginal de Jesus. Mateus 1:18-25 e Lucas 1:26-38 descrevem que Jesus foi concebido no seio de Maria, virgem desposada a José, através do poder do Espírito Santo, sem relação sexual com homem. Este foi sempre ensinado pela Igreja cristã tradicional como essencial à cristologia ortodoxa. O nascimento virginal garante que Cristo é genuinamente filho de Adão (verdadeiramente humano através de Maria) sem herança da natureza pecaminosa transmitida através de Adão aos seus descendentes (por não ter pai humano).</p><p>Contudo, surgem questões sobre implicações posteriores à encarnação. A Bíblia menciona que Jesus tinha irmãos — "Não é este o filho do carpinteiro? E não se chama sua mãe Maria? E seus irmãos, Tiago, José, Simão e Judas?" (Mateus 13:55). A interpretação católica romana e ortodoxa é que estes eram primos (que em aramaico e grego podiam ser chamados irmãos). Protestantes geralmente interpretam como filhos reais subsequentes de Maria e José. Ambas as interpretações reconhecem o nascimento virginal mas diferem em compreensão do estado contínuo de Maria. A Teologia Reformada Protestante não enfatiza veneração de Maria, enquanto que Católicos e Ortodoxos oferecem-lhe veneração especial (chamada "hiperdulia") apropriada a mãe do Filho de Deus encarnado.</p>`, cards:[{q:"O que significa 'kenosis' (esvaziamento) na Cristologia?",a:"A humilhação voluntária do Filho de Deus ao assumir limitações da existência humana, sem deixar de ser Deus."}]},
      {id:5, name:'A Obra de Cristo: Morte Sacrificial e Ressurreição', dur:'15 min', content:`<h3>A Obra de Cristo: Morte Sacrificial e Ressurreição</h3><p>A obra de Cristo refere-se àquilo que Cristo fez para accomplish salvação. A morte sacrificial de Cristo é central. 1 Coríntios 15:3 declara que Cristo "morreu pelos nossos pecados, segundo as Escrituras". A morte de Jesus não foi acidente ou injustiça não intencional, mas o cumprimento central do plano redentor de Deus. Cristo Se ofereceu como sacrifício pelos pecados de toda a humanidade. Hebreus 10:10 afirma: "Nessa vontade é que somos santificados, pela oblação do corpo de Jesus Cristo, feita uma única vez".</p><p>Teólogos articularamvários modelos de como a morte de Cristo accomplish salvação. O Modelo Substitutivo (ou Satisfação Penal) afirma que Cristo tomou nosso lugar e recebeu a punição que merecíamos por nossos pecados. 2 Coríntios 5:21 afirma: "Aquele que não conheceu pecado, o fez pecado por nós; para que nele fôssemos feitos justiça de Deus". O Modelo de Resgate afirma que Cristo pagou um preço para resgate-nos do poder do pecado e Satanás. 1 Pedro 1:18-19 declara: "Sabendo que não foi com coisas corruptíveis, como ouro ou prata, que fostes resgatados...mas com o precioso sangue de Cristo". O Modelo Exemplar afirma que a morte de Cristo nos oferece um exemplo de amor e sacrifício absoluto ao qual aspiramos. 1 Pedro 2:21 afirma: "Porque para isto sois chamados; pois que também Cristo sofreu por nós, deixando-vos exemplo para que sigais os seus passos".</p><p>A maioria dos teólogos evangélicos reconhecem que nenhum modelo isoladamente captura toda a realidade da redenção. A morte de Cristo é simultaneamente um sacrifício substitutivo (satisfazendo a justiça divina), um resgate (liberando-nos do poder do pecado), uma propiciação (apaziguando a ira divina contra o pecado), e um exemplo inspirador (mostrando-nos o caminho do amor sacrificial). Romanos 3:25 fala de Cristo como "propiciação" (hilastérion em grego) — o lugar de aplacamento onde a ira divina é satisfeita. Todos estes aspectos trabalham juntos para accomplish a redenção completa.</p><blockquote class="example"><strong>A Ressurreição como Confirmação:</strong> A ressurreição de Cristo é tão importante quanto Sua morte. Enquanto a morte accomplish redenção potencial (abre a porta da salvação), a ressurreição declara que a morte foi vitoriosa. Cristo não permaneceu morto; ressuscitou no terceiro dia, derrotando a morte, o último inimigo (1 Coríntios 15:54-57). A ressurreição é nossa garantia de que a morte não é final para nós tampouco. Se Cristo venceu a morte, então nós que estamos nEle também venceremos. Romanos 6:9 afirma que Cristo "ressuscitou, nunca mais morre; a morte não tem mais domínio sobre ele".</blockquote><h4>A Ascensão e Sessão à Direita de Deus</h4><p>Quarenta dias após a ressurreição, Cristo ascendeu ao céu. Atos 1:9-11 descreve: "Dito isto, foi elevado à vista deles, e uma nuvem o envolveu, arrebatando-o aos olhos deles. E estando eles com os olhos fitos no céu, enquanto ele ia, eis que dois homens se apresentaram junto deles em vestes brancas, e disseram: Varões galileus, por que estais olhando para o céu? Este Jesus, que de entre vós foi elevado ao céu, há de vir assim como para o céu o vistes ir". A Ascensão de Cristo é importante: demonstra que a obra redentora foi completa (Cristo está assentado à direita do Pai), e antecipa Sua volta futura.</p><p>A "sessão" de Cristo à direita do Pai refere-se ao estado de exaltação presente de Cristo onde Ele Se senta como Intercessor e Soberano. Hebreus 7:25 afirma: "Por isso também pode salvar perfeitamente os que por ele se chegam a Deus, vivendo ele para sempre para interceder por eles". Cristo não está passivo no céu. Ele está ativa e continuamente intercedendo pelos Seus santos, apresentando nossos nomes e orações ao Pai. Colossenses 3:1 exorta: "Se, pois, fostes ressuscitados com Cristo, buscai as coisas que estão acima, onde Cristo está, assentado à direita de Deus". A ascensão de Cristo estabelece Sua ascendência cósmica. Ele não apenas salvou Seu povo; governa agora o universo.</p>`, cards:[{q:"Qual é a diferença entre o 'Modelo Substitutivo' e o 'Modelo de Resgate' da salvação?",a:"Substitutivo: Cristo tomou a punição que merecíamos. Resgate: Cristo pagou um preço para libertar-nos do poder do pecado."}]},
      {id:6, name:'Cristologia e Vida Cristã Contemporânea', dur:'15 min', content:`<h3>Cristologia e Vida Cristã Contemporânea</h3><p>A Cristologia não é meramente estudo histórico do Jesus passado, mas tem implicações profundas para a vida cristã presente. Começar com a verdade de que Jesus é o Filho de Deus encarnado transforma como entendemos identidade, valor e propósito. Se Deus Se amou-nos o bastante para Se tornar humano, sofrer e morrer por nós, isto nos oferece valor absoluto. Romanos 8:31-32 afirma: "Se Deus é por nós, quem será contra nós? Aquele que nem mesmo a seu próprio Filho poupou, antes o entregou por todos nós, como nos não dará também com ele todas as coisas?" Somos amados de forma incomensurável pelo próprio Deus do universo.</p><p>Além disso, Jesus Cristo é o modelo de vida autêntica. Não apenas nos salva; nos exemplifica. 1 João 2:6 afirma: "Aquele que diz que permanece nele, deve também andar como ele andou". Jesus viveu em completa obediência ao Pai (João 15:10 — "Eu tenho guardado os mandamentos de meu Pai"). Jesus praticou compaixão genuína para com os fracos, marginalizados e pecadores (Lucas 19:10 — "Porque o Filho do homem veio buscar e salvar o que se havia perdido"). Jesus foi marcado por verdade sem comprometimento mas transmitida com amor (João 4:1-42, encontro com a mulher samaritana). Jesus demonstrou coragem diante da oposição (Mateus 23, denúncia dos fariseus como hipócritas). Jesus dedicou-Se à oração e comunhão com Deus (Lucas 6:12 — "Naqueles dias retirou-se ao monte para orar, e passou a noite toda em oração a Deus").</p><blockquote class="quote"><strong>Cristo como Padrão de Santidade:</strong> O cristão maduro busca viver como Cristo viveu. Isto não significa replicar precisamente Sua vida (Ele teve uma vida específica e única), mas incorporar Seus valores, caráter e missão. Cristãos devem ser conhecidos por compaixão, verdade, justiça, oração, sacrifício e amor. Colossenses 1:27 afirma: "aos quais Deus quis fazer conhecer quais são as riquezas da glória deste mistério entre os gentios, que é Cristo em vós, esperança da glória". Cristo em nós, através do Espírito Santo, é a esperança de transformação pessoal e impacto no mundo.</blockquote><h4>Cristologia Pentecostal e a Experiência do Espírito</h4><p>A tradição pentecostal enfatiza particularmente que conhecimento teológico correto de Cristo deve levar à experiência transformadora do Espírito Santo. Não é suficiente crer corretamente sobre Cristo; devemos experimentar Sua presença e poder através do Espírito. Atos 1:8 promete: "Mas recebereis a virtude do Espírito Santo, que há de vir sobre vós; e ser-me-eis testemunhas tanto em Jerusalém como em toda a Judeia, e Samaria, e até aos confins da terra". O batismo no Espírito Santo não é salvação (que ocorre quando cremos em Cristo), mas é uma experiência subsequente de capacitação para ministério e santidade.</p><p>Cristo é aquele que batiza no Espírito Santo (Mateus 3:11 — "Ele vos batizará no Espírito Santo e em fogo"). A Cristologia pentecostal, portanto, não é meramente doctrinal mas viva e experiencial. Conhecer Cristo significa não apenas entender Sua pessoa e obra, mas experimentar Seu toque transformador através da habitação e enchimento do Espírito Santo. Esta é a razão pela qual pentecostais enfatizam o batismo no Espírito, dons espirituais e frutos do Espírito. Estas são expressões práticas de como Cristo continua Seu ministério através Seu corpo, a Igreja, pelos séculos até Sua volta.</p>`, cards:[{q:"Como 1 João 2:6 desafia cristãos contemporâneos a responder à Cristologia?",a:"Aquele que diz permanecer em Cristo deve andar como Ele andou — vivendo em obediência, compaixão, verdade e sacrifício."}]}
    ],

    topics:[
      {id:7, name:'A Doutrina da Salvação: Justificação e Santificação', dur:'15 min', content:`<h3>A Doutrina da Salvação: Justificação e Santificação</h3><p>Soteriologia é o estudo da salvação. A doutrina central da Reforma Protestante é "Sola Fide" (salvação apenas pela fé), combinada com "Sola Gratia" (apenas pela graça). Romanos 3:28 afirma: "Concluímos, pois, que o homem é justificado pela fé, independentemente das obras da lei". A salvação não é adquirida através de mérito humano ou boas obras, mas é dádiva de Deus apropriada através de fé. Efésios 2:8-9 declara: "Porque pela graça sois salvos, por meio da fé; e isto não vem de vós, é dom de Deus; não vem das obras, para que ninguém se glorie".</p><p>Justificação refere-se ao ato judicial de Deus declarando o pecador "justo" diante dEle através da fé em Cristo. Não significa que o pecador torna-se moralmente perfeito (isso seria santificação), mas que recebe o status legal de "justiça" porque a justiça de Cristo é creditada a ele. 2 Coríntios 5:21 afirma: "Aquele que não conheceu pecado, o fez pecado por nós; para que nele fôssemos feitos justiça de Deus". Esta é a "imputação" da justiça de Cristo ao crente. Judicialmente, somos tão justos quanto Cristo porque Sua justiça nos é creditada.</p><p>Santificação, por outro lado, refere-se ao processo de transformação moral e espiritual do crente. Enquanto justificação ocorre num instante (quando primeiro cremos), santificação é progressiva (ao longo da vida). 1 Tessalonicenses 5:23 instrui: "E o mesmo Deus de paz vos santifique completamente; e todo o vosso ser, espírito, alma e corpo, seja plenamente preservado irrepreensível para a vinda de nosso Senhor Jesus Cristo". Santificação é obra do Espírito Santo que habitualmente aprofunda nossa semelhança a Cristo. Romanos 8:29 afirma que o propósito de Deus é "conformar-nos à imagem de seu Filho, para que ele seja o primogênito entre muitos irmãos".</p><blockquote class="tip"><strong>Graça Comum vs. Graça Especial:</strong> Teólogos distinguem entre graça comum (operação geral de Deus no universo que Se estende até incrédulos — como Mateus 5:45 afirma que Deus "faz nascer o seu sol sobre maus e bons") e graça especial (operação redentora de Deus específica para salvação dos eleitos). A capacidade que um incrédulo tem de reconhecer beleza, verdade ou bondade é graça comum. A regeneração espiritual que permite ao pecador morto se voltar para Cristo é graça especial. Ambas são graça, mas operações distintas.</blockquote><h4>A Relação entre Fé e Obras</h4><p>Um aparente paradoxo nas Escrituras é a relação entre fé e obras. Paulo enfatiza que salvação não é por obras (Efésios 2:9). Contudo, Tiago afirma: "Assim também a fé, se não tiver obras, é morta em si mesma" (Tiago 2:26). Como reconciliar isto? A resposta correta é que fé e obras são inseparáveis, mas numa sequência apropriada. Fé é a raiz; obras são o fruto. Salvação não é por obras (em seqüência ou em precedência — as obras não causam a salvação). Mas verdadeira fé sempre resultará em obras. Se uma pessoa afirma crer em Cristo mas não há qualquer mudança de comportamento ou fruto do Espírito, tal "fé" é questionável.</p><p>Romanos 6:1-2 aborda isto: "Que diremos, pois? Permaneceremos no pecado para que a graça abunde? De modo nenhum; nós, que morremos para o pecado, como viveremos ainda nele?". A salvação pela fé não elimina a importância de vida santa. Pelo contrário, aqueles que verdadeiramente creem em Cristo serão transformados por Ele. Tito 2:11-12 afirma: "Porque a graça de Deus se manifestou, trazendo salvação a todos os homens, ensinando-nos a renunciar à impiedade, e aos desejos mundanos, e a viver, no presente século, sensata, justa e piedosamente". A graça que nos salva é a mesma graça que nos transforma.</p>`, cards:[{q:"Qual é a diferença entre justificação e santificação?",a:"Justificação é ato judicial instantâneo de Deus declarando-nos justos; santificação é processo contínuo de transformação moral."}]},
      {id:8, name:'Eclesiologia: A Natureza e Missão da Igreja', dur:'15 min', content:`<h3>Eclesiologia: A Natureza e Missão da Igreja</h3><p>Eclesiologia é o estudo da Igreja. A Igreja não é um edifício; é o corpo de Cristo. Efésios 1:22-23 afirma: "E sujeitou todas as coisas a seus pés, e para ser cabeça sobre todas as coisas, a deu à Igreja, que é o seu corpo, a plenitude daquele que a tudo enche em todas as coisas". A Igreja é a assembléia de todos aqueles redimidos por Cristo, passados, presentes e futuros. É organismo vivo, não organização morta. Está sob autoridade de Cristo seu cabeça.</p><p>A Igreja local é expressão visível e tangível deste corpo universal. Quando cristãos reúnem-Se num lugar particular para adorar, orar, estudar a Palavra e exercer ministério, constituem uma Igreja local. Atos 2:47 refere-Se "aqueles que hão de ser salvos" sendo "ajuntados à Igreja". Mateus 18:20 oferece promessa de Cristo: "Porque onde estiverem dois ou três reunidos em meu nome, aí estou eu no meio deles". A Igreja não requer edifício especial, clero ordenado (pela maioria das tradições evangélicas) ou estrutura hierárquica complexa. Meramente a presença de crentes em Cristo reunidos em Seu nome constitui Igreja.</p><p>A Igreja é caracterizada pela unidade na diversidade. 1 Coríntios 12:12-13 afirma: "Porque, assim como o corpo é um, e tem muitos membros, e todos os membros do corpo, sendo muitos, são um só corpo, assim também é Cristo. Pois todos nós fomos batizados em um só Espírito, formando um só corpo, quer sejamos judeus, quer gregos, quer escravos, quer livres". Cada cristão tem diferentes dons e ministérios, mas todos contribuem ao bem comum. A diversidade não é problema a ser resolvido, mas riqueza a ser celebrada.</p><blockquote class="example"><strong>As Marcas da Igreja Verdadeira:</strong> Reformadores protestantes identificaram certas marcas essenciais da Igreja verdadeira: (1) A pregação fiel da Palavra de Deus, (2) Administração correta dos sacramentos (batismo e ceia do Senhor), (3) Disciplina eclesiástica exercida apropriadamente. Alguns adicionam (4) Sinceridade da fé pessoal dos membros. Nenhuma Igreja local é perfeita, mas uma Igreja que abandona completamente estas características deixa de ser Igreja cristã genuína em algum sentido fundamental.</blockquote><h4>Missão da Igreja: Grande Comissão</h4><p>A missão primordial da Igreja é anunciação do Evangelho. Mateus 28:19-20 registra a Grande Comissão: "Portanto ide, fazei discípulos de todas as nações, batizando-os em nome do Pai, e do Filho, e do Espírito Santo; ensinando-os a guardar todas as coisas que vos tenho mandado; e eis que eu estou convosco todos os dias até à consumação dos séculos". Esta comissão é tão importante que aparece em variações nos quatro Evangelhos e em Atos.</p><p>A missão inclui evangelismo (proclamação das boas novas de Cristo para conversão) mas não se limita a isto. Inclui discipulado (ensinamento e transformação de crentes), adoração (louvor corporativo a Deus), misericórdia (cuidado dos pobres, doentes, oprimidos), e profecia (proclamação da justiça de Deus e denúncia de injustiça). Atos 2:42 descreve os primeiros cristãos como dedicados "ao ensino dos apóstolos, à comunhão, ao partir do pão e às orações". A vida saudável da Igreja é holística. A perspectiva pentecostal adiciona ênfase particular no poder do Espírito Santo para fazer "sinais e maravilhas" que confirmem o evangelho (Marcos 16:17-18, Atos 3:12-16).</p>`, cards:[{q:"Como Efésios 1:22-23 descreve a Igreja em relação a Cristo?",a:"A Igreja é o corpo de Cristo, expressão de Sua plenitude que encherá tudo em todas as coisas."}]},
      {id:9, name:'Unidade e Diversidade na Igreja', dur:'15 min', content:`<h3>Unidade e Diversidade na Igreja</h3><p>Um dos desafios perpétuos na história da Igreja é manter unidade na diversidade. A Igreja Cristã é globalizada, composta de pessoas de todas as culturas, idiomas, denominações e contextos sócio-econômicos. Há cristãos presbiterianos, pentecostais, batistas, assembleianos, católicos, ortodoxos, metodistas — cada um com tradições distintas, ênfases e práticas. Como pode haver unidade genuína em meio a tal diversidade?</p><p>A resposta bíblica é que a unidade essencial está em Cristo. Gálatas 3:28 afirma: "Não há judeu nem grego; não há escravo nem livre; não há macho nem fêmea; porque todos vós sois um em Cristo Jesus". A unidade não requer uniformidade doutrinal em cada detalhe. O cristianismo histórico identifica certos essenciais não-negociáveis: a divindade de Cristo, Sua morte e ressurreição, Sua exaltação e retorno futuro, o trabalho do Espírito Santo, salvação pela fé em Cristo. Diferenças sobre batismo (imersão vs. aspersão), governo eclesiástico (episcopal, presbitariano, congregacional), escatologia detalhada (premilenismo vs. amilenismo), e outras questões são importantes mas secundárias.</p><p>O problema surge quando diferenças secundárias são elevadas ao status de essencial, causando divisão desnecessária. Ou quando se afirma haver unidade quando há divisão real sobre questões centrais (como se alguém nega a ressurreição de Cristo mas afirma estar na "Igreja"). Efésios 4:4-6 oferece perspectiva: "Há um só corpo, e um só Espírito, como também fostes chamados em uma só esperança da vossa vocação; um só Senhor, uma só fé, um só batismo; um só Deus e Pai de todos, que é acima de todos, e por meios de todos, e em vós todos". Há fundamentais inegociáveis que criam unidade genuna; há diversidades legítimas que não destroem unidade essencial.</p><blockquote class="quote"><strong>Implicação Prática para Pentecostais:</strong> A Assembleia de Deus historicamente enfatizou a "plenitude do Espírito Santo" como marca distintiva do cristianismo verdadeiro — não apenas crer em Cristo, mas experimentar o batismo e enchimento do Espírito. Contudo, crescentemente há reconhecimento de que cristãos em outras tradições (católicos, evangélicos não-pentecostais) genuinamente amam e servem a Cristo, mesmo que não enfatizem experiências pentecostais. A unidade na diversidade requer respeitar a primazia de Cristo enquanto se afirma com confiança as convicções distintivas próprias tradição.</blockquote><h4>Esperança Escatológica e Unidade Eclesiástica</h4><p>Curiosamente, a perspectiva escatológica promove unidade eclesiástica. Quando sabemos que Cristo retornará e a Igreja será raptada juntos, toda divisão sectária parece menos importante. 1 Coríntios 13:8-10 afirma: "O amor nunca falha...mas, quando chegar a perfeição, o que é em parte desaparecerá...Porque agora vemos por espelho em enigma, mas então veremos face a face". Quando estamos na eternidade na presença direta de Cristo, as diferenças doutrinárias que nos dividiram nesta vida parecerão insignificantes. Isto não significa que doutrina não importa, mas que a ênfase apropriada é comunhão em Cristo e esperança compartilhada na consumação.</p><p>A Igreja deve, portanto, combinar convicção doutrinária e lealdade a Cristo com humildade e amor pelos cristãos com os quais diferimos. 1 Coríntios 13:4-7 descreve o amor que deve caracterizar a Igreja: "O amor é longânimo, é benigno; o amor não inveja; o amor não se vangloria, não se ensoberbece, não se porta com má educação, não busca os seus interesses, não se irrita, não suspeita mal; não folga com a injustiça, mas folga com a verdade; tudo sofre, tudo crê, tudo espera, tudo suporta". Esta é caracterização de Igreja madura que está ativa em missão, fervorosa em fé, mas marcada por amor genuíno por uns aos outros e pelo mundo perdido que Deus ama.</p>`, cards:[{q:"Qual é a diferença entre unidade essencial e uniformidade na Igreja?",a:"Unidade essencial em Cristo não requer uniformidade em tudo — há essenciais inegociáveis mas também diversidades legítimas."}]}
    ],
