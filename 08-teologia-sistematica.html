var TOPICS = [
  {id:1,name:'Atributos de Deus',dur:'15 min',content:`<h3>Os Atributos de Deus: Quem É Nosso Criador</h3><p>Bem-vindo com alegria a este estudo glorioso dos atributos de Deus! Que privilégio é compreender melhor quem é o Criador que nos amou o suficiente para enviar Seu Filho para nossa redenção! Este conhecimento deve aquentar seu coração e aprofundar sua adoração.</p><p>Quando falamos dos "atributos de Deus", referimo-nos às características essenciais e eternamente constantes que definem quem Deus é. Não são qualidades que Ele adquiriu ou perdeu. Elas são intrinsicamente quem Ele é. Deixe-me explorar os principais atributos.</p><p>Primeiro: Onipotência - Deus é todo-poderoso. Não há nada que Ele não possa fazer. Não há força em todo o universo que seja comparável à Sua. Gênesis 1:1 afirma: "No princípio criou Deus os céus e a terra." Com uma palavra, Deus criou tudo! Mateus 19:26 registra Jesus dizendo: "Para Deus todas as coisas são possíveis." Portanto, quando você enfrenta situações impossíveis, há consolo em saber que seu Deus é onipotente!</p><p>Segundo: Onisciência - Deus conhece todas as coisas. Não há nada oculto a Ele. Salmo 147:4-5 descreve: "Ele conta o número das estrelas, e a todas elas chama pelos seus nomes. Grande é o nosso Senhor, e de grande poder; o seu entendimento é infinito." Deus conhece o passado, o presente e o futuro simultaneamente. Conhece cada pensamento antes de você pensá-lo (Salmo 139:2). Este conhecimento divino oferece segurança: Deus sabe exatamente o que você precisa e quando precisa!</p><p>Terceiro: Eternidade - Deus não tem começo nem fim. Ele sempre existiu e sempre existirá. 2 Pedro 3:8 afirma: "Mas, amados, não ignoreis uma coisa, que um dia diante do Senhor é como mil anos, e mil anos como um dia." Salmo 90:2 diz: "Antes que os montes nascessem, ou se formassem a terra e o mundo, sim, de eternidade a eternidade, tu és Deus." Enquanto tudo muda e passa, Deus é imutável e eterno!</p><p>Quarto: Imutabilidade - Deus não muda. Malaquias 3:6 diz: "Porque eu, o Senhor, não mudo..." Tiago 1:17 afirma: "Todo bem vindo e todo dom perfeito vem do alto, descendo do Pai das luzes, em quem não há variação nem sombra de mudança." Isto significa que as promessas de Deus são permanentes. Se Ele prometeu algo, você pode contar com isto. Se Ele é misericordioso hoje, será amanhã. Se Ele o amou ontem, o ama hoje!</p><p>Quinto: Santidade - Deus é perfeitamente puro e moralmente perfeito. Isaías 6:3 declara: "Santo, santo, santo é o Senhor dos Exércitos!" A santidade de Deus significa que Ele odeia o pecado e exige retidão. Não é apenas uma característica entre outras; é central a quem Deus é. Isto torna a possibilidade de pecado especialmente grave - é ofensa contra um Deus perfeitamente santo!</p><p>Sexto: Justiça - Deus é absolutamente justo e imparcial. Deuteronômio 32:4 afirma: "A Rocha, cuja obra é perfeita, porque todos os seus caminhos são julgamento; um Deus fiel e sem iniquidade; justo e reto é." Deus não favorece os ricos sobre os pobres, os fortes sobre os fracos. Sua justiça é perfeita e sem tendências. Portanto, você pode confiar que Deus tratará de toda injustiça eternamente!</p><p>Sétimo: Misericórdia e Graça - Deus é compassivo e oferece bondade que não merecemos. Salmo 103:8 afirma: "O Senhor é misericordioso e compassivo, longanime e abundante em graça." A misericórdia é Deus não dando a você o que você merece (castigo). A graça é Deus dando a você o que você não merece (salvação). Isto é o fundamento do evangelho! Se Deus fosse apenas justo, seríamos condenados. Mas porque Ele é também merciful e gracioso, podemos ser redimidos!</p><p>Oitavo: Amor - Deus é amor (1 João 4:8). Seu amor é perfeito, sacrificial, eterno. João 3:16 declara: "Porque Deus amou o mundo de tal maneira, que deu o seu Filho unigênito, para que todo o que nele crê não pereça, mas tenha a vida eterna." O amor de Deus moveu-O a criar a humanidade. O amor de Deus moveu-O a enviar Seu Filho para morrer pelos nossos pecados. Que amor extraordinário!</p><p>Nono: Onipresença - Deus está presente em todos os lugares ao mesmo tempo. Salmo 139:7-8 afirma: "Para onde me irei de teu Espírito? Ou para onde fugirei de tua face? Se eu subir aos céus, tu aí estás; se fizer a minha cama no Seol [Hades], eis que tu aí estás também!" Não há lugar em todo o universo onde Deus não esteja. Isto significa que você nunca está realmente sozinho. Seu Criador está sempre com você!</p><p>Décimo: Soberania - Deus é supremo e tem controle final sobre todas as coisas. Romanos 11:36 afirma: "Porque dele, e por ele, e para ele, são todas as coisas; glória, pois, a ele eternamente. Amém!" Isto não nega liberdade humana, mas reconhece que Deus é absolutamente supremo. Ele não é surpreendido por eventos. Ele não perde controle. Seu propósito final será cumprido.</p><p>Portanto, querido aluno, compreender os atributos de Deus deve transformar você! Quando você conhece que Deus é onipotente, você não precisa temer. Quando sabe que é onisciente, você pode confiar que Ele compreende sua situação. Quando compreende Sua eternidade e imutabilidade, você pode confiar em Suas promessas. Quando recogniza Sua justiça e misericórdia, você pode estar certo de que no final, tudo será feito direito.</p><p>Deixe que este conhecimento de quem é Deus aquente seu coração, motive sua adoração, e fortaleça sua fé!</p>`,cards:[{q:"Quais são alguns dos atributos principais de Deus?",a:"Onipotência, onisciência, eternidade, imutabilidade, santidade, justiça, misericórdia, graça, amor, onipresença e soberania."}]},

  {id:2,name:'Revelação: Geral e Especial',dur:'15 min',content:`<h3>Como Deus Se Revelou: Revelação Geral e Especial</h3><p>Que alegria estudar como Deus Se revelou à humanidade! Deus não é um mistério completo envolvido em obscuridade impenetrável. Ele Se revelou de maneiras que podemos conhecer e compreender! Isto é parte da natureza amorosa de Deus - Ele deseja ser conhecido por Suas criaturas.</p><p>Os teólogos tradicionalmente falam em duas formas principais de revelação: geral e especial.</p><p>REVELAÇÃO GERAL é a revelação de Deus disponível a todas as pessoas em todos os tempos através da criação e da consciência moral. É "geral" porque não é limitada a um grupo específico ou tempo específico. Está disponível universalmente.</p><p>Primeiro, Deus Se revelou através da natureza - a criação. Romanos 1:19-20 declara: "Porque o que de Deus se conhece neles se manifesta, pois Deus lho manifestou. Porque os atributos invisíveis de Deus, assim o seu eterno poder, como também a sua própria divindade, claramente se reconhecem, desde o princípio do mundo, sendo percebidos por meio das coisas que foram criadas." Quando você observa a majestade das montanhas, a vastidão do céu estrelado, a intricada beleza de uma flor, você está percebendo a mão de Deus! A criação grita sobre a realidade, poder e beleza de seu Criador.</p><p>Salmo 19:1-2 afirma poeticamente: "Os céus declaram a glória de Deus, e o firmamento anuncia a obra das suas mãos. Um dia faz declaração a outro dia, e uma noite anuncia conhecimento a outra noite." A criação é uma proclamação permanente da glória divina! Até os pagãos que nunca ouviram a Bíblia podem olhar para a criação e reconhecer que existe um Criador.</p><p>Segundo, Deus Se revelou através da consciência moral - a lei inscrita nos nossos corações. Romanos 2:14-15 afirma: "Porque quando os gentios, que não têm a lei, fazem naturalmente as coisas que são da lei, não tendo eles lei, para si mesmos são lei; os quais mostram a obra da lei escrita nos seus corações, testificando juntamente a sua consciência..." Todos os humanos têm um senso inato de certo e errado. Mesmo sem educação formal, uma criança pequena reconhece que é "injusto" ser punida por algo que não fez. Esta consciência moral vem de Deus e é uma forma de revelação geral.</p><p>Agora, é importante notar que a revelação geral, embora valiosa e disponível a todos, é insuficiente para salvar a pessoa. Você pode olhar para a criação e reconhecer que existe um Criador, mas isto não lhe diz como estar certo com esse Criador. Você pode sentir culpa pelo pecado, mas isto não lhe diz como ser perdoado. Portanto, Deus ofereceu revelação especial.</p><p>REVELAÇÃO ESPECIAL é a revelação específica e salvífica de Deus oferecida através de meios especiais e em tempos específicos. É "especial" porque é direcionada, clara e salvífica. É oferecida através de profetas, da Bíblia e supremamente através de Jesus Cristo.</p><p>Primeiro, Deus Se revelou através dos profetas. Hebreus 1:1-2 afirma: "Havendo Deus, outrora, falado muitas vezes e de muitos modos aos pais pelos profetas, nestes últimos dias nos falou pelo Filho, a quem constituiu herdeiro de todas as coisas, pelo qual também fez o universo." Os profetas do Antigo Testamento foram escolhidos por Deus para receber Sua mensagem e transmiti-la ao povo. Seus escritos estão preservados na Bíblia.</p><p>Segundo, Deus Se revelou através da Bíblia. A Bíblia é a Palavra de Deus escrita. 2 Timóteo 3:16 afirma: "Toda a Escritura é divinamente inspirada, e proveitosa para ensinar, para repreender, para corrigir, para instruir em justiça." Isto não significa que cada palavra foi ditada mecanicamente por Deus, apagando a personalidade do escritor. Mas significa que sob a inspiração do Espírito Santo, os escritores registraram a revelação divina com precisão.</p><p>Por que podemos confiar na Bíblia? Porque foi preservada milagrosamente ao longo dos séculos. Porque os manuscritos antigos mostram consistência notável. Porque faz predições que se cumprem. Porque transforma vidas de quem a obedece. Porque mostra coerência teológica apesar de ser escrita por ~40 autores ao longo de ~1500 anos. Portanto, a Bíblia é autoridade suprema para o cristão.</p><p>Terceiro, Deus Se revelou supremamente em Jesus Cristo. João 1:1-3, 14 declara: "No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus... E o Verbo se fez carne, e habitou entre nós, cheio de graça e de verdade, e vimos a sua glória, glória como do unigênito do Pai." Jesus é Deus em forma humana! Ele não era meramente um profeta; Ele era a própria encarnação do Filho de Deus. Através de Sua vida, morte e ressurreição, Deus revelou Seu amor, Sua justiça, Sua compaixão e Seu poder redentor.</p><p>Hebreus 1:3 descreve Jesus como "a expressão exata da substância de Deus". Se você quer saber como é Deus, olhe para Jesus! Seu amor, Sua compaixão, Sua poder, Sua santidade - tudo é revelado em Cristo.</p><p>Portanto, querido aluno, Deus Se revelou generosamente! Através da criação, você pode saber que Ele existe. Através da consciência, você pode reconhecer que tem responsabilidade moral diante Dele. Através da Bíblia, você pode conhecer Seu caráter e Seu propósito. E através de Jesus Cristo, você pode conhecer o caminho de salvação e ter relacionamento pessoal transformador com seu Criador!</p>`,cards:[{q:"Qual é a diferença entre revelação geral e revelação especial?",a:"Geral é a revelação de Deus através da criação e consciência, disponível universalmente. Especial é a revelação salvífica através de profetas, Bíblia e Jesus Cristo."}]},

  {id:3,name:'A Inspiração e Autoridade da Bíblia',dur:'15 min',content:`<h3>A Bíblia: Palavra Inspirada de Deus</h3><p>Que privilégio especial temos de estudar sobre o texto sagrado que guia nossa fé! A Bíblia não é um livro comum. É a revelação de Deus escrita. É a autoridade suprema para tudo que cremos e praticamos. Deixe este conhecimento fortalecer sua confiança nas Escrituras!</p><p>O que significa dizer que a Bíblia é "inspirada"? 2 Timóteo 3:16 ensina: "Toda a Escritura é divinamente inspirada, e proveitosa para ensinar, para repreender, para corrigir, para instruir em justiça." A palavra "inspirada" vem do grego "theopneustos", que significa literalmente "respirada por Deus" ou "insuflada pelo Espírito de Deus".</p><p>Isto significa que o Espírito Santo operou através dos escritores humanos para garantir que aquilo que foi escrito fosse a Palavra de Deus. Não foi puramente a criação individual do homem, nem foi ditado mecanicamente por Deus sem envolvimento humano. Foi uma cooperação divino-humana onde Deus operava através da personalidade, perspectiva e estilo do escritor para comunicar Sua mensagem com precisão.</p><p>Um analógia útil é a do vento. O Espírito Santo é frequentemente representado como "vento". Assim como o vento move uma vela enquanto a vela retém sua forma e função, o Espírito Santo moveu os escritores bíblicos enquanto preservava sua própria personalidade e expressão.</p><p>Isto significa que quando um historiador como Lucas escreve um Evangelho, ele usa seus próprios métodos de pesquisa histórica e sua perspectiva teológica particular (inspirado pelo Espírito). Quando o salmista Davi escreve um salmo de lamento, ele expressa genuinamente suas próprias emoções (inspirado pelo Espírito). A Bíblia não é monótona ou mecânica, apesar de ser plenamente inspirada.</p><p>Agora, qual é o alcance desta inspiração? Defendemos o que se chama "inspiração plenária" - que a totalidade da Bíblia é inspirada, não apenas partes dela. 2 Pedro 1:20-21 afirma: "Sabendo primeiramente isto: que nenhuma profecia da Escritura é de particular interpretação. Porque a profecia nunca foi produzida pela vontade do homem, mas os homens santos falaram, movidos pelo Espírito Santo."</p><p>Isto não significa que a Bíblia é igualmente clara em cada parte. Alguns textos são mais diretos que outros. Pedro mesmo observa que os escritos de Paulo contêm "coisas difíceis de entender" (2 Pedro 3:16). Mas significa que quando a Bíblia fala, ela fala com autoridade divina. Não há partes não-inspiradas que você pode descartar porque não gosta delas.</p><p>Por que podemos confiar que a Bíblia é de fato inspirada por Deus e não apenas a criação humana? Há várias evidências.</p><p>Primeiro: Profecia cumprida. A Bíblia contém predições sobre eventos futuros que se cumpriram com notável precisão. Por exemplo, as predições sobre o Messias (nascimento virgem, nascimento em Belém, sofrimento do servidor sofredor) foram cumpridas em Jesus. As predições sobre cidades e impérios vieram a passar. Humanos não conseguem prever o futuro consistentemente; apenas Deus pode.</p><p>Segundo: Unidade temática apesar da diversidade. A Bíblia foi escrita por ~40 autores diferentes, ao longo de ~1500 anos, em diferentes contextos culturais, frequentemente sem conhecimento um do outro. Ainda assim, apresenta uma narrativa teológica coerente. Todos os 66 livros apontam para Cristo como a solução para a condição humana. Isto é humanamente improvável; é divinamente possível.</p><p>Terceiro: Poder transformador. A Bíblia muda vidas. Quando pessoas a leem sinceramente e obedecem a suas ensinânças, seus corações são transformados. Fé surge. Esperança é restaurada. Pessoas são salvas. Isto é o fruto de uma Palavra que não é meramente humana, mas divina.</p><p>Quarto: Arqueologia confirma. Repetidas vezes, descobertas arqueológicas confirmaram detalhes da Bíblia que estudiosos questionavam. Nomes de reis, referências a cidades, eventos históricos - tudo tem sido confirmado. Se a Bíblia é precisa em detalhes checáveis, podemos confiar em suas afirmações espirituais também.</p><p>Quinto: Aplicabilidade universal. Apesar de ser escrita há séculos em contextos culturais muito diferentes do moderno, a Bíblia fala profundamente a pessoas de toda cultura e era. Seus princípios são eternos. Suas histórias ressoam universalmente. Isto sugere origem transpessoal - não meramente humana.</p><p>Portanto, a Bíblia é a Palavra confiável de Deus. Quando ela fala, Deus fala. Quando ela nos corrige, Deus nos corrige. Quando ela promete, Deus promete. Quando ela condena pecado, Deus condena. Esta é a base de toda fé e prática cristã. Como disse Jesus: "A Escritura não pode falhar" (João 10:35). Portanto, dediquem-se a conhecer e obedecer as Escrituras! Elas são vivas e poderosas, afiadas como qualquer espada de dois gumes, capazes de penetrar até a divisão da alma e do espírito (Hebreus 4:12)!</p>`,cards:[{q:"O que significa que a Bíblia é 'inspirada por Deus'?",a:"Significa que o Espírito Santo operou através dos escritores humanos para garantir que a Bíblia comunique com precisão a Palavra de Deus."}]},

  {id:4,name:'Criação e Imagem Divina',dur:'15 min',content:`<h3>O Ser Humano: Criado à Imagem de Deus</h3><p>Que verdade gloriosa e libertadora é estudar nossa própria origem e natureza! Você não é um acidente. Você não é o produto de processos cegos. Você foi criado por Deus Himself, à Sua imagem! Isto deve preencher você de dignidade e valor infinito!</p><p>Gênesis 1:26-27 declara: "E disse Deus: Façamos o homem à nossa imagem, conforme a nossa semelhança; e domine sobre os peixes do mar, e sobre as aves dos céus, e sobre todo o animal que se move sobre a terra. E criou Deus o homem à sua imagem, à imagem de Deus o criou; macho e fêmea os criou." Esta é a afirmação fundacional da dignidade humana! Você foi criado à imagem de Deus.</p><p>O que significa ser criado à imagem de Deus (imago Dei)? Não significa semelhança física. Deus é Espírito; não tem corpo material. Significa semelhança nas qualidades morais, intelectuais e espirituais. Deixe-me explorar isto.</p><p>Primeiro: Inteligência racional. Você tem capacidade de pensar, analisar, criar, resolver problemas. Você pode compreender conceitos abstratos, fazer planejamento futuro, investigar a verdade. Esta faculdade racional reflete um aspecto da imagem de Deus, o Criador Supremamente Inteligente.</p><p>Segundo: Agência moral. Você tem capacidade de escolher entre certo e errado. Você tem livre arbítrio genuíno. Você não é autômato que segue mecanicamente instintos. Você pode deliberadamente escolher obedecer ou desobedecer a Deus, seguir justiça ou injustiça. Esta capacidade de escolha moral reflete a imagem de Deus, que é perfeitamente justo.</p><p>Terceiro: Criatividade. Como Deus é Criador, assim você também tem capacidade criativa. Você pode imaginar, inventar, construir, compor, pintar. Você pode contribuir à beleza e ordem no mundo. Esta criatividade reflete a criatividade do Deus Criador.</p><p>Quarto: Relacionalidade. Como Deus existe em eterna comunhão (Trindade), assim você é criado para relacionamento. Você não é destinado a estar sozinho. Você é criado para amar, para ser amado, para comunhão com Deus e outros. Esta capacidade de relacionamento genuíno reflete a imagem de Deus, que é fundamentalmente relacional.</p><p>Quinto: Espiritualidade. Você tem uma dimensão espiritual. Você pode conhecer Deus, ter comunhão com Ele, render sua vontade à Sua. Você anela por significado, por transcendência, por propósito além do meramente material. Esta capacidade de relacionamento espiritual reflete a imagem de Deus, que é Espírito.</p><p>Portanto, você não é meramente um corpo evoluído de animais. Você não é meramente um aglomerado de átomos sem significado. Você é uma criatura especial, criada à imagem do Deus vivo! Isto confere dignidade infinita a cada pessoa humana - quer seja rico ou pobre, poderoso ou fraco, saudável ou doente, nascido ou não-nascido ainda.</p><p>É por isto que o cristianismo oferece fundação sólida para direitos humanos e respeito pela dignidade humana. Porque cada pessoa é criada à imagem de Deus, cada pessoa merece respeito, proteção, justiça. O genocídio, a escravidão, o abuso - são perversidades porque ofendem criaturas que carregam a imagem do Deus vivo.</p><p>Agora, devemos notar que enquanto toda pessoa ainda carrega a imagem de Deus (Genesis 9:6), esta imagem foi afetada pelo pecado. Você ainda é racional, moral, criativo, relacional, espiritual - mas estas faculdades agora são corrompidas. Você usa sua inteligência para engano. Você usa sua liberdade moral para rebelião. Você usa sua criatividade para destruição. Você rejeita relacionamento com Deus e com outros.</p><p>Mas a boa notícia é que Deus oferece restauração! Através de Cristo, você pode ser redimido. Pode ser "nascido de novo" (João 3:3). Pode ser transformado "de glória em glória" em semelhança a Cristo (2 Coríntios 3:18). Pode recuperar o propósito original que Deus tinha para sua vida!</p><p>Portanto, alegre-se nesta verdade: você é criado à imagem de Deus! Você tem valor infinito! Você foi criado para propósito eterno! Seu vida importa. Seus relacionamentos importam. Sua resposta a Deus importa. Você não é acidente; você é uma obra-prima da criação divina!</p>`,cards:[{q:"O que significa ser criado à imagem de Deus?",a:"Significa semelhança em qualidades morais, intelectuais e espirituais: inteligência, moralidade, criatividade, relacionalidade e espiritualidade."}]},

  {id:5,name:'A Realidade e Consequências do Pecado',dur:'15 min',content:`<h3>Pecado: A Ruptura da Imagem Divina</h3><p>Este é um tópico importante que precisamos abordar com honestidade e clareza. O pecado não é um conceito desatualizado. É uma realidade que destrói vidas, relacionamentos, nações e almas. Mas compreender o pecado corretamente é crucial para compreender o evangelho de salvação!</p><p>Primeiro, o que é pecado? Não é apenas ações "ruins". Pecado é fundamentalmente desobediência a Deus. É rejeitar a autoridade de Deus sobre sua vida. É escolher sua própria vontade sobre a vontade de Deus. 1 João 3:4 define: "Pecado é a transgressão da lei." E Romanos 14:23 afirma: "...porque tudo que não procede de fé é pecado."</p><p>O primeiro pecado foi cometido por Adão e Eva no Jardim do Éden. Deus les havia ordenado: "De toda árvore do jardim, comerás livremente; mas da árvore do conhecimento do bem e do mal, não comerás" (Gênesis 2:16-17). Mas a serpente (Satanás) os tentou, questionando a palavra de Deus: "É assim que Deus disse?" E Adão e Eva comeram do fruto proibido. Desobediência. Rebelião. Pecado.</p><p>E qual foi a consequência? "Portanto, como por um homem entrou o pecado no mundo, e pelo pecado a morte, assim também a morte passou a todos os homens, por isso que todos pecaram" (Romanos 5:12). O pecado resultou em morte - não apenas morte física, mas morte espiritual, separação de Deus.</p><p>Agora, um ponto crucial: este primeiro pecado não apenas afetou Adão e Eva. Afetou toda a humanidade! Você herdou uma natureza pecaminosa. Nasceu como pecador. "Não há justo, nem um sequer" (Romanos 3:10). "Todos nós andávamos como ovelhas desgarradas" (Isaías 53:6). Ninguém é naturalmente bom. Todos nós temos pecado.</p><p>Como se manifesta o pecado? De muitas formas. Há o pecado ativo - os atos pecaminosos que você comete. Mentira, roubo, ódio, luxúria, ganância, inveja, orgulho. Há comportamentos que violam a lei de Deus explicitamente. Mas há também o pecado passivo - a falta de fazer o bem que você deveria fazer. "Portanto, àquele que sabe fazer o bem e não faz, incorre em pecado" (Tiago 4:17).</p><p>Há também o pecado do coração - aquele que repousa em seus desejos, pensamentos e intenções. Jesus ensinou: "Porque do coração saem maus desígnios, mortes, adultérios, prostituições, furtos, falsos testemunhos, blasfêmias" (Mateus 15:19). Um pensamento de ódio é pecado. Uma fantasia lasciva é pecado. Inveja é pecado. Orgulho é pecado. Não precisa ser ato externo; se repousa no coração, é pecado.</p><p>Que são as consequências do pecado? A Bíblia é clara: "O salário do pecado é a morte" (Romanos 6:23). Não é meramente morte física, mas separação eterna de Deus, condenação, inferno. Pecado não é questão pequena. Não é erro menor. É ofensa contra o Deus Criador infinito, e portanto merece punição infinita.</p><p>E isto deve causar-nos desespero? Não! Porque a boa notícia continua: "...mas o dom gratuito de Deus é a vida eterna, em Cristo Jesus, nosso Senhor" (Romanos 6:23). Embora mereçamos morte, Deus nos oferece vida! Embora mereçamos condenação, Deus nos oferece perdão!</p><p>Como? Através de Cristo. Ele tomou em Si nosso pecado na cruz. "Aquele que não conheceu pecado, ele o fez pecado por nós; para que nele fôssemos feitos justiça de Deus" (2 Coríntios 5:21). Jesus, o Filho de Deus perfeito e sem pecado, foi condenado por nossos pecados. Derramou Seu sangue por nós. Morreu por nós. Ressuscitou por nós.</p><p>Portanto, a compreensão do pecado não é para desespero, mas para esperança! Quando você compreende a seriedade do pecado, você compreende a seriedade da solução. Quando você compreende que está condenado, você compreende a graça de salvação em Cristo. A notícia do pecado é má; mas a boa notícia do evangelho é melhor!</p>`,cards:[{q:"O que é pecado e qual é sua consequência?",a:"Pecado é desobediência a Deus e rejeição de Sua autoridade. Sua consequência é morte espiritual e separação eterna de Deus."}]},

  {id:6,name:'Salvação em Cristo',dur:'15 min',content:`<h3>Salvação: O Dom Gratuito de Deus em Cristo</h3><p>Oh, que privilégio estudar a doutrina mais preciosa - a salvação em Jesus Cristo! Este é o coração do evangelho. Este é a razão pela qual Jesus veio. Este é a solução para o problema do pecado e a morte. Deixe seu coração se alegrar nesta verdade maravilhosa!</p><p>O que significa ser "salvo"? Significa ser resgatado do pecado, da condenação e da morte eterna. Significa ter seus pecados perdoados. Significa ter relacionamento restaurado com Deus. Significa ter eternidade com Deus garantida. Significa ser transformado de dentro para fora pela graça de Deus.</p><p>Agora, há certos elementos que trabalham juntos na salvação. Deixe-me explicá-los.</p><p>Primeiro: Arrependimento. Isto significa virar-se do pecado. Não é apenas sentir tristeza pelo pecado cometido (embora isso seja envolvido). Arrependimento é uma mudança de mente que resulta em mudança de direção. É dizer "não" ao pecado e "sim" a Deus. Atos 3:19 afirma: "Arrependei-vos, pois, e convertei-vos, para que os vossos pecados sejam apagados."</p><p>Segundo: Fé em Jesus. Isto significa confiar em Jesus como seu Salvador e Senhor. Crer não é apenas concordância intelectual ("sim, Jesus existiu"). É confiança pessoal ("confio em Jesus para minha salvação"). É entrega ("rendo minha vida a Ele"). João 3:16 declara: "Porque Deus amou o mundo de tal maneira, que deu o seu Filho unigênito, para que todo o que nele crê não pereça, mas tenha a vida eterna."</p><p>Terceiro: Justificação. Isto é um termo legal que significa "ser declarado justo". Quando você confia em Cristo, Deus o declara justo não baseado em seus méritos (que não existem), mas baseado nos méritos de Cristo. Seus pecados são cobertos pelo sangue de Cristo. Você é visto como justo diante de Deus. Romanos 3:24-25 afirma: "Sendo justificados gratuitamente pela sua graça, mediante a redenção que há em Cristo Jesus; a quem Deus propôs como propiciação, pela fé, no seu sangue..."</p><p>Quarto: Regeneração. Isto significa nascer de novo. Quando você vem a Cristo, Deus o transforma de dentro. O Espírito Santo entra em você, criando você de novo espiritualmente. Você não é mais apenas pecador condenado; você é filho/filha de Deus. 2 Coríntios 5:17 afirma: "Portanto, se alguém está em Cristo, é nova criatura; as coisas antigas já passaram; eis que se fizeram novas todas as coisas."</p><p>Quinto: Santificação. Isto é o processo de ser gradualmente transformado em semelhança a Cristo. Você não é santo perfeitamente no momento da salvação. Mas você começa uma jornada de crescimento espiritual. O Espírito Santo trabalha em você, purificando você de pecado, desenvolvendo em você o fruto do Espírito. 1 Tessalonicenses 5:23 afirma: "E o mesmo Deus de paz vos santifique completamente; e todo o vosso ser, espírito, alma e corpo, seja conservado irrepreensível para a vinda de nosso Senhor Jesus Cristo."</p><p>Sexto: Adoção. Você não é apenas perdoado. Você é adotado na família de Deus! Você se torna filho/filha de Deus com todos os privilégios e proteção que isto implica. Romanos 8:15 diz: "Não recebestes o espírito de escravidão para estardes outra vez com medo; mas recebestes o Espírito de adoção, pelo qual clamamos: Aba, Pai!"</p><p>Sétimo: Segurança eterna. Uma vez que você é salvo, você permanece salvo. Sua salvação não depende de seu desempenho. Não é "ganhe" e "perca" constantemente. Você é selado com o Espírito Santo para o dia da redenção (Efésios 4:30). Jesus promete: "as minhas ovelhas ouvem a minha voz, e eu as conheço, e elas me seguem; e eu lhes dou a vida eterna, e nunca hão de perecer, e ninguém as arrebatará da minha mão" (João 10:27-28). Uma vez salvo, eternamente salvo!</p><p>Agora, como você recebe esta salvação? Não é pela obra. Não é pelo mérito. Não é pelo seu esforço. É completamente pela graça de Deus. Efésios 2:8-9 afirma: "Porque pela graça sois salvos, mediante a fé; e isto não vem de vós, é dom de Deus; não vem das obras, para que ninguém se glorie."</p><p>Você simplesmente aceita o presente! Você se arrepende de seus pecados. Você confessa Jesus como seu Senhor (Romanos 10:9). Você confia Nele sua vida. E Ele o salva. É simples. É maravilhoso. É disponível a todos: "Mas, a todos quantos o receberam, deu-lhes o poder de serem feitos filhos de Deus, aos que crêem no seu nome" (João 1:12).</p><p>Portanto, se você nunca confiou em Jesus, faça isto agora! Não há tempo a perder. Diga a Ele: "Deus, sou pecador. Merecia morte. Mas Jesus morreu por mim. Arrependo-me de meus pecados. Confio em Jesus como meu Salvador e Senhor. Por favor, salve-me!" E Ele o salvará! Você será salvo, perdoado, transformado, adotado e eternamente seguro em Deus!</p>`,cards:[{q:"Como recebemos a salvação em Cristo?",a:"Através de arrependimento do pecado e fé em Jesus, que nos justifica, regenera, santifica e adota como filhos de Deus."}]},

  {id:7,name:'A Igreja: Corpo de Cristo',dur:'15 min',content:`<h3>A Igreja: Comunidade do Povo Redentor</h3><p>Que privilégio é parte de algo maior que si mesmo! A Igreja não é um prédio. É um organismo vivo. É você junto com todos os outros cristãos na história da humanidade, formando o corpo de Cristo. Que verdade gloriosa e animadora!</p><p>Efésios 1:22-23 afirma: "E sujeitou todas as coisas a seus pés, e o fez cabeça sobre todas as coisas para a igreja, que é o seu corpo, a plenitude daquele que a todos em tudo enche." A Igreja é descrita como o corpo de Cristo, com Jesus como cabeça. Assim como um corpo humano tem muitos membros com diferentes funções, mas todos servindo o mesmo corpo, assim a Igreja tem muitos membros (cristãos) com diferentes dons, mas todos servindo o mesmo corpo sob Cristo.</p><p>O que é a Igreja essencialmente? É a comunidade de todos os que confiaram em Jesus como Senhor e Salvador. Não é uma organização meramente humana. Não é baseada em filiação nominal. É a comunhão dos redimidos. 1 Pedro 2:9-10 descreve: "Mas vós sois geração eleita, sacerdócio real, nação santa, povo de propriedade exclusiva de Deus, para que proclameis as virtudes daquele que vos chamou das trevas para a sua maravilhosa luz; vós, que outro tempo não éreis povo, mas agora sois povo de Deus."</p><p>Qual é o propósito da Igreja? Há vários propósitos que trabalham juntos.</p><p>Primeiro: Adoração. A Igreja existe para glorificar a Deus e adorá-Lo. Você é "pedra viva" construída no "edifício espiritual, para ser um sacerdócio santo" (1 Pedro 2:5). Você oferece a Deus louvor, gratidão e devoção. A adoração não é apenas cantar músicas bonitas. É rendir sua vida a Deus. É declará-Lo supremo. É amar-Lo de todo coração, mente, alma e força.</p><p>Segundo: Comunhão. A Igreja é comunidade. É um lugar onde você experimenta verdadeiro relacionamento com outros cristãos. Atos 2:42-47 descreve: "E perseveravam na doutrina dos apóstolos, e na comunhão, no partir do pão, e nas orações... E todos que criam estavam juntos, e tinham tudo em comum." A comunhão significa compartilhar vida uns com outros. Você é apoiado. Você apoia outros. Há alegria compartilhada, luto compartilhado, crescimento compartilhado.</p><p>Terceiro: Edificação. A Igreja existe para edificar seus membros na fé. Você é ensinado a verdade da Palavra de Deus. Você cresce em compreensão. Você é desafiado a viver piedosamente. Você é trazido através de disciplina e correção quando necessário. 1 Timóteo 3:15 afirma que a Igreja é "coluna e fundamento da verdade".</p><p>Quarto: Evangelismo e Missão. A Igreja é comissionada para levar o evangelho a todas as nações. "Portanto, ide, ensinai todas as nações, batizando-as em nome do Pai, e do Filho, e do Espírito Santo; ensinando-as a guardar todas as coisas que vos tenho mandado" (Mateus 28:19-20). Você é um missionário chamado a compartilhar o evangelho com aqueles que o rodeiam.</p><p>Quinto: Serviço. A Igreja existe para servir os necessitados. O cuidado aos pobres, aos doentes, aos marginalizados é mandato cristão central. Mateus 25:31-46 descreve o Juízo Final baseado em obras de misericórdia. A Igreja é sinal do reino de Deus quando alimenta famintos, veste nus, visita prisioneiros, cuida dos doentes.</p><p>Qual é a estrutura da Igreja? Há liderança. O Novo Testamento menciona apóstolos, profetas, pastores/bispos, mestres. Há diferentes dons distribuídos pelo Espírito Santo. Mas não há hierarquia opressiva. Há "muito mais respeito para com o membro que é fraco" (1 Coríntios 12:24). É um corpo onde o mais fraco é valorizado.</p><p>Na tradição Pentecostal/Assembleia de Deus, enfatizamos a importância do Espírito Santo operando livremente. Não é apenas liderança humana que governa. É o Espírito Santo que dá dons, que chama obreiros, que dirige a pregação. Há liberdade profética. Há manifestações do Espírito Santo. A Igreja é vibrante, viva, dinâmica sob o poder do Espírito.</p><p>Se você é cristão, você é membro da Igreja! Você é importante. Você tem dons que o corpo precisa. Você tem um papel a cumprir. Você não é mero espectador. Você é sacerdote. Você é testemunha. Você é servo. Envolva-se plenamente na vida da comunidade local de crentes. Seja fiel. Contribua seus dons. Cresça. Sirva. Ame. Pois você é parte do grande corpo de Cristo que existiu através de 2000 anos e existirá para sempre!</p>`,cards:[{q:"O que é a Igreja essencialmente?",a:"A Igreja é a comunidade de todos os que confiaram em Jesus, formando o corpo de Cristo com Ele como cabeça."}]},

  {id:8,name:'Batismo e Ceia do Senhor',dur:'15 min',content:`<h3>Batismo e Ceia do Senhor: Ordenanças de Cristo</h3><p>Que privilégio estudar estas duas práticas centrais que Jesus deixou para Sua Igreja! O batismo e a Ceia do Senhor (também chamada comunhão ou Eucaristia) são mais que tradições humanas. São ordenanças de Cristo com profundo significado espiritual. Quando você participa delas, você participa de algo sagrado e transformador!</p><p>BATISMO</p><p>O batismo é identificação pública com Jesus Cristo. Quando você é batizado, você está dizendo ao mundo: "Eu sou cristão. Eu pertença a Jesus. Eu morro para meu próprio governo e ressuscito para seguir a Cristo." Romanos 6:3-5 afirma: "Ou não sabeis que todos nós que fomos batizados em Cristo Jesus fomos batizados na sua morte? Portanto, fomos sepultados com ele na morte pelo batismo... assim também nós andemos em novidade de vida."</p><p>O batismo não salva você. Salvação vem pela fé em Cristo. Mas batismo é a resposta visível de fé. É o primeiro ato público de obediência a Cristo. É a transição pública de estar "no mundo" para estar "na Igreja". É um testemunho poderoso.</p><p>Como é realizado o batismo? Diferentes tradições cristãs têm variações. Alguns batizam por aspersão (respingo). Alguns batizam por efusão (derramamento). A tradição Pentecostal/Assembleia de Deus, assim como muitas tradições evangélicas, pratica a imersão - você é completamente imerso na água, simbolizando morte e ressurreição. Atos 8:38-39 descreve: "E mandou parar o carro, e desceram ambos à água, tanto Felipe como o eunuco, e Felipe o batizou. E quando saíram da água, o Espírito do Senhor arrebatou a Felipe..."</p><p>O batismo é recomendado logo após a conversão. Atos 2:38 registra Pedro dizendo: "Arrependei-vos, e cada um de vós seja batizado em nome de Jesus Cristo para perdão de vossos pecados, e recebereis o dom do Espírito Santo." A sequência é clara: creia (em Cristo), arrependa-se (de pecado), seja batizado (publicamente), e receba o Espírito (graça divina).</p><p>CEIA DO SENHOR</p><p>A Ceia do Senhor (também chamada comunhão) é celebração regular do sacrifice de Cristo. Jesus iniciou isto na última refeição que compartilhou com Seus discípulos antes de Sua crucificação. Lucas 22:19-20 registra: "E tomando o pão, deu graças, e partiu-o, e deu-lhes, dizendo: Este é o meu corpo, que por vós é dado; fazei isto em memória de mim. Semelhantemente também o cálice, depois da ceia, dizendo: Este cálice é o novo pacto no meu sangue, que é derramado por vós."</p><p>O que a Ceia significa? É memória. Você se lembra da morte de Cristo por você. É comunhão. Você tem comunhão com Cristo e com outros cristãos. É antecipação. Você antecipa o banquete final no reino de Deus, quando você comerá e beberá com Cristo na eternidade. É proclamação. 1 Coríntios 11:26 afirma: "Porque cada vez que comerdes este pão e beberdes este cálice, anuncieis a morte do Senhor, até que ele venha."</p><p>Qual é a significância do pão e do vinho? O pão representa o corpo de Cristo que foi dado por você. O vinho (ou suco de uva) representa o sangue de Cristo que foi derramado por você. Diferentes tradições entendem isto de formas diferentes - alguns veem a presença literal de Cristo no pão e vinho; outros veem a presença espiritual; outros veem isto como memorial simbólico. Mas o essencial é o mesmo: você se alimenta espiritualmente de Cristo. Você se apropria pessoalmente dos benefícios de Sua morte e ressurreição.</p><p>Como deve a Ceia ser praticada? Com reverência. Com fé. Com exame pessoal. 1 Coríntios 11:27-29 adverte: "Portanto, aquele que comer o pão, ou beber o cálice do Senhor indignamente, será culpado do corpo e do sangue do Senhor. Mas examine-se o homem a si mesmo, e assim coma do pão e beba do cálice. Porque o que come e bebe, come e bebe para sua condenação, se não discernir o corpo do Senhor."</p><p>Isto significa que você deve estar em relacionamento correto com Deus e com outros cristãos antes de participar. Se você está em pecado não confessado, você deve lidar com isto primeiro. Se você está em inimizade com um irmão, você deve buscar reconciliação. A Ceia não é para "condenar você se você não é cristão"; é para nutrir e recordá-lo se você é cristão.</p><p>Com que frequência devemos participar da Ceia? As práticas variam. Alguns celebram toda semana. Alguns mensal. Alguns algumas vezes por ano. Não há comando bíblico específico quanto à frequência, apenas que você "façais isto em memória de mim" regularmente. A maioria das igrejas evangélicas celebra ao menos mensal, alguns toda semana.</p><p>Portanto, querido aluno, quando você participa do batismo e da Ceia, você está participando de ordenanças que Jesus Himself estabeleceu. Você está fazendo algo que conecta você com cristãos através de 2000 anos de história. Você está proclamando sua fé e recordando a salvação que você recebeu em Cristo. Que privilégio incomparável!</p>`,cards:[{q:"Qual é o significado do batismo e da Ceia do Senhor?",a:"Batismo é identificação pública com Cristo; Ceia é memorial da morte de Cristo e comunhão espiritual com Ele."}]},

  {id:9,name:'O Fim de Tudo: Consumação em Cristo',dur:'15 min',content:`<h3>Consumação: O Retorno de Cristo e a Eternidade</h3><p>Que maneira maravilhosa de encerrar nosso estudo de teologia sistemática - contemplando o fim glorioso de tudo! A história da redenção aponta para uma culminação onde Cristo retorna, todas as coisas são restauradas, e a eternidade feliz com Deus começa para os redimidos. Que esperança devemos ter!</p><p>A Bíblia começa com criação (Gênesis 1) e termina com nova criação (Apocalipse 21). Começa com Deus caminhando no jardim com Adão e Eva (Gênesis 3:8). Termina com Deus habitando com a humanidade redimida no novo céu e nova terra (Apocalipse 21:3). O círculo é completo. A história é redimida. A intenção original de Deus é restaurada!</p><p>Como cristão, sua esperança não é escapismo deste mundo. Sua esperança é que este mundo será transformado, restaurado, renovado. Jesus ensinava: "Venha o teu reino. Faça-se a tua vontade, assim na terra como no céu" (Mateus 6:10). A vontade de Deus está no céu; você ora que venha à terra. Isto significa transformação cósmica. Significa renovação de tudo.</p><p>Como descrito em Apocalipse 21:1-4, há novo céu e nova terra. Não é destruição de tudo. É transformação de tudo. A redenção cristã é holística - não é apenas salvação de almas para algum realm espiritual abstrato. É redenção do corpo, da criação, da história, de tudo! Você será ressuscitado em corpo glorificado. Você habitará em terra renovada. Você comerá frutas da Árvore da Vida. Você será conhecido e será conhecido. Não é existência fantasmagórica; é vida real, corpórea, relacional, criativa!</p><p>Como você deveria viver com esta esperança? Deixe-me oferecer algumas implicações práticas.</p><p>Primeiro: Urgência missionária. Se você sabe que o tempo está se cumprindo, que Cristo retorna, você deveria estar queimado por evangelizar! Há almas que morrerão sem Cristo. Há nações que não têm acesso ao evangelho. Há pessoas em sua própria vida que precisam ser salvas. O tempo não é infinito. Aproveite cada oportunidade para compartilhar o evangelho! "Como, pois, invocarão aquele em quem não crêem? E como crerão naquele de quem não ouviram falar? E como ouvirão, se não há quem pregue?" (Romanos 10:14).</p><p>Segundo: Santidade prática. Se você espera ver Jesus, você deveria estar vivendo de forma que o deixaria sem vergonha diante Dele. Abandone o pecado. Cultive virtude. Viva com integridade. "E todo o que tem esta esperança em si, purifica-se a si mesmo, como também ele é puro" (1 João 3:3). A santidade não é trabalho meritório; é resposta à graça. É manifestação de que você realmente ama a Jesus e deseja agradá-Lo.</p><p>Terceiro: Atividade social. Não se retire do mundo em espera passiva pelo fim. Trabalhe pela justiça, pela redenção do mundo, pelo bem das pessoas. Cuidar dos pobres, defender os oprimidos, trabalhar pela reconciliação - isto não é distração do evangelho. Isto é expressão do evangelho! O reino de Deus é agora e também futuro. Trabalhe para tornar presente realidade do reino.</p><p>Quarto: Alegria e esperança. Não seja pessimista ou ansioso sobre o futuro. Você sabe como termina a história. Cristo vence. O mal é destruído. Você (se é cristão) estarão para sempre com Deus em beleza e paz indescritível. Portanto, "regozijai-vos sempre" (Filipenses 4:4). "Sejam conhecidas as vossas petições diante de Deus pela oração e súplica, com ação de graças" (Filipenses 4:6). A esperança cristã é alegre, contagiosa, transformadora!</p><p>Quinto: Confiança em Deus. Não importa quanto caos há no mundo agora. Não importa quanto sofrimento você vê. Não importa quanto injustiça pareça triunfar. Você sabe que Deus está no controle. Ele tem um plano. Ele levará à bom termo. Sua palavra não falhará. Seu propósito será cumprido. "Os céus e a terra passarão, mas as minhas palavras não hão de passar" (Mateus 24:35).</p><p>Portanto, em conclusão deste curso de teologia sistemática, lembre-se dos pontos centrais: Deus existe e se revelou. Você foi criado à Sua imagem. Você é pecador necessitando redenção. Você pode ser salvo através de Cristo. Você é parte da Igreja, a comunidade dos redimidos. Você tem esperança da consumação quando Cristo retorna e eternidade é restaurada. Viva com isto em mente! Que isto transforme como você pensa, como você age, como você ama, como você espera!</p>`,cards:[{q:"Como a consumação futura deveria afetar como você vive hoje?",a:"Com urgência missionária, busca de santidade, atividade pela justiça social, alegria e confiança em que Deus cumprirá Seu propósito."}]}
];
