      html: '<h4>Como Enviar Produtos</h4><p><strong>Correios</strong>: opção clássica. Você leva pacote, Correios entrega. Caro mas lento (10-15 dias). <strong>Logística privada</strong>: Sedex, Loggi, Melhor Envio. Mais rápido (2-3 dias) e caro. <strong>Fulfillment center</strong>: você envia tudo pra lá, eles enviam pra cliente. Caro mas você não mexe.</p><blockquote class="tip">Frete é 10-20% de vendas online. Quanto menor frete, mais cliente compra. Você quer frete barato.</blockquote><blockquote class="example">Produto: camiseta R$ 50. Frete Correios: R$ 20 (40%). Cliente não compra. Frete Sedex: R$ 8. Cliente compra. Logística afeta conversão.</blockquote><p><strong>Quanto cobrar de frete?</strong> Você não absorve. Você coloca no preço ou cobra do cliente (taxa de frete). Melhor: deixar cliente ver antes de comprar. Transparência ajuda.</p><p><strong>Integração com plataforma</strong>. Shopify integra com Melhor Envio, Sedex, Loggi. Cliente coloca CEP, vê frete, você integra e envia (rótulo gerado automaticamente).</p><blockquote class="quote">Logística é differentiator. Frete rápido e barato vence lento e caro sempre.</blockquote>'
