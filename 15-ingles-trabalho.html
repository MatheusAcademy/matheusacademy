<script>
var COURSE = { id:'IT', name:'Inglês para Trabalho', shortName:'Inglês para Trabalho', cat:'Inglês', desc:'Domine inglês profissional: emails, reuniões, apresentações e negociações para avançar sua carreira.', salt:'IT_HENRY_2026_MASTER', ak:'it_auth', courseKey:'it', prefix:'it_', color:'#455A64', glow:'rgba(69,90,100,.35)', free:false, freeModules:1, modules:3, topics:9, hours:4, quizzes:9 };
var MODS = [
  { id:'it_mod1', name:'Comunicação Profissional Escrita', free:false,
    topics:[
      {id:1, name:'Emails Profissionais e Correspondência', dur:'22 min', content:`<h3>Emails Profissionais e Correspondência</h3><p>Emails são o coração da comunicação profissional. Dominar a escrita de emails claros, concisos e apropriados para diferentes contextos é essencial para sua carreira.</p><h4>Estrutura de Email Profissional</h4><p><strong>Linha de assunto (Subject Line):**<br>A linha de assunto deve ser clara, concisa e específica. Deve informar ao destinatário exatamente sobre o que o email trata sem exigir que abra para descobrir.<br><br>✅ Bom: "Project Update: Q4 Marketing Strategy Approval Needed by Friday"<br>❌ Evitar: "Hello" ou "Hi" ou "Stuff"<br><br>Outros exemplos:<br>"Meeting Request: Quarterly Review Discussion on December 15th"<br>"Budget Proposal for 2026 - Engineering Department"<br>"Follow-up: Previous Discussion About Remote Work Policy"<br>"Urgent: System Outage - IT Support Needed"</p><p><strong>Saudação (Greeting):**<br>Use formais a menos que você conheça bem a pessoa.<br><br>Muito formal: "Dear Mr./Ms. [Last Name]," (usado em correspondência oficial)<br>Formal: "Hello [First Name]," ou "Hi [First Name],"<br>Menos formal: "Hi [First Name]," ou "Hey [First Name]," (se você já trabalha com a pessoa)<br>Casual: "Hey [First Name]," ou "Hi there," (apenas se seu ambiente é muito casual)<br><br>Se não sabe o nome: "Dear Hiring Manager," ou "Hello," ou "To whom it may concern,"</p><p><strong>Corpo do Email (Body):**<br>Mantenha parágrafos curtos, uma ideia por parágrafo, e use linguagem clara. Não seja excessivamente longo.</p><p><strong>Fechamento (Closing):**<br>Formal: "Best regards," / "Sincerely," / "Kind regards,"<br>Menos formal: "Best," / "Thanks," / "Warm regards,"<br>Casual: "Cheers," / "Talk soon," (apenas em ambiente casual)<br><br>Assinatura profissional deve incluir:<br>Seu nome completo<br>Título do trabalho<br>Empresa<br>Telefone<br>Email<br>Website (opcional)</p><h4>Tipos Comuns de Emails Profissionais</h4><p><strong>1. Email de Solicitação de Informação</strong><br><br>Subject: "Request for Information: Q3 Sales Data"<br><br>"Hi Sarah,<br><br>I hope this email finds you well. I'm writing to request the sales data for Q3 2025. I need this information to prepare the annual report, and I would appreciate it if you could send it by Thursday of this week.<br><br>Would it be possible to include breakdowns by region and product category?<br><br>Thank you for your assistance.<br><br>Best regards,<br>John Smith"</p><p><strong>2. Email de Agendamento de Reunião</strong><br><br>Subject: "Meeting Request: Project Kickoff Meeting"<br><br>"Hi Michael,<br><br>I hope you're having a great week. I'd like to schedule a meeting to discuss the new client project. Would you have availability next week? I'm flexible with timing and can work around your schedule.<br><br>Proposed times:<br>- Monday, 2:00 PM - 4:00 PM<br>- Tuesday, 10:00 AM - 12:00 PM<br>- Thursday, 1:00 PM - 3:00 PM<br><br>Please let me know what works best for you, or feel free to suggest alternative times.<br><br>Looking forward to hearing from you.<br><br>Best regards,<br>Emma"</p><p><strong>3. Email de Acompanhamento</strong><br><br>Subject: "Follow-up: Budget Approval for Marketing Campaign"<br><br>"Hi David,<br><br>I wanted to follow up on my previous email regarding the marketing campaign budget. I understand you've been very busy, but I wanted to check in to see if you've had a chance to review the proposal.<br><br>The timeline for approval is critical as we're aiming to launch the campaign on March 1st. Do you have any questions about the proposal, or is there anything I can clarify?<br><br>Thank you,<br><br>Best regards,<br>Lisa"</p><p><strong>4. Email Respondendo a um Problema/Preocupação</strong><br><br>Subject: "RE: System Performance Issues - Resolution Update"<br><br>"Hi James,<br><br>Thank you for reporting the system performance issues. I want to assure you that we're taking this very seriously. Our IT team has investigated the matter and identified the root cause.<br><br>We've implemented a fix and are currently monitoring the system closely. We expect full stability by end of business today. I apologize for any inconvenience this may have caused.<br><br>Please don't hesitate to reach out if you experience any further issues.<br><br>Best regards,<br>Robert"</p><h4>Dicas Importantes para Email Profissional</h4><p><strong>1. Verificar sempre:**<br>- Gramática e ortografia<br>- Endereço de email correto<br>- Linha de assunto apropriada<br>- Tom apropriado<br>- Attachments (se mencionou, tem anexo?)<br><br><strong>2. Tom apropriado:**<br>- Não seja muito casual ("hey what's up")<br>- Não seja muito formal ("pursuant to our discussion")<br>- Seja respeitoso e profissional<br>- Use contrações em ambiente menos formal<br>- Evite ALL CAPS (significa gritaria)<br>- Evite emoticons em emails muito formais<br><br><strong>3. Comprimento:**<br>- Mantenha conciso<br>- Se é muito longo, considere uma reunião<br>- Máximo 3-4 parágrafos para email casual<br>- Máximo 5-6 parágrafos para email mais formal<br><br><strong>4. Clareza:**<br>- Uma ideia por parágrafo<br>- Use bullet points para listas<br>- Seja específico (não vague)<br>- Use linguagem simples e direta<br><br><strong>5. Prioridade:**<br>- Use "URGENT" ou "HIGH PRIORITY" apenas quando realmente necessário<br>- Respeite o tempo das pessoas<br>- Não envie emails fora do horário comercial a menos que seja emergência</p>`, cards:[{q:"Qual é uma boa linha de assunto de email profissional?",a:"'Project Update: Q4 Strategy Approval Needed by Friday' - seja claro, conciso e específico sobre o tema."},{q:"Como fechar um email profissional formalmente?",a:"'Best regards,' ou 'Sincerely,' seguido de sua assinatura profissional com nome completo, cargo e empresa."},{q:"O que fazer antes de enviar um email importante?",a:"Verifique: gramática, ortografia, endereço de email correto, tom apropriado, e se tem todos os anexos mencionados."}]},
      {id:2, name:'Relatórios e Documentos Técnicos', dur:'20 min', content:`<h3>Relatórios e Documentos Técnicos</h3><p>Relatórios, propostas e documentos técnicos requerem linguagem ainda mais formal e estruturada que emails. Estes documentos frequentemente determinam decisões importantes e precisam ser impecáveis.</p><h4>Estrutura de um Relatório Profissional</h4><p><strong>Componentes essenciais:**<br>1. Página de título (Title Page)<br>2. Sumário Executivo (Executive Summary)<br>3. Introdução (Introduction)<br>4. Corpo (Body/Main Content)<br>5. Conclusão (Conclusion)<br>6. Recomendações (Recommendations)<br>7. Apêndices (Appendices) - se necessário<br>8. Referências (References)</p><p><strong>Página de Título:**<br>Deve conter:<br>- Título claro e descritivo<br>- Autor/Departamento<br>- Data<br>- Versão número (se aplicável)<br>- Nome da organização<br><br>Exemplo: "Q4 2025 Financial Performance Report"<br>"Prepared by: Finance Department"<br>"Date: January 15, 2026"<br>"Version: 1.0"</p><p><strong>Sumário Executivo (Executive Summary):**<br>1-2 páginas que resumem:<br>- O que é o relatório<br>- Achados principais<br>- Recomendações<br>- Impacto/Importância<br><br>Executivos frequentemente leem APENAS o executive summary, então deve ser completamente compreensível sozinho.</p><p><strong>Introdução:**<br>Estabeleça:<br>- Propósito do relatório<br>- Escopo do trabalho<br>- Contexto/Background<br>- Objetivos<br>- Metodologia (se pesquisa)<br><br>Exemplo: "This report analyzes Q4 sales performance across all regional offices. The analysis covers the period from October 1 to December 31, 2025, and examines factors contributing to the 12% increase in revenue compared to Q3."</p><p><strong>Corpo do Relatório:**<br>- Use cabeçalhos claros (Headers and Subheaders)<br>- Organize por tópicos lógicos<br>- Use dados, gráficos, e tabelas para apoiar pontos<br>- Seja objetivo e factual<br>- Cite fontes apropriadamente<br><br>Estrutura típica:<br>"2. Market Analysis<br>2.1 Market Size and Growth<br>2.2 Competitive Landscape<br>2.3 Customer Demographics"</p><p><strong>Conclusão:**<br>- Resuma os pontos principais<br>- Restate o propósito do relatório<br>- Resuma achados-chave<br>- Não introduza novas informações<br><br>Exemplo: "Our analysis demonstrates that targeted marketing in the Southeast region resulted in significant revenue growth. These findings suggest that continued investment in this strategy will yield positive results."</p><p><strong>Recomendações:**<br>- Sejam acionáveis (actionable)<br>- Sejam baseadas em dados/achados<br>- Sejam priorizadas (se múltiplas)<br>- Incluam próximos passos<br><br>Bom exemplo:<br>"1. Increase marketing budget for Southeast region by 25% in Q1 2026<br>2. Hire two additional regional managers to support growth<br>3. Implement customer feedback system to improve retention"</p><h4>Linguagem em Documentos Técnicos</h4><p><strong>Ser formal e preciso:**<br>❌ "The software kinda broke" → ✅ "The software encountered a critical failure"<br>❌ "We think it's important" → ✅ "Analysis indicates this is a priority initiative"<br>❌ "Most people liked it" → ✅ "85% of survey respondents expressed satisfaction"<br><br><strong>Use voz passiva quando apropriado:**<br>"It is recommended that..." (Em vez de "We recommend...")<br>"The findings indicate that..." (Em vez de "The study shows...")<br>"It was determined that..." (Em vez de "We found that...")<br><br><strong>Seja específico com números:**<br>❌ "Sales increased a lot" → ✅ "Sales increased by 23.5% quarter-over-quarter"<br>❌ "Many customers responded" → ✅ "847 customers (68% response rate) responded"<br><br><strong>Use verbos forte em negócios:**<br>"Analyze, demonstrate, determine, establish, evaluate, examine, identify, implement, indicate, justify, recommend, summarize, validate"</p><h4>Formatação de Documento</h4><p><strong>Padrões importantes:**<br>- Fonte legível (Arial, Calibri, Times New Roman)<br>- Tamanho 11-12pt para corpo, 14-16pt para títulos<br>- Espaçamento duplo ou 1.5 entre linhas<br>- Margens de 1 polegada (2.54cm) em todos os lados<br>- Alinhamento à esquerda para corpo<br>- Números de página na parte inferior ou canto superior direito<br>- Cabeçalhos/footers para informação adicional<br><br><strong>Tabelas e Gráficos:**<br>- Sempre incluem título descritivo<br>- Incluem fonte de dados<br>- São numerados (Table 1, Figure 2, etc)<br>- São referenciados no texto<br><br>Exemplo: "As shown in Table 3, sales performance varied significantly by region, with the West Coast office exceeding targets by 15%."</p><h4>Proofreading e Qualidade</h4><p><strong>Checklist antes de enviar:**<br>☐ Verifiquei ortografia/gramática<br>☐ Consistência em terminologia<br>☐ Números/dados estão corretos<br>☐ Tabelas/gráficos estão bem formatados<br>☐ Todas as referências estão citadas<br>☐ Documento está bem estruturado<br>☐ Linguagem é clara e profissional<br>☐ Página de título está completa<br>☐ Sumário está atualizado<br>☐ Documento foi revisado por alguém</p>`, cards:[{q:"Qual é a estrutura básica de um relatório profissional?",a:"Título, Executive Summary, Introdução, Corpo (com subseções), Conclusão, Recomendações, Apêndices, Referências."},{q:"O que é um Executive Summary?",a:"Um resumo de 1-2 páginas dos achados, recomendações e impacto. Deve ser compreensível sozinho."},{q:"Como ser específico em documentos técnicos?",a:"Use números e dados concretos. 'Sales increased by 23.5%' em vez de 'Sales increased a lot'."}]},
      {id:3, name:'Propostas e Apresentações Escritas', dur:'21 min', content:`<h3>Propostas e Apresentações Escritas</h3><p>Propostas são documentos que vendem uma ideia, projeto ou serviço. Elas precisam ser persuasivas enquanto mantêm profissionalismo.</p><h4>Estrutura de uma Proposta Bem-Sucedida</h4><p><strong>1. Cover Letter / Página de Rosto:**<br>Breve carta apresentando a proposta. Deve estar endereçada à pessoa específica se possível.</p><p><strong>2. Executivr Summary / Propósito:**<br>"This proposal outlines our plan to redesign your company website and modernize your digital presence. We estimate the project will take 16 weeks and cost $45,000, with measurable results in increased traffic and customer engagement."</p><p><strong>3. The Problem/Oportunidade (Problem Statement):**<br>- Demonstre que você entende o desafio<br>- Seja empático às dores do cliente<br>- Use dados/pesquisa se possível<br>- Não seja muito crítico<br><br>Exemplo: "Your current website receives 15,000 monthly visitors but has a 65% bounce rate and 2% conversion rate. Industry benchmarks for your sector are 35% bounce rate and 5% conversion. This gap represents significant lost revenue."</p><p><strong>4. Solução Proposta (Solution/Approach):**<br>- Explique como vai resolver o problema<br>- Seja claro e específico<br>- Divida em fases se apropriado<br>- Mostre que é viável<br><br>Exemplo:<br>"Phase 1 (Weeks 1-4): User Research and Strategy<br>- Conduct user interviews and usability testing<br>- Develop sitemap and user flows<br>- Create design mockups<br><br>Phase 2 (Weeks 5-12): Development and Implementation<br>- Front-end development<br>- Backend integration<br>- Testing and optimization<br><br>Phase 3 (Weeks 13-16): Launch and Training<br>- Final testing and refinements<br>- Team training\n- Documentation and handoff"</p><p><strong>5. Timeline (Project Schedule):**<br>Use um cronograma visual se possível. Mostre:<br>- Datas de início e término de cada fase<br>- Marcos principais (milestones)<br>- Prazos de decisão críticos<br>- Data de conclusão final<br><br>Exemplo: "Project Timeline<br>Project Start: January 20, 2026<br>Phase 1 Complete: February 17, 2026<br>Phase 2 Complete: April 21, 2026<br>Phase 3 Complete: May 19, 2026\nProject Launch: May 25, 2026"</p><p><strong>6. Equipe e Qualificações:**<br>- Apresente a equipe que trabalhará no projeto<br>- Destaque experiência relevante<br>- Use bios curtos\br>- Inclua fotos (se apropriado)<br><br>Exemplo: "John Smith - Project Manager (12 years experience in web redesigns). Sarah Chen - UX Designer (award-winning designer with focus on e-commerce). Mike Johnson - Lead Developer (expert in React and modern web technologies)."</p><p><strong>7. Investimento / Pricing:**<br>Seja claro sobre custos:<br>- Preço total<br>- O que está incluído<br>- O que não está incluído<br>- Termos de pagamento<br><br>Exemplo: "Project Investment: $45,000<br>Included: All design, development, testing, and training\nNot Included: Additional stock photography, custom integrations beyond scope\nPayment Terms: 50% upon project start, 50% upon completion"</p><p><strong>8. Resultados Esperados (Expected Outcomes):**<br>Demonstre ROI:<br>- Resultados mensuráveis<br>- Prazos para ver resultados<br>- Comparação com benchmarks<br><br>Exemplo: "Based on industry benchmarks, we project:\n- Bounce rate reduction to 40% within 3 months\n- Conversion rate increase to 4.5% within 6 months\n- 40% increase in organic traffic within 12 months\nEstimated revenue impact: $200,000 annually"</p><p><strong>9. Próximas Etapas (Next Steps):**<br>Seja claro sobre o que vem depois:<br>- Como você quer procedur\n- Timeline para decisão\n- Como você pode ser contatado\n<br>Exemplo: "We're excited to discuss this proposal and answer any questions. Please let us know if you'd like to schedule a 30-minute call to review the details. We'll need your decision by January 30th to begin work on the scheduled start date of February 20th."</p><h4>Dicas para Propostas Persuasivas</h4><p><strong>1. Customize para cada cliente:**<br>Genérico = ignorado. Específico = lido.<br>Use o nome do cliente, referência seus desafios específicos, mostre que você pesquisou.</p><p><strong>2. Foco em benefícios, não features:**<br>❌ "We will redesign your website using React framework"<br>✅ "Your website will load 60% faster, improving user experience and SEO rankings"<br><br><strong>3. Use prova social:**<br>"Similar companies have achieved 30% revenue increase after our work"<br>"We have 50+ satisfied clients in your industry"<br>"Case study: XYZ Company increased conversions by 45%"<br><br><strong>4. Manage expectations:**<br>Seja realista. Promessas exageradas destroem credibilidade.<br>❌ "We guarantee you'll triple your revenue"<br>✅ "Based on our analysis, we project a 25-30% revenue increase within 12 months"<br><br><strong>5. Visual design importa:**<br>Uma proposta bem-formatada, com gráficos, é mais persuasiva.<br>Use cores corporativas, imagens profissionais, layout limpo.</p>`, cards:[{q:"Qual é a estrutura básica de uma proposta profissional?",a:"Cover Letter, Executive Summary, Problem Statement, Solution, Timeline, Team Qualifications, Pricing, Expected Outcomes, Next Steps."},{q:"Como demonstrar ROI em uma proposta?",a:"Use números concretos e mensuráveis: 'Bounce rate reduction to 40% within 3 months. Estimated revenue impact: $200,000 annually.'"},{q:"Qual é a diferença entre features e benefícios?",a:"Features são o que você faz ('React framework'). Benefícios são o resultado ('Website loads 60% faster, improving user experience')."}]},
    ],
    summary:{title:"Resumo do Módulo 1: Comunicação Escrita Profissional", points:["Emails profissionais precisam de linha de assunto clara, saudação apropriada, corpo conciso, e fechamento formal. Sempre verifique antes de enviar.","Relatórios usam linguagem formal, estrutura clara com cabeçalhos, dados concretos e específicos. Executive Summary é crítico pois é frequentemente o único lido.","Propostas precisam demonstrar que você entende o problema do cliente e apresentar uma solução clara com ROI. Customize para cada cliente!","Qualidade importa: verificar ortografia, consistência, formatação e clareza. Um documento bem-escrito ganha respeito e leva a oportunidades."]},
    quizFinal:[{q:"Qual é uma boa linha de assunto de email profissional?",opts:["Hi","Project Update: Q4 Strategy Approval Needed","Hello","What's up"],correct:1},{q:"Qual é a parte mais importante de um relatório?",opts:["Introdução","Executive Summary","Apêndices","Referências"],correct:1},{q:"Como fechar um email profissional?",opts:["Talk soon","Best regards, [Name] [Title]","Cheers","Later dude"],correct:1},{q:"O que é importante em uma proposta?",opts:["Parecer genérico","Customize para cliente e focus em benefícios (resultados), não features","Prometer tudo","Ser vago"],correct:1},{q:"Como ser específico em documentos?",opts:["Use 'a lot', 'many', 'some'","Use números: 'Sales increased 23.5%'","Seja vago propositalmente","Não use dados"],correct:1},{q:"Qual é o propósito de um Executive Summary?",opts:["Ser uma introdução longa","Ser compreensível sozinho, com achados e recomendações","Ser técnico","Ocupar espaço"],correct:1},{q:"Como demonstrar ROI em uma proposta?",opts:["Fazer promessas exageradas","Usar números concretos e mensuráveis","Não mencionar dinheiro","Ser vago sobre resultados"],correct:1},{q:"O que você deve verificar antes de enviar um email?",opts:["Nada","Gramática, ortografia, endereço correto, tom, anexos","Apenas conteúdo","Apenas verificar uma vez"],correct:1},{q:"Qual é a diferença entre features e benefícios?",opts:["Não há diferença","Features são o que você faz, Benefícios são resultados para cliente","São sinônimos","Features são mais importantes"]},
]

  { id:'it_mod2', name:'Reuniões e Comunicação Oral Profissional', free:false,
    topics:[
      {id:4, name:'Participando em Reuniões Profissionais', dur:'21 min', content:`<h3>Participando em Reuniões Profissionais</h3><p>Reuniões são onde muitas decisões importantes são tomadas. Ser efetivo em reuniões - desde falar, fazer perguntas, até discordar respeitosamente - é essencial para progresso de carreira.</p><h4>Antes da Reunião</h4><p><strong>Preparação é tudo:**<br>1. Entenda o propósito - O que será discutido? O que é esperado de você?<br>2. Revise documentos relevantes - Relatórios, propostas, agendas<br>3. Prepare pontos para discussão - Tenha ideias prontas<br>4. Prepare perguntas - O que você precisa saber?<br>5. Teste tecnologia - Se for virtual, teste áudio/vídeo<br>6. Deixe buffer de tempo - Não chegue atrasado/arrumado<br><br>"I've reviewed the quarterly report and have some questions about the regional sales projections."</p><h4>Durante a Reunião: Participação Apropriada</h4><p><strong>Inicio da reunião:**<br>Cumprimente as pessoas, faça contato visual, sente-se atentatamente.<br><br>"Good morning everyone. Thanks for making time for this meeting."<br>"Hi everyone. I'm looking forward to today's discussion."</p><p><strong>Contribuindo com ideias:**<br>Não espere ser chamado - mas não fale demais.<br><br>"I'd like to add a point about..." (Gostaria de adicionar um ponto sobre...)<br>"Building on what you said..." (Construindo sobre o que você disse...)<br>"I have a suggestion..." (Tenho uma sugestão...)<br>"From my perspective..." (Do meu ponto de vista...)<br>"That's an interesting point. However..." (Esse é um ponto interessante. Entretanto...)"</p><p><strong>Concordando com poder:**<br>"I absolutely agree with that approach."<br>"That's an excellent point."<br>"I think you're onto something important here."<br>"I support that initiative."</p><p><strong>Discordando respeitosamente:**<br>"While I understand that perspective, I have a concern about..."<br>"I respect your point, but I'd like to offer a different viewpoint..."<br>"That's worth considering, but have we thought about...?"<br>"I see merit in that, but let me suggest an alternative..."</p><p><strong>Fazendo perguntas:**<br>"Can you clarify what you mean by...?"<br>"How would that impact...?"<br>"What's the timeline for implementing that?"<br>"Who would be responsible for that?"<br>"What if we approached it differently...?"<br>"Can you elaborate on the rationale for...?"</p><p><strong>Pedindo a palavra em grupos grandes:**<br>"If I may add to that..." (Se me permite adicionar a isso...)<br>"I'd like to weigh in on this..." (Gostaria de opinar sobre isto...)<br>"Can I interject for a moment?" (Posso interromper por um momento?)<br>"Following up on your point..." (Continuando sobre seu ponto...)"</p><h4>Liderança em Reuniões</h4><p><strong>Se você está facilitando/liderando:**<br><br>Abertura clara:<br>"Thank you all for being here. Let's start by reviewing today's agenda..."<br>"I'd like to focus our discussion on three key areas: budget, timeline, and team resources."<br><br>Mantendo controle do tempo:<br>"We're running a bit behind. Let's wrap up this point and move to the next agenda item."<br>"I'd like to allocate the next 15 minutes to this topic."<br><br>Garantindo input de todos:<br>"Sarah, I haven't heard from you yet. What are your thoughts?"<br>"Does anyone have additional input before we conclude?"<br><br>Resumindo e próximos passos:<br>"So, to summarize what we've decided today:\n1. John will prepare the budget proposal by Friday\n2. Sarah will schedule the vendor meetings\n3. We'll reconvene next Monday to review progress\nDoes everyone agree?"</p><h4>Reuniões Virtuais: Considerações Especiais</h4><p><strong>Etiqueta Zoom/Teams:**<br>✓ Ligar seu vídeo (a menos que tecnicamente impossível)<br>✓ Silenciar quando não está falando<br>✓ Manter contato visual (olhe para a câmera)<br>✓ Usar nome profissional/apropriado<br>✓ Ter background adequado<br>✓ Estar vestido apropriadamente<br>✓ Estar em local tranquilo<br><br>❌ Não comer durante reunião<br>❌ Não fazer outras coisas óbviamente<br>❌ Não entrar/sair durante discussões importantes<br>❌ Não ignorar pessoas na reunião</p><p><strong>Técnicas de engajamento virtual:**<br>"I notice some connection issues on my end - can you hear me okay?"<br>"Can you see the screen sharing?"<br>"For those on audio only, I'm going to describe the slide..."<br>"Let's do a quick round-robin. Everyone take 2 minutes to share..."</p><h4>Tratando Conflito em Reuniões</h4><p><strong>Desacordo profissional:**<br>"I appreciate your perspective. My concern is..."<br>"That's fair, but let's consider the potential risks..."<br>"I see the merit in that approach. Here's an alternative..."<br>"We may need to agree to disagree on this one. How should we proceed?"</p><p><strong>Se alguém é agressivo/rude:**<br>"I think we should focus on ideas, not personalities."<br>"Let's keep this discussion professional and respectful."<br>"I understand you feel strongly about this. Can we talk through the data?"<br>"I don't appreciate that tone. Can we reset?"</p><p><strong>Se você se sente desrespeitado:**<br>Privatamente depois: "I wanted to talk about how I was treated in today's meeting. I felt dismissed when..."<br>Em tempo real (se necessário): "I'm not comfortable with how this conversation is going. Can we refocus?"</p><h4>Notas de Reunião</h4><p><strong>Se está anotando:**<br>- Anote decisões e ações (quem, o quê, quando)<br>- Anote pontos-chave discutidos<br>- Anote prazos<br>- Não tente transcrever tudo<br><br>Formato típico:<br>"Meeting: Q4 Planning Session<br>Date: January 20, 2026\n<br>Attendees: John Smith, Sarah Chen, Mike Johnson<br><br>Agenda Items:<br>1. Budget allocation\n   - Approved: Marketing gets 20% increase\n   - Action: John to finalize budget by Friday<br><br>2. Timeline<br>   - Launch date: March 1, 2026\n   - Action: Sarah to create project schedule by Tuesday<br><br>Next Meeting: January 27, 2026"</p>`, cards:[{q:"Como participar efetivamente em uma reunião?",a:"Prepare-se antecipadamente, revise documentos, tenha ideias prontas, ouça atentamente, contribua quando apropriado, faça perguntas relevantes."},{q:"Como discordar respeitosamente em uma reunião?",a:"'I respect your point, but I'd like to offer a different viewpoint.' ou 'While I understand that, I have a concern about...'"}]},
      {id:5, name:'Apresentações Profissionais Efetivas', dur:'23 min', content:`<h3>Apresentações Profissionais Efetivas</h3><p>Apresentações são um momento para brilhar. Uma apresentação bem-executada pode avançar sua carreira significativamente.</p><h4>Estrutura de Apresentação</h4><p><strong>1. Abertura (30 segundos):**<br>Capture atenção, apresente-se, explique o tópico.<br><br>"Good morning. I'm [Name], Senior Marketing Manager. Today I'm going to present our Q4 strategy and how it positions us to exceed our annual revenue targets by 15%."<br><br>❌ "Um, well, I'm here to talk about stuff"<br>✅ "I have compelling data about our market expansion opportunities that I believe will influence our 2026 strategy."</p><p><strong>2. Agenda/Roadmap (1 minuto):**<br>Mostre o caminho que seguirá.<br><br>"I'll cover three main points:\n1. Market analysis - why this matters\n2. Our strategic response - what we're doing\n3. Expected outcomes - how we'll measure success\nTake questions at the end."</p><p><strong>3. Corpo (a maioria do tempo):**<br>- Cada seção tem 1-2 minutos<br>- Use stories/examples para manter engajamento<br>- Use dados para apoiar pontos<br>- Use visuals efetivamente<br><br>Bom: "Our research shows that 73% of consumers prefer companies with strong environmental practices. This shift presents a $2.5B opportunity in our market."<br><br>Ruim: "People like environmental stuff."</p><p><strong>4. Conclusão (1-2 minutos):**<br>Resuma, reitere mensagem central, call to action.<br><br>"In summary, three things you should remember:\n1. Market demand is shifting toward sustainability\n2. We have competitive advantages to capitalize\n3. The time to act is now\nI'm asking for budget approval to implement this strategy by Q2."</p><p><strong>5. Perguntas:**<br>"Thank you. I'm happy to answer any questions. Would someone like to start?"<br><br>Respondendo perguntas:<br>"That's a great question." (sempre começa assim)<br>"Let me clarify..." (se pergunta confusa)<br>"I don't have that data right now, but I'll get it to you." (se não sabe resposta)<br>"I'd like to revisit that later so others can hear." (se pergunta muito específica)</p><h4>Design e Slides Efetivos</h4><p><strong>Regras de ouro:**<br>1. Máximo 3-4 pontos por slide<br>2. Mínimo texto - use bullets, não parágrafos<br>3. Imagens > Texto quando possível<br>4. Consistência em design/cores<br>5. Legível de longe (grande fonte)<br>6. Um big idea por slide<br><br>❌ Slide ruim: "Our company has implemented various strategies to increase customer satisfaction through multiple channels including social media, email marketing, and personalized recommendations which has resulted in higher engagement and retention metrics across most customer segments."<br><br>✅ Slide bom: "Customer Satisfaction Strategy\n- Social media engagement\n- Personalized communication\n- Proactive support\nResult: 34% increase in retention"</p><p><strong>Gráficos e dados:**<br>- Use gráficos claros que apoiem sua narrativa<br>- Sempre cite a fonte<br>- Não use mais de 2-3 gráficos por apresentação<br>- Explique o que o gráfico significa<br><br>"This chart shows a 23% month-over-month growth in new customers, with the steepest growth coming from our digital marketing investments."</p><h4>Entrega e Linguagem Corporal</h4><p><strong>Velocidade e ritmo:**<br>- Fale mais lentamente que em conversação casual (15% mais lento)<br>- Pause para dar tempo ao público processar<br>- Varie o tom - não seja monótono<br>- Deixe espaço para perguntas<br><br>"Let me emphasize this point... [PAUSA] ...this is the most critical decision we'll make this year."</p><p><strong>Linguagem corporal:**<br>✓ Posição-se em pé confiante (ombros para trás)<br>✓ Faça contato visual com diferentes pessoas<br>✓ Use gestos naturais para enfatizar<br>✓ Mova-se propositalmente (não nervosamente)<br>❌ Não fique imóvel (parece nervoso)<br>❌ Não coloque mãos nos bolsos<br>❌ Não cruze braços (defensivo)<br>❌ Não se apoie na mesa</p><p><strong>Manejo de nervosismo:**<br>- Nervosismo é normal - até falantes nativos ficam nervosos<br>- Prepare-se muito (prática é chave)<br>- Respire profundamente antes de começar<br>- Tome água (mantenha perto)<br>- Foco no público, não em si mesmo<br>- Primeiro minuto é sempre mais assustador - depois fica melhor<br><br>"I'm a bit nervous, but I'm excited to share these findings with you."</p><h4>Pratique a Apresentação</h4><p><strong>Técnica de prática efetiva:**<br>1. Primeira vez: Leia os slides inteiros<br>2. Segunda vez: Pratique em voz alta (sem ler slides)<br>3. Terceira vez: Pratique com cronômetro<br>4. Quarta vez: Pratique na frente de um espelho ou amigo<br>5. Quinta vez: Pratique na sala/tecnologia em que será apresentada<br><br>Tempo esperado: Se a apresentação é 20 minutos, pratique até poder fazer em 18 minutos (permite perguntas).</p><p><strong>Lidar com problemas técnicos:**<br>"I notice the slides aren't advancing. Can someone help with the technology?"<br>"It looks like we're having some technical difficulties. While we troubleshoot, let me explain this point verbally..."<br>"I apologize for the technical issue. Let me continue without the slides for now."</p><h4>Apresentações Executivas</h4><p><strong>Para os C-Suite/Executivos:**<br>- Seja ainda mais conciso<br>- Focus em results/ROI, não detalhes<br>- Antecipe objeções<br>- Tenha alternativas prontas<br>- Conhecer seu público (seus valores, prioridades)<br><br>Executive Summary em 2 minutos:<br>"We're positioned to capture $10M in new revenue through strategic market expansion. The investment required is $2.5M over 18 months, with 40% ROI by year 3. We need board approval to proceed."</p>`, cards:[{q:"Qual é a estrutura de uma boa apresentação?",a:"Abertura (capture atenção), Agenda, Corpo (pontos principais com dados), Conclusão (resuma + call to action), Perguntas."},{q:"Qual é a regra mais importante para slides?",a:"Máximo 3-4 pontos por slide. Use bullets, não parágrafos. Mais imagens, menos texto."},{q:"Como lidar com nervosismo durante apresentação?",a:"Prepare-se muito (prática!), respire profundamente, foco no público, lembre que primeiro minuto é mais assustador."}]},
      {id:6, name:'Negociação e Persuasão Profissional', dur:'22 min', content:`<h3>Negociação e Persuasão Profissional</h3><p>Da negociação de salário à persuasão para apoiar uma iniciativa, a capacidade de negociar efetivamente é uma habilidade que impacta sua carreira e seu dinheiro.</p><h4>Princípios de Negociação Eficaz</h4><p><strong>1. Faça sua pesquisa:**<br>Você não pode negociar bem sem saber o "fair market value".<br><br>Para salário:<br>- Use Glassdoor, Payscale, LinkedIn Salary<br>- Fale com contatos na indústria<br>- Considere experiência, localização, indústria<br>- Conheça a situação financeira da empresa<br><br>Para projeto/proposta:<br>- Pesquise concorrentes<br>- Entenda orçamento do cliente<br>- Pesquise projetos similares</p><p><strong>2. Defina sua posição inicial:**<br>Comece alto (mas realista). A maioria das negociações se encontra no meio.<br><br>❌ "What do you want to pay me?" (Sem preparação)<br>✅ "Based on my research and my background, I'm looking for a range of $85-95K." (Com dados)</p><p><strong>3. Escute mais que fale:**<br>- Entenda a outra pessoa's posição e motivação<br>- Faça perguntas<br>- Não interrompa<br>- Procure por necessidades não ditas<br><br>"I appreciate the offer. Before I respond, can you tell me more about the expectations for this role and why you think I'm a good fit?"</p><p><strong>4. Procure por win-win:**<br>Melhor negociação é quando ambas as partes saem felizes.<br><br>❌ Negociação posicional: "I want X, você quer Y, vamos encontrar no meio"<br>✅ Negociação baseada em interesse: "Você quer controlar custos? Eu quero flexibilidade de trabalho. Podemos estruturar um acordo onde...?"</p><p><strong>5. Saiba suas linhas de fundo:**<br>- Qual é seu BATNA (Best Alternative to Negotiated Agreement)? Qual é seu plano se esta negociação falhar?<br>- Qual é seu ponto de caminhada? (walk-away point)<br>- Quais são seus pontos-chave (must-haves) vs nice-to-haves?<br><br>"I'm excited about this opportunity, but my minimum requirement is $80K based on my experience and market research."</p><h4>Negociação de Salário</h4><p><strong>Quando um salário é oferecido:**<br><br>"Thank you for the offer. I'm thrilled about the opportunity. I'd like to review the full compensation package and get back to you within 48 hours."<br><br>Não diga sim imediatamente! Dê-se tempo para pensar.</p><p><strong>Resposta a uma oferta baixa:**<br><br>"I appreciate the offer. However, based on my research and experience, I was expecting something closer to $90K. Can we discuss this further?"<br><br>❌ Não seja agressivo ou pareça ingrato<br>✅ Seja profissional, cite dados, dê oportunidade para contraoferta</p><p><strong>Negocie além de salário:**<br>Benefícios, trabalho remoto, PTO, bônus, desenvolvimento profissional podem valer muito.<br><br>"If the base salary is $80K, seria possible to discuss remote work flexibility (3 days in office) e professional development budget of $3K annually?"</p><p><strong>Concordando com um acordo:**<br>"I'm pleased with this offer. When can we formalize the details in writing?"</p><h4>Persuasão em Ambiente Profissional</h4><p><strong>Vendendo uma Ideia Internamente:**<br><br>1. Comece com o "why"<br>"We're spending resources inefficiently on marketing. We can cut costs by 20% while improving results."<br><br>2. Apresente dados/pesquisa<br>"Três empresas concorrentes implementaram essa estratégia. Here are their results..."<br><br>3. Antecipe objeções<br>"I know you're concerned about the implementation timeline. Here's how we'll manage that..."<br><br>4. Propor próximos passos viáveis<br>"I'd like to run a pilot program with 10% of our budget for 60 days. If it works, we roll it out company-wide."</p><p><strong>Influenciando sem autoridade:**<br>Você não tem que ser chefe para influenciar. Use estes táticas:<br><br>- Construa credibilidade<br>"I've spent 6 months analyzing this. Here's what I found..."<br><br>- Mostre benefício para o outro<br>"This will reduce your team's workload by 5 hours weekly."<br><br>- Aliar-se com aliados<br>"I've discussed this with Sarah and Mike, and they both think it's a good idea."<br><br>- Ofereça ajuda<br>"I'll handle the implementation if you approve the concept."</p><p><strong>Lidar com resistência:**<br><br>"I understand your hesitation. What specific concerns do you have?"<br><br>Escute genuinamente. Frequentemente, uma vez que você entende a objeção verdadeira, pode resolvê-la.</p><p><strong>Se for rejeitado:**<br><br>"I appreciate you considering this. Can you share what concerns led to the decision? I'd like to address them and revisit this in the future."</p><h4>Conversas Difíceis</h4><p><strong>Pedindo por um aumento/promoção:**<br><br>"I'd like to discuss my compensation. Over the past year, I've taken on [responsibilities], delivered [results], and my performance is [metrics]. Based on this and market research, I believe a [X%] increase is appropriate."<br><br>Nunca: "I need more money" ou "I deserve a raise"<br>Sempre: Base em fatos, resultados, pesquisa</p><p><strong>Recusando uma tarefa/projeto:**<br><br>"I appreciate you thinking of me for this. However, my current workload with [projects] is at capacity. Could we discuss priorities to make room for this, or is someone else available?"<br><br>Não: "I don't want to"<br>Sim: Explique situação, ofereça alternativas</p><p><strong>Feedback difícil (se você está dando):**<br><br>"I want to give you some feedback because I care about your development. I noticed [específico], and the impact was [resultado]. Next time, here's what I'd suggest..."<br><br>Sempre: Específico, focado em comportamento, ofereça suporte</p>`, cards:[{q:"Qual é a melhor forma de começar uma negociação de salário?",a:"Com pesquisa de mercado e uma oferta inicial realista mas ambiciosa. 'Based on my research, I'm looking for $90-100K.'"},{q:"Como persuadir alguém internamente sobre uma ideia?",a:"Comece com 'why', apresente dados, antecipe objeções, e proponha próximos passos viáveis (como um piloto)."},{q:"Como lidar com uma oferta de salário baixa?",a:"Agradeça, cite seus dados de pesquisa, e pergunte se pode discutir: 'I was expecting closer to $90K. Can we discuss this further?'"}]},
    ],
    summary:{title:"Resumo do Módulo 2: Comunicação Oral Profissional", points:["Prepare-se para reuniões: revise documentos, tenha ideias prontas, teste tecnologia. Participação efetiva significa contribuir quando apropriado, fazer perguntas relevantes, e discordar respeitosamente.","Apresentações efetivas têm estrutura clara, slides com máximo 3-4 pontos (mais imagens, menos texto), e entrega confiante. Prática é absolutamente essencial.","Negociação bem-sucedida começa com pesquisa. Defina sua posição inicial, procure por win-win, saiba suas linhas de fundo, e tenha disposição de caminhar.","Persuasão interna funciona melhor quando você apresenta dados, antecipa objeções, oferece próximos passos viáveis, e mostra benefício para o outro."]},
    quizFinal:[{q:"Como participar efetivamente em reunião?",opts:["Fale constantemente","Prepare-se, revise documentos, escute, contribua apropriadamente, faça perguntas","Fale pouco","Não fale"],correct:1},{q:"Qual é a regra mais importante para slides de apresentação?",opts:["Máximo de texto","Máximo 3-4 pontos, use bullets","Tanto texto quanto imagens","Apenas imagens"],correct:1},{q:"Como começar uma negociação de salário?",opts:["Peça quanto eles oferecem","Com pesquisa de mercado e uma oferta ambiciosa mas realista","Aceite o que oferecem","Não negocie"],correct:1},{q:"O que fazer quando ouve uma oferta de salário baixa?",opts:["Aceite imediatamente","Recuse imediatamente","Agradeça, cite pesquisa, e negocie","Ignore"],correct:2},{q:"Como persuadir alguém sobre uma ideia?",opts:["Seja agressivo","Comece com dados, antecipe objeções, ofereça próximos passos","Ameace","Não seja claro"],correct:1},{q:"Como lidar com nervosismo em apresentação?",opts:["Não apresente","Pratique muito, respire profundamente, foque no público","Beba algo antes","Corra pela apresentação"],correct:1},{q:"Qual é uma boa abertura de apresentação?",opts:["Um, bem, aqui estou eu","Apresente-se, tópico, e por que importa","Vou começar","Não abra"],correct:1},{q:"Como discordar respeitosamente em reunião?",opts:["Diga 'você está errado'","'I respect your point, but I have a concern about...'","Ignore o ponto","Seja agressivo"],correct:1},{q:"O que é BATNA em negociação?",opts:["Um tipo de acordo","Sua melhor alternativa se negociação falhar","Uma tática agressiva","Não é importante"]}]
  }
];
