<h3>A Aliança que se Tornou Rivalidade Mortal</h3>
<p>Para compreender a guerra de 2026, é preciso voltar décadas no tempo. A relação entre Irã, Estados Unidos e Israel nem sempre foi de antagonismo. Até 1979, o Irã era um dos maiores aliados dos EUA no Oriente Médio. O Xá Mohammad Reza Pahlavi governava com apoio direto de Washington, e Israel mantinha relações diplomáticas e comerciais estreitas com Teerã. O Irã fornecia petróleo a Israel, enquanto Israel vendia tecnologia agrícola e militar ao regime do Xá. Essa tríade funcionava como um pilar de estabilidade pró-ocidental na região, contrapondo-se à influência soviética e ao nacionalismo árabe liderado por Nasser no Egito.</p>

<h4>A Revolução Islâmica de 1979 — O Ponto de Ruptura</h4>
<p>Tudo mudou com a Revolução Islâmica. Em fevereiro de 1979, o Aiatolá Ruhollah Khomeini derrubou o Xá e estabeleceu uma teocracia xiita no Irã. A nova República Islâmica cortou imediatamente os laços com Israel, declarando o Estado judeu um "inimigo do Islã" e renomeando a embaixada israelense em Teerã como "Embaixada da Palestina". Os EUA, que perderam seu principal aliado na região, viram a situação piorar drasticamente com a Crise dos Reféns na embaixada americana em Teerã, onde 52 diplomatas foram mantidos cativos por 444 dias. Esse evento traumático selou décadas de hostilidade entre Washington e Teerã, resultando em sanções econômicas que perduram até hoje.</p>

<h4>Guerra Irã-Iraque (1980–1988) — A Primeira Grande Provação</h4>
<p>Apenas um ano após a revolução, o Iraque de Saddam Hussein invadiu o Irã, iniciando uma das guerras mais sangrentas do século XX. O conflito durou oito anos e matou cerca de 1 milhão de pessoas. Os EUA apoiaram o Iraque com inteligência militar e equipamentos, mesmo sabendo que Saddam usava armas químicas contra iranianos e curdos. Esse apoio americano ao inimigo iraniano cimentou a desconfiança do Irã em relação a Washington. Israel, paradoxalmente, forneceu armas ao Irã em segredo durante o escândalo Irã-Contras, calculando que era melhor manter os dois vizinhos hostis enfraquecidos mutuamente. Essa guerra deixou cicatrizes profundas no Irã — cicatrizes que moldam sua política de defesa até hoje, incluindo a busca por capacidade nuclear como garantia de sobrevivência.</p>

<h4>O Hezbollah e a Rede de Proxies Iranianos</h4>
<p>Após a revolução, o Irã adotou uma estratégia de projeção de poder por meio de milícias aliadas em toda a região. A mais poderosa dessas forças proxy é o Hezbollah, criado no Líbano em 1982 com financiamento e treinamento direto da Guarda Revolucionária Iraniana (IRGC). O Hezbollah acumulou um arsenal estimado em mais de 150.000 foguetes e mísseis, tornando-se a milícia não estatal mais bem armada do mundo. Além do Hezbollah, o Irã construiu uma rede que inclui as milícias xiitas no Iraque (como o Kata'ib Hezbollah e Asa'ib Ahl al-Haq), os Houthis no Iêmen, o Hamas e a Jihad Islâmica na Palestina, e diversas facções na Síria. Essa rede, chamada de "Eixo da Resistência", permite ao Irã projetar força militar em múltiplas frentes sem engajar diretamente suas forças armadas convencionais — uma estratégia que funcionou por décadas mas que acabou provocando a reação que levou à guerra de 2026.</p>

<h4>O Programa Nuclear Iraniano — Décadas de Tensão</h4>
<p>O programa nuclear do Irã tem sido o epicentro da tensão geopolítica. Iniciado na era do Xá com apoio americano (programa "Átomos para a Paz"), foi retomado secretamente nos anos 1990. Em 2002, dissidentes iranianos revelaram instalações clandestinas de enriquecimento de urânio em Natanz e Arak. Desde então, Israel e os EUA veem o programa como uma ameaça existencial. Em 2015, o acordo JCPOA (Plano de Ação Conjunto Global) ofereceu alívio de sanções em troca de limites ao enriquecimento. Porém, em 2018, Donald Trump retirou os EUA do acordo e reimpos sanções máximas na política de "pressão máxima". O Irã respondeu gradualmente violando os limites do JCPOA, enriquecendo urânio a 60% de pureza — perigosamente perto dos 90% necessários para uma arma. Em fevereiro de 2026, relatórios da AIEA indicaram que o Irã havia atingido 83,7% de enriquecimento, o que foi considerado por Washington e Tel Aviv como o cruzamento de uma "linha vermelha" inaceitável.</p>

<h4>Escalada 2023–2025 — O Caminho para a Guerra</h4>
<p>O período entre 2023 e 2025 foi marcado por uma escalada contínua. Em outubro de 2023, o Hamas lançou o ataque sem precedentes contra Israel, matando mais de 1.200 pessoas. Israel respondeu com uma ofensiva devastadora em Gaza. O Hezbollah abriu uma segunda frente no norte de Israel, e os Houthis começaram a atacar navios no Mar Vermelho. O Irã lançou sua primeira operação "True Promise" em abril de 2024, disparando mais de 300 drones e mísseis diretamente contra Israel — a primeira vez que o Irã atacava diretamente o território israelense. Israel retaliou com ataques limitados. Ao longo de 2024 e 2025, assassinatos seletivos israelenses eliminaram líderes do Hamas (Ismail Haniyeh, em Teerã) e do Hezbollah (Hassan Nasrallah, em Beirute), humilhando o Irã e demonstrando a vulnerabilidade de seus aliados. A eleição de Trump em novembro de 2024, com sua postura de "pressão máxima" contra o Irã, sinalizou que a janela para uma solução diplomática estava se fechando rapidamente.</p>

<h3>28 de Fevereiro de 2026 — O Dia em que o Mundo Mudou</h3>
<p>Na madrugada de 28 de fevereiro de 2026, os Estados Unidos e Israel lançaram uma ofensiva militar conjunta sem precedentes contra o Irã. A operação, batizada de "Roaring Lion" pelos israelenses e "Epic Fury" pelos americanos, representou a maior campanha aérea no Oriente Médio desde a Guerra do Golfo de 1991. Mais de 200 aeronaves participaram das primeiras ondas de ataque, incluindo bombardeiros B-2 Spirit, caças F-35 e F-15EX americanos, e caças F-35I Adir israelenses. Os ataques foram precedidos por uma intensa campanha cibernética que desabilitou sistemas de defesa aérea iranianos e comunicações militares, demonstrando o nível de penetração da inteligência ocidental nas redes iranianas.</p>

<h4>Alvos Estratégicos e a Destruição do Programa Nuclear</h4>
<p>Os primeiros alvos foram as instalações nucleares do Irã. A planta de enriquecimento de Natanz, enterrada sob dezenas de metros de concreto e rocha, foi atingida por bombas penetradoras GBU-57 Massive Ordnance Penetrators (MOP), cada uma pesando 14 toneladas — as maiores bombas convencionais do arsenal americano. A instalação subterrânea de Fordow, construída dentro de uma montanha perto da cidade sagrada de Qom, também foi atacada com múltiplas ondas de MOPs. Além disso, foram atingidos o reator de água pesada de Arak, os centros de pesquisa em Isfahan, e instalações de produção de centrífugas em todo o país. Segundo relatórios do Pentágono, mais de 85% da capacidade de enriquecimento de urânio do Irã foi destruída nas primeiras 72 horas de operação.</p>

<h4>O Estreito de Ormuz — A Arma Econômica</h4>
<p>Uma das ações mais consequentes do Irã foi a tentativa de fechar o Estreito de Ormuz. Este corredor marítimo de apenas 33 quilômetros de largura no ponto mais estreito é a passagem para aproximadamente 20% de todo o petróleo mundial — cerca de 21 milhões de barris por dia. A Marinha iraniana e a Guarda Revolucionária Naval (IRGCN) minaram trechos do estreito, dispararam mísseis antinavio contra petroleiros e posicionaram lanchas rápidas armadas para interdição do tráfego marítimo. A 5ª Frota americana respondeu com operações de desminagem e escolta de comboios, mas o fluxo de petróleo foi severamente interrompido por semanas. O preço do barril de petróleo Brent saltou de US$ 78 para mais de US$ 105 em questão de dias, e chegou a US$ 127 durante o pico da crise, causando ondas de choque nos mercados globais.</p>

<h4>A Guerra no Líbano — A Frente Norte</h4>
<p>Simultaneamente, Israel abriu uma frente terrestre contra o Hezbollah no sul do Líbano. Após semanas de bombardeios aéreos intensos que devastaram a periferia sul de Beirute (o Dahieh, reduto do Hezbollah), forças terrestres israelenses cruzaram a fronteira pela primeira vez desde 2006. A operação encontrou resistência feroz — o Hezbollah havia preparado uma extensa rede de túneis, bunkers e posições fortificadas ao longo da fronteira. Os combates foram intensos, com mais de 1.400 mortos no Líbano, incluindo centenas de civis. A infraestrutura libanesa, já fragilizada por anos de crise econômica, sofreu danos estimados em bilhões de dólares. Hospitais, pontes, estradas e redes elétricas foram atingidos. A ONU e organizações humanitárias alertaram para uma catástrofe humanitária em desenvolvimento.</p>

<h3>7 de Abril de 2026 — O Cessar-Fogo que o Mundo Esperava</h3>
<p>Após 40 dias de um conflito que ameaçou desestabilizar toda a ordem mundial, um cessar-fogo bilateral foi anunciado em 7 de abril de 2026. A trégua de duas semanas foi mediada pelo Paquistão — um intermediário improvável que se revelou estratégico por manter relações tanto com o Irã quanto com os Estados Unidos. O primeiro-ministro paquistanês ofereceu Islamabad como sede neutra para as negociações, e ambos os lados aceitaram. A China e a Rússia, embora não fossem mediadoras formais, exerceram pressão nos bastidores — Pequim, preocupada com o fornecimento de petróleo e a estabilidade econômica global, e Moscou, que viu uma oportunidade de se posicionar como ator diplomático relevante após seu isolamento pela guerra na Ucrânia.</p>

<h4>Por que o Cessar-Fogo Aconteceu Agora?</h4>
<p>Vários fatores convergiram para tornar o cessar-fogo possível neste momento específico. Do lado iraniano, a morte de Khamenei e a destruição da infraestrutura militar criaram um vácuo de poder e uma necessidade urgente de reorganização interna. O novo Conselho de Liderança provisório do Irã, liderado pelo presidente Masoud Pezeshkian e o que restava do Conselho de Guardiões, concluiu que continuar o conflito levaria ao colapso total do regime. A população iraniana, já empobrecida por décadas de sanções, enfrentava escassez de alimentos, medicamentos e combustível. Do lado americano, a pressão doméstica crescia: o preço da gasolina nos EUA ultrapassou US$ 6 por galão, as bolsas de valores registraram quedas acumuladas de 15%, e pesquisas mostravam que 62% dos americanos desaprovavam a continuação da guerra. Israel, apesar dos sucessos militares, enfrentava fadiga operacional em múltiplas frentes (Gaza, Líbano, retaguarda contra mísseis iranianos) e pressão internacional crescente pelas mortes civis no Líbano.</p>

<h4>As Negociações de Islamabad — O que Está na Mesa</h4>
<p>As negociações formais foram agendadas para 10 de abril de 2026 em Islamabad. A delegação americana é liderada pelo Vice-Presidente JD Vance, acompanhado pelo Secretário de Estado Marco Rubio e pelo Enviado Especial para o Oriente Médio. Do lado iraniano, o chanceler e representantes do Conselho de Liderança provisório lideram a delegação. Israel participa como observador interessado, com seu Ministro da Defesa presente em Islamabad para consultas bilaterais com os americanos. A proposta inicial do Irã inclui 10 pontos que revelam o equilíbrio delicado entre suas necessidades e aspirações.</p>

<h4>A Proposta Iraniana de 10 Pontos</h4>
<p>O documento iraniano apresentado como base de negociação inclui demandas ambiciosas que refletem tanto a devastação sofrida quanto a postura negociadora tradicional do regime. Os 10 pontos principais são: (1) Suspensão imediata e completa de todas as sanções econômicas americanas e europeias contra o Irã; (2) Criação de um fundo internacional de reconstrução para compensar os danos de guerra, estimados pelo Irã em US$ 300 bilhões; (3) Manutenção do direito ao enriquecimento de urânio para fins pacíficos até 5% de pureza, sob monitoramento da AIEA; (4) Retirada de todas as forças militares americanas do Iraque e da Síria em um prazo de 24 meses; (5) Reconhecimento internacional da soberania iraniana sobre suas ilhas no Golfo Pérsico (Abu Musa e as Tunbs); (6) Garantias de segurança formais de que os EUA e Israel não realizarão novos ataques preventivos; (7) Descongelamento de todos os ativos iranianos retidos no exterior (estimados em US$ 100 bilhões); (8) Fim do apoio americano a grupos de oposição iraniana no exílio; (9) Normalização diplomática gradual com reconhecimento mútuo; (10) Estabelecimento de uma zona desmilitarizada supervisionada pela ONU no sul do Líbano para resolver a questão do Hezbollah.</p>

<h4>A Posição Americana — Linhas Vermelhas de Washington</h4>
<p>Washington, por sua vez, apresentou suas próprias condições. Os EUA exigem: desmonte completo e verificável de todo o programa de enriquecimento acima de 3,67% (o limite do JCPOA original); acesso irrestrito e permanente de inspetores da AIEA a todas as instalações, incluindo sites militares; dissolução formal da Força Quds e fim do apoio a todas as milícias proxy; compromisso iraniano de não reconstruir capacidade de mísseis balísticos com alcance superior a 300 km; e liberação de todos os prisioneiros de dupla nacionalidade detidos no Irã. A distância entre as posições é enorme, e diplomatas envolvidos descrevem as negociações como "as mais complexas desde os Acordos de Viena de 2015, mas com muito mais em jogo".</p>

<h4>O Papel dos Atores Regionais</h4>
<p>As negociações não envolvem apenas EUA e Irã. A Arábia Saudita, que nos anos anteriores havia iniciado uma reaproximação com o Irã mediada pela China (Acordo de Pequim, 2023), agora se posiciona cautelosamente. Riad quer garantias de que o Irã não reconstruirá sua rede de proxies, mas também não deseja um Irã totalmente colapsado que gere instabilidade regional. A Turquia ofereceu-se como mediadora alternativa e tem interesses próprios — especialmente em relação ao Curdistão iraquiano e à influência na Síria. O Qatar, que historicamente manteve canal aberto com o Irã, serve como intermediário de bastidores. Os Emirados Árabes Unidos, que normalizaram relações com Israel nos Acordos de Abraão (2020), apoiam discretamente a posição americana mas temem represálias econômicas se o conflito se prolongar. A Rússia, embora enfraquecida, tenta usar suas relações com o Irã (cooperação militar, compra de drones Shahed) como moeda de troca diplomática.</p>

<h4>A Situação Humanitária — Uma Urgência Silenciosa</h4>
<p>Enquanto diplomatas negociam, a população iraniana enfrenta uma crise humanitária severa. A ONU estima que 3,2 milhões de pessoas foram deslocadas internamente, principalmente das províncias de Isfahan, Fars e Teerã. Hospitais relatam escassez de medicamentos essenciais devido ao colapso das cadeias de suprimento. A inflação no Irã ultrapassou 80% ao ano, e o rial iraniano perdeu mais de 40% de seu valor em relação ao dólar no mercado paralelo durante o conflito. Organizações como a Cruz Vermelha e o Crescente Vermelho enfrentam dificuldades para acessar áreas bombardeadas. No Líbano, mais de 500.000 pessoas fugiram do sul do país para Beirute e o Vale do Bekaa, sobrecarregando infraestruturas já precárias. A UNICEF alertou que mais de 200.000 crianças iranianas e libanesas necessitam de assistência humanitária urgente.</p>

<h3>O Terremoto Econômico Global</h3>
<p>A guerra de 2026 no Oriente Médio não foi apenas um conflito regional — foi um evento sísmico que abalou a economia mundial. O impacto mais imediato e visível foi no mercado de energia. Com o Estreito de Ormuz parcialmente bloqueado e a infraestrutura petrolífera iraniana sob ataque, o preço do barril de petróleo Brent ultrapassou US$ 100 pela primeira vez desde 2022, atingindo picos de US$ 127 durante as semanas mais intensas do conflito. Isso provocou um efeito cascata global: nos Estados Unidos, o galão de gasolina ultrapassou US$ 6, pressionando consumidores e elevando a inflação. Na Europa, já dependente de diversificação energética após a crise com a Rússia, os preços do gás natural subiram 35%, ameaçando a recuperação econômica. Países importadores de petróleo em desenvolvimento — Índia, Paquistão, Bangladesh, nações africanas — enfrentaram crises de balanço de pagamentos, com alguns recorrendo a empréstimos emergenciais do FMI.</p>

<h4>Mercados Financeiros em Turbulência</h4>
<p>As bolsas de valores globais reagiram com volatilidade extrema. O S&P 500 caiu 15% acumulado durante o período do conflito, o maior declínio desde a pandemia de COVID-19 em 2020. O índice VIX de volatilidade (o "índice do medo") atingiu níveis vistos apenas em crises sistêmicas. O ouro, porto seguro tradicional, disparou para mais de US$ 3.800 por onça. O dólar americano se fortaleceu contra praticamente todas as moedas, especialmente as de mercados emergentes, agravando dívidas denominadas em dólar em países em desenvolvimento. O Bitcoin e outras criptomoedas tiveram comportamento misto — inicialmente caíram com ativos de risco, mas depois subiram como alternativa ao sistema financeiro tradicional. Cadeias de suprimento globais, já fragilizadas desde a pandemia, sofreram novas interrupções com o aumento de custos de frete e seguros marítimos no Golfo Pérsico e no Mar Vermelho, onde os ataques Houthi continuaram mesmo durante o cessar-fogo.</p>

<h4>Reconfiguração Geopolítica — Um Novo Oriente Médio</h4>
<p>O conflito está redefinindo o mapa geopolítico do Oriente Médio de formas que levarão décadas para se consolidar. O Irã, embora não tenha sido invadido ou ocupado, sofreu uma derrota militar significativa. Sua capacidade nuclear foi destruída, sua liderança suprema eliminada, e sua rede de proxies severamente degradada. O Hezbollah, já enfraquecido pela guerra de 2024 no Líbano e pela eliminação de Nasrallah, perdeu capacidade operacional significativa. Os Houthis no Iêmen, embora ainda ativos, perderam grande parte do apoio logístico iraniano. Isso cria um vácuo de poder que vários atores tentarão preencher. A Arábia Saudita e os Emirados veem uma oportunidade de expandir sua influência sem a contraposição iraniana. A Turquia pode buscar um papel mais assertivo no Iraque e na Síria. Israel emerge militarmente fortalecido, mas diplomaticamente isolado em partes do mundo — a opinião pública global, especialmente no Sul Global, é majoritariamente crítica à operação.</p>

<h4>Cenário 1 — Acordo Abrangente (Otimista)</h4>
<p>No melhor cenário, as negociações de Islamabad resultam em um acordo histórico nos moldes de um "JCPOA 2.0 reforçado". O Irã aceita restrições permanentes ao seu programa nuclear em troca de alívio substancial de sanções e um pacote de reconstrução internacional. Um novo líder pragmático emerge no Irã, possivelmente através de eleições supervisionadas, e inicia uma abertura gradual. As milícias proxy são progressivamente desmobilizadas como parte do acordo. Este cenário requer concessões enormes de ambos os lados e é considerado improvável por analistas, com probabilidade estimada de 15–20%. No entanto, o precedente do JCPOA original mostra que acordos complexos são possíveis quando a pressão é suficiente e a vontade política existe.</p>

<h4>Cenário 2 — Acordo Parcial e Tensão Prolongada (Mais Provável)</h4>
<p>O cenário considerado mais provável (50–55% de probabilidade) é um acordo parcial que resolve as questões mais urgentes — cessação permanente de hostilidades, limitações nucleares verificáveis, algum alívio de sanções — mas deixa questões profundas sem resolução. O Irã mantém retórica anti-Israel mas reduz significativamente o apoio operacional a proxies. O programa nuclear é limitado mas não eliminado. Sanções são parcialmente suspensas, permitindo recuperação econômica gradual. Esse cenário resulta em uma "paz fria" semelhante à relação EUA–URSS na Guerra Fria — ausência de conflito direto, mas competição contínua por influência, espionagem mútua, e riscos de escalada em momentos de tensão. O Oriente Médio permanece instável, mas evita-se uma guerra total.</p>

<h4>Cenário 3 — Colapso das Negociações (Pessimista)</h4>
<p>No pior cenário (25–30% de probabilidade), as negociações fracassam. A trégua expira sem acordo, e o conflito retoma em alguma forma — talvez não guerra total, mas ataques intermitentes, sabotagem, ciberguerra e conflitos proxy intensificados. O Irã, humilhado e devastado, busca reconstruir seu programa nuclear em sigilo com apoio tecnológico de atores como Coreia do Norte ou através da rede clandestina do mercado negro nuclear. O regime se radicaliza sob nova liderança militar, e o ciclo de violência reinicia. Neste cenário, há risco real de proliferação nuclear na região, com Arábia Saudita e possivelmente Turquia buscando capacidade nuclear própria como deterrente. Uma segunda guerra, possivelmente ainda mais devastadora, torna-se provável dentro de 5–10 anos.</p>

<h4>Impacto no Brasil e na América Latina</h4>
<p>O Brasil, embora distante geograficamente, foi significativamente impactado. O aumento do petróleo elevou os preços dos combustíveis e pressionou a inflação. Por outro lado, o Brasil como exportador de commodities agrícolas beneficiou-se do aumento de demanda e preços de alimentos — especialmente soja e carne bovina para mercados do Golfo que buscaram diversificar fornecedores. O governo brasileiro adotou uma posição de neutralidade ativa, defendendo diálogo e solução diplomática na ONU, alinhado com a tradição de política externa multilateral. A comunidade árabe e iraniana no Brasil (estimada em milhões de descendentes) acompanhou o conflito com intensidade, e houve protestos em São Paulo e Curitiba. Economistas estimam que o conflito custou ao Brasil entre 0,3% e 0,5% do PIB em 2026 devido ao aumento de custos de energia e insumos importados.</p>

<h4>O Que Observar nos Próximos Meses</h4>
<p>Para acompanhar a evolução da crise, os pontos-chave a monitorar são: (1) o resultado das negociações de Islamabad — qualquer extensão do cessar-fogo é positiva, ruptura é alarmante; (2) a transição de liderança no Irã — quem assume o poder determinará a direção do país por décadas; (3) o preço do petróleo — se estabilizar abaixo de US$ 90, indica desescalada; se voltar acima de US$ 110, indica problemas; (4) a atividade do Hezbollah e Houthis — redução operacional indica enfraquecimento real do eixo iraniano; (5) movimentações nucleares na região — qualquer sinal de Arábia Saudita ou Turquia buscando tecnologia nuclear é um alerta máximo; (6) a posição da China — Pequim tem influência crescente e sua postura pode determinar o equilíbrio de forças; (7) eleições americanas de meio-mandato em novembro de 2026 — podem alterar o cálculo político de Washington em relação à continuidade da pressão sobre o Irã.</p>
