    {id:1,
     name:"Conceitos Básicos: O que é Direito do Consumidor?",
     dur:"15 min",
     content:`O Direito do Consumidor é um ramo especial do direito que surgiu da necessidade de proteger as pessoas comuns nas suas relações de compra e contratação de serviços. Antes de entender essa área, é importante compreender que o direito moderno reconhece uma desigualdade natural entre o consumidor individual e as grandes empresas fornecedoras de produtos e serviços. As empresas possuem recursos, informações, experiência e poder de negociação muito maiores do que uma pessoa comum. Por isso, o Estado intervém para equilibrar essa relação e proteger quem é mais fraco economicamente.

O Código de Defesa do Consumidor (CDC), criado em 1990 e ainda em vigor, é a lei fundamental que rege toda essa proteção. Ele estabelece direitos e garantias mínimas que nenhuma empresa pode violar, independentemente de contratação ou quanto o consumidor pagou. É uma lei de ordem pública, o que significa que as empresas não podem simplesmente renunciar a ela ou oferecer condições piores ao consumidor. Se tentarem fazer isso, essas cláusulas são nulas e o consumidor pode recorrer à justiça.

Quando falamos em consumidor, a lei não se refere apenas ao cidadão comum. Legalmente, consumidor é toda pessoa natural ou jurídica que adquire ou utiliza um produto ou serviço como destinatário final. Isso significa que você precisa estar saindo do mercado com esse produto ou serviço - não está comprando para revender ou usar na sua empresa. Por exemplo, um restaurante que compra farinha é consumidor dessa farinha para uso próprio, mas uma fábrica de pão que compra farinha em grande quantidade para processar não é consumidora legalmente nesse sentido.

Fornecedor, por outro lado, é aquela pessoa natural ou jurídica que oferece produtos ou serviços de forma habitual no mercado. Pode ser uma loja física, um e-commerce, um profissional autônomo como encanador ou eletricista, uma empresa de telefonia, banco, operadora de planos de saúde - qualquer um que oferece algo para lucrar. O CDC protege principalmente o consumidor, mas também pode impor obrigações ao fornecedor que, se descumpridas, geram direito a indenização.

A relação de consumo é caracterizada pela existência simultânea de consumidor, fornecedor, produto/serviço e uma transação entre eles. É importante saber que o CDC se aplica mesmo que não haja contrato escrito. Uma compra simples em uma loja, uma consulta com um médico, contratação de serviço de internet - tudo é relação de consumo protegida pela lei. O direito do consumidor é irrenunciável, ou seja, você não pode abrir mão dele nem mesmo que queira, pois a lei considera isso de interesse público.

<blockquote class="tip">
💡 Lembre-se: se você está comprando algo para usar e não para revender, você é um consumidor legal e merece proteção. A lei está do seu lado!
</blockquote>`,
     cards:[{"q":"O que é exatamente uma relação de consumo?","a":"Uma relação de consumo existe quando um consumidor adquire ou utiliza um produto ou serviço de um fornecedor como destinatário final. Não é preciso ter contrato escrito - uma compra simples já é relação de consumo."}]
    },
    {id:2,
     name:"Direitos Fundamentais do Consumidor",
     dur:"18 min",
     content:`O Código de Defesa do Consumidor estabelece um rol de direitos fundamentais que todo consumidor possui. Esses direitos não precisam ser negociados, não podem ser renunciados e valem para qualquer pessoa em qualquer compra ou contratação. Conhecer esses direitos é o primeiro passo para se proteger.

O primeiro grande direito é a PROTEÇÃO DA VIDA, SAÚDE E SEGURANÇA. Nenhum produto pode ser vendido se colocar em risco sua vida ou saúde. Se um produto causa danos físicos, o fornecedor responde por isso. É por isso que existem testes de segurança para brinquedos, alimentos, eletrônicos e tudo mais. Se você é lesionado por um produto defeituoso (por exemplo, um fogão que explode, um celular que pega fogo), pode exigir indenização.

O segundo direito é a INFORMAÇÃO CLARA E CORRETA. Antes de comprar qualquer coisa, você tem direito de saber exatamente o que está comprando. O preço deve estar claro e atualizado. Se um produto tem alérgenos (como amendoim), precisa estar escrito. Se um eletrônico consome muita energia, isso precisa ser informado. Propagandas enganosas que induzem a compra de forma falsa são ilegais. Se um lojista lhe vender algo dizendo que é original quando é falsificado, está violando esse direito.

O terceiro direito crucial é a PROTEÇÃO CONTRA PRÁTICAS ABUSIVAS. Uma prática é abusiva quando coloca você em desvantagem exagerada ou prejudica sua dignidade. Exemplos: cobrar taxa de embalagem absurda, condicionar venda de um produto à compra de outro que você não quer, usar publicidade que explora medo ou superstição, oferecer crédito predatório com juros astronômicos sabendo que você não conseguirá pagar, ofender ou desrespeitar o consumidor no atendimento. Todas essas práticas são proibidas.

O quarto direito é o de RESCISÃO do contrato. Em muitos casos (principalmente em vendas à distância como internet, telefone ou porta a porta), você tem o direito de desistir da compra dentro de um prazo, geralmente 7 dias, sem precisar dar explicações. Essa é sua proteção contra compras impulsivas ou erros.

Outro direito importante é à GARANTIA dos produtos. O fornecedor deve garantir que o produto funciona, é seguro e serve para o fim que se propõe. Se aparecer defeito dentro do prazo de garantia (30 dias no mínimo para não duráveis, 90 para duráveis), você pode exigir conserto, troca ou devolução do dinheiro. Essa garantia é automática, não precisa estar escrita no papel - vem de graça com qualquer compra.

Você também tem direito à INDENIZAÇÃO POR DANOS MORAIS e materiais. Se sofrer algo ruim por culpa do fornecedor (perda de dinheiro, humilhação, medo, constrangimento), pode pedir compensação em dinheiro além da solução do problema. Por exemplo, se um banco envia seus dados pessoais para cobradores por engano, isso causa dano moral.

Há ainda o direito de ser OUVIDO E PROTEGIDO. Você pode reclama, pode processar, pode procurar órgãos de defesa. Ninguém pode ser discriminado por exercer esses direitos. Se uma loja te trata mal por reclamar, isso é abuso.

<blockquote class="news">
📰 O Código de Defesa do Consumidor é considerado uma das melhores legislações de proteção do consumidor do mundo, estando entre as mais avançadas.
</blockquote>`,
     cards:[{"q":"Qual é a diferença entre práticas enganosas e práticas abusivas?","a":"Práticas enganosas usam informações falsas ou incompletas para induzir compra (propaganda enganosa). Práticas abusivas prejudicam sua dignidade ou colocam você em desvantagem exagerada (cobranças escondidas, desrespeito, juros abusivos)."}]

    {id:3,
     name:"Obrigações do Fornecedor e Responsabilidade Civil",
     dur:"17 min",
     content:`Para que os direitos do consumidor funcionem na prática, é necessário que o fornecedor tenha obrigações correspondentes. Se essas obrigações não forem cumpridas, surge a responsabilidade civil, que significa que o fornecedor precisa reparar o dano causado.

A primeira obrigação é INFORMAR CORRETAMENTE. O fornecedor precisa informar de forma clara, ostensiva (fácil de ver) e correta todas as características do produto ou serviço. Isso inclui: composição, origem, preço unitário e total, forma de pagamento, prazo de entrega, riscos do produto, instruções de uso, contraindicações para saúde. Se está vendendo comida, precisa estar escrito se tem glúten, látex, amendoim. Se é um medicamento, precisa informar efeitos colaterais. Se é um aplicativo, precisa avisar que coleta dados seus.

A segunda obrigação é MANTER A QUALIDADE. O produto precisa ter qualidade compatível com o preço cobrado. Se você paga R\$ 100 por um tênis, ele não pode cair aos pedaços em uma semana. Se você contrata um encanador para consertar seu banheiro, ele precisa fazer de forma competente, não apenas tampando o vazamento com fita.

O fornecedor também é responsável por DEFEITOS do produto. Se vender algo com defeito de fabricação ou projeto (erro do fabricante), ele responde. Se vender produto falsificado como se fosse original, responde. Se vender eletrônico que pega fogo, responde. A responsabilidade é objetiva, ou seja, não importa se o fornecedor teve culpa ou não - se o produto é defeituoso, ele responde mesmo assim.

Há uma importante distinção na responsabilidade: o FABRICANTE responde pelo defeito durante muito tempo (dependendo do caso, pode ser até 5 anos). O IMPORTADOR também responde. O DISTRIBUIDOR e a LOJA também respondem solidariamente, o que significa que você pode processar qualquer um deles. Se for processado, eles se viram para cobrar do fabricante depois. Isso é bom para o consumidor porque não precisa descobrir quem é o fabricante - pode reclamar da loja de onde comprou.

Uma questão importante é a RESPONSABILIDADE POR FATO DO PRODUTO. Isso significa que se um produto causa dano a você ou a seus pertences (além do próprio produto), o fornecedor responde. Exemplo clássico: uma televisão explode e danifica seu sofá. Você pode exigir indenização tanto pela TV quanto pelo sofá.

O fornecedor também tem a obrigação de DISPONIBILIZAR SERVIÇOS PÓS-VENDA. Se você compra um produto de marca conhecida, a empresa precisa ter assistência técnica, peças de reposição, suporte. Não pode vender algo e depois desaparecer do mercado deixando você sem poder consertar.

Em caso de não cumprimento das obrigações, surge a RESPONSABILIDADE CIVIL. Isso significa indenização. A indenização pode ser:
- Compensatória: repõe o que você perdeu (se pagou R\$ 500 e o produto é inútil, recupera R\$ 500)
- Reparatória: repara o dano (conserta, refaz)
- Punitiva/Exemplar: pune o fornecedor por conduta desonesta (às vezes valor maior que o dano, para desestimular futuros abusos)

É importante saber que o CDC estabelece a INVERSÃO DO ÔNUS DA PROVA em certos casos. Normalmente, quem reclama precisa provar que está certo. Mas em relação de consumo, em muitos casos, é o FORNECEDOR que precisa provar que está certo, não o consumidor que precisa provar que ele errou. Isso reconhece a desigualdade de poder: o fornecedor tem documentos, registros, acesso a informações; o consumidor comum não. Inverter o ônus iguala as forças.

<blockquote class="example">
📌 Exemplo: Você compra um notebook. Depois de 3 meses, a bateria para de funcionar. A loja alega que foi mal uso seu. Mas o CDC diz que durante certo período, é o LOJISTA que precisa provar que você danificou propositalmente, não é você que precisa provar que foi defeito. Isso facilita sua defesa.
</blockquote>`,

    {id:1,
     name:"Garantias: Legal, Contratual e Direito de Arrependimento",
     dur:"16 min",
     content:`A garantia é um direito fundamental do consumidor e muitos desconhecem como funciona. Existem dois tipos de garantia: a legal (que vem grátis com qualquer compra) e a contratual (que o fornecedor oferece voluntariamente e cobra por isso ou inclui no preço).

A GARANTIA LEGAL é automática. Não precisa pedir, não precisa de papel especial. Funciona assim:
- Para PRODUTOS NÃO DURÁVEIS (alimentos, bebidas, medicamentos, cosméticos): o fornecedor responde por vícios (defeitos) por 30 dias. Se aparecer mofo no alimento, cor estranha, cheiro ruim, você pode devolver e exigir reembolso dentro desses 30 dias.
- Para PRODUTOS DURÁVEIS (eletrônicos, móveis, roupas de qualidade, eletrodomésticos): o fornecedor responde por vício aparente por 30 dias e por vício oculto (que aparece depois) por até 180 dias. Vício aparente é aquele que você consegue ver ou notar imediatamente. Vício oculto é aquele que só aparece com o uso (por exemplo, uma geladeira que funcionava bem na loja mas congela muito em casa).

Se aparecer um defeito dentro desses prazos, você tem 3 opções:
1. Exigir CONSERTO gratuito
2. Exigir TROCA por produto novo
3. Exigir DEVOLUÇÃO do dinheiro

O fornecedor não pode obrigar você a tentar conserto se você quer troca ou devolução (a menos que seja defeito muito pequeno). E não pode cobrar por conserto se é vício de fabricação.

Importante: quando o prazo de garantia legal acaba, você ainda pode exigir reparação por até 5 anos (para produtos duráveis) ou 3 anos (para não duráveis) em algumas situações, mas aí o ônus da prova muda. Você precisa provar que o defeito existia desde quando comprou, e pode ser mais difícil.

A GARANTIA CONTRATUAL ou GARANTIA ESTENDIDA é aquela que o fabricante oferece voluntariamente. O iPhone vem com 1 ano de garantia da Apple. Um notebook pode vir com 2 anos de garantia do fabricante. Essa garantia é oferecida de graça ou às vezes você paga extra por ela. Se estiver no papel, você precisa cumprir as condições (às vezes precisa manter a nota fiscal, não desmontar, levar em assistência autorizada). Mas essa garantia contratual NÃO substitui a legal - se a contratual não cobrir algo, a legal continua valendo.

Agora um direito muito importante: o DIREITO DE ARREPENDIMENTO. Esse é o seu direito de desistir da compra dentro de 7 dias, sem precisar dar motivo, sem sofrer penalidade além da devolução do produto. Mas atenção: isso vale principalmente para compras:
- À distância (internet, telefone, correio, TV)
- Porta a porta
- Fora do estabelecimento comercial

Quando você compra em uma loja, vendo e pegando o produto, geralmente não tem direito de arrependimento (a menos que seja lei estadual/municipal diferente). Mas quando compra pela internet, sim. Se comprou um vestido online que não ficou bem, tem 7 dias para devolver e pedir reembolso total. Se comprou um celular por telefone, tem direito de arrepender.

O prazo de 7 dias começa a contar do dia em que você RECEBE o produto, não do dia que comprou. Se a encomenda demora 3 dias para chegar, o prazo começa no dia da entrega. Você precisa comunicar o arrependimento de forma clara ao fornecedor. Depois, devolve o produto (geralmente o fornecedor fornece a forma de devolução e às vezes paga a postagem). O fornecedor tem até 30 dias para devolver seu dinheiro após receber o produto devolvido.

Uma pegadinha: essa garantia de arrependimento não se aplica a ALIMENTOS PERECÍVEIS já consumidos, BEBIDAS já consumidas, MEDICAMENTOS já abertos, SERVIÇOS já prestados, e PRODUTOS PERSONALIZADOS. Se você pediu uma camiseta com seu nome bordado, não pode devolver se se arrependeu - isso é feito sob encomenda.

<blockquote class="tip">
💡 Dica importante: sempre guarde a nota fiscal ou comprovante de compra. Para usar a garantia, você precisa provar que comprou e quando. E tire foto/vídeo do produto quando chega, especialmente em compras online. Isso ajuda a comprovar que o defeito já existia quando recebeu.
</blockquote>`,
     cards:[{"q":"Você tem direito de arrependimento quando compra pessoalmente em uma loja física?","a":"Geralmente não. O direito de arrependimento (7 dias) se aplica principalmente a compras à distância (internet, telefone, correspondência) e porta a porta. Compras presenciais em loja geralmente não têm direito de arrependimento, salvo por lei estadual/municipal específica."}]
    },
    {id:2,
     name:"Defeitos, Vícios e Responsabilidade do Fornecedor",
     dur:"19 min",
     content:`Para usar seus direitos de consumidor, é importante entender a diferença entre vício (defeito) e simples insatisfação. Vício é quando o produto não funciona como prometido, tem defeito de fabricação ou projeto, ou é inseguro. Insatisfação é quando o produto funciona, mas você não gostou da cor, do tamanho, ou simplesmente mudou de ideia.

Um VÍCIO APARENTE é aquele que você consegue ver ou descobrir com uso simples e imediato. Se compra um livro e as páginas estão em branco, é vício aparente - você nota ao abrir. Se compra um celular e a tela está quebrada, é aparente. Para esses, você tem 30 dias para reclamar em produtos não duráveis, 30 dias em duráveis (para vício aparente).

Um VÍCIO OCULTO é aquele que só aparece com o tempo ou uso mais intenso. Você compra um notebook e tudo parece bem, mas depois de 2 meses a placa mãe falha. Isso é vício oculto. Para esses, você tem até 180 dias em produtos duráveis para reclamar (contando do dia da compra). Nesses casos, o ônus de prova é mais complicado, mas o fornecedor ainda responde.

Importante: não confunda vício com desgaste natural. Se você compra uma camiseta e depois de 1 ano de uso intenso ela desfia, isso é desgaste normal, não é vício. Mas se desfia depois de uma lavagem, aí é vício. A linha é entre o razoável e o não razoável.

Existe também o vício RELATIVO À QUALIDADE e o RELATIVO À QUANTIDADE. Vício de qualidade é quando o produto não funciona ou é inseguro. Vício de quantidade é quando o produto pesa menos, tem menos conteúdo ou dimensões menores que o prometido. Se você compra um kg de arroz e recebe 900g, é vício de quantidade.

Sobre PRODUTOS IMPORTADOS: se você compra um produto estrangeiro aqui no Brasil, todos os direitos se aplicam normalmente. O importador é responsável aqui no Brasil pela qualidade do produto. Se houver defeito, pode reclamar com a loja, o importador é obrigado a responder.

RESPONSABILIDADE EM CADEIA: Quando você tem um problema com um produto, você pode reclamar com qualquer membro da cadeia: fabricante, importador, distribuidor, loja. Todos são responsáveis solidariamente. É muito comum uma loja dizer "reclame com o fabricante", mas isso é errado - a loja é tão responsável quanto o fabricante. A vantagem é que você pode reclamar com quem está perto de você. A loja depois, se for processada, cobra do fabricante.

PRAZO PARA REPARAÇÃO: Se você reporta um vício, o fornecedor tem um prazo razoável para consertar. O que é "razoável" depende do produto e do defeito. Para um celular com tela quebrada, dias são razoáveis. Para uma geladeira que precisa de peça especial, semanas podem ser razoáveis. Se passar muito tempo sem resposta, você pode exigir troca ou devolução.

PRODUTOS DANIFICADOS NO TRANSPORTE: Se o produto chega danificado porque a transportadora jogou a caixa, quem responde? A lei diz que a loja responde, não a transportadora. Então a loja precisa cobrar da transportadora depois. Você sempre reclama com a loja de onde comprou, nunca diretamente com a transportadora.

PRODUTOS FALSIFICADOS ou CONTRABANDEADOS: Se você compra achando que é original e é falsificado, o fornecedor responde. Se compra em uma loja que vende falsificado misturado com original, você pode exigir indenização por ter sido enganado. Isso é considerado prática enganosa.

PRODUTOS USADOS ou DE VITRINE: Se uma loja vende algo como novo e na verdade é usado ou de vitrine, é enganosa. Precisa avisar que é usado, oferece desconto, ou permite que você não queira comprar. Se não avisar, você pode devolver.

<blockquote class="quote">
💬 "O direito do consumidor não é sobre ganhar ações ou processos. É sobre equilíbrio: o consumidor não precisa ser um especialista em leis, e o fornecedor não pode tirar vantagem disso." - Princípio do CDC
</blockquote>`,
     cards:[{"q":"Qual é a diferença entre vício aparente e vício oculto?","a":"Vício aparente é aquele que você consegue ver ou descobrir com uso simples (produto quebrado, manchado). Vício oculto só aparece com o tempo ou uso mais intenso (placa mãe que falha depois de meses). Você tem 30 dias para o aparente e até 180 para o oculto."}]
    },
    {id:3,
     name:"Compras Online, Contratos e Negociação com Fornecedores",
     dur:"18 min",
     content:`As compras online crescem cada dia mais, e é importante saber como a lei do consumidor se aplica nesse contexto. Basicamente, todas as regras continuam valendo, mas há especificidades do ambiente virtual.

INFORMAÇÕES OBRIGATÓRIAS em sites de compra: O fornecedor online é obrigado a fornecer informações muito claras. Precisa estar escrito o nome da empresa, endereço físico, telefone e email para contato. Precisa informar o preço total, including frete. Precisa ser claro quais são os produtos, como funcionam, prazo de entrega. Se há restrições (por exemplo, não entrega em certos lugares), precisa avisar. Se há limitação de quantidade por cliente, precisa estar visível. Tudo isso precisa estar fácil de encontrar no site.

FINALIZAÇÃO DO PEDIDO: O site precisa permitir que você REVISE e CORRIJA seus dados antes de confirmar. Muitos sites dizem "clique para confirmar" e pronto - está feito. Mas a lei diz que você tem direito de revisar tudo antes. Se clicar em "comprar" por engano e não conseguir voltar atrás rápido, pode reclamar.

CONFIRMAÇÃO: Após comprar, você tem direito de receber confirmação do pedido por email ou outro meio eletrônico. Essa confirmação é um documento importante - guarde sempre.

PRAZO DE ENTREGA: O fornecedor precisa informar o prazo de entrega antes de você comprar. Se diz que entrega em 7 dias e entrega em 20, violou a lei. O prazo é uma obrigação contratual. Se não cumpre, você pode:
1. Cancelar o pedido e pedir reembolso
2. Receber o produto mesmo depois do prazo e descontar do valor
3. Processar por danos (se perdeu algo importante por atraso)

DIREITO DE ARREPENDIMENTO (já mencionado mas reforçando): Em 7 dias você pode desistir. Mas tem que informar de forma clara. O fornecedor tem que fornecer um meio fácil de fazer isso. Não pode ser algo como "mande um fax para Brasília". Precisa ser prático. Depois devolve o produto (geralmente com postagem do vendedor) e recebe reembolso em até 30 dias.

PRODUTOS COM DEFEITO: Se chega com defeito, todos os direitos de reparação se aplicam (conserto, troca, reembolso).

PRIVACIDADE E DADOS: As compras online envolvem seus dados pessoais. O fornecedor precisa proteger isso. Pode usar seus dados para processar a compra e enviar o produto. Mas não pode vender seus dados para terceiros sem autorização. Se suas informações são vazadas, você pode reclamar por dano moral. Existe agora a LGPD (Lei Geral de Proteção de Dados) que protege seus dados pessoais. Qualquer site sério tem uma política de privacidade explicando como usa seus dados.

FORMA DE PAGAMENTO: Você pode pagar online de várias formas (cartão, boleto, transferência, PIX). Se usar cartão:
- O site precisa usar conexão segura (https, cadeado verde no navegador)
- Seus dados do cartão não devem ser armazenados sem sua permissão
- Se houver fraude, você pode reclamar com o banco
- Muitos bancos dão proteção contra fraude (não é seu problema)

PROBLEMAS COMUNS E SOLUÇÕES:
1. Produto não chegou: Primeiro, verifique se está mesmo atrasado (confirmou o prazo?). Se passed o prazo, procure a loja. Se a loja disser que foi entregue mas não chegou, exija comprovante de entrega. Pode ser que se perdeu no caminho (aí é problema da transportadora, mas a loja responde). Se não conseguir produto nem reembolso, reclame no PROCON.

2. Produto chegou danificado: Se abrir a embalagem e está quebrado, fotografe e notifique a loja imediatamente. Você tem direito a troca ou reembolso. Guarde a embalagem e o produto para comprovação.

3. Cobrança duplicada ou não autorizada: Notifique a loja imediatamente. Peça comprovante. Se não resolver, cancele a autorização com seu banco/operadora de cartão.

CONTRATOS ELETRÔNICOS: Quando você compra online, existe um contrato entre você e a loja. Esse contrato é feito clicando em "aceito os termos". Mas atenção: não é porque está nos termos que é válido. Se os termos dizem algo ilegal (por exemplo, "sem direito de arrependimento" ou "você não pode processar"), essas cláusulas são nulas. Os termos não podem reduzir seus direitos básicos como consumidor.

NEGOCIAÇÃO COM FORNECEDORES: Nem sempre é preciso ir para a justiça. Muitas vezes, ligar, mandar email educado, ameaçar reclamação no PROCON ou avalação negativa nas redes, resolve. Fornecedores querem manter reputação. Se foi enganado em R\$ 50, às vezes nem vale a pena processar, mas vale a pena reclamar e ver se a empresa resolve. Boa comunicação ajuda.

     name:"Cobranças Indevidas, Juros Abusivos e Proteção contra Abusos",
     dur:"20 min",
     content:`Uma das maiores fontes de reclamações de consumidor é o abuso em cobranças. Existem várias formas de cobrança que são ilegais, e você precisa conhecê-las para se proteger.

COBRANÇAS NÃO AUTORIZADAS: Você só pode ser cobrado por algo que autorizou. Se uma empresa te cobra sem você ter autorizado, é ilegal. Exemplos:
- Operadora de celular que cobra por serviço que você nunca pediu (consultoria, horóscopo, ringtones)
- Academia que cobra por aula experimental que você não pediu como membro
- Banco que cobra taxas nunca mencionadas antes
- Assinatura de revista que você cancelou mas continua cobrando

Se receber uma cobrança não autorizada, você tem direito a:
1. Cancelamento imediato
2. Devolução em DOBRO da cobrança indevida (não é apenas devolver, é devolver em dobro como punição)
3. Indenização por dano moral se tiver, por exemplo, nome sujo indevidamente

COBRANÇAS DUPLICADAS: Às vezes uma transação é processada duas vezes por erro do sistema. Se nota que foi cobrado duas vezes pela mesma coisa no mesmo dia/período, isto é cobrança duplicada. Deve informar à loja ou banco imediatamente. Eles devem devolver a cobrança duplicada rapidamente.

JUROS ABUSIVOS: Existem limites para juros. A maioria das compras em lojas é feita à vista ou com parcelamento sem juros. Mas se você financia uma compra ou atrasa uma fatura, aí há juros. O que é "abusivo"? Segundo o CDC, é quando o juros é desproporcional, muito maior que a taxa média do mercado, ou impossibilita o consumidor de quitar a dívida. Um cartão de crédito cobrando 400% ao ano é abusivo - é impossível quitar. Um banco cobrando taxa de juros muito maior que a média do banco central também é.

Se está pagando juros abusivos, pode pedir ao juiz que reduza (moderação judicial). Mas é preciso comprovar que é realmente abusivo.

MULTA POR ATRASO: Se você atrasa uma conta (água, luz, telefone, carnê), o fornecedor pode cobrar multa. Qual é o limite? A lei diz que multa de mora não pode exceder 2% do valor da dívida. Muitas contas cobram 2% e depois ainda cobram juros em cima dos juros. Isso é abusivo também.

PROTESTO DE TÍTULOS: Se você atrasa um cheque, boleto ou duplicata, a empresa pode protestar o documento em cartório, o que afeta seu nome no mercado. Mas atenção: só pode protestar se você realmente deve e não pagou. Se foi engano ou o fornecedor aceitou atraso, não pode protestar. Se protestar indevidamente, você pode exigir indenização por dano moral.

RESTRIÇÃO DE CRÉDITO E NOME SUJO: Se seu nome vai para a lista de devedores (SPC, SERASA), isso afeta sua vida - não consegue financiar, às vezes não consegue nem criar conta em banco, emprego pode ser afetado. Por isso, o fornecedor só pode mandar seu nome para restrição se:
1. Você tem uma dívida real
2. A dívida é exigível (já venceu e foi cobrado)
3. Você não pagou mesmo depois de cobrado
4. O fornecedor deu chance (geralmente precisa avisar antes de mandar para restrição)

Se mandar para restrição indevidamente, é dano moral grave. Você pode exigir uma indenização substancial.

ASSÉDIO DE COBRADORES: Cobrador tem direito de cobrar, mas não tem direito de ofender, humilhar, ameaçar, ligar para seu trabalho (a menos que seja comercial e autorizado), ligar para seus familiares, ligar de madrugada. Se um cobrador faz isso, é abuso. Você pode:
1. Registrar a ligação (em algumas localidades é legal)
2. Gravar a conversa
3. Registrar reclamação com data, hora, o que foi dito
4. Denunciar para o PROCON ou polícia (em casos graves)
5. Processar por dano moral

RECUPERAÇÃO INDEVIDA E PENHORA: Se uma empresa tenta recuperar um produto (por exemplo, recuperar um carro financiado) sem avisar, sem ir à justiça, apenas entrando na sua casa e pegando, isso é crime. Precisa de ordem judicial. Se tentarem fazer isso, pode processar criminalmente e civilmente por dano moral.

EMBARGOS E OFERECIMENTO EM SEGURANÇA: Mesmo que deva algo, certas coisas não podem ser penhoradas. Sua casa (até certo valor), seus móveis básicos, suas ferramentas de trabalho, salário (até certo limite), alimentos. A justiça protege o mínimo essencial. Se tentarem penhorar coisas que não podem, pode contestar.

CLÁUSULA PENAL EXAGERADA: Às vezes um contrato diz "se não pagar, você paga R\$ 10.000 de multa" para uma dívida de R\$ 100. Isso é cláusula penal exagerada e o juiz pode reduzir para algo razoável. Não é porque está no contrato que vale.

<blockquote class="example">
📌 Exemplo prático: Você financiou uma geladeira em 12 vezes. Atrasou uma parcela. A loja cobra: 2% multa + 5% de juros ao mês = 7% ao mês = 84% ao ano em cima de um bem de consumo simples. Isso é abusivo. Você pode pedir ao PROCON ou à justiça para reduzir para algo razoável como 1% ao mês.
</blockquote>`,
     cards:[{"q":"Se recebo uma cobrança que não autorizei, qual é meu direito?","a":"Você tem direito de cancelar imediatamente e receber em DOBRO o valor cobrado indevidamente, além de indenização por dano moral se houver. Notifique imediatamente à loja ou banco com comprovação."}]

    {id:2,
     name:"Resolvendo Problemas: PROCON, Justiça e Direitos Processuais",
     dur:"19 min",
     content:`Conhecer seus direitos é importante, mas saber como exercê-los é essencial. Existem várias formas de resolver problemas de consumidor, desde o mais simples até a justiça.

PRIMEIRA OPÇÃO - NEGOCIAÇÃO DIRETA: Antes de processar, converse com o fornecedor. Ligue, mande email, visite a loja. Explique o problema educadamente. Muitos problemas são resolvidos assim. Empresas preferem resolver rápido a ter processos. Guarde comprovação dessa comunicação (imprima email, guarde número de protocolo, etc).

SEGUNDA OPÇÃO - RECLAMAÇÃO FORMAL ESCRITA: Se a negociação não funciona, mande uma carta registrada (com aviso de recebimento) ou e-mail registrado (existem serviços que comprovam entrega) explicando o problema e dando prazo para responder (geralmente 7 ou 15 dias). Seja claro sobre o que quer como solução. Isso cria um documento que pode ser usado depois.

TERCEIRA OPÇÃO - RECLAMAÇÃO NO PROCON: O PROCON (Programa de Proteção e Defesa do Consumidor) é um órgão público que defende consumidores. Praticamente todo estado tem PROCON. Você pode ir pessoalmente, ligar ou até registrar reclamação online em alguns. É gratuito. O PROCON entra em contato com o fornecedor, tenta conciliar. Muitas reclamações são resolvidas assim sem precisar ir à justiça. Mas o PROCON não tem poder de forçar nada - sua função é investigar, orientar e tentar conciliar. Se não consegue, você segue para a justiça.

QUARTA OPÇÃO - ÓRGÃO ESPECÍFICO: Para alguns setores, existem órgãos especializados:
- ANATEL (telefonia): órgão federal que regula telefonia
- ANVISA (saúde): qualidade de medicamentos e saúde
- INMETRO (qualidade): produtos que precisam de teste de qualidade
- POLÍCIA CIVIL: crimes relacionados a consumo (fraude, falsificação)
- Banco Central: problemas com bancos
- Agência Nacional de Saúde Suplementar (ANS): planos de saúde

QUINTA OPÇÃO - JUSTIÇA: Quando nada resolve, vai para a justiça. Existem dois caminhos:

1. JUIZADO ESPECIAL (Pequenas Causas): É para causas de até R\$ 20 mil. É simples, rápido (meses em vez de anos), não precisa de advogado (embora seja recomendado), é gratuito ou muito barato. O juiz ouve você, o fornecedor, analisa documentação e decide. Não precisa de provas perfeitas, vale o bom senso. É ideal para reclamações de consumidor comuns. Se perder, o juiz não condena em custas. Se ganhar, o fornecedor paga suas custas e você ainda recebe o valor cobrado.

2. PROCESSO CIVIL NORMAL: Para valores acima de R\$ 20 mil ou questões mais complexas. Exige advogado, é mais formal, demora anos. Há custas e honorários advocatícios. Geralmente é para casos graves ou de muito valor.

AÇÃO COLETIVA: Se muitas pessoas têm o mesmo problema com uma empresa (por exemplo, todos foram cobrados de forma ilegal), pode haver uma ação coletiva. Associações de consumidores, sindicatos, ou o Ministério Público pode ajuizar ação em nome de todos. Se ganhar, todos os consumidores prejudicados podem reclamar ressarcimento.

DIREITOS PROCESSUAIS DO CONSUMIDOR:
- INVERSÃO DE ÔNUS DA PROVA: Em muitas situações, é o fornecedor que precisa provar que está certo, não você que precisa provar que ele errou. Isso reconhece que o fornecedor tem mais informação.
- GRATUIDADE: Você pode ter isenção de custas processuais se for pobre.
- ACESSO À JUSTIÇA: Você pode pedir ao juiz para ordenar ao fornecedor para entregar documentos, provas etc.
- CONDENAÇÃO POR LITIGÂNCIA DE MÁ-FÉ: Se o fornecedor está claramente mentindo ou abusando do processo, o juiz pode condená-lo a pagar indenização por dano moral e custas maiores.

RECURSOS E APELAÇÃO: Se perder na primeira instância, pode apelar em segunda instância. Aí um tribunal revê a decisão. Isso custa mais e demora, mas é direito. Às vezes decisões de juiz são injustas e a apelação consegue reverter.

PRESCRIÇÃO: Há prazo para reclamar. Para produtos duráveis, até 5 anos. Para não duráveis, até 3 anos. Depois disso, precisa comprovar que o direito não prescreveu (é complicado). Melhor não deixar passar muito tempo.

EXECUÇÃO DA SENTENÇA: Se ganhar na justiça, o fornecedor tem prazo para pagar. Se não pagar, você volta à justiça e pede penhora de bens do fornecedor, até que pague. O sistema respeita direitos vencidos em sentença.

MEDIAÇÃO E ARBITRAGEM: Algumas disputas podem ser resolvidas por mediador (terceiro neutro que ajuda as partes a chegar em acordo) ou árbitro (terceiro que decide). Isso é mais rápido que justiça normal. Muitas empresas oferecem esses mecanismos. Vale a pena tentar.

<blockquote class="news">
📰 O PROCON consegue resolver mais de 80% das reclamações que recebe. Antes de gastar dinheiro em advogado, vale muito a pena tentar PROCON.
</blockquote>`,
     cards:[{"q":"Qual é a diferença entre PROCON e justiça?","a":"PROCON é órgão público que tenta conciliar, orienta e investiga reclamações. É gratuito mas não pode forçar nada. Justiça é o tribunal que decide e força o cumprimento. PROCON é primeira tentativa, justiça é quando PROCON não resolve."}]

    {id:3,
     name:"Situações Práticas e Dicas Finais para se Proteger",
     dur:"18 min",
     content:`Para encerrar, vamos ver situações reais que muitas pessoas enfrentam e como o direito do consumidor protege você.

SITUAÇÃO 1 - COMPRA EM LOJA FÍSICA COM DEFEITO: Você compra um notebook em uma loja e ele começa a travar depois de 1 mês. Vai à loja e o vendedor diz "é seu uso, não é defeito". Mas é claramente defeito - o notebook novo de uma marca grande não deveria travar sem motivo. Seu direito: O notebook é durável, está dentro dos 180 dias de garantia para vício oculto. Você pode exigir conserto, troca ou devolução. Se a loja recusa, vai ao PROCON com nota fiscal. O PROCON faz perícia técnica gratuita. Se confirmar defeito, ordena à loja a reparação. Se a loja não cumprir, você processa. Dica: Guarde nota fiscal, tire vídeo do problema (travando, lentidão).

SITUAÇÃO 2 - COBRANÇA NÃO AUTORIZADA: Você recebe fatura do cartão de crédito e vê uma cobrança de R\$ 80 de uma empresa que nunca contratou. Seu direito: Você pode: (a) Ligar para o cartão e contestar a transação (chargeback); (b) Ligar para a empresa e reclamar; (c) Se não resolver, registrar no PROCON ou polícia (é fraude). O banco geralmente reverte a cobrança em 15-30 dias se você contestar. Não pague. Dica: Revise seu extrato todo mês. Muitas cobranças não autorizadas passam despercebidas.

SITUAÇÃO 3 - ATRASO NA ENTREGA ONLINE: Você compra um presente para o aniversário do seu filho no site de uma loja, que promete entrega em 3 dias. Passam 10 dias e o presente não chegou. O aniversário foi ontem. Seu direito: O prazo é obrigação contratual. Como passou, você pode: (a) Cancelar o pedido e pedir reembolso; (b) Receber o presente com desconto; (c) Pedir indenização por dano moral se o atraso causou problema grave. Procure a loja primeiro, depois PROCON. Dica: Sempre compre prazos maiores que o necessário para ter margem.

SITUAÇÃO 4 - FALSIFICADO VENDIDO COMO ORIGINAL: Você compra o que acha que é uma bolsa original da marca famosa, paga caro, depois descobre que é falsificado. Seu direito: Prática enganosa. Você foi enganado na informação. Pode devolver, pedir reembolso integral e ainda indenização por dano moral (foi enganado, pagou mais caro). A loja é responsável por vender falsificado - é ilegal. Dica: Compre em lojas oficiais. Se compra em revendedora, peça nota fiscal e documento de autenticidade.

SITUAÇÃO 5 - COBRADOR FAZENDO ASSÉDIO: Um cobrador liga para você 5 vezes ao dia, lhe ameaça, xinga, tira sarro. Você diz que vai pagar mas pede para não ligar tanto. Ele continua. Seu direito: Assédio de cobrador é abuso. Você pode: (a) Ligar para a empresa responsável pela cobrança e reclamar; (b) Gravar as chamadas (onde é legal); (c) Registrar BO na polícia por ameaça; (d) Processar por dano moral. O cobrador quebrou a lei. Você pode exigir indenização até mesmo que valor de danos morais. Dica: Registre em anotação as datas, horas e o que foi dito. Isso comprovará o padrão.

SITUAÇÃO 6 - SERVIÇO RUIM PRESTADO: Você contrata um encanador para consertar seu banheiro. Ele faz um serviço ruim - 1 semana depois o vazamento volta. Você pode exigir que refaça de graça. Se recusa, pode não pagar (se ainda não pagou) ou pode exigir devolução parcial do dinheiro. Se o serviço ruim causa dano (por exemplo, úmidade pior), pode exigir indenização. Dica: Sempre tire fotos antes e depois. Peça nota do serviço. Pague só após conferir.

SITUAÇÃO 7 - ARREPENDIMENTO DE COMPRA ONLINE: Você compra uma roupa online impulsivamente. Quando chega, decide que não quer. Você tem 7 dias. Comunica à loja. Eles fornecem endereço de devolução. Você devolve dentro de 30 dias. Eles devolvem seu dinheiro em até 30 dias. Fácil assim. Dica: Acompanhe o rastreamento, devolva rápido, guarde comprovante de envio da devolução.

SITUAÇÃO 8 - CONTRATO COM CLÁUSULA ABUSIVA: Um contrato que você assina diz "o cliente renuncia ao direito de garantia" ou "aceita produtos com defeito". Essas cláusulas são NULAS. Você não pode renunciar direitos básicos de consumidor, nem que queira. Se a empresa exigir que você assine, não assine. Se assinou, não é válido - você ainda tem todos os seus direitos. Dica: Leia contratos. Se tiver algo estranho, pergunte antes de assinar.

SITUAÇÃO 9 - NOME SUJO INDEVIDAMENTE: Seu nome vai para restrição de crédito por uma dívida que você já pagou. Você tenta comprovar o pagamento mas o credor nega. Seu direito: Dano moral grave. Seu nome foi restringido indevidamente. Você pode: (a) Pedir ao credor que retire imediatamente o nome; (b) Se recusa, processar por dano moral (pode valer bastante dinheiro); (c) Pedir limpeza do nome enquanto o processo anda. O credor que foi negligente em seus registros. Você merece indenização. Dica: Guarde comprovantes de tudo que paga (boleto bancário, comprovante de transferência, recibo).

DICAS FINAIS PARA SE PROTEGER:
1. DOCUMENTE TUDO: Nota fiscal, comprovante de compra, recibo, contrato. Fotos e vídeos de produtos. Emails trocados. Tudo pode servir de prova.

2. GUARDE COMPROVANTES DE PAGAMENTO: Boleto, transferência, cartão de crédito, PIX - mantém registro de tudo que você pagou.

3. LEIA ANTES DE CONTRATAR: Conhecer os termos evita surpresas. Se tiver cláusula estranha, pergunte.

4. NÃO ACEITE O "NÃO": Se a loja diz que não pode fazer algo (trocar produto, devolver dinheiro), mas você tem direito legal, insista. Peça supervisor, gerente. Ameace ir ao PROCON. Muitas vezes consegue.

5. COMUNIQUE EM ESCRITO: Emails, mensagens de texto - deixam registro. Reclamação verbal é sua palavra contra deles.

6. CONHEÇA SEUS DIREITOS BÁSICOS: Informação clara, produto seguro, garantia, sem práticas abusivas. Tudo está na lei.

7. NÃO TENHA MEDO DE RECLAMAR: Reclamação não é agressividade. É exercer direito. Empresas contam que você não sabe disso ou tem medo. Não caia nessa.

8. PROCURE ÓRGÃOS: PROCON, Banco Central, ANATEL, ANVISA - têm poder de agir e geralmente é gratuito.
