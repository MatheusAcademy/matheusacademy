<h3>Como Tudo Começou</h3>
<p>Antes de existir dinheiro, as sociedades humanas utilizavam o <strong>escambo</strong> — a troca direta de bens e serviços. Se você tinha trigo e precisava de carne, precisava encontrar alguém que tivesse carne e quisesse trigo. Simples na teoria, caótico na prática.</p>
<p>Esse sistema tinha um problema central chamado de <strong>dupla coincidência de desejos</strong>: era necessário que duas pessoas, ao mesmo tempo, tivessem exatamente o que a outra precisava. A solução foi a criação de um intermediário universal de valor.</p>
<h3>A Evolução das Formas de Dinheiro</h3>
<p>Ao longo dos séculos, diferentes civilizações utilizaram objetos como meio de troca: conchas marinhas na China antiga, sal no Império Romano (daí vem a palavra "salário"), metais preciosos na Grécia e Roma, e tecidos raros em diversas culturas africanas.</p>
<ul>
  <li><strong>Metais preciosos:</strong> ouro e prata se tornaram o padrão por serem escassos, duráveis e divisíveis</li>
  <li><strong>Moedas cunhadas:</strong> facilitaram o comércio ao padronizar o peso e a pureza</li>
  <li><strong>Papel moeda:</strong> surgiu como recibo de depósito de ouro guardado em bancos</li>
  <li><strong>Dinheiro digital:</strong> hoje, mais de 90% do dinheiro existe apenas em registros eletrônicos</li>
</ul>
<h3>O Problema do Papel Moeda Moderno</h3>
<p>O papel moeda que usamos hoje não tem lastro físico. Ele vale porque o governo diz que vale — isso é chamado de <strong>moeda fiduciária</strong> (do latim "fides", fé). Você aceita reais porque confia que outras pessoas também os aceitarão.</p>
<blockquote>💡 "O dinheiro moderno é, em essência, uma promessa. E como toda promessa, depende de quem a faz para ter valor."</blockquote>
<p>Essa dependência na confiança e na autoridade central criou um sistema frágil, sujeito à manipulação política e a crises periódicas. Entender essa fragilidade é o primeiro passo para compreender por que o Bitcoin foi inventado.</p>

<h3>Os Primeiros Banqueiros da História</h3>
<p>Os bancos surgiram na Itália medieval, especialmente em cidades como Florença e Veneza. Comerciantes ricos começaram a guardar o ouro de outras pessoas e emitir recibos. Com o tempo, perceberam que nem todos os depositantes retiravam seu ouro ao mesmo tempo — e começaram a emprestar o que não era deles.</p>

<h3>O que Era o Padrão Ouro</h3>
<p>O <strong>padrão ouro</strong> foi um sistema monetário em que cada unidade de moeda correspondia a uma quantidade fixa de ouro. O dólar americano, por exemplo, valia 1/35 de uma onça troy de ouro. Isso limitava a quantidade de dinheiro que o governo podia emitir — só podia imprimir tanto quanto tinha de ouro em reserva.</p>

<h3>O Maior Mistério da Era Digital</h3>
<p>Satoshi Nakamoto é o nome — ou pseudônimo — da pessoa ou grupo de pessoas que criou o Bitcoin. Até hoje, sua identidade real é desconhecida. É o único criador de um ativo de trilhões de dólares que nunca revelou quem é.</p>
<p>Satoshi se comunicava apenas por e-mail e fóruns online. Escrevia em inglês perfeito, mas com características que sugeriam ser um falante nativo britânico. Seus posts eram horários compatíveis com o fuso da Europa ou América do Norte.</p>
<h3>O que Sabemos sobre Satoshi</h3>
<ul>
  <li>Publicou o whitepaper do Bitcoin em 31 de outubro de 2008</li>
  <li>Minerou os primeiros bitcoins em 3 de janeiro de 2009</li>
  <li>Comunicou-se ativamente com a comunidade até 2010</li>
  <li>Em abril de 2011, enviou seu último e-mail e desapareceu</li>
  <li>Possui cerca de 1 milhão de bitcoins que nunca foram movimentados</li>
</ul>
<h3>Por que o Anonimato Importa</h3>
<p>O anonimato de Satoshi não é uma fraqueza do Bitcoin — é uma de suas maiores fortalezas. Se houvesse um criador conhecido, ele poderia ser processado, preso, coagido ou corrompido. Ao desaparecer, Satoshi tornou o Bitcoin verdadeiramente sem dono.</p>

<h3>O Documento que Mudou o Mundo</h3>
<p>Em 31 de outubro de 2008, Satoshi Nakamoto publicou na lista de e-mails de criptografia um documento intitulado: <em>"Bitcoin: A Peer-to-Peer Electronic Cash System"</em>. Com apenas 9 páginas, esse whitepaper descreveu pela primeira vez um sistema de dinheiro eletrônico que funcionaria sem nenhuma instituição central.</p>
<p>O problema que Satoshi quis resolver era específico: como fazer duas pessoas trocarem valor pela internet sem precisar de um banco no meio? Como evitar que alguém gaste o mesmo dinheiro digital duas vezes (o "problema do gasto duplo")?</p>
<h3>A Solução do Whitepaper</h3>
<p>A resposta de Satoshi foi elegante: em vez de um banco central manter o registro de todas as transações, criar uma rede de milhares de computadores que todos mantêm cópias do mesmo registro — chamado de blockchain. Fraude é impossível porque a maioria da rede precisaria concordar.</p>
<ul>
  <li>Transações são verificadas por mineradores (computadores da rede)</li>
  <li>Cada bloco de transações é ligado ao anterior formando uma corrente</li>
  <li>Alterar uma transação exigiria refazer toda a corrente — impossível na prática</li>
  <li>A emissão de novos bitcoins segue um cronograma matemático fixo</li>
</ul>
<blockquote>💡 O whitepaper de Bitcoin tem apenas 9 páginas — menos que muitas dissertações universitárias. Mas resolveu um problema que economistas e cientistas da computação perseguiam há décadas.</blockquote>
<p>O whitepaper está disponível gratuitamente em bitcoin.org e é leitura obrigatória para qualquer pessoa séria no mundo cripto. Sua simplicidade e profundidade técnica são notáveis até hoje.</p>
`,

        cards:[{q:'O que é o whitepaper do Bitcoin?',a:'Documento de 9 páginas publicado em 2008 descrevendo o funcionamento técnico e econômico do Bitcoin.'},{q:'O que é o problema do gasto duplo?',a:'Risco de gastar o mesmo dinheiro digital mais de uma vez — resolvido pelo Bitcoin via blockchain.'},{q:'Onde está disponível o whitepaper?',a:'Gratuitamente em bitcoin.org, publicado originalmente em 31 de outubro de 2008.'}]

        id:10, name:'O contexto da crise de 2008', dur:'10min',
        content:`
<h3>A Maior Crise desde 1929</h3>
<p>O Bitcoin nasceu em resposta direta à crise financeira de 2008. Para entender o Bitcoin, é preciso entender o que aconteceu naquele ano. A crise foi causada pelo colapso do mercado imobiliário americano, que havia sido inflado por décadas de crédito irresponsável e instrumentos financeiros complexos que ninguém compreendia completamente.</p>
<p>Bancos como Lehman Brothers (fundado em 1850!) foram à falência do dia para a noite. O governo americano gastou mais de US$ 700 bilhões em resgates bancários — dinheiro de contribuintes usado para salvar instituições que haviam criado o problema.</p>
<h3>A Mensagem Oculta no Genesis Block</h3>
<p>Quando Satoshi minerou o primeiro bloco do Bitcoin em 3 de janeiro de 2009, inscreveu nele uma mensagem:</p>
<blockquote>💡 "The Times 03/Jan/2009 Chancellor on brink of second bailout for banks" — manchete do jornal britânico The Times naquele dia.</blockquote>
<p>Essa mensagem não foi acidente. Satoshi estava documentando exatamente contra o que o Bitcoin se opunha: o sistema de resgates bancários financiados pelo público enquanto a população sofre com as consequências.</p>
<h3>O Timing Perfeito</h3>
<p>O Bitcoin surgiu no momento exato em que a confiança no sistema financeiro tradicional estava no ponto mais baixo. Milhões de pessoas perderam casas, empregos e economias de vida. A pergunta "existe alternativa?" nunca foi tão urgente — e Satoshi tinha a resposta pronta.</p>
`,

        cards:[{q:'Por que 2008 foi importante para o Bitcoin?',a:'A crise financeira expôs os problemas do sistema bancário e motivou a criação de uma alternativa descentralizada.'},{q:'O que é o Genesis Block?',a:'O primeiro bloco da blockchain do Bitcoin, minerado por Satoshi em 3 de janeiro de 2009.'},{q:'Qual mensagem histórica está no Genesis Block?',a:'Manchete do jornal The Times sobre o resgate bancário britânico — ato de protesto de Satoshi.'}]

      {
        id:11, name:'A primeira transação da história', dur:'9min',
        content:`
<h3>O Dia que o Bitcoin Valeu Algo</h3>
<p>Em 22 de maio de 2010, um programador americano chamado <strong>Laszlo Hanyecz</strong> fez a primeira transação comercial da história usando Bitcoin. Ele pagou 10.000 bitcoins por duas pizzas. Um usuário britânico aceitou a proposta, pediu as pizzas de uma loja local e as entregou a Laszlo.</p>
<p>O valor de 10.000 bitcoins naquele dia era de aproximadamente US$ 41. Hoje, esses mesmos bitcoins valeriam centenas de milhões de dólares. Por isso, 22 de maio é celebrado anualmente na comunidade como o <strong>Bitcoin Pizza Day</strong>.</p>
<h3>Por que essa Transação Foi Revolucionária</h3>
<p>Antes das pizzas de Laszlo, o Bitcoin era apenas um experimento teórico. Nenhum bem real havia sido trocado por ele. Com essa transação, o Bitcoin provou que podia funcionar como dinheiro de verdade — um meio de troca que duas pessoas usavam voluntariamente, sem banco, sem intermediário.</p>
<ul>
  <li>Provou que o Bitcoin tinha valor de uso real</li>
  <li>Estabeleceu o primeiro "preço de mercado" do Bitcoin</li>
  <li>Mostrou que transações peer-to-peer eram tecnicamente viáveis</li>
  <li>Iniciou o ecossistema de comércio em Bitcoin</li>
</ul>
<blockquote>💡 Laszlo não se arrepende. Em entrevistas, diz que estava feliz em contribuir para a história do Bitcoin — e que comeria as pizzas de novo pelo mesmo preço.</blockquote>
`,

      {
        id:12, name:'O conceito de dinheiro descentralizado', dur:'10min',
        content:`
<h3>O que é Descentralização</h3>
<p>Descentralização significa que não existe um ponto único de controle. No sistema bancário atual, cada banco tem um servidor central — se ele cair ou for hackeado, os serviços param. O banco central tem o poder de criar ou destruir dinheiro. Um único regulador pode congelar transações de países inteiros.</p>
<p>O Bitcoin funciona de forma radicalmente diferente: a rede é composta por mais de 15.000 nós (computadores) distribuídos ao redor do mundo, cada um mantendo uma cópia completa de todas as transações já realizadas. Para "derrubar" o Bitcoin, seria necessário derrubar simultaneamente a maioria desses computadores em dezenas de países.</p>
<h3>Sem Ponto de Falha Central</h3>
<p>A descentralização do Bitcoin significa que:</p>
<ul>
  <li>Nenhum governo pode desligar a rede Bitcoin</li>
  <li>Nenhum banco pode congelar sua carteira Bitcoin</li>
  <li>Nenhuma empresa pode alterar as regras do protocolo unilateralmente</li>
  <li>Nenhum hacker pode fraudar transações sem controlar 51% da rede</li>
</ul>
<blockquote>💡 "Você pode fechar um banco. Você pode prender um CEO. Você não pode fechar o Bitcoin — é como tentar fechar a internet desligando um roteador."</blockquote>
<p>Países como China, Índia, Bolívia e outros já "baniram" o Bitcoin múltiplas vezes. Resultado: o Bitcoin continuou funcionando nesses países. A rede ignora decretos governamentais porque não tem endereço para receber uma intimação.</p>
`,
        quiz:{q:'O que significa descentralização no contexto do Bitcoin?',opts:['Rede sem ponto único de controle, distribuída entre milhares de computadores','Sistema gerido por vários bancos centrais','Tecnologia que dispersa dinheiro automaticamente','Ausência de qualquer regulação'],correct:0},
        cards:[{q:'O que é descentralização?',a:'Ausência de ponto único de controle — o Bitcoin é mantido por milhares de computadores independentes.'},{q:'Quantos nós tem a rede Bitcoin?',a:'Mais de 15.000 nós distribuídos ao redor do mundo.'},{q:'Por que o Bitcoin não pode ser "desligado"?',a:'Porque está distribuído em milhares de computadores em países diferentes — não existe um botão de desligar.'}]

      {
        id:13, name:'Diferença entre Bitcoin e moedas tradicionais', dur:'10min',
        content:`
<h3>Uma Comparação Fundamental</h3>
<p>Para entender o valor do Bitcoin, é preciso compará-lo diretamente com as moedas que conhecemos. As diferenças não são apenas técnicas — são filosóficas e econômicas.</p>
<p><strong>Moedas tradicionais (Fiat):</strong></p>
<ul>
  <li>Criadas por governos e bancos centrais</li>
  <li>Emissão ilimitada e discricionária</li>
  <li>Valor baseado em confiança e decreto</li>
  <li>Pode ser congelada, confiscada ou bloqueada</li>
  <li>Requer intermediários para transferência</li>
</ul>
<p><strong>Bitcoin:</strong></p>
<ul>
  <li>Criado por algoritmo matemático</li>
  <li>Emissão máxima de 21 milhões, programada e imutável</li>
  <li>Valor baseado em escassez, utilidade e consenso de rede</li>
  <li>Inalienável — apenas a chave privada dá acesso</li>
  <li>Transações diretas sem intermediário</li>
</ul>
<blockquote>💡 O real brasileiro perdeu mais de 99,9% do seu valor desde 1942. O Bitcoin, desde seu primeiro preço registrado, valorizou mais de 10.000.000%.</blockquote>
<h3>O Bitcoin é Dinheiro?</h3>
<p>Para ser dinheiro, um ativo precisa funcionar como: meio de troca, reserva de valor e unidade de conta. O Bitcoin já funciona claramente como reserva de valor e meio de troca. A unidade de conta ainda está em desenvolvimento conforme a adoção cresce.</p>
`,

        cards:[{q:'Qual o limite máximo de Bitcoin?',a:'21 milhões de bitcoins — limite programado matematicamente e imutável.'},{q:'O que é dinheiro fiduciário?',a:'Moeda sem lastro físico que vale por decreto governamental — como real, dólar, euro.'},{q:'O Bitcoin é dinheiro?',a:'Sim, funciona como reserva de valor e meio de troca — a adoção como unidade de conta cresce gradualmente.'}]

      {
        id:14, name:'Por que o Bitcoin foi revolucionário', dur:'10min',
        content:`
<h3>A Revolução Que Ninguém Esperava</h3>
<p>Antes do Bitcoin, especialistas em economia e computação concordavam que era tecnicamente impossível criar dinheiro digital sem um intermediário confiável. O problema do gasto duplo parecia insolúvel sem um banco central digital. Satoshi provou que todos estavam errados.</p>
<p>O Bitcoin não foi apenas uma inovação técnica — foi uma ruptura conceitual. Pela primeira vez, foi possível transferir valor pela internet da mesma forma que se transfere um arquivo: diretamente, sem permissão de terceiros, sem fronteiras, instantaneamente.</p>
<h3>Os Quatro Pilares da Revolução</h3>
<ul>
  <li><strong>Solução do problema do gasto duplo</strong> sem autoridade central</li>
  <li><strong>Escassez digital genuína</strong> — pela primeira vez, um arquivo digital não pode ser copiado</li>
  <li><strong>Propriedade soberana</strong> — "not your keys, not your coins"</li>
  <li><strong>Programabilidade</strong> — dinheiro que pode ter regras embutidas no código</li>
</ul>
<blockquote>💡 "Bitcoin é o primeiro exemplo de uma área do direito que chamamos de contratos de execução automática." — Nick Szabo, pioneiro de criptografia</blockquote>
<h3>O Impacto nos 15 Anos Seguintes</h3>
<p>Desde 2009, o Bitcoin inspirou mais de 20.000 outras criptomoedas, criou uma indústria de trilhões de dólares, forçou bancos centrais do mundo todo a pensar em moedas digitais, e demonstrou que descentralização funciona em escala global. É a maior experiência monetária em andamento da história humana.</p>
`,

      {id:15,name:'O que é blockchain',dur:'10min',content:`<h3>A Cadeia de Blocos</h3><p>A <strong>blockchain</strong> é o coração técnico do Bitcoin. É um registro público, distribuído e imutável de todas as transações já realizadas na rede. Imagine um livro-razão gigante que milhares de pessoas ao redor do mundo possuem cópias idênticas — e qualquer tentativa de alterar uma cópia é imediatamente detectada por todas as outras.</p><p>Cada "bloco" contém um conjunto de transações confirmadas, um timestamp (carimbo de data/hora) e um hash criptográfico do bloco anterior. Essa última característica é o que cria a "corrente" — cada bloco está matematicamente ligado ao anterior.</p><h3>Por que a Blockchain é Imutável</h3><ul><li>Alterar qualquer transação muda o hash do bloco</li><li>Isso invalida o hash de todos os blocos seguintes</li><li>O atacante precisaria recalcular toda a cadeia mais rápido que a rede inteira</li><li>Com mais de 500 exahashes/segundo de poder computacional, isso é praticamente impossível</li></ul><blockquote>💡 A blockchain do Bitcoin tem mais de 800.000 blocos, cada um ligado ao anterior formando uma cadeia inquebrável de registros desde janeiro de 2009.</blockquote>`,quiz:{q:'Por que a blockchain é considerada imutável?',opts:['Alterar um bloco exigiria recalcular toda a cadeia, impossível contra a rede inteira','Porque é armazenada em servidores governamentais seguros','Porque usa criptografia de 256 bits','Porque é auditada por bancos centrais'],correct:0},cards:[{q:'O que é blockchain?',a:'Registro público, distribuído e imutável de todas as transações Bitcoin, organizado em blocos encadeados.'},{q:'Por que blockchain é imutável?',a:'Cada bloco contém o hash do anterior — alterar um bloco invalidaria todos os seguintes.'},{q:'Quem mantém a blockchain?',a:'Milhares de nós (computadores) ao redor do mundo, cada um com uma cópia completa.'}]},
      {id:16,name:'Como funcionam as transações',dur:'10min',content:`<h3>Uma Transação Bitcoin Passo a Passo</h3><p>Quando você envia Bitcoin, o processo é mais complexo do que parece. Não existe um "saldo" em si — existem <strong>UTXOs</strong> (Unspent Transaction Outputs), que são como "notas" digitais que você recebeu e ainda não gastou. Cada transação consome UTXOs antigos e cria novos.</p><p>O processo funciona assim: você cria a transação assinando-a com sua chave privada, ela é transmitida para a rede, os mineradores a incluem em um bloco, e depois de 6 confirmações (blocos adicionais), a transação é considerada irreversível.</p><ul><li><strong>Broadcast:</strong> transação é enviada para todos os nós da rede</li><li><strong>Mempool:</strong> fica numa fila de espera aguardando mineração</li><li><strong>Confirmação:</strong> cada novo bloco adiciona uma confirmação</li><li><strong>Finalidade:</strong> após 6 confirmações, é praticamente irreversível</li></ul><blockquote>💡 Uma transação Bitcoin com 6 confirmações tem o mesmo nível de segurança de uma transferência bancária definitiva — mas sem banco no meio.</blockquote>`,quiz:{q:'O que é um UTXO?',opts:['Saída de transação não gasta — como notas digitais que você recebeu e não gastou ainda','Um tipo de carteira Bitcoin','Taxa de transação da rede','Unidade de medição do Bitcoin'],correct:0},cards:[{q:'O que é UTXO?',a:'Unspent Transaction Output — output de transação não gasto, como notas digitais em sua posse.'},{q:'Quantas confirmações tornam uma transação segura?',a:'6 confirmações são o padrão para considerar uma transação praticamente irreversível.'},{q:'O que é mempool?',a:'Fila de transações aguardando ser incluídas em um bloco pelos mineradores.'}]},
      {id:17,name:'Mineração de Bitcoin',dur:'12min',content:`<h3>O que é Mineração</h3><p>Mineração não é "criar" Bitcoin do nada. É o processo pelo qual computadores competem para <strong>validar transações e adicionar blocos à blockchain</strong>. Como recompensa por esse trabalho, o minerador vencedor recebe novos bitcoins — é assim que novos bitcoins entram em circulação.</p><p>Para "minerar" um bloco, o computador precisa resolver um problema matemático específico: encontrar um número (chamado "nonce") que, combinado com os dados do bloco, gere um hash com características específicas. É como tentar adivinhar um número com bilhões de tentativas por segundo.</p><h3>Dificuldade Ajustável</h3><p>A cada 2.016 blocos (aproximadamente 2 semanas), o protocolo Bitcoin ajusta automaticamente a dificuldade de mineração. Se muitos mineradores entraram na rede, fica mais difícil. Se saíram, fica mais fácil. O objetivo é sempre um novo bloco a cada 10 minutos em média.</p><blockquote>💡 A rede Bitcoin usa mais poder computacional do que os 500 maiores supercomputadores do mundo juntos. É o sistema computacional mais seguro já criado.</blockquote>`,quiz:{q:'Qual o principal papel dos mineradores na rede Bitcoin?',opts:['Validar transações e adicionar blocos à blockchain','Criar novos bitcoins arbitrariamente','Controlar o preço do Bitcoin','Gerenciar carteiras dos usuários'],correct:0},cards:[{q:'O que é mineração de Bitcoin?',a:'Processo de validar transações e adicionar blocos à blockchain, em troca de novos bitcoins como recompensa.'},{q:'A cada quanto tempo é ajustada a dificuldade?',a:'A cada 2.016 blocos (~2 semanas), para manter um bloco a cada 10 minutos em média.'},{q:'Qual problema os mineradores resolvem?',a:'Encontrar um nonce que gere um hash válido para o bloco — exige trilhões de tentativas por segundo.'}]},
      {id:18,name:'Prova de Trabalho (Proof of Work)',dur:'10min',content:`<h3>O Mecanismo de Consenso</h3><p>O Proof of Work (PoW) é o mecanismo pelo qual a rede Bitcoin chega a consenso sobre qual versão da blockchain é a verdadeira. Em vez de votos ou autoridades, a rede usa <strong>trabalho computacional real</strong> como prova de legitimidade.</p><p>A lógica é simples: para adicionar um bloco, você precisa gastar eletricidade e poder computacional real. Isso torna o ataque extremamente custoso. Um atacante que quisesse reescrever a blockchain precisaria gastar mais energia que todos os mineradores honestos juntos — e por quanto tempo for necessário.</p><h3>Trabalho Real = Segurança Real</h3><ul><li>Não há como "simular" o trabalho — a eletricidade é gasta de verdade</li><li>O atacante perderia todo o investimento se tentasse fraudar</li><li>A rede é "antifragil": quanto mais ataques enfrenta, mais forte fica</li><li>É a única solução provada para o problema dos Generais Bizantinos</li></ul><blockquote>💡 O PoW do Bitcoin usa aproximadamente 120 TWh por ano — mais que países como Argentina. Mas também protege trilhões de dólares em valor. Cada dólar gasto em energia protege ~$5.000 em Bitcoin.</blockquote>`,quiz:{q:'O que é Proof of Work?',opts:['Mecanismo onde trabalho computacional real (eletricidade) garante a segurança da rede','Sistema de votação entre mineradores','Protocolo de comunicação entre nodes','Algoritmo de compressão de dados'],correct:0},cards:[{q:'O que é Proof of Work?',a:'Mecanismo de consenso onde trabalho computacional real (energia gasta) garante a segurança da blockchain.'},{q:'Por que PoW é seguro?',a:'Atacar a rede exigiria mais energia que todos os mineradores honestos juntos — economicamente inviável.'},{q:'O que são Generais Bizantinos?',a:'Problema clássico de computação: como agentes distribuídos chegam a consenso sem confiar uns nos outros — resolvido pelo Bitcoin.'}]},
      {id:19,name:'Segurança da rede',dur:'10min',content:`<h3>Por que o Bitcoin Nunca Foi Hackeado</h3><p>Em mais de 15 anos de existência, o protocolo Bitcoin nunca foi hackeado. Exchanges foram hackeadas, carteiras foram roubadas, mas a rede em si — a blockchain — permanece intacta. Isso não é coincidência: é design.</p><p>Para realizar um <strong>ataque de 51%</strong> (o único ataque teórico viável), um atacante precisaria controlar mais da metade do poder computacional total da rede. Hoje, isso significaria adquirir e operar milhões de máquinas de mineração custando dezenas de bilhões de dólares — e ainda perderia tudo se o mercado percebesse o ataque.</p><h3>Múltiplas Camadas de Segurança</h3><ul><li><strong>Criptografia SHA-256:</strong> impossível de reverter com tecnologia atual ou próxima</li><li><strong>Distribuição geográfica:</strong> mais de 100 países hospedam nós Bitcoin</li><li><strong>Incentivos alinhados:</strong> mineradores ganham mais sendo honestos do que atacando</li><li><strong>Código aberto:</strong> qualquer programador pode auditar e reportar vulnerabilidades</li></ul><blockquote>💡 A NSA americana e todos os maiores hackers do mundo observam a rede Bitcoin. Em 15 anos, o protocolo nunca foi comprometido. Esse histórico é a maior prova de segurança possível.</blockquote>`,quiz:{q:'O que seria necessário para atacar a rede Bitcoin?',opts:['Controlar mais de 50% do poder computacional total da rede','Descobrir a senha de Satoshi Nakamoto','Hackear os servidores da Coinbase','Comprometer 1% dos nós da rede'],correct:0},cards:[{q:'O que é ataque de 51%?',a:'Controlar mais da metade do poder computacional da rede para tentar reescrever a blockchain.'},{q:'Por que o Bitcoin nunca foi hackeado?',a:'Combinação de criptografia SHA-256, distribuição global, incentivos econômicos alinhados e código aberto.'},{q:'Qual a diferença entre hackear o Bitcoin e hackear uma exchange?',a:'Exchanges são empresas centralizadas vulneráveis — o protocolo Bitcoin em si é matematicamente seguro.'}]},
      {id:20,name:'Carteiras digitais (wallets)',dur:'10min',content:`<h3>O que é uma Carteira Bitcoin</h3><p>Uma carteira Bitcoin não "guarda" bitcoins — guarda as <strong>chaves privadas</strong> que permitem assinar transações. Os bitcoins existem na blockchain; a carteira é a interface que permite controlá-los. É como a diferença entre sua senha bancária (que existe na sua cabeça) e o saldo (que existe no servidor do banco).</p><p>Existem vários tipos de carteiras, cada uma com seu trade-off entre conveniência e segurança:</p><ul><li><strong>Hot wallets:</strong> conectadas à internet (exchanges, apps) — convenientes mas mais vulneráveis</li><li><strong>Cold wallets:</strong> offline (hardware wallets como Ledger, Trezor) — menos convenientes mas muito mais seguras</li><li><strong>Paper wallets:</strong> chave privada impressa em papel — máxima segurança offline, risco de dano físico</li></ul><blockquote>💡 Regra de ouro: pequenas quantias em hot wallet para uso cotidiano; grandes quantias em cold wallet. Nunca deixe valores significativos em exchanges — você não controla as chaves.</blockquote>`,quiz:{q:'O que uma carteira Bitcoin realmente armazena?',opts:['As chaves privadas que permitem assinar transações','Os bitcoins em si','O histórico de transações','O endereço do blockchain'],correct:0},cards:[{q:'O que é uma carteira Bitcoin?',a:'Software ou hardware que armazena chaves privadas — os bitcoins ficam na blockchain, não na carteira.'},{q:'Qual a diferença entre hot e cold wallet?',a:'Hot wallet está conectada à internet (conveniente, menos segura); cold wallet é offline (menos conveniente, mais segura).'},{q:'Por que não deixar Bitcoin em exchanges?',a:'Exchanges controlam as chaves — você não possui realmente os bitcoins se não tiver as chaves.'}]},
      {id:21,name:'Chaves privadas e segurança',dur:'11min',content:`<h3>A Criptografia por Trás do Bitcoin</h3><p>O Bitcoin usa criptografia de curva elíptica (ECDSA) para criar pares de chaves. Cada carteira tem uma <strong>chave privada</strong> (um número de 256 bits, secreto) e uma <strong>chave pública</strong> (derivada matematicamente da privada, pode ser compartilhada). Do par de chaves surge o endereço Bitcoin público.</p><p>A chave privada é tudo. Quem a possui, controla os bitcoins. Ela é um número de 256 bits — o número de combinações possíveis é maior que o número de átomos no universo observável. É matematicamente impossível adivinhar.</p><h3>Seed Phrase: Backup da Sua Fortuna</h3><p>A maioria das carteiras modernas usa uma <strong>seed phrase</strong> (frase-semente): 12 ou 24 palavras em inglês que representam toda a carteira. Com essas palavras, você pode recuperar todos os seus bitcoins em qualquer dispositivo.</p><ul><li>Nunca fotografe sua seed phrase — câmeras sincronizam com a nuvem</li><li>Escreva em papel e guarde em local seguro (ou grave em metal)</li><li>Faça múltiplas cópias em locais diferentes</li><li>Nunca compartilhe com ninguém — nem com suporte técnico</li></ul><blockquote>💡 Existem aproximadamente 3-4 milhões de bitcoins perdidos para sempre — donos que perderam as chaves privadas. Essa perda é permanente. Não existe suporte técnico para recuperar.</blockquote>`,quiz:{q:'O que é uma seed phrase?',opts:['12-24 palavras que representam toda a carteira e permitem recuperação em qualquer dispositivo','Uma senha criada pelo banco para acessar Bitcoin','O endereço público da sua carteira','Código de segurança da exchange'],correct:0},cards:[{q:'O que é chave privada?',a:'Número secreto de 256 bits que dá controle total sobre os bitcoins associados a uma carteira.'},{q:'O que é seed phrase?',a:'12-24 palavras que representam toda a carteira — permite recuperar acesso aos bitcoins em qualquer dispositivo.'},{q:'Quantos bitcoins estão perdidos?',a:'Cerca de 3-4 milhões de bitcoins perdidos permanentemente por donos que perderam as chaves privadas.'}]
      }
    ],
    quizFinal:[
      {q:'O que é mineração de Bitcoin?',opts:['Processo de validar transações e adicionar blocos à blockchain em troca de recompensa em BTC','Processo de criar moedas físicas de Bitcoin','Extração de dados de usuários da rede','Sistema de pagamento de taxas aos bancos'],correct:0},

      {id:22,name:'Escassez digital (21 milhões)',dur:'10min',content:`<h3>O Limite que Mudou Tudo</h3><p>O Bitcoin tem um limite máximo de <strong>21 milhões de unidades</strong> — programado no código e imutável. Hoje, aproximadamente 19,7 milhões já foram minerados. Os últimos serão emitidos por volta de 2140. Depois disso, nunca mais um bitcoin será criado.</p><p>Isso é revolucionário. Nenhuma moeda na história humana teve um limite tão preciso e verificável. O ouro tem escassez relativa, mas novas minas podem ser descobertas. O Bitcoin tem escassez absoluta e matematicamente garantida.</p><h3>Cada Bitcoin é Divisível</h3><p>Um bitcoin pode ser dividido em 100 milhões de partes menores chamadas de <strong>satoshis</strong> (em homenagem a Satoshi Nakamoto). Isso significa que, mesmo que o Bitcoin valha US$ 1 milhão, você pode comprar frações pequeníssimas por centavos.</p><ul><li>1 Bitcoin = 100.000.000 satoshis</li><li>1 satoshi = 0,00000001 BTC</li><li>Total de satoshis existentes: 2.100 trilhões</li></ul><blockquote>💡 Há mais satoshis do que dólares em circulação no mundo. O Bitcoin pode servir toda a economia global mesmo valendo milhões por unidade.</blockquote>`,quiz:{q:'Quantos bitcoins existirão ao todo?',opts:['21 milhões','100 milhões','1 bilhão','Ilimitados'],correct:0},cards:[{q:'Qual o limite máximo de Bitcoin?',a:'21 milhões de bitcoins — limite programado no código, imutável e matematicamente garantido.'},{q:'O que é um satoshi?',a:'A menor fração de Bitcoin — 0,00000001 BTC. 1 bitcoin = 100 milhões de satoshis.'},{q:'Quando o último bitcoin será minerado?',a:'Por volta do ano 2140, quando todos os 21 milhões terão sido emitidos.'}]},
      {id:23,name:'Halving: redução da emissão',dur:'11min',content:`<h3>O Mecanismo Anti-Inflacionário</h3><p>A cada 210.000 blocos minerados (aproximadamente 4 anos), a recompensa dada aos mineradores por bloco é cortada pela metade. Esse evento é chamado de <strong>halving</strong>. É um dos mecanismos mais importantes e elegantes do design do Bitcoin.</p><p>No início (2009), cada bloco gerava 50 novos bitcoins. Após o primeiro halving (2012), passou para 25. Depois 12,5 (2016), 6,25 (2020) e 3,125 (2024). Em 2028, será 1,5625 BTC por bloco.</p><h3>O Efeito no Preço</h3><p>O halving reduz o ritmo de criação de novos bitcoins. Se a demanda permanecer igual e a oferta nova diminuir, o preço tende a subir. A história comprova:</p><ul><li>Halving 2012: BTC passou de ~$12 para ~$1.200 nos 12 meses seguintes</li><li>Halving 2016: de ~$650 para ~$20.000 nos 18 meses seguintes</li><li>Halving 2020: de ~$9.000 para ~$69.000 nos 18 meses seguintes</li></ul><blockquote>💡 O halving é o único evento monetário na história em que você sabe com anos de antecedência exatamente quando e quanto a oferta de dinheiro vai diminuir.</blockquote>`,quiz:{q:'O que é halving do Bitcoin?',opts:['Corte pela metade na recompensa por bloco, ocorrendo a cada ~4 anos','Divisão do Bitcoin em dois ativos separados','Redução das taxas de transação da rede','Atualização do código do Bitcoin'],correct:0},cards:[{q:'O que é halving?',a:'Evento a cada ~4 anos que corta pela metade a recompensa dos mineradores, reduzindo a emissão de novos BTC.'},{q:'Quando ocorreu o halving mais recente?',a:'Em abril de 2024, reduzindo a recompensa de 6,25 para 3,125 BTC por bloco.'},{q:'Qual o efeito histórico do halving no preço?',a:'Historicamente, cada halving foi seguido de forte valorização no Bitcoin nos 12-18 meses seguintes.'}]},
      {id:24,name:'Oferta vs demanda',dur:'10min',content:`<h3>As Forças que Determinam o Preço</h3><p>O preço do Bitcoin é determinado pela lei clássica da oferta e demanda — mas com uma característica única: a oferta é perfeitamente previsível e imutável. Todo mundo sabe exatamente quantos bitcoins existem e quantos existirão em qualquer ponto futuro.</p><p>Isso é radicalmente diferente de ações, imóveis ou ouro, onde a oferta pode mudar por decisões corporativas, descobertas ou mudanças regulatórias. No Bitcoin, apenas a demanda é variável.</p><h3>Os Fatores de Demanda</h3><ul><li><strong>Adoção institucional:</strong> empresas como MicroStrategy, Tesla e BlackRock comprando BTC</li><li><strong>Adoção por países:</strong> El Salvador adotou como moeda legal em 2021</li><li><strong>ETFs de Bitcoin:</strong> aprovados nos EUA em 2024, abrindo para investidores tradicionais</li><li><strong>Hedge contra inflação:</strong> demanda cresce em países com moedas enfraquecidas</li></ul><blockquote>💡 Em janeiro de 2024, os ETFs de Bitcoin spot foram aprovados nos EUA. No primeiro mês, captaram mais de US$ 10 bilhões — um recorde para qualquer ETF na história americana.</blockquote>`,quiz:{q:'O que é único na oferta do Bitcoin em comparação a outros ativos?',opts:['É perfeitamente previsível e imutável — todo mundo sabe exatamente quantos existirão','É controlada por grandes investidores','Pode ser aumentada por votação da comunidade','É regulada pelo FMI'],correct:0},cards:[{q:'O que determina o preço do Bitcoin?',a:'Oferta (fixa e previsível) vs demanda (variável por adoção, instituições, geopolítica).'},{q:'Quando os ETFs de Bitcoin foram aprovados nos EUA?',a:'Em janeiro de 2024, captando mais de US$ 10 bilhões no primeiro mês — recorde histórico.'},{q:'O que impulsiona a demanda por Bitcoin?',a:'Adoção institucional, países adotando como moeda, ETFs, e uso como hedge contra inflação.'}]},
      {id:25,name:'Bitcoin como reserva de valor',dur:'11min',content:`<h3>O Ouro Digital</h3><p>Uma das teses mais poderosas sobre o Bitcoin é a de que ele se tornará a principal reserva de valor da era digital — o "ouro digital". Para ser reserva de valor, um ativo precisa ser escasso, durável, divisível, portátil e verificável. O Bitcoin supera o ouro em todas essas dimensões.</p><p>MicroStrategy, a empresa de análise de dados, comprou mais de 190.000 bitcoins como reserva corporativa — mais que muitos países têm de ouro. O CEO Michael Saylor transformou o balanço da empresa em uma tese de reserva de valor em Bitcoin.</p><h3>A Comparação com o Ouro</h3><ul><li><strong>Escassez:</strong> Bitcoin mais escasso e verificável; ouro pode ter novas minas descobertas</li><li><strong>Divisibilidade:</strong> 8 casas decimais vs ouro difícil de dividir fisicamente</li><li><strong>Portabilidade:</strong> US$ 1 bilhão em Bitcoin cabe em um pendrive; ouro pesa toneladas</li><li><strong>Verificabilidade:</strong> qualquer computador verifica BTC; ouro precisa de laboratório</li><li><strong>Custódia:</strong> Bitcoin auto-custodiado; ouro precisa de cofre físico</li></ul><blockquote>💡 O mercado de ouro como reserva de valor é de aproximadamente US$ 12 trilhões. Se Bitcoin capturar apenas 10% disso, cada bitcoin valeria mais de US$ 60.000 só por esse motivo.</blockquote>`,quiz:{q:'Por que Bitcoin é chamado de "ouro digital"?',opts:['Tem características de reserva de valor superiores ao ouro: mais escasso, divisível, portátil e verificável','Tem o mesmo preço que o ouro','É feito de material similar ao ouro','Foi criado pelos mesmos inventores do ouro moderno'],correct:0},cards:[{q:'O que é reserva de valor?',a:'Ativo que mantém ou aumenta seu poder de compra ao longo do tempo — como ouro, Bitcoin ou imóveis.'},{q:'Em que Bitcoin supera o ouro?',a:'Divisibilidade, portabilidade, verificabilidade e custódia — além de escassez matematicamente garantida.'},{q:'Quem é Michael Saylor?',a:'CEO da MicroStrategy, que comprou mais de 190.000 bitcoins como reserva corporativa, popularizando a tese do ouro digital.'}]},
      {id:26,name:'Comparação com ouro',dur:'10min',content:`<h3>Uma Batalha de Ativos</h3><p>Durante séculos, o ouro foi o ativo de reserva de valor por excelência. O Bitcoin chegou desafiando esse status — e os dados sugerem que a transição está em curso. Vamos comparar objetivamente:</p><p>O ouro tem 5.000 anos de história e aceitação universal. É físico, tangível, impossível de hackear. Mas tem custos enormes de custódia, é difícil de transportar internacionalmente, e não pode ser verificado sem equipamento especializado.</p><h3>Capitalização de Mercado Comparada</h3><ul><li>Ouro: ~US$ 12-15 trilhões em capitalização total</li><li>Bitcoin: ~US$ 1-2 trilhões em capitalização total</li><li>Se Bitcoin atingir 50% da capitalização do ouro: ~US$ 300.000/BTC</li><li>Se Bitcoin atingir 100%: ~US$ 600.000/BTC</li></ul><blockquote>💡 Na última década, o Bitcoin valorizou mais de 10.000.000% enquanto o ouro valorizou ~150%. Isso não significa que bitcoins sempre vencerá o ouro, mas o momentum é inegável.</blockquote><p>A discussão não é "ouro vs Bitcoin" — muitos analistas recomendam ter ambos. Mas é impossível ignorar que o Bitcoin oferece os mesmos benefícios do ouro com vantagens tecnológicas significativas.</p>`,quiz:{q:'Qual a principal vantagem do Bitcoin sobre o ouro?',opts:['Portabilidade, divisibilidade e verificabilidade superiores, com escassez matematicamente garantida','Preço mais baixo e acessível','Mais antigo e com maior histórico','Regulamentado por mais governos'],correct:0},cards:[{q:'Qual a capitalização do ouro vs Bitcoin?',a:'Ouro: ~US$ 12-15 tri; Bitcoin: ~US$ 1-2 tri — Bitcoin poderia valorizar muito ao capturar parte do mercado do ouro.'},{q:'Qual foi a valorização do Bitcoin na última década?',a:'Mais de 10.000.000% — comparado a ~150% do ouro no mesmo período.'},{q:'Devo escolher ouro ou Bitcoin?',a:'Muitos analistas recomendam ter ambos — são reservas complementares com características diferentes.'}]},
      {id:27,name:'Volatilidade: risco ou oportunidade?',dur:'10min',content:`<h3>O Preço da Escassez</h3><p>O Bitcoin é famoso por sua volatilidade. Em 2017, subiu de US$ 1.000 para US$ 20.000 — depois caiu para US$ 3.000 em 2018. Em 2021, chegou a US$ 69.000 — depois voltou a US$ 16.000 em 2022. Essas oscilações assustam muitos investidores, mas escondem uma história mais profunda.</p><p>A volatilidade existe porque o Bitcoin ainda está em processo de descoberta de preço. É uma tecnologia de 15 anos num mercado global de trilhões. Cada novo ciclo, a volatilidade diminui proporcionalmente — o Bitcoin de 2024 oscila menos percentualmente que o de 2012.</p><h3>Volatilidade como Oportunidade</h3><ul><li>Mercado 24/7, sem circuit breakers ou limite de alta/baixa diária</li><li>Cada correção severa (50%+) foi oportunidade de compra histórica</li><li>DCA (Dollar-Cost Averaging) neutraliza o impacto da volatilidade</li><li>Horizontes longos transformam volatilidade em retorno</li></ul><blockquote>💡 Todo investidor que comprou Bitcoin e segurou por qualquer período de 4 anos está no lucro. A volatilidade de curto prazo desaparece na tendência de longo prazo.</blockquote>`,quiz:{q:'Por que o Bitcoin é volátil?',opts:['Ainda está em processo de descoberta de preço em um mercado em desenvolvimento','Porque é manipulado por governos','Porque não tem valor intrínseco','Porque poucas pessoas o usam'],correct:0},cards:[{q:'Por que o Bitcoin é volátil?',a:'Por ser uma tecnologia em desenvolvimento com mercado 24/7 — ainda está descobrindo seu preço justo.'},{q:'O que é DCA?',a:'Dollar-Cost Averaging — comprar valores fixos regularmente para neutralizar o impacto da volatilidade.'},{q:'Todo investidor de Bitcoin 4 anos+ está no lucro?',a:'Historicamente sim — nenhum período de 4 anos resultou em perda para quem segurou sem vender.'}]},
      {id:28,name:'O papel do Bitcoin no futuro econômico',dur:'11min',content:`<h3>Bitcoin na Economia Global</h3><p>Bitcoin já não é um experimento marginal. É o ativo de maior retorno da última década, tem capitalização de mercado maior que a maioria dos bancos globais, é aceito por empresas como Microsoft, Tesla e AMC, e foi adotado como moeda legal por El Salvador.</p><p>A questão não é mais "Bitcoin vai sobreviver?" — é "até onde vai chegar?". Analistas sérios do Deutsche Bank, JPMorgan e Goldman Sachs publicaram relatórios sobre Bitcoin como classe de ativo estabelecida.</p><h3>Três Cenários para o Futuro</h3><ul><li><strong>Bear case:</strong> Bitcoin se consolida como reserva de valor digital, valendo US$ 100.000-500.000</li><li><strong>Base case:</strong> Captura parte do mercado de ouro e chegam reservas soberanas, valendo US$ 500.000-2 milhões</li><li><strong>Bull case:</strong> Torna-se padrão monetário global, valendo US$ 5-10 milhões ou mais</li></ul><blockquote>💡 "Em algum momento, todo portfólio sério terá alguma alocação em Bitcoin — não porque é especulação, mas porque é seguro não ter." — Fidelity Investments</blockquote><p>Independente do cenário, uma coisa é certa: o Bitcoin redefiniu o que dinheiro pode ser, e essa inovação não pode ser desfeita.</p>`,quiz:{q:'Bitcoin é hoje considerado:',opts:['Classe de ativo estabelecida com análises de grandes bancos e capitalizações bilionárias','Apenas um experimento de nicho','Moeda ilegal na maioria dos países','Tecnologia obsoleta superada por outras criptos'],correct:0},cards:[{q:'Bitcoin foi adotado como moeda legal por qual país?',a:'El Salvador, em setembro de 2021 — primeiro país do mundo a fazer isso.'},{q:'O que analistas do JPMorgan e Goldman dizem do Bitcoin?',a:'Publicaram relatórios reconhecendo Bitcoin como classe de ativo estabelecida e reserva de valor.'},{q:'Qual o bear case para o Bitcoin?',a:'Consolidar-se como reserva de valor digital valendo US$ 100.000-500.000 por unidade.'}]
      }

  {
    id:5, name:'Módulo 5 — Como Investir em Bitcoin', free:false,
    topics:[
      {id:29,name:'Como comprar Bitcoin (passo a passo)',dur:'12min',content:`<h3>Seu Primeiro Bitcoin em 5 Passos</h3><p>Comprar Bitcoin nunca foi tão simples. Em 2024, o processo é comparável a abrir uma conta em um aplicativo de banco digital. Veja o processo completo:</p><ol><li><strong>Escolha uma exchange:</strong> Mercado Bitcoin, Binance, Coinbase ou Foxbit para brasileiros</li><li><strong>Crie sua conta:</strong> e-mail, CPF/documento, selfie para KYC (verificação de identidade)</li><li><strong>Aguarde aprovação:</strong> geralmente 24-48 horas</li><li><strong>Deposite reais:</strong> via PIX, TED ou boleto</li><li><strong>Compre Bitcoin:</strong> no app, selecione BTC e informe o valor desejado</li></ol><h3>Dicas Práticas para o Primeiro Compra</h3><ul><li>Comece com um valor pequeno para aprender o processo</li><li>Confirme o endereço duas vezes em qualquer transação</li><li>Ative autenticação em dois fatores (2FA) imediatamente</li><li>Nunca compartilhe suas senhas ou seed phrase</li></ul><blockquote>💡 Você pode comprar frações de Bitcoin. Com R$ 50, você compra satoshis. Não é necessário comprar 1 BTC inteiro.</blockquote>`,quiz:{q:'Qual é o primeiro passo para comprar Bitcoin?',opts:['Escolher uma exchange confiável e criar uma conta verificada','Comprar uma hardware wallet','Estudar o código do Bitcoin','Contactar um corretor financeiro'],correct:0},cards:[{q:'O que é KYC?',a:'Know Your Customer — processo de verificação de identidade obrigatório nas exchanges reguladas.'},{q:'Posso comprar fração de Bitcoin?',a:'Sim — você pode comprar qualquer quantidade, mesmo R$ 20, comprando satoshis (frações de BTC).'},{q:'O que é 2FA?',a:'Autenticação em dois fatores — camada extra de segurança além da senha, essencial em exchanges.'}]},
      {id:30,name:'Principais corretoras (exchanges)',dur:'10min',content:`<h3>Exchanges no Brasil e no Mundo</h3><p>Uma <strong>exchange</strong> é uma plataforma que permite comprar, vender e guardar criptomoedas. É o equivalente a uma corretora de valores para cripto. Cada uma tem suas vantagens, taxas e nível de segurança.</p><p><strong>Exchanges brasileiras:</strong></p><ul><li><strong>Mercado Bitcoin:</strong> maior do Brasil, regulada pelo Banco Central, interface em português</li><li><strong>Foxbit:</strong> focada em Bitcoin, boa liquidez, anos de mercado</li><li><strong>NovaDAX:</strong> completa, aceita PIX, boa para iniciantes</li></ul><p><strong>Exchanges internacionais:</strong></p><ul><li><strong>Binance:</strong> maior do mundo por volume, mais opções mas mais complexa</li><li><strong>Coinbase:</strong> mais regulada, ideal para iniciantes americanos</li><li><strong>Kraken:</strong> boa reputação de segurança, múltiplas moedas</li></ul><blockquote>💡 Para brasileiros iniciantes: Mercado Bitcoin é o mais indicado. Interface em português, regulada, saque em reais via PIX, suporte local.</blockquote>`,quiz:{q:'Qual exchange é mais indicada para iniciantes brasileiros?',opts:['Mercado Bitcoin — interface em português, regulada no Brasil, PIX','Binance — por ser a maior do mundo','Coinbase — por ser americana','Kraken — por ter mais criptomoedas'],correct:0},cards:[{q:'O que é uma exchange?',a:'Plataforma para comprar, vender e guardar criptomoedas — o equivalente a uma corretora de valores.'},{q:'Qual exchange brasileira é mais recomendada para iniciantes?',a:'Mercado Bitcoin — regulada pelo BC, interface em português, saque via PIX.'},{q:'Por que exchanges internacionais podem ser mais complexas?',a:'Interface em inglês, mais opções avançadas, processo KYC diferente e saque pode ser mais burocrático.'}]},
      {id:31,name:'Custódia: deixar na corretora ou carteira?',dur:'10min',content:`<h3>A Decisão Mais Importante</h3><p>Após comprar Bitcoin, a decisão de onde guardar é crucial. A regra de ouro da comunidade Bitcoin é: <strong>"Not your keys, not your coins"</strong>. Se você não controla a chave privada, você não realmente possui os bitcoins — a exchange possui, e você tem apenas uma promessa.</p><p>A história está cheia de exchanges que faliram ou foram hackeadas levando os fundos dos usuários: Mt. Gox (2014, US$ 450 milhões), Bitfinex (2016), QuadrigaCX (2019), FTX (2022, US$ 8 bilhões). Em todos os casos, quem tinha os bitcoins em carteira própria ficou protegido.</p><h3>Quando Usar Cada Opção</h3><ul><li><strong>Exchange:</strong> para valores pequenos de uso frequente (trading, compras regulares)</li><li><strong>Software wallet:</strong> para valores médios que você acessa mensalmente (Exodus, Electrum)</li><li><strong>Hardware wallet:</strong> para valores maiores de longo prazo (Ledger, Trezor)</li></ul><blockquote>💡 Regra prática: nunca deixe em exchange mais do que você estaria confortável em perder. Para qualquer quantia significativa, use hardware wallet.</blockquote>`,quiz:{q:'O que significa "not your keys, not your coins"?',opts:['Se você não controla a chave privada, não possui realmente os bitcoins','Que você deve compartilhar suas chaves','Que exchanges são mais seguras que carteiras','Que Bitcoin não tem valor sem chave bancária'],correct:0},cards:[{q:'Por que não deixar Bitcoin em exchange?',a:'Exchanges podem falir ou ser hackeadas — sem controlar as chaves privadas, você perde tudo.'},{q:'O que aconteceu com a FTX?',a:'Faliu em 2022 com US$ 8 bilhões em fundos de clientes — quem tinha em carteira própria ficou protegido.'},{q:'Qual a regra prática para custódia?',a:'Pequenas quantias em exchange para uso; valores significativos em hardware wallet com você controlando as chaves.'}]},
      {id:32,name:'Estratégias de investimento (hold, trade)',dur:'11min',content:`<h3>As Duas Grandes Abordagens</h3><p>Existem fundamentalmente duas abordagens para investir em Bitcoin: <strong>HOLD</strong> (comprar e segurar) e <strong>Trading</strong> (comprar e vender ativamente). Cada uma tem seu perfil de risco, dedicação necessária e resultados históricos.</p><p><strong>HODL (Hold On for Dear Life):</strong> comprar Bitcoin e não vender independentemente das oscilações de mercado. É a estratégia mais simples e, historicamente, a mais lucrativa para a maioria das pessoas. Requer paciência mas não habilidade técnica.</p><p><strong>Trading:</strong> comprar e vender tentando capturar movimentos de preço. Requer conhecimento técnico profundo, disciplina emocional e tempo dedicado. Estudos mostram que mais de 80% dos traders perdem para o HODL de longo prazo.</p><h3>DCA: A Estratégia dos Inteligentes</h3><p>O Dollar-Cost Averaging (DCA) consiste em comprar um valor fixo em intervalos regulares, independentemente do preço. Elimina o problema de "timing" e reduz o impacto da volatilidade. É a estratégia mais recomendada para iniciantes.</p><blockquote>💡 Quem comprou R$ 200 em Bitcoin todo mês por 5 anos, independentemente do preço, obteve retornos superiores a qualquer trader ativo em 85% dos casos. Simplicidade vence sofisticação no longo prazo.</blockquote>`,quiz:{q:'O que é HODL?',opts:['Estratégia de comprar Bitcoin e segurar por longo prazo sem vender nas oscilações','Técnica de trading de alta frequência','Método de mineração doméstica','Sistema de custódia bancária para cripto'],correct:0},cards:[{q:'O que é HODL?',a:'Estratégia de comprar Bitcoin e manter por longo prazo, ignorando volatilidade — historicamente muito lucrativa.'},{q:'O que é DCA?',a:'Dollar-Cost Averaging — comprar valor fixo regularmente independente do preço, reduzindo impacto da volatilidade.'},{q:'Trading supera HODL?',a:'Para a maioria das pessoas, não — mais de 80% dos traders perdem para o HODL de longo prazo.'}]},
      {id:33,name:'Gestão de risco',dur:'10min',content:`<h3>Regras de Ouro para Não Perder Tudo</h3><p>Gestão de risco é o que separa investidores bem-sucedidos dos que perdem dinheiro. No Bitcoin, com sua volatilidade, isso é ainda mais crítico. A primeira regra: nunca invista o que você não pode perder 100%.</p><p>Isso não é pessimismo — é realismo financeiro. O Bitcoin já caiu 80%+ múltiplas vezes. Se você investiu dinheiro que precisaria em 6 meses para pagar contas, um dip de 50% pode forçá-lo a vender no pior momento possível.</p><h3>Princípios de Gestão de Risco</h3><ul><li><strong>Alocação:</strong> máximo 5-20% do portfólio em cripto para a maioria das pessoas</li><li><strong>Horizonte:</strong> invista apenas com horizonte mínimo de 4 anos</li><li><strong>Diversificação:</strong> Bitcoin representa 50-70% de qualquer portfólio cripto</li><li><strong>Stop loss mental:</strong> decida com antecedência quanto você aceita perder</li><li><strong>DCA:</strong> evita entrar tudo de uma vez no topo do mercado</li></ul><blockquote>💡 A pergunta não é "vou ganhar dinheiro?" mas "quanto posso perder e continuar dormindo?". A resposta a essa pergunta determina quanto você deve investir.</blockquote>`,quiz:{q:'Qual o principal princípio de gestão de risco no Bitcoin?',opts:['Nunca investir mais do que pode perder 100% e ter horizonte de pelo menos 4 anos','Investir o máximo possível para maximizar ganhos','Comprar apenas no topo para garantir liquidez','Manter tudo em exchange para facilitar a venda'],correct:0},cards:[{q:'Qual alocação em cripto é razoável?',a:'5-20% do portfólio para a maioria das pessoas — suficiente para impacto relevante sem risco excessivo.'},{q:'Por que ter horizonte de 4+ anos?',a:'Todos os períodos de 4 anos resultaram em lucro historicamente — o tempo neutraliza a volatilidade.'},{q:'O que é o risco de liquidez forçada?',a:'Ser obrigado a vender Bitcoin no pior momento por precisar do dinheiro — evitado investindo só o que pode imobilizar.'}]},
      {id:34,name:'Erros comuns de iniciantes',dur:'10min',content:`<h3>Os 7 Erros Mais Caros</h3><p>A maioria das pessoas que perdeu dinheiro com Bitcoin não foi vítima de hacks ou fraudes — foi vítima de seus próprios erros comportamentais. Conhecer esses erros antes de cometer é literalmente fazer dinheiro.</p><ol><li><strong>FOMO (Fear of Missing Out):</strong> comprar no topo porque "todo mundo está ganhando"</li><li><strong>Pânico na queda:</strong> vender quando o preço cai 40% e comprar de volta quando sobe</li><li><strong>Deixar na exchange:</strong> perder tudo em falência como FTX</li><li><strong>Ignorar a seed phrase:</strong> perder acesso a carteira e bitcoins para sempre</li><li><strong>Cair em golpes:</strong> "me mande 1 BTC e devolverei 2" — sempre é golpe</li><li><strong>Over-trading:</strong> pagar taxas e imposto de renda tentando ganhar mais</li><li><strong>All-in alavancado:</strong> usar dinheiro emprestado ou alavancagem para multiplicar</li></ol><blockquote>💡 O maior inimigo do investidor de Bitcoin é o próprio investidor. O Bitcoin sobe com o tempo; o problema é que poucas pessoas conseguem segurar através das quedas.</blockquote>`,quiz:{q:'Qual é o erro mais comum de iniciantes em Bitcoin?',opts:['Comprar no topo por FOMO e vender no fundo por pânico','Comprar Bitcoin demais','Usar hardware wallet','Fazer DCA mensal'],correct:0},cards:[{q:'O que é FOMO?',a:'Fear of Missing Out — medo de perder oportunidade, que leva a comprar no topo quando todos estão eufóricos.'},{q:'Por que pânico na queda é perigoso?',a:'Vender no fundo realiza a perda — o Bitcoin histórico sempre se recuperou, mas o vendedor que entrou no pânico perdeu.'},{q:'Como evitar os erros de iniciante?',a:'Educação prévia, DCA sem timing, custódia própria, ignorar ruído de curto prazo e horizonte de 4+ anos.'}]},
      {id:35,name:'Como montar uma estratégia segura',dur:'11min',content:`<h3>Sua Estratégia Bitcoin em 6 Passos</h3><p>Montar uma estratégia de Bitcoin não precisa ser complexo. Na verdade, as estratégias mais simples são historicamente as mais bem-sucedidas. Aqui está um framework prático:</p><ol><li><strong>Defina quanto você pode imobilizar:</strong> dinheiro que não precisará por 4+ anos</li><li><strong>Escolha sua alocação:</strong> comece com 5% do patrimônio ou uma quantia pequena fixa</li><li><strong>Configure o DCA:</strong> valor fixo mensal na mesma data, automatizado se possível</li><li><strong>Escolha a custódia:</strong> hardware wallet para valores acima de R$ 5.000</li><li><strong>Documente tudo:</strong> seed phrase em lugar seguro, arquivo de anotações das compras</li><li><strong>Defina quando revisar:</strong> anualmente, não mensalmente — menos é mais</li></ol><h3>O Portfólio do Investidor Inteligente</h3><p>Uma alocação simples e eficaz: 80% em ativos tradicionais (fundos, ações, imóveis) + 10-15% em Bitcoin como reserva de valor + 5% em outras criptos se quiser. Rebalancear anualmente.</p><blockquote>💡 A melhor estratégia é aquela que você consegue seguir. Uma estratégia mediocre executada consistentemente supera uma estratégia perfeita abandonada na primeira queda.</blockquote>`,quiz:{q:'Qual é a estratégia mais simples e eficaz para investir em Bitcoin?',opts:['DCA mensal com valor fixo, custódia própria e horizonte de 4+ anos','Trading diário com análise técnica','Comprar tudo de uma vez no menor preço possível','Esperar o Bitcoin cair 90% para comprar'],correct:0},cards:[{q:'Qual o portfólio recomendado com Bitcoin?',a:'80% ativos tradicionais + 10-15% Bitcoin + 5% outras criptos — rebalanceado anualmente.'},{q:'Por que definir a estratégia antes de comprar?',a:'Evita decisões emocionais na volatilidade — quem planeja com a cabeça fria age melhor na turbulência.'},{q:'Com que frequência revisar a estratégia?',a:'Anualmente — revisões mensais levam a over-trading e decisões emocionais prejudiciais.'}]
      }
    ],

  {

    topics:[
      {id:36,name:'Bitcoin como liberdade financeira',dur:'10min',content:`<h3>Dinheiro Sem Fronteiras</h3><p>Pela primeira vez na história, qualquer pessoa com smartphone e internet pode enviar qualquer quantia de dinheiro para qualquer lugar do mundo, sem permissão de banco, sem limite e com taxas mínimas. Para os 1,7 bilhão de não-bancarizados do mundo, isso é uma revolução de acessibilidade.</p><p>No Afeganistão, mulheres proibidas de trabalhar criaram negócios online pagos em Bitcoin. Em Cuba, pessoas burlam o embargo americano com Bitcoin. Na Argentina com 100%+ de inflação, pessoas preservam patrimônio em BTC. O Bitcoin não pergunta sua religião, gênero, nacionalidade ou histórico de crédito.</p><h3>Soberania Individual</h3><ul><li>Suas transações não podem ser bloqueadas por banco</li><li>Seu patrimônio não pode ser confiscado sem suas chaves</li><li>Você pode cruzar fronteiras com bilhões na memória (seed phrase)</li><li>Nenhum governo pode congelar sua conta Bitcoin</li></ul><blockquote>💡 "Bitcoin é o único dinheiro que um refugiado pode carregar na cabeça cruzando fronteiras. Memorize 12 palavras e você carrega sua fortuna por qualquer controle alfandegário."</blockquote>`,quiz:{q:'Como o Bitcoin ajuda pessoas em países com crise econômica?',opts:['Permite preservar patrimônio em ativo que governos locais não podem desvalorizar ou confiscar','Fornece empréstimos com juros baixos','Substitui completamente o dinheiro local','Automaticamente investe em ouro'],correct:0},cards:[{q:'Por que Bitcoin é liberdade financeira?',a:'Permite enviar dinheiro globalmente sem permissão bancária, imune a censura e confisco governamental.'},{q:'Como Bitcoin ajuda refugiados?',a:'A seed phrase pode ser memorizada — carrega toda a fortuna na memória cruzando qualquer fronteira.'},{q:'Quantas pessoas não-bancarizadas existem?',a:'1,7 bilhão — todas com smartphone podem acessar Bitcoin sem precisar de banco ou agência.'}]},
      {id:37,name:'Uso em países com crise econômica',dur:'11min',content:`<h3>Bitcoin na América Latina</h3><p>A América Latina é o laboratório real do Bitcoin como ferramenta econômica. Argentina, Venezuela, Brasil e outros países vivenciaram inflação severa que destruiu o patrimônio de gerações. Nesses países, o Bitcoin não é especulação — é sobrevivência financeira.</p><p>Na Argentina, com inflação acima de 200% em 2023, a adoção de Bitcoin e stablecoins explodiu. Pessoas comuns correm para comprar dólares digitais ou Bitcoin logo que recebem salário, antes que o peso perca valor.</p><h3>Casos Reais de Uso</h3><ul><li><strong>Argentina:</strong> Bitcoin como proteção contra inflação de 200%+</li><li><strong>Venezuela:</strong> Bitcoin para receber remessas do exterior sem taxas abusivas</li><li><strong>El Salvador:</strong> Bitcoin como moeda legal, carteira Chivo para todos os cidadãos</li><li><strong>Nigéria:</strong> maior adoção per capita do mundo em 2021, populações jovens usando para comércio</li></ul><blockquote>💡 As remessas para países em desenvolvimento pagam em média 6-8% de taxa por transação. Com Bitcoin, a taxa pode ser menor que 0,1% — o equivalente a uma semana de salário economizado por família por ano.</blockquote>`,quiz:{q:'Por que a adoção de Bitcoin é alta em países com inflação severa como Argentina?',opts:['Bitcoin preserva valor enquanto a moeda local perde poder de compra rapidamente','Bitcoin é a moeda oficial desses países','Esses países têm maior renda per capita','Os governos incentivam o uso de Bitcoin'],correct:0},cards:[{q:'Por que Argentina adota muito Bitcoin?',a:'Inflação de 200%+ destrói o peso — Bitcoin preserva valor que a moeda local não consegue.'},{q:'Qual país adotou Bitcoin como moeda legal?',a:'El Salvador, em setembro de 2021, tornando o Bitcoin moeda legal junto com o dólar.'},{q:'Qual a economia nas remessas com Bitcoin?',a:'Taxas caem de 6-8% para menos de 0,1% — economizando semanas de salário para famílias por ano.'}]},
      {id:38,name:'Governos vs Bitcoin',dur:'10min',content:`<h3>A Relação Tensa e Inevitável</h3><p>Governos ao redor do mundo têm uma relação complexa com o Bitcoin. Poucos o amam (El Salvador, Portugal), muitos o toleram (EUA, Europa), alguns o restringem fortemente (China, Índia em certas épocas) e alguns tentaram bani-lo completamente. A China baniu Bitcoin pelo menos 6 vezes — Bitcoin continua funcionando.</p><p>O problema para governos é triplo: Bitcoin dificulta o controle de capital, pode reduzir a demanda pela moeda local, e oferece uma saída de impostos para cidadãos que a utilizam. Todas essas são ameaças diretas ao poder monetário estatal.</p><h3>Por que Governos Não Podem Banir Totalmente</h3><ul><li>Bitcoin é um protocolo de internet — banir é como banir o email</li><li>VPNs e redes P2P permitem acesso mesmo em países restritivos</li><li>Mining pode acontecer em qualquer lugar com eletricidade</li><li>Competição entre países: qualquer um que bane perde talentos e capital para quem aceita</li></ul><blockquote>💡 Quando a China baniu mineração em 2021, o hashrate caiu 50% — mas em 6 meses tinha voltado ao normal, com mineradores se mudando para EUA, Cazaquistão e outros países.</blockquote>`,quiz:{q:'Por que governos não conseguem banir completamente o Bitcoin?',opts:['É um protocolo de internet distribuído — banir exigiria desligar toda a internet no país','Porque é legalmente protegido pela ONU','Porque bancos centrais o controlam','Porque só existe nos EUA onde não pode ser banido'],correct:0},cards:[{q:'Por que China fracassou em banir Bitcoin?',a:'Mineradores se mudaram para outros países — em 6 meses o hashrate voltou ao normal após o ban de 2021.'},{q:'Por que governos querem controlar Bitcoin?',a:'Dificulta controle de capital, pode reduzir demanda pela moeda local e oferece saída de impostos.'},{q:'Qual país tem a postura mais favorável ao Bitcoin?',a:'El Salvador (moeda legal), Portugal (isenção fiscal) e EUA (ETFs aprovados) são os mais amigáveis.'}]},
      {id:39,name:'Regulação e leis',dur:'10min',content:`<h3>O Cenário Regulatório Global</h3><p>A regulação do Bitcoin varia enormemente por país. Nos EUA, a SEC classifica bitcoin como commodity (não security), o que abriu espaço para os ETFs. Na Europa, o MiCA (Markets in Crypto Assets) criou um framework regulatório unificado. No Brasil, a Lei 14.478/2022 regulamentou o mercado cripto.</p><p>No geral, a tendência global é de maior regulação — não banimento. Governos perceberam que banir não funciona e optaram por tributar e supervisionar. Para investidores, mais regulação significa mais proteção e mais capital institucional entrando no mercado.</p><h3>Impostos no Brasil</h3><ul><li>Ganhos acima de R$ 35.000/mês em criptomoedas são tributáveis</li><li>Alíquotas de 15% a 22,5% conforme o ganho</li><li>Obrigação de declarar holdings acima de R$ 5.000 no IR</li><li>Receita Federal monitora exchanges e pode cruzar dados</li></ul><blockquote>💡 "Regulação é uma faca de dois gumes: limita liberdade mas atrai capital institucional e protege investidores. O mercado sempre cresce após marcos regulatórios claros."</blockquote>`,quiz:{q:'Como o Bitcoin é tratado fiscalmente no Brasil?',opts:['Ganhos acima de R$ 35.000/mês são tributáveis com alíquotas de 15-22,5%','Completamente isento de impostos','Tributado como conta bancária comum','Não é necessário declarar'],correct:0},cards:[{q:'O que é MiCA?',a:'Markets in Crypto Assets — framework regulatório unificado para criptoativos na União Europeia.'},{q:'Quando Bitcoin precisa ser declarado no IR?',a:'Holdings acima de R$ 5.000 devem ser declarados; ganhos acima de R$ 35.000/mês são tributados.'},{q:'Regulação é boa ou ruim para o Bitcoin?',a:'No geral boa — atrai capital institucional, protege investidores e legitima o mercado perante o mundo.'}]},
      {id:40,name:'Empresas que adotaram Bitcoin',dur:'10min',content:`<h3>O Mundo Corporativo Adota Bitcoin</h3><p>A adoção corporativa do Bitcoin acelerou dramaticamente após 2020. Empresas que antes ignoravam agora integram Bitcoin em suas estratégias financeiras, desde grandes tesourarias corporativas até aceitação como pagamento.</p><p><strong>Empresas com Bitcoin em tesouraria:</strong></p><ul><li><strong>MicroStrategy:</strong> 190.000+ BTC — maior holder corporativo do mundo</li><li><strong>Tesla:</strong> comprou US$ 1,5 bilhão em 2021</li><li><strong>Square/Block:</strong> Jack Dorsey é um dos maiores defensores corporativos</li><li><strong>Marathon Digital Holdings:</strong> empresa de mineração pública com BTC em tesouraria</li></ul><p><strong>Empresas aceitando Bitcoin como pagamento:</strong> Microsoft, Overstock, AT&T, AMC, Whole Foods, e centenas de milhares de pequenos negócios via Lightning Network.</p><blockquote>💡 Em 2024, a BlackRock — gestora de US$ 10 trilhões e maior do mundo — lançou o maior ETF de Bitcoin da história. Quando a BlackRock entra, o mercado amadureceu definitivamente.</blockquote>`,quiz:{q:'Qual empresa tem a maior reserva corporativa de Bitcoin?',opts:['MicroStrategy, com mais de 190.000 BTC','Tesla','Apple','Goldman Sachs'],correct:0},cards:[{q:'O que é um ETF de Bitcoin?',a:'Fundo negociado em bolsa que rastreia o preço do Bitcoin, permitindo exposição sem comprar BTC diretamente.'},{q:'Por que a BlackRock entrar no Bitcoin importa?',a:'É a maior gestora do mundo (US$ 10 tri) — sua entrada sinaliza que Bitcoin é ativo financeiro maduro e legítimo.'},{q:'O que é tesouraria corporativa em Bitcoin?',a:'Empresas que mantêm Bitcoin como reserva de valor em vez de dólares ou títulos do governo.'}]},
      {id:41,name:'O futuro das moedas digitais',dur:'11min',content:`<h3>Um Novo Panorama Monetário</h3><p>O Bitcoin abriu as portas para uma revolução mais ampla nas moedas digitais. Hoje, além do Bitcoin, existem milhares de outras criptomoedas, stablecoins atreladas ao dólar, e as CBDCs — moedas digitais emitidas por bancos centrais. Cada uma com propósitos e filosofias radicalmente diferentes.</p><p>O Ethereum criou contratos inteligentes (smart contracts), possibilitando finanças descentralizadas (DeFi), NFTs e aplicações blockchain. Stablecoins como USDT e USDC tornaram-se o "dólar digital" usado em países com câmbio controlado.</p><h3>A Linha que Separa Tudo</h3><p>Mas existe uma linha fundamental que separa o Bitcoin de todo o resto: nenhuma outra criptomoeda tem a mesma descentralização, segurança e história que o Bitcoin. Ethereum tem o Ethereum Foundation. Stablecoins têm empresas centralizadas. CBDCs são controladas por governos.</p><blockquote>💡 "Existe o Bitcoin, e existe tudo o mais. O Bitcoin resolveu o problema de dinheiro descentralizado. As outras são experimentos interessantes, mas com graus de centralização que Bitcoin não tem."</blockquote>`,quiz:{q:'Qual a principal diferença entre Bitcoin e outras criptomoedas?',opts:['Bitcoin tem descentralização, segurança e histórico únicos — outras têm algum grau de controle central','Bitcoin é mais barato de transacionar','Bitcoin tem mais tecnologia','Bitcoin é mais novo'],correct:0},cards:[{q:'O que são stablecoins?',a:'Criptomoedas atreladas a moedas tradicionais (geralmente dólar) para manter valor estável.'},{q:'O que é DeFi?',a:'Finanças Descentralizadas — serviços financeiros (empréstimos, exchanges) funcionando em blockchain sem intermediários.'},{q:'O que diferencia Bitcoin de todo o resto?',a:'Grau de descentralização, segurança comprovada por 15 anos e ausência de controle por qualquer entidade.'}]},
      {id:42,name:'Bitcoin vs CBDCs',dur:'10min',content:`<h3>O Confronto do Século</h3><p>CBDCs (Central Bank Digital Currencies) são moedas digitais criadas e controladas por bancos centrais. China já tem o Yuan Digital. UE está desenvolvendo o Euro Digital. Brasil tem o Drex em desenvolvimento. São a resposta governamental ao Bitcoin — mas são fundamentalmente opostas em filosofia.</p><p>CBDCs são o oposto do Bitcoin: centralizadas, programáveis por governos, com potencial de rastreamento total de todas transações, possibilidade de "expiração" do dinheiro (obrigando gasto), e bloqueio de compras de categorias específicas.</p><h3>O Dilema das CBDCs</h3><ul><li><strong>Benefícios:</strong> inclusão financeira, eficiência de pagamentos, combate à lavagem de dinheiro</li><li><strong>Riscos:</strong> vigilância total, controle de gastos, possibilidade de "dinheiro programado" que expira</li><li><strong>China:</strong> usa Yuan Digital para monitorar gastos e bloquear dissidentes</li><li><strong>Bitcoin:</strong> resposta direta — dinheiro sem vigilância que nenhum governo controla</li></ul><blockquote>💡 "A CBDC é o sonho de todo governo controlador: dinheiro que rastreia cada compra, expira se não for gasto, e pode ser bloqueado com um clique. Bitcoin é a proteção contra esse futuro."</blockquote>`,quiz:{q:'O que são CBDCs?',opts:['Moedas digitais criadas e controladas por bancos centrais — o oposto filosófico do Bitcoin','Um tipo de criptomoeda descentralizada','Fundos de investimento em cripto','Tecnologia de pagamento entre bancos'],correct:0},cards:[{q:'O que é CBDC?',a:'Central Bank Digital Currency — moeda digital emitida e controlada por banco central, como o Drex brasileiro.'},{q:'Qual o principal risco das CBDCs?',a:'Vigilância total de transações, possibilidade de bloqueio de compras e dinheiro programado que pode expirar.'},{q:'Como Bitcoin difere das CBDCs?',a:'Bitcoin é descentralizado e sem controle central — CBDCs são o oposto: controladas e programadas por governos.'}]
      }
    ],
