name: Gerar Capa IA - Novo Curso

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-capa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Instalar dependencias Python
        run: |
          python3 -m pip install requests pillow --break-system-packages

      - name: Gerar capas com IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/gerar_capa.py

      - name: Commit e push das capas
        run: |
          git config --global user.name "Matheus Academy Bot"
          git config --global user.email "bot@matheusacademy.com.br"
          git add assets/capas/
          git add data/ || true
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca para commitar."
          else
            git commit -m "Capas IA geradas automaticamente [skip ci]"
            git push origin HEAD:main
          fi
