name: Gerar Capa IA - Novo Curso

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  gerar-capa:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: |
          python3 -m pip install requests pillow --break-system-packages

      - name: Gerar capas com IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/gerar_capa.py

      - name: Commit capas geradas
        run: |
          git config --global user.name "Matheus Academy Bot"
          git config --global user.email "bot@matheusacademy.com.br"
          git add assets/capas/
          git add data/courses.js
          git add courses.js
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca."
          else
            git commit -m "Capas IA geradas [skip ci]"
            git push
          fi
