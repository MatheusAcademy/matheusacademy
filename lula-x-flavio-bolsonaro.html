        "content": "<h3>Tópico 1 — Entendendo a disputa e o cenário de 2026</h3><p>Aluno, vamos tratar este tema com calma e profundidade. Aqui você vai entender o pano de fundo da disputa, quem ocupa qual posição e por que o confronto ganhou centralidade no noticiário político recente. O objetivo aqui não é empurrar conclusão pronta, e sim ensinar você a ler política como um sistema vivo, em que imagem, rejeição, alianças, economia, narrativa, memória do eleitor e fatos recentes da imprensa se cruzam o tempo inteiro.</p><p>Quando eu digo para você observar os fatos, eu quero dizer algo muito prático: não basta saber que saiu uma pesquisa, que um candidato cresceu, que outro anunciou vice ou que determinado grupo está mudando de discurso. É preciso perguntar o que esse movimento produz no imaginário do eleitor comum, no comportamento dos indecisos, na militância, nos agentes do mercado e também nos aliados que pensam em sobrevivência política.</p><p>Ao longo deste tópico, eu vou falar como professor, mas também como alguém que sabe que o aluno às vezes olha para política com cansaço, desconfiança e até receio de ser manipulado por recortes. Então eu vou te mostrar como construir um raciocínio próprio. Em vez de repetir o debate da internet, você vai aprender a fazer leitura estrutural, contextual e comparativa.</p><p>Fontes recentes consideradas neste curso: Reuters em 31/03/2026 e 01/04/2026; AP em 31/03/2026; The Guardian em 03/04/2026; Poder360 em 06/04/2026; CNN Brasil em 05/04/2026; UFMG Educativa em 17/03/2026.</p><h4>Leitura guiada e aplicação prática</h4><p>Primeiro, precisamos entender o ponto de partida do confronto. O presidente Luiz Inácio Lula da Silva chega ao ciclo eleitoral de 2026 com a força de quem já ocupou várias vezes o centro da vida política brasileira, mas também com o peso de governar em um momento difícil. Reuters e AP noticiaram em 31 de março de 2026 que Lula confirmou Geraldo Alckmin novamente como companheiro de chapa. Esse gesto é muito mais do que uma decisão de bastidor. Ele sinaliza continuidade, estabilidade e manutenção de uma ponte com o centro político, com setores do empresariado e com eleitores moderados do Sudeste. Quando um presidente mantém um vice desse perfil, ele comunica previsibilidade.</p><p>Do outro lado, Flávio Bolsonaro aparece como o nome que tenta converter o capital simbólico do bolsonarismo em candidatura presidencial própria. Reuters publicou em 01 de abril de 2026 que a melhora nas pesquisas deu a Flávio mais tempo para segurar o anúncio de sua equipe econômica. Isso é relevante porque mostra um comportamento de campanha: quando o candidato se sente competitivo, ele ganha liberdade para preservar cartas, testar linguagem e evitar detalhamento precoce. Em outras palavras, pesquisa não serve só para medir; ela também muda a conduta dos próprios candidatos.</p><p>Você deve perceber a diferença de posição institucional entre os dois. Lula fala a partir do poder do cargo, carrega máquina pública, atos de governo, indicadores econômicos e a responsabilidade pela vida real das pessoas. Flávio fala a partir do polo oposicionista, podendo prometer, criticar, simplificar e explorar desgaste. Esse contraste é decisivo. Em eleições, quem governa precisa defender resultado; quem desafia pode trabalhar expectativa. É por isso que campanhas de oposição costumam se beneficiar quando a economia desacelera ou quando escândalos desviam o foco do discurso oficial.</p><p>Poder360 publicou em 06 de abril de 2026 levantamentos estaduais mostrando que a disputa varia muito conforme o território. Em Pernambuco, Lula aparece à frente; no Pará, o petista também foi reportado à frente em pesquisa de março. Já a CNN Brasil publicou em 05 de abril de 2026 resultado em Santa Catarina com ampla liderança de Flávio. O ensinamento aqui é precioso: eleição nacional não é fotografia uniforme do país. O Brasil vota por blocos regionais, identidades econômicas, experiências culturais e memórias políticas distintas. Um aluno atento não pergunta apenas 'quem está ganhando?'; ele pergunta 'onde, entre quem e por quê?'</p><p>Outro ponto central é a rejeição. A UFMG Educativa, reproduzindo análise da professora Luciana Veiga em 17 de março de 2026, destacou que o resultado pode ser decidido pela rejeição. Isso é uma chave de ouro para você entender o confronto. Em disputas polarizadas, muitas vezes o eleitor não vota porque ama profundamente um candidato; ele vota porque quer impedir o outro lado. Essa lógica altera propaganda, alianças, tom dos debates e até o tipo de notícia que ganha tração. Campanhas passam a investir menos em encantamento e mais em contraste moral, medo e comparação de riscos.</p><p>Há ainda a camada da memória política. Lula representa não apenas o governo atual, mas também toda uma trajetória de sindicalismo, PT, programas sociais, crises, retornos e reconstruções de imagem. Flávio representa o sobrenome Bolsonaro e, ao mesmo tempo, tenta se individualizar como herdeiro viável sem parecer apenas continuação automática do pai. O Guardian escreveu em 03 de abril de 2026 sobre o esforço de Flávio para reduzir a ênfase no sobrenome em alguns contextos. Esse detalhe é didático para você: marcas políticas muito fortes ajudam a mobilizar a base, mas podem dificultar expansão para o centro.</p><p>Aplicação prática: quando você analisar qualquer novo fato da corrida eleitoral, crie este hábito. Pergunte: o fato fortalece governabilidade, entusiasmo de base, credibilidade econômica, sensação de mudança ou redução de rejeição? Se você responder isso com sinceridade e método, já estará lendo política em nível acima da média do noticiário comum.</p><h4>Fechamento do tópico</h4><p>Se você chegou até aqui, já percebeu uma coisa importante: política de alto nível não se explica por uma única manchete, por uma única fala de campanha ou por uma paixão de curto prazo. Ela se explica por acúmulo, tendência, símbolos, rejeições, memórias e capacidade de organizar a percepção pública. A grande habilidade que eu quero desenvolver em você é esta: sair do consumo passivo de notícia e entrar na leitura estratégica dos fatos. Isso vale para este curso e vale para qualquer eleição futura que você acompanhar.</p>",

ilidade, cada troca ministerial e cada anúncio de chapa passa a ter valor estratégico maior.</p><p>Mas aqui existe uma lição muito importante, aluno: pesquisa não é profecia. Pesquisa é retrato de momento, com metodologia específica, recorte geográfico, margem de erro, período de coleta e formulação de perguntas. Quando a CNN Brasil mostra Santa Catarina muito favorável a Flávio e o Poder360 mostra Pernambuco mais favorável a Lula, não há contradição automática. Há, na verdade, expressão de um país desigual, regionalizado e altamente segmentado. Quem cai na armadilha de pegar um único levantamento e transformá-lo em verdade total perde a capacidade de interpretar processo.</p><p>Vamos além. Pesquisas servem para três coisas ao mesmo tempo: medir força, moldar narrativa e orientar comportamento. Se um candidato aparece crescendo, apoiadores ficam mais animados, doadores e aliados observam com mais atenção, jornalistas reorganizam manchetes e até adversários alteram discurso. Portanto, a pesquisa afeta a realidade que mede. Esse é um ponto fino, mas decisivo. A leitura madura não pergunta só 'o que a pesquisa mostrou?', e sim 'o que a publicação dessa pesquisa faz com a campanha daqui para frente?'</p><p>A rejeição merece tratamento especial. Em ambiente polarizado, taxa de rejeição pode importar tanto quanto intenção bruta de voto. Um candidato pode ter base extremamente mobilizada, mas teto baixo para expansão. Outro pode não empolgar tanto, mas ser visto como opção menos arriscada em determinado segmento. A análise citada pela UFMG Educativa enfatiza justamente isso: a decisão pode passar pela comparação de rejeições. Em aula, eu costumo dizer que rejeição é como um teto de vidro invisível. De longe, muita gente não vê; mas, quando a campanha tenta subir, bate nele.</p><p>Há também o fator segundo turno. Alguns eleitores respondem de um jeito quando há vários nomes e de outro quando se veem obrigados a escolher entre dois polos. Isso significa que o desempenho de Lula ou de Flávio em cenários estimulados de primeiro turno não elimina a necessidade de observar simulações de confronto direto. Em disputa polarizada, o segundo turno é quase uma psicologia da escolha binária: o eleitor passa a pensar menos em ideal e mais em custo, risco, cansaço e viabilidade.</p><p>Uma boa prática para você, aluno, é criar um quadro simples toda vez que sair uma nova pesquisa: instituto, data de coleta, tamanho da amostra, local, cenário testado, rejeição, diferença por região, diferença por renda e escolaridade, e principal manchete. Fazendo isso por algumas semanas, você começa a perceber tendências reais e filtrar ruído. A maioria das pessoas consome o número isolado. Quem quer aprender política de verdade observa sequência, estabilidade, variação e contexto.</p><p>Por fim, lembre-se de que pesquisa sem contexto vira munição de torcida. Pesquisa com contexto vira ferramenta de raciocínio. Nosso objetivo neste curso é o segundo caminho. Você não precisa sair daqui concordando com um campo ideológico específico; precisa sair sabendo ler o jogo.</p><h4>Fechamento do tópico</h4><p>Se você chegou até aqui, já percebeu uma coisa importante: política de alto nível não se explica por uma única manchete, por uma única fala de campanha ou por uma paixão de curto prazo. Ela se explica por acúmulo, tendência, símbolos, rejeições, memórias e capacidade de organizar a percepção pública. A grande habilidade que eu quero desenvolver em você é esta: sair do consumo passivo de notícia e entrar na leitura estratégica dos fatos. Isso vale para este curso e vale para qualquer eleição futura que você acompanhar.</p>",

        "content": "<h3>Tópico 3 — Comunicação política, imagem pública e disputa de narrativa</h3><p>Aluno, vamos tratar este tema com calma e profundidade. Agora nós olhamos para o campo simbólico da eleição, onde a imagem muitas vezes pesa tanto quanto a proposta. O objetivo aqui não é empurrar conclusão pronta, e sim ensinar você a ler política como um sistema vivo, em que imagem, rejeição, alianças, economia, narrativa, memória do eleitor e fatos recentes da imprensa se cruzam o tempo inteiro.</p><p>Quando eu digo para você observar os fatos, eu quero dizer algo muito prático: não basta saber que saiu uma pesquisa, que um candidato cresceu, que outro anunciou vice ou que determinado grupo está mudando de discurso. É preciso perguntar o que esse movimento produz no imaginário do eleitor comum, no comportamento dos indecisos, na militância, nos agentes do mercado e também nos aliados que pensam em sobrevivência política.</p><p>Ao longo deste tópico, eu vou falar como professor, mas também como alguém que sabe que o aluno às vezes olha para política com cansaço, desconfiança e até receio de ser manipulado por recortes. Então eu vou te mostrar como construir um raciocínio próprio. Em vez de repetir o debate da internet, você vai aprender a fazer leitura estrutural, contextual e comparativa.</p><p>Fontes recentes consideradas neste curso: Reuters em 31/03/2026 e 01/04/2026; AP em 31/03/2026; The Guardian em 03/04/2026; Poder360 em 06/04/2026; CNN Brasil em 05/04/2026; UFMG Educativa em 17/03/2026.</p><h4>Leitura guiada e aplicação prática</h4><p>Vamos entrar agora na guerra de comunicação, porque nenhuma disputa presidencial moderna se explica apenas por programa de governo. Ela se explica por linguagem, símbolos, enquadramentos, emoção e repetição. Lula é um político historicamente associado à narrativa do povo, do trabalho, da inclusão e da experiência. Mesmo quando enfrenta desgaste, ele tende a recorrer à memória de superação, à trajetória pessoal e à ideia de reconstrução institucional. Esse estilo conversa com setores que valorizam biografia e proteção social.</p><p>Flávio Bolsonaro, por sua vez, precisa equilibrar duas exigências ao mesmo tempo. A primeira é preservar o vínculo com a base bolsonarista, que valoriza confronto, identidade conservadora e oposição ao PT. A segunda é ampliar aceitabilidade em públicos que talvez rejeitem excessos do estilo do pai. Foi justamente essa tensão que apareceu no texto do Guardian de 03 de abril de 2026, ao descrever o uso mais frequente do primeiro nome e uma tentativa de suavização de marca em certos ambientes. Isso ensina algo muito importante: em campanha, até a forma como o nome é apresentado pode ser estratégia.</p><p>Observe como comunicação política nunca é detalhe. O nome, o tom, a cor, o vice, a palavra escolhida e o silêncio calculado compõem mensagem. Quando Reuters informa que Flávio ainda não tinha anunciado companheiro de chapa nem equipe econômica definitiva, isso não é só ausência de dado; é também uma forma de manter flexibilidade narrativa. Já a decisão de Lula de manter Alckmin manda outro tipo de recado: coerência de coalizão e compromisso com moderação institucional.</p><p>Eu quero que você pense como estrategista por alguns minutos. Se uma campanha percebe que o eleitor está cansado de conflito, ela tende a suavizar linguagem e vender estabilidade. Se percebe que o eleitor está frustrado e quer ruptura, enfatiza indignação, denúncia e mudança. O erro do analista amador é achar que discurso vem apenas de convicção ideológica. Na prática, discurso também é calibrado por humor social, testes, pesquisas qualitativas e leitura de rejeição.</p><p>Há um ponto ainda mais sensível: a comunicação digital. Em disputas de alta polarização, vídeos curtos, cortes de fala, títulos e postagens emocionais podem gerar muito mais impacto imediato do que entrevistas longas. Mas impacto não é sinônimo de persuasão duradoura. Às vezes um conteúdo viral anima a base e piora a rejeição fora dela. Por isso, uma campanha precisa separar material para mobilização interna e material para expansão. O que energiza o militante nem sempre convence o indeciso.</p><p>Como aluno, você pode aplicar esse conhecimento de modo muito concreto. Toda vez que assistir a uma propaganda, entrevista ou postagem de Lula ou de Flávio, anote: qual emoção central foi acionada? Medo, esperança, indignação, orgulho, nostalgia, sensação de ordem ou desejo de mudança? Depois pergunte: esse conteúdo fala para a base ou para o centro? Só essa pergunta já coloca você num patamar de análise acima da maioria dos comentaristas de rede social.</p><p>Feche este tópico com uma ideia forte: eleições não são apenas batalha de propostas, mas disputa pela moldura mental através da qual o eleitor interpreta a realidade. Quem domina a moldura, muitas vezes domina a conversa.</p><h4>Fechamento do tópico</h4><p>Se você chegou até aqui, já percebeu uma coisa importante: política de alto nível não se explica por uma única manchete, por uma única fala de campanha ou por uma paixão de curto prazo. Ela se explica por acúmulo, tendência, símbolos, rejeições, memórias e capacidade de organizar a percepção pública. A grande habilidade que eu quero desenvolver em você é esta: sair do consumo passivo de notícia e entrar na leitura estratégica dos fatos. Isso vale para este curso e vale para qualquer eleição futura que você acompanhar.</p>",

        "content": "<h3>Tópico 4 — Economia, percepção social e impacto eleitoral</h3><p>Aluno, vamos tratar este tema com calma e profundidade. Aqui eu quero que você perceba como o bolso do eleitor atravessa toda a disputa, mesmo quando o debate parece ideológico. O objetivo aqui não é empurrar conclusão pronta, e sim ensinar você a ler política como um sistema vivo, em que imagem, rejeição, alianças, economia, narrativa, memória do eleitor e fatos recentes da imprensa se cruzam o tempo inteiro.</p><p>Quando eu digo para você observar os fatos, eu quero dizer algo muito prático: não basta saber que saiu uma pesquisa, que um candidato cresceu, que outro anunciou vice ou que determinado grupo está mudando de discurso. É preciso perguntar o que esse movimento produz no imaginário do eleitor comum, no comportamento dos indecisos, na militância, nos agentes do mercado e também nos aliados que pensam em sobrevivência política.</p><p>Ao longo deste tópico, eu vou falar como professor, mas também como alguém que sabe que o aluno às vezes olha para política com cansaço, desconfiança e até receio de ser manipulado por recortes. Então eu vou te mostrar como construir um raciocínio próprio. Em vez de repetir o debate da internet, você vai aprender a fazer leitura estrutural, contextual e comparativa.</p><p>Fontes recentes consideradas neste curso: Reuters em 31/03/2026 e 01/04/2026; AP em 31/03/2026; The Guardian em 03/04/2026; Poder360 em 06/04/2026; CNN Brasil em 05/04/2026; UFMG Educativa em 17/03/2026.</p><h4>Leitura guiada e aplicação prática</h4><p>Nenhum duelo presidencial sobrevive muito tempo sem aterrissar na economia. Mesmo quando o debate parece girar em torno de valores, identidade ou escândalos, o bolso do eleitor funciona como grande filtro silencioso. Se a vida está apertada, o desemprego preocupa, o crédito pesa e a inflação corrói, o governante paga parte da conta política. Se há sensação de alívio, consumo ou estabilidade, a reeleição ganha oxigênio. Por isso eu digo ao aluno: nunca separe comunicação de economia; a campanha interpreta a economia e tenta traduzi-la em sentimento político.</p><p>Reuters escreveu em 01 de abril de 2026 que Lula enfrentava ventos contrários ligados à desaceleração econômica e a um escândalo bancário, enquanto Flávio ainda não detalhava equipe econômica. Esse recorte é excelente para o nosso estudo. Veja o contraste: o incumbente precisa responder por fatos concretos, enquanto o desafiante pode operar mais no campo da promessa e da expectativa. Em cenário de incerteza, a oposição costuma ganhar espaço justamente por poder vender horizonte sem provar execução.</p><p>Mas aqui cabe um cuidado de professor para aluno: não aceite nem o triunfalismo do governo nem o simplismo da oposição sem verificar dados, ritmo e percepção. Na prática, o eleitor não lê planilha como economista. Ele sente preço, emprego, crédito, medo de piora e confiança no amanhã. Às vezes indicadores técnicos melhoram, mas a sensação social segue ruim. Às vezes a percepção melhora em segmentos específicos e isso já altera o humor eleitoral. A política trabalha muito com sensação socialmente compartilhada.</p><p>Lula tem tradição em associar sua imagem a crescimento com inclusão e proteção dos mais pobres. Mesmo em momentos difíceis, a campanha tende a insistir em programas, obras, renda e defesa institucional. Flávio, por sua vez, se beneficia quando o discurso liberal-conservador consegue sintetizar a ideia de menos peso do Estado, maior previsibilidade, cortes e ambiente mais pró-negócios. Reuters mencionou nomes cogitados para aconselhamento econômico, como Mansueto Almeida e Roberto Campos Neto, ainda sem confirmação. Isso mostra que a construção de credibilidade econômica faz parte do jogo simbólico da candidatura.</p><p>Do ponto de vista didático, você deve aprender a distinguir três camadas. Primeira: economia real, isto é, emprego, renda, inflação, juros, crédito e atividade. Segunda: economia percebida, ou seja, como as pessoas contam umas às outras se as coisas estão melhorando ou piorando. Terceira: economia narrada, que é a forma como campanhas e imprensa enquadram esses fatos. Muitas vezes as eleições são decididas na distância entre a segunda e a terceira camada.</p><p>Aplicação prática: faça um exercício simples. Pegue uma notícia econômica da semana e responda quatro perguntas. Quem se beneficia eleitoralmente dessa manchete? Quem precisa reagir? Qual grupo social sente isso mais intensamente? E qual seria a resposta provável de cada campanha? Esse treino ajuda você a sair do papel de leitor passivo para entrar no papel de intérprete político.</p><p>No fim, lembre-se de uma regra duríssima da política: promessas mobilizam, mas custo de vida corrige ilusões. É por isso que economia sempre volta ao centro, mesmo quando o debate parece ter se desviado.</p><h4>Fechamento do tópico</h4><p>Se você chegou até aqui, já percebeu uma coisa importante: política de alto nível não se explica por uma única manchete, por uma única fala de campanha ou por uma paixão de curto prazo. Ela se explica por acúmulo, tendência, símbolos, rejeições, memórias e capacidade de organizar a percepção pública. A grande habilidade que eu quero desenvolver em você é esta: sair do consumo passivo de notícia e entrar na leitura estratégica dos fatos. Isso vale para este curso e vale para qualquer eleição futura que você acompanhar.</p>",

Alckmin funciona como ponte histórica entre Lula e parcelas do centro político e econômico.</p><p>Por que isso importa tanto? Porque eleição presidencial no Brasil não é vencida só com carisma nacional. Ela exige montagem territorial, apoio partidário, palanque em estados estratégicos, tempo de TV, capilaridade, governadores aliados, prefeitos influentes e capacidade de reduzir resistências. Quando um candidato escolhe vice, ele também escolhe um sinal para atores que decidirão quanto investir, quanto se engajar e quanto se arriscar ao lado daquela candidatura.</p><p>Flávio Bolsonaro enfrenta desafio diferente. Como herdeiro político do bolsonarismo, ele parte de uma base nacional robusta em certos segmentos, mas precisa transformar essa energia em arranjos estaduais competitivos. Reuters observou que outros nomes conservadores ainda tentavam espaço, embora fossem vistos como azarões. Isso significa que, mesmo quando um campo ideológico parece consolidado, a disputa por liderança interna continua existindo. Uma candidatura presidencial precisa mostrar força suficiente para atrair apoios antes que alternativas ganhem tração.</p><p>Aqui entra um princípio importante de ciência política prática: aliados não escolhem apenas por afinidade; escolhem por viabilidade percebida. Se o candidato parece crescer, mais gente se aproxima. Se parece estagnar, surgem deserções, barganhas duras ou neutralidade envergonhada. É por isso que anúncios de vice, pesquisas, agenda pública e montagem de equipe se retroalimentam. Nada disso é peça isolada.</p><p>Eu quero te ensinar também a ler o valor do território. Um palanque forte em estados populosos pode alterar tempo de exposição, logística de campanha, transferência de votos e narrativa de competitividade. Ao mesmo tempo, vitórias folgadas em determinados estados podem compensar dificuldades em outros. O aluno que acompanha política com maturidade deve mapear onde a campanha tenta ampliar, onde tenta segurar vantagem e onde aceita per agência internacional como a Reuters costuma valorizar implicações institucionais, econômicas e diplomáticas. A AP frequentemente organiza a notícia para um público amplo, focando o evento e sua relevância factual. Um veículo interpretativo como o Guardian pode destacar enquadramentos de imagem e rebranding. Já veículos nacionais, institutos regionais e análises acadêmicas podem iluminar nuances locais que a cobertura estrangeira não prioriza. Isso não significa que um esteja sempre certo e outro errado. Significa que cada lente mostra ângulos diferentes da mesma disputa.</p><p>O erro comum do leitor é confundir fonte com tribo. Se uma notícia confirma sua preferência, ele aceita sem critério. Se contraria, ele chama de manipulação. Esse comportamento é ruim para a democracia e ruim para seu aprendizado. Como professor, eu te convido a fazer algo mais exigente: compare, confronte, verifique data, observe o verbo usado na manchete, veja se é fato ou interpretação, identifique a pergunta que a matéria responde e também a que ela deixa em aberto.</p><p>Quando falamos de Lula x Flávio Bolsonaro, isso é ainda mais importante porque a polarização incentiva exageros. Uma manchete pode transformar tendência modesta em arrancada histórica. Outra pode reduzir movimento importante a ruído passageiro. Seu papel, como aluno crítico, é distinguir o fato bruto da moldura. Fato bruto: Lula manteve Alckmin. Fato bruto: Reuters relatou empate em determinados cenários. Fato bruto: o Guardian descreveu tentativa de suavização de marca por parte de Flávio. Moldura: cada veículo explica o significado desses fatos de forma um pouco diferente.</p><p>Aplicação prática imediata: crie um ritual de leitura. Primeiro, leia a notícia. Depois, escreva em uma frase o fato objetivo. Em seguida, escreva em outra frase o enquadramento do veículo. Por fim, pergunte qual dado ainda faltaria para uma conclusão mais sólida. Esse exercício simples fortalece sua autonomia intelectual e te protege contra manipulação emocional.</p><p>Há ainda a diferença entre notícia e comentário. Notícia te dá evento, data, atores e consequência inicial. Comentário te oferece interpretação. Os dois têm valor, mas não cumprem a mesma função. Misturar os dois sem perceber é um convite para virar repetidor de opinião alheia. Nosso curso foi construído justamente para te tirar desse lugar.</p><p>Se você aprender de verdade este tópico, já terá ganho algo que vale muito além da eleição de 2026: um método para consumir informação política com menos impulso e mais critério.</p><h4>Fechamento do tópico</h4><p>Se você chegou até aqui, já percebeu uma coisa importante: política de alto nível não se explica por uma única manchete, por uma única fala de campanha ou por uma paixão de curto prazo. Ela se explica por acúmulo, tendência, símbolos, rejeições, memórias e capacidade de organizar a percepção pública. A grande habilidade que eu quero desenvolver em você é esta: sair do consumo passivo de notícia e entrar na leitura estratégica dos fatos. Isso vale para este curso e vale para qualquer eleição futura que você acompanhar.</p>",
