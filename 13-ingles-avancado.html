<script>
var COURSE = { id:'IA', name:'Inglês Avançado', shortName:'Inglês Avançado', cat:'Idiomas', desc:'Domine estruturas complexas, subjuntivos, discurso indireto e alcance fluência em tópicos sofisticados.', salt:'IA_HENRY_2026_MASTER', ak:'ia_auth', courseKey:'ia', prefix:'ia_', color:'#7B1FA2', glow:'rgba(123,31,162,.35)', free:true, freeModules:1, modules:3, topics:9, hours:5, quizzes:9 };
var MODS = [
  { id:'ia_mod1', name:'Estruturas Gramaticais Avançadas', free:true,
    topics:[
      {id:1, name:'Conditional Sentences (Zero, First, Second, Third)', dur:'26 min', content:`<h3>Conditional Sentences (Orações Condicionais)</h3><p>As orações condicionais expressam uma condição e seu resultado. Em inglês, existem quatro tipos principais de conditional sentences, cada um usado em situações diferentes. Dominar essas estruturas é essencial para soar como um falante avançado.</p><h4>Zero Conditional (Usado para fatos gerais e verdades universais)</h4><p><strong>Estrutura:</strong> If + presente simples, presente simples</p><p>O zero conditional descreve situações que são SEMPRE verdadeiras. É usado para fatos científicos, hábitos gerais e situações lógicas.</p><p><strong>Exemplos:</strong><br>"If you heat water to 100 degrees Celsius, it boils." (Se você aquece água a 100 graus, ela ferve.)<br>"If you mix blue and yellow paint, you get green." (Se você mistura azul e amarelo, fica verde.)<br>"If people exercise regularly, they stay healthier." (Se pessoas exercem regularmente, elas ficam mais saudáveis.)<br>"If you don't water plants, they die." (Se você não rega plantas, elas morrem.)"</p><p>O zero conditional é muito usado para instruções e regras. "If you want to make pasta, you boil water first." (Se você quer fazer macarrão, você ferve água primeiro.)</p><h4>First Conditional (Usado para situações possíveis no futuro)</h4><p><strong>Estrutura:</strong> If + presente simples, will + verbo</p><p>Use first conditional para situações que são POSSÍVEIS de acontecer no futuro. A condição é realista e provável.</p><p><strong>Exemplos:</strong><br>"If you study hard, you will pass the exam." (Se você estudar bastante, você passará no exame.)<br>"If it rains tomorrow, I will stay at home." (Se chover amanhã, vou ficar em casa.)<br>"If you don't call her, she will be upset." (Se você não ligar para ela, ela ficará chateada.)<br>"If you arrive late, we will start without you." (Se você chegar atrasado, começaremos sem você.)"</p><p><strong>Variações com "unless" (a menos que):**</strong><br>"Unless you hurry, you will miss the train." = "If you don't hurry, you will miss the train." (A menos que você se apresse, vai perder o trem.)</p><p><strong>Variações com "unless":**</strong> Você também pode usar "unless" para expressar a mesma ideia de forma negativa: "I won't go unless you come with me." (Não vou a menos que você venha comigo.)</p><h4>Second Conditional (Usado para situações hypothéticas ou improváveis no presente/futuro)</h4><p><strong>Estrutura:</strong> If + passado simples, would + verbo</p><p>Use second conditional para imaginar situações que NÃO SÃO REAIS ou são IMPROVÁVEIS. É usado para expressar desejo, sonhos, ou situações contrárias à realidade.</p><p><strong>Exemplos:</strong><br>"If I were you, I would apologize." (Se eu fosse você, eu pediria desculpas.)<br>"If I won the lottery, I would travel the world." (Se eu ganhasse na loteria, eu viajaria pelo mundo.)<br>"If I had more time, I would learn to play guitar." (Se eu tivesse mais tempo, eu aprenderia a tocar violão.)<br>"If they offered me the job, I would accept it immediately." (Se eles me oferecessem o trabalho, eu aceitaria imediatamente.)"</p><p><strong>Observe o uso de "were" ao invés de "was" com "I":**</strong> "If I were rich" (não "If I was rich"). Embora muitos falantes nativos usem "was", "were" é gramaticalmente correto e soa mais formal.</p><p><strong>Variações com "could" e "might":**</strong><br>"If you tried harder, you could succeed." (Se você tentasse mais, você poderia ter sucesso.)<br>"If it were nice weather, we might go to the beach." (Se fosse bom tempo, poderíamos ir à praia.)"</p><h4>Third Conditional (Usado para situações hypothéticas no passado)</h4><p><strong>Estrutura:</strong> If + passado perfeito, would have + particípio passado</p><p>Use third conditional para imaginar como as coisas teriam sido diferentes se algo diferente tivesse acontecido no passado. É usado para arrependimento ou reflexão.</p><p><strong>Exemplos:</strong><br>"If I had studied more, I would have passed the exam." (Se eu tivesse estudado mais, teria passado no exame.)<br>"If she had arrived earlier, she would have caught the train." (Se ela tivesse chegado mais cedo, teria pego o trem.)<br>"If we had bought the house, we would have been happy." (Se tivéssemos comprado a casa, teríamos sido felizes.)<br>"If he hadn't been late, the accident wouldn't have happened." (Se ele não tivesse atrasado, o acidente não teria acontecido.)"</p><p><strong>Expressando arrependimento:</strong><br>"I wish I had known about this earlier." (Gostaria de ter sabido disso antes.)<br>"If only I had listened to her advice!" (Se ao menos eu tivesse escutado o conselho dela!)"</p><h4>Tabela de Comparação</h4><p><strong>Zero:</strong> If + present, present (fatos verdadeiros)<br><strong>First:</strong> If + present, will (futuro possível)<br><strong>Second:</strong> If + past, would (hypothético agora)<br><strong>Third:</strong> If + past perfect, would have (hypothético no passado)</p><h4>Ordem de Sentenças com "If"</h4><p>Você pode colocar a cláusula "if" no início ou no final:<br>"If it rains, I will stay home." = "I will stay home if it rains." (ambas corretas)</p><p>Quando "if" vem primeiro, use uma vírgula. Quando vem depois, não precisa vírgula.</p><h4>Prática Combinada</h4><p>1. Zero: "If you mix salt and water, it dissolves." (mistura = dissolve)<br>2. First: "If you work hard today, you will finish the project." (trabalha = terminará)<br>3. Second: "If I were the president, I would create better schools." (seria = criaria)<br>4. Third: "If I had gone to university, I would have become an engineer." (tivesse ido = teria virado)"</p>`, cards:[{q:"Qual é a estrutura do First Conditional?",a:"If + presente simples + will + verbo. Exemplo: 'If you study hard, you will pass.'."},{q:"Quando usar Second Conditional?",a:"Para situações hypothéticas e improváveis agora. Exemplo: 'If I were rich, I would travel.' (mas não sou rico agora)"},{q:"Qual é a diferença entre 'If you study' e 'If you studied'?",a:"'If you study' = First Conditional (provável no futuro). 'If you studied' = Second Conditional (improvável ou hypothético agora)."}]},
      {id:2, name:'Reported Speech (Discurso Indireto)', dur:'24 min', content:`<h3>Reported Speech (Discurso Indireto)</h3><p>Reported speech é a forma de contar o que alguém disse sem usar aspas. Por exemplo, ao invés de: He said, "I am tired", você diz: "He said that he was tired". Isso é muito comum em escrita e conversação avançada.</p><h4>Mudanças em Reported Speech</h4><p>Quando você muda de direct speech para reported speech, você precisa fazer mudanças:</p><p><strong>1. Mudanças no verbo principal:</strong><br>"I am tired" → He said (that) he was tired.<br>"I like pizza" → She told me (that) she liked pizza.<br>"I will come tomorrow" → He said (that) he would come the next day.</p><p><strong>2. Mudanças de tempo verbal:</strong><br>Presente Simples → Passado Simples<br>Presente Contínuo → Passado Contínuo<br>Presente Perfeito → Passado Perfeito<br>Futuro (will) → Condicional (would)<br>Passado Simples → Passado Perfeito</p><p><strong>Exemplos:</strong><br>Direct: "I work in a bank." Reported: "She said she worked in a bank."<br>Direct: "I am studying." Reported: "He told me he was studying."<br>Direct: "I have finished my homework." Reported: "She said she had finished her homework."<br>Direct: "I will call you." Reported: "He promised he would call me."</p><p><strong>3. Mudanças em pronomes e palavras de posição:</strong><br>I → he/she, you → I/he/she, my → his/her, here → there, today → that day, tomorrow → the next day, yesterday → the day before</p><p><strong>Exemplos:</strong><br>Direct: "I love your dress, Mary." (Eu amo seu vestido, Mary.)<br>Reported: "John told Mary that he loved her dress."<br><br>Direct: "I will see you tomorrow." (Vou vê-lo amanhã.)<br>Reported: "He said he would see me the next day."<br><br>Direct: "I was here yesterday." (Eu estava aqui ontem.)<br>Reported: "She said she had been there the day before."</p><h4>Perguntas em Reported Speech</h4><p>Para perguntas, use "asked" ou "wanted to know" e mude a ordem das palavras para ordem de afirmação.</p><p><strong>Exemplos:</strong><br>Direct: "Do you like pizza?" Reported: "She asked if I liked pizza." (She asked me if I liked pizza.)<br>Direct: "What is your name?" Reported: "He asked what my name was."<br>Direct: "Where do you live?" Reported: "She wanted to know where I lived."<br>Direct: "Can you help me?" Reported: "He asked if I could help him."</p><p><strong>Com question words (what, where, who, why, how):**</strong><br>Direct: "Where are you going?" Reported: "She asked where I was going."<br>Direct: "Why did you do that?" Reported: "He wanted to know why I had done that."<br>Direct: "How long have you been here?" Reported: "She asked how long I had been there."</p><h4>Ordens e Pedidos em Reported Speech</h4><p><strong>Para ordens use "told" + infinitivo:**</strong><br>Direct: "Go to your room!" Reported: "She told him to go to his room."<br>Direct: "Don't be late!" Reported: "He told her not to be late."<br><br><strong>Para pedidos use "asked" + infinitivo:**</strong><br>Direct: "Can you help me?" Reported: "She asked me to help her."<br>Direct: "Could you please close the door?" Reported: "He asked me to close the door."</p><h4>Verbos de Reporte Diferentes</h4><p><strong>Said, told, asked:**</strong> Os mais comuns<br><strong>Claimed:</strong> Para afirmações que podem não ser verdadeiras: "He claimed he was innocent."<br><strong>Denied:</strong> Para negar: "She denied that she had done it."<br><strong>Admitted:</strong> Para confessar: "He admitted that he had stolen the money."<br><strong>Suggested:</strong> Para sugerir: "She suggested that we should go to the beach."<br><strong>Insisted:</strong> Para insistir: "He insisted that he was right."<br><strong>Complained:</strong> Para reclamar: "She complained that the food was cold."<br><strong>Explained:</strong> Para explicar: "He explained that he had been delayed by traffic."</p><h4>Mudanças de Tempo em Reported Speech</h4><p><strong>Se o verbo introdutor está no presente ou futuro, não precisa mudar o tempo:</strong><br>"He says that he is tired." (Ele diz que está cansado.)<br>"She will tell you that she likes pizza." (Ela vai dizer que gosta de pizza.)<br><br><strong>Se o verbo introdutor está no passado, mude para passado:</strong><br>"He said that he was tired." (Ele disse que estava cansado.)<br>"She told me that she liked pizza." (Ela me disse que gostava de pizza.)"</p><h4>Exemplos Práticos em Contexto</h4><p>Situação: Uma conversa no trabalho<br>Direct: "I finished the report yesterday. I will send it to you tomorrow."<br>Reported: "She told me that she had finished the report the day before and that she would send it to me the next day."<br><br>Situação: Uma entrevista<br>Direct: "Where did you work before? Why did you leave that job?"<br>Reported: "The interviewer asked where I had worked before and why I had left that job."<br><br>Situação: Um pedido<br>Direct: "Can you please call me when you get home?"<br>Reported: "He asked me to call him when I got home."</p>`, cards:[{q:"Como converter 'I am happy' para Reported Speech?",a:"'She said (that) she was happy.' O verbo muda de 'am' para 'was' e 'I' para 'she'."},{q:"O que fazer com as perguntas em Reported Speech?",a:"Use 'asked' ou 'wanted to know' e mude a ordem das palavras para ordem de afirmação. 'Where do you live?' → 'She asked where I lived.'"},{q:"Como expressar uma ordem em Reported Speech?",a:"Use 'told' + infinitivo. 'Go to your room!' → 'She told him to go to his room.'"}]},
      {id:3, name:'Present Perfect Continuous e Past Perfect Continuous', dur:'23 min', content:`<h3>Present Perfect Continuous e Past Perfect Continuous</h3><p>Estes são tempos verbais que focam na DURAÇÃO de uma ação. Enquanto o Present Perfect descreve uma ação completada, o Present Perfect Continuous descreve uma ação que começou no passado e continua até agora (ou acaba de terminar).</p><h4>Present Perfect Continuous (Presente Perfeito Contínuo)</h4><p><strong>Formação:</strong> Have/Has + been + verbo + -ing</p><p>Use este tempo para descrever uma ação que começou no passado, continua até agora, e pode continuar no futuro. O foco é a DURAÇÃO e a CONTINUIDADE.</p><p><strong>Exemplos:</strong><br>"I have been studying English for 5 years." (Tenho estado estudando inglês por 5 anos.)<br>"She has been working at that company since 2015." (Ela tem estado trabalhando naquela empresa desde 2015.)<br>"We have been living in this house for 10 years." (Temos estado vivendo nesta casa por 10 anos.)<br>"He has been trying to fix the car all morning." (Ele tem estado tentando consertar o carro toda a manhã.)"</p><p><strong>Forma negativa:</strong><br>"I haven't been sleeping well." (Não tenho dormido bem.)<br>"She hasn't been working since Monday." (Ela não tem trabalhado desde segunda.)"</p><p><strong>Forma interrogativa:</strong><br>"How long have you been studying English?" (Há quanto tempo você estuda inglês?)<br>"Have they been waiting long?" (Eles têm esperado bastante?)"</p><p><strong>Diferença entre Present Perfect e Present Perfect Continuous:</strong><br>Present Perfect: "I have finished my homework." (Terminei - ação completa)<br>Present Perfect Continuous: "I have been doing my homework for 2 hours." (Tenho estado fazendo - duração)<br><br>Compare:<br>"She has written 3 letters." (Escreveu 3 cartas - quantidade, resultado)<br>"She has been writing letters all day." (Tem estado escrevendo cartas - duração, processo)</p><h4>Past Perfect Continuous (Passado Perfeito Contínuo)</h4><p><strong>Formação:</strong> Had + been + verbo + -ing</p><p>Use este tempo para descrever uma ação que começou no passado, continuou por um período, e depois foi interrompida por outra ação no passado.</p><p><strong>Exemplos:</strong><br>"When I arrived, they had been waiting for 2 hours." (Quando cheguei, eles tinham estado esperando por 2 horas.)<br>"By the time she called, I had been studying for 3 hours." (No momento em que ela ligou, eu tinha estado estudando por 3 horas.)<br>"He had been working there for 10 years before he retired." (Ele tinha estado trabalhando lá por 10 anos antes de se aposentar.)<br>"She looked tired because she had been running." (Ela parecia cansada porque tinha estado correndo.)"</p><p><strong>Estrutura típica com Past Perfect Continuous:**</strong><br>"By + time, she had been + -ing"<br>"When + past simple, they had been + -ing"<br>"After + gerund, he had been + -ing"</p><p><strong>Exemplos de estrutura:**<br>"By 5 PM, I had been working for 8 hours." (Até as 5, eu tinha estado trabalhando por 8 horas.)<br>"When the teacher came in, the students had been talking." (Quando o professor entrou, os alunos tinham estado falando.)<br>"After lunch, she had been sleeping." (Depois do almoço, ela tinha estado dormindo.)"</p><h4>Comparando Tempos Contínuos e Perfeitos</h4><p><strong>Presente Perfeito vs Presente Perfeito Contínuo:</strong><br>"I have written a book." (Tenho escrito - resultado, livro completo)<br>"I have been writing a book." (Tenho estado escrevendo - processo, ainda está em progresso)<br><br>"She has worked there for 5 years." (Trabalhou - trabalho completo, pode ter saído)<br>"She has been working there for 5 years." (Tem trabalhado - ainda está lá agora)</p><p><strong>Passado Simples vs Passado Perfeito Contínuo:</strong><br>"I studied for 2 hours." (Estudei por 2 horas - ação completa, sem conexão com outra ação)<br>"I had been studying for 2 hours when she called." (Tinha estado estudando por 2 horas quando ela ligou - mostra que uma ação foi interrompida por outra)"</p><h4>Expressões Comuns com Duração</h4><p><strong>For + período de tempo:</strong> "for 5 years", "for 2 hours", "for a month"<br><strong>Since + momento específico:</strong> "since 2015", "since Monday", "since this morning"<br><strong>All morning/day/week:</strong> "I've been working all day."<br><strong>How long:</strong> "How long have you been waiting?" / "How long had they been studying?"</p><h4>Prática de Contexto</h4><p><strong>Cenário 1:</strong> Você chega para uma reunião e vê que estão esperando.<br>"Sorry I'm late! Have you been waiting long?" (Desculpa o atraso! Vocês têm estado esperando bastante?)<br>"Yes, we have been waiting for 30 minutes." (Sim, temos estado esperando por 30 minutos.)<br><br><strong>Cenário 2:</strong> Você vê seu amigo cansado.<br>"You look tired. Have you been working hard?" (Você parece cansado. Você tem estado trabalhando bastante?)<br>"Yes, I have been studying for my exams all week." (Sim, tenho estado estudando para meus exames toda a semana.)<br><br><strong>Cenário 3:</strong> Contando uma história no passado.<br>"When I arrived at the party, everyone had been dancing for an hour." (Quando cheguei à festa, todos tinham estado dançando por uma hora.)<br>"The dog had been barking all night before we finally woke up." (O cachorro tinha estado latindo a noite toda antes de finalmente acordarmos.)"</p>`, cards:[{q:"Qual é a formação do Present Perfect Continuous?",a:"Have/Has + been + verbo + -ing. Exemplo: 'I have been studying' (Tenho estado estudando)."},{q:"Qual é a diferença entre 'I have worked for 5 years' e 'I have been working for 5 years'?",a:"Ambas significam que você ainda trabalha. Mas 'I have been working' enfatiza a duração e o processo contínuo até agora."},{q:"Como usar Past Perfect Continuous?",a:"Use para descrever uma ação que continuou por um período e foi interrompida. 'When she arrived, they had been waiting for 2 hours.'"}]},
    ],
    summary:{title:"Resumo do Módulo 1: Estruturas Gramaticais Avançadas", points:["Conditional sentences têm quatro tipos: Zero (fatos), First (futuro provável), Second (hypothético agora), Third (hypothético no passado). Cada um tem sua própria estrutura e uso.","Reported speech muda tempo verbal, pronomes e referências temporais/espaciais. Use 'said', 'told', 'asked' conforme apropriado e mudanças nas estruturas de pergunta.","Present Perfect Continuous descreve ações que começaram no passado e continuam até agora, focando na duração. Past Perfect Continuous descreve duração interrompida por outra ação no passado.","Pratique formando frases em diferentes contextos para internalizar essas estruturas complexas!"]},
    quizFinal:[{q:"Qual é a estrutura do Third Conditional?",opts:["If + past, would","If + past, present","If + past perfect, would have","If + present, will"],correct:2},{q:"Complete: 'If I _____ you, I would apologize.'",opts:["were","was","would be","am"],correct:0},{q:"Como converter 'I like pizza' para Reported Speech?",opts:["She said I liked pizza","She said she liked pizza","She says she likes pizza","She told she likes pizza"],correct:1},{q:"O que significa 'First Conditional'?",opts:["Primeira vez que alguém fala","Situação hypothética improvável","Situação possível no futuro","Fato geral"],correct:2},{q:"Qual é a diferença entre 'I have worked' e 'I have been working'?",opts:["Não há diferença","'Have worked' enfatiza duração","'Have been working' é mais comum na escrita","'Have been working' enfatiza o processo e duração"],correct:3},{q:"Como expressar uma ordem em Reported Speech?",opts:["She said to go","She asked to go","She told him to go","She says to go"],correct:2},{q:"Qual é a formação do Present Perfect Continuous?",opts:["Have + verbo + -ed","Have + been + -ing","Have + been + verbo","Has + been + -ed"],correct:1},{q:"O que 'unless' significa em Conditional?",opts:["Se","A menos que","Porque","Quando"],correct:1},{q:"Complete: 'She has been working there _____ 2015.'",opts:["for","since","during","while"],correct:1}]

  { id:'ia_mod2', name:'Vocabulário Avançado e Nuances', free:false,
    topics:[
      {id:4, name:'Vocabulário Acadêmico e Profissional', dur:'24 min', content:`<h3>Vocabulário Acadêmico e Profissional</h3><p>No nível avançado, você precisa de vocabulário sofisticado para discutir tópicos complexos, escrever ensaios acadêmicos e participar de conversas profissionais. Este vocabulário é diferente do vocabulário cotidiano - é mais formal, específico e nuançado.</p><h4>Palavras-Chave para Ensaios e Argumentos</h4><p><strong>Para introduzir ideias:</strong><br>"It can be argued that..." (Pode-se argumentar que...)<br>"One could contend that..." (Pode-se sustentar que...)<br>"It is widely acknowledged that..." (É amplamente reconhecido que...)<br>"There is compelling evidence that..." (Há evidência convincente de que...)<br>"Research suggests that..." (A pesquisa sugere que...)"</p><p><strong>Para adicionar informações:**<br>"Furthermore..." (Além disso...)<br>"Moreover..." (Além do mais...)<br>"In addition..." (Em adição...)<br>"What is more..." (O que é mais...)<br>"Additionally..." (Adicionalmente...)"</p><p><strong>Para contrastar ideias:**<br>"Nevertheless..." (Não obstante...)<br>"However..." (Entretanto...)<br>"Conversely..." (Inversamente...)<br>"On the other hand..." (Por outro lado...)<br>"In contrast..." (Em contraste...)<br>"Whereas..." (Enquanto que...)"</p><p><strong>Para concluir:**<br>"In conclusion..." (Em conclusão...)<br>"To summarize..." (Para resumir...)<br>"Ultimately..." (Finalmente...)<br>"Therefore..." (Portanto...)<br>"Thus..." (Assim...)<br>"In summary..." (Em resumo...)"</p><p><strong>Para apresentar exemplos:**<br>"For instance..." (Por exemplo...)<br>"To illustrate..." (Para ilustrar...)<br>"Take, for example..." (Tome, por exemplo...)<br>"A case in point..." (Um caso exemplar...)<br>"Such as..." (Tal como...)"</p><h4>Vocabulário sobre Pesquisa e Conhecimento</h4><p><strong>Sobre estudos e pesquisas:**<br>"Empirical" (Empírico) - "Empirical research shows..." (Pesquisa empírica mostra...)<br>"Hypothesis" (Hipótese) - "The hypothesis is that..." (A hipótese é que...)<br>"Methodology" (Metodologia) - "The methodology used in this study..." (A metodologia usada neste estudo...)<br>"Sample" (Amostra) - "A random sample of..." (Uma amostra aleatória de...)<br>"Data" (Dados) - "The data indicates..." (Os dados indicam...)<br>"Findings" (Descobertas) - "The findings suggest..." (As descobertas sugerem...)<br>"Correlation" (Correlação) - "There is a correlation between..." (Há uma correlação entre...)<br>"Causation" (Causalidade) - "This does not imply causation." (Isso não implica causalidade.)<br>"Statistically significant" (Estatisticamente significativo) - "The difference is statistically significant." (A diferença é estatisticamente significativa.)"</p><h4>Vocabulário Profissional e de Negócios</h4><p><strong>Sobre resultados e desempenho:**<br>"Achieve" (Alcançar) - "We achieved our targets." (Alcançamos nossas metas.)<br>"Outcome" (Resultado) - "The outcome was positive." (O resultado foi positivo.)<br>"Implement" (Implementar) - "We implemented the new strategy." (Implementamos a nova estratégia.)<br>"Optimize" (Otimizar) - "We need to optimize our processes." (Precisamos otimizar nossos processos.)<br>"Streamline" (Simplificar) - "We streamlined the process." (Simplificamos o processo.)<br>"Enhance" (Melhorar) - "This will enhance productivity." (Isso melhorará a produtividade.)<br>"Leverage" (Aproveitar) - "We can leverage this opportunity." (Podemos aproveitar esta oportunidade.)<br>"Scalable" (Escalável) - "This solution is scalable." (Esta solução é escalável.)"</p><p><strong>Sobre desafios e problemas:**<br>"Obstacle" (Obstáculo) - "We faced several obstacles." (Enfrentamos vários obstáculos.)<br>"Constraint" (Limitação) - "Budget constraints..." (Limitações de orçamento...)<br>"Challenge" (Desafio) - "The main challenge is..." (O principal desafio é...)<br>"Drawback" (Desvantagem) - "The drawback of this approach..." (A desvantagem desta abordagem...)<br>"Impediment" (Impedimento) - "Cost is not an impediment." (Custo não é um impedimento.)"</p><p><strong>Sobre estratégia e planejamento:**<br>"Strategic" (Estratégico) - "A strategic approach..." (Uma abordagem estratégica...)<br>"Initiative" (Iniciativa) - "A new initiative..." (Uma nova iniciativa...)<br>"Framework" (Estrutura) - "Within this framework..." (Dentro desta estrutura...)<br>"Priority" (Prioridade) - "Our top priority..." (Nossas maiores prioridades...)<br>"Objective" (Objetivo) - "Our objective is..." (Nosso objetivo é...)<br>"Milestone" (Marco) - "We reached a major milestone." (Atingimos um marco importante.)"</p><h4>Palavras com Nuances Similares</h4><p><strong>Problema vs Issue vs Problem:**<br>"Problem" (Problema) - Algo que precisa ser resolvido<br>"Issue" (Questão/Assunto) - Algo que é discutido ou considerado, pode ser mais formal<br>"Challenge" (Desafio) - Algo difícil, mas potencialmente superável<br>"We have a problem to solve." vs "The issue of climate change..." vs "One of the main challenges is..."</p><p><strong>Importante vs Critical vs Significant:**<br>"Important" (Importante) - Que importa<br>"Critical" (Crítico) - Absolutamente necessário, urgente<br>"Significant" (Significativo) - Que tem significância ou importância considerável<br>"This is an important meeting." vs "Critical infrastructure..." vs "A significant improvement..."</p><p><strong>Aumentar vs Boost vs Enhance vs Increase:**<br>"Increase" (Aumentar) - Tornar maior em quantidade<br>"Boost" (Impulsionar) - Aumentar de forma rápida ou vigorosa<br>"Enhance" (Melhorar) - Melhorar a qualidade<br>"Promote" (Promover) - Avançar ou auxiliar algo<br>"Sales increased by 10%." vs "Caffeine boosts energy." vs "This feature enhances user experience." vs "We want to promote innovation."</p><h4>Expressões Profissionais Comuns</h4><p>"It goes without saying that..." (Não é preciso dizer que...)<br>"By and large..." (Geralmente...)<br>"To all intents and purposes..." (Para todos os efeitos práticos...)<br>"In light of..." (À luz de...)<br>"Given that..." (Dado que...)<br>"For the most part..." (Na sua maioria...)<br>"At this juncture..." (Neste momento...)<br>"Substantive..." (Substancial/significativo) - "A substantive discussion..."<br>"Pertinent..." (Pertinente/relevante) - "The pertinent information..."<br>"Albeit..." (Embora/ainda que) - "A good solution, albeit expensive..."</p><p><strong>Exemplos em contexto:</strong><br>"While sales have increased, the profit margin has, albeit modestly, improved." (Enquanto as vendas aumentaram, a margem de lucro melhorou, ainda que modestamente.)<br>"Given the constraints, our implementation of the new framework was substantive and well-received." (Dadas as limitações, nossa implementação do novo framework foi significativa e bem-recebida.)"</p>`, cards:[{q:"Qual palavra significa 'Absolutamente necessário, urgente'?",a:"'Critical' significa crítico/essencial. Exemplo: 'Critical infrastructure' (infraestrutura crítica)."},{q:"Qual é a diferença entre 'problem' e 'issue'?",a:"'Problem' é algo que precisa ser resolvido. 'Issue' é algo que é discutido ou considerado, é mais formal e amplo."},{q:"Como apresentar uma ideia em um ensaio acadêmico?",a:"Use expressões como 'It can be argued that...', 'One could contend that...', 'Research suggests that...'"}]},
      {id:5, name:'Sinônimos e Palavras com Significados Próximos', dur:'23 min', content:`<h3>Sinônimos e Palavras com Significados Próximos</h3><p>Um verdadeiro falante avançado não apenas conhece muitas palavras, mas entende as nuances entre palavras similares. Duas palavras podem ser traduzidas pela mesma palavra em português, mas em inglês têm significados levemente diferentes. Dominar essas distinções é o que separa um falante bom de um excelente.</p><h4>Verbos de Movimento e Posição</h4><p><strong>Walk vs Stroll vs Stride vs Trudge:**<br>"Walk" (Caminhar) - O verbo genérico<br>"Stroll" (Passear) - Caminhar de forma relaxada e lenta, sem pressa<br>"Stride" (Caminhar com passos largos) - Caminhar com confiança e rapidez<br>"Trudge" (Caminhar pesadamente) - Caminhar com dificuldade, cansado ou triste<br>"He walked to the store." vs "She strolled through the park." vs "He strode into the room." vs "They trudged through the snow."</p><p><strong>Look vs Watch vs Stare vs Gaze:**<br>"Look" (Olhar) - Virar os olhos para algo<br>"Watch" (Observar) - Prestar atenção ao movimento<br>"Stare" (Encarar) - Olhar fixamente, frequentemente de forma rude ou inapropriada<br>"Gaze" (Observar fixamente) - Olhar com admiração ou contemplação<br>"Look at this!" vs "Watch the sunset." vs "Don't stare, it's rude!" vs "She gazed at the stars."</p><h4>Adjetivos Relacionados a Pessoas</h4><p><strong>Happy vs Content vs Cheerful vs Delighted:**<br>"Happy" (Feliz) - Sentir alegria<br>"Content" (Satisfeito) - Sentir-se bem e satisfeito com a situação<br>"Cheerful" (Alegre) - Demonstrar alegria externamente<br>"Delighted" (Encantado) - Muito feliz e surpreendido de forma positiva<br>"I am happy with my life." vs "She seems content with her work." vs "A cheerful smile." vs "We were delighted to see you."</p><p><strong>Big vs Large vs Huge vs Massive:**<br>"Big" (Grande) - Genérico, casual<br>"Large" (Grande) - Mais formal que big<br>"Huge" (Enorme) - Muito grande<br>"Massive" (Massivo) - Extraordinariamente grande, frequentemente usado para quantidade ou efeito<br>"A big house." vs "A large number of people." vs "A huge surprise." vs "A massive achievement."</p><h4>Adjetivos Relacionados a Qualidade</h4><p><strong>Bad vs Poor vs Terrible vs Awful:**<br>"Bad" (Ruim) - Genérico, oposto de good<br>"Poor" (Pobre/precário) - De qualidade inferior, usado especialmente para trabalho ou desempenho<br>"Terrible" (Terrível) - Muito ruim<br>"Awful" (Horrível) - Pior que terrível, pegou antipatia ou desaprovação<br>"The weather is bad." vs "Poor service at the restaurant." vs "A terrible mistake." vs "That's awful!"</p><p><strong>Good vs Excellent vs Superb vs Outstanding:**<br>"Good" (Bom) - Acima da média, genérico<br>"Excellent" (Excelente) - Muito bom<br>"Superb" (Soberbo) - Excelência extrema<br>"Outstanding" (Notável) - Extraordinariamente bom, se destaca<br>"A good book." vs "Excellent work!" vs "A superb performance." vs "An outstanding achievement."</p><h4>Verbos de Consentimento e Negação</h4><p><strong>Agree vs Concur vs Consent vs Accord:**<br>"Agree" (Concordar) - Ter a mesma opinião<br>"Concur" (Concordar) - Mais formal, "agree" com alguém de forma oficial<br>"Consent" (Consentir) - Dar permissão ou aceitar algo<br>"Accord" (Estar de acordo) - Bem formal e literário, estar em harmonia<br>"I agree with you." vs "The experts concur that..." vs "You must consent to the terms." vs "Our views accord with theirs."</p><p><strong>Disagree vs Differ vs Dispute vs Contradict:**<br>"Disagree" (Discordar) - Ter opinião oposta<br>"Differ" (Diferir) - Ser diferente, usado também para opiniões<br>"Dispute" (Contestar) - Questionar ou discordar argumentativamente<br>"Contradict" (Contradizer) - Afirmar algo oposto ao que foi dito<br>"I disagree with that opinion." vs "Our approaches differ significantly." vs "I dispute that claim." vs "His actions contradict his words."</p><h4>Verbos de Importância e Significado</h4><p><strong>Mean vs Signify vs Imply vs Suggest:**<br>"Mean" (Significar) - Ter um significado específico<br>"Signify" (Significar/simbolizar) - Indicar ou representar simbolicamente<br>"Imply" (Implicar/sugerir indiretamente) - Deixar entender sem dizer explicitamente<br>"Suggest" (Sugerir) - Indicar de forma sutil<br>"What does that word mean?" vs "The red light signifies danger." vs "He implied that I was wrong." vs "The evidence suggests a different conclusion."</p><h4>Expressões com Nuances</h4><p><strong>Slightly vs Somewhat vs Rather vs Quite:**<br>"Slightly" (Levemente) - Pequena quantidade de mudança<br>"Somewhat" (Bastante/um tanto) - Moderadamente<br>"Rather" (Bastante/bem) - Notavelmente<br>"Quite" (Bastante/muito) - Consideravelmente<br>"The temperature is slightly lower." vs "That was somewhat disappointing." vs "Rather expensive." vs "Quite impressive."</p><p><strong>Almost vs Nearly vs Virtually:**<br>"Almost" (Quase) - Muito perto de completar<br>"Nearly" (Quase) - Muito similar a almost, talvez um pouco menos perto<br>"Virtually" (Praticamente/essencialmente) - Na prática, mesmo que não exatamente<br>"Almost finished." vs "Nearly there." vs "Virtually no difference."</p><h4>Prática Contextual</h4><p>Escolha o palavra correta:</p><p>1. "The sunset was absolutely ___. A) big B) superb C) good D) large"<br>Resposta: B) superb (soberbo, extraordinário - apropriado para beleza)</p><p>2. "I _____ with your assessment, though I have some reservations. A) agree B) dispute C) concur D) differ"<br>Resposta: C) concur (concord, de forma oficial/formal)</p><p>3. "She _____ that we had made a mistake without saying it directly. A) suggested B) disputed C) implied D) contradicted"<br>Resposta: C) implied (deixou entender indiretamente)</p>`, cards:[{q:"Qual é a diferença entre 'stroll' e 'stride'?",a:"'Stroll' é caminhar de forma relaxada e lenta. 'Stride' é caminhar com passos largos e confiança."},{q:"Quando usar 'poor' em vez de 'bad'?",a:"'Poor' é usado principalmente para qualidade de trabalho ou desempenho. 'Bad' é mais genérico. 'Poor service', 'Poor quality'."},{q:"Qual palavra significa consentimento formal?",a:"'Consent' significa dar permissão ou aceitar algo formalmente. 'Concur' é concordar de forma oficial."}]},
      {id:6, name:'Idiomaticidade e Colocações (Collocations)', dur:'25 min', content:`<h3>Idiomaticidade e Colocações (Collocations)</h3><p>As colocações são combinações de palavras que naturalmente aparecem juntas em inglês. Um falante avançado não apenas usa as palavras corretas individualmente, mas também as combina da forma que os falantes nativos combinam. Por exemplo, em português você pode dizer "dor forte" ou "dor intensa", em inglês o natural é "severe pain" ou "sharp pain", não "strong pain" ou "intense pain".</p><h4>Colocações Verbo + Nome</h4><p><strong>Sobre ações e resultados:**<br>"Reach a conclusion" (Chegar a uma conclusão) - não "arrive at a conclusion"<br>"Draw a conclusion" (Tirar uma conclusão) - também comum<br>"Make a decision" (Tomar uma decisão) - não "take a decision" (isso soa errado em inglês americano)<br>"Take a risk" (Correr um risco)<br>"Break the law" (Violar a lei)<br>"Follow a rule" (Seguir uma regra)<br>"Set a record" (Estabelecer um recorde)<br>"Make progress" (Fazer progresso)<br>"Raise a question" (Levantar uma questão)<br>"Conduct research" (Conduzir pesquisa)<br>"Carry out an experiment" (Realizar um experimento)"</p><p><strong>Sobre dificuldades e facilidades:**<br>"Face a challenge" (Enfrentar um desafio)<br>"Overcome an obstacle" (Superar um obstáculo)<br>"Settle a dispute" (Resolver uma disputa)<br>"Tackle a problem" (Enfrentar um problema)<br>"Smooth the way" (Suavizar o caminho)<br>"Pave the way" (Abrir caminho)<br>"Clear the way" (Limpar o caminho)"</p><p><strong>Exemplos em frase:</strong><br>"After years of research, they reached a conclusion." (Depois de anos de pesquisa, chegaram a uma conclusão.)<br>"The team overcame several obstacles to complete the project." (O time superou vários obstáculos para completar o projeto.)<br>"We need to make a decision quickly." (Precisamos tomar uma decisão rapidamente.)"</p><h4>Colocações Adjetivo + Nome</h4><p><strong>Sobre pessoas:**<br>"Close friend" (Amigo íntimo) - não "near friend"<br>"Hard worker" (Trabalhador dedicado) - não "difficult worker"<br>"Young child" (Criança pequena) - não "small child" (isso soa estranho)<br>"Dear colleague" (Colega querido)<br>"Serious student" (Aluno dedicado/sério)<br>"Strong leader" (Líder forte)<br>"Wise decision" (Decisão sábia)<br>"Quick learner" (Alguém que aprende rápido)"</p><p><strong>Sobre situações:**<br>"Sharp pain" (Dor aguda)<br>"Severe weather" (Tempo severo)<br>"Deep silence" (Silêncio profundo)<br>"Broad smile" (Sorriso largo)<br>"Thick fog" (Neblina espessa)<br>"Bright light" (Luz brilhante)<br>"Heavy traffic" (Trânsito pesado)<br>"Strong coffee" (Café forte)<br>"Dark chocolate" (Chocolate amargo)<br>"Clear sky" (Céu limpo)"</p><p><strong>Exemplos em frase:**<br>"A sharp pain shot through his leg." (Uma dor aguda atravessou sua perna.)<br>"We waited in deep silence." (Esperamos em silêncio profundo.)<br>"Heavy traffic delayed our arrival." (O trânsito pesado atrasou nossa chegada.)"</p><h4>Colocações Sobre Sentimentos e Estado Mental</h4><p><strong>Expressões comuns:**<br>"Feel relieved" (Sentir-se aliviado) - não "feel relief" como verbo principal<br>"Feel a sense of panic" (Sentir um sentido de pânico)<br>"Experience joy" (Experimentar alegria)<br>"Burst into tears" (Irromper em lágrimas)<br>"Break into a smile" (Começar a sorrir)<br>"Calm down" (Acalmar-se)<br>"Become anxious" (Ficar ansioso)<br>"Fall in love" (Apaixonar-se)<br>"Lose heart" (Desanimar)<br>"Regain confidence" (Recuperar confiança)<br>"Lose patience" (Perder a paciência)"</p><p><strong>Exemplos em frase:**<br>"When she saw the surprise, she burst into tears." (Quando viu a surpresa, ela irrompen em lágrimas.)<br>"He became anxious about the presentation." (Ele ficou ansioso sobre a apresentação.)<br>"After the setback, they lost heart." (Depois do revés, eles desanimaram.)"</p><h4>Colocações em Contexto Acadêmico e Profissional</h4><p><strong>Expressões de pesquisa:**<br>"Conduct research" (Conduzir pesquisa)<br>"Gather data" (Coletar dados)<br>"Analyze findings" (Analisar descobertas)<br>"Draw conclusions" (Tirar conclusões)<br>"Present evidence" (Apresentar evidência)<br>"Support an argument" (Apoiar um argumento)<br>"Question a hypothesis" (Questionar uma hipótese)<br>"Substantiate claims" (Fundamentar afirmações)<br>"Cite sources" (Citar fontes)<br>"Peer review" (Revisão por pares)"</p><p><strong>Expressões de negócios:**<br>"Meet a deadline" (Cumprir um prazo)<br>"Exceed expectations" (Superar expectativas)<br>"Cut costs" (Reduzir custos)<br>"Drive sales" (Impulsionar vendas)<br>"Boost productivity" (Aumentar produtividade)<br>"Streamline operations" (Simplificar operações)<br>"Maintain standards" (Manter padrões)<br>"Ensure quality" (Garantir qualidade)<br>"Minimize risk" (Minimizar risco)<br>"Maximize profit" (Maximizar lucro)"</p><p><strong>Exemplos em contexto:**<br>"The team conducted extensive research to gather reliable data." (O time conduziu pesquisa extensa para coletar dados confiáveis.)<br>"We need to cut costs without compromising quality." (Precisamos reduzir custos sem comprometer qualidade.)<br>"The new software will streamline operations significantly." (O novo software simplificará operações significativamente.)"</p><h4>Colocações Comuns que Causam Erros</h4><p><strong>Erros comuns a evitar:**<br>❌ "Strong pain" → ✓ "Severe pain" ou "Sharp pain"<br>❌ "Do homework" → ✓ "Do homework" (isso está correto na verdade, mas às vezes dizem "make homework")<br>❌ "Take an exam" → ✓ "Take an exam" (correto) ou "Sit an exam" (britânico)<br>❌ "Speak a language" → ✓ "Speak a language" (correto)<br>❌ "Make a phone call" → ✓ "Make a phone call" (correto) ou "Give someone a call"<br>❌ "Tall building" → ✓ "High building" ou "Tall building" (ambas funcionam, mas "high" é mais comum para prédios)<br>❌ "Ask someone about something" → ✓ "Ask someone about something" (correto)<br>❌ "Inform someone about" → ✓ "Inform someone of/about" (ambas corretas, mas "of" é mais formal)"</p><p><strong>Resumo de colocações essenciais:**<br>Para soar como um falante nativo avançado, foco em aprender colocações, não apenas palavras individuais. Quando aprende uma palavra nova, aprenda também que outras palavras frequentemente aparecem com ela!</p>`, cards:[{q:"Qual é a colocação correta: 'strong pain' ou 'sharp pain'?",a:"'Sharp pain' ou 'severe pain' são as colocações corretas. 'Strong pain' não é natural em inglês."},{q:"Como se diz 'tomar uma decisão' em inglês?",a:"'Make a decision' é a colocação correta. Não é 'take a decision' em inglês americano."},{q:"O que é uma 'colocation' (colocação)?",a:"Uma combinação de palavras que naturalmente aparecem juntas em inglês. Os falantes nativos as usam automaticamente."}]},

    summary:{title:"Resumo do Módulo 2: Vocabulário Avançado", points:["Vocabulário acadêmico inclui expressões para argumentar ('It can be argued that'), adicionar informações ('Furthermore'), contrastar ('However'), e concluir. Domine estas para escrever bons ensaios.","Sinônimos têm nuances: 'big' é genérico, 'large' é formal, 'huge' é muito grande, 'massive' é extraordinário. Escolher a palavra certa mostra domínio.","Colocações são combinações naturais de palavras. Não é 'strong pain' mas 'sharp/severe pain'. Não é 'take a decision' mas 'make a decision'.","Pratique usando novas palavras em contexto apropriado, não só memorizando listas. Leia, ouça e escreva para consolidar vocabulário avançado."]},
    quizFinal:[{q:"Como introduzir uma ideia em um ensaio acadêmico?",opts:["I think that","It can be argued that","I believe","In my opinion"],correct:1},{q:"Qual é a diferença entre 'big' e 'massive'?",opts:["Não há diferença","'Big' é genérico, 'massive' é extraordinário","'Massive' é mais casual","'Big' é mais formal"],correct:1},{q:"Qual é a colocação correta?",opts:["Take a decision","Do a decision","Make a decision","Get a decision"],correct:2},{q:"Complete: 'She _____ that we had made a mistake without saying it.'",opts:["suggested","implied","said","expressed"],correct:1},{q:"Qual palavra significa observar fixamente com admiração?",opts:["Stare","Gaze","Look","Watch"],correct:1},{q:"Como se diz 'dor aguda' em inglês?",opts:["Strong pain","Hard pain","Sharp pain","Intense pain"],correct:2},{q:"Qual é a forma correta?",opts:["Carry on research","Conduct research","Make research","Do research"],correct:1},{q:"Complete: '_____ a conclusion after analyzing the data.'",opts:["Make","Draw","Take","Bring"],correct:1},{q:"Qual é a colocação para 'violar a lei'?",opts:["Take the law","Make the law","Break the law","Cut the law"],correct:2}]

      {id:7, name:'Apresentações Profissionais e Seminários', dur:'25 min', content:`<h3>Apresentações Profissionais e Seminários</h3><p>No nível avançado, você precisa ser capaz de fazer apresentações profissionais, conduzi seminários, e participar de discussões acadêmicas. Essas habilidades requerem não apenas conhecimento do idioma, mas também técnicas de apresentação.</p><h4>Estrutura de uma Apresentação Eficaz</h4><p><strong>1. Introdução (Opening) - 1-2 minutos:**</p><p>A introdução deve capturar a atenção da audiência, apresentar o tópico e explicar a relevância.</p><p><strong>Exemplos de abertura:**<br>"Good morning/afternoon everyone. Today I'm going to talk about..." (Bom dia/tarde a todos. Hoje vou falar sobre...)<br>"I'm delighted to be here to discuss..." (Fico feliz em estar aqui para discutir...)<br>"Let me start with a question: How many of you have ever...?" (Deixe-me começar com uma pergunta: Quantos de vocês já...?)<br>"This is a topic that affects all of us..." (Este é um tópico que nos afeta a todos...)<br>"Before I begin, I'd like to give you a quick overview of what we'll cover." (Antes de começar, gostaria de dar uma visão geral rápida do que cobriremos.)"</p><p><strong>Apresentando o outline:**<br>"I'll divide my presentation into three main parts." (Vou dividir minha apresentação em três partes principais.)<br>"First, we'll look at..., then we'll examine..., and finally we'll discuss..." (Primeiro, veremos..., depois examinaremos..., e finalmente discutiremos...)<br>"By the end of this presentation, you should understand..." (Ao final desta apresentação, você deve entender...)"</p><p><strong>2. Corpo da Apresentação (Main Body) - maioria do tempo:**</p><p>Organize em seções claras. Use transições para mover entre tópicos.</p><p><strong>Transições entre tópicos:**<br>"Moving on to the next point..." (Passando para o próximo ponto...)<br>"Let me now turn to..." (Deixe-me agora virar-me para...)<br>"This brings us to..." (Isso nos leva a...)<br>"So, having discussed..., let's now look at..." (Então, tendo discutido..., vamos agora olhar para...)<br>"That covers the first part. Now, let's move on to..." (Isso cobre a primeira parte. Agora, vamos passar para...)"</p><p><strong>Dando exemplos:**<br>"For instance..." (Por exemplo...)<br>"A good example of this is..." (Um bom exemplo disso é...)<br>"To illustrate this point, let me share..." (Para ilustrar este ponto, deixe-me compartilhar...)<br>"Consider the following example..." (Considere o seguinte exemplo...)"</p><p><strong>Sumarizando pontos principais:**<br>"So, in summary..." (Então, resumindo...)<br>"To recap..." (Para recapitular...)<br>"The key points here are..." (Os pontos-chave aqui são...)<br>"What we've established so far is..." (O que estabelecemos até agora é...)"</p><p><strong>3. Conclusão (Closing) - 1-2 minutos:**</p><p>Resuma os pontos principais, reitere a mensagem central, e convide para perguntas.</p><p><strong>Exemplos de conclusão:**<br>"In conclusion, what we've seen is..." (Em conclusão, o que vimos é...)<br>"To summarize the key takeaways..." (Para resumir os pontos principais...)<br>"So, what does all this mean?" (Então, o que tudo isso significa?)<br>"I believe this demonstrates that..." (Acredito que isso demonstra que...)<br>"Thank you for your attention. I'd be happy to answer any questions you might have." (Obrigado pela atenção. Ficaria feliz em responder qualquer pergunta que vocês possam ter.)"</p><h4>Técnicas de Apresentação Eficaz</h4><p><strong>1. Velocidade e entonação:**<br>Fale lentamente! Falantes nativos quando apresentam falam mais lentamente que em conversação casual. Use pausas para dar tempo para o público processar.<br>"So, the key finding is..." [PAUSE] "...that 73% of participants agreed." (Então, a descoberta-chave é... que 73% dos participantes concordaram.)</p><p><strong>2. Linguagem clara e evitar jargão desnecessário:**<br>Se precisa usar termos técnicos, defina-os: "We call this phenomenon 'cognitive dissonance', which refers to the mental discomfort people feel when faced with conflicting beliefs." (Chamamos esse fenômeno de 'dissonância cognitiva', que se refere ao desconforto mental que as pessoas sentem quando confrontadas com crenças conflitantes.)</p><p><strong>3. Contato visual e linguagem corporal:**<br>Faça contato visual com a audiência. Use gestos naturais para enfatizar pontos. Posição-se de forma confiante.</p><p><strong>4. Usar "signposting" (sinalização de caminho):**<br>"We're now looking at..." (Agora estamos olhando para...)<br>"If you look at this chart..." (Se você olhar para este gráfico...)<br>"As you can see here..." (Como você pode ver aqui...)<br>"Notice how..." (Observe como...)"</p><p><strong>5. Interagir com a audiência:**<br>"How many of you believe...?" (Quantos de vocês acreditam...?)<br>"Think about this for a moment..." (Pense nisso por um momento...)<br>"Let me ask you a question..." (Deixe-me fazer uma pergunta...)<br>"What do you think would happen if...?" (O que você acha que aconteceria se...?)"</p><h4>Respondendo a Perguntas</h4><p><strong>Reconhecer a pergunta:**<br>"That's a great question." (Essa é uma ótima pergunta.)<br>"Thank you for asking that." (Obrigado por perguntar isso.)<br>"I'm glad you brought that up." (Fico feliz que você tenha levantado isso.)"</p><p><strong>Se não entender a pergunta:**<br>"Could you rephrase that question?" (Pode reformular essa pergunta?)<br>"I'm not sure I understand what you mean. Are you asking about...?" (Não tenho certeza se entendi. Você está perguntando sobre...?)<br>"Do you mean...?" (Você quer dizer...?)"</p><p><strong>Se não souber a resposta:**<br>"That's a good point, but I don't have the answer right now. I'll look into that and get back to you." (Esse é um bom ponto, mas não tenho a resposta agora. Vou investigar e retorno para você.)<br>"That's beyond the scope of what I prepared, but it's certainly worth exploring." (Isso está além do escopo do que preparei, mas é certamente vale a pena explorar.)"</p><p><strong>Respostas diretas:**<br>"The answer is simple: ..." (A resposta é simples: ...)<br>"What this comes down to is..." (O que isso se resume é...)<br>"Based on the research, ..." (Com base na pesquisa, ...)<br>"I would argue that..." (Eu argumentaria que...)"</p><h4>Exemplo de Apresentação Breve</h4><p><strong>Abertura:</strong> "Good afternoon. Today I'd like to discuss the impact of artificial intelligence on the workplace. By the end of this talk, you should understand both the opportunities and challenges that AI presents. I'll divide my presentation into three parts: first, a brief overview of current AI applications; second, the potential benefits for businesses; and finally, the challenges we need to address."</p><p><strong>Corpo:</strong> "Let me start with current AI applications. AI is already being used in customer service, data analysis, and automation. For example, many companies now use AI chatbots... Moving on to the benefits, AI can significantly improve efficiency and reduce costs. Consider Amazon, which uses AI to manage its warehouses, resulting in faster delivery times."</p><p><strong>Conclusão:</strong> "In conclusion, while AI offers tremendous opportunities, we must also address concerns about job displacement and ethical implications. Thank you for your attention. I'd be happy to answer any questions you might have."</p>`, cards:[{q:"Como você abre uma apresentação efetiva?",a:"Capture a atenção com uma pergunta ou declaração interessante, apresente o tópico, e dê um outline. 'Today I'll discuss... divided into three parts...'"},{q:"Qual é o propósito de 'signposting' em uma apresentação?",a:"'Signposting' ajuda o público seguir a apresentação. Exemplos: 'Now looking at...', 'Notice how...', 'As you can see here...'"}]},
      {id:8, name:'Discussão Acadêmica e Argumentação Avançada', dur:'24 min', content:`<h3>Discussão Acadêmica e Argumentação Avançada</h3><p>No nível avançado, você não apenas aprecia discussões, mas participa ativamente com argumentos bem estruturados, desacordo respeitoso, e pensamento crítico. Essas habilidades são essenciais em seminários, conferências e ambientes profissionais.</p><h4>Apresentando um Argumento Forte</h4><p><strong>Estrutura de um argumento:</strong><br>1. Afirmação clara (Claim)<br>2. Evidência (Evidence)<br>3. Análise (Analysis)<br>4. Conclusão (Conclusion)</p><p><strong>Exemplo:</strong><br>"I would argue that remote work has fundamentally changed our understanding of productivity. Research from MIT and Stanford shows that employees working from home are 13% more productive. This suggests that physical presence in an office is not necessary for productivity. Therefore, I contend that companies should embrace flexible work arrangements."</p><p><strong>Expressões para afirmar um argumento:**<br>"I would argue that..." (Eu argumentaria que...)<br>"I firmly believe that..." (Acredito firmemente que...)<br>"It can be demonstrated that..." (Pode ser demonstrado que...)<br>"Evidence suggests that..." (Evidência sugere que...)<br>"One could reasonably conclude that..." (Pode-se razoavelmente concluir que...)<br>"The data clearly shows that..." (Os dados claramente mostram que...)<br>"I submit that..." (Submeto que...) - Forma muito formal<br>"It's worth noting that..." (Vale notar que...)"</p><h4>Discordância Respeitosa</h4><p><strong>Discordar enquanto mantém respeito:**<br>"I appreciate your point, but I would argue differently." (Aprecio seu ponto, mas argumentaria diferentemente.)<br>"While I understand your position, I have to respectfully disagree." (Enquanto entendo sua posição, tenho que discordar respeitosamente.)<br>"That's an interesting perspective, but consider this..." (Essa é uma perspectiva interessante, mas considere isto...)<br>"I see where you're coming from, but the evidence suggests otherwise." (Vejo de onde você vem, mas a evidência sugere o contrário.)<br>"I take your point, however..." (Considero seu ponto, entretanto...)<br>"That may be true to some extent, but..." (Pode ser verdade até certo ponto, mas...)"</p><p><strong>Reconhecer pontos válidos enquanto discorda:**<br>"You raise a valid point about [topic], but that doesn't necessarily mean [conclusion]." (Você levanta um ponto válido sobre [tópico], mas isso não significa necessariamente [conclusão].)<br>"While I agree that [point 1], I would counter that [point 2]." (Enquanto concordo que [ponto 1], eu contestaria que [ponto 2].)<br>"There's merit to that argument, though I would counter with..." (Há mérito nesse argumento, embora eu responderia com...)"</p><h4>Reconhecendo Limitações e Concessões</h4><p><strong>Mostrar pensamento equilibrado:**<br>"I acknowledge that..." (Reconheço que...)<br>"It would be fair to say that..." (Seria justo dizer que...)<br>"To be sure, there are valid concerns about..." (Para ter certeza, há preocupações válidas sobre...)<br>"One must admit that..." (Deve-se admitir que...)<br>"Admittedly..." (Admitidamente...)<br>"I grant that..." (Concedo que...)<br>"Fair enough, but..." (Tudo bem, mas...)"</p><p><strong>Exemplo de argumento balanceado:**<br>"While it's true that artificial intelligence poses challenges to employment, one could argue that it also creates new opportunities. Admittedly, workers in certain sectors may face displacement, but history shows that technological advances eventually create more jobs than they eliminate. Therefore, rather than resisting AI, we should focus on retraining and education."</p><h4>Questionamento Crítico</h4><p><strong>Fazer perguntas que estimulam pensamento:**<br>"But how do we know that...?" (Mas como sabemos que...?)<br>"What if we looked at this from a different angle?" (E se olhássemos para isso de um ângulo diferente?)<br>"Have you considered the possibility that...?" (Você considerou a possibilidade de...?)<br>"Doesn't that contradict the earlier point about...?" (Isso não contradiz o ponto anterior sobre...?)<br>"To play devil's advocate, what would happen if...?" (Para jogar o advogado do diabo, o que aconteceria se...?)<br>"Could you elaborate on...?" (Pode elaborar sobre...?)<br>"On what basis do you make that claim?" (Em que base você faz essa afirmação?)"</p><h4>Estruturando uma Discussão Acadêmica</h4><p><strong>Entrada elegante em uma discussão:**<br>"Before we move on, I'd like to raise a point about..." (Antes de continuarmos, gostaria de levantar um ponto sobre...)<br>"This ties into something that..." (Isso se conecta a algo que...)<br>"Following up on what [name] said..." (Continuando o que [nome] disse...)<br>"I want to build on that observation..." (Quero construir sobre essa observação...)"</p><p><strong>Sintetizando múltiplos pontos de vista:**<br>"What we're seeing across these arguments is..." (O que estamos vendo nesses argumentos é...)<br>"There seems to be agreement that... , though disagreement about..." (Parece haver concordância que... , embora desacordo sobre...)<br>"If I may synthesize the discussion so far..." (Se me permite sintetizar a discussão até agora...)<br>"The core tension seems to be between... and..." (A tensão central parece ser entre... e...)"</p><p><strong>Movendo a discussão para frente:**<br>"Now that we've established..., the question becomes..." (Agora que estabelecemos..., a questão se torna...)<br>"Building on this, what we need to consider next is..." (Construindo sobre isso, o que precisamos considerar a seguir é...)<br>"Given these points, how do we...?" (Dados esses pontos, como fazemos...?)<br>"Let's dig deeper into..." (Vamos aprofundar em...)"</p><h4>Exemplo de Discussão Acadêmica</h4><p><strong>Pessoa A:</strong> "I would argue that social media has had a predominantly negative impact on mental health, particularly among adolescents."<br><br><strong>Pessoa B:</strong> "I appreciate your point, but I think you're overlooking the benefits. Social media provides communities for marginalized groups and enables activism."<br><br><strong>Pessoa C:</strong> "While I acknowledge the benefits you mention, the evidence on mental health is quite compelling. Studies from Stanford and MIT show increased anxiety and depression correlating with social media use."<br><br><strong>Pessoa B:</strong> "That may be true, but correlation doesn't imply causation. Those individuals may have been predisposed to mental health issues. Furthermore—"<br><br><strong>Pessoa A:</strong> "Building on that, even if there's debate about causation, there's little question that modifying social media platforms to reduce addictive features would benefit users' well-being."<br><br><strong>Moderador:</strong> "So the core tension we're identifying is between individual benefits of social media connectivity and collective mental health impacts. Let's explore that further."</p>`, cards:[{q:"Como você apresenta um argumento forte?",a:"Com 1) Afirmação clara, 2) Evidência, 3) Análise, 4) Conclusão. Exemplo: 'I would argue... Research shows... This demonstrates...' "},{q:"Como discordar respeitosamente?",a:"Reconheça o ponto válido mas discorde: 'I appreciate your point, but I would argue differently.' Ou 'While I understand, the evidence suggests otherwise.'"},{q:"Como fazer uma pergunta que estimula pensamento crítico?",a:"Use perguntas como 'But how do we know that...?', 'What if we looked at this differently?', 'Could you elaborate on...?'"}]},
      {id:9, name:'Fluência Espontânea e Lidar com Dificuldades', dur:'23 min', content:`<h3>Fluência Espontânea e Lidar com Dificuldades</h3><p>Fluência não significa perfeição gramatical - significa ser capaz de falar espontaneamente, sem pausas muito longas, e lidar com situações inesperadas. Até falantes nativos hesitam, perdem a linha de pensamento, e precisam pedir esclarecimento. Nesta lição, aprenderemos técnicas para manter a conversa fluindo mesmo quando não temos as palavras perfeitas.</p><h4>Técnicas para Manter a Fluência</h4><p><strong>1. Use "filler words" (palavras de preenchimento) naturalmente:**<br>Todos usam essas palavras para ganhar tempo de pensar. Em pequenas quantidades, soam naturais. Se usar demais, soa estranho.<br><br>"Well, I think that..." (Bem, acho que...)<br>"Um, let me think about that." (Um, deixe-me pensar sobre isso.)<br>"You know, that's interesting because..." (Você sabe, é interessante porque...)<br>"So, the thing is..." (Então, a coisa é...)<br>"Actually, I'm not sure, but..." (Na verdade, não tenho certeza, mas...)<br>"Like, it depends on..." (Tipo, depende de...)"</p><p><strong>2. Parafrasear quando não conhece uma palavra:**<br>Em vez de parar e pedir a palavra, descreva o conceito.<br><br>Não conhece "procrastination"? Diga: "I tend to delay doing things until the last minute." (Tenho tendência a adiar as coisas até o último minuto.)<br>Não conhece "nostalgic"? Diga: "I feel sentimental about things from the past." (Sinto-me sentimental em relação a coisas do passado.)<br>Não conhece "resilient"? Diga: "She has the ability to recover from difficulties." (Ela tem a capacidade de se recuperar de dificuldades.)"</p><p><strong>3. Usar aproximações quando não conhece a palavra exata:**<br>"Sort of..." (Mais ou menos...)<br>"Kind of..." (Tipo...)<br>"Something like..." (Algo como...)<br>"In a way..." (De certa forma...)<br>"More or less..." (Mais ou menos...)<br><br>Exemplos:<br>"She's sort of like a mentor to me." (Ela é mais ou menos como uma mentora para mim.)<br>"It's kind of a mixture between..." (É tipo uma mistura entre...)<br>"In a way, it's similar to..." (De certa forma, é similar a...)"</p><p><strong>4. Compre tempo com perguntas de confirmação:**<br>"Does that make sense?" (Faz sentido?)<br>"You know what I mean?" (Você sabe o que quero dizer?)<br>"Am I explaining this clearly?" (Estou explicando isso claramente?)"</p><h4>Pedindo Ajuda Durante Conversação</h4><p><strong>Pedir para repetir:**<br>"Could you repeat that?" (Pode repetir?)<br>"Sorry, I didn't catch that." (Desculpa, não entendi.)<br>"Could you say that again?" (Pode dizer de novo?)<br>"I missed that part. Could you repeat it?" (Perdi essa parte. Pode repetir?)"</p><p><strong>Pedir para falar mais lentamente:**<br>"Could you speak a bit slower?" (Pode falar um pouco mais lentamente?)<br>"I'm finding that a bit fast. Could you slow down?" (Estou achando um pouco rápido. Pode desacelerar?)<br>"Sorry, could you speak more slowly?" (Desculpa, pode falar mais lentamente?)"</p><p><strong>Pedir esclarecimento:**<br>"What do you mean by that?" (O que você quer dizer com isso?)<br>"Could you explain that differently?" (Pode explicar de forma diferente?)<br>"I'm not sure I understand. Can you give me an example?" (Não tenho certeza se entendi. Pode dar um exemplo?)<br>"Sorry, could you rephrase that?" (Desculpa, pode reformular isso?)"</p><p><strong>Pedir pela palavra em inglês:**<br>"What's the word for...?" (Qual é a palavra para...?)<br>"How do you say... in English?" (Como você diz... em inglês?)<br>"What do you call that?" (Como você chama aquilo?)<br>"I know what you mean, but I don't remember the English word." (Sei o que você quer dizer, mas não lembro a palavra em inglês.)"</p><p><strong>Quando não entende nem um pouco:**<br>"I'm sorry, I'm not following you." (Desculpa, não estou te acompanhando.)<br>"I'm not sure I understand the whole picture." (Não tenho certeza se entendo a situação geral.)<br>"Could you start from the beginning?" (Pode começar do começo?)"</p><h4>Recoverying from Mistakes (Recuperando-se de Erros)</h4><p><strong>Se fizer um erro gramatical:**<br>Falantes nativos frequentemente se auto-corrigem. Se notar que cometeu um erro, corrija-se naturalmente:<br><br>"I goed... I mean, I went to the store." (Eu fui, digo, eu fui para a loja.)<br>"She's working in a hospital... sorry, I mean she works in a hospital." (Ela está trabalhando em um hospital, desculpa, quero dizer ela trabalha em um hospital.)"</p><p><strong>Se não conseguir continuar uma frase:**<br>"I was about to say... actually, let me rethink that." (Eu estava prestes a dizer... na verdade, deixe-me repensar isso.)<br>"Hmm, where was I going with that?" (Hmm, para onde eu ia com isso?)<br>"Let me start that again." (Deixe-me começar novamente.)"</p><p><strong>Se perder o fio da meada:**<br>"I'm sorry, I've lost my train of thought." (Desculpa, perdi meu fio de pensamento.)<br>"Can you remind me what I was saying?" (Pode me lembrar o que eu estava dizendo?)<br>"Where was I?" (Onde eu estava?)"</p><h4>Estratégias para Falar Espontaneamente</h4><p><strong>1. Prepare tópicos, não sentenças completas:**<br>Ao invés de memorizar frases completas, memorize tópicos e estruturas. Isso permite liberdade para falar espontaneamente.</p><p><strong>2. Use "thinking" structures:**<br>"Let me think about that for a second." (Deixe-me pensar nisso por um segundo.)<br>"That's a good question. Let me consider..." (Essa é uma boa pergunta. Deixe-me considerar...)<br>"Interesting point. So, what I think is..." (Ponto interessante. Então, o que acho é...)"</p><p><strong>3. Pratique responder perguntas sem preparação:**<br>Pergunte-se perguntas aleatórias e responda espontaneamente. Não pense demais - apenas comece a falar!</p><p><strong>4. Não seja perfeccionista:</strong><br>Se você disser "I go to the store yesterday" em vez de "I went to the store yesterday", a maioria compreenderá perfeitamente. O objetivo é comunicação, não perfeição.</p><h4>Exemplo de Conversa com Fluência Espontânea</h4><p><strong>Pessoa A:</strong> "What do you enjoy about your job?"<br><br><strong>Pessoa B:</strong> "Well, I think... um, there are several things. You know, first of all, I really enjoy working with people. It's kind of like, I'm in customer service, so I interact with different people every day, and that's really engaging. And, you know, I like the problem-solving aspect too. Like, when a customer has an issue, I have to figure out how to resolve it. It's, sort of, challenging in a good way."<br><br><strong>Pessoa A:</strong> "That's great. What was the hardest thing about adjusting to that job?"<br><br><strong>Pessoa B:</strong> "Oh, that's interesting. Um, let me think... I'd say the hardest part was dealing with... well, how should I say... customers who are really upset. You know what I mean? When people are angry, it's sometimes difficult to stay calm. But I've learned techniques to, um, to manage that better. Does that answer your question?"<br><br><strong>Pessoa A:</strong> "Absolutely."</p><p><strong>Observe:**<br>- Pessoa B usa "well", "um", "you know" - filler words naturais<br>- Usa parafraseia quando não tem certeza ("customers who are really upset")<br>- Compra tempo ("let me think")<br>- Pede confirmação ("Does that answer your question?")<br>- Não é perfeitamente gramatical, mas é totalmente compreensível e fluente!</p>`, cards:[{q:"O que você faz quando não conhece uma palavra?",a:"Parafraseia o conceito. Em vez de parar, descreva: 'It's a way to describe something that's... um... temporary, I think.'"},{q:"Como você pede para alguém falar mais lentamente sem ser rude?",a:"'Could you speak a bit slower, please?' ou 'That's a bit fast for me. Could you slow down?'"},{q:"É um problema fazer erros durante conversação espontânea?",a:"Não! Falantes nativos cometem erros e se autocorrigem. O objetivo é comunicação, não perfeição gramatical."}]},
    ],
    summary:{title:"Resumo do Módulo 3: Produção Oral Avançada", points:["Apresentações eficazes têm estrutura clara: Introdução (outline) → Corpo (com transições) → Conclusão (resumo). Use 'signposting' para guiar a audiência.","Discussão acadêmica requer argumentação forte com evidência, discordância respeitosa, reconhecimento de limitações, e questionamento crítico.","Fluência espontânea significa ser capaz de falar sem pausas longas. Use filler words naturais, parafraseia quando não conhece a palavra, compre tempo com perguntas de confirmação.","Não tenha medo de erros ou de pedir ajuda! Recover gracefully de erros, peça para repetir ou falar mais lentamente, e mantenha a conversa fluindo."]},
    quizFinal:[{q:"Como você estrutura uma apresentação eficaz?",opts:["Sem estrutura específica","Introdução, Corpo com transições, Conclusão","Apenas comece a falar","Fale o tempo todo sem pausas"],correct:1},{q:"O que é 'signposting' em uma apresentação?",opts:["Usar sinais físicos","Guiar o público através da apresentação com palavras-chave","Mostrar slides","Falar rápido"],correct:1},{q:"Como você discorda respeitosamente?",opts:["Diga que está errado","Reconheça o ponto mas discorde polida e respeitosamente","Ignore o que disseram","Seja agressivo"],correct:1},{q:"Quando você não conhece uma palavra, o que faz?",opts:["Pausa e pede","Continua sem ela","Parafraseia o conceito","Para a conversa"],correct:2},{q:"Complete: 'I would ___ that remote work increases productivity.'",opts:["think","believe","argue","say"],correct:2},{q:"Qual frase mostra pensamento equilibrado?",opts:["You're absolutely wrong","While it's true that..., one could argue that...","I disagree","You're always right"],correct:1},{q:"Como pedir para alguém falar mais lentamente?",opts:["Speak slower!","Could you speak a bit slower, please?","You talk too fast","Speak slower now"],correct:1},{q:"É problema cometer erros em conversação espontânea?",opts:["Sim, você não deve errar","Não, falantes nativos também erram e se autocorrigem","Sim, deve ser perfeito","Erros são inaceitáveis"],correct:1},{q:"Como você 'compra tempo' durante conversação?",opts:["Sai da conversa","Faz perguntas como 'Does that make sense?'","Para de falar","Pensa silenciosamente por 5 minutos"],correct:1}]
  }
];
</script>
