        content: '<h4>Envelhecimento é Processo Múltiplo</h4><p><strong>Envelhecimento não é único processo, é convergência de múltiplos mecanismos: encurtamento de telômeros, acúmulo de dano ao DNA, inflamação crônica, senescência celular, declínio mitocondrial</strong>. Cada um contribui para envelhecimento.</p><blockquote class="tip">Telômeros são "tampas" nas pontas de cromossomos que encurtam a cada divisão celular. Quando telômeros ficam muito curtos, célula não consegue se dividir. Você envelhece quando células param de dividir.</blockquote><p>Você herda telômeros longos ao nascer. Ao longo de vida, eles encurtam. Stress, falta de sono, inflamação fazem telômeros encurtar MAIS RÁPIDO. Você pode estar cronologicamente aos 40 mas biologicamente aos 60 se não cuida do corpo.</p><h4>Inflamação Crônica é Principal Culpado</h4><p><strong>Inflamação é resposta imunológica protetora quando aguda. Crônica é destruidora. Inflamação crônica (causada por dieta ruim, inatividade, estresse) causa envelhecimento acelerado de todo órgão</strong>.</p><blockquote class="example">Alguém que come alimentos inflamatórios todo dia tem sistema imunológico constantemente ativado. Seu corpo está em "combate" perpetual. Isso envelhece células muito mais rápido que pessoa comendo bem.</blockquote><blockquote class="quote">Longevidade é sobre minimizar inflamação, não adicionar anos. Você quer viver mais E melhor.</blockquote>'
