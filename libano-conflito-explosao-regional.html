<h3>O Líbano: Um País Construído sobre Divisões</h3>
<p>O Líbano é um dos países mais complexos do mundo em termos de composição religiosa e política. Com apenas 10.452 km² de território — menor que o estado de Sergipe — o país abriga 18 comunidades religiosas reconhecidas oficialmente, incluindo muçulmanos xiitas, muçulmanos sunitas, cristãos maronitas, drusos, cristãos ortodoxos e muitas outras. Após a independência da França em 1943, os líderes libaneses criaram o Pacto Nacional, um acordo não escrito que distribuía o poder entre as três maiores comunidades: o presidente seria sempre um cristão maronita, o primeiro-ministro um muçulmano sunita, e o presidente do Parlamento um muçulmano xiita. Esse sistema, chamado de confessionalismo, funcionou razoavelmente bem por três décadas, mas carregava em si as sementes de conflitos futuros — especialmente porque a demografia do país mudava rapidamente, com a população muçulmana (particularmente xiita) crescendo mais rápido que a cristã, enquanto o poder político permanecia desproporcional.</p>

<h4>A Guerra Civil Libanesa (1975–1990) — 15 Anos de Destruição</h4>
<p>Em 13 de abril de 1975, um ataque contra um ônibus no bairro cristão de Ain el-Rummaneh, em Beirute, disparou o estopim de uma guerra civil que duraria 15 anos e mataria entre 120.000 e 150.000 pessoas. As causas eram múltiplas e interconectadas: a presença massiva de refugiados palestinos (mais de 300.000 após a expulsão da Jordânia em 1970), que usavam o sul do Líbano como base para atacar Israel; o ressentimento da comunidade muçulmana com a dominação cristã no governo; e as ambições de potências regionais como Síria e Israel. A guerra dividiu Beirute em duas — o Leste cristão e o Oeste muçulmano — e envolveu dezenas de milícias com alianças constantemente mutáveis. A Síria interveio militarmente em 1976 e manteve tropas no Líbano até 2005. Israel invadiu duas vezes: em 1978 (Operação Litani) e em 1982 (Operação Paz na Galileia), chegando até Beirute. A guerra só terminou em 1990 com o Acordo de Taif, que redistribuiu o poder político mas manteve o sistema confessional — e deixou o Hezbollah como a única milícia armada autorizada a manter suas armas, sob o pretexto de "resistência" contra Israel.</p>

<h4>A Criação do Hezbollah — O Partido de Deus</h4>
<p>O Hezbollah ("Partido de Deus" em árabe) nasceu em 1982, diretamente como resposta à invasão israelense do Líbano. A Guarda Revolucionária Iraniana (IRGC) estabeleceu uma base no Vale do Bekaa, controlado pela Síria, e começou a recrutar, treinar e armar jovens xiitas libaneses revoltados com a ocupação israelense. O fundador espiritual do movimento foi o Sheik Muhammad Hussein Fadlallah, e a liderança organizacional inicial veio de clérigos como Subhi al-Tufayli e Abbas al-Musawi. Em 1992, Hassan Nasrallah assumiu a liderança após al-Musawi ser assassinado por Israel, e transformou o Hezbollah de uma milícia guerrilheira em uma poderosa organização político-militar com braço social, canais de TV (Al-Manar), hospitais, escolas e um partido político com representação parlamentar. O Irã forneceu o modelo ideológico (a Revolução Islâmica de Khomeini como inspiração) e o financiamento — inicialmente US$ 50–100 milhões por ano, crescendo para centenas de milhões e eventualmente bilhões. O objetivo declarado do Hezbollah era duplo: expulsar Israel do Líbano e exportar a revolução islâmica.</p>

<h4>Invasões Israelenses e a Ocupação do Sul (1978–2000)</h4>
<p>Israel invadiu o Líbano pela primeira vez em março de 1978 na Operação Litani, em resposta a um ataque da OLP (Organização para a Libertação da Palestina) que matou 38 israelenses em uma estrada costeira. As forças israelenses avançaram até o rio Litani e se retiraram após a criação da UNIFIL (Força Interina das Nações Unidas no Líbano), mas mantiveram uma zona de segurança controlada por milícias aliadas. Em junho de 1982, Israel lançou uma invasão massiva — a Operação Paz na Galileia — com 78.000 soldados, chegando até Beirute e sitiando a capital. A invasão resultou na expulsão da OLP do Líbano (Yasser Arafat e suas forças evacuaram para Túnis), mas também no massacre de Sabra e Shatila, onde milícias cristãs libanesas aliadas de Israel mataram entre 800 e 3.500 civis palestinos em campos de refugiados sob supervisão das forças israelenses — um evento que chocou o mundo. Israel manteve uma zona de ocupação no sul do Líbano até maio de 2000, quando finalmente se retirou após 18 anos de guerrilha constante do Hezbollah, que sofreu e infligiu centenas de baixas. A retirada israelense foi celebrada pelo Hezbollah como uma vitória histórica e consolidou enormemente seu prestígio e legitimidade no Líbano e no mundo árabe.</p>

<h4>A Guerra de 2006 — 34 Dias que Mudaram Tudo</h4>
<p>Em 12 de julho de 2006, combatentes do Hezbollah cruzaram a fronteira israelense, mataram três soldados e sequestraram outros dois. Israel respondeu com uma campanha militar de 34 dias que incluiu bombardeios massivos em todo o Líbano, bloqueio naval e uma ofensiva terrestre no sul. Mais de 1.100 libaneses morreram (a maioria civis), contra 165 israelenses (121 militares). A infraestrutura libanesa foi devastada — pontes, estradas, aeroporto de Beirute, usinas elétricas. Mas o Hezbollah sobreviveu militarmente, continuou disparando foguetes contra Israel durante toda a guerra (cerca de 4.000 foguetes), e emergiu politicamente fortalecido. A Resolução 1701 do Conselho de Segurança da ONU encerrou o conflito, exigindo a retirada israelense e o desarmamento do Hezbollah ao sul do rio Litani — mas o desarmamento nunca aconteceu. Nos anos seguintes, o Hezbollah acumulou um arsenal estimado em 150.000 foguetes e mísseis — mais que muitos exércitos nacionais — transformando-se na maior e mais bem armada milícia não estatal do mundo.</p>

<blockquote class="tip"><strong>Contexto fundamental:</strong> O Líbano é um país onde guerras alheias são travadas em solo próprio. Desde 1975, palestinos, sírios, iranianos, israelenses e americanos usaram o território libanês como campo de batalha para seus próprios conflitos — deixando o povo libanês pagando o preço mais alto. Fontes: Al Jazeera, CFR (Council on Foreign Relations), Britannica, Wikipedia.</blockquote>

<h3>7 de Outubro de 2023 — O Gatilho de Tudo</h3>
<p>O ataque do Hamas contra Israel em 7 de outubro de 2023 foi o evento que reativou todo o eixo de conflitos no Oriente Médio. Mais de 1.200 israelenses foram mortos no ataque mais letal da história de Israel, e cerca de 250 foram levados como reféns para Gaza. No dia seguinte, 8 de outubro, o Hezbollah abriu uma frente de solidariedade com o Hamas, começando a disparar foguetes e mísseis antitanque contra posições israelenses na fronteira norte. O líder do Hezbollah, Hassan Nasrallah, declarou que os ataques continuariam enquanto Israel bombardeasse Gaza. Iniciou-se assim um período de mais de 11 meses de hostilidades de baixa intensidade na fronteira Israel-Líbano: entre outubro de 2023 e setembro de 2024, o Hezbollah realizou cerca de 1.900 ataques transfronteiriços, enquanto Israel respondeu com aproximadamente 8.300 ataques, segundo dados compilados por fontes internacionais. Mais de 60.000 israelenses foram evacuados de comunidades no norte, e dezenas de milhares de libaneses fugiram do sul do país.</p>

<h4>Setembro de 2024 — A Escalada Devastadora</h4>
<p>Em setembro de 2024, Israel realizou uma das operações de inteligência mais audaciosas da história moderna. Em 17 de setembro, milhares de pagers (bipes) usados por operativos do Hezbollah explodiram simultaneamente em todo o Líbano, matando pelo menos 12 pessoas e ferindo mais de 2.700. No dia seguinte, walkie-talkies explodiram em uma segunda onda, causando mais mortes e pânico generalizado. Israel havia interceptado a cadeia de suprimentos de comunicação do Hezbollah e inserido explosivos nos dispositivos — uma operação que levou anos de planejamento. O Hezbollah ficou temporariamente desorganizado e em choque. Israel aproveitou a vantagem e, em 23 de setembro, lançou uma campanha aérea massiva sobre o Líbano que matou pelo menos 569 pessoas em um único dia — a maior perda de vidas em um dia no Líbano desde a Guerra Civil. Em 27 de setembro, um bombardeio no Dahieh (subúrbio sul de Beirute, reduto do Hezbollah) matou Hassan Nasrallah, o líder que comandara o grupo por 32 anos. A morte de Nasrallah foi um golpe sísmico para o Hezbollah e para o Irã.</p>

<h4>Outubro–Novembro 2024 — Invasão e Cessar-Fogo</h4>
<p>Em 1º de outubro de 2024, Israel lançou sua sexta invasão terrestre do Líbano desde 1978, cruzando a Linha Azul (fronteira reconhecida pela ONU) com forças terrestres. O objetivo declarado era empurrar o Hezbollah para norte do rio Litani e criar uma zona de segurança. As forças israelenses avançaram em várias frentes no sul do Líbano, encontrando resistência do Hezbollah em uma rede de túneis e posições fortificadas. Após semanas de combates intensos e destruição massiva, os Estados Unidos e a França mediaram um cessar-fogo que entrou em vigor em 27 de novembro de 2024. Os termos exigiam: retirada israelense em 60 dias (até 26 de janeiro de 2025), deslocamento de combatentes do Hezbollah para norte do Litani, e reforço da UNIFIL e do Exército Libanês (LAF) no sul. Mas desde o primeiro dia, o cessar-fogo foi violado repetidamente. Israel continuou atacando o Líbano quase diariamente, matando mais 500 pessoas (incluindo 127 civis) durante o período de "trégua". O Hezbollah, por sua vez, aproveitou para reconstruir infraestrutura militar e reabastecer seu arsenal.</p>

<h4>Janeiro–Fevereiro 2025 — O Cessar-Fogo que Nunca Foi</h4>
<p>O prazo de 26 de janeiro de 2025 para a retirada israelense chegou e Israel se recusou a sair. Um novo prazo foi estabelecido: 18 de fevereiro de 2025. Mas em 17 de fevereiro, o exército israelense anunciou que manteria cinco postos militares permanentes em colinas e montanhas no sul do Líbano, perto das comunidades israelenses de Shlomi, Zar'it, Avivim, Margaliot e Metula. Essa decisão efetivamente transformou o cessar-fogo em uma ocupação de fato. O presidente libanês Joseph Aoun e o primeiro-ministro Nawaf Salam protestaram formalmente na ONU, mas sem resultado prático. O Hezbollah, agora liderado por Naim Qassem (sucessor de Nasrallah), denunciou a ocupação e intensificou a retórica belicosa, declarando que "toda presença israelense em solo libanês será resistida". A tensão cresceu ao longo de fevereiro de 2025, com escaramuças frequentes, até que um novo gatilho reacendeu a guerra total.</p>

<h4>28 de Fevereiro — 2 de Março de 2026 — A Faísca que Reincendiou Tudo</h4>
<p>Em 28 de fevereiro de 2026, EUA e Israel lançaram a Operação Roaring Lion / Epic Fury contra o Irã, matando o Líder Supremo Khamenei e destruindo instalações nucleares iranianas. O Hezbollah, como principal aliado do Irã na região, respondeu imediatamente. Em 2 de março de 2026, Naim Qassem ordenou o lançamento massivo de foguetes e mísseis contra Israel — centenas de projéteis atingiram cidades no norte e centro de Israel, incluindo Haifa, Tiberíades e até Ramle, nos arredores de Tel Aviv, onde um míssil feriu 16 pessoas e danificou uma creche. O Hezbollah declarou que retomava a luta para "forçar Israel a parar sua agressão e evacuar os territórios libaneses ocupados", enfatizando que a decisão era independente da guerra no Irã — embora o timing não fosse coincidência. Israel respondeu com uma ferocidade sem precedentes: nas primeiras horas, a Força Aérea Israelense (IAF) atingiu mais de 100 alvos simultâneos em Beirute, no Vale do Bekaa e no sul do Líbano. A segunda guerra do Líbano em 2026 havia começado.</p>

<h3>O Cessar-Fogo que Não Incluiu o Líbano</h3>
<p>Em 7 de abril de 2026, um cessar-fogo de duas semanas foi anunciado entre os Estados Unidos e o Irã, mediado pelo Paquistão. O primeiro-ministro paquistanês Shehbaz Sharif declarou em suas redes sociais que EUA, Irã e seus aliados regionais "concordaram com um cessar-fogo imediato em todos os lugares, incluindo o Líbano e outros locais". Mas a alegria durou poucas horas. O gabinete do primeiro-ministro israelense Benjamin Netanyahu emitiu um comunicado categórico: "o cessar-fogo de duas semanas não inclui o Líbano". O presidente americano Donald Trump confirmou essa posição, descrevendo o Líbano como uma "escaramuça separada" que não faz parte do acordo com o Irã. A contradição entre a declaração do Paquistão e as posições de Israel e EUA criou uma confusão diplomática que o ministro da economia do Líbano, em entrevista à CNBC em 8 de abril, descreveu como "sinais mistos" que deixaram o país em uma situação de incerteza angustiante.</p>

<h4>8 de Abril — O Dia Mais Letal da Guerra Atual</h4>
<p>Enquanto o mundo comemorava o cessar-fogo EUA–Irã, Israel lançou o que as Forças de Defesa de Israel (IDF) chamaram de "a maior onda coordenada de ataques no Líbano" desde o início do conflito. Em apenas 10 minutos, mais de 100 alvos do Hezbollah foram atingidos simultaneamente em Beirute, no sul do Líbano e no Vale do Bekaa. O ataque matou pelo menos 254 pessoas em um único dia, segundo a Defesa Civil Libanesa — tornando-se um dos dias mais mortais da guerra. Explosões poderosas sacudiram bairros densamente povoados de Beirute, incluindo Barbour, Corniche Al Mazraa, Ain Al Mreisseh e Burj Abi Haidar — áreas centrais da capital, não os subúrbios do Hezbollah. Um ataque noturno contra um prédio em frente ao Hospital Hiram em Al-Aabbassiye, perto da cidade de Tiro (Tyre), matou quatro pessoas e danificou o hospital. Israel emitiu uma ordem de evacuação para toda a cidade de Tiro, sinalizando novos ataques iminentes contra a histórica cidade costeira.</p>

<h4>Os Líderes e Responsáveis — Quem É Quem</h4>
<p>Para entender o conflito, é essencial conhecer os atores principais e seus papéis. Do lado israelense: o Primeiro-Ministro Benjamin Netanyahu comanda a estratégia geral e declarou que o Líbano não está no cessar-fogo; o Ministro da Defesa Israel Katz ordenou a zona de segurança até o Litani; o Ministro das Finanças Bezalel Smotrich, da extrema-direita, defende a anexação do sul do Líbano; e o Chefe do Estado-Maior das IDF supervisiona as operações militares. Do lado libanês: o Presidente Joseph Aoun (eleito em janeiro de 2025, general aposentado do exército) tenta equilibrar entre soberania nacional e a realidade do Hezbollah armado; o Primeiro-Ministro Nawaf Salam busca apoio diplomático internacional; e o secretário-geral do Hezbollah, Naim Qassem, que substituiu Hassan Nasrallah após seu assassinato em setembro de 2024, jurou lutar "até o fim" e rejeitou qualquer negociação direta com Israel. O Presidente Aoun criticou publicamente o Hezbollah por "violar seu compromisso de neutralidade" e "buscar o colapso do Líbano através da guerra e do caos", exigindo que o Exército Libanês (LAF) apreenda as armas do Hezbollah — uma ordem que, na prática, o LAF não tem capacidade militar para cumprir.</p>

<h4>O Financiamento do Hezbollah — De Onde Vem o Dinheiro</h4>
<p>O Hezbollah é a milícia não estatal mais bem financiada do mundo, e entender suas fontes de recursos é fundamental para compreender sua resiliência. A principal fonte é o Irã: estimativas do governo americano indicam que Teerã transferia entre US$ 700 milhões e US$ 1 bilhão por ano ao Hezbollah até 2024. Após a guerra de 2024, esse valor dobrou — segundo relatórios da inteligência americana, o Irã enviou cerca de US$ 2 bilhões ao Hezbollah entre 2024 e 2025 para financiar a reconstrução militar. Desde janeiro de 2025, a Força Quds do IRGC transferiu mais de US$ 1 bilhão, principalmente através de casas de câmbio informais (hawalas) e empresas de fachada nos Emirados Árabes Unidos, que emergiu como um hub financeiro para transferências iranianas ao Hezbollah, segundo investigação do Wall Street Journal. Além do financiamento iraniano, o Hezbollah opera uma vasta rede de empresas legítimas no Líbano (supermercados, imobiliárias, postos de gasolina), cobra impostos em áreas que controla, e tem operações ilícitas globais incluindo tráfico de drogas na América Latina (especialmente cocaína via Venezuela e Paraguai), lavagem de dinheiro na África Ocidental, e comércio de diamantes de sangue na Serra Leoa. O Tesouro americano sancionou dezenas de operativos do Hezbollah por explorar a economia baseada em dinheiro vivo do Líbano para financiar operações.</p>

<h4>A Posição do Vice-Presidente Vance</h4>

<h3>O Colapso Econômico de um País já Falido</h3>
<p>O Líbano não entrou nessa guerra como um país saudável — entrou como um país em estado de falência. Desde 2019, o Líbano sofre a pior crise econômica de sua história moderna, com o PIB caindo acumuladamente quase 40% até o final de 2024. O sistema bancário colapsou em outubro de 2019, congelando as economias de milhões de libaneses. A moeda nacional, a libra libanesa, perdeu mais de 95% de seu valor em relação ao dólar (de 1.500 para mais de 90.000 por dólar no mercado paralelo). A explosão no porto de Beirute em agosto de 2020 — quando 2.750 toneladas de nitrato de amônio armazenadas negligentemente explodiram, matando 218 pessoas e destruindo metade da capital — agravou a catástrofe. Em 2025, o país começava a mostrar sinais tímidos de recuperação sob o novo governo de Joseph Aoun, mas a guerra de 2026 destruiu qualquer esperança de retomada.</p>
