  {id:'cd_mod2',name:'Análise e Visualização de Dados',free:false,topics:[4,5,6],summary:{title:'Resumo do Módulo 2: Análise e Visualização de Dados',points:['Análise exploratória descobre padrões antes de modelagem','Visualização transforma números em insights visuais compreensíveis','Correlação não implica causalidade, cuidado com conclusões erradas','Dashboards e relatórios comunicam insights a stakeholders']},quizFinal:[{q:'O que é EDA (Exploratory Data Analysis)?',opts:['Exame Detalhado de Algoritmos','Exploração de padrões antes de modelagem profunda','Educação em Data Analytics','Nenhum desses'],correct:1},{q:'Por que visualização de dados é crítica?',opts:['Parece bonito','O cérebro processa imagens 60 mil vezes mais rápido que texto','Usa menos memória','Estatisticamente prova tudo'],correct:1},{q:'Correlação 0.9 entre duas variáveis significa o quê?',opts:['Causa garantida','Forte relação, mas não causalidade','Sem relação','Erro estatístico'],correct:1}]},

  {id:1,name:'O que é Ciência de Dados',dur:'16 min',content:`<h3>Transformando Dados em Conhecimento Poderoso</h3><p>Bem-vindo ao fascinante mundo de Ciência de Dados! Estou absolutamente animado em compartilhar esse universo onde números viram decisões, padrões viram estratégia, e conhecimento viram poder!</p><p>Ciência de Dados é uma disciplina que combina estatística, programação, domínio de negócios e intuição para extrair conhecimento valioso de dados. Não é apenas análise — é transformação! Um mestre de Ciência de Dados pega dados brutos, confusos, incompletos e transforma em insights claros que mudam decisões.</p><p>Pense nisso: toda vez que você compra algo no e-commerce, um algoritmo aprendeu. Quando Netflix recomenda um filme, Ciência de Dados trabalhou. Quando um banco aprova seu crédito em segundos, análise de dados decidiu. Quando campanha de marketing atinge exatamente seu público, ciência de dados foi precisa!</p><p>Os dados são o "ouro" da era moderna — mas ouro bruto é feio e não vale nada. Precisa ser refinado! Cientista de dados é o refinador. Pega dados caóticos e transforma em puro ouro: conhecimento acionável.</p><p>Ciência de Dados inclui várias fases: 1) Definição do problema (o que realmente queremos descobrir?), 2) Coleta de dados (aonde achamos dados relevantes?), 3) Limpeza (remover ruído, tratar valores faltando), 4) Exploração (padrões interessantes?), 5) Modelagem (qual modelo prevê melhor?), 6) Validação (será que funciona em dados reais?), 7) Comunicação (como explicar isso ao chefe?).</p><p>Profissionais em Ciência de Dados ganham extremamente bem. Um Data Scientist sênior em São Paulo, 2025, pode ganhar 150-250 mil reais por ano. Em Silicon Valley? Facilmente 200-400 mil dólares anuais! Por quê? Porque dados bem analisados podem gerar bilhões em valor.</p><p>Mas aqui está o segredo: 80% do trabalho em Ciência de Dados é "data wrangling" — limpeza e preparação de dados. Ninguém fala da parte chata, mas é a realidade. Encontrar dados com problemas, valores faltando, formatos errados, duplicatas — tudo precisa ser consertado antes de qualquer análise interessante.</p><p>Ferramentas populares de Ciência de Dados em 2025-2026 incluem: Python (linguagem padrão), SQL (consultas em banco de dados), Pandas (manipulação de dados), scikit-learn (machine learning), TensorFlow/PyTorch (deep learning), Tableau/Power BI (visualização), Jupyter Notebooks (ambiente interativo).</p><p>Um termo importante é "Big Data" — lidar com volumes enormes de dados. Terabytes, petabytes. Dados que não cabem em um computador comum. Para Big Data, você usa ferramentas como Hadoop, Spark, e cloud computing (AWS, Google Cloud, Azure).</p><p>Dados podem ser estruturados (tabelas, números) ou não-estruturados (imagens, vídeos, textos). Estruturado é mais fácil de analisar. Não-estruturado requer técnicas especiais como Deep Learning e NLP (processamento de linguagem natural).</p><p>A verdade é: em 2026, dados é vantagem competitiva. Empresas que usam bem seus dados derrotam as que não usam. Por isso, demanda por Data Scientists, Data Analysts e especialistas em dados é absolutamente explosiva. Se você aprende isso bem, futuro é seu!</p>`,cards:[{q:'Qual é o objetivo final de Ciência de Dados?',a:'Transformar dados brutos em insights acionáveis que orientem decisões estratégicas de negócio.'}]},
  {id:2,name:'Estatística, Dados e Big Data',dur:'18 min',content:`<h3>Os Números por Trás: Estatística e Big Data</h3><p>Para entender Ciência de Dados profundamente, precisa dominar estatística. Mas não se preocupe — não vamos para equações complexas. Vamos à intuição!</p><p>Estatística DESCRITIVA resume dados: média, mediana, desvio padrão. Se você tem notas de 100 alunos, média 7.5 é descritiva — resume tudo em um número. Estatística INFERENCIAL usa amostra para concluir sobre população. Pesquisa com 1000 pessoas prevê eleição para 200 milhões. Inferência!</p><p>Distribuição normal (curva de sino) é fundamental. Muitos fenômenos naturais seguem distribuição normal: altura de pessoas, QI, notas de testes. Outliers (valores extremos) são importantes — podem indicar erro ou algo realmente anômalo!</p><p>Correlação mede relação entre variáveis. Correlação de 0.9 entre "horas estudadas" e "nota na prova"? Forte correlação positiva — mais estudo, melhor nota. Mas aqui vem a lição crucial: CORRELAÇÃO NÃO IMPLICA CAUSALIDADE! Vendas de sorvete correlacionam com nados em piscina, mas sorvete não causa nados — calor causa ambos!</p><p>Esse erro é comum até em relatórios profissionais. Analista vê correlação, assume causa, toma decisão errada. Cuidado!</p><p>BIG DATA é caracterizado pelos "3 Vs": Volume (quantidade gigantesca), Velocidade (dados chegam rapidamente, precisa processar em tempo real), Variedade (diferentes tipos, estruturas, fontes). Um quarto V foi adicionado: Veracity (confiabilidade, qualidade).</p><p>Exemplos de Big Data: streaming de vídeo (YouTube processa 500 horas de vídeo por minuto!), dados de IoT (sensores em carros, casas, cidades), redes sociais (Twitter tem 500 milhões de tweets por dia), transações bancárias (bilhões por dia).</p><p>Para processar Big Data, você precisa arquitetura distribuída. Conceitos como MapReduce, Hadoop, Spark permitem dividir trabalho entre múltiplos computadores. Um único computador nunca processaria todos os tweets do Twitter em tempo útil. Mas se dividir entre 1000 máquinas, fica fácil!</p><p>Cloud computing revolucionou Big Data. Ao invés de comprar servidores (capital upfront, manutenção), você aluga computação (pagando por uso). AWS, Google Cloud, Azure oferem infraestrutura escalável. Precisa processar 1 petabyte? Contrata 10000 máquinas por uma hora, processa, desliga. Custo marginal!</p><p>Data Lakes são repositórios que armazenam dados brutos de múltiplas fontes. Diferente de Data Warehouse que é estruturado, Data Lake é como um "pântano controlado" — tudo vai lá, depois você extrai o que precisa. Padrão moderno em empresas grandes!</p><p>A qualidade de dados é crítica. Garbage in, garbage out! Se seus dados têm valores faltando (missing values), duplicatas, formatos inconsistentes, análise será errada. Por isso, engenheiros de dados gastam semanas limpando dados antes de cientista de dados começar análise real.</p><p>Um conceito importante é "Sampling" — você não pode analisar 1 bilhão de registros em tempo razoável. Então você pega amostra representativa de 1 milhão (0.1%) e analisa. Se amostra for aleatória e grande, resultados generalizam para população inteira. Estatística permite isso!</p><p>Por fim, há ferramentas impressionantes em 2025-2026 para trabalhar com dados: DuckDB (SQL super rápido), Polars (Pandas mas 10x mais rápido), Ray (computação distribuída), Delta Lake (data lake com confiabilidade). Mundo de dados evolui incrivelmente rápido!</p>`,cards:[{q:'Por que é importante não confundir correlação com causalidade?',a:'Duas variáveis podem estar correlacionadas mas uma não causa a outra — um terceiro fator pode estar causando ambas, levando a decisões erradas.'}]},
  {id:3,name:'Coleta, Limpeza e Preparação de Dados',dur:'17 min',content:`<h3>O Trabalho Invisível: Preparando Dados para Análise</h3><p>Aqui vem a verdade que ninguém gosta de falar: 80-90% do tempo em um projeto de dados é gasto em coleta, limpeza e preparação. Ninguém acha isso emocionante! Mas é absolutamente crítico. Dados ruins geram análises ruins e decisões piores.</p><p>COLETA DE DADOS é a primeira etapa. Aonde vêm dados? Podem ser de: bancos de dados da empresa (mais comuns), APIs (integrações com serviços externos), crawling de websites, sensores IoT, pesquisas, logs de aplicações, etc.</p><p>Problema: dados de múltiplas fontes têm formatos diferentes. Um banco de dados usa data como "2026-04-15", outro usa "15/04/2026". Um arquivo de vendas tem números com vírgula (1.000,50), outro com ponto (1000.50). Normalizar é essencial!</p><p>QUALIDADE DE DADOS é crítica. Problemas comuns: Valores Faltando (Missing Values) — onde cliente deixou campo em branco, sensor falhou. Como tratar? Pode remover registros, preencher com média/mediana, usar algoritmos sofisticados. Depende! Duplicatas — mesmo cliente aparece 2 vezes. Remove uma. Outliers — valores extremos. Alguns são erros (altura de 500m), outros são reais (pessoa muito rica).</p><p>Inconsistência — país escrito como "Brasil", "BRASIL", "BRA". Precisa padronizar! Erros de digitação — email "joao@gmai.com" (faltou l) de "gmail.com". Pode usar técnicas de fuzzy matching para detectar. Dados desatualizados — você usa base de dados que tem clientes de 2020, mas são 2026!</p><p>TRANSFORMAÇÃO DE DADOS é onde magia acontece. Você pega dados brutos e transforma em formato útil. Exemplos: Engenharia de Features — cria novas variáveis. Se tem "data de nascimento", cria "idade". Se tem "salário" e "nível de educação", cria "salário por ano de educação". Features inteligentes melhoram modelos drasticamente!</p><p>Normalização e Scaling — transforma variáveis para mesma escala. Se tem altura (150-200 cm) e peso (50-120 kg), escalas são diferentes. Alguns algoritmos precisam de escalas similares. Normaliza ambas para 0-1 ou -1 a 1.</p><p>Encoding de Categóricas — variáveis categóricas (cores, países, sexo) não são números. Como você processa "Vermelho" em um algoritmo? Pode usar one-hot encoding: "Vermelho" vira [1,0,0], "Azul" vira [0,1,0], "Verde" vira [0,0,1]. Agora algoritmo entende!</p><p>Remoção de Outliers — valores muito extremos podem deslocar análise. Se maioria ganha 5-10 mil reais, mas um milionário está no dataset, pode distorcer. Pode remover, pode usar técnicas robustas que os ignoram.</p><p>Amostragem — se dataset é gigantesco (1 bilhão de registros), não consegue analisar tudo. Pega amostra aleatória estratificada de 1 milhão (mantendo proporções de categorias). Análise fica 1000x mais rápida!</p><p>Balanceamento — em problemas de classificação, classes podem ser desbalanceadas. 95% de transações são legítimas, 5% são fraude. Se modelo aprende apenas a dizer "tudo é legítimo", acerta 95% mas falha no que importa! Técnicas como SMOTE (Synthetic Minority Oversampling) criam dados sintéticos da classe minoritária.</p><p>Validação de Dados — após preparar, você valida. Verificações: existem valores faltando ainda? Duplicatas? Formatos estão corretos? Ranges fazem sentido? É como verificação de qualidade na fábrica!</p><p>Em Python, você usa principalmente: Pandas (manipulação de dados em dataframes), NumPy (operações numéricas), Scikit-learn (transformação e modelagem). Workflow típico: load dados com Pandas → explore com NumPy → limpa e transforma com Pandas → modelo com Scikit-learn.</p><p>Um último conselho: documente seu processo! Quando remove outliers, registra quantos e por quê. Quando preenche valores faltando com média, deixa nota. Seu eu futuro (e outros analistas) vão agradecer!</p>`,cards:[{q:'Por que limpeza e preparação de dados leva 80% do tempo em projetos?',a:'Dados do mundo real têm qualidade ruim, formatos inconsistentes, valores faltando, duplicatas, erros — tudo precisa ser tratado antes da análise real.'}]},
  {id:4,name:'Análise Exploratória e Visualização',dur:'16 min',content:`<h3>Descobrindo Padrões: EDA e Visualização</h3><p>Dados estão prontos! Agora vem a diversão: Análise Exploratória de Dados (EDA). O objetivo? Descobrir padrões, anomalias, relationships antes de qualquer modelagem.</p><p>EDA é processo investigativo. Você não começa com hipótese — explora! Que variáveis têm distribuição normal? Existem outliers óbvios? Quais variáveis correlacionam? Há missingness pattern (valores faltando de forma não aleatória)? Esses insights guiam análise futura.</p><p>Ferramentas de EDA: Pandas describe() (estatísticas: média, mediana, desvio padrão, quartis), Seaborn (visualização estatística), Plotly (gráficos interativos), Pandas Profiling (gera relatório EDA automático!).</p><p>Distribuição é conceito chave. Histogramas mostram: valores estão distribuídos simetricamente? Há skew (cauda longa à esquerda ou direita)? É bimodal (dois picos)? Distribuição normal é comum, mas muitos dados reais não são normais. Entender distribuição guida qual transformação usar.</p><p>Boxplots mostram mediana, quartis, outliers de forma visual. Se tem muitos pontos acima do bigode superior, são outliers — investigar!</p><p>Scatter plots mostram relação entre duas variáveis. Pontos em linha diagonal? Correlação forte! Nuvem aleatória? Sem relação. Padrão curvo? Relação não-linear!</p><p>Heatmaps de correlação mostram: quais variáveis correlacionam? Cor mais quente = mais forte. Investigar correlações altas (>0.8) — podem ser redundantes ou ter causalidade.</p><p>Visualização é comunicação! Gráfico bem feito vale 1000 palavras de estatísticas. CEOs entendem gráfico em 3 segundos, tabela de números? Perdem a paciência! Por isso, visualização é skill crítica!</p><p>Boas práticas em visualização: Escolha tipo certo (barras para categorias, linha para tempo, scatter para relação), use cores com propósito (não 10 cores aleatórias), rotule eixos claramente, inclua título e legenda, evite "chart junk" (decorações sem propósito).</p><p>Exemplos de visualização impactante: Antes e depois (lado a lado mostra mudança), funis (mostra progressão e onde pessoas caem), treemaps (hierarquia de dados), área empilhada (composição ao longo do tempo).</p><p>Storytelling com dados é arte. Você não mostra TUDO. Mostra a história! "Churn aumentou 10% porque clientes enterprise saem 3 meses após onboarding. Vamos investigar fricção no processo de onboarding." Narrativa! Impacto!</p><p>Ferramentas modernas: Tableau, Power BI, Looker criam dashboards interativos. Usuários exploram dados clicando. BI evolved: não apenas relatórios estáticos, mas exploração dinâmica!</p>`,cards:[{q:'Qual é o objetivo de Análise Exploratória de Dados (EDA)?',a:'Descobrir padrões, correlações, anomalias e distribuições nos dados ANTES de modelagem para guiar análise subsequente.'}]},
  {id:5,name:'Machine Learning para Previsão',dur:'18 min',content:`<h3>Prevendo o Futuro: Machine Learning em Ação</h3><p>Com dados limpos e explorados, agora vem o emocionante: prever futuro com Machine Learning! Você treina modelo com dados históricos, modelo aprende padrões, depois prevê dados novos.</p><p>Fluxo de ML é: 1) Preparar dados (treino, validação, teste), 2) Escolher algoritmo, 3) Treinar, 4) Avaliar (quão bem funciona?), 5) Tunar hyperparameters, 6) Deploy em produção.</p><p>Dados devem ser divididos: Treino (60-70% — modelo aprende aqui), Validação (10-15% — ajusta hyperparameters), Teste (10-15% — avalia desempenho final NÃO visto pelo modelo). Nunca treina com dados de teste — seria cheating!</p><p>Algoritmos populares: Regressão Linear (prediz valor contínuo como preço), Logística (classifica: sim/não, A/B/C), Random Forest (ensemble de árvores, robusto), Gradient Boosting (XGBoost, LightGBM — estado-da-arte), SVM (máquinas de vetor suporte, bom para classificação), Neural Nets (redes neurais para dados complexos).</p><p>Escolher algoritmo? Não existe "melhor" — depende! Dados simples? Regressão linear é rápida, interpretável. Dados complexos e caóticos? Gradient Boosting. Imagens? CNN. Textos? Transformers. Experiência guia!</p><p>Treinamento é otimização matemática. Modelo começa com pesos aleatórios, faz previsão ruim, calcula erro (loss), ajusta pesos para reduzir erro. Repetição até convergência (erro mínimo). Algoritmo de otimização mais comum: Gradient Descent (pequenos passos na direção que reduz erro).</p><p>Hyperparameters são configurações que você escolhe (não são aprendidas). Exemplo: Learning Rate (tamanho do passo em gradient descent) — muito alto, overshoot; muito baixo, converge lentamente. Tuning é arte — grid search, random search, Bayesian optimization ajudam!</p><p>Overfitting é problema clássico. Modelo memoriza dados de treino, acerta 99% em treino, mas falha em dados novos! Sinais: gap gigantesco entre accuracy de treino vs. validação. Soluções: regularização (penaliza modelo complexo), early stopping (para treinamento antes de overfit), mais dados, dropout (neural nets).</p><p>Métricas de desempenho: Classificação usa Accuracy (percentual correto), Precision (de positivos preditos, quantos eram corretos), Recall (de positivos reais, quantos achamos), F1 (harmônica de precision/recall). Regressão usa MAE (erro médio absoluto), RMSE (raiz do erro quadrático médio), R² (variância explicada).</p><p>Qual métrica importa? Depende do problema! Detectar câncer: Recall é crítico (não perder caso real), Precision menos. Email spam: Precision é crítico (não mandar email legítimo para spam), Recall menos. Business priority define métrica!</p><p>Desafio: classe desbalanceada. 1% fraude, 99% normal. Modelo que sempre diz "não é fraude" acerta 99%! Mas falha no objetivo. Solução: Threshold tuning, SMOTE, weighted loss, usar métrica diferente (Recall de fraude).</p><p>Interpretabilidade importa em produção! Se modelo nega seu empréstimo, você quer saber por quê! SHAP values, LIME explicam quais features mais influenciaram previsão. Caixa branca vs. caixa preta!</p>`,cards:[{q:'Como overfitting prejudica desempenho de modelos ML?',a:'Modelo memoriza dados de treino em vez de aprender padrões, causando 99% accuracy em treino mas desempenho ruim em dados novos.'}]},
  {id:6,name:'Métricas, ROI e Decisões Comerciais',dur:'16 min',content:`<h3>Do Modelo para Negócio: KPIs e ROI</h3><p>Um modelo que acerta 95% é incrível... se importa para negócio! Se acerta predição de "que cliente vai clicar em anúncio" mas decisão leva a pior ROI que alternativa simples, modelo é inútil. Conexão com negócio é CRÍTICA!</p><p>KPIs (Key Performance Indicators) traduzem métricas técnicas em linguagem de negócio. Ao invés de "RMSE = 0.12", fale "Em média, preço previsto desvia 12% do preço real". Ou melhor, "A+ ou B model aumenta receita em 2.5% vs. baseline?"</p><p>ROI (Return on Investment) é métricas final. Projeto custa 100k em salários + infraestrutura. Gera economia de 500k em automação? ROI = (500-100)/100 = 400%. Excelente! Projeto custa 100k, gera 80k? ROI negativo — não vale.</p><p>Baseline é importante! Seu modelo super sofisticado acerta 90%. Mas modelo simples (sempre chutar a classe mais comum) também acerta 90% se dados são 90% desbalanceados! Baseline prova que modelo agregou valor real.</p><p>A/B testing valida impacto real. Você tem novo modelo? Teste com 10% de usuários, mantenha 90% com modelo antigo. Compare: modelo novo converteu melhor? Retenção melhor? ROI melhor? Se sim, roll out! Se não, volta ao antigo. Científico!</p><p>Tipos de testes: Control (baseline), Treatment (seu modelo novo), Statistical Significance (P < 0.05 significa é "real" resultado, não apenas sorte). Tamanho de amostra importa! Efeito muito pequeno precisa de amostra gigantesca para detectar (3+ semanas A/B test).</p><p>Métrica é obsessão em tech. Qualquer decisão (design novo, feature, modelo) é testada. Aumenta metrica primary? Roll out. Diminui? Revert. Cultura de dados!</p><p>Apresentando insights: Exec não quer matemática. Quer: "Action X aumenta metric Y em Z%". Simples! Com número grande (% aumento ou economia em reais). Contexto (por que importa?). Recomendação (o que fazer?).</p><p>Exemplo perfeito: "Clientes que completam onboarding em <5 minutos têm 2x retention em 30 dias. Recomendação: Simplificar fluxo de onboarding (pode gerar +50% retention, ~2 milhões/ano economizados)." — ISSO é comunicação de dados!</p><p>Pitfalls: Olhar para muitas métricas, uma vai estar "boa" por acaso (múltiplo testing problem — diga 20 moedas, uma sai 4 caras seguidas, é sorte!). Solução: Pre-register métrica primary, análise secundário, correção Bonferroni em testes múltiplos.</p><p>Outro pitfall: Simpson's Paradox — tendência reverte quando dados são subgrouped. Exemplo: Medicamento A é melhor globalmente, mas piora para cada subgrupo! Sempre examine dados estratificados por categorias importantes.</p>`,cards:[{q:'Por que ROI é mais importante que acurácia técnica de modelo?',a:'ROI conecta desempenho técnico a impacto em negócio — modelo 99% accuracy que não gera receita vale menos que modelo 85% que economiza milhões.'}]}
];
