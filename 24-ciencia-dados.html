        <h3>Python: Linguagem de Facto em Ciência de Dados</h3>
        <p>Python domina data science não por ser "mais rápido" que C++ ou "mais elegante" que R, mas porque tem ecossistema coeso e comunidade massiva. NumPy para operações numéricas, Pandas para manipulação de dados, Scikit-Learn para ML, Matplotlib/Seaborn para visualização. Tudo integra naturalmente.</p>

        <h4>NumPy: Arrays e Operações Vetorizadas</h4>
        <p>NumPy é fundação de data science em Python. Fornece ndarray: array multi-dimensional homogêneo (todos elementos mesmo tipo). Diferente de listas Python que são heterogêneas (podem misturar tipos).</p>

        <p><strong>Por que NumPy é tão rápido?</strong> Implementado em C, dados contíguos em memória, operações vetorizadas (SIMD). Operação que levaria 1 segundo em loop Python explícito leva milissegundos em NumPy.</p>

          <li><strong>Operações Matemáticas:</strong> np.sum(), np.mean(), np.std(), np.dot(), np.linalg.inv(), np.fft.fft()</li>

        </ul>

        <blockquote class="example">

        <h4>Pandas: DataFrames e Manipulação de Dados</h4>
        <p>Pandas é "SQL para Python". Estrutura de dados chave é DataFrame: tabela com rows e columns, como spreadsheet ou SQL table, mas muito mais poderoso.</p>

          <li><strong>Handling Missing:</strong> df.fillna(), df.dropna(), df.interpolate()</li>
          <li><strong>Apply:</strong> df['coluna'].apply(função_custom) aplica função a cada elemento</li>
          <li><strong>String Operations:</strong> df['texto'].str.upper(), .str.contains(), .str.split()</li>

        <p><strong>Performance Tips:</strong></p>
        <ul>
          <li>Use .loc[]/. iloc[] em vez de loops. Vetorização é sempre melhor.</li>
          <li>Categorias reduzem memória: df['cat'].astype('category'). Útil se coluna tem poucos valores únicos.</li>
          <li>Chunks: se arquivo gigante, ler em pedaços. pd.read_csv(file, chunksize=10000)</li>
          <li>Índices: bem-escolhidos índices aceleram lookup. df.set_index('chave')</li>
        </ul>

        <h4>Exploração e Limpeza de Dados</h4>
        <p><strong>EDA (Exploratory Data Analysis):</strong> Primeiros passos ao receber dataset novo.</p>

        <h3>Estatística: Língua da Incerteza</h3>
        <p>Data science é aplicação de estatística em escala. Entender distribuições, testes hipóteses, confiança é essencial. Sem estatística, você apenas vê padrões aleatórios nos dados.</p>

        <h4>Conceitos Fundamentais</h4>
        <p><strong>População vs Amostra:</strong> População é universo completo (ex: todos brasileiros). Amostra é subset que coletamos (ex: 1000 respondentes de survey). Estatística estima parâmetros populacionais a partir de amostras.</p>

        <p><strong>Distribuição Normal:</strong> Distribuição em forma de sino. Muitos fenômenos naturais seguem aproximadamente normal (altura, peso, QI). Definida por média (μ) e desvio padrão (σ). 68% de dados dentro 1σ da média, 95% dentro 2σ, 99.7% dentro 3σ.</p>

        <p><strong>Outras Distribuições Importantes:</strong> Binomial (sucessos em n tentativas), Poisson (eventos raros), Exponencial (tempo entre eventos), Uniforme (igual probabilidade).</p>

        <p><strong>Correlação e Causação:</strong> Correlação mede associação linear entre variáveis. Correlação ≠ causação! Exemplo: sorvete consumido vs afogamentos correlacionam (ambos por causa de verão), mas sorvete não causa afogamento.</p>

        <h4>Testes de Hipótese</h4>
        <p>Decisão estatística baseada em dados. Estrutura formal:</p>

        <ul>
          <li><strong>H0 (Null Hypothesis):</strong> Afirmação padrão. Exemplo: "Moeda é justa (probabilidade cabeça = 0.5)"</li>
          <li><strong>H1 (Alternative Hypothesis):</strong> Afirmação que testamos. Exemplo: "Moeda é viesada (probabilidade cabeça ≠ 0.5)"</li>
          <li><strong>p-value:</strong> Probabilidade de observar dados tão extremos quanto observado se H0 fosse verdadeira. Se p < 0.05, rejeitamos H0 (nível de significância = 5%).</li>
          <li><strong>Type I Error (False Positive):</strong> Rejeitamos H0 quando era verdadeira. Probabilidade = α (significance level).</li>
          <li><strong>Type II Error (False Negative):</strong> Não rejeitamos H0 quando era falsa. Probabilidade = β. Power = 1 - β.</li>
        </ul>

        <p><strong>Testes Comuns:</strong></p>
        <ul>
          <li><strong>T-test:</strong> Compara médias de dois grupos. One-sample (média população), two-sample (duas amostras), paired (antes/depois).</li>
          <li><strong>Chi-Squared Test:</strong> Testa associação entre variáveis categóricas.</li>
          <li><strong>ANOVA:</strong> Compara médias de 3+ grupos. F-test.</li>
          <li><strong>Correlation Test:</strong> Testa se correlação é significativa (não apenas acaso).</li>
        </ul>

        <blockquote class="example">
          <strong>📌 Exemplo:</strong> Novo medicamento vs placebo. H0: "Medicamento não funciona (mesma média de melhoria)". Experimento: 100 pessoas com medicamento, 100 com placebo. Medicamento: média melhoria 5 pontos, placebo: 3 pontos. P-value = 0.001 < 0.05. Rejeitamos H0. Medicamento é significativamente melhor que placebo!
        </blockquote>

        <h4>Intervalos de Confiança</h4>
        <p>Em vez de dar estimativa puntual (ex: "média é 100"), intervalos de confiança dão faixa. "95% confiança, média está entre 95-105". Expressa incerteza.</p>

        <p><strong>Interpretação Correta:</strong> "Se repetíssemos experimento múltiplas vezes, em 95% delas o intervalo calculado conteria o parâmetro real." NÃO é "95% chance que parâmetro está neste intervalo específico" — o parâmetro é fixo!</p>

        <h4>Viés e Variância</h4>
        <p><strong>Viés:</strong> Erro sistemático. Balança descalibrada sempre mede 2kg a mais.</p>

        <p><strong>Variância:</strong> Erro aleatório. Medições flutuam ao redor do valor verdadeiro.</p>

        <p><strong>Trade-off:</strong> Modelos simples (ex: regressão linear) tem viés alto, variância baixa. Modelos complexos (ex: deep NN) tem viés baixo, variância alta. Equilíbrio é arte.</p>

        <h4>Regressão e Correlação</h4>
        <p><strong>Coeficiente de Correlação (Pearson):</strong> -1 (correlação negativa perfeita) a +1 (positiva perfeita), 0 = sem relação linear.</p>

        <p><strong>R² (Coeficiente de Determinação):</strong> Proporção de variância em Y explicada por X. R² = 0.8 significa 80% da variação em Y é explicada pelo modelo.</p>

        <p><strong>Regressão Linear:</strong> y = mx + b. Encontra m e b que minimizam erro quadrado. Interpretável: "para cada aumento de 1 em X, Y aumenta em m".</p>

        <blockquote class="tip">
          <strong>💡 Insights:</strong> Estatística não oferece certeza — oferece quantificação de incerteza. "Significância estatística" ≠ "significância prática". P-value 0.04 com tamanho de efeito tiny é estatisticamente significativo mas praticamente irrelevante.
        </blockquote>

        <p>Neste tópico, você pensa como estatístico: com ceticismo, rigor, quantificação de incerteza!</p>

        <h4>Matplotlib: Fundação de Plotagem em Python</h4>

        <h4>Seaborn: Matplotlib Beautificado</h4>

        <h4>Princípios de Visualização Efetiva</h4>

        <p><strong>2. Honestidade:</strong> Não distorça dados. Eixos Y começando em valor não-zero podem exagerar diferenças. Cor malcomendada pode sugerir padrão falso.</p>

        <p><strong>3. Escolha do Gráfico Certo:</strong> Histograma para distribuição, scatter para relação, bar chart para comparação categorias, linha para série temporal. Errar em escolha prejudica comunicação.</p>

        <p><strong>4. Proporção Dados-Tinta:</strong> Maximizar razão de dados mostrados vs tinta usada (no jargão, "data-ink ratio"). Gridlines desnecessárias, cores vibrantes que distraem são ruim.</p>

        <p><strong>5. Acessibilidade:</strong> Não confie em cor para diferenciar (5-8% homens daltônicos). Use padrão + cor. Fontes legíveis (não <8pt), alto contraste.</p>

        <h4>Dashboard e Visualizações Interativas</h4>
        <p><strong>Plotly:</strong> Biblioteca Python que cria gráficos interativos (hover mostra valor, zoom/pan, legend clickable). Excelente para dashboards.</p>

        <p><strong>Streamlit:</strong> Framework que transforma script Python em webapp interativa com mínimo de código. Ideal para demos, dashboards, aplicações data-driven.</p>
