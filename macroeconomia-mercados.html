        dur: '13 min',
        content: '<h3>Bancos Centrais, Política Monetária e Taxa de Juros</h3><p>Banco Central é instituição mais poderosa em economia moderna. Controla oferta de moeda e taxas de juros. Toda empresa, pessoa, governo sente efeito das decisões de Banco Central. Quando sobe juros, hipoteca fica cara, empresa adia investimento, consumidor reduz gasto. Quando reduz, acontece inverso. Poder é imenso.</p><p><strong>Política Monetária</strong> é conjunto de ações que Banco Central toma para influenciar oferta de moeda e juros. <strong>Aperto monetário</strong> (aumenta juros, reduz oferta de moeda) resfria economia, ajuda a controlar inflação. <strong>Flexibilização</strong> (reduz juros, aumenta oferta de moeda) aquece economia, estimula crescimento. Banco Central enfrenta dilema: controlar inflação ou estimular crescimento?</p><p>A <strong>taxa de juros básica</strong> (SELIC no Brasil, federal funds rate nos EUA, taxa de refinanciamento no ECB) é a taxa que Banco Central controla diretamente. Afeta todas as outras taxas na economia: hipoteca, empréstimo de carro, cheque especial, retorno de poupança. Se Banco Central aumenta SELIC de 10% para 12%, hipoteca de 8% sobe para aproximadamente 10% (margem permanece). Consumidor compra menos imóvel porque fica caro.</p><blockquote class="tip">💡 <em>Dica: Banco Central pode controlar juros mas não pode forçar banco a emprestar. Em crise, mesmo com juros zero, banco recusa crédito (fear). Isso aconteceu em 2008.</em></blockquote><h4>Mecanismos de Transmissão de Política Monetária</h4><p>Como mudança de juros afeta economia real (empregos, produção)? Há vários canais: (1) <strong>canal de crédito</strong>: juros altos reduz demanda de crédito, empresa não investe, desemprego cresce. (2) <strong>canal de riqueza</strong>: juros altos reduz preço de ativos (ações, imóveis), pessoa se sente mais pobre, reduz consumo. (3) <strong>canal de expectativa</strong>: juros altos sinaliza que Banco Central está sério contra inflação, expectativas caem, inflação cai porque pessoas esperam inflação menor.</p><p>Transmissão não é instantânea. Geralmente leva 12-18 meses para mudança de juros afetar economia real. Banco Central deve agir prospectivamente (baseado em expectativas futuras, não só em dados presentes). Se espera inflação alta daqui a 12 meses, aumenta juros agora, mesmo que inflação atual seja baixa. Timing é crítico.</p><h4>Quantitative Easing (QE) e Expansão de Balanço</h4><p>Em crise severa, juros chegam a zero (ou negativo em alguns países). Banco Central não consegue mais reduzir juros. Mas pode fazer <strong>Quantitative Easing (QE)</strong>: compra ativos de longo prazo (títulos do governo, títulos corporativos, até ativos não convencionais) com dinheiro novo que cria. Isso injeta dinheiro na economia (aumenta oferta de moeda) mantendo juros baixos.</p><p>QE é controverso. Beneficia pessoas com muitos ativos (ações, imóveis sobem). Prejudica poupadores (juros em poupança são zero). Risco é inflação se QE é excessivo. Após 2008, FED fez QE massivo (balanço cresceu de R$ 900 bilhões para R$ 9 trilhões em dólares). Inflação foi controlada (deflação era risco). Após COVID, QE novamente. Desta vez, inflação explodia 2021-2023. Balanço de Banco Central cresceu, moeda em circulação cresceu 50%+, inflação bate em 9% em alguns países.</p><blockquote class="example">📌 <em>Exemplo: Banco Central Europeu manteve juros zero e fez QE 2015-2021 porque economia europeia era fraca, inflação baixa. Mas em 2022, inflação sobe (choque de energia). ECB sai de QE, aumenta juros rapidamente. Países periféricos (Itália, Grécia) com dívida alta sofrem (custo de refinanciar dívida sobe dramaticamente). Trade-off entre controlar inflação e manter países insolventes.</em></blockquote>',

        content: '<h3>Oferta Agregada, Demanda Agregada e Produção Nacional</h3><p>Macroeconomia estuda economia como um todo usando conceitos de oferta e demanda agregadas (não de produtos específicos, mas da economia inteira). <strong>Demanda Agregada (DA)</strong> é quantidade total de bens e serviços que consumidores, empresas, governo e estrangeiros querem comprar a diferentes níveis de preço. <strong>Oferta Agregada (OA)</strong> é quantidade total que produtores querem fornecer a diferentes níveis de preço.</p><p><strong>Equilibrium</strong> é onde DA = OA. Se DA > OA, há excesso de demanda, preços sobem (inflação). Se OA > DA, há excesso de oferta, preços caem (deflação). Banco Central e governo tentam manter equilíbrio, evitando inflação ou deflação severa.</p><p>Choque de demanda (exemplo: família reduz consumo porque confiança cai, ou governo reduz gasto): DA se desloca para baixo. Com OA constante, resultado é preços mais baixos (deflação) e quantidade menor. <strong>Recessão</strong> = redução de oferta agregada com demanda constante: inflação sobe, produção cai (estagflação = combinação de inflação e estagnação). Choque adverso de oferta é pior que choque de demanda porque sobe inflação mas reduz crescimento.</p><blockquote class="tip">💡 <em>Dica: choques de oferta (energia, pandemia, guerra) são mais difíceis de lidar que choques de demanda porque não há política que melhore ambos simultaneamente.</em></blockquote><h4>Capacidade Produtiva e Potential Output</h4><p><strong>Potential Output</strong> é quantidade máxima que economia pode produzir com recursos disponíveis (terra, trabalho, capital, tecnologia) com desemprego "natural" (~4-5%). Se economia produz menos que potential, há desemprego cíclico (slack). Se produz mais, desemprego fica muito baixo, inflação sobe.</p><p>Potencial cresce quando: (1) aumenta população ativa, (2) melhora educação/skill (trabalhador mais produtivo), (3) inovação tecnológica (máquina mais eficiente), (4) aumenta capital (fábrica nova). Países ricos têm crescimento de potencial ~1-2% ao ano. Países em desenvolvimento podem ser 5-7%. Brasil está ~1-2% (população envelhecendo, educação estagnada).</p><p><strong>Output Gap</strong> = Produção Atual / Potential Output - 1. Se atual é 95% de potential, gap é -5% (economia está abaixo de potencial, desemprego alto, inflação baixa). Se atual é 105% de potential, gap é +5% (economia está acima, desemprego baixo, inflação alta). Gap negativo é "bad" (desemprego), gap positivo é "temporarily good" mas insustentável (inflação explode).</p><blockquote class="example">📌 <em>Exemplo: Brasil 2012-2014 estava em gap positivo (~+2%). Crescimento era 2-3%, aparentemente bom. Mas inflação subiu para 6-7%, investimento caiu (estava "caro" fazer negócio com juros altos). Economia estava operando acima de potencial, insustentável. Depois 2015-2017, grande recessão, gap ficou -5%, desemprego explodiu para 13%.</em></blockquote>',

        content: '<h3>Dívida Pública, Solvência e Sustentabilidade Fiscal</h3><p>Governo gasta mais que arrecada frequentemente. Quando gasto > receita, há déficit. Governo financia com dívida (emite títulos). Dívida pública cresce quando: (1) déficit fiscal (gasto > receita), (2) juros sobre dívida existente (país com dívida alta e juros altos fica num loop: juros altos = mais despesa = mais déficit = mais dívida = juros permanecem altos).</p><p><strong>Dívida Pública / PIB</strong> é métrica de sustentabilidade. Se país tem PIB R$ 10 trilhões e dívida R$ 3 trilhões, razão é 30% (saudável). Se razão é 100%+ (dívida > PIB), é preocupante. Razão acima de 120% é insustentável (país não consegue refinanciar ou refinancia a taxa proibitiva). Exemplos: Japão tem 250%+ (sustenta porque taxa é zero + bônus doméstico = todos compram títulos). Grécia atingiu 190% em 2010 (insustentável, precisou de resgate do FMI).</p><blockquote class="tip">💡 <em>Dica: razão dívida/PIB aumenta quando crescimento é baixo (PIB não cresce) e juros são altos. Crescimento forte + juros baixos = reduz razão.</em></blockquote><h4>Dinâmica de Dívida</h4><p>Fórmula simplificada de mudança de dívida: Δ(Dívida/PIB) = (Juros - Crescimento) × (Dívida/PIB) + (Déficit/PIB). Se país tem dívida 80% PIB, crescimento 2%, juros 5%, déficit primário (gasto - receita antes de juros) de 2% PIB:</p><p>Δ = (5% - 2%) × 80% + 2% = 2.4% + 2% = 4.4%. Dívida cresce de 80% para 84.4% ao ano. Se continuar assim, atinge 100%+ em alguns anos e fica insustentável.</p><p>Para reduzir dívida: (1) <strong>aumentar crescimento</strong> (PIB cresce mais rápido que dívida), (2) <strong>reduzir juros</strong> (Banco Central reduz taxa, mas cria inflação), (3) <strong>cortar déficit</strong> (austeridade: reduz gasto ou aumenta impostos). Opção 1 é preferida (painless). Opções 2 e 3 são politicamente difíceis.</p><blockquote class="example">📌 <em>Exemplo: Brasil 2012 tinha dívida 55% PIB, parecia baixa. Mas déficit primário cresceu para 3%+, crescimento caiu para 0-2%, e juros foram 10%+. Dívida explodia. Em 2024, está 65%+ PIB e crescimento ainda é 2%, déficit ainda alto, juros 10.5%. Trajetória insustentável sem reformas estruturais.</em></blockquote><h4>Ciclo de Política Fiscal</h4><p><strong>Política Fiscal</strong> é gasto/impostos do governo. Em recessão, governo pode aumentar gasto ou reduzir impostos (estímulo) para manter demanda. Em expansão, governo deveria reduzir gasto ou aumentar impostos (austeridade) para não superaquecer economia. Idealmente, haveríamos ciclo balanceado: estímulo em recessão, austeridade em expansão.</p><p>Na prática, <strong>viés expansionista</strong> é comum. Em eleição, governo aumenta gasto/reduz impostos (popular). Quando recessão chega, governo não consegue cortar (impopular). Resultado: déficit permanece alto mesmo em boas épocas. Isso causa inflação crônica e dívida crescente.</p><p>Alguns países implementam <strong>regras fiscais</strong> (lei que limita déficit ou dívida). Exemplos: zona do euro limita déficit a 3% PIB. EUA tem "debt ceiling". Problema: regras rígidas podem ser contraproducentes em crise severa (país precisa gastar mais para evitar depressão). Equilíbrio é necessário.</p><blockquote class="news">📰 <em>Notícia: em 2024, Brasil debate reforma fiscal após alertas do FMI que dívida está insustentável. Opções: aumentar imposto (impopular), cortar gasto (prejudica serviços), reformar previdência (politicamente difícil).</em></blockquote>',

        dur: '15 min',
        content: '<h3>Mercados de Ações, Títulos e Moedas</h3><p>Mercados financeiros são onde capital flui. Empresas levantam dinheiro vendendo ações e títulos. Pessoas e instituições investem para retorno. Preços fluem refletindo expectativas sobre futuro. Entender dinâmica desses mercados é crítico para entender economia global.</p><p><strong>Mercado de Ações</strong> é onde acções (pedaços de propriedade) de empresas são negociadas. Quando compra ação, você é sócio (parcialmente). Se empresa tem lucro, pode distribuir dividendos. Se cresce, preço da ação sobe. Avaliação de ação é discutida constantemente: está barata ou cara? Analistas usam múltiplos como P/E (preço/lucro). Se empresa ganha R$ 10 por ação e ação custa R$ 100, P/E é 10x (você paga R$ 10 por cada R$ 1 de lucro). P/E 10x é barato? Depende de crescimento esperado. Se empresa cresce 20% ao ano, talvez seja barato. Se crescimento é 2%, é caro.</p><blockquote class="tip">💡 <em>Dica: mercados de ações sobem quando economia cresce, lucros aumentam, ou juros caem (tornando ações relativamente mais atrativas vs títulos).</em></blockquote><h4>Bolhas e Crashes de Ações</h4><p><strong>Bolha de ações</strong> é quando preços sobem muito acima de justificativa fundamentalista (lucros, crescimento). Acontece quando: (1) confiança é muito alta (otimismo excessivo), (2) crédito é abundante (pessoas alavancam para comprar ações), (3) FOMO (fear of missing out: medo de perder ganhos, todos compram). Quando realidade não acompanha preços, bolha estoura: vendas em pânico, preços caem rapidamente.</p><p>Exemplos: dot-com bubble (2000): internet estava crescendo, mas muitas empresas sem modelo de negócio viável foram supervalorizadas. Quando racionalizou, NASDAQ caiu 80%, muitas falências. Housing bubble (2008): imóveis eram precificados em níveis insustentáveis. Quando caíram, deixou pessoas e bancos insolventes.</p><p><strong>Mercado de Títulos (Bonds)</strong> é onde governo e empresas pegam emprestado vendendo títulos. Comprador de título recebe juros periódicos (cupom) e valor de face ao final. Se título paga 5% ao ano e você paga R$ 100, ganha R$ 5 por ano por 10 anos. Preço de título flutua inversamente a juros: quando juros sobem, título antigo (5%) fica menos atrativo, preço cai. Quando juros caem, título antigo (5%) fica atrativo, preço sobe.</p><h4>Yield Curve e Expectativas de Crescimento</h4><p><strong>Yield Curve</strong> mostra retorno (yield) de títulos com diferentes maturidades. Curva normal é positivamente inclinada: títulos de 1 ano pagam 2%, 5 anos pagam 3%, 10 anos pagam 4%. Curva invertida (10 anos pagam menos que 1 ano) é sinal de recessão esperada. Por quê? Se investidor espera recessão, taxa de juros vai cair, então títulos de longo prazo hoje (em recessão) valem mais. Curva invertida tem precedido recessões 9 em 10 vezes.</p><p><strong>Mercado de Moedas (Forex)</strong> é onde moedas são trocadas. Trilhões de dólares são negociados diariamente. Taxa de câmbio flutua por: (1) demanda relativa (mais investidores querem dólares, dólar sobe), (2) taxas de juros relativas (se EUA tem juros 5% e Brasil 10%, investidor quer real, real aprecia), (3) expectativas de inflação (se espera inflação alta no Brasil, real deprecia), (4) risco político (se risco sobe, investidor foge de real, deprecia).</p><blockquote class="example">📌 <em>Exemplo: 2024, dólar sobe forte vs real. Razões: (1) BC Brazil tem inflação alta (10%+), ECB aperta menos, rendimento real de investidor em dólar melhora, (2) Brasil tem risco político (debate fiscal), fuga de capital, (3) Fed mantém juros altos mais tempo que esperado. Real deprecia de 5.0 para 5.5+ real/dólar.</em></blockquote>',

        dur: '16 min',
        content: '<h3>Commodities, Energia e Matérias-primas Globais</h3><p>Commodities são bens padronizados negociados globalmente: petróleo, ouro, trigo, minério de ferro, cobre. Preços de commodities são determinados por oferta e demanda global, não por governo local. Um choque em qualquer lugar afeta preços globais. Produtores de commodities (Brasil, Rússia, Austrália, Oriente Médio) são muito afetados por preços; economias avançadas menos.</p><p><strong>Petróleo</strong> é commodity mais importante. Preço flutua de R$ 30 a R$ 150 por barril (dólar) ao longo dos anos. Oferta é controlada por: (1) OPEP (organização de países produtores, cartél que tenta manter preço alto), (2) produção de shale nos EUA (não cartél, mais flexível), (3) demanda global (economia forte = demanda alta = preço alto). Choque de oferta (guerra no Oriente Médio, embargo) sobe preço dramaticamente. Choque de demanda (recessão) o reduz.</p><p>Importância estratégica: países que controlam energia têm poder político e econômico. Ruso usa gás como arma política (reduz fornecimento para Europa para forçar concissões). Saudi Arabia e OPEP controlam mercado de petróleo. Dependência de energia de um país afeta sua vulnerabilidade.</p><blockquote class="tip">💡 <em>Dica: preço de commodity é super cíclico. Quando sobe 50%, gera investimento massivo (novas minas, poços), 3-4 anos depois oferta explode e preço colapsa.</em></blockquote><h4>Metais e Impacto da Eletrificação</h4><p><strong>Cobre</strong> é metal crítico para economia moderna. Usado em fiação elétrica, construção, tecnologia. Economia global precisa de cobre; preço flutua com ciclo. China em crescimento rápido 2000s: demanda por cobre explodiu, preço triplicou. Recessão 2008: preço caiu 70% em meses.</p><p><strong>Lítio</strong> é novo cobre. Necessário para baterias de carros elétricos. Conforme mundo transita para EV, demanda por lítio explode. Chile, Argentina, Austrália controlam maioria. Preço de lítio saltou 10x entre 2020-2021. Agora há investimento massivo em mineração. Preço está normalizando, mas mercado ainda é tight (oferta < demanda).</p><p><strong>Ouro</strong> é diferente. Não tem uso produtivo (não gera fluxo de caixa). Preço é guiado por: (1) demanda de joias/relógios, (2) demanda de bancos centrais como reserva, (3) demanda de investidores durante medo/inflação (segurança). Ouro sobe durante crise ou inflação alta (seguro contra incerteza). Quando tudo está bem, ouro fica chato (retorno baixo).</p><blockquote class="example">📌 <em>Exemplo: 2022-2023, ouro sobe enquanto taxa de juros sobe (contraditório, mas faz sentido): fed está apertando, mercado espera recessão, ouro é seguro. Quando taxa cai e crescimento retorna (2024), ouro sai de moda novamente.</em></blockquote><h4>Preços de Alimentos</h4><p><strong>Alimentos</strong> são commodities críticas porque afetam pessoas pobres (gastam 50%+ de renda com comida). Choque de preço de alimentos causa inflação política (protestos, instabilidade). Guerra na Ucrânia 2022: Rússia e Ucrânia controlam 30%+ de trigo global. Quando guerra bloqueia exportações, preço explode, países pobres sofrem fome.</p><p>Preços de alimentos são voláteis porque: (1) suprimento é inelástico (safra leva meses, não pode responder rápido a preço), (2) demanda é inelástica (pessoas precisam comer), (3) choques climáticos (seca, inundação) afetam produção dramaticamente. Superciclo de commodities 2000-2012 viu preços de alimentos triplicarem, gerando inflação em países pobres.</p><blockquote class="news">📰 <em>Notícia: em 2024, preços de alimentos começam a normalizar após picos 2022-2023. Mas risco de estiagem em produtores-chave (Brasil, Argentina, Austrália) pode reverte ganhos.</em></blockquote>',

          { q: 'Por que metais como cobre e lítio são tão importantes?', a: 'Cobre: fiação elétrica, construção, tecnologia. Lítio: baterias para carros elétricos. Economia moderna depende desses metais.' },
          { q: 'Diferencie porque ouro sobe em crise vs não sobe em boa economia', a: 'Ouro é seguro contra incerteza/inflação. Sobe quando há medo ou inflação. Cai quando tudo bem (baixo retorno comparado a ativos produtivos).' }

        name: 'Integração Global e Fluxos de Capital',
        dur: '15 min',
        content: '<h3>Integração Global e Fluxos de Capital</h3><p>Economia está integrada globalmente. Pessoa investe no Brasil e ganha em dólar. Empresa brasileira compra máquina da Alemanha. Capital flui de um país para outro buscando retorno. Fluxos de capital podem ser estáveis (IDE - investimento direto em fábrica) ou voláteis (portfolio investment em ações/títulos).</p><p><strong>Investimento Direto Externo (IDE)</strong> é quando empresa estrangeira cria negócio em país. Exemplos: Apple tem fábrica na China, Mercado Livre investe na Argentina, empresa americana tem call center no Brasil. IDE é mais estável porque é compromisso de longo prazo (construir fábrica leva tempo, difícil sair rapidamente). IDE cria empregos locais, transferência de tecnologia.</p><p><strong>Portfolio Investment</strong> é quando investidor estrangeiro compra ações/títulos. É muito mais volátil porque pode sair em minutos. Se investidor espera recessão no Brasil, vende todas as ações brasileiras e sai. Saída em massa causa queda de preços de ações, depreciação de moeda, crise.</p><blockquote class="tip">💡 <em>Dica: países que dependem de portfolio investment para financiar déficit são vulneráveis. Uma reviravolta em sentimento pode desencadear crise.</em></blockquote><h4>Ciclo de Capital Global</h4><p><strong>Ciclo de capital</strong> é quando investidor em mercados emergentes fluxo: fase 1 (risco-on): crescimento global é forte, investidor quer retorno alto, vai para emergentes (Brasil, México, Tailândia), preços de ações e moeda sobem. Fase 2 (realidade): crescimento desacelera ou crise emerge em desenvolvido (EUA, Europa), investidor foge para segurança (volta para EUA, compra Treasuries), ações emergentes caem, moedas depreciam.</p><p>Brasil é vítima frequente. Ciclo risco-on: investidor estrangeiro investe R$ 30 bilhões/ano, real aprecia, ações explodem. Ciclo risco-off: investidor sai R$ 20 bilhões, real deprecia, ações caem. Cada ciclo causa volatilidade e danos: empresas que emprestaram em dólar (achando que real ia apreciar) enfrentam dificuldade quando deprecia.</p><h4>Conta Corrente e Sustentabilidade</h4><p><strong>Conta Corrente</strong> é diferença entre exportações e importações (e transações invisíveis como turismo, juros de dívida). Se país tem superávit (exporta mais), entra capital. Se tem déficit (importa mais), sai capital. Déficit crônico de conta corrente sinaliza que país está vivendo acima de seus meios, acumulando dívida externa. Eventualmente precisa de moeda estrangeira para pagar, sai capital, crise.</p><p>Quem financia déficit de conta corrente? Investidor estrangeiro. Se Brasil tem déficit de R$ 50 bilhões/ano, precisa que estrangeiro invista R$ 50 bilhões/ano para financiar. Se estrangeiro perde confiança, sai, e Brasil tem crise (não consegue importar nem pagar dívida externa). Sustentabilidade requer que déficit de conta corrente seja financiável sem risco excessivo.</p><blockquote class="example">📌 <em>Exemplo: Argentina 2000s tinha déficit de conta corrente alto, financiado por investimento externo. Quando crise em 2001 (peseta fixada em dólar colapsou), investidor estrangeiro fugiu. País não conseguia importar, economia entrou em caos. Lições: déficit não é sustentável indefinidamente.</em></blockquote><blockquote class="news">📰 <em>Notícia: em 2024, Brasil tem déficit de conta corrente que assusta investidores. Dependência crescente de investimento estrangeiro para financiar cria vulnerabilidade.</em></blockquote>',
        cards: [

          { q: 'O que é ciclo de capital risco-on vs risco-off e qual é impacto?', a: 'Risco-on: investidor vai para emergentes, real aprecia, ações sobem. Risco-off: fuga para segurança, real deprecia, ações caem. Volatilidade danifica economia.' },

        content: '<h3>Geopolítica e Impacto Econômico de Tensões Globais</h3><p>Economia não é isolada de política. Tensões geopolíticas têm impacto econômico direto. Guerra, sanções, alianças afetam fluxos de comércio, preços de commodities, confiança de investidor. Mundo está em realinhamento geopolítico (EUA vs China, Rússia isolada), com implicações econômicas profundas.</p><p><strong>Guerra da Ucrânia (2022+)</strong> teve efeitos globais: (1) Rússia é grande produtor de petróleo e gás, sanções reduzem oferta global, preço explode (pico R$ 140+/barril). (2) Ucrânia é grande produtor de trigo e insumo agrícola, guerra bloqueia exportações, preço de alimentos sobe. (3) Europa, que dependia de gás russo barato, enfrenta crise energética: eletricidade cara, indústria afetada. (4) Investidor não quer mais Rússia (risco político), sai capital, rublo deprecia.</p><p><strong>Tensão EUA-China</strong> é a mais importante do século. Algumas implicações econômicas: (1) tarifas: EUA coloca tarifas em produtos chineses (tentativa de proteger manufatura doméstica), China retalia. Ambos perdem (consumidor paga mais, crescimento cai). (2) Supply chain: empresas tentam diversificar fora de China (Vietnam, Tailândia, México), deixando China. (3) Tecnologia: EUA restringe venda de chips de alta tecnologia para China. China responde com seu próprio programa de semicondutores. (4) Investimento: investidor tem medo de guerra China-Taiwan, reduz investimento em Taiwan e região.</p><blockquote class="tip">💡 <em>Dica: fragmentação geopolítica (blocos de EUA vs China) pode levar a dupla globalização (dois sistemas separados), reduzindo eficiência e crescimento global.</em></blockquote><h4>Sanções Econômicas como Arma</h3><p>Sanção é ferramenta que país rico (EUA, Ocidente) usa contra adversário. Exemplos: congelar ativos exteriores, proibir transações bancárias, embargo de tecnologia. Efeito pode ser devastador se alvo depende de comércio global. Rússia foi sancionada massivamente após Ucrânia: proibida de usar dólar (Swift banking), exportação de tecnologia bloqueada. Economia contrai, moeda deprecia.</p><p>Mas sanção tem limite de eficácia. Rússia sobreviveu porque: (1) é autossuficiente em energia e alimentos, (2) encontrou parceiros alternativos (China, Índia), (3) mercado negro floresce (smartphones, chips entram ilegalmente). Sanção sobre Irã durante anos não derrubou governo (resistência). Sanção sobre Coreia do Norte também não. Eficácia real é questionável, mas custo político é alto (gera sentimento anti-Ocidente).</p><h4>Comércio Livre vs Protecionismo</h4><p>Tensão EUA-China reavivou debate de comércio livre vs protecionismo. <strong>Comércio livre</strong> (acordos como TPP, USMCA) tem benefícios: consumidor paga menos, empresa acessa mercado global, eficiência de especialização. Mas tem perdedores locais: trabalhador em fábrica de aço que fecha porque aço importado é mais barato.</p><p><strong>Protecionismo</strong> (tarifas, quotas) protege indústrias domésticas de competição estrangeira. Benefício: emprego local preservado. Custa: consumidor paga mais, economia é menos eficiente. Maioria dos economistas acredita que protecionismo reduz crescimento total, mas distribui custo-benefício desigualmente (consumidor paga mais, trabalhador protegido paga menos).</p><p>Realidade é meio-termo: livre comércio com exceções. Algumas indústrias são consideradas "estratégicas" (semicondutores, defesa, energia) e governos protegem. Outras são abertas. Negócio é encontrar equilíbrio entre eficiência global e segurança doméstica.</p><blockquote class="example">📌 <em>Exemplo: Biden em 2024 aumenta tarifas em produtos chineses e tenta relocalizar manufatura de chips/EVs/baterias para EUA (subsídios). Objetivo é segurança estratégica + criar empregos. Custo: consumidor paga mais, déficit orçamentário sobe, potencial inflação.</em></blockquote>',

      {

        name: 'Transição Energética, Sustentabilidade e Economia Verde',
        dur: '14 min',
        content: '<h3>Transição Energética, Sustentabilidade e Economia Verde</h3><p>Mundo está em transição de combustíveis fósseis para renováveis. Mudança climática e esgotamento de recursos fomentam isso. Implicações econômicas são profundas: indústria de energia muda, novos negócios emergem (solar, eólico, EV), ganhadoras e perdedoras diferentes.</p><p><strong>Energia Renovável</strong> (solar, eólico, hidro) cresce rapidamente. Custo caiu 90% em 15 anos (painel solar em 2010 era R$ 500/watt, agora R$ 50). Competitivo com fóssil. Em 2024, energia renovável representava ~30% de geração global, crescendo. Investimento em renovável supera investimento em fóssil pela primeira vez.</p><p>Implicações: (1) <strong>Setores perdedores</strong>: companhias de petróleo/gás (demanda cai), minera de carvão (uso desaparece), indústria de combustão interna (carros à gasolina sendo eliminados). Milhões de empregos em risco. Necessário transição justa (treinar trabalhador para nova economia). (2) <strong>Setores ganhadores</strong>: solar, eólico, EV, bateria, infraestrutura de recarga, eficiência energética.</p><blockquote class="tip">💡 <em>Dica: transição energética é megatrend. Trilhões serão investidos. Principais ganhadoras: China (dominante em solar/baterias), EUA (política de subsídio), países com potencial eólico (Brasil).</em></blockquote><h4>Economia Circular vs Linear</h4><p>Modelo econômico atual é linear: extrair → produzir → descartar. Isso exaure recursos e gera lixo. <strong>Economia Circular</strong> propõe: reutilizar, reciclar, regenerar. Exemplo: em vez de descartar celular, refazer componentes para novo. Em vez de plástico descartável, plástico reciclável infinitas vezes.</p><p>Benefício econômico: menos dependência de extração (minério, petróleo), menos custo de lixo, mais eficiência. Custo: transição requer investimento massivo em infraestrutura de reciclagem, mudança de mentalidade. Alguns setores (moda, eletrônicos) avançam rápido. Outros (petroquímica)         dur: '15 min',
        content: '<h3>Cenários Futuros: Crescimento, Estagflação, Recessão, Transformação</h3><p>Futuro é incerto. Economistas frequentemente erram previsões. Mas cenários ajudam a pensar probabilidades e preparar para diferentes resultados. Aqui estão 4 cenários possíveis para próximos 5 anos (2024-2029).</p><p><strong>Cenário 1: Soft Landing (40% probabilidade)</strong> = economia global cresce 2-3% ao ano, inflação se normaliza para 2-3%, desemprego permanece baixo. Juros estabilizam em 4-5%. Investidor está confortável. Ações, títulos, moedas têm retorno modesto. Melhor caso para maioria. Requer sorte e política bem calibrada.</p><p><strong>Cenário 2: Estagflação (25% probabilidade)</strong> = combinação ruim: crescimento baixo (0-1%), inflação alta (5-7%), juros altos (6-8%). Causa: choque de energia (guerra), supply chains interrompidas, banco central não controla inflação. Populações sofrem (salário não acompanha, bem-estar cai). Mercados desabam (ações caem porque crescimento é baixo mas juros altos). Inflacionários se beneficiam (ouro, commodities, ativos reais). Deflacionários se prejudicam (títulos com juros nominais altos mas real é zero).</p><blockquote class="tip">💡 <em>Dica: estagflação é pior para maioria das pessoas e investidores. Não há asset class que funcione bem simultaneamente.</em></blockquote><p><strong>Cenário 3: Recessão (20% probabilidade)</strong> = crescimento negativo (-2% a 0%), desemprego sobe (7-10%), inflação cai rapidamente (deflação), juros caem para perto de zero. Pânico, perdas de empregos, pobreza cresce. Investidor tem medo, vende ações. Títulos ganham (juros caem, preço sobe). Ouro ganha (seguro). Moedas são voláteis. Recessão dura 1-2 anos. Exemplo: 2008-2009, 2020 (COVID). Dano de curto prazo, mas se gerenciado bem, recuperação vem.</p><p><strong>Cenário 4: Transformação (15% probabilidade)</strong> = mudança estrutural: IA revoluciona produtividade, crescimento recupera a 4-5% ao ano sem inflação (tecnologia melhora eficiência, reduz custos). Ganhadoras: empresas de IA, tech, educação. Perdedoras: trabalho repetitivo, profissões tradicionais. Desigualdade aumenta (skill premium explode). Poder político concentra em tech. Oportunidade para renovação, mas distribuição é desigual.</p><h4>Riscos Específicos para Próximos Anos</h4><p><strong>Risco 1: Geopolítica</strong> = escalação China-Taiwan, Rusia-NATO, Middle East. Guerra maior desencadeia crise global severa (energia, supply chain, confiança investidor). Probabilidade: 10-15%.</p><p><strong>Risco 2: Dívida</strong> = muitos países têm dívida insustentável (EUA, Japão, Europa, Brasil). Se investidor perde confiança, taxa de juros explode. Refinanciamento fica impossível ou caro demais. Governo obrigado a cortar gasto (austeridade) ou inflacionar a dívida (inflação alta). Probabilidade: 20-25%.</p><p><strong>Risco 3: Mudança Climática</strong> = eventos extremos (seca, inundação, furacão) aumentam em frequência/severidade. Afeta agricultura, infraestrutura, seguro. Custará trilhões em ajustes. Pode desencadear migração massiva, conflito. Probabilidade: 40% (está acontecendo agora).</p><p><strong>Risco 4: IA Descontrole</strong> = IA avança rápido demais, não é compreendida, descontrola. Cenário Black Swan. Probabilidade: <5% mas consequência é extrema.</p><blockquote class="example">📌 <em>Exemplo: Brasil enfrenta múltiplos riscos simultaneamente. Dívida insustentável (65%+ PIB, crescimento baixo), transição energética incompleta, vulnerabilidade a secas (hidroeletricidade), inflação persistente, taxa de juros alta. Próximos 5 anos serão críticos: reformas estruturais (previdência, fiscal) são necessárias, mas politicamente difíceis.</em></blockquote><blockquote class="news">📰 <em>Notícia: em 2024, economistas discutem "pouso suave" (soft landing) como scenario central, mas com 40% probabilidade implica 60% de risco de alternativa pior. Vigilância contínua de indicadores é necessária.</em></blockquote>',
