        dur: '18 min',
        content: `<h3>A Arte do Small Talk em Inglês</h3>
<p>Small talk é a conversa casual sobre tópicos leves como clima, trabalho, hobbies. Parece simples, mas é crucial para criar relacionamentos, quebrar o gelo e soar natural. Falantes nativos usam small talk constantemente em:
</p>
<ul>
<li>Encontros de negócios (antes da reunião começar)</li>
<li>Eventos sociais (festas, conferências)</li>
<li>Transportes públicos, elevadores, filas</li>
<li>Restaurantes, cafés, lojas</li>
</ul>
<h4>Saudações Básicas com Variações</h4>
<p><strong>Formais:</strong> "How do you do?" (muito formal, raro), "Pleased to meet you", "It's a pleasure to meet you"</p>
<p><strong>Semiformal/Profissional:</strong> "Nice to meet you", "Good to see you", "How are you?" (resposta completa esperada)</p>
<p><strong>Casual:</strong> "Hey, how's it going?", "What's up?", "How have you been?" (se você já conhece a pessoa)</p>
<h4>Respondendo a Saudações</h4>
<blockquote class="example">
A: "How are you doing?"<br>
B: "I'm doing well, thanks for asking! How about you?" (formal/semiformal)<br><br>
A: "What's up?"<br>
B: "Not much, just got back from work. You?" (casual)
</blockquote>
<p>DICA: Sempre retorne a pergunta! Isso mantém a conversa fluindo e mostra interesse genuíno.</p>
<h4>Iniciando Tópicos Leves</h4>
<p><strong>Sobre o Clima:</strong> "It's been quite warm lately, hasn't it?", "Have you noticed how cold it's been?", "Beautiful day today!", "Terrible weather we're having"</p>
<p><strong>Sobre Trabalho/Estudo:</strong> "How's work treating you these days?", "Busy at the office?", "What do you do for a living?", "Are you still at that company?"</p>
<p><strong>Sobre Hobbies/Lazer:</strong> "Do you do anything fun on weekends?", "Are you into any sports?", "What do you like to do in your free time?", "Have you watched anything good lately?"</p>
<h4>Manutenção da Conversa</h4>
<p><strong>Mostrando interesse:</strong> "Oh really? That sounds interesting!", "I had no idea!", "Tell me more about that", "That's impressive!"</p>
<p><strong>Relacionando com sua experiência:</strong> "I know what you mean. I experienced something similar...", "That reminds me of when I...", "I can relate to that"</p>
<p><strong>Fazendo follow-up questions:</strong> "How did that make you feel?", "What happened next?", "Did you enjoy it?"</p>
<h4>Fechando Conversas Graciosamente</h4>
<p><strong>Sinais de que precisa ir:</strong> "Well, I should probably get going", "It was great talking to you, but I've got to run", "I don't want to keep you"</p>
<p><strong>Deixando a porta aberta:</strong> "We should definitely catch up sometime", "Let's grab coffee soon", "I'll be in touch", "Hope to see you again soon"</p>
<h4>Erros Comuns em Small Talk</h4>
<ul>
<li><strong>Não fazer perguntas:</strong> Small talk é um diálogo, não um monólogo. Faça perguntas sobre a outra pessoa!</li>
<li><strong>Ir muito profundo muito rápido:</strong> Evite política, religião, dinheiro ou tópicos pessoais sensíveis em primeiros contatos.</li>
<li><strong>Respostas muito curtas:</strong> "Yes" ou "No" mata a conversa. Expanda: "Yes, I enjoyed it. The food was amazing."</li>
<li><strong>Não ouvir atentamente:</strong> Se você pergunta, escute a resposta e faça follow-ups relevantes.</li>
<li><strong>Falar muito de si mesmo:</strong> Balance contando sobre você com interesse genuíno no outro.</li>
</ul>`,

          {q: "Quais tópicos evitar no small talk inicial?", a: "Política, religião, dinheiro e questões pessoais sensíveis. Mantenha conversas leves e neutras."}

        dur: '20 min',
        content: `<h3>Comunicando Seus Pontos de Vista com Confiança</h3>
<p>Expressar opiniões é fundamental para conversas reais. Você precisa saber como afirmar sua visão, concordar parcialmente, discordar respeitosamente e debater pontos sem ser agressivo ou ofensivo.</p>
<h4>Expressando Opiniões</h4>
<p><strong>Direta e confiante:</strong> "I think...", "In my opinion...", "I believe...", "It seems to me that..."</p>
<blockquote class="example">
"I think social media has negatively impacted mental health in teens."<br>
"In my opinion, remote work is more productive."
</blockquote>
<p><strong>Menos definidora (mais delicada):</strong> "I'd say...", "It seems like...", "It appears that...", "I'd argue that..."</p>
<p><strong>Especulativa:</strong> "Perhaps...", "Maybe...", "It's possible that...", "I suppose..."</p>
<h4>Concordância</h4>
<p><strong>Concordância total:</strong> "I completely agree", "You're absolutely right", "I couldn't agree more", "Exactly!", "That's a great point"</p>
<p><strong>Concordância parcial:</strong> "I see your point, and I agree to some extent", "That's true, but...", "You're right about that, however...", "I agree with part of what you're saying"</p>
<blockquote class="example">
A: "Social media is destroying attention spans."<br>
B: "I see your point. Social media can be addictive, but it also connects people globally. I think it's more nuanced than that."
</blockquote>
<h4>Discordância Respeitosa</h4>
<p><strong>Suave e diplomática:</strong> "I understand where you're coming from, but I respectfully disagree", "I see what you mean, though I have a different perspective", "That's an interesting point, but I'd like to offer another angle"</p>
<p><strong>Questionando enquanto discorda:</strong> "Have you considered...?", "What about...?", "How do you respond to...?", "Isn't it also true that...?"</p>
<p><strong>Discordância clara:</strong> "I'd have to disagree with that", "I don't think that's accurate", "That's not really how I see it"</p>
<h4>Debate Construtivo</h4>
<p><strong>Apresentando evidência:</strong> "There's research showing that...", "Studies indicate that...", "From what I've read...", "I read an article recently that..."</p>
<p><strong>Reconhecendo pontos válidos do outro:</strong> "That's a valid point, and I appreciate your perspective, but consider also...", "You make a good argument there, however..."</p>
<p><strong>Encontrando terreno comum:</strong> "So we agree that [shared belief]. The question is really whether...", "I think we both want the same outcome, we just differ on how to get there"</p>
<h4>Expressões Avançadas para Debate</h4>
<p><strong>Refinando sua posição:</strong> "To clarify what I mean...", "What I'm trying to say is...", "Let me rephrase that more clearly"</p>
<p><strong>Admitindo incerteza:</strong> "I could be wrong about this, but...", "I'm not entirely sure, but it seems to me that...", "I may not have all the facts, however..."</p>
<p><strong>Encerrando a discussão:</strong> "Well, I think we'll have to agree to disagree", "Anyway, it's been a great discussion", "I appreciate your perspective, even if we don't see eye to eye"</p>`,

        dur: '22 min',
        content: `<h3>Dominando Phrasal Verbs: A Chave para Soar Natural</h3>
<p>Phrasal verbs são combinações de verbo + preposição/advérbio que criam significados únicos. Eles são absolutamente essenciais para soar como um falante nativo, pois aparecem constantemente em conversação casual. Sem dominar phrasal verbs, sua fala ficará muito formal e artificial.</p>
<h4>Phrasal Verbs de Frequência Alta</h4>
<p><strong>GET:</strong> Talvez o verbo mais produtivo em phrasal verbs.</p>
<ul>
<li><strong>Get along:</strong> ter boa relação. "I get along well with my coworkers"</li>
<li><strong>Get over:</strong> recuperar-se de. "It took me months to get over the breakup"</li>
<li><strong>Get up:</strong> levantar-se. "I get up at 6 AM every morning"</li>
<li><strong>Get down:</strong> desanimar / deprimir. "The news got me down"</li>
<li><strong>Get back:</strong> retornar. "I'll get back to you tomorrow"</li>
<li><strong>Get away:</strong> escapar / sair. "We're trying to get away for vacation"</li>
<li><strong>Get into:</strong> interessar-se por. "I've been getting into yoga lately"</li>
<li><strong>Get out of:</strong> sair de (obrigação). "How can I get out of this meeting?"</li>
</ul>
<p><strong>LOOK:</strong> Verbos visuais e de exploração.</p>
<ul>
<li><strong>Look after:</strong> cuidar de. "Can you look after my cat while I'm away?"</li>
<li><strong>Look at:</strong> olhar para. "Look at that sunset!"</li>
<li><strong>Look for:</strong> procurar. "I'm looking for a new job"</li>
<li><strong>Look forward to:</strong> esperar ansiosamente. "I'm looking forward to the weekend"</li>
<li><strong>Look into:</strong> investigar. "I'll look into that problem for you"</li>
<li><strong>Look out:</strong> ter cuidado. "Look out! There's a car coming!"</li>
<li><strong>Look up:</strong> melhorar / consultar. "Things are looking up!" / "Look up that word in the dictionary"</li>
</ul>
<p><strong>PUT:</strong> Colocação e expressão.</p>
<ul>
<li><strong>Put on:</strong> vestir / colocar. "Put on your shoes" / "Put on some music"</li>
<li><strong>Put off:</strong> adiar / desanimar. "Don't put off studying" / "That remark put me off"</li>
<li><strong>Put up with:</strong> tolerar. "I can't put up with this noise anymore"</li>
<li><strong>Put away:</strong> guardar. "Put away your toys"</li>
</ul>
<p><strong>RUN:</strong> Movimento e operação.</p>
<ul>
<li><strong>Run into:</strong> encontrar por acaso. "I ran into an old friend at the supermarket"</li>
<li><strong>Run out of:</strong> ficar sem. "We're running out of milk"</li>
<li><strong>Run away:</strong> fugir. "Don't run away from your problems"</li>
<li><strong>Run down:</strong> resumir / desgastar-se. "Let me run down what happened" / "I'm feeling run down"</li>
</ul>
<p><strong>BREAK:</strong> Separação e interrupção.</p>
<ul>
<li><strong>Break down:</strong> parar de funcionar / chorar. "My car broke down" / "She broke down in tears"</li>
<li><strong>Break up:</strong> terminar relação. "They broke up last month"</li>
<li><strong>Break away:</strong> escapar. "The runner broke away from the pack"</li>
<li><strong>Break in:</strong> arrombar / treinar (nova pessoa). "Someone broke into my house" / "We need to break in the new employee"</li>
</ul>
<p><strong>COME & GO:</strong> Movimento e aproximação.</p>
<ul>
<li><strong>Come up:</strong> surgir / aproximar. "A problem has come up" / "Your birthday is coming up"</li>
<li><strong>Come across:</strong> encontrar por acaso / impressionar. "I came across an interesting article" / "He comes across as arrogant"</li>
<li><strong>Go through:</strong> experienciar / revisar. "I'm going through a tough time" / "Let's go through the document"</li>
<li><strong>Go with:</strong> combinar com. "This tie goes well with that shirt"</li>
<li><strong>Go on:</strong> continuar. "What's going on?" / "The party went on until midnight"</li>
</ul>
<h4>Prática em Contexto</h4>
<blockquote class="example">
"I've been looking for a new job for months, but I keep running into obstacles. However, things are looking up — an opportunity came up last week! I'm going through the interview process, and so far it's going well. I'm looking forward to hearing back from them."
</blockquote>
<h4>Técnica de Aprendizado</h4>
<p>Não memorize phrasal verbs isolados. Aprenda-os em contexto fraseado com exemplos reais. Pratique produzindo frases com eles até se tornarem automáticos. Ouvir falantes nativos é essencial — podcasts, séries de TV, YouTube são excelentes recursos.</p>`,
