var COURSE = { id:'IB', name:'Inglês Básico', shortName:'Inglês Básico', cat:'Idiomas', desc:'Aprenda os fundamentos do inglês do zero! Comece com pronúncia, vocabulário essencial e estruturas gramaticais básicas.', salt:'IB_HENRY_2026_MASTER', ak:'ib_auth', courseKey:'ib', prefix:'ib_', color:'#1976D2', glow:'rgba(25,118,210,.35)', free:false, freeModules:1, modules:3, topics:9, hours:3, quizzes:9 };

  { id:'ib_mod1', name:'Alfabeto e Pronúncia Básica', free:false,
    topics:[
      {id:1, name:'O Alfabeto em Inglês e Pronúncia', dur:'15 min', content:`<h3>O Alfabeto em Inglês e Pronúncia</h3><p>Bem-vindo ao seu primeiro passo rumo à fluência em inglês! O alfabeto inglês é exatamente igual ao português, com 26 letras, mas a pronúncia e o som de cada letra podem ser bem diferentes. Vamos aprender a pronunciar corretamente cada letra do alfabeto e entender como elas soam quando aparecem em palavras diferentes.</p><p>O alfabeto em inglês é chamado de "alphabet" e cada letra tem um nome específico que você deve aprender para soletrar palavras ao telefone ou em situações formais. A pronúncia correta desde o início é essencial para desenvolver uma boa pronúncia geral no idioma.</p><h4>Pronúncia de cada letra</h4><p>Aqui está a lista completa do alfabeto inglês com a pronúncia aproximada em português e exemplos práticos:</p><p><strong>A</strong> - Pronuncia-se "ei" (como em "bate"). Exemplo: "Apple" (maçã). O som é como um "a" aberto seguido de um "i" bem suave. Para praticar, diga várias vezes: "A, A, A" com um tom ascendente, como se estivesse chamando alguém.</p><p><strong>B</strong> - Pronuncia-se "bi" (como em "bife"). Exemplo: "Book" (livro). O "b" em inglês é bem semelhante ao português, mas certifique-se de usar os lábios para criar o som. Bico dos lábios juntos e depois solte: "B, B, B".</p><p><strong>C</strong> - Pronuncia-se "ci" (como em "ciência"). Exemplo: "Cat" (gato). Quando o C aparece antes de A, O ou U, soa como "k". Quando aparece antes de E ou I, soa como "s". Esta é uma regra muito importante que você usará constantemente.</p><p><strong>D</strong> - Pronuncia-se "di" (como em "diabo"). Exemplo: "Dog" (cachorro). O "d" em inglês é muito semelhante ao português, mas coloque a língua um pouco mais para trás nos dentes superiores.</p><p><strong>E</strong> - Pronuncia-se "i" (como em "inteligência"). Exemplo: "Egg" (ovo). O "e" longo em inglês soa como um "i" português. Mas quando é curto, soa mais como um "é" aberto. Aprenda a diferenciar estes sons distintos.</p><p><strong>F</strong> - Pronuncia-se "éf" (como em "éfemero"). Exemplo: "Fish" (peixe). O som é produzido colocando o lábio inferior sob os dentes superiores e deixando o ar passar. Pratique: "F, F, F" com esse movimento.</p><p><strong>G</strong> - Pronuncia-se "ji" (como em "jipe"). Exemplo: "Good" (bom). Quando o G aparece antes de A, O ou U, soa como em "gato". Quando aparece antes de E ou I, geralmente soa como "j" (como em "jogo").</p><p><strong>H</strong> - Pronuncia-se "êitch" (como em "etch"). Exemplo: "Happy" (feliz). O "h" em inglês é mais suave que em português. Pense em um ar quente saindo da boca: "h, h, h". Muitos iniciantes esquecem este som.</p><p><strong>I</strong> - Pronuncia-se "ai" (como em "ai"). Exemplo: "Ice" (gelo). O "i" longo em inglês soa exatamente como a palavra portuguesa "ai" de dor ou espanto. Quando é curto, soa como um "i" fechado.</p><p><strong>J</strong> - Pronuncia-se "jei" (como em "jato"). Exemplo: "Jump" (pular). O "j" em inglês soa exatamente como o "j" português. Coloque a língua no céu da boca e deixe o ar passar lateralmente: "J, J, J".</p><p><strong>K</strong> - Pronuncia-se "kei" (como em "quê?"). Exemplo: "King" (rei). O "k" em inglês é praticamente idêntico ao "c" duro português. Muitos iniciantes confundem o "k" com o "c", mas ambos soam igual quando antes de A, O, U.</p><p><strong>L</strong> - Pronuncia-se "él" (como em "ele"). Exemplo: "Lion" (leão). O "l" em inglês é mais claro e frontal do que em português. Coloque a ponta da língua atrás dos dentes superiores e deixe o ar passar pelas laterais.</p><p><strong>M</strong> - Pronuncia-se "ém" (como em "tempo"). Exemplo: "Monkey" (macaco). O "m" em inglês é bem semelhante ao português. Boco fechados, ar saindo pelo nariz: "M, M, M". Um som muito natural.</p><p><strong>N</strong> - Pronuncia-se "én" (como em "nenhum"). Exemplo: "No" (não). O "n" em inglês é semelhante ao português, com a língua pressionando os dentes superiores e o ar saindo pelo nariz. Pratique: "N, N, N".</p><p><strong>O</strong> - Pronuncia-se "ou" (como em "ouro"). Exemplo: "Orange" (laranja). O "o" longo em inglês soa mais como "ou" português. Quando é curto, soa mais como um "ó" aberto. Arredonde os lábios bem quando pronunciar.</p><p><strong>P</strong> - Pronuncia-se "pi" (como em "pioio"). Exemplo: "Pen" (caneta). O "p" em inglês é muito semelhante ao português, mas exalamos um pouco mais de ar após pronunciar. Coloque a mão em frente à boca e sinta o ar: "P, P, P".</p><p><strong>Q</strong> - Pronuncia-se "quiu" (como em "quiosque"). Exemplo: "Queen" (rainha). O "q" em inglês é sempre seguido de "u", assim como em português. Ele soa como "kw": "Quiu, Quiu, Quiu".</p><p><strong>R</strong> - Pronuncia-se "ar" (como em "ar"). Exemplo: "Red" (vermelho). O "r" em inglês é MUITO diferente do português! Não é gutural. A língua fica um pouco retraída e curvada, quase como um som de vogal. Pratique muito este som!</p><p><strong>S</strong> - Pronuncia-se "és" (como em "esse"). Exemplo: "Sun" (sol). O "s" em inglês tem o som de "s" suave português. Quando dois "s" aparecem juntos (como em "miss"), soa como "z".</p><p><strong>T</strong> - Pronuncia-se "ti" (como em "tia"). Exemplo: "Tree" (árvore). O "t" em inglês é um pouco diferente do português. A língua fica entre os dentes, não nos dentes. Pratique colocando a ponta da língua entre os dentes: "T, T, T".</p><p><strong>U</strong> - Pronuncia-se "iú" (como em "viúva"). Exemplo: "Umbrella" (guarda-chuva). O "u" longo em inglês é quase como um "iu". Arredonde bem os lábios e puxe-os para frente.</p><p><strong>V</strong> - Pronuncia-se "vi" (como em "vida"). Exemplo: "Violin" (violino). O "v" em inglês é produzido colocando o lábio inferior sob os dentes superiores e deixando o ar passar, assim como em português. Pratique: "V, V, V".</p><p><strong>W</strong> - Pronuncia-se "dábl-yu" (como em "duplo iú"). Exemplo: "Water" (água). O "w" em inglês é um som que não existe em português. É como um "u" suave no início de uma palavra, quase como um "v" de dentes de trás. Arredonde os lábios: "W, W, W".</p><p><strong>X</strong> - Pronuncia-se "éks" (como em "x-rata"). Exemplo: "X-ray" (raio-X). O "x" em inglês soa como "ks" ou "gz" dependendo da posição na palavra. No início de sílaba tônica: "ks", e em outros casos: "gz".</p><p><strong>Y</strong> - Pronuncia-se "wai" (como em "why" - por quê). Exemplo: "Yellow" (amarelo). O "y" em inglês pode ser uma consoante ou uma vogal. No início de palavras, soa como "i" leve. No meio ou final, soa como "ai".</p><p><strong>Z</strong> - Pronuncia-se "zéd" (para британский) ou "zi" (para американский). Exemplo: "Zebra" (zebra). O "z" em inglês soa como "z" português. Muitas palavras que em português têm "s", em inglês têm "z". Pratique: "Z, Z, Z".</p><blockquote class="tip"><strong>💡 Dica importante:</strong> O som do inglês é muito diferente do português. Não tente pronunciar cada letra como em português - pratique ouvindo áudios nativos! Cada som tem nuances que você só aprenderá com a escuta constante. Use aplicativos de pronúncia para comparar seu som com o de falantes nativos.</blockquote><h4>Prática de Pronúncia</h4><p>Agora que você conhece cada letra, vamos praticar combinações. Repita depois de cada um:</p><p>A-B-C: "ei-bi-si" / D-E-F: "di-i-éf" / G-H-I: "ji-êitch-ai" / J-K-L: "jei-kei-él" / M-N-O: "ém-én-ou" / P-Q-R: "pi-quiu-ar" / S-T-U: "és-ti-iú" / V-W-X: "vi-dábl-yu-éks" / Y-Z: "wai-zéd"</p><p>Continue praticando todos os dias para memorizar não apenas as letras, mas também seus sons em diferentes contextos. A pronúncia correta desde o início garantirá que você seja compreendido quando falar inglês com outras pessoas.</p>`, cards:[{q:"Qual é a pronúncia da letra R em inglês?",a:"Ao contrário do português, o R em inglês é retração da língua, não gutural. A língua fica curvada para trás, quase como um som de vogal, 'ar'."},{q:"Como o C é pronunciado em inglês?",a:"Quando C vem antes de A, O, U: pronuncia-se 'k' (cat). Quando vem antes de E, I: pronuncia-se 's' (city)."},{q:"Qual é a diferença entre o T em inglês e em português?",a:"Em inglês, a língua fica entre os dentes, não nos dentes. Pronuncia-se 'ti' com a língua mais para frente."}]},
      {id:2, name:'Vogais Longas e Curtas', dur:'20 min', content:`<h3>Vogais Longas e Curtas em Inglês</h3><p>Uma das maiores diferenças entre a pronúncia em português e em inglês é o conceito de vogais longas e curtas. Em português, não fazemos essa distinção clara, mas em inglês ela é FUNDAMENTAL para a pronunciação correta e até mesmo para o significado das palavras.</p><p>O inglês tem um sistema de vogais muito mais complexo que o português. Cada vogal (A, E, I, O, U) pode ser pronunciada de forma "longa" ou "curta", e essa diferença pode completamente mudar o significado da palavra. Por exemplo, a diferença entre "ship" (navio) e "sheep" (ovelha) é apenas a pronúncia da vogal!</p><h4>Vogais Longas (Long Vowels)</h4><p><strong>Ā (A longo)</strong> - Soa como "ei" em português. Palavras: "make" (fazer), "cake" (bolo), "name" (nome), "gate" (portão). Repita: "meiк, keik, neim, geit". Você deve pronunciar como se estivesse alongando o som, mantendo os lábios em posição semi-aberta.</p><p><strong>Ē (E longo)</strong> - Soa como "i" em português. Palavras: "be" (ser), "tree" (árvore), "see" (ver), "meet" (encontrar). Repita: "bi, tri, si, mit". Este é um som mais frontal na boca, com a língua mais para frente. Arredonde menos que em português.</p><p><strong>Ī (I longo)</strong> - Soa como "ai" em português. Palavras: "five" (cinco), "time" (tempo), "like" (gostar), "write" (escrever). Repita: "faiv, taim, laik, rait". Este som é longo e desliza de um "a" para um "i", como um ditongo.</p><p><strong>Ō (O longo)</strong> - Soa como "ou" em português. Palavras: "go" (ir), "no" (não), "home" (casa), "phone" (telefone). Repita: "gou, nou, houm, foun". Arredonde bem os lábios e pronuncie lentamente, alongando o som.</p><p><strong>Ū (U longo)</strong> - Soa como "iu" em português. Palavras: "use" (usar), "blue" (azul), "food" (comida), "moon" (lua). Repita: "ius, blu, fud, mun". Este é um dos sons mais difíceis para falantes de português. Arredonde bem os lábios e puxe-os para frente.</p><h4>Vogais Curtas (Short Vowels)</h4><p><strong>ă (A curto)</strong> - Soa como um "a" aberto português. Palavras: "cat" (gato), "hat" (chapéu), "bad" (ruim), "man" (homem). Repita: "cat, hat, bad, man". Este som é rápido e aberto, diferente do A longo que é alongado.</p><p><strong>ĕ (E curto)</strong> - Soa como um "é" aberto português. Palavras: "bed" (cama), "red" (vermelho), "leg" (perna), "pen" (caneta). Repita: "béd, réd, lég, pén". A boca fica mais aberta que no E longo.</p><p><strong>ĭ (I curto)</strong> - Soa como um "i" fechado português. Palavras: "sit" (sentar), "ship" (navio), "fish" (peixe), "milk" (leite). Repita: "sit, chip, fish, milk". Este som é muito importante porque diferencia "ship" (navio) de "sheep" (ovelha)!</p><p><strong>ŏ (O curto)</strong> - Soa como um "ó" aberto português. Palavras: "dog" (cachorro), "hot" (quente), "box" (caixa), "clock" (relógio). Repita: "dog, hot, box, clock". Menos arredondamento que o O longo.</p><p><strong>ŭ (U curto)</strong> - Soa como um "u" aberto ou quase como "a" português. Palavras: "up" (acima), "cup" (xícara), "run" (correr), "bus" (ônibus). Repita: "áp, káp, ránn, bás". Este é frequentemente o som que causa confusão, pois soa entre um "u" e um "a".</p><h4>Comparações Práticas</h4><p>Aqui estão pares de palavras que diferem APENAS pela vogal longa ou curta:</p><p><strong>Ē vs ĭ:</strong> "sheep" (ovelha) vs "ship" (navio) / "meet" (encontrar) vs "mit" (não existe em inglês, mas pronuncia assim em "it") / "bead" (conta de colar) vs "bid" (oferta)</p><p><strong>Ă vs ā:</strong> "mat" (tapete) vs "mate" (companheiro) / "hat" (chapéu) vs "hate" (odiar) / "bad" (ruim) vs "bade" (convidou) / "pan" (panela) vs "pane" (pane de vidro)</p><p><strong>ŏ vs ō:</strong> "not" (não) vs "note" (nota) / "dot" (ponto) vs "dote" (dividir igualmente) / "rod" (vara) vs "rode" (passeio)</p><p><strong>ŭ vs ū:</strong> "cut" (cortar) vs "cute" (fofo) / "but" (mas) vs "boot" (bota) / "shut" (fechar) vs "shoot" (atirar)</p><p>Pratique dizendo cada par várias vezes para sentir a diferença nos sons. Esta é uma habilidade que leva tempo para dominar, então não se desanime se não conseguir no início!</p><blockquote class="tip"><strong>💡 Dica importante:</strong> As vogais longas geralmente aparecem quando há uma "e" silenciosa no final da palavra (como em "make", "name", "use") ou quando a vogal é duplicada (como em "meet", "book"). As regras de pronúncia em inglês não são perfeitas, mas este é um padrão muito útil!</blockquote><h4>Prática Diária</h4><p>Crie flashcards com palavras contendo vogais longas e curtas. Pronuncie cada palavra em voz alta 10 vezes por dia. Com a prática consistente, seu ouvido se ajustará a essas diferenças e você começará a pronunciar naturalmente de forma correta.</p>`, cards:[{q:"Qual é a diferença de pronúncia entre 'ship' e 'sheep'?",a:"'Ship' tem o I curto (ĭ, soando como 'i' fechado português), enquanto 'sheep' tem o E longo (ē, soando como 'i' português). A diferença é significativa!"},{q:"Qual palavra tem o A longo?",a:"Palavras como 'make', 'cake', 'name' têm o A longo (ā), soando como 'ei' em português. A letra 'e' silenciosa no final geralmente indica vogal longa."},{q:"Como pronunciar corretamente o U curto?",a:"O U curto (ŭ) em palavras como 'cut', 'cup', 'run' soa mais como um 'a' aberto português, não como um 'u' puro."}]},
      {id:3, name:'Sons Consonantais Iniciais Desafiadores', dur:'25 min', content:`<h3>Sons Consonantais Iniciais Desafiadores</h3><p>Alguns sons de consoantes no início de palavras em inglês são bem diferentes dos sons em português. Vamos focar nos sons que causam mais dificuldade para falantes brasileiros e aprender a pronunciá-los corretamente desde o início.</p><h4>Sons Consonantais que Diferem do Português</h4><p><strong>TH (pronuncia-se "th" e não tem som equivalente em português)</strong> - Este é o som mais famoso e difícil para falantes de português! Existem dois tipos: o "th" surdo (sem vibração vocal) e o "th" sonoro (com vibração vocal).</p><p>TH Surdo: "think" (pensar), "three" (três), "throat" (garganta), "path" (caminho). Para produzir este som, coloque a ponta da língua ENTRE os dentes superiores e inferiores e deixe o ar passar. Não pronuncie "t" nem "s"! É literalmente a língua entre os dentes: "thhhh".</p><p>TH Sonoro: "this" (isto), "that" (aquilo), "mother" (mãe), "brother" (irmão). É exatamente como o TH surdo, mas vibrando as cordas vocais. Coloque a língua entre os dentes e deixe o ar passar VIBRANDO. Repita: "dhhhh".</p><p>Prática: Repita "thhhh" (surdo) e "dhhhh" (sonoro) 20 vezes cada um. Depois tente: "think", "this", "three", "that", "thank", "there", "through", "them". Muitas palavras em inglês têm este som!</p><p><strong>R (som completamente diferente do português)</strong> - Em português, o R é gutural (na garganta), mas em inglês é muito mais suave. O R em inglês é feito curvando a língua para trás, quase criando um som de vogal modificada. A ponta da língua NÃO toca os dentes nem o céu da boca.</p><p>Palavras: "red" (vermelho), "run" (correr), "rabbit" (coelho), "river" (rio), "right" (certo), "remember" (lembrar). Para pronunciar, imagine que está tentando dizer um "u" bem leve enquanto curva a língua para trás. Pratique: "rrr" (bem suave).</p><p>Dica especial: Muitos brasileiros pronunciam o R do inglês como um R português forte, o que é ERRADO. Assista a vídeos de pronúncia de falantes nativos para pegar a qualidade certa deste som. É um dos sons mais importantes para soar como um falante nativo.</p><p><strong>W (som que não existe em português)</strong> - O W em inglês é um som muito suave, quase como um "u" no início de uma palavra. Exemplos: "water" (água), "why" (por quê), "welcome" (bem-vindo), "window" (janela), "wonderful" (maravilhoso).</p><p>Para produzir o som, arredonde bem os lábios (como para dizer "u") mas deixe um pequeno espaço entre eles, e pronuncie como se fosse o início de "u": "w, w, w". Não deve soar como "v" português. É um som labial puro.</p><p><strong>Y (som consonantal diferente do Y português)</strong> - Quando Y está no início de palavras, soa como um "i" bem suave ou como um "j" português muito suave. Exemplos: "yes" (sim), "year" (ano), "yellow" (amarelo), "young" (jovem), "yesterday" (ontem).</p><p>Para pronunciar, coloque a língua no teto da boca (como para dizer "i") e deixe um pequeno espaço. O ar passa criando um som "j" suave. Pratique: "yes", "year", "young" várias vezes.</p><p><strong>V (diferente do V português)</strong> - O V em inglês é mais sonoro que em português. Você coloca o lábio inferior DEBAIXO dos dentes superiores e deixa o ar passar vibrando as cordas vocais. Exemplos: "very" (muito), "video" (vídeo), "seven" (sete), "river" (rio), "never" (nunca).</p><p>Pratique o som: coloque o lábio inferior sob os dentes superiores e diga "vvvv" vibrando a voz. Depois tente as palavras acima. O som deve ser mais ressonante que o V português.</p><p><strong>Z (som semelhante ao português, mas em mais palavras)</strong> - O Z em inglês é semelhante ao Z português, mas aparece em MUITO mais palavras. Em português, muitas palavras têm "s", mas em inglês têm "z". Exemplos: "zero" (zero), "zone" (zona), "zebra" (zebra), "zip" (zíper), "lazy" (preguiçoso).</p><p>O som é feito colocando a língua logo atrás dos dentes e deixando o ar passar enquanto vibra as cordas vocais: "zzzz". Pratique as palavras acima.</p><p><strong>J (diferente em palavras específicas)</strong> - O J em inglês soa como "j" português, mas em uma posição diferente. Exemplos: "jump" (pular), "just" (apenas), "job" (trabalho), "jog" (trotar), "join" (entrar).</p><p>Coloque a língua no teto da boca e deixe o ar sair lateralmente: "jjj". Depois tente as palavras. Este é um som bem natural para quem fala português.</p><h4>Combinações Consonantais no Início (Consonant Clusters)</h4><p>Em inglês, é comum ter mais de uma consoante no início de palavras, algo que é raro em português. Exemplos: "tree" (árvore), "strong" (forte), "blue" (azul), "black" (preto), "green" (verde), "please" (por favor), "sleep" (dormir), "smile" (sorrir).</p><p>A dica é pronunciar cada consoante rapidamente, sem pausas. Não adicione uma vogal entre elas como em português ("te-ri" em vez de "tree"). Pratique: "tree" (uma sílaba rápida), "strong" (uma sílaba rápida), "please" (uma sílaba rápida).</p><h4>Prática Intensiva</h4><p>Aqui estão 20 palavras para praticar os sons desafiadores:</p><p>1. "think" (pensar) - TH surdo<br>2. "that" (aquilo) - TH sonoro<br>3. "red" (vermelho) - R suave<br>4. "water" (água) - W<br>5. "yes" (sim) - Y consonantal<br>6. "very" (muito) - V sonoro<br>7. "zero" (zero) - Z<br>8. "jump" (pular) - J<br>9. "tree" (árvore) - TR cluster<br>10. "black" (preto) - BL cluster<br>11. "three" (três) - TH + R<br>12. "through" (através) - TH + R<br>13. "brother" (irmão) - TH + R<br>14. "mother" (mãe) - TH<br>15. "wrong" (errado) - WR cluster<br>16. "yellow" (amarelo) - Y<br>17. "zone" (zona) - Z<br>18. "video" (vídeo) - V<br>19. "smart" (inteligente) - SM cluster<br>20. "please" (por favor) - PL cluster</p><p>Ouça pronúncias de falantes nativos para cada palavra e repita pelo menos 5 vezes cada uma, todos os dias, durante uma semana. Ao final dessa semana, você terá dominado a maioria desses sons!</p><blockquote class="tip"><strong>💡 Dica crítica:</strong> Não tente "forçar" esses sons. Deixe sua boca e língua se relaxarem na posição correta e deixe o ar e as vibrações vocais fazerem o trabalho. Sons de fala são naturais quando você está na posição certa. Relaxe a mandíbula!</blockquote>`, cards:[{q:"Como pronunciar o TH em inglês?",a:"Coloque a ponta da língua ENTRE os dentes superiores e inferiores e deixe o ar passar. TH surdo: 'think' (sem vibração vocal). TH sonoro: 'this' (com vibração vocal)."},{q:"Por que o R em inglês é tão diferente?",a:"O R em inglês é produzido curvando a língua para trás, criando um som suave de vogal modificada. Em português é gutural. Não use o R português ao falar inglês!"},{q:"Qual é a diferença entre W e V em inglês?",a:"W (water) - arredonde os lábios como para 'u' e pronuncie suavemente. V (very) - coloque o lábio inferior sob os dentes superiores e vibre as cordas vocais."}]},
    ],
    summary:{title:"Resumo do Módulo 1: Alfabeto e Pronúncia", points:["O alfabeto inglês tem 26 letras com sons bem diferentes do português. Pratique a pronúncia de cada letra diariamente.","Vogais longas e curtas são fundamentais em inglês - elas podem mudar o significado de palavras inteiras! A diferença entre 'ship' e 'sheep' é apenas a vogal.","Sons consonantais como TH, R, W, Y, V e Z são muito diferentes em inglês e exigem muita prática. O TH é o mais desafiador para brasileiros.","Consonant clusters (múltiplas consoantes juntas no início) são comuns em inglês e não devem ter vogal adicionada entre elas como em português."]},
    quizFinal:[{q:"Qual é a pronúncia correta do TH em 'think'?",opts:["Como T em português","Colocando a língua entre os dentes e deixando ar passar","Como S suave","Como F"],correct:1},{q:"Qual palavra tem o A longo?",opts:["Cat (gato)","Make (fazer)","Bad (ruim)","Lamp (lâmpada)"],correct:1},{q:"O que caracteriza o R em inglês?",opts:["É igual ao R português","É gutural como em português","É produzido curvando a língua para trás","Soa como L"],correct:2},{q:"Em qual palavra o I é curto?",opts:["Five (cinco)","Bike (bicicleta)","Ship (navio)","Time (tempo)"],correct:2},{q:"Como pronunciar 'tree' corretamente?",opts:["Te-ri (com pausa)","TRI (rápido, sem adicionar vogal)","Tre-e (com pausa)","Tré (com acento na primeira sílaba)"],correct:1},{q:"Qual é o som do TH em 'this'?",opts:["Surdo, como em 'think'","Sonoro, com vibração das cordas vocais","Como Z","Como S"],correct:1},{q:"Qual padrão geralmente indica vogal longa?",opts:["Consoante duplicada","Uma 'e' silenciosa no final ou vogal duplicada","Apenas uma consoante no final","Nenhum padrão específico"],correct:1},{q:"Como produzir o som W?",opts:["Como V português","Colocando os lábios arredondados como para 'u' e pronunciando suavemente","Como U puro","Como V inglês"],correct:1},{q:"Qual é a diferença entre 'cut' e 'cute'?",opts:["Apenas a letra final é diferente","A vogal U é curta em 'cut' e longa em 'cute'","São pronunciadas igual","Apenas a consoante é diferente"],correct:1}]

      {id:4, name:'Números, Cores e Objetos Cotidianos', dur:'20 min', content:`<h3>Números, Cores e Objetos Cotidianos</h3><p>Bem-vindo ao segundo módulo! Aqui você aprenderá vocabulário essencial que usa no dia a dia. Começamos com números, cores e objetos que aparecem constantemente em conversas em inglês. Esses são os blocos de construção para frases mais complexas.</p><h4>Números em Inglês (Numbers)</h4><p>Os números são uns dos primeiros vocabulários que aprendemos, seja qual for o idioma. Em inglês, pronunciar números corretamente é fundamental, especialmente para telefones, endereços, horas e valores monetários.</p><p><strong>Números de 0 a 10:</strong></p><p>0 - Zero (pronuncia-se "zírou") / 1 - One (pronuncia-se "uan") / 2 - Two (pronuncia-se "tu") / 3 - Three (pronuncia-se "tri") / 4 - Four (pronuncia-se "for") / 5 - Five (pronuncia-se "faiv") / 6 - Six (pronuncia-se "sics") / 7 - Seven (pronuncia-se "séven") / 8 - Eight (pronuncia-se "eit") / 9 - Nine (pronuncia-se "nain") / 10 - Ten (pronuncia-se "tén")</p><p><strong>Números de 11 a 20:</strong></p><p>11 - Eleven (pronuncia-se "iléven") / 12 - Twelve (pronuncia-se "tuélv") / 13 - Thirteen (pronuncia-se "tér-tin") / 14 - Fourteen (pronuncia-se "for-tin") / 15 - Fifteen (pronuncia-se "fif-tin") / 16 - Sixteen (pronuncia-se "sics-tin") / 17 - Seventeen (pronuncia-se "sévvn-tin") / 18 - Eighteen (pronuncia-se "eit-tin") / 19 - Nineteen (pronuncia-se "nain-tin") / 20 - Twenty (pronuncia-se "tuénti")</p><p><strong>Números de 20 a 100 (dezenas):</strong></p><p>20 - Twenty / 30 - Thirty / 40 - Forty / 50 - Fifty / 60 - Sixty / 70 - Seventy / 80 - Eighty / 90 - Ninety / 100 - One hundred</p><p>Para números como 21, 22, etc., você combina a dezena com a unidade: 21 = Twenty-one / 35 = Thirty-five / 47 = Forty-seven / 89 = Eighty-nine</p><p><strong>Números maiores:</strong></p><p>101 - One hundred and one / 200 - Two hundred / 1.000 - One thousand / 10.000 - Ten thousand / 100.000 - One hundred thousand / 1.000.000 - One million / 1.000.000.000 - One billion</p><p>Observe que em inglês americano, não usamos "and" após "hundred", mas em inglês britânico, usamos: American: "one hundred twenty-three" / British: "one hundred and twenty-three"</p><p><strong>Números decimais e frações:</strong></p><p>3.5 (três vírgula cinco) = Three point five / 2.14 = Two point one four / 1/2 = One half / 1/3 = One third / 1/4 = One quarter / 2/3 = Two thirds / 3/4 = Three quarters</p><blockquote class="tip"><strong>💡 Dica:</strong> Pratique contar em inglês todos os dias. Comece contando de 1 a 20, depois 1 a 50, depois 1 a 100. Depois, comece em números aleatórios e conte progressivamente. Esta é uma habilidade muito importante!</blockquote><h4>Cores Básicas (Basic Colors)</h4><p><strong>Cores primárias:</strong></p><p>Red - Vermelho / Blue - Azul / Yellow - Amarelo</p><p><strong>Cores secundárias e outras cores comuns:</strong></p><p>Green - Verde / Orange - Laranja / Purple - Roxo / Pink - Rosa / Brown - Marrom / Black - Preto / White - Branco / Gray (American) / Grey (British) - Cinza</p><p><strong>Variações de cores (shades):</strong></p><p>Light blue - Azul claro / Dark blue - Azul escuro / Light green - Verde claro / Dark green - Verde escuro / Bright red - Vermelho brilhante / Pale yellow - Amarelo pálido</p><p><strong>Exemplos em frases:</strong></p><p>"This apple is red." (Esta maçã é vermelha.) / "I like blue cars." (Eu gosto de carros azuis.) / "The sky is blue." (O céu é azul.) / "She is wearing a green dress." (Ela está usando um vestido verde.) / "My house is white and brown." (Minha casa é branca e marrom.)</p><blockquote class="tip"><strong>💡 Dica:</strong> Pratique associar cores com objetos reais ao seu redor. Aponte para algo e diga a cor em inglês em voz alta. Por exemplo: "This wall is white." / "My pen is blue." / "The floor is gray." Esta prática ajuda a memorizar tanto a cor quanto a estrutura básica de frase.</blockquote><h4>Objetos Cotidianos (Everyday Objects)</h4><p><strong>Objetos em casa (At home):</strong></p><p>Table - Mesa / Chair - Cadeira / Bed - Cama / Door - Porta / Window - Janela / Light - Luz / Clock - Relógio / Picture - Quadro / Sofa - Sofá / Lamp - Luminária / Cup - Xícara / Glass - Copo / Plate - Prato / Fork - Garfo / Knife - Faca / Spoon - Colher / Pot - Panela / Pan - Frigideira</p><p><strong>Objetos pessoais (Personal items):</strong></p><p>Book - Livro / Pen - Caneta / Pencil - Lápis / Paper - Papel / Phone - Telefone / Computer - Computador / Wallet - Carteira / Keys - Chaves / Watch - Relógio de pulso / Glasses - Óculos / Hat - Chapéu / Bag - Bolsa / Shoe - Sapato / Shirt - Camiseta / Pants - Calça / Dress - Vestido</p><p><strong>Objetos na rua (On the street):</strong></p><p>Car - Carro / Bus - Ônibus / Bike - Bicicleta / Motorcycle - Motocicleta / Truck - Caminhão / Tree - Árvore / Flower - Flor / House - Casa / Building - Prédio / Street - Rua / Road - Estrada / Bridge - Ponte / Park - Parque / School - Escola / Store - Loja / Restaurant - Restaurante</p><p><strong>Exemplos em frases:</strong></p><p>"I have a blue pen." (Eu tenho uma caneta azul.) / "Where is my phone?" (Onde está meu telefone?) / "There is a red car." (Há um carro vermelho.) / "She has brown glasses." (Ela tem óculos marrom.) / "The white house is big." (A casa branca é grande.) / "I like this black watch." (Eu gosto desse relógio preto.)</p><h4>Combinações de Números, Cores e Objetos</h4><p>Agora vamos combinar o que aprendemos! Aqui estão frases úteis:</p><p>"I have 5 red apples." (Eu tenho 5 maçãs vermelhas.) / "There are 10 blue pens on the table." (Há 10 canetas azuis na mesa.) / "She has 2 black shoes." (Ela tem 2 sapatos pretos.) / "The car is number 7 and it is yellow." (O carro é número 7 e é amarelo.) / "I see 3 green trees and 4 brown ones." (Vejo 3 árvores verdes e 4 marrom.)"</p><p>Continue praticando formando suas próprias frases usando números, cores e objetos. A prática consistente ajudará você a memorizar rapidamente!</p>`, cards:[{q:"Como se diz 25 em inglês?",a:"Twenty-five (tuénti-faiv). Combina a dezena (twenty) com a unidade (five) usando um hífen."},{q:"Qual é a cor oposta a 'black'?",a:"White (branco). Essas são as duas cores opostas mais óbvias em inglês, assim como em português."},{q:"Como dizer 'I have a blue pen' em inglês?",a:"'I have a blue pen.' Você coloca o artigo 'a', depois a cor 'blue', depois o objeto 'pen'."}]},
      {id:5, name:'Animais, Família e Partes do Corpo', dur:'22 min', content:`<h3>Animais, Família e Partes do Corpo</h3><p>Nesta lição, aprenderemos três categorias essenciais de vocabulário: animais, membros da família e partes do corpo. Esses são tópicos frequentes em conversas básicas e fundamental para descrever pessoas, animais e situações.</p><h4>Animais (Animals)</h4><p><strong>Animais domésticos (Pets):</strong></p><p>Dog - Cachorro / Cat - Gato / Bird - Pássaro / Fish - Peixe / Rabbit - Coelho / Hamster - Hamster / Guinea pig - Porquinho-da-índia / Horse - Cavalo / Cow - Vaca / Pig - Porco</p><p><strong>Animais selvagens (Wild animals):</strong></p><p>Lion - Leão / Tiger - Tigre / Bear - Urso / Monkey - Macaco / Elephant - Elefante / Giraffe - Girafa / Zebra - Zebra / Kangaroo - Canguru / Penguin - Pinguim / Whale - Baleia / Shark - Tubarão / Snake - Cobra / Crocodile - Crocodilo / Wolf - Lobo / Deer - Cervo / Rabbit - Coelho</p><p><strong>Pássaros (Birds):</strong></p><p>Eagle - Águia / Parrot - Papagaio / Owl - Coruja / Sparrow - Pardal / Duck - Pato / Chicken - Galinha / Peacock - Pavão</p><p><strong>Insetos (Insects):</strong></p><p>Ant - Formiga / Bee - Abelha / Butterfly - Borboleta / Spider - Aranha / Moth - Traça / Fly - Mosca / Mosquito - Mosquito / Beetle - Besouro / Grasshopper - Gafanhoto / Ladybug - Joaninha</p><p><strong>Peixes e animais aquáticos (Fish and aquatic animals):</strong></p><p>Fish - Peixe / Dolphin - Golfinho / Shark - Tubarão / Squid - Lula / Octopus - Polvo / Crab - Caranguejo / Lobster - Lagosta / Jellyfish - Medusa / Starfish - Estrela-do-mar / Sea horse - Cavalo-marinho</p><p><strong>Exemplos em frases:</strong></p><p>"I have a dog and a cat." (Eu tenho um cachorro e um gato.) / "The monkey is yellow and orange." (O macaco é amarelo e laranja.) / "There are 5 birds on the tree." (Há 5 pássaros na árvore.) / "Lions are big and strong." (Leões são grandes e fortes.) / "Do you like sharks?" (Você gosta de tubarões?) / "Butterflies are beautiful." (Borboletas são bonitas.)"</p><h4>Família (Family)</h4><p><strong>Membros da família próxima (Immediate family):</strong></p><p>Mother - Mãe / Father - Pai / Brother - Irmão / Sister - Irmã / Son - Filho / Daughter - Filha / Baby - Bebê / Twin - Gêmeo</p><p><strong>Familiares estendidos (Extended family):</strong></p><p>Grandmother - Avó / Grandfather - Avô / Grandchild - Neto/neta / Grandson - Neto / Granddaughter - Neta / Aunt - Tia / Uncle - Tio / Cousin - Primo/prima / Nephew - Sobrinho / Niece - Sobrinha / Husband - Marido / Wife - Esposa / Boyfriend - Namorado / Girlfriend - Namorada / Fiancée - Noiva / Fiancé - Noivo / Stepmother - Madrasta / Stepfather - Padrasto / Stepsister - Enteada / Stepbrother - Enteado / Mother-in-law - Sogra / Father-in-law - Sogro / Sister-in-law - Cunhada / Brother-in-law - Cunhado / Son-in-law - Genro / Daughter-in-law - Nora</p><p><strong>Descrições de parentes (Family relationships):</strong></p><p>Parents - Pais / Children - Filhos / Siblings - Irmãos / Grandparents - Avós / Relatives - Parentes / Family - Família / Only child - Filho único / Twins - Gêmeos</p><p><strong>Exemplos em frases:</strong></p><p>"My mother is a teacher." (Minha mãe é professora.) / "I have two sisters." (Eu tenho duas irmãs.) / "Her grandmother is very kind." (Sua avó é muito gentil.) / "My brother and I are twins." (Meu irmão e eu somos gêmeos.) / "Do you have cousins?" (Você tem primos?) / "My family is very big." (Minha família é muito grande.) / "Her husband is a doctor." (Seu marido é médico.)"</p><h4>Partes do Corpo (Parts of the Body)</h4><p><strong>Cabeça e rosto (Head and face):</strong></p><p>Head - Cabeça / Face - Rosto / Forehead - Testa / Eye - Olho / Eyes - Olhos / Eyebrow - Sobrancelha / Eyelash - Cílio / Nose - Nariz / Ear - Orelha / Mouth - Boca / Lip - Lábio / Tooth - Dente / Teeth - Dentes / Tongue - Língua / Chin - Queixo / Cheek - Bochecha / Jaw - Mandíbula / Hair - Cabelo / Beard - Barba / Mustache - Bigode</p><p><strong>Pescoço e tronco (Neck and torso):</strong></p><p>Neck - Pescoço / Shoulder - Ombro / Back - Costas / Chest - Peito / Stomach - Barriga / Belly / Abdomen - Abdômen / Hip - Quadril / Waist - Cintura / Side - Lado</p><p><strong>Membros (Limbs):</strong></p><p>Arm - Braço / Elbow - Cotovelo / Wrist - Pulso / Hand - Mão / Finger - Dedo / Thumb - Polegar / Palm - Palma da mão / Leg - Perna / Knee - Joelho / Ankle - Tornozelo / Foot - Pé / Toe - Dedo do pé / Heel - Calcanhar / Sole - Sola do pé</p><p><strong>Órgãos internos (Internal organs):</strong></p><p>Heart - Coração / Lung - Pulmão / Brain - Cérebro / Liver - Fígado / Kidney - Rim / Stomach - Estômago / Bone - Osso / Skin - Pele / Blood - Sangue / Muscle - Músculo / Nerve - Nervo</p><p><strong>Exemplos em frases:</strong></p><p>"I have big blue eyes." (Eu tenho olhos azuis grandes.) / "My nose is small." (Meu nariz é pequeno.) / "She has long black hair." (Ela tem cabelo preto longo.) / "He has a beard." (Ele tem uma barba.) / "My hand is hurt." (Minha mão está machucada.) / "Your feet are big." (Seus pés são grandes.) / "I have a toothache." (Tenho dor de dente.) / "My heart is beating fast." (Meu coração está batendo rápido.)"</p><h4>Combinações Prática</h4><p>Aqui estão frases combinando essas categorias:</p><p>"My sister has a white cat." (Minha irmã tem um gato branco.) / "The dog's ears are brown." (As orelhas do cachorro são marrom.) / "My father's eyes are blue." (Os olhos do meu pai são azuis.) / "The bird has yellow wings." (O pássaro tem asas amarelas.) / "My mother has long red hair." (Minha mãe tem cabelo vermelho longo.) / "My grandmother's hands are small." (As mãos da minha avó são pequenas.)"</p><p>Pratique descrevendo pessoas e animais usando essas palavras. Comece com descrições simples e vá construindo frases mais complexas!</p>`, cards:[{q:"Como se diz 'pai' e 'mãe' em inglês?",a:"'Father' (pai) e 'mother' (mãe). Também pode usar 'dad' e 'mom' em conversas informais."},{q:"Qual é a palavra em inglês para 'pulmão'?",a:"'Lung' (pronuncia-se 'láng'). Pulmões (plural) é 'lungs'."},{q:"Como descrever em inglês: 'Eu tenho olhos azuis'?",a:"'I have blue eyes.' Você coloca o verbo 'have', a cor 'blue', e a parte do corpo 'eyes'."}]},
      {id:6, name:'Comida, Bebidas e Estabelecimentos', dur:'23 min', content:`<h3>Comida, Bebidas e Estabelecimentos</h3><p>Nesta lição, aprenderemos vocabulário relacionado a alimentos, bebidas e lugares onde você vai. Estes são tópicos muito comuns em viagens, situações sociais e conversas diárias. Será especialmente útil quando você estiver comendo em restaurantes ou fazendo compras!</p><h4>Frutas e Legumes (Fruits and Vegetables)</h4><p><strong>Frutas (Fruits):</strong></p><p>Apple - Maçã / Orange - Laranja / Banana - Banana / Grape - Uva / Strawberry - Morango / Blueberry - Mirtilo / Watermelon - Melancia / Melon - Melão / Pineapple - Abacaxi / Mango - Manga / Papaya - Mamão / Lemon - Limão / Lime - Lima / Peach - Pêssego / Cherry - Cereja / Kiwi - Kiwi / Coconut - Coco / Pear - Pera / Plum - Ameixa / Raspberry - Framboesa / Blackberry - Amora</p><p><strong>Legumes (Vegetables):</strong></p><p>Tomato - Tomate / Cucumber - Pepino / Lettuce - Alface / Carrot - Cenoura / Potato - Batata / Onion - Cebola / Garlic - Alho / Pepper - Pimenta / Broccoli - Brócolis / Cauliflower - Couve-flor / Spinach - Espinafre / Corn - Milho / Peas - Ervilha / Beans - Feijão / Pumpkin - Abóbora / Eggplant - Berinjela / Zucchini - Abobrinha / Cabbage - Repolho / Celery - Aipo / Beet - Beterraba / Squash - Abóbora</p><p><strong>Exemplos em frases:</strong></p><p>"I like red apples." (Eu gosto de maçãs vermelhas.) / "Bananas are yellow." (Bananas são amarelas.) / "Do you like vegetables?" (Você gosta de legumes?) / "Carrots are orange." (Cenouras são laranja.) / "She likes strawberries." (Ela gosta de morangos.) / "I eat broccoli every day." (Eu como brócolis todo dia.)"</p><h4>Proteínas e Alimentos Principais (Proteins and Main Foods)</h4><p><strong>Carnes (Meat):</strong></p><p>Beef - Carne vermelha / Pork - Carne de porco / Chicken - Frango / Turkey - Peru / Fish - Peixe / Lamb - Cordeiro / Duck - Pato / Steak - Bife / Ham - Presunto / Bacon - Bacon / Sausage - Salsicha</p><p><strong>Laticínios e ovos (Dairy and eggs):</strong></p><p>Milk - Leite / Cheese - Queijo / Yogurt - Iogurte / Butter - Manteiga / Cream - Creme / Egg - Ovo / Eggs - Ovos / Ice cream - Sorvete</p><p><strong>Pão e cereais (Bread and cereals):</strong></p><p>Bread - Pão / Rice - Arroz / Pasta - Macarrão / Noodles - Noodles / Cereal - Cereal / Oats - Aveia / Beans - Feijão</p><p><strong>Doces e sobremesas (Sweets and desserts):</strong></p><p>Chocolate - Chocolate / Candy - Bala / Cookie - Biscoito / Cake - Bolo / Pie - Torta / Pudding - Pudim / Jam - Geléia / Honey - Mel / Sugar - Açúcar / Salt - Sal / Oil - Óleo / Vinegar - Vinagre / Sauce - Molho / Spice - Tempero / Pepper - Pimenta / Mustard - Mostarda / Ketchup - Ketchup / Mayonnaise - Maionese</p><p><strong>Exemplos em frases:</strong></p><p>"I like fish and rice." (Eu gosto de peixe e arroz.) / "Chicken is my favorite." (Frango é meu favorito.) / "Do you eat beef?" (Você come carne vermelha?) / "She drinks milk every morning." (Ela bebe leite todas as manhãs.) / "I like cheese on my bread." (Eu gosto de queijo no meu pão.) / "This chocolate is delicious." (Este chocolate é delicioso.)"</p><h4>Bebidas (Drinks)</h4><p><strong>Bebidas sem álcool (Non-alcoholic drinks):</strong></p><p>Water - Água / Milk - Leite / Juice - Suco / Orange juice - Suco de laranja / Apple juice - Suco de maçã / Coffee - Café / Tea - Chá / Green tea - Chá verde / Lemon tea - Chá de limão / Soda - Refrigerante / Cola - Cola / Lemonade - Limonada / Smoothie - Smoothie / Milkshake - Milkshake</p><p><strong>Bebidas alcoólicas (Alcoholic drinks):</strong></p><p>Beer - Cerveja / Wine - Vinho / Red wine - Vinho tinto / White wine - Vinho branco / Whiskey - Uísque / Vodka - Vodca / Rum - Rum / Gin - Gim / Tequila - Tequila / Cocktail - Coquetel</p><p><strong>Exemplos em frases:</strong></p><p>"I drink water every day." (Eu bebo água todos os dias.) / "Do you like coffee?" (Você gosta de café?) / "She drinks orange juice in the morning." (Ela bebe suco de laranja pela manhã.) / "I prefer tea to coffee." (Eu prefiro chá a café.) / "Would you like a soda?" (Você gostaria de um refrigerante?) / "He drinks beer on weekends." (Ele bebe cerveja nos fins de semana.)"</p><h4>Estabelecimentos (Places to Go)</h4><p><strong>Lugares para comer (Places to eat):</strong></p><p>Restaurant - Restaurante / Cafe - Café / Bakery - Padaria / Butcher shop - Açougue / Market - Mercado / Supermarket - Supermercado / Food court - Praça de alimentação / Fast food restaurant - Restaurante de comida rápida / Pizza place - Pizzaria / Steakhouse - Churrascaria / Seafood restaurant - Restaurante de frutos do mar</p><p><strong>Outros lugares importantes (Other important places):</strong></p><p>School - Escola / University - Universidade / Hospital - Hospital / Doctor - Médico / Clinic - Clínica / Pharmacy - Farmácia / Bank - Banco / Library - Biblioteca / Museum - Museu / Park - Parque / Beach - Praia / Mountain - Montanha / Hotel - Hotel / Airport - Aeroporto / Train station - Estação de trem / Bus station - Rodoviária / Store - Loja / Shop - Loja / Office - Escritório / Factory - Fábrica / Church - Igreja / Temple - Templo</p><p><strong>Exemplos em frases:</strong></p><p>"I like this restaurant." (Eu gosto deste restaurante.) / "Let's go to the cafe." (Vamos ao café.) / "She works at the hospital." (Ela trabalha no hospital.) / "Where is the nearest supermarket?" (Onde fica o supermercado mais próximo?) / "I study at the university." (Eu estudo na universidade.) / "We went to the beach last weekend." (Fomos à praia no fim de semana passado.) / "The library is beautiful." (A biblioteca é bonita.)"</p><h4>Frases Úteis em Restaurantes</h4><p>"Hello, I would like a table for two." (Olá, gostaria de uma mesa para dois.) / "What is the special of the day?" (Qual é o prato do dia?) / "I would like chicken and rice." (Gostaria de frango e arroz.) / "Can I have a coffee, please?" (Posso tomar um café, por favor?) / "The bill, please." (A conta, por favor.) / "Is it delicious?" (É delicioso?) / "Thank you for the meal." (Obrigado pela refeição.)"</p>`, cards:[{q:"Como dizer 'Eu gosto de frango' em inglês?",a:"'I like chicken.' O verbo 'like' (gostar) é essencial e vem após 'I'."},{q:"Qual é a palavra em inglês para 'restaurante'?",a:"'Restaurant' (pronuncia-se 'résturrant'). Também pode usar 'cafe' para locais mais informais."},{q:"Como pedir um café em um restaurante em inglês?",a:"'Can I have a coffee, please?' ou 'I would like a coffee, please.' Ambas são expressões polidas e corretas."}]},

    summary:{title:"Resumo do Módulo 2: Vocabulário Essencial", points:["Números, cores e objetos cotidianos formam a base para descrever o mundo ao seu redor. Pratique números até 100 diariamente.","Animais, familiares e partes do corpo são categorias essenciais para descrever pessoas e situações. Combine-os em frases para praticar.","Comida, bebidas e estabelecimentos são tópicos práticos para conversas reais. Aprenda também frases úteis em restaurantes para viagens futuras.","O vocabulário é melhor aprendido em contexto! Sempre que aprende uma palavra nova, tente usá-la em uma frase completa."]},
    quizFinal:[{q:"Como se diz 35 em inglês?",opts:["Three-five","Thirty-five","Thirty five","Thirtyfive"],correct:1},{q:"Qual é a cor oposta a 'white'?",opts:["Gray","Black","Dark","Light"],correct:1},{q:"Como dizer 'Eu tenho um gato preto' em inglês?",opts:["I have one black cat","I have a black cat","I have black a cat","I cat have black"],correct:1},{q:"Qual é a palavra para 'avó' em inglês?",opts:["Mother","Grandmother","Grandma","Old woman"],correct:1},{q:"Como se diz 'pé' em inglês?",opts:["Foot","Feet","Leg","Ankle"],correct:0},{q:"O que significa 'animal de estimação' em inglês?",opts:["Animal","Pet","Dog","Wild animal"],correct:1},{q:"Qual é a palavra para 'peixe' em inglês?",opts:["Shark","Fish","Bird","Water animal"],correct:1},{q:"Como pedir comida em um restaurante polidamente?",opts:["Give me food","I want food","I would like...","Give food"],correct:2},{q:"Qual é a bebida mais comum pela manhã?",opts:["Water","Coffee","Juice","Milk"],correct:1}]

      {id:7, name:'Verbos Essenciais: To Be, To Have, To Do', dur:'25 min', content:`<h3>Verbos Essenciais: To Be, To Have, To Do</h3><p>Estes são os três verbos mais importantes em inglês! Praticamente todas as frases usam um desses verbos. Se você dominar "To Be" (ser/estar), "To Have" (ter) e "To Do" (fazer), você já consegue criar muitas frases úteis.</p><h4>Verbo "To Be" (Ser/Estar)</h4><p>Este é o verbo mais importante em inglês. Ele pode significar tanto "ser" quanto "estar" em português, dependendo do contexto. Vamos aprender a conjugação:</p><p><strong>Presente do verbo "To Be":</strong></p><p>I am - Eu sou/estou / You are - Você é/está / He is - Ele é/está / She is - Ela é/está / It is - Ele/Ela é/está (para coisas) / We are - Nós somos/estamos / They are - Eles/Elas são/estão</p><p><strong>Formas contraídas (muito usadas em conversas):</strong></p><p>I'm / You're / He's / She's / It's / We're / They're</p><p><strong>Forma negativa:</strong></p><p>I am not - Eu não sou/estou / You are not - Você não é/está / He is not - Ele não é/está / She is not - Ela não é/está / It is not - Ele/Ela não é/está / We are not - Nós não somos/estamos / They are not - Eles não são/estão</p><p><strong>Formas contraídas negativas:</strong></p><p>I'm not / You're not (ou You aren't) / He's not (ou He isn't) / She's not (ou She isn't) / It's not (ou It isn't) / We're not (ou We aren't) / They're not (ou They aren't)</p><p><strong>Exemplos práticos com "To Be":</strong></p><p>"I am a student." (Eu sou um estudante.) / "You are my friend." (Você é meu amigo.) / "He is a doctor." (Ele é um médico.) / "She is happy." (Ela é feliz.) / "It is a book." (É um livro.) / "We are here." (Nós estamos aqui.) / "They are tall." (Eles são altos.)"</p><p>"I am not Brazilian." (Eu não sou brasileiro.) / "You are not late." (Você não está atrasado.) / "He is not here." (Ele não está aqui.) / "She is not tired." (Ela não é cansada.) / "It is not expensive." (Não é caro.)"</p><p><strong>Perguntas com "To Be":</strong></p><p>"Are you ready?" (Você está pronto?) / "Is he here?" (Ele está aqui?) / "Are they your friends?" (Eles são seus amigos?) / "Is she a teacher?" (Ela é professora?)"</p><blockquote class="tip"><strong>💡 Dica importante:</strong> Use as formas contraídas em conversas informais! "I'm", "You're", "He's" são muito mais naturais que "I am", "You are", "He is". Em escrita formal, você pode usar a forma completa.</blockquote><h4>Verbo "To Have" (Ter)</h4><p>Este verbo é usado para indicar posse ou para falar sobre situações de saúde e condições.</p><p><strong>Presente do verbo "To Have":</strong></p><p>I have - Eu tenho / You have - Você tem / He has - Ele tem / She has - Ela tem / It has - Ele/Ela tem / We have - Nós temos / They have - Eles têm</p><p>Atenção: Na terceira pessoa do singular (He, She, It), o verbo muda para "has"! Este é um dos erros mais comuns!</p><p><strong>Forma negativa:</strong></p><p>I don't have - Eu não tenho / You don't have - Você não tem / He doesn't have - Ele não tem / She doesn't have - Ela não tem / It doesn't have - Ele/Ela não tem / We don't have - Nós não temos / They don't have - Eles não têm</p><p><strong>Exemplos práticos com "To Have":</strong></p><p>"I have a phone." (Eu tenho um telefone.) / "You have a big house." (Você tem uma casa grande.) / "He has a blue car." (Ele tem um carro azul.) / "She has long hair." (Ela tem cabelo longo.) / "We have 2 dogs." (Nós temos 2 cães.) / "They have 3 children." (Eles têm 3 filhos.)"</p><p>"I don't have a pen." (Eu não tenho uma caneta.) / "He doesn't have a job." (Ele não tem trabalho.) / "She doesn't have time." (Ela não tem tempo.) / "We don't have money." (Nós não temos dinheiro.)"</p><p><strong>Perguntas com "To Have":</strong></p><p>"Do you have a brother?" (Você tem um irmão?) / "Does he have a car?" (Ele tem um carro?) / "Do they have children?" (Eles têm filhos?) / "Does she have glasses?" (Ela tem óculos?)"</p><h4>Verbo "To Do" (Fazer)</h4><p>Este verbo é usado para falar sobre ações, trabalho e para fazer perguntas.</p><p><strong>Presente do verbo "To Do":</strong></p><p>I do - Eu faço / You do - Você faz / He does - Ele faz / She does - Ela faz / It does - Ele/Ela faz / We do - Nós fazemos / They do - Eles fazem</p><p>Novamente, na terceira pessoa do singular, muda para "does"!</p><p><strong>Forma negativa:</strong></p><p>I don't do - Eu não faço / You don't do - Você não faz / He doesn't do - Ele não faz / She doesn't do - Ela não faz / It doesn't do - Ele/Ela não faz / We don't do - Nós não fazemos / They don't do - Eles não fazem</p><p><strong>Exemplos práticos com "To Do":</strong></p><p>"I do my homework." (Eu faço meu dever de casa.) / "You do a good job." (Você faz um bom trabalho.) / "He does the dishes." (Ele lava a louça.) / "She does exercise every day." (Ela faz exercício todo dia.) / "We do sports." (Nós praticamos esportes.) / "They do their best." (Eles fazem o seu melhor.)"</p><p>"I don't do anything." (Eu não faço nada.) / "He doesn't do homework." (Ele não faz dever de casa.) / "She doesn't do exercise." (Ela não faz exercício.)"</p><p><strong>Perguntas com "To Do":</strong></p><p>"What do you do?" (O que você faz? - Para trabalho, profissão) / "Does he do homework?" (Ele faz dever de casa?) / "Do they do exercise?" (Eles praticam exercício?) / "What does she do on weekends?" (O que ela faz nos fins de semana?)"</p><h4>Tabela Resumida</h4><p>Aqui está uma tabela com os três verbos para referência rápida:</p><p><strong>TO BE:</strong> I am / You are / He/She/It is / We are / They are<br><strong>TO HAVE:</strong> I have / You have / He/She/It has / We have / They have<br><strong>TO DO:</strong> I do / You do / He/She/It does / We do / They do</p><p><strong>NEGATIVO:</strong><br><strong>TO BE:</strong> I'm not / You aren't / He/She/It isn't / We aren't / They aren't<br><strong>TO HAVE:</strong> I don't have / You don't have / He/She/It doesn't have / We don't have / They don't have<br><strong>TO DO:</strong> I don't do / You don't do / He/She/It doesn't do / We don't do / They don't do</p>`, cards:[{q:"Qual é a forma correta: 'He have' ou 'He has'?",a:"'He has' é correta. Na terceira pessoa do singular (He, She, It), o verbo muda para 'has' em 'To Have'."},{q:"Como fazer uma pergunta com 'To Have'?",a:"Use 'Do you have...?' para você e 'Does he/she have...?' para terceira pessoa. Exemplo: 'Do you have a phone?' / 'Does he have a car?'"},{q:"Qual é a diferença entre 'Is not' e 'Isn't'?",a:"São a mesma coisa! 'Isn't' é a forma contraída de 'Is not'. Use 'isn't' em conversas informais."}]},
      {id:8, name:'Artigos, Preposições e Pronomes Básicos', dur:'24 min', content:`<h3>Artigos, Preposições e Pronomes Básicos</h3><p>Nesta lição, aprenderemos os pequenos elementos que conectam as palavras em inglês: artigos (a, an, the), preposições (in, on, at) e pronomes (I, you, he, she). Esses elementos são essenciais para criar frases gramaticalmente corretas.</p><h4>Artigos (Articles)</h4><p><strong>Artigo indefinido "A" e "An":</strong></p><p>Em inglês, existem dois artigos indefinidos: "A" e "An". A diferença é simples: "A" é usado antes de palavras que começam com som de consoante, e "An" é usado antes de palavras que começam com som de vogal.</p><p>"A" - Antes de consoante: "A book" (um livro) / "A cat" (um gato) / "A dog" (um cachorro) / "A house" (uma casa) / "A pen" (uma caneta) / "A person" (uma pessoa) / "A teacher" (um professor)</p><p>"An" - Antes de vogal: "An apple" (uma maçã) / "An egg" (um ovo) / "An orange" (uma laranja) / "An uncle" (um tio) / "An hour" (uma hora) / "An idea" (uma ideia) / "An elephant" (um elefante)"</p><p>IMPORTANTE: Não é sobre a LETRA, é sobre o SOM! "A university" (uma universidade) usa "A" porque "university" começa com som de "y" (consoante), não de vogal!</p><p><strong>Artigo definido "The":</strong></p><p>"The" é usado quando você está falando de algo específico que já foi mencionado ou que é conhecido. Em português, é como o artigo "o", "a", "os", "as".</p><p>"I have a cat. The cat is black." (Eu tenho um gato. O gato é preto.) / "She lives in a house. The house is big." (Ela mora em uma casa. A casa é grande.) / "I see a book. The book is red." (Vejo um livro. O livro é vermelho.)"</p><p>Quando você não está falando de algo específico, não usa "the": "I like books." (Eu gosto de livros - em geral) vs "I like the books on the shelf." (Eu gosto dos livros na prateleira - específicos)</p><p><strong>Quando NÃO usar artigo:</strong></p><p>Com nomes próprios: "John is here." (Não: "The John is here.") / Com nomes de cidades e países (geralmente): "I live in Brazil." (Não: "I live in the Brazil.") / Com nomes de pessoas: "Mary is my friend." / Com plurais genéricos: "Cats are cute." (Gatos são fofos - em geral)"</p><blockquote class="tip"><strong>💡 Dica:</strong> Em inglês, você DEVE usar um artigo ou demonstrativo antes da maioria dos substantivos singulares. "I have a car" está correto. "I have car" é ERRADO, mesmo que seja aceitável em português em algumas situações."</blockquote><h4>Preposições de Lugar (Prepositions of Place)</h4><p>Preposições são pequenas palavras que descrevem a relação espacial entre coisas.</p><p><strong>Preposições mais comuns:</strong></p><p>In - Em/dentro: "The book is in the bag." (O livro está na bolsa.)<br>On - Em cima/sobre: "The pen is on the table." (A caneta está na mesa.)<br>At - Em: "I am at home." (Estou em casa.)<br>Under - Debaixo: "The cat is under the chair." (O gato está debaixo da cadeira.)<br>Above - Acima: "The light is above the table." (A luz está acima da mesa.)<br>Between - Entre: "The girl is between two boys." (A menina está entre dois meninos.)<br>Behind - Atrás: "The tree is behind the house." (A árvore está atrás da casa.)<br>In front of - Na frente: "The car is in front of the house." (O carro está na frente da casa.)<br>Next to - Ao lado: "I sit next to my friend." (Sento ao lado do meu amigo.)<br>Beside - Ao lado: "She sits beside me." (Ela senta ao meu lado.)<br>Near - Perto: "My house is near the park." (Minha casa fica perto do parque.)<br>Far - Longe: "The store is far from here." (A loja fica longe daqui.)</p><p><strong>Exemplos com preposições:</strong></p><p>"The keys are on the counter." (As chaves estão no balcão.) / "I am in the kitchen." (Estou na cozinha.) / "The dog is under the table." (O cachorro está debaixo da mesa.) / "She is behind me." (Ela está atrás de mim.) / "The store is next to the bank." (A loja fica ao lado do banco.)"</p><h4>Pronomes Pessoais (Personal Pronouns)</h4><p>Pronomes são palavras que substituem nomes. Em inglês, eles são muito importantes!</p><p><strong>Pronomes de sujeito (Subject pronouns):</strong></p><p>I - Eu / You - Você / He - Ele / She - Ela / It - Ele/Ela (para coisas) / We - Nós / They - Eles/Elas</p><p><strong>Pronomes de objeto (Object pronouns):</strong></p><p>Me - Me/mim / You - Você / Him - Ele / Her - Ela / It - Ele/Ela / Us - Nós / Them - Eles/Elas</p><p><strong>Pronomes possessivos (Possessive pronouns):</strong></p><p>My - Meu/minha / Your - Seu/sua / His - Dele / Her - Dela / Its - Dele/dela (coisa) / Our - Nosso/nossa / Their - Deles/delas</p><p><strong>Exemplos:</strong></p><p>Sujeito: "I am here." (Eu estou aqui.) / "He is a doctor." (Ele é um médico.) / "We are happy." (Nós somos felizes.)<br>Objeto: "She likes me." (Ela gosta de mim.) / "I see him." (Eu o vejo.) / "They know us." (Eles nos conhecem.)<br>Possessivo: "My name is John." (Meu nome é John.) / "Your car is nice." (Seu carro é legal.) / "Their house is big." (A casa deles é grande.)"</p><p><strong>Pronomes demonstrativos (Demonstrative pronouns):</strong></p><p>This - Este/esta / That - Aquele/aquela / These - Estes/estas / Those - Aqueles/aquelas</p><p>"This book is interesting." (Este livro é interessante.) / "That car is expensive." (Aquele carro é caro.) / "These flowers are beautiful." (Essas flores são bonitas.) / "Those people are from Brazil." (Aquelas pessoas são do Brasil.)"</p><h4>Combinando tudo</h4><p>Agora vamos combinar artigos, preposições e pronomes em frases:</p><p>"The cat is in my house." (O gato está na minha casa.) / "Her books are on the table." (Os livros dela estão na mesa.) / "He is at a restaurant with his friends." (Ele está em um restaurante com seus amigos.) / "I see them at the park." (Vejo-os no parque.) / "The red pen is under my desk." (A caneta vermelha está embaixo da minha mesa.)"</p>`, cards:[{q:"Qual é a diferença entre 'A' e 'An'?",a:"'A' é usado antes de som de consoante ('A book'). 'An' é usado antes de som de vogal ('An apple'). O importante é o SOM, não a letra!"},{q:"Como se diz 'Os livros estão na mesa' em inglês?",a:"'The books are on the table.' Use 'The' para algo específico, 'on' para 'em cima de', e 'the table' para mesa específica."},{q:"Qual é o pronome de objeto para 'he'?",a:"'Him' é o pronome de objeto para 'he'. Exemplo: 'I like him' (Eu gosto dele)."}]},
      {id:9, name:'Tempos Verbais Básicos: Presente Simples', dur:'26 min', content:`<h3>Tempos Verbais Básicos: Presente Simples</h3><p>O Presente Simples é o tempo verbal mais importante em inglês e o que você usará com mais frequência. Ele descreve ações que acontecem regularmente, fatos gerais, e situações que são verdadeiras agora.</p><h4>Formação do Presente Simples</h4><p>O Presente Simples é muito simples de usar! Para a maioria dos pronomes, você simplesmente usa o verbo em sua forma básica (infinitivo sem "to"). Para terceira pessoa do singular (He, She, It), você adiciona "-s" ou "-es" ao final do verbo.</p><p><strong>Verbos regulares - forma afirmativa:</strong></p><p>I work - Eu trabalho / You work - Você trabalha / He/She/It works - Ele/Ela trabalha / We work - Nós trabalhamos / They work - Eles trabalham</p><p><strong>Regras para adicionar -s ou -es:</strong></p><p>Maioria dos verbos: Adicione "s" apenas: "play" → "He plays" (Ele joga) / "walk" → "She walks" (Ela caminha) / "like" → "It likes" (Gosta)</p><p>Verbos terminados em -s, -x, -z, -ch, -sh: Adicione "es": "kiss" → "She kisses" (Ela beija) / "box" → "He boxes" (Ele pratica boxe) / "watch" → "She watches" (Ela assiste) / "push" → "He pushes" (Ele empurra)</p><p>Verbos terminados em -y: Mude "y" para "i" e adicione "es": "study" → "He studies" (Ele estuda) / "cry" → "She cries" (Ela chora) / "try" → "They try" (Eles tentam - não muda porque "y" vem após consoante neste caso)</p><p>Na verdade, a regra é: "cry" → "cries" (mude y para i), mas "play" → "plays" (não mude porque y vem após consoante... espera, "play" tem "y" após consoante "l", então deveria ser "plays"... a regra correta é: mude y para i quando y vem APÓS consoante e é a última letra antes de "es").</p><p>Deixe me corrigir: Se o verbo termina em "consoante + y", mude y para i e adicione es. Se termina em "vogal + y", apenas adicione s.</p><p>"Study" (consoante "d" + y) → "Studies" / "Play" (vogal "a" + y) → "Plays" / "Cry" (consoante "r" + y) → "Cries" / "Buy" (vogal "u" + y) → "Buys"</p><p><strong>Forma negativa:</strong></p><p>Para fazer a negativa, use "don't" (para I, you, we, they) ou "doesn't" (para he, she, it) + verbo na forma básica:</p><p>I don't work / You don't work / He/She/It doesn't work / We don't work / They don't work</p><p>IMPORTANTE: Na negativa, o verbo volta à forma básica! "He doesn't works" é ERRADO. O correto é "He doesn't work".</p><p><strong>Forma interrogativa (perguntas):</strong></p><p>Use "Do" (para I, you, we, they) ou "Does" (para he, she, it) + pronome + verbo na forma básica:</p><p>Do I work? / Do you work? / Does he/she/it work? / Do we work? / Do they work?</p><p><strong>Respostas curtas:</strong></p><p>Yes, I do. / Yes, you do. / Yes, he/she/it does. / Yes, we do. / Yes, they do. / No, I don't. / No, you don't. / No, he/she/it doesn't. / No, we don't. / No, they don't.</p><h4>Verbos Irregulares</h4><p>Alguns verbos muito comuns não seguem a regra de adicionar "s" ou "es". Os mais importantes são:</p><p><strong>Go:</strong> I/You/We/They go → He/She/It goes / <strong>Have:</strong> I/You/We/They have → He/She/It has / <strong>Do:</strong> I/You/We/They do → He/She/It does / <strong>Be:</strong> I am → You/We/They are → He/She/It is</p><p>Você já aprendeu estes! Apenas lembre-se que "goes", "has", "does", "is" são as formas para terceira pessoa.</p><h4>Usos do Presente Simples</h4><p><strong>1. Ações habituais (coisas que você faz regularmente):</strong></p><p>"I wake up at 7 AM every day." (Acordo às 7 da manhã todo dia.) / "She goes to the gym on Mondays." (Ela vai à academia nas segundas.) / "He drinks coffee in the morning." (Ele bebe café pela manhã.) / "They eat lunch at noon." (Eles almoçam ao meio-dia.) / "We watch TV on weekends." (Assistimos TV nos fins de semana.)"</p><p><strong>2. Fatos gerais ou verdades:</strong></p><p>"The sun rises in the east." (O sol nasce no leste.) / "Dogs are loyal." (Cães são leais.) / "Water boils at 100 degrees Celsius." (A água ferve a 100 graus Celsius.) / "Brazil is in South America." (Brasil fica na América do Sul.) / "I like pizza." (Gosto de pizza.)"</p><p><strong>3. Profissão ou o que alguém faz:</strong></p><p>"What do you do?" (O que você faz? - profissão) / "I'm a teacher. I teach English." (Sou professora. Ensino inglês.) / "He works in a bank." (Ele trabalha em um banco.) / "She is a doctor. She helps people." (Ela é médica. Ajuda pessoas.)"</p><p><strong>4. Horários e programações:</strong></p><p>"The train leaves at 10 PM." (O trem sai às 10 da noite.) / "The movie starts at 8 o'clock." (O filme começa às 8 horas.) / "School begins in September." (A escola começa em setembro.)"</p><h4>Exemplos Práticos Completos</h4><p><strong>Afirmativo:</strong> "I study English every day." (Estudo inglês todo dia.) / "She likes chocolate." (Ela gosta de chocolate.) / "They play basketball on Fridays." (Eles jogam basquete nas sextas.) / "He works from Monday to Friday." (Ele trabalha de segunda a sexta.)"</p><p><strong>Negativo:</strong> "I don't like vegetables." (Não gosto de legumes.) / "She doesn't live in the city." (Ela não mora na cidade.) / "They don't speak Portuguese." (Eles não falam português.) / "He doesn't have a car." (Ele não tem carro.)"</p><p><strong>Interrogativo:</strong> "Do you like pizza?" (Você gosta de pizza?) / "Does she speak English?" (Ela fala inglês?) / "What do they do on weekends?" (O que eles fazem nos fins de semana?) / "When does he work?" (Quando ele trabalha?)"</p><p><strong>Respostas curtas:</strong> "Do you like pizza?" "Yes, I do." / "Does she speak French?" "No, she doesn't." / "Do they live here?" "Yes, they do."</p><p>O Presente Simples é a base para todos os outros tempos! Pratique muito, criando suas próprias frases com rotinas, hábitos e fatos sobre você e seu mundo.</p>`, cards:[{q:"Como se forma a terceira pessoa do singular no Presente Simples?",a:"Adicione 's' ou 'es' ao verbo básico. Exemplos: 'work' → 'works', 'study' → 'studies', 'watch' → 'watches'."},{q:"Qual é a forma correta: 'He doesn't works' ou 'He doesn't work'?",a:"'He doesn't work' é correta. Na negativa, o verbo volta à forma básica depois de 'doesn't'."},{q:"Como fazer uma pergunta no Presente Simples com 'you'?",a:"Use 'Do you + verbo básico?'. Exemplo: 'Do you like pizza?' / 'Do you speak English?'"}]},
    ],
    summary:{title:"Resumo do Módulo 3: Estruturas Gramaticais Básicas", points:["Os três verbos essenciais 'To Be' (ser/estar), 'To Have' (ter) e 'To Do' (fazer) são a base de praticamente todas as frases. Dedomine-os completamente!","Artigos ('A', 'An', 'The'), preposições ('in', 'on', 'at') e pronomes (I, you, he, she, my, your, his, her) conectam as palavras e são essenciais para frases corretas.","O Presente Simples é o tempo verbal mais importante e é usado para rotinas, fatos gerais, profissões e horários. A formação é simples: maioria das pessoas usa o verbo básico, terceira pessoa do singular adiciona 's' ou 'es'.","Pratique formando frases afirmativas, negativas e interrogativas em Presente Simples. Comece com sua própria rotina: o que você faz todos os dias?"]},
    quizFinal:[{q:"Qual é a forma de 'to be' para 'he'?",opts:["I am","You are","He is","They are"],correct:2},{q:"'He have a car' é correto?",opts:["Sim, é a forma correta","Não, deveria ser 'He has a car'","Não, deveria ser 'He having a car'","Não, deveria ser 'He do have a car'"],correct:1},{q:"Complete: 'I ___ to the gym every day.'",opts:["go","goes","going","am go"],correct:0},{q:"Qual pronome substitui 'John'?",opts:["She","It","He","You"],correct:2},{q:"Complete: 'Where ___ you live?'",opts:["do","does","are","is"],correct:0},{q:"Qual é a resposta correta para 'Does he like pizza?'",opts:["Yes, he like","Yes, he does","Yes, he is","Yes, he has"],correct:1},{q:"'The book is on the table.' A preposição aqui é:",opts:["book","on","table","is"],correct:1},{q:"Complete: 'She ___ English every day.'",opts:["study","studies","studying","has study"],correct:1},{q:"Qual frase está correta?",opts:["He no likes pizza","He doesn't like pizza","He don't like pizza","He is not like pizza"],correct:1}]
