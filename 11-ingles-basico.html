  {id:1,name:'Alfabeto, Pronunciação e Números',dur:'15 min',content:`<h3>Bem-vindo ao Inglês Básico!</h3><p>Neste primeiro tópico, você aprenderá os fundamentos mais importantes da língua inglesa: o alfabeto, a pronunciação correta e os números. Estes são os blocos de construção que você usará em absolutamente tudo no inglês. Não tem problema se você nunca estudou inglês antes - vamos começar do zero e construir uma base sólida!</p><h4>O Alfabeto Inglês</h4><p>O alfabeto inglês é composto por 26 letras. Embora seja semelhante ao alfabeto português, a pronunciação de muitas letras é diferente. Vou ensinar você a pronunciar cada letra corretamente. A, B, C, D, E, F, G são pronunciadas como: "éi", "bê", "sê", "dê", "i", "éf", "jê". As letras H, I, J, K, L, M, N soam como: "éichi", "ai", "jêi", "quêi", "él", "ém", "én". As próximas sete são O, P, Q, R, S, T, U: "ou", "pê", "kiú", "ar", "és", "tê", "iú". As últimas letras V, W, X, Y, Z são pronunciadas: "vê", "dábliu", "éks", "uai", "zêd".</p><h4>Números de 0 a 100</h4><p>Os números são essenciais para qualquer conversação. Zero é pronunciado "zírou" ou "óh" em algumas situações. Os números de 1 a 10 são: One (uán), Two (tu), Three (srí), Four (fór), Five (faiv), Six (síks), Seven (sévên), Eight (êit), Nine (náin), Ten (tén). De 11 a 19, temos padrões especiais: Eleven (iléven), Twelve (tuélv), Thirteen (sêr'tín), Fourteen (for'tín), Fifteen (fif'tín), Sixteen (síks'tín), Seventeen (sévên'tín), Eighteen (êi'tín), Nineteen (nain'tín). De 20 em diante, o padrão muda: Twenty (tuénti), Thirty (sêrti), Forty (fórti), Fifty (fifti), Sixty (síksti), Seventy (sévênti), Eighty (êiti), Ninety (náinti). Para números compostos, como 25, você diz Twenty-five (tuénti faiv). Pratique repetir estes números em voz alta para melhorar sua pronúncia!</p><h4>Acentuação e Ênfase</h4><p>Uma coisa muito importante em inglês é a acentuação das sílabas. Em português, a acentuação é frequentemente mais uniforme, mas em inglês, cada palavra tem uma sílaba que é enfatizada. Por exemplo, "TEléfone" em inglês é "TEléphone" (em inglês), mas a ênfase é diferente. Quando você diz números como "thirteen", a ênfase está em "THIR", não em "teen". Treinar a pronunciação correta desde o início vai ajudar você a entender melhor quando outras pessoas falam e a soar mais natural quando você fala inglês.</p><h4>Dicas Práticas</h4><p>Aqui estão algumas dicas para praticar: use um aplicativo de pronúncia ou vídeos do YouTube para ouvir a pronúncia correta. Repita em voz alta - isso é fundamental! Grave-se falando e compare com um falante nativo. Pratique contar de 0 a 100 lentamente, depois mais rápido. Pergunte a números em inglês durante o dia - qual é a temperatura? Que horas são? Qual é a data? Tudo isso ajuda você a internalizar os números naturalmente. Lembre-se: a prática leva à perfeição!`,cards:[{q:"Como é pronunciado o número 'seventeen'?",a:"Pronuncia-se 'sévên-tin', com ênfase na primeira sílaba."}]},
  {id:2,name:'Dias da Semana, Meses e Estações',dur:'15 min',content:`<h3>Calendário em Inglês</h3><p>Saber os dias da semana, meses e estações do ano é fundamental para qualquer conversação sobre datas e planejamento. Estes vocábulos aparecem constantemente no inglês diário, então vamos aprender bem e praticar bastante!</p><h4>Dias da Semana</h4><p>Os sete dias da semana em inglês são: Monday (mândi), Tuesday (tiúzdi), Wednesday (uénzdi), Thursday (sêrsdi), Friday (frái-di), Saturday (sáturdi) e Sunday (sândi). Sim, em inglês não usamos o artigo "o" ou "a" antes do dia da semana quando falamos sobre um dia específico. Por exemplo, você não diz "O segunda-feira" em português, e em inglês também não: você diz apenas "Monday I have English class" (Na segunda-feira eu tenho aula de inglês). Quando você quer falar sobre algo que acontece toda semana, você diz "On Mondays I always..." (Às segundas-feiras eu sempre...). Note que quando é um padrão repetitivo, você usa a forma plural com "on". Memorize bem: se você quer dizer um dia específico da próxima semana, usa-se "on" - "I will see you on Friday" (Vou te ver na sexta-feira).</p><h4>Meses do Ano</h4><p>Existem 12 meses em inglês. Os meses são: January (jânuari), February (fébruari), March (march), April (ápril), May (mêi), June (jun), July (juláia), August (ógast), September (sep-tém-ber), October (o-túber), November (no-vém-ber) e December (di-sém-ber). Os meses em inglês são sempre escritos com letra maiúscula quando abreviados (Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec). Quando você quer dizer em qual mês algo aconteceu, você usa "in" - por exemplo, "I was born in May" (Nasci em maio). A pronúncia dos meses é bem diferente do português, então ouça bastante! Por exemplo, "February" às vezes as pessoas falam "FEB-roo-air-y" ou "FEB-yoo-air-y". August é pronunciado como "ÓW-gust" com um som bem aberto no início.</p><h4>Estações do Ano</h4><p>Existem quatro estações principais: Spring (sprín) - primavera, Summer (sâmer) - verão, Fall ou Autumn (fól ou ótum) - outono, e Winter (uínter) - inverno. Note que em inglês americano usam "fall" e em inglês britânico usam "autumn" - ambos estão corretos! Quando você quer dizer em qual estação algo acontece, também usa-se "in" - "In summer I like to swim" (No verão eu gosto de nadar). As estações são nomes comuns e geralmente não levam letra maiúscula, a menos que iniciem uma frase.</p><h4>Combinando Datas Completas</h4><p>Agora que você sabe tudo isso, pode formar datas completas! A formato mais comum em inglês é: "Day, Month Date, Year". Por exemplo, "Friday, December 25, 2024" (Sexta-feira, 25 de dezembro de 2024). Em inglês falado e escrito, quando você diz a data, você pode dizer "December twenty-five" (vinte e cinco) ou "the twenty-fifth of December" (o vinte e cinco de dezembro). Na forma escrita mais formal, você pode ver "25th December" ou "December 25th". Pratique dizendo as datas em voz alta para se acostumar com o padrão!</p><h4>Prática com Datas</h4><p>Aqui está uma ótima prática: escreva sua data de nascimento em inglês, o aniversário de um amigo, a data de hoje, e algumas datas especiais para você. Depois, fale em voz alta! Por exemplo: "I was born on Monday, July 15, 1995" (Nasci na segunda-feira, 15 de julho de 1995). Isso ajuda a consolidar o aprendizado. Você também pode praticar dizendo "I have English class on Tuesdays and Thursdays in March" (Tenho aula de inglês às terças e quintas-feiras em março). A repetição é a chave para memorizar!`,cards:[{q:"Qual é a pronúncia correta de 'Thursday'?",a:"Pronuncia-se 'sêrsdi' - muitas pessoas confundem com 'Tuesday' (tiúzdi), mas 'Thursday' tem um som de 'r' no meio."}]},
  {id:3,name:'Saudações e Expressões Essenciais do Dia a Dia',dur:'15 min',content:`<h3>Como se Cumprimentar em Inglês</h3><p>As saudações são as primeiras coisas que você usa quando encontra alguém. Elas estabelecem o tom da conversa e mostram educação e respeito. Vamos aprender as saudações mais comuns e quando usá-las adequadamente!</p><h4>Saudações Formais e Informais</h4><p>A saudação mais básica é "Hello" (alou) - isso funciona em qualquer situação. "Hi" (hai) é mais informal e casual, perfeito para amigos e situações descontraídas. "Good morning" (gud mórning) é usada até cerca do meio-dia e é formal. "Good afternoon" (gud áftarnun) é usada do meio-dia até o por do sol. "Good evening" (gud iivning) é usada à noite, geralmente após o anoitecer. Quando você quer ser muito educado com alguém que não conhece bem, você pode dizer "How do you do?" (háu du iu du?) - mas isso é extremamente formal e raramente usado no inglês moderno. Mais comum é "How are you?" (háu ar iu?), que significa "Como você está?" e é educado mas não excessivamente formal. A resposta padrão é "I'm fine, thank you. And you?" (aim fain, sênqu. End iu?) ou mais naturalmente "I'm good, thanks. How about you?" (aim gúd, sênks. Háu abáut iu?).</p><h4>Respostas Quando Alguém Pergunta Como Você Está</h4><p>Quando alguém pergunta "How are you?", você tem várias opções de resposta. A resposta mais simples e genuína é "I'm fine" (aim fain) - estou bem. Mas você pode ser mais interessante e dizer "I'm very good" (aim véri gúd), "I'm great" (aim greit), "I'm excellent" (aim íksélent), ou até "I'm fantastic!" (aim fantástik). Se você não está se sentindo tão bem, pode dizer "I'm okay" (aim óquei), "Not too bad" (nót tu bad), ou "I'm a little tired" (aim e lítul taird). A coisa importante é sempre retornar a pergunta: "And you?" (end iu?), "What about you?" (uót abáut iu?), ou "How are you doing?" (háu ar iu duing?). Isso mostra que você está genuinamente interessado na outra pessoa.</p><h4>Apresentações Iniciais</h4><p>Quando você conhece alguém pela primeira vez, você pode dizer "My name is John" (mai neim iz John) ou mais naturalmente "I'm John" (aim John). A outra pessoa pode responder "Nice to meet you" (nais tu mit iu) - prazer em conhecê-lo. Você também pode dizer "I'm happy to meet you" (aim hápi tu mit iu) ou simplesmente "Nice to meet you too" (nais tu mit iu tu). Outra forma comum é "It's nice to meet you" (its nais tu mit iu). Se você já conhece a pessoa, você pode dizer "It's good to see you again" (its gúd tu si iu again) ou "How have you been?" (háu háv iu bin?) - como você tem estado?</p><h4>Expressões de Despedida</h4><p>Quando você precisa ir embora, tem várias opções. "Goodbye" (gudbai) é a mais formal e completa. "Bye" (bai) é casual e amigável. "See you later" (si iu léiter) é muito comum e significa que você vai ver a pessoa depois. "Take care" (teiqu kér) é amigável e mostra que você se importa. "See you soon" (si iu sun) é usado quando você pretende ver a pessoa em breve. "Have a great day" (háv e greit dei) é educado e positivo. "Good night" (gud nait) é especificamente para quando está ficando escuro ou quando você está indo dormir - não se diz isso de manhã!</p><h4>Expressões Úteis para Situações Cotidianas</h4><p>"Thank you" (sênqu) significa obrigado, e a resposta é "You're welcome" (iur uélcum) - de nada. "Please" (pliz) significa por favor e é muito importante ser educado. "Excuse me" (iksquis mi) é usado quando você quer chamar atenção ou passar por alguém. "I'm sorry" (aim sóri) significa desculpa, e a resposta é "It's okay" (its óquei) ou "No problem" (nou próblem). "How do you spell that?" (háu du iu spél dét?) é muito útil quando você quer confirmar como escreve algo. "What does that mean?" (uót daz dét min?) é para pedir a explicação de uma palavra. "Can you help me?" (kén iu hélp mi?) significa pode me ajudar? e é muito útil quando você precisa de assistência. "I don't understand" (ai dont ánderstend) é importante para que a outra pessoa saiba que você não conseguiu acompanhar. "Can you speak more slowly?" (kén iu spik mor slóuli?) é educado e útil quando você está aprendendo.</p><h4>Prática Diária</h4><p>Pratique estas saudações toda vez que você encontrar alguém - mesmo que seja na sua cabeça! Diga "Good morning" quando acordar, "How are you?" para as pessoas ao seu redor, "Thank you" quando alguém te ajudar, e "Goodbye" quando sair de um lugar. Quanto mais você pratica, mais natural fica. Grave-se fazendo essas saudações e ouça para comparar sua pronúncia com a de um falante nativo. Você pode praticar com aplicativos, vídeos, ou até com amigos que falam inglês. O importante é não ter medo de cometer erros - todo mundo que aprende idioma começa assim!`,cards:[{q:"Qual é a diferença entre 'Good night' e 'Good evening'?",a:"'Good evening' é uma saudação durante a noite (tipo de cumprimento), enquanto 'Good night' é uma despedida quando você vai dormir."}]},
  {id:4,name:'Verbo To Be - Presente Simples',dur:'20 min',content:`<h3>O Verbo To Be (Ser/Estar)</h3><p>O verbo "to be" é o verbo mais importante em inglês. Ele é irregular, o que significa que não segue os padrões normais de conjugação. Vamos aprender a conjugá-lo corretamente, pois você vai usar esse verbo constantemente em cada dia de seu aprendizado!</p><h4>Conjugação do Verbo To Be no Presente</h4><p>O verbo "to be" tem três formas no presente: "am", "is" e "are". "I am" (aim) significa "eu sou" ou "eu estou". "You are" (iu ar) significa "você é" ou "você está". "He is" (hi iz), "She is" (chi iz), "It is" (it iz) - ele/ela/isso é ou está. "We are" (ui ar) - nós somos ou estamos. "They are" (dei ar) - eles/elas são ou estão. Observe que "you" pode ser singular ou plural em inglês moderno - não existe diferença formal. Também note que "it" é usado para coisas, animais (quando não sabemos o gênero) e situações. Por exemplo, "It is a book" (é um livro), "It is a dog" (é um cachorro), "It is raining" (está chovendo).</p><h4>Usos Principais do Verbo To Be</h4><p>O verbo "to be" tem vários usos principais em inglês. O primeiro é para descrever o que alguém é - sua profissão, nacionalidade, ou identidade: "I am a teacher" (eu sou professor), "She is Brazilian" (ela é brasileira), "We are students" (nós somos alunos). O segundo uso é para descrever localização ou estado: "The book is on the table" (o livro está sobre a mesa), "They are in the classroom" (eles estão na sala de aula), "The weather is cold" (o tempo está frio). O terceiro uso é para descrever características ou sentimentos temporários: "I am happy" (eu estou feliz), "He is tired" (ele está cansado), "They are angry" (eles estão bravos). Todos esses usos são extremamente comuns e você vai encontrá-los centenas de vezes.</p><h4>Frases Interrogativas e Negativas</h4><p>Para fazer uma pergunta com o verbo "to be", você inverte a ordem: "Am I correct?" (estou correto?), "Is she a doctor?" (ela é médica?), "Are you happy?" (você está feliz?). A resposta pode ser "Yes, I am" (sim, estou), "No, he is not" (não, ele não é), "Yes, they are" (sim, eles estão). Para fazer uma negação, você adiciona "not": "I am not sick" (não estou doente), "He is not a teacher" (ele não é professor), "We are not late" (não chegamos atrasados). As formas contraídas são muito comuns: "I'm" (contração de "I am"), "He's" (contração de "He is" ou "He has"), "We're" (contração de "We are"), "They're" (contração de "They are"), "You're" (contração de "You are"). Para a negação, você pode dizer "I'm not", "He's not" ou "He isn't", "We're not" ou "We aren't", "They're not" ou "They aren't".</p><h4>Exemplos Práticos</h4><p>Aqui estão alguns exemplos práticos: "I am Brazilian" (sou brasileiro), "You are my friend" (você é meu amigo), "She is a doctor" (ela é médica), "It is a beautiful day" (é um dia lindo), "We are in the park" (estamos no parque), "They are not at home" (eles não estão em casa). Pratique criando suas próprias frases! Diga coisas sobre você: "I am [seu nome]", "I am [sua profissão ou hobby]", "I am [como você está se sentindo agora]". Depois faça perguntas a alguém: "Are you happy?", "Is he a teacher?", "Are they from Brazil?" A prática constante é a chave para dominar este verbo fundamental.</p><h4>Dicas Importantes</h4><p>Lembre-se que o verbo "to be" é usado para estados mais permanentes ou amplos - o que alguém é, onde alguém está, como alguém se sente. Não confunda com verbos de ação como "do" ou "go". Pratique escrevendo 10 frases com "to be" hoje. Depois escreva 5 perguntas. Finalmente, responda essas perguntas. Isso vai solidificar seu conhecimento. Se você estiver tendo dificuldade, volte e estude novamente. Este é um tópico crucial que você vai revisar muitas vezes ao longo de seu aprendizado, então não se preocupe se não memorizar tudo de uma vez!`,cards:[{q:"Qual é a forma correta de dizer 'Eu não sou professor' em inglês?",a:"'I am not a teacher' ou em forma contraída 'I'm not a teacher'. Você NUNCA diz 'I not am a teacher'."}]},
  {id:5,name:'Present Simple - Verbos Regulares e Estrutura Básica',dur:'20 min',content:`<h3>Tempo Presente Simples (Present Simple)</h3><p>O Present Simple é o tempo verbal mais usado em inglês para descrever rotinas, hábitos, fatos gerais e ações que acontecem regularmente. Vamos aprender a estrutura, as regras de conjugação e quando usar este tempo tão importante!</p><h4>Estrutura do Present Simple</h4><p>Para verbos regulares no Present Simple com pronomes "I", "you", "we" e "they", você usa a forma base do verbo. Por exemplo: "I play" (eu jogo), "You eat" (você come), "We drink" (nós bebemos), "They work" (eles trabalham). Para a terceira pessoa do singular ("he", "she", "it"), você adiciona "s" ou "es" ao final do verbo: "He plays" (ele joga), "She eats" (ela come), "It drinks" (isso bebe). Essa é a regra mais fundamental do Present Simple - a terceira pessoa singular recebe um "s" ou "es" adicional.</p><h4>Quando Adicionar "S" ou "ES"?</h4><p>A maioria dos verbos recebe simplesmente um "s": "play" vira "plays", "work" vira "works", "read" vira "reads", "write" vira "writes". Mas existem algumas exceções importantes. Se o verbo termina em "s", "x", "z", "ch" ou "sh", você adiciona "es": "do" vira "does" (daz), "go" vira "goes" (góuz), "watch" vira "watches", "brush" vira "brushes", "fix" vira "fixes". Se o verbo termina em consoante + "y", você muda o "y" para "i" e adiciona "es": "study" vira "studies", "cry" vira "cries", "try" vira "tries". Se o verbo termina em vogal + "y", você apenas adiciona "s": "play" vira "plays", "stay" vira "stays", "enjoy" vira "enjoys". Se termina em "o", você geralmente adiciona "es": "go" vira "goes", "do" vira "does". Memorizar essas regras é importante para falar e escrever corretamente.</p><h4>Frases Afirmativas no Present Simple</h4><p>Aqui estão exemplos de frases afirmativas com verbos regulares: "I work every day" (trabalho todos os dias), "She studies English" (ela estuda inglês), "He drinks coffee in the morning" (ele bebe café de manhã), "They play football on Saturdays" (eles jogam futebol nos sábados), "We eat lunch at noon" (comemos almoço ao meio-dia), "It rains often in the summer" (chove frequentemente no verão). Observe como usamos o Present Simple para descrever ações que acontecem regularmente ou hábitos. O tempo não especifica se está acontecendo agora ou não - apenas que é parte da rotina ou um fato geral.</p><h4>Frases Negativas no Present Simple</h4><p>Para fazer uma negação no Present Simple, você usa "do not" (don't) ou "does not" (doesn't). Estrutura: "I do not work" (não trabalho) ou "I don't work". "You do not study" (você não estuda) ou "You don't study". "He does not play" (ele não joga) ou "He doesn't play". "She does not eat meat" (ela não come carne) ou "She doesn't eat meat". "We do not like horror movies" (não gostamos de filmes de horror) ou "We don't like horror movies". "They do not live in the city" (eles não moram na cidade) ou "They don't live in the city". Note que quando você usa "does", você nunca adiciona o "s" ao verbo - você não diz "He doesn't plays", você diz "He doesn't play".</p><h4>Perguntas no Present Simple</h4><p>Para fazer perguntas, você coloca "do" ou "does" antes do sujeito: "Do I need to study?" (preciso estudar?), "Do you like pizza?" (você gosta de pizza?), "Does he work here?" (ele trabalha aqui?), "Does she speak English?" (ela fala inglês?), "Do we have time?" (temos tempo?), "Do they know her?" (eles a conhecem?). As respostas podem ser curtas: "Yes, I do" (sim), "No, I don't" (não), "Yes, he does" (sim, ele), "No, she doesn't" (não, ela). Quando você responde com "does", você nunca adiciona "s" ao verbo na resposta curta - você diz "Yes, he does" não "Yes, he does plays".</p><h4>Palavras de Frequência</h4><p>No Present Simple, você frequentemente usa palavras que indicam com que frequência algo acontece. Essas palavras são: "always" (sempre), "usually" (geralmente), "often" (frequentemente), "sometimes" (às vezes), "rarely" (raramente), "never" (nunca). Você as coloca entre o sujeito e o verbo: "I always eat breakfast" (sempre como café da manhã), "She usually works from 9 to 5" (ela geralmente trabalha de 9 às 5), "He sometimes plays video games" (ele às vezes joga videogame), "We rarely go to the beach" (raramente vamos à praia), "They never eat fish" (eles nunca comem peixe). Note que "always", "usually", "often" geralmente vêm no meio da sentença, mas "sometimes" pode vir no início ou no meio, e "rarely" e "never" também vêm no meio.</p><h4>Prática Essencial</h4><p>Escreva 10 frases sobre suas rotinas diárias usando o Present Simple. Depois escreva 5 negações sobre coisas que você não faz. Finalmente, faça 5 perguntas que você faria a um amigo. Por exemplo: "Do you like English?", "Does your mother work?", "What time do you wake up?". Leia essas frases em voz alta várias vezes para que fiquem naturais. O Present Simple é tão fundamental que você vai usar todos os dias, então dedicar tempo agora vai ter um grande impacto no seu aprendizado!`,cards:[{q:"Como se forma a terceira pessoa singular no Present Simple?",a:"Adiciona-se 's' ou 'es' ao verbo base. A maioria recebe 's' (he plays), verbos terminados em s, x, z, ch, sh recebem 'es' (she watches), e y muda para 'ies' (she studies)."}]},
  {id:6,name:'Perguntas Básicas - Como Fazer e Responder',dur:'20 min',content:`<h3>Fazendo Perguntas em Inglês</h3><p>Saber fazer perguntas é essencial para ter uma conversação real. Vamos aprender as estruturas mais importantes para fazer perguntas e como responder a elas de forma clara e natural!</p><h4>Estrutura das Perguntas com "Do" e "Does"</h4><p>A estrutura básica para fazer perguntas no presente é: "Do/Does + sujeito + verbo base + complemento?". Para "I", "you", "we", "they" você usa "do": "Do I look good?" (pareço bem?), "Do you understand?" (você entende?), "Do we have time?" (temos tempo?), "Do they know her?" (eles a conhecem?). Para "he", "she", "it" você usa "does": "Does he speak English?" (ele fala inglês?), "Does she like pizza?" (ela gosta de pizza?), "Does it work?" (funciona?). A resposta curta é "Yes, I do", "No, you don't", "Yes, he does", "No, she doesn't", "Yes, they do", "No, we don't". Pratique alternando entre fazer perguntas e responder - isso vai ajudar você a internalizar a estrutura.</p><h4>Perguntas com Palavras de Pergunta (Question Words)</h4><p>As palavras de pergunta mais comuns são: "What" (o quê), "Where" (onde), "When" (quando), "Why" (por quê), "Who" (quem), "How" (como), "Which" (qual), "Whose" (de quem). Quando você usa uma palavra de pergunta, ela geralmente vem no início da pergunta: "What do you do?" (o que você faz?), "Where do you live?" (onde você mora?), "When do you wake up?" (quando você acorda?), "Why do you like English?" (por que você gosta de inglês?), "Who is your best friend?" (quem é seu melhor amigo?), "How do you spell that?" (como você escreve isso?), "Which sport do you play?" (qual esporte você joga?), "Whose book is this?" (de quem é este livro?).</p><h4>Estrutura Especial com "Where", "What", "When"</h4><p>Quando você pergunta sobre o sujeito da sentença, a estrutura é um pouco diferente. Por exemplo: "Who likes pizza?" (quem gosta de pizza?) - aqui "who" é o sujeito, então você não inverte. A resposta seria "John likes pizza". "What happens?" (o que acontece?) - aqui "what" é o sujeito. "Which students study English?" (quais alunos estudam inglês?) - "which students" é o sujeito. Nesses casos, você não usa "do" ou "does" porque a palavra de pergunta já está no começo. Isso é uma regra especial que é importante notar.</p><h4>Usando "Do You...?" para Perguntas Gerais</h4><p>Quando você quer saber se alguém faz algo regularmente ou gosta de algo, você usa "Do you...?": "Do you like coffee?" (você gosta de café?), "Do you speak Portuguese?" (você fala português?), "Do you have siblings?" (você tem irmãos?), "Do you play sports?" (você joga esportes?). As respostas podem ser curtas ("Yes, I do" / "No, I don't") ou mais completas ("Yes, I like coffee very much" / "No, I don't speak Portuguese, but I speak English"). Sempre que você puder adicionar mais informação além de uma resposta curta, isso torna a conversação mais interessante e natural.</p><h4>Perguntas Comuns sobre Rotinas e Preferências</h4><p>Aqui estão algumas perguntas extremamente úteis que você vai usar constantemente: "What's your name?" (qual é seu nome?) - resposta: "My name is [nome]". "How are you?" (como você está?) - resposta: "I'm fine, thank you. And you?". "Where are you from?" (de onde você é?) - resposta: "I'm from Brazil". "What do you do?" (o que você faz? profissão) - resposta: "I'm a teacher" ou "I work as an engineer". "What time do you wake up?" (que horas você acorda?) - resposta: "I wake up at 7 AM". "What do you like to do in your free time?" (o que você gosta de fazer no seu tempo livre?) - resposta: "I like to read and play video games". "Do you have any hobbies?" (você tem algum hobby?) - resposta: "Yes, I love painting". Pratique essas perguntas com amigos ou falando para você mesmo em voz alta.</p><h4>Respondendo de Forma Completa e Natural</h4><p>Quando alguém faz uma pergunta, você pode responder de forma curta ou completa. A forma curta é rápida: "Do you like pizza?" "Yes, I do". Mas na conversação real, é melhor sempre adicionar mais informação: "Do you like pizza?" "Yes, I do! I love pizza, especially with cheese". "Where are you from?" "I'm from São Paulo, the biggest city in Brazil". "What do you do?" "I'm a teacher. I teach English at a school in the city center". Essas respostas mais completas fazem você parecer mais confiante e mostram que você realmente entende o inglês, não apenas está memorizando respostas.</p><h4>Dicas para Praticar Perguntas</h4><p>Uma ótima prática é escrever 15 perguntas que você poderia fazer a um amigo. Depois, imagine as respostas. Depois, se possível, faça essas perguntas realmente para alguém que fale inglês. Você também pode praticar com um espelho - faça a pergunta em voz alta, responda como se fosse outra pessoa, depois responda como você mesmo. Isso parece estranho, mas é incrivelmente eficaz para memorizar as estruturas. Lembre-se que fazer perguntas é uma habilidade crucial para qualquer conversação, então pratique todos os dias!`,cards:[{q:"Qual é a estrutura correta para fazer uma pergunta com 'do'?",a:"A estrutura é: 'Do + sujeito + verbo base + complemento?'. Exemplo: 'Do you like pizza?' Nunca diga 'You do like pizza?' para fazer uma pergunta."}]},
  {id:7,name:'Apresentação Pessoal - Falando Sobre Você',dur:'20 min',content:`<h3>Apresente-se em Inglês como um Nativo</h3><p>Agora que você aprendeu o básico, vamos colocar tudo junto para fazer uma apresentação pessoal completa e natural. Isso é algo que você vai fazer centenas de vezes na vida - em aulas, entrevistas, situações sociais - então vamos aprender a fazer isso bem!</p><h4>Estrutura de Uma Apresentação Básica</h4><p>Uma apresentação básica segue este padrão: 1) Seu nome, 2) De onde você é, 3) O que você faz (trabalho ou estudo), 4) Seus hobbies ou interesses. Aqui está um exemplo completo: "Hello, my name is Ana. I'm from São Paulo, Brazil. I'm a student, and I study English and Mathematics. In my free time, I like to read books and play volleyball". Note que você começa com uma saudação ("Hello") ou uma expressão como "Hi, I'm..." ou "My name is...". Você pode ser criativo aqui - algumas pessoas começam com "I'm happy to be here today" (estou feliz em estar aqui hoje) se for uma apresentação formal.</p><h4>Falando Sobre Seu Nome e Origem</h4><p>Quando você se apresenta, é natural falar sobre seu nome e de onde você é. Você pode dizer: "My name is [nome]" ou simplesmente "I'm [nome]". Se alguém perguntar o significado do seu nome, você pode explicar: "My name means [significado]" ou "It's a traditional Brazilian name". Quando você fala de onde é, você diz: "I'm from [cidade/país]". Por exemplo: "I'm from Rio de Janeiro" (sou do Rio de Janeiro), "I'm from Brazil" (sou do Brasil). Você pode adicionar mais informação: "I'm from a small town in the state of Minas Gerais" (sou de uma cidade pequena no estado de Minas Gerais) ou "I'm from the capital of São Paulo state" (sou da capital do estado de São Paulo).</p><h4>Descrevendo Seu Trabalho ou Estudos</h4><p>Esta é uma parte muito importante da apresentação. Se você está estudando, você diz: "I'm a student" (sou aluno/a) ou "I'm studying at [escola/universidade]". Você pode adicionar o que está estudando: "I'm studying English and Mathematics" (estou estudando inglês e matemática), "I'm studying Business Administration" (estou estudando Administração de Empresas). Se você trabalha, você diz: "I'm a teacher" (sou professor), "I work as an engineer" (trabalho como engenheiro), "I'm a nurse" (sou enfermeiro). Se você faz algo especial no seu trabalho, mencione: "I work with children" (trabalho com crianças), "I design websites" (projeto sites), "I help people with health problems" (ajudo pessoas com problemas de saúde).</p><h4>Hobbies e Interesses Pessoais</h4><p>A parte final da apresentação é geralmente sobre seus hobbies e o que você gosta de fazer. Você pode dizer: "I like to [verbo]" (eu gosto de) ou "I enjoy [verbo-ing]" (eu aproveito para/gosto de). Exemplos: "I like to read books" (gosto de ler livros), "I enjoy playing video games" (gosto de jogar videogame), "I love cooking" (amo cozinhar), "I'm interested in photography" (estou interessado em fotografia), "I'm passionate about traveling" (sou apaixonado por viajar), "My hobby is painting" (meu hobby é pintura). Você pode mencionar mais de um hobby: "In my free time, I like to play tennis and watch movies". Isso mostra que você é uma pessoa interessante e dá aos outros assuntos para conversar com você!</p><h4>Apresentação Formal vs Informal</h4><p>Se você está em uma situação formal, como uma entrevista de emprego ou uma apresentação em classe, sua introdução deve ser mais estruturada: "Good morning. My name is Carlos Silva. I'm from Brasília, Brazil. I'm an engineer specializing in civil construction. I have been working in this field for 5 years. Outside of work, I'm passionate about sustainable building design and I volunteer with environmental organizations". Se você está em uma situação informal, como conhecer amigos de um amigo, você pode ser mais casual: "Hey! I'm Marina. I'm from here in Rio. I study at the University of Rio and I'm majoring in Psychology. I'm kind of obsessed with traveling and trying new restaurants!" Note a diferença no tom - formal é mais cuidadoso e completo, informal é mais relaxado e natural.</p><h4>Respondendo Quando Alguém Se Apresenta</h4><p>Quando alguém se apresenta, você não deve apenas ficar silencioso! Você deve responder e fazer perguntas. Por exemplo, se alguém diz "I'm from Portugal", você pode responder: "Oh, nice! I've always wanted to visit Portugal. What city are you from?" ou "Oh really? What part of Portugal?". Se alguém diz que é professor, você pode perguntar "What subject do you teach?" (que matéria você ensina?) ou "How long have you been teaching?" (há quanto tempo você ensina?). Se alguém menciona um hobby, você pode dizer "That's cool! I like that too" (legal! eu também gosto disso) ou "I've never tried that. What's it like?" (nunca tentei. Como é?). Fazer perguntas mostra interesse genuíno e mantém a conversação fluindo naturalmente.</p><h4>Prática Prática Prática!</h4><p>Aqui está o seu desafio: escreva uma apresentação completa sobre você em inglês. Deve ter no mínimo 5 frases cobrindo nome, origem, trabalho/estudo e hobbies. Depois, leia em voz alta várias vezes até ficar natural. Grave-se fazendo a apresentação e compare com um falante nativo. Se possível, faça a apresentação para um amigo ou em um grupo de aula. A prática real é a melhor forma de aprender! Você pode variar sua apresentação dependendo da situação - mais formal para entrevistas, mais casual para amigos. Quanto mais você praticar, mais confiante você vai se sentir quando precisar se apresentar em inglês na vida real!`,cards:[{q:"Como você descreveria seu hobby de forma interessante em inglês?",a:"Você pode dizer 'I enjoy [atividade]', 'I'm interested in [assunto]', 'I love [atividade]', ou 'My passion is [assunto]'. Sempre procure adicionar por que você gosta disso para ser mais interessante."}]},
  {id:8,name:'Perguntas Sobre Hobbies e Preferências',dur:'20 min',content:`<h3>Conversando Sobre Hobbies e Preferências</h3><p>Uma das conversas mais comuns é sobre o que as pessoas gostam de fazer e seus interesses pessoais. Neste tópico, vamos aprender como perguntar sobre hobbies, preferências e como responder de forma interessante e engajada!</p><h4>Perguntas Sobre Hobbies</h4><p>As perguntas mais diretas sobre hobbies são: "What is your hobby?" (qual é seu hobby?), "What do you like to do in your free time?" (o que você gosta de fazer no seu tempo livre?), "What are your hobbies?" (quais são seus hobbies?), "Do you have any hobbies?" (você tem algum hobby?). Você também pode perguntar de forma mais específica: "Do you like sports?" (você gosta de esportes?), "Are you interested in art?" (você está interessado em arte?), "Do you enjoy reading?" (você gosta de ler?), "Do you play any musical instruments?" (você toca algum instrumento musical?). Essas perguntas são muito comuns em conversas cotidianas e são uma ótima forma de conhecer melhor alguém.</p><h4>Respondendo Sobre Seus Hobbies</h4><p>Quando alguém pergunta sobre seus hobbies, você pode responder de forma simples ou mais detalhada. Resposta simples: "I like to read" (gosto de ler), "My hobby is painting" (meu hobby é pintura), "I enjoy sports" (gosto de esportes). Resposta mais completa: "I love reading. I especially enjoy mystery novels and science fiction. I usually read for about an hour before going to bed" (amo ler. Especialmente gosto de romances de mistério e ficção científica. Geralmente leio por cerca de uma hora antes de dormir). Note que a resposta mais completa torna a conversação muito mais interessante porque oferece detalhes e abre espaço para perguntas de acompanhamento.</p><h4>Expressando Preferências com "Like", "Love" e "Enjoy"</h4><p>Existem diferentes formas de expressar quão muito você gosta de algo. "I like [atividade]" significa que você gosta, mas é neutro. "I really like [atividade]" é um pouco mais forte. "I love [atividade]" significa que você ama, é mais forte ainda. "I enjoy [atividade]" é formal e significa que você aprecia. "I'm passionate about [atividade]" significa que você é apaixonado por isso. "I'm into [atividade]" é casual e significa que você está envolvido com isso. Você também pode dizer "I can't stand [atividade]" (não consigo suportar), "I hate [atividade]" (odeio), "I dislike [atividade]" (desgosto). Por exemplo: "I love playing tennis" (amo jogar tênis), "I'm really into gaming" (sou bem envolvido com videogames), "I can't stand watching TV all day" (não consigo suportar ver TV o dia todo).</p><h4>Estrutura Gramatical com "Like", "Enjoy", "Love"</h4><p>Quando você usa esses verbos, a estrutura é importante. Com "like", "love" e "enjoy", você pode usar tanto um verbo no infinitivo ("to") quanto um gerúndio ("-ing"): "I like to read" e "I like reading" têm essencialmente o mesmo significado, mas "like + gerúndio" é um pouco mais comum. "I enjoy playing football" (gosto de jogar futebol), "I love to cook" ou "I love cooking" (amo cozinhar). Com outros verbos como "prefer" (preferir), você também usa ambas as formas: "I prefer to exercise in the morning" (prefiro exercitar-me de manhã), "I prefer running in the morning" (prefiro correr de manhã). Certifique-se de que você está sempre usando a estrutura gramatical correta!</p><h4>Perguntando Sobre Preferências Específicas</h4><p>Você pode fazer perguntas bem específicas sobre preferências: "Do you prefer coffee or tea?" (você prefere café ou chá?), "What's your favorite movie genre?" (qual é seu gênero de filme favorito?), "Which sport do you like better, basketball or soccer?" (qual esporte você gosta mais, basquete ou futebol?), "Are you more of a morning or night person?" (você é mais uma pessoa de manhã ou de noite?), "Do you prefer working out alone or with friends?" (você prefere se exercitar sozinho ou com amigos?), "What's your favorite type of cuisine?" (qual é seu tipo de culinária favorito?). Essas perguntas específicas levam a conversas mais interessantes porque permitem que você aprenda detalhes sobre a pessoa.</p><h4>Respostas Interessantes com Detalhes</h4><p>A chave para uma boa conversação é não apenas responder, mas oferecer detalhes que permitem que a outra pessoa continue fazendo perguntas. Em vez de dizer apenas "I like reading", você pode dizer: "I love reading, especially fantasy books. My favorite author is J.K. Rowling. I'm currently reading the Harry Potter series for the third time!" (amo ler, especialmente livros de fantasia. Meu autor favorito é J.K. Rowling. Estou lendo a série Harry Potter pela terceira vez agora!). Isso oferece múltiplos pontos de interesse e convida perguntas de acompanhamento como "What's your favorite book?" ou "Who's your favorite character?".</p><h4>Expressar Desinteresse de Forma Educada</h4><p>Às vezes você não gosta de algo que a pessoa pergunta. É importante ser educado: Em vez de dizer "I hate that" (odeio isso), você pode dizer "That's not really my thing" (não é bem minha praia), "I'm not particularly interested in that" (não sou particularmente interessado nisso), "I've never been into [atividade]" (nunca fui apaixonado por), "That doesn't appeal to me" (isso não me atrai). Por exemplo: "Do you like horror movies?" "No, I'm not really into horror. I prefer comedies" (Não, não sou bem apaixonado por horror. Prefiro comédias). Isso é muito mais educado do que simplesmente dizer "I hate horror movies".</p><h4>Prática com Diálogos</h4><p>Aqui está um diálogo completo para você praticar: A: "What do you like to do in your free time?" (o que você gosta de fazer no seu tempo livre?). B: "I enjoy playing video games and reading. I'm really passionate about both" (gosto de jogar videogame e ler. Sou apaixonado pelos dois). A: "That's cool! What kind of games do you play?" (legal! Que tipo de jogo você joga?). B: "I love strategy games like Chess and Risk. I also enjoy some action games" (amo jogos de estratégia como Xadrez e Risk. Também gosto de alguns jogos de ação). A: "Nice! What about reading? What's your favorite genre?" (Que legal! E quanto a ler? Qual é seu gênero favorito?). B: "I'm into science fiction and mystery. I'm currently reading a great mystery novel" (sou apaixonado por ficção científica e mistério. Estou lendo um grande romance de mistério agora). Pratique este diálogo em voz alta, trocando de papéis, e depois crie seu próprio diálogo com seus hobbies reais!`,cards:[{q:"Qual é a diferença entre 'like', 'enjoy' e 'love' quando falamos sobre hobbies?",a:"'Like' é neutro (gosto), 'enjoy' é formal (aproveito/aprecio), 'love' é mais forte (amo). Todos podem ser usados com infinitivo (like to) ou gerúndio (like + -ing)."}]},
  {id:9,name:'Descrevendo Família e Amigos',dur:'20 min',content:`<h3>Falando Sobre Família e Amigos</h3><p>Um dos tópicos mais comuns em conversas é a família e os amigos. Neste tópico final do módulo básico, vamos aprender o vocabulário e as estruturas para descrever os membros da sua família, falar sobre amigos e compartilhar informações pessoais de forma natural!</p><h4>Membros da Família em Inglês</h4><p>Os membros da família são: mother/mom (mãe), father/dad (pai), sister (irmã), brother (irmão), grandmother/grandma (avó), grandfather/grandpa (avô), aunt (tia), uncle (tio), cousin (primo/prima). Note que em inglês "cousin" é usado para ambos, masculino e feminino - não existe distinção como em português. Você também pode mencionar esposo/esposa: husband (marido), wife (esposa), fiancé/fiancée (noivo/noiva). Para filhos você diz son (filho), daughter (filha), ou children (filhos em geral, ambos os sexos). Quando você quer falar sobre alguém por relação, você pode dizer "my mother's sister" (a irmã da minha mãe = minha tia) ou usar a palavra específica "my aunt".</p><h4>Descrevendo Membros da Família</h4><p>Quando você descreve um membro da família, você pode mencionar: idade, profissão, características e hobbies. Exemplos: "My mother is a doctor. She is 45 years old and she is very kind" (minha mãe é médica. Ela tem 45 anos e é muito gentil). "My brother is a student. He is 20 years old and he loves to play soccer" (meu irmão é aluno. Ele tem 20 anos e adora jogar futebol). "My sister is an engineer. She is 28 and she enjoys traveling" (minha irmã é engenheira. Ela tem 28 anos e gosta de viajar). "My father works as a businessman. He is quite busy but he always makes time for his family" (meu pai trabalha como empresário. Ele é bastante ocupado mas sempre arruma tempo para sua família). Quanto mais detalhes você oferece, mais interessante sua descrição fica!</p><h4>Falando Sobre o Número de Irmãos</h4><p>Quando alguém pergunta sobre sua família, uma pergunta comum é "How many siblings do you have?" (quantos irmãos você tem?). Você pode responder: "I have one brother and one sister" (tenho um irmão e uma irmã), "I have two brothers" (tenho dois irmãos), "I'm an only child" (sou filho único), "I have three siblings" (tenho três irmãos). Se você quer mencionar filhos, você diz "I have two children - a son and a daughter" (tenho dois filhos - um filho e uma filha). Essas informações básicas são frequentemente compartilhadas em conversas.</p><h4>Características Pessoais para Descrever Pessoas</h4><p>Para descrever como as pessoas são, você pode usar muitos adjetivos. Características positivas: kind (gentil), friendly (amigável), intelligent (inteligente), funny (engraçado), hardworking (trabalhador), honest (honesto), responsible (responsável), patient (paciente), confident (confiante), creative (criativo). Características neutras: quiet (quieto), loud (barulhento), talkative (tagarela), organized (organizado), messy (bagunçado). Características menos positivas: lazy (preguiçoso), impatient (impaciente), rude (grosseiro). Note que muitos desses adjetivos podem ser usados com "very" (muito) ou "quite" (bastante): "My father is very intelligent" (meu pai é muito inteligente), "My sister is quite creative" (minha irmã é bastante criativa).</p><h4>Estruturas para Falar Sobre Amigos</h4><p>Quando você fala sobre amigos, você pode descrever relacionamentos: "I have a best friend named Sarah" (tenho uma melhor amiga chamada Sarah), "John is my closest friend" (John é meu amigo mais próximo), "I have three very good friends" (tenho três amigos muito bons), "I know a lot of people at work, but only a few are real friends" (conheço muitas pessoas no trabalho, mas apenas algumas são amigas reais). Você também pode descrever o que vocês fazem juntos: "We like to hang out at the mall" (gostamos de sair no shopping), "We often go to the movies together" (frequentemente vamos ao cinema juntos), "We play basketball every weekend" (jogamos basquete todo fim de semana).</p><h4>Razões por Que Você Aprecia Alguém</h4><p>Quando você descreve por que alguém é importante para você, você pode dizer: "I like her because she is funny and always makes me laugh" (gosto dela porque é engraçada e sempre me faz rir), "He is a very loyal friend. I can always count on him" (é um amigo muito leal. Sempre posso contar com ele), "She understands me very well. We talk about everything" (ela me entende muito bem. Conversamos sobre tudo), "I appreciate his honesty. He always tells me the truth" (aprecio sua honestidade. Ele sempre me diz a verdade). Essas expressões mostram que você tem relacionamentos significativos e que você valoriza as pessoas em sua vida.</p><h4>Exemplo de Diálogo Completo</h4><p>Aqui está um exemplo de conversação sobre família e amigos: A: "Tell me about your family" (fale-me sobre sua família). B: "Well, I have a mother, a father, and one brother. My mother is a teacher and my father is an engineer. My brother is younger - he is 18 and studies business" (bem, tenho uma mãe, um pai e um irmão. Minha mãe é professora e meu pai é engenheiro. Meu irmão é mais jovem - ele tem 18 anos e estuda negócios). A: "That sounds nice. Do you have any close friends?" (parece legal. Você tem amigos próximos?). B: "Yes, I have a best friend named Lucas. We've been friends since elementary school. He is very funny and we like to play soccer together" (sim, tenho um melhor amigo chamado Lucas. Somos amigos desde a escola primária. Ele é muito engraçado e gostamos de jogar futebol juntos). A: "That's great! How often do you see him?" (que legal! Com que frequência você o vê?). B: "We see each other almost every weekend. We also text and call each other during the week" (nos vemos quase todo fim de semana. Também conversamos por mensagem e ligação durante a semana).</p><h4>Dicas Finais</h4><p>Pratique descrevendo sua própria família em inglês. Depois, descreva seus melhores amigos. Procure usar detalhes específicos - não apenas "My father is nice" (meu pai é legal), mas "My father is very patient and always helps me with my homework" (meu pai é muito paciente e sempre me ajuda com minha lição). Essas descrições mais específicas mostram que você realmente conhece as pessoas e que você está pensando em inglês, não apenas traduzindo do português. Se possível, compartilhe essas descrições com alguém que fale inglês para receber feedback. O inglês é uma língua viva, e as melhores oportunidades de praticar são com outras pessoas!`,cards:[{q:"Como você diz 'filho único' em inglês?",a:"Você diz 'I'm an only child' (sou filho único). 'Only' significa único, e 'child' significa criança ou filho."}]},
];
