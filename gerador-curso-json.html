<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador de Curso JSON — Matheus Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#07090f;color:#e8e8ef;min-height:100vh;padding:24px}
h1{font-size:1.4rem;font-weight:800;color:#4b8bff;margin-bottom:4px}
.sub{font-size:.8rem;color:#5a5a76;margin-bottom:24px}
.card{background:#12121a;border:1px solid #1e1e32;border-radius:14px;padding:22px;margin-bottom:16px}
.card h2{font-size:.95rem;font-weight:700;color:#e8e8ef;margin-bottom:14px;display:flex;align-items:center;gap:8px}
label{display:block;font-size:.72rem;font-weight:600;color:#9898b0;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
input,textarea,select{width:100%;background:#07090f;border:1.5px solid #1e1e32;border-radius:8px;padding:10px 12px;color:#e8e8ef;font-family:inherit;font-size:.85rem;outline:none;transition:.2s;margin-bottom:12px}
input:focus,textarea:focus,select:focus{border-color:#4b8bff}
textarea{resize:vertical;min-height:80px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{padding:12px 24px;border:none;border-radius:9px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-pri{background:linear-gradient(135deg,#4b8bff,#2563eb);color:#fff;width:100%}
.btn-pri:hover{opacity:.9;transform:translateY(-1px)}
.btn-pri:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sec{background:#1a1a28;border:1px solid #1e1e32;color:#9898b0;font-size:.78rem;padding:7px 14px}
.btn-sec:hover{border-color:#4b8bff;color:#4b8bff}
.btn-dl{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;width:100%;margin-top:8px;padding:14px}
/* PROGRESSO */
#prog-wrap{display:none}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-title{font-size:.88rem;font-weight:700;color:#e8e8ef}
.prog-pct{font-size:1.1rem;font-weight:900;color:#4b8bff}
.prog-bg{height:10px;background:#1e1e32;border-radius:10px;overflow:hidden;margin-bottom:10px}
.prog-fg{height:100%;background:linear-gradient(90deg,#4b8bff,#00d4ff);border-radius:10px;transition:width .4s ease;width:0}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:#07090f;border:1px solid #1e1e32;border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:1.1rem;font-weight:900;color:#4b8bff;display:block}
.stat-lbl{font-size:.6rem;color:#5a5a76;text-transform:uppercase;letter-spacing:.06em}
/* LOG */
#log{background:#07090f;border:1px solid #1e1e32;border-radius:8px;padding:12px;height:200px;overflow-y:auto;font-size:.72rem;font-family:'Courier New',monospace}
.log-ok{color:#22c55e}.log-err{color:#ef4444}.log-info{color:#4b8bff}.log-wait{color:#9898b0}
/* RESULTADO */
#result-wrap{display:none}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.res-stat{background:#07090f;border:1px solid #22c55e;border-radius:10px;padding:14px;text-align:center}
.res-val{font-size:1.4rem;font-weight:900;color:#22c55e;display:block}
.res-lbl{font-size:.62rem;color:#9898b0;text-transform:uppercase;letter-spacing:.07em}
.preview{background:#07090f;border:1px solid #1e1e32;border-radius:8px;padding:12px;max-height:160px;overflow-y:auto;font-size:.72rem;font-family:'Courier New',monospace;color:#9898b0;white-space:pre;margin-bottom:12px}
/* ERROS */
.err-item{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:.72rem;color:#ef4444;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<h1>🚀 Gerador de Curso JSON</h1>
<p class="sub">Matheus Academy · Gera conteúdo completo via IA automaticamente</p>

<!-- CONFIG -->
<div class="card">
  <h2>⚙️ Configuração do Curso</h2>
  <label>Tema / Nome do Curso</label>
  <input id="nome" placeholder="Ex: Dominando Tráfego Pago, Negócios Inteligentes, Geopolítica..." value="">

  <label>ID do Curso (sem espaços)</label>
  <input id="id" placeholder="Ex: trafego-pago, negocios, geopolitica">

  <label>Ícone (emoji)</label>
  <input id="icone" placeholder="Ex: 📈 🌍 💡 🧠 💰" value="🎓" style="max-width:120px">

  <div class="row">
    <div>
      <label>Cor Principal (hex)</label>
      <input id="cor" value="#4b8bff" type="color" style="height:42px;padding:4px">
    </div>
    <div>
      <label>Cor Secundária (hex)</label>
      <input id="cor2" value="#00d4ff" type="color" style="height:42px;padding:4px">
    </div>
  </div>

  <div class="row3">
    <div>
      <label>Nº de Módulos</label>
      <input id="nmods" type="number" value="97" min="1" max="200">
    </div>
    <div>
      <label>Tópicos por Módulo</label>
      <input id="ntps" type="number" value="7" min="1" max="10">
    </div>
    <div>
      <label>Chars por Tópico</label>
      <input id="nchars" type="number" value="3000" min="500" max="5000" step="500">
    </div>
  </div>

  <label>Descrição / Contexto do Curso (opcional)</label>
  <textarea id="desc" placeholder="Ex: Curso completo para quem quer dominar o mercado financeiro, desde zero até avançado. Público: empreendedores e investidores brasileiros."></textarea>

  <label>URL do Worker (IA)</label>
  <input id="worker" value="https://shiny-disk-b207ma-academy-ai.matheushenry1998.workers.dev/chat">

  <div class="row">
    <div>
      <label>Requisições Paralelas</label>
      <select id="parallel">
        <option value="3">3 paralelas (estável)</option>
        <option value="5" selected>5 paralelas (rápido)</option>
        <option value="8">8 paralelas (máximo)</option>
      </select>
    </div>
    <div>
      <label>Delay entre lotes (ms)</label>
      <input id="delay" type="number" value="800" min="0" max="3000" step="200">
    </div>
  </div>

  <button class="btn btn-pri" id="btn-start" onclick="startGeneration()">⚡ Gerar Curso Completo</button>
</div>

<!-- PROGRESSO -->
<div class="card" id="prog-wrap">
  <h2>📊 Progresso</h2>
  <div class="prog-header">
    <span class="prog-title" id="prog-label">Iniciando...</span>
    <span class="prog-pct" id="prog-pct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fg" id="prog-fg"></div></div>
  <div class="prog-stats">
    <div class="stat"><span class="stat-val" id="s-done">0</span><span class="stat-lbl">Módulos OK</span></div>
    <div class="stat"><span class="stat-val" id="s-err">0</span><span class="stat-lbl">Erros</span></div>
    <div class="stat"><span class="stat-val" id="s-rem">-</span><span class="stat-lbl">Restantes</span></div>
    <div class="stat"><span class="stat-val" id="s-eta">-</span><span class="stat-lbl">Tempo Est.</span></div>
  </div>
  <div id="log"><span class="log-info">Aguardando início...</span></div>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button class="btn btn-sec" id="btn-pause" onclick="togglePause()">⏸ Pausar</button>
    <button class="btn btn-sec" onclick="cancelGeneration()" style="color:#ef4444;border-color:#ef4444">✕ Cancelar</button>
    <button class="btn btn-sec" onclick="retryErrors()" id="btn-retry" style="display:none">🔄 Retentar Erros</button>
  </div>
</div>

<!-- RESULTADO -->
<div class="card" id="result-wrap">
  <h2>✅ Curso Gerado!</h2>
  <div class="res-stats">
    <div class="res-stat"><span class="res-val" id="r-mods">0</span><span class="res-lbl">Módulos</span></div>
    <div class="res-stat"><span class="res-val" id="r-tps">0</span><span class="res-lbl">Tópicos</span></div>
    <div class="res-stat"><span class="res-val" id="r-kb">0</span><span class="res-lbl">KB</span></div>
  </div>
  <div class="preview" id="preview"></div>
  <button class="btn btn-dl" onclick="downloadJSON()">⬇️ Baixar JSON do Curso</button>
  <button class="btn btn-sec" onclick="copyJSON()" style="width:100%;margin-top:8px">📋 Copiar JSON</button>
  <div id="errs-wrap" style="margin-top:14px;display:none">
    <label>⚠️ Módulos com erro (precisa retentar):</label>
    <div id="errs-list"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// GERADOR DE CURSO JSON — Matheus Academy
// ══════════════════════════════════════════════

let STATE = {
  running: false, paused: false, cancelled: false,
  total: 0, done: 0, errors: [], startTime: 0,
  modules: [], failedMods: []
};

// ── Prompt para o Worker
function buildPrompt(tema, modNum, totalMods, ntps, nchars, desc) {
  return `Você é um especialista criando conteúdo para a plataforma de cursos "Matheus Academy".

CURSO: "${tema}"
${desc ? 'CONTEXTO: ' + desc : ''}
MÓDULO: ${modNum} de ${totalMods}

Gere o MÓDULO ${modNum} completo em JSON válido. Siga EXATAMENTE esta estrutura:

{
  "id": ${modNum},
  "titulo": "Título do Módulo ${modNum}",
  "topicos": [
    {
      "id": 1,
      "gratis": ${modNum === 1 ? 'true' : 'false'},
      "titulo": "Título do Tópico",
      "conteudo": "HTML com pelo menos ${nchars} caracteres. Use tags: <h1>, <h2>, <h3>, <p>, <ul>, <li>, <ol>, <strong>. Use divs especiais: <div class='ib'> para info, <div class='wb'> para aviso, <div class='sb'> para sucesso. Conteúdo rico, prático, detalhado."
    }
  ],
  "quiz": [
    {"p": "Pergunta?", "r": ["Opção A", "Opção B", "Opção C", "Opção D"], "c": 1}
  ],
  "flashcards": [
    {"p": "Pergunta curta?", "r": "Resposta direta e completa."}
  ]
}

REGRAS OBRIGATÓRIAS:
- Gere EXATAMENTE ${ntps} tópicos no array "topicos"
- Cada tópico com pelo menos ${nchars} caracteres de conteúdo HTML
- Gere EXATAMENTE 5 questões no quiz (campo "c" é o índice 0-3 da resposta correta)
- Gere EXATAMENTE 6 flashcards
- Tópico 1 do módulo 1 tem gratis:true, todos os outros gratis:false
- Conteúdo progressivo — módulo ${modNum} deve ser mais avançado que módulos anteriores
- Conteúdo em PORTUGUÊS BRASILEIRO
- Retorne APENAS o JSON, sem texto antes ou depois, sem \`\`\`json`;
}

// ── Chamar Worker
async function callWorker(workerUrl, prompt) {
  const res = await fetch(workerUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: prompt }],
      courseKey: 'gerador',
      plan: 'MASTER',
      userEmail: 'gerador@matheusacademy.com'
    })
  });
  if (!res.ok) throw new Error('Worker retornou ' + res.status);
  const data = await res.json();
  // Extrair texto da resposta
  let text = '';
  if (data.content) text = data.content;
  else if (data.response) text = data.response;
  else if (data.message) text = data.message;
  else if (typeof data === 'string') text = data;
  else text = JSON.stringify(data);
  return text;
}

// ── Parsear JSON da resposta
function parseModuleJSON(text) {
  // Remover ```json ``` se existir
  text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  // Encontrar o primeiro { e o último }
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('JSON não encontrado na resposta');
  const jsonStr = text.substring(start, end + 1);
  return JSON.parse(jsonStr);
}

// ── Log
let logEl;
function log(msg, type = 'info') {
  if (!logEl) logEl = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = new Date().toLocaleTimeString('pt-BR') + ' · ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Atualizar UI de progresso
function updateUI() {
  const total = STATE.total;
  const done = STATE.done;
  const errs = STATE.errors.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-fg').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-err').textContent = errs;
  document.getElementById('s-rem').textContent = total - done - errs;
  // ETA
  if (done > 0 && STATE.startTime) {
    const elapsed = (Date.now() - STATE.startTime) / 1000;
    const perMod = elapsed / done;
    const rem = (total - done) * perMod;
    const min = Math.floor(rem / 60), sec = Math.round(rem % 60);
    document.getElementById('s-eta').textContent = min + 'm' + sec + 's';
  }
}

// ── Gerar um módulo com retry
async function generateModule(modNum, config, retries = 2) {
  const prompt = buildPrompt(config.nome, modNum, config.nmods, config.ntps, config.nchars, config.desc);
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      if (attempt > 0) log('Módulo ' + modNum + ' — tentativa ' + (attempt + 1), 'wait');
      const raw = await callWorker(config.worker, prompt);
      const mod = parseModuleJSON(raw);
      // Validar estrutura mínima
      if (!mod.id || !mod.titulo || !Array.isArray(mod.topicos)) throw new Error('Estrutura inválida');
      if (!Array.isArray(mod.quiz)) mod.quiz = [];
      if (!Array.isArray(mod.flashcards)) mod.flashcards = [];
      // Garantir id correto
      mod.id = modNum;
      // Garantir gratis correto
      if (mod.topicos.length > 0) mod.topicos[0].gratis = modNum === 1;
      return mod;
    } catch (e) {
      if (attempt === retries) throw e;
      await sleep(1000 * (attempt + 1));
    }
  }
}

// ── Sleep
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Geração principal
async function startGeneration() {
  const nome = document.getElementById('nome').value.trim();
  if (!nome) { alert('Digite o tema do curso!'); return; }

  const config = {
    nome, id: document.getElementById('id').value.trim() || nome.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''),
    icone: document.getElementById('icone').value.trim() || '🎓',
    cor: document.getElementById('cor').value,
    cor2: document.getElementById('cor2').value,
    nmods: parseInt(document.getElementById('nmods').value),
    ntps: parseInt(document.getElementById('ntps').value),
    nchars: parseInt(document.getElementById('nchars').value),
    desc: document.getElementById('desc').value.trim(),
    worker: document.getElementById('worker').value.trim(),
    parallel: parseInt(document.getElementById('parallel').value),
    delay: parseInt(document.getElementById('delay').value)
  };

  STATE = { running: true, paused: false, cancelled: false,
    total: config.nmods, done: 0, errors: [], startTime: Date.now(),
    modules: new Array(config.nmods).fill(null), failedMods: [] };

  // UI
  document.getElementById('btn-start').disabled = true;
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('prog-label').textContent = 'Gerando ' + config.nmods + ' módulos...';
  logEl = document.getElementById('log'); logEl.innerHTML = '';
  log('Iniciando geração de "' + config.nome + '" — ' + config.nmods + ' módulos × ' + config.ntps + ' tópicos', 'info');
  log('Paralelas: ' + config.parallel + ' · Delay: ' + config.delay + 'ms', 'info');

  // Gerar em lotes paralelos
  const queue = Array.from({length: config.nmods}, (_, i) => i + 1);
  let qi = 0;

  async function worker() {
    while (qi < queue.length) {
      if (STATE.cancelled) return;
      while (STATE.paused) await sleep(300);
      const modNum = queue[qi++];
      try {
        log('⏳ Gerando módulo ' + modNum + '...', 'wait');
        const mod = await generateModule(modNum, config);
        STATE.modules[modNum - 1] = mod;
        STATE.done++;
        log('✅ Módulo ' + modNum + ' — "' + mod.titulo + '" (' + mod.topicos.length + ' tópicos)', 'ok');
      } catch (e) {
        STATE.errors.push(modNum);
        STATE.failedMods.push({modNum, config});
        log('❌ Módulo ' + modNum + ' falhou: ' + e.message, 'err');
      }
      updateUI();
      if (config.delay > 0) await sleep(config.delay);
    }
  }

  // Rodar N workers paralelos
  const workers = Array.from({length: config.parallel}, () => worker());
  await Promise.all(workers);

  if (!STATE.cancelled) finishGeneration(config);
}

// ── Finalizar
function finishGeneration(config) {
  STATE.running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('prog-label').textContent = STATE.errors.length === 0 ? '✅ Concluído!' : '⚠️ Concluído com erros';

  // Montar JSON final
  const modules = STATE.modules.filter(Boolean).sort((a, b) => a.id - b.id);
  const total_tps = modules.reduce((a, m) => a + (m.topicos?.length || 0), 0);

  const courseJSON = {
    id: config.id, nome: config.nome, icone: config.icone,
    cor: config.cor, cor2: config.cor2, nivel: 'Completo',
    modulos: modules
  };

  const jsonStr = JSON.stringify(courseJSON, null, 2);
  window._generatedJSON = jsonStr;
  window._generatedName = config.id;

  // Mostrar resultado
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('r-mods').textContent = modules.length;
  document.getElementById('r-tps').textContent = total_tps;
  document.getElementById('r-kb').textContent = Math.round(jsonStr.length / 1024);
  document.getElementById('preview').textContent = jsonStr.substring(0, 800) + '\n\n... [' + Math.round(jsonStr.length/1024) + ' KB total]';

  log('🎉 Geração concluída! ' + modules.length + ' módulos · ' + total_tps + ' tópicos · ' + Math.round(jsonStr.length/1024) + ' KB', 'ok');

  // Mostrar erros se houver
  if (STATE.errors.length > 0) {
    document.getElementById('errs-wrap').style.display = 'block';
    document.getElementById('btn-retry').style.display = 'inline-block';
    const list = document.getElementById('errs-list');
    list.innerHTML = STATE.errors.map(n =>
      '<div class="err-item">Módulo ' + n + ' falhou <button class="btn btn-sec" onclick="retrySingle(' + n + ')" style="padding:3px 10px;font-size:.7rem">Retentar</button></div>'
    ).join('');
  }
}

// ── Retentar erros
async function retryErrors() {
  if (STATE.failedMods.length === 0) return;
  log('🔄 Retentando ' + STATE.errors.length + ' módulos com erro...', 'info');
  const toRetry = [...STATE.failedMods];
  STATE.failedMods = []; STATE.errors = [];
  for (const {modNum, config} of toRetry) {
    try {
      log('⏳ Retentando módulo ' + modNum + '...', 'wait');
      const mod = await generateModule(modNum, config);
      STATE.modules[modNum - 1] = mod;
      STATE.done++;
      log('✅ Módulo ' + modNum + ' OK!', 'ok');
    } catch (e) {
      STATE.errors.push(modNum);
      STATE.failedMods.push({modNum, config});
      log('❌ Módulo ' + modNum + ' falhou novamente', 'err');
    }
    updateUI();
  }
  // Atualizar JSON
  const modules = STATE.modules.filter(Boolean).sort((a, b) => a.id - b.id);
  const courseJSON = JSON.parse(window._generatedJSON || '{}');
  courseJSON.modulos = modules;
  window._generatedJSON = JSON.stringify(courseJSON, null, 2);
  document.getElementById('r-mods').textContent = modules.length;
  document.getElementById('r-kb').textContent = Math.round(window._generatedJSON.length / 1024);
  log('✅ Retry concluído!', 'ok');
}

async function retrySingle(modNum) {
  // Encontrar config original no failedMods
  const item = STATE.failedMods.find(f => f.modNum === modNum);
  if (!item) return;
  STATE.failedMods = STATE.failedMods.filter(f => f.modNum !== modNum);
  STATE.errors = STATE.errors.filter(e => e !== modNum);
  try {
    log('⏳ Retentando módulo ' + modNum + '...', 'wait');
    const mod = await generateModule(modNum, item.config);
    STATE.modules[modNum - 1] = mod;
    STATE.done++;
    log('✅ Módulo ' + modNum + ' OK!', 'ok');
    updateUI();
  } catch (e) {
    STATE.errors.push(modNum);
    STATE.failedMods.push(item);
    log('❌ Módulo ' + modNum + ' falhou', 'err');
  }
}

// ── Controles
function togglePause() {
  STATE.paused = !STATE.paused;
  document.getElementById('btn-pause').textContent = STATE.paused ? '▶ Retomar' : '⏸ Pausar';
  log(STATE.paused ? '⏸ Pausado' : '▶ Retomado', 'info');
}
function cancelGeneration() {
  if (!confirm('Cancelar a geração?')) return;
  STATE.cancelled = true; STATE.running = false;
  document.getElementById('btn-start').disabled = false;
  log('✕ Geração cancelada', 'err');
  // Salvar o que foi gerado até agora
  const modules = STATE.modules.filter(Boolean);
  if (modules.length > 0) {
    log('💾 Salvando ' + modules.length + ' módulos gerados até agora...', 'info');
    const courseJSON = {
      id: document.getElementById('id').value || 'curso',
      nome: document.getElementById('nome').value,
      icone: document.getElementById('icone').value || '🎓',
      cor: document.getElementById('cor').value,
      cor2: document.getElementById('cor2').value,
      nivel: 'Parcial', modulos: modules.sort((a,b)=>a.id-b.id)
    };
    window._generatedJSON = JSON.stringify(courseJSON, null, 2);
    window._generatedName = courseJSON.id;
    document.getElementById('result-wrap').style.display = 'block';
    document.getElementById('r-mods').textContent = modules.length;
    document.getElementById('r-tps').textContent = modules.reduce((a,m)=>a+(m.topicos?.length||0),0);
    document.getElementById('r-kb').textContent = Math.round(window._generatedJSON.length/1024);
    document.getElementById('preview').textContent = window._generatedJSON.substring(0,600) + '\n...[parcial]';
  }
}

// ── Download / Copy
function downloadJSON() {
  if (!window._generatedJSON) return;
  const blob = new Blob([window._generatedJSON], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (window._generatedName || 'curso') + '.json';
  a.click();
}
function copyJSON() {
  if (!window._generatedJSON) return;
  navigator.clipboard.writeText(window._generatedJSON).then(() => alert('JSON copiado!')).catch(() => {
    prompt('Copie o JSON abaixo:', window._generatedJSON);
  });
}
</script>
</body>
