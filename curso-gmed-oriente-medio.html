        html: `<h4>Fundações do Oriente Médio Contemporâneo</h4><p>Você tem que compreender: Oriente Médio moderno foi criado por Ocidente. Durante mil anos, região foi dominada pelo Império Otomano. Quando Otomano colapsou após Primeira Guerra Mundial, Reino Unido e França dividiram região em mandatos (divisão territorial). Você vê isto como começo de muitos problemas contemporâneos.</p><p>Tratado de Sykes-Picot em 1916 era acordo secreto entre Reino Unido e França dividindo Oriente Médio em esferas de influência. Você tinha Palestina indo para Reino Unido, Síria para França, e Iraque dividido. Fronteiras foram desenhadas no mapa por europeus sem considerar grupos étnicos/religiosos locais. Você vê isto como recipe para conflito.</p><blockquote class="example"><strong>Exemplo:</strong> Iraque foi criado juntando áreas otomanas distintas: região sunita ao norte, xiita ao sul. Isto criou maioria xiita com minoria sunita no poder (porque Reino Unido colocou xiitas em segundo plano). Isto levou a ressentimento que perdura hoje. Você vé isto como como Sykes-Picot causou divisões sectárias.</blockquote><p>Mandatos eram supostamente "temporários" e "para preparar território para independência". Na prática, Reino Unido e França os trataram como colônias. Recursos foram explorados, elites locais foram cooptadas, nacionalismo local foi reprimido. Você vê isto como imperialismo disfarçado.</p><p>Durante anos 1920-1930, movimento nacionalista cresceu na região. Você tinha rebeliões contra mandatos (rebelião iraquiana contra Reino Unido, rebelião síria contra França). Nacionalistas queriam independência e queriam criar estados modernos. Você vé isto como resistência contra imperialismo ocidental.</p><blockquote class="tip"><strong>Dica:</strong> Quando você estuda Oriente Médio, você tem que entender: região vê Ocidente como causador de seus problemas. Isto não é paranoia. Ocidente realmente dividiu região, instalou governos amigos, explorou recursos. Você tem que reconhecer isto se quer entender resentimento regional.</blockquote><blockquote class="quote"><strong>Citação:</strong> "The problems of the Middle East are not due to Islam or Arabs. They are due to Western imperialism that divided the region and remains exploiting it" - Perspectiva regional comum</blockquote>',

        title: 'Criação de Israel e Refugiados Palestinos',
        html: '<h4>A Questão Palestina</h4><p>Você tem que compreender criação de Israel em 1948 porque é central para entender Oriente Médio. Histórico: judeus foram perseguidos através de história européia (especialmente pogroms na Rusia). Resposta foi movimento sionista: criar estado judeu em Palestina (terra histórica de judeus). Reino Unido apoiou isto (Declaração Balfour em 1917).</p><p>Problema: Palestina não era vazia. Tinha população árabe vivendo lá por séculos. Quando imigração judaica começou aumentar, tensões cresceram. Você tinha dois povos reivindicando mesma terra. Isto era receita para conflito.</p><blockquote class="example"><strong>Exemplo:</strong> Em 1948, Estado de Israel foi declarado. Imediatamente, países árabes vizinhos atacaram. Israel venceu guerra. Resultado: 700 mil palestinos foram deslocados de suas casas. Alguns fugiram voluntariamente (por medo de guerra), muitos foram expulsos. Palestina chama isto de Nakba (catástrofe). Israel chama de guerra de independência. Você vé aqui narrativas completamente diferentes do mesmo evento.</blockquote><p>Palestinos que fugiram nunca retornaram. Muitos estão ainda em campos de refugiados em Jordânia, Líbano, Síria. Você tem três gerações de palestinos vivendo como refugiados. Isto criou ressentimento profundo. Para palestinos, Israel é colono estado que roubou sua terra. Para Israel, eles estão retornando terra histórica que é deles.</p><p>Ambos têm argumentos legítimos baseados em narrativas históricas diferentes. Você não consegue resolver isto dicendo que um tem razão e outro está errado. Você tem dois povos com direitos conflitivos. A questão é: como você coexiste quando ambos reivindicam mesma terra?</p><p>Solução proposta foi "dois estados": Israel e Palestina lado a lado. Isto era plano da ONU em 1947. Mas implementação falhou. Palestina nunca conseguiu estado viável. Israel continuou expandindo. Você está agora 75 anos depois e problema persiste.</p><blockquote class="tip"><strong>Dica:</strong> Israel-Palestina é problema que não tem solução fácil. Não é caso de "bem contra mau". Ambos os lados têm direitos legítimos. Ambos têm narrativas históricas válidas. Isto é por que conflito perdura: ambos têm razão, ambos têm teimosia.</blockquote><blockquote class="quote"><strong>Citação:</strong> "We cannot solve this conflict because both sides are right and both sides are wrong" - Observação de especialista israelita sobre intratabilidade</blockquote>',

        html: `<h4>O Conflito Intratável</h4><p>Você tem que compreender que conflito Israel-Palestina não é novo. Tem raízes em territorialidade, religião, e narrativas históricas conflitivas. Isto não é problema que pode ser resolvido com diplomacia simples. É problema estrutural que ambos os lados têm razão.</p><p>De perspectiva israelita: judeus foram perseguidos através de história, especialmente Holocausto que matou 6 milhões. Israel é resposta: lugar seguro onde judeus não podem ser perseguidos. Israel tem direito histórico a terra (Palestina era terra de judeus antiguamente). Israel é democracia cercada por inimigos. Você vé perspectiva legítima.</p><p>De perspectiva palestina: palestinos viviam em terra por séculos. Eles foram deslocados em 1948 e 1967. Ocupação israelita de Palestina é colonialismo. Palestina tem direito de autodeterminação. Você vé perspectiva igualmente legítima.</p><blockquote class="example"><strong>Exemplo:</strong> Assentamentos israelitas em Palestina: Israel constrói cidades/vilas em território palestino. Para Israel, isto é expansão natural de população judaica. Para palestina, isto é roubo de terra. Você vé aqui como mesma ação é interpretada diferentemente por ambos os lados.</blockquote><p>Ocupação israelita de Gaza desde 1967 (com retirada em 2005 mas com controle de fronteiras) criou bloqueio que asfixia economia de Gaza. Você tem 2 milhões de palestinos em área muito pequena com poucos empregos. Isto criou pobreza massiva e ressentimento. Hamas ganhou apoio porque oferecia resistência.</p><p>Você tem também questão de direitos de refugiados. Palestinos querem direito de retorno: refugiados e seus descendentes que fugiram em 1948/1967 têm direito de voltar. Israel recusa (porque isto destruiria maioria judaica em Israel). Você vé aqui incompatibilidade fundamental de posições.</p><blockquote class="tip"><strong>Dica:</strong> Quando você estuda Israel-Palestina, você tem que manter ambas as perspectivas em mente simultaneamente. Ambos têm razão. Ambos têm teimosia. Isto é por que conflito é intratável.</blockquote><blockquote class="quote"><strong>Citação:</strong> "Two peoples. One land. No solution" - Resumo triste da situação Israel-Palestina</blockquote>',

 cria ciclo de violência. Ocupação cria ressentimento. Ressentimento gera resistência. Resistência produz repressão israelita. Repressão cria mais ressentimento. Você tem ciclo que se auto-perpetua.</blockquote><blockquote class="quote"><strong>Citação:</strong> "Gaza is the largest open-air prison in the world" - Descrição de críticos da situação humanitária</blockquote>',
