  {id:1,name:'Entender o Formato e Scoring de IELTS',dur:'16 min',content:`<h3>IELTS Não é Prova de Conhecimento, é Prova de Estratégia</h3><p>Aqui está verdade que ninguém diz: você pode ter inglês perfeito e tirar 6.5. Ou pode ter inglês "apenas bom" e tirar 7.5. Diferença? ESTRATÉGIA.</p><p>IELTS não está testando se você sabe inglês perfeitamente. Está testando se você consegue comunicar com clareza sob pressão de tempo. É completamente diferente.</p><p><strong>As 4 Habilidades de IELTS (Timing é Crítico)</strong></p><p>LISTENING (30 minutos):<br>- Você OUÇA um áudio, escreve respostas ao mesmo tempo<br>- Nunca pode repetir áudio (ao contrário de alguns tests)<br>- 40 questões, 4 seções<br>- Maior dificuldade: ESCREVER respostas ENQUANTO está ouvindo seção seguinte<br>- Strategy: você precisa de capacidade de multitask<br><br>READING (60 minutos):<br>- 3 passages (academic articles, reports, website content)<br>- 40 questões<br>- Timing CRÍTICO: 20 minutos por passage em média<br>- Maior dificuldade: tempo curto + vocabulário acadêmico<br>- Strategy: você PRECISA de técnicas de skim/scan<br><br>WRITING (60 minutos):<br>- Task 1: Describe dados/gráfico (20 min recomendado)<br>- Task 2: Give opinion/argument com exemplos (40 min recomendado)<br>- Maior dificuldade: time management + estrutura clara<br>- Strategy: planejamento rápido antes de escrever é KEY<br><br>SPEAKING (11-14 minutos, DIAS DIFERENTES):<br>- Part 1 (4-5 min): Introdução, small talk casual<br>- Part 2 (3-4 min): Você fala sobre tópico (cue card te dá tópico + 1 min para preparar)<br>- Part 3 (4-5 min): Discussão sobre tópico mais abstrato<br>- Maior dificuldade: manter fluência sem pausas longas<br>- Strategy: praticar role-play com timing é essencial</p><p><strong>Score Bands: O Que REALMENTE Significa</strong></p><p>IELTS usa escala 0-9. Aqui está o que cada nível SIGNIFICA em prática:</p><p>4.0-4.5: "Survival English"<br>- Você entende frases simples<br>- Consegue se comunicar em situação básica (pedir comida, direção)<br>- Mas tem dificuldade com conversação complex ou tópicos técnicos<br>- Universidades NÃO aceitam<br><br>5.0-5.5: "Basic English"<br>- Você entende maioria do conteúdo, mas algumas partes confusas<br>- Consegue conversar mas com pausas frequentes<br>- Comete erros gramaticais notáveis<br>- Algumas universidades aceitam em programas menos competitivos<br><br>6.0-6.5: "Competent English"<br>- Você consegue funcionar bem em ambiente acadêmico/profissional<br>- Entende MAIORIA de conteúdo sem problema<br>- Comete alguns erros, mas comunicação é clara<br>- Maioria de universidades aceita<br>- Que você deve ALMEJAR<br><br>7.0-7.5: "Good/Fluent English"<br>- Você fala com fluência, comete POUCOS erros<br>- Consegue argumentar complexo e sustentar discussão<br>- Preparado para PhD programs<br>- Toma MUITO tempo de preparação para chegar aqui<br><br>8.0+: "Very Fluent English"<br>- Praticamente pré-requisito é você ser quase nativo ou estar vivendo em país anglófono<br>- Muito raro atingir sem imersão</p><p><strong>Por Que IELTS é Diferente de Outros Tests</strong></p><p>TOEFL (Americano):<br>- Mais acadêmico (menos conversação natural)<br>- Mais computerizado<br>- Mais caro<br><br>IELTS (Britânico + Commonwealth):<br>- Mais prático (conversação com examiner, não com computador)<br>- Mais "real world" scenarios<br>- Usado por UK, Australia, Canada, Europa<br>- Mais acessível em preço</p><p>DIFERENÇA IMPORTANTE: IELTS Speaking é conversa com pessoa real (examiner). TOEFL é falar para computador. Isso muda TUDO sobre como você prepara.</p><p><strong>Os Pontos Fracos Comuns de Brasileiros em IELTS</strong></p><p>LISTENING:<br>- Dificuldade compreender sotaque britânico/australiano (não é acostumado)<br>- Multitasking: ouve, escreve, processa tudo ao mesmo tempo<br>- Solução: treina com diferentes sotaques + simula teste real onde você escreve enquanto ouve<br><br>READING:<br>- Tenta ler palavra-por-palavra (lento demais)<br>- Não tem estratégia de skim/scan<br>- Solução: aprenda técnicas de leitura rápida e PRÁTIQUE com tempo<br><br>WRITING:<br>- Escreve como se está conversando (muito informal)<br>- Não tem estrutura clara (parágrafos confusos)<br>- Grammar errors triviais (subject-verb agreement, articles)<br>- Solução: estrutura clara (intro, main points com exemplos, conclusão) + proofread por erros comuns<br><br>SPEAKING:<br>- Pausas MUITO longas enquanto pensa (soa nervoso)<br>- Não elabora respostas (muito curto)<br>- Pronúncia confusa (sotaque português pesado)<br>- Solução: prática com role-play para ganhar confidence + prepare common topics</p><p><strong>Mito #1: "IELTS Testa Conhecimento de Inglês"</strong></p><p>FALSO. IELTS testa sua capacidade de COMUNICAR em inglês sob pressão de tempo com estrutura específica. Uma pessoa que estuda intensamente por 8 semanas pode tirar 6.5-7.0 mesmo se nunca morou em país anglófono. Porque? Porque ela aprendeu a estratégia.</p><p><strong>Mito #2: "Preciso Falar Perfeitamente para Tirar 7.0"</strong></p><p>FALSO. Você pode cometer erros gramaticais E tirar 7.0. O que importa é FLUÊNCIA (não muitas pausas), COERÊNCIA (ideia se conectam), e CLAREZA (pode entender). Perfeição é mito.</p><p><strong>Mito #3: "Preciso Saber Muito Vocabulário Raro"</strong></p><p>FALSO. Você precisa de vocabulário PRECISO, não RARO. "I was able to overcome the challenge" é melhor que "I was able to navigate the predicament with perspicacity." Primeira é clara, segunda soa forçada e pode ter erro (perspicacity não cabe bem ali).</p><p><strong>Timeline Realística para Preparação</strong></p><p>Você comece do BASELINE seu (quanto entende agora?) e ALVO (qual score precisa?).</p><p>Baseline "intermediate" (consegue conversar) para Target 6.5: 8-12 semanas de preparação intensa<br>Baseline "intermediate" para Target 7.0: 12-16 semanas<br>Baseline "pre-intermediate" (entende algumas coisas) para Target 6.5: 16-20 semanas</p><p>"Intensa" significa 10-15 horas por semana de estudo FOCADO (não é scrollar Instagram).</p><p><strong>Estrutura de Preparação Recomendada</strong></p><p>SEMANAS 1-2: Understand format<br>- Faze full practice test (timed) para ver baseline<br>- Veja quais seções mais fracas<br>- Estude estratégias específicas<br><br>SEMANAS 3-8: Focused practice<br>- Alternando seções: semana de listening, semana de reading, etc<br>- Sempre com timing<br>- Practice tests a cada 2 semanas para track progress<br><br>SEMANAS 9+: Full tests + refinement<br>- Faça full tests (todas 4 habilidades) timed a cada semana<br>- Focus em fraquezas específicas<br>- Últimas 2-3 semanas: descanse, revise, medite</p><p><strong>Começar Hoje</strong></p><p>Ação imediata: faça UM full practice test (timed). Não corra. Faça exatamente como se fosse teste real. Depois analisa:</p><p>Qual habilidade mais fraca?<br>Em reading, qual tipo de pergunta mais difícil?<br>Em listening, qual sotaque menos entendi?<br>Em writing, o que foi mais lento?<br>Em speaking (se fez), o que me travou?</p><p>Agora você sabe EXATAMENTE onde focar próximas semanas. Você não está estudando "inglês geral". Você está estudando "IELTS strategy" + "minhas fraquezas específicas".</p><p>ISSO é a diferença entre pessoa que tira 5.5 (estuda genérico) e pessoa que tira 7.0 (estuda específico para IELTS).</p>`,cards:[{q:"Por que IELTS é mais sobre estratégia que conhecimento puro?",a:"IELTS testa capacidade de comunicar sob pressão de TEMPO com estrutura ESPECÍFICA, não testa se você sabe inglês perfeitamente. Score vem de estratégia (skim/scan em reading, role-play em speaking) + execução dentro de timing rigoroso."}]},
  {id:2,name:'Reading: Técnicas de Skim, Scan, Speed Reading',dur:'18 min',content:`<h3>Reading de IELTS: 60 Minutos para 3 Passages de 1.200+ Palavras</h3><p>A matemática é simples: você tem 20 minutos por passage em média. Cada passage tem ~1.200 palavras. Se você tenta ler palavra-por-palavra, você vai correr fora do tempo E errar metade das questões porque estava pensando em palavra #1 quando questão pede sobre parágrafo #4.</p><p>Você PRECISA de estratégia. Não é opconal.</p><p><strong>As 3 Estratégias de Leitura: Skim, Scan, Deep Read</strong></p><p>SKIM (Visão Geral Rápida): 2-3 minutos<br>- Leia PRIMEIRA SENTENÇA de cada parágrafo<br>- Objetivo: entender TÓPICO GERAL de cada parágrafo<br>- Você está criando "mapa mental" de passage<br>- Você IGNORA detalhes, números, exemplos<br><br>SCAN (Procurar Informação Específica): 1-2 minutos<br>- Após ler o skim questions<br>- Você procura EXATAMENTE onde resposta está localizada<br>- "Question pede sobre impact de X" → você scana passage procurando "X" e "impact"<br>- Não lê tudo, apenas procura por keywords<br><br>DEEP READ (Ler Profundamente): 8-10 minutos<br>- Agora você LEI parágrafos específicos onde respostas estão<br>- Você lê SENTENCE por SENTENCE<br>- Você entende nuances, conecta ideias, pega subtletezas<br>- AGORA detalhes importam<br><br>SEQUÊNCIA CORRETA: SKIM → LEIA QUESTIONS → SCAN → DEEP READ</p><p>Maioria de brasileiros faz: DEEP READ primeiro. Resultado? Ler tudo profundamente, ficar sem tempo, errar metade.</p><p><strong>Exemplo Prático: Como Skim Funciona</strong></p><p>Passage sobre "The History of Coffee"</p><p>PARÁGRAFO 1: "Coffee originated in Ethiopia in the 9th century..."<br>SKIM: Mental note: "Ethiopia origin, 9th century" (você nem lê resto de parágrafo)<br><br>PARÁGRAFO 2: "Arab traders brought coffee to the Middle East, where it became popular..."<br>SKIM: Mental note: "Spread to Middle East via traders"<br><br>PARÁGRAFO 3: "In the 17th century, coffee reached Europe and became luxury item..."<br>SKIM: Mental note: "Reached Europe 17th century, luxury"<br><br>PARÁGRAFO 4: "Coffee houses emerged as places of intellectual discussion and social gathering..."<br>SKIM: Mental note: "Coffee houses = social/intellectual spaces"<br><br>Você acaba de "ler" um passage de 1.000+ palavras em 2-3 minutos. Você não entendeu CADA SENTENÇA. Mas você entendeu ESTRUTURA e TEMA de cada seção.</p><p>Agora lê questions. Um deles diz: "When did coffee reach Europe?"</p><p>Você JÁ SABE: "parágrafo 3". Você não precisa reeler inteiro. Você pode ir direto para parágrafo 3, ler profundamente, encontrar resposta em 30 segundos.</p><p><strong>Scan Technique: Procurando por Keywords</strong></p><p>Depois de skim, você lê questions. Cada question tem KEYWORDS (palavras-chave).</p><p>Question: "What made coffee houses different from other public spaces?"<br>KEYWORDS: "coffee houses", "different", "public spaces"<br><br>Você scana passage procurando exatamente essas palavras (ou sinônimos). Quando encontra, você começa a ler profundamente ali.</p><p>Isso é super diferente de tentar entender TODA a passage. Você está siendo CIRURGICAL: encontrar localização exacta, depois ler aquela seção.</p><p><strong>Common Question Types em IELTS Reading</strong></p><p>MULTIPLE CHOICE: Escolha resposta certa de 4 opções<br>- Technique: scan para ideia principal, depois compare com opções<br><br>TRUE/FALSE/NOT GIVEN: Sentença é verdade, mentira, ou não mencionado?<br>- Technique: não confunda "false" (contradito no texto) com "not given" (não mencionado)<br>- Common mistake: se você não achou informação, pode ser "not given" não "false"<br><br>FILL IN THE BLANK: Completa sentença com palavra de passage<br>- Technique: scan para keywords da sentença, depois escolhe palavra mais adequada<br><br>MATCHING HEADINGS: Associa headings com parágrafos<br>- Technique: skim cada parágrafo, entenda tema, depois veja qual heading encaixa<br><br>SHORT ANSWER: Responde pergunta em X palavras<br>- Technique: encontre resposta no texto, copie EXATAMENTE (spelling correto)</p><p><strong>Erros Mais Comuns em IELTS Reading</strong></p><p>ERRO 1: "Se não entendi parágrafo, vou reler"<br>SIM, reler um parágrafo pode ajudar. MAS se você está fazendo isso para CADA parágrafo, você está gerenciando tempo mal. Se não entende depois de 2 leituras rápidas, PULE e volta depois.</p><p>ERRO 2: Tentar entender CADA palavra<br>Você não precisa saber "inexorable" para entender parágrafo. Contexto te dá ideia. Focus em compreensão geral, não perfeição.</p><p>ERRO 3: Ansiedade leva a rapidez excessiva<br>Você fica nervoso, lê TÃO rápido que não entende nada. Então você precisa reler tudo. Relaxe. Skim deliberadamente, scan deliberadamente, deep read deliberadamente.</p><p>ERRO 4: Fazer questões primeiro (em vez de skim primeiro)<br>Se você lê pergunta ANTES de entender structure de passage, você vai para procurar "agunha em haystack". Se você skim primeiro, você SABE onde procurar.</p><p>ERRO 5: "True" quando é "Not Given"<br>Passage diz "Coffee was popular in Middle East". Pergunta: "Was coffee popular in North Africa?" Você não sabe porque passage não menciona North Africa. Answer é NOT GIVEN, não TRUE.</p><p><strong>Prática Estruturada: 2 Semanas</strong></p><p>SEMANA 1:<br>DIA 1-2: Pratique SKIM ONLY com passages (ignore questions, apenas pratique ler título + primeira sentença de cada parágrafo)<br>DIA 3-4: Pratique SCAN com questions (leia questions, procure keywords no texto)<br>DIA 5-6: Combine skim + scan + tente responder questões<br>DIA 7: Full passage timed (20 minutos)<br><br>SEMANA 2:<br>Repita, mas aumente dificuldade. Use passages que você achou mais difíceis na semana 1.</p><p><strong>Reading Tips Pro</strong></p><p>1. Grifar keywords (mentalmente ou literalmente) enquanto skim te ajuda focar<br>2. Se timing está tight, SKIP questões muito difíceis, volte ao final<br>3. Sempre releia sentence where answer está (não confie em memória)<br>4. Para "not given" vs "false": se contradiction clara no texto = false. Se simplesmente não mencionado = not given<br>5. Sinonímia é KEY: resposta pode usar palavra diferente de pergunta, mas mesmo significado</p><p><strong>Seu Target: 20 Min por Passage</strong></p><p>SKIM (2-3 min) → READ QUESTIONS (1-2 min) → SCAN + DEEP READ (15-17 min) = ~20 min total</p><p>Pratique até virar automático. Primeira vez vai parecer impossível. Depois de 2 semanas de prática diária, você vai estar fazendo facilmente.</p>`,cards:[{q:"Qual é a sequência correta de leitura em IELTS Reading?",a:"Skim (leia primeira sentença de cada parágrafo para entender estrutura) → Leia questions → Scan (procure keywords onde resposta está) → Deep read (leia profundamente apenas seções relevantes)."}]},
  {id:3,name:'Writing: Estrutura, Task 1 e Task 2 Com Exemplos',dur:'19 min',content:`<h3>IELTS Writing: Não é Sobre Ser Elegante, é Sobre Ser Claro</h3><p>Aqui vem verdade que estudantes descobrem tarde: você pode tirar 7.0 em writing SEM palavras sofisticadas. Mas você NÃO pode tirar 6.5 se sua estrutura é confusa.</p><p>Examinador de IELTS está pensando: "Posso entender o que essa pessoa quer dizer?" Se resposta é SIM, score sobe. Se resposta é NÃO, score desce.</p><p><strong>Timing: Distribuição de 60 Minutos</strong></p><p>TASK 1: 20 minutos máximo<br>TASK 2: 40 minutos máximo<br><br>POR QUÊ 40 para Task 2? Porque Task 2 vale MAIS de scoring (250 palavras vs 150). Se você inverte (gasta 40 em Task 1, 20 em Task 2), você vai tirar score ruim.</p><p>Muitos brasileiros ficam muito tempo em Task 1 (tentando ser perfeito) e depois correm Task 2 (ficando confuso e cheio de erros). Avoid isso.</p><p><strong>Task 1: Descrever Dados/Gráficos</strong></p><p>FORMATO: Você recebe gráfico/tabela/diagram. Você TEM QUE descrever (não interpretar wildly).</p><p>EXEMPLO DE PROMPT:<br>"The bar chart shows the percentage of household income spent on different categories in UK, USA, and Japan in 2022. Summarize the information by selecting and reporting the main features, and making relevant comparisons."</p><p>ESTRUTURA CORRETA:</p><p>PARÁGRAFO 1 (Introduction): Restate o prompt em suas próprias palavras<br>"The bar chart illustrates how household income is allocated across various spending categories in three countries: the United Kingdom, United States, and Japan in 2022."<br><br>PARÁGRAFO 2-3 (Main features): Descreva dados principais<br>"The most significant difference is in housing costs. UK households spend approximately 28% of income on housing, which is slightly higher than USA (26%) but considerably more than Japan (18%). Food spending is fairly consistent across countries, ranging from 14-16%."<br><br>PARÁGRAFO 4 (Conclusion): Resumir observação final<br>"Overall, housing represents the largest expense in all three countries, though the proportion varies. Japan demonstrates lower spending in housing and transportation compared to Western countries, suggesting different economic priorities."<br><br>PALAVRA COUNT: ~150-180 palavras<br>GRAMMAR: Deve ser simples mas CORRETO<br>VOCABULARY: Deve ser PRECISO (não complicado)</p><p>ERROS COMUNS EM TASK 1:<br>- Interpretar dados ("This shows people don't care about environment") em vez de descrever ("This shows 12% spend on environmental products")<br>- Muito wordiness (usar 50 palavras para dizer algo que leva 10)<br>- Esquecendo parágrafo de introduction (examinador quer ver que você entendeu prompt)<br>- Sem números específicos (muito vago: "most people spend on housing" sem percentual)</p><p><strong>Task 2: Opinion/Argument Essay</strong></p><p>FORMATO: Você recebe pergunta pedindo opinião/argumento. Você TEM que argumentar com exemplos concretos.</p><p>EXEMPLO DE PROMPT:<br>"Some people believe that technology has made education less effective, while others argue it has improved learning outcomes. Discuss both views and give your opinion."</p><p>ESTRUTURA CORRETA:</p><p>PARÁGRAFO 1 (Introduction): Restate pergunta + sua posição clara<br>"While some argue technology has reduced education quality, I believe technology has overall improved learning when used strategically, though challenges exist."<br><br>PARÁGRAFO 2 (View 1 - opposing): Explique argumento oposto (2-3 sentença)<br>"Critics argue technology distracts students. Smartphones in classroom lead to decreased focus, and excessive screen time affects concentration. Some educators contend traditional methods were more effective."<br><br>PARÁGRAFO 3 (View 2 - supporting): Explique seu argumento (com exemplos)<br>"However, technology enables personalized learning. Students can access resources tailored to their pace. Online platforms like Khan Academy provide explanations students can rewatch. Additionally, video learning engages visual learners better than textbooks alone. Collaborative tools allow global interaction that broadens perspective."<br><br>PARÁGRAFO 4 (Conclusion): Restate posição + síntese<br>"In conclusion, technology is not inherently good or bad for education—it depends on implementation. When integrated thoughtfully with proper boundaries, technology enhances learning outcomes significantly."<br><br>PALAVRA COUNT: ~250-280 palavras<br>GRAMMAR: Pode ser mais complex (use dependent clauses, varied sentence structure)<br>VOCABULARY: Mais formal/academic que Task 1</p><p><strong>Estrutura Geral que FUNCIONA</strong></p><p>INTRODUCTION:<br>"According to recent studies / It is often argued that / Many people claim that [background]. I agree/disagree/partially agree because [your position briefly]."<br><br>BODY (2-3 parágrafos):<br>Cada parágrafo = 1 ideia. Sentença tópica → 2-3 explicação/exemplo → sentença conclusiva.<br><br>CONCLUSION:<br>"To summarize, [restate main points]. Therefore, [reinforce position]. This matters because [why it's important]."</p><p><strong>Checklist de Qualidade</strong></p><p>ANTES DE SUBMETER, verifique:</p><p>□ Entendi prompt corretamente? (Reli prompt e meu texto responde?)<br>□ Tenho intro, body, conclusão claros?<br>□ Cada parágrafo tem 1 ideia principal + suporte?<br>□ Tenho exemplos concretos (não só opinião vaga)?<br>□ Minha posição é claro (não estou sendo ambíguo)?<br>□ Revisei por typos comuns (the/a, is/are, singular/plural)?<br>□ Palavras estão CORRETAS (não apenas impressionantes)?<br>□ Sentences têm varietyem estrutura (não tudo simples, não tudo complex)?<br>□ Conectivas estão claros (However, Therefore, Additionally, Moreover)?<br>□ Estou no word count? (150-180 Task 1, 250-280 Task 2)</p><p><strong>Common Grammar Errors em Task 2</strong></p><p>ERRO: "The government should to provide education" (extra "to")<br>CORRETO: "The government should provide education"<br><br>ERRO: "Technology has improve learning" (verb form errado)<br>CORRETO: "Technology has improved learning"<br><br>ERRO: "Students spends too much time on phones" (subject-verb)<br>CORRETO: "Students spend too much time on phones"<br><br>ERRO: "Although smartphones has benefits, they are also problematic" (subject-verb)<br>CORRETO: "Although smartphones have benefits, they are also problematic"<br><br>ERRO: "The reason why I agree is because technology helps" (redundante)<br>CORRETO: "I agree because technology helps" OU "The reason I agree is that technology helps"</p><p><strong>Practice Plan: 4 Semanas</strong></p><p>SEMANA 1: Task 1 só<br>Faça 3 diferentes graphs/charts. Cada uma com timing de 20 minutos. Foco em estrutura clara e descrição precisa.<br><br>SEMANA 2: Task 2 só<br>Faça 3 essays diferentes. Cada uma com timing de 40 minutos. Foco em intro clara + 2-3 body paragraphs com exemplos + conclusão.<br><br>SEMANA 3: Mix de Task 1 + 2<br>Faça 2 full writings (Task 1 + Task 2 combinados) com timing de 60 minutos total. Gerencie timing: Task 1 (20 min), Task 2 (40 min).<br><br>SEMANA 4: Full tests + revision<br>Faça 2 full tests. Revise primeiro, veja erros padrão, pratique correção.</p><p><strong>Score Progression Realística</strong></p><p>SEMANA 1: Você vai tirar ~5.5 (estrutura confusa, muitos erros)<br>SEMANA 3: Você vai tirar ~6.0 (estrutura melhor, menos erros)<br>SEMANA 5: Você vai tirar ~6.5 (estrutura clara, erros ocasionais)<br>SEMANA 7: Você vai tirar ~7.0 (estrutura clara, vocabulary preciso, poucos erros)</p><p>Consistência é tudo. Não precisa ser perfeito. Precisa ser claro, estruturado, preciso.</p>`,cards:[{q:"Qual é distribuição correta de tempo em IELTS Writing?",a:"Task 1: 20 minutos máximo (~150 palavras, descrição de dados/gráfico). Task 2: 40 minutos (~250 palavras, essay argumentativo). Total: 60 minutos."}]}
