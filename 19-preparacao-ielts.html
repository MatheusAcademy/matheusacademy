        dur: '20 min',
        content: `<h3>Entendendo o IELTS (International English Language Testing System)</h3>
<p>O IELTS é o exame de proficiência em inglês mais reconhecido globalmente. É utilizado para imigração, educação superior, emprego e residência. Compreender sua estrutura é o primeiro passo para uma preparação eficaz. Este curso foca na versão Academic, mais exigente que a General Training.</p>
<h4>Estrutura Geral do Teste</h4>
<p>O IELTS Academic consiste em 4 componentes:
</p>
<ul>
<li><strong>Listening:</strong> 40 minutos (30 min teste + 10 min transferência de respostas)</li>
<li><strong>Reading:</strong> 60 minutos</li>
<li><strong>Writing:</strong> 60 minutos</li>
<li><strong>Speaking:</strong> 11-14 minutos (em data/hora diferente)</li>
</ul>
<p>Tempo total: 2 horas 45 minutos (sem Speaking)</p>
<h4>Sistema de Scoring</h4>
<p>Cada componente é pontuado de 0-9, e o score final é a média aritmética dos 4 componentes. A escala é dividida em bandas que indicam seu nível de proficiência:</p>
<ul>
<li><strong>9:</strong> Expert User — Proficiência completa</li>
<li><strong>8:</strong> Very Good User — Muita boa proficiência, alguns mal-entendidos</li>
<li><strong>7:</strong> Good User — Boa proficiência operacional</li>
<li><strong>6:</strong> Competent User — Proficiência adequada com alguns erros</li>
<li><strong>5:</strong> Modest User — Proficiência modesta, dificuldades frequentes</li>
<li><strong>4:</strong> Limited User — Proficiência limitada, problemas significativos</li>
<li><strong>3:</strong> Extremely Limited User — Compreensão muito limitada</li>
<li><strong>1-2:</strong> Non User — Pouca ou nenhuma capacidade</li>
</ul>
<h4>Requisitos de Scoring por Instituição</h4>
<p>Universidades no exterior geralmente exigem:</p>
<ul>
<li><strong>Austrália:</strong> 6.5-7.5 (dependendo da universidade/programa)</li>
<li><strong>Canadá/EUA:</strong> 6.5-7.0 para pós-graduação</li>
<li><strong>Reino Unido:</strong> 6.5-7.5</li>
<li><strong>Imigração (Canadá/Austrália):</strong> mínimo 6.0-6.5</li>
</ul>
<h4>O que é Testado em Cada Componente</h4>
<p><strong>Listening:</strong> Sua capacidade de entender inglês falado em contextos acadêmicos e sociais. Envolve monólogos, conversas, palestras.</p>
<p><strong>Reading:</strong> Compreensão de textos acadêmicos. Você lê 3 passagens longas (1000-1200 palavras no total) e responde 40 questões.</p>
<p><strong>Writing:</strong> Duas tarefas obrigatórias — Task 1 (descrever/explicar dados visuais em 150+ palavras) e Task 2 (ensaio argumentativo em 250+ palavras)</p>
<p><strong>Speaking:</strong> Conversa com um examinador em 3 partes — introdução, discussão de tópico, debate abstrato.</p>
<h4>Dicas Estratégicas Gerais</h4>
<p><strong>Tempo:</strong> Em todas as seções, gerenciar tempo é crítico. Pratique com timer para desenvolver velocidade.</p>
<p><strong>Transferência de Respostas:</strong> No Listening, você tem 10 minutos para transferir suas respostas. Escreva claramente — erros de escrita custam pontos!</p>
<p><strong>Leitura Estratégica:</strong> Não leia palavra por palavra. Desenvolva skimming (leitura rápida para ideia geral) e scanning (buscar informação específica).</p>
<p><strong>Estrutura em Writing:</strong> Ambas as tarefas exigem estrutura clara. Falta de estrutura reduz sua nota significativamente.</p>
<p><strong>Fluência em Speaking:</strong> Fale naturalmente, não memorize. Os examinadores detectam discursos ensaiados.</p>`,

        content: `<h3>Maximizando seu Desempenho no Dia do Teste</h3>
<p>Estratégia é tão importante quanto proficiência em inglês. Muitos candidatos conhecem inglês suficientemente bem, mas não conseguem um score alto porque sua estratégia de teste é deficiente. Aprender a abordar o teste strategicamente pode elevar seu score em até 1 banda completa!</p>
<h4>Antes do Teste</h4>
<p><strong>Dormir bem:</strong> A noite antes do teste, durma bem. Cansaço prejudica concentração e memória.</p>
<p><strong>Café da manhã adequado:</strong> Coma algo nutritivo. O teste dura quase 3 horas — você precisa de energia.</p>
<p><strong>Chegar cedo:</strong> Chegue 15-20 minutos antes para se assentar, relaxar e acostumar com o ambiente.</p>
<p><strong>Trazer documentação:</strong> Passaporte ou documento de identidade (cheque os requisitos específicos do seu teste).</p>
<h4>Durante o Teste — Listening</h4>
<p><strong>Problema:</strong> Muitos candidatos perdem tempo relendo instruções. As instruções são lidas para você!</p>
<p><strong>Estratégia:</strong> Use o tempo antes de cada seção para ler as perguntas, não as instruções. Isso ajuda você a preparar.</p>
<p><strong>Problema:</strong> Você ouve uma resposta, pensa nela por 2 segundos, e perde as próximas 3 respostas enquanto pensa.</p>
<p><strong>Estratégia:</strong> Escreva o que você acha, mesmo se não tiver certeza. Continue — você pode revisar depois. Não fique preso em uma pergunta.</p>
<p><strong>Spelling:</strong> Erros de ortografia custam pontos! "Colour" não é mesmo que "color" no inglês britânico. Confira o contexto do teste (UK vs US English).</p>
<h4>Durante o Teste — Reading</h4>
<p><strong>Problema:</strong> Candidatos leem tudo palavra por palavra. Não há tempo para isso!</p>
<p><strong>Estratégia SKIMMING:</strong> Leia rapidamente para entender o tema geral e a estrutura. Leia o primeiro parágrafo completo, primeiras frases de parágrafos intermediários, último parágrafo.</p>
<p><strong>Estratégia SCANNING:</strong> Quando uma pergunta pedir uma informação específica (nome, número, data), não releia tudo — procure a informação.</p>
<p><strong>Gerenciar tempo por passagem:</strong> Você tem 60 minutos para 3 passagens. Aloque aproximadamente 20 minutos por passagem.</p>
<p><strong>Não deixar questões em branco:</strong> Adivinhar uma resposta tem 25% de chance (4 opções). Deixar em branco tem 0%!</p>
<p><strong>Ler as instruções com cuidado:</strong> "Choose NO MORE THAN TWO WORDS" — se você escrever três, é errado, mesmo que as três palavras estejam corretas!</p>
<h4>Durante o Teste — Writing</h4>
<p><strong>Gerenciar tempo:</strong> Task 1 (150+ palavras): 20 minutos. Task 2 (250+ palavras): 40 minutos.</p>
<p><strong>Não escrever rascunho:</strong> Não há tempo. Escreva diretamente sua resposta final, organizando seus pensamentos primeiro.</p>
<p><strong>Estrutura clara:</strong> Para Task 2 (ensaio), use: Introdução (paraphrase + tese), 2-3 parágrafos de corpo com exemplos, conclusão.</p>
<p><strong>Revisar:</strong> Se tiver tempo, revise seu trabalho. Procure erros gramaticais, erros de ortografia, sentenças incompletas.</p>
<p><strong>Qualidade sobre quantidade:</strong> 280 palavras bem escritas é melhor que 350 palavras com muitos erros.</p>
<h4>Durante o Teste — Speaking</h4>
<p><strong>Relaxar:</strong> O examinador quer que você bem-sucedido. Eles não estão tentando te enganar.</p>
<p><strong>Falar naturalmente:</strong> Não memorize respostas. Se você soar memorizado, sua nota cai.</p>
<p><strong>Pedir esclarecimento:</strong> Se não entendeu a pergunta, é aceitável pedir: "Could you rephrase that question, please?"</p>
<p><strong>Expandir respostas:</strong> Não responda com "yes" ou "no". Sempre explique: "Yes, I quite like it because..."</p>
<p><strong>Corrigir-se com naturalidade:</strong> Se cometer erro, corrija naturalmente: "I mean, I started at university, not school." Isso mostra autoconsciência.</p>`,

        content: `<h3>Dominando os Diferentes Tipos de Questões do IELTS</h3>
<p>O IELTS usa vários formatos de questão. Cada formato requer uma abordagem estratégica diferente. Dominar cada tipo maximize suas chances de acertos.</p>
<h4>True/False/Not Given (Listening e Reading)</h4>
<p><strong>O que é:</strong> Você lê uma afirmação e determina se é:
</p>
<ul>
<li><strong>True:</strong> A informação está no texto/áudio e é correta.</li>
<li><strong>False:</strong> A informação está no texto/áudio mas é contrária ao que é dito.</li>
<li><strong>Not Given:</strong> A informação NÃO está mencionada no texto/áudio.</li>
</ul>
<p><strong>Armadilha comum:</strong> Muitos candidatos confundem False com Not Given. IMPORTANTE: Se a informação não é mencionada, é NOT GIVEN, não False!</p>
<blockquote class="example">
TEXTO: "The temperature rose from 15°C to 20°C during the experiment."<br>
QUESTÃO 1: "The temperature rose by 5°C." — TRUE (15 + 5 = 20)<br>
QUESTÃO 2: "The temperature rose to 25°C." — FALSE (o texto diz 20°C)<br>
QUESTÃO 3: "The experiment took 3 hours." — NOT GIVEN (tempo não é mencionado)
</blockquote>
<p><strong>Estratégia:</strong> Releia a afirmação, procure a parte relevante do texto, determine se é verdadeira, falsa ou não mencionada.</p>
<h4>Multiple Choice (Listening e Reading)</h4>
<p><strong>O que é:</strong> Você escolhe entre 3 ou 4 opções (A, B, C, ou A, B, C, D).</p>
<p><strong>Estratégia:</strong> Nem sempre a resposta correta aparece primeiro. Leia TODAS as opções antes de escolher. A opção "correta" é aquela que melhor responde a pergunta baseada no texto.</p>
<blockquote class="example">
PERGUNTA: "Why did the author decide to move to Canada?"<br>
A) Because it was cheaper<br>
B) Because he had a job offer<br>
C) Because his family was there<br>
D) Because the climate was better<br><br>
TEXTO: "After graduating, I received a job offer from a tech company in Toronto. This opportunity aligned with my career goals, so I decided to accept and move."<br><br>
RESPOSTA: B — "job offer" está claramente no texto.
</blockquote>
<p><strong>Dica:</strong> Perto da resposta correta, geralmente há opções "distrator" que soam plausíveis mas não estão no texto ou dizem algo contrário.</p>
<h4>Matching (Reading)</h4>
<p><strong>O que é:</strong> Você emparelha itens de uma lista com seções do texto, parágrafos, ou outra lista.</p>
<blockquote class="example">
INSTRUÇÕES: "Match the following headings (A-E) to paragraphs 1-4."<br>
A) Benefits of renewable energy<br>
B) History of solar technology<br>
C) Cost analysis of wind farms<br>
D) Government subsidies impact<br>
E) Environmental concerns<br><br>
Parágrafo 1: "In recent years, governments worldwide have implemented various incentive programs to encourage the adoption of clean energy. These subsidies have proven effective in accelerating the transition..."<br><br>
RESPOSTA: Parágrafo 1 = D
</blockquote>
<p><strong>Estratégia:</strong> Leia o título/descrição da lista. Skim cada parágrafo rapidamente. Procure palavras-chave que correspondam. Se um parágrafo é muito difícil, deixe para o final.</p>
<h4>Short Answer Questions</h4>
<p><strong>O que é:</strong> Você responde em 1-3 palavras (dependendo das instruções).</p>
<blockquote class="example">
INSTRUÇÃO: "Answer the following questions in NO MORE THAN TWO WORDS."<br>
PERGUNTA: "What was the main cause of the economic crisis?"<br>
RESPOSTA CORRETA: "Banking collapse" (2 palavras) ✓<br>
RESPOSTA ERRADA: "The banking system collapsed" (4 palavras) ✗
</blockquote>
<p><strong>Estratégia:</strong> Conte as palavras cuidadosamente! Responda diretamente sem adicionar explicações extras.</p>
<h4>Completion Tasks (Fill in the Blank)</h4>
<p><strong>O que é:</strong> Você preenche lacunas em frases ou tabelas baseado no texto/áudio.</p>
<blockquote class="example">
TEXTO: "The Great Wall of China was built over a period of 1,500 years by multiple dynasties."<br>
PERGUNTA: "The Great Wall of China was constructed over a period of _______ years."<br>
RESPOSTA: "1500" ou "one thousand five hundred"
</blockquote>
<p><strong>Dica importante:</strong> Procure a resposta no texto. Mantenha a mesma forma (número vs word form) que o texto usa, a menos que as instruções digam contrário.</p>`,
