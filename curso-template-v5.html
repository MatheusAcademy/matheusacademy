<body>
<script>
/* ═══════════════════════════════════════════════════════
   CONFIG DO CURSO — altere apenas estes dados por curso
   ═══════════════════════════════════════════════════════ */
var COURSE = {
  id:'XX',                          // id único do curso (ex: 'tp', 'gp', 'ni')
  name:'Nome Completo do Curso',    // nome exibido na capa e certificado
  shortName:'Nome Curto',           // nome exibido na topbar
  cat:'Categoria',                  // categoria exibida no badge (ex: 'Negócios')
  desc:'Descrição curta do curso.', // subtítulo da capa
  salt:'XX_HENRY_2026_MASTER',      // salt SHA-256 para códigos de acesso
  ak:'xx_auth',                     // chave localStorage de acesso individual
  courseKey:'xx',                   // chave para o chat IA
  prefix:'xx_',                     // prefixo localStorage do progresso
  color:'#5b7fff',                  // cor principal do curso (pode ser diferente p/ cada)
  glow:'rgba(91,127,255,.35)',       // glow correspondente à cor
  free:false,                       // true = curso totalmente gratuito
  freeModules:1,                    // quantos módulos são gratuitos
  modules:10,                       // total de módulos (para exibição na capa)
  topics:80,                        // total de tópicos
  hours:20,                         // total de horas
  quizzes:10                        // total de quizzes
};

/* ═══════════════════════════════════════════════════════
   MÓDULOS E CONTEÚDO — preencha com o conteúdo real
   Cada módulo tem: id, name, free (bool), topics[]
   Cada tópico tem: id, name, dur, content (HTML), quiz, cards[]
   ═══════════════════════════════════════════════════════ */
var MODS = [
  {
    id:1, name:'Módulo 1 — Nome do Módulo', free:true,
    topics:[
      {
        id:1, name:'Nome do Tópico 1', dur:'8min',
        content:`
<h3>Título da Aula</h3>
<p>Conteúdo da aula aqui. Escreva em HTML simples usando tags como
<strong>negrito</strong>, <em>itálico</em>, listas e blockquotes.</p>
<ul>
  <li>Ponto importante 1</li>
  <li>Ponto importante 2</li>
  <li>Ponto importante 3</li>
</ul>
<blockquote>💡 Dica ou citação importante aqui.</blockquote>
<h4>Subtítulo</h4>
<p>Mais conteúdo...</p>
`,
        quiz:{
          q:'Pergunta do quiz?',
          opts:['Opção A','Opção B (correta)','Opção C','Opção D'],
          correct:1
        },
        cards:[
          {q:'Pergunta do flashcard?', a:'Resposta do flashcard.'},
          {q:'Segunda pergunta?', a:'Segunda resposta.'}
        ]
      },
      {
        id:2, name:'Nome do Tópico 2', dur:'10min',
        content:`<h3>Título</h3><p>Conteúdo...</p>`,
        quiz:{q:'Pergunta?',opts:['A','B','C','D'],correct:0},
        cards:[{q:'Pergunta?',a:'Resposta.'}]
      }
    ]
  },
  {
    id:2, name:'Módulo 2 — Nome do Módulo', free:false,
    topics:[
      {
        id:3, name:'Nome do Tópico 3', dur:'12min',
        content:`<h3>Título</h3><p>Conteúdo...</p>`,
        quiz:{q:'Pergunta?',opts:['A','B','C','D'],correct:2},
        cards:[{q:'Pergunta?',a:'Resposta.'}]
      }
    ]
  }
];
</script>
