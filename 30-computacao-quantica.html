<h3>O Qubit: Unidade Mágica de Computação Quântica</h3>
<p>Computador clássico usa bits (0 ou 1). Computador quântico usa qubits (quantum bits), que podem ser 0 E 1 simultaneamente. Impossível? Bem-vindo à mecânica quântica.</p>

<h4>Bit Clássico vs Qubit</h4>
<ul>
<li><strong>Bit:</strong> 0 ou 1. Determinístico. Binary.</li>
<li><strong>Qubit:</strong> 0 e 1 ao mesmo tempo. Probabilístico. Superposição.</li>
</ul>

<blockquote class="example">
<strong>💭 Pensamento:</strong>
<br>
<br>Bit = Moeda que caiu: cara ou coroa (1 ou 0)
<br>Qubit = Moeda girando no ar: ainda não decidiu cara ou coroa (0 E 1)
<br>
<br>Quando você olha (mede), colapsa para cara ou coroa.
<br>Até lá, é ambos.
</blockquote>

<h4>Superposição: O Truque Mágico</h4>
<p>Um qubit em superposição pode ser 0 e 1 simultaneamente.</p>
<ul>
<li><strong>1 qubit:</strong> 2 estados simultâneos (0, 1)</li>
<li><strong>2 qubits:</strong> 4 estados (00, 01, 10, 11) - tudo simultâneo</li>
<li><strong>3 qubits:</strong> 8 estados simultâneos</li>
<li><strong>n qubits:</strong> 2^n estados simultâneos</li>
</ul>

<blockquote class="tip">
<strong>📊 Poder Exponencial:</strong>
<br>
<br>10 qubits = 1024 estados simultâneos
<br>20 qubits = 1 milhão de estados simultâneos
<br>300 qubits = mais estados que átomos no universo (10^90)
<br>
<br>Impossível representar classicamente. Aí está a magia!
</blockquote>

<h4>Estados Quânticos: Notação Bra-Ket</h4>
<p>Física quântica usa notação |⟩ (ket):</p>
<ul>
<li>|0⟩ = qubit em estado 0</li>
<li>|1⟩ = qubit em estado 1</li>
<li>|+⟩ = superposição igual de 0 e 1 (50/50)</li>
<li>|ψ⟩ = estado geral (qualquer combinação)</li>
</ul>

<blockquote class="example">
<strong>📝 Estado de Superposição:</strong>
<br>
<br>|ψ⟩ = 0.7|0⟩ + 0.7|1⟩
<br>
<br>Interpretação: 70% chance de medir 0, 70% chance de medir 1
<br>Nota: precisa que probabilidades somem a 1 (normalizado)
</blockquote>

<h4>Entrelaçamento: Dois Qubits Dançando Juntos</h4>
<p>Entrelaçamento (entanglement) é quando qubits estão conectados: medir um afeta o outro instantaneamente.</p>
<blockquote class="tip">
<strong>🔗 Exemplo de Entrelaçamento:</strong>
<br>
<br>Bell State (estado maximamente entrelaçado):
<br>|Ψ⟩ = (|00⟩ + |11⟩) / √2
<br>
<br>Interpretação:
<br>50% chance de medir |00⟩ (ambos 0)
<br>50% chance de medir |11⟩ (ambos 1)
<br>
<br>NUNCA você vê |01⟩ ou |10⟩!
<br>Qubits estão correlated, mesmo separados por um parsec.
<br>
<br>Einstein chamou isso "ação fantasmagórica à distância".
</blockquote>

<h4>Medição: O Colapso Inevitável</h4>
<p>Até você medir, qubit está em superposição. Quando mede, colapsa em 0 ou 1.</p>
<ul>
<li>Antes de medir: |ψ⟩ = 0.6|0⟩ + 0.8|1⟩</li>
<li>Após medir: ou |0⟩ ou |1⟩ (perdeu superposição)</li>
<li>Probabilidade: 36% (0.6²) e 64% (0.8²)</li>
</ul>

<p>Isso é feature, não bug. Medição é como explorar possibilidades em paralelo.</p>

<h4>Porque Computadores Quânticos São Poderosos</h4>
<p>Computador clássico processa bits sequencialmente. Quântico explora superposição:</p>

<blockquote class="example">
<strong>🚀 Exemplo: Buscar em Lista de 1M Items</strong>
<br>
<br>Clássico: 500k iterações em média (busca linear)
<br>Quântico: √1M = 1k iterações (Algoritmo de Grover)
<br>
<br>Speedup: 500x!
<br>
<br>Para problemas maiores (NP-hard):
<br>Clássico: bilhões de anos
<br>Quântico: minutos (teórico)
</blockquote>

<p>Computação quântica não é 1000x mais rápida em TUDO. É exponencialmente mais rápida em problemas específicos: busca, fatoração, simulação quântica.</p>

<h3>Portas Quânticas: Operações em Qubits</h3>
<p>Se qubits são bits mágicos, portas quânticas são operações mágicas. Elas manipulam estados de qubits preservando superposição.</p>

<h4>Porta Pauli-X: O NOT Quântico</h4>
<p>Inverte qubit: |0⟩ → |1⟩, |1⟩ → |0⟩</p>
<blockquote class="example">
<strong>🔄 Porta X:</strong>
<br>
<br>Entrada: |0⟩
<br>Saída: |1⟩
<br>
<br>Entrada: 0.6|0⟩ + 0.8|1⟩ (superposição)
<br>Saída: 0.6|1⟩ + 0.8|0⟩ (flip mantendo superposição!)
</blockquote>

<h4>Porta Hadamard: Criar Superposição</h4>
<p>Cria superposição igual (50/50):</p>
<ul>
<li>|0⟩ → |+⟩ = (|0⟩ + |1⟩) / √2</li>
<li>|1⟩ → |-⟩ = (|0⟩ - |1⟩) / √2</li>
</ul>

<blockquote class="tip">
<strong>📊 Hadamard (H):</strong>
<br>
<br>Entrada: |0⟩ (estado definido)
<br>H | Saída: |+⟩ (superposição 50/50)
<br>H | H | Saída: |0⟩ (volta ao original!)
<br>
<br>Hadamard é reversível e fundamental.
</blockquote>

<h4>Porta CNOT: Entrelaçamento Controlado</h4>
<p>CNOT (Controlled NOT) cria entrelaçamento entre dois qubits:</p>
<ul>
<li>Se qubit 1 = 1, inverte qubit 2</li>
<li>Se qubit 1 = 0, qubit 2 fica igual</li>
</ul>

<blockquote class="example">
<strong>🔗 Criar Bell State com CNOT:</strong>
<br>
<br>Entrada: |0⟩|0⟩
<br>Depois H no primeiro: (|0⟩ + |1⟩) / √2 |0⟩
<br>Depois CNOT: (|00⟩ + |11⟩) / √2 ← Bell State!
<br>
<br>Agora qubits estão entrelaçados.
</blockquote>

<h4>Porta Z e Fases</h4>
<p>Z adiciona "fase" (rotação invisível). Não muda probabilidade, mas afeta interferência.</p>
<ul>
<li>|0⟩ → |0⟩ (inalterado)</li>
<li>|1⟩ → -|1⟩ (muda fase)</li>
</ul>

<p>Fases parecem inúteis até você entender interferência: fases construtivas amplificam respostas, destrutivas cancelam.</p>

<h4>Circuito Quântico: Visão Gráfica</h4>
<blockquote class="example">
<strong>📋 Exemplo: Criar Superposição e Medir</strong>
<br>
<br>q0: ─────────
<br>     ┌───┐
<br>q0:─┤ H ├─
<br>     └─┬─┘
<br>c0: ──■──
<br>
<br>Significado:
<br>1. Linha q0 é qubit 0
<br>2. Porta H cria superposição
<br>3. Símbolo medição coloca resultado em bit clássico c0
<br>4. Resultado é 0 ou 1 (50/50)
</blockquote>

<h4>Universalidade de Portas</h4>
<p>Assim como portas clássicas (NOT, AND) permitem qualquer computação, portas quânticas (H, T, CNOT, etc) permitem qualquer algoritmo quântico.</p>
<ul>
<li>Set universal: H, T, CNOT (qualquer algoritmo possível)</li>
<li>Profundidade: número de camadas de portas (quântico é rápido porque poucos camadas)</li>
<li>Fidelidade: qualidade da porta (real hardware é ~99.9%, perfeito é 100%)</li>
</ul>

<blockquote class="quote">
"Portas quânticas são operações reversíveis em superposição. Isso é a beleza e o desafio da computação quântica."
</blockquote>

<p>Cada porta adiciona latência (~1-100 nanosegundos), então circuitos curtos são críticos.</p>

<br>

<br>2. Shor: usa FFT quântica para encontrar período (paralelo com superposição)
<br>3. Período → fatores → quebra!
<br>
<br>Speedup: polinômio → exponencial

<h4>Algoritmo de Grover: Busca Quadrática</h4>
<p>Problema: Encontrar x em lista desordenada de N items</p>

<blockquote class="tip">

<br>3. Amplificar amplitude do item correto (interferência)
<br>4. Repetir 2-3 uns ~√N vezes

<h3>Algoritmos Variacionais: Quântico + Clássico</h3>
<p>VQE (Variational Quantum Eigensolver) e QAOA (Quantum Approximate Optimization Algorithm) são híbridos: quântico prepara estados, clássico otimiza parâmetros.</p>

<h4>VQE: Encontrar Mínimo de Função</h4>
<p>Problema: Encontrar autovalor mínimo de Hamiltonian H (operador)</p>
<blockquote class="example">
<strong>⚗️ VQE para Molécula H2:</strong>
<br>
<br>1. Ansatz (chute inicial): parameterizado circuito quântico
<br>2. Preparar estado |ψ(θ)⟩ (qubits)
<br>3. Medir energia ⟨ψ(θ)|H|ψ(θ)⟩
<br>4. Clássico otimiza θ (minimizar energia)
<br>5. Repetir até convergência
<br>
<br>Resultado: energia de molécula H2 = -1.17 Hartree
</blockquote>

<h4>QAOA: Otimização Combinatorial</h4>
<p>Problema: Maximizar função f(x) onde x é configuração binária</p>

<blockquote class="example">
<strong>🎯 QAOA para Max-Cut:</strong>
<br>

<br>3. Aplicar mixer Hamiltonian (explorar espaço)
<br>4. Medir, avaliar, clássico otimiza parâmetros
<br>5. Repetir

<li><strong>Decoherence:</strong> Qubit "esquece" estado (muito comum)</li>
<li><strong>Gate Errors:</strong> Porta não exata (0.1-0.2% drift)</li>
</ul>

<h4>Surface Code: Código de Correção Mais Prático</h4>
<p>Surface code é padrão para correção quântica em produção:</p>
<ul>
<li><strong>Princípio:</strong> Múltiplos qubits físicos → 1 qubit lógico robusto</li>
<li><strong>Overhead:</strong> ~1000 qubits físicos → 1 qubit lógico (pessimista)</li>
<li><strong>Threshold:</strong> Se erro físico < 1%, QEC funciona</li>
