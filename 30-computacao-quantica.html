      <p>Superposição é quando qubit está em múltiplos estados simultaneamente. Imagine que você tem caixa. Dentro tem bola. Bola é vermelha e azul ao mesmo tempo (enquanto você não abre caixa). Quando você abre (mede), bola é vermelha ou azul (colapsa para um estado).</p>

      <h3>Emaranhamento: Correlação Estranha</h3>
      <p>Emaranhamento é quando dois qubits são relacionados de forma que mudar um afeta o outro instantaneamente, mesmo se estão longe. Einstein chamou de "spooky action at a distance" (ação fantasmagórica à distância). Ele achava errado. Estava errado (experimentalmente provado).</p>

      <p>Exemplo: você tem dois qubits emaranhados. Se um é medido como 0, outro é garantidamente 1. Se um é 1, outro é 0. Correlação perfeita. Mas nem você nem seu colega consegue controlar qual será (aleatório). Porém, correlação é garantida. Estranho? Sim. Real? Sim.</p>

      <p>Implicação: emaranhamento permite que múltiplos qubits trabalhem juntos de formas que clássico não consegue. Combinado com superposição, resulta em poder de processamento exponencial.</p>

      <h3>Interferência: Amplificar Certos e Cancelar Outros</h3>
      <p>Onda é interferência. Onda em poça: você vê cristas (onde ondas constroem) e vales (onde ondas cancelam). Qubits usam interferência para computar.</p>

      <p>Algoritmo quântico é designado para: (1) Amplificar amplitude das respostas corretas (construtiva). (2) Cancelar amplitude das respostas erradas (destrutiva). Resultado: quando você mede, tem altíssima chance de obter resposta correta.</p>

      <p>Exemplo Simples: Problema é "qual é a raiz quadrada de 16?". Possíveis respostas: 4, -4, ou outras números aleatórios. Algoritmo quântico manipula amplitudes: 4 tem amplitude alta, outras têm amplitude próxima a zero. Quando mede, é 4 (correto) com 99.9% de chance.</p>

      <h3>Os Três Pilares: Superposição + Emaranhamento + Interferência</h3>
      <p>Superposição permite explorar múltiplas soluções. Emaranhamento permite correlação entre qubits. Interferência amplifica certas e cancela outras. Combinados, resultam em poder computacional incrível para certos problemas.</p>

      <h3>O Problema Fundamental: Decoerência</h3>
      <p>Qubits são frágeis. Qualquer perturbação (calor, vibração, eletromagnetismo) destrói superposição. Qubit colapsa para 0 ou 1 (aleatoriamente). Isso é decoerência. Tempo típico de decoerência: milissegundos para supercondutores, segundos para íons, microsegundos para certos sistemas.</p>

      <p>Problema: você precisa executar algoritmo em qubits (múltiplas operações). Cada operação leva tempo (~nanosegundos). Antes que algoritmo termine, qubits decoem. Resultado: resposta é lixo.</p>

      <h4>Exemplo Numérico</h4>
      <p>Computador quântico tem 300 qubits. Algoritmo precisa 1 bilhão de operações (para problema realista). Operação leva 10 nanosegundos. Tempo total: 10 bilhões nanosegundos = 10 segundos. Decoerência: 100 microssegundos. Você consegue fazer ~10.000 operações antes de decoem. Insuficiente.</p>

      <h3>Erros de Operação</h3>
      <p>Além de decoerência, cada operação (gate) em qubits é imprecisa. Fidelidade típica: 99%+ (parece bom). Mas em 1 bilhão de operações, 1% de erro em cada = erro massivo acumulado. Resultado: resposta está completamente errada.</p>

      <h3>Correção de Erros Quânticos</h3>
      <p>Solução: correção de erros quânticos. Conceito é simples: para proteger 1 qubit lógico (informação que você quer preservar), você usa múltiplos qubits físicos (100-1000). Redudância permite detectar e corrigir erro.</p>

      <h4>Como Funciona (Simplificado)</h4>
      <p>Qubit lógico é armazenado em 5-10 qubits físicos via "entanglement planejado". Se 1 qubit físico sofre erro, padrão de entanglement muda. Sistema detecta qual qubit errou. Corrige aplicando operação inversa. Qubit lógico fica protegido.</p>

      <h4>Overhead de Quantum</h4>
      <p>Para 1 qubit lógico, você precisa 1.000+ qubits físicos (estimativa é otimista; pode ser 10.000+ em realidade). Para computador quantum útil (1 milhão de qubits lógicos), você precisa 1 trilhão de qubits físicos. Escalabilidade é desafio imenso.</p>

      <h3>Threshold de Erro</h3>
      <p>Existe "threshold de erro". Se fidelidade de cada operação é acima de threshold (~99.9% para supercondutores), correção de erros funciona. Se abaixo, acumula. Pesquisa em 2026 é levantar threshold (melhorar fidelidade).</p>

      <h3>Pesquisa Atual (2026) em Correção</h3>
      <p>Google, IBM, Microsoft investem pesado em correção de erros. Google anunciou progresso (2023-2024): usando múltiplos qubits, conseguiram reduzir taxa de erro. Tendência é clara: correção de erros está melhorando.</p>

      <blockquote class="news">
        Google anunciou em 2024: usando código de correção de erro de superfície, conseguiram reduzir taxa de erro exponencialmente com mais qubits. Milestone importante. Esperança é que correção de erro de superfície (que require muitos qubits) seja padrão até 2028-2030.
      </blockquote>

      <h3>Desafios Práticos</h3>
      <p>(1) <strong>Custo Computacional:</strong> Correção de erros usa bilhões de operações apenas para manter 1 qubit lógico estável. Overhead é imenso. (2) <strong>Latência:</strong> Correção leva tempo. Qubits decoem enquanto sistema está corrigindo. (3) <strong>Crosstalk:</strong> Qubits interagem entre si (crosstalk). Ao corrigir 1, você afeta outro. Coordenação é complexa.</p>

      <h3>Timeline de Correção de Erros</h3>
      <p>(2026): Demonstrações iniciais. Qubits lógicos begin a ser criados. (2028-2030): Rotina. Computadores quantum operacionalistas usam correção de erros. (2030+): Melhorias contínuas. Overhead reduz, escalabilidade melhora.</p>

      <p>Conclusão: correção de erros é desafio maior de computação quântica. Mas é solucionável. Não é bloqueador fundamental.</p>
