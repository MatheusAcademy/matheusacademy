    {id:1, name:"Erosão de Poder de Compra",
     dur:"50 min", content:`<h3>Como Inflação Reduz o Valor do Seu Dinheiro</h3><p>O impacto mais direto da inflação é na redução de poder de compra. Isso é simples matematicamente mas profundo nas implicações pessoais. Se inflação é 5% ao ano, uma cesta de compras que custava cem reais, custa 105 reais um ano depois. Se você poupou cem reais e não investiu, perdeu poder de compra equivalente a cinco reais. Parece pequeno, mas ao longo de décadas, é devastador.</p><p>Considere alguém que guardou cem mil reais em 1994 (ano do Plano Real) e deixou sem investir. Em 2024, nominalmente ainda tem cem mil reais. Mas poder de compra em 2024 é uma fração do original. Um carro popular em 1994 custava cerca de 10 mil reais; em 2024 custa cerca de 100 mil reais. A cesta de compras básica que custava 500 reais em 1994 custa 10 mil reais em 2024. Aqueles cem mil reais iniciais podem comprar apenas cerca de 0,2% do que compravam em 1994 (aproximadamente, dependendo de qual cesta).</p><p>Esse é efeito composto de inflação em 30 anos. A taxa média de inflação brasileira nesse período foi de aproximadamente 8% ao ano (alta, comparada a países desenvolvidos). Aplicando fórmula de descapitalização: poder de compra final = poder inicial / (1 + taxa_inflação)^anos = 100.000 / (1,08)^30 = 100.000 / 10,06 = 9.940 reais em poder de compra 1994. Devastador.</p><p>Essa é a razão porque deixar dinheiro parado em poupança é perda de riqueza em inflação. A poupança rende juros nominais (historicamente 0,5% ao mês), mas inflação é muito maior que isso. Por exemplo, em 2021, poupança rendia 0,5% nominalmente, mas inflação era 10,1%. Você perdia 9,6% de poder de compra ao ano em poupança.</p><p>O impacto na vida real é brutal. Alguém que trabalhou 40 anos poupando 10% do salário em poupança, esperando aposentar, descobre que sua poupança não dura tanto quanto esperava. Preços subiram muito mais que retorno da poupança. Isso explica por que muitos idosos no Brasil enfrentam dificuldades financeiras apesar de ter poupado "direitinho".</p><p>Inflação também reduz poder de compra dos salários. Se salário aumenta 3% ao ano mas inflação é 8%, seu poder de compra caiu 5%. Você estava recebendo o mesmo nominal, mas consegue comprar menos. Isso é particular problema para trabalhadores de baixa renda que têm salários menos flexíveis e menos oportunidade de renegociar rapidamente. Ricos, particularmente aqueles com negócios ou ativos que aumentam de preço, conseguem manter poder de compra melhor.</p><p>Historicamente, inflação foi uma ferramenta de redistribuição de riqueza, frequentemente para os ricos. Por quê? Porque ricos têm ativos reais (imóveis, empresas, ouro) que ganham valor com inflação. Pobres têm poupança em moeda que perde valor. Durante inflação, dívida em moeda nominal perde valor real, então ricos que são devedores se beneficiam (pagam dívida com dinheiro desvalorizado). Pobres como credores (poupadores) perdem.</p><p>Banco Central moderno tenta manter inflação estável e previsível (melhor que alta mas imprevisível). Inflação previsível permite que agentes econômicos planejem. "Sei que inflação será 4% ao ano" permite que empresa projete custos futuros com razoável confiança. Inflação errática (salta de 2% para 15% em um ano) é muito mais prejudicial porque ninguém consegue planejar.</p><p>A inflação também afeta diferentes categorias de preço de forma diferente. Alimentos (necessidade básica) frequentemente sobem mais que serviços de luxo durante inflação. Energia (necessidade) sobe conforme demanda global. Isso afeta mais a pobres, que gastam maior proporção de renda com alimentos e energia. Ricos gastam proporção menor, então se beneficiam relativamente.</p><blockquote class="example"><strong>Exemplo Numérico:</strong> Uma família pobre gasta 60% de renda em alimentos. Se alimentos sobem 15% e renda sobe só 5%, perda de poder de compra é 15% × 60% = 9% de renda. Uma família rica gasta 10% em alimentos; mesma situação resulta em 15% × 10% = 1,5% de perda. O impacto relativo é 6 vezes maior na família pobre.</blockquote><p>Compreender essa erosão de poder de compra é motivação primária para investir. Deixar dinheiro parado em tempos inflacionários é perder riqueza. Mesmo um investimento modesto (ações que rendem 8% ao ano) com inflação de 4% resulta em ganho de poder de compra de 4%. Multiplicado por décadas, é diferença entre pobreza e segurança financeira na aposentadoria.</p>`,
     cards:[{"q":"Como inflação afeta o poder de compra do dinheiro guardado?","a":"Inflação reduz o quanto seu dinheiro consegue comprar. Se inflação é 5% ao ano e você não investe, seu dinheiro compra 5% menos de bens um ano depois. Efeito é composto ao longo dos anos."}]},
    {id:2, name:"Quem Ganha e Quem Perde com Inflação",
     dur:"50 min", content:`<h3>A Economia da Inflação: Winners e Losers</h3><p>Inflação não afeta todos igualmente. Há ganhadores claros e perdedores claros na inflação, e entender essa dinâmica explica muito sobre comportamento econômico durante inflação alta.</p><p>O perdedor mais óbvio é o poupador. Alguém que guardou dinheiro em moeda nominal (conta bancária, debaixo do colchão, poupança) vê seu poder de compra reduzido a cada momento. Uma aposentada que poupou a vida toda em poupança, esperando viver dos juros, descobre que juros não acompanham inflação. Seu padrão de vida cai. Isso é particularmente danoso para idosos em economias inflacionárias.</p><p>Quem ganha da inflação? Devedores. Se você tem hipoteca de 300 mil reais e deve esse valor, e inflação é 10%, seu débito em termos reais caiu 10%. Se seu salário acompanhou inflação, você está pagando divida com salário mais alto em nominal, reduzindo burden de dívida em termos reais. Banco que emprestou perdeu poder de compra do empréstimo.</p><p>Por isso durante inflação alta, tomar empréstimo fica atrativo e pagar dívida é menos custoso em termos reais. Famílias ricas pegam hipotecas grandes (ganham com desvalorização real). Pobres evitam dívida (têm menos acesso a crédito de longo prazo). Essa dinâmica ampifica desigualdade.</p><p>Proprietários de ativos reais ganham. Proprietário de imóvel vê valor de imóvel subir com inflação (imóvel é hedge inflacionário perfeito porque renda de aluguel sobe com inflação). Proprietário de ações ganha se empresa consegue manter margens (repassar custos ao preço) e crescer com demanda. Proprietário de ouro ganha (ouro é hedge inflacionário histórico). Proprietário de negócio ganha se consegue repassar custos ao preço sem perder clientes.</p><p>Empresas que conseguem impor reajustes de preço ganham. Empresa com poder de mercado (monopolista ou oligopolista) consegue aumentar preços sem perder mercado. Consumidores absorvem aumento. Empresa que compete em mercado altamente competitivo sofre: se aumenta preços, perde clientes. Por isso inflação favorece grandes empresas sobre pequenas.</p><p>Governo ganha de inflação se tem dívida em moeda nominal. Dívida pública de Brasil em reais se reduz em termos reais com inflação. Governo pode "inflacionar" sua dívida embora. Por outro lado, governo perde receita porque imposto de renda não é indexado (pessoas pagam mais em termos nominais, governo coleta em moeda desvalorizada). Inflação afeta orçamento público negativamente se não acompanhado por ajustes.</p><p>Exportadores ganham (produto sai mais barato em moeda estrangeira conforme real desvalua), importadores perdem (produtos estrangeiros ficam mais caros). Isso afeta balança comercial e emprego em setores de tradable goods diferentes.</p><p>Trabalhadores com poder de barganha ganham se conseguem renegociar salários rapidamente. Sindicatos conseguem reajustes maiores em inflação alta. Trabalhadores sem poder de barganha (desempregados, setor informal) perdem porque oferta de trabalho é elástica; empregadores resistem a aumentos reais. Isso aumenta desigualdade de renda.</p><p>Credores externos (pessoas que emprestam em moeda estrangeira) ganham de inflação local (brasil perde competitividade, moeda desvalua). Devedores externos (governo que tomou em dólar) perdem: dívida fica mais cara em moeda local conforme moeda desvalua. Por isso países em desenvolvimento com dívida em dólar são vulneráveis a inflação local causando desvalorização.</p><blockquote class="news"><strong>Situação Brasil 2023-2024:</strong> Brasil enfrentava dilema: deflacionar levaria recessão e desemprego alto, afetando pobres. Manter em inflação alta erode poder de compra dos que já têm pouco. Banco Central escolheu deflação: aumentou Selic para 13,75%, causando recessão moderada em 2023. Resultado: inflação caiu para meta, mas custo social foi desemprego elevado, particularmente entre pobres.</blockquote><p>Essa análise de ganhadores e perdedores explica muito comportamento político durante inflação. Devedores pressão governo a manter inflação para desvalorizar dívida. Credores e aposentados pressão governo a combater inflação. Essa luta política frequentemente resulta em deflação parcial (inflação reduzida mas não controlada) que fica pior para todos.</p><p>Entender quem ganha e perde da inflação ajuda você a posicionar seu portfolio pessoal. Se prevê inflação, vire devedor seletivamente (hipoteca de longo prazo), mantenha ativos reais (imóveis, ações), evite ativos em moeda nominal. Se acredita deflação vem, faça oposto.</p>`,
     cards:[{"q":"Quem ganha com inflação?","a":"Devedores (pagam dívida com dinheiro desvalorizado), proprietários de ativos reais (imóveis, ouro ganham valor), empresas com poder de mercado (conseguem aumentar preços)."}]},
    {id:3, name:"Inflação Heterogênea e Setorial",
     dur:"50 min", content:`<h3>A Inflação Não é Uniforme: Alguns Setores Sofrem Mais</h3><p>Embora falemos de "inflação" como um número único (por exemplo, "inflação foi 5% em 2023"), na realidade inflação afeta diferentes produtos e setores de forma muito diferente. Essa inflação heterogênea tem consequências profundas para quem consome diferentes coisas.</p><p>Alguns setores historicamente têm inflação maior: alimentos, energia, saúde. Outros têm inflação menor ou deflação: eletrônicos, roupas, serviços de informação. Por quê? Alimentos e energia têm oferta inelástica no curto prazo (não consegue produzir mais rápido). Se seca afeta produção agrícola, preço de alimento sobe muito antes de oferta se recuperar. Eletrônicos têm oferta elástica porque capacidade de produção é facilmente aumentada, e há competição global feroz, reduzindo preços.</p><p>Durante 2021-2023, inflação de alimentos foi particularmente severa no Brasil. Seca afetou produção agrícola. Dólar alto encareceu fertilizantes importados. Resultado: inflação de alimentos foi 15%+ enquanto IPCA foi ~5%. Para família que 60% de renda em comida, inflação pessoal foi muito maior que média.</p><p>Inflação de energia também foi alta. Seca reduziu capacidade hidrelétrica, forçando ligar termelétricas caras. Combustível subiu globalmente após invasão da Rússia à Ucrânia. Resultado: eletricidade e gasolina subiram 20%+ enquanto IPCA foi menor. Qualquer um que dirige ou toma táxi sentiu inflação diferente que IPCA reportava.</p><p>Por outro lado, serviços de informação tiveram deflação relativa. Internet, streaming, software: preços caíram ou cresceram abaixo da inflação. Eletrônicos também: celular que custava 3 mil reais em 2015 custa 1.500 reais em 2024 nominalmente (e muito menos em poder de compra constante). Essa deflação em high-tech compensa parcialmente inflação em alimentos para ricos que consomem muito tech.</p><p>Imóveis tiveram inflação muito alta, particularmente em grandes cidades. Enquanto IPCA foi 4-5% ao ano, preços de imóvel subiram 10-15% ao ano em São Paulo e Rio. Por quê? Oferta inelástica (não consegue construir rápido), demanda forte (especulação, migração para cidades), inflação monetária criando liquidez (pessoas buscam hedge em imóvel). Para quem quer comprar imóvel, inflação pessoal foi enorme. Para quem já possuía, beneficiou-se.</p><p>Saúde teve inflação alta. Planos de saúde aumentaram 10-15% ao ano enquanto IPCA foi menor. Por quê? Envelhecimento populacional (mais uso de saúde), tecnologia cara (novos medicamentos, equipamentos), poder de barganha de provedores. Para idosos (que gastam muito em saúde), inflação pessoal foi alta.</p><p>Educação também teve inflação relativamente alta. Mensalidade de faculdade privada cresceu acima de IPCA historicamente. Vendo ao contrário, bolsas de estudo (como cotas em universidades públicas) significam que alguns grupos conseguem contornar essa inflação.</p><p>Essa inflação heterogênea explica por que estatísticas de inflação oficial (IPCA) frequentemente divergem de percepção popular. Se inflação de alimentos foi 15% mas inflação de eletrônicos foi -5%, IPCA pode ser 5% (média ponderada). Mas se você gasta 60% em alimentos, sentiu inflação de 9% (0,60 × 15% + 0,40 × (-5%) = 9 - 2 = 7% aproximadamente, ainda maior que média). Isso explica por que pobres frequentemente sentem inflação maior que a reportada.</p><p>Inflação heterogênea também afeta ciclos econômicos. Quando inflação está alta no geral, governo e banco central têm dificuldade: se aumentam juros para combater inflação em alimentos (que é inflação de custo, não de demanda), podem jogar economia em recessão, prejudicando todos. Se não aumentam, inflação em alimentos continua erodindo poder de compra dos pobres.</p><p>A forma de lidar com inflação heterogênea é diversificação de consumo e investimento. Não gaste toda renda em itens que sofrem inflação alta. Invista em ativos que ganham em setores de inflação alta (terras agrícolas se inflação de alimentos vai ser alta, empresas de energia se inflação de energia vai ser alta). Isso permite hedgear.</p><blockquote class="tip"><strong>Insight Prático:</strong> Olhar inflação por categoria no site do IBGE é exercício valioso. IPCA publica inflação para: alimentos, transportes, saúde, educação, habitação, etc. Comparar sua inflação pessoal (baseada em sua cesta real de gastos) com IPCA oficial explica por que você sente inflação diferente da média.</blockquote><p>O desafio do banco central com inflação heterogênea é que ferramenta principal (juros) afeta agregado. Aumentar juros reduz inflação em setores sensíveis a juros (imóvel, crédito) mas afeta pouco alimentos ou energia se inflação é de oferta. Essa rigidez é razão pela qual múltiplas ferramentas de política são necessárias.</p>`,
     cards:[{"q":"Por que alimentos frequentemente têm inflação maior que a média?","a":"Alimentos têm oferta inelástica no curto prazo porque não consegue-se produzir mais rapidamente. Choques climáticos (secas, geadas) reduzem oferta, e preços sobem muito antes de recuperação de produção."}]}
  ], summary:{"title":"Resumo do Módulo 2","points":["Inflação reduz poder de compra, fazendo seu dinheiro comprar menos coisas com o passar do tempo","Inflação afeta grupos diferentes de forma diferente: savers perdem, devedores ganham (pagam com dinheiro desvalorizado)","Inflação não é uniforme; afeta setores diferentes em taxas distintas, com impacto maior em itens essenciais","Expectativa de inflação futura influencia decisões de investimento, consumo, e negociação de salários"]},
  quizFinal:[{"q":"Quem é prejudicado mais pela inflação?","opts":["Devedores","Empresas exportadoras","Poupadores","Governos"],"correct":2},{"q":"Como a inflação afeta devedores?","opts":["Prejudica, precisam pagar mais","Beneficia, pagam com dinheiro desvalorizado","Não afeta","Afeta apenas em economia global"],"correct":1},{"q":"A inflação é uniforme para todos os produtos?","opts":["Sim, sempre igual","Não, afeta itens diferentes em taxas distintas","Apenas produtos importados","Apenas serviços"],"correct":1}]

  {
  id:"if_mod_3", name:"Estratégias de Proteção Contra a Inflação",
  free:false, topics:[
    {id:1, name:"Ativos que Protegem Contra Inflação",
     dur:"50 min", content:`<h3>Protegendo Seu Patrimônio: Os Melhores Hedges Contra Inflação</h3><p>Se inflação é inimigo do poder de compra, como se proteger? A resposta é investir em ativos que preservam ou aumentam valor com inflação. Historicamente, certos ativos se mostraram hedges inflacionários confiáveis.</p><p>O primeiro e mais antigo hedge é ouro. Por milênios, ouro manteve valor relativo porque é oferta limitada, duração infinita, e demanda consistente. Durante inflação alta, ouro tipicamente ganha valor em moeda nominal (para compensar desvalorização da moeda). Uma onça de ouro valia 300 dólares em 2005; em 2024 vale 2.300 dólares. A maioria dessa subida acompanhou inflação global e desvalorização do dólar. Em termos de poder de compra (ouro em bushels de trigo), manteve-se mais ou menos constante.</p><p>Imóveis são hedge inflacionário clássico. Proprietário de imóvel aluga o imóvel; renda de aluguel sobe com inflação. Preço do imóvel também sobe com inflação e demanda. Historicamente, retorno real de imóvel (renda de aluguel + apreciação menos depreciação) é cerca de 3-4% ao ano, superior à inflação. Por isso imóvel é frequentemente recomendação para proteção inflacionária de longo prazo.</p><p>No Brasil, lei de desapropriação faz imóvel especialmente protetor. Ainda que governo queira expropriar (improvável em democracia estabelecida), compensação deve ser em dinheiro (no momento da desapropriação), mantendo valor real. Isso dá segurança que imóvel mantém valor pelo menos como "dinheiro com propriedade".</p><p>Ações são hedge inflacionário se a empresa consegue manter margens de lucro. Empresa que consegue aumentar preço de venda em linha com inflação, mantém lucro real constante, logo dividendo mantém poder de compra. Historicamente, retorno de ações (dividendo + apreciação) supera inflação em longo prazo. A bolsa brasileira rendeu historicamente cerca de 8-10% nominais, com inflação média de 6-8%, dando retorno real de 2-4% ao ano.</p><p>Títulos pós-fixados são hedge direto contra inflação. Um CDB pós-fixado rende IPCA + margem (por exemplo, IPCA + 3% ao ano). Seu retorno nominal sobe automaticamente conforme inflação sobe. Se inflação era 4% e você tinha CDB IPCA + 3%, ganha 7%. Se inflação sobe para 8%, você ganha 11%. Tesouro IPCA funciona similarmente: retorno ajusta com inflação.</p><p>A vantagem de títulos pós-fixados é previsibilidade. Você sabe que no mínimo vai ganhar retorno real de IPCA + margem, independente de inflação resultar 2% ou 10%. Desvantagem é que retorno real é modesto (3-5% ao ano), menor que média histórica de ações ou imóveis.</p><p>Títulos indexados a moeda estrangeira (dólar) também protegem contra inflação local. Se inflação de real é 8% e dólar sobe 8%, seu poder de compra em dólares se mantém. Desvantagem é risco de câmbio: se dólar cai, perde. Historicamente, Brasil tem inflação maior que países desenvolvidos, então dólar tende a fortalecer, tornando investimento em dólar bom hedge de longo prazo.</p><p>Commodities (petróleo, ouro, agriculturas) são hedges em períodos de inflação de custos (quando preços de matérias-primas sobem). Se inflação é por seca afetando alimentos, preço de commodities agrícolas sobe, protegendo quem tem posição em commodities. Desvantagem é volatilidade: preço de commodity pode cair assim como subir.</p><p>Negócios próprios ou empreendimentos são hedges excelentes se empresa consegue manter margens. Empreendedor que controla seus preços consegue inflacionar preço conforme custos aumentam, protegendo margem. Diferente de trabalhador assalariado que é tomador de preço no mercado de trabalho.</p><p>Cripto-ativos como Bitcoin afirmam ser hedge inflacionário porque oferta é limitada (21 milhões de Bitcoin máximo). Historicamente, Bitcoin forneceu retorno superior à inflação, mas com volatilidade extremamente alta. Em 2024, Bitcoin vale 60.000+ dólares contra 400 dólares em 2013. Mas viajou por múltiplas bolhas (sobe 20x, cai 70%, sobe novamente). É hedge arriscado para quem não pode tolerar volatilidade extrema.</p><blockquote class="example"><strong>Estratégia de Proteção Diversificada:</strong> Uma carteira defensiva contra inflação pode incluir: 30% imóvel (caixa de moradia), 30% ativos reais (ações de empresas produtivas), 20% títulos pós-fixados (renda fixa protegida), 10% ouro/commodities (volatilidade baixa), 10% dólar (diversificação cambial). Ajustar proporções conforme risco pessoal e inflação esperada.</blockquote><p>O ponto crucial é não deixar patrimônio inteiramente em moeda nominal (conta bancária, poupança). Inflação corroerá poder de compra. Investimento em ativos reais (imóvel, ações, ouro) ou títulos indexados (IPCA, pós-fixado) são necessários para preservar riqueza em contexto inflacionário.</p><p>Expectativa de inflação futura é também importante. Se acredita inflação será alta, invista mais em ativos reais. Se acredita será baixa (banco central mantém controle), pode ter proporção maior em títulos nominais. A flexibilidade e monitoramento de expectativas é mais importante que timing perfeito.</p>`,
     cards:[{"q":"Qual é a diferença entre títulos nominais e títulos pós-fixados em contexto inflacionário?","a":"Títulos nominais têm retorno fixo que não varia com inflação; se inflação sobe, retorno real cai. Títulos pós-fixados (IPCA, CDI) têm retorno ajustado com inflação, protegendo poder de compra."}]},
    {id:2, name:"Títulos e Investimentos Protegidos de Inflação",
     dur:"50 min", content:`<h3>Instrumentos Específicos para Defesa Contra Inflação</h3><p>Além de categorias gerais de ativos, existem instrumentos financeiros específicos desenhados para proteção inflacionária. Entender esses instrumentos permite proteção mais precisa.</p><p>O Tesouro IPCA é título público que rende IPCA + juros. Por exemplo, Tesouro IPCA 2050 rende IPCA + 5% ao ano até 2050. Compra um investidor para 10 mil reais. Um ano depois, valor do título sobe para 10 mil × (1 + IPCA + 5%). Se IPCA foi 4%, título vale 10.940. Se IPCA foi 10%, título vale 11.500. O governo garante essas pagamentos (porque é tesouro), logo risco é praticamente zero (apenas risco soberano).</p><p>Vantagem do Tesouro IPCA é segurança e previsibilidade. Você sabe que no mínimo renderá IPCA + 5% (ou qualquer taxa oferecida). Desvantagem é retorno real modesto (5% ao ano é bom mas não extraordinário) e liquidez limitada (difícil vender antes do vencimento sem perder um pouco). Mas para conservador buscando proteção segura, é excelente.</p><p>CDB pós-fixado é título bancário que rende CDI (ou IPCA) + margem. Banco oferece, por exemplo, CDB que rende CDI + 1% ao ano. Funciona similarmente ao Tesouro IPCA mas emitido por banco privado. Vantagem é maior liquidez (banco compra de volta antecipadamente) e às vezes melhor retorno. Desvantagem é risco de crédito (se banco falha, você perde até limite do FGC de 250 mil reais).</p><p>LCI (Letra de Crédito Imobiliário) e LCA (Letra de Crédito do Agronegócio) são títulos bancários lastreados em crédito imobiliário ou agrícola. Oferecem retorno IPCA + margem, com vantagem de isenção de imposto de renda para pessoa física. Um CDB pós-fixado IPCA + 5% rende 5% nominal líquido após imposto (15% de IR). Uma LCI IPCA + 5% rende 5% integralmente sem IR (porque incentivam crédito para setor). Quando o setor oferece retorno comparável, LCI/LCA são superiores.</p><p>Nota do Tesouro Direto tem série chamada Tesouro Prefixado, que fixa taxa de juros em emissão. Por exemplo, Tesouro Prefixado 2025 oferecia 10% ao ano. Diferente de IPCA: retorno é nominal fixo, não ajusta com inflação. Vantagem é que se inflação for menor que esperado, ganha. Desvantagem é que se inflação for maior, perde. É aposta na inflação futura.</p><p>Fundo de Investimento Imobiliário (FII) é forma de investir em imóvel sem comprar fisicamente. FII compra/aluga imóveis, cobra taxas, e repassa renda aos cotistas. Rendimento tipicamente é 6-8% ao ano em aluguéis, mais apreciação de cotista. Vantagem é menor investimento inicial (pode começar com poucos mil reais versus centenas de mil para comprar imóvel). Desvantagem é taxa administrativa e risco de liquidez inferior a imóvel direto.</p><p>Ações de empresas com inflação integrada em modelo de negócio são excelentes hedges. Empresas de utilidade pública (água, energia, telefonia) têm contratos que reajustam com inflação. Supermercados conseguem repassar inflação de alimentos aos preços rapidamente. Empresas de máquinas agrícolas têm demanda que sobe com preço de commodities. Essas ações, especialmente com dividendo alto, protegem contra inflação e geram renda.</p><p>Ouro físico é forma direta de proteção. Pode comprar ouro em pó, barra ou moeda (real histórico). Vantagem é portabilidade (pequeno volume para grande valor) e reconhecimento universal. Desvantagem é custo de armazenamento seguro e sem geração de renda (ouro não produz dividendos). Historicamente, ouro apenas acompanha inflação; não supera significativamente.</p><p>ETF de ouro (como GOLD11 na B3) permite exposição a ouro sem custódia. Compra via corretora igual ação. Vantagem é liquidez e sem custos de armazenamento. Desvantagem é que perde um pouco para custos da administradora (ETF custa ~0,5-1% ao ano).</p><p>Fundos de ações multimercado ou balanced que incluem diversificação de ativos reais são abordagem prática para quem não quer gerenciar investimentos individualmente. Fundo alocar em ações, imóvel, commodities, e títulos, com rebalanceamento automático. Taxa é cobrada (1-2% ao ano) mas simplicidade pode valer a pena.</p><blockquote class="news"><strong>Novidade 2024:</strong> Banco Central autoriza novos títulos Tesouro Direto com características inovadoras. Tesouro de Longo Prazo (70+ anos) agora disponível, permitindo investimento em proteção inflacionária para prazo muito longo. Para millenials poupando para aposentadoria, é ferramenta valiosa.</blockquote><p>Escolher entre esses instrumentos depende de: (1) horizonte de tempo (mais longo = pode tolerar mais volatilidade, melhor usar ações), (2) risco pessoal (conservador = Tesouro IPCA, agressivo = ações, ouro), (3) retorno esperado (Tesouro IPCA ~7-8% real ao ano, ações historicamente 2-4% real acima de inflação), (4) liquidez (precisa acessar antes? Evite títulos prefixados com longo prazo).</p><p>A regra ouro é: invista em múltiplos desses instrumentos para diversificar. Nunca coloque tudo em um. Carteira bem diversificada de ativos reais e títulos indexados fornece proteção robusta contra inflação, seja moderada ou alta.</p>`,
     cards:[{"q":"Como Tesouro IPCA protege contra inflação?","a":"Tesouro IPCA rende IPCA + juros fixos. Conforme IPCA sobe, valor nominal do título sobe automaticamente, preservando poder de compra real do investimento."}]},
    {id:3, name:"Planejamento Financeiro em Tempos de Inflação",
     dur:"50 min", content:`<h3>Estratégia Pessoal para Navegar Inflação Sem Medo</h3><p>Compreender inflação em nível teórico é útil, mas aplicar ao planejamento financeiro pessoal é essencial. Como estruturar sua vida financeira para prosperar (ou pelo menos sobreviver) em contexto inflacionário?</p><p>Primeiro, reconheça que inflação é permanente. Em economias modernas fiat (moeda sem lastro), inflação média é sempre positiva (raramente zero). Média global é 3-4% ao ano desde 1980. Planeje assumindo 4% como inflação real esperada (podem ser períodos de 2%, outros de 8%, mas longo prazo, média é em volta de 4%). Use isso para projetar quanto você precisará em renda futura.</p><p>Se aposentar em 30 anos e gastará 5 mil reais por mês em 2025, em 2055 precisará de 5 mil × (1,04)^30 = 16.122 reais por mês em poder de compra. Bancos e corretoras oferecem calculadoras que fazem isso. É exercício chocante ver quanto você realmente precisa poupado para aposentadoria confortável considerando inflação.</p><p>Segundo, estruture sua carteira pessoal em buckets: (1) Curto prazo (até 2 anos): deixe líquido em poupança, CDB curto, ou Tesouro Selic. (2) Médio prazo (2-10 anos): Tesouro IPCA, LCI/LCA, FII. (3) Longo prazo (>10 anos): ações, imóvel, ouro. Essa estrutura permite diferentes retornos e riscos adequados a cada horizonte.</p><p>Terceiro, considere suas despesas maiores e proteja-as específicamente. Se maior despesa é moradia (aluguel), invista em imóvel próprio (elimina risco de aluguel inflacionar). Se é educação de filhos, considere fundos educacionais ou investimentos em educação que apreciam com inflação. Se é saúde, mantenha seguro saúde (mesmo que caro, alternativa é mais caro com idade).</p><p>Quarto, se tiver dívida em reais (financiamento, empréstimo pessoal, cartão), considere trocar por dívida em dólar se inflação era de real especificamente (o que tem sido normal no Brasil). Dívida em dólar não inflaciona conforme real desvalua; em termos de dólar permanece constante. Isso reduz risk de dívida crescer muito em termos reais. Mas requere salário em dólar ou fluxo em moeda estrangeira para não virar problema.</p><p>Quinto, invista em sua própria produtividade. Educação, habilidades profissionais, networking: tudo isso aumenta sua capacidade de ganhar renda que acompanhe ou supere inflação. Pessoa com skills em alta demanda consegue negociar salário que supera inflação. Pessoa com skill obsoleta vê salário real cair. Investimento contínuo em educação é melhor hedge de longo prazo.</p><p>Sexto, considere múltiplas fontes de renda. Salário é uma. Aluguel de imóvel (renda que sobe com inflação). Dividendos de ações. Renda de negócio. Cada fonte adicional diversifica risco. Se apenas depende de salário nominal que não acompanha inflação, é vulnerável.</p><p>Sétimo, mantenha alguma exposição a moeda estrangeira. Não precisa ser grande, mas 10-20% em dólar ou outras moedas fornece diversificação. Se inflação de real é muito maior que de dólar, dólar aprecia, protegendo essa parte da carteira. Não é especulação (compra dólar esperando subir para vender); é diversificação estratégica.</p><p>Oitavo, questione suposições. Muitos planejadores financeiros antigos assumem 6-8% de retorno real em carteira (retorno nominal menos inflação). Isso é agressivo em contexto de inflação alta de Brasil. Use 3-5% como suposição mais prudente. Melhor ser pessimista e surpreso positivamente que otimista e arruinado.</p><p>Nono, revise regularmente. Economia muda: inflação de um período pode não ser a próxima, composição de carteira ideal muda, circunstâncias pessoais mudam (casamento, filhos, mudança de emprego). Plano financeiro não é "set and forget"; é revisão anual no mínimo.</p><p>Décimo, cuide da psicologia. Inflação alta induz ansiedade e impulsividade. Alguns gastam tudo agora porque "dinheiro vai valer menos". Outros poupam obsessivamente, nunca aproveitam vida. Equilíbrio é chave. Poupe suficiente para segurança futura, mas não tão extremo que sacrifique vida presente.</p><blockquote class="tip"><strong>Reflexão de Fé:</strong> Em perspectiva cristã, riqueza é ferramentaria, não objetivo. Trabalho e poupança são virtudes, mas ganância não é. Deus provém (Mateus 6), mas também espera prudência (Provérbios). Planejar financeiramente é responsabilidade, reconhecendo que nem tudo está em controle humano. Riqueza pode vir e ir; estabilidade genuína é em fé e relacionamentos, não dinheiro.</blockquote><p>O ponto essencial: inflação não é inimigo se planejado. Pessoas que entendem inflação e estruturam financeiramente prosperam mesmo em contexto de inflação alta. Pessoas que ignoram sofrem erosão de riqueza. Educação financeira sobre inflação é um dos investimentos mais valiosos que pode fazer.</p><p>A jornada de proteção contra inflação é maratona, não sprint. Décadas de investimentos consistentes em ativos reais, títulos protegidos, e desenvolvimento pessoal resulta em segurança financeira. O início é agora: comece pequeno se necessário (100 reais por mês em Tesouro IPCA é início legítimo), mas comece.</p>`,
     cards:[{"q":"Qual é a estratégia principal para proteger-se contra inflação no planejamento financeiro pessoal?","a":"Estruturar carteira em buckets (curto, médio, longo prazo), investir em ativos reais (imóvel, ações, ouro), manter títulos indexados (IPCA), diversificar em moedas, e investir continuamente em própria produtividade."}]}
  ], summary:{"title":"Resumo do Módulo 3","points":["Ativos reais (imóveis, ouro, ações) tendem a preservar valor em períodos inflacionários","Títulos indexados à inflação (Tesouro IPCA, CDB pós-fixado) protegem poder de compra ao aumentar com inflação","Diversificação geográfica e em moedas estrangeiras reduz risco de inflação local","Educação financeira e planejamento proativo são as ferramentas mais poderosas contra erosão inflacionária"]},
  quizFinal:[{"q":"Qual ativo preserva melhor valor contra inflação?","opts":["Caderneta de poupança","Títulos pós-fixados","Dinheiro em espécie","Depósito à vista no banco"],"correct":1},{"q":"O que é Tesouro IPCA?","opts":["Ouro do governo","Título indexado à inflação","Moeda estrangeira","Ação na bolsa"],"correct":1},{"q":"Como diversificação geográfica protege contra inflação?","opts":["Não protege","Reduz risco de inflação local mantendo ativos em moedas estrangeiras","Aumenta risco","Piora situação"],"correct":1}]
  }
];
