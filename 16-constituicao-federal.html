    content: `A Constituição é o documento legal mais importante de um país. É como um "manual de operação" que diz como o Estado funciona, quais são seus limites, e quais direitos as pessoas têm.

No Brasil, a Constituição atual é de 1988, promulgada após o período de ditadura militar (1964-1985). É chamada "Constituição Cidadã" porque restaurou direitos que haviam sido retirados.

A Constituição Federal Brasileira começa com um Preâmbulo que estabelece objetivos:
"Nós, representantes do povo brasileiro... constituímos um Estado Democrático de Direito..." Isso significa que o Brasil pretende ser uma democracia onde as leis valem para todos, incluindo o governo.

O que torna a Constituição especial?
1. SUPREMACIA: É a lei mais importante. Nenhuma outra lei pode contradizê-la. Se uma lei ordinária contradiz a Constituição, é inconstitucional e pode ser anulada.

2. RIGIDEZ: Não pode ser mudada facilmente. Requer votação de 3/5 de ambas as casas do Congresso Nacional (muitos votos, maioria qualificada). Uma lei ordinária muda com maioria simples.

3. PERMANÊNCIA: Cria instituições permanentes (não desaparecem quando governo muda).

4. PROTEÇÃO DE DIREITOS: Lista direitos que não podem ser tirados, nem pelo governo nem pelo povo (direitos fundamentais).

ESTRUTURA DA CONSTITUIÇÃO:
- PREÂMBULO: Introdução com objetivos
- TÍTULO I: Princípios Fundamentais (o que o Brasil quer ser)
- TÍTULO II: Direitos e Garantias Fundamentais (seus direitos)
- TÍTULOS III-VII: Organização do Estado (estrutura de governo)
- ATOS DAS DISPOSIÇÕES CONSTITUCIONAIS TRANSITÓRIAS: Regras de transição

DIFERENÇA ENTRE CONSTITUIÇÃO E LEI ORDINÁRIA:

Constituição:
- Lei máxima
- Altera-se com dificuldade (3/5 do Congresso)
- Não pode ser violada por lei ordinária
- Protege direitos fundamentais
- Organiza Estado
- Permanente

Lei Ordinária:
- Lei comum
- Altera-se com maioria simples
- Precisa estar conforme Constituição
- Detalha direitos e organização
- Pode ser revogada/alterada
- Menos permanente

EXEMPLO: Constituição diz "trabalho é direito social" (princípio). Lei ordinária (CLT) detalha: jornada máxima, férias, 13º, etc. A CLT detalha o que a Constituição promete.

CONTROLE DE CONSTITUCIONALIDADE:

- Proteção importante contra governo abusivo

Histórico: Brasil é República Federativa (estados + governo central). Teve 7 Constituições desde 1891. A de 1988 é a mais recente. Mudou bastante (já sofreu 30+ emendas).

    content: `A Constituição dedica grande parte a listar direitos fundamentais. Esses direitos não podem ser tirados nem por governo nem por maioria.

DIREITOS CIVIS FUNDAMENTAIS:
- VIDA: Direito de existir. Implica proibição de pena de morte (salvo guerra). Proteção à vida desde concepção.
- LIBERDADE: Direito de fazer o que quiser dentro da lei. Liberdade de expressão, locomoção, associação, crença, consciência.
- IGUALDADE: Todos são iguais perante lei, sem discriminação de raça, cor, sexo, idade, religião, origem, opção sexual.
- SEGURANÇA: Direito a ambiente seguro, proteção contra violência, acesso à justiça.
- PROPRIEDADE: Direito de ter bem (privada e imóvel), mas subordinado à função social.

LIBERDADE DE EXPRESSÃO:
- Pode expressar opinião
- Pode publicar
- Pode fazer arte
- Mas: É responsável por excesso (difamação é limitação legítima)
- Vedada censura prévia

LIBERDADE DE IMPRENSA:
- Imprensa pode criticar governo
- Proteção contra censura
- Direito de reportagem
- Mas: Responsabilidade por notícia falsa

LIBERDADE DE ASSOCIAÇÃO:
- Pode se juntar em grupo
- Pode formar sindicato, partido, associação
- Governo não pode proibir por opinião

LIBERDADE DE LOCOMOÇÃO:
- Pode ir e vir dentro Brasil
- Pode sair e entrar no país
- Restrições só por lei

LIBERDADE DE CONSCIÊNCIA E RELIGIÃO:
- Cada um tem crença própria
- Pode praticar religião
- Governo é laico (não favorece religião)
- Nenhuma religião é oficial

DIREITOS POLÍTICOS:
- VOTO: Direito de votar (obrigatório)
- Voto é direto, secreto, universal (para maiores de 18)
- Direito de ser votado (ser candidato)
- Direito de participação política
- Direito de petição (pedir ao governo)
- Direito de participação direta (plebiscito, referendo, iniciativa popular)

DIREITOS SOCIAIS:
Constituição reconhece que só liberdade não basta. Precisa de condições materiais. Por isso lista direitos sociais:

- EDUCAÇÃO: Direito a educação gratuita e obrigatória até certo ponto
- SAÚDE: Direito a saúde, acesso a atendimento médico
- TRABALHO: Direito a trabalho, com salário mínimo, jornada máxima, segurança
- MORADIA: Direito a habitação digna
- LAZER: Direito a descanso e diversão
- PREVIDÊNCIA SOCIAL: Direito a proteção em idade avançada, doença, desemprego
- ASSISTÊNCIA AOS DESAMPARADOS: Proteção a pobres
- PROTEÇÃO À MATERNIDADE E INFÂNCIA
- AMPARO AOS IDOSOS

- CRIANÇAS: Proteção especial
- IDOSOS: Atendimento preferencial

DIREITO AO ACESSO À JUSTIÇA:
- Todos podem processar
- Estado fornece defensoria para pobre (gratuita)
- Justiça é acessível, sem custo proibitivo

GARANTIAS FUNDAMENTAIS (instrumentos de proteção):

HABEAS CORPUS:
- Quando liberdade está sendo restringida ilegalmente
- Qualquer pessoa pode requerer
- Protege contra prisão arbitrária
- Rápido

MANDADO DE SEGURANÇA:

MANDADO DE INJUNÇÃO:

- Pede ao juiz que decida o direito até regulação chegar

AÇÃO POPULAR:

AÇÃO CIVIL PÚBLICA:

- Interesse difuso (muitas pessoas) ou homogêneo

DIREITO DE PETIÇÃO:
- Pode enviar petição ao governo
- Governo precisa responder

DIREITO DE INFORMAÇÃO:
- Pode pedir informação ao governo
- Governo tem dever de informar (Lei de Acesso à Informação)
- Segredo é exceção, não regra

- Direitos não são absolutos
- Podem ser limitados se houver motivo proporcional
- Exemplo: Liberdade de expressão é limitada se prejudica direito de outro
- Cabe juiz fazer balanceamento

- Cada estado tem 3 senadores (igualdade entre estados, não proporcional a população)

Funções do Senado:
- Cria e vota leis
- Aprova orçamento
- Aprova tratados internacionais
- Aprova nomeações de juízes, ministros, diretores
- Julga Presidente e ministros em impeachment
- Importante: Senado é câmara conservadora (menos propensa a mudanças rápidas)

CÂMARA DOS DEPUTADOS:
- 513 deputados (conforme população estadual)
- Mandato de 4 anos
- Reelegíveis
- Eleitos por voto direto
- Representam população (proporcional a estado)
- Estados grandes têm mais deputados

Funções da Câmara:
- Cria e vota leis
- Aprova orçamento
- Julgam governadores em impeachment (estadual)
- Propõe/vota projetos de lei
- Mais ágil que Senado (população vota de 4 em 4 anos)

PROCESSO LEGISLATIVO:
1. Projeto é apresentado (deputado, senador, Presidente, grupos de cidadãos, Ministério Público)
2. Vai a comissão temática para análise
3. Se aprovado em comissão, vai ao plenário
4. Plenário vota
5. Se aprovado, vai para outra casa (câmara alta ou baixa)
6. Mesmos passos na outra casa
7. Se aprovado, vai a Presidente
8. Presidente sanciona (vira lei) ou veta (volta ao Legislativo)
9. Se Legislativo conseguir 3/5 de votos, derruba veto, lei vira de qualquer forma

PROJETO DE LEI COMPLEMENTAR:
- Tipo de lei especial
- Exige votação por maioria absoluta (metade + 1 de todos os membros)
- Para assuntos específicos (direito tributário, por exemplo)
- Menos comum, mais rigoroso

EMENDA CONSTITUCIONAL:

- Exige 3/5 de ambas as casas
- Não pode tocar cláusulas pétreas
- Importante: Constituição pode evoluir, mas com dificuldade

COMISSÕES:
- Grupos de deputados/senadores que analisam temas
- Comissão de Educação, Saúde, Agricultura, etc.
- Estudam projeto antes de ir ao plenário
- Importante: Trabalho técnico

PLENÁRIO:
- Todos os membros votando
- Decisão final
- Voto aberto ou secreto (conforme regimento)

VOTAÇÃO:
- Maioria simples: Mais votos a favor que contra
- Maioria absoluta: Mais de metade de todos os membros
- Maioria qualificada: 3/5 ou 2/3 (exigido para coisa importante como emenda)

LIDERANÇA PARTIDÁRIA:
- Cada partido tem líder no Legislativo
- Influencia voto de membros (mas não é obrigatório)
- Negociação entre líderes

LIBERDADE PARLAMENTAR:

- Pode ser criativo em debate, crítico, discordar
- Imunidade relativa: pode ser preso em flagrante de crime grave

REPRESENTAÇÃO PROPORCIONAL (Câmara):

- Estimula pluralismo
- Mais partidos pequenos conseguem cadeira

REPRESENTAÇÃO POR ESTADOS (Senado):
- Cada estado tem 3, independente de população
- São Paulo (maior estado) tem 3, como Alagoas (menor)
- Favorece estados menores
- Equilibra poder territorial

CONGRESSO NACIONAL EXTRAORDINÁRIO:
- Pode ser convocado em recesso (fim de sessão legislativa)
- Para votações urgentes
- Presidente pode convocar

PARLAMENTAR COMUM:
- Pode fazer requerimento (pedir informação ao Executivo)
- Pode fazer interpelação (questionar ministro)
- Pode fazer moção (proposta)

PRIORIDADE LEGISLATIVA:
- Projetos de Presidente têm prioridade
- Projetos de urgência podem pular fila de votação

RESPONSABILIDADE DO LEGISLATIVO:
- Legislador é responsável por atos
- Pode sofrer crime eleitoral
- Pode ser investigado por abuso de poder
- Importante: Não tem impunidade absoluta (apesar de imunidade parlamentar)

</blockquote>`,

ESTRUTURA GERAL:

JUSTIÇA ESPECIALIZADA:

SUPERIOR TRIBUNAL DE JUSTIÇA (STJ):

SUPERIORTRIBUNALA MILITAR:

VITALICIEDADE DOS JUÍZES:

IRREDUTIBILIDADE DE VENCIMENTO:

    content: `Brasil é federação: sistema onde há governo central (União) e governos estaduais e municipais, cada um com autonomia em suas áreas.

O que significa federação?
- Múltiplos níveis de governo
- Cada nível tem competência (área onde legisla e age)
- Cada nível tem autonomia (não subordinado totalmente ao outro)
- Importante: Diferentes de unitarismo (um só governo central, estados são províncias)
- Brasil escolheu federalismo como forma de organização

UNION (Governo Federal):
- Governa todo Brasil
- Presidente da República como chefe
- Congresso Nacional legisla
- Foca em assuntos de interesse nacional:

  - Moeda, banco central

  - Leis federais (código penal, código civil, CLT)
  - Defesa (forças armadas)

  - Saúde (sistema nacional, doenças contagiosas)

- Cada estado tem Governador, Assembléia Legislativa
- Autonomia em assuntos estaduais:
  - Polícia estadual
  - Educação básica
  - Saúde (complementa sistema nacional)
  - Tributação estadual (ICMS, impostos estaduais)
  - Leis estaduais
  - Organização de seu executivo e legislativo
- Estados têm Constituição Estadual (respeitando CF/88)
- Tribunal de Justiça Estadual

DISTRITO FEDERAL:
- Capital do país (Brasília)
- Não é estado, tem regime especial
- Governador, Câmara Legislativa
- Características de estado E município
- Sem prefeitura (é região administrativa)

MUNICÍPIOS:

- Cada município tem Prefeito, Câmara de Vereadores
- Autonomia em assuntos locais:
  - Educação básica
  - Saúde básica (postos)
  - Infraestrutura local
  - Tributação municipal (IPTU, ISS)
  - Leis municipais (zoneamento, trânsito local)
  - Serviços de limpeza, transporte
- Prefeito é chefe do executivo
- Vereadores são legislativo

AUTONOMIA vs SUBORDINAÇÃO:
- Cada nível é autônomo em sua esfera
- Mas respeitam hierarquia na Constituição
- Se lei estadual contraria CF/88, é inconstitucional
- Se lei municipal contraria CF/88 ou lei estadual, é inválida
- Estados não podem fazer guerra, celebrar tratados (é função da União)

PODER DE TRIBUTAÇÃO:

- Pode haver conflito: Um mesmo ato é tributado por vários

RECEITA E DISTRIBUIÇÃO:

- Importante: Estados pobres recebem mais para equalizar

INTERVENÇÃO FEDERAL:

  - Grave perturbação da ordem
  - Golpe de estado
- Requer votação no Congresso Nacional
- Temporária, não é permanente
- Importante: Limite ao federalismo, mas proteção

CONFLITOS FEDERATIVOS:
- Podem surgir entre União e Estados, ou Estados e Municípios

COMPETÊNCIA CONCORRENTE:

- Importante: Coordenação entre níveis

AUTONOMIA NÃO SIGNIFICA INDEPENDÊNCIA TOTAL:

HISTÓRICO:

- Ditadura (federalismo fechado)

    dur: '18 min',
    content: `Diferente de apenas proteger direitos de não-interferência (liberdade de expressão), Constituição também reconhece direitos sociais: educação, saúde, trabalho, moradia.

Por que direitos sociais?
Reconhecimento que liberdade de expressão não alimenta quem tem fome. Pessoas precisam de condições materiais para viver dignamente. Por isso Estado tem obrigação de oferecer/garantir.

DIREITO AO TRABALHO:
- Garantido como direito social
- Direito a trabalho digno, protegido
- Implica: Salário mínimo, jornada máxima, segurança, não discriminação

- Proteção contra exploração
- Direito de sindicalizar-se

- Ensino fundamental é obrigatório
- Educação pública é gratuita

- Qualidade é exigência
- Acesso não é suficiente, precisa ser qualidade
- Educação superior: precisa ser acessível (cotas, PROUNI, FIES)

Desafio: Educação brasileira é desigual (ricos têm melhor educação privada, pobres dependem de educação pública precária)

DIREITO À SAÚDE:

- SUS (Sistema Único de Saúde) é instituição para garantir

- Acesso universal (para todos, sem discriminação)
- Integralidade (atendimento completo)
- Igualdade (não há "saúde de primeira e segunda classe" no SUS)
- Saúde é direito fundamental, não mercadoria

Desafio: SUS é sobrecarregado, faltam recursos, filas longas

DIREITO À MORADIA:
- "Todos têm direito a moradia digna"
- Estado precisa garantir acesso
- Programas de habitação (Minha Casa Minha Vida, etc.)
- Proteção contra despejo arbitrário
- Função social da propriedade: imóvel precisa cumprir função (moradia, trabalho)

Desafio: Muita gente morando em rua, favelas. Direito à moradia é mais promessa que realidade para muitos

DIREITO AO LAZER:
- Direito a diversão, descanso
- Implica: Férias remuneradas, finais de semana, folga semanal
- Praças, parques, atividades culturais

DIREITO À PREVIDÊNCIA SOCIAL:

DIREITO À ASSISTÊNCIA AOS DESAMPARADOS:
- Proteção a pobres, idosos, crianças
- Bolsa Família é programa
- Centros de acolhimento
- Estado tem responsabilidade com vulneráveis

AMPARO À MATERNIDADE E INFÂNCIA:
- Proteção especial para gestante e criança
- Licença-maternidade remunerada
- Direito a amamentação
- Proteção contra trabalho infantil
- Educação infantil

DIREITO AO MEIO AMBIENTE:
- Direito a meio ambiente ecologicamente equilibrado
- Equilíbrio entre desenvolvimento e natureza
- Importante: Desenvolvimento sustentável, não destrutivo
- Proteção a florestas, rios, animais
- Responsabilidade da União, Estados, Município E cidadãos

DIREITOS DO IDOSO:
- Proteção especial
- Atendimento preferencial
- Direito a viver dignamente na velhice
- Proteção contra abandono
- Segurança alimentar

DIREITOS DA CRIANÇA E ADOLESCENTE:
- Proteção integral
- Educação obrigatória
- Proteção contra exploração
- Direito de brincar, estudar
- Prioridade em políticas públicas

COMO FUNCIONA?
Direitos sociais não são "grátis". Alguém precisa pagar:
- Impostos financiam educação, saúde, previdência
- Quanto mais direitos sociais, mais impostos necessários
- Debate: Quanto Estado deve investir em direitos sociais?

- Brasil investe menos, daí qualidade menor

DIREITOS SOCIAIS vs LIBERDADES CIVIS:

    dur: '18 min',
    content: `Além de votar em representantes, Constituição permite que povo participe mais diretamente em decisões. São mecanismos de democracia participativa.

- Maiores de 18 anos

PARTIDOS POLÍTICOS:
- Agremiações que agrupam pessoas com ideologia comum
- Registram-se no TSE (Tribunal Superior Eleitoral)

PLEBISCITO:

AÇÃO POPULAR:

RECLAMAÇÃO AO OMBUDSMAN:

ga, pressiona governo
