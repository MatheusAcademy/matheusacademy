      id: 'INDT',
      title: 'Introdução ao Data Science',
      html: `<h4>O que você precisa saber sobre Data Science</h4><p>Data Science é uma disciplina interdisciplinar que combina estatística, programação, negócios e visualização para transformar dados em decisões inteligentes. Você aprenderá que não é apenas sobre números, mas sobre contar histórias com dados.</p><p>Na prática, um data scientist é um profissional que investiga dados brutos, limpá-los, estruturá-los e extrair padrões significativos. <strong>A demanda por profissionais dessa área cresce exponencialmente</strong>, com salários competitivos e oportunidades em praticamente todos os setores.</p><blockquote class="tip">Dica: Data Science é uma jornada, não um destino. Você começará com estatística básica e chegará a modelos de machine learning avançados.</blockquote><p>O que diferencia um bom data scientist é a <strong>capacidade de comunicação</strong>. Você pode ter os insights mais brilhantes do mundo, mas se não conseguir explicá-los para stakeholders, o impacto será zero.</p><blockquote class="example">Exemplo real: Uma rede de varejo usou análise de dados para identificar que clientes que compraram produto X têm 3x mais probabilidade de comprar Y em 30 dias. Resultado: aumento de 23% nas vendas cross-selling.</blockquote><p>Neste módulo, você compreenderá os pilares fundamentais, as ferramentas essenciais e como dados se transformam em valor de negócio.</p><blockquote class="quote">\"Os dados são o novo petróleo, mas o insights é o motor que faz tudo funcionar.\"</blockquote>`},
    {
      id: 'PIFC',
      title: 'Pilares Fundamentais',
      html: `<h4>Os três pilares que sustentam Data Science</h4><p>Todo data scientist precisa dominar três áreas: <strong>estatística</strong>, <strong>programação</strong> e <strong>conhecimento de negócio</strong>. Sem qualquer uma delas, você ficará limitado.</p><p>Estatística é a base matemática. Você usará conceitos como distribuições, testes de hipóteses, correlação e regressão para entender padrões nos dados. <strong>Não se preocupe se matemática não é seu forte</strong>—a maioria das bibliotecas Python faz os cálculos pesados por você.</p><blockquote class="tip">Dica: Comece com estatística descritiva (média, mediana, desvio padrão) antes de pular para tópicos avançados.</blockquote><p>Programação, geralmente em Python, é a ferramenta que você usará diariamente. Python é escolhido porque é intuitivo, tem comunidade gigante e bibliotecas poderosas como Pandas, NumPy e Scikit-learn.</p><p>O conhecimento de negócio é o que separa amadores de profissionais. <strong>Você precisa entender o contexto</strong>: qual é o problema real? O que afeta as métricas? Qual é o ROI esperado?</p><blockquote class="example">Exemplo: Um analista entregou um modelo de churn perfeito, mas recomendou ações que economizariam R$50k e custariam R$500k para implementar. O problema: falta de conhecimento de negócio.</blockquote><blockquote class="quote">\"Dados sem contexto são apenas números. Contexto sem dados é apenas opinião.\"</blockquote><p>Ao longo deste curso, você desenvolverá competência em todas essas três áreas, começando pelos fundamentos e evoluindo para aplicações práticas.</p>`},

      html: `<h4>O arsenal do data scientist moderno</h4><p>Você não precisa aprender 50 ferramentas para começar. <strong>Dominar bem 5-6 ferramentas</strong> é melhor do que conhecer superficialmente 20. As ferramentas que você aprenderá aqui são as mais solicitadas no mercado.</p><p>Python é o linguagem padrão da indústria. Você usará Jupyter Notebooks para exploração interativa, Pandas para manipulação de dados, NumPy para computações numéricas e Matplotlib/Seaborn para visualizações.</p><p>SQL é inegociável. <strong>A maioria dos dados vive em bancos de dados</strong>, e você precisará saber extrair dados de forma eficiente. Mesmo com Python, você usará SQL diariamente.</p><blockquote class="tip">Dica: SQL é mais importante do que muitos iniciantes pensam. Invista tempo aqui—você usará por toda sua carreira.</blockquote><p>Power BI e Tableau são ferramentas de visualização que você encontrará em empresas. Elas permitem criar dashboards interativos que não-técnicos entendem facilmente.</p><p>Git é essencial para versionamento de código. Você aprenderá a colaborar com outros cientistas de dados sem sobrescrever o trabalho um do outro.</p><blockquote class="example">Exemplo: Um projeto típico usa: Python (análise), SQL (extração), Git (controle), Jupyter (apresentação) e Power BI (dashboard para executivos).</blockquote><blockquote class="quote">\"As ferramentas certas amplificam sua produtividade por 10x.\"</blockquote><p>Você aprenderá a selecionar a ferramenta certa para cada problema, em vez de tentar forçar uma ferramenta que você conhece para todos os problemas.</p>`},
    {

      html: `<h4>Do problema ao insight: o ciclo completo</h4><p>Todo projeto de data science segue um padrão semelhante. <strong>Compreender esse processo é crucial</strong> para você não ficar perdido quando começar projetos reais.</p><p>A primeira etapa é <strong>Definição do Problema</strong>. Isso significa conversar com stakeholders, entender qual é a dor real e como os dados podem ajudar. Muitos iniciantes pulam isso e acabam resolvendo o problema errado.</p><p>Em seguida vem <strong>Coleta e Preparação de Dados</strong>. Você extrairá dados de múltiplas fontes, limpará inconsistências, tratará valores ausentes e estruturará tudo de forma que possa ser analisado. <strong>Esta etapa consome ~70% do seu tempo</strong> em projetos reais.</p><blockquote class="tip">Dica: Prepare-se para gastar mais tempo limpando dados do que construindo modelos. É a realidade do trabalho.</blockquote><p>A etapa de <strong>Exploração e Análise</strong> é onde você cria visualizações, calcula estatísticas e começa a ver padrões. Você forma hipóteses aqui: \"Usuários de X tendem a Y\", \"Sazonalidade afeta Z\".</p><p><strong>Modelagem</strong> é onde você constrói modelos preditivos ou de clustering. Mas lembre-se: um modelo simples que você entende é melhor do que um modelo complexo que é uma caixa preta.</p><blockquote class="example">Exemplo do processo real: Um banco quer reduzir default de empréstimos. Você define: meta é identificar 80% dos que vão virar bad credit. Depois coleta dados de 5 anos, limpa inconsistências, explora padrões (idade, renda, histórico afetam?), treina regressão logística, valida com dados novos, entrega modelo que melhora em 15% a detecção.</blockquote><p>A etapa final é <strong>Comunicação e Ação</strong>. Você cria visualizações, escreve relatórios e apresenta para executivos. <strong>Se ninguém agir com seus insights, você falhou</strong>.</p><blockquote class="quote">\"O melhor modelo do mundo, escondido em um relatório que ninguém lê, não vale nada.\"</blockquote><p>Você seguirá esse ciclo repetidamente, iterando e melhorando a cada volta.</p>`}

    {
      id: 'DESC',
      title: 'Estatística Descritiva',
      html: `<h4>Compreendendo dados com números simples</h4><p>Estatística descritiva é o ponto de partida. <strong>Você aprenderá a resumir grandes conjuntos de dados em números que fazem sentido</strong>. É a base para tudo que vem depois.</p><p>As medidas de tendência central são suas amigas: <strong>Média</strong> (soma dividida pela quantidade), <strong>Mediana</strong> (valor do meio quando ordenado) e <strong>Moda</strong> (valor que mais aparece). Cada uma conta uma história diferente.</p><blockquote class="tip">Dica: A média pode enganar. Se você tem 10 salários de R$2000 e 1 de R$100.000, a média é R$11.800, mas 90% ganham R$2000. Use também mediana!</blockquote><p>Medidas de dispersão mostram como os dados variam. <strong>Desvio padrão</strong> mede quão espalhados os dados estão em relação à média. Amplitude é a diferença entre máximo e mínimo. Variância é o quadrado do desvio padrão.</p><p>Percentis e quartis dividem seus dados em pedaços. <strong>50º percentil = mediana</strong>. 25º percentil = Q1, 75º = Q3. Essas divisões ajudam você a entender distribuições.</p><blockquote class="example">Exemplo: Você analisa notas de uma prova. Média: 6.5, Mediana: 7, Moda: 8. Desvio padrão: 1.2. Isso significa: a turma é razoável (média 6.5), mas a maioria tirou bem (mediana 7), com nota mais frequente de 8, e muita gente desviou bastante da média.</blockquote><p>Correlação mede a relação entre duas variáveis. <strong>Correlação positiva</strong> significa que quando uma sobe, a outra também sobe. <strong>Negativa</strong> é o oposto. <strong>Zero</strong> significa sem relação linear.</p><blockquote class="quote">\"Correlação não implica causalidade, mas ajuda você a gerar hipóteses.\"</blockquote><p>Você aprenderá a criar box plots, histogramas e scatter plots que revelam distribuições e relações rapidamente.</p>`},
    {
      id: 'PROB',
      title: 'Probabilidade e Distribuições',
      html: `<h4>O mundo dos possíveis resultados</h4><p>Probabilidade é <strong>a frequência esperada de um evento</strong> ocorrer. Você usará isso constantemente para estimar riscos, chances de sucesso e incerteza nos dados.</p><p>A <strong>Distribuição Normal</strong> (ou Gaussiana) é a mais importante. <strong>Muitos fenômenos naturais seguem essa distribuição</strong>: alturas, pesos, notas de testes, erros de medição. Se você entende distribuição normal, entende muita coisa.</p><p>Na distribuição normal, 68% dos dados caem em 1 desvio padrão da média, 95% em 2 desvios, 99.7% em 3. <strong>Essa regra 68-95-99.7 é crucial</strong> para detectar outliers e anormalidades.</p><blockquote class="tip">Dica: Se você vê um valor a 4 desvios padrão da média, desconfie—pode ser erro de medição ou algo muito especial acontecendo.</blockquote><p><strong>Distribuição Binomial</strong> é quando você tem dois resultados possíveis (sucesso/fracasso). Lançar moeda, aprprovar/rejeitar, sim/não.</p><p><strong>Distribuição de Poisson</strong> modela eventos que ocorrem em um intervalo de tempo: quantos clientes chegam por hora? Quantos erros por página?</p><blockquote class="example">Exemplo: Uma loja recebe em média 50 clientes/dia. Você quer saber: qual a probabilidade de receber mais de 70 em um dia? Você usa distribuição de Poisson. Resultado: ~5%. Isso significa: acontece, mas é raro.</blockquote><p><strong>Teorema do Limite Central</strong> é mágico: se você pega múltiplas amostras de qualquer distribuição e calcula a média, essas médias sempre seguem uma distribuição normal. Isso permite você fazer previsões mesmo quando não sabe a distribuição original.</p><blockquote class="quote">\"Entender distribuições é ver padrões que outros não veem.\"</blockquote><p>Você aprenderá a testar se seus dados seguem uma distribuição específica e como usar isso para suas análises.</p>`},
    {
      id: 'HIPO',
      title: 'Testes de Hipóteses',
      html: `<h4>Provando se suas suspeitas estão certas</h4><p>Teste de hipótese é <strong>um procedimento formal para responder perguntas</strong>: \"Essa diferença é real ou apenas acaso?\" \"Essa estratégia funciona melhor?\"</p><p>Você sempre começa com uma <strong>Hipótese Nula (H0)</strong>: \"Não há diferença\", \"Não há efeito\". Você tenta rejeitá-la com dados. Se conseguir, você aceita a <strong>Hipótese Alternativa</strong>: \"Há diferença\", \"Há efeito\".</p><p><strong>Valor p (p-value)</strong> é a probabilidade de obter resultados tão extremos quanto os seus, se a hipótese nula fosse verdadeira. <strong>p-value < 0.05 significa resultado significativo</strong> (rejeitamos H0). Mas cuidado: p-value não é a probabilidade de H0 ser verdadeira!</p><blockquote class="tip">Dica: Um p-value de 0.04 NÃO significa 96% de chance de estar certo. Significa: há 4% de chance de ver esse resultado se H0 fosse verdadeira.</blockquote><p><strong>Teste t</strong> compara médias de dois grupos. <strong>ANOVA</strong> compara médias de 3+ grupos. <strong>Teste qui-quadrado</strong> trabalha com variáveis categóricas.</p><p><strong>Intervalo de Confiança</strong> é o range onde o verdadeiro valor provavelmente está. IC 95% significa: se você repetisse o experimento 100 vezes, 95 vezes o verdadeiro valor estaria nesse intervalo.</p><blockquote class="example">Exemplo: Um grupo de controle teve conversão de 10%, grupo teste de 12%. Você faz teste t: p-value = 0.08. Conclusão: a diferença é estatisticamente não-significativa (> 0.05). Porém, 12% > 10%, então há uma tendência. Você precisa de mais dados ou a diferença é bem pequena.</blockquote><blockquote class="quote">\"Todo cientista de dados deve entender que estatisticamente significante não é igual a praticamente importante.\"</blockquote><p>Você aprenderá quando usar cada teste e como interpretar resultados sem cair em armadilhas estatísticas.</p>`},
    {
      id: 'REGR',
      title: 'Regressão e Correlação Avançada',
      html: `<h4>Prevendo e entendendo relações</h4><p><strong>Regressão Linear</strong> é a ferramenta mais fundamental em Data Science. Você procura uma linha reta (ou plano em múltiplas dimensões) que melhor representa a relação entre variáveis.</p><p>A fórmula é simples: y = a + b*x + erro. y é o que você quer prever, x é a variável que influencia, a é o intercepto, b é o coeficiente (inclinação), erro é a variação que o modelo não captura.</p><p><strong>R-squared (R²)</strong> mede quanto do seu target é explicado pelo modelo. R²=1 significa perfeito. R²=0 significa inútil. <strong>R² = 0.75 significa 75% da variação é explicada</strong>—excelente em muitos casos.</p><blockquote class="tip">Dica: Um R² alto não significa causação. Pode haver confundidores ou relações espúrias.</blockquote><p><strong>Regressão Múltipla</strong> usa várias variáveis para prever: y = a + b1*x1 + b2*x2 + b3*x3 + erro. Você aprenderá a interpretar cada coeficiente: \"Controlando X2 e X3, quando X1 aumenta 1 unidade, y aumenta b1 unidades\".</p><p><strong>Regressão Logística</strong> é para classificação (sim/não, compra/não compra). Apesar do nome, é classificação, não regressão! Você obtém probabilidades: qual a chance de conversão?</p><blockquote class="example">Exemplo: Você quer prever sobrevivência no Titanic. Regressão logística usa idade, sexo, classe. Você obtém: Mulher de 1ª classe = 90% chance. Homem de 3ª classe = 20% chance. Cada coeficiente mostra quanto cada fator importa.</blockquote><p><strong>Multicolinearidade</strong> é quando suas variáveis preditoras são altamente correlacionadas umas com as outras. Isso enfraquece seu modelo. Você aprenderá a detectar e resolver.</p><blockquote class="quote">\"Regressão é arte e ciência. Arte em escolher variáveis, ciência em calcular coeficientes.\"</blockquote><p>Você desenvolverá intuição sobre quando regressão funciona e quando você precisa de técnicas mais avançadas.</p>`}

    {
      id: 'PAND',
      title: 'Pandas e Manipulação de Dados',
      html: `<h4>A ferramenta do dia a dia do data scientist</h4><p>Pandas é a biblioteca Python mais usada para manipulação de dados. <strong>Se você aprende Pandas bem, você aprende 30% do trabalho de um data scientist</strong>.</p><p><strong>DataFrame</strong> é o objeto central. Pense nele como uma tabela Excel turbinada. Linhas, colunas, tipos de dados. Você acessa colunas, filtra linhas, agrega dados.</p><p>Operações comuns: <strong>df.head()</strong> mostra as primeiras linhas. <strong>df.info()</strong> mostra tipos e valores ausentes. <strong>df.describe()</strong> mostra estatísticas descritivas. <strong>df.shape</strong> mostra dimensões.</p><blockquote class="tip">Dica: Sempre comece conhecendo seus dados. Rode head(), info(), describe() antes de qualquer coisa.</blockquote><p><strong>Filtros</strong> permitem selecionar subconjuntos. df[df[\"coluna\"] > 100] seleciona linhas onde coluna > 100. <strong>Groupby</strong> agrupa por categoria: df.groupby(\"categoria\").sum() soma por categoria.</p><p><strong>Tratamento de valores ausentes</strong> é crítico. df.isnull().sum() mostra quantos ausentes. df.fillna() preenche com valor. df.dropna() remove linhas com ausentes. <strong>Escolha a estratégia correta</strong>—remover quando poucos, preencher quando muitos.</p><blockquote class="example">Exemplo: Você tem 10.000 linhas, coluna X tem 5 ausentes, coluna Y tem 3.000 ausentes. Para X, você remove as 5 linhas. Para Y, você preenche com média ou mediana, porque perder 3.000 linhas é muito.</blockquote><p><strong>Merges e joins</strong> combinam DataFrames. df.merge(df2, on=\"chave\") une dois DataFrames pela chave. <strong>left, right, inner, outer</strong> determinam o tipo de join.</p><p><strong>Pivot Tables</strong> reorganizam dados. Você muda linhas e colunas, agrega valores. É Excel Pivot, mas em código.</p><blockquote class="quote">\"Pandas é tão poderoso que você pode fazer 90% de análises exploratórias sem sair dele.\"</blockquote><p>Você aprenderá padrões típicos: filtrar, agrupar, agregar, mesclar—repetidamente. Esses padrões cobrem 80% do seu trabalho.</p>`},
    {
      id: 'NUMP',
      title: 'NumPy e Computação Numérica',
      html: `<h4>Velocidade e poder computacional</h4><p>NumPy é a biblioteca de computação numérica. <strong>Quando você precisa fazer cálculos rápidos em grande escala, NumPy é a resposta</strong>.</p><p><strong>Arrays</strong> são como listas Python, mas muito mais rápidas. Um array NumPy de 1 milhão de elementos é 100x mais rápido que uma lista Python equivalente.</p><p>Operações são <strong>vetorizadas</strong>. Em vez de loops, você escreve operações que se aplicam a todo o array: arr + 10 adiciona 10 a cada elemento. arr * 2 multiplica cada um por 2.</p><blockquote class="tip">Dica: Sempre prefira operações vetorizadas. Loops em Python são lentos; NumPy arrays são rápidos.</blockquote><p><strong>Álgebra linear</strong> é feita com NumPy: produto de matrizes, determinantes, autovalores. Isso é essencial para machine learning.</p><p><strong>Funções estatísticas</strong> estão prontas: np.mean(), np.std(), np.percentile(), np.correlate(). <strong>np.random</strong> gera números aleatórios—essencial para simulations e bootstrapping.</p><blockquote class="example">Exemplo: Você quer saber a distribuição de médias amostrais. Você faz bootstrapping: reamostra seus dados 10.000 vezes, calcula média cada vez, usa NumPy para tudo. Em segundos, você tem uma distribuição. Em Python puro, demoraria minutos.</blockquote><p><strong>Broadcasting</strong> é um conceito poderoso. Quando você opera arrays de formas diferentes, NumPy \"expande\" automaticamente para fazer sentido. Isso elimina muitos loops.</p><p><strong>Indexing avançado</strong> permite seleções complexas: arr[arr > 5] retorna apenas valores > 5. arr[[0, 2, 4]] pega elementos nos índices 0, 2, 4.</p><blockquote class="quote">\"NumPy é o motor que move a maioria do código científico em Python.\"</blockquote><p>Você aprenderá a pensar em \"arrays e operações\" em vez de \"loops e variáveis\". Essa mentalidade torna você muito mais rápido.</p>`},
    {
      id: 'SCIK',
      title: 'Scikit-learn e Machine Learning',
      html: `<h4>Construindo modelos em poucas linhas</h4><p>Scikit-learn é a biblioteca de machine learning padrão. <strong>Ela torna construir modelos tão simples quanto 5 linhas de código</strong>.</p><p>A estrutura é sempre a mesma: crie um modelo, treine com dados, faça predições. <strong>modelo.fit(X, y)</strong> treina. <strong>modelo.predict(X)</strong> prediz. Simples assim.</p><p><strong>Train-test split</strong> é essencial. Você divide dados em treino (geralmente 80%) e teste (20%). Treina no treino, valida no teste. <strong>Nunca avalie no mesmo dados que treinou</strong>—você terá overfitting e ilusão de sucesso.</p><blockquote class="tip">Dica: Sempre reserve dados para teste antes de qualquer análise, para não contaminar sua avaliação.</blockquote><p><strong>Regressão Linear</strong> em Scikit é: from sklearn.linear_model import LinearRegression; modelo = LinearRegression(); modelo.fit(X, y). Pronto. Você tem coeficientes em modelo.coef_.</p><p><strong>Classificação Logística</strong> é similar: LogisticRegression(). Você obtém probabilidades com modelo.predict_proba(). <strong>ROC-AUC e Precision-Recall</strong> são métricas essenciais para classificação.</p><p><strong>Decision Trees</strong> e <strong>Random Forests</strong> são poderosos e funcionam bem com dados complexos. Eles não assumem linearidade e capturam interações automaticamente.</p><blockquote class="example">Exemplo: Você constrói um Random Forest em 3 linhas e obtém 87% de acurácia. Depois tenta regressão linear e obtém 72%. A escolha de modelo importa muito! Você aprenderá quando usar cada um.</blockquote><p><strong>Cross-validation</strong> valida seu modelo de forma robusta. Em vez de um único train-test split, você faz K-fold (5 ou 10 folds): treina/valida K vezes, média o resultado. Muito mais confiável.</p><p><strong>Feature scaling</strong> normaliza seus dados. Alguns modelos exigem dados em escala similar (média 0, desvio padrão 1). StandardScaler faz isso automaticamente.</p><blockquote class="quote">\"Scikit-learn democratizou machine learning. Agora qualquer pessoa pode construir bons modelos.\"</blockquote><p>Você aprenderá pipeline: normaliza dados → treina → prediz em uma linha. Profissional e robusto.</p>`},
    {
      id: 'VIS',
      title: 'Visualização com Matplotlib e Seaborn',
      html: `<h4>Contar histórias com gráficos</h4><p><strong>Visualização é tão importante quanto análise</strong>. Um gráfico bom comunica insight em segundos. Um gráfico ruim confunde tudo.</p><p>Matplotlib é a biblioteca base. <strong>plt.plot()</strong> faz linhas. <strong>plt.scatter()</strong> faz pontos. <strong>plt.hist()</strong> faz histogramas. <strong>plt.bar()</strong> faz barras. <strong>plt.title(), plt.xlabel(), plt.ylabel()</strong> adicionam labels.</p><p>Seaborn constrói sobre Matplotlib e facilita gráficos bonitos. <strong>sns.heatmap()</strong> mostra correlações em cores. <strong>sns.boxplot()</strong> mostra distribuição por grupo. <strong>sns.pairplot()</strong> mostra relacionamentos entre múltiplas variáveis.</p><blockquote class="tip">Dica: Seaborn é mais bonito por padrão, mas Matplotlib é mais flexível. Use Seaborn para exploração rápida, Matplotlib quando precisa controlar tudo.</blockquote><p><strong>Cores, estilos, tamanhos</strong> importam. Você aprenderá a escolher paletas que fazem sentido: gradientes para contínuas, cores distintas para categorias.</p><p><strong>Subplots</strong> permitem múltiplos gráficos. plt.subplot(2, 2, 1) cria grid 2x2. Essencial para comparar distribuições ou variáveis.</p><blockquote class="example">Exemplo: Você quer mostrar relação entre idade e renda por gênero. Você faz scatter plot com cores por gênero, adiciona linha de regressão, labels legíveis, legenda. Pronto: em 1 gráfico, você conta a história inteira.</blockquote><p><strong>Gráficos interativos</strong> com Plotly permitem zoom, hover, filtros. Para apresentações e dashboards, Plotly é superior.</p><p><strong>Regras de design**: título claro, eixos com labels, legenda se múltiplas séries, paleta apropriada (evite rainbow), escala adequada (não distorça).</p><blockquote class="quote">\"Um bom gráfico faz a verdade óbvia. Um gráfico ruim a esconde mesmo estando ali.\"</blockquote><p>Você aprenderá a escolher o gráfico certo para a história que quer contar: linha para série temporal, barras para comparação, scatter para relação, distribuição para um padrão.</p>`}
  ],
  flashcards: [
    {q: 'O que é um DataFrame em Pandas?', a: 'Um objeto que representa tabela bidimensional com linhas, colunas e tipos de dados—similar a Excel.'},
    {q: 'Como filtrar um DataFrame para valores > 100?', a: 'df[df["coluna"] > 100]'},

    {q: 'Qual é a diferença entre dropna() e fillna()?', a: 'dropna() remove linhas com valores ausentes. fillna() preenche com um valor.'},
    {q: 'Por que NumPy arrays são mais rápidos que listas Python?', a: 'Arrays NumPy são vetorizados e implementados em C, muito mais rápido que loops Python.'},

{
  id: 3,
  title: 'SQL e Bancos de Dados',
  free: false,
  topics: [
    {
      id: 'SQLT',
      title: 'SQL Fundamentals',
      html: `<h4>Conversando com bancos de dados</h4><p>SQL é a linguagem para extrair dados de bancos. <strong>Você não pode ser um data scientist sério sem SQL</strong>. Muitos descuidam disso e pagam caro depois.</p><p><strong>SELECT</strong> recupera dados. <strong>WHERE</strong> filtra. <strong>ORDER BY</strong> ordena. <strong>LIMIT</strong> limita resultados. Exemplo: SELECT * FROM usuarios WHERE idade > 18 ORDER BY nome LIMIT 100.</p><p><strong>JOINs</strong> combinam tabelas. <strong>INNER JOIN</strong> retorna linhas que existem em ambas. <strong>LEFT JOIN</strong> retorna todas da esquerda + matches da direita. <strong>RIGHT JOIN</strong> é oposto. <strong>FULL JOIN</strong> retorna todos.</p><blockquote class="tip">Dica: Visualize JOINs como Venn diagrams. INNER é interseção. LEFT é círculo esquerdo inteiro. FULL é ambos.</blockquote><p><strong>GROUP BY</strong> agrupa dados. <strong>Funções de agregação</strong>: COUNT(), SUM(), AVG(), MIN(), MAX(). Exemplo: SELECT categoria, COUNT(*), AVG(preco) FROM produtos GROUP BY categoria.</p><p><strong>HAVING</strong> filtra grupos. WHERE filtra linhas; HAVING filtra grupos depois de agregação. Exemplo: SELECT categoria, COUNT(*) as cnt FROM produtos GROUP BY categoria HAVING cnt > 10.</p><blockquote class="example">Exemplo real: Você quer ver categorias com mais de 10 produtos e preço médio acima de 100. SELECT categoria, COUNT(*) as cnt, AVG(preco) as preco_medio FROM produtos GROUP BY categoria HAVING cnt > 10 AND AVG(preco) > 100.</blockquote><p><strong>Subqueries</strong> permitem queries dentro de queries. SELECT * FROM tabela WHERE id IN (SELECT id FROM outra WHERE condicao). Poderoso, mas cuidado: pode ficar lento.</p><p><strong>CTEs (Common Table Expressions)</strong> são subqueries com nome. WITH dados AS (SELECT...) SELECT * FROM dados. Muito mais legível.</p><blockquote class="quote">\"SQL bem escrito é código legível que roda rápido. SQL mal escrito deixa todos esperando.\"</blockquote><p>Você aprenderá performance: quando usar JOINs vs subqueries, como indexar, quando é melhor usar Python.</p>`},
    {
      id: 'ADVC',
      title: 'SQL Avançado e Otimização',
      html: `<h4>Escrevendo queries que voam</h4><p><strong>Window functions</strong> são mágicas. Você calcula agregações sem descartar linhas. LAG(), LEAD(), ROW_NUMBER(), RANK(), DENSE_RANK(), SUM() OVER().</p><p>Exemplo: SELECT *, SUM(vendas) OVER (PARTITION BY mes ORDER BY dia) as vendas_acumulada FROM vendas. Você obtém total acumulado por mês sem agrupar.</p><p><strong>PARTITION BY</strong> divide em grupos. <strong>ORDER BY</strong> ordena dentro de grupos. <strong>ROWS BETWEEN</strong> define janelas: últimos 7 dias, próximos 30 dias.</p><blockquote class="tip">Dica: Window functions são poderosas mas complicadas. Pratique bastante. Uma vez que entende, elas resolvem muitos problemas elegantemente.</blockquote><p><strong>Case statements</strong> fazem lógica condicional. SELECT CASE WHEN idade < 18 THEN 'Menor' WHEN idade < 65 THEN 'Adulto' ELSE 'Idoso' END FROM usuarios.</p><p><strong>String functions**: CONCAT(), SUBSTRING(), LENGTH(), UPPER(), LOWER(), TRIM(), REPLACE(). Essencial para limpar dados textuais.</p><p><strong>Date functions**: DATE_ADD(), DATE_SUB(), DATEDIFF(), EXTRACT(MONTH FROM date). Você trabalha com datas constantemente.</p><blockquote class="example">Exemplo: Você quer calcular idade baseada em data de nascimento. SELECT DATEDIFF(CURDATE(), data_nascimento)/365.25 as idade FROM usuarios. Simples e rápido no banco.</blockquote><p><strong>Índices** aceleram queries. CREATE INDEX idx_email ON usuarios(email). Sem índice, cada query varre todos os registros. Com índice, procura é muito rápida.</p><p><strong>EXPLAIN** mostra o plano de execução. EXPLAIN SELECT... mostra como SQL executa: quantas linhas varre, usa índices? Essencial para debug de performance.</p><blockquote class="quote">\"Um query bem escrito que roda em 100ms é melhor que um perfeitamente escrito que roda em 10 segundos.\"</blockquote><p>Você aprenderá quando escrever queries complexas vs quando é melhor extrair dados e processar em Python.</p>`},
    {
      id: 'DSGN',
      title: 'Design de Banco de Dados',
      html: `<h4>Estruturando dados para sucesso</h4><p>Um banco bem desenhado é rápido, seguro e fácil de manter. Um banco mal desenhado gera problemas por anos.</p><p><strong>Normalização</strong> elimina redundância. Primeira Forma Normal (1NF): cada célula tem um valor único, sem arrays. Segunda (2NF): sem dependências parciais. Terceira (3NF): sem dependências transitivas.</p><p>Prática: crie tabelas para \"coisas\". Usuários em uma tabela, Produtos em outra, Vendas em outra. <strong>Foreign keys</strong> conectam: venda.usuario_id referencia usuario.id.</p><blockquote class="tip">Dica: Quando duvidar, normalize. É mais fácil desnormalizar depois se performance exigir do que fixar dados bagunçados.</blockquote><p><strong>Primary keys** identificam registros uniquamente. <strong>Foreign keys** mantêm integridade referencial. DELETE CASCADE garante que deletar um usuário deleta suas vendas. <strong>Constraints</strong> forçam regras: NOT NULL, UNIQUE, CHECK.</p><p><strong>Particionamento** divide tabelas grandes. Você pode particionar por data: vendas_2023, vendas_2024. Queries em um período são muito rápidos.</p><blockquote class="example">Exemplo: Você tem tabela de logs com 1 bilhão de linhas. Sem particionamento, queries lentas. Com particionamento por data, queryar últimos 30 dias varre apenas 1 partição—muito rápido.</blockquote><p><strong>Views** são queries salvas. CREATE VIEW clientes_ativos AS SELECT * FROM usuarios WHERE ultimo_login > DATE_SUB(NOW(), INTERVAL 30 DAY). Depois você simplesmente SELECT FROM clientes_ativos.</p><p><strong>Transactions** garantem consistência. BEGIN; UPDATE... UPDATE... COMMIT; ou ROLLBACK. Se algo der errado, tudo volta. Essencial para dados críticos.</p><blockquote class="quote">\"Bom design de banco é bom design de negócio. Os dados devem refletir a realidade, não fantasias.\"</blockquote><p>Você aprenderá a pensar em tabelas e relações, não em \"um grande arquivo\".</p>`},
    {
      id: 'CONE',
      title: 'Conectando Python e Banco de Dados',
      html: `<h4>De SQL para Análise em segundos</h4><p>Você escreve SQL no banco, importa em Python com Pandas, analisa, visualiza. <strong>Essa é a workflow padrão do data scientist</strong>.</p><p><strong>sqlalchemy</strong> ou bibliotecas específicas (mysqlconnector, psycopg2 para PostgreSQL) conectam Python ao banco. <strong>pd.read_sql(query, conexao)</strong> executa query e retorna DataFrame.</p><p>Exemplo: import pandas as pd; conn = criar_conexao(); df = pd.read_sql(\"SELECT * FROM vendas\", conn). Três linhas, DataFrame pronto.</p><blockquote class="tip">Dica: Para datasets muito grandes, use LIMIT primeiro para exploração. Depois, quando souber o que quer, extrai tudo.</blockquote><p><strong>Parametrização** previne SQL injection. Nunca faça SELECT * FROM usuario WHERE id = \" + str(id). Faça SELECT * FROM usuario WHERE id = %s com (id,) como parâmetro. Seguro e correto.</p><p>Você pode escrever query complexa no banco (com JOINs, aggregações, window functions) e importar resultado pronto para análise. <strong>Deixe o banco fazer o que faz bem</strong>: filtrar, agregar. <strong>Python faz análise avançada e visualização</strong>.</p><blockquote class="example">Exemplo: Query no banco agrupa vendas por dia e categoria, calcula 4 métricas. Resultado: 365 linhas, 6 colunas. Em Python, você faz análise de série temporal, previsão, visualizações. Perfeito.</blockquote><p><strong>Connection pooling** reutiliza conexões. Ao invés de abrir conexão para cada query (lento), você mantém pool. <strong>Muito importante em produção</strong>.</p><p><strong>Error handling** é crucial. Trate erros de conexão, timeouts, constraints violadas. Seu script não pode explodir quando banco está indisponível.</p><blockquote class="quote">\"Uma linha de SQL bem escolhida substitui 100 linhas de Python.\"</blockquote><p>Você aprenderá a equilibrar: quanto fazer no banco, quanto em Python. Regra: faça no banco se for filtrar 99% dos dados.</p>`}
  ],
  flashcards: [
    {q: 'Qual é a diferença entre WHERE e HAVING?', a: 'WHERE filtra linhas antes de agregação. HAVING filtra grupos depois de agregação.'},
    {q: 'Como combinar duas tabelas mantendo todos da primeira?', a: 'Use LEFT JOIN: SELECT * FROM tabela1 LEFT JOIN tabela2 ON tabela1.id = tabela2.id'},

    {q: 'O que LEFT JOIN mantém?', opts: ['Apenas interseção', 'Todas as linhas da tabela direita', 'Todas as linhas da tabela esquerda + matches da direita', 'Nenhuma'], correct: 2}

    {
      id: 'DSGV',
      title: 'Design de Visualizações',
      html: `<h4>Fazendo dados falar claramente</h4><p><strong>Uma visualização boa toma segundos para entender. Uma ruim deixa todos confusos</strong>. Design importa tanto quanto os dados.</p><p>Primeiro: <strong>Escolha o gráfico certo</strong>. Série temporal? Linhas. Comparação entre categorias? Barras. Distribuição? Histograma. Relação entre dois contínuos? Scatter. Correlações? Heatmap.</p><p><strong>Cores importam</strong>. Para dados contínuos, use gradientes (azul escuro a amarelo claro). Para categorias, use cores distintas (mas máximo 5-7, senão fica confuso). <strong>Evite rainbow—humanos confundem as cores no meio</strong>.</p><blockquote class="tip">Dica: Sempre pense em pessoas daltônicas. ~8% dos homens têm daltonismo vermelho-verde. Use paletas amigas de daltônicos.</blockquote><p><strong>Menos é mais</strong>. Remova grid lines desnecessários. Remova cores background. Remova tudo que não adiciona informação. Viz limpa é profissional.</p><p><strong>Escala correta</strong> é crítica. Se você quer mostrar mudança pequena, use eixo Y que começa em 0. Se quer mostrar variação em série grande (ex: 1.000.000 a 1.000.100), zoom é OK.</p><blockquote class="example">Exemplo de manipulação: Uma empresa mostra gráfico de receita de 2022-2024 com eixo Y começando em R$9.9 milhões, fazendo parecer que cresceu 100%. Verdade: cresceu 1%. Sempre comece em 0 para percentuais, ou deixe claro que é zoom.</blockquote><p><strong>Annotations** adicionam contexto. \"Aqui começou campanha\", \"Aqui houve recall\". Uma annotation salva o viewer de adivinhar.</p><p><strong>Legendas e labels** devem ser claros. \"Vendas por Trimestre\" é melhor que \"Q1, Q2, Q3, Q4\". \"Milhões de reais\" é melhor que \"M\" (que pode significar Março também).</p><blockquote class="quote">\"Dados bonitos ganham atenção. Dados corretos ganham decisões. Dados bonitos E corretos ganham promoção.\"</blockquote><p>Você aprenderá que design de viz é comunicação, não decoração.</p>`},
    {
      id: 'DASH',
      title: 'Dashboards Interativos',
      html: `<h4>Histórias vivas que convidam exploração</h4><p>Dashboard é coleção de visualizações que contam uma história. <strong>Bom dashboard permite exploração sem confundir</strong>.</p><p><strong>Estrutura hierárquica**: Comece com KPI (Key Performance Indicator) no topo. Depois, contexto: como chegou aí? Depois, drill-down: por quê? Segmentação revela responsáveis.</p><p>Exemplo de estrutura: Topo: \"Receita: R$1.2M (+15% vs mês passado)\". Contexto: Receita por categoria (barras). Drill-down: Receita por produto dentro de categoria (selecionável). Segmentação: Por região (filtro).</p><blockquote class="tip">Dica: Limite a 5-7 visualizações. Dashboard com 20 viz é junk—ninguém entende. Escolha os mais importantes e deixe o resto para relatório detalhado.</blockquote><p><strong>Filtros** permitem exploração. Filtro de data, região, categoria. Cada filtro atualiza todo o dashboard. Muito poderoso quando bem feito.</p><p><strong>Drill-through** leva a detalhes. Clica em uma barra, vai para tabela detalhada. Útil para investigações.</p><p>Ferramentas: <strong>Power BI, Tableau, Looker</strong> são as principais. <strong>Python com Streamlit ou Dash</strong> para dashboards customizados.</p><blockquote class="example">Exemplo: Dashboard de E-commerce. Topo: Receita total, Ticket médio, Taxa conversão. Gráficos: Receita por dia (série), por categoria (barras), por canal (pizza). Filtro: data, categoria. Um clique e você vê que a conversão caiu porque E-mail está baixo. Decisão: aumentar budget em E-mail.</blockquote><p><strong>Performance** importa. Dashboard que demora 10 segundos para carregar é abandonado. Cache dados, use índices, limite período padrão.</p><p><strong>Governança**: Quem pode ver quê? Filtros de segurança garantem que vendedores só veem sua região. Essencial em grandes organizações.</p><blockquote class="quote">\"Um dashboard que ninguém olha foi trabalho jogado fora.\"</blockquote><p>Você aprenderá a pensar do ponto de vista do usuário: o que ele precisa saber para tomar decisões?</p>`},
    {
      id: 'AVNC',
      title: 'Visualizações Avançadas',
      html: `<h4>Contando histórias complexas</h4><p><strong>Sankey diagrams** mostram fluxo. Usuários entram em funnel, alguns saem em cada etapa. Sankey mostra volumes em cada passo e quedas. Perfeito para análise de conversão.</p><p><strong>Network graphs** mostram conexões. Clientes conectados por compras conjuntas. Produtos que vendem juntos. Usuários que conversam. Rede revela comunidades e influenciadores.</p><blockquote class="tip">Dica: Sankey e network graphs são poderosos mas complicados. Use com moderação—seu público precisa de 30 segundos para entender.</blockquote><p><strong>Maps** adicionam dimensão geográfica. Vendas por estado em mapa do Brasil. Lojas com maior potencial. Cobertura de rede. Maps conectam números a lugares reais, que as pessoas entendem.</p><p><strong>Heatmaps** mostram intensidade. Matriz horário-dia-semana com cor representando visitantes. Você vê picos facilmente. Bom para identificar padrões.</p><p><strong>Tree maps** mostram hierarquias com proporção. Categorias como retângulos, tamanho = vendas, cor = margem. Você vê tudo em uma tela. Excelente para exploração de portfólio.</p><blockquote class="example">Exemplo: Você tem 500 SKUs em 20 categorias. Tabela = inútil, muitos dados. Gráfico simples = perde contexto. Tree map: cada retângulo é SKU, tamanho = receita, cor = margem. Em 3 segundos você vê que 10 SKUs geram 80% receita, e 5 têm margem negativa (red flag!).</blockquote><p><strong>Temporal visualizations**: Gantt charts mostram linhas do tempo. Stream graphs mostram como categorias crescem/caem ao longo do tempo. Bons para histórias com mudança.</p><p><strong>Combinações**: Mostre série temporal com barras + linha de tendência + anotações de eventos. Contexto rico, insights claros.</p><blockquote class="quote">\"Visualizações avançadas impressionam em apresentações, mas visuais simples ganham discussões.\"</blockquote><p>Você aprenderá quando usar viz complexa (rare) vs simples (always).</p>`},
    {
      id: 'APRE',
      title: 'Apresentando Insights',
      html: `<h4>Da análise à decisão</h4><p><strong>Um insight não importa se ninguém entende ou acredita</strong>. Apresentação é metade do trabalho.</p><p><strong>Narrativa**: Comece com problema. \"Receita em queda, preciso entender por quê.\" Mostrar dados exploratória: \"Verifiquei 5 hipóteses...\" Revelação: \"A culpa é churn de clientes premium.\" Ação: \"Recomendo aumentar suporte para premium\".</p><p><strong>Visuals veem antes de texto**. Quando você abre slide, olho vai para viz. Se viz é linda e clara, você ganha atenção. Se é poluída, você perdeu.</p><blockquote class="tip">Dica: Nunca coloque tabela com 100 linhas em slide. Se precisa, mostre top 10 e deixe \"tabela completa em apêndice\".</blockquote><p><strong>One insight per slide**. Não misture 3 análises diferentes. Uma história por vez. Slide claro = entendimento fácil = ação rápida.</p><p><strong>Números grandes precisam contexto**. \"Perda de R$500k\" assusta. \"Perda de R$500k, que é 2% da receita\" é contexto. \"Perda é 2% da receita, mas afeta 20% dos clientes\" é mais contexto ainda.</p><blockquote class="example">Exemplo de boa apresentação: Slide 1: \"Churn premium cresceu\", gráfico mostrando aumento. Slide 2: \"Por que?\", pie chart mostrando razões (50% preço, 30% suporte ruim, 20% competidor). Slide 3: \"Impacto\", R$500k/ano. Slide 4: \"Ação\", 3 recomendações com ROI estimado. Executivo tem resposta clara.</blockquote><p><strong>Cuidado com viés de confirmação**. Se você quer provar X, você encontra dados que apoiam. Mostre evidências contra também. Credibilidade vem de honestidade.</p><p><strong>Prepare-se para perguntas**. Você apresenta \"churn por preço\", alguém pergunta \"qual é a elasticidade?\". Se não sabe responder, é embaraço. Leve dados extras de suporte.</p><blockquote class="quote">\"Dados nunca falam por si. Você fala para dados. Fale bem.\"</blockquote><p>Você aprenderá que apresentação é tão técnica quanto análise—exige prática.</p>`}
  ],
  flashcards: [
    {q: 'Qual tipo de gráfico é melhor para série temporal?', a: 'Gráfico de linhas mostra tendências ao longo do tempo claramente.'},
    {q: 'Por que não usar rainbow color em dados contínuos?', a: 'Humanos não conseguem ordenar cores do rainbow mentalmente—gradientes são melhor.'},
    {q: 'O que Sankey diagram mostra?', a: 'Fluxo de valores em um funil ou processo, mostrando volume em cada etapa.'},
    {q: 'Qual é a estrutura recomendada para dashboard?', a: 'KPI no topo, depois contexto com gráficos, depois drill-down para detalhes.'},
    {q: 'Qual é a regra de ouro para dashboards?', a: 'Máximo 5-7 visualizações—dashboard com muitas viz é confuso.'},
    {q: 'O que Tree map mostra bem?', a: 'Hierarquias com proporção—tamanho de retângulo = valor, cor = outra métrica.'},
    {q: 'Como apresentar um insight grande que assusta?', a: 'Sempre dê contexto: \"R$500k é quanto % da receita? Afeta quantos clientes?\"'},
    {q: 'Qual é a ordem correta de uma apresentação?', a: 'Problema → Exploração → Descoberta → Recomendação → Ação.'},
    {q: 'Por que tabelas com 100 linhas são ruins em slides?', a: 'Ninguém consegue ler. Mostre top 10 e coloque tabela completa em apêndice.'},
    {q: 'O que é drill-through em dashboard?', a: 'Clicar em um ponto leva a tabela detalhada—permite investigação profunda.'},
    {q: 'Como ganhar credibilidade apresentando?', a: 'Mostre evidências contra suas hipóteses também—honestidade impressiona.'},
    {q: 'Qual é a primeira coisa que olho procura em slide?', a: 'Visualizações. Se viz é clara, você ganha atenção; se não, perdeu.'}
  ],
  quizzes: [
    {q: 'Você quer mostrar como categoria A caiu de 50% para 30% ao longo de 2 anos. Qual viz?', opts: ['Barras lado a lado', 'Linha mostrando série temporal', 'Pie charts antes/depois', 'Scatter plot'], correct: 1},
    {q: 'Qual é o maior erro em design de dashboard?', opts: ['Cores demais', 'Muitas visualizações', 'Títulos pequenos', 'Tudo acima'], correct: 2},

  ],
  summary: {
    title: 'Resumo: Visualização de Dados',
    points: [

  id: 5,
  title: 'Machine Learning Aplicado',
  free: false,
  topics: [
    {
      id: 'RGRM',
      title: 'Regressão vs Classificação',
      html: `<h4>Escolhendo o problema certo</h4><p><strong>Regressão</strong> prevê um número contínuo. Preço, receita, temperatura. Você obtém valor. <strong>Classificação</strong> prevê uma categoria. Churn sim/não, risco baixo/médio/alto. Você obtém categoria.</p><p>A escolha entre regressão e classificação muda tudo: dados, modelos, métricas, interpretação. <strong>Errar aqui significa meses de trabalho inútil</strong>.</p><p><strong>Regressão</strong> usa: Linear Regression, Random Forest Regression, Gradient Boosting. Métrica típica: MAE (erro médio absoluto), RMSE (raiz quadrada do erro médio ao quadrado), R².</p><blockquote class="tip">Dica: MAE é mais intuitivo (\"em média erro de R$500\"), RMSE penaliza erros grandes mais. Escolha métrica que faz sentido para negócio.</blockquote><p><strong>Classificação</strong> usa: Logistic Regression, Decision Trees, Random Forest, Gradient Boosting. Métrica típica: Accuracy, Precision, Recall, F1-score, ROC-AUC.</p><p><strong>Desbalanceamento</strong> é problema em classificação. Se 95% dos casos são \"sem churn\" e 5% são \"churn\", modelo que sempre prevê \"sem churn\" tem 95% accuracy mas é inútil.</p><blockquote class="example">Exemplo de desbalanceamento: Você treina modelo de fraude. 99.9% das transações são legítimas. Modelo diz \"nunca é fraude\" → 99.9% accuracy! Mas detecta 0 fraudes. Solução: resample, pesos, ou mude métrica para recall/precision.</blockquote><p><strong>Threshold** em classificação. Logistic regression retorna probabilidade. Você escolhe threshold (padrão é 0.5): se P > 0.5, classifica como positivo. Mudar threshold muda precision vs recall.</p><p>Regressão: boas para prever valores contínuos (preço, demanda). Classificação: boas para categorizar (risco, segmentação). <strong>Às vezes a resposta é ambígua</strong>: \"Qual será a receita do mês que vem?\" (regressão) vs \"Receita crescerá?\" (classificação). Regressão é mais informativo.</p><blockquote class="quote">\"Classificação é regressão com output binarizado. Regressão é mais geral, mas às vezes classificação é intuitiva.\"</blockquote><p>Você aprenderá que essa escolha inicial marca o sucesso do projeto.</p>`},
    {
      id: 'EVAL',
      title: 'Avaliação e Validação',
      html: `<h4>Provando que seu modelo funciona</h4><p><strong>Treinar em dados de teste é suicídio</strong>. Você obtém ilusão de performance. Sempre reserve dados para teste antes de começar.</p><p><strong>Train-test split**: 80/20 é padrão. 80% para treino, 20% para teste. Você treina sem ver teste, depois valida em dados novos.</p><p><strong>Cross-validation**: Divide dados em K folds (5 ou 10). Treina K vezes: deixa fold 1 de teste, treina em 2-10; depois deixa fold 2 de teste, treina em 1,3-10; etc. Média do resultado.</p><blockquote class="tip">Dica: Cross-validation é mais robusto que split único, mas mais lento. Use split para exploração rápida, cross-validation para decisão final.</blockquote><p><strong>Métricas para regressão**: MAE (erro médio em unidades), RMSE (penaliza desvios grandes), MAPE (percentual). Escolha baseado no negócio: qual erro é aceitável?</p><p><strong>Métricas para classificação**: Accuracy (% corretas) é enganoso com desbalanceamento. <strong>Precision**: dos que previu positivo, quantos eram? <strong>Recall**: dos que eram positivo, quantos previu? <strong>F1**: balança precision-recall.</p><blockquote class="example">Exemplo: Modelo de churn. Precision 80% = \"se digo que vai churn, 80% realmente vai\". Recall 60% = \"de quem vai churn, acerto 60%\". Se você quer evitar surpresas (precision), use threshold alto. Se quer capturar todo churn (recall), usa threshold baixo.</blockquote><p><strong>ROC-AUC**: Plota true positive rate vs false positive rate em diferentes thresholds. AUC = 1 é perfeito, 0.5 é aleatório, 0 é sempre errado. AUC > 0.8 é bom.</p><p><strong>Overfitting** ocorre quando modelo memoriza treino mas falha em teste. <strong>Underfitting** quando modelo é tão simples que falha em ambos.</p><p><strong>Learning curves**: Plota erro vs quantidade de dados treino/teste. Se teste sempre acima treino, há overfitting. Se ambos altos, há underfitting.</p><blockquote class="quote">\"Um modelo que funciona em 95% de treino mas 70% de teste é memorização, não aprendizado.\"</blockquote><p>Você aprenderá a desconfiar de performances perfeitas—costumam esconder bugs ou data leakage.</p>`},
    {
      id: 'TUNE',
      title: 'Tuning de Hiperparâmetros',
      html: `<h4>Ajustando o modelo para máxima performance</h4><p><strong>Hiperparâmetros** são configurações que você define antes treinar. Max_depth em árvore, learning_rate em gradient boosting, C em SVM. <strong>Parâmetros** são aprendidos durante treino (pesos em redes neurais).</p><p><strong>Grid Search**: Lista valores para cada parâmetro, testa todas as combinações. 10 valores para param1 × 5 para param2 = 50 modelos testados. Busca exaustiva, lenta mas garante encontrar bom.</p><p><strong>Random Search**: Amostra aleatoriamente combinações. Mais rápido, especialmente com muitos parâmetros. Não garante ótimo, mas geralmente bom o suficiente.</p><blockquote class="tip">Dica: Comece com random search para exploração, depois grid search para refinar área promissora.</blockquote><p><strong>Regularização** previne overfitting. L1 e L2 em regressão, max_depth em árvore, dropout em redes. Regularização mais forte = menos overfitting mas menos capacidade.</p><p>Exemplo: Random Forest. Parâmetros: n_estimators (quantas árvores), max_depth (profundidade máxima), min_samples_leaf (mínimo em folha). Muito depth = overfitting. Pouco depth = underfitting.</p><blockquote class="example">Exemplo real: Você testa max_depth de 5 a 30. Performance em teste: depth 5 → 75%, depth 10 → 84%, depth 20 → 86%, depth 30 → 85%. Melhor é 20. Depois refina: 18, 19, 20, 21, 22 → melhor é 20. Ótimo!</blockquote><p><strong>Bayesian Optimization** aprende qual região tem bons parâmetros e foca ali. Mais sofisticado, menos modelos testados, mas geralmente melhor resultado.</p><p><strong>Validação**: Sempre use dados diferentes para tuning e teste final. Se tunar em teste, overfitará a teste. Divida: treino para fit, validação para tuning, teste para avaliação final.</p><blockquote class="quote">\"Tuning mal feito é pior que não tunar—você overfita ao conjunto de validação.\"</blockquote><p>Você aprenderá que tuning tem retorno decrescente. Depois de certo ponto, esforço > ganho.</p>`},
    {
      id: 'PROD',
      title: 'Colocando Modelos em Produção',
      html: `<h4>Do notebook para o mundo real</h4><p><strong>Seu modelo é inútil se fica em notebook</strong>. Precisa servir previsões em tempo real ou em batch.</p><p><strong>Serialização**: Salve modelo treinado. pickle.dump(modelo, arquivo) em Python. Depois pickle.load() para usar. Simples e rápido.</p><p><strong>API REST**: Seu modelo fica em server. Cliente envia dados (JSON), server responde com previsão. Flask ou FastAPI em Python, fáceis de usar.</p><p>Exemplo: Cliente envia {\"idade\": 35, \"renda\": 5000}. Server roda modelo, retorna {\"probabilidade_churn\": 0.23}. Cliente coloca resultado em sistema.</p><blockquote class="tip">Dica: Sempre versioneie modelos. modelo_v1.pkl, modelo_v2.pkl. Assim, se novo modelo piora performance, reverte para velho.</blockquote><p><strong>Monitoramento**: Performance do modelo degrada com tempo (data drift). Monitore: previsões são diferentes? Features têm distribuição diferente? Acurácia caiu?</p><p><strong>Feature engineering**: Preprocessing deve ser igual em treino e produção. Normalização: treino usou mean/std de treino. Produção usa mesma mean/std. <strong>Nunca normalize produção com dados de produção</strong>—viés.</p><blockquote class="example">Exemplo de erro: Você normaliza treino com mean/std de treino (correto). Depois em produção, renormaliza com mean/std de produção. Agora treino e produção falam idiomas diferentes. Modelo falha. Sempre use estadísticas de treino.</blockquote><p><strong>Batch vs Real-time**: Batch (em lotes): toda noite, calcula scores de 1 milhão de clientes. Rápido, barato. Real-time: quando cliente faz ação, score instantaneamente. Mais caro, mas necessário às vezes.</p><p><strong>Retraining**: Modelo envelhece. Periodicamente (semanal, mensal), retreine com dados novos. Automático em produção.</p><blockquote class="quote">\"Um modelo em produção que ninguém monitora é uma bomba relógio prestes a explodir.\"</blockquote><p>Você aprenderá que produção é 90% do trabalho em empresas grandes. Notebook é só 10%.</p>`}
  ],
  flashcards: [
    {q: 'Qual é a diferença entre regressão e classificação?', a: 'Regressão prevê número contínuo (preço), classificação prevê categoria (sim/não).'},
    {q: 'Por que treinar em dados teste é má prática?', a: 'Você obtém ilusão de performance. Modelo memoriza treino e falha em dados novos.'},
    {q: 'Qual é a divisão padrão treino-teste?', a: '80/20: 80% para treino, 20% para validação em dados novos.'},
    {q: 'O que é cross-validation?', a: 'Divide dados em K folds, treina K vezes deixando cada fold de teste, média o resultado.'},
    {q: 'Qual métrica é confiável com dados desbalanceados?', a: 'Accuracy não—use Precision, Recall, F1-score ou ROC-AUC.'},

    {q: 'O que é data drift em produção?', a: 'Distribuição de dados mudou; modelo envelhece. Monitore e retreine periodicamente.'}

    {q: 'Você treinou em 80%, validou em 20%. Agora para teste final, qual dado usar?', opts: ['Os mesmos 80/20', 'Novos dados separados', 'Usar validação como teste', 'Não precisa teste'], correct: 1},

{
  id: 6,
  title: 'Carreira em Data Science',
  free: false,
  topics: [
    {
      id: 'TRAJ',
      title: 'Trajetória Profissional',
      html: `<h4>Do iniciante ao especialista</h4><p><strong>Carreira em Data Science tem múltiplos caminhos</strong>. Você pode ser analyst, scientist, engineer, ou híbrido. Escolha baseada em preferências.</p><p><strong>Analyst**: Foca em exploração e relatórios. SQL, Python/R, visualização. Menos machine learning, mais storytelling. Comum em PMO, BI, finanças.</p><p><strong>Data Scientist**: Modelagem e machine learning. Estatística forte, programação intermediária. Predição, classification, clustering. Comum em startups, tech.</p><p><strong>Data Engineer**: Pipelines, infraestrutura, volume. SQL avançado, Spark, Kafka, cloud. Menos análise, mais engenharia. Comum em grandes empresas.</p><blockquote class="tip">Dica: Comece como analyst para aprender negócio, depois evolua. É mais fácil aprender ML depois de entender dados.</blockquote><p><strong>Progressão típica**: Junior (0-2 anos) → Pleno (2-5) → Senior (5-10) → Lead/Principal (10+). Cada nível: mais autonomia, mais responsabilidade, mais impacto.</p><p>Junior espera orientação, faz tarefas bem definidas, aprende. Pleno é independent, escolhe abordagens, resolve problemas. Senior é referência, orienta juniors, define estratégias.</p><blockquote class="example">Exemplo: Junior recebe \"faça modelo de churn\". Pleno \"analisa churn e recomenda ações\". Senior \"define estratégia de retenção usando dados\".</blockquote><p><strong>Especializações**: After-market de Data Science oferece muitos caminhos: NLP (linguagem natural), computer vision, reinforcement learning, causal inference, MLOps (colocar modelos em produção).</p><p><strong>Networking**: Comunidade de data scientists é ativa. Meetups, conferências, Kaggle, GitHub. Networking abre portas que curriculo não abre.</p><blockquote class="quote">\"Carreira em Data Science é maratona, não sprint. Aprenda continuamente, construa portfolio, seja generoso compartilhando.\"</blockquote><p>Você aprenderá que progresso vem de conhecimento + valor entregue + relacionamentos.</p>`},
    {
      id: 'PORT',
      title: 'Construindo Portfólio',
      html: `<h4>Provando suas habilidades com projetos reais</h4><p><strong>Portfólio é seu currículo técnico</strong>. Recrutadores estudam mais portfólio que CV. Código bom, análise profunda, apresentação clara = contratação.</p><p><strong>Projeto ideal**: Problema real ou interessante, dados públicos, análise completa (coleta → limpeza → análise → modelo → apresentação), código no GitHub, documentação clara.</p><p><strong>Onde encontrar dados**: Kaggle (datasets + competições), Google Dataset Search, GitHub (repos com dados), data.gov.br (dados públicos Brasil), APIs públicas.</p><blockquote class="tip">Dica: Escolha problema que você realmente se importa. Paixão aparece no projeto e impressiona recrutadores.</blockquote><p>Exemplo de bom projeto: \"Análise de Retenção de Clientes em E-commerce\". Dataset público Kaggle. Você explora: quem churna? Por quê? Constrói modelo preditivo. Recomenda ações. Tudo em GitHub com Jupyter notebook bem estruturado.</p><p><strong>Documentação**: README explicando projeto, como rodar, quais bibliotecas, resultados. Código comentado. Insights documentados. <strong>Qualidade vence quantidade</strong>. Um projeto bom > 10 projetos mediocres.</p><p><strong>Competições Kaggle**: Excelente prática. Você compete, vê soluções de outros, aprende truques. Top 10% em competição = talento demonstrado.</p><blockquote class="example">Exemplo: Você faz projeto de NLP analisando sentimentos em reviews de hotel. Coleta dados da internet (web scraping), limpa, treina modelo, mede performance, explora erros. Documentação impeccável. GitHub com badges de qualidade. Isso impressiona.</blockquote><p><strong>Blog/Artigos**: Escreva sobre o que aprendeu. Explique conceito de forma clara. Medium é gratuito. Escrita boa demonstra pensamento claro.</p><p><strong>Contribuições Open Source**: Contribua em projetos como Pandas, Scikit-learn. Pequenas contribuições (bug fix, documentação) valem muito mais que gigabytes de código pessoal.</p><blockquote class="quote">\"Seu portfólio é seu trabalho. Invista nele como se fosse sua carreira—porque é.\"</blockquote><p>Você aprenderá que portfólio abre mais portas que network, porque prova competência.</p>`},
    {
      id: 'ENTV',
      title: 'Entrevistas Técnicas',
      html: `<h4>Apresentando suas habilidades</h4><p><strong>Entrevista técnica testa: conhecimento, problem-solving, comunicação, curiosidade</strong>. Não é só saber código; é pensar em voz alta.</p><p><strong>Tipos comuns**: Análise de problema (\"como você abordaria X?\"), Live coding (escreve código em tempo real), Case study (problema de negócio que você resolve), Machine Learning design (desenha sistema de ML).</p><p><strong>Preparação**: Revise estruturas de dados, algoritmos, SQL, estatística. Faça problemas no LeetCode ou HackerRank. Estude casos de ML famosos (Netflix, Uber, Airbnb).</p><blockquote class="tip">Dica: Não memorize respostas. Entrevistadores pedem variações. Prepare framework mental e adapte.</blockquote><p><strong>Comunicação**: Pense em voz alta. \"Vou abordar assim porque...\". Pergunte se caminho faz sentido. Mostre raciocínio. <strong>Solução errada com raciocínio bom é melhor que resposta certa sem explicar</strong>.</p><p><strong>Trade-offs**: Toda solução tem trade-offs. Simples vs otimizado, rápido vs acurado, escalável vs fácil. Discuta: \"A solução simples é rápida implementar mas pode não escalar. Solução robusta demora mais mas...\"</p><blockquote class="example">Exemplo: Pergunta \"Como você detectaria fraude?\" Resposta boa: \"Eu abordaria com 3 estratégias: 1) Regras simples (valor anormal), 2) Modelo de classificação treina em dados históricos, 3) Monitoramento contínuo para data drift. Cada uma tem trade-offs em complexidade vs acurácia.\"</blockquote><p><strong>Perguntas para você fazer**: \"Qual é o volume de dados? Precisa ser real-time? Qual é a métrica crítica?\" Perguntas mostram pensamento prático.</p><p><strong>Comportamental**: \"Conte sobre um projeto desafiador\", \"Como você lida com feedback?\", \"Trabalho em equipe?\". Prepare histórias (STAR method: Situation, Task, Action, Result).</p><blockquote class="quote">\"Entrevista é conversa, não interrogatório. Seja você mesmo, mostre curiosidade, faça perguntas.\"</blockquote><p>Você aprenderá que muitas ofertas vêm não de acertar tudo, mas de demonstrar mentalidade boa.</p>`},
    {
      id: 'CRES',
      title: 'Aprendizado Contínuo',
      html: `<h4>A única constante é a mudança</h4><p><strong>Data Science muda rapidinho. Modelos novos, ferramentas novas, best practices novas</strong>. Profissional que não aprende fica obsoleto em 5 anos.</p><p><strong>Fontes de aprendizado**: Cursos online (Coursera, Udemy), livros, papers, blogs (Towards Data Science), podcasts, conferências, projetos práticos.</p><p><strong>Livros essenciais**: \"Hands-On Machine Learning\" (Géron), \"Statistical Rethinking\" (McElreath), \"Causal Inference\" (Pearl), \"Designing Machine Learning Systems\" (Huyen). Leia, entenda, código exemplos.</p><blockquote class="tip">Dica: Alterne teoria (livros) e prática (projetos). Só teoria é chato e inútil; só prática é raso.</blockquote><p><strong>Papers**: Comece lendo papers de 2-3 anos atrás, não última semana. Comunidade já destilou o essencial. Leia resumo primeiro; se interessante, leia paper.</p><p><strong>Comunidades**: Kaggle, Reddit r/MachineLearning, local meetups. Comunidades ajudam: perguntas respondidas, aprendizado coletivo, oportunidades.</p><blockquote class="example">Exemplo: Você quer aprender Graph Neural Networks. Você lê 2 papers clássicos, faz curso online, implementa modelo simples, participa de discussão online. Em 4 semanas, você entende bem.</blockquote><p><strong>Experimentação**: Aprenda brincando. Pegue dataset, tente técnicas novas. Falhar é OK; é onde aprenda mais.</p><p><strong>Especialização vs Generalista**: Eventualmente, escolha: ser expert em 1 área (NLP, computer vision, causal) ou ser generalista sólido. Ambos valem, depende personalidade.</p><blockquote class="quote">\"A melhor forma de aprender é ensinando. Explique conceitos para alguém. Gaps ficam óbvios.\"</blockquote><p>Você aprenderá que aprendizado contínuo é a carreira. Parar é ficar para trás.</p>`}
  ],
  flashcards: [
