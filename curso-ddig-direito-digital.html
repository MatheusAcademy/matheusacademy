  cat:'Direito & Cidadania', free:true,
  topics:[
    {id:'ddig', name: 'Conceito de Direito Digital e Aplicação Na Internet', content:'<h4>Lei Na Era Digital: Protegendo Seus Direitos Online</h4><p>Bem-vindo ao curso de Direito Digital! Internet criou novos direitos e deveres que lei ainda está regulando. Você usa internet diariamente; você precisa conhecer direitos/deveres digitais.</p><p>O que é direito digital? Aplicação de leis (tradicionais e novas) a situações na internet: crimes cibernéticos, violação de privacidade, propriedade intelectual digital, responsabilidade em redes sociais, regulação de plataformas.</p><blockquote class="tip"><strong>Dica:</strong> Internet não é "terra sem lei". Lei se aplica igualmente online e offline. Você pode processar/ser processado por atos online como offline.</blockquote><p>Qual é a dificuldade? Internet é anônima, global, descentralizada. Lei é territorial (cada país tem própria lei). Conflito surge quando brasileiro comete crime em servidor estrangeiro contra vítima em outro país.</p><p>Qual é o princípio básico? Lei aplicável é onde vítima está. Se você no Brasil prejudica vítima no Brasil (ou brasileiro), lei brasileira se aplica (mesmo que ato ocorreu na Califórnia).</p><blockquote class="example"><strong>Exemplo:</strong> Você publica fake news no Brasil humilhando alguém no Brasil. Crime ocorreu em plataforma estrangeira (Twitter), mas lei brasileira se aplica (vítima está no Brasil). Você pode ser processado.</blockquote><p><strong>Fontes de direito digital:</strong> Constituição Federal (direito privacidade, liberdade expressão), Código Penal (crimes digitais), Marco Civil (direitos internet), LGPD (privacidade dados), Lei de Propriedade Intelectual (direitos autorais).</p><blockquote class="quote"><strong>Convergência de leis:</strong> "Direito digital é aplicação de leis existentes + novas leis específicas a internet. Lei alcança internet. Você tem direitos/deveres online."</strong></blockquote><p>Como você se protege? Conheça seus direitos (privacidade, liberdade expressão), respeite direitos de outros (propriedade intelectual, dignidade), denuncie crimes cibernéticos.</p>'},
    {id:'prnc', name: 'Princípios de Privacidade e Direitos de Dados', content:'<h4>Seu Direito À Privacidade Na Era Digital</h4><p>Privacidade é direito fundamental. Internet coleta seus dados (localização, histórico, preferências). Lei oferece proteção: você tem direito de saber que dados existem, quem tem, como são usados.</p><p><strong>Direito ao esquecimento:</strong> Você pode pedir apagamento de dados pessoais quando já não são necessários. Exemplo: artigo antigo sobre você prejudica reputação hoje, você pede remoção.</p><blockquote class="tip"><strong>Dica:</strong> Se você foi vítima de crime/abuso online, você tem direito de pedir remoção de conteúdo prejudicial. Lei oferece proteção.</blockquote><p><strong>Consentimento para dados:</strong> Empresas devem pedir consentimento para coletar/usar seus dados. Formulário claro (não escondido em termos), você deve concordar. Consentimento é obrigatório.</p><p><strong>Transparência:</strong> Você tem direito de saber que dados uma empresa tem sobre você. Você pode solicitar ao Google/Facebook seus dados coletados. Empresa deve fornecer em formato legível.</p><blockquote class="example"><strong>Exemplo:</strong> Você usa Gmail 5 anos. Google tem: todos emails, contatos, histórico busca, localização, dispositivos usados. Você pede seus dados ao Google. Google oferece download completo de tudo que tem sobre você.</blockquote><p><strong>Portabilidade de dados:</strong> Você pode pedir seus dados em formato transferível (ex: mudar de Email provider). Empresa deve fornecer em formato padrão que outro serviço aceita.</p><blockquote class="quote"><strong>Direitos do sujeito de dados:</strong> "Você tem direito de saber dados pessoais coletados, para que servem, pedir apagamento, transferir para outro serviço. Lei protege privacidade."</strong></blockquote><p>Como você exerce direitos? Solicite ao serviço (Google/Facebook/etc) seus dados. Pedir ao ANPD (Autoridade Nacional Proteção Dados) se serviço recusa. Lei oferece mecanismo de denúncia.</p>'},
    {id:'lib', name: 'Liberdade de Expressão vs Responsabilidade', content:'<h4>Você Pode Falar O Que Quiser? Limite Jurídico De Liberdade Expressão</h4><p>Você tem direito a liberdade de expressão. Mas direito não é absoluto. Lei limita expressão quando prejudica dignidade de outro (difamação, injúria, discurso de ódio).</p><p><strong>Difamação:</strong> Afirmar coisa falsa sobre alguém que prejudica reputação. Exemplo: dizer que alguém é ladrão (falso), alguém é doente contagioso (falso). Lei oferece indenização à vítima.</p><blockquote class="tip"><strong>Dica:</strong> Diferença: dizer fato verdadeiro prejudicial = permitido (verdade é defesa). Dizer mentira prejudicial = crime. Nunca afirme coisa falsa sobre pessoa pública.</blockquote><p><strong>Injúria:</strong> Ofensa à dignidade/honra de alguém. Exemplo: chamar de "burro", "fedorento", "fracassado". Diferente de difamação: não precisa ser falso, apenas ofensivo.</p><p><strong>Discurso de ódio:</strong> Expressão que incita ódio contra grupo (por raça, religião, orientação sexual, nacionalidade). Lei proíbe. Pode resultar em processo penal e indenização.</p><blockquote class="example"><strong>Exemplo:</strong> Você publica: "Pessoas da religião X são perigosas, devem ser expulsas do Brasil." Isso é discurso de ódio. Lei permite processar. Você pode pagar indenização + possível cadeia.</blockquote><p><strong>Verdade como defesa:</strong> Se você afirma fato verdadeiro (mesmo prejudicial), você tem defesa. Exemplo: revelar que político é corrupto (verdade comprovada) = permitido, mesmo se prejudica reputação.</p><blockquote class="quote"><strong>Liberdade com limite:</strong> "Liberdade de expressão é direito, mas não absoluto. Lei limita quando prejudica dignidade de outro. Responsabilidade acompanha liberdade."</strong></blockquote><p>Como você se protege? Verifique fatos antes de publicar, expresse opinião (não fatos falsos), respeite dignidade de outros, não difame/injurie sem causa.</p>'},
    {id:'prot', name: 'Proteção De Dados Pessoais: LGPD Básico', content:'<h4>Sua Lei De Proteção: LGPD (Lei Geral De Proteção De Dados)</h4><p>LGPD é lei brasileira de 2018 que protege seus dados pessoais. Estabelece direitos de sujeitos (você) e obrigações de empresas (controladores de dados). Você deve conhecer.</p><p>O que LGPD protege? Dados pessoais: nome, CPF, email, telefone, localização, histórico de compras, biometria (impressão digital), dados de saúde, preferências políticas/religiosas.</p><blockquote class="tip"><strong>Dica:</strong> LGPD se aplica a qualquer empresa que coleta dados de brasileiros. Mesmo empresa estrangeira que coleta dados brasileiros deve cumprir LGPD.</blockquote><p><strong>Direitos sob LGPD:</strong> (1) Saber que dados existem; (2) Acessar seus dados; (3) Corrigir dados errados; (4) Deletar dados; (5) Portabilidade; (6) Direito de objeto a certos processamentos; (7) Reparação se violated.</p><p><strong>Princípios LGPD:</strong> Finalidade (dados usados para propósito comunicado), adequação (proporcionado à finalidade), necessidade (coleta apenas essencial), transparência (você sabe), qualidade (dados precisos), segurança (protegidos).</p><blockquote class="example"><strong>Exemplo:</strong> Facebook coleta seu email para "comunicação de segurança". Se Facebook usa email para vender dados marketing, viola LGPD. Você pode exigir apagamento, reparação.</blockquote><p><strong>ANPD (Autoridade Nacional Proteção Dados):</strong> Órgão público que supervisiona LGPD. Você pode denunciar violação à ANPD. ANPD multa empresa até 2% da receita (ou máx R$ 50 milhões).</p><blockquote class="quote"><strong>Proteção legalmente garantida:</strong> "LGPD oferece direitos explícitos sobre seus dados. Empresa que viola é multada, você pode receber indenização por dano moral."</strong></blockquote><p>Como você se protege? Revise configurações de privacidade (redes sociais, emails), pedir seus dados periodicamente, denuncie violações à ANPD, leia políticas de privacidade (antes usar serviço).</p>'}

  topics:[
    {id:'mrco', name: 'Lei 12.965/2014: Marco Civil Brasileiro', content:'<h4>Lei Fundamental Da Internet Brasileira</h4><p>Marco Civil (Lei 12.965/2014) é lei brasileira que estabelece direitos/deveres na internet. Ela oferece fundação para direito digital brasileiro. Você deve conhecer princípios.</p><p>Qual é o objetivo? Estabelecer direitos (liberdade expressão, acesso internet, privacidade), deveres (respeitar direitos de outros), responsabilidade de provedores (remoção conteúdo ilegal).</p><blockquote class="tip"><strong>Dica:</strong> Marco Civil foi celebrada como "constituição internet". Oferece proteção a você como usuário internet.</blockquote><p><strong>Princípios Marco Civil:</strong> (1) Liberdade expressão e pluralismo; (2) Privacidade; (3) Autonomia (você decide como usar internet); (4) Ordem democrática; (5) Multiparticipação (governo, empresa, sociedade civil decidem juntos).</p><p><strong>Direitos dos usuários:</strong> Acessibilidade (conexão acessível), direito conhecer políticas de privacidade, direito de recurso (contestar remoção conteúdo), direito de não ter dados vendidos sem consentimento.</p><p><strong>Responsabilidade de provedores:</strong> Provedor de acesso (ISP: telefônica, etc) não é responsável por conteúdo que passa. Provedor de aplicação (rede social, email) é responsável se não remove conteúdo ilegal após notificação.</p><blockquote class="example"><strong>Exemplo:</strong> Você publica vídeo violento no YouTube. YouTube não é responsável automaticamente. Mas se notificam YouTube sobre vídeo ilegal, YouTube deve remover em prazo. Se não remove, YouTube é responsável.</blockquote><p><strong>Danos ao usuário:</strong> Se conteúdo prejudicial chega você, você pode solicitar indenização. Exemplo: fake news que prejudica reputação = você pode processar autor + plataforma se não removeu rápido.</p><blockquote class="quote"><strong>Equilíbrio de poderes:</strong> "Marco Civil oferece proteção a usuário contra excesso de restrição de liberdade expressão. Oferece responsabilidade a provedores por conteúdo ilegal não removido."</strong></blockquote><p>Como você se protege? Conhecer direitos (exigir transparência de provedores), denunciar conteúdo ilegal, processar se prejudicado.</p>'},
    {id:'resp', name: 'Responsabilidade de Provedores e Plataformas', content:'<h4>Quem É Responsável Por Conteúdo Online?</h4><p>Internet cria pergunta: quem é responsável por conteúdo prejudicial? Autor que publicou? Plataforma que hospedou? Lei oferece resposta que equilibra.</p><p><strong>Responsabilidade do autor:</strong> Pessoa que publica conteúdo é responsável. Se publica fake news, é responsável por difamação. Se publica crime, é responsável. Responsabilidade é pessoal.</p><blockquote class="tip"><strong>Dica:</strong> Você é sempre responsável pelo que publica. Mesmo em rede social anônima, polícia pode descobrir sua identidade. Não se esconda atrás de anonimato para publicar crime.</blockquote><p><strong>Responsabilidade de plataforma/rede social:</strong> (1) Se notificam sobre conteúdo ilegal, plataforma tem prazo para remover. Se não remove, é responsável. (2) Plataforma pode ser responsabilizada por falta de segurança (você foi hackeado por negligência deles).</p><p><strong>Notice-and-takedown:</strong> Processo onde você notifica plataforma sobre conteúdo ilegal. Plataforma tem prazo (normalmente 24-48h) para remover. Se remove, plataforma é protegida. Se não remove, é responsável.</p><blockquote class="example"><strong>Exemplo:</strong> Vídeo seu é publicado sem consentimento (revenge porn). Você notifica YouTube. YouTube tem 48h para remover. Se remove, YouTube não é responsável. Se não remove, YouTube é responsável (você processa YouTube).</blockquote><p><strong>Moderação vs censura:</strong> Plataforma pode moderar (remover conteúdo ilegal). Isso não é censura (censura é restrição arbitrária de liberdade expressão). Remover crime/abuso é proteção a vítima.</p><blockquote class="quote"><strong>Equilíbrio:</strong> "Plataforma não é responsável por conteúdo publicado por outros. Mas é responsável se sabe de conteúdo ilegal e não remove. Equilibra liberdade expressão com proteção."</strong></blockquote><p>Como você se protege? Se conteúdo prejudicial, notifique plataforma (use formulário oficial). Se não removem, processe. Se você publicou indevidamente, remova rapidamente (reduz responsabilidade).</p>'},
    {id:'acess', name: 'Acesso À Internet como Direito Fundamental', content:'<h4>Internet Não É Luxo, É Direito</h4><p>Marco Civil reconhece acesso à internet como direito fundamental. Governo tem dever de ofertar internet a todos. Você tem direito a acesso acessível, não discriminatório.</p><p><strong>Direito de acesso:</strong> Você tem direito a internet. Provedores não podem negar acesso por discriminação (raça, gênero, orientação sexual, etc). Acesso é direito, não serviço só para ricos.</p><blockquote class="tip"><strong>Dica:</strong> Se provedor nega acesso por discriminação, você pode denunciar ao ANATEL (agência de telecom). Provedor é multado, acesso é restaurado.</blockquote><p><strong>Neutralidade de rede:</strong> Provedores não podem bloquear/desacelerar conteúdo baseado em origem/destino/tipo. Você acessa YouTube mesmo ritmo que acessa blog pequeno. Lei exige igualdade.</p><p><strong>Violação de neutralidade:</strong> Se provedor bloqueia aplicativo concorrente (bloqueia Skype para favorecer Whatsapp seu), é violação. Você pode denunciar ANATEL.</p><blockquote class="example"><strong>Exemplo:</strong> Operadora bloqueia streaming de concorrente (Netflix), oferecendo seu próprio (NOW). Você acessa NOW normalmente, Netflix lentíssimo. Violação de neutralidade. ANATEL multa operadora.</blockquote><p><strong>Acesso universal:**Lei exige que governo trabalhe por acesso universal. Especialmente em áreas rurais/pobres. Subsídios governamentais devem expandir cobertura.</p><blockquote class="quote"><strong>Internet como direito:</strong> "Marco Civil reconhece internet como essencial para participação democrática. Acesso é direito fundamental, não serviço só para alguns."</strong></blockquote><p>Como você se protege? Se acesso é negado discriminatoriamente, denuncie. Se neutralidade é violada (bloqueio seletivo), denuncie ANATEL.</p>'},
    {id:'tran', name: 'Transparência de Dados e Direito à Informação', content:'<h4>Você Tem Direito Saber Como Dados Seus São Usados</h4><p>Marco Civil exige transparência: provedores devem informar quais dados coletam, para que servem, com quem compartilham. Você tem direito de conhecer práticas de privacidade.</p><p><strong>Política de privacidade:</strong> Provedor deve publicar como coleta, usa, compartilha dados. Deve ser clara, acessível, em português. Política obscura/técnica demais viola lei.</p><blockquote class="tip"><strong>Dica:</strong> Antes usar serviço, leia política de privacidade. Se não consegue entender, é por design (provedor quer esconder). Considere não usar serviço.</blockquote><p><strong>Compartilhamento de dados:</strong> Provedor não pode compartilhar seus dados com terceiros sem consentimento. Exceção: segurança pública (polícia com mandado). Lei protege privacidade.</p><p><strong>Retenção de dados:</strong> Provedor não deve reter dados mais tempo que necessário. Lei exige que dados sejam deletados quando finalidade acabou. Retenção indefinida viola lei.</p><blockquote class="example"><strong>Exemplo:</strong> Facebook coleta localização para "segurança". Se Facebook retém localização 10 anos após você parar usar, viola lei. Você pode exigir apagamento.</blockquote><p><strong>Quebra de sigilo:</strong> Governo pode quebrar sigilo de dados se tem mandado judicial. Provedor é obrigado a fornecer. Mas você tem direito de saber (provedor deve informar).</p><blockquote class="quote"><strong>Transparência obrigatória:</strong> "Provedor deve ser transparente sobre práticas de dados. Você tem direito de saber, contestar, exigir apagamento de dados."</strong></blockquote><p>Como você se protege? Leia políticas de privacidade (resumida), mude configurações privacidade (Facebook, Google), peça seus dados periodicamente (confirme que existem), denuncie abuso.</p>'}

  topics:[
    {id:'dpf', name: 'Direitos e Proteções Sob LGPD', content:'<h4>Lei Geral Proteção Dados: Seu Direito Pessoal</h4><p>LGPD oferece direitos concretos sobre seus dados. Você pode exercer direitos diretamente contra empresa que tem seus dados. Lei oferece mecanismo simples.</p><p><strong>Direito de acesso:</strong> Você pede empresa: "Que dados meu você tem?" Empresa deve responder em 15 dias com todos dados coletados, para que servem, com quem compartilham. Resposta é gratuita.</p><blockquote class="tip"><strong>Dica:</strong> Periodicamente peça seus dados ao Google/Facebook/Amazon/etc. Você será surpreso quanto dados têm sobre você. Use como leverage para exigir privacidade.</blockquote><p><strong>Direito de retificação:</strong> Se dados estão errados (CPF errado, telefone errado), você pede correção. Empresa tem 15 dias para corrigir. Dados errados prejudicam você (spam, ofertas erradas).</p><p><strong>Direito de exclusão:</strong> Você pede apagamento de dados: "Delete meus dados que você tem." Empresa tem 15 dias (salvo exceção legal). Dados são deletados permanentemente.</p><blockquote class="example"><strong>Exemplo:</strong> Você não usa Facebook mais. Você pede Facebook: "Delete todos meus dados pessoais." Facebook tem 15 dias. Após isso, todos dados seus (fotos, mensagens, histórico) são deletados.</blockquote><p><strong>Direito de portabilidade:</strong> Você pede dados em formato transferível (ex: CSV). Você pode usar em outro serviço. Permite sair de provedor sem perder dados seus.</p><blockquote class="quote"><strong>Direitos concretos:</strong> "LGPD oferece direitos que você pode exercer. Pedir acesso, corrigir, deletar, transferir dados. Empresa é obrigada a cumprir em 15 dias."</strong></blockquote><p>Como você exerce direitos? Email para empresa (privacidade@empresa.com), solicitação escrita clara. Se empresa recusa, você pode denunciar ANPD (autoridade de proteção dados).</p>'},
    {id:'vig', name: 'Vigilância de Dados e Segurança', content:'<h4>Protegendo Seus Dados De Roubo E Abuso</h4><p>Hackers roubam dados. Empresas vendem dados. LGPD exige que empresa proteja seus dados com segurança adequada. Se não protegem e dados são roubados, você é indenizado.</p><p><strong>Obrigação de segurança:</strong> Empresa que tem seus dados deve protegê-los (criptografia, acesso limitado, backup). Negligência em segurança é violação LGPD. Você pode processar por dano.</p><blockquote class="tip"><strong>Dica:</strong> Se ouve que empresa teve vazamento de dados (hackeado), você provavelmente foi prejudicado. Pode processar empresa por negligência em segurança.</blockquote><p><strong>Vazamento de dados:</strong> Se hackers roubam seus dados pessoais (CPF, senha, cartão), empresa deve notificar você rapidamente. Lei exige notificação em prazo. Empresa não pode esconder vazamento.</p><p><strong>Direito à reparação por vazamento:</strong> Se empresa tem negligência em segurança e seus dados são roubados, você pode processar. Dano moral pode ser indenizado (quanto valor? Juiz decide).</p><blockquote class="example"><strong>Exemplo:</strong> Facebook tem vazamento de 1 milhão de CPFs. Sua CPF está no vazamento. Você processa Facebook por negligência em segurança + dano moral. Você pode receber indenização.</blockquote><p><strong>Vigilância excessiva:</strong> Empresa não pode rastrear você excessivamente (localização constante, câmera oculta, escuta). Vigilância excessiva viola privacidade. Lei oferece proteção.</p><blockquote class="quote"><strong>Segurança é obrigação:</strong> "Empresa é obrigada proteger seus dados. Se não protege e são roubados/vendidos, empresa é responsável. Você tem direito a reparação."</strong></blockquote><p>Como você se protege? Use senhas fortes, 2FA (autenticação dois fatores), acompanhe suas contas, denuncie vazamentos à ANPD.</p>'},
    {id:'cons', name: 'Consentimento Para Coleta De Dados', content:'<h4>Você Decide Se Seus Dados São Coletados</h4><p>Antes empresa coletava dados sem perguntar. LGPD mudou: empresa deve pedir consentimento ANTES coletar dados. Consentimento deve ser informado, específico, voluntário.</p><p><strong>O que é consentimento valido:</strong> Caixa de seleção que você marca (default deve ser desmarcado). Você pode negar. Língua clara explicando o que é coletado, para que. Você deve clicar para consentir.</p><blockquote class="tip"><strong>Dica:</strong> Se caixa de consentimento vem pré-marcada (você não marcou, vem checado), é inválido. Lei exige que você escolha ativamente (opt-in, não opt-out).</blockquote><p><strong>O que NÃO é consentimento valido:</strong> Termos de serviço obscuros, caixa pré-marcada, pressão ("usar serviço exige consentimento"). Consentimento deve ser livre.</p><p><strong>Revogar consentimento:</strong> Você pode revogar consentimento depois. Se inicialmente concordou com rastreamento, depois pode pedir apagamento. Empresa é obrigada remover dados.</p><blockquote class="example"><strong>Exemplo:</strong> Você baixa aplicativo. Aplicativo pede: "Permitir acesso localização?" Você marca SIM. Depois muda ideia, vai configurações, REVOGA consentimento. App para rastrear você.</blockquote><p><strong>Consentimento de menores:</strong> Se você é menor de 14 anos, pais devem consentir coleta de dados. App não pode coletar dados de criança sem consentimento parental.</p><blockquote class="quote"><strong>Consentimento ativo:</strong> "LGPD exige que você concorde ativamente antes coleta. Não pode ser pré-marcado/obrigatório. Você sempre pode revogar depois."</strong></blockquote><p>Como você se protege? Leia consentimento antes marcar, revogue periódicamente (não deixe habilitado permanentemente), use ferramentas privacidade (Do Not Track, bloqueador rastreamento).</p>'},
    {id:'dir', name: 'Direito Ao Esquecimento E Reputação Online', content:'<h4>Seu Direito De Ser Esquecido Na Internet</h4><p>Internet não esquece. Artigo antigo sobre você prejudica reputação hoje. LGPD oferece "direito ao esquecimento": você pode pedir remoção de informação sobre você quando já não é relevante.</p><p><strong>Quando você tem direito ao esquecimento:</strong> Informação é antiga/irrelevante, prejudica reputação, violou privacidade, consentimento foi revogado, finalidade foi cumprida. Você pode pedir remoção.</p><blockquote class="tip"><strong>Dica:</strong> Se artigo 10 anos atrás o chamava "criminoso suspeito" (mas você foi absolvido), você pode pedir remoção/atualização. Internet não deve manter "reputação morta".</blockquote><p><strong>Direito vs liberdade de expressão:</strong> Conflito existe: direito ao esquecimento vs direito de imprensa publicar. Lei equilibra: jornalismo de interesse público pode manter; conteúdo não-jornalístico deve remover/atualizar.</p><p><strong>Remoção de motores de busca:</strong> Google tem direito ao esquecimento: você pede Google remover resultado que prejudica você. Google deve analisar. Google pode recusar se interesse público (político famoso).</p><blockquote class="example"><strong>Exemplo:</strong> Foto sua comprometedora foi publicada sem consentimento (revenge porn). Você pede remoção do site. Site recusa. Você pede Google remover da busca. Google remove (revenge porn é ilegal, não interesse público).</blockquote><p><strong>Limitações:</strong> Direito ao esquecimento não é absoluto. Interesse público pode prevalecer (corruptor político deve ser lembrado). Jornalismo responsável é protegido.</p><blockquote class="quote"><strong>Equilíbrio delicado:</strong> "Direito ao esquecimento equilibra privacidade individual com liberdade expressão/jornalismo. Ambos direitos são protegidos."</strong></blockquote><p>Como você se protege? Monitore sua reputação online (Google Alerts seu nome), peça remoção de conteúdo prejudicial, solicite a Google remover resultados prejudiciais.</p>'}
  ],

{
  id:3, name: 'Crimes Cibernéticos', free:false,
  topics:[
    {id:'crm', name: 'Crimes Digitais: De Hacking A Roubo De Identidade', content:'<h4>Lei Brasileira Pune Crimes Cometidos Na Internet</h4><p>Internet criou novos crimes: hacking, phishing, roubo identidade, extorsão digital. Lei brasileira pune crimes mesmo que cometidos online. Você pode ser vítima; você deve conhecer proteção.</p><p><strong>Hacking (acesso não autorizado):</strong> Entrar em conta/sistema de outro sem permissão. Lei pune com prisão até 3 anos. Exemplo: entrar em email alheio, conta bancária.</p><blockquote class="tip"><strong>Dica:</strong> Se sua conta foi hackeada, registre BO (boletim ocorrência). BO é necessário para polícia investigar, para você processar hacker.</blockquote><p><strong>Phishing:</strong> Enviar email fingindo ser empresa legítima para roubar dados (login, senha, cartão). Lei pune como estelionato. Pena até 5 anos.</p><p><strong>Roubo de identidade:</strong> Usar dados pessoais de outro para se passar por ele, fazer compras, pedir crédito. Lei pune. Você é prejudicado (dívidas, reputação).</p><blockquote class="example"><strong>Exemplo:</strong> Criminoso rouba seu CPF, abre conta em seu nome, contrai dívida. Você fica com dívida de outro. Você registra BO, processa criminoso, negocia com credor (prova que não foi você).</blockquote><p><strong>Malware/Ransomware:</strong> Programa que infecta seu computador (rouba dados, bloqueia arquivo pedindo resgate). Lei pune. Você é prejudicado financeiramente.</p><blockquote class="quote"><strong>Crimes digitais são reais:</strong> "Crimes cometidos online são puníveis como offline. Lei brasileira oferece proteção. Você pode registrar BO, processar criminoso, receber indenização."</strong></blockquote><p>Como você se protege? Senhas fortes, atualize software, não abra emails suspeitos, 2FA (autenticação dois fatores), monitore contas regularmente.</p>'},
    {id:'ext', name: 'Extorsão Digital e Chantagem Online', content:'<h4>Quando Criminoso Ameaça Publicar Seus Dados</h4><p>Criminoso tem foto sua comprometedora ou dados sensíveis. Criminoso ameaça publicar se você não pagar. Isso é extorsão/chantagem. Lei pune. Você não deve pagar.</p><p><strong>Sextorsão:</strong> Criminoso tem vídeo seu em momento íntimo, ameaça publicar. Exige dinheiro. Lei pune criminoso. Você pode registrar BO, processar.</p><blockquote class="tip"><strong>Dica:</strong> Se chantageado, NUNCA pague. Criminoso sempre pede mais depois. Registre BO imediatamente, preserve evidência (screenshots ameaça), denuncie plataforma (email, etc).</blockquote><p><strong>Ameaça de publicar dados pessoais:</strong> "Tenho seus dados, vou publicar se não pagar." Lei pune como extorsão. Você pode processar criminoso.</p><p><strong>Como criminoso consegue dados:</strong> Phishing (você digitou senha em site falso), vazamento de empresa (violação LGPD), roubo direto (hacking conta), compra de dados no mercado negro.</p><blockquote class="example"><strong>Exemplo:</strong> Criminoso manda email: "Tenho vídeo seu. Paga R$ 1.000 ou publico." Você registra BO, forwarda email para polícia. Polícia investiga, identifica criminoso, processa.</blockquote><p><strong>Não é sua culpa:</strong> Se você foi chantageado, não é sua culpa. Culpa é do criminoso. Lei protege você (vítima). Você pode processar criminoso + plataforma se facilitou.</p><blockquote class="quote"><strong>Proteção contra extorsão:</strong> "Extorsão digital é crime. Você não deve pagar (não resolve). Denuncie imediatamente. Lei oferece proteção à vítima."</strong></blockquote><p>Como você se protege? Não envie fotos/vídeos comprometedoras, se enviou use apps com desaparição automática, denuncie ameaça imediatamente, não pague.</p>'},
    {id:'drp', name: 'Deepfakes e Conteúdo Falso: Responsabilidade Legal', content:'<h4>Quando Vídeo/Áudio Falso É Publicado Sobre Você</h4><p>Deepfake é vídeo falso onde você é feito parecer dizendo/fazendo coisa que nunca fez. Tecnologia IA permite criar deepfakes realistas. Lei oferece proteção contra abuso.</p><p><strong>Deepfake criminoso:</strong> Vídeo falso você em momento íntimo, ou sendo violento, ou confessando crime. Publicado prejudica reputação. Você pode processar por difamação + dano moral.</p><blockquote class="tip"><strong>Dica:</strong> Deepfakes estão se tornando comuns. Se vir vídeo falso seu, denuncie imediatamente à plataforma (peça remoção) + polícia (crime de difamação).</blockquote><p><strong>Responsabilidade do criador:</strong> Pessoa que cria deepfake criminoso é responsável. Se publica difamando você, é responsável por difamação. Lei pune.</p><p><strong>Responsabilidade da plataforma:</strong> Plataforma que hospeda deepfake é responsável se sabe do conteúdo e não remove. Lei permite processar plataforma.</p><blockquote class="example"><strong>Exemplo:</strong> Deepfake seu em vídeo sexual é publicado no Twitter. Você denuncie Twitter. Twitter tem 24h para remover (notice-and-takedown). Se não remove, Twitter é responsável. Você processa criador + Twitter.</blockquote><p><strong>Defesa contra deepfake:</strong> Se falsidade é óbvia (vídeo não existe contexto realista), é mais fácil provar. Se deepfake é realista, você pode trazer expert testemunho que é falso.</p><blockquote class="quote"><strong>Proteção emergente:</strong> "Lei ainda está evoluindo sobre deepfakes. Tendência é maior proteção à vítima. Criador + plataforma podem ser responsabilizados."</strong></blockquote><p>Como você se protege? Monitore seu nome online (Google Alerts), denuncie deepfakes imediatamente, procure especialista se precisa provar falsidade.</p>'},
    {id:'fb', name: 'Fake News e Responsabilidade de Difusão', content:'<h4>Espalhando Mentira Na Internet É Responsável Por Consequências</h4><p>Fake news é informação falsa que prejudica. Se você compartilha fake news sabendo que é falsa, você é responsável. Lei pune difusão negligente de fake news.</p><p><strong>O que é fake news:</strong> Informação claramente falsa, não-contexto realista. Exemplo: "Vacina causa autismo" (desmentido cientificamente), "Eleição foi fraudada" (sem prova).</p><blockquote class="tip"><strong>Dica:</strong> Verificar antes compartilhar. Você é responsável pelo que compartilha em rede social. Não é suficiente "eu só compartilhei", você é responsável se informação é falsa.</blockquote><p><strong>Responsabilidade de quem compartilha:</strong> Se você compartilha fake news sabendo (ou deverendo saber) que é falsa, você é responsável. Vítima da difamação pode processar você.</p><p><strong>Fake news em eleição/política:</strong> Fake news sobre voto, eleição, candidato pode ser crime eleitoral. Lei pune fake news que prejudica processo democrático. Pena até 4 anos.</p><blockquote class="example"><strong>Exemplo:</strong> Você compartilha fake news "Candidato X roubou R$ 1 milhão" (sem prova, falso). Candidato é prejudicado. Você pode ser processado por difamação + crime eleitoral.</blockquote><p><strong>Defesa da verdade:</strong> Se você compartilha informação verdadeira (mesmo que controversa), você tem defesa. "Eu compartilhei fato verdadeiro" é defesa válida.</p><blockquote class="quote"><strong>Responsabilidade de informação:</strong> "Internet não protege propagação de mentiras. Se compartilha fake news prejudicando alguém, você é responsável."</strong></blockquote><p>Como você se protege? Verificar fontes antes compartilhar, desconfiar de notícia sensacionalista, procurar múltiplas fontes, não compartilhar sem confirmar.</p>'}
  ],

{
  id:4, name: 'Propriedade Intelectual Digital', free:false,
  topics:[
    {id:'dir', name: 'Direitos Autorais na Internet', content:'<h4>Seu Trabalho Digital É Protegido Por Lei</h4><p>Se você cria conteúdo digital (vídeo, música, código, artigo), você tem direito autoral automático. Ninguém pode copiar sem permissão. Lei protege criadores.</p><p><strong>O que é protegido:</strong> Vídeos YouTube, música Spotify, código no GitHub, fotos Instagram, artigos em blog. Tudo é protegido por lei automaticamente (não precisa registrar).</p><blockquote class="tip"><strong>Dica:</strong> Se você criou, você é dono. Alguém copiar sem permissão é violação de copyright. Você pode processar por danos + lucro cedente.</blockquote><p><strong>Uso fair use (uso justo):</strong> Lei permite certo uso sem permissão: citação educacional, paródia, crítica. Exemplo: você resenha filme no YouTube citando cenas (permitido para crítica).</p><p><strong>DRM (Digital Rights Management):</strong> Proteção técnica (criptografia, watermark) para impedir cópia. Lei proíbe quebrar DRM mesmo se você é dono do bem. Proteção é legalmente garantida.</p><blockquote class="example"><strong>Exemplo:</strong> Você compra música com DRM. Você não pode remover DRM mesmo para fazer cópia pessoal. Lei proíbe. É proteção legal.</blockquote><p><strong>Licenças criativas (Creative Commons):</strong> Você pode licenciar seu trabalho com permissão reduzida (ex: "uso permitido se me creditam"). Permite compartilhamento controlado.</p><blockquote class="quote"><strong>Proteção automática:</strong> "Copyright é automático. Se você cria, você é dono. Ninguém pode copiar sem permissão. Lei oferece reparação se violado."</strong></blockquote><p>Como você se protege? Marque seus trabalhos com aviso de copyright, use watermark em imagens, denuncie cópias ilegais, procure remoção em plataforma.</p>'},
    {id:'pat', name: 'Patentes e Propriedade Intelectual De Software', content:'<h4>Protegendo Invenções E Código Inovador</h4><p>Se você inventa algo novo (software inovador, processo, aparelho), você pode patenteá-lo. Patente oferece direito exclusivo por 20 anos. Ninguém pode copiar/usar sem permissão.</p><p><strong>Como patenteir:</strong> Você registra no INPI (Instituto Nacional Propriedade Industrial) Brasil. Exige requerimento detalhado, desenhos, testes. Custo é aproximadamente R$ 5-20 mil. Processo dura 5-10 anos.</p><blockquote class="tip"><strong>Dica:</strong> Se você tem ideia inovadora, considere patente. Protege monopolio 20 anos. Valiosa para negócio.</blockquote><p><strong>Software pode ser patenteado:</strong> Algoritmo inovador, método novo de processar dados. Lei permite patentes de software (com limitações). Brasil oferece proteção.</p><p><strong>Open source vs proprietary:</strong> Open source: código é livre (você compartilha, outros podem usar/modificar). Proprietary: código é seu, privado. Ambos são válidos.</p><blockquote class="example"><strong>Exemplo:</strong> Você inventa algoritmo revolucionário. Você patenteia (custa R$ 10 mil, protege 20 anos). Concorrente não pode usar sem pagar royalty. Você lucra com inovação.</blockquote><p><strong>Violação de patente:</strong> Se alguém usa sua patente sem permissão, é violação. Você pode processar por injunction (ordem judicial parando uso) + indenização.</p><blockquote class="quote"><strong>Monopólio da inovação:</strong> "Patente oferece direito exclusivo à invenção por 20 anos. Incentiva inovação. Você lucra com criação."</strong></blockquote><p>Como você se protege? Documente data invenção (email a você mesmo), considere patente se inovadora, registre trademark do nome/logo.</p>'},
    {id:'tm', name: 'Marcas e Nomes de Domínio', content:'<h4>Protegendo Sua Identidade Online</h4><p>Sua marca (logo, nome) é ativo valioso. Lei oferece proteção: você pode registrar como trademark. Ninguém pode usar sua marca sem permissão. Internet torna mais importante (nome de domínio é seu brand).</p><p><strong>Registro de marca:</strong> Você registra no INPI. Oferece proteção nacional. Custa R$ 500-2 mil. Proteção dura 10 anos, renovável. Direito exclusivo é forte.</p><blockquote class="tip"><strong>Dica:</strong> Se você tem brand importante, registre marca. Protege contra cópia concorrência. Nome de domínio também deve ser seu.</blockquote><p><strong>Nome de domínio (.com.br):</strong> Você registra domínio no Registro.br. Custa R$ 50/ano aproximadamente. Pode ser transferido se companhia o compra. Protege online presença sua.</p><p><strong>Cybersquatting:</strong> Alguém registra domínio similar ao seu ou usa sua marca em domínio. Lei proíbe. Você pode processar para transferência do domínio para você.</p><blockquote class="example"><strong>Exemplo:</strong> Você tem marca "XYZ Consultoria" registrada. Alguém registra "xyz-consultoria.com.br" para lucrar. Você processa por cybersquatting. Domínio é transferido para você.</blockquote><p><strong>Direitos em redes sociais:</strong> Seu nome de usuário (@seu_nome no Twitter) é protegido? Não legalmente, mas plataforma oferece proteção contra impersonation (falsificação).</p><blockquote class="quote"><strong>Identidade online protegida:</strong> "Marca registrada oferece direito exclusivo. Nome de domínio seu é seu. Lei protege contra cybersquatting."</strong></blockquote><p>Como você se protege? Registre marca + domínio, denuncie cópias em redes sociais, monitore uso não-autorizado de sua marca.</p>'},
    {id:'lic', name: 'Licenças de Software e Acordos de Uso', content:'<h4>Entendendo Termos De Serviço E Licenças', content:'<h4>Você Concorda Com Licença Software Sem Ler?</h4><p>Quando você baixa software/usa serviço online, você aceita licença (acordo). Licença define sua permissão de usar. Você deve entender: é contrato vinculante.</p><p><strong>Tipos de licenças:</strong> Proprietary (você não tem direito modificar), GPL (você pode modificar se compartilha modificações), MIT (você pode fazer qualquer coisa), CC (Creative Commons: flexível).</p><blockquote class="tip"><strong>Dica:</strong> Ler toda licença é impraticável (milhares de palavras). Mas leia pelo menos seção resumida. Saiba: pode modificar? Pode vender? Pode compartilhar?</blockquote><p><strong>Termos de Serviço (ToS):</strong> Contrato entre você e serviço (Facebook, Gmail, etc). Define como você pode usar, o que é proibido. Violação pode resultar em banimento da conta.</p><p><strong>Arbitragem obrigatória:</strong> Muitos ToS exigem arbitragem (em vez de processo judicial). Você renuncia direito ao tribunal. Isso é controverso (favorece empresa).</p><blockquote class="example"><strong>Exemplo:</strong> Gmail ToS diz "Google pode terminar sua conta sem motivo." Você concorda ao criar conta. Se Google termina, você não tem recurso legal (arbitragem obrigatória).</blockquote><p><strong>Mudanças em ToS:</strong> Serviço pode mudar ToS sem aviso prévio (ou com aviso mínimo). Você deve reler periodicamente. Não reler = você concorda com mudanças.</p><blockquote class="quote"><strong>Contrato digital:</strong> "Licença/ToS é contrato. Você é vinculado. Lei oferece proteção (cláusulas abusivas são nulas), mas leitura é sua responsabilidade."</strong></blockquote><p>Como você se protege? Leia resumo da licença, use software open source se possível (mais transparente), denuncie cláusulas abusivas, considere alternativa se ToS é muito ruim.</p>'}
  ],
  flashcards:[

    {q:'Você precisa registrar copyright?', a:'Não. Copyright é automático. Registrar oferece prova se disputa.'},

    {q:'O que é Creative Commons?', a:'Licença que oferece permissão parcial: uso permitido com condições (creditar, não comercial, etc).'},
    {q:'Você pode registrar marca?', a:'Sim. INPI Brasil. Custa R$ 500-2 mil. Proteção 10 anos, renovável.'},
    {q:'O que é nome de domínio?', a:'Endereço web (google.com). Registra no Registro.br. Custa R$ 50/ano aproximadamente.'},

{
  id:5, name: 'Fake News e Desinformação', free:false,
  topics:[
    {id:'fk', name: 'Identificando Fake News e Desinformação', content:'<h4>Como Reconhecer Mentira Na Internet</h4><p>Fake news é informação falsa que parece verdadeira. Você pode ser enganado. Lei oferece proteção, mas você deve ser crítico. Aprenda reconhecer sinais de fake news.</p><p><strong>Sinais de fake news:</strong> Fonte desconhecida, linguagem emotiva/sensacionalista, sem link para fonte original, imagem antiga usada em contexto novo, headline extremista.</p><blockquote class="tip"><strong>Dica:</strong> Antes compartilhar, pesquise no Google (procure a mesma notícia em outras fontes). Se não encontra em sites confiáveis, é suspeita.</blockquote><p><strong>Misinformation vs disinformation:</strong> Misinformation: informação falsa sem intenção prejudicar (erro honesto). Disinformation: mentira deliberada para prejudicar (propaganda).</p><p><strong>Deepfakes como fake news:</strong> Vídeo falso que parece verdadeiro. Você não sabe se é real. Lei ainda está evoluindo sobre responsabilidade deepfakes.</p><blockquote class="example"><strong>Exemplo:</strong> Vídeo de político aparece dizendo coisa controversa (deepfake). Você vê e acredita. Mas é falso. Viral se espalha antes desmentida. Dano à reputação é feito.</blockquote><p><strong>Fact-checking:</strong> Sites como Lupa, Aos Fatos verificam informação. Você pode consultar antes compartilhar. Oferece certeza se é verdade/falso.</p><blockquote class="quote"><strong>Ceticismo informado:</strong> "Internet oferece liberdade expressão, mas também facilita mentiras. Você deve ser crítico. Pesquise, verifique, duvide de sensacionalismo."</strong></blockquote><p>Como você se protege? Pesquise antes compartilhar, procure múltiplas fontes, use fact-checkers, desconfie de linguagem emotiva/sensacionalista, conheça história da fonte.</p>'},
    {id:'desin', name: 'Desinformação E Polarização Political', content:'<h4>Como Desinformação Prejudica Democracia</h4><p>Desinformação deliberada prejudica democracia. Atores interessados (políticos, empresas, países) espalham mentiras para manipular eleitores. Lei oferece proteção, mas você deve estar atento.</p><p><strong>Campanhas de desinformação:</strong> Grupos coordenados espalham mentira sobre candidato/partido. Objetivo: manipular eleição. Lei pune fake news eleição com até 4 anos prisão.</p><blockquote class="tip"><strong>Dica:</strong> Em eleição, desconfie de informação sensacionalista sobre candidato. Pesquise em múltiplas fontes. Fake news eleição é comum e prejudicial.</blockquote><p><strong>Bot networks:</strong> Contas automáticas que compartilham fake news para parecer consenso. Você vê todos compartilhando, mas são bots. Manipula opinião pública.</p><p><strong>Polarização artificial:</strong> Desinformação cria divisão artificial entre grupos. Você odeia grupo "oposto" porque ouviu fake news sobre eles. Democracia é prejudicada.</p><blockquote class="example"><strong>Exemplo:</strong> Durante eleição, desinformação sobre candidato X espalha-se via bots. Eleitores acreditam, votam contra. Depois descobrem é falso. Eleição pode ter sido influenciada por fake news.</blockquote><p><strong>Responsabilidade de plataformas:</strong> Redes sociais são criticadas por facilitar desinformação. Elas têm poder (removem conteúdo), mas raramente agem contra desinformação política (controvérsia).</p><blockquote class="quote"><strong>Ameaça à democracia:</strong> "Desinformação prejudica democracia. Lei oferece proteção (fake news crime). Você é cidadão responsável se verifica e não compartilha mentira."</strong></blockquote><p>Como você se protege? Desconfie em período eleição, pesquise candidatos em sites oficiais, denuncie fake news eleição ao Ministério Público Eleitoral.</p>'},
    {id:'resp', name: 'Sua Responsabilidade Como Usuário De Rede Social', content:'<h4>Você É Responsável Pelo Que Compartilha</h4><p>Rede social oferece liberdade expressão, mas também responsabilidade. Se você compartilha fake news, você é responsável por conseqüências. Lei oferece base para processar.</p><p><strong>Complicidade em desinformação:</strong> Você compartilha fake news sabendo falso = você é responsável. Vítima pode processar você por difamação/dano. Não é suficiente dizer "eu só compartilhei".</p><blockquote class="tip"><strong>Dica:</strong> Antes compartilhar, pergunte: "É verdade? De fonte confiável? É importante compartilhar?" Se resposta negativa a qualquer pergunta, não compartilhe.</blockquote><p><strong>Ampliação de dano:</strong> Você compartilha mentira para 500 amigos. 50 compartilham para 500 cada. Mentira viraliza por sua culpa. Dano é amplificado. Você é parte responsável.</p><p><strong>Retratação:</strong> Se você compartilhou falso e depois descobriu, você pode pedir desculpas + compartilhar retratação. Isso reduz sua responsabilidade legal. Honestidade é defesa.</p><blockquote class="example"><strong>Exemplo:</strong> Você compartilha fake news sobre vacina. 1.000 pessoas leem, 100 não vacinam por culpa de fake news. Depois você descobre é falso. Você compartilha retratação. Prejudicado processa você + culpa é dividida com criador.</blockquote><p><strong>Direitos vs responsabilidades:</strong> Você tem direito liberdade expressão, mas não direito de mentir prejudicando outros. Responsabilidade acompanha liberdade.</p><blockquote class="quote"><strong>Cidadania digital:</strong> "Você tem poder em rede social. Poder vem com responsabilidade. Verifique antes compartilhar. Não amplifique mentira."</strong></blockquote><p>Como você se protege? Estabeleça critério pessoal para compartilhar, procure fontes primárias, admita erro se errou, desculpe-se e compartilhe correção.</p>'},
    {id:'fut', name: 'Futuro Da Regulação De Plataformas E Conteúdo', content:'<h4>Lei Está Evoluindo Para Regular Redes Sociais</h4><p>Redes sociais têm poder imenso (decidem que conteúdo vira viral). Lei está evoluindo para regular. Brasil está discutindo lei específica de plataformas (PL das Fake News).</p><p><strong>Lei das Fake News (proposta):</strong> Objetiva responsabilizar plataformas por desinformação. Exigir fact-checking, remover fake news eleição, oferecer transparência em algoritmo de recomendação.</p><blockquote class="tip"><strong>Dica:</strong> Lei está em discussão. Acompanhe mudanças. Futuro é mais regulação de plataformas, menos liberdade total.</blockquote><p><strong>Transparência de algoritmo:</strong> Objetivo é forçar plataformas explicar como algoritmo recomenda conteúdo. Você conheceria por que vê certos posts (algoritmo as favorece porque são engajantes/viral).</p><p><strong>Responsabilidade de moderação:</strong> Lei pode exigir que plataformas moderem melhor (remover desinformação, ódio). Maior responsabilidade = maior custo para plataformas.</p><blockquote class="example"><strong>Exemplo:</strong> Lei futura pode exigir Facebook remover fake news em 24h. Facebook teria que contratar mais moderadores. Custa mais, mas democracia é protegida.</blockquote><p><strong>Direito à explicação:</strong> Você pode ter direito a explicação por que seu conteúdo foi removido/demonetizado. Transparência em decisões automáticas.</p><blockquote class="quote"><strong>Evolução regulatória:</strong> "Lei evoluirá para regular plataformas. Futuro é menos liberdade total, mas mais proteção contra desinformação/abuso."</strong></blockquote><p>Como você se prepara? Acompanhe debates sobre regulação, participe de consultas públicas, apoie regulação responsável (não censura, mas proteção).</p>'}
  ],
  flashcards:[

    {q:'Qual é diferença misinformation vs disinformation?', a:'Misinformation: falso sem intenção prejudicar. Disinformation: mentira deliberada.'},
    {q:'Sinais de fake news incluem?', a:'Fonte desconhecida, linguagem emotiva/sensacionalista, headline extremista, sem fonte original.'},

{
  id:6, name: 'IA e Regulação Futura', free:false,
  topics:[
    {id:'ia', name: 'Inteligência Artificial: Direitos e Responsabilidades', content:'<h4>Era Da IA: Como Lei Protege Você</h4><p>Inteligência Artificial está mudando tudo. IA toma decisões sobre você (crédito, emprego, saúde). Lei oferece proteção: você tem direito de explicação, direito de contestar decisão IA.</p><p><strong>Viés de IA:</strong> Algoritmo treinado em dados históricos (discriminação passada) perpetua discriminação. Você é negado crédito porque IA viu padrão em dados históricos (grupo seu teve default). Injusto.</p><blockquote class="tip"><strong>Dica:</strong> Se IA nega benefício, exija explicação. Lei pode forçar empresa explicar por que IA rejeitou você. Explicação transparente oferece oportunidade contestar.</blockquote><p><strong>Direito de explicação:</strong> Você tem direito saber por que IA tomou decisão (LGPD oferece base). Caixa preta (IA que não explica) é sendo contestada.</p><p><strong>Responsabilidade de criador de IA:</strong> Se IA prejudica você (discriminação, erro), criador de IA é responsável. Lei oferece responsabilidade automática para dano causado IA.</p><blockquote class="example"><strong>Exemplo:</strong> Banco usa IA para decisão de crédito. IA nega você por viés (nega porque seu bairro historicamente tem default). Você processa banco. Banco é responsável por viés IA.</blockquote><p><strong>Autonomia vs accountability:</strong> Conflito: IA oferece eficiência (decisão rápida), mas reduz accountability (quem é responsável?). Lei busca equilibrio.</p><blockquote class="quote"><strong>Proteção contra IA:</strong> "Você tem direito de explicação quando IA afeta você. Lei oferece base responsabilidade. IA não é desculpa para discriminação."</strong></blockquote><p>Como você se protege? Se IA afeta você, exija explicação, procure tribunal se discriminado, considere lei como base para reclamação.</p>'},
    {id:'priv', name: 'Privacidade E Vigilância Tecnológica', content:'<h4>Seu Direito À Privacidade Na Era De Vigilância</h4><p>Tecnologia permite vigilância em massa. Governo, empresas podem rastrear você. LGPD oferece proteção, mas vigilância é ameaça crescente. Você deve conhecer riscos.</p><p><strong>Vigilância governamental:</strong> Governo pode monitorar internet (backdoor em WhatsApp, acesso a dados). Lei exige mandado judicial, mas prática é mais livre. Privacidade é risco.</p><blockquote class="tip"><strong>Dica:</strong> Use VPN (Virtual Private Network) para privacidade online. Criptografia end-to-end (WhatsApp) oferece segurança. Proteja sua privacidade ativamente.</blockquote><p><strong>Coleta de dados em massa:</strong> Governo coleta metadados (quem você chama, que sites visita) sem mandado. Privacidade é violada em larga escala. Lei está tentando regular.</p><p><strong>Reconhecimento facial:</strong> Câmeras identificam você pela face. Risco: discriminação, vigilância injustificada. Lei deve regular uso. Brasil está discutindo Lei de Reconhecimento Facial.</p><blockquote class="example"><strong>Exemplo:</strong> Polícia usa reconhecimento facial para identificar você em protesto. Você é preso baseado em face. Sem direito de contestar. Privacidade e liberdade são violados.</blockquote><p><strong>Direito à privacidade é fundamental:</strong> Constituição protege privacidade. Lei cresce oferta proteções. Mas vigilância cresce mais rápido.</p><blockquote class="quote"><strong>Direito à privacidade:</strong> "Privacidade é direito fundamental. Vigilância tecnológica é ameaça. Lei oferece proteção (LGPD, mandado judicial), mas vigilância em massa é preocupação."</strong></blockquote><p>Como você se protege? Criptografe comunicações, use VPN, limite compartilhamento dados, participe em debates sobre regulação vigilância.</p>'},
    {id:'agcy', name: 'Agências Regulatórias: ANPD, ANATEL, CONAR', content:'<h4>Órgãos Que Protegem Você Online</h4><p>Órgãos públicos oferecem proteção no digital. ANPD (privacidade), ANATEL (telecom), CONAR (publicidade). Você pode denunciar violação a esses órgãos.</p><p><strong>ANPD (Autoridade Nacional Proteção Dados):</strong> Órgão que supervisiona LGPD. Você denuncia violação de privacidade. ANPD investiga, multa empresa. Proteção de dados é dever de ANPD.</p><blockquote class="tip"><strong>Dica:</strong> Se empresa viola privacidade, denuncie ANPD (site: www.gov.br/cidadania/pt-br/acesso-a-informacao/lgpd). ANPD é sua proteção.</blockquote><p><strong>ANATEL (Agência Telecom):</strong> Supervisiona telecomunicações (internet, telefone). Denuncia: bloqueio ilegal, velociidade prometida não honrada, vazamento de dados. ANATEL multa provedor.</p><p><strong>CONAR (Conselho Nacional Autorregulamentação Publicitária):</strong> Supervisiona publicidade. Você denuncia publicidade enganosa/abusiva. CONAR examina, pode exigir remoção. Proteção ao consumidor.</p><blockquote class="example"><strong>Exemplo:</strong> Anúncio Facebook é desonesto. Você denuncia CONAR. CONAR examina, acha desonesto, exige remoção. Proteção oferecida.</blockquote><p><strong>Acesso a órgãos:</strong> Todos oferecem denúncia online (formulário simples). Você não precisa advogado. Denúncia é gratuita.</p><blockquote class="quote"><strong>Proteção institucional:</strong> "Órgãos públicos oferecem proteção. ANPD, ANATEL, CONAR supervisionam. Você pode denunciar sem custos. Use essas proteções."</strong></blockquote><p>Como você se protege? Conheça órgão relevante (privacidade = ANPD, telecom = ANATEL, publicidade = CONAR), denuncie violação, acompanhe resultado.</p>'},
    {id:'fut', name: 'Futuro Do Direito Digital: Tendências Para Próximos Anos', content:'<h4>Para Onde Direito Digital Está Caminhando</h4><p>Direito digital está evoluindo rapidamente. Tendências para próximos anos: mais regulação de IA, maior proteção contra vigilância, responsabilidade de plataforma aumentada, direitos de consumidor digital expandidos.</p><p><strong>Lei de Regulação de IA:</strong> Discussão global. Brasil deve ter lei regulando IA. Objetivo: proteger contra viés, garantir explicação, responsabilizar criador por dano.</p><blockquote class="tip"><strong>Dica:</strong> Acompanhe notícias sobre lei IA. Regulação está vindo. Você será afetado por IA em crédito, emprego, saúde.</blockquote><p><strong>Direitos de trabalhador gig-economy:</strong> Uber, iFood, DoorDash: trabalhadores são explorados. Lei está discutindo direitos (férias, 13º, proteção). Futuro oferece mais proteção.</p><p><strong>Responsabilidade aumentada de plataforma:</strong> Redes sociais serão mais responsáveis por conteúdo (discurso ódio, violência, exploração). Futuro é menos liberdade total, mais proteção.</p><blockquote class="example"><strong>Exemplo:</strong> Futuro: Meta é multada R$ 1 bilhão por facilitação discurso ódio. Plataformas têm dever de proteger usuários. Responsabilidade aumenta.</blockquote><p><strong>Direito ao desconectar:</strong> Futuro pode oferecer direito ao desconectar (não trabalhar fora de horário). Tecnologia permite monitoramento 24/7, lei pode limitar.</p><blockquote class="quote"><strong>Evolução contínua:</strong> "Direito digital está em começo. Próximos 10 anos verão mudanças radicais. Você deve acompanhar evolução. Seus direitos estão mudançando."</strong></blockquote><p>Como você se prepara? Acompanhe debates sobre lei digital, participe em consultas públicas, exija proteção de direitos, apoie regulação responsável.</p>'}
  ],
