      content: '<h4>Seu Plano B</h4><p><strong>BATNA</strong>: Best Alternative To Negotiated Agreement. É o melhor você consegue se negociação falha. Se BATNA é forte, você tem poder. Se BATNA é fraco, você cede rápido.</p><blockquote class="tip">BATNA é sua linha de fundo. Qualquer coisa melhor que BATNA, você aceita. Qualquer coisa pior, você rejeita.</blockquote><blockquote class="example">Negocia salário. BATNA: outro offer de R$ 80k de empresa concorrente. Empresa oferece R$ 75k. Você rejeita porque está abaixo BATNA. Empresa oferece R$ 85k. Você negocia em cima porque está acima BATNA.</blockquote><p><strong>Desenvolver BATNA</strong>. Você não espera negociação para achar BATNA. Você desenvolve antes. Entrevista com outras empresas. Pesquisa mercado. Procura alternativas. Quanto melhor BATNA, mais poder você tem.</p><p><strong>Comunicar BATNA subtilmente</strong>. Você não diz "Tenho outra offer de R$ 80k." Péssimo. Você diz "Recebi oportunidades interessantes mas prefiro aqui se terminarmos em número que funciona pra ambos."</p><blockquote class="quote">Melhor negociador é aquele com melhor BATNA. Se você não tem alternativa, está negotiating from weakness.</blockquote>'

      id: 'con1',
      name: 'Tipos de Conflito e Causas Raiz',
      content: '<h4>Entender Conflito</h4><p>Conflito é quando interesses ou valores colidem. <strong>Conflito de valores</strong>: você quer inovação, outro quer estabilidade. <strong>Conflito de interesse</strong>: você quer aumento, empresa quer cortes. <strong>Conflito de processo</strong>: você quer reunião, outro quer email.</p><blockquote class="tip">Maioria de conflitos não é pessoal. É desalinhamento de expectativas ou falta de comunicação.</blockquote><blockquote class="example">Conflito aparente: "Você não respeita meu tempo." Causa raiz: "Você marca meetings sem avisar." Resolução: "Vamos avisar 24h antes."</blockquote><p><strong>Raiz vs sintoma</strong>. Sintoma: pessoas gritando. Raiz: falta de clareza sobre responsabilidade. Você trata raiz, não sintoma.</p><p><strong>Níveis de conflito</strong>: leve (desconforto), moderado (tensão, comunicação fraca), grave (agressão, sabotagem), crítico (violência).</p><blockquote class="quote">Conflito leve é fácil resolver. Deixa virar grave, é impossível. Por isso intervir cedo é importante.</blockquote>'
    },

      content: '<h4>Diferentes Abordagens</h4><p>Você pode: <strong>Evitar</strong> (ignorar), <strong>Acomodar</strong> (ceder tudo), <strong>Competir</strong> (ganhar de qualquer jeito), <strong>Comprometer</strong> (ambos cedem um pouco), <strong>Colaborar</strong> (achar solução que satisfaz ambos).</p><blockquote class="tip">Não existe estilo "certo". Cada um funciona em contexto diferente. Mas colaborar é raro e muito efetivo.</blockquote><blockquote class="example">Avitar: relação não importa, problema não urgente. Acomodar: você quer evitar mais conflito. Competir: você quer ganhar. Comprometer: ambos querem acordo. Colaborar: você quer win-win duradouro.</blockquote><p><strong>Quando usar cada um</strong>: - Evitar: problema pequeno, tempo errado - Acomodar: relacionamento importa mais que ganho - Competir: situação crítica, vencer necessário - Comprometer: ambos têm poder igual - Colaborar: tempo/energia pra resolver bem</p><blockquote class="quote">Melhor resolvedor de conflito é aquele que consegue usar estilo apropriado conforme situação.</blockquote>'
