<!--COURSE:{"name":"Dominando Tráfego Pago","desc":"De zero a gestor de elite. Meta Ads, Google Ads, criativos, escala e muito mais. O curso mais completo do Brasil.","modules":4,"topics":16,"hours":32,"quizzes":4,"category":"Marketing Digital"}-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominando Tráfego Pago — Matheus Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fa;--bg2:#eaecf2;--bg3:#dde1ea;--card:#fff;--brd:#d0d6e0;--brd2:#bac2d0;--pri:#2563eb;--pri2:#3b82f6;--pri3:#93c5fd;--prid:rgba(37,99,235,.07);--dk:#1a1f2e;--dk2:#333b4f;--txt:#4a5468;--txt2:#7a8599;--txt3:#a0aab8;--grn:#10b981;--red:#ef4444;--warn:#f59e0b;--font:'Inter',sans-serif;--serif:'Merriweather',serif;--sh:0 1px 4px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);--sh2:0 4px 20px rgba(0,0,0,.08)}
.dark{--bg:#0d1117;--bg2:#131820;--bg3:#1a202e;--card:#161c28;--brd:#232a3a;--brd2:#2e3750;--dk:#dce2f0;--dk2:#b0b8cc;--txt:#7a88a5;--txt2:#556078;--txt3:#3a455a;--sh:0 2px 8px rgba(0,0,0,.3);--sh2:0 4px 20px rgba(0,0,0,.4)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.7;transition:background .3s,color .3s}
::selection{background:rgba(37,99,235,.15)}
::-webkit-scrollbar{width:5px;height:4px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:9px}
mark.hl{background:rgba(255,245,157,.4);color:inherit;border-radius:1px;padding:0 1px}

/* PORTAL BAR */
.portal-bar{position:fixed;top:0;left:0;right:0;height:30px;background:rgba(5,5,10,.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:10px;z-index:9999;border-bottom:1px solid rgba(75,139,255,.12)}
.portal-bar a{color:#9898b0;font-size:.58rem;font-weight:600;text-decoration:none;padding:3px 7px;border-radius:5px;transition:all .2s;white-space:nowrap}
.portal-bar a:hover{color:#4b8bff;background:rgba(75,139,255,.08)}
.portal-bar .pb-main{color:#4b8bff;font-weight:700}
.portal-bar .pb-plan{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff!important;font-weight:700}
@media(max-width:480px){.portal-bar{gap:4px}.portal-bar a{font-size:.5rem;padding:2px 5px}}

/* HEADER */
.hdr{position:fixed;top:30px;left:0;right:0;height:52px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 12px;z-index:300;gap:8px;transition:background .3s;box-shadow:var(--sh)}
.hdr-logo{font-family:var(--serif);font-size:.8rem;font-weight:900;color:var(--dk);white-space:nowrap;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis}
.hdr-logo span{color:var(--pri)}
.sbox{flex:1;max-width:320px;margin:0 auto;position:relative}
.sbox input{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:7px 12px 7px 32px;color:var(--dk);font-family:var(--font);font-size:.76rem;outline:none;transition:all .2s}
.sbox input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.sbox .sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:.75rem}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-r .hp{font-size:.6rem;color:var(--txt2);white-space:nowrap}
.hdr-r .hp b{color:var(--pri)}
.thm-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--txt2);flex-shrink:0;transition:all .2s}
.thm-btn:hover{border-color:var(--pri);color:var(--pri)}
.gbar{position:fixed;top:82px;left:0;right:0;height:2px;background:var(--bg3);z-index:299}
.gfill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));transition:width .8s}

/* LOGIN */
.lw{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.lb{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:32px 28px;max-width:420px;width:100%;text-align:center;box-shadow:var(--sh2)}
.lb .ll{font-family:var(--serif);font-size:1.3rem;font-weight:900;color:var(--dk);margin-bottom:2px}.lb .ll span{color:var(--pri)}
.lb .ls{font-size:.72rem;color:var(--txt2);margin-bottom:22px;line-height:1.5}
.lb input{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--dk);font-family:var(--font);font-size:.83rem;outline:none;margin-bottom:8px;transition:border .2s;display:block}
.lb input:focus{border-color:var(--pri)}
.lb-btn{width:100%;padding:11px;border:none;border-radius:8px;font-family:var(--font);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--pri);color:#fff;margin-top:6px}
.lb-btn:hover{opacity:.9;transform:translateY(-1px)}
.lb-btn:disabled{opacity:.45;transform:none;cursor:not-allowed}
.lb-btn.secondary{background:var(--bg);color:var(--txt);border:1.5px solid var(--brd)}
.lb-btn.secondary:hover{border-color:var(--pri);color:var(--pri)}
.lb-msg{font-size:.74rem;margin-top:10px;padding:9px 12px;border-radius:8px;line-height:1.5;text-align:left}
.lb-msg.ok{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.lb-msg.er{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.lb-msg.in{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.lb-step-badge{display:inline-block;background:var(--prid);color:var(--pri);font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:14px;letter-spacing:.05em}
.lb-free-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:.65rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px;border:1px solid #a7f3d0}

/* PAYWALL */
.paywall{text-align:center;padding:36px 20px;max-width:420px;margin:0 auto}
.paywall .pw-ico{font-size:3rem;margin-bottom:12px}
.paywall h3{font-family:var(--serif);font-size:1.1rem;font-weight:900;color:var(--dk);margin-bottom:8px}
.paywall p{font-size:.78rem;color:var(--txt2);line-height:1.6;margin-bottom:18px}
.paywall .pw-buy{display:block;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:14px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.85rem;margin-bottom:10px;transition:all .2s;border:none;cursor:pointer;width:100%;font-family:var(--font)}
.paywall .pw-buy:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.35)}
.paywall .pw-wpp{display:block;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;padding:12px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.82rem;transition:all .2s}
.paywall .pw-wpp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
.paywall .pw-lock-items{text-align:left;background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:.75rem;color:var(--txt2)}
.paywall .pw-lock-items div{padding:4px 0;display:flex;align-items:center;gap:8px}

/* HOME */
.home{margin-top:84px;padding:0 0 100px}
.hero{text-align:center;padding:36px 16px 18px}
.hero .ey{font-size:.55rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--pri);margin-bottom:6px}
.hero h1{font-family:var(--serif);font-size:1.9rem;font-weight:900;color:var(--dk);margin-bottom:6px;line-height:1.25}
.hero h1 span{color:var(--pri)}
.hero .sub{font-size:.8rem;color:var(--txt2);max-width:420px;margin:0 auto 18px}
.stats{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;min-width:70px;text-align:center;box-shadow:var(--sh);transition:all .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--pri3)}
.stat b{font-size:1.1rem;color:var(--pri);display:block;font-weight:800}
.stat span{font-size:.47rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* CONTINUE BANNER */
.continue-banner{background:var(--card);border:1.5px solid var(--pri3);border-radius:10px;padding:12px 16px;margin:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);cursor:pointer;transition:all .25s}
.continue-banner:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--sh2)}
.cb-icon{width:36px;height:36px;border-radius:8px;background:var(--prid);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.cb-text{flex:1;min-width:0}
.cb-text h4{font-size:.78rem;font-weight:700;color:var(--dk);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-text p{font-size:.66rem;color:var(--txt2)}
.cb-btn{background:var(--pri);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:var(--font);font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* CAROUSEL */
.cat-sec{padding:10px 0 2px}
.cat-hd{font-size:.84rem;font-weight:700;color:var(--dk);padding:0 20px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cat-hd em{font-size:1rem}
.carousel-wrap{position:relative}
.cat-row{display:flex;gap:10px;overflow-x:auto;padding:4px 20px 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:1px solid var(--brd);background:var(--card);box-shadow:var(--sh2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--dk);z-index:10;transition:all .2s;opacity:0}
.carousel-wrap:hover .car-btn{opacity:1}
.car-btn:hover{border-color:var(--pri);color:var(--pri);transform:translateY(-50%) scale(1.1)}
.car-btn.l{left:4px}.car-btn.r{right:4px}
@media(max-width:768px){.car-btn{opacity:1;width:26px;height:26px;font-size:.72rem}}

/* MODULE CARD */
.cc{min-width:185px;max-width:185px;background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);scroll-snap-align:start;flex-shrink:0;position:relative;box-shadow:var(--sh)}
.cc:hover:not(.locked){transform:scale(1.06);z-index:5;box-shadow:var(--sh2);border-color:var(--pri3)}
.cc.done{border-color:rgba(16,185,129,.25)}
.cc.locked{opacity:.55;cursor:not-allowed}
.cc.locked::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:rgba(0,0,0,.06)}
.cc-top{height:92px;display:flex;align-items:center;justify-content:center;font-size:2.1rem;position:relative}
.cc-num{position:absolute;bottom:2px;right:8px;font-size:2rem;font-weight:900;color:rgba(255,255,255,.15);line-height:1}
.cc-fav{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.25);border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.cc-fav:hover,.cc-fav.on{background:rgba(234,179,8,.75)}
.cc-badge{position:absolute;top:6px;left:6px;background:var(--grn);color:#fff;font-size:.5rem;font-weight:700;padding:2px 7px;border-radius:20px;z-index:2}
.cc-body{padding:8px 10px 10px}
.cc-body h4{font-size:.7rem;font-weight:700;color:var(--dk);line-height:1.25;margin-bottom:2px}
.cc-body p{font-size:.57rem;color:var(--txt3);line-height:1.3}
.cc .bar{height:2px;background:var(--bg3);margin-top:6px;border-radius:1px;overflow:hidden}
.cc .bf{height:100%;background:var(--pri);transition:width .4s}
.cc.done .bf{background:var(--grn)}

/* MODULE VIEW */
.mod-pg{margin-top:84px;max-width:820px;margin-left:auto;margin-right:auto;padding:18px 16px 100px}
.bk{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--txt2);font-family:var(--font);font-size:.7rem;cursor:pointer;padding:4px 0;margin-bottom:10px}
.bk:hover{color:var(--pri)}
.mhdr{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.mhdr .ey{font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pri);margin-bottom:3px}
.mhdr h2{font-family:var(--serif);font-size:1.3rem;font-weight:900;color:var(--dk);margin-bottom:4px;line-height:1.3}
.mhdr .d{color:var(--txt2);font-size:.77rem}
.mnav{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.mnav button{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:5px 10px;color:var(--txt2);font-family:var(--font);font-size:.65rem;font-weight:600;cursor:pointer;transition:all .2s}
.mnav button:hover:not([disabled]){border-color:var(--pri);color:var(--pri)}
.mnav button[disabled]{opacity:.4;cursor:not-allowed}
.pw-bar{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;margin-bottom:12px;box-shadow:var(--sh)}
.pw-bar .pt{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.65rem}
.pw-bar .pt span{color:var(--txt3)}.pw-bar .pt b{color:var(--pri)}
.ppb{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ppf{height:100%;background:var(--pri);border-radius:2px;transition:width .5s}

/* TOPICS */
.tp{background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:7px;transition:all .25s;overflow:hidden;box-shadow:var(--sh)}
.tp:hover{transform:translateX(3px);box-shadow:var(--sh2)}
.tp.dn{border-color:rgba(16,185,129,.18)}
.tph{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer}
.ck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;color:transparent;font-size:.62rem}
.ck:hover{border-color:var(--pri)}
.ck.on{background:var(--grn);border-color:var(--grn);color:#fff;animation:pk .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pk{0%{transform:scale(.5)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.tn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:var(--prid);font-size:.66rem;font-weight:700;color:var(--pri);flex-shrink:0}
.ttt{flex:1;font-weight:600;font-size:.77rem;color:var(--dk);line-height:1.3}
.tp.dn .ttt{color:var(--txt2)}
.ta{color:var(--txt3);transition:transform .2s;font-size:.78rem;flex-shrink:0}
.ta.o{transform:rotate(180deg);color:var(--pri)}
.tbd{padding:8px 12px 14px 52px;display:none;color:var(--txt);line-height:1.85;font-size:.81rem}
.tbd.o{display:block;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.tbd strong{color:var(--pri)}.tbd p{margin-bottom:.8em}

/* FONT SIZE TOOLS */
.tools-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fs-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--txt2);font-family:var(--font);font-size:.7rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fs-btn:hover{border-color:var(--pri);color:var(--pri)}
.fs-lbl{font-size:.63rem;color:var(--txt3)}

/* NOTES */
.notes{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-top:16px;box-shadow:var(--sh)}
.notes label{font-size:.62rem;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.notes textarea{display:block;width:100%;min-height:100px;background:var(--bg);border:1.5px solid var(--brd);border-radius:6px;padding:10px;font-family:var(--font);font-size:.82rem;color:var(--dk);outline:none;resize:none;overflow:hidden;transition:border .2s;line-height:1.7}
.notes textarea:focus{border-color:var(--pri)}
.notes .saved{font-size:.6rem;color:var(--grn);margin-top:4px;opacity:0;transition:opacity .3s}
.notes .saved.show{opacity:1}
.notes-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.notes-actions button{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:5px 11px;font-family:var(--font);font-size:.66rem;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .2s}
.notes-actions button:hover{border-color:var(--pri);color:var(--pri)}

/* HIGHLIGHT */
.hl-float{position:fixed;bottom:80px;right:16px;z-index:500;width:46px;height:46px;border-radius:50%;background:var(--card);border:2px solid var(--brd);color:var(--txt2);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:all .25s}
.hl-float:hover{transform:scale(1.1);border-color:#eab308;color:#a16207}
.hl-float.active{background:#fef9c3;border-color:#eab308;color:#a16207;animation:penPulse 1.5s infinite}
@keyframes penPulse{0%,100%{box-shadow:0 0 0 4px rgba(234,179,8,.15)}50%{box-shadow:0 0 0 8px rgba(234,179,8,.08)}}
.hl-tip{position:fixed;bottom:130px;right:8px;z-index:501;background:#fef9c3;border:1px solid #fde68a;color:#92400e;font-family:var(--font);font-size:.6rem;font-weight:600;padding:4px 9px;border-radius:5px;display:none;white-space:nowrap}
.hl-tip.show{display:block}
body.hl-mode{cursor:crosshair!important}body.hl-mode *{cursor:crosshair!important}

/* QUIZ */
.quiz{background:var(--card);border:2px solid var(--pri3);border-radius:10px;padding:16px;margin-top:16px;box-shadow:var(--sh)}
.quiz h3{font-size:.86rem;font-weight:700;color:var(--dk);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.qq{margin-bottom:13px}
.qq .ql{font-size:.77rem;font-weight:600;color:var(--dk);margin-bottom:5px;line-height:1.4}
.qq .opt{display:flex;flex-direction:column;gap:3px}
.qq .opt label{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--brd);border-radius:6px;cursor:pointer;font-size:.74rem;color:var(--txt);transition:all .2s}
.qq .opt label:hover{border-color:var(--pri);background:var(--prid)}
.qq .opt label.correct{border-color:var(--grn);background:#d1fae5;color:#065f46}
.qq .opt label.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b}
.qq .opt input{accent-color:var(--pri);flex-shrink:0}
.qq .exp{font-size:.68rem;color:var(--txt2);margin-top:4px;font-style:italic;padding:4px 8px;background:var(--bg);border-radius:4px}
.quiz-btn{padding:9px 20px;border:none;border-radius:6px;font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--pri);color:#fff}
.quiz-btn:hover{opacity:.9}
.quiz-btn:disabled{opacity:.4;cursor:not-allowed}
.quiz-result{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:.8rem;font-weight:600;text-align:center}
.quiz-result.pass{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.quiz-result.fail{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.quiz-unlock-badge{display:flex;align-items:center;gap:8px;background:#d1fae5;border:1px solid #a7f3d0;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:.76rem;font-weight:600;color:#065f46}

/* CERT */
.cert-block{background:var(--prid);border:1.5px solid var(--pri3);border-radius:12px;padding:22px;text-align:center;margin-top:20px}
.cert-block h3{font-family:var(--serif);color:var(--pri);font-size:1.1rem;margin-bottom:6px}
.cert-block p{color:var(--txt2);font-size:.75rem;margin-bottom:12px}
.cert-form{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}

<script>
// HIGHLIGHT SYSTEM
let hlData=JSON.parse(localStorage.getItem('tp_hl')||'{}'),hlMode=false;
document.getElementById('hlBtn').addEventListener('click',function(){
  hlMode=!hlMode;
  this.classList.toggle('active',hlMode);
  document.body.classList.toggle('hl-mode',hlMode);
  document.getElementById('hlTip').classList.toggle('show',hlMode);
  if(!hlMode) window.getSelection().removeAllRanges();
});
function applyHighlight(){
  if(!hlMode) return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||sel.toString().trim().length<2) return;
  const range=sel.getRangeAt(0);
  const mark=document.createElement('mark');mark.className='hl';
  try{range.surroundContents(mark)}catch(e){return}
  sel.removeAllRanges();
  const container=mark.closest('.tbd');
  if(!container) return;
  const key=container.dataset.hlkey||'0';
  if(!hlData[key]) hlData[key]=[];
  hlData[key].push(mark.textContent);
  localStorage.setItem('tp_hl',JSON.stringify(hlData));
}
document.addEventListener('mouseup',()=>setTimeout(applyHighlight,10));
document.addEventListener('touchend',()=>setTimeout(applyHighlight,200));
function restoreHL(el,key){
  if(!hlData[key]) return;
  hlData[key].forEach(h=>{
    const idx=el.innerHTML.indexOf(h);
    if(idx>-1) el.innerHTML=el.innerHTML.replace(h,'<mark class="hl">'+h+'</mark>');
  });
}
function showAchievement(msg){
  const t=document.getElementById('achToast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

// ── DATA ─────────────────────────────────────────────────────────────────
const MODS=[
{id:0,icon:'🎯',color:'#2563eb',grad:'linear-gradient(135deg,#2563eb,#3b82f6)',free:true,
title:'Fundamentos do Tráfego Pago',
desc:'Entenda o que é tráfego pago, como funciona o leilão de anúncios e as principais plataformas',
topics:[
{id:0,t:'O que é Tráfego Pago e por que dominar isso muda tudo',c:`<p><strong>Tráfego pago</strong> é a prática de investir dinheiro para exibir anúncios para pessoas específicas na internet. Diferente do tráfego orgânico — que você conquista com conteúdo, SEO e tempo —, o tráfego pago gera resultados imediatos e <strong>completamente escaláveis</strong>.</p><p>Pense assim: com tráfego orgânico, você publica um artigo hoje e ele pode aparecer no Google daqui a 6 meses. Com tráfego pago, você cria um anúncio agora e em minutos centenas de pessoas já podem estar vendo sua oferta.</p><p>O mercado brasileiro de tráfego pago <strong>movimenta bilhões de reais por ano</strong>, e a demanda por gestores qualificados é muito maior que a oferta. Quem sabe gerar esse tráfego tem um dos ativos mais valiosos do mercado digital.</p><p><strong>Por que dominar tráfego pago muda tudo:</strong> Gestores experientes cobram de R$2.000 a R$20.000+ por mês por cliente. Um gestor com 5 clientes fatura R$10.000 a R$100.000 mensais. Esse conhecimento também serve para alavancar o próprio negócio — seja uma loja, um serviço ou um produto digital.</p><p><strong>Ação prática:</strong> Acesse a Biblioteca de Anúncios do Meta (facebook.com/ads/library) e observe 5 anúncios de empresas do seu nicho. Note o gancho visual, o texto e para onde o anúncio leva. Esse hábito é o primeiro passo para se tornar um gestor de elite.</p>`},
{id:1,t:'Como funciona o leilão de anúncios: o segredo por trás do CPM e CPC',c:`<p>Toda vez que uma página é carregada, um <strong>leilão instantâneo</strong> acontece em milissegundos. Plataformas como Meta e Google decidem qual anúncio exibir para aquela pessoa específica naquele momento. Entender esse leilão é o diferencial entre gestores medianos e de elite.</p><p>O leilão não é apenas sobre quem paga mais. O Meta usa uma fórmula com 3 fatores: <strong>1) Seu lance</strong>, <strong>2) Taxa de ação estimada</strong> (probabilidade de alguém converter) e <strong>3) Qualidade do anúncio</strong>. Um anúncio excelente com lance médio pode vencer um anúncio ruim com lance alto.</p><p><strong>CPM</strong> = Custo por Mil Impressões — você paga por cada 1.000 vezes que seu anúncio aparece. Ideal para brand awareness. <strong>CPC</strong> = Custo por Clique — você paga apenas quando clicam. Ideal para tráfego e conversão.</p><p>A chave para ganhar o leilão com menos dinheiro é aumentar o <strong>Quality Score</strong>. No Meta, crie anúncios que as pessoas genuinamente apreciem — com altas taxas de engajamento e baixas taxas de feedback negativo. A plataforma te recompensa com CPMs menores.</p>`},
{id:2,t:'Meta Ads vs Google Ads vs TikTok Ads: quando usar cada plataforma',c:`<p>Escolher a plataforma errada é um dos erros mais caros que um gestor pode cometer.</p><p><strong>Meta Ads (Facebook + Instagram)</strong> — a plataforma mais completa e versátil. Ideal para: descoberta de produtos, e-commerce, geração de leads, serviços locais. Ponto forte: segmentação por comportamento e interesses. Você está interrompendo pessoas — elas não estão necessariamente procurando o que você vende.</p><p><strong>Google Ads</strong> — captura de demanda existente. Quando alguém digita "dentista em São Paulo", essa pessoa JÁ QUER comprar. Ideal para: serviços locais, e-commerce de busca ativa, B2B. Ponto forte: intenção do usuário.</p><p><strong>TikTok Ads</strong> — a plataforma mais barata com maior crescimento. Funciona como o Meta (interrupção), mas com público mais jovem (18-34 anos). O criativo é tudo — vídeos autênticos performam melhor que anúncios polidos.</p><p><strong>Regra de ouro:</strong> Comece com Meta para a maioria dos negócios. Adicione Google Search quando quiser capturar quem já procura. Teste TikTok para públicos jovens com menor custo de aquisição.</p>`},
{id:3,t:'Métricas essenciais: CTR, CPC, CPM, CPA, ROAS e LTV',c:`<p>Um gestor que não domina métricas é como um piloto que não sabe ler os instrumentos do avião.</p><p><strong>CTR</strong> (Click-Through Rate) — % de pessoas que clicaram. Fórmula: (Cliques ÷ Impressões) × 100. CTR acima de 2% é bom para a maioria dos nichos no Meta.</p><p><strong>CPC</strong> (Custo por Clique) — quanto paga em média por clique. Varia por nicho. No Meta: R$0,30 a R$5+. CPC alto não é necessariamente ruim se a conversão compensar.</p><p><strong>CPA</strong> (Custo por Aquisição) — quanto paga por cada conversão. Se seu produto custa R$200 e seu CPA é R$30, você tem margem saudável. Se o CPA supera o valor do produto, você perde dinheiro.</p><p><strong>ROAS</strong> (Return on Ad Spend) — Receita Gerada ÷ Investimento. ROAS 3x = para cada R$1 investido, gerou R$3. A meta mínima viável varia por margem de produto.</p><p><strong>LTV</strong> (Lifetime Value) — valor total que um cliente gera ao longo de toda sua relação com a empresa. Se um cliente compra R$200 agora mas volta 5 vezes, seu LTV é R$1.000 — você pode investir muito mais para adquiri-lo.</p>`},
],
quiz:[
{q:'O que é CPM?',opts:['Custo por Mil Impressões','Clique por Momento','Custo por Mensagem','Clique por Minuto'],ans:0,exp:'CPM = Cost per Mille — custo para exibir seu anúncio 1.000 vezes. "Mille" significa mil em latim.'},
{q:'Qual plataforma captura demanda JÁ EXISTENTE (quem está procurando comprar)?',opts:['Meta Ads','TikTok Ads','Google Search Ads','Pinterest Ads'],ans:2,exp:'Google Search captura quem já digitou uma busca — essas pessoas têm alta intenção de compra imediata.'},
{q:'Se investiu R$500 e gerou R$2.000 em vendas, qual é o ROAS?',opts:['ROAS 1x','ROAS 2x','ROAS 3x','ROAS 4x'],ans:3,exp:'ROAS = Receita ÷ Investimento = R$2.000 ÷ R$500 = 4x. Para cada R$1 investido, gerou R$4 de receita.'},
]},

{id:1,icon:'📘',color:'#7c3aed',grad:'linear-gradient(135deg,#7c3aed,#a855f7)',free:false,
title:'Meta Ads na Prática',
desc:'Domine o Meta Ads: estrutura, pixel, públicos e campanhas de alta conversão',
topics:[
{id:0,t:'Estrutura do Meta Ads: campanha, conjunto de anúncios e anúncio',c:`<p>O Meta Ads tem uma estrutura hierárquica de 3 níveis. Entender essa estrutura é fundamental para criar campanhas organizadas e escaláveis.</p><p><strong>Nível 1: Campanha</strong> — Onde você define o objetivo. Os principais: Reconhecimento (brand awareness, alcance), Consideração (tráfego, engajamento, leads) e Conversão (conversões no site, vendas do catálogo). A regra de ouro: escolha o objetivo mais próximo do resultado final. Se quer vendas, use Conversão.</p><p><strong>Nível 2: Conjunto de Anúncios</strong> — Aqui você define quem, quando e quanto. Quem = segmentação (públicos, localização, idade, gênero). Quanto = orçamento diário ou total. Cada conjunto de anúncios é uma "bolha" de teste — isole variáveis para saber o que funciona.</p><p><strong>Nível 3: Anúncio</strong> — O conteúdo visual e textual que o usuário vê. Formato (imagem, vídeo, carrossel), texto principal, título e CTA. Teste múltiplos anúncios no mesmo conjunto para descobrir qual criativo performa melhor.</p><p><strong>Estrutura recomendada:</strong> 1 campanha → 2-3 conjuntos com públicos diferentes → 2-3 anúncios por conjunto. Isso permite comparar públicos e criativos simultaneamente.</p>`},
{id:1,t:'Pixel do Meta: instalação, eventos e API de Conversões',c:`<p>O Pixel do Meta é o coração de qualquer campanha de performance. É um código JavaScript que envia dados de comportamento dos usuários de volta para o Meta. Sem o Pixel configurado corretamente, você está voando às cegas.</p><p><strong>Como instalar:</strong> No Meta Business Manager → Eventos → Pixels → Criar Pixel. Cole o código no &lt;head&gt; de todas as páginas do site. Se usar WordPress, use o plugin Meta Pixel.</p><p><strong>Eventos Padrão importantes:</strong> PageView (qualquer visita — automático), ViewContent (visitou produto), AddToCart (adicionou ao carrinho), Purchase (comprou — o mais importante!), Lead (preencheu formulário).</p><p><strong>API de Conversões (CAPI)</strong> — com as mudanças de privacidade (iOS 14+, bloqueadores), o Pixel browser perdeu precisão. A CAPI envia dados diretamente do seu servidor para o Meta — sem depender do navegador. Configure ambos (Pixel + CAPI) com deduplicação para máxima cobertura e precisão.</p>`},
{id:2,t:'Públicos: interesses, lookalike e remarketing que convertem',c:`<p>A segmentação de público é onde a magia do Meta Ads acontece. O Meta tem dados comportamentais de bilhões de pessoas.</p><p><strong>Públicos por Interesses</strong> — Segmente com base no que as pessoas curtiram e interagiram. Dica: em vez de interesses óbvios (ex: "fitness"), teste interesses de nicho (ex: marcas concorrentes, revistas especializadas). Esses públicos tendem a ser mais qualificados e menos disputados.</p><p><strong>Públicos Semelhantes (Lookalike)</strong> — O Meta analisa seus melhores clientes e encontra pessoas similares. É o público mais poderoso. Para criar: precisa de uma "fonte" — lista de emails de clientes, pessoas que compraram via Pixel, ou pessoas que interagiram com seu perfil. Mínimo: 1.000 pessoas na fonte.</p><p><strong>Remarketing</strong> — Anuncie para quem já teve contato com sua marca: visitaram o site, assistiram vídeos, interagiram com o perfil, abandonaram o carrinho. Esse é o público mais quente com melhores taxas de conversão e menor CPA.</p>`},
{id:3,t:'Campanhas de conversão: configuração, orçamento e otimização',c:`<p>A campanha de conversão gera vendas e leads mensuráveis. Configurá-la corretamente faz a diferença entre lucro e prejuízo.</p><p><strong>Passo a passo:</strong> 1) Crie com objetivo "Vendas" ou "Leads". 2) Nome com nomenclatura clara (ex: "DT_Conversao_Vendas_Dez2024"). 3) Ative o Orçamento da Campanha Advantage+ para o Meta distribuir automaticamente. 4) Defina pixel, evento de otimização (Purchase ou Lead), público e posicionamento. 5) Orçamento mínimo: R$50/dia para testar.</p><p><strong>Período de aprendizado:</strong> Quando cria uma campanha nova, o Meta entra em "fase de aprendizado" por 7-14 dias. NUNCA faça grandes mudanças durante esse período — reinicia o processo. Aguarde 50 conversões antes de tomar decisões.</p><p><strong>Otimização:</strong> CTR baixo (&lt;1.5%) = problema no criativo ou público. CTR alto mas conversão baixa = problema na landing page. CPA alto mas aceitável = tente aumentar o orçamento gradualmente (máximo 20-30% por vez).</p>`},
],
quiz:[
{q:'Na estrutura do Meta Ads, onde você define o PÚBLICO-ALVO?',opts:['Campanha','Conjunto de Anúncios','Anúncio','Configuração do Pixel'],ans:1,exp:'O público-alvo é definido no Conjunto de Anúncios — o segundo nível da hierarquia do Meta Ads.'},
{q:'O que é um público Lookalike?',opts:['Pessoas que compraram','Pessoas similares aos seus melhores clientes','Pessoas que curtiram a página','Pessoas que clicaram no anúncio'],ans:1,exp:'Lookalike (semelhante) = Meta encontra pessoas com perfil similar à sua base de clientes existente.'},
{q:'Quantas conversões o Meta recomenda aguardar antes de avaliar uma campanha nova?',opts:['10 conversões','25 conversões','50 conversões','100 conversões'],ans:2,exp:'O Meta precisa de ~50 conversões para sair da fase de aprendizado e otimizar com eficiência.'},
]},

{id:2,icon:'🔍',color:'#059669',grad:'linear-gradient(135deg,#059669,#10b981)',free:false,
title:'Google Ads Completo',
desc:'Domine Search, Display, Shopping e YouTube Ads para capturar clientes em todo o funil',
topics:[
{id:0,t:'Google Search Ads: apareça quando o cliente já quer comprar',c:`<p><strong>Google Search Ads</strong> é o formato mais poderoso de captura de demanda. Aparece exatamente quando alguém digita uma palavra-chave relacionada ao que você oferece — falando com pessoas que JÁ QUEREM comprar.</p><p><strong>Tipos de correspondência:</strong> Broad Match (ampla) — o Google exibe para variações e termos relacionados. Maior alcance, menor controle. Phrase Match (frase) — exibido quando a busca contém a frase exata + outras palavras. Exact Match (exata) — apenas para buscas idênticas. Menor alcance, máximo controle.</p><p><strong>Palavras-chave negativas</strong> são tão importantes quanto as positivas. Se você vende tênis premium e alguém pesquisa "tênis barato", você não quer pagar por esse clique. Adicione "barato", "grátis", "tutorial" como palavras negativas para eliminar tráfego irrelevante.</p><p><strong>Estrutura recomendada:</strong> Grupos de anúncios temáticos (um por produto/serviço/intenção). Cada grupo com 10-15 palavras-chave relacionadas e 3 anúncios responsivos.</p>`},
{id:1,t:'Google Display e YouTube Ads: alcance e remarketing visual',c:`<p><strong>Google Display Network</strong> abrange mais de 2 milhões de sites, apps e propriedades do Google. Seus anúncios aparecem como banners enquanto pessoas navegam por outros sites. Ideal para: remarketing, brand awareness em larga escala.</p><p><strong>YouTube Ads:</strong> Skippable In-Stream — podem ser pulados após 5 segundos (você paga se assistirem 30s ou clicarem). Non-Skippable — 15 segundos obrigatórios. Bumper Ads — 6 segundos não puláveis, ideais para brand awareness.</p><p><strong>Estratégia de remarketing visual:</strong> Crie uma sequência — primeiro mostre um vídeo de apresentação (15-30s), depois um vídeo de prova social (depoimentos), depois um vídeo com oferta específica. Quem assistiu tudo tem probabilidade de compra muito maior.</p>`},
{id:2,t:'Google Shopping: o motor das vendas para e-commerce',c:`<p><strong>Google Shopping</strong> é o formato mais eficiente para e-commerce. Quando alguém pesquisa "comprar iPhone 15 128GB", os cards de produtos aparecem no topo da página — com foto, preço e nome da loja. Cliques extremamente qualificados.</p><p><strong>Feed de produtos perfeito:</strong> Título — inclua marca, modelo, cor, tamanho (ex: "Tênis Nike Air Max 270 Masculino Preto 42"). Imagens — fundo branco puro, produto centralizado, alta resolução. Preço — sempre atualizado e igual ao site. GTIN/EAN — o Google prioriza produtos com código de barras.</p><p><strong>Performance Max (PMax)</strong> é a evolução do Shopping — usa todos os canais do Google em uma campanha. Requer pelo menos 50 conversões históricas para funcionar bem. Para iniciantes, comece com Shopping Padrão.</p>`},
{id:3,t:'Quality Score e estrutura de conta para resultados consistentes',c:`<p>O <strong>Quality Score (QS)</strong> é a nota de 1 a 10 que o Google dá para cada palavra-chave. QS alto = posições mais altas e custos menores. QS baixo = você paga mais para aparecer abaixo dos concorrentes.</p><p><strong>Os 3 componentes:</strong> 1) CTR esperado — probabilidade de clicarem no anúncio. 2) Relevância do anúncio — quão relacionado está o texto com a palavra-chave. 3) Experiência da landing page — carregamento rápido, relevância, boa experiência mobile.</p><p><strong>Extensões de anúncio</strong> são subestimadas e grátis: Sitelinks (links para páginas específicas), Callout (destaques como "Frete grátis"), Ligação (número de telefone clicável). Anúncios com extensões têm CTR 10-15% maior.</p><p><strong>Dica de ouro:</strong> Monitore o Relatório de Termos de Pesquisa semanalmente. Você verá exatamente o que as pessoas digitaram antes de clicar. Adicione termos irrelevantes como palavras negativas.</p>`},
],
quiz:[
{q:'Qual correspondência de palavra-chave oferece MAIOR CONTROLE e MENOR ALCANCE?',opts:['Broad Match (Ampla)','Phrase Match (Frase)','Exact Match (Exata)','Modified Broad Match'],ans:2,exp:'Exact Match exibe seu anúncio apenas para buscas idênticas ou muito próximas — máximo controle, mínimo alcance.'},
{q:'O que é o Quality Score do Google Ads?',opts:['Valor do lance máximo','Nota de 1-10 de relevância do anúncio','Orçamento diário','Número de cliques por dia'],ans:1,exp:'Quality Score (1-10) mede CTR esperado, relevância do anúncio e experiência da landing page.'},
{q:'Para qual tipo de negócio o Google Shopping é mais indicado?',opts:['Advocacia','E-commerce com produtos físicos','Geração de leads B2B','Aplicativos mobile'],ans:1,exp:'Google Shopping exibe produtos com foto e preço nos resultados de busca — perfeito para e-commerce de produtos físicos.'},
]},

{id:3,icon:'🚀',color:'#dc2626',grad:'linear-gradient(135deg,#dc2626,#f97316)',free:false,
title:'Escala e Otimização',
desc:'Aprenda a escalar campanhas lucrativas, otimizar criativos e dominar testes A/B com dados reais',
topics:[
{id:0,t:'Como escalar campanhas sem quebrar o que está funcionando',c:`<p>Escalar uma campanha é o momento mais emocionante — e perigoso — do tráfego pago. Muitos gestores destroem campanhas lucrativas tentando escalar rápido demais.</p><p><strong>Por que a escala quebra campanhas?</strong> Quando você aumenta muito o orçamento de uma vez, o algoritmo precisa encontrar mais pessoas. Para isso, expande o público — e pode começar a exibir para pessoas menos qualificadas. Resultado: CPM aumenta, CPC sobe, conversões caem.</p><p><strong>Escala vertical (aumentar orçamento):</strong> Máximo 20-30% a cada 3-5 dias. Aguarde 48-72 horas antes de aumentar novamente. Monitore o CPM — se subir mais de 30%, pause antes de continuar.</p><p><strong>Escala horizontal (duplicar campanhas):</strong> Duplique a campanha com um público diferente (novo lookalike, nova faixa etária, nova localização). Mantém a campanha original estável enquanto testa crescimento em paralelo. É a estratégia mais segura para escala agressiva.</p>`},
{id:1,t:'Otimização de criativos: o que testar e quando trocar',c:`<p>O criativo é responsável por <strong>70-80% dos resultados</strong> de uma campanha de tráfego pago. Você pode ter o melhor público, o melhor pixel e a melhor landing page — se o criativo não parar o scroll, não importa.</p><p><strong>Os 3 elementos críticos:</strong> 1) O gancho (primeiros 3 segundos) — deve parar o scroll com surpresa, curiosidade ou identificação imediata. 2) A proposta de valor — por que seu produto é melhor que a alternativa? 3) O CTA (Call to Action) — diga exatamente o que a pessoa deve fazer. "Compre agora", "Saiba mais", "Garanta sua vaga".</p><p><strong>Quando trocar um criativo?</strong> Sinais de esgotamento: CTR caindo consistentemente por 3+ dias; Frequência acima de 4-5; CPA subindo sem razão aparente. Quando esgota, o algoritmo está cansado — é hora de novos criativos.</p><p><strong>Ciclo de testes:</strong> Tenha sempre 3-5 criativos ativos. Os melhores gestores produzem 8-12 criativos novos por mês para manter o pipeline ativo.</p>`},
{id:2,t:'A/B Testing: como testar variáveis e tomar decisões com dados',c:`<p>Testes A/B são a base do crescimento científico em tráfego pago. Em vez de adivinhar o que funciona, você testa variáveis específicas e toma decisões baseadas em evidências.</p><p><strong>A regra do teste único:</strong> Teste uma variável por vez. Se você muda criativo, texto E público ao mesmo tempo, não saberá o que causou a mudança. Isole cada variável para ter dados limpos e acionáveis.</p><p><strong>O que testar (em ordem de impacto):</strong> 1) Criativo visual (maior impacto). 2) Gancho/headline — primeira linha do texto ou primeiros segundos do vídeo. 3) Público-alvo — diferentes idades, interesses, lookalike de 1% vs 3%. 4) Oferta — preço, parcelamento, bônus, garantia. 5) Landing page — layout, headline, CTA.</p><p><strong>Quando encerrar um teste?</strong> Aguarde pelo menos 3-5 dias e um mínimo de 100 cliques (de preferência 300+) antes de declarar um vencedor. Decisões baseadas em 20-30 cliques são aleatórias, não científicas.</p>`},
{id:3,t:'ROAS, ROI e como saber se sua campanha está dando lucro de verdade',c:`<p>Confundir faturamento com lucro é um dos erros mais graves em tráfego pago. Uma campanha com ROAS de 3x pode estar dando prejuízo se a margem do produto for baixa.</p><p><strong>ROAS vs ROI:</strong> ROAS considera apenas o investimento em anúncios. ROI considera TODOS os custos. ROAS 3x com produto de 40% de margem é lucrativo. ROAS 3x com produto de 20% de margem dá prejuízo.</p><p><strong>Calculando seu ROAS mínimo de breakeven:</strong> Se sua margem é 25%, você pode gastar no máximo 25% da receita em anúncios. Isso significa ROAS mínimo = 1 ÷ 0,25 = <strong>4x</strong>. Abaixo disso, os custos de anúncio superam o lucro.</p><p><strong>Dashboard financeiro semanal:</strong> Todo gestor profissional monitora: investimento total, receita gerada, CPA médio, ROAS por campanha, MER total (Receita Total ÷ Gasto Total em Marketing). Tendências são mais importantes que números isolados — uma queda consistente no ROAS ao longo de 3 semanas é um sinal de alerta muito antes de um único dia ruim.</p>`},
],
quiz:[
{q:'Qual é a forma mais segura de escalar uma campanha lucrativa?',opts:['Triplicar o orçamento de uma vez','Aumentar o orçamento 20-30% a cada 3-5 dias','Criar 10 campanhas novas simultaneamente','Diminuir o público'],ans:1,exp:'Aumentos graduais (20-30%) a cada 3-5 dias permitem que o algoritmo se adapte sem perder eficiência.'},
{q:'Quantos criativos devem estar ativos por conjunto de anúncios?',opts:['1 criativo (o melhor)','2 criativos','3-5 criativos','10+ criativos'],ans:2,exp:'3-5 criativos ativos permite ao algoritmo testar e otimizar automaticamente, mantendo frescor nas campanhas.'},
{q:'Se sua margem de lucro é 25%, qual é o ROAS mínimo para não ter prejuízo?',opts:['ROAS 2x','ROAS 3x','ROAS 4x','ROAS 5x'],ans:2,exp:'ROAS mínimo = 1 ÷ margem = 1 ÷ 0,25 = 4x. Abaixo disso, os custos de anúncio superam o lucro do produto.'},
]},
];

// ── CERTIFICATE ────────────────────────────────────────────────────────────
function genCert(name){
  const cv=document.getElementById('cc'),ctx=cv.getContext('2d');
  cv.style.display='block';
  const g=ctx.createLinearGradient(0,0,1200,0);
  g.addColorStop(0,'#1e3a8a');g.addColorStop(1,'#1d4ed8');
  ctx.fillStyle=g;ctx.fillRect(0,0,1200,848);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;
  ctx.strokeRect(24,24,1152,800);ctx.strokeRect(32,32,1136,784);
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(600,424,150+i*60,0,Math.PI*2);ctx.stroke();}
  ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.font='bold 22px serif';ctx.fillText('MATHEUS ACADEMY',600,90);
  ctx.font='16px serif';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('Certificado de Conclusão',600,120);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(200,140,800,2);
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='15px serif';ctx.fillText('Certificamos que',600,188);
  ctx.fillStyle='#fff';ctx.font='bold 44px serif';ctx.fillText(name||'Aluno',600,248);
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='15px serif';ctx.fillText('concluiu com êxito o curso',600,292);
  ctx.fillStyle='#93c5fd';ctx.font='bold 28px serif';ctx.fillText('Dominando Tráfego Pago',600,338);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(200,368,800,1);
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='14px sans-serif';
  ctx.fillText('4 módulos | 16 aulas | Aprovado em todos os quizzes',600,406);
  ctx.fillText('Data: '+new Date().toLocaleDateString('pt-BR'),600,432);
  const link=document.createElement('a');
  link.download='certificado-trafego-pago.png';
  link.href=cv.toDataURL('image/png');link.click();
  cv.style.display='none';
  showAchievement('🎓 Certificado gerado e baixado!');
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [dark,setDark]=useState(()=>localStorage.getItem('tp_dark')==='1');
  const [auth,setAuth]=useState(()=>{
    try{
      const d=JSON.parse(localStorage.getItem('tp_auth')||'{}');
      const exp=3*365*24*60*60*1000;
      if(d.email&&d.ts&&Date.now()-d.ts<exp) return d;
    }catch{}return null;
  });
  const [lStep,setLStep]=useState(1);
  const [lEmail,setLEmail]=useState('');
  const [lName,setLName]=useState('');
  const [lCity,setLCity]=useState('');
  const [lCode,setLCode]=useState('');
  const [lMsg,setLMsg]=useState(null);
  const [lLoad,setLLoad]=useState(false);
  const [view,setView]=useState('home');
  const [modIdx,setModIdx]=useState(0);
  const [search,setSearch]=useState('');
  const [done,setDone]=useState(()=>lsGet('done',{}));
  const [notes,setNotes]=useState(()=>lsGet('notes',{}));
  const [fav,setFav]=useState(()=>lsGet('fav',{}));
  const [quizPassed,setQuizPassed]=useState(()=>lsGet('qp',{}));
  const [open,setOpen]=useState({});
  const [quizAnswers,setQuizAnswers]=useState({});
  const [quizSubmitted,setQuizSubmitted]=useState({});
  const [certName,setCertName]=useState('');
  const [lastMod,setLastMod]=useState(()=>lsGet('lastMod',null));
  const [fs,setFs]=useState(15);
  const noteTimers=useRef({});

  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
    localStorage.setItem('tp_dark',dark?'1':'0');
  },[dark]);

  // Is module accessible?
  function isUnlocked(i){
    if(i===0) return true; // Módulo 0 sempre livre
    if(!auth) return false; // Módulos 1-3 requerem login
    if(i===1) return true; // Com login, módulo 1 liberado
    return !!quizPassed[i-1]; // Módulos 2+ requerem quiz anterior aprovado
  }

  async function reqAccess(){
    if(!lEmail.includes('@')||!lName.trim()||!lCity.trim()){
      setLMsg({t:'er',m:'Preencha todos os campos (nome, email e cidade).'});return;
    }
    setLLoad(true);
    const msg=encodeURIComponent('🔔 *Acesso — Dominando Tráfego Pago*\n\n👤 '+lName.trim()+'\n📧 '+lEmail.trim()+'\n📍 '+lCity.trim()+'\n📅 '+new Date().toLocaleString('pt-BR')+'\n\nOlá, realizei o pagamento. Por favor gere meu código de acesso!');
    window.open('https://wa.me/'+WHATSAPP+'?text='+msg,'_blank');
    setLStep(2);
    setLMsg({t:'ok',m:'✅ Mensagem enviada! Aguarde seu código de acesso e cole abaixo.'});
    setLLoad(false);
  }

  async function verifyCode(){
    const code=lCode.trim().toUpperCase();
    if(code.length<6){setLMsg({t:'er',m:'Digite o código completo.'});return;}
    setLLoad(true);
    const email=lEmail.trim().toLowerCase();
    const nowToken=Math.floor(Date.now()/60000);
    const [h1,h2]=await Promise.all([genHash(email,nowToken),genHash(email,nowToken-1)]);
    if(code===h1||code===h2){
      const d={email,code,name:lName.trim(),ts:Date.now()};
      localStorage.setItem('tp_auth',JSON.stringify(d));
      setAuth(d);setLMsg(null);
    } else {
      setLMsg({t:'er',m:'Código inválido ou expirado. Solicite um novo código ao administrador.'});
    }
    setLLoad(false);
  }

  function logout(){
    localStorage.removeItem('tp_auth');setAuth(null);
    setLStep(1);setLEmail('');setLCode('');setLMsg(null);
  }

  function goMod(idx){
    if(!isUnlocked(idx)) return;
    setModIdx(idx);setView('mod');setOpen({});
    setQuizAnswers({});
    const m=MODS[idx];
    const last={modIdx:idx,title:m.title};
    setLastMod(last);lsSet('lastMod',last);
    maeCall('maeSetLastModule',CK,CN,idx,m.title,CF);
    window.scrollTo(0,0);
  }

  function toggleDone(mi,ti){
    const key=mi+'_'+ti;
    const nd={...done,[key]:!done[key]};
    setDone(nd);lsSet('done',nd);
    if(!done[key]) showAchievement('✅ Tópico concluído! +10 pontos');
  }

  function toggleFav(mi,e){
    if(e){e.stopPropagation();}
    const nf={...fav,[mi]:!fav[mi]};
    setFav(nf);lsSet('fav',nf);
    maeCall('maeFavoriteToggle',CK,mi,MODS[mi].title,CF);
    showAchievement(nf[mi]?'⭐ Favoritado!':'Removido dos favoritos');
  }

  function saveNote(mi,val){
    const nn={...notes,[mi]:val};
    setNotes(nn);lsSet('notes',nn);
    clearTimeout(noteTimers.current[mi]);
    noteTimers.current[mi]=setTimeout(()=>{
      maeCall('maeAddNoteV3',CK,mi,MODS[mi].title,val);
    },1500);
  }

  function submitQuiz(){
    const q=MODS[modIdx].quiz;
    let correct=0;
    q.forEach((item,i)=>{if(parseInt(quizAnswers[i])===item.ans)correct++;});
    const pass=correct>=Math.ceil(q.length*0.7);
    const ns={...quizSubmitted,[modIdx]:{correct,total:q.length,pass}};
    setQuizSubmitted(ns);
    if(pass){
      const nqp={...quizPassed,[modIdx]:true};
      setQuizPassed(nqp);lsSet('qp',nqp);
      showAchievement('🧠 Quiz aprovado! Próximo módulo desbloqueado!');
    } else {
      maeCall('maeMarkQuizFail',CK,modIdx,MODS[modIdx].title);
    }
  }

  function retryQuiz(){
    const ns={...quizSubmitted};delete ns[modIdx];
    setQuizSubmitted(ns);setQuizAnswers({});
  }

  function modProg(mi){
    const t=MODS[mi].topics.length;
    const d=MODS[mi].topics.filter((_,ti)=>done[mi+'_'+ti]).length;
    return {d,t,pct:Math.round(d/t*100)};
  }

  function totalPct(){
    let total=0,d=0;
    MODS.forEach((m,mi)=>{total+=m.topics.length;m.topics.forEach((_,ti)=>{if(done[mi+'_'+ti])d++;});});
    return total?Math.round(d/total*100):0;
  }

  function scrollRow(id,dir){
    const el=document.getElementById('row_'+id);
    if(el) el.scrollBy({left:dir*210,behavior:'smooth'});
  }

  const searchRes=useMemo(()=>{
    if(!search.trim()) return [];
    const q=search.toLowerCase();const res=[];
    MODS.forEach((m,mi)=>{
      if(m.title.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q))
        res.push({type:'mod',mi,title:m.title,sub:m.desc});
      m.topics.forEach((tp,ti)=>{
        if(tp.t.toLowerCase().includes(q))
          res.push({type:'topic',mi,ti,title:tp.t,sub:m.title});
      });
    });
    return res;
  },[search]);

  const allCompleted=totalPct()===100&&Object.keys(quizPassed).length>=MODS.length;

  // ── HEADER ─────────────────────────────────────────────────────────────
  const Header=()=>(
    <>
    <div className="hdr">
      <div className="hdr-logo" onClick={()=>{setView('home');setSearch('');}}>Tráfego <span>Pago</span></div>
      <div className="sbox">
        <span className="sico">🔍</span>
        <input placeholder="Buscar módulos e tópicos..." value={search}
          onChange={e=>{setSearch(e.target.value);setView(e.target.value?'search':'home');}}/>
      </div>
      <div className="hdr-r">
        {auth&&<span className="hp"><b>{totalPct()}%</b></span>}
        <button className="thm-btn" onClick={()=>setDark(!dark)} title="Alternar tema">{dark?'☀️':'🌙'}</button>
      </div>
    </div>
    {auth&&<div className="gbar"><div className="gfill" style={{width:totalPct()+'%'}}/></div>}
    </>
  );

  // ── LOGIN VIEW ──────────────────────────────────────────────────────────
  if(!auth){
    return (
      <>
      <Header/>
      <div className="lw">
        <div className="lb">
          <div className="ll">Matheus <span>Academy</span></div>
          <p className="ls">Dominando Tráfego Pago — Sistema de Acesso</p>

          {lStep===1&&(
            <>
            <div className="lb-step-badge">📘 MÓDULO 1 GRÁTIS — ACESSE SEM CÓDIGO</div>
            <button className="lb-btn" style={{marginBottom:12,background:'var(--grn)'}} onClick={()=>{
              const guestAuth={email:'guest',name:'Visitante',ts:Date.now(),guest:true};
              localStorage.setItem('tp_auth',JSON.stringify(guestAuth));
              setAuth(guestAuth);
            }}>
              🎯 Acessar Módulo Gratuito
            </button>
            <div style={{textAlign:'center',color:'var(--txt3)',fontSize:'.65rem',margin:'8px 0',position:'relative'}}>
              <span style={{background:'var(--card)',padding:'0 10px'}}>— ou compre para desbloquear tudo —</span>
            </div>
            <input type="text" placeholder="Seu nome completo" value={lName} onChange={e=>setLName(e.target.value)}/>
            <input type="email" placeholder="Seu email" value={lEmail} onChange={e=>setLEmail(e.target.value)}/>
            <input type="text" placeholder="Sua cidade" value={lCity} onChange={e=>setLCity(e.target.value)} onKeyDown={e=>e.key==='Enter'&&reqAccess()}/>
            <button className="lb-btn" onClick={reqAccess} disabled={lLoad}>
              {lLoad?'Aguarde...':'📲 Solicitar Código via WhatsApp'}
            </button>
            {lMsg&&<div className={'lb-msg '+lMsg.t}>{lMsg.m}</div>}
            <div style={{fontSize:'.65rem',color:'var(--txt3)',marginTop:12,lineHeight:1.5}}>
              1️⃣ Compre o curso no Kiwify → 2️⃣ Clique em "Solicitar Código" → 3️⃣ Receba seu código → 4️⃣ Cole abaixo
            </div>
            <a href={KIWIFY_URL} target="_blank" rel="noopener noreferrer"
              style={{display:'block',marginTop:12,background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',padding:'11px',borderRadius:'8px',textDecoration:'none',fontWeight:700,fontSize:'.8rem',textAlign:'center'}}>
              🛒 Comprar Curso Completo — Kiwify
            </a>
            </>
          )}

          {lStep===2&&(
            <>
            <div className="lb-step-badge">📨 STEP 2 — COLE SEU CÓDIGO</div>
            {lMsg&&<div className={'lb-msg '+lMsg.t}>{lMsg.m}</div>}
            <input type="text" placeholder="Cole o código aqui (ex: A1B2C3D4)" value={lCode}
              onChange={e=>setLCode(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&verifyCode()}
              style={{textAlign:'center',letterSpacing:4,fontSize:'1rem',fontWeight:700}}
              maxLength={8}/>
            <button className="lb-btn" onClick={verifyCode} disabled={lLoad}>
              {lLoad?'Verificando...':'✅ Verificar Código'}
            </button>
            <button className="lb-btn secondary" style={{marginTop:8}} onClick={()=>{setLStep(1);setLMsg(null);}}>
              ← Voltar
            </button>
            <div style={{fontSize:'.65rem',color:'var(--txt3)',marginTop:10}}>
              Código inválido? Contate o administrador no WhatsApp.
            </div>
            </>
          )}
        </div>
      </div>
      </>
    );
  }

  // ── SEARCH VIEW ─────────────────────────────────────────────────────────
  if(view==='search') return (
    <>
    <Header/>
    <div className="srw">
      <div className="srt">{searchRes.length} resultado(s) para "{search}"</div>
      {searchRes.map((r,i)=>(
        <div key={i} className="sri" onClick={()=>{if(isUnlocked(r.mi)){goMod(r.mi);setSearch('');}}}>
          <div className="srm">{r.type==='mod'?'MÓDULO':'TÓPICO'} · {MODS[r.mi].title}</div>
          <div className="srtp">{!isUnlocked(r.mi)?'🔒 ':''}{r.title}</div>
        </div>
      ))}
      {searchRes.length===0&&<div style={{color:'var(--txt2)',fontSize:'.8rem',padding:'20px 0'}}>Nenhum resultado encontrado.</div>}
    </div>
    </>
  );

  // ── MODULE VIEW ─────────────────────────────────────────────────────────
  if(view==='mod'){
    const m=MODS[modIdx];
    const {d,t,pct}=modProg(modIdx);
    const allDone=d===t;
    const qResult=quizSubmitted[modIdx];
    const isGuestLocked=auth.guest&&!m.free;

    return (
      <>
      <Header/>
      <div className="mod-pg">
        <button className="bk" onClick={()=>setView('home')}>← Voltar</button>
        <div className="mhdr">
          <div className="ey">{m.icon} Módulo {modIdx+1} de {MODS.length}{m.free&&<span style={{background:'#d1fae5',color:'#065f46',fontSize:'.5rem',padding:'2px 8px',borderRadius:'20px',marginLeft:8,fontWeight:700}}>GRÁTIS</span>}</div>
          <h2>{m.title}</h2>
          <div className="d">{m.desc}</div>
          <div className="mnav">
            {MODS.map((mod,i)=>(
              <button key={i} disabled={!isUnlocked(i)}
                onClick={()=>isUnlocked(i)&&goMod(i)}
                style={i===modIdx?{borderColor:'var(--pri)',color:'var(--pri)'}:{}}>
                {mod.icon} M{i+1} {!isUnlocked(i)&&'🔒'}
              </button>
            ))}
          </div>
        </div>

        {isGuestLocked?(
          // PAYWALL para visitante free tentando acessar módulo pago
          <div style={{background:'var(--card)',border:'1px solid var(--brd)',borderRadius:12,overflow:'hidden',boxShadow:'var(--sh2)'}}>
            <div className="paywall">
              <div className="pw-ico">🔒</div>
              <h3>Conteúdo Premium</h3>
              <p>Desbloqueie este módulo e tenha acesso ao curso completo com todos os 4 módulos, 16 aulas e certificado.</p>
              <div className="pw-lock-items">
                {MODS.filter(m=>!m.free).map((m,i)=>(
                  <div key={i}><span>🔒</span><span style={{color:'var(--dk)',fontWeight:600}}>{m.title}</span></div>
                ))}
              </div>
              <a href={KIWIFY_URL} target="_blank" rel="noopener noreferrer" className="pw-buy">
                🛒 Comprar Curso Completo
              </a>
              <a href={'https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent('Olá! Quero comprar o curso Dominando Tráfego Pago. Data: '+new Date().toLocaleDateString('pt-BR'))}
                target="_blank" rel="noopener noreferrer" className="pw-wpp">
                📲 Falar com Administrador (WhatsApp)
              </a>
            </div>
          </div>
        ):(
          <>
          <div className="pw-bar">
            <div className="pt"><span>Progresso do módulo</span><b>{pct}%</b></div>
            <div className="ppb"><div className="ppf" style={{width:pct+'%'}}/></div>
          </div>

          <div className="tools-row">
            <button className="fs-btn" onClick={()=>setFs(Math.max(12,fs-1))}>A-</button>
            <span className="fs-lbl">{fs}px</span>
            <button className="fs-btn" onClick={()=>setFs(Math.min(22,fs+1))}>A+</button>
          </div>

          {m.topics.map((tp,ti)=>{
            const key=modIdx+'_'+ti;
            const isDone=!!done[key];
            const isOpen=!!open[ti];
            return (
              <div key={ti} className={'tp'+(isDone?' dn':'')}>
                <div className="tph" onClick={()=>setOpen({...open,[ti]:!isOpen})}>
                  <div className={'ck'+(isDone?' on':'')}
                    onClick={e=>{e.stopPropagation();toggleDone(modIdx,ti);}}>
                    {isDone&&'✓'}
                  </div>
                  <div className="tn">{ti+1}</div>
                  <div className="ttt">{tp.t}</div>
                  <div className={'ta'+(isOpen?' o':'')}>▼</div>
                </div>
                {isOpen&&(
                  <div className="tbd o" data-hlkey={key}
                    style={{fontSize:fs+'px'}}
                    dangerouslySetInnerHTML={{__html:tp.c}}/>
                )}
              </div>
            );
          })}

          {/* NOTES */}
          <div className="notes">
            <label>📓 Minhas Anotações — {m.title}</label>
            <textarea
              placeholder="Anote os principais aprendizados deste módulo..."
              value={notes[modIdx]||''}
              onChange={e=>saveNote(modIdx,e.target.value)}
            />
            <div className="notes-actions">
              <button onClick={()=>{
                const blob=new Blob([notes[modIdx]||''],{type:'text/plain'});
                const a=document.createElement('a');
                a.href=URL.createObjectURL(blob);
                a.download='notas-'+m.title.replace(/ /g,'-')+'.txt';a.click();
              }}>📥 Exportar</button>
              <button onClick={()=>{saveNote(modIdx,'');showAchievement('Notas limpas');}}>🗑️ Limpar</button>
              <button onClick={()=>maeCall('maeOpenCourseChat',CK,CN)}
                style={{marginLeft:'auto',background:'#059669',color:'#fff',border:'none'}}>
                💬 Chat IA
              </button>
            </div>
          </div>

          {/* QUIZ */}
          <div className="quiz">
            <h3>🧠 Quiz do Módulo {modIdx+1}</h3>
            {m.quiz.map((q,qi)=>{
              const sub=qResult;
              return (
                <div key={qi} className="qq">
                  <div className="ql">{qi+1}. {q.q}</div>
                  <div className="opt">
                    {q.opts.map((opt,oi)=>{
                      let cls='';
                      if(sub){
                        if(oi===q.ans) cls='correct';
                        else if(parseInt(quizAnswers[qi])===oi&&oi!==q.ans) cls='wrong';
                      }
                      return (
                        <label key={oi} className={cls}>
                          <input type="radio" name={'q'+modIdx+'_'+qi} value={oi}
                            disabled={!!sub}
                            checked={parseInt(quizAnswers[qi])===oi}
                            onChange={()=>!sub&&setQuizAnswers({...quizAnswers,[qi]:oi})}/>
                          {opt}
                        </label>
                      );
                    })}
                    {sub&&<div className="exp">💡 {q.exp}</div>}
                  </div>
                </div>
              );
            })}

            {!qResult?(
              <button className="quiz-btn"
                disabled={Object.keys(quizAnswers).length<m.quiz.length}
                onClick={submitQuiz}>
                {Object.keys(quizAnswers).length<m.quiz.length
                  ?`Responda todas (${Object.keys(quizAnswers).length}/${m.quiz.length})`
                  :'Verificar Respostas'}
              </button>
            ):(
              <>
              <div className={'quiz-result '+(qResult.pass?'pass':'fail')}>
                {qResult.pass
                  ?`🎉 Parabéns! ${qResult.correct}/${qResult.total} corretas! Módulo aprovado!`
                  :`😅 ${qResult.correct}/${qResult.total} corretas. Revise o conteúdo e tente novamente!`}
              </div>
              {qResult.pass&&modIdx<MODS.length-1&&(
                <div className="quiz-unlock-badge">
                  🔓 Módulo {modIdx+2} desbloqueado! Clique em "M{modIdx+2}" acima para continuar.
                </div>
              )}
              {!qResult.pass&&(
                <button className="quiz-btn" style={{marginTop:8,background:'var(--txt2)'}} onClick={retryQuiz}>
                  🔄 Tentar novamente
                </button>
              )}
              </>
            )}
          </div>

          {/* CERTIFICATE */}
          {allCompleted&&(
            <div className="cert-block">
              <h3>🏆 Curso Completo! Parabéns!</h3>
              <p>Você concluiu todos os módulos e passou em todos os quizzes. Gere seu certificado oficial!</p>
              <div className="cert-form">
                <input placeholder="Seu nome completo" value={certName} onChange={e=>setCertName(e.target.value)}/>
                <button className="cert-btn" onClick={()=>genCert(certName)}>📜 Baixar Certificado</button>
              </div>
            </div>
          )}

          {/* NAV */}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:20,gap:8,flexWrap:'wrap'}}>
            {modIdx>0&&isUnlocked(modIdx-1)&&(
              <button className="quiz-btn" style={{background:'var(--bg)',color:'var(--txt)',border:'1px solid var(--brd)'}}
                onClick={()=>goMod(modIdx-1)}>← Módulo Anterior</button>
            )}
            {modIdx<MODS.length-1&&isUnlocked(modIdx+1)&&(
              <button className="quiz-btn" style={{marginLeft:'auto'}} onClick={()=>goMod(modIdx+1)}>
                Próximo Módulo →
              </button>
            )}
          </div>
          </>
        )}
      </div>
      {auth&&!auth.guest&&<button className="logout" onClick={logout}>Sair</button>}
      <button className="chat-btn" title="Chat IA" onClick={()=>maeCall('maeOpenCourseChat',CK,CN)}>💬</button>
      </>
    );
  }

  // ── HOME VIEW ───────────────────────────────────────────────────────────
  return (
    <>
    <Header/>
    <div className="home">
      <div className="hero">
        <div className="ey">📡 Matheus Academy</div>
        <h1>Dominando <span>Tráfego Pago</span></h1>
        <p className="sub">De zero a gestor de elite. Meta Ads, Google Ads, criativos e escala. Conteúdo prático que gera resultado real.</p>
        <div className="stats">
          <div className="stat"><b>4</b><span>Módulos</span></div>
          <div className="stat"><b>16</b><span>Aulas</span></div>
          <div className="stat"><b>32h</b><span>Conteúdo</span></div>
          <div className="stat"><b>{totalPct()}%</b><span>Progresso</span></div>
        </div>
      </div>

      {lastMod&&isUnlocked(lastMod.modIdx)&&(
        <div className="continue-banner" onClick={()=>goMod(lastMod.modIdx)}>
          <div className="cb-icon">▶️</div>
          <div className="cb-text">
            <h4>Continuar: {lastMod.title}</h4>
            <p>Retome de onde parou</p>
          </div>
          <button className="cb-btn">Continuar</button>
        </div>
      )}

      <div className="cat-sec">
        <div className="cat-hd"><em>📚</em> Todos os Módulos</div>
        <div className="carousel-wrap">
          <button className="car-btn l" onClick={()=>scrollRow(0,-1)}>‹</button>
          <div className="cat-row" id="row_0">
            {MODS.map((m,mi)=>{
              const {d,t,pct}=modProg(mi);
              const isDone=d===t&&t>0&&quizPassed[mi];
              const locked=!isUnlocked(mi);
              return (
                <div key={mi} className={'cc'+(isDone?' done':'')+(locked?' locked':'')}
                  onClick={()=>!locked&&goMod(mi)}>
                  <div className="cc-top" style={{background:m.grad}}>
                    <span style={{fontSize:'2.1rem'}}>{m.icon}</span>
                    <span className="cc-num">{mi+1}</span>
                    {m.free&&<span className="cc-badge">GRÁTIS</span>}
                    {!locked&&<button className={'cc-fav'+(fav[mi]?' on':'')}
                      onClick={e=>toggleFav(mi,e)}>{fav[mi]?'⭐':'☆'}</button>}
                  </div>
                  <div className="cc-body">
                    <h4>{m.title}</h4>
                    <p>{locked?'🔒 Requer compra':isDone?'✅ Concluído':`${d}/${t} aulas concluídas`}</p>
                    <div className="bar"><div className="bf" style={{width:pct+'%'}}/></div>
                  </div>
                </div>
              );
            })}
          </div>
          <button className="car-btn r" onClick={()=>scrollRow(0,1)}>›</button>
        </div>
      </div>

      {/* Módulos favoritos */}
      {MODS.some((_,i)=>fav[i])&&(
        <div className="cat-sec">
          <div className="cat-hd"><em>⭐</em> Favoritos</div>
          <div className="carousel-wrap">
            <button className="car-btn l" onClick={()=>scrollRow(1,-1)}>‹</button>
            <div className="cat-row" id="row_1">
              {MODS.filter((_,i)=>fav[i]).map((m)=>{
                const mi=MODS.indexOf(m);
                const {d,t,pct}=modProg(mi);
                return (
                  <div key={mi} className="cc" onClick={()=>goMod(mi)}>
                    <div className="cc-top" style={{background:m.grad}}>
                      <span style={{fontSize:'2.1rem'}}>{m.icon}</span>
                    </div>
                    <div className="cc-body">
                      <h4>{m.title}</h4>
                      <p>{d}/{t} aulas concluídas</p>
                      <div className="bar"><div className="bf" style={{width:pct+'%'}}/></div>
                    </div>
                  </div>
                );
              })}
            </div>
            <button className="car-btn r" onClick={()=>scrollRow(1,1)}>›</button>
          </div>
        </div>
      )}

      {/* Progresso por módulo */}
      <div style={{padding:'10px 20px 20px'}}>
        <div style={{fontSize:'.84rem',fontWeight:700,color:'var(--dk)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
          <em style={{fontSize:'1rem'}}>📊</em> Progresso por Módulo
        </div>
        {MODS.map((m,mi)=>{
          const {d,t,pct}=modProg(mi);
          const locked=!isUnlocked(mi);
          return (
            <div key={mi} style={{background:'var(--card)',border:'1px solid var(--brd)',borderRadius:8,padding:'10px 14px',marginBottom:8,cursor:locked?'not-allowed':'pointer',opacity:locked?.5:1,boxShadow:'var(--sh)',transition:'all .2s'}}
              onClick={()=>!locked&&goMod(mi)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:'.78rem',fontWeight:700,color:'var(--dk)'}}>
                  {m.icon} M{mi+1}: {m.title}
                </span>
                <span style={{fontSize:'.65rem',color:'var(--txt2)'}}>
                  {locked?'🔒':`${pct}% · ${quizPassed[mi]?'✅ Quiz aprovado':'Quiz pendente'}`}
                </span>
              </div>
              <div style={{height:3,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:pct+'%',background:quizPassed[mi]?'var(--grn)':'var(--pri)',transition:'width .5s',borderRadius:2}}/>
              </div>
            </div>
          );
        })}
      </div>

      <div className="footer">
        <div className="footer-links">
          <a href={'https://t.me/matheusacademy'} className="tg" target="_blank" rel="noopener noreferrer">
            📱 Grupo Telegram
          </a>
        </div>
        <div className="footer-brand">© 2026 Matheus Academy · Dominando Tráfego Pago</div>
      </div>
    </div>

    {auth&&!auth.guest&&<button className="logout" onClick={logout}>Sair</button>}
    <button className="chat-btn" title="Chat IA" onClick={()=>maeCall('maeOpenCourseChat',CK,CN)}>💬</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
