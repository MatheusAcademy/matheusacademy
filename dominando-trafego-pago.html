<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominando Tráfego Pago — Matheus Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fa;--bg2:#eaecf2;--bg3:#dde1ea;--card:#fff;--brd:#d0d6e0;--brd2:#bac2d0;--pri:#2563eb;--pri2:#3b82f6;--pri3:#93c5fd;--prid:rgba(37,99,235,.06);--dk:#1a1f2e;--dk2:#333b4f;--txt:#4a5468;--txt2:#7a8599;--txt3:#a0aab8;--grn:#10b981;--red:#ef4444;--warn:#f59e0b;--font:'Inter',sans-serif;--serif:'Merriweather',serif;--sh:0 1px 4px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);--sh2:0 4px 20px rgba(0,0,0,.07);--fs:15}
.dark{--bg:#0d1017;--bg2:#131820;--bg3:#1a202e;--card:#161c28;--brd:#232a3a;--brd2:#2e3750;--dk:#dce2f0;--dk2:#b0b8cc;--txt:#7a88a5;--txt2:#556078;--txt3:#3a455a;--sh:0 2px 8px rgba(0,0,0,.3);--sh2:0 4px 20px rgba(0,0,0,.4)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.7;transition:background .3s,color .3s}
::selection{background:rgba(37,99,235,.15)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:9px}
mark.hl{background:rgba(255,245,157,.3);color:inherit;border-radius:1px;padding:0 1px}

/* HEADER */
.hdr{position:fixed;top:32px;left:0;right:0;height:50px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 10px;z-index:300;gap:6px;transition:background .3s}
.logo{font-family:var(--serif);font-size:.85rem;font-weight:900;color:var(--dk);white-space:nowrap;cursor:pointer;overflow:hidden;text-overflow:ellipsis;min-width:0}
.logo span{color:var(--pri)}
/* HAMBURGER MENU */
.menu-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:3px;z-index:401;flex-shrink:0}
.menu-btn span{display:block;width:18px;height:2px;background:var(--dk);border-radius:2px;transition:all .3s}
.menu-btn.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.menu-btn.open span:nth-child(2){opacity:0}
.menu-btn.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:398;display:none;animation:fi .2s}
.menu-overlay.show{display:block}
.menu-panel{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--card);z-index:399;transition:left .3s ease;overflow-y:auto;box-shadow:4px 0 24px rgba(0,0,0,.15);padding:60px 0 20px}
.menu-panel.show{left:0}
.menu-panel .mp-hdr{padding:0 20px 14px;border-bottom:1px solid var(--brd);margin-bottom:8px}
.menu-panel .mp-hdr h3{font-family:var(--serif);font-size:1.1rem;font-weight:900;color:var(--dk)}
.menu-panel .mp-hdr h3 span{color:var(--pri)}
.menu-panel .mp-hdr p{font-size:.65rem;color:var(--txt2);margin-top:2px}
.menu-cat{padding:6px 20px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--pri);margin-top:6px}
.menu-item{padding:8px 20px;font-size:.78rem;color:var(--txt);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.menu-item:hover{background:var(--prid)}
.menu-item.active{background:var(--prid);color:var(--pri);font-weight:700}
.menu-item.locked{color:var(--txt3);cursor:not-allowed;opacity:.5}
.menu-item .mi-num{font-size:.6rem;font-weight:700;color:var(--txt3);min-width:20px}
.menu-item .mi-check{color:var(--grn);font-size:.7rem}
.sbox{flex:1;max-width:360px;margin:0 auto;position:relative}
.sbox input{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:7px 12px 7px 34px;color:var(--dk);font-family:var(--font);font-size:.8rem;outline:none;transition:all .2s}
.sbox input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.sbox svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);width:14px;height:14px}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-r .hp{font-size:.6rem;color:var(--txt2);white-space:nowrap}
.hdr-r .hp b{color:var(--pri)}
.thm-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s;color:var(--txt2);flex-shrink:0}
.thm-btn:hover{border-color:var(--pri);color:var(--pri)}
.gbar{position:fixed;top:82px;left:0;right:0;height:2px;background:var(--bg3);z-index:299}
.gfill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));transition:width .8s}

/* LOGIN */
.lw{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.lb{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:var(--sh2)}
.lb .ll{font-family:var(--serif);font-size:1.3rem;font-weight:900;color:var(--dk);margin-bottom:2px}.lb .ll span{color:var(--pri)}
.lb .ls{font-size:.72rem;color:var(--txt2);margin-bottom:22px}
.lb input{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--dk);font-family:var(--font);font-size:.84rem;outline:none;margin-bottom:8px;transition:border .2s}
.lb input:focus{border-color:var(--pri)}
.lb-btn{width:100%;padding:11px;border:none;border-radius:8px;font-family:var(--font);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--pri);color:#fff;margin-top:4px}
.lb-btn:hover{opacity:.9;transform:translateY(-1px)}
.lb-btn:disabled{opacity:.4}
.lb-msg{font-size:.75rem;margin-top:10px;padding:8px;border-radius:6px;line-height:1.4}
.lb-msg.ok{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.lb-msg.er{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.lb-msg.in{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.lb-steps{text-align:left;margin-top:14px;font-size:.72rem;color:var(--txt2)}
.lb-steps div{padding:4px 0;display:flex;align-items:center;gap:6px}
.lb-steps .n{width:20px;height:20px;border-radius:50%;background:var(--prid);color:var(--pri);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;flex-shrink:0}
.lb-foot{font-size:.65rem;color:var(--txt3);margin-top:12px}
.logout{position:fixed;bottom:12px;right:12px;background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:5px 12px;font-size:.68rem;color:var(--txt2);cursor:pointer;z-index:301;font-family:var(--font)}

/* HOME */
.home{margin-top:84px;padding:0 0 60px}
.hero{text-align:center;padding:40px 18px 20px}
.hero .ey{font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--pri);margin-bottom:6px}
.hero h1{font-family:var(--serif);font-size:2rem;font-weight:900;color:var(--dk);margin-bottom:6px}
.hero h1 span{color:var(--pri)}
.hero .sub{font-size:.82rem;color:var(--txt2);max-width:460px;margin:0 auto 18px}
.stats{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;min-width:80px;text-align:center;box-shadow:var(--sh);transition:all .25s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--pri3)}
.stat b{font-size:1.2rem;color:var(--pri);display:block;font-weight:800}
.stat span{font-size:.5rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.vsel{display:flex;justify-content:center;gap:5px;margin:14px 0}
.vbtn{padding:5px 14px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--txt2);font-family:var(--font);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .2s}
.vbtn:hover{border-color:var(--pri);color:var(--pri)}
.vbtn.on{background:var(--pri);border-color:var(--pri);color:#fff}

/* NETFLIX ROWS */
.cat-sec{padding:12px 0 4px}
.cat-hd{font-size:.85rem;font-weight:700;color:var(--dk);padding:0 24px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cat-hd em{font-size:1rem}
.cat-row{display:flex;gap:10px;overflow-x:auto;padding:4px 24px 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.cat-row::-webkit-scrollbar{height:0}
.cc{min-width:195px;max-width:195px;background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);scroll-snap-align:start;flex-shrink:0;position:relative;box-shadow:var(--sh)}
.cc:hover{transform:scale(1.06);z-index:5;box-shadow:var(--sh2);border-color:var(--pri3)}
.cc.locked{opacity:.55;pointer-events:none;position:relative}
.cc.locked::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:rgba(0,0,0,.08);animation:lockPulse 2.5s ease infinite}
@keyframes lockPulse{0%,100%{opacity:.7}50%{opacity:1}}
.cc.done{border-color:rgba(16,185,129,.25)}
.cc-top{height:100px;position:relative;overflow:hidden;background:#000}
.cc-icon{width:100%;height:100%}
.cc-icon img{width:100%;height:100%;object-fit:cover}
.cc-num{position:absolute;bottom:2px;right:6px;font-size:2rem;font-weight:900;color:rgba(255,255,255,.15);line-height:1;pointer-events:none}
.cc-body{padding:8px 10px 10px}
.cc-body h4{font-size:.74rem;font-weight:700;color:var(--dk);line-height:1.25;margin-bottom:2px}
.cc-body p{font-size:.58rem;color:var(--txt3);line-height:1.3}
.cc .bar{height:2px;background:var(--bg3);margin-top:6px;border-radius:1px;overflow:hidden}
.cc .bf{height:100%;background:var(--pri);transition:width .4s}
.cc.done .bf{background:var(--grn)}

/* MODULE VIEW */
.mod-pg{margin-top:84px;max-width:800px;margin-left:auto;margin-right:auto;padding:20px 20px 80px;overflow-x:hidden}
.mhdr{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.mhdr .ey{font-size:.54rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pri);margin-bottom:3px}
.mhdr h2{font-family:var(--serif);font-size:1.4rem;font-weight:900;color:var(--dk);margin-bottom:4px}
.mhdr .d{color:var(--txt2);font-size:.8rem}
.mnav{display:flex;gap:5px;margin-top:10px}
.mnav button{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:4px 12px;color:var(--txt2);font-family:var(--font);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .2s}
.mnav button:hover{border-color:var(--pri);color:var(--pri)}
.tools{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tools .fs-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--txt2);font-family:var(--font);font-size:.7rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tools .fs-btn:hover{border-color:var(--pri);color:var(--pri)}
.tools .fs-lbl{font-size:.65rem;color:var(--txt3)}
.pw{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;margin-bottom:12px;box-shadow:var(--sh)}
.pw .pt{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.66rem}.pw .pt span{color:var(--txt3)}.pw .pt b{color:var(--pri)}
.ppb{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ppf{height:100%;background:var(--pri);border-radius:2px;transition:width .5s}

/* TOPICS */
.tp{background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:7px;transition:all .25s;overflow:hidden;box-shadow:var(--sh)}
.tp:hover{transform:translateX(3px);box-shadow:var(--sh2)}
.tp.dn{border-color:rgba(16,185,129,.18)}
.tph{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer}
.ck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;color:transparent;font-size:.65rem;font-weight:700}
.ck:hover{border-color:var(--pri);transform:scale(1.08)}
.ck.on{background:var(--grn);border-color:var(--grn);color:#fff;animation:pk .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pk{0%{transform:scale(.5)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.tn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--prid);font-size:.72rem;font-weight:700;color:var(--pri);flex-shrink:0}
.ttt{flex:1;font-weight:600;font-size:.8rem;color:var(--dk)}.tp.dn .ttt{color:var(--txt2)}
.abtn{width:26px;height:26px;border-radius:50%;border:1px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:.7rem;color:var(--txt3)}
.abtn:hover{border-color:var(--pri);color:var(--pri)}
.abtn.play{border-color:var(--pri);color:var(--pri);background:var(--prid);animation:pul 1.8s infinite}
@keyframes pul{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.12)}50%{box-shadow:0 0 0 5px rgba(37,99,235,0)}}
.ta{color:var(--txt3);transition:transform .2s;font-size:.85rem}.ta.o{transform:rotate(180deg);color:var(--pri)}
.abar{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 60px;background:var(--prid);border-top:1px solid var(--brd);font-size:.65rem;color:var(--txt2);flex-wrap:wrap}
.abar .spd{display:flex;gap:2px}
.abar button{background:var(--card);border:1px solid var(--brd);border-radius:4px;padding:2px 7px;font-family:var(--font);font-size:.58rem;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .15s}
.abar button:hover{border-color:var(--pri);color:var(--pri)}.abar button.on{background:var(--pri);border-color:var(--pri);color:#fff}
.tbd{padding:4px 12px 14px 60px;display:none;color:var(--txt);line-height:1.85;transition:font-size .2s;overflow:hidden}
.tbd.o{display:block;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.tbd strong{color:var(--pri)}

/* NOTES */
.notes{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-top:16px;box-shadow:var(--sh);box-sizing:border-box;max-width:100%}
.notes label{font-size:.65rem;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.notes textarea{display:block;width:100%;min-height:120px;background:var(--bg);border:1.5px solid var(--brd);border-radius:6px;padding:12px;font-family:var(--font);font-size:.85rem;color:var(--dk);outline:none;resize:none;overflow:hidden;transition:border .2s;line-height:1.7;box-sizing:border-box}
.notes textarea:focus{border-color:var(--pri)}
.notes .saved{font-size:.6rem;color:var(--grn);margin-top:4px;opacity:0;transition:opacity .3s}
.notes .saved.show{opacity:1}

/* HIGHLIGHT BTN */
.hl-float{position:fixed;bottom:80px;right:16px;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--card);border:2px solid var(--brd);color:var(--txt2);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:all .25s}
.hl-float:hover{transform:scale(1.1);border-color:#eab308;color:#a16207}
.hl-float.active{background:#fef9c3;border-color:#eab308;color:#a16207;box-shadow:0 0 0 4px rgba(234,179,8,.2),0 4px 16px rgba(234,179,8,.15);animation:penPulse 1.5s infinite}
@keyframes penPulse{0%,100%{box-shadow:0 0 0 4px rgba(234,179,8,.15)}50%{box-shadow:0 0 0 8px rgba(234,179,8,.08)}}
.hl-tip{position:fixed;bottom:134px;right:6px;z-index:501;background:#fef9c3;border:1px solid #fde68a;color:#92400e;font-family:var(--font);font-size:.65rem;font-weight:600;padding:5px 10px;border-radius:6px;display:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hl-tip.show{display:block}
body.hl-mode{cursor:crosshair!important}
body.hl-mode *{cursor:crosshair!important}
body.hl-mode ::selection{background:rgba(255,245,157,.4)}

/* QUIZ */
.quiz{background:var(--card);border:2px solid var(--pri3);border-radius:10px;padding:18px;margin-top:18px;box-shadow:var(--sh)}
.quiz h3{font-size:.9rem;font-weight:700;color:var(--dk);margin-bottom:12px}
.qq{margin-bottom:14px}
.qq .ql{font-size:.8rem;font-weight:600;color:var(--dk);margin-bottom:6px}
.qq .opt{display:flex;flex-direction:column;gap:4px}
.qq .opt label{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--brd);border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--txt);transition:all .2s}
.qq .opt label:hover{border-color:var(--pri);background:var(--prid)}
.qq .opt label.correct{border-color:var(--grn);background:#d1fae5;color:#065f46}
.qq .opt label.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b}
.qq .opt input{accent-color:var(--pri)}
.quiz-btn{padding:10px 20px;border:none;border-radius:6px;font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--pri);color:#fff}
.quiz-btn:hover{opacity:.9}
.quiz-result{margin-top:10px;padding:10px;border-radius:6px;font-size:.8rem;font-weight:600;text-align:center}
.quiz-result.pass{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.quiz-result.fail{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

/* SEARCH */
.srw{max-width:800px;margin:56px auto 0;padding:20px}.srt{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--dk);margin-bottom:12px}
.sri{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.sri:hover{border-color:var(--pri3);transform:translateX(4px)}
.srm{font-size:.52rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--pri);margin-bottom:1px}
.srtp{font-weight:600;color:var(--dk);font-size:.8rem}
.srpv{font-size:.68rem;color:var(--txt3);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bk{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--txt2);font-family:var(--font);font-size:.72rem;cursor:pointer;padding:4px 0;margin-bottom:8px}.bk:hover{color:var(--pri)}

/* CERT */
.cert{background:var(--prid);border:1.5px solid var(--pri3);border-radius:12px;padding:24px;text-align:center;margin:20px 24px}
.cert h3{font-family:var(--serif);color:var(--pri);font-size:1.2rem;margin-bottom:6px}
.cert p{color:var(--txt2);font-size:.78rem;margin-bottom:10px}
.cert-form{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.cert-form input{background:var(--card);border:1.5px solid var(--brd);border-radius:6px;padding:9px 12px;color:var(--dk);font-family:var(--font);font-size:.8rem;width:190px;outline:none}
.cert-btn{background:var(--pri);color:#fff;border:none;padding:9px 22px;border-radius:6px;font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer}
canvas#cc{display:none}
/* FOOTER */
.footer{background:var(--card);border-top:1px solid var(--brd);padding:20px 24px;text-align:center;margin-top:30px}
.footer-links{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--font);font-size:.76rem;font-weight:600;text-decoration:none;transition:all .25s;border:1px solid var(--brd)}
.footer-links .tg{background:#e3f2fd;color:#0088cc;border-color:#bbdefb}.footer-links .tg:hover{background:#bbdefb;transform:translateY(-2px)}
.footer-links .ig{background:linear-gradient(135deg,#fce4ec,#f3e5f5);color:#c2185b;border-color:#f8bbd0}.footer-links .ig:hover{background:linear-gradient(135deg,#f8bbd0,#e1bee7);transform:translateY(-2px)}
.footer-brand{font-size:.65rem;color:var(--txt3);margin-top:6px}
/* CONTINUE BANNER */
.continue{background:var(--card);border:1.5px solid var(--pri3);border-radius:10px;padding:14px 20px;margin:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);cursor:pointer;transition:all .25s}
.continue:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--sh2)}
.continue .c-icon{width:40px;height:40px;border-radius:8px;background:var(--prid);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.continue .c-text{flex:1}
.continue .c-text h4{font-size:.82rem;font-weight:700;color:var(--dk);margin-bottom:1px}
.continue .c-text p{font-size:.7rem;color:var(--txt2)}
.continue .c-btn{background:var(--pri);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap}
/* MODULE SUMMARY */
.mod-summary{background:linear-gradient(135deg,var(--prid),rgba(16,185,129,.04));border:1px solid var(--pri3);border-radius:10px;padding:16px;margin-top:16px}
.mod-summary h3{font-size:.85rem;font-weight:700;color:var(--dk);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mod-summary .ms-item{padding:6px 0;font-size:.78rem;color:var(--txt);border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.mod-summary .ms-item:last-child{border:none}
.mod-summary .ms-icon{color:var(--pri);font-weight:700;flex-shrink:0}
/* ACHIEVEMENT TOAST */
.achievement{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;font-family:var(--font);font-size:.82rem;font-weight:700;padding:10px 24px;border-radius:8px;z-index:400;box-shadow:0 4px 20px rgba(16,185,129,.3);display:none;animation:slideDown .4s ease}
.achievement.show{display:block}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.mb{display:none;background:none;border:none;color:var(--dk);font-size:1.2rem;cursor:pointer}
@media(max-width:768px){.mb{display:block}.hero h1{font-size:1.5rem}.mod-pg{padding:14px 10px 60px}.tbd{padding-left:12px;padding-right:4px}.abar{padding-left:12px}.cat-row{padding:4px 14px 10px}.cat-hd{padding:0 14px}.notes{padding:10px}.notes textarea{padding:10px;min-height:100px}}

/* PORTAL NAV BAR */
.portal-bar{position:fixed;top:0;left:0;right:0;height:32px;background:rgba(5,5,10,.95);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:16px;z-index:9999;border-bottom:1px solid rgba(75,139,255,.15);font-family:'Outfit',sans-serif,system-ui}
.portal-bar a{color:#9898b0;font-size:.62rem;font-weight:600;text-decoration:none;padding:4px 10px;border-radius:6px;transition:all .2s;letter-spacing:.03em}
.portal-bar a:hover{color:#4b8bff;background:rgba(75,139,255,.08)}
.portal-bar a.pb-main{color:#4b8bff;font-weight:700}

/* ── BADGE FLUTUANTE PONTOS MA ── */
.ma-fpts{position:fixed;bottom:18px;right:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:50px;padding:7px 14px;display:none;align-items:center;gap:7px;z-index:9998;box-shadow:0 4px 20px rgba(91,127,255,.45);cursor:pointer;text-decoration:none;transition:transform .2s;border:1px solid rgba(255,255,255,.1)}
.ma-fpts:hover{transform:scale(1.06)}.ma-fpts-icon{font-size:.9rem}.ma-fpts-lv{font-size:.46rem;color:rgba(255,255,255,.65);display:block;text-transform:uppercase;letter-spacing:.05em;line-height:1}.ma-fpts-num{font-size:.85rem;font-weight:900;color:#fff;line-height:1}
.ma-fpts.bump{animation:mafbump .3s ease}@keyframes mafbump{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

  .quiz-block .q-text{font-size:.8rem!important}.quiz-block .q-opt{font-size:.75rem!important;padding:9px 10px!important}
  .cat-row{padding:4px 10px 8px!important}.cat-hd{padding:0 10px!important}

<script>
// HIGHLIGHT SYSTEM - Toggle mode pencil
let hlData=JSON.parse(localStorage.getItem('tp_hl')||'{}');
let hlMode=false;

// Toggle highlight mode on/off
document.getElementById('hlBtn').addEventListener('click',function(){
  hlMode=!hlMode;
  this.classList.toggle('active',hlMode);
  document.body.classList.toggle('hl-mode',hlMode);
  document.getElementById('hlTip').classList.toggle('show',hlMode);
  if(!hlMode) window.getSelection().removeAllRanges();
});

// When in highlight mode, auto-highlight on text selection release
function applyHighlight(){
  if(!hlMode) return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||sel.toString().trim().length<2) return;
  const range=sel.getRangeAt(0);
  const mark=document.createElement('mark');
  mark.className='hl';
  try{range.surroundContents(mark)}catch(e){return}
  sel.removeAllRanges();
  // Save to localStorage
  const container=mark.closest('.tbd');
  if(!container) return;
  const key=container.dataset.hlkey||'0';
  if(!hlData[key]) hlData[key]=[];
  hlData[key].push(mark.textContent);
  localStorage.setItem('tp_hl',JSON.stringify(hlData));
}

document.addEventListener('mouseup',function(){setTimeout(applyHighlight,10)});
document.addEventListener('touchend',function(){setTimeout(applyHighlight,200)});

function restoreHL(el,key){
  if(!hlData[key]) return;
  hlData[key].forEach(h=>{
    const idx=el.innerHTML.indexOf(h);
    if(idx>-1) el.innerHTML=el.innerHTML.replace(h,'<mark class="hl">'+h+'</mark>');
  });
}
function showAchievement(msg){
  const t=document.getElementById('achToast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

{t:'O que é tráfego e por que ele é o oxigênio de qualquer negócio online',c:`Vamos dominar <strong>O que é tráfego e por que ele é o oxigênio de qualquer negócio online</strong>. No contexto de O que é Tráfego Pago, este conhecimento é o que separa gestores medianos de gestores que faturam alto. Cada detalhe aqui foi extraído da prática real — de campanhas que geraram milhões em vendas.<br><br>Na prática, dominar O que é tráfego e por que ele é o oxigênio de qualquer negócio online requer três habilidades: <strong>configuração técnica</strong> (saber mexer na plataforma), <strong>pensamento estratégico</strong> (saber POR QUE fazer cada ajuste) e <strong>interpretação de dados</strong> (saber ler os números para tomar decisões). A maioria dos gestores para na primeira habilidade. Seu objetivo é dominar as três.<br><br>O tráfego pago é a <strong>habilidade mais lucrativa do marketing digital</strong>. Gestores de tráfego ganham de R$3.000 a R$50.000+ por mês, e os melhores faturam centenas de milhares. Por quê? Porque todo negócio precisa de clientes, e tráfego pago é a forma mais rápida e escalável de gerar clientes. Enquanto tráfego orgânico leva meses, tráfego pago gera resultados em horas. Quem domina tráfego pago tem o poder de transformar dinheiro em mais dinheiro.<br><br>O mercado de tráfego pago no Brasil <strong>movimenta bilhões por ano</strong> e a demanda por gestores qualificados só cresce. Cada empresa que nasce precisa de clientes — e tráfego pago é o caminho mais rápido. Ao dominar O que é tráfego e por que ele é o oxigênio de qualquer negócio online dentro de O que é Tráfego Pago, você não está apenas aprendendo uma habilidade — está construindo um ativo que vale muito dinheiro no mercado.<br><br><strong>Dica dos especialistas:</strong> Os melhores gestores de tráfego mantêm um <strong>diário de campanhas</strong> onde anotam cada teste, resultado e aprendizado. Ao final de 6 meses, esse diário vale mais que qualquer curso — porque contém SUA experiência, SEUS dados, SEUS padrões. Comece o seu hoje. Anote o que aprendeu sobre O que é tráfego e por que ele é o oxigênio de qualquer negócio online e como vai aplicar.`},
