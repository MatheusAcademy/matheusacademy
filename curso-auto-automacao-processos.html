      id: 'AUMD',
      name: 'Automatização: Conceito e Impacto',
      content: '<h4>Por que você deveria automatizar</h4><p>Automação é <strong>fazer máquinas faz em o que humanos faria manualmente</strong>. Não é ficção científica—é realidade prática que economiza tempo, dinheiro e sanidade.</p><p>A equação é simples: se você faz algo repetitivo mais de 2 vezes por mês, <strong>vale automatizar</strong>. Se demora 5 minutos e você faz 10 vezes/dia, são 50 minutos economizados. Por mês: 11 horas. Por ano: 132 horas—quase um mês de trabalho!</p><p><strong>Benefícios da automação</strong>: Menos erros (máquinas não se distraem), mais velocidade (máquinas não cansam), mais consistência (sempre da mesma forma), menos trabalho chato (humanos focam no que importa).</p><blockquote class="tip">Dica: Comece pequeno. Automatize uma tarefa, veja resultado, expanda. Grande transformação vem de pequenos passos.</blockquote><p><strong>Onde você pode automatizar</strong>: E-mail (envio, resposta, organização), planilhas (preencher, calcular, gerar relatórios), integrações (dados de um lugar para outro), workflows (approvals, notificações, escalações).</p><p>Você não precisa saber programar. Ferramentas no-code como Zapier e Make permitem construir automação clicando. Se programa, melhor ainda—mais poder.</p><blockquote class="example">Exemplo: Você recebe leads via formulário web. Manualmente você coloca em CRM, envia e-mail boas-vindas, marca follow-up. Automatizado: form envia para CRM, dispara e-mail automático, agenda follow-up. Você vê apenas leads qualificados.</blockquote><p><strong>Resistência à automação</strong>: Alguns acreditam \"máquina não pode fazer isso\" ou \"é muito caro\". Falso em ambos casos. A maioria das tarefas pode ser automatizada. Custo? Mínimo com no-code.</p><blockquote class="quote">\"Se você está fazendo trabalho que máquina pode fazer, você está desperdiçando seu potencial.\"</blockquote><p>Você aprenderá a identificar oportunidades, entender ROI e comunicar valor para convencer outros de automatizar.</p>'

    {
      id: 'OPRT',
      name: 'Oportunidades de Automação',
      content: '<h4>Encontrando o ouro escondido em seus processos</h4><p><strong>Tarefa automável tem características</strong>: repetitiva, regras claras, pouca variação, regras if-then, movimenta dados entre sistemas.</p><p>Pergunte-se: "Essa tarefa poderia ser feita por alguém sem expertise?" Se sim, provavelmente pode ser automatizada. Tarefas que requerem julgamento complexo são difíceis; tarefas mecânicas são fáceis.</p><p><strong>Exemplos de tarefas automáveis</strong>: Preencher formulários, enviar e-mails, calcular valores, copiar dados entre planilhas, renomear arquivos, fazer backups, enviar notificações, criar relatorios, validar dados.</p><blockquote class="tip">Dica: Mantenha log de tarefas repetitivas. Uma vez por semana, revise: "Podia automatizar algo?" Você encontrará ouro.</blockquote><p><strong>Cálculo de ROI</strong>: Tempo gasto por semana × 52 semanas × custo/hora vs custo de automação. Exemplo: 2 horas/semana × 52 × R$50/hora = R$5.200/ano vs R$100 de custo Zapier = payback em 1 semana!</p><p><strong>Processos críticos</strong> devem ser automatizados primeiro: faturamento, relatórios, onboarding de clientes. Aqueles com mais volume e menos variação.</p><blockquote class="example">Exemplo: RH manual processa 50 demissões/ano, cada uma leva 30 min de papelada (enviar checklist, coletar assinaturas, arquivar). 50 × 30 min = 25 horas/ano. Automação economiza isso + garante nada esquecido.</blockquote><p><strong>Documentação é crítica</strong>. Antes de automatizar, documente o processo: passo 1, passo 2, quando fazer excepção. Sem documentação, automação é cega.</p><p><strong>Mudança incremental</strong>: Automatize parte do processo, não tudo. Coleta de dados → automática, mas aprovação → humano. Depois vai expandindo.</p><blockquote class="quote">\"Melhor automatizar 80% de um processo do que não automatizar nada esperando 100%.\"</blockquote><p>Você aprenderá a ser estratégico: automátize primeiro onde impacto é maior, não onde é mais fácil.</p>'

      content: '<h4>Abordagem estruturada para sucesso</h4><p><strong>Automação sem planejamento é caos</strong>. Você cria workflows quebrados, desperdiça tempo, desiste. Com planejamento, sucesso é quase garantido.</p><p><strong>Fase 1: Exploração</strong>. Identifique processos candidatos. Quais fazem perder mais tempo? Quais causam mais erros? Faça lista com 5-10 processos.</p><p><strong>Fase 2: Análise</strong>. Para cada processo, decompõe: quantas etapas? Quanto tempo? Quem faz? Há excepções? Qual é o fluxo exato?</p><p><strong>Fase 3: Priorização</strong>. Classifique por impacto (economia de tempo) vs complexidade. Procure quick wins: alto impacto, baixa complexidade.</p><blockquote class="tip">Dica: Primeiros projetos devem ser rápidos. Sucesso cedo motiva e demonstra valor.</blockquote><p><strong>Fase 4: Desenho</strong>. Desenhe fluxo: o que dispara? Quais passos? Quais decisões? Use ferramentas visuais (Lucidchart, Draw.io).</p><p><strong>Fase 5: Construção</strong>. Crie automação usando ferramenta escolhida (Zapier, Make, código). Teste em sandbox primeiro.</p><p><strong>Fase 6: Teste</strong>. Rode com dados reais mas isolados. Procure bugs. Teste exceções: o que acontece se algo falha?</p><blockquote class="example">Exemplo: Você quer automatizar validação de leads. 1) Exploração: 2h/dia fazendo isso. 2) Análise: 3 passos (checklist, seguir regras, marcar no CRM). 3) Priorização: alto impacto, baixa complexidade. 4) Desenho: fluxo Zapier. 5) Construção: 30 min. 6) Teste: 1h validando. Pronto!</blockquote><p><strong>Fase 7: Deploy</strong>. Liga automação. Monitora primeiros dias. Pronto para intervir se quebrar.</p><p><strong>Fase 8: Manutenção</strong>. Processa mudam. Atualize automação. Mensalmente, revise: ainda funciona bem?</p><blockquote class="quote">\"Planejamento bom economiza 10x o tempo que demora fazê-lo.\"</blockquote><p>Você aprenderá que disciplina em planejamento diferencia amadores de profissionais.</p>'

      id: 'GRUP',

      content: '<h4>Categorias que você encontrará</h4><p><strong>Automação baseada em eventos</strong>: Algo acontece (e-mail chega, formulário enviado, arquivo criado) e dispara ação. "Se novo lead entra, enviar boas-vindas". Mais comum em no-code.</p><p><strong>Automação em batch/schedule</strong>: Roda em horário específico. "Toda sexta-feira à 5pm, calcule relatório de vendas". Útil para tarefas periódicas.</p><p><strong>Automação condicional</strong>: Toma decisões. "Se ticket tem prioridade=alta, escalar para especialista, senão responder template". If-then-else lógica.</p><p><strong>Automação de processamento</strong>: Transforma dados. Valida, formata, limpa, enriquece. Exemplo: recebeu PDF, extrai informações, atualiza banco.</p><blockquote class="tip">Dica: Combinação de tipos acima é comum. Um workflow pode ser: evento (novo lead) → condicional (score lead) → processamento (enriquecer dados) → schedule (enviar em horário ideal).</blockquote><p><strong>RPA (Robotic Process Automation)</strong>: Robô controla computador como humano. Abre aplicativo, digita, clica. Mais poderoso mas complexo. Para último recurso quando não há API.</p><p><strong>Automação de negócio (Business Automation)</strong>: Automação de processos de negócio. Aprovação de compra, onboarding, offboarding. Envolve múltiplos passos e pessoas.</p><blockquote class="example">Exemplo: Automação completa de demissão. 1) Evento: HR aprova demissão. 2) Condicional: qual é o tipo (funcional, justa causa)? 3) Processamento: enviar checklist apropriado. 4) Schedule: configurar laptopoff em T+2 dias. 5) Notificações: enviar para IT, RH, gestor.</blockquote><p><strong>Integração**: Automação que move dados entre sistemas. Novo cliente em CRM → criar usuário em app. Novo pedido em e-commerce → criar fatura no ERP.</p><p><strong>Infraestrutura**: Automação "invisível". Scripts que rodam backups, limpam logs, monitoram saúde do sistema. Menos visível mas crítica.</p><blockquote class="quote">\"Melhor automação é a que ninguém percebe, porque funciona sem problemas.\"</blockquote><p>Você aprenderá a reconhecer tipos e escolher abordagem certa para cada problema.</p>'

    {
      id: 'ZAPD',
      name: 'Zapier: Sua Primeira Automação',
      content: '<h4>Conectar aplicativos sem código</h4><p>Zapier é a ferramenta no-code mais popular. <strong>Conecta mais de 7000 aplicativos</strong>. Você desenha fluxo: evento → ação → resultado.</p><p><strong>Estrutura básica: Trigger (disparo) + Action (ação) + Zap (automação)</strong>. Trigger: algo acontece (novo e-mail, novo formulário, novo arquivo). Action: fazer algo (enviar mensagem, criar registro, atualizar planilha).</p><p><strong>Exemplo prático</strong>: Novo contato chega via formulário web. Zapier detecta. Automaticamente: salva em Google Sheets, envia e-mail, cria reminder. Tudo sem código.</p><blockquote class="tip">Dica: Zapier tem Free tier limitado (100 tarefas/mês) e pago (R$30-50/mês). Comece grátis, veja valor, depois paga.</blockquote><p><strong>Triggers comuns**: Novo item em lista, novo e-mail com label, novo formulário, arquivo criado, webhook. Você escolhe exatamente quando disparar.</p><p><strong>Actions comuns**: Enviar e-mail, criar registro, atualizar planilha, enviar Slack, criar arquivo, chamar webhook. Cadeia múltiplas ações.</p><p><strong>Filters**: Coloque condição entre trigger e action. "Se prioridade = alta, fazer X; senão fazer Y". Poderoso para lógica.</p><blockquote class="example">Exemplo real: E-commerce recebe pedido. Zapier verifica: estoque suficiente? Se sim, marca como processado e envia confirmação. Se não, notifica gerente. Tudo automático, zero humano.</blockquote><p><strong>Formatting**: Transforma dados. Convertendo maiúscula, formatando data, extraindo nome de e-mail. Útil para limpeza.</p><p><strong>Testes**: Sempre teste zap antes de ligar. Zapier oferece dry-run: executa sem fazer mudança real. Veja resultado antes de riscar.</p><blockquote class="quote">\"Zapier é seu assistente robô que trabalha 24/7 e nunca reclama.\"</blockquote><p>Você aprenderá padrões Zapier, conexões comuns, e como resolver problemas.</p>'

      content: '<h4>Quando Zapier é pouco, use Make</h4><p>Make é mais poderosa que Zapier. <strong>Oferece lógica avançada, loops, processamento em batch</strong>. Ideal quando você precisa de "se A então B, senão se C então D".</p><p><strong>Interface visual com nós</strong>. Cada nó = aplicativo ou ação. Você conecta nós desenhando linhas. Fluxo fica visível e fácil debugar.</p><p><strong>Repetições e loops**: Fazer ação múltiplas vezes. Exemplo: novo pedido com 5 itens. Make itera cada item, cria separate shipment. Sem loop, você criaria um.</p><blockquote class="tip">Dica: Make tem preço similiar Zapier mas mais features. Se Zapier é insuficiente, Make vale a pena.</blockquote><p><strong>Processamento em batch**: Coleta múltiplos triggers (ex: 10 e-mails) e processa como lote. Mais eficiente que processar um a um.</p><p><strong>Armazenamento de variáveis**: Guarde dados entre passos. "Total de vendas hoje = X", depois use X em cálculo posterior. Zapier limitado aqui; Make é flexível.</p><p><strong>Operadores matemáticos e textuais**: Some valores, divida, concatene strings. Sem código, mas expressivo.</p><blockquote class="example">Exemplo: Você quer calcular comissão. Vendedor vende R$10k. Comissão = 5%. Sistema: pegue valor vendido (R$10k), multiplique por taxa (0.05), obtenha comissão (R$500). Tudo em Make sem JavaScript.</blockquote><p><strong>Erro handling**: O que fazer se algo falha? Make permite "catch" erros, tentar novamente, enviar notificação de erro.</p><p><strong>Webhooks avançados**: Receba dados de qualquer origem, processe, envie resposta. Mais flexível que integrações diretas.</p><blockquote class="quote">\"Make é Zapier turbinado. Se você ousar, você consegue automações complexas.\"</blockquote><p>Você aprenderá a desenhar fluxos avançados e debugar quando algo quebra.</p>'

    {
      id: 'RPAB',
      name: 'O que é RPA',
      content: '<h4>Robô que controla computador como humano</h4><p><strong>RPA é automação que controla GUI (interface gráfica)</strong>. Robô abre aplicação, digita, clica, lê tela. Como humano, mas sem erros e 24/7.</p><p><strong>Diferença API vs RPA</strong>: API é comunicação direto entre sistemas (novo cliente cria registro). RPA é robô clicando na tela. API é mais rápido; RPA é mais flexível (funciona mesmo sem API).</p><p><strong>Quando usar RPA</strong>: Quando aplicação não tem API (legacy, desktop, velho). Quando requer lógica visual. Quando alternativas são impraticáveis.</p><blockquote class="tip">Dica: RPA é último recurso. Se tem API ou integrição, use. RPA é frágil—quando tela muda, robô quebra.</blockquote><p><strong>Exemplo prático**: Sistema antigo que ninguém tem código. Você precisa ler dados dele. RPA: robô abre, clica em botão, lê tabela, copia em Excel. Todos os dias, automaticamente.</p><p><strong>Ferramentas RPA**: UiPath (mais popular), Automation Anywhere, Blue Prism. Todas têm conceito similar: elementos de tela, ações robô, fluxo lógico.</p><p><strong>Vantagem**: Funciona com qualquer app. Não requer acesso técnico. Rápido implementar se tarefa é simples.</p><blockquote class="example">Exemplo: Gerente de contas recebe planilha Excel com clientes novos. RPA: lê Excel, abre CRM em web, para cada cliente cria registro digitando manualmente cada campo. O que demoraria 2 horas, RPA faz em 20 minutos.</blockquote><p><strong>Desvantagem**: Lento comparado API. Frágil—mudança de UI quebra robô. Caro para ferramentas enterprise. Difícil escalar (robô ocupa "seat", recursos).</p><p><strong>Curva de aprendizado**: Maior que no-code. Você desenha fluxo, mas precisa ensinar robô elementos de tela, tratamento de erro.</p><blockquote class="quote">\"RPA é fogo: poderoso mas perigoso. Use com cuidado.\"</blockquote><p>Você aprenderá quando RPA é solução e quando é overkill.</p>'

    {
      id: 'UIPT',

      content: '<h4>Plataforma RPA mais popular</h4><p>UiPath é Rolls Royce de RPA. <strong>Oferece recorder (clica na tela, grava), designer (desenha fluxo), runtime (executa)</strong>.</p><p><strong>Workflow</strong> em UiPath = fluxograma. Você desenha: iniciar → abrir app → clicar campo → digitar texto → clicar botão → fechar app → fim.</p><p><strong>Selectors**: UiPath identifica elementos de tela por atributos (ID, classe, texto). Robusto quando bem feito, frágil quando app muda.</p><p><strong>Recorder**: Clique em elemento na tela, UiPath registra clique, pode repetir. Rápido, mas gerado code é bagunçado.</p><blockquote class="tip">Dica: Recorder é começar; depois refatore. Code gerado é ineficiente, refatore para ser robusto.</blockquote><p><strong>Variáveis e tipos**: Como programação—strings, números, arrays. Você armazena dados, manipula, passa entre ações.</p><p><strong>Decisões**: If-else. Faz lógica: se campo vazio, preencha default; senão preencha com dado. Fluxo dinâmico, não linear.</p><p><strong>Loops**: Para cada item em lista, faz ação. 100 clientes? Loop executa 100 vezes automaticamente.</p><blockquote class="example">Exemplo: Procedimento fiscal chato. RPA: abre website governo, digita dados empresa, aguarda resultado, salva resultado PDF, envia email. Normalmente 30 min. RPA faz em 3 min, sem erro, toda noite.</blockquote><p><strong>Tratamento de erro**: Exception handling. Página carrega lento? Timeout. Botão não encontrado? Falha. RPA pode retry, alternate flow, log erro.</p><p><strong>Estabilidade**: Screenshot matching, image recognition, OCR (ler texto de imagem). Mais robusto que selectors quando UI variável.</p><blockquote class="quote">\"UiPath torna RPA acessível. Antes era só para especialistas; agora qualquer um pode fazer.\"</blockquote><p>Você aprenderá a builder workflows profissionais em UiPath.</p>'

    {
      id: 'CAOS',
      name: 'Casos de Uso de RPA',
      content: '<h4>Onde RPA realmente brilha</h4><p><strong>RPA é ideal para volume alto + regras claras + UI estável</strong>. Se qualquer um falha, RPA sofre.</p><p><strong>Processamento de contas**: Ler arquivo, validar, integrar em múltiplos sistemas, gerar relatório. RPA automátiza tudo. O que demoraria 5 dias, RPA faz em 5 horas.</p><p><strong>Migração de dados**: Dados em sistema antigo, precisa em novo. Sem export direto? RPA lê velho, escreve novo. Entediante para humano; perfeito para robô.</p><blockquote class="tip">Dica: RPA é excelente para projetos "uma vez" ou "até migração". Depois quando novo sistema está em produção, pode aposentar.</blockquote><p><strong>Relatórios**: Dados espalhados em múltiplas fontes. RPA coleta, consolida, gera relatório, envia email toda sexta. Humano nunca precisa tocar.</p><p><strong>Validação de dados**: Checar se dados em múltiplos sistemas combinam. RPA compara, marca discrepâncias, escalona se encontrado erro.</p><blockquote class="example">Exemplo real: Banco recebe 10.000 solicitações crédito/dia. Cada uma requer múltiplos sistemas checados (crédito, renda, histórico). RPA automátiza validação inicial. O que demoraria 100 pessoas, faz com 5 robôs.</blockquote><p><strong>Publicação de conteúdo**: Dados em planilha, precisa publicar em múltiplos websites. RPA faz: lê linha, preenche form website, publica, próxima linha.</p><p><strong>Testes**: RPA pode rodar testes repetitivos. Abrir app, verificar cada funcionalidade, tomar screenshot, comparar com esperado. Testes automatizados sem Selenium.</p><blockquote class="quote">\"RPA não substitui humanos. Liberta humanos de trabalho chato para fazer trabalho criativo.\"</blockquote><p>Você aprenderá a identificar casos RPA e executar com sucesso.</p>'

    {
      id: 'CFRA',

      content: '<h4>Armadilhas e evolução</h4><p><strong>RPA tem limitações</strong>. Entender elas ajuda você tomar decisões melhores.</p><p><strong>Manutenção**: Quando UI muda, robô quebra. Uma atualização de versão pode quebrar tudo. Manutenção é contínua, custosa.</p><p><strong>Escalabilidade**: Robô usa seat de licença. Quanto mais processos, mais seats, mais caro. API escala infinita com custo linear; RPA é caro exponencialmente.</p><blockquote class="tip">Dica: RPA é bom para 10-100 processos. Acima disso, considere API ou bots mais inteligentes.</blockquote><p><strong>Visão robótica**: OCR lê texto de imagem, mas erra em fonte ruim. Computer vision é melhor, mas mais lento. Escolha trade-off.</p><p><strong>Resiliência**: RPA falha se network está lento, servidor offline, popup inesperado. Precisa retry logic, alertas, escalação humana.</p><blockquote class="example">Exemplo: RPA processa pagamentos. Se banco está fora, RPA falha. Sem retry ou notificação, pagamentos deixam de processar. Infraestrutura para produção requer cuidado.</blockquote><p><strong>Futuro: RPA + AI**: Combinar RPA com machine learning. RPA clica, ML entende contexto. Exemplo: RPA lê documento, ML extrai informações, RPA preenche forms. Mais inteligente.</p><p><strong>Intelligent Automation**: Evolução de RPA. Machine learning + NLP + RPA = robô inteligente que entende contexto, toma decisões.</p><p><strong>Low-code/No-code competição**: Zapier, Make, ferramentas nativas resolvem 80% de casos. RPA resolve 20% restantes. Mercado RPA está ficando niche.</p><blockquote class="quote">\"RPA não é futuro. Futuro é automação inteligente que combina RPA com AI e decision-making.\"</blockquote><p>Você aprenderá a ser estratégico: usar RPA quando apropriado, mas não como bala mágica.</p>'

{
  id: 3,
  name: 'APIs e Integrações',
  free: false,
  topics: [
    {
      id: 'APID',
      name: 'Fundamentos de API',
      content: '<h4>Conversação entre sistemas</h4><p><strong>API (Application Programming Interface) é contrato</strong>. "Envie dados assim, recebe resposta assado". Permite sistemas conversarem.</p><p><strong>HTTP é linguagem web</strong>. GET (pedir dados), POST (enviar dados), PUT (atualizar), DELETE (remover). Simples e universal.</p><p><strong>JSON é formato de dados</strong>. {"nome": "João", "idade": 30}. Legível, estruturado, padrão em APIs modernas.</p><blockquote class="tip">Dica: Toda API modern retorna JSON. Se retorna XML ou outro formato, é aplicação muito antiga.</blockquote><p><strong>Exemplo real de API**: Novo cliente criado em CRM. Sistema envia POST para API Payment: {"cliente_id": 123, "email": "joao@email.com"}. Payment recebe, cria conta, retorna {"status": "success", "account_id": 456}.</p><p><strong>Autenticação**: API protege dados. Token, API key, OAuth. Sistema prova quem é antes API devolver dados.</p><p><strong>Rate limiting**: API permite X chamadas por minuto. Proteção contra abuso. Seu sistema precisa respeitar, fazer retry se limite atingido.</p><blockquote class="example">Exemplo: Você integra com 3 APIsde pagamento. Uma permite 1000 chamadas/dia. Outra 100/segundo. Terceira 10/minuto. Você precisa saber limites, respeitar, não sobrepor.</blockquote><p><strong>Webhooks**: Inverso de API normal. Em vez de você pedir dados, API chama seu endpoint quando evento acontece. "Quando pagamento completou, chame https://seu-site.com/webhook".</p><p><strong>Documentação**: Boa API vem com documentação. Endpoints disponíveis, parâmetros, respostas, exemplos. Sem documentação, impossível integrar.</p><blockquote class="quote">\"API é contrato entre sistemas. Se documentação está errada, contrato está quebrado.\"</blockquote><p>Você aprenderá a ler documentação de API e integrar sem erros.</p>'
    },
    {
      id: 'PYAP',
      name: 'Python e Requisições HTTP',
      content: '<h4>Chamando APIs de código Python</h4><p><strong>Biblioteca requests</strong> em Python torna fácil chamar API. import requests, depois requests.get(url).</p><p><strong>GET simples</strong>: requests.get("https://api.github.com/users/torvalds"). Retorna resposta com status 200 (OK) ou 404 (não encontrado).</p><p><strong>Headers**: Envia autenticação, tipo de conteúdo. {"Authorization": "Bearer TOKEN", "Content-Type": "application/json"}.</p><p><strong>Parâmetros**: requests.get(url, params={"search": "python", "limit": 10}). Constrói query string automaticamente.</p><blockquote class="tip">Dica: Sempre trate erros. Rede falha, API pode estar down. response.raise_for_status() lança exceção se status >= 400.</blockquote><p><strong>POST com dados**: requests.post(url, json={"nome": "João"}, headers=headers). Envia dados estruturados.</p><p><strong>Timeout**: requests.get(url, timeout=5). Não fica esperando infinitamente se servidor lento.</p><blockquote class="example">Exemplo: Integrar com API de meteorologia. Seu código: 1) Pega localização usuário. 2) Chama API com lat/lon. 3) Parseia JSON, extrai temperatura. 4) Mostra user. Tudo em 5 linhas Python.</blockquote><p><strong>Autenticação**: Token em header ou API key em parâmetro. requests.get(url, headers={"Authorization": "Bearer MEUTOKEN"}).</p><p><strong>Tratamento de resposta**: response.json() parseia JSON. response.status_code checa se sucesso. response.text é resposta raw.</p><blockquote class="quote">\"Python + requests = acesso a milhões de APIs em 5 linhas.\"</blockquote><p>Você aprenderá padrões comuns: paginação, retry, batch requests.</p>'
    },
    {
      id: 'INTG',
      name: 'Patterns de Integração',
      content: '<h4>Patterns que funcionam</h4><p><strong>Sync real-time**: Quando evento acontece, chama API imediatamente. Novo pedido em e-commerce → cria shipment no WMS imediatamente. Lento se API lenta.</p><p><strong>Async em background**: Evento adiciona job em fila. Worker processa depois. Novo pedido entra na fila → worker pega, chama API. Rápido do ponto de vista usuário.</p><blockquote class="tip">Dica: Async é sempre melhor se houver tolerância de delay. Novo pedido? OK esperar 5 minutos antes shipment criado. Mas payment rejeita? Síncrono imediatamente.</blockquote><p><strong>Batch processing**: Coleta múltiplos eventos, processa em lote. 100 pedidos de ontem → arquivo, envia de uma vez para API. Menos chamadas, mais eficiente.</p><p><strong>Webhooks** (push) vs polling (pull): Webhooks: API chama seu código quando evento. Polling: seu código pergunta API periodicamente "tem coisa nova?". Webhooks melhor, mas requer infraestrutura.</p><p><strong>Retry logic**: Falha primeira vez? Tenta novamente após 5 segundos. Exponential backoff: 5s, 10s, 20s, 40s. Protege contra falhas transitórias.</p><blockquote class="example">Exemplo: Integração com gateway pagamento. Seu código chama API para processar. Se timeout, requer automaticamente. Se recusa (código 429—rate limited), espera 60s, requer. Se status 500 server, expo backoff.</blockquote><p><strong>Monitoring e alertas**: Falhas de integração devem disparar alerta. Dashboard mostra: "API X falhou 5 vezes nos últimos 30min". Você age antes que problema escale.</p><p><strong>Circuit breaker**: Se API está broken (muitas falhas), STOP enviando requests. Espera recover, depois tenta novamente. Protege API de DoS acidental.</p><blockquote class="quote">\"Integração boa é invisível. Falha, é problema para todos.\"</blockquote><p>Você aprenderá a desenhar integrações resilientes que sobrevivem falhas.</p>'
    },
    {
      id: 'MNTG',
      name: 'Monitoramento e Troubleshooting',
      content: '<h4>Mantendo integrações vivas</h4><p><strong>Logs são amigos</strong>. "Chamei API X às 14:32, resposta 200, dados salvos". Sem logs, impossível debugar depois.</p><p><strong>Métricas**: Quantas chamadas por hora? Taxa de erro? Latência? Painel com gráficos mostra saúde da integração. Se latência sobe 10x, problema.</p><p><strong>Alertas**: Quando métrica sai do esperado, notifica. "Taxa erro subiu acima 5%", "Latência > 5s", "API retornou 500 por 5 min". Você age antes usuários reclamarem.</p><blockquote class="tip">Dica: Alertas com ruído são piores que sem alertas. Configure threshold inteligente. Alerta se status 500 por 5 min, não para cada erro.</blockquote><p><strong>Testes**: Integração crítica? Teste health check periódico. Seu código: "Ei API, tá viva?" API: "Sim, tá tudo bem." Se resposta falha, alerta.</p><p><strong>Versionamento de API**: API muda (remove campo, muda formato). Versão nova: /v1/, /v2/. Seu código usa /v1/ até que está pronto para /v2/. Sem versioning, breakage.</p><blockquote class="example">Exemplo: API Payment muda status "completed" para "success". Seu código escreve log "completed". Depois para de funcionar. Se tivesse teste, detectaria em minutos. Sem teste, detecta quando usuário reclama.</blockquote><p><strong>Documentation de erro**: API retorna erro. Você registra: "Chamei com parâmetros X, recebi erro Y. Significa Z." Ajuda futuros debugs.</p><p><strong>Graceful degradation**: Se API cai, app não cai. Se possível, cache dados, retorna last known state. "Não tenho dados atualizados, mas tenho de ontem."</p><blockquote class="quote">\"Integração quebrada afeta todo mundo. Proatividade em monitoring economiza crises.\"</blockquote><p>Você aprenderá a ser paranoia saudável: sempre prepare pior cenário.</p>'
    }

    {
      id: 'AIAT',
      name: 'IA em Automação',
      content: '<h4>Quando máquinas entendem contexto</h4><p><strong>IA muda automação de regras para inteligência</strong>. Em vez de "se X então Y", IA diz "dada situação, qual é melhor ação?"</p><p><strong>Exemplo prático**: Automação comum: "Se priority=alta, escalar para especialista". IA: analisa conteúdo ticket, histórico cliente, capacidade team, urgência → escolhe melhor rota. Mais inteligente.</p><p><strong>NLP (Natural Language Processing)**: Computador entende texto. Email chega, IA extrai: assunto, urgência, tipo de problema, cliente. Depois roteia automaticamente.</p><blockquote class="tip">Dica: IA não é sempre melhor. Se regra simples funciona, não complique. IA brilha quando contexto é complexo.</blockquote><p><strong>Machine Learning**: Treina em histórico. Antigamente, 100 suportes tiveram resolução rápida. IA aprende padrão e prediz qual ticket levará tempo.</p><p><strong>LLM (Large Language Models)**: GPT, Claude. Texto extraordinário. Sumarizando tickets, gerando respostas, extraindo informações. Game-changer para automação.</p><blockquote class="example">Exemplo: Support recebe 1000 emails/dia. Antigamente, humanos liam cada um. Agora: 1) LLM lê email, classifica (billing, técnico, feedback). 2) Se técnico, extrai issue. 3) Se já foi resolvido antes, cria resposta automática. 4) Se novo, escala especialista. 80% resolvido automaticamente.</blockquote><p><strong>Computer Vision**: Imagem entra, IA analisa. Foto de dano em carro → estima custo reparo. Foto de produto → valida qualidade. Automação de visual.</p><p><strong>Alucinações**: LLMs às vezes inventam fatos. "Qual é o preço?" LLM: "R$500" (mentira, nunca viu esse produto). Mitigação: usar em tarefas onde erro é aceitável, ou validar com humano.</p><blockquote class="quote">\"IA em automação é potência bruta com cuidado. Implementação cuidadosa multiplica valor.\"</blockquote><p>Você aprenderá a combinar IA com automação tradicional.</p>'

      content: '<h4>Superpoderes de linguagem</h4><p><strong>GPT é API que você envia texto, recebe texto de volta</strong>. Simples, mas poderoso.</p><p><strong>Exemplos de uso**: Sumarizar artigo. Classificar email. Gerar resposta. Extrair informações de PDF. Traduzir. Tudo no mesmo modelo.</p><blockquote class="tip">Dica: Prompt importa. "Resuma artigo" vs "Resuma artigo em 3 bullets para vendedor de software" produz resultados diferentes. Detalhe seu request.</blockquote><p><strong>Estrutura básica**: 1) Input = texto ou instrução. 2) Model = qual modelo (GPT-3.5, GPT-4, Claude). 3) Output = resposta. 4) Custa = por token (palavra fraccionário).</p><p><strong>Chain of Thought**: Peça modelo pensar step-by-step. "Pense, depois responda." Resulta em respostas melhores.</p><p><strong>Few-shot learning**: Dê exemplos. "Aqui está email spam, aqui está email válido. Classifique: [novo email]". Modelo aprende do padrão.</p><blockquote class="example">Exemplo: Você quer extrair NF (nota fiscal) de PDF. Prompt: "Aqui está PDF, extraia: número NF, data, cliente, valor total. Retorne JSON." LLM lê PDF, retorna JSON estruturado. Depois seu código valida, integra com ERP. Pronto!</blockquote><p><strong>Moderation**: Validar se resposta é apropriada antes enviar. Exemplo: LLM gerou email um pouco agressivo. Moderation flageia. Você revisa antes enviar.</p><p><strong>Custo**: GPT é pay-as-you-go. Milhão de tokens = R$10. Barato comparado valor gerado. Mas volume alto = custo alto. Otimize prompts para usar menos tokens.</p><blockquote class="quote">\"LLM é como oracle. Você faz pergunta certa, obtém resposta extraordinária.\"</blockquote><p>Você aprenderá prompt engineering: como pedir para obter melhor resposta.</p>'

      content: '<h4>Escalando automação com segurança</h4><p><strong>Automação pessoal é fácil. Automação empresarial requer governança, segurança, compliance</strong>.</p><p><strong>Conformidade legal**: LGPD, GDPR regulam dados pessoais. Automação que manipula dados precisa estar em conformidade. Exemplo: automação que envia email precisa de consentimento prévio.</p><p><strong>Auditoria**: Empresa precisa saber quem, quê, quando, onde. Cada automação deve ter logs. "Quem criou? Quando? Mudou quando?" Rastreabilidade é essencial para compliance.</p><blockquote class="tip">Dica: Em empresa, segurança é não-negociável. Automation que cria acesso temporário → logs detalhados. Sempre.</blockquote><p><strong>Aprovações e governança**: Antes criar automação, precisa de aprovação (IT, compliance, negócio). Documentar: por quê, como, riscos, mitigações.</p><p><strong>Change management**: Quando automação muda processo, pessoas precisam se adaptar. Comunicação, treinamento, FAQ. "Como faço se automação falha?"</p><blockquote class="example">Exemplo: Empresa implementa automação de RFQ (request for quote). Comprador preenche form, automação roteia, negocia, confirma ordem. Mudança: 2 dias para 2 horas. Mas pessoal desconfortável. Solução: workshop, documentação, suporte por 2 semanas. Depois: felizes.</blockquote><p><strong>Métricas de sucesso**: ROI (economiza X). Qualidade (menos erros). Velocidade (reduz tempo). Satisfação (mais feliz). Medir é crucial.</p><p><strong>Sustentabilidade**: Automação que quebra todo mês = problema. Você precisa manutenção, documentação, transferência de conhecimento. Quando criador sai, sistema não morre.</p><blockquote class="quote">\"Automação que ninguém entende é débito técnico ticking.\"</blockquote><p>Você aprenderá a vender automação para executivos, implementar com elegância.</p>'

      content: '<h4>Erros comuns e lições</h4><p><strong>Pitfall 1: Automatizar processo quebrado</strong>. Você automatiza lixo, produz lixo rápido. Antes de automatizar, melhore processo. Remova etapas desnecessárias, simplifique.</p><blockquote class="tip">Dica: Questione cada etapa. "Por quê essa etapa existe? Precisa mesmo?" Após eliminar desnecessário, automatiza o essencial.</blockquote><p><strong>Pitfall 2: Sem testes, deploy direto em produção</strong>. Automação quebra, dados corruptam, clientes reclamam. Sempre teste em sandbox primeiro com dados reais.</p><p><strong>Pitfall 3: Ninguém entende quando quebra</strong>. Você criou, você sabe. Quando sai? Caos. Documente: o quê faz, por quê, como testar, como debugar.</p><p><strong>Pitfall 4: Escalamento sem preparação</strong>. Piloto funciona com 10 usuários. Deploy para 1000 e sistema satura. Planeja infra antes de escalar.</p><blockquote class="example">Exemplo: Automação de email em Zapier. Piloto: 10 emails/dia. Zapier OK. Rollout: 1000 emails/dia. Zapier chega no limite, começa fila de espera. Emails atrasam horas. Solução: build sistema in-house com Bull queue. Deveria ter planejado desde início.</blockquote><p><strong>Pitfall 5: Dependência em ferramentas externas</strong>. Zapier pode mudar preço, ficar down. Plano B: qual alternativa? Pode rapidamente migrar para outra ferramenta? Ou em-house?</p><p><strong>Pitfall 6: Não medir sucesso</strong>. Você automatzou, mas ajudou? ROI positivo? Se não mede, não sabe. Medir é essencial.</p><blockquote class="quote">\"Não planeja, planeja falhar. Falha em automação é caros, cascata em negócio.\"</blockquote><p>Você aprenderá a antecipar problemas, mitigá-los.</p>'
    },

      content: '<h4>Mantendo automação viva</h4><p><strong>Automação não é "criar e esquecer"</strong>. Requer manutenção ativa.</p><p><strong>Monitoramento**: Diariamente, verificar: automação está rodando OK? Há erros frequentes? Velocidade está aceitável?</p><p><strong>Logs e alertas**: Toda execução deve logar. Formato: "executou em 30seg", "falhou em validação", "timeout conectando API". Se erro frequente, alerta.</p><p><strong>Testes de saúde**: Periodicamente, teste automação com dados reais. "Ainda funciona?" Se algo mudou (API versão, campos), detecta rápido.</p><blockquote class="tip">Dica: Automação que silenciosamente falha é pior que não automatizar. Configure alertas fortes: email, Slack, PagerDuty se erro crítico.</blockquote><p><strong>Documentação viva**: Não documento esquecido em wiki. Mantenha atualizado. Quando automação muda, documento muda. Versione: "v1.2 - adicionado validação de email".</p><p><strong>Backup e recovery**: Se automação falhar, quem salva? Manual process de fallback documentado. Exemplo: se integração Stripe cai, sales chama clientes por telefone.</p><blockquote class="example">Exemplo de manutenção falha: Automação de faturamento rodando 2 anos. API muda silenciosamente. Automação continua rodando (não quebra), mas dados começam com falha. 3 meses depois, empresa descobre: R$1M em faturas erradas. Lição: teste periódico (mensal) teria detectado em dias.</blockquote><p><strong>Performance tuning**: Automação que demorava 1seg agora demora 10seg? Investigate. Cache dados? Parallelize? DB índice?</p><p><strong>Feedback loop**: Quando automação falha, aprender. "Qual foi a raiz?" Fix não só sintoma mas raiz. Exemplo: arquivo sempre vinha quebrado. Não é Zapier que deve validar mais, é origem que deve enviar bem.</p><blockquote class="quote">\"Automação é asset, não set-and-forget. Cuide dela como cuida de código em produção.\"</blockquote><p>Você aprenderá responsabilidade de produção.</p>'
    },
    {
      id: 'EVOL',
      name: 'Evolução e Inovação',
      content: '<h4>Do hoje para o amanhã</h4><p><strong>Automação de hoje é baseline de amanhã</strong>. O que wow hoje, normal amanhã. Continue inovando.</p><p><strong>Feedback de usuários**: "Gostava de também automatizar X". Priorize baseado em valor. Fácil win = rápido. Grande impacto = espera.</p><p><strong>Tecnologia nova**: LLM aparecem, RPA melhora, ferramentas no-code evoluem. Periodicamente revisar: há ferramenta melhor? ROI positivo migrar?</p><blockquote class="tip">Dica: Não persiga tecnologia por tecnologia. Apenas se resolve problema real melhor ou mais barato.</blockquote><p><strong>Consolidação**: Você tem 10 automações em Zapier, 5 em Make, 3 em python scripts. Consolidar em plataforma única? Trade-off: risco vs simplicidade. Considere.</p><p><strong>Data-driven decisions**: Você tem logs de automações. Analisa: qual etapa demora mais? Qual falha frequente? Otimize com dados, não intuição.</p><blockquote class="example">Exemplo: Dashboard de automação mostra: processamento A demora 10seg, processamento B demora 40seg. Ambos importante. Foco em B primeiro: otimizar salva 30seg per 100k execuções = horas economizadas.</blockquote><p><strong>Comunidade e aprendizado**: Compartilhar templates, padrões. "Veja como fizemos X". Community multiplica valor.</p><p><strong>Visão de futuro**: Onde quer ir em 2 anos? Qual será processos chaves? Planeja automação alinhada com futuro, não só presente.</p><blockquote class="quote">\"Automação é jornada contínua, não destino. Sempre há mais para otimizar.\"</blockquote><p>Você aprenderá a ser estratégico, não tático.</p>'
    }
